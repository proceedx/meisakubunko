"二人は顔を見合せました。チュンセ童子が", "「僕らはそんなもの持たない。」と申しました。", "すると鯨(くじら)が怒って水を一つぐうっと口から吐(は)きました。ひとではみんな顔色を変えてよろよろしましたが二人はこらえてしゃんと立っていました。", "鯨が怖(こわ)い顔をして云いました。", "「書き付けを持たないのか。悪党め。ここに居るのはどんな悪いことを天上でして来たやつでも書き付けを持たなかったものはないぞ。貴様らは実にけしからん。さあ。呑んでしまうからそう思え。いいか。」鯨は口を大きくあけて身構えしました。ひとでや近所の魚は巻き添(ぞ)えを食っては大変だと泥の中にもぐり込んだり一もくさんに逃げたりしました。", "その時向うから銀色の光がパッと射(さ)して小さな海蛇(うみへび)がやって来ます。くじらは非常に愕(おど)ろいたらしく急いで口を閉めました。", "海蛇は不思議そうに二人の頭の上をじっと見て云いました。", "「あなた方はどうしたのですか。悪いことをなさって天から落とされたお方ではないように思われますが。」", "鯨が横から口を出しました。", "「こいつらは追放の書き付けも持ってませんよ。」", "海蛇が凄(すご)い目をして鯨をにらみつけて云いました。", "「黙(だま)っておいで。生意気な。このお方がたをこいつらなんてお前がどうして云えるんだ。お前には善(よ)い事をしていた人の頭の上の後光が見えないのだ。悪い事をしたものなら頭の上に黒い影法師(かげぼうし)が口をあいているからすぐわかる。お星さま方。こちらへお出(い)で下さい。王の所へご案内申しあげましょう。おい、ひとで。あかりをともせ。こら、くじら。あんまり暴れてはいかんぞ。」", "くじらが頭をかいて平伏(へいふく)しました。", "愕ろいた事には赤い光のひとでが幅(はば)のひろい二列にぞろっとならんで丁度街道のあかりのようです。", "「さあ、参りましょう。」海蛇は白髪(はくはつ)を振(ふ)って恭々(うやうや)しく申しました。二人はそれに続いてひとでの間を通りました。まもなく蒼(あお)ぐろい水あかりの中に大きな白い城の門があってその扉(と)がひとりでに開いて中から沢山の立派な海蛇が出て参りました。そして双子のお星さまだちは海蛇の王さまの前に導かれました。王様は白い長い髯(ひげ)の生えた老人でにこにこわらって云いました。", "「あなた方はチュンセ童子にポウセ童子。よく存じて居ります。あなた方が前にあの空の蠍(さそり)の悪い心を命がけでお直しになった話はここへも伝わって居ります。私はそれをこちらの小学校の読本(とくほん)にも入れさせました。さて今度はとんだ災難で定めしびっくりなさったでしょう。」", "チュンセ童子が申しました。", "「これはお語(ことば)誠(まこと)に恐(おそ)れ入ります。私共はもう天上にも帰れませんしできます事ならこちらで何なりみなさまのお役に立ちたいと存じます。」", "王が云いました。", "「いやいや、そのご謙遜(けんそん)は恐れ入ります。早速 竜巻(たつまき)に云いつけて天上にお送りいたしましょう。お帰りになりましたらあなたの王様に海蛇めが宜(よろ)しく申し上げたと仰(お)っしゃって下さい。」", "ポウセ童子が悦(よろこ)んで申しました。", "「それでは王様は私共の王様をご存じでいらっしゃいますか。」", "王はあわてて椅子(いす)を下って申しました。", "「いいえ、それどころではございません。王様はこの私の唯(ただ)一人の王でございます。遠いむかしから私めの先生でございます。私はあのお方の愚(おろ)かなしもべでございます。いや、まだおわかりになりますまい。けれどもやがておわかりでございましょう。それでは夜の明けないうちに竜巻にお伴(とも)致(いた)させます。これ、これ。支度(したく)はいいか。」", "一 疋(ぴき)のけらいの海蛇が", "「はい、ご門の前にお待ちいたして居ります。」と答えました。", "二人は丁寧(ていねい)に王にお辞儀をいたしました。", "「それでは王様、ごきげんよろしゅう。いずれ改めて空からお礼を申しあげます。このお宮のいつまでも栄えますよう。」", "王は立って云いました。", "「あなた方もどうかますます立派にお光り下さいますよう。それではごきげんよろしゅう。」", "けらいたちが一度に恭々しくお辞儀をしました。", "童子たちは門の外に出ました。", "竜巻が銀のとぐろを巻いてねています。", "一人の海蛇が二人をその頭に載(の)せました。", "二人はその角(つの)に取りつきました。", "その時赤い光のひとでが沢山出て来て叫(さけ)びました。", "「さよなら、どうか空の王様によろしく。私どももいつか許されますようおねがいいたします。」", "二人は一緒(いっしょ)に云いました。", "「きっとそう申しあげます。やがて空でまたお目にかかりましょう。」", "竜巻がそろりそろりと立ちあがりました。", "「さよなら、さよなら。」", "竜巻はもう頭をまっくろな海の上に出しました。と思うと急にバリバリバリッと烈(はげ)しい音がして竜巻は水と一所に矢のように高く高くはせのぼりました。", "まだ夜があけるのに余程(よほど)間があります。天の川がずんずん近くなります。二人のお宮がもうはっきり見えます。", "「一寸(ちょっと)あれをご覧なさい。」と闇(やみ)の中で竜巻が申しました。", "見るとあの大きな青白い光りのほうきぼしはばらばらにわかれてしまって頭も尾も胴も別々にきちがいのような凄(すご)い声をあげガリガリ光ってまっ黒な海の中に落ちて行きます。", "「あいつはなまこになりますよ。」と竜巻がしずかに云いました。", "もう空の星めぐりの歌が聞えます。", "そして童子たちはお宮につきました。", "竜巻は二人をおろして", "「さよなら、ごきげんよろしゅう」と云いながら風のように海に帰って行きました。", "双子のお星さまはめいめいのお宮に昇りました。そしてきちんと座(すわ)って見えない空の王様に申しました。", "「私どもの不注意からしばらく役目を欠かしましてお申し訳けございません。それにもかかわらず今晩はおめぐみによりまして不思議に助かりました。海の王様が沢山の尊敬をお伝えして呉(く)れと申されました。それから海の底のひとでがお慈悲(じひ)をねがいました。又私どもから申しあげますがなまこももしできますならお許しを願いとう存じます。」", "そして二人は銀笛(ぎんてき)をとりあげました。", "東の空が黄金色(きんいろ)になり、もう夜明けに間もありません。"]}, {"no": 43, "title": "変身", "author": "カフカ フランツ", "category": "外国文学-物語", "chars": 56541, "volume": "大", "paras": ["フランツ・カフカ　Franz Kafka", "原田義人訳", "1、", "ある朝、グレゴール・ザムザが気がかりな夢から目ざめたとき、自分がベッドの上で一匹の巨大な毒虫に変ってしまっているのに気づいた。彼は甲殻のように固い背中を下にして横たわり、頭を少し上げると、何本もの弓形のすじにわかれてこんもりと盛り上がっている自分の茶色の腹が見えた。腹の盛り上がりの上には、かけぶとんがすっかりずり落ちそうになって、まだやっともちこたえていた。ふだんの大きさに比べると情けないくらいかぼそいたくさんの足が自分の眼の前にしょんぼりと光っていた。", "「おれはどうしたのだろう？」と、彼は思った。夢ではなかった。自分の部屋、少し小さすぎるがまともな部屋が、よく知っている四つの壁のあいだにあった。テーブルの上には布地の見本が包みをといて拡げられていたが――ザムザは旅廻りのセールスマンだった――、そのテーブルの上方の壁には写真がかかっている。それは彼がついさきごろあるグラフ雑誌から切り取り、きれいな金ぶちの額に入れたものだった。写っているのは一人の婦人で、毛皮の帽子と毛皮のえり巻とをつけ、身体をきちんと起こし、肘（ひじ）まですっぽり隠れてしまう重そうな毛皮のマフを、見る者のほうに向ってかかげていた。", "グレゴールの視線はつぎに窓へ向けられた。陰鬱（いんうつ）な天気は――雨だれが窓わくのブリキを打っている音が聞こえた――彼をすっかり憂鬱にした。「もう少し眠りつづけて、ばかばかしいことはみんな忘れてしまったら、どうだろう」と、考えたが、全然そうはいかなかった。というのは、彼は右下で眠る習慣だったが、この今の状態ではそういう姿勢を取ることはできない。いくら力をこめて右下になろうとしても、いつでも仰向（あおむ）けの姿勢にもどってしまうのだ。百回もそれを試み、両眼を閉じて自分のもぞもぞ動いているたくさんの脚を見ないでもすむようにしていたが、わき腹にこれまでまだ感じたことのないような軽い鈍痛を感じ始めたときに、やっとそんなことをやるのはやめた。", "「ああ、なんという骨の折れる職業をおれは選んでしまったんだろう」と、彼は思った。「毎日、毎日、旅に出ているのだ。自分の土地での本来の商売におけるよりも、商売上の神経の疲れはずっと大きいし、その上、旅の苦労というものがかかっている。汽車の乗換え連絡、不規則で粗末な食事、たえず相手が変って長つづきせず、けっして心からうちとけ合うようなことのない人づき合い。まったくいまいましいことだ！」彼は腹の上に軽いかゆみを感じ、頭をもっとよくもたげることができるように仰向けのまま身体をゆっくりとベッドの柱のほうへずらせ、身体のかゆい場所を見つけた。その場所は小さな白い斑点だけに被（おお）われていて、その斑点が何であるのか判断を下すことはできなかった。そこで、一本の脚でその場所にさわろうとしたが、すぐに脚を引っこめた。さわったら、身体に寒気がしたのだ。", "彼はまた以前の姿勢にもどった。「この早起きというのは」と、彼は思った、「人間をまったく薄ばかにしてしまうのだ。人間は眠りをもたなければならない。ほかのセールスマンたちはまるでハレムの女たちのような生活をしている。たとえばおれがまだ午前中に宿へもどってきて、取ってきた注文を書きとめようとすると、やっとあの連中は朝食のテーブルについているところだ。そんなことをやったらおれの店主がなんていうか、見たいものだ。おれはすぐさまくびになってしまうだろう。ところで、そんなことをやるのがおれにとってあんまりいいことでないかどうか、だれにだってわかりはしない。両親のためにそんなことをひかえているのでなければ、もうとっくに辞職してしまっているだろう。店主の前に歩み出て、思うことを腹の底からぶちまけてやったことだろう。そうしたら店主は驚いて机から落っこちてしまうにちがいなかったのだ！　机の上に腰かけて、高いところから店員と話をするというのも、奇妙なやりかただ。おまけに店員のほうは、店主の耳が遠いときているので近くによっていかなければならないのだ。まあ、希望はまだすっかり捨てられてしまったわけではない。両親の借金をすっかり店主に払うだけの金を集めたら――まだ五、六年はかかるだろうが――きっとそれをやってみせる。とはいっても、今のところはまず起きなければならない。おれの汽車は五時に出るのだ」", "そして、たんすの上でカチカチ鳴っている目ざまし時計のほうに眼をやった。「しまった！」と、彼は思った。もう六時半で、針は落ちつき払って進んでいく。半もすぎて、もう四十五分に近づいている。目ざましが鳴らなかったのだろうか。ベッドから見ても、きちんと四時に合わせてあったことがわかった。きっと鳴ったのだ。だが、あの部屋の家具をゆさぶるようなベルの音を安らかに聞きのがして眠っていたなんていうことがありうるだろうか。いや、けっして安らかに眠っていたわけではないが、おそらくそれだけにいっそうぐっすり眠っていたのだ。だが、今はどうしたらいいのだろう。つぎの汽車は七時に出る。その汽車に間に合うためには、気ちがいのように急がなければならないだろう。そして、商品見本はまだ包装してないし、彼自身がそれほど気分がすぐれないし、活溌な感じもしないのだ。そして、たとい汽車に間に合ったとしてさえ、店主の雷（かみなり）は避けることができないのだ。というのは、店の小使は五時の汽車に彼が乗るものと思って待っていて、彼が遅れたことをとっくに報告してしまっているはずだ。あの男は店主の手先で、背骨もなければ分別もない。ところで、病気だといって届け出たらどうだろうか。だが、そんなことをしたら、ひどく面倒になるし、疑いもかかるだろう。なにしろ、グレゴールは五年間の勤めのあいだにまだ一度だって病気になったことがないのだ。きっと店主は健康保険医をつれてやってきて、両親に向ってなまけ者の息子のことを非難し、どんなに異論を申し立てても、保険医を引合いに出してそれをさえぎってしまうことだろう。その医師にとっては、およそまったく健康なくせに仕事の嫌いな人間たちというものしかいないのだ。それに、今の場合、医者の考えもそれほどまちがっているだろうか。事実、グレゴールは、長く眠ったのにほんとうに眠気が残っていることを別にすれば、まったく身体の調子がいい気がするし、とくに強い空腹さえ感じているのだった。", "ベッドを離れる決心をすることができないままに、そうしたすべてのことをひどく急いで考えていると――ちょうど目ざまし時計が六時四十分を打った――、彼のベッドの頭のほうにあるドアをノックする音がした。", "「グレゴール」と、その声は叫んだ――母親だった――「六時四十五分よ。出かけるつもりじゃないのかい？」", "ああ、あのやさしい声！　グレゴールは返事をする自分の声を聞いたとき、ぎくりとした。それはたしかにまぎれもなく彼の以前の声であったが、そのなかに下のほうから、抑えることのできない苦しそうなぴいぴいいう音がまじっていた。その音は、明らかにただ最初の瞬間においてだけは言葉の明瞭さを保たせておくのだが、その余韻（よいん）をすっかり破壊してしまって、正しく聞き取ったかどうかわからないようにするほどだった。グレゴールはくわしく返事して、すべてを説明しようと思っていたのだったが、こうした事情では、「ええ、わかりましたよ、ありがとう、お母さん、もう起きますよ」と、いうにとどめた。木のドアが距てているため、グレゴールの声の変化は外ではきっと気づかれなかったのだろう。というのは、母親はこの説明で満足して、足をひきずって立ち去った。ところが、このちょっとした対話によって、グレゴールが期待に反してまだ家にいるのだ、ということが家族のほかの者たちの注意をひいてしまった。そして、早くも父親がわきのドアを、軽くではあるが拳（こぶし）でノックした。", "「グレゴール、グレゴール」と、父は叫んだ。「いったい、どうしたのだ？」そして、ちょっとたってから、もっと低い声でもう一度注意するのだった。「グレゴール！　グレゴール！」", "もう一つのわきのドアでは、妹が低い声で嘆くようにいった。", "「グレゴール、どうしたの？　かげんが悪いの？　何か欲しいものはないの？」", "グレゴールは両方に向っていった。", "「もうすんだよ」", "そして、発音に大いに気を使い、一つ一つの言葉のあいだに長い間（ま）をはさむことによっていっさいの目立つ点を取り除こうと努めた。父親はそれを聞いて朝食へもどっていったが、妹はささやくのだった。", "「グレゴール、開けてちょうだいな。ね、お願い」", "だが、グレゴールはドアを開けることなど考えてもみず、旅に出る習慣から身につけるようになった家でもすべてのドアに夜のあいだ鍵（かぎ）をかけておくという用心をよかったと思った。", "はじめは、落ちつき払って、だれにもじゃまされずに起き上がり、服を着て、まず何よりさきに朝食を取ろう、それから、はじめてそれからのことを考えようと思ったのだった。というのは、ベッドのなかにいたのでは、あれこれ考えたところで理にかなった結論に到達することはあるまい、とはっきりと気づいたのだった。これまでしょっちゅうベッドのなかで、おそらくはまずい寝かたをしたためだろうが、そのために起った軽い痛みを感じた、ということを彼は思い出した。その痛みは、やがて起き上がってみるとまったくの空想だとわかったのだった。そして、自分のきょうのさまざまな考えごともだんだん消え去ることだろう、と大いに期待した。声の変化は旅廻りのセールスマンの職業病であるひどい風邪の前ぶれにすぎないのだ、ということを彼は少しも疑わなかった。", "かけぶとんをはねのけるのは、まったく簡単だった。ただちょっと腹をふくらませるだけで、ふとんは自然とずり落ちた。だが、そのあとが面倒なことになった。その理由はことに彼の身体の幅がひどく広かったからだ。身体を起こすためには、手足を使うはずだった。ところが、人間の手足のかわりにたくさんの小さな脚がついていて、それがたえずひどくちがった動きかたをして、おまけにそれらを思うように動かすことができない。やっと一本の脚を曲げようとすると、最初に起こることは、自分の身体がのびてしまうことだった。やっとその脚で自分の思うようにすることに成功したかと思うと、そのあいだにほかのすべての脚がまるで解放されたかのように、なんとも工合の悪い大さわぎをやるのだった。", "「ともかくベッドのなかに意味もなくとどまっていないことだ」と、グレゴールは自分に言い聞かせた。", "まず彼は身体の下の部分を動かしてベッドから出ようとしたが、まだ自分で見てもいないし、正しい想像をめぐらすこともできないでいるこの下半身の部分は、ひどく動かすことがむずかしいとわかった。動作はのろのろ進むだけだった。とうとう、まるで半狂乱になって、力をこめ、むちゃくちゃに身体を前へ突き出したが、方角を誤ってしまい、足のほうのベッド柱にはげしくぶつかり、そのとき感じた痛みで、まさに自分の身体の下の部分が今のところいちばん敏感な部分なのだ、ということがわかった。", "そこで、まず最初に上体をベッドの外に出そうと試み、用心深く頭をベッドのへりのほうに向けた。これは思ったとおりうまくいき、身体の幅が広く、体重も重いにもかかわらず、ついに身体全体が頭の転回にのろのろとついて廻った。だが、頭をとうとうベッドの外の宙に浮かべてみると、このやりかたでさらに前へ乗り出していくことが不安になった。というのは、こうやって最後に身体を下へ落してしまうと、頭を傷つけまいとするならば奇蹟でも起こらなければできるものではない。そして、とくに今はどんなことがあっても正気を失うわけにはいかないのだ。そこで、むしろベッドにとどまっていようと心にきめた。", "だが、また同じように骨を折って、溜息をもらしながら、さっきのように身体を横たえ、またもや自分のたくさんの小さな脚がおそらくさっきよりもいっそうひどく争い合っているのをながめ、この勝手な争いに静けさと秩序とをもちこむことが不可能だとわかったときに、もうベッドのなかにとどまっていることはできない、たといベッドから出られるという希望がほんのちょっとしかないにしても、いっさいを犠牲にして出ようと試みるのがいちばん賢明なやりかたなのだ、とまた自分に言い聞かせた、だが同時に、やけになって決心するよりも冷静に、きわめて冷静に思いめぐらすほうがずっといいのだ、とときどき思い出すことを忘れなかった。そんなことを考えている瞬間に、眼をできるだけ鋭く窓のほうへ向けたが、狭い通りのむこう側さえ見えなくしている朝もや［＃「もや」に傍点］をながめていても、残念ながらほとんど確信も元気も取りもどすわけにはいかなかった。", "「もう七時だ」と、目ざましが新たに打つのを聞いて、彼は自分に言い聞かせた。「もう七時だというのに、まだこんな霧だ」", "そして、完全に静かにしていればおそらくほんとうのあたりまえの状態がもどってくるのではないかといわんばかりに、しばらくのあいだ、静かに、微かな息づかいをしながら、横たわっていた。", "だが、やがて自分に言い聞かせた。「七時十五分を打つ前に、おれはどうあってもベッドを完全に離れてしまっていなければならないぞ。それにまた、それまでには店からおれのことをききにだれかがやってくるだろう。店は七時前に開けられるんだから」そして、今度は、身体全体を完全にむらなく横へゆすってベッドから出る動作に取りかかった。もしこんなふうにしてベッドから落ちるならば、頭は落ちるときにぐっと起こしておこうと思うから、傷つかないですむ見込みがある。背中は固いようだ。だから、絨毯（じゅうたん）の上に落ちたときに、背中にけがをすることはきっとないだろう。落ちるときに立てるにちがいない大きな物音のことを考えると、それがいちばん気にかかった。その音は、どのドアのむこうでも、驚きとまではいかないにしても、心配をひき起こすことだろう。だが、思いきってやらなければならないのだ。", "グレゴールがすでに半分ベッドから乗り出したとき――この新しいやりかたは、骨の折れる仕事というよりもむしろ遊びのようなもので、いつまでもただ断続的に身体をゆすってさえいればよかった――、自分を助けにやってきてくれる者がいれば万事はどんなに簡単にすむだろう、という考えがふと頭に浮かんだ。力の強い者が二人いれば――彼は父親と女中とのことを考えた――それだけで完全に十分なのだ。その二人がただ腕を彼の円味をおびた背中の下にさし入れ、そうやって彼をベッドからはぎ取るように離し、この荷物をもったまま身体をこごめ、つぎに彼が床の上で寝返りを打つのを用心深く待っていてくれさえすればよいのだ。床の上でならおそらくこれらのたくさんの脚も存在意義があることになるだろう。ところで、すべてのドアに鍵がかかっていることはまったく別問題としても、ほんとうに助けを求めるべきだろうか。まったく苦境にあるにもかかわらず、彼はこう考えると微笑を抑えることができなかった。", "この作業は進行して、もっと強く身体をゆすればもうほとんど身体の均衡が保てないというところにまできていた。もうすぐ最後の決断をしなければならない。というのは、あと五分で七時十五分になる。――そのとき、玄関でベルが鳴った。「店からだれかがきたんだ」と、彼は自分に言い聞かせ、ほとんど身体がこわばる思いがした。一方、小さな脚のほうはただそれだけせわしげにばたばたするのだった。一瞬、あたりはしんとしていた。「ドアを開けないのだな」と、グレゴールは何かばかげた期待にとらわれながら思った。だが、むろんすぐいつものように女中がしっかりした足取りでドアへ出ていき、ドアを開けた。グレゴールはただ訪問者の最初の挨拶を聞いただけで、それがだれか、早くもわかった。――それは支配人自身だった。なぜグレゴールだけが、ほんのちょっと遅刻しただけですぐ最大の疑いをかけるような商会に勤めるように運命づけられたのだろうか。いったい使用人のすべてが一人の除外もなくやくざなのだろうか。たとい朝のたった一、二時間は仕事のために使わなかったにせよ、良心の苛責（かしゃく）のために気ちがいじみた有様になって、まさにそのためにベッドを離れられないような忠実で誠実な人間が、使用人たちのあいだにはいないというのだろうか。小僧にききにこさせるだけでほんとうに十分ではないだろうか――そもそもこうやって様子をたずねることが必要だとしてのことだが――。支配人が自身でやってこなければならないのだろうか。そして、支配人がやってくることによって、この疑わしい件の調査はただ支配人の分別にだけしかまかせられないのだ、ということを罪のない家族全体に見せつけられなくてはならないのか。ほんとうに決心がついたためというよりも、むしろこうしたもの思いによって置かれた興奮のために、グレゴールは力いっぱいにベッドから跳（と）び下りた。どすんと大きな音がしたが、それほどひどい物音ではなかった。絨毯がしいてあるため、墜落の力は少しは弱められたし、背中もグレゴールが考えていたよりは弾力があった。そこでそう際立って大きな鈍い物音はしなかった。ただ、頭は十分用心してしっかりともたげていなかったので打ちつけてしまった。彼は怒りと痛みとのあまり頭を廻して、絨毯にこすった。", "「あの部屋のなかで何か落ちる音がしましたね」と左側の隣室で支配人がいった。グレゴールは、けさ自分に起ったようなことがいつか支配人にも起こらないだろうか、と想像しようとした。そんなことが起こる可能性はみとめないわけにはいかないのだ。だが、まるでグレゴールのこんな問いに乱暴に答えるかのように、隣室の支配人は今度は一、二歩しっかりした足取りで歩いて、彼のエナメル靴をきゅうきゅう鳴らした。グレゴールに知らせるため、右側の隣室からは妹のささやく声がした。", "「グレゴール、支配人がきているのよ」", "「わかっているよ」と、グレゴールはつぶやいた。しかし、妹が聞くことができるほどにあえて声を高めようとはしなかった。", "「グレゴール」と、今度は父親が左側の隣室からいった。「支配人さんがおいでになって、お前はなぜ朝の汽車でたたなかったか、ときいておられる。なんと申し上げたらいいのか、わしらにはわからん。それに、支配人さんはお前とじかに話したいといっておられるよ。だから、ドアを開けてくれ。部屋が取り散らしてあることはお許し下さるさ」", "「おはよう、ザムザ君」と、父親の言葉にはさんで支配人は親しげに叫んだ。", "「あの子は身体の工合がよくないんです」と、母親は父親がまだドアのところでしゃべっているあいだに支配人に向っていった。「あの子は身体の工合がよくないんです。ほんとうなんです、支配人さん。そうでなければどうしてグレゴールが汽車に乗り遅れたりするでしょう！　あの子は仕事のこと以外は頭にないんですもの。夜分にちっとも外へ出かけないことを、わたしはすでに腹を立てているくらいなんです。これで一週間も町にいるのに、あれは毎晩家にこもりきりでした。わたしたちのテーブルに坐って、静かに新聞を読むとか、汽車の時間表を調べるとかしているんです。糸のこ細工でもやっていれば、あの子にはもう気ばらしなんですからね。たとえばこのあいだも二晩か三晩かかって小さな額ぶちをつくりました。どんなにうまくできたか、ごらんになれば驚かれるでしょうよ。あの部屋にかけてあります。グレゴールがドアを開けましたら、すぐごらんになりますよ。ともかく、あなたがおいで下すって、ほんとによかったとわたしは思っております、支配人さん。わたしたちだけではグレゴールにドアを開けさせるわけにはいかなかったでしょう。あの子はとても頑固者でしてねえ。でも、朝にはなんでもないと申しておりましたが、あの子はきっと工合が悪いのですよ」", "「すぐいきますよ」と、グレゴールはゆっくりと用心深くいったが、むこうの対話をひとことでも聞きもらすまいとして、身動きをしなかった。", "「奥さん、私にもそれ以外には考えようがありませんね」と、支配人はいった。「たいしたことでないといいんですが。とはいえ、一面では、われわれ商売人というものは、幸か不幸かはどちらでもいいのですが、少しぐらいかげんが悪いなんていうのは、商売のことを考えるとあっさり切り抜けてしまわなければならぬことがしょっちゅうありましてね」", "「では、支配人さんに入っていただいてかまわないね」と、いらいらした父親がたずね、ふたたびドアをノックした。", "「いけません」と、グレゴールはいった。左側の隣室では気まずい沈黙がおとずれた。右側の隣室では妹がしくしく泣き始めた。", "なぜ妹はほかの連中のところへいかないのだろう。きっと今やっとベッドから出たばかりで、まだ服を着始めていなかったのだろう。それに、いったいなぜ泣くのだろう。おれが起きず、支配人を部屋へ入れないからか。おれが地位を失う危険があり、そうなると店主が古い借金のことをもち出して、またもや両親を追求するからだろうか。しかし、そんなことは今のところは不必要な心配というものだ。まだグレゴールはここにいて、自分の家族を見捨てようなどとは、ほんの少しだって考えてはいないのだ。今のところ絨毯の上にのうのうと寝ているし、彼の状態を知った者ならばだれだって本気で支配人を部屋に入れろなどと要求するはずはないのだ。だが、あとになれば適当な口実がたやすく見つかるはずのこんなちょっとした無礼なふるまいのために、グレゴールがすぐに店から追い払われるなどということはありえない。そして、泣いたり説得しようとしたりして支配人の気を悪くさせるよりは、今は彼をそっとしておくほうがずっと賢明なやりかただ、というようにグレゴールには思われた。だが、ほかの人びとを当惑させ、彼らのふるまいがむりもないと思わせたのは、まさにこのグレゴールの決心のつかない態度だった。", "「ザムザ君」と、支配人は今度は声を高めて叫んだ。「いったい、どうしたんだね？　君は自分の部屋にバリケードを築いて閉じこもり、ただ、イエスとかノーとだけしか返事をしない。ご両親にいらぬ大変なご心配をかけ、――これはただついでにいうんだが――君の商売上の義務をまったくあきれはてたやりかたでおこたっている。君のご両親と社長とにかわって話しているんだが、どうかまじめになってすぐはっきりした説明をしてもらいたい。私は驚いているよ、まったく。君という人は冷静な分別ある人間だと思っていたが、急に奇妙な気まぐれを見せつけてやろうと思い始めたようだね。社長はけさ、君の欠勤の理由はあれだろうとほのめかして聞かせてくれはしたが――つまり最近君にまかせた回収金のことだ――、私はこの説明が当っているはずはない、とほんとうにほとんど誓いを立てんばかりにして取りなしておいた。ところが、こうやって君の理解しがたい頑固さを見せつけられては、ほんの少しでも君の味方をする気にはまったくなれないよ。それに、君の地位はけっしてそれほど安定したものじゃない。ほんとうは君にこうしたことを二人きりでいうつもりだったが、君がこうやって無益に私に手間取らせるんだから、ご両親にも聞かれていけないとは思われなくなった。つまり君の最近の成績はひどく不満足なものだった。今はかくべつ商売がうまくいく季節ではない、ということはわれわれもみとめる。しかし、全然商売ができんなんていう季節はあるものではないよ。ザムザ君、そんなものはあるはずがないよ」", "「でも、支配人さん」と、グレゴールはわれを忘れて叫び、興奮のあまりほかのすべては忘れてしまった。「すぐ、今すぐ開けますよ。ちょっと身体の工合が悪いんです。目まいがしたんです。それで起きることができませんでした。今もまだベッドに寝ているんです。でも、もうすっかりさっぱりしました。今、ベッドから降りるところです。ちょっとご辛抱下さい！　まだ思ったほど調子がよくありません。でも、もうなおりました。病気というものはなんて急に人間を襲ってくるものでしょう！　ゆうべはまだまったく調子がよかったんです。両親がよく知っています。でも、もっと正確にいうと、ゆうべすでにちょっとした予感があったんです。人が見れば、きっと私のそんな様子に気がついたはずです。なぜ店に知らせておかなかったんでしょう！　でも、病気なんて家で寝なくたってなおるだろう、といつでも思っているものですから。支配人さん！　両親をいたわってやって下さい！　あなたが今、私におっしゃっている非難は、みんないわれがありません。これまでにそんなことは一ことだっていわれたことはありません。あなたはおそらく、私がお送りした最近の注文書類をまだ読んではおられないのでしょう。ともあれ、これから八時の汽車で商用の旅に出かけます。一、二時間休んだので、元気になりました。どうかお引き取り下さい、支配人さん。私はすぐ自分で店へいきます。そして、すみませんがどうか社長にこのことを申し上げて下さい」", "そして、グレゴールはこうしたことを急いでしゃべりまくり、自分が何をいっているのかほとんどわからなかったが、きっとベッドですでに習いおぼえた練習のおかげだろうか、たやすくたんすへ近づいて、それにすがって起き上がろうとした。ほんとうにドアを開け、ほんとうに姿を見せて、支配人と話そうと思ったのだった。今こんなに自分に会いたがっている人たちが、自分を見てなんというか、彼はそれを知りたくてたまらなかった。もし彼らがびっくりしたならば、もうグレゴールには責任がないわけで、落ちついていることができる。ところで、もしみんなが平気でいるならば、彼としても興奮する理由はないし、急げば八時にはほんとうに駅へいけるはずだ。最初、彼は二、三回すべすべしたたんすから滑り落ちたが、ついに最後の一跳びをやって立ち上がった。下半身の痛みは燃えるように痛んだが、もう全然気にもかけなかった。今度は、近くにあった椅子のもたれに身体を倒し、小さな脚を使ってそのへりにしがみついた。それによって自分を抑えることができたので、しゃべることもやめた。というのは、今では支配人のいうことに耳を傾けることができるようになっていた。", "「息子さんのいわれることが一ことでもわかりましたか」と、支配人は両親にたずねた。「われわれをばかにしているんじゃないでしょうね？」", "「とんでもないことです」と、母親はもう泣きながら叫んだ。「あの子はきっと大病なんです。それなのにわたしたちはあの子を苦しめたりして。グレーテ！　グレーテ！」と、母親は大声でいった。", "「なあに？」と、妹が別な側から叫んだ。両方はグレゴールの部屋越しに言葉を交わしていたのだ。", "「すぐお医者様のところへいっておくれ。グレゴールが病気なんだよ。グレゴールが今しゃべったのを聞いたかい？」", "「ありゃあ、まるでけものの声だった」と、支配人がいったが、その言葉は母親の叫び声に比べると目立って低かった。", "「アンナ！　アンナ！」と、父親は玄関の間越しに台所へ向って叫び、手をたたいた。「すぐ鍵屋を呼んできてくれ！」", "すぐさま、二人の娘はスカートの音を立てながら玄関の間をかけ抜けていった――いったい妹はどうやってあんなに早く服を着たのだろう――。そして、玄関のドアをさっと開けた。ドアの閉じる音は全然聞こえなかった。二人はきっとドアを開け放しにしていったのだ。大きな不幸が起った家ではそうしたことはよくあるものだ。", "だが、グレゴールはずっと平静になっていた。それでは、人びとはもう彼が何をいっているのかわからなかったのだ。自分の言葉ははっきりと、さっきよりもはっきりとしているように思えたのだが、おそらくそれは耳が慣れたためなのだろう。それにしても、ともかく今はもう、彼の様子が普通でないということはみんなも信じており、彼を助けるつもりでいるのだ。最初の処置がとられたときの確信と冷静さとが、彼の気持をよくした。彼はまた人間の仲間に入れられたと感じ、医師と鍵屋とをきちんと区別することなしに、この両者からすばらしく驚くべき成果を期待した。さし迫っている決定的な話合いのためにできるだけはっきりした声を準備しておこうと思って、少し咳払いしたが、とはいえすっかり音を抑えてやるように努力はした。おそらくこの物音も人間の咳払いとはちがったふうに響くだろうと思われたからだった。彼自身、それを判断できるという自信はもうなくなっていた。そのあいだに、隣室はすっかり静まり返っていた。おそらく両親は支配人といっしょにテーブルのところに坐り、ひそひそ話しているのだろう。それとも、みんなドアに身をよせて、聞き耳を立てているのかもしれない。", "グレゴールは椅子といっしょにゆっくりとドアへ近づいていき、そこで椅子を放し、ドアに身体をぶつけて、それにすがってまっすぐに立ち上がった――小さな足の裏のふくらみには少しねばるものがついていたからだ。――そして、そこで一瞬のあいだ、これまで骨の折れた動作の休憩をした。それから、鍵穴にはまっている鍵を口で廻す仕事に取りかかった。残念なことに、歯らしいものがないようだった――なんですぐ鍵をつかんだらいいのだろうか――。ところが、そのかわり顎（あご）はむろんひどく頑丈（がんじょう）で、その助けを借りて実際に鍵を動かすことができたが、疑いもなく身体のどこかを傷つけてしまったことには気づかなかった。傷ついたというのは、褐色の液体が口から流れ出し、鍵の上を流れて床へしたたり落ちたのだった。", "「さあ、あの音が聞こえませんか」と、隣室の支配人がいった。「鍵を廻していますよ」", "その言葉は、グレゴールにとっては大いに元気づけになった。だが、みんなが彼に声援してくれたっていいはずなのだ。父親も母親もそうだ。「グレゴール、しっかり。頑張って！　鍵にしっかりとつかまれよ」と、両親も叫んでくれたっていいはずだ。そして、みんなが自分の努力を緊張して見守っているのだ、と思い描きながら、できるだけの力を振りしぼって気が遠くなるほど鍵にかみついた。鍵の回転が進行するにつれ、彼は鍵穴のまわりを踊るようにして廻っていった。今はただ口だけで身体をまっすぐに立てていた。そして、必要に応じて鍵にぶらさがったり、つぎにまた自分の身体の重みを全部かけてそれを押し下げたりした。とうとう開いた鍵のぱちりという澄んだ音が、夢中だったグレゴールをはっきり目ざませた。ほっと息をつきながら、彼は自分に言い聞かせた。", "「これなら鍵屋はいらなかったわけだ」", "そして、ドアをすっかり開けようとして、ドアの取手の上に頭をのせた。", "彼はこんなふうにしてドアを開けなければならなかったので、ほんとうはドアがもうかなり開いたのに、彼自身の姿はまだ外からは見えなかった。まずゆっくりとドア板のまわりを伝わって廻っていかなければならなかった。しかも、部屋へ入る前にどさりと仰向けに落ちまいと思うならば、用心してやらなければならなかった。彼はまだその困難な動作にかかりきりになっていて、ほかのことに注意を向けるひまがなかったが、そのとき早くも支配人が声高く「おお！」と叫ぶのを聞いた――まるで風がさわぐときのように響いた――。そこで支配人の姿も見たが、ドアのいちばん近くにいた支配人はぽかりと開けた口に手をあてて、まるで目に見えない一定の強さを保った力に追い払われるように、ゆっくりとあとしざりしていった。母親は――支配人がいるにもかかわらず、ゆうべからといてある逆立った髪のままでそこに立っていたが――まず両手を合わせて父親を見つめ、つぎにグレゴールのほうに二歩進み、身体のまわりにぱっと拡がったスカートのまんなかにへなへなと坐りこんでしまった。顔は胸へ向ってうなだれており、まったく見えなかった。父親は敵意をこめた表情で拳（こぶし）を固め、まるでグレゴールを彼の部屋へ突きもどそうとするようだった。そして、落ちつかぬ様子で居間を見廻し、つぎに両手で眼をおおうと、泣き出した。そこで父親の頑強そうな大きな胸がうちふるえるのだった。", "グレゴールはむこうの部屋へは入っていかず、しっかりかけ金をかけてあるドア板に内側からよりかかっていたので、彼の身体は半分しか見えず、その上にのっている斜めにかしげた頭が見えるのだった。彼はその頭でほかの人びとのほうをのぞいていた。そのあいだに、あたりは前よりもずっと明るくなっていた。通りのむこう側には、向かい合って立っている限りなく長い黒灰色の建物の一部分が、はっきりと見えていた――病院なのだ――。その建物の前面は規則正しく並んだ窓によってぽかりぽかりと孔（あな）をあけられていた。雨はまだ降っていたが、一つ一つ見わけることのできるほどの大きな雨粒で、地上に落ちるしずくも一つ一つはっきりと見えた。テーブルの上には朝食用の食器がひどくたくさんのっていた。というのは、父親にとっては朝食は一日のいちばん大切な食事で、いろいろな新聞を読みながら何時間でも引き延ばすのだった。ちょうどまむかいの壁には、軍隊時代のグレゴールの写真がかかっている。中尉の服装をして、サーベルに手をかけ、のんきな微笑を浮かべながら、自分の姿勢と軍服とに対して見る者の敬意を要求しているようだ。玄関の間へ通じるドアは開いており、玄関のドアも開いているので、ドアの前のたたきと建物の下へ通じる階段の上のほうとが見えた。", "「それでは」と、グレゴールはいったが、自分が冷静さを保っているただ一人の人間なのだということをはっきりと意識していた。「すぐ服を着て、商品見本を荷造りし、出かけることにします。あなたがたは、私を出かけさせるつもりでしょうね？　ところで、支配人さん、ごらんのとおり、私は頑固じゃありませんし、仕事は好きなんです。商用旅行は楽じゃありませんが、旅行しないでは生きることはできないでしょうよ。ところで、支配人さん、どちらへいらっしゃいますか？　店へですか？　万事をありのままに伝えて下さるでしょうね？　だれだって、ちょっとのあいだ働くことができなくなることがありますが、そういうときこそ、それまでの成績を思い出して、そのあとで障害が除かれればきっとそれだけ勤勉に、それだけ精神を集中して働くだろう、ということを考えるべき時なのです。私は実際、社長さんをとてもありがたいと思っています。それはあなたもよくご存じのはずです。一方、両親と妹とのことも心配しています。私は板ばさみになっているわけですが、きっとまた切り抜けるでしょう。今でもむずかしいことになっているのに、もうこれ以上私の立場をむずかしくはしないで下さい。店でも私の味方になって下さいませんか。旅廻りのセールスマンなんて好かれません。それは私にもよくわかっています。セールスマンはしこたまもうけて、それでいい暮しをやっている、と考えられているんです。そして、現実の姿もこうした偏見を改めるようにうながすものではないことも、私にはわかっています。でも、支配人さん、あなたはほかの店員たちよりも事情をよく見抜いておられます。いや、それどころか、ないしょの話ですが、社長自身よりもよく見抜いておられるんです。社長は事業主としての立場があるため、判断を下す場合に一人の使用人にとって不利なまちがいを犯すものなんです。あなたもよくご存じのように、ほとんど一年じゅう店の外にいる旅廻りのセールスマンは、かげ口や偶然やいわれのない苦情の犠牲になりやすく、そうしたものを防ぐことはまったくできないんです。というのも、そういうことの多くは全然耳に入ってこず、ただ疲れはてて旅を終えて帰宅したときにだけ、原因なんかもうわからないような悪い結果を自分の身体に感じることができるんですからね。支配人さん、どうかお帰りになる前には、少なくとも私の申し上げたほんの一部分だけでももっともだ、と思って下すっていることを見せて下さるような言葉を一ことおっしゃって下さい」", "だが支配人は、グレゴールの最初の言葉を聞くと早くも身体をそむけ、ただぴくぴく動く肩越しに、唇をそっくり返らしてグレゴールのほうを見返るだけだった。そして、グレゴールがしゃべっているあいだじゅう、一瞬のあいだもじっと立ってはいず、グレゴールから眼をはなさずにドアのほうへ遠ざかっていくのだった。とはいっても、まるでこの部屋を出ていってはならないという秘密の命令でもあるかのように、急がずにじわじわと離れていく。彼はついに玄関の間までいった。そして、彼が最後の一足を居間から引き抜いたすばやい動作を見たならば、この人はそのときかかとにやけどをしたのだ、と思いかねないほどだった。で、玄関の間では、右手をぐっと階段のほうにのばし、まるで階段ではこの世のものではない救いが自分を待ってくれているのだ、というような恰好だった。", "支配人をどんなことがあってもこんな気分で立ち去らせてはならない。そんなことをやったら店における自分の地位はきっとぎりぎりまであぶなくなるにちがいない、とグレゴールは見て取った。両親にはそうしたことが彼ほどにはわかっていないのだ。両親は永年のうちに、グレゴールはこの店で一生心配がないのだ、という確信を築き上げてしまっているし、おまけに今は当面の心配ごとにあんまりかかりきりになっているので、先のことなど念頭にはない始末だった。だが、グレゴールはこの先のことを心配したのだ。支配人を引きとめ、なだめ、確信させ、最後には味方にしなければならない。グレゴールと家族との未来はなんといってもそのことにかかっているのだ！　ああ、妹がこの場にいてくれたらいいのに！　妹はりこう者だ。さっきも、グレゴールが落ちつき払って仰向けに寝ていたとき、泣いていた。それに、女には甘いあの支配人も、妹にくどかれれば意見を変えるだろう。妹なら玄関のドアを閉め、玄関の間で支配人の驚きを何とかなだめたことだろう。ところが、妹はちょうど居合わせず、グレゴール自身がやらなければならないのだ。そこで、身体を動かす自分の現在の能力がどのくらいあるかもまだ全然わからないということを忘れ、また自分の話はおそらくは今度もきっと相手に聞き取ってはもらえないだろうということも忘れて、ドア板から離れ、開いている戸口を通って身体をずらしていき、支配人のところへいこうとした。支配人はもう玄関の前のたたきにある手すりに滑稽な恰好で両手でしがみついていたのだった。ところが、グレゴールはたちまち、何かつかまるものを求めながら小さな叫びを上げて、たくさんの小さな脚を下にしたままばたりと落ちた。そうなるかならぬときに、彼はこの朝はじめて身体が楽になるのを感じた。たくさんの小さな脚はしっかと床を踏まえていた。それらの脚は完全に思うままに動くのだ。それに気づくと、うれしかった。それらの脚は、彼がいこうとするほうへ彼を運んでいこうとさえするのだった。そこで彼は早くも、いっさいの悩みはもうこれですっかり解消するばかりになったぞ、と思った。だが、その瞬間、抑えた動きのために身体をぶらぶらゆすりながら、母親からいくらも離れていないところで母親とちょうど向かい合って床の上に横たわったときに、まったく放心状態にあるように見えた母親ががばと高く跳（と）び上がり、両腕を大きく拡げ、手の指をみんな開いて、叫んだのだった。", "「助けて！　どうか助けて！」", "まるでグレゴールをよく見ようとするかのように、頭を下に向けていたのだが、その恰好とは逆に思わず知らずうしろへすたすたと歩いていった。自分のうしろには食事の用意がしてあるテーブルがあることを忘れてしまっていた。そして、テーブルのところへいきつくと、放心したようになって急いでそれに腰を下ろし、自分のすぐそばでひっくり返った大きなコーヒー・ポットからだくだくコーヒーが絨毯（じゅうたん）の上へこぼれ落ちるのにも全然気づかない様子だった。", "「お母さん、お母さん」と、グレゴールは低い声で言い、母親のほうを見上げた。一瞬、支配人のことはまったく彼の念頭から去っていた。そのかわり、流れるコーヒーをながめて、何度か顎をぱくぱく動かさないではいられなかった。それを見て母親は改めて大きな叫び声を上げ、テーブルから逃げ出し、かけていった父親の両腕のなかに倒れてしまった。しかし、今はグレゴールには両親をかまっているひまがなかった。支配人はもう玄関の外の階段の上にいた。手すりの上に顎をのせ、最後にこちらのほうへ振り返っている。グレゴールはできるだけ確実に追いつこうとして、スタートを切った。支配人は何か勘づいたにちがいなかった。というのは、彼は何段も一足跳びに降りると、姿を消してしまったのだった。逃げていきながらも、「ひゃあ！」と叫んだ。その叫び声が建物の階段部じゅうに響いた。まずいことに、支配人のこの逃亡は、それまで比較的落ちついていた父親をも混乱させたようだった。父親は自分でも支配人のあとを追っていくとか、あるいは少なくとも支配人のあとを追おうとするグレゴールのじゃまをしないとかいうのではなくて、支配人が帽子とオーバーといっしょに椅子の一つの上に置き忘れていったステッキを右手でつかみ、左手では大きな新聞をテーブルから取って、足を踏み鳴らしながら、ステッキと新聞とを振ってグレゴールを彼の部屋へ追い返すことに取りかかった。グレゴールがいくら頼んでもだめだし、いくら頼んでも父親には聞き入れてもらえなかった。どんなにへりくだって頭を廻してみても、父親はただいよいよ強く足を踏み鳴らすだけだ。むこうでは母親が、寒い天候にもかかわらず窓を一つ開け放ち、身体をのり出して顔を窓からずっと外に出したまま、両手のなかに埋めている。通りと階段部とのあいだには強く吹き抜ける風が立って、窓のカーテンは吹きまくられ、テーブルの上の新聞はがさがさいうし、何枚かの新聞はばらばらになって床の上へ飛ばされた。父親は容赦（ようしゃ）なく追い立て、野蛮人のようにしっしっというのだった。ところで、グレゴールはまだあとしざりの練習は全然していなかったし、また実際、ひどくのろのろとしか進めなかった。グレゴールが向きを変えることさえできたら、すぐにも自分の部屋へいけたことだろうが、手間のかかる方向転換をやって父親をいらいらさせることを恐れたのだった。それに、いつ父親の手ににぎられたステッキで背中か頭かに致命的な一撃をくらうかわからなかった。だが、結局のところ、向きを変えることのほかに残された手だてはなかった。というのは、びっくりしたことに、あとしざりしていくのではけっして方向をきちんと保つことができないとわかったのだった。そこで彼は、たえず不安げに父親のほうに横眼を使いながら、できるだけすばやく向きを変え始めた。しかし、実のところその動作はひどくのろのろとしかできなかった。おそらく父親も彼の善意に気づいたのだろう。というのは、彼の動きのじゃまはしないで、ときどき遠くのほうからステッキの尖端でその方向転換の動作の指揮を取るような恰好をするのだった。父親のあの耐えがたいしっしっという追い立ての声さえなかったら、どんなによかったろう！　それを聞くと、グレゴールはまったく度を失ってしまう。もうほとんど向きを変え終ったというのに、いつでもこのしっしっという声に気を取られて、おろおろしてしまい、またもや少しばかりもとの方向へもどってしまうのだ。だが、とうとううまい工合に頭がドアの口まで達したが、ところが彼の身体の幅が広すぎて、すぐには通り抜けられないということがわかった。グレゴールが通るのに十分な通り路をつくるために、もう一方のドア板を開けてやるなどということは、今のような心の状態にある父親にはむろんのことまったく思いつくはずがなかった。父親の思いこんでいることは、ただもうグレゴールをできるだけ早く部屋へいかせるということだけだった。グレゴールはまず立ち上がって、おそらくその恰好でドアを通り抜けることができるのだろうが、そのためにグレゴールがしなければならない廻りくどい準備も、父親はけっして許そうとはしないだろう。おそらく、まるで障害などはないかのように、今は格別にさわぎ立ててグレゴールを追い立てているのだ。グレゴールのうしろで聞こえているのは、もうこの世でただ一人の父親の声のようには響かなかった。そして、ほんとうのところ、もう冗談ごとではなかった。そこでグレゴールは、どうとでもなれという気持になって、ドアに身体を押しこんだ。身体の片側がもち上がり、彼はドア口に斜めに取りついてしまった。一方のわき腹がすっかりすりむけ、白色のドアにいやらしいしみがのこった。やがて彼はすっかりはさまってしまい、ひとりではもう動くこともできなかった。身体の一方の側の脚はみな宙に浮かび上がってしまい、もう一方の側の脚は痛いほど床に押しつけられている。――そのとき、父親がうしろから今はほんとうに助かる強い一突きを彼の身体にくれた。そこで彼は、はげしく血を流しながら、部屋のなかの遠くのほうまですっ飛んでいった。そこでドアがステッキでばたんと閉じられ、やがて、ついにあたりは静かになった。", "2、", "夕ぐれの薄明りのなかでグレゴールはやっと重苦しい失心したような眠りから目ざめた。きっと、別に妨げがなくともそれほど遅く目ざめるというようなことはなかったろう。というのは、十分に休んだし、眠りたりた感じであった。しかし、すばやい足音と玄関の間に通じるドアを用心深く閉める物音とで目をさまされたように思えるのだった。電気の街燈の光が蒼白く天井と家具の上部とに映っていたが、下にいるグレゴールのまわりは暗かった。今やっとありがたみがわかった。触角でまだ不器用げに探りながら、身体をのろのろとドアのほうへずらしていって、そこで起ったことを見ようとした。身体の左側はただ一本の長い不愉快に引きつる傷口のように思えたが、両側に並んでいる小さな脚で本格的なびっこを引かなければならなかった。それに一本の脚は午前の事件のあいだに重傷を負っていた――ただ一本しか負傷していないことは、ほとんど奇蹟だった――。そして、その脚は死んでうしろへひきずられていた。", "ドアのところでやっと、なんでそこまでおびきよせられていったのか、わかった。それは何か食べものの匂いだった。というのは、そこには甘いミルクを容れた鉢（はち）があり、ミルクのなかには白パンの小さな一切れが浮かんでいた。彼はよろこびのあまりほとんど笑い出すところだった。朝よりも空腹はひどく、すぐ眼の上まで頭をミルクのなかに突っこんだ。だが、間もなく失望して頭を引っこめた。扱いにくい身体の左側のために食べることがむずかしいばかりでなく――そして、身体全体がふうふういいながら協力してやっと食べることができたのだ――、その上、ふだんは彼の好物の飲みものであり、きっと妹がそのために置いてくれたのだろうが、ミルクが全然うまくない。それどころか、ほとんど厭気をおぼえて鉢から身体をそむけ、部屋の中央へはってもどっていった。", "グレゴールがドアのすきまから見ると、居間にはガス燈がともっていた。ふだんはこの時刻には父親が午後に出た新聞を母親に、そしてときどきは妹にも声を張り上げて読んで聞かせるのをつねにしていたのだが、今はまったく物音が聞こえなかった。妹がいつも彼に語ったり、手紙に書いたりしていたこの朗読は、おそらく最近ではおよそすたれてしまっていたようだった。だが、たしかに家は空ではないはずなのに、あたりもすっかり静まり返っていた。「家族はなんと静かな生活を送っているんだろう」と、グレゴールは自分に言い聞かせ、暗闇のなかをじっと見つめながら、自分が両親と妹とにこんなりっぱな住居でこんな生活をさせることができることに大きな誇りをおぼえた。だが、もし今、あらゆる安静や幸福や満足が恐怖で終りを告げることになったらどうだろうか。こんな考えに迷いこんでしまわないように、グレゴールはむしろ動き出し、部屋のなかをあちこちはい廻った。", "長い夜のあいだに、一度は一方の側のドアが、一度はもう一方のが、ちょっとだけ開き、すぐにまた閉められた。だれかがきっと部屋のなかへ入る用事があったにちがいないのだが、それにしろためらいもあまりに大きかったのだ。そこでグレゴールは居間へ通じるドアのすぐそばにとまっていて、ためらっている訪問者を部屋のなかへ入れるか、あるいは少なくともその訪問者がだれかを知ろうと決心していた。ところが、ドアはもう二度と開かれず、グレゴールが待っていたこともむなしかった。ドアがみな閉ざされていた朝には、みんなが彼の部屋へ入ろうとしたのだったが、彼が一つのドアを開け、ほかのドアも昼のあいだに開けられたようなのに、今となってはだれもやってはこず、鍵も外側からさしこまれていた。", "夜遅くなってからやっと、居間の明りが消された。それで、両親と妹とがそんなに長いあいだ起きていたことが、たやすくわかった。というのは、はっきり聞き取ることができたのだが、そのとき三人全部が爪先で歩いて遠ざかっていったのだった。それでは朝までもうだれもグレゴールの部屋へは入ってこないというわけだ。だから、自分の生活をここでどういうふうに設計すべきか、じゃまされずにとっくり考える時間がたっぷりとあるわけだ。だが、彼が今べったり床にへばりつくようにしいられている天井の高いひろびろとした部屋は、なぜか理由を見出すことはできなかったけれども、彼の心を不安にした。なにしろ五年来彼が住んでいた部屋なので、どうしてそんな気になるのかわからなかった。――そして、半ば無意識に身体の向きを変え、ちょっと恥かしい気持がないわけではなかったが、急いでソファの下にもぐりこんだ。そこでは、背中が少し抑えつけられるし、頭をもうもたげることができないにもかかわらず、すぐひどく居心地がよいように思われた。ただ、身体の幅が広すぎて、ソファの下にすっぽり入ることができないのが残念だった。", "そこに彼は一晩じゅういた。その夜は、あるいは空腹のためにたえず目をさまさせられながらもうとうとしたり、あるいは心配やはっきりしない希望に思いふけったりしなから、過ごしたのだった。そんな心配や希望を思っても結論は同じで、さしあたりは平静な態度を守り、忍耐と細心な遠慮とによって家族の者たちにさまざまな不快を耐えられるようにしてやらねばならぬという結論だった。そうした不快なことを彼の現在の状態においてはいつかは家族の者たちに与えないわけにはいかないのだ。", "つぎの朝早く、まだほとんど夜のうちだったが、グレゴールは早くも固めたばかりの決心をためしてみる機会をもった。というのは、玄関の間のほうからほとんど完全に身づくろいした妹がドアを開け、緊張した様子でなかをのぞいたのだった。妹はすぐには彼の姿を見つけなかったが、彼がソファの下にいるのをみとめると――どこかにいるにきまっているではないか。飛んで逃げることなんかできなかったのだ――ひどく驚いたので、度を失ってしまって外側からふたたびドアをぴしゃりと閉めてしまった。だが、自分の態度を後悔してでもいるかのように、すぐまたドアを開け、重病人か見知らぬ人間かのところにいるような恰好で爪先で歩いて部屋のなかへ入ってきた。グレゴールは頭をソファのへりのすぐ近くまでのばして、妹をながめた。ミルクをほったらかしにしたのに気づくだろうか。しかもけっして食欲がないからではなかったのだ。また、彼の口にもっと合うような別な食べものをもってくるのだろうか。妹が自分でそうしてくれないだろうか。妹にそのことを注意するくらいなら、飢え死したほうがましだ。それにもかかわらず、ほんとうはソファの下から跳び出して、妹の足もとに身を投げ、何かうまいものをくれといいたくてたまらないのだった。ところが、妹はまだいっぱい入っているミルクの鉢にすぐ気づいて、不思議そうな顔をした。鉢からは少しばかりのミルクがまわりにこぼれているだけだった。妹はすぐ鉢を取り上げたが、それも素手ではなくて、ぼろ切れでやるのだった。そして、鉢をもって出ていった。グレゴールは、妹がかわりに何をもってくるだろうかとひどく好奇心に駆られ、それについてじつにさまざまなことを考えてみた。しかし、妹が親切心から実際にもってきたものを、考えただけではあてることはできなかったにちがいない。彼の嗜好（しこう）をためすため、いろいろなものを選んできて、それを全部、古い新聞紙の上に拡げたのだった。半分腐った古い野菜、固まってしまった白ソースにくるまった夕食の食べ残りの骨、一粒二粒の乾ぶどうとアーモンド、グレゴールが二日前にまずくて食えないといったチーズ、何もぬってはないパン、バターをぬったパン、バターをぬり、塩味をつけたパン。なおそのほかに、おそらく永久にグレゴール専用ときめたらしい鉢を置いた。それには水がつがれてあった。そして、グレゴールが自分の前では食べないだろうということを妹は知っているので、思いやりから急いで部屋を出ていき、さらに鍵さえかけてしまった。それというのも、好きなように気楽にして食べてもいいのだ、とグレゴールにわからせるためなのだ。そこで食事に取りかかると、グレゴールのたくさんの小さな脚はがさがさいった。どうも傷はみなすでに完全に癒ったにちがいなかった。もう支障は感じなかった。彼はそのことに驚き、一月以上も前にナイフでほんの少しばかり指を切ったが、その傷がおとといもまだかなり痛んだ、ということを考えた。「今では敏感さが減ったのかな」と、彼は思い、早くもチーズをがつがつ食べ始めた。ほかのどの食べものよりも、このチーズが、たちまち、彼を強くひきつけたのだった。つぎつぎと勢いきって、また満足のあまり眼に涙を浮かべながら、彼はチーズ、野菜、ソースと食べていった。ところが新鮮な食べものはうまくなかった。その匂いがまったく我慢できず、そのために食べようと思う品を少しばかりわきへ引きずっていったほどだった。もうとっくにすべてを平らげてしまい、その場でのうのうと横になっていたとき、妹は彼に引き下がるようにと合図するため、ゆっくりと鍵を廻した。彼はもうほとんどうとうとしていたのにもかかわらず、その音でたちまち驚かされてしまった。彼はまたソファの下へ急いでもぐった。だが、妹が部屋にいるほんの短い時間であっても、ソファの下にとどまっているのには、ひどい自制が必要だった。というのは、たっぷり食事をしたため、身体が少しふくらんで、ソファの下の狭い場所ではほとんど呼吸することができなかった。何度か微かに息がつまりそうになりながら、いくらか涙が出てくる眼で彼はながめたのだが、何も気づいていない妹は箒（ほうき）で残りものを掃き集めるばかりでなく、グレゴールが全然手をつけなかった食べものまで、まるでもう使えないのだというように掃き集めた。そして、そうしたものを全部、バケツのなかへ捨て、木の蓋をして、それからいっさいのものを部屋の外へ運び出していった。妹が向きを変えるか変えないかのうちに、グレゴールは早くもソファの下からはい出て、身体をのばし、息を入れた。", "こういうふうにして毎日グレゴールは食事を与えられた。一回は朝、両親と女中とがまだ眠っているときで、二回目はみんなの昼食が終ったあとだ。というのは、食事後、両親はしばらく昼寝をし、女中は妹から何か用事を言いつけられて使いに出される。たしかにみんなはグレゴールを飢え死させようとはしなかったが、おそらく彼の食事についてはただ妹の口から伝え聞くという以上の我慢はできなかったのだろう。またきっと妹も、なにしろほんとうに両親は十分苦しんでいるのだから、おそらくほんのわずかな悲しみだけであってもはぶいてやろうとしているのだろう。", "あの最初の朝、どんな口実によって医者と鍵屋とを家から追い返したのか、グレゴールは全然知ることができなかった。というのは、彼のいうことは相手には聞き取れないので、だれ一人として、そして妹までも、彼のほうでは他人のいうことがわかる、とは思わなかったのだ。そこで、妹が自分の部屋にいるときにも、ただときどき妹が溜息をもらしたり、聖人たちの名前を唱えるのを聞くだけで満足しなければならなかった。のちになって妹が少しはすべてのことに慣れるようになったときにはじめて、――完全に慣れるというようなことはむろんけっして問題とはならなかった――グレゴールは親しさをこめた言葉とか、あるいはそう解釈される言葉とかをときどき小耳にはさむことができた。グレゴールが食事をさかんに片づけたときには、「ああ、きょうはおいしかったのね」と、妹は言い、しだいに数しげくくり返されるようになったそれと反対に手をつけていない場合には、ほとんど悲しげにこういうのがつねだった。", "「またみんな手をつけないであるわ」", "ところで、グレゴールは直接にはニュースを聞くことができなかったけれども、隣室の話し声をいろいろ聞き取るのだった。人声が聞こえると、彼はすぐそれに近いドアのところへ急いでいき、身体全体をドアに圧しつける。ことにはじめのうちは、たといただこそこそ話にしろ、何か彼についてのことでないような話はなかった。二日のあいだ、三度三度の食事に、どうしたらいいのだろう、という相談をやっているのが聞かれた。ところで、食事と食事とのあいだの時間にも、同じ話題が語られるのだった。というのは、だれ一人としてひとりだけ留守をしようとしなかったし、またどんなことがあっても住居をすっかり空にすることはできなかったので、いつでも家には少なくとも家族のうちの二人が残っているのだ。女中も最初の日に――女中がこのできごとについて何を知っているのか、またどのくらい知っているのかは、あまり明らかではなかったが――すぐにひまをくれるようにと膝をついて母親に頼み、その十五分後に家を出ていくときには、涙ながらにひまを出してもらったことの礼をいった。まるでこの家で示してもらった最大の恩恵だとでもいうような調子だった。そして、だれも彼女に求めたわけでもないのに、ほんの少しでも人にはもらしませんから、などとひどく本気で誓うのだった。", "女中がひまを取ったので、今では妹が母親といっしょに料理もしなければならなかった。とはいっても、それはたいして骨が折れなかった。なにしろほとんど何も食べなかったのだ。グレゴールはくり返し聞いたのだが、だれかがほかの者に向って食べるようにとうながしてもむだで、出てくる返事といえばただ「いや、たくさん」とかいうような言葉だけにきまっていた。酒類もおそらく全然飲まないようだった。しょっちゅう妹は父親に、ビールを飲みたくないかとたずね、自分で取りにいくから、と心から申し出るのだが、それでも父親が黙っていると、父が世間態をはばかって心配している気持を取り除こうとして、門番のおかみさんにビールを取りにいってもらってもいいのだ、というのだった。ところが父親は最後に大きな声で「いらない」と、いう。そして、それでもう二度とビールのことは話されなかった。", "最初の日のうちに、父親は早くも母親と妹とに向って財産状態とこれからの見通しとについてすっかり話して聞かせた。ときどきテーブルから立ち上がって、五年前に自分の店が破産したときに救い出した小さな金庫から何か書きつけや帳簿をもってくるのだった。手のこんだ鍵を開け、つぎに探しているものを取り出したあとで鍵を閉める音が聞こえてきた。父親のそのときの説明は、一面では、グレゴールが監禁生活をするようになって以来はじめてうれしく思ったことだった。グレゴールはそれまで、あの店から父親の手に残されたものは全然ないのだ、と考えていた。少なくとも父親はグレゴールに対してその反対のことは全然いわなかった。もっともグレゴールもそのことについて父親にたずねたことはなかったのではあった。グレゴールがそのころ気を使っていたことは、家族全員を完全な絶望へ追いこんだ商売上の不幸をできるだけ早く家族の者たちに忘れさせるために全力をつくすということだった。そこであの当時彼は特別に熱心に働き始め、はとんど一夜にしてつまらぬ店員から旅廻りのセールスマンとなった。セールスマンにはむろん金もうけのチャンスがいろいろあり、仕事の成果はすぐさま歩合の形で現金に変わり、それを家にもち帰って、驚きよろこぶ家族の眼の前のテーブルの上にならべて見せることができた。あれはすばらしい時期だった。グレゴールはあとになってからも、家族全体の経費をまかなうことができ、また、事実まかなっただけの金をもうけはしたが、あのはじめのころのすばらしい時期は、少なくとも、あのころの輝かしさで二度くり返されることはなかった。家人もグレゴールもそのことに慣れ、家人は感謝して金を受け取り、彼もよろこんで金を出すのだったが、特別な気持の温かさというものはもう起こらなかった。ただ妹だけはグレゴールに対してまだ近い関係をもちつづけていた。グレゴールとはちがって音楽が大好きで、感動的なほどにヴァイオリンを弾くことができる妹を、来年になったら音楽学校へ入れてやろう、というのが彼のひそかな計画だった。そうなるとひどく金がかかるが、そんなことは考慮しないし、またその金もなんとかしてつくることができるだろう。グレゴールが町に帰ってきてちょっと滞在するあいだには、しょっちゅう妹との会話に音楽学校の話が出てくるのだったが、いつでもただ美しい夢物語にすぎず、その実現は考えられなかった。そして、両親もけっしてこんな無邪気な話を聞くのをよろこびはしなかった。だが、グレゴールはきわめてはっきりとそのことを考えていたのであり、クリスマスの前夜にはそのことをおごそかに宣言するつもりだった。", "ドアにへばりついて身体をまっすぐに起こし、聞き耳を立てているあいだにも、今の自分の状態にはまったく無益なこうした考えが、彼の頭を通り過ぎるのだった。ときどき、全身の疲れのためにもう全然聞いていることができなくなり、うっかりして頭をドアにぶつけ、すぐにまたきちんと立てるのだった。というのは、そんなふうにして彼が立てるどんな小さな物音でも、隣室に聞こえ、みんなの口をつぐませてしまうのだ。「また何をやっているんだろう」などと、しばらくして父親がいう。どうもドアのほうに向きなおっているらしい。それからやっと、中断された会話がふたたびだんだんと始められていく。", "グレゴールは十分に聞き取ったのだが――というのは、父親は説明をする場合に何度もくり返すのがつねだった。その理由は一つには彼自身がすでに長いあいだこうしたことに気を使わなくなっていたからであり、もう一つには母親が一回聞いただけでは万事をすぐのみこめなかったからだ――、すべての不幸にもかかわらず、なるほどまったくわずかばかりのものではあるけれども昔の財産がまだ残っていて、手をつけないでおいた利子もそのあいだに少しばかり増えた、ということであった。その上、グレゴールが毎月家に入れていた金も――彼は自分ではほんの一グルデンか二グルデンしか取らなかった――すっかり費われてしまったわけではなく、貯えられてちょっとした金額になっていた。グレゴールはドアの背後で熱心にうなずき、この思いがけなかった用心と倹約とをよろこんだ。ほんとうはこの余分な金で社長に対する父親の負債をもっと減らすことができ、この地位から離れることができる日もずっと近くなったことだろうが、今では父親の計らいは疑いもなくいっそうよかったわけだ。", "ところで、こんな金では家族の者が利息で生活していけるなどというのにはまったくたりない。おそらく家族を一年か、せいぜいのところ二年ぐらい支えていくのに十分なだけだろう。それ以上のものではなかった。つまり、ほんとうは手をつけてはならない、そしてまさかのときの用意に取っておかなければならない程度の金額にすぎなかった。生活費はかせがなければならない。ところで、父親は健康だがなにしろ老人で、もう五年間も全然仕事をせず、いずれにしてもあまり働けるという自信はない。骨は折れたが成果のあがらなかった生涯の最初の休暇であったこの五年のあいだに、すっかりふとってしまって、そのために身体も自由に動かなくなっていた。そこで母親が働かなければならないのだろうが、これが喘息（ぜんそく）もちで、家のなかを歩くのにさえ骨が折れる始末であって、一日おきに呼吸困難に陥り、開いた窓の前のソファの上で過ごさなければならない。すると妹がかせがなければならないというわけだが、これはまだ十七歳の子供であり、これまでの生活ではひどく恵まれて育ってきたのだった。きれいな服を着て、たっぷりと眠り、家事の手伝いをし、ささやかな気ばらしにときどき加わり、何よりもヴァイオリンを弾く、という生活のしかただった。どうしてこんな妹がかせぐことができるだろうか。家族の話が金をかせがなければならないというこのことになると、はじめのうちはグレゴールはいつもドアを離れて、ドアのそばにある冷たい革のソファに身を投げるのだった。というのは、恥辱と悲しみのあまり身体がかっと熱くなるのだった。", "しばしば彼はそのソファの上で長い夜をあかし、一瞬も眠らず、ただ何時間でも革をむしっているのだった。あるいは、大変な労苦もいとわず、椅子を一つ窓ぎわへ押していき、それから窓の手すりにはい上がって、椅子で身体を支えたまま窓によりかかっていた。以前窓からながめているときに感じた解放されるような気持でも思い出しているらしかった。というのは、実際、少し離れた事物も一日一日とだんだんぼんやり見えるようになっていっていた。以前はしょっちゅう見えていまいましくてたまらなかった向う側の病院も、もう全然見えなくなっていた。静かな、しかしまったく都会的であるシャルロッテ街に自分が住んでいるのだということをよく知っていなかったならば、彼の窓から見えるのは、灰色の空と灰色の大地とが見わけられないくらいにつながっている荒野なのだ、と思いかねない有様だった。注意深い妹は二度だけ椅子が窓ぎわにあるのに気づいたにちがいなかったが、それからは部屋の掃除をしたあとでいつでも椅子をきちんと窓べに押してやり、おまけにそのときからは内側の窓も開け放しておいた。", "もしグレゴールが妹と話すことができ、彼女が自分のためにしなければならないこうしたすべてのことに対して礼をいうことができるのであったら、彼女の奉仕をもっと気軽に受けることができただろう。ところが、彼はそれが苦しくてたまらなかった。妹はむろん、いっさいのことのつらい思いをぬぐい去ろうと努めていたし、時がたつにつれてむろんだんだんそれがうまくいくようになったのだが、グレゴールも時間がたつとともにいっさいをはじめのころよりもずっと正確に見て取るようになった。妹が部屋へ足を踏み入れるだけで、彼には恐ろしくてならなかった。ふだんはグレゴールの部屋をだれにも見せまいと気をくばっているのだが、部屋に入ってくるやいなや、ドアを閉める手間さえかけようとせず、まっすぐに窓へと走りよって、まるで息がつまりそうだといわんばかりの恰好であわただしく両手で窓を開き、まだいくら寒くてもしばらく窓ぎわに立ったままでいて、深呼吸する。こうやって走ってさわがしい音を立てることで、グレゴールを日に二度びっくりさせるのだ。そのあいだじゅう、彼はソファの下でふるえていた。だが彼にはよくわかるのだが、もしグレゴールがいる部屋で窓を閉め切っていることができるものならば、きっとこんなことはやりたくはないのだ。", "あるとき、グレゴールの変身が起ってから早くも一月がたっていたし、妹ももうグレゴールの姿を見てびっくりしてしまうかくべつの理由などはなくなっていたのだが、妹はいつもよりも少し早くやってきて、グレゴールが身動きもしないで、ほんとうにおどかすような恰好で身体を立てたまま、窓から外をながめている場面にぶつかった。妹が部屋に入ってこなかったとしても、グレゴールにとっては意外ではなかったろう。なにしろそういう姿勢を取っていることで、すぐに窓を開けるじゃまをしていたわけだからだ。ところが、妹はなかへ入ってこないばかりか、うしろへ飛びのいて、ドアを閉めてしまった。見知らぬ者ならば、グレゴールが妹のくるのを待ちうかがっていて、妹にかみつこうとしているのだ、と思ったことだろう。グレゴールはむろんすぐソファの下に身を隠したが、妹がまたやってくるまでには正午まで待たねばならなかった。そのことから、自分の姿を見ることは妹にはまだ我慢がならないのだし、これからも妹にはずっと我慢できないにちがいない、ソファの下から出ているほんのわずかな身体の部分を見ただけでも逃げ出したいくらいで、逃げ出していかないのはよほど自分を抑えているにちがいないのだ、と彼ははっきり知った。妹に自分の姿を見せないために、彼はある日、背中に麻布をのせてソファの上まで運んでいった。――この仕事には四時間もかかった――そして、自分の身体がすっかり隠れてしまうように、また妹がかがみこんでも見えないようにした。もしこの麻布は不必要だと妹が思うならば、妹はそれを取り払ってしまうこともできるだろう。というのは、身体をこんなふうにすっかり閉じこめてしまうことは、グレゴールにとってなぐさみごとなんかではないからだ。ところが、妹は麻布をそのままにしておいた。おまけにグレゴールが一度頭で麻布を用心深く少しばかり上げて、妹がこの新しいしかけをどう思っているのか見ようとしたとき、妹の眼に感謝の色さえ見て取ったように思ったのだった。", "最初の二週間には、両親はどうしても彼の部屋に入ってくることができなかった。これまで両親は妹を役立たずの娘と思っていたのでしばしば腹を立てていたが、今の妹の仕事ぶりを完全にみとめていることを、グレゴールはしばしば聞いた。ところが両親はしばしば、妹がグレゴールの部屋で掃除しているあいだ、二人で彼の部屋の前に待ちかまえていて、妹が出てくるやいなや、部屋のなかがどんな様子であるか、グレゴールが何を食べたか、そのとき彼がどんな態度を取ったか、きっとちょっと快方へ向いているのが見られたのでないか、などと語って聞かせなければならなかった。ところで母親のほうは比較的早くグレゴールを訪ねてみようと思ったのだったが、父親と妹とがまずいろいろ理にかなった理由を挙げて母親を押しとどめた。それらの理由をグレゴールはきわめて注意深く聞いていたが、いずれもまったく正しいと思った。ところが、あとになると母親を力ずくでとどめなければならなかった。そして、とめられた母親が「グレゴールのところへいかせて！　あの子はわたしのかわいそうな息子なんだから！　わたしがあの子のところへいかないではいられないということが、あんたたちにはわからないの？」と叫ぶときには、むろん毎日ではないがおそらく週に一度は母親が入ってきたほうがいいのではないか、とグレゴールは思った。なんといっても母親のほうが妹よりは万事をよく心得ているのだ。妹はいくらけなげとはいってもまだ子供で、結局は子供らしい軽率さからこんなにむずかしい任務を引き受けているのだ。", "母親に会いたいというグレゴールの願いは、まもなくかなえられた。昼のあいだは両親のことを考えて窓ぎわにはいくまい、とグレゴールは考えていたが、一、二メートル四方の床の上ではたいしてはい廻るわけにいかなかったし、床の上にじっとしていることは夜なかであっても我慢することがむずかしく、食べものもやがてもう少しも楽しみではなくなっていたので、気ばらしのために壁の上や天井を縦横十文字にはい廻る習慣を身につけていた。とくに上の天井にぶら下がっているのが好きだった。床の上にじっとしているのとはまったくちがう。息がいっそう自由につけるし、軽い振動が身体のなかを伝わっていく。そして、グレゴールが天井にぶら下がってほとんど幸福な放心状態にあるとき、脚を放して床の上へどすんと落ちて自分でも驚くことがあった。だが、今ではむろん以前とはちがって自分の身体を自由にすることができ、こんな大きな墜落のときでさえけがをすることはなかった。妹は、グレゴールが自分で考え出したこの新しいなぐさみにすぐ気づき――実際、彼ははい廻るときに身体から出る粘液（ねんえき）の跡をところどころに残すのだった、――グレゴールがはい廻るのを最大の規模で可能にさせてやろうということを考え、そのじゃまになる家具、ことに何よりもたんすと机とを取り払おうとした。ところが、その仕事はひとりではやれなかった。父親の助けを借りようとは思わなかったし、女中もきっとそれほど役には立たないだろう。というのは、この十六歳ばかりの少女は、前の料理女がひまを取ってからけなげに我慢していたが、台所の鍵はたえずかけておいて、ただ特別に呼ばれたときだけ開けるだけでよいということにしてくれ、と願い出て、許されていたのだった。そこで妹としては、父親がいないときを見計らって母親をつれていくよりほかに方法がなかった。興奮したよろこびの声を挙げて母親はやってきたが、グレゴールの部屋のドアの前で黙りこんでしまった。はじめはむろん妹が部屋のなかが万事ちゃんとしているかどうかを検分したが、つぎにやっと母親を入らせた。グレゴールは大急ぎで麻布をいっそう深く、またいつもよりしわをたくさんつくってひっかぶった。全体は実際にただ偶然ソファの上に投げられた麻布のように見えるだけだった。グレゴールは今度も、麻布の下でこっそり様子をうかがうことをやめなかった。今回すぐ母親を見ることは断念した。ただ、母親がやってきたことだけをよろこんだ。「いらっしゃいな、見えないわよ」と、妹がいった。母親の手を引っ張っているらしかった。二人のかよわい女が相当重い古たんすを置き場所から動かし、無理をするのでないかと恐れる母親のいましめの言葉を聞こうとしないで妹がたえず仕事の大部分を自分の身に引き受けている様子を、グレゴールは聞いていた。ひどく時間がかかった。十五分もかかった仕事のあとで、母親はたんすはやっぱりこの部屋に置いておくほうがいいのでないか、と言い出した。第一に、重すぎて、二人で父親の帰ってくるまでに片づけることはできないだろう。それで部屋のまんなかにたんすが残ることになったら、グレゴールの動き廻るのにじゃまになるだろう。第二に、家具を取り片づけたらグレゴールがどう思うことかわかったものではない。自分は今のままにしておくほうがいいように思う。何もない裸の壁をながめると、胸がしめつけられるような気がする。そして、どうしてグレゴールだってそんな気持がしないはずがあろうか。あの子はずっと部屋の家具に慣れ親しんできたのだから、がらんとした部屋では見捨てられてしまったような気がするだろう。「それに、こんなことをしたら」と、最後に母親は声を低めた。それまでも、ほとんどささやくようにものをいって、グレゴールがどこにいるのかはっきり知らないままに、声の響きさえもグレゴールに聞かれることを避けたいと思っているようであった。グレゴールが人の言葉を聞きわけることはできない、と母親は確信しているのだ。「それに、こんなことをしたら、まるで家具を片づけることによって、わたしたちがあの子のよくなることをまったくあきらめてしまい、あの子のことをかまわずにほったらかしにしているということを見せつけるようなものじゃないかい？　わたしたちが部屋をすっかり以前のままにしておくように努め、グレゴールがまたわたしたちのところへもどってきたときに、なんにも変っていないことを見て、それだけたやすくそれまでのことが忘れられるようにしておくことがいちばんいい、とわたしは思うよ」", "母親のこうした言葉を聞いて、直接の人間的な話しかけが自分に欠けていることが、家族のあいだの単調な生活と結びついて、この二カ月のあいだにすっかり自分の頭を混乱させてしまったにちがいない、とグレゴールは知った。というのは、自分の部屋がすっかり空っぽにされたほうがいいなどとまじめに思うようでは、そうとでも考えなければほかに説明のしようがなかった。彼はほんとうに、先祖伝来の家具をいかにも気持よく置いているこの暖かい部屋を洞窟（どうくつ）に変えるつもりなのだろうか。がらんどうになればむろんあらゆる方向に障害なくはい廻ることができるだろうが、しかし自分の人間的な過去を同時にたちまちすっかり忘れてしまうのではなかろうか。今はすでにすっかり忘れようとしているのではないだろうか。そして、長いあいだ聞かなかった母親の声だけがやっと彼の心を正気にもどしたのではあるまいか。何一つ取りのけてはならない。みんなもとのままに残されていなければならない。家具が自分の状態の上に及ぼすいい影響というものがなくてはならない。そして、たとい家具が意味もなくはい廻るじゃまになっても、それは損害ではなくて、大きな利益なのだ。", "ところが、妹の考えは残念なことにちがっていた。妹はグレゴールに関する件の話合いでは両親に対して特別事情に明るい人間としての態度を取ることに慣れていたし、それもまんざら不当とはいえなかった。そこで今の場合にも、母親の忠告は妹にとって、彼女がひとりではじめ動かそうと考えていたたんすと机とを片づけるだけではなく、どうしてもなくてはならないソファは例外として、家具全体を片づけようと固執する十分な理由であった。妹がこうした要求をもち出すようになったのは、むろんただ子供らしい反抗心と、最近思いがけなくも、そして苦労してやっと手に入れた自信とのためばかりではなかった。実際、妹はグレゴールがはい廻るのには広い場所が必要で、それに反して家具はだれも見て取ることができるようにほんの少しでも役に立つわけではない、ということを見て取っていたのだった。だが、おそらくは彼女の年ごろの少女らしい熱中もそれに加わったのだろう。そういう熱中しやすい心は、どんな機会にも満足を見出そうと努めているのであって、今はこのグレーテという少女を通じて、グレゴールの状態をもっと恐ろしいものにして、つぎに今まで以上にグレゴールのために働きたいという誘惑にかられているのだ。というのは、がらんとした四方の壁をグレゴールがまったくひとりで支配しているような部屋には、グレーテ以外のどんな人間でもけっしてあえて入ってこようとはしないだろう。", "そこで妹は母親の忠告によって自分の決心をひるがえさせられたりしてはいなかった。母親はこの部屋でももっぱら不安のためにおろおろしているように見えたが、まもなく黙ってしまい、たんすを運び出すことで力の限り妹を手伝っていた。ところで、たんすはやむをえないとあればグレゴールとしてもなしですませることができたが、机のほうはどうしても残さなければならない。二人の女がはあはあ言いながらたんすを押して部屋を出ていくやいなや、グレゴールはソファの下から頭を突き出し、どうやったら用心深く、できるだけおだやかにこの取り片づけに干渉できるかを見ようとした。だが、あいにく、はじめにもどってきたのは母親だった。グレーテのほうは隣室でたんすにしがみつき、それをひとりであちこちとゆすっていたが、むろんたんすの位置を動かすことはできなかった。だが、母親はグレゴールの姿を見ることに慣れていない。姿を見せたら、母親を病気にしてしまうかもしれない。そこでグレゴールは驚いてあとしざりしてソファの別なはしまで急いでいった。だが、麻布の前が少しばかり動くことを妨げることはもうできなかった。それだけで母親の注意をひくのには十分だった。母親はぴたりと足をとめ、一瞬じっと立っていたが、つぎにグレーテのところへもどっていった。", "実のところ何も異常なことが起っているわけではない、ただ一つ二つの家具が置き変えられるだけだ、とグレゴールは何度か自分に言い聞かせたにもかかわらず、彼はまもなくみとめないわけにはいかなくなったのだが、この女たちの出たり入ったり、彼女らの小さなかけ声、床の上で家具のきしむ音、それらはまるで四方から数を増していく大群集のように彼に働きかけ、頭と脚とをしっかとちぢめて身体を床にぴったりとつけていたけれども、おれはもうこうしたことのすべてを我慢できなくなるだろう、とどうしても自分に言い聞かせないではいられなくなった。女たちは彼の部屋を片づけているのだ。彼にとって親しかったいっさいのものを取り上げるのだ。糸のこ［＃「のこ」に傍点］やそのほかの道具類が入っているたんすは、二人の手でもう運び出されてしまった。今度は、床にしっかとめりこんでいる机をぐらぐら動かしている。彼は商科大学の学生として、中学校の生徒として、いやそればかりでなく小学校の生徒として、あの机の上で宿題をやったものだった。――もう実際、二人の女たちの善意の意図をためしているひまなんかないのだ。それに彼は二人がいることなどはほとんど忘れていた。というのは、二人は疲れてしまったためにもう無言で立ち働いていて、彼女たちのどたばたいう重い足音だけしか聞こえなかった。", "そこで彼ははい出ていき――女たちはちょうど隣室で少しばかり息を入れようとして机によりかかっているところだった――進む方向を四度変えたが、まず何を救うべきか、ほんとうにわからなかった。そのとき、ほかはすっかりがらんとしてしまった壁に、すぐ目立つように例の毛皮ずくめの貴婦人の写真がかかっているのを見た。そこで、急いではい上がっていき、額のガラスにぴたりと身体を押しつけた。ガラスはしっかりと彼の身体をささえ、彼の熱い腹に快感を与えた。少なくとも、グレゴールが今こうやってすっかり被い隠しているこの写真だけはきっとだれももち去りはすまい。彼は女たちがもどってくるのを見ようとして、居間のドアのほうへ頭を向けた。", "母と妹とはそれほど休息を取ってはいないで、早くももどってきた。グレーテは母親の身体に片腕を廻し、ほとんど抱き運ぶような恰好だった。", "「それじゃ、今度は何をもっていきましょう」と、グレーテはいって、あたりを見廻した。そのとき、彼女のまなざしと壁の上にいるグレゴールのまなざしとが交叉した。きっとただ母親がこの場にいるというだけの理由で度を失わないように気を取りなおしたのだろう。母親があたりを見廻さないように、妹は顔を母親のほうに曲げて、つぎのようにいった。とはいっても、ふるえながら、よく考えてもみないでいった言葉だった。", "「いらっしゃい、ちょっと居間にもどらない？」グレーテの意図はグレゴールには明らかであった。母親を安全なところへつれ出し、それから彼を壁から追い払おうというのだ。だが、そんなことをやってみるがいい！　彼は写真の上に坐りこんで、渡しはしない。それどころか、グレーテの顔めがけて飛びつこうという身構えだ。", "ところが、グレーテがそんなことをいったことが母親をますます不安にしてしまった。母親はわきへよって、花模様の壁紙の上に大きな褐色の一つの斑点をみとめた。そして、自分の見たものがグレゴールだとほんとうに意識するより前に、あらあらしい叫び声で「ああ、ああ！」というなり、まるでいっさいを放棄するかのように両腕を拡げてソファの上に倒れてしまい、身動きもしなくなった。", "「グレゴールったら！」と、妹は拳を振り上げ、はげしい眼つきで叫んだ。これは変身以来、妹が彼に向って直接いった最初の言葉だった。妹は母親を気絶から目ざめさせるための気つけ薬を何か取りに隣室へかけていった。グレゴールも手伝いたかった。――写真を救うにはまだ余裕があった――だが、彼はガラスにしっかとへばりついていて、身体を引き離すためには無理しなければならなかった。それから自分も隣室へ入っていった。まるで以前のように妹に何か忠告を与えてやれると、いわんばかりであった。だが、何もやれないでむなしく妹のうしろに立っていなければならなかった。いろいろ小壜をひっかき廻していた妹は、振り返ってみて、またびっくりした。壜が床の上に落ちて、くだけた。一つの破片がグレゴールの顔を傷つけた。何か腐蝕性の薬品が彼の身体のまわりに流れた。グレーテは長いことそこにとどまってはいないで、手にもてるだけ多くの小壜をもって、母親のところへかけていった。ドアは足でぴしゃりと閉めた。グレゴールは今は母親から遮断（しゃだん）されてしまった。その母親は彼の罪によっておそらくほとんど死にそうになっているのだ。ドアを開けてはならなかった。自分が入っていくことによって、母親のそばにいなければならない妹を追い立てたくはなかった。今は待っているよりほかになんの手だてもなかった。そして、自責と心配とに駆り立てられて、はい廻り始め、すべてのものの上をはっていった。壁の上も家具や天井の上もはって歩き、とうとう絶望のうちに、彼のまわりの部屋全体がぐるぐる廻り始めたときに、大きなテーブルの上にどたりと落ちた。", "ちょっとばかり時が流れた。グレゴールは疲れ果ててそこに横たわっていた。あたりは静まり返っている。きっといいしるしなのだろう。そのとき、玄関のベルが鳴った。女中はむろん台所に閉じこめられているので、グレーテが開けなければならなかった。父親が帰ってきたのだった。「何が起ったんだ？」というのが彼の最初の言葉だった。グレーテの様子がきっとすべてを物語っているにちがいなかった。グレーテは息苦しそうな声で答えていたが、きっと顔を父親の胸にあてているらしい。", "「お母さんが気絶したの。でももうよくなったわ。グレゴールがはい出したの」", "「そうなるだろうと思っていた」と、父親がいった。「わしはいつもお前たちにいったのに、お前たち女はいうことを聞こうとしないからだ」", "父親がグレーテのあまりに手短かな報告を悪く解釈して、グレゴールが何か手荒なことをやったものと受け取ったことは、グレゴールには明らかであった。そのために、グレゴールは今度は父親をなだめようとしなければならなかった。というのは、彼には父親に説明して聞かせるひまもなければ、またそんなことができるはずもないのだ。そこで自分の部屋のドアのところへのがれていき、それにぴったりへばりついた。これで、父親は玄関の間からこちらへ入ってくるときに、グレゴールは自分の部屋へすぐもどろうというきわめて善良な意図をもっているということ、だから彼を追いもどす必要はなく、ただドアを開けてやりさえすればすぐに消えていなくなるだろうということを、ただちに見て取ることができるはずだ。", "しかし、父親はこうした微妙なことに気づくような気分にはなっていなかった。入ってくるなり、まるで怒ってもいればよろこんでもいるというような調子で「ああ！」と叫んだ。グレゴールは頭をドアから引っこめて、父親のほうに頭をもたげた。父親が今突っ立っているような姿をこれまでに想像してみたことはほんとうになかった。とはいっても、最近では彼は新しいやりかたのはい廻る動作にばかり気を取られて、以前のように家のなかのほかのできごとに気を使うことをおこたっていたのであり、ほんとうは前とはちがってしまった家の事情にぶつかっても驚かないだけの覚悟ができていなければならないところだった。それはそうとしても、これがまだ彼の父親なのだろうか。以前グレゴールが商売の旅に出かけていくとき、疲れたようにベッドに埋まって寝ていた父、彼が帰ってきた晩には寝巻のままの姿で安楽椅子にもたれて彼を迎えた父、起き上がることはまったくできずに、よろこびを示すのにただ両腕を上げるだけだった父、年に一、二度の日曜日や大きな祭日にまれにいっしょに散歩に出かけるときには、もともとゆっくりと歩く母親とグレゴールとのあいだに立って、この二人よりももっとのろのろと歩き、古い外套にくるまり、いつでも用心深く身体に当てた撞木杖（しゅもくづえ）をたよりに難儀しながら歩いていき、何かいおうとするときには、ほとんどいつでも立ちどまって、つれの者たちを自分の身のまわりに集めた父、あの老いこんだ父親とこの眼の前の人物とは同じ人間なのだろうか。以前とちがって、今ではきちんと身体を起こして立っている。銀行の小使たちが着るような、金ボタンのついたぴったり身体に合った紺色の制服を着ている。上衣の高くてぴんと張った襟の上には、力強い二重顎が拡がっている。毛深い眉（まゆ）の下では黒い両眼の視線が元気そうに注意深く射し出ている。ふだんはぼさぼさだった白髪はひどくきちんとてかてかな髪形になでつけている。この父親はおそらく銀行のものだと思われる金モールの文字をつけた制帽を部屋いっぱいに弧を描かせてソファの上に投げ、長い制服の上衣のすそをはねのけ、両手をズボンのポケットに突っこんで、にがにがしい顔でグレゴールのほうへ歩んできた。何をしようというのか、きっと自分でもわからないのだ。ともかく、両足をふだんとはちがうくらい高く上げた。グレゴールは彼の靴のかかとがひどく大きいことにびっくりしてしまった。だが、びっくりしたままではいられなかった。父親が自分に対してはただ最大のきびしさこそふさわしいのだと見なしているということを、彼は新しい生活が始った最初の日からよく知っていた。そこで父親から逃げ出して、父親が立ちどまると自分もとまり、父親が動くとまた急いで前へ逃がれていった。こうして二人は何度か部屋をぐるぐる廻ったが、何も決定的なことは起こらないし、その上、そうした動作の全体がゆっくりしたテンポで行われるので追跡しているような様子は少しもなかった。そこでグレゴールも今のところは床の上にいた。とくに彼は、壁や天井へ逃げたら父親がかくべつの悪意を受け取るだろう、と恐れたのだった。とはいえ、こうやって走り廻ることも長くはつづかないだろう、と自分にいって聞かせないではいられなかった。というのは、父親が一歩で進むところを、彼は数限りない動作で進んでいかなければならないのだ。息切れが早くもはっきりと表われ始めた。以前にもそれほど信頼の置ける肺をもっていたわけではなかった。こうして全力をふるって走ろうとしてよろよろはい廻って、両眼もほとんど開けていなかった。愚かにも走る以外に逃げられる方法は全然考えなかった。四方の壁が自分には自由に歩けるのだということも、もうほとんど忘れてしまっていた。とはいっても、壁はぎざぎざやとがったところがたくさんある念入りに彫刻された家具でさえぎられていた。――そのとき、彼のすぐそばに、何かがやんわりと投げられて落ちてきて、ごろごろところがった。それはリンゴだった。すぐ第二のが彼のほうに飛んできた。グレゴールは驚きのあまり立ちどまってしまった。これ以上走ることは無益だった。というのは、父親は彼を爆撃する決心をしたのだった。食器台の上の果物皿からリンゴを取ってポケットにいっぱいつめ、今のところはそうきちんと狙（ねら）いをつけずにリンゴをつぎつぎに投げてくる。これらの小さな赤いリンゴは、まるで電気にかけられたように床の上をころげ廻り、ぶつかり合った。やわらかに投げられた一つのリンゴがグレゴールの背中をかすめたが、別に彼の身体を傷つけもしないで滑り落ちた。ところが、すぐそのあとから飛んできたのがまさにグレゴールの背中にめりこんだ。突然の信じられない痛みは場所を変えることで消えるだろうとでもいうように、グレゴールは身体を前へひきずっていこうとしたが、まるで釘づけにされたように感じられ、五感が完全に混乱してのびてしまった。だんだんかすんでいく最後の視線で、自分の部屋が開き、叫んでいる妹の前に母親が走り出てきた。下着姿だった。妹が、気絶している母親に呼吸を楽にしてやろうとして、服を脱がせたのだった。母親は父親をめがけて走りよった。その途中、とめ金をはずしたスカートなどがつぎつぎに床にすべり落ちた。そのスカートなどにつまずきながら父親のところへかけよって、父親に抱きつき、父親とぴったり一つになって――そこでグレゴールの視力はもう失われてしまった――両手を父の後頭部に置き、グレゴールの命を助けてくれるようにと頼むのだった。", "3、", "グレゴールが一月以上も苦しんだこの重傷は――例のリンゴは、だれもそれをあえて取り除こうとしなかったので、眼に見える記念として肉のなかに残されたままになった――父親にさえ、グレゴールはその現在の悲しむべき、またいとわしい姿にもかかわらず、家族の一員であって、そんな彼を敵のように扱うべきではなく彼に対しては嫌悪をじっとのみこんで我慢すること、ただ我慢することだけが家族の義務の命じるところなのだ、ということを思い起こさせたらしかった。", "ところで、たとい今グレゴールがその傷のために身体を動かすことがおそらく永久にできなくなってしまって、今のところは部屋のなかを横切ってはい歩くためにまるで年老いた傷病兵のようにとても長い時間がかかるといっても――高いところをはい廻るなどということはとても考えることができなかった――、自分の状態がこんなふうに悪化したかわりに、彼の考えによればつぎの点で十分につぐなわれるのだ。つまり、彼がつい一、二時間前にはいつでもじっと見守っていた居間のドアが開けられ、そのために彼は自分の部屋の暗がりのなかに横たわったまま、居間のほうからは姿が見えず、自分のほうからは明りをつけたテーブルのまわりに集っている家族全員を見たり、またいわば公認されて彼らの話を以前とはまったくちがったふうに聞いたりしてもよいということになったのだった。", "むろん、聞こえてくるのはもはや以前のようなにぎやかな会話ではなかった。グレゴールは以前は小さなホテルの部屋で、疲れきってしめっぽい寝具のなかに身体を投げなければならないときには、いつもいくらかの渇望をもってそうした会話のことを考えたものだった。ところが今では、たいていはひどく静かに行われるだけだ。父親は夕食のあとすぐに彼の安楽椅子のなかで眠りこんでしまう。母親と妹とはたがいにいましめ合って静かにしている。母親は明りの下にずっと身体をのり出して流行品を扱う洋品店のためのしゃれた下着類をぬっている。売場女店員の地位を得た妹は、晩には速記とフランス語との勉強をしている。おそらくあとになったらもっといい地位にありつくためなのだろう。ときどき父親が目をさます。そして、自分が眠っていたことを知らないかのように、「今晩もずいぶん長いこと裁縫をしているね！」といって、たちまちまた眠りこむ。すると、母親と妹とはたがいに疲れた微笑を交わす。", "父親は一種の強情さで、家でも自分の小使の制服を脱ぐことを拒んでいた。そして、寝巻は役に立たずに衣裳かぎにぶら下がっているが、父親はまるでいつでも勤務の用意ができているかのように、また家でも上役の声を待ちかまえているかのように、すっかり制服を着たままで自分の席でうたた寝している。そのため、はじめから新しくはなかったこの制服は、母親と妹とがいくら手入れをしても清潔さを失ってしまった。グレゴールはしばしば一晩じゅう、いつも磨かれている金ボタンで光ってはいるが、いたるところにしみがあるこの制服をながめていた。そんな服を着たまま、この老人はひどく窮屈に、しかし安らかに眠っているのだった。", "時計が十時を打つやいなや、母親は低い声で父親を起こし、それからベッドにいくように説得しようと努める。というのは、ここでやるのはほんとうの眠りではなく、六時に勤めにいかなければならない父親にはほんとうの眠りがぜひとも必要なのだ。しかし、小使になってから彼に取りついてしまった強情さで、いつでももっと長くテーブルのそばにいるのだと言い張るのだが、そのくせきまって眠りこんでしまう。その上、大骨を折ってやっと父親に椅子とベッドとを交換させることができるのだった。すると母親と妹とがいくら短ないましめの言葉でせっついても、十五分ぐらいはゆっくりと頭を振り、眼をつぶったままで、立ち上がろうとしない。母親は父親の袖（そで）を引っ張り、なだめるような言葉を彼の耳にささやき、妹は勉強を捨てて母を助けようとするのだが、それも父親にはききめがない。彼はいよいよ深く椅子に沈みこんでいく。女たちが彼のわきの下に手を入れるとやっと、眼を開け、母親と妹とをこもごもながめて、いつでもいうのだ。", "「これが一生さ。これがおれの晩年の安らぎさ」", "そして、二人の女に支えられて、まるで自分の身体が自分自身にとって最大の重荷でもあるかのようにものものしい様子で立ち上がり、女たちにドアのところまでつれていってもらい、そこでもういいという合図をし、それからやっと今度は自分で歩いていく。一方、母親は針仕事の道具を、妹はペンを大急ぎで投げ出し、父親のあとを追っていき、さらに父親の世話をするのだ。", "この働きすぎて疲れきった家庭で、だれがどうしても必要やむをえないこと以上にグレゴールなんかに気を使うひまをもっているだろうか。家政はいよいよ切りつめられていった。女中ももうひまを出されていた。頭のまわりにぼさぼさの白髪をなびかせている骨ばった大女が、朝と晩とにやってきて、いちばんむずかしい仕事をやるようになった。ほかのことはすべて、母親がたくさんの針仕事のかたわら片づけていた。その上、以前には母親と妹とが遊びごとや祝いがあると有頂天になって身につけていたさまざまな家宝の装飾品も、晩にみんなが集って売値の相談をしているのをグレゴールが聞いたところによると、売られてしまった。だが、最大の嘆きはいつでも、現在の事情にとっては広すぎるこの住居を立ち退くことができないということであった。なぜなら、グレゴールをどうやって引っ越させたものか、考えつくことができないからだった。しかしグレゴールは、引越しを妨げているものはただ自分に対する顧慮だけではないのだ、ということをよく見抜いていた。というのは、彼のことなら、一つ二つ空気孔（あな）のついた適当な箱に入れてたやすく運ぶことができるはずだった。この家族の移転を主として妨げているのは、むしろ完全な絶望感であり、親威（しんせき）や知人の仲間のだれ一人として経験しなかったほどに自分たちが不幸に打ちのめされているという思いであった。世間が貧しい人びとから要求しているものを、家族の者たちは極限までやりつくした。父親はつまらぬ銀行員たちに朝食をもっていってやるし、母親は見知らぬ人たちの下着のために身を犠牲にしているし、妹はお客たちの命令のままに売台のうしろであちこちかけ廻っている。しかし、家族の力はもう限度まできているのだ。そして、母親と妹とが、父親をベッドへつれていったあとでもどってきて、仕事の手を休めてたがいに身体をよせ合い、頬と頬とがふれんばかりに坐っているとき、また、今度は母親がグレゴールの部屋を指さして「グレーテ、ドアを閉めてちょうだい」というとき、そして二人の女が隣室でよせた頬の涙をまぜ合ったり、あるいはもう涙も出ないでテーブルをじっと見つめているあいだ、グレゴールのほうは、ふたたび暗闇のなかにいて、その背中の傷は今はじめて受けたもののように痛み始めるのだった。", "夜も昼もグレゴールはほとんど一睡もしないで過ごした。ときどき彼は、このつぎドアが開いたら家族のいっさいのことはまったく以前のようにまた自分の手に引き受けてやろう、と考えた。彼の頭のなかには、久しぶりにまた社長や支配人、店員たちや見習たち、ひどく頭の鈍い小使、別な店の二、三の友人たち、田舎（いなか）のあるホテルの客室づき女中、楽しいかりそめの思い出、彼がまじめに、しかしあまりにのんびり求婚したある帽子店のレジスター係の女の子、そんなものがつぎつぎに現われた。――そうしたすべてが見知らぬ人びとやもう忘れてしまった人びとのあいだにまぎれて現われてくる。しかし、彼と彼の家族とを助けてはくれないで、みんな近づきがたい人びとであり、彼らが姿を消すと、グレゴールはうれしく思うのだった。ところが、つぎに家族のことなんか心配する気分になれなくなる。ただ彼らの世話のいたらなさに対する怒りだけが彼の心をみたしてしまう。何が食べたいのかも全然考えられないにもかかわらず、少しも腹は空いていなくとも自分にふさわしいものをなんであろうと取るために、どうやったら台所へいくことができるか、などといろいろ計画を立ててみる。今はもう何をやったらグレゴールにかくべつ気に入るだろうかというようなことは考えもしないで、妹は朝と正午に店へ出かけていく前に、何かあり合せの食べものを大急ぎでグレゴールの部屋へ足で押しこむ。夕方には、その食べものがおそらくほんの少し味わわれたか、あるいは――そういう場合がいちばん多かったが――まったく手をつけてないか、ということにはおかまいなしで、箒で一掃きして部屋の外へ出してしまう。部屋の掃除は、今ではいつも妹が夕方にやるのだが、もうこれ以上早くはすませられないというほど粗末にやるのだ。汚れたすじが四方の壁に沿って引かれてあるし、そこかしこにはごみと汚れものとのかたまりが横たわっている始末だ。はじめのうちは、妹がやってくると、グレゴールはそうしたとくに汚れの目立つ片隅の場所に坐りこんで、そうした姿勢でいわば妹を非難してやろうとした。しかし、きっと何週間もそこにいてみたところで、妹があらためるということはないだろう。妹も彼とまったく同じくらいに汚れを見ているのだが、妹はそれをほっておこうと決心したのだ。その場合に妹は、およそ家族全員をとらえてしまった、これまでの彼女には見られなかったような敏感さで、グレゴールの部屋の掃除は今でも自分の仕事であるという点を監視するのだった。あるとき、母親がグレゴールの部屋の大掃除を企てた。母親はただ二、三杯のバケツの水を使うことだけでその掃除をやり終えることができた。――とはいっても、部屋がびしょぬれになってグレゴールは機嫌をそこねてしまい、ソファの上にどっかと、腹立たしげに身動きもしないで構えていた――ところが、母親にその罰が訪れないではいなかった。というのは、夕方、妹がグレゴールの部屋の変化に気づくやいなや、彼女はひどく侮辱されたと感じて居間にかけこみ、母親が両手を高く上げて嘆願するにもかかわらず、身をふるわせて泣き始めた。両親は――父親はむろん安楽椅子からびっくりして跳ね起きたのだった――はじめはそれにびっくりして、途方にくれてながめていたが、ついに二人も動き出した。右側では父親が、グレゴールの部屋の掃除は妹にまかせておかなかったというので母親を責めるし、左側では妹のほうが、もう二度とグレゴールの部屋の掃除はしてやらないとわめく。母親は、興奮してわれを忘れている父親を寝室へひきずっていこうとする。妹は泣きじゃくって身体をふるわせながら、小さな拳でテーブルをどんどんたたく。そしてグレゴールは、ドアを閉めて、自分にこんな光景とさわぎとを見せないようにしようとだれも思いつかないことに腹を立てて、大きな音を出してしっしっというのだった。", "しかし、たとい妹が勤めで疲れきってしまい、以前のようにグレゴールの世話をすることにあきあきしてしまっても、母親はけっして妹のかわりをする必要はないし、グレゴールもほったらかしにされる心配はなかったろう。というのは、今では例の手伝い婆さんがいたのだ。長い一生をそのたくましい骨太の身体の助けで切り抜けてきたように見えるこの後家婆さんは、グレゴールをそれほど嫌わなかった。あるとき、別に好奇心に駆られたというのでもなく、偶然、グレゴールの部屋のドアを開け、だれも追い立てるわけでもないのにひどく驚いてしまったグレゴールがあちこちとはい廻り始めたのをながめると、両手を腹の上に合わせてぽかんと立ちどまっているのだった。それ以来、つねに朝晩ちょっとのあいだドアを少しばかり開けて、グレゴールのほうをのぞきこむことを忘れなかった。はじめのうちは、グレゴールを自分のほうに呼ぼうとするのだった。それには、「こっちへおいで、かぶと虫のじいさん！」とか、「ちょっとあのかぶと虫のじいさんをごらんよ」とか、おそらく婆さんが親しげなものと考えているらしい言葉をかけてくるのだ。こうした呼びかけに対してグレゴールは全然返事をせずに、ドアがまったく開けられなかったかのように、自分の居場所から動かなかった。この手伝い婆さんに気まぐれで役にも立たぬじゃまなんかさせていないで、むしろ彼の部屋を毎日掃除するように命じたほうがよかったろうに――ある早朝のこと――はげしい雨がガラス窓を打っていた。おそらくすでに春が近いしるしだろう――手伝い婆さんがまた例の呼びかけを始めたとき、グレゴールはすっかり腹を立てたので、たしかにのろのろとおぼつかなげにではあったが、婆さんに向って攻撃の身構えを見せた。ところが、手伝い婆さんは恐れもせずに、ただドアのすぐ近くにあった椅子を高く振り上げた。大きく口を開けて立ちはだかっている様子を見ると、手にした椅子がグレゴールの背中に振り下ろされたらはじめて口をふさぐつもりなのだ、ということを明らかに示していた。「それじゃあ、それっきりなのかい」と、グレゴールがまた向きなおるのを見て言い、椅子をおとなしく部屋の片隅にもどした。", "グレゴールは今ではもうほとんど何も食べなくなっていた。ただ、用意された食べもののそばを偶然通り過ぎるときにだけ、遊び半分に一かけ口のなかに入れるが、何時間でも口のなかに入れておいて、それからたいていは吐き出すのだ。はじめは、彼に食事をさせなくしているのは、この部屋の状態を悲しむ気持からだ、と考えていたが、部屋がいろいろ変わることにはすぐに慣れてしまった。ほかのところには置くことができない品物はこの部屋に置くという習慣になってしまっていたが、そうした品物はたくさんあった。住居の一室を三人の男の下宿人に貸したからだった。このきまじめな人たちは――グレゴールがあるときドアのすきまから確認したところによると、三人とも顔じゅう髯を生やしていた――ひどく整頓が好きで、ただ自分たちの部屋ばかりではなく、ひとたびこの家に間借りするようになったからには、家全体について、ことに台所での整頓のことに気をくばった。不必要なものや汚ないがらくたには我慢できなかった。その上、彼らは調度品の大部分は自分たちのものをもってきていた。そのために多くの品物は不要となったが、それらは売るわけにもいかないし、さりとて捨ててしまいたくもないのだった。そうした品物がみなグレゴールの部屋に移されてきた。そんなふうにして、灰捨て箱とくず箱とが台所からやってきた。およそ今のところ不要なものは、いつでもひどくせっかちな手伝い婆さんが簡単にグレゴールの部屋へ投げ入れてしまう。ありがたいことに、グレゴールにはたいていは運ばれてくる品物とそれをもっている手としか見えなかった。手伝い婆さんはおそらく、いつか機会を見てそれらの品物をまた取りにくるか、あるいは全部を一まとめにして投げ捨てるかするつもりだったのだろうが、実際にはそれらを最初投げ入れた場所にほうりぱなしにしておいた。しかし、グレゴールはがらくたがじゃまになって、まがりくねって歩かなければならなかったので、それを動かすことがあった。はじめはそうしないとはい廻る場所がなくなるのでしかたなしにやったのだが、のちにはだんだんそれが面白くなったのだった。そうはいうものの、そんなふうにはい廻ったあとでは死ぬほど疲れてしまって悲しくなり、またもや何時間も動かないでいるのだった。", "下宿人たちはときどき夕食も家で共同の居間で取るのだった。そのため居間のドアは多くの晩に閉ざされたままだ。だが、グレゴールはドアを開けるということをまったく気軽にあきらめた。ドアが開いている多くの晩でさえも、それを十分に利用しないでいて、家族には気づかれずに自分の部屋のいちばん暗い片隅に横たわっていた。ところが、あるとき、手伝い婆さんが居間へ通じるドアを少しばかり開け放しにした。下宿人たちが晩方入ってきて、明りをつけたときにも、ドアは開いたままだった。三人はテーブルのかみ手に坐った。以前は父親と母親とグレゴールとが坐った場所だ。そして三人はナプキンを拡げ、ナイフとフォークとを手に取った。すぐにドアのところに肉の皿をもった母親が現われ、彼女のすぐあとから妹が山盛りのじゃがいもの皿をもって現われた。食べものはもうもうと湯気を立てていた。下宿人たちは食べる前に調べようとするかのように、自分たちの眼の前に置かれた皿の上へ身をかがめた。そして実際、まんなかに坐っていて、ほかの二人には権威をもっているように見える男が、皿の上で一片の肉を切った。それが十分柔かいかどうか、台所へ突っ返さなくてもよいかどうか、たしかめようとしているらしかった。しかし、その男が満足したので、緊張してながめていた母親と妹とは、ほっと息をついて微笑し始めた。", "家族の者たち自身は台所で食事をした。それでも父親は台所へいく前にこの部屋へ入っていき、一回だけお辞儀をすると、制帽を手にもち、テーブルのまわりをぐるりと廻る。下宿人たちはみんな立ち上がって、髯のなかで何かをつぶやく。つぎに彼らだけになると、ほとんど完全な沈黙のうちに食事をする。食事中のあらゆる物音からたえずものをかむ歯の音が聞こえてくることが、グレゴールには奇妙に思われた。まるで食べるためには歯が必要であり、いくらりっぱでも歯のない顎（あご）ではどうすることもできないということをグレゴールに示そうとするかのようだった。グレゴールは心配そうに自分に言い聞かせた。", "「おれは食欲があるが、あんなものはいやだ。あの人たちはものを食べて栄養を取っているのに、おれは死ぬのだ！」", "まさにその夜のことだったが――あれからずっと、グレゴールはヴァイオリンの音を聞いたおぼえがなかった――ヴァイオリンの音が台所から聞こえてきた。下宿人たちはもう夕食を終え、まんなかの男が新聞を引っ張り出し、ほかの二人に一枚ずつ渡した。そして、三人とも椅子にもたれて読み、煙草をふかしていた。ヴァイオリンが鳴り始めると、三人はそれに気づき、立ち上がって、爪立ちで歩いて玄関の間へいき、そこで身体をよせたまま立ちつづけていた。台所にいても彼らの物音が聞こえたらしい。父親がこう叫んだ。", "「みなさんにはヴァイオリンの音がお気にさわるんではありませんか。なんならすぐやめさせますが」", "「どうしまして」と、まんなかの男がいった。", "「お嬢さんはわれわれのところにこられて、この部屋で弾かれたらどうです？　こちらのほうがずっといいし、気持もいいですよ」", "「それでは、そう願いますか」と、父親はまるで自分がヴァイオリンを弾いているかのように答えた。三人は部屋にもどって待っていた。まもなく父親は譜面台をもち、母親は楽譜を、妹はヴァイオリンをもってやってきた。妹は落ちついて演奏の準備をすっかりすませた。両親はこれまで一度も間貸しをしたことがなく、そのために下宿人たちに対する礼儀の度を超していたが、自分たちの椅子に坐ろうとはけっしてしなかった。父親はドアにもたれ、きちんとボタンをかけた制服の上衣のボタン二つのあいだに右手をさし入れていた。母親のほうは下宿人の一人に椅子をすすめられ、その人が偶然すすめた椅子が部屋のわきのほうの片隅にあったので、そこに坐りつづけていた。", "妹は弾き始めた。父親と母親とはそれぞれ自分のいる位置から注意深く妹の両手の動きを目で追っていた。グレゴールは演奏にひきつけられて少しばかり前へのり出し、もう頭を居間へ突っこんでいた。最初は自分が他人のことをもう顧慮しなくなっていることが、彼にはほとんどふしぎに思われなかった。以前には、この他人への顧慮ということが彼の誇りだった。しかも、彼は今こそいっそう自分の身を隠していい理由をもっていた。というのは、部屋のなかのいたるところに横たわっているごみが、ちょっとでも身体を動かすと舞い上がり、そのごみをすっかり身体にかぶっていた。糸くずとか髪の毛とか食べものの残りかすを背中やわき腹にくっつけてひきずって歩いているのだ。あらゆることに対する彼の無関心はあまりに大きいので、以前のように一日に何度も仰向けになって、絨毯に身体をこすりつけることもしなくなっていた。こんな状態であるにもかかわらず、少しも気おくれを感じないで、非の打ちどころのないほど掃除のゆきとどいている居間の床の上へ少しばかり乗り出していった。", "とはいえ、ほかの人たちのほうも彼に気づく者はいなかった。家族の者はすっかりヴァイオリンの演奏に気を取られていた。それに反して、下宿人たちははじめは両手をポケットに突っこんで、妹の譜面台のすぐ近くに席を占めていた。あまりに近いので三人とも楽譜をのぞきこめるくらいだった。そんなことをやったら、妹のじゃまになったことだろう。ところが、やがて低い声で話し合いながら、頭を垂れたまま窓のほうへ退いていった。父親が心配そうに見守るうちに、彼らはその窓ぎわにとどまっていた。すばらしい、あるいは楽しいヴァイオリン演奏を聞くつもりなのが失望させられ、演奏全体にあきあきして、ただ儀礼から我慢しておとなしくしているのだということは、実際見ただけではっきりわかることだった。ことに、三人が鼻と口とから葉巻の煙を高く吹き出しているやりかたは、ひどくいらいらしているのだということを推量させた。しかし、妹はとても美しく弾いていた。彼女の顔は少しわきに傾けられており、視線は調べるように、また悲しげに楽譜の行を追っている。グレゴールはさらに少しばかり前へはい出し、頭を床にぴったりつけて、できるなら彼女の視線とぶつかってやろうとした。音楽にこんなに心を奪われていても、彼は動物なのだろうか。彼にはあこがれていた未知の心の糧（かて）への道が示されているように思えた。妹のところまで進み出て、彼女のスカートを引っ張って、それによってヴァイオリンをもって自分の部屋へきてもらいたいとほのめかそう、と決心した。というのは、ここにいるだれ一人として、彼がしたいと思っているほど彼女の音楽に応（こた）える者はいないのだ。彼はもう妹を自分の部屋から出したくなかった。少なくとも自分が生きているあいだは、出したくなかった。彼の恐ろしい姿ははじめて彼の役に立つだろうと思われた。自分の部屋のどのドアも同時に見張っていて、侵入してくる者たちにほえついてやるつもりだ。だが、妹はしいられてではなく、自由意志で自分のところにとどまらなければならない。ソファの上で彼のわきに坐り、耳を彼のほうに傾けてくれるのだ。そこで彼は妹に、自分は妹を音楽学校に入れることにはっきり心をきめていたのであり、もしそのあいだにこんな事故が起こらなかったならば、去年のクリスマスに――クリスマスはやっぱりもう過ぎてしまったのだろうか――どんな反対も意に介することなくみんなにいっていたことだろう、と打ち明けてやる。こう説明してやれば、妹は感動の涙でわっと泣き出すことだろう。そこでグレゴールは彼女の肩のところまでのび上がって、首に接吻してやるのだ。店へいくようになってからは、妹はリボンもカラーもつけないで首を丸出しにしているのだった。", "「ザムザさん！」と、まんなかの男が父親に向って叫び、それ以上は何もいわずに、人差指でゆっくりと前進してくるグレゴールをさし示した。ヴァイオリンの音がやみ、まんなかの下宿人ははじめは頭を振って二人の友人ににやりと笑って見せたが、つぎにふたたびグレゴールを見やった。父親は、グレゴールを追い払うかわりに、まず下宿人たちをなだめることのほうがいっそう必要だと考えているようであった。とはいっても、三人は全然興奮なんかしていないし、グレゴールのほうがヴァイオリンの演奏よりも彼らを面白がらせているように見えた。父親は三人のほうに急いでいき、両腕を拡げて彼らの部屋へ押しもどそうとし、同時に、自分の身体でグレゴールの姿が見えなくなるようにしようとした。今度は三人がほんとうに少しばかり気を悪くした。父親の態度に気を悪くしたのか、グレゴールのような隣室の住人がいるものとは知らなかったのに、今やっとそれがわかってきたことに気を悪くしたのか、それはもうなんともいえなかった。三人は父親に説明を求め、三人のほうで腕を振り上げ、落ちつかなげに髯を引っ張り、ほんのゆっくりした歩みで自分たちの部屋のほうへ退いていった。そうしているあいだに、突然演奏をやめて放心状態でいた妹はやっと正気を取りもどし、しばらくのあいだだらりと垂れた両手にヴァイオリンと弓とをもって、まだ演奏しているかのように楽譜をながめつづけていたが、突然身を起こすと、はげしい肺の活動をともなう呼吸困難に陥ってまだ自分の椅子に坐っていた母親の膝の上に楽器を置き、隣室へとかけこんでいった。三人の下宿人たちは、父親に押しまくられてすでにさっきよりは早い足取りでその部屋へ近づいていた。妹が慣れた手つきでベッドのふとんや枕を高く飛ばしながら寝具の用意を整えるのが見えた。三人が部屋へたどりつくよりも前に、妹はベッドの用意をすませてしまい、ひらりと部屋から脱け出ていた。父親はまたもや気ままな性分にすっかりとらえられてしまったらしく、ともかく下宿人に対して払わなければならないはずの敬意を忘れてしまった。彼は三人をただ押しまくっていったが、最後に部屋のドアのところでまんなかの人が足を踏み鳴らしたので、父親はやっととまった。", "「私はここにはっきりというが」と、その人は片手を挙げ、眼で母親と妹とを探した。「この住居および家族のうちに支配しているいとわしい事情を考えて」――ここでとっさの決心をして床につばを吐いた――「私の部屋をただちに出ていくことを通告します。むろん、これまでの間借料も全然支払いません。それに反して、きわめて容易に理由づけることができるはずのなんらかの損害賠償要求をもって――いいですかな――あなたを告訴すべきものかどうか、考えてみるつもりです」彼は沈黙して、まるで何かを待ちかまえているかのように自分の前を見つめていた。", "「われわれもただちに出ていきます」と、はたして彼の二人の友人もすぐさま口を出した。まんなかの男はドアの取手をつかみ、ばたんと音を立ててドアを閉めた。", "父親は手探りで自分の椅子までよろめいていき、どかりと腰を下ろした。まるでいつものように晩の居眠りをするために手足をのばしたように見えた。だが、ぐらぐらする頭が強くうなずいていることで、彼が全然眠っていないことがわかった。グレゴールはこうしたことが行われるあいだじゅう、下宿人たちが彼を見つけた場所にじっととどまっていた。自分の計画の失敗に対する失望と、またおそらくはあまりに空腹をつづけたことから起った衰弱とのために、身体を動かすことができなかった。彼はつぎの瞬間にはどっといろいろなものが墜落してくるだろう、と早くもある確信をもって恐れ、それを待ちかまえていた。ヴァイオリンが母親のふるえる指のあいだをすべって膝から床へと落ち、がたんと響きを立てたことも、彼をびっくりさせて動き出させることは全然なかった。", "「お父さん、お母さん」と、妹はいって、話に入る前に手でテーブルを打った。「もうこれまでだわ。あなたがたはおそらくわからないのでしょうが、わたしにはわかります。こんな怪物の前で兄さんの名前なんかいいたくはないわ。だから、わたしたちはこいつから離れようとしなければならない、とだけいうわ。こいつの世話をし、我慢するために、人間としてできるだけのことをやろうとしてきたじゃないの。だれだって少しでもわたしたちを非難することはできないと思うわ」", "「これのいうのはまったくもっともだ」と、父親はつぶやいた。まだ十分に息をつけないでいる母親は、狂ったような目つきをして、口に手を当てて低い音を立てながら咳をし始めた。", "妹は母親のところへ急いでいき、彼女の額を支えてやった。父親は妹の言葉を聞いて、何か考えがきまったように見えた。身体をまっすぐにして坐ると、下宿人たちの夕食からまだテーブルの上に置き放しになっている皿のあいだで小使の制帽をもてあそんでいたが、ときどきじっとしているグレゴールの上に視線を投げている。", "「わたしたちはこいつから離れなければならないのよ」と、妹はもっぱら父親に向っていった。母親のほうは咳（せ）きこんで何も聞こえないのだ。", "「こいつはお父さんとお母さんとを殺してしまうわ。そうなることがわたしにはわかっています。わたしたちみんなのように、こんなに苦労して働かなければならないときには、その上に、家でもこんな永久につづく悩みなんか辛抱できないわ。わたしももう辛抱できないわ」そして、彼女ははげしく泣き始めたので、涙が母親の顔の上にかかった。妹は機械的に手を動かしてその涙をぬぐってやった。", "「お前」と、父親は同情をこめ、まったくそのとおりだというような調子でいった。「でも、どうしたらいいんだろうな？」", "妹は、途方にくれていることを示すために肩をすぼめた。泣いているあいだに、さっきの断固とした態度とは反対に、どうしていいのかわからなくなっていたのだった。", "「あいつがわれわれのことをわかってくれたら」と、父親は半ばたずねるようにいった。妹は泣きながらはげしく手を振った。そんなことは考えられない、ということを示すものだった。", "「あいつがわれわれのことをわかってくれたら」と、父親はくり返して、眼を閉じ、そんなことはありえないという妹の確信を自分でも受け容れていた。「そうしたらおそらくあいつと話をつけることができるんだろうが。だが、こんなふうじゃあねえ――」", "「あいつはいなくならなければならないのよ」と、妹は叫んだ。「それがただ一つの手段よ。あいつがグレゴールだなんていう考えから離れようとしさえすればいいんだわ。そんなことをこんなに長いあいだ信じていたことが、わたしたちのほんとうの不幸だったんだわ。でも、あいつがグレゴールだなんていうことがどうしてありうるでしょう。もしあいつがグレゴールだったら、人間たちがこんな動物といっしょに暮らすことは不可能だって、とっくに見抜いていたでしょうし、自分から進んで出ていってしまったことでしょう。そうなったら、わたしたちにはお兄さんがいなくなったでしょうけれど、わたしたちは生き延びていくことができ、お兄さんの思い出を大切にしまっておくことができたでしょう。ところが、この動物はわたしたちを追いかけ、下宿人たちを追い出すのだわ。きっと住居全体を占領し、わたしたちに通りで夜を明かさせるつもりなのよ。ちょっとみてごらんなさい、お父さん」と、妹は突然叫んだ。「またやり出したわよ！」", "そして、グレゴールにもまったくわからないような恐怖に襲われて、妹は母親さえも離れ、まるで、グレゴールのそばにいるよりは母親を犠牲にしたほうがましだといわんばかりに、どう見ても母親を椅子から突きとばしてしまい、父親のうしろへ急いで逃げていった。父親もただ娘の態度を見ただけで興奮してしまい、自分でも立ち上がると、妹をかばおうとするかのように両腕を彼女の前に半ば挙げた。", "しかし、グレゴールは、だれかを、まして妹を不安に陥れようなどとは考えてもみなかった。彼はただ、自分の部屋へもどっていこうとして、身体の向きを変え始めていただけだった。そうはいっても、その動作がひどく目立った。今の苦しい状態のために、困難な回転をやる場合に頭の助けを借りなければならなかったからだ。そこで頭を何度ももたげては、床に打ちつけた。彼はじっととまって、あたりを見廻した。彼の善意はみとめられたようだった。人びとはただ一瞬ぎょっとしただけだった。そこでみんなは、沈黙したまま、悲しげに彼をじっと見つめた。母親は両脚をぴったりつけたまま前へのばして、椅子に坐っていた。疲労のあまり、眼がほとんど自然に閉じそうだった。父親と妹とは並んで坐り、妹は片手を父親の首に廻していた。", "「これでもう向きを変えてもいいだろう」と、グレゴールは考えて、彼の仕事にまた取りかかった。骨が折れるために息がはあはあいうのを抑えることはできなかった。そこで、ときどき休まないではいられなかった。ところで、彼を追い立てる者はいなかった。万事は彼自身のやるがままにまかせられた。回転をやり終えると、すぐにまっすぐにはいもどり始めた。自分と自分の部屋とを距てている距離が大きいことにびっくりした。そして、身体が衰弱しているのにどうしてついさっきはこの同じ道を、こんなに遠いとはほとんど気づかないではっていけたのか、理解できなかった。しょっちゅうただ早くはっていくことだけを考えて、家族の者が言葉や叫び声をかけて彼をじゃますることはない、というのには気づかなかった。もうドアのところにまで達したときになってやっと、頭を振り返らせてみた。完全に振り返ったのではない。というのは、首がこわばっているのを感じたのだった。ともあれ、自分の背後では何一つ変化が起っていないことを見て取った。ただ妹だけが立ち上がっていた。彼の最後の視線が母親の上をかすめた。母親はもう完全に眠りこけていた。", "自分の部屋へ入るやいなや、ドアが大急ぎで閉められ、しっかりととめ金がかけられ、閉鎖された。背後に突然起った大きな物音にグレゴールはひどくびっくりしたので、小さな脚ががくりとした。あんなに急いだのは妹だった。もう立ち上がって待っていて、つぎにさっと飛んできたのだった。グレゴールには妹がやってくる足音は全然聞こえなかった。ドアの鍵を廻しながら、「とうとうこれで！」と、妹は叫んだ。", "「さて、これで？」と、グレゴールは自分にたずね、暗闇（くらやみ）のなかであたりを見廻した。まもなく、自分がもうまったく動くことができなくなっていることを発見した。それもふしぎには思わなかった。むしろ、自分がこれまで実際にこのかぼそい脚で身体をひきずってこられたことが不自然に思われた。ともかく割合に身体の工合はいいように感じられた。なるほど身体全体に痛みがあったが、それもだんだん弱くなっていき、最後にはすっかり消えるだろう、と思われた。柔かいほこりにすっかり被われている背中の腐ったリンゴと炎症を起こしている部分とは、ほとんど感じられなかった。感動と愛情とをこめて家族のことを考えた。自分が消えてしまわなければならないのだという彼の考えは、おそらく妹の意見よりももっと決定的なものだった。こんなふうに空虚なみちたりたもの思いの状態をつづけていたが、ついに塔の時計が朝の三時を打った。窓の外ではあたりが明るくなり始めたのを彼はまだ感じた。それから、頭が意に反してすっかりがくりと沈んだ。彼の鼻孔（びこう）からは最後の息がもれて出た。", "朝早く手伝い婆さんがやってきたとき――いくらそんなことをやらないでくれと頼んでも、力いっぱいに大急ぎでどのドアもばたんばたんと閉めるので、この女がやってくると、家じゅうの者はもう静かに眠っていることはできなかった――いつものようにちょっとグレゴールの部屋をのぞいたが、はじめは別に異常をみとめなかった。グレゴールはわざとそんなふうに身動きもしないで横たわって、ふてくされて見せているのだ、と手伝い婆さんは思った。彼女はグレゴールがありとあらゆる分別をもっているものと思っていた。たまたま長い箒を手にもっていたので、ドアのところからそれでグレゴールをくすぐろうとした。ところがなんのききめも現われないので、怒ってしまい、グレゴールの身体を少しつついた。彼がなんの抵抗も示さずに寝ているところからずるずると押しやられていったときになってはじめて、女はおかしいな、と思った。まもなく真相を知ると眼を丸くし、思わず口笛のような音を出したが、たいしてそこにとどまってはいず、寝室のドアをさっと開いて、大きな声で暗闇に向って叫んだ。", "「ちょっとごらんなさいよ。のびていますよ。ねていますよ。すっかりのびてしまっていますよ！」", "ザムザ夫妻はダブル・ベッドの上にまっすぐに身体を起こし、手伝い婆さんのいうことがわかるより前に、まずこの女にびっくりさせられた気持をしずめなければならなかった。だが、事情がのみこめると夫婦はそれぞれ自分の寝ていた側から急いでベッドを下りた。ザムザ氏は毛布を肩にかけ、ザムザ夫人はただ寝巻のままの姿で出てきた。二人はそんな恰好でグレゴールの部屋へ入っていった。そのあいだに、下宿人がやってきて以来グレーテが寝るようになった居間のドアも開けられた。グレーテは全然眠らなかったように、完全な身支度をしていた。彼女の蒼い顔も、眠っていないことを証明しているように思われた。", "「死んだの？」と、ザムザ夫人はいって、たずねるように手伝い婆さんを見上げた。とはいっても自分で調べることができるし、また調べなくともわかることだった。", "「そうだと思いますね」と、手伝い婆さんはいって、それを証明するためにグレゴールの死骸を箒でかなりの距離押してやった。ザムザ夫人は、箒を押しとめようとするような動作をちょっと見せたが、実際にはそうはしなかった。", "「これで」と、ザムザ氏がいった。「神様に感謝できる」", "彼は十字をきった。三人の女たちも彼のやるとおり見ならった。死骸から眼を放さないでいたグレーテがいった。", "「ごらんなさいな。なんてやせていたんでしょう。もう長いこと全然食べなかったんですものね。食べものは入れてやったときのままで出てきたんですもの」", "事実、グレゴールの身体はまったくぺしゃんこでひからびていて、もう小さな脚では身体がもち上げられなくなり、そのほかの点でも人の注意をそらすようなものがまったくなくなってしまった今になってやっと、そのことがわかるのだった。", "「グレーテ、ちょっとわたしたちの部屋へおいで」と、ザムザ夫人は悲しげな微笑を浮かべていった。グレーテは死骸のほうを振り返らないではいられなかったが、両親につづいて寝室へ入っていった。手伝い婆さんはドアを閉め、窓をすっかり開けた。朝が早いにもかかわらず、すがすがしい空気にはすでにいくらかなま暖かさがまじっていた。もう三月の末だった。", "三人の下宿人が自分たちの部屋から出てきて、びっくりしたように自分たちの朝食を探してあたりをきょろきょろ見廻した。朝食の用意は忘れられていた。", "「朝食はどこにあるんだ？」と、まんなかの人がぶつぶつ言いながら手伝い婆さんにたずねた。ところが婆さんは口に指をあてて、黙ったまま急いで、グレゴールの部屋へいってみるように、という合図をしてみせた。三人はいわれたとおりに部屋へいき、いくらかくたびれた上衣のポケットに両手を突っこんだまま、今ではもう明るくなった部屋のなかでグレゴールの死骸のまわりに立った。", "そのとき寝室のドアが開いて、制服姿のザムザ氏が現われ、一方の腕で妻を抱き、もう一方の腕で娘を抱いていた。みんな少し泣いたあとだった。グレーテはときどき顔を父親の腕に押しつけた。", "「すぐ私の家を出ていっていただきましょう！」と、ザムザ氏はいって、二人の女を身体から離さないでドアを指さした。", "「それはどういう意味なんです？」と、まんなかの人は少し驚きながらいって、やさしそうな微笑をもらした。ほかの二人は両手を背中に廻して、たえずこすっている。まるで自分たちに有利な結果に終わるにきまっている大きな争いをうれしがって待ちかまえているようだった。", "「今申しているとおりの意味です」と、ザムザ氏は答え、二人の女と一直線に並んで下宿人たちのほうへ近づいていった。例の人ははじめのうちはじっと立ったまま、事柄を頭のなかでまとめて新しく整理しようとするかのように、床を見つめていた。", "「それでは出ていきましょう」と、いったが、ザムザ氏を見上げた。まるで突然襲われたへりくだった気持でこの決心にさえ新しい許可を求めているかのようだった。ザムザ氏は大きな眼をしてただ何度かうなずいて見せるだけだった。それからその人はほんとうにすぐ大股で玄関の間へと歩いていった。二人の友人はしばらく両手の動きをすっかりとめたまま聞き耳を立てていたが、例の人のあとを追って飛んでいった。まるでザムザ氏が自分たちより前に玄関の間に入って、自分たちの指導者である例の人との連絡をじゃまするかもしれないと不安に思っているようであった。玄関の間で三人はそろって衣裳かけから帽子を取り、ステッキ立てからステッキを抜き出し、無言のままお辞儀をして、住居を出ていった。すぐわかったがまったくいわれのない不信の念を抱きながら、ザムザ氏は二人の女をつれて玄関口のたたきまで出ていった。そして、三人がゆっくりとではあるが、しかししっかりとした足取りで長い階段を降りていき、一階ごとに階段部の一定の曲り角へくると姿が消え、そしてまたすぐに現われてくるのを、手すりにもたれてながめていた。下へ降りていくにつれて、それだけザムザ家の関心は薄らいでいった。この三人に向って、そしてつぎには三人の頭上高く一人の肉屋の小僧が頭の上に荷をのせて誇らしげな態度でのぼってきたとき、ザムザ氏は女たちをつれて手すりから離れ、まるで気が軽くなったような様子で自分たちの住居へもどっていった。", "彼らは今日という日は休息と散歩とに使おうと決心した。こういうふうに仕事を中断するには十分な理由があったばかりでなく、またそうすることがどうしても必要だった。そこでテーブルに坐って三通の欠勤届を書いた。ザムザ氏は銀行の重役宛に、ザムザ夫人は内職の注文をしてくれる人宛に、そしてグレーテは店主宛に書いた。書いているあいだに手伝い婆さんが入ってきた。もう帰ると言いにきたのだった。というのは、朝の仕事は終っていた。届を書いていた三人ははじめはただうなずいてみせるだけで眼を上げなかったが、手伝い婆さんがまだその場を離れようとしないので、やっと怒ったように見上げた。", "「何か用かね？」と、ザムザ氏がたずねた。手伝い婆さんは微笑しながらドアのところに立っていたが、家族の者たちに大きな幸福について知らせてやることがあるのだが、徹底的にたずねてくれなければ知らせてはやらない、といわんばかりであった。帽子の上にほとんどまっすぐに立っている小さな駝鳥（だちょう）の羽根飾りは、彼女が勤めるようになってからザムザ氏が腹を立てていたものだが、それが緩やかに四方へゆれている。", "「で、いったいどんな用なの？」と、ザムザ夫人がたずねた。手伝い婆さんはそれでもこの夫人をいちばん尊敬していた。", "「はい」と、手伝い婆さんは答えたが、親しげな笑いのためにすぐには話せないでいる。「隣りのものを取り片づけることについては、心配する必要はありません。もう片づいています」", "ザムザ夫人とグレーテとはまた書きつづけようとするかのように手紙にかがみこんだ。ザムザ氏は、手伝い婆さんがいっさいをくわしく説明し始めようとしているのに気づいて、手をのばして断固として拒絶するということを示した。女は話すことが許されなかったので、自分がひどく急がなければならないことを思い出し、侮辱されたように感じたらしく「さよなら、みなさん」と叫ぶと、乱暴に向きなおって、ひどい音を立ててドアを閉め、住居を出ていった。", "「夕方、あの女にひまをやろう」と、ザムザ氏はいったが、妻からも娘からも返事をもらわなかった。というのは、手伝い婆さんがこの二人のやっと得たばかりの落ちつきをまたかき乱してしまったらしかった。二人は立ち上がって、窓のところへいき、抱き合って立っていた。ザムザ氏は彼の椅子に腰かけたまま二人のほうを振り返って、しばらくじっと二人を見ていた。それから叫んだ。", "「さあ、こっちへこいよ。もう古いことは捨て去るのだ。そして、少しはおれのことも心配してくれよ」", "すぐ二人の女は彼のいうことを聞き、彼のところへもどって、彼を愛撫（あいぶ）し、急いで欠勤届を書いた。", "それから三人はそろって住居を出た。もう何カ月もなかったことだ。それから電車で郊外へ出た。彼ら三人しか客が乗っていない電車には、暖かい陽がふり注いでいた。三人は座席にゆっくりともたれながら、未来の見込みをあれこれと相談し合った。そして、これから先のこともよく考えてみるとけっして悪くはないということがわかった。というのは、三人の仕事は、ほんとうはそれらについておたがいにたずね合ったことは全然なかったのだが、まったく恵まれたものであり、ことにこれからあと大いに有望なものだった。状態をさしあたりもっとも大幅に改善することは、むろん住居を変えることによってできるにちがいなかった。彼らは、グレゴールが探し出した現在の住居よりももっと狭くて家賃の安い、しかしもっといい場所にある、そしてもっと実用的な住居をもとうと思った。こんな話をしているあいだに、ザムザ夫妻はだんだんと元気になっていく娘をながめながら、頬の色も蒼（あお）ざめたほどのあらゆる心労にもかかわらず、彼女が最近ではめっきりと美しくふくよかな娘になっていた、ということにほとんど同時に気づいたのだった。いよいよ無口になりながら、そしてほとんど無意識のうちに視線でたがいに相手の気持をわかり合いながら、りっぱなおむこさんを彼女のために探してやることを考えていた。目的地の停留場で娘がまっさきに立ち上がって、その若々しい身体をぐっとのばしたとき、老夫妻にはそれが自分たちの新しい夢と善意とを裏書きするもののように思われた。"]}, {"no": 44, "title": "方丈記", "author": "紀貫之", "category": "日本文学-古典", "chars": 9376, "volume": "中", "paras": ["行く川のながれは絶えずして、しかも本の水にあらず。よどみに浮ぶうたかたは、かつ消えかつ結びて久しくとどまることなし。世の中にある人とすみかと、またかくのごとし。玉しきの都の中にむねをならべいらかをあらそへる、たかきいやしき人のすまひは、代を経て尽きせぬものなれど、これをまことかと尋ぬれば、昔ありし家はまれなり。あるいはこぞ破れ（やけイ）てことしは造り、あるは大家ほろびて小家となる。住む人もこれにおなじ。所もかわらず、人も多かれど、いにしえ見し人は、二三十人が中に、わずかにひとりふたりなり。あしたに死し、ゆうべに生るならひ、た水の泡にぞ似たりける。知らず、生れ死ぬる人、いづかたより来りて、いづかたへか去る。また知らず、かりのやどり、誰が為に心を悩まし、何によりてか目をよろこばしむる。そのあるじとすみかと、無常をあらそひ去るさま、いわ朝顔の露にことならず。あるいは露おちて花のこれり。のこるといえども朝日に枯れぬ。あるいは花はしぼみて、露なほ消えず。消えずといえども、ゆうべを待つことなし。』およそ物の心を知れりしよりこのかた、四十あまりの春秋をおくれる間に、世のふしぎを見ることやたびたびになりぬ。いにし安元三年四月廿八日かとよ、風烈しく吹きてしづかならざりし夜、戌の時ばかり、都のたつみより火出で来りていぬいに至る。はてには朱雀門、大極殿、大学寮、民部の省まで移りて、ひとよがほどに、塵灰となりにき。火本は樋口富の小路とかや、病人を宿せるかりやより出で来けるとなむ。吹きまよう風にとかく移り行くほどに、扇をひろげたるがごとくすえひろになりぬ。遠き家は煙にむせび、近きあたりはひたすらほのほを地に吹きつけたり。空には灰を吹きたてたれば、火の光に映じてあまねくくれないなる中に、風に堪えず吹き切られたるほのほ、飛ぶがごとくにして一二町を越えつ移り行く。その中の人うつ（しイ）心ならむや。あるひは煙にむせびてたふれ伏し、あるいは炎にまぐれてたちまちに死しぬ。あるいはまたわずかに身一つからくして遁れたれども、資財を取り出ずるに及ばず。七珍万寳、さながら灰燼となりにき。そのついえいくそばくぞ。このたび公卿の家十六焼けたり。ましてその外は数を知らず。すべて都のうち、三分が二（一イ）に及べりとぞ。男女死ぬるもの数千人、馬牛のたぐい辺際を知らず。人のいとなみみなおろかなる中に、さしも危き京中の家を作るとて宝をついやし心をなやますことは、すぐれてあじきなくぞ侍るべき。』また治承四年卯月廿九日のころ、中の御門京極のほどより、大なるつじかぜ起りて、六条わたりまで、いかめしく吹きけること侍りき。三四町をかけて吹きまくるに、その中にこもれる家ども、大なるもちいさきも、一つとしてやぶれざるはなし。さながらひらにたふれたるもあり。けたはしらばかり残れるもあり。また門の上を吹き放ちて、四五町がほど（ほかイ）に置き、また垣を吹き払いて、隣と一つになせり。いわむや家の内のたから、数をつくして空にあがり、ひはだぶき板のたぐい、冬の木の葉の風に乱るがごとし。塵を煙のごとく吹き立てたれば、すべて目も見えず。おびたしくなりとよむ音に、物いふ声も聞えず。かの地獄の業風なりとも、かばかりにとぞ覚ゆる。家の損亡するのみならず、これをとり繕う間に、身をそこないて、かたはずけるもの数を知らず。この風ひつじさるのかたに移り行きて、多くの人のなげきをなせり。つじかぜはつねに吹くものなれど、かることやはある。たごとにあらず。さるべき物のさとしかなとぞ疑い侍りし。』またおなじ年の六月の頃、にわかに都うつり侍りき。いと思いの外なりし事なり。大かたこの京のはじめを聞けば、嵯峨の天皇の御時、都とさだまりにけるより後、すでに数百歳を経たり。異なるゆえなくて、たやすく改まるべくもあらねば、これを世の人、たやすからずうれへあへるさま、ことわりにも過ぎたり。されどとかくいふかひなくて、みかどよりはじめ奉りて、大臣公卿ことごとく摂津国難波の京に（八字イ無）うつり給いぬ。世に仕ふるほどの人、誰かひとりふるさとに残りいらむ。官位に思いをかけ、主君のかげを頼むほどの人は、一日なりとも、とくうつらむとはげみあへり。時を失い世にあまされて、ごする所なきものは、愁えながらとまり居れり。軒を争いし人のすまひ、日を経つあれ行く。家はこぼたれて淀川に浮び、地は目の前に畑となる。人の心皆あらたまりて、た馬鞍をのみ重くす。牛車を用とする人なし。西南海の所領をのみ願い、東北国の庄園をば好まず。その時、おのずから事のたよりありて、津の国今の京に到れり。所のありさまを見るに、その地ほどせまくて、条里をわるにたらず。北は山にそひて高く、南は海に近くてくだれり。なみの音つねにかまびすしくて、潮風ことにはげしく、内裏は山の中なれば、かの木の丸殿もかくやと、なかなかようかわりて、いうなるかたも侍りき。日にこぼちて川もせきあえずはこびくだす家はいづくにつくれるにかあらむ。なおむなしき地は多く、作れる屋はすくなし。ふるさとはすでにあれて、新都はいまだならず。ありとしある人、みな浮雲のおもいをなせり。元よりここに居れるものは、地を失いてうれえ、今うつり住む人は、土木のわずらいあることをなげく。道のほとりを見れば、車に乗るべきはうまに乗り、衣冠布衣なるべきはひたれを着たり。都のてふりたちまちにあらたまりて、ただひなびたる武士にことならず。これは世の乱る瑞相とか聞きおけるもしるく、日を経つ世の中うき立ちて、人の心も治らず、民のうれへついにむなしからざりければ、おなじ年の冬、なおこの京に帰り給いにき。されどこぼちわたせりし家どもはいかになりにけるにか、ことごとく元のようにも作らず。ほのかに伝へ聞くに、いにしえのかしこき御代には、あはれみをもて国をおさめ給う。則ち御殿に茅をふきて軒をだにとのへず。煙のともしきを見給う時は、かぎりあるみつぎものをさえゆるされき。これ民をめぐみ、世をたすけ給うによりてなり。今の世の中のありさま、昔になぞらへて知りぬべし。』また養和のころかとよ、久しくなりてたしかにも覚えず、二年が間、世の中飢渇して、あさましきこと侍りき。あるいは春夏日でり、あるいは秋冬大風、大水などよからぬ事どもうちつきて、五穀ことごとくみのらず。むなしく春耕し、夏植うるいとなみありて、秋かり冬収むるぞめきはなし。これによりて、国の民、あるいは地を捨て堺を出で、あるいは家をわすれて山にすむ。さまざまの御祈はじまりて、なべてならぬ法ども行わるれども、さらにそのしるしなし。京のならひなに事につけても、みなもとは田舍をこそたのめるに、絶えてのぼるものなければ、さのみやはみさおも作りあへむ。念じわびつ、さまざまの寳もの、かたはしより捨つるがごとくすれども、さらに目みたつる人もなし。たまたま易ふるものは、金をかろくし、粟を重くす。乞食道の辺におおく、うれへ悲しむ声耳にみてり。さきの年かくのごとくからくして暮れぬ。明くる年は立ちなおるべきかと思うに、あまさええやみうちそひて、まさるようにあとかたなし。世の人みな飢え死にければ、日を経つきはまり行くさま、少水の魚のたとえに叶へり。はてには笠うちき、足ひきつみ、よろしき姿したるもの、ひたすら家ごとに乞いありく。かくわびしれたるものどもありくかと見れば則ち斃れふしぬ。ついひぢのつら、路頭に飢え死ぬるたぐいは数もしらず。取り捨つるわざもなければ、くさき香世界にみちみちて、かわり行くかたちありさま、目もあてられぬこと多かり。いわむや河原などには、馬車の行きちがう道だにもなし。しづ、山がつも、力つきて、薪にさえともしくなりゆけば、たのむかたなき人は、みずから家をこぼちて市に出でこれを売るに、一人がもち出でたるあたひ、なお一日が命をさふるにだに及ばずとぞ。あやしき事は、かる薪の中に、につき、しろがねこがねのはくなど所につきて見ゆる木のわれあいまじれり。これを尋ぬればすべき方なきもの、古寺に至りて仏をぬすみ、堂の物の具をやぶりとりて、わりくだけるなりけり。濁悪の世にしも生れあいて、かる心うきわざをなむ見侍りし。』またあはれなること侍りき。さりがたき女男など持ちたるものは、その思いまさりて、心ざし深きはかならずさきだちて死しぬ。そのゆえは、我が身をば次になして、男にもあれ女にもあれ、いたわしく思うかたに、たまたま乞い得たる物を、まずゆずるによりてなり。されば父子あるものはさだまれる事にて、親ぞさきだちて死にける。また（父イ）母が命つきて臥せるをもしらずして、いとけなき子のその乳房に吸いつきつ、ふせるなどもありけり。仁和寺に、慈尊院の大蔵卿隆暁法印という人、かくしつ、かずしらず死ぬることをかなしみて、ひじりをあまたかたらひつ、その死首の見ゆるごとに、額に阿字を書きて、縁をむすばしむるわざをなむせられける。その人数を知らむとて、四五両月がほどかぞへたりければ、京の中、一条より南、九条より北、京極より西、朱雀より東、道のほとりにある頭、すべて四万二千三百あまりなむありける。いわむやその前後に死ぬるもの多く、河原、白河、にしの京、もろもろの辺地などをくわえていわ際限もあるべからず。いかにいわむや、諸国七道をや。近くは崇徳院の御位のとき、長承のころかとよ、かるためしはありけると聞けど、その世のありさまは知らず。まのあたりいとめづらかに、かなしかりしことなり。』また元暦二年のころ、おほないふること侍りき。そのさまよのつねならず。山くづれて川を埋み、海かたぶきて陸をひたせり。土さけて水わきあがり、いわほわれて谷にまろび入り、なぎさこぐふねは浪にたよひ、道ゆく駒は足のたちどをまどわせり。いわむや都のほとりには、在所堂舍廟塔、一つとして全からず。あるいはくづれ、あるいはたふれた（ぬイ）る間、塵灰立ちあがりて盛なる煙のごとし。地のふるい家のやぶる音、いかづちにことならず。家の中に居れば忽にうちひしげなむとす。はしり出ずればまた地われさく。羽なければ空へもあがるべからず。竜ならねば雲にのぼらむこと難し。おそれの中におそるべかりけるは、た地震なりけるとぞ覚え侍りし。その中に、あるものふのひとり子の、六つ七つばかりに侍りしが、ついぢのおおいの下に小家をつくり、はかなげなるあとなしごとをして遊び侍りしが、俄にくづれうめられて、あとかたなくひらにうちひさがれて、二つの目などちょっとばかりうち出されたるを、父母かえて、声もをしまずかなしみあいて侍りしこそあはれにかなしく見はべりしか。子のかなしみにはたけきものも耻を忘れけりと覚えて、いとおしくことわりかなとぞ見はべりし。かくおびたしくふることはしばしにて止みにしかども、そのなごりしばしば絶えず。よのつねにおどろくほどの地震、二三十度ふらぬ日はなし。十日廿日過ぎにしかば、やうやうまどほになりて、あるいは四五度、二三度、もしは一日まぜ、二三日に一度など、大かたそのなごり、三月ばかりや侍りけむ。四大種の中に、水火風はつねに害をなせど、大地に至りては殊なる変をなさず。むかし斉衡のころかとよ。おほないふりて、東大寺の仏のみぐし落ちなどして、いみじきことも侍りけれど、なおこのたびにはしかずとぞ。すなわち人皆あじきなきことを述べて、いさか心のにごりもうすらぐと見えしほどに、月日かさなり年越えしかば、後は言の葉にかけて、いい出ずる人だになし。』すべて世のありにくきこと、わが身とすみかとの、はかなくあだなるさまかくのごとし。いわむや所により、身のほどにしたがいて、心をなやますこと、あげてかぞふべからず。もしおのずから身かずならずして、権門のかたはらにいるものは深く悦ぶことあれども、大にたのしぶにあたはず。なげきある時も声をあげて泣くことなし。進退やすからず、たちいにつけて恐れをのくさま、たとえば、雀の鷹の巣に近ずけるがごとし。もし貧しくして富める家の隣におるものは、朝夕すぼき姿を耻ぢてへつらいつ出で入る妻子、僮僕のうらやめるさまを見るにも、富める家のひとのないがしろなるけしきを聞くにも、心念にうごきて時としてやすからず。もしせばき地に居れば、近く炎上する時、その害をのがることなし。もし辺地にあれば、往反わずらい多く、盗賊の難はなれがたし。いきほひあるものは貪欲ふかく、ひとり身なるものは人にかろしめらる。宝あればおそれ多く、貧しければなげき切なり。人を頼めば身他のやつことなり、人をはごくめば心恩愛につかわる。世にしたがえば身くるし。またしたがわねば狂えるに似たり。いずれの所をしめ、いかなるわざをしてか、しばしもこの身をやどし玉ゆらも心をなぐさむべき。』我が身、父の方の祖母の家をつたえて、久しく彼所に住む。そののち縁かけ、身おとろえて、しのぶかたがたしげかりしかば、ついにあととむることを得ずして、三十余にして、更に我が心と一の庵をむすぶ。これをありしすまひになずらふるに、十分が一なり。た居屋ばかりをかまえて、はかばかしくは屋を造るにおよばず。わずかについひぢをつけりといえども、門たつるたづきなし。竹を柱として、車やどりとせり。雪ふり風吹くごとに、危ふからずしもあらず。所は河原近ければ、水の難も深く、白波のおそれもさわがし。すべてあらぬ世を念じ過ぐしつ、心をなやませることは、三十余年なり。その間をりをりのたがいめに、おのずから短き運をさとりぬ。すなわち五十の春をむかえて、家をいで世をそむけり。もとより妻子なければ、捨てがたきよすがもなし。身に官禄あらず、何につけてか執おとめむ。むなしく大原山の雲にふして、またいくそばくの春秋をかえぬる。』こに六十の露消えがたに及びて、さらに末葉のやどりを結べることあり。いわ狩人のひとよの宿をつくり、老いたるかひこのまゆをいとなむがごとし。これを中ごろのすみかになずらふれば、また百分が一にだもおよばず。とかくいふ程に、よはひは年にかたぶき、すみかはおりをりにせばし。その家のありさまよのつねにも似ず、広さはわずかに方だけ、高さは七尺が内なり。所をおもい定めざるがゆえに、地をしめて造らず。土居をくみ、うちおおいをふきて、つぎめごとにかけがねをかけたり。もし心にかなはぬことあらば、やすく外へうつさむがためなり。そのあらため造るとき、いくばくのわずらいかある。積むところわずかに二輌なり。車の力をむくゆるほかは、更に他の用途いらず。いま日野山の奥にあとをかくして後、南にかりの日がくしをさし出して、竹のすのこを敷き、その西に閼伽棚を作り、うちには西の垣に添えて、阿弥陀の画像を安置したてまつりて、落日をうけて、眉間のひかりとす。かの帳のとびらに、普賢ならびに不動の像をかけたり。北の障子の上に、ちいさき棚をかまえて、黒き皮篭三四合を置く。すなわち和歌、管弦、往生要集ごときの抄物を入れたり。傍にこと、琵琶、おのおの一張をたつ。いわゆるをりごと、つき琵琶これなり。東にそへて、わらびのほどろを敷き、つかなみを敷きて夜の床とす。東の垣に窓をあけて、こにふづくえを出せり。枕の方にすびつあり。これを柴折りくぶるよすがとす。庵の北に少地をしめ、あばらなるひめ垣をかこひて園とす。すなわちもろもろの薬草をうえたり。かりの庵のありさまかくのごとし。その所のさまをいわ、南にかけひあり、岩をたみて水をためたり。林軒近ければ、つま木を拾うにともしからず。名を外山という。まさきのかづらあとをうずめり。谷しげれど、にしは晴れたり。観念のたよりなきにしもあらず。春は藤なみを見る、紫雲のごとくして西のかたに匂う。夏は郭公をきく、かたらふごとに死出の山路をちぎる。秋は日ぐらしの声耳に充てり。うつせみの世をかなしむかと聞ゆ。冬は雪をあはれむ。つもりきゆるさま、罪障にたとえつべし。もしねんぶつものうく、どきやうまめならざる時は、みずから休み、みずからをこたるにさまたぐる人もなく、また耻づべき友もなし。殊更に無言をせざれども、ひとり居ればくごふをおさめつべし。必ず禁戒をまもるとしもなけれども、境界なければ何につけてか破らむ。もしあとの白波に身をよするあしたには、岡のやに行きかふ船をながめて、満沙弥が風情をぬすみ、もし桂の風、葉をならすゆふべには、潯陽の江をおもいやりて、源都督（経信）のながれをなろう。もしあまりの興あれば、しばしば松のひきに秋風の楽をたぐへ、水の音に流泉の曲をあやつる。芸はこれったなけれども、人の耳を悦ばしめむとにもあらず。ひとりしらべ、ひとり詠じて、みずから心を養うばかりなり。』また麓に、一つの柴の庵あり。すなわちこの山もりがいる所なり。かしこに小童あり、時来りてあひとぶらふ。もしつれづれなる時は、これを友としてあそびありく。かれは十六歳、われは六十、その齡ことの外なれど、心を慰むることはこれおなじ。あるはつばなをぬき、いわなしをとる（りイ）。またぬかごをもり、芹をつむ。あるいはすそわの田井に至りて、おちほを拾いてほぐみをつくる。もし日うらかなれば、嶺によぢのぼりて、はるかにふるさとの空を望み。木幡山、伏見の里、鳥羽、羽束師を見る。勝地はぬしなければ、心を慰むるにさわりなし。あゆみわづらひなく、志遠くいたる時は、これより峯つき炭山を越え、笠取を過ぎて、岩間にまうで、あるいは石山をおがむ。もしは粟津の原を分けて、蝉丸翁が迹をとぶらひ、田上川をわたりて、猿丸大夫が墓をたづぬ。帰るさには、をりにつけつ桜をかり、紅葉をもとめ、わらびを折り、木の実を拾いて、かつは仏に奉りかつは家づとにす。もし夜しづかなれば、窓の月に故人を忍び、猿の声に袖をうるおす。くさむらの蛍は、遠く真木の島の篝火にまがい、暁の雨は、おのずから木の葉吹くあらしに似たり。山鳥のほろほろと鳴くを聞きても、父か母かとうたがい、みねのかせきの近くなれたるにつけても、世にとほざかる程を知る。あるいは埋火をかきおこして、老の寝覚の友とす。おそろしき山ならねど、ふくろうの声をあはれむにつけても、山中の景気、折につけてつくることなし。いわむや深く思い、深く知れらむ人のためには、これにしもかぎるべからず。大かたこの所に住みそめし時は、あからさまとおもいしかど、今ま（すイ）でに五とせを経たり。仮の庵もやふる屋となりて、軒にはくちばふかく、土居に苔むせり。おのずから事のたよりに都を聞けば、この山にこもりいて後、やごとなき人の、かくれ給えるもあまた聞ゆ。ましてその数ならぬたぐい、つくしてこれを知るべからず。たびたびの炎上にほろびたる家、またいくそばくぞ。たかりの庵のみ、のどけくしておそれなし。ほどせばしといえども、夜臥す床あり、ひるいる座あり。一身をやどすに不足なし。がうなはちいさき貝をこのむ、これよく身をしるによりてなり。みさごは荒磯にいる、則ち人をおそるが故なり。我またかくのごとし。身を知り世を知れらば、願わずまじらはず、たしづかなるをのぞみとし、うれえなきをたのしみとす。すべて世の人の、すみかを作るならひ、かならずしも身のためにはせず。あるいは妻子眷属のために作り、あるいは親昵朋友のために作る。あるいは主君、師匠および財寳、馬牛のためにさえこれをつくる。我今、身のためにむすべり、人のために作らず。ゆえいかんとなれば、今の世のならい、この身のありさま、ともなうべき人もなく、たのむべきやつこもなし。たとい広く作れりとも、誰をかやどし、誰おかすえむ。』それ人の友たるものは富めるをたふとみ、ねんごろなるを先とす。かならずしも情あると、すぐなるとをば愛せず、た糸竹花月を友とせむにはしかじ。人のやつこたるものは賞罰のはなはだしきを顧み、恩の厚きを重くす。更にはごくみあわれぶといえども、やすく閑なるをばねがわず、た我が身を奴婢とするにはしかず。もしなすべきことあれば、すなわちおのずから身をつかう。たゆからずしもあらねど、人をしたがえ、人をかえりみるよりはやすし。もしありくべきことあれば、みずから歩む。くるしといえども、馬鞍牛車と心をなやますにはしか（二字似イ）ず。今ひと身をわかちて。二つの用をなす。手のやつこ、足ののり物、よくわが心にかなへり。心また身のくるしみを知れば、くるしむ時はやすめつ、まめなる時はつかう。つかうとてもたびたび過さず、ものうしとても心をうごかすことなし。いかにいわむや、常にありき、常に働（動イ）くは、これ養生なるべし。なんぞいたずらにやすみいらむ。人を苦しめ人を悩ますはまた罪業なり。いか他の力をかるべき。』衣食のたぐいまたおなじ。藤のころも、麻のふすま、得るに随いてはだへをかくし。野辺のつばな、嶺の木の実、わずかに命をつぐばかりなり。人にまじらはざれば、姿を耻づる悔もなし。かてともしければおろそかなれども、なお味をあまくす。すべてかようのこと、楽しく富める人に対していうにはあらず、たわが身一つにとりて、昔と今とをたくらぶるばかりなり。大かた世をのがれ、身を捨てしより、うらみもなくおそれもなし。命は天運にまかせて、をしまずいとはず、身をば浮雲になずらへて、たのまずまだしとせず。一期のたのしみは、うたねの枕の上にきはまり、生涯の望は、をりをりの美景にのこれり。』それ三界は、た心一つなり。心もし安からずば、牛馬七珍もよしなく、宮殿楼閣も望なし。今さびしきすまひ、ひとまの庵、みずからこれを愛す。おのずから都に出では、乞食となれることをはづといえども、かえりてこにいる時は、他の俗塵に着することをあはれぶ。もし人このいえることをうたがは、魚と鳥との分野を見よ。魚は水に飽かず、魚にあらざればその心をいかでか知らむ。鳥は林をねがう、鳥にあらざればその心をしらず。閑居の気味もまたかくのごとし。住まずしてたれかさとらむ。』そもそも一期の月影かたぶきて余算山のはに近し。忽に三途のやみにむかはむ時、何のわざをかかこたむとする。仏の人を教え給うおもむきは、ことにふれて執心なかれとなり。今草の庵を愛するもとがとす、閑寂に着するもさわりなるべし。いか用なきたのしみをのべて、むなしくあたら時を過さむ。』しづかなる暁、このことわりを思いつけて、みずから心に問いていわく、世をのがれて山林にまじわるは、心をおさめて道を行はむがためなり。しかるを汝が姿はひじりに似て、心はにごりにしめり。すみかは則ち浄名居士のあとをけがせりといえども、たもつ所はわずかに周梨槃特が行にだも及ばず。もしこれ貧賎の報のみずからなやますか、はたまた盲心のいたりてくるはせるか、その時ころ更に答ふることなし。たたかたはらに舌根をやといて不請の念仏、両三返を申してやみぬ。時に建暦の二とせ、弥生の戒日比、桑門蓮胤、外山の庵にしてこれをしるす。", "「月かげは入る山の端もつらかりきたえぬひかりをみるよしもがな」。"]}, {"no": 45, "title": "星めぐりの歌", "author": "宮沢 賢治", "category": "日本文学-詩　絵本", "chars": 134, "volume": "小", "paras": ["あかいめだまの　さそり", "ひろげた鷲の　　つばさ", "あをいめだまの　小いぬ、", "ひかりのへびの　とぐろ。", "オリオンは高く　うたひ", "つゆとしもとを　おとす、", "アンドロメダの　くもは", "さかなのくちの　かたち。", "大ぐまのあしを　きたに", "五つのばした　　ところ。", "小熊のひたいの　うへは", "そらのめぐりの　めあて。"]}, {"no": 46, "title": "舞姫", "author": "森 鴎外", "category": "日本文学-物語", "chars": 18308, "volume": "中", "paras": ["石炭をば早（は）や積み果てつ。中等室の卓（つくえ）のほとりはいと静にて、熾熱灯（しねつとう）の光の晴れがましきも徒（いたずら）なり。今宵は夜毎にここに集い来る骨牌（カルタ）仲間も「ホテル」に宿りて、舟に残れるは余 一人（ひとり）のみなれば。", "五年前（いっとせまへ）の事なりしが、平生（ひごろ）の望足りて、洋行の官命を蒙（こうむ）り、このセイゴンの港まで来（こ）し頃は、目に見るもの、耳に聞くもの、一つとして新（あらた）ならぬはなく、筆に任せて書き記（しる）しつる紀行文日ごとに幾千言をかなしけむ、当時の新聞に載せられて、世の人にもてはやされしかど、今日（きょう）になりておもえば、稚（おさな）き思想、身の程（ほど）知らぬ放言、さらぬも尋常（よのつね）の動植金石、さては風俗などをさえ珍しげにしるししを、心ある人はいかにか見けむ。こたびは途に上りしとき、日記（にき）ものせむとて買いし冊子（さつし）もまだ白紙のままなるは、ドイツ（ドイツ）にて物学びせし間（ま）に、一種の「ニル、アドミラリイ」の気象をや養い得たりけむ、あらず、これには別に故あり。", "げに東（ひんがし）に還（かへ）る今の我は、西に航せし昔の我ならず、学問こそなお（なほ）心に飽き足らぬところも多かれ、浮世のうきゅうしをも知りたり、人の心の頼みがたきは言うも更なり、われとわが心さえ変り易きをも悟り得たり。きのうのこれはきょうの非なるわが瞬間の感触を、筆に写して誰（たれ）にか見せむ。これや日記の成らぬ縁故なる、あらず、これには別に故あり。", "嗚呼（ああ）、ブリンヂイシイの港を出（い）でてより、早や二十日（はつか）あまりを経ぬ。世の常ならば生面（せいめん）の客にさえ交（まじわり）を結びて、旅の憂さを慰めあふが航海の習（ならひ）なるに、微恙（びやう）にことよせて房（へや）の裡（うち）にのみ篭（こも）りて、同行の人々にも物言うことの少きは、人知らぬ恨に頭（かしら）のみ悩ましたればなり。この（この）恨は初め一抹の雲のごとく我（わが）心を略（かす）めて、スイス（スイス）の山色をも見せず、イタリア（イタリア）の古跡にも心を留めさせず、中頃は世を厭（いと）ひ、身をはかなみて、腸（はらわた）日ごとに九回すともいうべき惨痛をわれに負わせ、今は心の奥に凝り固まりて、一点の影（かげ）とのみなりたれど、文（ふみ）読むごとに、物見るごとに、鏡に映る影、声に応ずる響のごとく、限なき懐旧の情を喚び起して、幾度（いくたび）となく我心を苦む。嗚呼、いかにしてかこの恨を消（せう）せむ。若（も）し外（ほか）の恨なりせば、詩に詠じ歌によめる後は心地（ここち）すがすがしくもなりなむ。これのみは余りに深く我心に彫（え）りつけられたればさはあらじと思えど、今宵はあたりに人もなし、房奴（ばうど）の来て電気線の鍵を捩（ひね）るにはなお程もあるべければ、いで、その概略を文に綴りて見む。", "余は幼き比（ころ）より厳しき庭の訓（をしへ）を受けし甲斐（かひ）に、父をば早く喪（うしな）ひつれど、学問の荒（すさ）み衰ふることなく、旧藩の学館にありし日も、東京に出でて予備黄（よびくわう）に通いしときも、大学法学部に入りし後も、太田 豊太郎（とよたろう）という名はいつも一級の首（はじめ）にしるされたりしに、一人子（ひとりご）の我を力になして世を渡る母の心は慰みけらし。十九の歳には学士の称を受けて、大学の立ちてよりその頃までにまたなき名誉なりと人にも言われ、某（なにがし）省に出仕して、故郷なる母を都に呼び迎え、楽しき年を送ること三とせばかり、官長の覚え殊（こと）なりしかば、洋行して一課の事務を取り調べよとの命を受け、我名を成さむも、我家を興さむも、今ぞとおもう心の勇み立ちて、五十を踰（こ）えし母に別るるをもさまで悲しとは思わず、遥々（はるばる）と家を離れてベルリンの都に来ぬ。", "余は模糊（もこ）たる功名の念と、検束に慣れたる勉強力とを持ちて、忽（たちま）ちこのヨーロッパ（ヨオロツパ）の新大都の中央に立てり。何等（なんら）の光彩ぞ、我目を射むとするは。何等の色沢ぞ、我心を迷はさむとするは。菩提樹下と訳するときは、幽静なる境（さかひ）なるべく思わるれど、この大道 髪（かみ）のごときウンテル、デン、リンデンに来て両辺なる石だたみの人道を行く隊々（くみくみ）の士女を見よ。胸張り肩 聳（そび）えたる士官の、まだ維廉（イルヘルム）一世の街に臨める（まど）に倚（よ）り玉ふ頃なりければ、様々の色に飾り成したる礼装をなしたる、妍（かほよ）き少女（おとめ）のパリ（パリー）まねびの粧（よそおい）したる、彼もこれも目を驚かさぬはなきに、車道の土瀝青（チヤン）の上を音もせで走るいろいろの馬車、雲に聳ゆる楼閣の少しとぎれたる処（ところ）には、晴れたる空に夕立の音を聞かせて漲（みなぎ）り落つる噴井（ふきい）の水、遠く望めばブランデンブルク門を隔てて緑樹枝をさし交（か）はしたる中より、半天に浮び出でたる凱旋塔の神女の像、この許多（あまた）の景物 目睫（もくせふ）の間に集（あっ）まりたれば、始めてここに来（こ）しものの応接に遑（いとま）なきも宜（うべ）なり。されど我胸には縦（たと）ひいかなる境に遊びても、あだなる美観に心をば動さじの誓ありて、つねに我を襲う外物を遮（さえぎ）り留めたりき。", "余が鈴索（すずなは）を引き鳴らして謁（えっ）を通じ、おほやけの紹介状を出だして東来の意を告げし普魯西（プロシヤ）の官員は、皆快く余を迎え、公使館よりの手つづきだに事なく済みたらましかば、何事にもあれ、教えもし伝へもせむと約しき。喜ばしきは、わが故里（ふるさと）にて、ドイツ、フランス（フランス）の語を学びしことなり。彼等は始めて余を見しとき、いづくにていつの間にかくは学び得つると問わぬことなかりき。", "さて官事の暇（いとま）あるごとに、かねておほやけの許をば得たりければ、ところの大学に入りて政治学を修めむと、名を簿冊（ぼさつ）に記させつ。", "ひと月ふた月と過す程に、おほやけの打合せも済みて、取調も次第に捗（はかど）り行けば、急ぐことをば報告書に作りて送り、さらぬをば写し留めて、ついには幾巻（いくまき）をかなしけむ。大学のかたにては、稚き心に思い計りしがごとく、政治家になるべき特科のあるべうもあらず、このか彼かと心迷いながらも、二三の法家の講筵（こうえん）に列（つらな）ることにおもい定めて、謝金を収め、往きて聴きつ。", "かくて三年（みとせ）ばかりは夢のごとくにたちしが、時来れば包みても包みがたきは人の好なおなるらむ、余は父の遺言を守り、母の教に従い、人の神童なりなど褒（ほ）むるが嬉しさに怠らず学びし時より、官長の善き働き手を得たりと奨（はげ）ますが喜ばしさにたゆみなく勤めし時まで、ただ所動的、器械的の人物になりて自ら悟らざりしが、今二十五歳になりて、すでに久しくこの自由なる大学の風に当りたればにや、心の中なにとなく妥（おだやか）ならず、奥深く潜みたりしまことの我は、やうやう表にあらわれて、きのうまでの我ならぬ我を攻むるに似たり。余は我身の今の世に雄飛すべき政治家になるにも宜（よろ）しからず、また善く法典を暗（そらん）じて獄を断ずる法律家になるにもふさはしからざるを悟りたりと思いぬ。", "余は私（ひそか）に思うやう、我母は余を活（い）きたる辞書となさんとし、我官長は余を活きたる法律となさんとやしけん。辞書たらむはなお堪ふべけれど、法律たらんは忍ぶべからず。今までは瑣々（ささ）たる問題にも、極めて丁寧（ていねい）にいらへしつる余が、この頃より官長に寄する書には連（しき）りに法制の細目に拘（かかづら）ふべきにあらぬを論じて、一たび法の精神をだに得たらんには、紛々たる万事は破竹のごとくなるべしなどと広言しつ。また大学にては法科の講筵を余所（よそ）にして、歴史文学に心を寄せ、漸く蔗（しょ）を嚼（か）む境に入りぬ。", "官長はもと心のままに用いるべき器械をこそ作らんとしたりけめ。独立の思想を懐（いだ）きて、人なみならぬ面（おも）もちしたる男をいかでか喜ぶべき。危きは余が当時の地位なりけり。されどこれのみにては、なお我地位を覆（くつが）へすに足らざりけんを、日比（ひごろ）ベルリン（ベルリン）の留学生の中（うち）にて、ある勢力ある一群（ひとむれ）と余との間に、面白からぬ関係ありて、彼人々は余を猜疑（さいぎ）し、また 遂（つい）に余を讒誣（ざんぶ）するに至りぬ。されどこれとてもその故なくてやは。", "彼人々は余が倶（とも）に麦酒（ビイル）の杯をも挙げず、球突きの棒（キユウ）をも取らぬを、かたくななる心と欲を制する力とに帰して、且（かつ）は嘲（あざけ）り且は嫉（ねた）みたりけん。されどこは余を知らねばなり。嗚呼、この故よしは、我身だに知らざりしを、怎（いか）でか人に知らるべき。わが心はかの合歓（ねむ）という木の葉に似て、物 触（さや）れば縮みて避けんとす。我心は処女に似たり。余が幼き頃より長者の教を守りて、学（まなび）の道をたどりしも、仕（つかえ）の道をあゆみしも、皆な勇気ありて能（よ）くしたるにあらず、耐忍勉強の力と見えしも、皆な自ら欺き、人をさえ欺きつるにて、人のたどらせたる道を、ただ（た）だ一条（ひとすぢ）にたどりしのみ。余所に心の乱れざりしは、外物を棄てて顧みぬ程の勇気ありしにあらず、ただ（ただ）外物に恐れて自らわが手足を縛せしのみ。故郷を立ちいづる前にも、我が有為の人物なることを疑わず、また我心の能く耐えんことをも深く信じたりき。嗚呼、彼も一時。舟の横浜を離るるまでは、天晴（あっぱれ）豪傑と思いし身も、せきあえぬ涙に手巾（しゆきん）を濡らしつるを我れながら（なが）ら怪しと思いしが、これぞなか／＼に我本性なりける。この心は生れながらにやありけん、また早く父を失いて母の手に育てられしによりてや生じけん。", "彼（かの）人々の嘲るはさることなり。されど嫉むはおろかならずや。この弱くふびんなる心を。", "赤く白く面（おもて）を塗りて、赫然（かくぜん）たる色の衣を纏（まと）ひ、珈琲店（カツフエエ）に座して客を延（ひ）く女（をみな）を見ては、往きてこれに就かん勇気なく、高き帽を頂き、眼鏡に鼻を挟ませて、普魯西（プロシヤ）にては貴族めきたる鼻音にて物言う「レエベマン」を見ては、往きてこれと遊ばん勇気なし。この等の勇気なければ、彼活発なる同郷の人々と交らんようもなし。この交際の疎（うと）きがために、彼人々はただ余を嘲り、余を嫉むのみならで、また余を猜疑することとなりぬ。これぞ余が冤罪（えんざい）を身に負いて、暫時の間に無量の艱難（かんなん）を閲（けみ）し尽す媒（なかだち）なりける。", "ある日の夕暮なりしが、余は獣苑を漫歩して、ウンテル、デン、リンデンを過ぎ、我がモンビシユウ街の僑居（けうきよ）に帰らんと、クロステル巷（こう）の古寺の前に来ぬ。余は彼の灯火（ともしび）の海を渡り来て、この狭く薄暗き巷（こうぢ）に入り、楼上の木欄（おばしま）に干したる敷布、襦袢（はだぎ）などまだ取入れぬ人家、頬髭長き猶太（ユダヤ）教徒の翁（おきな）が戸前（こぜん）に佇（たたず）みたる居酒屋、一つの梯（はしご）は直ちに楼（たかどの）に達し、他の梯は窖（あなぐら）住まいの鍛冶（かぢ）が家に通じたる貸家などに向いて、凹字（あふじ）の形に引篭みて立てられたる、この三百年前の遺跡を望む毎に、心の恍惚となりて暫したたずみしこと幾度なるを知らず。", "今この処を過ぎんとするとき、鎖（とざ）したる寺門の扉に倚りて、声を呑みつつ泣くひとりの少女（おとめ）あるを見たり。年は十六七なるべし。被（かむ）りし巾（きれ）を洩れたる髪の色は、薄きこがね色にて、着たる衣は垢つき汚れたりとも見えず。我足音に驚かされてかえりみたる面（おもて）、余に詩人の筆なければこれを写すべくもあらず。この青く清らにて物問いたげに愁（うれい）を含める目（まみ）の、半ば露を宿せる長き睫毛（まつげ）に援（おほ）はれたるは、なぜに一顧したるのみにて、用心深き我心の底までは徹したるか。", "彼は料（はか）らぬ深き嘆きに遭（あ）ひて、前後を顧みる遑（いとま）なく、ここに立ちて泣くにや。わが憶病なる心は憐憫（れんびん）の情に打ち勝たれて、余は覚えず側（そば）に倚り、「なぜに泣き玉ふか。ところに繋累（けいるい）なき外人（よそびと）は、却（かへ）りて力を借し易きこともあらん。」といい掛けたるが、我ながらわが大胆なるに呆（あき）れたり。", "彼は驚きてわが黄なる面を打守りしが、我が真率なる心や色に形（あら）はれたりけん。「君は善き人なりと見ゆ。彼のごとく酷（むご）くはあらじ。また（ま）た我母のごとく。」暫し枯れたる涙の泉はまた溢れて愛らしき頬（ほ）を流れ落つ。", "「我を救い玉へ、君。わが恥なき人とならんを。母はわが彼の言葉に従はねばとて、我を打ちき。父は死にたり。明日（あす）は葬らでは　　（かな）はぬに、家に一銭の貯（たくはへ）だになし。」", "跡は欷歔（ききよ）の声のみ。我 眼（まなこ）はこのうつむきたる少女の顫（ふる）ふ項（うなじ）にのみ注がれたり。", "「君が家（や）に送り行かんに、先（ま）づ心を鎮（しづ）め玉へ。声をな人に聞かせ玉ひそ。ここは往来なるに。」彼は物語するうちに、覚えず我肩に倚りしが、この時ふと頭（かしら）を抬（もた）げ、また始てわれを見たるがごとく、恥じて我側を飛びのきつ。", "人の見るが厭わしさに、早足に行く少女の跡に付きて、寺の筋向いなる大戸を入れば、欠け損じたる石の梯あり。これを上ぼりて、四階目に腰を折りて潜るべき程の戸あり。少女は（さ）びたる針金の先きを捩（ね）ぢ曲げたるに、手を掛けて強く引きしに、中には咳枯（しはが）れたる老媼（おうな）の声して、「誰（た）ぞ」と問う。エリス帰りぬと答ふる間もなく、戸をあららかに引開（ひきあ）けしは、半ば白（しら）みたる髪、悪（あ）しき相にはあらねど、貧苦の痕を額（ぬか）に印せし面の老媼にて、古き獣綿の衣を着、汚れたる上靴を穿（は）きたり。エリスの余に会釈して入るを、かれは待ち兼ねしごとく、戸を劇（はげ）しくたて切りつ。", "余は暫し茫然として立ちたりしが、ふと油灯（ラムプ）の光に透して戸を見れば、エルンスト、ワイゲルトと漆（うるし）もて書き、下に仕立物師と注したり。これすぎぬという少女が父の名なるべし。内には言い争うごとき声聞えしが、また静になりて戸は再び明きぬ。さきの老媼は慇懃（いんぎん）におのが無礼の振舞せしを詫（わ）びて、余を迎え入れつ。戸の内は厨（くりや）にて、右手（めて）の低き「窓／心」に、真白（ましろ）に洗いたる麻布を懸けたり。左手（ゆんで）には粗末に積上げたる練瓦の竃（かまど）あり。正面の一室の戸は半ば開きたるが、内には白布（しらぬの）を援へる臥床（ふしど）あり。伏したるはなき人なるべし。竃の側なる戸を開きて余を導きつ。この処はいわゆる（いわゆる）「マンサルド」の街に面したる一間（ひとま）なれば、天井もなし。隅の屋根裏より向いて斜に下れる梁（はり）を、紙にて張りたる下の、立たば頭（かしら）の支（つか）ふべき処に臥床あり。中央なる机には美しき氈（かも）を掛けて、上には書物一二巻と写真帳とを列（なら）べ、陶ビン（たうえい）にはここに似合わしからぬ価（あたひ）高き花束を生けたり。そが傍（かたはら）に少女は羞（はぢ）を帯びて立てり。", "彼は優（すぐ）れて美なり。乳（ち）のごとき色の顔は灯火に映じて微紅（うすくれない）を潮（さ）したり。手足の繊（かぼそ）く（たおやか）なるは、貧家の女（をみな）に似ず。老媼の室（へや）を出でし跡にて、少女は少し訛（なま）りたる言葉にていう。「許し玉へ。君をここまで導きし心なさを。君は善き人なるべし。我をばよも憎み玉はじ。明日に迫るは父の葬（ほうり）、たのみに思いしシヤウムベルヒ、君は彼を知らでやおはさん。彼は「イクトリア」座の座頭（ざがしら）なり。彼が抱えとなりしより、早や二年（ふたとせ）なれば、事なく我等を助けんと思いしに、人の憂に付けこみて、身勝手なるいひ掛けせんとは。我を救い玉へ、君。金をば薄き給金を析（さ）きて還し参らせん。例え（よしや）我身は食（くら）はずとも。それもならずば母の言葉に。」彼は涙ぐみて身をふるわせたり。その見上げたる目（まみ）には、人に否（いな）とはいわせぬ媚態あり。この目の働きは知りてするにや、また自らは知らぬにや。", "我が隠しには二三「マルク」の銀貨あれど、それにて足るべくもあらねば、余は時計をはずして机の上に置きぬ。「これにて一時の急を凌（しの）ぎ玉へ。質屋の使のモンビシユウ街三番地にて太田と尋ね来（こ）ん折には価を取らすべきに。」", "少女は驚き感ぜしさま見えて、余が辞別（わかれ）のために出（いだ）したる手を唇にあてたるが、はらはらと落つる熱き涙（なんだ）を我手の背（そびら）に濺（そそ）ぎつ。", "嗚呼、何等の悪因ぞ。この恩を謝せんとて、自ら我 僑居（けうきよ）に来（こ）し少女は、シヨオペンハウエルを右にし、シルレルを左にして、終日（ひねもす）兀座（こつざ）する我読書の下（そうか）に、一輪の名花を咲かせてけり。この時を始として、余と少女との交（まじわり）漸く繁くなりもて行きて、同郷人にさえ知られぬれば、彼等は速了（そくれう）にも、余を以（も）て色を舞姫の群に漁（ぎよ）するものとしたり。われ等 二人（ふたり）の間にはまだ痴（ちがい）なる歓楽のみ存したりしを。", "その名を斥（さ）さんは憚（はばかり）あれど、同郷人の中に事を好む人ありて、余がしばしば　芝居に出入して、女優と交るということを、官長の許（もと）に報じつ。さらぬだに余が頗（すこぶ）る学問の岐路（きろ）に走るを知りて憎み思いし官長は、ついに旨を公使館に伝えて、我官を免じ、我職を解いたり。公使がこの命を伝うる時余に謂（い）ひしは、御身（おんみ）もし即時に郷に帰らば、路用を給すべけれど、もしなおここに在らんには、公の助をば仰ぐべからずとのことなりき。余は一週日の猶予を請いて、とやこうと思い煩ううち、我生涯にて尤（もっと）も悲痛を覚えさせたる二通の書状に接しぬ。この二通はほとんど同時にいだししものなれど、一は母の自筆、一は親族なる某（なにがし）が、母の死を、我がまたなく慕う母の死を報じたる書（ふみ）なりき。余は母の書中の言をここに反覆するに堪えず、涙の迫り来て筆の運（はこび）を妨ぐればなり。", "余とエリスとの交際は、この時までは余所目（よそめ）に見るより清白なりき。彼は父の貧きがために、充分なる教育を受けず、十五の時舞の師のつのりに応じて、この恥ずかしき業（わざ）を教えられ、「クルズス」果てて後、「イクトリア」座に出でて、今は場中第二の地位を占めたり。されど詩人ハツクレンデルが当世の奴隷といいしごとく、はかなきは舞姫の身の上なり。薄き給金にて繋がれ、昼の温習、夜の舞台と緊（きび）しく使われ、芝居の化粧部屋に入りてこそ紅粉をも粧ひ、美しき衣をも纏へ、場外にてはひとり身の衣食も足らず勝なれば、親腹からを養うものはその辛苦 奈何（いかに）ぞや。されば彼等の仲間にて、賎（いや）しき限りなる業に堕（お）ちぬは希（まれ）なりとぞいうなる。エリスがこれを（のが）れしは、おとなしき性質と、剛気ある父の守護とに依りてなり。彼は幼き時より物読むことをば流石（さすが）に好みしかど、手に入るは卑しき「コルポルタアジユ」と唱うる貸本屋の小説のみなりしを、余と相識（あひし）る頃より、余が借しつる書を読みならひて、漸く趣味をも知り、言葉の訛（なまり）をも正し、いくほどもなく余に寄するふみにも誤字（あやまりじ）少なくなりぬ。かかれば余等二人の間にはまず師弟の交りを生じたるなりき。我が不時の免官を聞きしときに、彼は色を失いつ。余は彼が身の事に関りしを包み隠しぬれど、彼は余に向いて母にはこれを秘め玉へといいぬ。こは母の余が学資を失いしを知りて余を疎（うと）んぜんを恐れてなり。", "嗚呼、委（くわし）くここに写さんも要なけれど、余が彼を愛（め）づる心の俄（にはか）に強くなりて、ついに離れ難き中となりしはこの折なりき。我一身の大事は前に横（よこたは）りて、誠（まこと）に危急存亡の秋（とき）なるに、この行（おこない）ありしをあやしみ、またた誹（そし）る人もあるべけれど、余がエリスを愛する情は、始めて相見し時よりあさくはあらぬに、いま我 数奇（さくき）を憐み、また別離を悲みて伏し沈みたる面に、鬢（びん）の毛の解けてかかりたる、その美しき、いぢらしき姿は、余が悲痛感慨の刺激によりて常ならずなりたる脳髄を射て、恍惚の間にここに及びしを奈何（いか）にせむ。", "公使に約せし日も近づき、我 命（めい）はせまりぬ。このままにて郷にかへらば、学成らずして汚名を負いたる身の浮ぶ瀬あらじ。さればとて留まらんには、学資を得べき手だてなし。", "この時余を助けしは今我同行の一人なる相沢謙吉なり。彼は東京に在りて、すでに天方伯の秘書官たりしが、余が免官の官報に出でしを見て、某新聞紙の編集長（へんしふちょう）に説きて、余を社の通信員となし、ベルリン（ベルリン）に留まりて政治学芸の事などを報道せしむることとなしつ。", "社の報酬はいうに足らぬほどなれど、生家（すみか）をもうつし、午餐（ひるげ）に往く食店（たべものみせ）をもかえたらんには、微（かすか）なる暮しは立つべし。兎角（とこう）思案する程に、心の誠を顕（あら）はして、助の綱をわれに投げ掛けしはエリスなりき。かれはいかに母を説き動かしけん、余は彼等親子の家に寄寓することとなり、エリスと余とはいつよりとはなしに、有るかなきかの収入を合せて、憂きがなかにも楽しき月日を送りぬ。", "朝の", "（カフエ）果つれば、彼は温習に往き、さらぬ日には家に留まりて、余はキヨオニヒ街の間口せまく奥行のみいと長き休息所に赴（おもむ）き、あらゆる新聞を読み、鉛筆取り出でて彼このと材料を集む。この截（き）り開きたる引「窓心」、より光を取れる室にて、定りたる業（わざ）なき若人（わこうど）、多くもあらぬ金を人に借して己れは遊び暮す老人、取引所の業の隙を偸（ぬす）みて足を休むる商人（あきゅうど）などと臂（ひぢ）を並べ、冷なる石卓（いしづくえ）の上にて、忙はしげに筆を走らせ、小おんなが持て来る一盞（ひとっき）の冷（さ）むるをも顧みず、明きたる新聞の細長き板ぎれに　つくりの縦棒が下に突き抜けている、みたるを、幾種（いくいろ）となく掛け連（つら）ねたるかたへの壁に、いく度となく往来（ゆきき）する日本人を、知らぬ人は何とか見けん。また一時近くなるほどに、温習に往きたる日には返り路（ぢ）によぎりて、余と倶（とも）に店を立出ずるこの常ならず軽き、掌上（しやうじゃう）の舞をもなしえつべき少女を、怪み見送る人もありしなるべし。", "我学問は荒（すさ）みぬ。屋根裏の一灯微に燃えて、エリスが劇場よりかえりて、椅（いす）に寄りて縫ものなどする側の机にて、余は新聞の原稿を書けり。昔しの法令条目の枯葉を紙上に掻寄（かきよ）せしとはことにて、今は活発々たる政界の運動、文学美術に係る新現象の批評など、彼このと結びあはせて、力の及ばん限り、ビヨルネよりはむしろハイネを学びて思を構え、様々の文（ふみ）を作りし中にも、引続きて維廉（イルヘルム）一世と仏得力（フレデリツク）三世との崩「歹＋且」（ほうそ）ありて、新帝の即位、ビスマルク侯の進退 如何（いかん）などの事については、故（ことさ）らに詳（つまびら）かなる報告をなしき。さればこの頃よりは思いしよりも忙はしくして、多くもあらぬ蔵書を繙（ひもと）き、旧業をたづぬることも難く、大学の籍はまだ刪（けづ）られねど、謝金を収むることの難ければ、ただだ一つにしたる講筵だに往きて聴くことは希なりき。", "我学問は荒みぬ。されど余は別に一種の見識を長じき。そをいかにというに、凡（およ）そ民間学の流布（るふ）したることは、欧州諸国の間に
