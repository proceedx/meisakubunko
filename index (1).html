う）だぞ。」", "そうだっとみんなもおもったとき、にわかにうしろのほうで五郎が、", "「わあ、痛いぢゃあ。」と叫びました。", "みんなそっちへ振り向きますと、五郎が耕助に足のゆびをふまれて、まるでおこって耕助をなぐりつけていたのです。すると耕助もおこって、", "「わあ、われ悪くてでひと撲（はだ）いだなあ。」と言ってまた五郎をなぐろうとしました。", "五郎はまるで顔じゅう涙だらけにして耕助に組み付こうとしました。そこで一郎が間へはいって嘉助が耕助を押えてしまいました。", "「わあい、けんかするなったら、先生あちゃんと職員室に来てらぞ。」と一郎が言いながらまた教室のほうを見ましたら、一郎はにわかにまるでぽかんとしてしまいました。", "たったいままで教室にいたあの変な子が影もかたちもないのです。みんなもまるでせっかく友だちになった子うまが遠くへやられたよう、せっかく捕（と）った山雀（やまがら）に逃げられたように思いました。", "風がまたどうと吹いて来て窓ガラスをがたがた言わせ、うしろの山の萱（かや）をだんだん上流のほうへ青じろく波だてて行きました。", "「わあ、うなだけんかしたんだがら又三郎いなぐなったな。」嘉助がおこって言いました。", "みんなもほんとうにそう思いました。五郎はじつに申しわけないと思って、足の痛いのも忘れてしょんぼり肩をすぼめて立ったのです。", "「やっぱりあいつは風の又三郎だったな。」", "「二百十日で来たのだな。」", "「靴（くつ）はいでだたぞ。」", "「服も着でだたぞ。」", "「髪赤くておかしやづだったな。」", "「ありゃありゃ、又三郎おれの机の上さ石かけ乗せでったぞ。」二年生の子が言いました。見るとその子の机の上にはきたない石かけが乗っていたのです。", "「そうだ、ありゃ。あそごのガラスもぶっかしたぞ。」", "「そだないであ。あいづあ休み前に嘉助石ぶっつけだのだな。」", "「わあい。そだないであ。」と言っていたとき、これはまたなんというわけでしょう。先生が玄関から出て来たのです。先生はぴかぴか光る呼び子を右手にもって、もう集まれのしたくをしているのでしたが、そのすぐうしろから、さっきの赤い髪の子が、まるで権現（ごんげん）さまの尾（お）っぱ持ちのようにすまし込んで、白いシャッポをかぶって、先生についてすぱすぱとあるいて来たのです。", "みんなはしいんとなってしまいました。やっと一郎が「先生お早うございます。」と言いましたのでみんなもついて、", "「先生お早うございます。」と言っただけでした。", "「みなさん。お早う。どなたも元気ですね。では並んで。」先生は呼び子をビルルと吹きました。それはすぐ谷の向こうの山へひびいてまたビルルルと低く戻（もど）ってきました。", "すっかりやすみの前のとおりだとみんなが思いながら六年生は一人、五年生は七人、四年生は六人、一二年生は十二人、組ごとに一列に縦にならびました。", "二年は八人、一年生は四人前へならえをしてならんだのです。", "するとその間あのおかしな子は、何かおかしいのかおもしろいのか奥歯で横っちょに舌をかむようにして、じろじろみんなを見ながら先生のうしろに立っていたのです。すると先生は、高田（たかだ）さんこっちへおはいりなさいと言いながら五年生の列のところへ連れて行って、丈（たけ）を嘉助とくらべてから嘉助とそのうしろのきよの間へ立たせました。", "みんなはふりかえってじっとそれを見ていました。", "先生はまた玄関の前に戻って、", "「前へならえ。」と号令をかけました。", "みんなはもう一ぺん前へならえをしてすっかり列をつくりましたが、じつはあの変な子がどういうふうにしているのか見たくて、かわるがわるそっちをふりむいたり横目でにらんだりしたのでした。するとその子はちゃんと前へならえでもなんでも知ってるらしく平気で両腕を前へ出して、指さきを嘉助のせなかへやっと届くくらいにしていたものですから、嘉助はなんだかせなかがかゆく、くすぐったいというふうにもじもじしていました。", "「直れ。」先生がまた号令をかけました。", "「一年から順に前へおい。」そこで一年生はあるき出し、まもなく二年生もあるき出してみんなの前をぐるっと通って、右手の下駄箱（げたばこ）のある入り口にはいって行きました。四年生があるき出すとさっきの子も嘉助のあとへついて大威張りであるいて行きました。前へ行った子もときどきふりかえって見、あとの者もじっと見ていたのです。", "まもなくみんなははきものを下駄箱（げたばこ）に入れて教室へはいって、ちょうど外へならんだときのように組ごとに一列に机にすわりました。さっきの子もすまし込んで嘉助のうしろにすわりました。ところがもう大さわぎです。", "「わあ、おらの机さ石かけはいってるぞ。」", "「わあ、おらの机代わってるぞ。」", "「キッコ、キッコ、うな通信簿持って来たが。おら忘れで来たぢゃあ。」", "「わあい、さの、木ペン借せ、木ペン借せったら。」", "「わあがない。ひとの雑記帳とってって。」", "そのとき先生がはいって来ましたのでみんなもさわぎながらとにかく立ちあがり、一郎がいちばんうしろで、", "「礼。」と言いました。", "みんなはおじぎをする間はちょっとしんとなりましたが、それからまたがやがやがやがや言いました。", "「しずかに、みなさん。しずかにするのです。」先生が言いました。", "「しっ、悦治（えつじ）、やがましったら、嘉助え、喜（き）っこう。わあい。」と一郎がいちばんうしろからあまりさわぐものを一人ずつしかりました。", "みんなはしんとなりました。", "先生が言いました。", "「みなさん、長い夏のお休みはおもしろかったですね。みなさんは朝から水泳ぎもできたし、林の中で鷹（たか）にも負けないくらい高く叫んだり、またにいさんの草刈りについて上（うえ）の野原へ行ったりしたでしょう。けれどももうきのうで休みは終わりました。これからは第二学期で秋です。むかしから秋はいちばんからだもこころもひきしまって、勉強のできる時だといってあるのです。ですから、みなさんもきょうからまたいっしょにしっかり勉強しましょう。それからこのお休みの間にみなさんのお友だちが一人ふえました。それはそこにいる高田さんです。そのかたのおとうさんはこんど会社のご用で上の野原の入り口へおいでになっていられるのです。高田さんはいままでは北海道の学校におられたのですが、きょうからみなさんのお友だちになるのですから、みなさんは学校で勉強のときも、また栗拾（くりひろ）いや魚（さかな）とりに行くときも、高田さんをさそうようにしなければなりません。わかりましたか。わかった人は手をあげてごらんなさい。」", "すぐみんなは手をあげました。その高田とよばれた子も勢いよく手をあげましたので、ちょっと先生はわらいましたが、すぐ、", "「わかりましたね、ではよし。」と言いましたので、みんなは火の消えたように一ぺんに手をおろしました。", "ところが嘉助がすぐ、", "「先生。」といってまた手をあげました。", "「はい。」先生は嘉助を指さしました。", "「高田さん名はなんて言うべな。」", "「高田｜三郎（さぶろう）さんです。」", "「わあ、うまい、そりゃ、やっぱり又三郎だな。」嘉助はまるで手をたたいて机の中で踊るようにしましたので、大きなほうの子どもらはどっと笑いましたが、下の子どもらは何かこわいというふうにしいんとして三郎のほうを見ていたのです。", "先生はまた言いました。", "「きょうはみなさんは通信簿と宿題をもってくるのでしたね。持って来た人は机の上へ出してください。私がいま集めに行きますから。」", "みんなはばたばた鞄（かばん）をあけたりふろしきをといたりして、通信簿と宿題を机の上に出しました。そして先生が一年生のほうから順にそれを集めはじめました。そのときみんなはぎょっとしました。というわけはみんなのうしろのところにいつか一人の大人（おとな）が立っていたのです。その人は白いだぶだぶの麻服を着て黒いてかてかしたはんけちをネクタイの代わりに首に巻いて、手には白い扇をもって軽くじぶんの顔を扇（あお）ぎながら少し笑ってみんなを見おろしていたのです。さあみんなはだんだんしいんとなって、まるで堅くなってしまいました。", "ところが先生は別にその人を気にかけるふうもなく、順々に通信簿を集めて三郎の席まで行きますと、三郎は通信簿も宿題帳もないかわりに両手をにぎりこぶしにして二つ机の上にのせていたのです。先生はだまってそこを通りすぎ、みんなのを集めてしまうとそれを両手でそろえながらまた教壇に戻りました。", "「では宿題帳はこの次の土曜日に直して渡しますから、きょう持って来なかった人は、あしたきっと忘れないで持って来てください。それは悦治さんと勇治（ゆうじ）さんと良作（りょうさく）さんとですね。ではきょうはここまでです。あしたからちゃんといつものとおりのしたくをしておいでなさい。それから四年生と六年生の人は、先生といっしょに教室のお掃除（そうじ）をしましょう。ではここまで。」", "一郎が気をつけ、と言いみんなは一ぺんに立ちました。うしろの大人（おとな）も扇を下にさげて立ちました。", "「礼。」先生もみんなも礼をしました。うしろの大人も軽く頭を下げました。それからずうっと下の組の子どもらは一目散に教室を飛び出しましたが、四年生の子どもらはまだもじもじしていました。", "すると三郎はさっきのだぶだぶの白い服の人のところへ行きました。先生も教壇をおりてその人のところへ行きました。", "「いやどうもご苦労さまでございます。」その大人はていねいに先生に礼をしました。", "「じきみんなとお友だちになりますから。」先生も礼を返しながら言いました。", "「何ぶんどうかよろしくおねがいいたします。それでは。」その人はまたていねいに礼をして目で三郎に合図すると、自分は玄関のほうへまわって外へ出て待っていますと、三郎はみんなの見ている中を目をりんとはってだまって昇降口から出て行って追いつき、二人は運動場を通って川下のほうへ歩いて行きました。", "運動場を出るときその子はこっちをふりむいて、じっと学校やみんなのほうをにらむようにすると、またすたすた白服の大人（おとな）について歩いて行きました。", "「先生、あの人は高田さんのとうさんですか。」一郎が箒（ほうき）をもちながら先生にききました。", "「そうです。」", "「なんの用で来たべ。」", "「上の野原の入り口にモリブデンという鉱石ができるので、それをだんだん掘るようにするためだそうです。」", "「どこらあだりだべな。」", "「私もまだよくわかりませんが、いつもみなさんが馬をつれて行くみちから、少し川下へ寄ったほうなようです。」", "「モリブデン何にするべな。」", "「それは鉄とまぜたり、薬をつくったりするのだそうです。」", "「そだら又三郎も掘るべが。」嘉助が言いました。", "「又三郎だない。高田三郎だぢゃ。」佐太郎が言いました。", "「又三郎だ又三郎だ。」嘉助が顔をまっ赤（か）にしてがん張りました。", "「嘉助、うなも残ってらば掃除（そうじ）してすけろ。」一郎が言いました。", "「わあい。やんたぢゃ。きょう四年生ど六年生だな。」", "嘉助は大急ぎで教室をはねだして逃げてしまいました。", "風がまた吹いて来て窓ガラスはまたがたがた鳴り、ぞうきんを入れたバケツにも小さな黒い波をたてました。", "次の日一郎はあのおかしな子供が、きょうからほんとうに学校へ来て本を読んだりするかどうか早く見たいような気がして、いつもより早く嘉助をさそいました。ところが嘉助のほうは一郎よりもっとそう考えていたと見えて、とうにごはんもたべ、ふろしきに包んだ本ももって家の前へ出て一郎を待っていたのでした。二人は途中もいろいろその子のことを話しながら学校へ来ました。すると運動場には小さな子供らがもう七八人集まっていて、棒かくしをしていましたが、その子はまだ来ていませんでした。またきのうのように教室の中にいるのかと思って中をのぞいて見ましたが、教室の中はしいんとしてだれもいず、黒板の上にはきのう掃除のときぞうきんでふいた跡がかわいてぼんやり白い縞（しま）になっていました。", "「きのうのやつまだ来てないな。」一郎が言いました。", "「うん。」嘉助も言ってそこらを見まわしました。", "一郎はそこで鉄棒の下へ行って、じゃみ［＃「じゃみ」に傍点］上がりというやり方で、無理やりに鉄棒の上にのぼり両腕をだんだん寄せて右の腕木に行くと、そこへ腰掛けてきのう三郎の行ったほうをじっと見おろして待っていました。谷川はそっちのほうへきらきら光ってながれて行き、その下の山の上のほうでは風も吹いているらしく、ときどき萱（かや）が白く波立っていました。", "嘉助もやっぱりその柱の下でじっとそっちを見て待っていました。ところが二人はそんなに長く待つこともありませんでした。それは突然三郎がその下手のみちから灰いろの鞄（かばん）を右手にかかえて走るようにして出て来たのです。", "「来たぞ。」と一郎が思わず下にいる嘉助へ叫ぼうとしていますと、早くも三郎はどてをぐるっとまわって、どんどん正門をはいって来ると、", "「お早う。」とはっきり言いました。みんなはいっしょにそっちをふり向きましたが、一人も返事をしたものがありませんでした。", "それは返事をしないのではなくて、みんなは先生にはいつでも「お早うございます。」というように習っていたのですが、お互いに「お早う。」なんて言ったことがなかったのに三郎にそう言われても、一郎や嘉助はあんまりにわかで、また勢いがいいのでとうとう臆（おく）してしまって一郎も嘉助も口の中でお早うというかわりに、もにゃもにゃっと言ってしまったのでした。", "ところが三郎のほうはべつだんそれを苦にするふうもなく、二三歩また前へ進むとじっと立って、そのまっ黒な目でぐるっと運動場じゅうを見まわしました。そしてしばらくだれか遊ぶ相手がないかさがしているようでした。けれどもみんなきょろきょろ三郎のほうはみていても、やはり忙しそうに棒かくしをしたり三郎のほうへ行くものがありませんでした。三郎はちょっと具合が悪いようにそこにつっ立っていましたが、また運動場をもう一度見まわしました。", "それからぜんたいこの運動場は何間（なんげん）あるかというように、正門から玄関まで大またに歩数を数えながら歩きはじめました。一郎は急いで鉄棒をはねおりて嘉助とならんで、息をこらしてそれを見ていました。", "そのうち三郎は向こうの玄関の前まで行ってしまうと、こっちへ向いてしばらく暗算をするように少し首をまげて立っていました。", "みんなはやはりきろきろそっちを見ています。三郎は少し困ったように両手をうしろへ組むと向こう側の土手のほうへ職員室の前を通って歩きだしました。", "その時風がざあっと吹いて来て土手の草はざわざわ波になり、運動場のまん中でさあっと塵（ちり）があがり、それが玄関の前まで行くと、きりきりとまわって小さなつむじ風になって、黄いろな塵は瓶（びん）をさかさまにしたような形になって屋根より高くのぼりました。", "すると嘉助が突然高く言いました。", "「そうだ。やっぱりあいづ又三郎だぞ。あいづ何かするときっと風吹いてくるぞ。」", "「うん。」一郎はどうだかわからないと思いながらもだまってそっちを見ていました。三郎はそんなことにはかまわず土手のほうへやはりすたすた歩いて行きます。", "そのとき先生がいつものように呼び子をもって玄関を出て来たのです。", "「お早うございます。」小さな子どもらはみんな集まりました。", "「お早う。」先生はちらっと運動場を見まわしてから、「ではならんで。」と言いながらビルルッと笛を吹きました。", "みんなは集まってきてきのうのとおりきちんとならびました。三郎もきのう言われた所へちゃんと立っています。", "先生はお日さまがまっ正面なのですこしまぶしそうにしながら号令をだんだんかけて、とうとうみんなは昇降口から教室へはいりました。そして礼がすむと先生は、", "「ではみなさんきょうから勉強をはじめましょう。みなさんはちゃんとお道具をもってきましたね。では一年生（と二年生）の人はお習字のお手本と硯（すずり）と紙を出して、二年生と四年生の人は算術帳と雑記帳と鉛筆を出して、五年生と六年生の人は国語の本を出してください。」", "さあするとあっちでもこっちでも大さわぎがはじまりました。中にも三郎のすぐ横の四年生の机の佐太郎が、いきなり手をのばして二年生のかよの鉛筆をひらりととってしまったのです。かよは佐太郎の妹でした。するとかよは、", "「うわあ、兄（あい）な、木ペン取（と）てわかんないな。」と言いながら取り返そうとしますと佐太郎が、", "「わあ、こいつおれのだなあ。」と言いながら鉛筆をふところの中へ入れて、あとはシナ人がおじぎするときのように両手を袖（そで）へ入れて、机へぴったり胸をくっつけました。するとかよは立って来て、", "「兄（あい）な、兄なの木ペンはきのう小屋でなくしてしまったけなあ。よこせったら。」と言いながら一生けん命とり返そうとしましたが、どうしてももう佐太郎は机にくっついた大きな蟹（かに）の化石みたいになっているので、とうとうかよは立ったまま口を大きくまげて泣きだしそうになりました。", "すると三郎は国語の本をちゃんと机にのせて困ったようにしてこれを見ていましたが、かよがとうとうぼろぼろ涙をこぼしたのを見ると、だまって右手に持っていた半分ばかりになった鉛筆を佐太郎の目の前の机に置きました。", "すると佐太郎はにわかに元気になって、むっくり起き上がりました。そして、", "「くれる？」と三郎にききました。三郎はちょっとまごついたようでしたが覚悟したように、「うん。」と言いました。すると佐太郎はいきなりわらい出してふところの鉛筆をかよの小さな赤い手に持たせました。", "先生は向こうで一年生の子の硯（すずり）に水をついでやったりしていましたし、嘉助は三郎の前ですから知りませんでしたが、一郎はこれをいちばんうしろでちゃんと見ていました。そしてまるでなんと言ったらいいかわからない、変な気持ちがして歯をきりきり言わせました。", "「では二年生のひとはお休みの前にならった引き算をもう一ぺん習ってみましょう。これを勘定してごらんなさい。」先生は黒板に［＃25−12＝の数式（fig462_01.png、横44×縦43）入る］と書きました。二年生のこどもらはみんな一生けん命にそれを雑記帳にうつしました。かよも頭を雑記帳へくっつけるようにしています。「四年生の人はこれを置いて。」［＃17×4＝の数式（fig462_02.png、横37×縦41）入る］と書きました。", "四年生は佐太郎をはじめ喜蔵も甲助（こうすけ）もみんなそれをうつしました。", "「五年生の人は読本（とくほん）の（二字空白）ページの（二字空白）課をひらいて声をたてないで読めるだけ読んでごらんなさい。わからない字は雑記帳へ拾っておくのです。」五年生もみんな言われたとおりしはじめました。", "「一郎さんは読本の（二字空白）ページをしらべてやはり知らない字を書き抜いてください。」", "それがすむと先生はまた教壇をおりて、一年生の習字を一人一人見てあるきました。", "三郎は両手で本をちゃんと机の上へもって、言われたところを息もつかずじっと読んでいました。けれども雑記帳へは字を一つも書き抜いていませんでした。それはほんとうに知らない字が一つもないのか、たった一本の鉛筆を佐太郎にやってしまったためか、どっちともわかりませんでした。", "そのうち先生は教壇へ戻って二年生と四年生の算術の計算をして見せてまた新しい問題を出すと、今度は五年生の生徒の雑記帳へ書いた知らない字を黒板へ書いて、それにかなとわけをつけました。そして、", "「では嘉助さん、ここを読んで。」と言いました。", "嘉助は二三度ひっかかりながら先生に教えられて読みました。", "三郎もだまって聞いていました。", "先生も本をとって、じっと聞いていましたが、十行ばかり読むと、", "「そこまで。」と言ってこんどは先生が読みました。", "そうして一まわり済むと、先生はだんだんみんなの道具をしまわせました。", "それから「ではここまで。」と言って教壇に立ちますと一郎がうしろで、", "「気をつけい。」と言いました。そして礼がすむと、みんな順に外へ出てこんどは外へならばずにみんな別れ別れになって遊びました。", "二時間目は一年生から六年生までみんな唱歌でした。そして先生がマンドリンを持って出て来て、みんなはいままでに習ったのを先生のマンドリンについて五つもうたいました。", "三郎もみんな知っていて、みんなどんどん歌いました。そしてこの時間はたいへん早くたってしまいました。", "三時間目になるとこんどは二年生と四年生が国語で、五年生と六年生が数学でした。先生はまた黒板に問題を書いて五年生と六年生に計算させました。しばらくたって一郎が答えを書いてしまうと、三郎のほうをちょっと見ました。", "すると三郎は、どこから出したか小さな消し炭で雑記帳の上へがりがりと大きく運算していたのです。", "次の朝、空はよく晴れて谷川はさらさら鳴りました。一郎は途中で嘉助と佐太郎と悦治をさそっていっしょに三郎のうちのほうへ行きました。", "学校の少し下流で谷川をわたって、それから岸で楊（やなぎ）の枝をみんなで一本ずつ折って、青い皮をくるくるはいで鞭（むち）をこしらえて手でひゅうひゅう振りながら、上の野原への道をだんだんのぼって行きました。みんなは早くも登りながら息をはあはあしました。", "「又三郎ほんとにあそごのわき水まで来て待ぢでるべが。」", "「待ぢでるんだ。又三郎うそこがないもな。」", "「ああ暑う、風吹げばいいな。」", "「どごがらだが風吹いでるぞ。」", "「又三郎吹がせでらべも。」", "「なんだがお日さんぼやっとして来たな。」", "空に少しばかりの白い雲が出ました。そしてもうだいぶのぼっていました。谷のみんなの家がずうっと下に見え、一郎のうちの木小屋の屋根が白く光っています。", "道が林の中に入り、しばらく道はじめじめして、あたりは見えなくなりました。そしてまもなくみんなは約束のわき水の近くに来ました。するとそこから、", "「おうい。みんな来たかい。」と三郎の高く叫ぶ声がしました。", "みんなはまるでせかせかと走ってのぼりました。向こうの曲がり角（かど）の所に三郎が小さなくちびるをきっと結んだまま、三人のかけ上って来るのを見ていました。", "三人はやっと三郎の前まで来ました。けれどもあんまり息がはあはあしてすぐには何も言えませんでした。嘉助などはあんまりもどかしいもんですから、空へ向いて「ホッホウ。」と叫んで早く息を吐いてしまおうとしました。すると三郎は大きな声で笑いました。", "「ずいぶん待ったぞ。それにきょうは雨が降るかもしれないそうだよ。」", "「そだら早ぐ行ぐべすさ。おらまんつ水飲んでぐ。」三人は汗をふいてしゃがんで、まっ白な岩からごぼごぼ噴（ふ）きだす冷たい水を何べんもすくってのみました。", "「ぼくのうちはここからすぐなんだ。ちょうどあの谷の上あたりなんだ。みんなで帰りに寄ろうねえ。」", "「うん。まんつ野原さ行ぐべすさ。」", "みんながまたあるきはじめたときわき水は何かを知らせるようにぐうっと鳴り、そこらの木もなんだかざあっと鳴ったようでした。", "五人は林のすその藪（やぶ）の間を行ったり岩かけの小さくくずれる所を何べんも通ったりして、もう上の野原の入り口に近くなりました。", "みんなはそこまで来ると来たほうからまた西のほうをながめました。", "光ったりかげったり幾通りにも重なったたくさんの丘の向こうに、川に沿ったほんとうの野原がぼんやり碧（あお）くひろがっているのでした。", "「ありゃ、あいづ川だぞ。」", "「春日明神（かすがみょうじん）さんの帯のようだな。」三郎が言いました。", "「何のようだど。」一郎がききました。", "「春日明神さんの帯のようだ。」", "「うな神さんの帯見だごとあるが。」", "「ぼく北海道で見たよ。」", "みんなはなんのことだかわからずだまってしまいました。", "ほんとうにそこはもう上の野原の入り口で、きれいに刈られた草の中に一本の大きな栗（くり）の木が立って、その幹は根もとの所がまっ黒に焦げて大きな洞（ほら）のようになり、その枝には古い繩（なわ）や、切れたわらじなどがつるしてありました。", "「もう少し行ぐづどみんなして草刈ってるぞ。それから馬のいるどごもあるぞ。」一郎は言いながら先に立って刈った草のなかの一ぽんみちをぐんぐん歩きました。", "三郎はその次に立って、", "「ここには熊（くま）いないから馬をはなしておいてもいいなあ。」と言って歩きました。", "しばらく行くとみちばたの大きな楢（なら）の木の下に、繩で編んだ袋が投げ出してあって、たくさんの草たばがあっちにもこっちにもころがっていました。", "せなかに草束をしょった二匹の馬が、一郎を見て鼻をぷるぷる鳴らしました。", "「兄（あい）な、いるが。兄（あい）な、来たぞ。」一郎は汗をぬぐいながら叫びました。", "「おおい。ああい。そこにいろ。今行ぐぞ。」ずうっと向こうのくぼみで、一郎のにいさんの声がしました。", "日はぱっと明るくなり、にいさんがそっちの草の中から笑って出て来ました。", "「善（ゆ）ぐ来たな。みんなも連れで来たのが。善（ゆ）ぐ来た。戻りに馬こ連れでてけろな。きょうあ午（ひる）まがらきっと曇る。おらもう少し草集めて仕舞（しむ）がらな、うなだ遊ばばあの土手の中さはいってろ。まだ牧馬の馬二十匹ばかりはいるがらな。」", "にいさんは向こうへ行こうとして、振り向いてまた言いました。", "「土手がら外さ出はるなよ。迷ってしまうづどあぶないがらな。午（ひる）まになったらまた来るがら。」", "「うん。土手の中にいるがら。」", "そして一郎のにいさんは行ってしまいました。", "空にはうすい雲がすっかりかかり、太陽は白い鏡のようになって、雲と反対に馳（は）せました。風が出て来てまだ刈っていない草は一面に波を立てます。一郎はさきにたって小さなみちをまっすぐに行くと、まもなくどてになりました。その土手の一とこちぎれたところに二本の丸太の棒を横にわたしてありました。悦治がそれをくぐろうとしますと、嘉助が、", "「おらこったなものはずせだぞ。」と言いながら片っぽうのはじをぬいて下におろしましたのでみんなはそれをはね越えて中にはいりました。", "向こうの少し小高いところにてかてか光る茶いろの馬が七匹ばかり集まって、しっぽをゆるやかにばしゃばしゃふっているのです。", "「この馬みんな千円以上するづもな。来年がらみんな競馬さも出はるのだづぢゃい。」一郎はそばへ行きながら言いました。", "馬はみんないままでさびしくってしようなかったというように一郎たちのほうへ寄ってきました。そして鼻づらをずうっとのばして何かほしそうにするのです。", "「ははあ、塩をけろづのだな。」みんなは言いながら手を出して馬になめさせたりしましたが、三郎だけは馬になれていないらしく気味わるそうに手をポケットへ入れてしまいました。", "「わあ、又三郎馬おっかながるぢゃい。」と悦治が言いました。すると三郎は、", "「こわくなんかないやい。」と言いながらすぐポケットの手を馬の鼻づらへのばしましたが、馬が首をのばして舌をべろりと出すと、さっと顔いろを変えてすばやくまた手をポケットへ入れてしまいました。", "「わあい、又三郎馬おっかながるぢゃい。」悦治がまた言いました。すると三郎はすっかり顔を赤くしてしばらくもじもじしていましたが、", "「そんなら、みんなで競馬やるか。」と言いました。", "競馬ってどうするのかとみんな思いました。", "すると三郎は、", "「ぼく競馬何べんも見たぞ。けれどもこの馬みんな鞍（くら）がないから乗れないや。みんなで一匹ずつ馬を追って、はじめに向こうの、そら、あの大きな木のところに着いたものを一等にしよう。」", "「そいづおもしろいな。」嘉助が言いました。", "「しからえるぞ。牧夫に見つけらえでがら。」", "「大丈夫だよ。競馬に出る馬なんか練習をしていないといけないんだい。」三郎が言いました。", "「よしおらこの馬だぞ。」", "「おらこの馬だ。」", "「そんならぼくはこの馬でもいいや。」みんなは楊（やなぎ）の枝や萱（かや）の穂でしゅうと言いながら馬を軽く打ちました。", "ところが馬はちっともびくともしませんでした。やはり下へ首をたれて草をかいだり、首をのばしてそこらのけしきをもっとよく見るというようにしているのです。", "一郎がそこで両手をぴしゃんと打ち合わせて、だあ、と言いました。", "するとにわかに七匹ともまるでたてがみをそろえてかけ出したのです。", "「うまあい。」嘉助ははね上がって走りました。けれどもそれはどうも競馬にはならないのでした。", "第一、馬はどこまでも顔をならべて走るのでしたし、それにそんなに競馬するくらい早く走るのでもなかったのです。それでもみんなはおもしろがって、だあだと言いながら一生けん命そのあとを追いました。", "馬はすこし行くと立ちどまりそうになりました。みんなもすこしはあはあしましたが、こらえてまた馬を追いました。するといつか馬はぐるっとさっきの小高いところをまわって、さっき五人ではいって来たどての切れた所へ来たのです。", "「あ、馬出はる、馬出はる。押えろ　押えろ。」一郎はまっ青（さお）になって叫びました。じっさい馬はどての外へ出たのらしいのでした。どんどん走って、もうさっきの丸太の棒を越えそうになりました。", "一郎はまるであわてて、", "「どう、どう、どうどう。」と言いながら一生けん命走って行って、やっとそこへ着いてまるでころぶようにしながら手をひろげたときは、そのときはもう二匹は柵（さく）の外へ出ていたのです。", "「早ぐ来て押えろ。早ぐ来て。」一郎は息も切れるように叫びながら丸太棒をもとのようにしました。", "四人は走って行って急いで丸太をくぐって外へ出ますと、二匹の馬はもう走るでもなく、どての外に立って草を口で引っぱって抜くようにしています。", "「そろそろど押えろよ。そろそろど。」と言いながら一郎は一ぴきのくつわについた札のところをしっかり押えました。嘉助と三郎がもう一匹を押えようとそばへ寄りますと、馬はまるでおどろいたようにどてへ沿って一目散に南のほうへ走ってしまいました。", "「兄（あい）な、馬あ逃げる、馬あ逃げる。兄（あい）な、馬逃げる。」とうしろで一郎が一生けん命叫んでいます。三郎と嘉助は一生けん命馬を追いました。", "ところが馬はもう今度こそほんとうに逃げるつもりらしかったのです。まるで丈（たけ）ぐらいある草をわけて高みになったり低くなったり、どこまでも走りました。", "嘉助はもう足がしびれてしまって、どこをどう走っているのかわからなくなりました。", "それからまわりがまっ蒼（さお）になって、ぐるぐる回り、とうとう深い草の中に倒れてしまいました。馬の赤いたてがみと、あとを追って行く三郎の白いシャッポが終わりにちらっと見えました。", "嘉助は、仰向けになって空を見ました。空がまっ白に光って、ぐるぐる回り、そのこちらを薄いねずみ色の雲が、速く速く走っています。そしてカンカン鳴っています。", "嘉助はやっと起き上がって、せかせか息しながら馬の行ったほうに歩き出しました。草の中には、今馬と三郎が通った跡らしく、かすかな道のようなものがありました。嘉助は笑いました。そして、（ふん、なあに馬どこかでこわくなってのっこり立ってるさ、）と思いました。", "そこで嘉助は、一生懸命それをつけて行きました。", "ところがその跡のようなものは、まだ百歩も行かないうちに、おとこえしや、すてきに背の高いあざみの中で、二つにも三つにも分かれてしまって、どれがどれやらいっこうわからなくなってしまいました。", "嘉助は「おうい。」と叫びました。", "「おう。」とどこかで三郎が叫んでいるようです。思い切って、そのまん中のを進みました。", "けれどもそれも、時々切れたり、馬の歩かないような急な所を横ざまに過ぎたりするのでした。", "空はたいへん暗く重くなり、まわりがぼうっとかすんで来ました。冷たい風が、草を渡りはじめ、もう雲や霧が切れ切れになって目の前をぐんぐん通り過ぎて行きました。", "（ああ、こいつは悪くなって来た。みんな悪いことはこれから集（たが）ってやって来るのだ。）と嘉助は思いました。全くそのとおり、にわかに馬の通った跡は草の中でなくなってしまいました。", "（ああ、悪くなった、悪くなった。）嘉助は胸をどきどきさせました。", "草がからだを曲げて、パチパチ言ったり、さらさら鳴ったりしました。霧がことに滋（しげ）くなって、着物はすっかりしめってしまいました。", "嘉助は咽喉（のど）いっぱい叫びました。", "「一郎、一郎、こっちさ来う。」ところがなんの返事も聞こえません。黒板から降る白墨の粉のような、暗い冷たい霧の粒が、そこら一面踊りまわり、あたりがにわかにシインとして、陰気に陰気になりました。草からは、もうしずくの音がポタリポタリと聞こえて来ます。", "嘉助は、もう早く一郎たちの所へ戻ろうとして急いで引っ返しました。けれどもどうも、それは前に来た所とは違っていたようでした。第一、あざみがあんまりたくさんありましたし、それに草の底にさっきなかった岩かけが、たびたびころがっていました。そしてとうとう聞いたこともない大きな谷が、いきなり目の前に現われました。すすきがざわざわざわっと鳴り、向こうのほうは底知れずの谷のように、霧の中に消えているではありませんか。", "風が来ると、すすきの穂は細いたくさんの手をいっぱいのばして、忙しく振って、", "「あ、西さん、あ、東さん、あ、西さん、あ、南さん、あ、西さん。」なんて言っているようでした。", "嘉助はあんまり見っともなかったので、目をつむって横を向きました。そして急いで引っ返しました。小さな黒い道がいきなり草の中に出て来ました。それはたくさんの馬のひづめの跡でできあがっていたのです。嘉助は夢中で短い笑い声をあげて、その道をぐんぐん歩きました。", "けれども、たよりのないことは、みちのはばが五寸ぐらいになったり、また三尺ぐらいに変わったり、おまけになんだかぐるっと回っているように思われました。そして、とうとう大きなてっぺんの焼けた栗（くり）の木の前まで来た時、ぼんやり幾つにも別れてしまいました。", "そこはたぶんは、野馬の集まり場所であったでしょう。霧の中に丸い広場のように見えたのです。", "嘉助はがっかりして、黒い道をまた戻りはじめました。知らない草穂が静かにゆらぎ、少し強い風が来る時は、どこかで何かが合図をしてでもいるように、一面の草が、それ来たっとみなからだを伏せて避けました。", "空が光ってキインキインと鳴っています。", "それからすぐ目の前の霧の中に、家の形の大きな黒いものがあらわれました。嘉助はしばらく自分の目を疑って立ちどまっていましたが、やはりどうしても家らしかったので、こわごわもっと近寄って見ますと、それは冷たい大きな黒い岩でした。", "空がくるくるくるっと白く揺らぎ、草がバラッと一度にしずくを払いました。", "（間違って原の向こう側へおりれば、又三郎もおれも、もう死ぬばかりだ。）と嘉助は半分思うように半分つぶやくようにしました。それから叫びました。", "「一郎、一郎、いるが。一郎。」", "また明るくなりました。草がみないっせいによろこびの息をします。", "「伊佐戸（いさど）の町の、電気工夫の童（わらす）あ、山男に手足いしばらえてたふだ。」といつかだれかの話した言葉が、はっきり耳に聞こえて来ます。", "そして、黒い道がにわかに消えてしまいました。あたりがほんのしばらくしいんとなりました。それから非常に強い風が吹いて来ました。", "空が旗のようにぱたぱた光って飜り、火花がパチパチパチッと燃えました。嘉助はとうとう草の中に倒れてねむってしまいました。", "＊", "そんなことはみんなどこかの遠いできごとのようでした。", "もう又三郎がすぐ目の前に足を投げだしてだまって空を見あげているのです。いつかいつものねずみいろの上着の上にガラスのマントを着ているのです。それから光るガラスの靴（くつ）をはいているのです。", "又三郎の肩には栗（くり）の木の影が青く落ちています。又三郎の影は、また青く草に落ちています。そして風がどんどんどんどん吹いているのです。", "又三郎は笑いもしなければ物も言いません。ただ小さなくちびるを強そうにきっと結んだまま黙ってそらを見ています。いきなり又三郎はひらっとそらへ飛びあがりました。ガラスのマントがギラギラ光りました。", "＊", "ふと嘉助は目をひらきました。灰いろの霧が速く速く飛んでいます。", "そして馬がすぐ目の前にのっそりと立っていたのです。その目は嘉助を恐れて横のほうを向いていました。", "嘉助ははね上がって馬の名札を押えました。そのうしろから三郎がまるで色のなくなったくちびるをきっと結んでこっちへ出てきました。", "嘉助はぶるぶるふるえました。", "「おうい。」霧の中から一郎のにいさんの声がしました。雷もごろごろ鳴っています。", "「おおい、嘉助。いるが。嘉助。」一郎の声もしました。嘉助はよろこんでとびあがりました。", "「おおい。いる、いる。一郎。おおい。」", "一郎のにいさんと一郎が、とつぜん目の前に立ちました。嘉助はにわかに泣き出しました。", "「捜したぞ。あぶながったぞ。すっかりぬれだな。どう。」一郎のにいさんはなれた手つきで馬の首を抱いて、もってきたくつわをすばやく馬のくちにはめました。", "「さあ、あべさ。」", "「又三郎びっくりしたべあ。」一郎が三郎に言いました。三郎はだまって、やっぱりきっと口を結んでうなずきました。", "みんなは一郎のにいさんについて、ゆるい傾斜を二つほどのぼり降りしました。それから、黒い大きな道について、しばらく歩きました。", "稲光りが二度ばかり、かすかに白くひらめきました。草を焼くにおいがして、霧の中を煙がぼうっと流れています。", "一郎のにいさんが叫びました。", "「おじいさん。いだ、いだ。みんないだ。」", "おじいさんは霧の中に立っていて、", "「ああ心配した、心配した。ああよがった。おお嘉助。寒がべあ、さあはいれ。」と言いました。嘉助は一郎と同じようにやはりこのおじいさんの孫なようでした。", "半分に焼けた大きな栗（くり）の木の根もとに、草で作った小さな囲いがあって、チョロチョロ赤い火が燃えていました。", "一郎のにいさんは馬を楢（なら）の木につなぎました。", "馬もひひんと鳴いています。", "「おおむぞやな。な。なんぼが泣いだがな。そのわろは金山掘りのわろだな。さあさあみんな団子たべろ。食べろ。な、今こっちを焼ぐがらな。全体どこまで行ってだった。」", "「笹長根（ささながね）のおり口だ。」と一郎のにいさんが答えました。", "「あぶないがった。あぶないがった。向こうさ降りだら馬も人もそれっ切りだったぞ。さあ嘉助、団子食べろ。このわろもたべろ。さあさあ、こいづも食べろ。」", "「おじいさん。馬置いでくるが。」と一郎のにいさんが言いました。", "「うんうん。牧夫来るどまだやがましがらな、したども、も少し待で。またすぐ晴れる。ああ心配した。おれも虎（とら）こ山（やま）の下まで行って見で来た。はあ、まんつよがった。雨も晴れる。」", "「けさほんとに天気よがったのにな。」", "「うん。またよぐなるさ、あ、雨漏って来たな。」", "一郎のにいさんが出て行きました。天井がガサガサガサガサ言います。おじいさんが笑いながらそれを見上げました。", "にいさんがまたはいって来ました。", "「おじいさん。明るぐなった。雨あ霽（は）れだ。」", "「うんうん、そうが。さあみんなよっく火にあだれ、おらまた草刈るがらな。」", "霧がふっと切れました。日の光がさっと流れてはいりました。その太陽は、少し西のほうに寄ってかかり、幾片かの蝋（ろう）のような霧が、逃げおくれてしかたなしに光りました。", "草からはしずくがきらきら落ち、すべての葉も茎も花も、ことしの終わりの日の光を吸っています。", "はるかな西の碧（あお）い野原は、今泣きやんだようにまぶしく笑い、向こうの栗（くり）の木は青い後光を放ちました。", "みんなはもう疲れて一郎をさきに野原をおりました。わき水のところで三郎はやっぱりだまって、きっと口を結んだままみんなに別れて、じぶんだけおとうさんの小屋のほうへ帰って行きました。", "帰りながら嘉助が言いました。", "「あいづやっぱり風の神だぞ。風の神の子っ子だぞ。あそごさ二人して巣食ってるんだぞ。」", "「そだないよ。」一郎が高く言いました。", "次の日は朝のうちは雨でしたが、二時間目からだんだん明るくなって三時間目の終わりの十分休みにはとうとうすっかりやみ、あちこちに削ったような青ぞらもできて、その下をまっ白なうろこ雲がどんどん東へ走り、山の萱（かや）からも栗の木からも残りの雲が湯げのように立ちました。", "「下がったら葡萄蔓（えびづる）とりに行がないが。」耕助が嘉助にそっと言いました。", "「行ぐ行ぐ。三郎も行がないが。」嘉助がさそいました。耕助は、", "「わあい、あそご三郎さ教えるやないぢゃ。」と言いましたが三郎は知らないで、", "「行くよ。ぼくは北海道でもとったぞ。ぼくのおかあさんは樽（たる）へ二っつ漬（つ）けたよ。」と言いました。", "「葡萄（ぶどう）とりにおらも連れでがないが。」二年生の承吉（しょうきち）も言いました。", "「わがないぢゃ。うなどさ教えるやないぢゃ。おら去年な新しいどご見つけだぢゃ。」", "みんなは学校の済むのが待ち遠しかったのでした。五時間目が終わると、一郎と嘉助と佐太郎と耕助と悦治と三郎と六人で学校から上流のほうへ登って行きました。少し行くと一けんの藁（わら）やねの家があって、その前に小さなたばこ畑がありました。たばこの木はもう下のほうの葉をつんであるので、その青い茎が林のようにきれいにならんでいかにもおもしろそうでした。", "すると三郎はいきなり、", "「なんだい、この葉は。」と言いながら葉を一枚むしって一郎に見せました。すると一郎はびっくりして、", "「わあ、又三郎、たばごの葉とるづど専売局にうんとしかられるぞ。わあ、又三郎何してとった。」と少し顔いろを悪くして言いました。みんなも口々に言いました。", "「わあい。専売局であ、この葉一枚ずつ数えで帳面さつけでるだ。おら知らないぞ。」", "「おらも知らないぞ。」", "「おらも知らないぞ。」みんな口をそろえてはやしました。", "すると三郎は顔をまっ赤（か）にして、しばらくそれを振り回して何か言おうと考えていましたが、", "「おら知らないでとったんだい。」とおこったように言いました。", "みんなはこわそうに、だれか見ていないかというように向こうの家を見ました。たばこばたけからもうもうとあがる湯げの向こうで、その家はしいんとしてだれもいたようではありませんでした。", "「あの家一年生の小助（こすけ）の家だぢゃい。」嘉助が少しなだめるように言いました。ところが耕助ははじめからじぶんの見つけた葡萄藪（ぶどうやぶ）へ、三郎だのみんなあんまり来ておもしろくなかったもんですから、意地悪くもいちど三郎に言いました。", "「わあ、三郎なんぼ知らないたってわがないんだぢゃ。わあい、三郎もどのとおりにしてまゆんだであ。」", "三郎は困ったようにしてまたしばらくだまっていましたが、", "「そんなら、おいらここへ置いてくからいいや。」と言いながらさっきの木の根もとへそっとその葉を置きました。すると一郎は、", "「早くあべ。」と言って先にたってあるきだしましたのでみんなもついて行きましたが、耕助だけはまだ残って「ほう、おら知らないぞ。ありゃ、又三郎の置いた葉、あすごにあるぢゃい。」なんて言っているのでしたが、みんながどんどん歩きだしたので耕助もやっとついて来ました。", "みんなは萱（かや）の間の小さなみちを山のほうへ少しのぼりますと、その南側に向いたくぼみに栗（くり）の木があちこち立って、下には葡萄がもくもくした大きな藪（やぶ）になっていました。", "「こごおれ見っつけだのだがらみんなあんまりとるやないぞ。」耕助が言いました。", "すると三郎は、", "「おいら栗のほうをとるんだい。」といって石を拾って一つの枝へ投げました。青いいがが一つ落ちました。", "三郎はそれを棒きれでむいて、まだ白い栗を二つとりました。みんなは葡萄（ぶどう）のほうへ一生けん命でした。", "そのうち耕助がも一つの藪（やぶ）へ行こうと一本の栗（くり）の木の下を通りますと、いきなり上からしずくが一ぺんにざっと落ちてきましたので、耕助は肩からせなかから水へはいったようになりました。耕助はおどろいて口をあいて上を見ましたら、いつか木の上に三郎がのぼっていて、なんだか少しわらいながらじぶんも袖（そで）ぐちで顔をふいていたのです。", "「わあい、又三郎何する。」耕助はうらめしそうに木を見あげました。", "「風が吹いたんだい。」三郎は上でくつくつわらいながら言いました。", "耕助は木の下をはなれてまた別の藪で葡萄をとりはじめました。もう耕助はじぶんでも持てないくらいあちこちへためていて、口も紫いろになってまるで大きく見えました。", "「さあ、このくらい持って戻らないが。」一郎が言いました。", "「おら、もっと取ってぐぢゃ。」耕助が言いました。", "そのとき耕助はまた頭からつめたいしずくをざあっとかぶりました。耕助はまたびっくりしたように木を見上げましたが今度は三郎は木の上にはいませんでした。", "けれども木の向こう側に三郎のねずみいろのひじも見えていましたし、くつくつ笑う声もしましたから、耕助はもうすっかりおこってしまいました。", "「わあい又三郎、まだひとさ水掛げだな。」", "「風が吹いたんだい。」", "みんなはどっと笑いました。", "「わあい又三郎、うなそごで木ゆすったけあなあ。」", "みんなはどっとまた笑いました。", "すると耕助はうらめしそうにしばらくだまって三郎の顔を見ながら、", "「うあい又三郎、汝（うな）などあ世界になくてもいいなあ。」", "すると三郎はずるそうに笑いました。", "「やあ耕助君、失敬したねえ。」", "耕助は何かもっと別のことを言おうと思いましたが、あんまりおこってしまって考え出すことができませんでしたのでまた同じように叫びました。", "「うあい、うあいだ、又三郎、うなみだいな風（かぜ）など世界じゅうになくてもいいなあ、うわあい。」", "「失敬したよ、だってあんまりきみもぼくへ意地悪をするもんだから。」三郎は少し目をパチパチさせて気の毒そうに言いました。けれども耕助のいかりはなかなか解けませんでした。そして三度同じことをくりかえしたのです。", "「うわい又三郎、風などあ世界じゅうになくてもいいな、うわい。」", "すると三郎は少しおもしろくなったようでまたくつくつ笑いだしてたずねました。", "「風が世界じゅうになくってもいいってどういうんだい。いいと箇条をたてていってごらん。そら。」三郎は先生みたいな顔つきをして指を一本だしました。", "耕助は試験のようだし、つまらないことになったと思ってたいへんくやしかったのですが、しかたなくしばらく考えてから言いました。", "「汝（うな）など悪戯（わるさ）ばりさな、傘（かさ）ぶっこわしたり。」", "「それからそれから。」三郎はおもしろそうに一足進んで言いました。", "「それがら木折ったり転覆したりさな。」", "「それから、それからどうだい。」", "「家もぶっこわさな。」", "「それから。それから、あとはどうだい。」", "「あかしも消さな。」", "「それからあとは？　それからあとは？　どうだい。」", "「シャップもとばさな。」", "「それから？　それからあとは？　あとはどうだい。」", "「笠（かさ）もとばさな。」", "「それからそれから。」", "「それがら、ラ、ラ、電信ばしらも倒さな。」", "「それから？　それから？　それから？」", "「それがら屋根もとばさな。」", "「アアハハハ、屋根は家のうちだい。どうだいまだあるかい。それから、それから？」", "「それだがら、ララ、それだからランプも消さな。」", "「アアハハハハ、ランプはあかしのうちだい。けれどそれだけかい。え、おい。それから？　それからそれから。」", "耕助はつまってしまいました。たいていもう言ってしまったのですから、いくら考えてももうできませんでした。", "三郎はいよいよおもしろそうに指を一本立てながら、", "「それから？　それから？　ええ？　それから？」と言うのでした。", "耕助は顔を赤くしてしばらく考えてからやっと答えました。", "「風車もぶっこわさな。」", "すると三郎はこんどこそはまるで飛び上がって笑ってしまいました。みんなも笑いました。笑って笑って笑いました。", "三郎はやっと笑うのをやめて言いました。", "「そらごらん、とうとう風車などを言っちゃったろう。風車なら風を悪く思っちゃいないんだよ。もちろん時々こわすこともあるけれども回してやる時のほうがずっと多いんだ。風車ならちっとも風を悪く思っていないんだ。それに第一お前のさっきからの数えようはあんまりおかしいや。ララ、ララ、ばかり言ったんだろう。おしまいにとうとう風車なんか数えちゃった。ああおかしい。」", "三郎はまた涙の出るほど笑いました。", "耕助もさっきからあんまり困ったためにおこっていたのもだんだん忘れて来ました。そしてつい三郎といっしょに笑い出してしまったのです。すると三郎もすっかりきげんを直して、", "「耕助君、いたずらをして済まなかったよ。」と言いました。", "「さあそれであ行ぐべな。」と一郎は言いながら三郎にぶどうを五ふさばかりくれました。", "三郎は白い栗（くり）をみんなに二つずつ分けました。そしてみんなは下のみちまでいっしょにおりて、あとはめいめいのうちへ帰ったのです。", "次の朝は霧がじめじめ降って学校のうしろの山もぼんやりしか見えませんでした。ところがきょうも二時間目ころからだんだん晴れてまもなく空はまっ青（さお）になり、日はかんかん照って、お午（ひる）になって一、二年が下がってしまうとまるで夏のように暑くなってしまいました。", "ひるすぎは先生もたびたび教壇で汗をふき、四年生の習字も五年生六年生の図画もまるでむし暑くて、書きながらうとうとするのでした。", "授業が済むとみんなはすぐ川下のほうへそろって出かけました。嘉助が、", "「又三郎、水泳ぎに行がないが。小さいやづど今ころみんな行ってるぞ。」と言いましたので三郎もついて行きました。", "そこはこの前上の野原へ行ったところよりも、も少し下流で右のほうからも一つの谷川がはいって来て、少し広い河原になり、すぐ下流は大きなさいかちの木のはえた崖（がけ）になっているのでした。", "「おおい。」とさきに来ているこどもらがはだかで両手をあげて叫びました。一郎やみんなは、河原のねむの木の間をまるで徒競走のように走って、いきなりきものをぬぐとすぐどぶんどぶんと水に飛び込んで両足をかわるがわる曲げて、だあんだあんと水をたたくようにしながら斜めにならんで向こう岸へ泳ぎはじめました。前にいたこどもらもあとから追い付いて泳ぎはじめました。三郎もきものをぬいでみんなのあとから泳ぎはじめましたが、途中で声をあげてわらいました。すると向こう岸についた一郎が、髪をあざらしのようにしてくちびるを紫にしてわくわくふるえながら、", "「わあ又三郎、何してわらった。」と言いました。", "三郎はやっぱりふるえながら水からあがって、", "「この川冷たいなあ。」と言いました。", "「又三郎何してわらった？」一郎はまたききました。", "三郎は、", "「おまえたちの泳ぎ方はおかしいや。なぜ足をだぶだぶ鳴らすんだい。」と言いながらまた笑いました。", "「うわあい。」と一郎は言いましたが、なんだかきまりが悪くなったように、", "「石取りさないが。」と言いながら白い丸い石をひろいました。", "「するする。」こどもらがみんな叫びました。", "「おれそれであ、あの木の上がら落とすがらな。」と一郎は言いながら崖（がけ）の中ごろから出ているさいかちの木へするするのぼって行きました。そして、", "「さあ落とすぞ。一二三。」と言いながらその白い石をどぶん、と淵（ふち）へ落としました。", "みんなはわれ勝ちに岸からまっさかさまに水にとび込んで、青白いらっこのような形をして底へもぐって、その石をとろうとしました。", "けれどもみんな底まで行かないに息がつまって浮かびだして来て、かわるがわるふうとそこらへ霧をふきました。", "三郎はじっとみんなのするのを見ていましたが、みんなが浮かんできてからじぶんもどぶんとはいって行きました。けれどもやっぱり底まで届かずに浮いてきたのでみんなはどっと笑いました。そのとき向こうの河原のねむの木のところを大人（おとな）が四人、肌（はだ）ぬぎになったり、網をもったりしてこっちへ来るのでした。", "すると一郎は木の上でまるで声をひくくしてみんなに叫びました。", "「おお、発破（はっぱ）だぞ。知らないふりしてろ。石とりやめで早ぐみんな下流（しも）ささがれ。」そこでみんなは、なるべくそっちを見ないふりをしながら、いっしょに砥石（といし）をひろったり、鶺鴒（せきれい）を追ったりして、発破のことなぞ、すこしも気がつかないふりをしていました。", "すると向こうの淵（ふち）の岸では、下流の坑夫をしていた庄助（しょうすけ）が、しばらくあちこち見まわしてから、いきなりあぐらをかいて砂利（じゃり）の上へすわってしまいました。それからゆっくり腰からたばこ入れをとって、きせるをくわえてぱくぱく煙をふきだしました。奇体だと思っていましたら、また腹かけから何か出しました。", "「発破（はっぱ）だぞ、発破だぞ。」とみんな叫びました。", "一郎は手をふってそれをとめました。庄助は、きせるの火をしずかにそれへうつしました。うしろにいた一人はすぐ水にはいって網をかまえました。庄助はまるで落ちついて、立って一あし水にはいるとすぐその持ったものを、さいかちの木の下のところへ投げこみました。するとまもなく、ぼおというようなひどい音がして水はむくっと盛りあがり、それからしばらくそこらあたりがきいんと鳴りました。", "向こうの大人（おとな）たちはみんな水へはいりました。", "「さあ、流れて来るぞ。みんなとれ。」と一郎が言いました。まもなく耕助は小指ぐらいの茶いろなかじかが横向きになって流れて来たのをつかみましたし、そのうしろでは嘉助が、まるで瓜（うり）をすするときのような声を出しました。それは六寸ぐらいある鮒（ふな）をとって、顔をまっ赤（か）にしてよろこんでいたのです。それからみんなとって、わあわあよろこびました。", "「だまってろ、だまってろ。」一郎が言いました。", "そのとき向こうの白い河原を肌（はだ）ぬぎになったり、シャツだけ着たりした大人が五六人かけて来ました。そのうしろからはちょうど活動写真のように、一人の網シャツを着た人が、はだか馬に乗ってまっしぐらに走って来ました。みんな発破の音を聞いて見に来たのです。", "庄助はしばらく腕を組んでみんなのとるのを見ていましたが、", "「さっぱりいないな。」と言いました。すると三郎がいつのまにか庄助のそばへ行っていました。そして中くらいの鮒を二匹、", "「魚（さかな）返すよ。」といって河原へ投げるように置きました。すると庄助が、", "「なんだこの童（わらす）あ、きたいなやづだな。」と言いながらじろじろ三郎を見ました。", "三郎はだまってこっちへ帰ってきました。", "庄助は変な顔をしてみています。みんなはどっとわらいました。", "庄助はだまってまた上流（かみ）へ歩きだしました。ほかのおとなたちもついて行き、網シャツの人は馬に乗って、またかけて行きました。耕助が泳いで行って三郎の置いて来た魚を持ってきました。みんなはそこでまたわらいました。", "「発破（はっぱ）かけだら、雑魚（ざこ）撒（ま）かせ。」嘉助が河原の砂っぱの上で、ぴょんぴょんはねながら高く叫びました。", "みんなはとった魚を石で囲んで、小さな生け州をこしらえて、生きかえってももう逃げて行かないようにして、また上流のさいかちの木へのぼりはじめました。", "ほんとうに暑くなって、ねむの木もまるで夏のようにぐったり見えましたし、空もまるで底なしの淵（ふち）のようになりました。", "そのころだれかが、", "「あ、生け州ぶっこわすとこだぞ。」と叫びました。見ると一人の変に鼻のとがった、洋服を着てわらじをはいた人が、手にはステッキみたいなものをもって、みんなの魚をぐちゃぐちゃかきまわしているのでした。", "その男はこっちへびちゃびちゃ岸をあるいて来ました。", "「あ、あいづ専売局だぞ。専売局だぞ。」佐太郎が言いました。", "「又三郎、うなのとった煙草（たばこ）の葉めっけたんだで、うな、連れでぐさ来たぞ。」嘉助が言いました。", "「なんだい。こわくないや。」三郎はきっと口をかんで言いました。", "「みんな又三郎のごと囲んでろ、囲んでろ。」と一郎が言いました。", "そこでみんなは三郎をさいかちの木のいちばん中の枝に置いて、まわりの枝にすっかり腰かけました。", "「来た来た、来た来た。来たっ。」とみんなは息をこらしました。", "ところがその男は別に三郎をつかまえるふうでもなく、みんなの前を通りこして、それから淵（ふち）のすぐ上流の浅瀬を渡ろうとしました。それもすぐに川をわたるでもなく、いかにもわらじや脚絆（きゃはん）のきたなくなったのをそのまま洗うというふうに、もう何べんも行ったり来たりするもんですから、みんなはだんだんこわくなくなりましたが、そのかわり気持ちが悪くなってきました。", "そこでとうとう一郎が言いました。", "「お、おれ先に叫ぶから、みんなあとから、一二三で叫ぶこだ。いいか。", "あんまり川を濁すなよ、", "いつでも先生（せんせ）言うでないか。一、二い、三。」", "「あんまり川を濁すなよ、", "いつでも先生言うでないか。」", "その人はびっくりしてこっちを見ましたけれども、何を言ったのかよくわからないというようすでした。そこでみんなはまた言いました。", "「あんまり川を濁すなよ、", "いつでも先生、言うでないか。」", "鼻のとがった人はすぱすぱと、煙草（たばこ）を吸うときのような口つきで言いました。", "「この水飲むのか、ここらでは。」", "「あんまり川をにごすなよ、", "いつでも先生言うでないか。」", "鼻のとがった人は少し困ったようにして、また言いました。", "「川をあるいてわるいのか。」", "「あんまり川をにごすなよ、", "いつでも先生言うでないか。」", "その人はあわてたのをごまかすように、わざとゆっくり川をわたって、それからアルプスの探検みたいな姿勢をとりながら、青い粘土と赤砂利（あかじゃり）の崖（がけ）をななめにのぼって、崖の上のたばこ畑へはいってしまいました。", "すると三郎は、", "「なんだい、ぼくを連れにきたんじゃないや。」と言いながらまっさきにどぶんと淵（ふち）へとび込みました。", "みんなもなんだか、その男も三郎も気の毒なようなおかしながらんとした気持ちになりながら、一人ずつ木からはねおりて、河原に泳ぎついて、魚（さかな）を手ぬぐいにつつんだり、手にもったりして家に帰りました。", "次の朝、授業の前みんなが運動場で鉄棒にぶらさがったり、棒かくしをしたりしていますと、少し遅れて佐太郎が何かを入れた笊（ざる）をそっとかかえてやって来ました。", "「なんだ、なんだ。なんだ。」とすぐみんな走って行ってのぞき込みました。", "すると佐太郎は袖（そで）でそれをかくすようにして、急いで学校の裏の岩穴のところへ行きました。そしてみんなはいよいよあとを追って行きました。", "一郎がそれをのぞくと、思わず顔いろを変えました。", "それは魚の毒もみにつかう山椒（さんしょ）の粉で、それを使うと発破（はっぱ）と同じように巡査に押えられるのでした。ところが佐太郎はそれを岩穴の横の萱（かや）の中へかくして、知らない顔をして運動場へ帰りました。", "そこでみんなはひそひそと、時間になるまでいつまでもその話ばかりしていました。", "その日も十時ごろからやっぱりきのうのように暑くなりました。みんなはもう授業の済むのばかり待っていました。", "二時になって五時間目が終わると、もうみんな一目散に飛びだしました。佐太郎もまた笊をそっと袖でかくして、耕助だのみんなに囲まれて河原へ行きました。三郎は嘉助と行きました。みんなは町の祭りのときのガスのようなにおいの、むっとするねむの河原を急いで抜けて、いつものさいかち淵（ぶち）に着きました。すっかり夏のような立派な雲の峰が東でむくむく盛りあがり、さいかちの木は青く光って見えました。", "みんな急いで着物をぬいで淵の岸に立つと、佐太郎が一郎の顔を見ながら言いました。", "「ちゃんと一列にならべ。いいか、魚（さかな）浮いて来たら泳いで行ってとれ。とったくらい与（や）るぞ。いいか。」", "小さなこどもらはよろこんで、顔を赤くして押しあったりしながらぞろっと淵（ふち）を囲みました。", "ぺ吉（きち）だの三四人はもう泳いで、さいかちの木の下まで行って待っていました。", "佐太郎が大威張りで、上流の瀬に行って笊（ざる）をじゃぶじゃぶ水で洗いました。", "みんなしいんとして、水をみつめて立っていました。", "三郎は水を見ないで向こうの雲の峰の上を通る黒い鳥を見ていました。一郎も河原にすわって石をこちこちたたいていました。", "ところが、それからよほどたっても魚は浮いて来ませんでした。", "佐太郎はたいへんまじめな顔で、きちんと立って水を見ていました。きのう発破（はっぱ）をかけたときなら、もう十匹もとっていたんだとみんなは思いました。またずいぶんしばらくみんなしいんとして待ちました。けれどもやっぱり魚は一ぴきも浮いて来ませんでした。", "「さっぱり魚、浮かばないな。」耕助が叫びました。佐太郎はびくっとしましたけれども、まだ一心に水を見ていました。", "「魚（さかな）さっぱり浮かばないな。」ぺ吉がまた向こうの木の下で言いました。するともう、みんなはがやがやと言い出して、みんな水に飛び込んでしまいました。", "佐太郎はしばらくきまり悪そうに、しゃがんで水を見ていましたけれど、とうとう立って、", "「鬼っこしないか。」と言いました。", "「する、する。」みんなは叫んで、じゃんけんをするために、水の中から手を出しました。泳いでいたものは急いでせいの立つところまで行って手を出しました。", "一郎も河原から来て手を出しました。そして一郎ははじめに、きのうあの変な鼻のとがった人の上って行った崖（がけ）の下の、青いぬるぬるした粘土のところを根っこにきめました。そこに取りついていれば、鬼は押えることができないというのでした。それから、はさみ無しの一人まけかち［＃「はさみ無しの一人まけかち」に傍点］でじゃんけんをしました。", "ところが悦治はひとりはさみ［＃「はさみ」に傍点］を出したので、みんなにうんとはやされたほかに鬼になりました。悦治は、くちびるを紫いろにして河原を走って、喜作（きさく）を押えたので鬼は二人になりました。それからみんなは、砂っぱの上や淵（ふち）を、あっちへ行ったりこっちへ来たり、押えたり押えられたり、何べんも鬼っこ［＃「鬼っこ」に傍点］をしました。", "しまいにとうとう三郎一人が鬼になりました。三郎はまもなく吉郎（きちろう）をつかまえました。みんなはさいかちの木の下にいてそれを見ていました。すると三郎が、", "「吉郎君、きみは上流（かみ）から追って来るんだよ。いいか。」と言いながら、じぶんはだまって立って見ていました。", "吉郎は口をあいて手をひろげて、上流から粘土の上を追って来ました。", "みんなは淵（ふち）へ飛び込むしたくをしました。一郎は楊（やなぎ）の木にのぼりました。そのとき吉郎が、あの上流の粘土が足についていたために、みんなの前ですべってころんでしまいました。", "みんなは、わあわあ叫んで、吉郎をはねこえたり、水にはいったりして、上流の青い粘土の根に上がってしまいました。", "「又三郎、来（こ）。」嘉助は立って口を大きくあいて、手をひろげて三郎をばかにしました。すると三郎はさっきからよっぽどおこっていたと見えて、", "「ようし、見ていろよ。」と言いながら本気になって、ざぶんと水に飛び込んで、一生けん命、そっちのほうへ泳いで行きました。", "三郎の髪の毛が赤くてばしゃばしゃしているのに、あんまり長く水につかってくちびるもすこし紫いろなので、子どもらはすっかりこわがってしまいました。", "第一、その粘土のところはせまくて、みんながはいれなかったのに、それにたいへんつるつるすべる坂になっていましたから、下のほうの四五人などは上の人につかまるようにして、やっと川へすべり落ちるのをふせいでいたのでした。一郎だけが、いちばん上で落ちついて、さあみんな、とかなんとか相談らしいことをはじめました。みんなもそこで頭をあつめて聞いています。三郎はぼちゃぼちゃ、もう近くまで行きました。", "みんなはひそひそはなしています。すると三郎は、いきなり両手でみんなへ水をかけ出しました。みんなが、ばたばた防いでいましたら、だんだん粘土がすべって来て、なんだかすこうし下へずれたようになりました。", "三郎はよろこんで、いよいよ水をはねとばしました。", "すると、みんなはぼちゃんぼちゃんと一度にすべって落ちました。三郎はそれを片っぱしからつかまえました。一郎もつかまりました。嘉助がひとり、上をまわって泳いで逃げましたら、三郎はすぐに追い付いて押えたほかに、腕をつかんで四五へんぐるぐる引っぱりまわしました。嘉助は水を飲んだと見えて、霧をふいてごぼごぼむせて、", "「おいらもうやめた。こんな鬼っこもうしない。」と言いました。小さな子どもらはみんな砂利（じゃり）に上がってしまいました。", "三郎はひとりさいかちの木の下に立ちました。", "ところが、そのときはもうそらがいっぱいの黒い雲で、楊（やなぎ）も変に白っぽくなり、山の草はしんしんとくらくなり、そこらはなんとも言われない恐ろしい景色にかわっていました。", "そのうちに、いきなり上の野原のあたりで、ごろごろごろと雷が鳴り出しました。と思うと、まるで山つなみのような音がして、一ぺんに夕立がやって来ました。風までひゅうひゅう吹きだしました。", "淵（ふち）の水には、大きなぶちぶちがたくさんできて、水だか石だかわからなくなってしまいました。", "みんなは河原から着物をかかえて、ねむの木の下へ逃げこみました。すると三郎もなんだかはじめてこわくなったと見えて、さいかちの木の下からどぼんと水へはいってみんなのほうへ泳ぎだしました。", "すると、だれともなく、", "「雨はざっこざっこ雨三郎、", "風はどっこどっこ又三郎。」と叫んだものがありました。", "みんなもすぐ声をそろえて叫びました。", "「雨はざっこざっこ雨三郎、", "風はどっこどっこ又三郎。」", "三郎はまるであわてて、何かに足をひっぱられるようにして淵（ふち）からとびあがって、一目散にみんなのところに走って来て、がたがたふるえながら、", "「いま叫んだのはおまえらだちかい。」とききました。", "「そでない、そでない。」みんないっしょに叫びました。", "ぺ吉がまた一人出て来て、", "「そでない。」と言いました。", "三郎は気味悪そうに川のほうを見ていましたが、色のあせたくちびるを、いつものようにきっとかんで、「なんだい。」と言いましたが、からだはやはりがくがくふるえていました。", "そしてみんなは、雨のはれ間を待って、めいめいのうちへ帰ったのです。", "どっどど　どどうど　どどうど　どどう", "青いくるみも吹きとばせ", "すっぱいかりんも吹きとばせ", "どっどど　どどうど　どどうど　どどう", "どっどど　どどうど　どどうど　どどう", "先ごろ、三郎から聞いたばかりのあの歌を一郎は夢の中でまたきいたのです。", "びっくりしてはね起きて見ると、外ではほんとうにひどく風が吹いて、林はまるでほえるよう、あけがた近くの青ぐろいうすあかりが、障子や棚（たな）の上のちょうちん箱や、家じゅういっぱいでした。一郎はすばやく帯をして、そして下駄（げた）をはいて土間をおり、馬屋の前を通ってくぐりをあけましたら、風がつめたい雨の粒といっしょにどっとはいって来ました。", "馬屋のうしろのほうで何か戸がばたっと倒れ、馬はぶるっと鼻を鳴らしました。", "一郎は風が胸の底までしみ込んだように思って、はあと息を強く吐きました。そして外へかけだしました。", "外はもうよほど明るく、土はぬれておりました。家の前の栗（くり）の木の列は変に青く白く見えて、それがまるで風と雨とで今｜洗濯（せんたく）をするとでもいうように激しくもまれていました。", "青い葉も幾枚も吹き飛ばされ、ちぎられた青い栗のいがは黒い地面にたくさん落ちていました。空では雲がけわしい灰色に光り、どんどんどんどん北のほうへ吹きとばされていました。", "遠くのほうの林はまるで海が荒れているように、ごとんごとんと鳴ったりざっと聞こえたりするのでした。一郎は顔いっぱいに冷たい雨の粒を投げつけられ、風に着物をもって行かれそうになりながら、だまってその音をききすまし、じっと空を見上げました。", "すると胸がさらさらと波をたてるように思いました。けれどもまたじっとその鳴ってほえてうなって、かけて行く風をみていますと、今度は胸がどかどかとなってくるのでした。", "きのうまで丘や野原の空の底に澄みきってしんとしていた風が、けさ夜あけ方にわかにいっせいにこう動き出して、どんどんどんどんタスカロラ海溝（かいこう）の北のはじをめがけて行くことを考えますと、もう一郎は顔がほてり、息もはあはあとなって、自分までがいっしょに空を翔（か）けて行くような気持ちになって、大急ぎでうちの中へはいると胸を一ぱいはって、息をふっと吹きました。", "「ああひで風だ。きょうは煙草（たばこ）も栗（くり）もすっかりやらえる。」と一郎のおじいさんがくぐりのところに立って、ぐっと空を見ています。一郎は急いで井戸からバケツに水を一ぱいくんで台所をぐんぐんふきました。", "それから金（かな）だらいを出して顔をぶるぶる洗うと、戸棚（とだな）から冷たいごはんと味噌（みそ）をだして、まるで夢中でざくざく食べました。", "「一郎、いまお汁（しる）できるから少し待ってだらよ。何（な）してけさそったに早く学校へ行がないやないがべ。」おかあさんは馬にやる（不詳）を煮るかまどに木を入れながらききました。", "「うん。又三郎は飛んでったがもしれないもや。」", "「又三郎って何だてや。鳥こだてが。」", "「うん。又三郎っていうやづよ。」一郎は急いでごはんをしまうと、椀（わん）をこちこち洗って、それから台所の釘（くぎ）にかけてある油合羽（あぶらがっぱ）を着て、下駄（げた）はもってはだしで嘉助をさそいに行きました。", "嘉助はまだ起きたばかりで、", "「いまごはんをたべて行ぐがら。」と言いましたので、一郎はしばらくうまやの前で待っていました。", "まもなく嘉助は小さい簑（みの）を着て出て来ました。", "はげしい風と雨にぐしょぬれになりながら二人はやっと学校へ来ました。昇降口からはいって行きますと教室はまだしいんとしていましたが、ところどころの窓のすきまから雨がはいって板はまるでざぶざぶしていました。一郎はしばらく教室を見まわしてから、", "「嘉助、二人して水掃ぐべな。」と言ってしゅろ箒（ぼうき）をもって来て水を窓の下の穴（あな）へはき寄せていました。", "するともうだれか来たのかというように奥から先生が出てきましたが、ふしぎなことは先生があたりまえの単衣（ひとえ）をきて赤いうちわをもっているのです。", "「たいへん早いですね。あなたがた二人（ふたり）で教室の掃除（そうじ）をしているのですか。」先生がききました。", "「先生お早うございます。」一郎が言いました。", "「先生お早うございます。」と嘉助も言いましたが、すぐ、", "「先生、又三郎きょう来るのすか。」とききました。", "先生はちょっと考えて、", "「又三郎って高田さんですか。ええ、高田さんはきのうおとうさんといっしょにもうほかへ行きました。日曜なのでみなさんにご挨拶（あいさつ）するひまがなかったのです。」", "「先生飛んで行ったのですか。」嘉助がききました。", "「いいえ、おとうさんが会社から電報で呼ばれたのです。おとうさんはもいちどちょっとこっちへ戻られるそうですが、高田さんはやっぱり向こうの学校にはいるのだそうです。向こうにはおかあさんもおられるのですから。」", "「何（な）して会社で呼ばったべす。」と一郎がききました。", "「ここのモリブデンの鉱脈は当分手をつけないことになったためなそうです。」", "「そうだないな。やっぱりあいづは風の又三郎だったな。」嘉助が高く叫びました。", "宿直室のほうで何かごとごと鳴る音がしました。先生は赤いうちわをもって急いでそっちへ行きました。", "二人はしばらくだまったまま、相手がほんとうにどう思っているか探るように顔を見合わせたまま立ちました。", "風はまだやまず、窓ガラスは雨つぶのために曇りながら、またがたがた鳴りました。"]}, {"no": 11, "title": "河童", "author": "芥川 竜之介", "category": "日本文学-児童-物語", "chars": 40627, "volume": "大", "paras": ["序", "これはある精神病院の患者、――第二十三号がだれにでもしゃべる話である。彼はもう三十を越しているであろう。が、一見したところはいかにも若々しい狂人である。彼の半生の経験は、――いや、そんなことはどうでもよい。彼はただじっと両膝（りょうひざ）をかかえ、時々窓の外へ目をやりながら、（鉄格子（てつごうし）をはめた窓の外には枯れ葉さえ見えない樫（かし）の木が一本、雪曇りの空に枝を張っていた。）院長のＳ博士や僕を相手に長々とこの話をしゃべりつづけた。もっとも身ぶりはしなかったわけではない。彼はたとえば「驚いた」と言う時には急に顔をのけぞらせたりした。　――", "僕はこういう彼の話をかなり正確に写したつもりである。もしまただれか僕の筆記に飽き足りない人があるとすれば、東京市外××村のＳ精神病院を尋ねてみるがよい。年よりも若い第二十三号はまず丁寧（ていねい）に頭を下げ、蒲団（ふとん）のない椅子（いす）を指さすであろう。それから憂鬱（ゆううつ）な微笑を浮かべ、静かにこの話を繰り返すであろう。最後に、――僕はこの話を終わった時の彼の顔色を覚えている。彼は最後に身を起こすが早いか、たちまち拳骨（げんこつ）をふりまわしながら、だれにでもこう怒鳴（どな）りつけるであろう。――「出て行け！　この悪党めが！　貴様も莫迦（ばか）な、嫉妬（しっと）深い、猥褻（わいせつ）な、ずうずうしい、うぬぼれきった、残酷な、虫のいい動物なんだろう。出ていけ！　この悪党めが！」", "一", "三年前（まえ）の夏のことです。僕は人並みにリュック・サックを背負い、あの上高地（かみこうち）の温泉宿（やど）から穂高山（ほたかやま）へ登ろうとしました。穂高山へ登るのには御承知のとおり梓川（あずさがわ）をさかのぼるほかはありません。僕は前に穂高山はもちろん、槍（やり）ヶ岳（たけ）にも登っていましたから、朝霧の下（お）りた梓川の谷を案内者もつれずに登ってゆきました。朝霧の下りた梓川の谷を――しかしその霧はいつまでたっても晴れる景色（けしき）は見えません。のみならずかえって深くなるのです。僕は一時間ばかり歩いた後（のち）、一度は上高地の温泉宿へ引き返すことにしようかと思いました。けれども上高地へ引き返すにしても、とにかく霧の晴れるのを待った上にしなければなりません。といって霧は一刻ごとにずんずん深くなるばかりなのです。「ええ、いっそ登ってしまえ。」――僕はこう考えましたから、梓川の谷を離れないように熊笹（くまざさ）の中を分けてゆきました。", "しかし僕の目をさえぎるものはやはり深い霧ばかりです。もっとも時々霧の中から太い毛生欅（ぶな）や樅（もみ）の枝が青あおと葉を垂（た）らしたのも見えなかったわけではありません。それからまた放牧の馬や牛も突然僕の前へ顔を出しました。けれどもそれらは見えたと思うと、たちまち濛々（もうもう）とした霧の中に隠れてしまうのです。そのうちに足もくたびれてくれば、腹もだんだん減りはじめる、――おまけに霧にぬれ透（とお）った登山服や毛布なども並みたいていの重さではありません。僕はとうとう我（が）を折りましたから、岩にせかれている水の音をたよりに梓川の谷へ下（お）りることにしました。", "僕は水ぎわの岩に腰かけ、とりあえず食事にとりかかりました。コオンド・ビイフの罐（かん）を切ったり、枯れ枝を集めて火をつけたり、――そんなことをしているうちにかれこれ十分はたったでしょう。その間（あいだ）にどこまでも意地の悪い霧はいつかほのぼのと晴れかかりました。僕はパンをかじりながら、ちょっと腕時計（どけい）をのぞいてみました。時刻はもう一時二十分過ぎです。が、それよりも驚いたのは何か気味の悪い顔が一つ、円（まる）い腕時計の硝子（ガラス）の上へちらりと影を落としたことです。僕は驚いてふり返りました。すると、――僕が河童（かっぱ）というものを見たのは実にこの時がはじめてだったのです。僕の後ろにある岩の上には画（え）にあるとおりの河童が一匹、片手は白樺（しらかば）の幹を抱（かか）え、片手は目の上にかざしたなり、珍しそうに僕を見おろしていました。", "僕は呆（あ）っ気（け）にとられたまま、しばらくは身動きもしずにいました。河童もやはり驚いたとみえ、目の上の手さえ動かしません。そのうちに僕は飛び立つが早いか、岩の上の河童へおどりかかりました。同時にまた河童も逃げ出しました。いや、おそらくは逃げ出したのでしょう。実はひらりと身をかわしたと思うと、たちまちどこかへ消えてしまったのです。僕はいよいよ驚きながら、熊笹（くまざさ）の中を見まわしました。すると河童は逃げ腰をしたなり、二三メエトル隔たった向こうに僕を振り返って見ているのです。それは不思議でもなんでもありません。しかし僕に意外だったのは河童の体（からだ）の色のことです。岩の上に僕を見ていた河童は一面に灰色を帯びていました。けれども今は体中すっかり緑いろに変わっているのです。僕は「畜生！」とおお声をあげ、もう一度河童（かっぱ）へ飛びかかりました。河童が逃げ出したのはもちろんです。それから僕は三十分ばかり、熊笹（くまざさ）を突きぬけ、岩を飛び越え、遮二無二（しゃにむに）河童を追いつづけました。", "河童もまた足の早いことは決して猿（さる）などに劣りません。僕は夢中になって追いかける間（あいだ）に何度もその姿を見失おうとしました。のみならず足をすべらして転（ころ）がったこともたびたびです。が、大きい橡（とち）の木が一本、太ぶとと枝を張った下へ来ると、幸いにも放牧の牛が一匹、河童の往（ゆ）く先へ立ちふさがりました。しかもそれは角（つの）の太い、目を血走らせた牡牛（おうし）なのです。河童はこの牡牛を見ると、何か悲鳴をあげながら、ひときわ高い熊笹の中へもんどりを打つように飛び込みました。僕は、――僕も「しめた」と思いましたから、いきなりそのあとへ追いすがりました。するとそこには僕の知らない穴でもあいていたのでしょう。僕は滑（なめ）らかな河童の背中にやっと指先がさわったと思うと、たちまち深い闇（やみ）の中へまっさかさまに転げ落ちました。が、我々人間の心はこういう危機一髪の際にも途方（とほう）もないことを考えるものです。僕は「あっ」と思う拍子にあの上高地（かみこうち）の温泉宿のそばに「河童橋（かっぱばし）」という橋があるのを思い出しました。それから、――それから先のことは覚えていません。僕はただ目の前に稲妻（いなずま）に似たものを感じたぎり、いつの間（ま）にか正気（しょうき）を失っていました。", "二", "そのうちにやっと気がついてみると、僕は仰向（あおむ）けに倒れたまま、大勢の河童にとり囲まれていました。のみならず太い嘴（くちばし）の上に鼻目金（はなめがね）をかけた河童が一匹、僕のそばへひざまずきながら、僕の胸へ聴診器を当てていました。その河童は僕が目をあいたのを見ると、僕に「静かに」という手真似（てまね）をし、それからだれか後ろにいる河童へ Quax, quax と声をかけました。するとどこからか河童が二匹、担架（たんか）を持って歩いてきました。僕はこの担架にのせられたまま、大勢の河童の群がった中を静かに何町か進んでゆきました。僕の両側に並んでいる町は少しも銀座通りと違いありません。やはり毛生欅（ぶな）の並み木のかげにいろいろの店が日除（ひよ）けを並べ、そのまた並み木にはさまれた道を自動車が何台も走っているのです。", "やがて僕を載せた担架は細い横町（よこちょう）を曲ったと思うと、ある家（うち）の中へかつぎこまれました。それは後（のち）に知ったところによれば、あの鼻目金をかけた河童の家、――チャックという医者の家だったのです。チャックは僕を小ぎれいなベッドの上へ寝かせました。それから何か透明な水薬（みずぐすり）を一杯飲ませました。僕はベッドの上に横たわったなり、チャックのするままになっていました。実際また僕の体（からだ）はろくに身動きもできないほど、節々（ふしぶし）が痛んでいたのですから。", "チャックは一日に二三度は必ず僕を診察にきました。また三日に一度ぐらいは僕の最初に見かけた河童、――バッグという漁夫（りょうし）も尋ねてきました。河童は我々人間が河童のことを知っているよりもはるかに人間のことを知っています。それは我々人間が河童を捕獲することよりもずっと河童が人間を捕獲することが多いためでしょう。捕獲というのは当たらないまでも、我々人間は僕の前にもたびたび河童の国へ来ているのです。のみならず一生河童の国に住んでいたものも多かったのです。なぜと言ってごらんなさい。僕らはただ河童（かっぱ）ではない、人間であるという特権のために働かずに食っていられるのです。現にバッグの話によれば、ある若い道路工夫（こうふ）などはやはり偶然この国へ来た後（のち）、雌（めす）の河童を妻にめとり、死ぬまで住んでいたということです。もっともそのまた雌の河童はこの国第一の美人だった上、夫の道路工夫をごまかすのにも妙をきわめていたということです。", "僕は一週間ばかりたった後、この国の法律の定めるところにより、「特別保護住民」としてチャックの隣に住むことになりました。僕の家（うち）は小さい割にいかにも瀟洒（しょうしゃ）とできあがっていました。もちろんこの国の文明は我々人間の国の文明――少なくとも日本の文明などとあまり大差はありません。往来に面した客間の隅（すみ）には小さいピアノが一台あり、それからまた壁には額縁（がくぶち）へ入れたエッティングなども懸（かか）っていました。ただ肝腎（かんじん）の家をはじめ、テエブルや椅子（いす）の寸法も河童の身長に合わせてありますから、子どもの部屋（へや）に入れられたようにそれだけは不便に思いました。", "僕はいつも日暮れがたになると、この部屋にチャックやバッグを迎え、河童の言葉を習いました。いや、彼らばかりではありません。特別保護住民だった僕にだれも皆好奇心を持っていましたから、毎日血圧を調べてもらいに、わざわざチャックを呼び寄せるゲエルという硝子（ガラス）会社の社長などもやはりこの部屋へ顔を出したものです。しかし最初の半月ほどの間に一番僕と親しくしたのはやはりあのバッグという漁夫（りょうし）だったのです。", "ある生暖（なまあたた）かい日の暮れです。僕はこの部屋のテエブルを中に漁夫のバッグと向かい合っていました。するとバッグはどう思ったか、急に黙ってしまった上、大きい目をいっそう大きくしてじっと僕を見つめました。僕はもちろん妙に思いましたから、「Quax, Bag, quo quel, quan?」と言いました。これは日本語に翻訳すれば、「おい、バッグ、どうしたんだ」ということです。が、バッグは返事をしません。のみならずいきなり立ち上がると、べろりと舌を出したなり、ちょうど蛙（かえる）の跳（は）ねるように飛びかかる気色（けしき）さえ示しました。僕はいよいよ無気味になり、そっと椅子（いす）から立ち上がると、一足（いっそく）飛びに戸口へ飛び出そうとしました。ちょうどそこへ顔を出したのは幸いにも医者のチャックです。", "「こら、バッグ、何をしているのだ？」", "チャックは鼻目金（はなめがね）をかけたまま、こういうバッグ　をにらみつけました。するとバッグは恐れいったとみえ、何度も頭へ手をやりながら、こう言ってチャックにあやまるのです。", "「どうもまことに相（あい）すみません。実はこの旦那（だんな）の気味悪がるのがおもしろかったものですから、つい調子に乗って悪戯（いたずら）をしたのです。どうか旦那も堪忍（かんにん）してください。」", "三", "僕はこの先を話す前にちょっと河童というものを説明しておかなければなりません。河童はいまだに実在するかどうかも疑問になっている動物です。が、それは僕自身が彼らの間に住んでいた以上、少しも疑う余地はないはずです。ではまたどういう動物かと言えば、頭に短い毛のあるのはもちろん、手足に水掻（みずか）きのついていることも「水虎考略（すいここうりゃく）」などに出ているのと著しい違いはありません。身長もざっと一メエトルを越えるか越えぬくらいでしょう。体重は医者のチャックによれば、二十ポンドから三十ポンドまで、――まれには五十何ポンドぐらいの大河童（おおかっぱ）もいると言っていました。それから頭のまん中には楕円形（だえんけい）の皿（さら）があり、そのまた皿は年齢により、だんだん固（かた）さを加えるようです。現に年をとったバッグの皿は若いチャックの皿などとは全然手ざわりも違うのです。しかし一番不思議なのは河童の皮膚の色のことでしょう。河童は我々人間のように一定の皮膚の色を持っていません。なんでもその周囲の色と同じ色に変わってしまう、――たとえば草の中にいる時には草のように緑色に変わり、岩の上にいる時には岩のように灰色に変わるのです。これはもちろん河童に限らず、カメレオンにもあることです。あるいは河童は皮膚組織の上に何かカメレオンに近いところを持っているのかもしれません。僕はこの事実を発見した時、西国（さいこく）の河童は緑色であり、東北（とうほく）の河童は赤いという民俗学上の記録を思い出しました。のみならずバッグを追いかける時、突然どこへ行ったのか、見えなくなったことを思い出しました。しかも河童は皮膚の下によほど厚い脂肪を持っているとみえ、この地下の国の温度は比較的低いのにもかかわらず、（平均華氏（かっし）五十度前後です。）着物というものを知らず　にいるのです。もちろんどの河童も目金（めがね）をかけたり、巻煙草（まきたばこ）の箱を携えたり、金入（かねい）れを持ったりはしているでしょう。しかし河童はカンガルウのように腹に袋を持っていますから、それらのものをしまう時にも格別不便はしないのです。ただ僕におかしかったのは腰のまわりさえおおわないことです。僕はある時この習慣をなぜかとバッグに尋ねてみました。すると　　バッグはのけぞったまま、いつまでもげらげら笑っていました。おまけに「わたしはお前さんの隠しているのがおかしい」と返事をしました。", "四", "僕はだんだん河童の使う日常の言葉を覚えてきました。従って河童の風俗や習慣ものみこめるようになってきました。その中でも一番不思議だったのは河童は我々人間の真面目（まじめ）に思うことをおかしがる、同時に我々人間のおかしがることを真面目に思う――こういうとんちんかんな習慣です。たとえば我々人間は正義とか人道とかいうことを真面目に思う、しかし河童はそんなことを聞くと、腹をかかえて笑い出すのです。つまり彼らの滑稽（こっけい）という観念は我々の滑稽という観念と全然標準を異（こと）にしているのでしょう。僕はある時医者のチャックと産児制限の話をしていました。するとチャックは大口をあいて、鼻目金（はなめがね）の落ちるほど笑い出しました。僕はもちろん腹が立ちましたから、何がおかしいかと詰問しました。なんでもチャックの返答はだいたいこうだったように覚えています。もっとも多少細かいところは間違（まちが）っているかもしれません。なにしろまだそのころは僕も河童の使う言葉をすっかり理解していなかったのですから。", "「しかし両親のつごうばかり考えているのはおかしいですからね。どうもあまり手前勝手ですからね。」", "その代わりに我々人間から見れば、実際また河童（かっぱ）のお産ぐらい、おかしいものはありません。現に僕はしばらくたってから、バッグの細君のお産をするところをバッグの小屋へ見物にゆきました。河童もお産をする時には我々人間と同じことです。やはり医者や産婆（さんば）などの助けを借りてお産をするのです。けれどもお産をするとなると、父親は電話でもかけるように母親の生殖器に口をつけ、「お前はこの世界へ生まれてくるかどうか、よく考えた上で返事をしろ。」と大きな声で尋ねるのです。バッグもやはり膝（ひざ）をつきながら、何度も繰り返してこう言いました。それからテエブルの上にあった消毒用の水薬（すいやく）でうがいをしました。すると細君の腹の中の子は多少気兼ねでもしているとみえ、こう小声に返事をしました。", "「僕は生まれたくはありません。第一僕のお父（とう）さんの遺伝は精神病だけでもたいへんです。その上僕は河童的存在を悪いと信じていますから。」", "バッグはこの返事を聞いた時、てれたように頭をかいていました。が、そこにい合わせた産婆はたちまち細君の生殖器へ太い硝子（ガラス）の管（かん）を突きこみ、何か液体を注射しました。すると細君はほっとしたように太い息をもらしました。同時にまた今まで大きかった腹は水素瓦斯（すいそガス）を抜いた風船のようにへたへたと縮んでしまいました。", "こういう返事をするくらいですから、河童の子どもは生まれるが早いか、もちろん歩いたりしゃべったりするのです。なんでもチャックの話では出産後二十六日目に神の有無（うむ）について講演をした子どももあったとかいうことです。もっともその子どもは二月目（ふたつきめ）には死んでしまったということですが。", "お産の話をしたついでですから、僕がこの国へ来た三月目（みつきめ）に偶然ある街（まち）の角（かど）で見かけた、大きいポスタアの話をしましょう。その大きいポスタアの下には喇叭（らっぱ）を吹いている河童だの剣を持っている河童だのが十二三匹描（か）いてありました。それからまた上には河童の使う、ちょうど時計（とけい）のゼンマイに似た螺旋（らせん）文字が一面に並べてありました。この螺旋文字を翻訳すると、だいたいこういう意味になるのです。これもあるいは細かいところは間違（まちが）っているかもしれません。が、とにかく僕としては僕といっしょに歩いていた、ラップという河童の学生が大声に読み上げてくれる言葉をいちいちノオトにとっておいたのです。", "遺伝的義勇隊を募（つの）る", "健全なる男女の河童よ", "悪遺伝を撲滅（ぼくめつ）するために", "不健全なる男女の河童と結婚せよ", "僕はもちろんその時にもそんなことの行なわれないことをラップに話して聞かせました。するとラップばかりではない、ポスタアの近所にいた河童はことごとくげらげら笑い出しました。", "「行なわれない？　だってあなたの話ではあなたがたもやはり我々のように行なっていると思いますがね。あなたは令息が女中に惚（ほ）れたり、令嬢が運転手に惚れたりするのはなんのためだと思っているのです？　あれは皆無意識的に悪遺伝を撲滅しているのですよ。第一この間あなたの話したあなたがた人間の義勇隊よりも、――一本の鉄道を奪うために互いに殺し合う義勇隊ですね、――ああいう義勇隊に比べれば、ずっと僕たちの義勇隊は高尚ではないかと思いますがね。」", "ラップは真面目（まじめ）にこう言いながら、しかも太い腹だけはおかしそうに絶えず浪立（なみだ）たせていました。が、僕は笑うどころか、あわててある河童（かっぱ）をつかまえようとしました。それは僕の油断を見すまし、その河童が僕の万年筆を盗んだことに気がついたからです。しかし皮膚の滑（なめ）らかな河童は容易に我々にはつかまりません。その河童もぬらりとすべり抜けるが早いかいっさんに逃げ出してしまいました。ちょうど蚊のようにやせた体（からだ）を倒れるかと思うくらいのめらせながら。", "五", "僕はこのラップという河童にバッグにも劣らぬ世話になりました。が、その中でも忘れられないのはトックという河童に紹介されたことです。トックは河童仲間の詩人です。詩人が髪を長くしていることは我々人間と変わりません。僕は時々トックの家（うち）へ退屈しのぎに遊びにゆきました。トックはいつも狭い部屋（へや）に高山植物の鉢植（はちう）えを並べ、詩を書いたり煙草（たばこ）をのんだり、いかにも気楽そうに暮らしていました。そのまた部屋の隅（すみ）には雌（めす）の河童が一匹、（トックは自由恋愛家ですから、細君というものは持たないのです。）編み物か何かしていました。トックは僕の顔を見ると、いつも微笑してこう言うのです。（もっとも河童の微笑するのはあまりいいものではありません。少なくとも僕は最初のうちはむしろ無気味に感じたものです。）", "「やあ、よく来たね。まあ、その椅子（いす）にかけたまえ。」", "トックはよく河童の生活だの河童の芸術だのの話をしました。トックの信ずるところによれば、当たり前の河童の生活ぐらい、莫迦（ばか）げているものはありません。親子夫婦兄弟などというのはことごとく互いに苦しめ合うことを唯一の楽しみにして暮らしているのです。ことに家族制度というものは莫迦げている以上にも莫迦げているのです。トックはある時窓の外を指さし、「見たまえ。あの莫迦げさ加減を！」と吐き出すように言いました。窓の外の往来にはまだ年の若い河童が一匹、両親らしい河童をはじめ、七八匹の雌雄（めすおす）の河童を頸（くび）のまわりへぶら下げながら、息も絶え絶えに歩いていました。しかし僕は年の若い河童の犠牲的精神に感心しましたから、かえってその健気（けなげ）さをほめ立てました。", "「ふん、君はこの国でも市民になる資格を持っている。　――　時に君は社会主義者かね？」", "僕はもちろん qua（これは河童の使う言葉では「然（しか）り」という意味を現わすのです。）と答えました。", "「では百人の凡人のために甘んじてひとりの天才を犠牲にすることも顧みないはずだ。」", "「では君は何主義者だ？　だれかトック君の信条は無政府主義だと言っていたが、　――　」", "「僕か？　僕は超人（直訳すれば超河童です。）だ。」", "トックは昂然（こうぜん）と言い放ちました。こういうトックは芸術の上にも独特な考えを持っています。トックの信ずるところによれば、芸術は何ものの支配をも受けない、芸術のための芸術である、従って芸術家たるものは何よりも先に善悪を絶（ぜっ）した超人でなければならぬというのです。もっともこれは必ずしもトック一匹の意見ではありません。トックの仲間の詩人たちはたいてい同意見を持っているようです。現に僕はトックといっしょにたびたび超人倶楽部（クラブ）へ遊びにゆきました。超人倶楽部に集まってくるのは詩人、小説家、戯曲家、批評家、画家、音楽家、彫刻家、芸術上の素人（しろうと）等です。しかしいずれも超人です。彼らは電燈の明るいサロンにいつも快活に話し合っていました。のみならず時には得々（とくとく）と彼らの超人ぶりを示し合っていました。たとえばある彫刻家などは大きい鬼羊歯（おにしだ）の鉢植（はちう）えの間に年の若い河童（かっぱ）をつかまえながら、しきりに男色（だんしょく）をもてあそんでいました。またある雌（めす）の小説家などはテエブルの上に立ち上がったなり、アブサントを六十本飲んで見せました。もっともこれは六十本目にテエブルの下へ転（ころ）げ落ちるが早いか、たちまち往生してしまいましたが。", "僕はある月のいい晩、詩人のトックと肘（ひじ）を組んだまま、超人倶楽部から帰ってきました。トックはいつになく沈みこんでひとことも口をきかずにいました。そのうちに僕らは火（ほ）かげのさした、小さい窓の前を通りかかりました。そのまた窓の向こうには夫婦らしい雌雄（めすおす）の河童が二匹、三匹の子どもの河童といっしょに晩餐（ばんさん）のテエブルに向かっているのです。するとトックはため息をしながら、突然こう僕に話しかけました。", "「僕は超人的恋愛家だと思っているがね、ああいう家庭の容子（ようす）を見ると、やはりうらやましさを感じるんだよ。」", "「しかしそれはどう考えても、矛盾しているとは思わないかね？」", "けれどもトックは月明りの下にじっと腕を組んだまま、あの小さい窓の向こうを、――平和な五匹の河童たちの晩餐のテエブルを見守っていました。それからしばらくしてこう答えました。", "「あすこにある玉子焼きはなんと言っても、恋愛などよりも衛生的だからね。」", "六", "実際また河童の恋愛は我々人間の恋愛とはよほど趣を異（こと）にしています。雌の河童はこれぞという雄の河童を見つけるが早いか、雄の河童をとらえるのにいかなる手段も顧みません、一番正直な雌の河童は遮二無二（しゃにむに）雄の河童を追いかけるのです。現に僕は気違いのように雄の河童を追いかけている雌の河童を見かけました。いや、そればかりではありません。若い雌の河童はもちろん、その河童の両親や兄弟までいっしょになって追いかけるのです。雄の河童こそみじめです。なにしろさんざん逃げまわったあげく、運よくつかまらずにすんだとしても、二三か月は床（とこ）についてしまうのですから。僕はある時僕の家にトックの詩集を読んでいました。するとそこへ駆けこんできたのはあのラップという学生です。ラップは僕の家へ転げこむと、床（ゆか）の上へ倒れたなり、息も切れ切れにこう言うのです。", "「大変（たいへん）だ！　とうとう僕は抱きつかれてしまった！」", "僕はとっさに詩集を投げ出し、戸口の錠（じょう）をおろしてしまいました。しかし鍵穴（かぎあな）からのぞいてみると、硫黄（いおう）の粉末を顔に塗った、背（せい）の低い雌（めす）の河童（かっぱ）が一匹、まだ戸口にうろついているのです。ラップはその日から何週間か僕の床（とこ）の上に寝ていました。のみならずいつかラップの嘴（くちばし）はすっかり腐って落ちてしまいました。", "もっともまた時には雌の河童を一生懸命（いっしょうけんめい）に追いかける雄（おす）の河童もないではありません。しかしそれもほんとうのところは追いかけずにはいられないように雌の河童が仕向けるのです。僕はやはり気違いのように雌の河童を追いかけている雄の河童も見かけました。雌の河童は逃げてゆくうちにも、時々わざと立ち止まってみたり、四（よ）つん這（ば）いになったりして見せるのです。おまけにちょうどいい時分になると、さもがっかりしたように楽々とつかませてしまうのです。僕の見かけた雄の河童は雌の河童を抱いたなり、しばらくそこに転（ころ）がっていました。が、やっと起き上がったのを見ると、失望というか、後悔というか、とにかくなんとも形容できない、気の毒な顔をしていました。しかしそれはまだいいのです。これも僕の見かけた中に小さい雄の河童が一匹、雌の河童を追いかけていました。雌の河童は例のとおり、誘惑的遁走（とんそう）をしているのです。するとそこへ向こうの街（まち）から大きい雄の河童が一匹、鼻息を鳴らせて歩いてきました。雌の河童はなにかの拍子にふとこの雄の河童を見ると「大変（たいへん）です！　助けてください！　あの河童はわたしを殺そうとするのです！」と金切（かなき）り声を出して叫びました。もちろん大きい雄の河童はたちまち小さい河童をつかまえ、往来のまん中へねじ伏せました。小さい河童は水掻（みずか）きのある手に二三度空（くう）をつかんだなり、とうとう死んでしまいました。けれどももうその時には雌の河童はにやにやしながら、大きい河童の頸（くび）っ玉へしっかりしがみついてしまっていたのです。", "僕の知っていた雄（おす）の河童（かっぱ）はだれも皆言い合わせたように雌（めす）の河童に追いかけられました。もちろん妻子を持っているバッグでもやはり追いかけられたのです。のみならず二三度はつかまったのです。ただマッグという哲学者だけは（これはあのトックという詩人の隣にいる河童です。）一度もつかまったことはありません。これは一つにはマッグぐらい、醜い河童も少ないためでしょう。しかしまた一つにはマッグだけはあまり往来へ顔を出さずに家（うち）にばかりいるためです。僕はこのマッグの家へも時々話しに出かけました。マッグはいつも薄暗（うすぐら）い部屋（へや）に七色（なないろ）の色硝子（いろガラス）のランタアンをともし、脚（あし）の高い机に向かいながら、厚い本ばかり読んでいるのです。僕はある時こういうマッグと河童の恋愛を論じ合いました。", "「なぜ政府は雌の河童が雄の河童を追いかけるのをもっと厳重に取り締まらないのです？」", "「それは一つには官吏の中に雌の河童の少ないためですよ。雌の河童は雄の河童よりもいっそう嫉妬心（しっとしん）は強いものですからね、雌の河童の官吏さえ殖（ふ）えれば、きっと今よりも雄の河童は追いかけられずに暮らせるでしょう。しかしその効力もしれたものですね。なぜと言ってごらんなさい。官吏同志でも雌の河童は雄の河童を追いかけますからね。」", "「じゃあなたのように暮らしているのは一番幸福なわけですね。」", "するとマッグは椅子（いす）を離れ、僕の両手を握ったまま、ため息といっしょにこう言いました。", "「あなたは我々河童ではありませんから、おわかりにならないのももっともです。しかしわたしもどうかすると、あの恐ろしい雌の河童に追いかけられたい気も起こるのですよ。」", "七", "僕はまた詩人のトックとたびたび音楽会へも出かけました。が、いまだに忘れられないのは三度目に聴（き）きにいった音楽会のことです。もっとも会場の容子（ようす）などはあまり日本と変わっていません。やはりだんだんせり上がった席に雌雄の河童が三四百匹、いずれもプログラムを手にしながら、一心に耳を澄ませているのです。僕はこの三度目の音楽会の時にはトックやトックの雌の河童のほかにも哲学者のマッグといっしょになり、一番前の席にすわっていました。するとセロの独奏が終わった後（のち）、妙に目の細い河童が一匹、無造作（むぞうさ）に譜本を抱（かか）えたまま、壇の上へ上がってきました。この河童はプログラムの教えるとおり、名高いクラバックという作曲家です。プログラムの教えるとおり、――いや、プログラムを見るまでもありません。クラバックはトックが属している超人倶楽部（クラブ）の会員ですから、僕もまた顔だけは知っているのです。", "「Lied――Craback」（この国のプログラムもたいていは独逸（ドイツ）語を並べていました。）", "クラバックは盛んな拍手のうちにちょっと我々へ一礼した後、静かにピアノの前へ歩み寄りました。それからやはり無造作に自作のリイドを弾（ひ）きはじめました。クラバックはトックの言葉によれば、この国の生んだ音楽家中、前後に比類のない天才だそうです。僕はクラバックの音楽はもちろん、そのまた余技の抒情（じょじょう）詩にも興味を持っていましたから、大きい弓なりのピアノの音に熱心に耳を傾けていました。トックやマッグも恍惚（こうこつ）としていたことはあるいは僕よりもまさっていたでしょう。が、あの美しい（少なくとも河童（かっぱ）たちの話によれば）雌（めす）の河童だけはしっかりプログラムを握ったなり、時々さもいらだたしそうに長い舌をべろべろ出していました。これはマッグの話によれば、なんでもかれこれ十年前（ぜん）にクラバックをつかまえそこなったものですから、いまだにこの音楽家を目の敵（かたき）にしているのだとかいうことです。", "クラバックは全身に情熱をこめ、戦うようにピアノを弾（ひ）きつづけました。すると突然会場の中に神鳴りのように響き渡ったのは「演奏禁止」という声です。僕はこの声にびっくりし、思わず後ろをふり返りました。声の主は紛れもない、一番後ろの席にいる身（み）の丈（たけ）抜群の巡査です、巡査は僕がふり向いた時、悠然（ゆうぜん）と腰をおろしたまま、もう一度前よりもおお声に「演奏禁止」と怒鳴（どな）りました。それから、――", "それから先は大混乱です。「警官横暴！」「クラバック、弾け！　弾け！」「莫迦（ばか）！」「畜生！」「ひっこめ！」「負けるな！」――こういう声のわき上がった中に椅子（いす）は倒れる、プログラムは飛ぶ、おまけにだれが投げるのか、サイダアの空罎（あきびん）や石ころやかじりかけの胡瓜（きゅうり）さえ降ってくるのです。僕は呆（あ）っ気（け）にとられましたから、トックにその理由を尋ねようとしました。が、トックも興奮したとみえ、椅子の上に突っ立ちながら、「クラバック、弾け！　弾け！」とわめきつづけています。のみならずトックの雌の河童もいつの間（ま）に敵意を忘れたのか、「警官横暴」と叫んでいることは少しもトックに変わりません。僕はやむを得ずマッグに向かい、「どうしたのです？」と尋ねてみました。", "「これですか？　これはこの国ではよくあることですよ。元来画（え）だの文芸だのは　――　」", "マッグは何か飛んでくるたびにちょっと頸（くび）を縮めながら、相変わらず静かに説明しました。", "「元来画だの文芸だのはだれの目にも何を表わしているかはとにかくちゃんとわかるはずですから、この国では決して発売禁止や展覧禁止は行なわれません。その代わりにあるのが演奏禁止です。なにしろ音楽というものだけはどんなに風俗を壊乱する曲でも、耳のない河童にはわかりませんからね。」", "「しかしあの巡査は耳があるのですか？」", "「さあ、それは疑問ですね。たぶん今の旋律を聞いているうちに細君といっしょに寝ている時の心臓の鼓動でも思い出したのでしょう。」", "こういう間にも大騒ぎはいよいよ盛んになるばかりです。クラバックはピアノに向かったまま、傲然（ごうぜん）と我々をふり返っていました。が、いくら傲然としていても、いろいろのものの飛んでくるのはよけないわけにゆきません。従ってつまり二三秒置きにせっかくの態度も変わったわけです。しかしとにかくだいたいとしては大音楽家の威厳を保ちながら、細い目をすさまじくかがやかせていました。僕は――僕ももちろん危険を避けるためにトックを小楯（こだて）にとっていたものです。が、やはり好奇心に駆られ、熱心にマッグと話しつづけました。", "「そんな検閲は乱暴じゃありませんか？」", "「なに、どの国の検閲よりもかえって進歩しているくらいですよ。たとえば××をごらんなさい。現につい一月（ひとつき）ばかり前にも、　――　」", "ちょうどこう言いかけたとたんです。マッグはあいにく脳天に空罎が落ちたものですから、quack（これはただ間投詞（かんとうし）です）と一声叫んだぎり、とうとう気を失ってしまいました。", "八", "僕は硝子（ガラス）会社の社長のゲエルに不思議にも好意を持っていました。ゲエルは資本家中の資本家です。おそらくはこの国の河童（かっぱ）の中でも、ゲエルほど大きい腹をした河童は一匹もいなかったのに違いありません。しかし茘枝（れいし）に似た細君や胡瓜（きゅうり）に似た子どもを左右にしながら、安楽椅子（いす）にすわっているところはほとんど幸福そのものです。僕は時々裁判官のペップや医者のチャックにつれられてゲエル家（け）の晩餐（ばんさん）へ出かけました。またゲエルの紹介状を持ってゲエルやゲエルの友人たちが多少の関係を持っているいろいろの工場も見て歩きました。そのいろいろの工場の中でもことに僕におもしろかったのは書籍製造会社の工場です。僕は年の若い河童の技師とこの工場の中へはいり、水力電気を動力にした、大きい機械をながめた時、今さらのように河童の国の機械工業の進歩に驚嘆しました。なんでもそこでは一年間に七百万部の本を製造するそうです。が、僕を驚かしたのは本の部数ではありません。それだけの本を製造するのに少しも手数のかからないことです。なにしろこの国では本を造るのにただ機械の漏斗形（じょうごがた）の口へ紙とインクと灰色をした粉末とを入れるだけなのですから。それらの原料は機械の中へはいると、ほとんど五分とたたないうちに菊版（きくばん）、四六版（しろくばん）、菊半裁版（きくはんさいばん）などの無数の本になって出てくるのです。僕は瀑（たき）のように流れ落ちるいろいろの本をながめながら、反（そ）り身になった河童の技師にその灰色の粉末はなんと言うものかと尋ねてみました。すると技師は黒光りに光った機械の前にたたずんだまま、つまらなそうにこう返事をしました。", "「これですか？　これは驢馬（ろば）の脳髄ですよ。ええ、一度乾燥させてから、ざっと粉末にしただけのものです。時価は一噸（とん）二三銭ですがね。」", "もちろんこういう工業上の奇蹟は書籍製造会社にばかり起こっているわけではありません。絵画製造会社にも、音楽製造会社にも、同じように起こっているのです。実際またゲエルの話によれば、この国では平均一か月に七八百種の機械が新案され、なんでもずんずん人手を待たずに大量生産が行なわれるそうです。従ってまた職工の解雇（かいこ）されるのも四五万匹を下らないそうです。そのくせまだこの国では毎朝新聞を読んでいても、一度も罷業（ひぎょう）という字に出会いません。僕はこれを妙に思いましたから、ある時またペップやチャックとゲエル家の晩餐に招かれた機会にこのことをなぜかと尋ねてみました。", "「それはみんな食ってしまうのですよ。」", "食後の葉巻をくわえたゲエルはいかにも無造作（むぞうさ）にこう言いました。しかし「食ってしまう」というのはなんのことだかわかりません。すると鼻目金（はなめがね）をかけたチャックは僕の不審を察したとみえ、横あいから説明を加えてくれました。", "「その職工をみんな殺してしまって、肉を食料に使うのです。ここにある新聞をごらんなさい。今月はちょうど六万四千七百六十九匹の職工が解雇（かいこ）されましたから、それだけ肉の値段も下がったわけですよ。」", "「職工は黙って殺されるのですか？」", "「それは騒いでもしかたはありません。職工屠殺法（しょっこうとさつほう）があるのですから。」", "これは山桃（やまもも）の鉢植（はちう）えを後ろに苦い顔をしていたペップの言葉です。僕はもちろん不快を感じました。しかし主人公のゲエルはもちろん、ペップやチャックもそんなことは当然と思っているらしいのです。現にチャックは笑いながら、あざけるように僕に話しかけました。", "「つまり餓死（がし）したり自殺したりする手数を国家的に省略してやるのですね。ちょっと有毒瓦斯（ガス）をかがせるだけですから、たいした苦痛はありませんよ。」", "「けれどもその肉を食うというのは、　――　」", "「常談（じょうだん）を言ってはいけません。あのマッグに聞かせたら、さぞ大笑いに笑うでしょう。あなたの国でも第四階級の娘たちは売笑婦になっているではありませんか？　職工の肉を食うことなどに憤慨したりするのは感傷主義ですよ。」", "こういう問答を聞いていたゲエルは手近いテエブルの上にあったサンドウィッチの皿を勧めながら、恬然（てんぜん）と僕にこう言いました。", "「どうです？　一つとりませんか？　これも職工の肉ですがね。」", "僕はもちろん辟易（へきえき）しました。いや、そればかりではありません。ペップやチャックの笑い声を後ろにゲエル家（け）の客間を飛び出しました。それはちょうど家々の空に星明かりも見えない荒れ模様の夜です。僕はその闇（やみ）の中を僕の住居（すまい）へ帰りながら、のべつ幕なしに嘔吐（へど）を吐きました。夜目にも白（しら）じらと流れる嘔吐を。", "九", "しかし硝子（ガラス）会社の社長のゲエルは人なつこい河童（かっぱ）だったのに違いません。僕はたびたびゲエルといっしょにゲエルの属している倶楽部（クラブ）へ行き、愉快に一晩を暮らしました。これは一つにはその倶楽部はトックの属している超人倶楽部よりもはるかに居心（いごころ）のよかったためです。のみならずまたゲエルの話は哲学者のマッグの話のように深みを持っていなかったにせよ、僕には全然新しい世界を、――広い世界をのぞかせました。ゲエルは、いつも純金の匙（さじ）に珈琲（カッフェ）の茶碗（ちゃわん）をかきまわしながら、快活にいろいろの話をしたものです。", "なんでもある霧の深い晩、僕は冬薔薇（ふゆそうび）を盛った花瓶（かびん）を中にゲエルの話を聞いていました。それはたしか部屋（へや）全体はもちろん、椅子（いす）やテエブルも白い上に細い金の縁（ふち）をとったセセッション風の部屋だったように覚えています。ゲエルはふだんよりも得意そうに顔中に微笑をみなぎらせたまま、ちょうどそのころ天下を取っていた Quorax 党内閣のことなどを話しました。クオラックスという言葉はただ意味のない間投詞（かんとうし）ですから、「おや」とでも訳すほかはありません。が、とにかく何よりも先に「河童全体の利益」ということを標榜（ひょうぼう）していた政党だったのです。", "「クオラックス党を支配しているものは名高い政治家のロッペです。『正直は最良の外交である』とはビスマルクの言った言葉でしょう。しかしロッペは正直を内治（ないち）の上にも及ぼしているのです。　――　」", "「けれどもロッペの演説は　――　」", "「まあ、わたしの言うことをお聞きなさい。あの演説はもちろんことごとく（うそ）です。が、ということはだれでも知っていますから、畢竟（ひっきょう）正直と変わらないでしょう、それを一概にと言うのはあなたがただけの偏見ですよ。我々河童（かっぱ）はあなたがたのように、　――　しかしそれはどうでもよろしい。わたしの話したいのはロッペのことです。ロッペはクオラックス党を支配している、そのまたロッペを支配しているものは Pou-Fou 新聞の（この『プウ・フウ』という言葉もやはり意味のない間投詞（かんとうし）です。もし強（し）いて訳すれば、『ああ』とでも言うほかはありません。）社長のクイクイです。が、クイクイも彼自身の主人というわけにはゆきません。クイクイを支配しているものはあなたの前にいるゲエルです。」", "「けれども――これは失礼かもしれませんけれども、プウ・フウ新聞は労働者の味かたをする新聞でしょう。その社長のクイクイもあなたの支配を受けているというのは、　――　」", "「プウ・フウ新聞の記者たちはもちろん労働者の味かたです。しかし記者たちを支配するものはクイクイのほかはありますまい。しかもクイクイはこのゲエルの後援を受けずにはいられないのです。」", "ゲエルは相変わらず微笑しながら、純金の匙（さじ）をおもちゃにしています。僕はこういうゲエルを見ると、ゲエル自身を憎むよりも、プウ・フウ新聞の記者たちに同情の起こるのを感じました。するとゲエルは僕の無言にたちまちこの同情を感じたとみえ、大きい腹をふくらませてこう言うのです。", "「なに、プウ・フウ新聞の記者たちも全部労働者の味かたではありませんよ。少なくとも我々河童というものはだれの味かたをするよりも先に我々自身の味かたをしますからね。　――　しかしさらに厄介（やっかい）なことにはこのゲエル自身さえやはり他人の支配を受けているのです。あなたはそれをだれだと思いますか？　それはわたしの妻ですよ。美しいゲエル夫人ですよ。」", "ゲエルはおお声に笑いました。", "「それはむしろしあわせでしょう。」", "「とにかくわたしは満足しています。しかしこれもあなたの前だけに、――河童でないあなたの前だけに手放しで吹聴（ふいちょう）できるのです。」", "「するとつまりクオラックス内閣はゲエル夫人が支配しているのですね。」", "「さあそうも言われますかね。　――　しかし七年前（まえ）の戦争などはたしかにある雌（めす）の河童のために始まったものに違いありません。」", "「戦争？　この国にも戦争はあったのですか？」", "「ありましたとも。将来もいつあるかわかりません。なにしろ隣国のある限りは、　――　」", "僕は実際この時はじめて河童の国も国家的に孤立していないことを知りました。ゲエルの説明するところによれば、河童（かっぱ）はいつも獺（かわうそ）を仮設敵にしているということです。しかも獺は河童に負けない軍備を具（そな）えているということです。僕はこの獺を相手に河童の戦争した話に少なからず興味を感じました。（なにしろ河童の強敵に獺のいるなどということは「水虎考略（すいここうりゃく）」の著者はもちろん、「山島民譚集（さんとうみんたんしゅう）」の著者柳田国男（やなぎだくにお）さんさえ知らずにいたらしい新事実ですから。）", "「あの戦争の起こる前にはもちろん両国とも油断せずにじっと相手をうかがっていました。というのはどちらも同じように相手を恐怖していたからです。そこへこの国にいた獺が一匹、ある河童の夫婦を訪問しました。そのまた雌（めす）の河童というのは亭主を殺すつもりでいたのです。なにしろ亭主は道楽者でしたからね。おまけに生命保険のついていたことも多少の誘惑になったかもしれません。」", "「あなたはその夫婦を御存じですか？」", "「ええ、――いや、雄（おす）の河童だけは知っています。わたしの妻などはこの河童を悪人のように言っていますがね。しかしわたしに言わせれば、悪人よりもむしろ雌の河童につかまることを恐れている被害妄想（ひがいもうぞう）の多い狂人です。　――　そこでこの雌の河童は亭主のココアの茶碗（ちゃわん）の中へ青化加里（せいかかり）を入れておいたのです。それをまたどう間違（まちが）えたか、客の獺に飲ませてしまったのです。獺はもちろん死んでしまいました。それから　――　」", "「それから戦争になったのですか？」", "「ええ、あいにくその獺は勲章を持っていたものですからね。」", "「戦争はどちらの勝ちになったのですか？」", "「もちろんこの国の勝ちになったのです。三十六万九千五百匹の河童たちはそのために健気（けなげ）にも戦死しました。しかし敵国に比べれば、そのくらいの損害はなんともありません。この国にある毛皮という毛皮はたいてい獺の毛皮です。わたしもあの戦争の時には硝子（ガラス）を製造するほかにも石炭殻（がら）を戦地へ送りました。」", "「石炭殻を何にするのですか？」", "「もちろん食糧にするのです。我々は、河童は腹さえ減れば、なんでも食うのにきまっていますからね。」", "「それは――どうか怒（おこ）らずにください。それは戦地にいる河童たちには　――　我々の国では醜聞（しゅうぶん）ですがね。」", "「この国でも醜聞には違いありません。しかしわたし自身こう言っていれば、だれも醜聞にはしないものです。哲学者のマッグも言っているでしょう。『汝（なんじ）の悪は汝自ら言え。悪はおのずから消滅すべし。』　――　しかもわたしは利益のほかにも愛国心に燃え立っていたのですからね。」", "ちょうどそこへはいってきたのはこの倶楽部（クラブ）の給仕です。給仕はゲエルにお時宜（じぎ）をした後（のち）、朗読でもするようにこう言いました。", "「お宅のお隣に火事がございます。」", "「火――火事！」", "ゲエルは驚いて立ち上がりました。僕も立ち上がったのはもちろんです。が、給仕は落ち着き払って次の言葉をつけ加えました。", "「しかしもう消し止めました。」", "ゲエルは給仕を見送りながら、泣き笑いに近い表情をしました。僕はこういう顔を見ると、いつかこの硝子（ガラス）会社の社長を憎んでいたことに気づきました。が、ゲエルはもう今では大資本家でもなんでもないただの河童（かっぱ）になって立っているのです。僕は花瓶（かびん）の中の冬薔薇（ふゆそうび）の花を抜き、ゲエルの手へ渡しました。", "「しかし火事は消えたといっても、奥さんはさぞお驚きでしょう。さあ、これを持ってお帰りなさい。」", "「ありがとう。」", "ゲエルは僕の手を握りました。それから急ににやりと笑い、小声にこう僕に話しかけました。", "「隣はわたしの家作（かさく）ですからね。火災保険の金だけはとれるのですよ。」", "僕はこの時のゲエルの微笑を――軽蔑（けいべつ）することもできなければ、憎悪（ぞうお）することもできないゲエルの微笑をいまだにありありと覚えています。", "十", "「どうしたね？　きょうはまた妙にふさいでいるじゃないか？」", "その火事のあった翌日です。僕は巻煙草（まきたばこ）をくわえながら、僕の客間の椅子（いす）に腰をおろした学生のラップにこう言いました。実際またラップは右の脚（あし）の上へ左の脚をのせたまま、腐った嘴（くちばし）も見えないほど、ぼんやり床（ゆか）の上ばかり見ていたのです。", "「ラップ君、どうしたね。」と言えば、", "「いや、なに、つまらないことなのですよ。――」", "ラップはやっと頭をあげ、悲しい鼻声を出しました。", "「僕はきょう窓の外を見ながら、『おや虫取り菫（すみれ）が咲いた』と何気（なにげ）なしにつぶやいたのです。すると僕の妹は急に顔色を変えたと思うと、『どうせわたしは虫取り菫よ』と当たり散らすじゃありませんか？　おまけにまた僕のおふくろも大（だい）の妹贔屓（びいき）ですから、やはり僕に食ってかかるのです。」", "「虫取り菫が咲いたということはどうして妹さんには不快なのだね？」", "「さあ、たぶん雄（おす）の河童をつかまえるという意味にでもとったのでしょう。そこへおふくろと仲悪い叔母（おば）も喧嘩（けんか）の仲間入りをしたのですから、いよいよ大騒動になってしまいました。しかも年中酔っ払っているおやじはこの喧嘩を聞きつけると、たれかれの差別なしに殴（なぐ）り出したのです。それだけでも始末のつかないところへ僕の弟はその間（あいだ）におふくろの財布（さいふ）を盗むが早いか、キネマか何かを見にいってしまいました。僕は　――　ほんとうに僕はもう、　――　」", "ラップは両手に顔を埋（うず）め、何も言わずに泣いてしまいました。僕の同情したのはもちろんです。同時にまた家族制度に対する詩人のトックの軽蔑を思い出したのももちろんです。僕はラップの肩をたたき、一生懸命（いっしょうけんめい）に慰めました。", "「そんなことはどこでもありがちだよ。まあ勇気を出したまえ。」", "「しかし　――　しかし嘴（くちばし）でも腐っていなければ、　――　」", "「それはあきらめるほかはないさ。さあ、トック君の家（うち）へでも行こう。」", "「トックさんは僕を軽蔑（けいべつ）しています。僕はトックさんのように大胆に家族を捨てることができませんから。」", "「じゃクラバック君の家へ行こう。」", "僕はあの音楽会以来、クラバックにも友だちになっていましたから、とにかくこの大音楽家の家へラップをつれ出すことにしました。クラバックはトックに比べれば、はるかに贅沢（ぜいたく）に暮らしています。というのは資本家のゲエルのように暮らしているという意味ではありません。ただいろいろの骨董（こっとう）を、――タナグラの人形やペルシアの陶器を部屋（へや）いっぱいに並べた中にトルコ風の長椅子（ながいす）を据（す）え、クラバック自身の肖像画の下にいつも子どもたちと遊んでいるのです。が、きょうはどうしたのか両腕を胸へ組んだまま、苦い顔をしてすわっていました。のみならずそのまた足もとには紙屑（かみくず）が一面に散らばっていました。ラップも詩人トックといっしょにたびたびクラバックには会っているはずです。しかしこの容子（ようす）に恐れたとみえ、きょうは丁寧（ていねい）にお時宜（じぎ）をしたなり、黙って部屋の隅（すみ）に腰をおろしました。", "「どうしたね？　クラバック君。」", "僕はほとんど挨拶（あいさつ）の代わりにこう大音楽家へ問いかけました。", "「どうするものか？　批評家の阿呆（あほう）め！　僕の抒情（じょじょう）詩はトックの抒情詩と比べものにならないと言やがるんだ。」", "「しかし君は音楽家だし、　――　」", "「それだけならば我慢（がまん）もできる。僕はロックに比べれば、音楽家の名に価しないと言やがるじゃないか？」", "ロックというのはクラバックとたびたび比べられる音楽家です。が、あいにく超人倶楽部（クラブ）の会員になっていない関係上、僕は一度も話したことはありません。もっとも嘴の反（そ）り上がった、一癖（ひとくせ）あるらしい顔だけはたびたび写真でも見かけていました。", "「ロックも天才には違いない。しかしロックの音楽は君の音楽にあふれている近代的情熱を持っていない。」", "「君はほんとうにそう思うか？」", "「そう思うとも。」", "するとクラバックは立ち上がるが早いか、タナグラの人形をひっつかみ、いきなり床（ゆか）の上にたたきつけました。ラップはよほど驚いたとみえ、何か声をあげて逃げようとしました。が、クラバックはラップや僕にはちょっと「驚くな」という手真似（てまね）をした上、今度は冷やかにこう言うのです。", "「それは君もまた俗人のように耳を持っていないからだ。僕はロックを恐れている。　――　」", "「君が？　謙遜家（けんそんか）を気どるのはやめたまえ。」", "「だれが謙遜家（けんそんか）を気どるものか？　第一君たちに気どって見せるくらいならば、批評家たちの前に気どって見せている。僕は――クラバックは天才だ。その点ではロックを恐れていない。」", "「では何を恐れているのだ？」", "「何か正体（しょうたい）の知れないものを、――言わばロックを支配している星を。」", "「どうも僕には腑（ふ）に落ちないがね。」", "「ではこう言えばわかるだろう。ロックは僕の影響を受けない。が、僕はいつの間（ま）にかロックの影響を受けてしまうのだ。」", "「それは君の感受性の　――　。」", "「まあ、聞きたまえ。感受性などの問題ではない。ロックはいつも安んじてあいつだけにできる仕事をしている。しかし僕はいらいらするのだ。それはロックの目から見れば、あるいは一歩の差かもしれない。けれども僕には十哩（マイル）も違うのだ。」", "「しかし先生の英雄曲は　――　」", "クラバックは細い目をいっそう細め、いまいましそうにラップをにらみつけました。", "「黙りたまえ。君などに何がわかる？　僕はロックを知っているのだ。ロックに平身低頭する犬どもよりもロックを知っているのだ。」", "「まあ少し静かにしたまえ。」", "「もし静かにしていられるならば、　――　僕はいつもこう思っている。――僕らの知らない何ものかは僕を、――クラバックをあざけるためにロックを僕の前に立たせたのだ。哲学者のマッグはこういうことをなにもかも承知している。いつもあの色硝子（いろガラス）のランタアンの下に古ぼけた本ばかり読んでいるくせに。」", "「どうして？」", "「この近ごろマッグの書いた『阿呆（あほう）の言葉』という本を見たまえ。――」", "クラバックは僕に一冊の本を渡す――というよりも投げつけました。それからまた腕を組んだまま、突（つっ）けんどんにこう言い放ちました。", "「じゃきょうは失敬しよう。」", "僕はしょげ返ったラップといっしょにもう一度往来へ出ることにしました。人通りの多い往来は相変わらず毛生欅（ぶな）の並み木のかげにいろいろの店を並べています。僕らはなんということもなしに黙って歩いてゆきました。するとそこへ通りかかったのは髪の長い詩人のトックです。トックは僕らの顔を見ると、腹の袋から手巾（ハンケチ）を出し、何度も額をぬぐいました。", "「やあ、しばらく会わなかったね。僕はきょうは久しぶりにクラバックを尋ねようと思うのだが、　――　」", "僕はこの芸術家たちを喧嘩（けんか）させては悪いと思い、クラバックのいかにも不機嫌（ふきげん）だったことを婉曲（えんきょく）にトックに話しました。", "「そうか。じゃやめにしよう。なにしろクラバックは神経衰弱だからね。　――　僕もこの二三週間は眠られないのに弱っているのだ。」", "「どうだね、僕らといっしょに散歩をしては？」", "「いや、きょうはやめにしよう。おや！」", "トックはこう叫ぶが早いか、しっかり僕の腕をつかみました。しかもいつか体中（からだじゅう）に冷汗を流しているのです。", "「どうしたのだ？」", "「どうしたのです？」", "「なにあの自動車の窓の中から緑いろの猿（さる）が一匹首を出したように見えたのだよ。」", "僕は多少心配になり、とにかくあの医者のチャックに診察してもらうように勧めました。しかしトックはなんと言っても、承知する気色（けしき）さえ見せません。のみならず何か疑わしそうに僕らの顔を見比べながら、こんなことさえ言い出すのです。", "「僕は決して無政府主義者ではないよ。それだけはきっと忘れずにいてくれたまえ。――ではさようなら。チャックなどはまっぴらごめんだ。」", "僕らはぼんやりたたずんだまま、トックの後ろ姿を見送っていました。僕らは――いや、「僕ら」ではありません。学生のラップはいつの間にか往来のまん中に脚（あし）をひろげ、しっきりない自動車や人通りを股目金（まためがね）にのぞいているのです。僕はこの河童（かっぱ）も発狂したかと思い、驚いてラップを引き起こしました。", "「常談（じょうだん）じゃない。何をしている？」", "しかしラップは目をこすりながら、意外にも落ち着いて返事をしました。", "「いえ、あまり憂鬱（ゆううつ）ですから、さかさまに世の中をながめて見たのです。けれどもやはり同じことですね。」", "十一", "これは哲学者のマッグの書いた「阿呆（あほう）の言葉」の中の何章かです。――", "×", "阿呆はいつも彼以外のものを阿呆であると信じている。", "×", "我々の自然を愛するのは自然は我々を憎んだり嫉妬（しっと）したりしないためもないことはない。", "×", "もっとも賢い生活は一時代の習慣を軽蔑（けいべつ）しながら、しかもそのまた習慣を少しも破らないように暮らすことである。", "×", "我々のもっとも誇りたいものは我々の持っていないものだけである。", "×", "何（なん）びとも偶像を破壊することに異存を持っているものはない。同時にまた何びとも偶像になることに異存を持っているものはない。しかし偶像の台座の上に安んじてすわっていられるものはもっとも神々に恵まれたもの、――阿呆か、悪人か、英雄かである。（クラバックはこの章の上へ爪（つめ）の痕（あと）をつけていました。）", "×", "我々の生活に必要な思想は三千年前（ぜん）に尽きたかもしれない。我々はただ古い薪（たきぎ）に新しい炎を加えるだけであろう。", "×", "我々の特色は我々自身の意識を超越するのを常としている。", "×", "幸福は苦痛を伴い、平和は倦怠（けんたい）を伴うとすれば、――？", "×", "自己を弁護することは他人を弁護することよりも困難である。疑うものは弁護士を見よ。", "×", "矜誇（きょうか）［＃ルビの「きょうか」はママ］、愛欲、疑惑――あらゆる罪は三千年来、この三者から発している。同時にまたおそらくはあらゆる徳も。", "×", "物質的欲望を減ずることは必ずしも平和をもたらさない。我々は平和を得るためには精神的欲望も減じなければならぬ。（クラバックはこの章の上にも爪（つめ）の痕（あと）を残していました。）", "×", "我々は人間よりも不幸である。人間は河童（かっぱ）ほど進化していない。（僕はこの章を読んだ時思わず笑ってしまいました。）", "×", "成すことは成し得ることであり、成し得ることは成すことである。畢竟（ひっきょう）我々の生活はこういう循環論法を脱することはできない。――すなわち不合理に終始している。", "×", "ボオドレエルは白痴になった後（のち）、彼の人生観をたった一語に、――女陰の一語に表白した。しかし彼自身を語るものは必ずしもこう言ったことではない。むしろ彼の天才に、――彼の生活を維持するに足る詩的天才に信頼したために胃袋の一語を忘れたことである。（この章にもやはりクラバックの爪の痕は残っていました。）", "×", "もし理性に終始するとすれば、我々は当然我々自身の存在を否定しなければならぬ。理性を神にしたヴォルテエルの幸福に一生をおわったのはすなわち人間の河童よりも進化していないことを示すものである。", "十二", "ある割合に寒い午後です。僕は「阿呆（あほう）の言葉」を読み飽きましたから、哲学者のマッグを尋ねに出かけました。するとある寂しい町の角（かど）に蚊のようにやせた河童（かっぱ）が一匹、ぼんやり壁によりかかっていました。しかもそれは紛れもない、いつか僕の万年筆を盗んでいった河童なのです。僕はしめたと思いましたから、ちょうどそこへ通りかかった、たくましい巡査を呼びとめました。", "「ちょっとあの河童を取り調べてください。あの河童はちょうど一月（ひとつき）ばかり前にわたしの万年筆を盗んだのですから。」", "巡査は右手の棒をあげ、（この国の巡査は剣（けん）の代わりに水松（いちい）の棒を持っているのです。）「おい、君」とその河童へ声をかけました。僕はあるいはその河童は逃げ出しはしないかと思っていました。が、存外落ち着き払って巡査の前へ歩み寄りました。のみならず腕を組んだまま、いかにも傲然（ごうぜん）と僕の顔や巡査の顔をじろじろ見ているのです。しかし巡査は怒（おこ）りもせず、腹の袋から手帳を出してさっそく尋問にとりかかりました。", "「お前の名は？」", "「グルック。」", "「職業は？」", "「つい二三日前までは郵便配達夫をしていました。」", "「よろしい。そこでこの人の申し立てによれば、君はこの人の万年筆を盗んでいったということだがね。」", "「ええ、一月ばかり前に盗みました。」", "「なんのために？」", "「子どもの玩具（おもちゃ）にしようと思ったのです。」", "「その子どもは？」", "巡査ははじめて相手の河童へ鋭い目を注ぎました。", "「一週間前に死んでしまいました。」", "「死亡証明書を持っているかね？」", "やせた河童は腹の袋から一枚の紙をとり出しました。巡査はその紙へ目を通すと、急ににやにや笑いながら、相手の肩をたたきました。", "「よろしい。どうも御苦労だったね。」", "僕は呆気（あっけ）にとられたまま、巡査の顔をながめていました。しかもそのうちにやせた河童は何かぶつぶつつぶやきながら、僕らを後ろにして行ってしまうのです。僕はやっと気をとり直し、こう巡査に尋ねてみました。", "「どうしてあの河童をつかまえないのです？」", "「あの河童は無罪ですよ。」", "「しかし僕の万年筆を盗んだのは　――　」", "「子どもの玩具にするためだったのでしょう。けれどもその子どもは死んでいるのです。もし何か御不審だったら、刑法千二百八十五条をお調べなさい。」", "巡査はこう言いすてたなり、さっさとどこかへ行ってしまいました。僕はしかたがありませんから、「刑法千二百八十五条」を口の中に繰り返し、マッグの家（うち）へ急いでゆきました。哲学者のマッグは客好きです。現にきょうも薄暗い部屋（へや）には裁判官のペップや医者のチャックや硝子（ガラス）会社の社長のゲエルなどが集まり、七色（なないろ）の色硝子のランタアンの下に煙草（たばこ）の煙を立ち昇（のぼ）らせていました。そこに裁判官のペップが来ていたのは何よりも僕には好（こう）つごうです。僕は椅子（いす）にかけるが早いか、刑法第千二百八十五条を検（しら）べる代わりにさっそくペップへ問いかけました。", "「ペップ君、はなはだ失礼ですが、この国では罪人を罰しないのですか？」", "ペップは金口（きんぐち）の煙草の煙をまず悠々（ゆうゆう）と吹き上げてから、いかにもつまらなそうに返事をしました。", "「罰しますとも。死刑さえ行なわれるくらいですからね。」", "「しかし僕は一月（ひとつき）ばかり前に、　――　」", "僕は委細を話した後（のち）、例の刑法千二百八十五条のことを尋ねてみました。", "「ふむ、それはこういうのです。――『いかなる犯罪を行ないたりといえども、該（がい）犯罪を行なわしめたる事情の消失したる後は該犯罪者を処罰することを得ず』つまりあなたの場合で言えば、その河童（かっぱ）はかつては親だったのですが、今はもう親ではありませんから、犯罪も自然と消滅するのです。」", "「それはどうも不合理ですね。」", "「常談（じょうだん）を言ってはいけません。親だった　　　だった」に傍点］河童も親である　　　である」に傍点］河童も同一に見るのこそ不合理です。そうそう、日本の法律では同一に見ることになっているのですね。それはどうも我々には滑稽（こっけい）です。ふふふふふふふふふふ。」", "ペップは巻煙草をほうり出しながら、気のない薄笑いをもらしていました。そこへ口を出したのは法律には縁の遠いチャックです。チャックはちょっと鼻目金（はなめがね）を直し、こう僕に質問しました。", "「日本にも死刑はありますか？」", "「ありますとも。日本では絞罪（こうざい）です。」", "僕は冷然と構えこんだペップに多少反感を感じていましたから、この機会に皮肉を浴びせてやりました。", "「この国の死刑は日本よりも文明的にできているでしょうね？」", "「それはもちろん文明的です。」", "ペップはやはり落ち着いていました。", "「この国では絞罪などは用いません。まれには電気を用いることもあります。しかしたいていは電気も用いません。ただその犯罪の名を言って聞かせるだけです。」", "「それだけで河童は死ぬのですか？」", "「死にますとも。我々河童の神経作用はあなたがたのよりも微妙ですからね。」", "「それは死刑ばかりではありません。殺人にもその手を使うのがあります――」", "社長のゲエルは色硝子（いろガラス）の光に顔中紫に染まりながら、人なつこい笑顔（えがお）をして見せました。", "「わたしはこの間もある社会主義者に『貴様は盗人（ぬすびと）だ』と言われたために心臓痲痺（まひ）を　起こしかかったものです。」", "「それは案外多いようですね。わたしの知っていたある弁護士などはやはりそのために死んでしまったのですからね。」", "僕はこう口を入れた河童（かっぱ）、――哲学者のマッグをふりかえりました。マッグはやはりいつものように皮肉な微笑を浮かべたまま、だれの顔も見ずにしゃべっているのです。", "「その河童はだれかに蛙（かえる）だと言われ、――もちろんあなたも御承知でしょう、この国で蛙だと言われるのは人非人（にんぴにん）という意味になることぐらいは。――己（おれ）は蛙かな？　蛙ではないかな？　と毎日考えているうちにとうとう死んでしまったものです。」", "「それはつまり自殺ですね。」", "「もっともその河童を蛙だと言ったやつは殺すつもりで言ったのですがね。あなたがたの目から見れば、やはりそれも自殺という　――　」", "ちょうどマッグがこう言った時です。突然その部屋（へや）の壁の向こうに、――たしかに詩人のトックの家に鋭いピストルの音が一発、空気をはね返すように響き渡りました。", "十三", "僕らはトックの家へ駆けつけました。トックは右の手にピストルを握り、頭の皿から血を出したまま、高山植物の鉢植（はちう）えの中に仰向（あおむ）けになって倒れていました。そのまたそばには雌（めす）の河童が一匹、トックの胸に顔を埋（うず）め、大声をあげて泣いていました。僕は雌の河童を抱き起こしながら、（いったい僕はぬらぬらする河童の皮膚に手を触れることをあまり好んではいないのですが。）「どうしたのです？」と尋ねました。", "「どうしたのだか、わかりません。ただ何か書いていたと思うと、いきなりピストルで頭を打ったのです。ああ、わたしはどうしましょう？　qur-r-r-r-r, qur-r-r-r-r」（これは河童の泣き声です。）", "「なにしろトック君はわがままだったからね。」", "硝子（ガラス）会社の社長のゲエルは悲しそうに頭を振りながら、裁判官のペップにこう言いました。しかしペップは何も言わずに金口（きんぐち）の巻煙草（まきたばこ）に火をつけていました。すると今までひざまずいて、トックの創口（きずぐち）などを調べていたチャックはいかにも医者らしい態度をしたまま、僕ら五人に宣言しました。（実はひとりと四匹（しひき）とです。）", "「もう駄目（だめ）です。トック君は元来胃病でしたから、それだけでも憂鬱（ゆううつ）になりやすかったのです。」", "「何か書いていたということですが。」", "哲学者のマッグは弁解するようにこう独（ひと）り語（ごと）をもらしながら、机の上の紙をとり上げました。僕らは皆頸（くび）をのばし、（もっとも僕だけは例外です。）幅の広いマッグの肩越しに一枚の紙をのぞきこみました。", "１字下げ］", "「いざ、立ちてゆかん。娑婆界（しゃばかい）を隔つる谷へ。", "岩むらはこごしく、やま水は清く、", "薬草の花はにおえる谷へ。」", "［＃ここで字下げ終わり］", "マッグは僕らをふり返りながら、微苦笑といっしょにこう言いました。", "「これはゲエテの『ミニヨンの歌』の剽窃（ひょうせつ）ですよ。するとトック君の自殺したのは詩人としても疲れていたのですね。」", "そこへ偶然自動車を乗りつけたのはあの音楽家のクラバックです。クラバックはこういう光景を見ると、しばらく戸口にたたずんでいました。が、僕らの前へ歩み寄ると、怒鳴（どな）りつけるようにマッグに話しかけました。", "「それはトックの遺言状（ゆいごんじょう）ですか？」", "「いや、最後に書いていた詩です。」", "「詩？」", "やはり少しも騒がないマッグは髪を逆立（さかだ）てたクラバックにトックの詩稿を渡しました。クラバックはあたりには目もやらずに熱心にその詩稿を読み出しました。しかもマッグの言葉にはほとんど返事さえしないのです。", "「あなたはトック君の死をどう思いますか？」", "「いざ、立ちて、　――　僕もまたいつ死ぬかわかりません。　――　娑婆界（しゃばかい）を隔つる谷へ。　――　」", "「しかしあなたはトック君とはやはり親友のひとりだったのでしょう？」", "「親友？　トックはいつも孤独だったのです。　――　娑婆界を隔つる谷へ、　――　ただトックは不幸にも、　――　岩むらはこごしく　――　」", "「不幸にも？」", "「やま水は清く、　――　あなたがたは幸福です。　――　岩むらはこごしく。　――　」", "僕はいまだに泣き声を絶たない雌（めす）の河童（かっぱ）に同情しましたから、そっと肩を抱（かか）えるようにし、部屋（へや）の隅（すみ）の長椅子（ながいす）へつれていきました。そこには二歳か三歳かの河童が一匹、何も知らずに笑っているのです。僕は雌の河童の代わりに子どもの河童をあやしてやりました。するといつか僕の目にも涙のたまるのを感じました。僕が河童の国に住んでいるうちに涙というものをこぼしたのは前にもあとにもこの時だけです。", "「しかしこういうわがままの河童といっしょになった家族は気の毒ですね。」", "「なにしろあとのことも考えないのですから。」", "裁判官のペップは相変わらず、新しい巻煙草（まきたばこ）に火をつけながら、資本家のゲエルに返事をしていました。すると僕らを驚かせたのは音楽家のクラバックのおお声です。クラバックは詩稿を握ったまま、だれにともなしに呼びかけました。", "「しめた！　すばらしい葬送曲ができるぞ。」", "クラバックは細い目をかがやかせたまま、ちょっとマッグの手を握ると、いきなり戸口へ飛んでいきました。もちろんもうこの時には隣近所の河童が大勢、トックの家の戸口に集まり、珍しそうに家の中をのぞいているのです。しかしクラバックはこの河童たちを遮二無二（しゃにむに）左右へ押しのけるが早いか、ひらりと自動車へ飛び乗りました。同時にまた自動車は爆音を立ててたちまちどこかへ行ってしまいました。", "「こら、こら、そうのぞいてはいかん。」", "裁判官のペップは巡査の代わりに大勢の河童（かっぱ）を押し出した後（のち）、トックの家の戸をしめてしまいました。部屋（へや）の中はそのせいか急にひっそりなったものです。僕らはこういう静かさの中に――高山植物の花の香に交じったトックの血の匂（にお）いの中に後始末（あとしまつ）のことなどを相談しました。しかしあの哲学者のマッグだけはトックの死骸（しがい）をながめたまま、ぼんやり何か考えています。僕はマッグの肩をたたき、「何を考えているのです？」と尋ねました。", "「河童の生活というものをね。」", "「河童の生活がどうなるのです？」", "「我々河童はなんと言っても、河童の生活をまっとうするためには、　――　」", "マッグは多少はずかしそうにこう小声でつけ加えました。", "「とにかく我々河童以外の何ものかの力を信ずることですね。」", "一四", "僕に宗教というものを思い出させたのはこういうマッグの言葉です。僕はもちろん物質主義者ですから、真面目（まじめ）に宗教を考えたことは一度もなかったのに違いありません。が、この時はトックの死にある感動を受けていたためにいったい河童の宗教はなんであるかと考え出したのです。僕はさっそく学生のラップにこの問題を尋ねてみました。", "「それは基督教（キリストきょう）、仏教、モハメット教、拝火教（はいかきょう）なども行なわれています。まず一番勢力のあるものはなんといっても近代教でしょう。生活教とも言いますがね。」（「生活教」という訳語は当たっていないかもしれません。この原語は Quemoocha です。cha は英吉利（イギリス）語の ism という意味に当たるでしょう。quemoo の原形 quemal の訳は単に「生きる」というよりも「飯を食ったり、酒を飲んだり、交合（こうごう）を行なったり」する意味です。）", "「じゃこの国にも教会だの寺院だのはあるわけなのだね？」", "「常談（じょうだん）を言ってはいけません。近代教の大寺院などはこの国第一の大建築ですよ。どうです、ちょっと見物に行っては？」", "ある生温（なまあたた）かい曇天の午後、ラップは得々（とくとく）と僕といっしょにこの大寺院へ出かけました。なるほどそれはニコライ堂の十倍もある大建築です。のみならずあらゆる建築様式を一つに組み上げた大建築です。僕はこの大寺院の前に立ち、高い塔や円（まる）屋根をながめた時、なにか無気味にさえ感じました。実際それらは天に向かって伸びた無数の触手（しょくしゅ）のように見えたものです。僕らは玄関の前にたたずんだまま、（そのまた玄関に比べてみても、どのくらい僕らは小さかったのでしょう！）しばらくこの建築よりもむしろ途方もない怪物に近い稀代（きだい）の大寺院を見上げていました。", "大寺院の内部もまた広大です。そのコリント風の円柱の立った中には参詣（さんけい）人が何人も歩いていました。しかしそれらは僕らのように非常に小さく見えたものです。そのうちに僕らは腰の曲がった一匹の河童（かっぱ）に出合いました。するとラップはこの河童にちょっと頭を下げた上、丁寧（ていねい）にこう話しかけました。", "「長老、御（ご）達者なのは何よりもです。」", "相手の河童もお時宜（じぎ）をした後（のち）、やはり丁寧に返事をしました。", "「これはラップさんですか？　あなたも相変わらず、――（と言いかけながら、ちょっと言葉をつがなかったのはラップの嘴（くちばし）の腐っているのにやっと気がついたためだったでしょう。）――ああ、とにかく御丈夫らしいようですね。が、きょうはどうしてまた　――　」", "「きょうはこの方（かた）のお伴をしてきたのです。この方はたぶん御承知のとおり、――」", "それからラップは滔々（とうとう）と僕のことを話しました。どうもまたそれはこの大寺院へラップがめったに来ないことの弁解にもなっていたらしいのです。", "「ついてはどうかこの方の御案内を願いたいと思うのですが。」", "長老は大様（おおよう）に微笑しながら、まず僕に挨拶（あいさつ）をし、静かに正面（しょうめん）の祭壇を指さしました。", "「御案内と申しても、何もお役に立つことはできません。我々信徒の礼拝（らいはい）するのは正面の祭壇にある『生命の樹（き）』です。『生命の樹』にはごらんのとおり、金と緑との果（み）がなっています。あの金の果を『善の果』と言い、あの緑の果を『悪の果』と言います。　――　」", "僕はこういう説明のうちにもう退屈を感じ出しました。それはせっかくの長老の言葉も古い比喩（ひゆ）のように聞こえたからです。僕はもちろん熱心に聞いている容子（ようす）を装っていました。が、時々は大寺院の内部へそっと目をやるのを忘れずにいました。", "コリント風の柱、ゴシック風の穹窿（きゅうりゅう）、アラビアじみた市松（いちまつ）模様の床（ゆか）、セセッションまがいの祈祷机（きとうづくえ）、――こういうものの作っている調和は妙に野蛮な美を具（そな）えていました。しかし僕の目をひいたのは何よりも両側の龕（がん）の中にある大理石の半身像です。僕は何かそれらの像を見知っているように思いました。それもまた不思議ではありません。あの腰の曲った河童（かっぱ）は「生命の樹」の説明をおわると、今度は僕やラップといっしょに右側の龕の前へ歩み寄り、その龕の中の半身像にこういう説明を加え出しました。", "「これは我々の聖徒のひとり、――あらゆるものに反逆した聖徒ストリントベリイです。この聖徒はさんざん苦しんだあげく、スウェデンボルグの哲学のために救われたように言われています。が、実は救われなかったのです。この聖徒はただ我々のように生活教を信じていました。――というよりも信じるほかはなかったのでしょう。この聖徒の我々に残した『伝説』という本を読んでごらんなさい。この聖徒も自殺未遂者だったことは聖徒自身告白しています。」", "僕はちょっと憂鬱（ゆううつ）になり、次の龕（がん）へ目をやりました。次の龕にある半身像は口髭（くちひげ）の太い独逸（ドイツ）人です。", "「これはツァラトストラの詩人ニイチェです。その聖徒は聖徒自身の造った超人に救いを求めました。が、やはり救われずに気違いになってしまったのです。もし気違いにならなかったとすれば、あるいは聖徒の数（かず）へはいることもできなかったかもしれません。　――　」", "長老はちょっと黙った後（のち）、第三の龕（がん）の前へ案内しました。", "「三番目にあるのはトルストイです。この聖徒はだれよりも苦行をしました。それは元来貴族だったために好奇心の多い公衆に苦しみを見せることをきらったからです。この聖徒は事実上信ぜられない基督（キリスト）を信じようと努力しました。いや、信じているようにさえ公言したこともあったのです。しかしとうとう晩年には悲壮な（うそ）つきだったことに堪（た）えられないようになりました。この聖徒も時々書斎の梁（はり）に恐怖を感じたのは有名です。けれども聖徒の数にはいっているくらいですから、もちろん自殺したのではありません。」", "第四の龕の中の半身像は我々日本人のひとりです。僕はこの日本人の顔を見た時、さすがに懐（なつか）しさを感じました。", "「これは国木田独歩（くにきだどっぽ）です。轢死（れきし）する人足（にんそく）の心もちをはっきり知っていた詩人です。しかしそれ以上の説明はあなたには不必要に違いありません。では五番目の龕の中をごらんください。――」", "「これはワグネルではありませんか？」", "「そうです。国王の友だちだった革命家です。聖徒ワグネルは晩年には食前の祈祷（きとう）さえしていました。しかしもちろん基督教よりも生活教の信徒のひとりだったのです。ワグネルの残した手紙によれば、娑婆苦（しゃばく）は何度この聖徒を死の前に駆りやったかわかりません。」", "僕らはもうその時には第六の龕（がん）の前に立っていました。", "「これは聖徒ストリントベリイの友だちです。子どもの大勢ある細君の代わりに十三四のクイティの女をめとった商売人上がりの仏蘭西（フランス）の画家です。この聖徒は太い血管の中に水夫の血を流していました。が、唇（くちびる）をごらんなさい。砒素（ひそ）か何かの痕（あと）が残っています。第七の龕の中にあるのは　――　もうあなたはお疲れでしょう。ではどうかこちらへおいでください。」", "僕は実際疲れていましたから、ラップといっしょに長老に従い、香（こう）の匂（にお）いのする廊下伝いにある部屋（へや）へはいりました。そのまた小さい部屋の隅（すみ）には黒いヴェヌスの像の下に山葡萄（やまぶどう）が一ふさ献じてあるのです。僕はなんの装飾もない僧房を想像していただけにちょっと意外に感じました。すると長老は僕の容子（ようす）にこういう気もちを感じたとみえ、僕らに椅子（いす）を薦（すす）める前に半ば気の毒そうに説明しました。", "「どうか我々の宗教の生活教であることを忘れずにください。我々の神、――『生命の樹（き）』の教えは『旺盛（おうせい）に生きよ』というのですから。　――　ラップさん、あなたはこのかたに我々の聖書をごらんにいれましたか？」", "「いえ、　――　実はわたし自身もほとんど読んだことはないのです。」", "ラップは頭の皿（さら）を掻（か）きながら、正直にこう返事をしました。が、長老は相変わらず静かに微笑して話しつづけました。", "「それではおわかりなりますまい。我々の神は一日のうちにこの世界を造りました。（『生命の樹（き）』は樹というものの、成しあたわないことはないのです。）のみならず雌（めす）の河童（かっぱ）を造りました。すると雌の河童は退屈のあまり、雄（おす）の河童を求めました。我々の神はこの嘆きを憐（あわ）れみ、雌の河童の脳髄（のうずい）を取り、雄の河童を造りました。我々の神はこの二匹の河童に『食えよ、交合せよ、旺盛（おうせい）に生きよ』という祝福を与えました。　――　」", "僕は長老の言葉のうちに詩人のトックを思い出しました。詩人のトックは不幸にも僕のように無神論者です。僕は河童ではありませんから、生活教を知らなかったのも無理はありません。けれども河童の国に生まれたトックはもちろん「生命の樹」を知っていたはずです。僕はこの教えに従わなかったトックの最後を憐れみましたから、長老の言葉をさえぎるようにトックのことを話し出しました。", "「ああ、あの気の毒な詩人ですね。」", "長老は僕の話を聞き、深い息をもらしました。", "「我々の運命を定めるものは信仰と境遇と偶然とだけです。（もっともあなたがたはそのほかに遺伝をお数えなさるでしょう。）トックさんは不幸にも信仰をお持ちにならなかったのです。」", "「トックはあなたをうらやんでいたでしょう。いや、僕もうらやんでいます。ラップ君などは年も若いし、　――　」", "「僕も嘴（くちばし）さえちゃんとしていればあるいは楽天的だったかもしれません。」", "長老は僕らにこう言われると、もう一度深い息をもらしました。しかもその目は涙ぐんだまま、じっと黒いヴェヌスを見つめているのです。", "「わたしも実は、――これはわたしの秘密ですから、どうかだれにもおっしゃらずにください。――わたしも実は我々の神を信ずるわけにいかないのです。しかしいつかわたしの祈祷（きとう）は、――」", "ちょうど長老のこう言った時です。突然部屋（へや）の戸があいたと思うと、大きい雌の河童が一匹、いきなり長老へ飛びかかりました。僕らがこの雌の河童を抱きとめようとしたのはもちろんです。が、雌の河童はとっさの間（あいだ）に床（ゆか）の上へ長老を投げ倒しました。", "「この爺（おやじ）め！　きょうもまたわたしの財布（さいふ）から一杯やる金（かね）を盗んでいったな！」", "十分ばかりたった後（のち）、僕らは実際逃げ出さないばかりに長老夫婦をあとに残し、大寺院の玄関を下（お）りていきました。", "「あれではあの長老も『生命の樹』を信じないはずですね。」", "しばらく黙って歩いた後、ラップは僕にこう言いました。が、僕は返事をするよりも思わず大寺院を振り返りました。大寺院はどんより曇った空にやはり高い塔や円屋根（まるやね）を無数の触手のように伸ばしています。なにか沙漠（さばく）の空に見える蜃気楼（しんきろう）の無気味さを漂わせたまま。　――", "一五", "それからかれこれ一週間の後、僕はふと医者のチャックに珍しい話を聞きました。というのはあのトックの家（うち）に幽霊の出るという話なのです。そのころにはもう雌（めす）の河童（かっぱ）はどこかほかへ行ってしまい、僕らの友だちの詩人の家も写真師のステュディオに変わっていました。なんでもチャックの話によれば、このステュディオでは写真をとると、トックの姿もいつの間（ま）にか必ず朦朧（もうろう）と客の後ろに映っているとかいうことです。もっともチャックは物質主義者ですから、死後の生命などを信じていません。現にその話をした時にも悪意のある微笑を浮かべながら、「やはり霊魂というものも物質的存在とみえますね」などと註釈めいたことをつけ加えていました。僕も幽霊を信じないことはチャックとあまり変わりません。けれども詩人のトックには親しみを感じていましたから、さっそく本屋の店へ駆けつけ、トックの幽霊に関する記事やトックの幽霊の写真の出ている新聞や雑誌を買ってきました。なるほどそれらの写真を見ると、どこかトックらしい河童が一匹、老若男女（ろうにゃくなんにょ）の河童の後ろにぼんやりと姿を現わしていました。しかし僕を驚かせたのはトックの幽霊の写真よりもトックの幽霊に関する記事、――ことにトックの幽霊に関する心霊学協会の報告です。僕はかなり逐語的にその報告を訳しておきましたから、下（しも）に大略を掲げることにしましょう。ただし括弧（かっこ）の中にあるのは僕自身の加えた註釈なのです。――", "詩人トック君の幽霊に関する報告。（心霊学協会雑誌第八千二百七十四号所載）", "わが心霊学協会は先般自殺したる詩人トック君の旧居にして現在は××写真師のステュディオなる□□街第二百五十一号に臨時調査会を開催せり。列席せる会員は下（しも）のごとし。（氏名を略す。）", "我ら十七名の会員は心霊協会会長ペック氏とともに九月十七日午前十時三十分、我らのもっとも信頼するメディアム、ホップ夫人を同伴し、該（がい）ステュディオの一室に参集せり。ホップ夫人は該ステュディオにはいるや、すでに心霊的空気を感じ、全身に痙攣（けいれん）を催しつつ、嘔吐（おうと）すること数回に及べり。夫人の語るところによれば、こは詩人トック君の強烈なる煙草（たばこ）を愛したる結果、その心霊的空気もまたニコティンを含有するためなりという。", "我ら会員はホップ夫人とともに円卓をめぐりて黙坐（もくざ）したり。夫人は三分二十五秒の後（のち）、きわめて急劇なる夢遊状態に陥り、かつ詩人トック君の心霊の憑依（ひょうい）するところとなれり。我ら会員は年齢順に従い、夫人に憑依せるトック君の心霊と左のごとき問答を開始したり。", "問　君は何ゆえに幽霊に出（い）ずるか？", "答　死後の名声を知らんがためなり。", "問　君――あるいは心霊諸君は死後もなお名声を欲するや？", "答　少なくとも予（よ）は欲せざるあたわず。しかれども予の邂逅（かいこう）したる日本の一詩人のごときは死後の名声を軽蔑（けいべつ）しいたり。", "問　君はその詩人の姓名を知れりや？", "答　予は不幸にも忘れたり。ただ彼の好んで作れる十七字詩の一章を記憶するのみ。", "問　その詩は如何（いかん）？", "答「古池や蛙（かわず）飛びこむ水の音」。", "問　君はその詩を佳作なりとなすや？", "答　予（よ）は必ずしも悪作なりとなさず。ただ「蛙（かわず）」を「河童（かっぱ）」とせんか、さらに光彩陸離（こうさいりくり）たるべし。", "問　しからばその理由は如何（いかん）？", "答　我ら河童はいかなる芸術にも河童を求むること痛切なればなり。", "会長ペック氏はこの時にあたり、我ら十七名の会員にこは心霊学協会の臨時調査会にして合評会（がっぴょうかい）にあらざるを注意したり。", "問　心霊諸君の生活は如何？", "答　諸君の生活と異なることなし。", "問　しからば君は君自身の自殺せしを後悔するや？", "答　必ずしも後悔せず。予は心霊的生活に倦（う）まば、さらにピストルを取りて自活　　　自活」に傍点］すべし。", "問　自活　　　自活」に傍点］するは容易なりや否や？", "トック君の心霊はこの問に答うるにさらに問をもってしたり。こはトック君を知れるものにはすこぶる自然なる応酬（おうしゅう）なるべし。", "答　自殺するは容易なりや否や？", "問　諸君の生命は永遠なりや？", "答　我らの生命に関しては諸説紛々（ふんぷん）として信ずべからず。幸いに我らの間にも基督教（キリストきょう）、仏教、モハメット教、拝火教（はいかきょう）等の諸宗あることを忘るるなかれ。", "問　君自身の信ずるところは？", "答　予は常に懐疑主義者なり。", "問　しかれども君は少なくとも心霊の存在を疑わざるべし？", "答　諸君のごとく確信するあたわず。", "問　君の交友の多少は如何？", "答　予の交友は古今東西にわたり、三百人を下らざるべし。その著名なるものをあぐれば、クライスト、マインレンデル、ワイニンゲル　――", "問　君の交友は自殺者のみなりや？", "答　必ずしもしかりとせず。自殺を弁護せるモンテェニュのごときは予が畏友（いゆう）の一人（いちにん）なり。ただ予は自殺せざりし厭世（えんせい）主義者、――ショオペンハウエルの輩（はい）とは交際せず。", "問　ショオペンハウエルは健在なりや？", "答　彼は目下（もっか）心霊的厭世主義を樹立し、自活　　　自活」に傍点］する可否を論じつつあり。しかれどもコレラも黴菌病（ばいきんびょう）なりしを知り、すこぶる安堵（あんど）せるもののごとし。", "我ら会員は相次いでナポレオン、孔子（こうし）、ドストエフスキイ、ダアウィン、クレオパトラ、釈迦（しゃか）、デモステネス、ダンテ、千（せん）の利休（りきゅう）等の心霊の消息を質問したり。しかれどもトック君は不幸にも詳細に答うることをなさず、かえってトック君自身に関する種々のゴシップを質問したり。", "問　予（よ）の死後の名声は如何（いかん）？", "答　ある批評家は「群小詩人のひとり」と言えり。", "問　彼は予が詩集を贈らざりしに怨恨（えんこん）を含めるひとりなるべし。予の全集は出版せられしや？", "答　君の全集は出版せられたれども、売行きはなはだ振わざるがごとし。", "問　予の全集は三百年の後（のち）、――すなわち著作権の失われたる後、万人（ばんにん）の購（あがな）うところとなるべし。予の同棲（どうせい）せる女友だちは如何？", "答　彼女は書肆（しょし）ラック君の夫人となれり。", "問　彼女はいまだ不幸にもラックの義眼なるを知らざるなるべし。予が子は如何？", "答　国立孤児院にありと聞けり。", "トック君はしばらく沈黙せる後、新たに質問を開始したり。", "問　予が家は如何？", "答　某写真師のステュディオとなれり。", "問　予の机はいかになれるか？", "答　いかなれるかを知るものなし。", "問　予は予の机の抽斗（ひきだし）に予の秘蔵せる一束（ひとたば）の手紙を――しかれどもこは幸いにも多忙なる諸君の関するところにあらず。今やわが心霊界はおもむろに薄暮に沈まんとす。予は諸君と訣別（けつべつ）すべし。さらば。諸君。さらば。わが善良なる諸君。", "ホップ夫人は最後の言葉とともにふたたび急劇に覚醒（かくせい）したり。我ら十七名の会員はこの問答の真なりしことを上天の神に誓って保証せんとす。（なおまた我らの信頼するホップ夫人に対する報酬（ほうしゅう）はかつて夫人が女優たりし時の日当（にっとう）に従いて支弁したり。）", "一六", "僕はこういう記事を読んだ後（のち）、だんだんこの国にいることも憂鬱（ゆううつ）になってきましたから、どうか我々人間の国へ帰ることにしたいと思いました。しかしいくら探（さが）して歩いても、僕の落ちた穴は見つかりません。そのうちにあのバッグという漁夫（りょうし）の河童の話には、なんでもこの国の街（まち）はずれにある年をとった河童が一匹、本を読んだり、笛（ふえ）を吹いたり、静かに暮らしているということです。僕はこの河童に尋ねてみれば、あるいはこの国を逃げ出す途（みち）もわかりはしないかと思いましたから、さっそく街はずれへ出かけてゆきました。しかしそこへ行ってみると、いかにも小さい家の中に年をとった河童どころか、頭の皿も固まらない、やっと十二三の河童が一匹、悠々（ゆうゆう）と笛を吹いていました。僕はもちろん間違（まちが）った家へはいったではないかと思いました。が、念のために名をきいてみると、やはりバッグの教えてくれた年よりの河童に違いないのです。", "「しかしあなたは子どものようですが　――　」", "「お前さんはまだ知らないのかい？　わたしはどういう運命か、母親の腹を出た時には白髪頭（しらがあたま）をしていたのだよ。それからだんだん年が若くなり、今ではこんな子どもになったのだよ。けれども年を勘定すれば生まれる前を六十としても、かれこれ百十五六にはなるかもしれない。」", "僕は部屋（へや）の中を見まわしました。そこには僕の気のせいか、質素な椅子（いす）やテエブルの間に何か清らかな幸福が漂っているように見えるのです。", "「あなたはどうもほかの河童よりもしあわせに暮らしているようですね？」", "「さあ、それはそうかもしれない。わたしは若い時は年よりだったし、年をとった時は若いものになっている。従って年よりのように欲にも渇（かわ）かず、若いもののように色にもおぼれない。とにかくわたしの生涯はたといしあわせではないにもしろ、安らかだったのには違いあるまい。」", "「なるほどそれでは安らかでしょう。」", "「いや、まだそれだけでは安らかにはならない。わたしは体（からだ）も丈夫（じょうぶ）だったし、一生食うに困らぬくらいの財産を持っていたのだよ。しかし一番しあわせだったのはやはり生まれてきた時に年よりだったことだと思っている。」", "僕はしばらくこの河童（かっぱ）と自殺したトックの話だの毎日医者に見てもらっているゲエルの話だのをしていました。が、なぜか年をとった河童はあまり僕の話などに興味のないような顔をしていました。", "「ではあなたはほかの河童のように格別生きていることに執着（しゅうじゃく）を持ってはいないのですね？」", "年をとった河童は僕の顔を見ながら、静かにこう返事をしました。", "「わたしもほかの河童のようにこの国へ生まれてくるかどうか、一応父親に尋ねられてから母親の胎内を離れたのだよ。」", "「しかし僕はふとした拍子に、この国へ転（ころ）げ落ちてしまったのです。どうか僕にこの国から出ていかれる路（みち）を教えてください。」", "「出ていかれる路は一つしかない。」", "「というのは？」", "「それはお前さんのここへ来た路だ。」", "僕はこの答えを聞いた時になぜか身の毛がよだちました。", "「その路があいにく見つからないのです。」", "年をとった河童は水々しい目にじっと僕の顔を見つめました。それからやっと体（からだ）を起こし、部屋（へや）の隅（すみ）へ歩み寄ると、天井からそこに下がっていた一本の綱（つな）を引きました。すると今まで気のつかなかった天窓が一つ開きました。そのまた円（まる）い天窓の外には松や檜（ひのき）が枝を張った向こうに大空が青あおと晴れ渡っています。いや、大きい鏃（やじり）に似た槍（やり）ヶ岳（たけ）の峯もそびえています。僕は飛行機を見た子どものように実際飛び上がって喜びました。", "「さあ、あすこから出ていくがいい。」", "年をとった河童はこう言いながら、さっきの綱を指さしました。今まで僕の綱と思っていたのは実は綱梯子（つなばしご）にできていたのです。", "「ではあすこから出さしてもらいます。」", "「ただわたしは前もって言うがね。出ていって後悔しないように。」", "「大丈夫（だいじょうぶ）です。僕は後悔などはしません。」", "僕はこう返事をするが早いか、もう綱梯子をよじ登っていました。年をとった河童の頭の皿をはるか下にながめながら。", "一七", "僕は河童（かっぱ）の国から帰ってきた後（のち）、しばらくは我々人間の皮膚の匂（にお）いに閉口しました。我々人間に比べれば、河童は実に清潔なものです。のみならず我々人間の頭は河童ばかり見ていた僕にはいかにも気味の悪いものに見えました。これはあるいはあなたにはおわかりにならないかもしれません。しかし目や口はともかくも、この鼻というものは妙に恐ろしい気を起こさせるものです。僕はもちろんできるだけ、だれにも会わない算段をしました。が、我々人間にもいつか次第に慣れ出したとみえ、半年ばかりたつうちにどこへでも出るようになりました。ただそれでも困ったことは何か話をしているうちにうっかり河童の国の言葉を口に出してしまうことです。", "「君はあしたは家（うち）にいるかね？」", "「Qua」", "「なんだって？」", "「いや、いるということだよ。」", "だいたいこういう調子だったものです。", "しかし河童の国から帰ってきた後、ちょうど一年ほどたった時、僕はある事業の失敗したために　――　（Ｓ博士（はかせ）は彼がこう言った時、「その話はおよしなさい」と注意をした。なんでも博士の話によれば、彼はこの話をするたびに看護人の手にもおえないくらい、乱暴になるとかいうことである。）", "ではその話はやめましょう。しかしある事業の失敗したために僕はまた河童の国へ帰りたいと思い出しました。そうです。「行（ゆ）きたい」のではありません。「帰りたい」と思い出したのです。河童の国は当時の僕には故郷のように感ぜられましたから。", "僕はそっと家（うち）を脱け出し、中央線の汽車へ乗ろうとしました。そこをあいにく巡査につかまり、とうとう病院へ入れられたのです。僕はこの病院へはいった当座も河童の国のことを想（おも）いつづけました。医者のチャックはどうしているでしょう？　哲学者のマッグも相変わらず七色（なないろ）の色硝子（いろガラス）のランタアンの下に何か考えているかもしれません。ことに僕の親友だった嘴（くちばし）の腐った学生のラップは、――あるきょうのように曇った午後です。こんな追憶にふけっていた僕は思わず声をあげようとしました。それはいつの間（ま）にはいってきたか、バッグという漁夫（りょうし）の河童が一匹、僕の前にたたずみながら、何度も頭を下げていたからです。僕は心をとり直した後（のち）、――泣いたか笑ったかも覚えていません。が、とにかく久しぶりに河童の国の言葉を使うことに感動していたことはたしかです。", "「おい、バッグ、どうして来た？」", "「へい、お見舞いに上がったのです。なんでも御病気だとかいうことですから。」", "「どうしてそんなことを知っている？」", "「ラディオのニウスで知ったのです。」", "バッグは得意そうに笑っているのです。", "「それにしてもよく来られたね？」", "「なに、造作（ぞうさ）はありません。東京の川や掘割りは河童には往来も同様ですから。」", "僕は河童（かっぱ）も蛙（かえる）のように水陸両棲（りょうせい）の動物だったことに今さらのように気がつきました。", "「しかしこの辺には川はないがね。」", "「いえ、こちらへ上がったのは水道の鉄管を抜けてきたのです。それからちょっと消火栓（しょうかせん）をあけて　――　」", "「消火栓をあけて？」", "「旦那（だんな）はお忘れなすったのですか？　河童にも機械屋のいるということを。」", "それから僕は二三日ごとにいろいろの河童の訪問を受けました。僕の病はＳ博士（はかせ）によれば早発性痴呆症（そうはつせいちほうしょう）ということです。しかしあの医者のチャックは（これははなはだあなたにも失礼に当たるのに違いありません。）僕は早発性痴呆症患者ではない、早発性痴呆症患者はＳ博士をはじめ、あなたがた自身だと言っていました。医者のチャックも来るくらいですから、学生のラップや哲学者のマッグの見舞いにきたことはもちろんです。が、あの漁夫（りょうし）のバッグのほかに昼間はだれも尋ねてきません。ことに二三匹いっしょに来るのは夜、――それも月のある夜です。僕はゆうべも月明りの中に硝子（ガラス）会社の社長のゲエルや哲学者のマッグと話をしました。のみならず音楽家のクラバックにもヴァイオリンを一曲弾（ひ）いてもらいました。そら、向こうの机の上に黒百合（くろゆり）の花束がのっているでしょう？　あれもゆうべクラバックが土産（みやげ）に持ってきてくれたものです。　――", "（僕は後ろを振り返ってみた。が、もちろん机の上には花束も何ものっていなかった。）", "それからこの本も哲学者のマッグがわざわざ持ってきてくれたものです。ちょっと最初の詩を読んでごらんなさい。いや、あなたは河童の国の言葉を御存知になるはずはありません。では代わりに読んでみましょう。これは近ごろ出版になったトックの全集の一冊です。――", "（彼は古い電話帳をひろげ、こういう詩をおお声に読みはじめた。）", "――椰子（やし）の花や竹の中に", "仏陀（ぶっだ）はとうに眠っている。", "路（みち）ばたに枯れた無花果（いちじゅく）といっしょに", "基督（キリスト）ももう死んだらしい。", "しかし我々は休まなければならぬ", "たとい芝居（しばい）の背景の前にも。", "（そのまた背景の裏を見れば、継ぎはぎだらけのカンヴァスばかりだ？）――", "けれども僕はこの詩人のように厭世的（えんせいてき）ではありません。河童たちの時々来てくれる限りは、――ああ、このことは忘れていました。あなたは僕の友だちだった裁判官のペップを覚えているでしょう。あの河童は職を失った後（のち）、ほんとうに発狂してしまいました。なんでも今は河童の国の精神病院にいるということです。僕はＳ博士（はかせ）さえ承知してくれれば、見舞いにいってやりたいのですがね　――　。", "（昭和二年二月十一日）"]}, {"no": 12, "title": "銀河鉄道の夜", "author": "宮沢 賢治", "category": "日本文学-児童-童話", "chars": 53676, "volume": "大", "paras": ["一　午後の授業", "「ではみなさんは、そういうふうに川だと言（い）われたり、乳（ちち）の流（なが）れたあとだと言（い）われたりしていた、このぼんやりと白いものがほんとうは何かご承知（しょうち）ですか」先生は、黒板（こくばん）につるした大きな黒い星座（せいざ）の図の、上から下へ白くけぶった銀河帯（ぎんがたい）のようなところを指（さ）しながら、みんなに問（と）いをかけました。", "カムパネルラが手をあげました。それから四、五人手をあげました。ジョバンニも手をあげようとして、急（いそ）いでそのままやめました。たしかにあれがみんな星だと、いつか雑誌（ざっし）で読んだのでしたが、このごろはジョバンニはまるで毎日教室でもねむく、本を読むひまも読む本もないので、なんだかどんなこともよくわからないという気持（きも）ちがするのでした。", "ところが先生は早くもそれを見つけたのでした。", "「ジョバンニさん。あなたはわかっているのでしょう」", "ジョバンニは勢（いきお）いよく立ちあがりましたが、立ってみるともうはっきりとそれを答えることができないのでした。ザネリが前の席（せき）からふりかえって、ジョバンニを見てくすっとわらいました。ジョバンニはもうどぎまぎしてまっ赤になってしまいました。先生がまた言（い）いました。", "「大きな望遠鏡（ぼうえんきょう）で銀河（ぎんが）をよっく調（しら）べると銀河（ぎんが）はだいたい何でしょう」", "やっぱり星だとジョバンニは思いましたが、こんどもすぐに答えることができませんでした。", "先生はしばらく困（こま）ったようすでしたが、眼（め）をカムパネルラの方へ向（む）けて、", "「ではカムパネルラさん」と名指（なざ）しました。", "するとあんなに元気に手をあげたカムパネルラが、やはりもじもじ立ち上がったままやはり答えができませんでした。", "先生は意外（いがい）なようにしばらくじっとカムパネルラを見ていましたが、急（いそ）いで、", "「では、よし」と言（い）いながら、自分で星図を指（さ）しました。", "「このぼんやりと白い銀河（ぎんが）を大きないい望遠鏡（ぼうえんきょう）で見ますと、もうたくさんの小さな星に見えるのです。ジョバンニさんそうでしょう」", "ジョバンニはまっ赤（か）になってうなずきました。けれどもいつかジョバンニの眼（め）のなかには涙（なみだ）がいっぱいになりました。そうだ僕（ぼく）は知っていたのだ、もちろんカムパネルラも知っている、それはいつかカムパネルラのお父さんの博士（はかせ）のうちでカムパネルラといっしょに読んだ雑誌（ざっし）のなかにあったのだ。それどこでなくカムパネルラは、その雑誌（ざっし）を読むと、すぐお父さんの書斎（しょさい）から巨（おお）きな本をもってきて、ぎんがというところをひろげ、まっ黒な頁（ページ）いっぱいに白に点々（てんてん）のある美（うつく）しい写真（しゃしん）を二人でいつまでも見たのでした。それをカムパネルラが忘（わす）れるはずもなかったのに、すぐに返事（へんじ）をしなかったのは、このごろぼくが、朝にも午後にも仕事（しごと）がつらく、学校に出てももうみんなともはきはき遊（あそ）ばず、カムパネルラともあんまり物を言（い）わないようになったので、カムパネルラがそれを知ってきのどくがってわざと返事（へんじ）をしなかったのだ、そう考えるとたまらないほど、じぶんもカムパネルラもあわれなような気がするのでした。", "先生はまた言（い）いました。", "「ですからもしもこの天の川がほんとうに川だと考えるなら、その一つ一つの小さな星はみんなその川のそこの砂（すな）や砂利（じゃり）の粒（つぶ）にもあたるわけです。またこれを巨（おお）きな乳（ちち）の流（なが）れと考えるなら、もっと天の川とよく似（に）ています。つまりその星はみな、乳（ちち）のなかにまるで細（こま）かにうかんでいる脂油（あぶら）の球（たま）にもあたるのです。そんなら何がその川の水にあたるかと言（い）いますと、それは真空（しんくう）という光をある速（はや）さで伝（つた）えるもので、太陽（たいよう）や地球（ちきゅう）もやっぱりそのなかに浮（う）かんでいるのです。つまりは私（わたし）どもも天の川の水のなかに棲（す）んでいるわけです。そしてその天の川の水のなかから四方を見ると、ちょうど水が深いほど青く見えるように、天の川の底（そこ）の深（ふか）く遠いところほど星がたくさん集まって見え、したがって白くぼんやり見えるのです。この模型（もけい）をごらんなさい」", "先生は中にたくさん光る砂（すな）のつぶのはいった大きな両面（りょうめん）の凸（とつ）レンズを指（さ）しました。", "「天の川の形はちょうどこんななのです。このいちいちの光るつぶがみんな私（わたし）どもの太陽（たいよう）と同じようにじぶんで光っている星だと考えます。私どもの太陽（たいよう）がこのほぼ中ごろにあって地球（ちきゅう）がそのすぐ近くにあるとします。みなさんは夜にこのまん中に立ってこのレンズの中を見まわすとしてごらんなさい。こっちの方はレンズが薄（うす）いのでわずかの光る粒（つぶ）すなわち星しか見えないでしょう。こっちやこっちの方はガラスが厚（あつ）いので、光る粒（つぶ）すなわち星がたくさん見えその遠いのはぼうっと白く見えるという、これがつまり今日の銀河（ぎんが）の説（せつ）なのです。そんならこのレンズの大きさがどれくらいあるか、またその中のさまざまの星についてはもう時間ですから、この次（つぎ）の理科の時間にお話します。では今日はその銀河（ぎんが）のお祭（まつ）りなのですから、みなさんは外へでてよくそらをごらんなさい。ではここまでです。本やノートをおしまいなさい」", "そして教室じゅうはしばらく机（つくえ）の蓋（ふた）をあけたりしめたり本を重（かさ）ねたりする音がいっぱいでしたが、まもなくみんなはきちんと立って礼（れい）をすると教室を出ました。", "二　活版所（かっぱんじょ）", "ジョバンニが学校の門を出るとき、同じ組の七、八人は家へ帰らずカムパネルラをまん中にして校庭（こうてい）の隅（すみ）の桜（さくら）の木のところに集（あつ）まっていました。それはこんやの星祭（ほしまつ）りに青いあかりをこしらえて川へ流（なが）す烏瓜（からすうり）を取（と）りに行く相談（そうだん）らしかったのです。", "けれどもジョバンニは手を大きく振（ふ）ってどしどし学校の門（もん）を出て来ました。すると町の家々ではこんやの銀河（ぎんが）の祭（まつ）りにいちいの葉（は）の玉（たま）をつるしたり、ひのきの枝（えだ）にあかりをつけたり、いろいろしたくをしているのでした。", "家へは帰らずジョバンニが町を三つ曲（ま）がってある大きな活版所（かっぱんじょ）にはいって靴（くつ）をぬいで上がりますと、突（つ）き当たりの大きな扉（とびら）をあけました。中にはまだ昼（ひる）なのに電燈（でんとう）がついて、たくさんの輪転機（りんてんき）がばたりばたりとまわり、きれで頭をしばったりラムプシェードをかけたりした人たちが、何か歌うように読んだり数えたりしながらたくさん働（はたら）いておりました。", "ジョバンニはすぐ入口から三番目の高い卓子（テーブル）にすわった人の所（ところ）へ行っておじぎをしました。その人はしばらく棚（たな）をさがしてから、", "「これだけ拾（ひろ）って行けるかね」と言（い）いながら、一枚の紙切れを渡（わた）しました。ジョバンニはその人の卓子（テーブル）の足もとから一つの小さな平（ひら）たい函（はこ）をとりだして向（む）こうの電燈（でんとう）のたくさんついた、たてかけてある壁（かべ）の隅（すみ）の所（ところ）へしゃがみ込（こ）むと、小さなピンセットでまるで粟粒（あわつぶ）ぐらいの活字（かつじ）を次（つぎ）から次（つぎ）へと拾（ひろ）いはじめました。青い胸（むね）あてをした人がジョバンニのうしろを通りながら、", "「よう、虫めがね君（くん）、お早う」と言（い）いますと、近くの四、五人の人たちが声もたてずこっちも向（む）かずに冷（つめ）たくわらいました。", "ジョバンニは何べんも眼（め）をぬぐいながら活字（かつじ）をだんだんひろいました。", "六時がうってしばらくたったころ、ジョバンニは拾（ひろ）った活字（かつじ）をいっぱいに入れた平（ひら）たい箱（はこ）をもういちど手にもった紙きれと引き合わせてから、さっきの卓子（テーブル）の人へ持（も）って来ました。その人は黙（だま）ってそれを受（う）け取（と）ってかすかにうなずきました。", "ジョバンニはおじぎをすると扉（とびら）をあけて計算台のところに来ました。すると白服（しろふく）を着（き）た人がやっぱりだまって小さな銀貨（ぎんか）を一つジョバンニに渡（わた）しました。ジョバンニはにわかに顔いろがよくなって威勢（いせい）よくおじぎをすると、台の下に置（お）いた鞄（かばん）をもっておもてへ飛（と）びだしました。それから元気よく口笛（くちぶえ）を吹（ふ）きながらパン屋（や）へ寄（よ）ってパンの塊（かたまり）を一つと角砂糖（かくざとう）を一袋（ふくろ）買いますといちもくさんに走りだしました。", "三　家", "ジョバンニが勢（いきお）いよく帰って来たのは、ある裏町（うらまち）の小さな家でした。その三つならんだ入口のいちばん左側（ひだりがわ）には空箱（あきばこ）に紫（むらさき）いろのケールやアスパラガスが植（う）えてあって小さな二つの窓（まど）には日覆（ひおお）いがおりたままになっていました。", "「お母さん、いま帰ったよ。ぐあい悪（わる）くなかったの」ジョバンニは靴（くつ）をぬぎながら言いました。", "「ああ、ジョバンニ、お仕事（しごと）がひどかったろう。今日（きょう）は涼（すず）しくてね。わたしはずうっとぐあいがいいよ」", "ジョバンニは玄関（げんかん）を上がって行きますとジョバンニのお母さんがすぐ入口の室（へや）に白い巾（きれ）をかぶって寝（やす）んでいたのでした。ジョバンニは窓（まど）をあけました。", "「お母さん、今日は角砂糖（かくざとう）を買ってきたよ。牛乳（ぎゅうにゅう）に入れてあげようと思って」", "「ああ、お前さきにおあがり。あたしはまだほしくないんだから」", "「お母さん。姉（ねえ）さんはいつ帰ったの」", "「ああ、三時ころ帰ったよ。みんなそこらをしてくれてね」", "「お母さんの牛乳（ぎゅうにゅう）は来ていないんだろうか」", "「来なかったろうかねえ」", "「ぼく行ってとって来よう」", "「ああ、あたしはゆっくりでいいんだからお前さきにおあがり、姉（ねえ）さんがね、トマトで何かこしらえてそこへ置（お）いて行ったよ」", "「ではぼくたべよう」", "ジョバンニは　窓（まど）のところからトマトの皿（さら）をとってパンといっしょにしばらくむしゃむしゃたべました。", "「ねえお母さん。ぼくお父さんはきっとまもなく帰ってくると思うよ」", "「ああ、あたしもそう思う。けれどもおまえはどうしてそう思うの」", "「だって今朝（けさ）の新聞に今年は北の方の漁（りょう）はたいへんよかったと書いてあったよ」", "「ああだけどねえ、お父さんは漁（りょう）へ出ていないかもしれない」", "「きっと出ているよ。お父さんが監獄（かんごく）へはいるようなそんな悪（わる）いことをしたはずがないんだ。この前お父さんが持ってきて学校へ寄贈（きぞう）した巨（おお）きな蟹（かに）の甲（こう）らだのとなかいの角（つの）だの今だってみんな標本室（ひょうほんしつ）にあるんだ。六年生なんか授業（じゅぎょう）のとき先生がかわるがわる教室へ持（も）って行くよ」", "「お父さんはこの次（つぎ）はおまえにラッコの上着（うわぎ）をもってくるといったねえ」", "「みんながぼくにあうとそれを言（い）うよ。ひやかすように言（い）うんだ」", "「おまえに悪口（わるくち）を言（い）うの」", "「うん、けれどもカムパネルラなんか決（けっ）して言（い）わない。カムパネルラはみんながそんなことを言（い）うときはきのどくそうにしているよ」", "「カムパネルラのお父さんとうちのお父さんとは、ちょうどおまえたちのように小さいときからのお友達（ともだち）だったそうだよ」", "「ああだからお父さんはぼくをつれてカムパネルラのうちへもつれて行ったよ。あのころはよかったなあ。ぼくは学校から帰る途中（とちゅう）たびたびカムパネルラのうちに寄（よ）った。カムパネルラのうちにはアルコールランプで走る汽車があったんだ。レールを七つ組み合わせるとまるくなってそれに電柱（でんちゅう）や信号標（しんごうひょう）もついていて信号標（しんごうひょう）のあかりは汽車が通るときだけ青くなるようになっていたんだ。いつかアルコールがなくなったとき石油（せきゆ）をつかったら、缶（かん）がすっかりすすけたよ」", "「そうかねえ」", "「いまも毎朝新聞をまわしに行くよ。けれどもいつでも家じゅうまだしいんとしているからな」", "「早いからねえ」", "「ザウエルという犬がいる
