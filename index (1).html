言うけれど、己れの為に倹約（つましく）してくれるのだから気の毒でならない、集金（あつめ）に行くうちでも通新町や何かに随分可愛想なのが有るから、さぞお祖母さんを悪るくいふだろう、それを考えると己れは涙がこぼれる、やはり気が弱いのだね、今朝も三公の家へ取りに行ったら、奴め身体が痛い癖に親父に知らすまいとして働いていた、それを見たら己れは口が利けなかった、男が泣くてへのは可笑しいではないか、だから横町の野蕃漢（じゃがたら）に馬鹿にされるのだと言いかけて我が弱いを恥かしそうな顔色、何心なく美登利と見合す目つきの可愛さ。お前の祭の姿（なり）は大層よく似合って浦山しかった、私も男だと彼んな風がして見たい、誰れのよりも宜く見えたと賞められて、何だ己れなんぞ、お前こそ美くしいや、郭内（なか）の大巻（おほまき）さんよりも奇麗だと皆がいうよ、お前が姉であったら己れは何様（どんな）に肩身が広かろう、何処へゆくにも追従（つい）て行って大威張りに威張るがな、一人も兄弟がないから仕方がない、ねへ美登利さん今度一処に写真を取らないか、我れは祭りの時の姿（なり）で、お前は透綾（すきや）のあら縞で意気な形（なり）をして、水道尻の加藤でうつそう、竜華寺の奴が浦山しがるように、本当だぜ彼奴は岐度怒るよ、真青になって怒るよ、にえ肝（かん）だからね、赤くはならない、それとも笑うかしら、笑われても構わない、大きく取って看板に出たら宜いな、お前は嫌やかえ、嫌やのような顔だものと恨めるもおかしく、変な顔にうつるとお前に嫌（き）らはれるからとて美登利うき出して、高笑いの美音に御機嫌や直りし。", "朝冷（あさすず）はいつしか過ぎて日かげの暑くなるに、正太さんまた晩によ、私の寮へも遊びにお出でな、灯篭ながして、お魚追いましょ、池の橋が直つたれば怕い事はないと言い捨てに立出る美登利の姿、正太うれしげに見送って美くしと思いぬ。", "七", "竜華寺の信如、大黒屋の美登利、二人ながら学校は育英舍なり、去りし四月の末つかた、桜は散りて青葉のかげに藤の花見という頃、春季の大運動会とて水の谷（や）の原にせし事ありしが、つな引、鞠なげ、縄とびの遊びに興をそへて長き日の暮るるを忘れし、その折の事とや、信如いかにしたるか平常の沈着（おちつき）に似ず、池のほとりの松が根につまずきて赤土道に手をつきたれば、羽織の袂も泥になりて見にくかりしを、居あはせたる美登利みかねて我が紅の絹はんけちを取出し、これにてお拭きなされと介抱をなしけるに、友達の中なる嫉妬（やきもち）や見つけて、藤本は坊主のくせに女と話をして、嬉しそうに礼を言ったは可笑しいではないか、大方美登利さんは藤本の女房（かみさん）になるのであろう、お寺の女房なら大黒さまと言うのだなどど取沙汰しける、信如元来かかる事を人の上に聞くも嫌いにて、苦き顔して横を向く質なれば、我が事として我慢のなるべきや、それよりは美登利という名を聞くごとに恐ろしく、またあの事を言い出すかと胸の中もやくやして、何とも言われぬ厭やな気持なり、さりながら事ごとに怒りつける訳にもゆかねば、成るだけは知らぬ体をして、平気をつくりて、むずかしき顔をして遣り過ぎる心なれど、さし向いて物などを問われたる時の当惑さ、大方は知りませぬの一ト言にて済ませど、苦しき汗の身うちに流れて心ぼそき思いなり、美登利はさる事も心にとまらねば、最初（はじめ）は藤本さん藤本さんと親しく物いひかけ、学校退けての帰りがけに、我れは一足はやくて道端に珍らしき花などを見つくれば、おくれし信如を待合して、これこの様（こんな）うつくしい花が咲てあるに、枝が高くて私には折れぬ、信さんは背が高ければお手が届きましょ、後生折って下されと一むれの中にては年長（としかさ）なるを見かけて頼めば、流石に信如袖ふり切りて行すぎる事もならず、さりとて人の思はくいよいよ愁（つ）らければ、手近の枝を引寄せて好悪（よしあし）かまわず申訳ばかりに折りて、投つけるようにすたすたと行過ぎるを、さりとは愛敬のなき人と惘（あき）れし事も有しが、度かさなりての末には自ら故意（わざと）の意地悪のように思われて、人には左もなきに我れにばかり愁らき処為（しうち）をみせ、物を問えば碌な返事した事なく、傍へゆけば逃げる、はなしを為れば怒る、陰気らしい気のつまる、どうしていいやら機嫌の取りようもない、彼のような六づかしやは思いのままに捻れて怒つて意地わるが為たいならんに、友達と思わずば口を利くも入らぬ事と美登利少し疳にさわりて、用のなければ摺れ違うても物いうた事なく、途中に逢いたりとて挨拶など思いもかけず、ただいつとなく二人の中に大川一つ横たはりて、舟も筏もここには御法度、岸に添うておもいおもいの道をあるきぬ。", "祭りは昨日に過ぎてそのあくる日より美登利の学校へ通う事うつと跡たえしは、問うまでもなく額の泥の洗うても消えがたき恥辱を、身にしみて口惜しければぞかし、表町とて横町とて同じ教場におし並べば朋輩に変りはなきはずを、おかしき分け隔てに常日頃意地を持ち、我れは女の、とても敵ひがたき弱味をば付目にして、まつりの夜の処為（しうち）はいかなる卑怯ぞや、長吉のわからずやは誰れも知る乱暴の上なしなれど、信如の尻おしなくば彼れほどに思い切りて表町をば暴（あら）し得じ、人前をば物識（ものしり）らしく温順（すなほ）につくりて、陰に回りて機関（からくり）の糸を引しは藤本の仕業に極まりぬ、よし級は上にせよ、学（もの）はできるにせよ、竜華寺さまの若旦那にせよ、大黒屋の美登利紙一枚のお世話にも預からぬ物を、あのように乞食呼はりして貰う恩はなし、竜華寺は何（どれ）ほど立派な檀家ありと知らねど、我が姉さま三年の馴染に銀行の川様、兜町の米様もあり、議員の短小（ちい）さま根曳して奥さまにと仰せられしを、心意気気に入らねば姉さま嫌いてお受けはせざりしが、彼の方とても世には名高きお人と遣手衆（やりてしゆ）の言われし、嘘ならば聞いて見よ、大黒やに大巻の居ずば彼の楼（いえ）は闇とかや、さればお店の旦那とても父さん母さん我が身をも粗畧には遊ばさず、常々大切がりて床の間にお据へなされし瀬戸物の大黒様をば、我れいつぞや座敷の中にて羽根つくとて騷ぎし時、同じく並びし花ビン（はないけ）を仆し、散々に破損（けが）をさせしに、旦那次の間に御酒めし上りながら、美登利お転婆が過ぎるのと言われしばかり小言はなかりき、他の人ならば一通りの怒りでは有るまじと、女子衆達にあとあとまで羨まれしも必竟は姉さまの威光ぞかし、我れ寮住居に人の留守いはしたりとも姉は大黒屋の大巻、長吉風情に負（ひ）けを取るべき身にもあらず、竜華寺の坊さまにいじめられんは心外と、これより学校へ通う事おもしろからず、我ままの本性あなどられしが口惜しさに、石筆を折り墨をすて、書物（ほん）も十露盤（そろばん）も入らぬ物にして、中よき友と埓もなく遊びぬ。", "八", "走れ飛ばせの夕べに引かえて、明けの別れに夢をのせ行く車の淋しさよ、帽子まぶかに人目を厭う方様もあり、手拭とって頬かふり、彼女（あれ）が別れに名残の一撃（うち）、いたさ身にしみて思い出すほど嬉しく、うす気味わるやにたにたの笑い顔、坂本へ出ては用心し給へ千住がえりの青物車にお足元あぶなし、三嶋様の角までは気違い街道、御顔のしまり何れも緩（ゆ）るみて、はばかりながら御鼻の下ながながと見えさせ給えば、そんじよそこらにそれ大した御男子様（ごなんしさま）とて、分厘の価値（ねうち）もなしと、辻に立ちて御慮外を申もありけり。楊家（やうか）の娘君寵をうけてと長恨歌（ちょうごんか）を引出すまでもなく、娘の子は何処にも貴重がらるる頃なれど、このあたりの裏屋より赫奕姫（かくやひめ）の生るる事その例多し、築地の某屋（それや）に今は根を移して御前さま方の御相手、踊りに妙を得し雪という美形、ただいまのお座敷にてお米のなります木はと至極あどけなき事は申とも、もとはこの所の巻帯党（まきおびづれ）にて花がるたの内職せしものなり、評判はその頃に高く去るもの日々に疎ければ、名物一つかげを消して二度目の花は紺屋の乙娘、今千束町に新つた屋の御神灯ほのめかして、小吉と呼ばるる公園の尤物（まれもの）も根生ひは同じここの土成し、あけくれの噂にも御出世というは女に限りて、男は塵塚さがす黒斑（くろぶち）の尾の、ありて用なき物とも見ゆべし、この界隈に若い衆と呼ばるる町並の息子、生意気ざかりの十七八より五人組、七人組、腰に尺八の伊達はなけれど、何とやら厳めしき名の親分が手下（てか）につきて、揃いの手ぬぐい長提灯、賽ころ振る事おぼえぬうちは素見（ひやかし）の格子先に思い切っての串戯も言いがたしとや、真面目につとむる我が家業は昼のうちばかり、一風呂浴びて日の暮れゆけば突かけ下駄に七五三の着物、何屋の店の新妓（しんこ）を見たか、金杉の糸屋が娘に似て最う一倍鼻がひくいと、頭脳（あたま）の中をこの様な事にこしらえて、一軒ごとの格子に煙草の無理どり鼻紙の無心、打ちつ打たれつこれを一世の誉と心得れば、堅気の家の相続息子地回りと改名して、大門際に喧嘩かひと出るもありけり、見よや女子（おんな）の勢力（いきほひ）と言わぬばかり、春秋しらぬ五丁町の賑い、送りの提灯（かんばん）いま流行らねど、茶屋が回女（まわし）の雪駄のおとに響き通える歌舞音曲、うかれうかれて入込む人の何を目当と言問はば、赤えり赤熊（しやぐま）に裲襠（うちかけ）の裾ながく、につと笑う口元目もと、何処が美（よ）いとも申がたけれど華魁衆（おいらんしゆ）とてここにての敬い、立はなれては知るによしなし、かかる中にて朝夕を過ごせば、衣（きぬ）の白地の紅に染む事無理ならず、美登利の眼の中に男という者さっても怕からず恐ろしからず、女郎という者さのみ賎しき勤めとも思はねば、過ぎし故郷を出立の当時ないて姉をば送りしこと夢のように思われて、今日この頃の全盛に父母への孝養うらやましく、お職を徹す姉が身の、憂いの愁（つ）らいの数も知らねば、まち人恋うる鼠なき格子の咒文、別れの背中に手加減の秘密（おく）まで、ただおもしろく聞なされて、郭ことばを町にいうまで去りとは恥かしからず思えるも哀なり、年はやうやう数への十四、人形抱いて頬ずりする心は御華族の御姫様とて変りなけれど、修身の講義、家政学のいくたても学びしは学校にてばかり、誠あけくれ耳に入りしはいいた好かぬの客の風説（うはさ）、仕着せ積み夜具茶屋への行わたり、派手は美事に、かなはぬは見すぼらしく、人事我事分別をいうはまだ早し、幼な心に目の前の花のみはしるく、持まえの負けじ気性は勝手に馳せ回りて雲のような形をこしらえぬ、気違い街道、寝ぼれ道、朝がえりの殿がた一順すみて朝寝の町も門の箒目（ははきめ）青海波（せいがいわ）をえがき、打水よきほどに済みし表町の通りを見渡せば、来るは来るは、万年町山伏町、新谷町あたりを塒（ねぐら）にして、一能一術これも芸人の名はのがれぬ、よかよか飴や軽業師、人形つかい大神楽、住吉おどりに角兵衛獅子、おもいおもいの扮粧（いでたち）して、縮緬透綾（ちりめんすきや）の伊達もあれば、薩摩がすりの洗い着に黒襦子の幅狭帯、よき女もあり男もあり、五人七人十人一組の大たむろもあれば、一人淋しき痩（や）せ老爺（おやじ）の破れ三味線かかえて行くもあり、六つ五つなる女の子に赤襷させて、あれは紀の国おどらするも見ゆ、お顧客（とくい）は郭内に居つづけ客のなぐさみ、女郎の憂さ晴らし、彼処に入る身の生涯やめられぬ得分ありと知られて、来るも来るもここらの町に細かしき貰いを心に止めず、裾に海草（みるめ）のいかがはしき乞食さえ門には立たず行過るぞかし、容顔（きりやう）よき女太夫の笠にかくれぬ床しの頬を見せながら、喉自慢、腕自慢、あれ彼の声をこの町には聞かせぬが憎くしと筆やの女房舌うちして言えば、店先に腰をかけて往来を眺めし湯がえりの美登利、はらりと下る前髪の毛を黄楊（つげ）のびんぐし　にちゃつと掻きあげて、伯母さんあの太夫さん呼んで来ましょうとて、はたはた駆けよって袂にすがり、投げ入れし一品を誰れにも笑って告げざりしが好みの明烏さらりと唄わせて、また御贔負をの嬌音これたやすくは買いがたし、彼れが子供の処業かと寄集りし人舌を巻いて太夫よりは美登利の顔を眺めぬ、伊達には通るほどの芸人をここにせき止めて、三味の音、笛の音、太皷の音、うたわせて舞わせて人の為ぬ事して見たいと折うし正太に（ささや）いて聞かせれば、驚いて呆れて己らは嫌やだな。", "九", "如これ我聞（によぜがもん）、仏説阿弥陀経（ぶつせつあみだきやう）、声は松風に和（くわ）して心のちりも吹払わるべき御寺様の庫裏（くり）より生魚あぶる煙なびきて、卵塔場（らんたうば）に嬰児（やや）の襁褓（むつき）ほしたるなど、お宗旨によりて構いなき事なれども、法師を木のはしと心得たる目よりは、そぞろに腥（なまぐさ）く覚ゆるぞかし、竜華寺の大和なお身代と共に肥へ太りたる腹なりいかにも美事に、色つやの好きこといかなる賞め言葉を参らせたらばよかるべき、桜色にもあらず、緋桃の花でもなし、剃りたてたる頭より顔より首筋にいたるまで銅色（あかがねいろ）の照りに一点のにごりもなく、白髪もまじる太き眉をあげて心まかせの大笑いなさるる時は、本堂の如来さま驚きて台座より転（まろ）び落給わんかと危ぶまるるようなり、御新造はいまだ四十の上をいくらも越さで、色白に髪の毛薄く、丸髷も小さく結いて見ぐるしからぬまでの人がら、参詣人へも愛想よく門前の花屋が口悪る嬶（かか）も兎角の蔭口を言わぬを見れば、着ふるしの裕衣、総菜のお残りなどおのずからの御恩も蒙るなるべし、もとは檀家の一人成しが早くに良人を失なひて寄る辺なき身の暫時ここにお針やとい同様、口さえ濡らさせて下さらばとて洗い濯（そそ）ぎよりはじめてお菜ごしらへは素よりの事、墓場の掃除に男衆の手を助くるまで働けば、和なおさま経済より割出しての御ふ憫かかり、年は二十から違うて見ともなき事は女も心得ながら、行き処なき身なれば結句よき死場処と人目を恥じぬようになりけり、にがにがしき事なれども女の心だて悪るからねば檀家の者も左のみは咎めず、総領の花というを懷胎（まうけ）し頃、檀家の中にも世話好きの名ある坂本の油屋が隠居さま仲人というも異な物なれど進めたてて表向きのものにしける、信如もこの人の腹より生れて男女二人の同胞（きようだい）、一人は如法（によほう）の変屈ものにて一日部屋の中にまぢまぢと陰気らしき生（むま）れなれど、姉のお花は皮薄の二重腮（あご）かわゆらしくできたる子なれば、美人というにはあらねども年頃といい人の評判もよく、素人にして捨てて置くは惜しい物の中に加えぬ、さりとてお寺の娘に左り褄、お釈迦が三味いく世は知らず人の聞え少しは憚かられて、田町の通りに葉茶屋の店を奇麗にしつらへ、帳場格子のうちにこの娘（こ）を据へて愛敬を売らすれば、科りの目はとにかく勘定しらずの若い者など、何がなしに寄って大方毎夜十二時を聞くまで店に客のかげ絶えたる事なし、いそがしきは、大和なお、貸金の取たて、店への見回り、法用のあれこれ、月の幾日（いくか）は説教日の定めもあり帳面くるやら経よむやら斯くては身体のつづき難しと夕暮れの縁先に花むしろを敷かせ、片肌ぬぎに団扇づかいしながら大盃に泡盛をなみなみと注がせて、さかなは好物の蒲焼を表町のむさし屋へあらい処をとの誂え、承りてゆく使い番は信如の役なるに、その嫌やなること骨にしみて、路を歩くにも上を見し事なく、筋向うの筆やに子供づれの声を聞けば我が事を誹らるるかと情なく、そしらぬ顔に鰻屋の門を過ぎては四辺（あたり）に人目の隙をうかがひ、立戻って駈け入る時の心地、我身限って腥きものは食べまじと思いぬ。", "父親和なおは何処までもさばけたる人にて、少しは欲深の名にたてども人の風説（うはさ）に耳をかたぶけるような小胆にてはなく、手の暇あらば熊手の内職もして見やうという気風なれば、霜月の酉（とり）には論なく門前の明地に簪（かんざし）の店を開き、御新造に手拭いかぶらせて縁喜（えんぎ）の宜いのをと呼ばせる趣向、はじめは恥かしき事に思いけれど、軒ならび素人の手業にて莫大の儲けと聞くに、この雑踏の中といい誰れも思い寄らぬ事なれば日暮れよりは目にも立つまじと思案して、昼間は花屋の女房に手伝わせ、夜に入りては自身（みずから）をり立て呼たつるに、欲なれやいつしか恥かしさも失せて、思わず声だかに負ましよ負ましよと跡を追うやうになりぬ、人波にもまれて買手も眼の眩みし折なれば、現在後世（ごせ）ねがいに一昨日来たりし門前も忘れて、簪三本七十五銭と懸直（かけね）すれば、五本ついたを三銭ならばと直切（ねぎ）つて行く、世はぬば玉の闇の儲はこのほかにも有るべし、信如は斯かる事どもいかにも心ぐるしく、よし檀家の耳には入らずとも近辺の人々が思わく、子供中間の噂にも竜華寺では簪の店を出して、信さんが母さんの狂気面（きちがいづら）して売っていたなどと言われもするやと恥かしく、その様な事は止しにしたが宜う御座りましょうと止めし事も有りしが、大和なお大笑いに笑いすてて、黙って居ろ、黙って居ろ、貴様などが知らぬ事だわとて丸々相手にしてはくれず、朝念仏に夕勘定、そろばん手にしてにこにこと遊ばさるる顔つきは我親ながら浅ましくて、なぜその頭（つむり）は丸め給いしぞと恨めしくも成りぬ。", "元来（もとより）一腹一対の中に育ちて他人交ぜずの穏かなる家の内なれば、さしてこの児を陰気ものに仕立あげる種はなけれども、性来をとなしき上に我が言う事の用ひられねば兎角に物のおもしろからず、父が仕業も母の処作も姉の教育（したて）も、悉皆あやまりのように思わるれど言うて聞かれぬ物ぞと諦めればうら悲しき様に情なく、友朋輩は変屈者の意地わると目ざせども自ら沈みいる心の底の弱き事、我が蔭口を露ばかりもいう者ありと聞けば、立出でて喧嘩口論の勇気もなく、部屋にとぢ篭つて人に面の合はされぬ憶病至極の身なりけるを、学校にてのできぶりといい身分がらの卑しからぬにつけても然（さ）る弱虫とは知る物なく、竜華寺の藤本は生煮えの餅のように真があって気になる奴と憎くがるものも有りけらし。", "十", "祭りの夜は田町の姉のもとへ使を命令（いいつけ）られて、更るまで我家へ帰らざりければ、筆やの騷ぎは夢にも知らず、明日になりて丑松文次その外の口よりこれこれで有ったと伝えらるるに、今更ながら長吉の乱暴に驚けども済みたる事なれば咎めだてするも詮なく、我が名を借りられしばかりつくづく迷惑に思われて、我が為したる事ならねど人々への気の毒を身一つに背負たる様の思いありき、長吉も少しは我が遣りそこねを恥かしう思うかして信如に逢はば小言や聞かんとその三四日は姿も見せず、やや余炎（ほとぼり）のさめたる頃に信さんお前は腹を立つか知らないけれど時の拍子だから堪忍して置いて呉んな、誰れもお前正太が明巣（あきす）とは知るまいではないか、何も女郎（めらう）の一疋位相手にして三五郎を叩りたい事もなかったけれど、万灯を振込んで見りやあただも帰れない、ほんの付景気に詰らない事をしてのけた、それりやあ己れが何処までも悪るいさ、お前の命令（いいつけ）を聞かなかったは悪るからうけれど、今怒られては法（かた）なしだ、お前という後だてが有るので己らあ大舟に乗ったようだに、見すてられちまっては困るだらうじゃないか、嫌やだとってもこの組の大将でいてくんねへ、左様どぢ斗（ばかり）はどぢ斗はは底本では「どち斗は組まないからとて面目なさそうに謝罪（わび）られて見ればそれでも私は嫌やだとも言いがたく、仕方がない遣る処までやるさ、弱い者いじめはこの方の恥になるから三五郎や美登利を相手にしても仕方がない、正太に末社がついたらその時のこと、決してこの方から手出しをしてはならないと留めて、さのみは長吉をも叱り飛ばさねど再び喧嘩のなきようにと祈られぬ。", "罪のない子は横町の三五郎なり、思うさまに叩かれて蹴られてその二三日は立居も苦しく、夕ぐれ毎に父親が空車を五十軒の茶屋が軒まで運ぶにさへ、三公は何うかしたか、ひどく弱っているようだなと見知りの台屋に咎められしほど成しが、父親はお辞義の鉄とて目上の人に頭をあげた事なく郭内（なか）の旦那は言わずともの事、大屋様地主様いずれの御無理も御尤と受ける質なれば、長吉と喧嘩してこれこれの乱暴に逢いましたと訴えればとて、それは何うも仕方がない大屋さんの息子さんではないか、この方に理が有ろうが先方（さき）が悪るかろうが喧嘩の相手になるという事はない、謝罪（わび）て来い謝罪て来い途方もない奴だと我子を叱りつけて、長吉がもとへあやまりに遣られる事必定なれば、三五郎は口惜しさを噛みつぶして七日十日と程をふれば、痛みの場処のいよいよ（なほ）ると共にそのうらめしさも何時しか忘れて、頭（かしら）の家の赤ん坊が守りをして二銭が駄賃をうれしがり、ねん／＼よ、おころりよ、と背負いあるくさま、年はと問えば生意気ざかりの十六にもなりながらその大体（づうたい）を恥かしげにもなく、表町へものこのこ　と出かけるに、何時も美登利と正太が嬲（なぶ）りものになって、お前は性根を何処へ置いて来たとからかわれながらも遊びの中間は外れざりき。", "春は桜の賑いよりかけて、なき玉菊が灯篭の頃、つづいて秋の新仁和賀には十分間に車の飛ぶ事この通りのみにて七十五両と数へしも、二の替りさえいつしか過ぎて、赤蜻蛉田圃に乱るれば横堀に鶉（うずら）なく頃も近づきぬ、朝夕の秋風身にしみ渡りて上清（じゃうせい）が店の蚊遣香懷炉灰に座をゆずり、石橋の田村やが粉挽く臼の音さびしく、角海老（かどえび）が時計の響きもそぞろ哀れの音を伝えるようになれば、四季絶間なき日暮里（にっぽり）の火の光りも彼れが人を焼く煙りかとうら悲しく、茶屋が裏ゆく土手下の細道に落かかるような三味の音を仰いで聞けば、仲之町芸者が冴えたる腕に、君が情の仮寝（かりね）の床にと何ならぬ一うし哀れも深く、この時節より通い初（そむ）るは浮かれ浮かるる遊客ならで、身にしみじみと実のあるお方のよし、遊女（つとめ）あがりの去る女（ひと）が申き、このほどの事かかんもくだしや大音寺前にて珍らしき事は盲目按摩の二十ばかりなる娘、かなはぬ恋に不自由なる身を恨みて水の谷の池に入水（じゅすい）したるを新らしい事とて伝える位なもの、八百屋の吉五郎に大工の太吉がさっぱりと影を見せぬが何とかせしと問うにこの一件であげられましたと、顔の真中へ指をさして、何の子細なく取立てて噂をする者もなし、大路を見渡せば罪なき子供の三五人手を引つれて開いらいた開らいた何の花ひらいたと、無心の遊びも自然と静かにて、郭に通う車の音のみ何時に変らず勇ましく聞えぬ。", "秋雨しとしとと降るかと思えばさつと音して運びくる様なる淋しき夜、通りすがりの客をば待たぬ店なれば、筆やの妻は宵のほどより表の戸をたてて、中に集まりしは例の美登利に正太郎、その外には小さき子供の二三人寄りて細螺（きしやご）はじきの幼なげな事して遊ぶほどに、美登利ふと耳を立てて、あれ誰れか買物に来たのではないか溝板を踏む足音がするといえば、おや左様か、己いらは少つとも聞なかったと正太もちうちうたこかいの手を止めて、誰れか中間が来たのではないかと嬉しがるに、門なる人はこの店の前まで来たりける足音の聞えしばかりそれよりほうっと絶えて、音も沙汰もなし。", "十一", "正太は潜りを明けて、ばあばあに傍点と言いながら顔を出すに、人は二三軒先の軒下をたどりて、ぽっぽつと行く後影、誰れ誰れだ、おいお這入よと声をかけて、美登利が足駄を突かけばきに、降る雨を厭わず駆け出さんとせしが、ああ彼奴だと一ト言、振かえって、美登利さん呼んだっても来はしないよ、一件だもの、と自分の頭（つむり）を丸めて見せぬ。", "信さんかえ、と受けて、嫌やな坊主ったらない、きっと筆か何か買いに来たのだけれど、私たちがいるものだから立聞きをして帰ったのであろう、意地悪るの、根生（こんじゃう）まがりの、ひねつこびれの、喫（どんも）りの、歯（はッ）かけの、嫌やな奴め、這入って来たら散々と窘（いぢ）めてやる物を、帰ったは惜しい事をした、どれ下駄をお貸し、ちょっと見てやる、とて正太に代って顔を出せば軒の雨だれ前髪に落ちて、おお気味が悪るいと首を縮めながら、四五軒先の瓦斯灯の下を大黒傘肩にして少しうつむいているらしくとぼとぼと歩む信如の後かげ、何時までも、何時までも、何時までも見送るに、美登利さん何うしたの、と正太は怪しがりて背中をつっきぬ。", "何うもしない、と気のない返事をして、上へあがって細螺を数えながら、本当に嫌やな小僧とってはない、表向きに威張った喧嘩はできもしないで、温順しそうな顔ばかりして、根生がくすくすしているのだもの憎くらしからうではないか、家の母さんが言うていたつけ、瓦落（がら）がらしている者は心がいいのだと、それだからくすくすしている信さん何かは心が悪るいに相違ない、ねへ正太さん左様であろう、と口を極めて信如の事を悪く言えば、それでも竜華寺はまだ物が解っているよ、長吉と来たら彼れははやと、生意気に大人の口を真似れば、お廃しよ正太さん、子供の癖にませたませたに傍点様でおかしい、お前は余っぽど剽軽（へうきん）ものだね、とて美登利は正太の頬をつついて、その真面目がほはと笑いこけるに、己らだっても最少し経てば大人になるのだ、蒲田屋の旦那のように角袖外套か何か着てね、祖母さんがしまって置く金時計を貰って、そして指輪もこしらえて、巻煙草を吸って、履く物は何が宜からうな、己らは下駄より雪駄が好きだから、三枚裏にして繻珍の鼻緒というのを履くよ、似合うだらうかと言えば、美登利はくすくす　笑いながら、背の低い人が角袖外套に雪駄ばき、まあ何んなにか可笑しかろう、目薬のビンが歩くようであろうと誹（おと）すに、馬鹿を言っていらあ、それまでには己らだって大きく成るさ、この様な小っぽけではいないと威張るに、それではまだ何時の事だか知れはしない、天井の鼠があれ御覧、と指をさすに、筆やの女房（つま）を始めとして座にある者みな笑いころげぬ。", "正太は一人真面目になりて例の目の玉ぐるぐるとさせながら、美登利さんは冗談にしているのだね、誰れだって大人にならぬ者はないに、己らの言うがなぜおかしかろう、奇麗な嫁さんを貰って連れて歩くようになるのだがなあ、己らは何でも奇麗のが好きだから、煎餅やのお福のような痘痕（みつちや）づらや、薪やのお出額（でこ）のようなが万一（もし）来ようなら、直さま追出して家へは入れて遣らないや、己らは痘痕（あばた）と湿（しつ）つかきは大嫌いと力を入れるに、主人（あるじ）の女は吹出して、それでも正さん宜く私が店へ来て下さるの、伯母さんの痘痕は見えぬかえと笑うに、それでもお前は年寄りだもの、己らの言うのは嫁さんの事さ、年寄りは何（どう）でも宜いとあるに、それは大失敗（おほしくじり）だねと筆やの女房おもしろづくに御機嫌を取りぬ。", "町内で顔のいいのは花屋のお六さんに、水菓子やの喜いさん、それよりも、それよりもずんといいはお前の隣に据ってお出なさるのなれど、正太さんはまあ誰れにしようと極めてあるえ、お六さんの眼つきか、喜いさんの清元か、まあ何れをえ、と問われて、正太顔を赤くして、何だお六づらや、喜い公、何処がいい者かと釣りらんぷの下を少し居退きて、壁際の方へと尻込みをすれば、それでは美登利さんがいいのであろう、そう極めて御座んすの、と図星をさされて、そんな事を知る物か、何だその様な事、とくるり後を向いて壁の腰ばりを指でたたきながら、回れまわれ　水車を小音に唱い出す、美登利は衆人（おおく）の細螺（きしやご）を集めて、さあ最う一度はじめからと、これは顔をも赤らめざりき。", "十二", "信如が何時も田町へ通う時、通らでも事は済めども言はば近道の土手々前に、仮初の格子門、のぞけば鞍馬の石灯篭に萩の袖垣しをらしう見えて、椽先に巻きたる簾のさまもなつかしう、中がらすの障子のうちには今様の按察（あぜち）の後室が珠数をつまぐって、冠（かぶ）つ切りの若紫も立出るやと思わるる、その一ツ構えが大黒屋の寮なり。", "昨日も今日も時雨の空に、田町の姉より頼みの長胴着ができたれば、暫時（すこし）も早う重ねさせたき親心、御苦労でも学校まえのちょっとの間に持って行ってくれまいか、定めて花も待って居ようほどに、と母親よりの言いつけを、何も嫌やとは言い切られぬ温順しさに、ただはいわいと小包みを抱えて、鼠小倉の緒のすがりし朴木歯（ほほのきば）の下駄ひたひたと、信如は雨傘さしかざして出ぬ。", "お歯ぐろ溝の角より曲りて、いつも行くなる細道をたどれば、運わるう大黒やの前まで来し時、さつと吹く風大黒傘の上を抓（つか）みて、宙へ引あげるかと疑うばかり烈しく吹けば、これは成らぬと力足を踏こたゆる途端、さのみに思わざりし前鼻緒のずるずると抜けて、傘よりもこれこそ一の大事になりぬ。", "信如こまりて舌打はすれども、今更何と法のなければ、大黒屋の門に傘を寄せかけ、降る雨を庇に厭うて鼻緒をつくろうに、常々仕馴れぬお坊さまの、これは如何な事、心ばかりは急（あせ）れども、何としても甘（うま）くわすげる事の成らぬ口惜しさ、ぢれて、ぢれて、袂の中から記事文の下書きして置いた大半紙を抓（つか）み出し、ずんずんと裂きて紙縷（こより）をよるに、意地わるの嵐またもや落し来て、立かけし傘のころころと転がり出るを、いまいましい奴めと腹立たしげにいいて、取止めんと手を延ばすに、膝へ乗せて置きし小包み意久地もなく落ちて、風呂敷は泥に、我着る物の袂までを汚しぬ。", "見るに気の毒なるは雨の中の傘なし、途中に鼻緒を踏み切りたるばかりはなし、美登利は障子の中ながらガラスごしに遠く眺めて、あれ誰れか鼻緒を切った人がある、母さん切れを遣っても宜う御座んすかと尋ねて、針箱の引出しから友仙ちりめんの切れ端をつかみ出し、庭下駄はくも鈍（もど）かしきように、馳せ出でて椽先の洋傘（こうもり）さすより早く、庭石の上を伝うて急ぎ足に来たりぬ。", "それと見るより美登利の顔は赤う成りて、何のようの大事にでも逢いしやうに、胸の動悸の早くうつを、人の見るかと背後（うしろ）の見られて、恐る恐る門の侍（そば）へ寄れば、信如もふつと振返りて、これも無言に脇を流るる冷汗、跣足になりて逃げ出したき思いなり。", "平常（つね）の美登利ならば信如が難義の体を指さして、ありゃれ彼の意久地なしと笑うて笑うて笑い抜いて、言いたいままの悪まれ口、よくもお祭りの夜は正太さんに仇をするとて私たちが遊びの邪魔をさせ、罪もない三ちゃんを叩（たた）かせて、お前は高見で采配（さいはい）を振ってお出なされたの、さあ謝罪（あやまり）なさんすか、何とで御座んす、私の事を女郎女郎と長吉づらに言わせるのもお前の指図、女郎でも宜いではないか、塵一本お前さんが世話には成らぬ、私には父さんもあり母さんもあり、大黒屋の旦那も姉さんもある、お前のような腥（なまぐさ）のお世話には能うならぬほどに余計な女郎呼はり置いて貰いましょ、言う事があらば陰のくすくす　ならでここでお言いなされ、お相手には何時でも成つて見せまする、さあ何とで御座んす、と袂を捉（と）らへて捲（まく）しかくる勢い、さこそは当り難うもあるべきを、物いわず格子のかげに小隠れて、さりとて立去るでもなしにただうぢ／＼と胸とどろかすは平常の美登利のさまにてはなかりき。", "十三", "ここは大黒屋のと思う時より信如は物の恐ろしく、左右を見ずして直（ひた）あゆみに為しなれども、生憎（あやにく）の雨、あやにくの風、鼻緒をさえに踏切りて、詮なき門下に紙縷を縷（よ）る心地、憂き事さま／″＼に何うも堪えられぬ思いの有しに、飛石の足音は背より冷水をかけられるがごとく、顧みねどもその人と思うに、わなわなと慄へて顔の色も変るべく、後向きになりてなおも鼻緒に心を尽すと見せながら、半は夢中にこの下駄いつまで懸りても履ける様には成らんともせざりき。", "庭なる美登利はさしのぞいて、ええ不器用な彼んな手つきして何うなる物ぞ、紙縷は婆々縷（ばはより）、藁しべなんぞ前壷に抱かせたとて長もちのする事ではない、それそれ　羽織の裾が地について泥になるは御存じないか、あれ傘が転がる、あれを疊んで立てかけて置けばいいにと一々鈍（もど）かしう歯がゆくは思えども、ここに裂れが御座んす、この裂（これ）でおすげなされと呼かくる事もせず、これも立尽して降雨袖に侘しきを、厭いもあえず小隠れて覗いしが、さりとも知らぬ母の親はるかに声を懸けて、火のしの火が熾（おこ）りましたぞえ、この美登利さんは何を遊んでいる、雨の降るに表へ出ての悪戯は成りませぬ、またこの間のように風引こうぞと呼立てられるに、はい今行ますと大きく言いて、その声信如に聞えしを恥かしく、胸はわくわくと上気して、何うでも明けられぬ門の際（きは）にさりとも見過しがたき難義をさまざま　の思案尽して、格子の間より手に持つ裂れを物いわず投げ出せば、見ぬように見て知らず顔を信如のつくるに、ええ　例（いつも）の通りの心根と遣る瀬なき思いを眼に集めて、少し涕の恨み顔、何を憎んでそのやうに無情（つれなき）そぶりは見せらるる、言いたい事はこの方にあるを、余りな人とこみ上るほど思いに迫れど、母親の呼声しばしばなるを侘しく、詮方なさに一ト足二タ足ええ何ぞいの未練くさい、思はく恥かしと身をかえして、かたかたと飛石を伝いゆくに、信如は今ぞ淋しう見かえれば紅入り友仙の雨にぬれて紅葉の形（かた）のうるわしきが我が足ちかく散ぼひたる、そぞろに床しき思いは有れども、手に取あぐる事をもせず空しう眺めて憂き思いあり。", "我が不器用をあきらめて、羽織の紐の長きをはずし、結いつけにくるくると見とむなき間に合せをして、これならばと踏試るに、歩きにくき事言うばかりなく、この下駄で田町まで行く事かと今さら難義は思えども詮方なくて立上る信如、小包みを横に二タ足ばかりこの門をはなるるにも、友仙の紅葉眼に残りて、捨てて過ぐるにしのび難く心残りして見返れば、信さん何うした鼻緒を切ったのか、その姿（なり）は何（どう）だ、見ッともないなと不意に声を懸くる者のあり。", "驚いて見かえるに暴れ者の長吉、いま郭内（なか）よりの帰りと覚しく、裕衣を重ねし唐桟の着物に柿色の三尺を例の通り腰の先にして、黒八の襟のかかった新らしい半天、印の傘をさしかざし高足駄の爪皮も今朝よりとはしるき漆（うるし）の色、きわきわしう見えて誇らし気なり。", "僕は鼻緒を切ってしまって何う為ようかと思っている、本当に弱っているのだ、と信如の意久地なき事を言えば、左様だらうお前に鼻緒の立ッこはない、いいや己れの下駄を履いて行きねへ、この鼻緒は大丈夫だよというに、それでもお前が困るだろう。何己れは馴れた物だ、こうやってこうすると言いながら急遽（あわただ）しう七分三分に尻端折て、その様な結いつけなんぞよりこれが爽快（さっぱり）だと下駄を脱ぐに、お前跣足（はだし）になるのかそれでは気の毒だと信如困り切るに、いいよ、己れは馴れた事だ信さんなんぞは足の裏が柔らかいから跣足で石ごろ道は歩けない、さあこれを履いてお出で、と揃えて出す親切さ、人には疫病神のように厭われながらも毛虫眉毛を動かして優しき詞のもれ出るぞおかしき。信さんの下駄は己れが提げて行こう、台処（だいどこ）へ放り込んで置たら子細はあるまい、さあ履き替えてそれをお出しと世話をやき、鼻緒の切れしを片手に提げて、それなら信さん行てお出、後刻（のち）に学校で逢おうぜの約束、信如は田町の姉のもとへ、長吉は我家の方（かた）へと行別れるに思いの止まる紅入の友仙は可憐（いぢら）しき姿を空しく格子門の外にと止めぬ。", "十四", "この年三の酉まで有りて中一日はつぶれしかど前後の上天気に大鳥神社の賑いすさまじくここをかこつけに検査場の門より乱れ入る若人達の勢いとては、天柱くだけ、地維（ちい）かくるかと思わるる笑い声のどよめき、中之町の通りはにわかに方角の替りしやうに思われて、角町（すみちょう）京町（きやうまち）処々のはね橋より、さつさ押せおせと猪牙（ちよき）ががった言葉に人波を分くる群もあり、河岸の小店の百囀（ももさえ）づりより、優にうづ高き大籬（おほまがき）の楼上まで、弦歌の声のさまざまに沸き来るような面白さは大方の人おもい出でて　忘れぬ物に思（おぼ）すも有るべし。正太はこの日日がけの集めを休ませ貰いて、三五郎が大頭（おほがしら）の店を見舞うやら、団子屋の背高が愛想気のない汁粉やを音づれて、何うだ儲けがあるかえと言えば、正さんお前いい処へ来た、我れが※飲のへん＋稲のつくり、第4水準2-92-68この種なしになって最う今からは何を売ろう、直様煮かけては置いたけれど中途（なかたび）お客は断れない、何うしような、と相談を懸けられて、知惠なしの奴め大鍋の四辺（ぐるり）に夫（そ）れッ位無駄がついているではないか、それへ湯を回して砂糖さえ甘くすれば十人前や二十人は浮いて来よう、何処でも皆な左様するのだお前の店（とこ）ばかりではない、何この騷ぎの中で好悪（よしあし）を言う物が有ろうか、お売りお売りと言いながら先に立って砂糖の壷を引寄すれば、目ッかちの母親おどろいた顔をして、お前さんは本当に商人（あきんど）にできていなさる、恐ろしい知惠者だと賞めるに、何だこの様な事が知惠者な物か、今横町の潮吹きの処で※飲のへん＋稲のつくり、第4水準2-92-68が足りないッてこの様やったを見て来たので己れの発明ではない、と言い捨てて、お前は知らないか美登利さんのいる処を、己れは今朝から探しているけれど何処へ行たか筆やへも来ないと言う、郭内（なか）だらうかなと問えば、むむ美登利さんはな今の先己れの家の前を通って揚屋町の刎橋（はねばし）から這入って行た、本当に正さん大変だぜ、今日はね、髪をこういう風にこんな嶋田に結ってと、変てこな手つきして、奇麗だね彼の娘（こ）はと鼻を拭つつ言えば、大巻さんよりなお美（い）いや、だけれど彼の子も華魁（おいらん）になるのでは可憐そうだと下を向いて正太の答うるに、いいじゃあないか華魁になれば、己れは来年から際物屋（きはものや）になってお金をこしらえるがね、それを持って買いに行くのだと頓馬を現わすに、しゃれ（しやら）くさい事を言っていらあ左うすればお前はきっと振られるよ。なぜ々々。なぜでも振られる理由（わけ）が有るのだもの、と顔を少し染めて笑いながら、それじゃあ己れも一回りして来ようや、また後に来るよと捨て台辞して門に出て、十六七の頃までは蝶よ花よと育てられ、と怪しきゅうるへ声にこの頃ここの流行（はやり）ぶしを言って、今では勤めが身にしみてと口の内にくり返し、例の雪駄の音たかく浮きたつ人の中に交りて小さき身体はたちまちに隠れつ。", "揉まれて出し郭の角、向うより番頭新造のお妻と連れ立ちて話しながら来るを見れば、まがいもなき大黒屋の美登利なれども誠に頓馬の言いつるごとく、初々しき大嶋田結い綿のように絞りばなしうそうさとかけて、鼈甲（べつかう）のさし込、総（ふさ）つきの花かんざしひらめかし、何時よりは極彩色のただ京人形を見るように思われて、正太はあつとも言わず立止まりしまま例（いつも）のごとくは抱きつきもせで打守るに、彼方（こなた）は正太さんかとて走り寄り、お妻どんお前買い物が有らば最うここでお別れにしましょ、私はこの人と一処に帰ります、左様ならとて頭を下げるに、あれ美いちゃんの現金な、最うお送りは入りませぬとかえ、そんなら私は京町で買物しましょ、とちょこ／＼走りに長屋の細道へ駆け込むに、正太はじめて美登利の袖を引いて好く似合うね、いつ結ったの今朝かへ昨日かへなぜはやく見せてはくれなかった、と恨めしげに甘ゆれば、美登利打しほれて口重く、姉さんの部屋で今朝結って貰ったの、私は厭やでしようがない、とさし俯向きて往来を恥じぬ。", "十五", "憂く恥かしく、つつましき事身にあれば人の褒めるは嘲りと聞なされて、嶋田の髷のなつかしさに振かえり見る人たちをば我れを蔑む眼つきと察（と）られて、正太さん私は自宅（うち）へ帰るよと言うに、なぜ今日は遊ばないのだろう、お前何か小言を言われたのか、大巻さんと喧嘩でもしたのではないか、と子供らしい事を問われて答えは何と顔の赤（あから）むばかり、連れ立ちて団子屋の前を過ぎるに頓馬は店より声をかけてお中が宜しう御座いますと仰山な言葉を聞くより美登利は泣きたいような顔つきして、正太さん一処に来ては嫌やだよと、置きざりに一人足を早めぬ。", "お酉さまへ諸共にと言いしを道引違えて我が家の方（かた）へと美登利の急ぐに、お前一処には来てくれないのか、なぜその方へ帰ってしまう、余りだぜと例のごとく甘えてかかるを振切るように物言わず行けば、何の故とも知らねども正太は呆れて追いすがり袖を止めては怪しがるに、美登利顔のみ打赤めて、何でもない、と言う声理由（わけ）あり。", "寮の門をばくぐり入るに正太かねても遊びに来馴れて左のみ遠慮の家にもあらねば、跡より続いて椽先からそっと上るを、母親見るより、おお正太さん宜く来て下さった、今朝から美登利の機嫌が悪くて皆なあぐねあぐねに傍点て困っています、遊んでやって下されと言うに、正太は大人らしう惶（かしこま）りて加減が悪るいのですかと真面目に問うを、いいえ、と母親怪しき笑顔をして少し経てばいよいよ（なほ）りましょう、いつでも極りの我まま様（さん）、さぞお友達とも喧嘩しましょうな、真実（ほんに）やり切れぬ嬢さまではあるとて見かえるに、美登利はいつか小座敷に蒲団抱巻持出でて、帯と上着を脱ぎ捨てしばかり、うつ伏し臥して物をも言わず。", "正太は恐る恐る枕もとへ寄って、美登利さん何うしたの病気なのか心持が悪いのか全体何うしたの、と左のみは摺寄らず膝に手を置いて心ばかりを悩ますに、美登利は更に答えもなく押ゆる袖にしのび音の涕、まだ結いこめぬ前髪の毛の濡れて見ゆるも子細（わけ）ありとはしるけれど、子供心に正太は何と慰めの言葉も出ずただひたすらに困り入るばかり、全体何が何うしたのだろう、己れはお前に怒られる事はしもしないに、何がその様なに腹が立つの、と覗き込んで途方にくるれば、美登利は眼を拭うて正太さん私は怒つているのでは有りません。", "それなら何うしてと問われれば憂き事さまざまこれは何うでも話しのほかの包ましさなれば、誰れに打明けいう筋ならず、物言わずして自づと頬の赤うなり、さして何とは言われねども、次第次第に心細き思い、すべて昨日の美登利の身に覚えなかりし思いをもうけて物の恥かしさ言うばかりなく、成事ならば薄暗き部屋のうちに誰れとて言葉をかけもせず我が顔ながむる者なしに一人気ままの朝夕を経たや、さらばこの様の憂き事ありとも人目つつましからずば斯く迄物は思うまじ、何時までも何時までも人形と紙雛（あね）さまとをあひ手にして飯事（ままごと）許（ばか）りしていたらばさぞかし嬉しき事ならんを、ええ　厭や厭や、大人になるは厭やな事、なぜこのように年をば取る、最う七月（ななつき）十月（とっき）、一年も以前（もと）へ帰りたいにと老人（としより）じみた考えをして、正太のここにあるをも思われず、物いひかければことごとく蹴ちらして、帰っておくれ正太さん、後生だから帰っておくれ、お前がいると私は死んでしまうであろう、物を言われると頭痛がする、口を利くと眼がまわる、誰れもだれも　私の処へ来ては厭やなれば、お前も何卒帰ってと例に似合ぬ愛想づかし、正太はなぜ（なに）とも得ぞ解きがたく、煙のうちにあるようにてお前は何うしても変てこだよ、その様な事を言うはずはないに、可怪しい人だね、とこれはいささか口惜しき思いに、落ついて言いながら目には気弱の涙のうかぶを、何とてそれに心を置くべき帰っておくれ、帰っておくれ、何時までここにいてくれれば最うお友達でも何でもない、厭やな正太さんだと憎くらしげに言われて、それならば帰るよ、お邪魔さまで御座いましたとて、風呂場に加減見る母親には挨拶もせず、ういと立って正太は庭先よりかけ出しぬ。", "十六", "真一文字に駆けて人中を抜けつ潜りつ、筆屋の店へおどり込めば、三五郎は何時か店をば売しまうて、腹掛のかくしへ若干金（なにがし）かをじゃらつかせ、弟妹引つれつつ好きな物をば何でも買への大兄様、大愉快の最中（もなか）へ正太の飛込み来しなるに、やあ正さん今お前をば探していたのだ、己れは今日は大分の儲けがある、何か奢つて上やうかと言えば、馬鹿をいえ手前に奢つて貰う己れではないわ、黙って居ろ生意気は吐（つ）くなと何時になく荒らい事を言って、それどころではないとて鬱（ふさ）ぐに、何だ何だ喧嘩かと食べかけの　ぱんを懷中（ふところ）に捻じ込んで、相手は誰れだ、竜華寺か長吉か、何処で始まった郭内（なか）か鳥居前か、お祭りの時とは違うぜ、不意でさえなくば負けはしない、己れが承知だ先棒は振らあ、正さん胆ッ玉をしっかりして懸りねへ、と競いかかるに、ええ気の早い奴め、喧嘩ではない、とて流石に言いかねて口を噤（つぐ）めば、でもお前が大層らしく飛込んだから己れは一途に喧嘩かと思った、だけれど正さんは今夜はじまらなければ最うこれから喧嘩の起りッこはないね、長吉の野郎片腕がなくなる物と言うに、なぜどうして片腕がなくなるのだ。お前知らずか己れもただ（たった）今うちの父さんが竜華寺の御新造と話していたを聞いたのだが、信さんは最う近々何処かの坊さん学校へ這入るのだとさ、衣を着てしまえば手が出ねへや、空つきり彼（あ）んな袖のぺら／＼した、恐ろしい長い物を捲り上げるのだからね、左うなれば来年から横町も表も残らずお前の手下だよと扇（そや）すに、廃してくれ二銭貰うと長吉の組になるだろう、お前みたようのが百人中間に有たとて少とも嬉しい事はない、着きたい方へ何方へでも着きねへ、己れは人は頼まない真（ほん）の腕ッこで一度竜華寺とやりたかったに、他処へ行かれては仕方がない、藤本は来年学校を卒業してから行くのだと聞いたが、何うしてその様に早く成ったろう、為様のない野郎だと舌打しながら、それは少しも心に止まらねども美登利が素振のくり返されて正太は例の歌も出ず、大路の往来の夥ただしきさえ心淋しければ賑やかなりとも思われず、火ともし頃より筆やが店に転がりて、今日の酉の市目茶／＼にここも彼処も怪しき事成りき。", "美登利はかの日を始めにして生れかわりし様の身の振舞、用ある折は郭の姉のもとにこそ通え、かけても町に遊ぶ事をせず、友達さびしがりて誘いにと行けば今に今にと空約束はてしなく、さしもに中よし成けれど正太とさえに親しまず、いつも恥かし気に顔のみ赤めて筆やの店に手踊の活発さは再び見るに難く成ける、人は怪しがりて病ひの故かと危ぶむも有れども母親一人ほほ笑みては、今にお侠（きやん）の本性は現れまする、これは中休みと子細（わけ）ありげに言われて、知らぬ者には何の事とも思われず、女らしう温順しう成ったと褒めるもあれば折角の面白い子を種なしにしたと誹るもあり、表町は俄に火の消えしやう淋しく成りて正太が美音も聞く事まれに、ただ夜な／＼の弓張提灯、あれは日がけの集めとしるく土手を行く影そぞろ寒げに、折ふし供する三五郎の声のみ何時に変らず滑稽（おどけ）ては聞えぬ。", "竜華寺の信如が我が宗の修業の庭に立出る風説（うはさ）をも美登利は絶えて聞かざりき、有し意地をばそのままに封じ込めて、ここしばらくの怪しの現象（さま）に我れを我れとも思われず、ただ何事も恥かしうのみ有けるに、ある霜の朝水仙の作り花を格子門の外よりさし入れ置きし者の有けり、誰れの仕業と知るよしなけれど、美登利は何ゆえとなく懷かしき思いにて違い棚の一輪ざしに入れて淋しく清き姿をめでけるが、聞くともなしに伝へ聞くその明けの日は信如が何がしの学林（がくりん）に袖の色かえぬべき当日なりしとぞ。"]}, {"no": 28, "title": "ダス・ゲマイネ", "author": "太宰 治", "category": "日本文学-物語", "chars": 22213, "volume": "大", "paras": ["一　幻燈", "当時、私には一日一日が晩年であった。", "恋をしたのだ。そんなことは、全くはじめてであった。それより以前には、私の左の横顔だけを見せつけ、私のおとこを売ろうとあせり、相手が一分間でもためらったが最後、たちまち私はきりきり舞いをはじめて、疾風のごとく逃げ失せる。けれども私は、そのころすべてにだらしなくなっていて、ほとんど私の身にくっついてしまったかのようにも思われていたその賢明な、怪我の少い身構えの法をさえ持ち堪（こた）えることができず、謂（い）わば手放しで、節度のない恋をした。好きなのだから仕様がないという嗄（しわが）れた呟（つぶや）きが、私の思想の全部であった。二十五歳。私はいま生れた。生きている。生き、切る。私はほんとうだ。好きなのだから仕様がない。しかしながら私は、はじめから歓迎されなかったようである。無理心中という古くさい概念を、そろそろとからだで了解しかけて来た矢先、私は手ひどくはねつけられ、そうしてそれっきりであった。相手はどこかへ消えうせたのである。", "友人たちは私を呼ぶのに佐野次郎左衛門、もしくは佐野次郎（さのじろ）という昔のひとの名でもってした。", "「さのじろ。――でも、よかった。そんな工合いの名前のおかげで、おめえの恰好もどうやらついて来たじゃないか。ふられても恰好がつくなんてのは、てんからひとに甘ったれている証拠らしいが、――ま、落ちつく」", "馬場がそう言ったのを私は忘れない。そのくせ、私を佐野次郎なぞと呼びはじめたのは、たしかに馬場なのである。私は馬場と上野公園内の甘酒屋で知り合った。清水寺のすぐちかくに赤い毛氈（もうせん）を敷いた縁台を二つならべて置いてある小さな甘酒屋で知り合った。", "私が講義のあいまあいまに大学の裏門から公園へぶらぶら歩いて出ていって、その甘酒屋にちょいちょい立ち寄ったわけは、その店に十七歳の、菊という小柄で利発そうな、眼のすずしい女の子がいて、それの様が私の恋の相手によくよく似ていたからであった。私の恋の相手というのは逢うのに少しばかり金のかかるたちの女であったから、私は金のないときには、その甘酒屋の縁台に腰をおろし、一杯の甘酒をゆるゆると啜（すす）り乍らその菊という女の子を私の恋の相手の代理として眺めて我慢していたものであった。ことしの早春に、私はこの甘酒屋で異様な男を見た。その日は土曜日で、朝からよく晴れていた。私はフランス叙情詩の講義を聞きおえて、真昼頃、梅は咲いたか桜はまだかいな。たったいま教ったばかりのフランスの叙情詩とは打って変ったかかる無学な文句に、勝手なふしをつけて繰りかえし繰りかえし口ずさみながら、れいの甘酒屋を訪れたのである。そのときすでに、ひとりの先客があった。私は、おどろいた。先客の恰好が、どうもなんだか奇態に見えたからである。ずいぶん痩（や）せ細っているようであったけれども身丈（みたけ）は尋常であったし、着ている背広服も黒サアジのふつうのものであったが、そのうえに羽織っている外套（がいとう）がだいいち怪しかった。なんという型のものであるか私には判らぬけれども、ひとめ見た印象で言えば、シルレルの外套である。天鵞絨（ビロード）と紐釦（ボタン）がむやみに多く、色は見事な銀鼠（ぎんねず）であって、話にならんほどにだぶだぶしていた。そのつぎには顔である。これをもひとめ見た印象で言わせてもらえば、シューベルトに化け損ねた狐である。不思議なくらいに顕著なおでこと、鉄縁の小さな眼鏡とたいへんなちぢれ毛と、尖（とが）った顎（あご）と、無精鬚（ぶしょうひげ）。皮膚は、大仰な言いかたをすれば、鶯（うぐいす）の羽のような汚い青さで、まったく光沢がなかった。その男が赤毛氈の縁台のまんなかにあぐらをかいて坐ったまま大きい碾茶（ひきちゃ）の茶碗でたいぎそうに甘酒をすすりながら、ああ、片手あげて私へおいでおいでをしたでないか。ながく躊躇（ちゅうちょ）をすればするほどこれはいよいよ薄気味わるいことになりそうだな、とそう直覚したので、私は自分にもなんのことやら意味の分らぬ微笑を無理して浮べながら、その男の坐っている縁台の端に腰をおろした。", "「けさ、とても固いするめを食ったものだから」わざと押し潰（つぶ）しているような低いかすれた声であった。「右の奥歯がいたくてなりません。歯痛ほど閉口なものはないね。アスピリンをどっさり呑めば、けろっとなおるのだが。おや、あなたを呼んだのは僕だったのですか？　しつれい。僕にはねえ」私の顔をちらと見てから、口角に少し笑いを含めて、「ひとの見さかいができねえんだ。めくら。――そうじゃない。僕は平凡なのだ。見せかけだけさ。僕のわるい癖でしてね。はじめに逢ったひとには、ちょっとこう、いっぷう変っているように見せたくてたまらないのだ。自縄自縛という言葉がある。ひどく古くさい。いかん。病気ですね。君は、文科ですか？　ことし卒業ですね？」", "私は答えた。「いいえ。もう一年です。あの、いちど落第したものですから」", "「はあ、芸術家ですな」にこりともせず、おちついて甘酒をひと口すすった。「僕はそこの音楽学校にかれこれ八年います。なかなか卒業できない。まだいちども試験というものに出席しないからだ。ひとがひとの能力を試みるなんてことは、君、容易ならぬ無礼だからね」", "「そうです」", "「と言ってみただけのことさ。つまりは頭がわるいのだよ。僕はよくここにこうして坐りこみながら眼のまえをぞろぞろと歩いて通る人の流れを眺めているのだが、はじめのうちは堪忍できなかった。こんなにたくさんひとが居るのに、誰も僕を知っていない、僕に留意しない、そう思うと、――いや、そうさかんに合槌（あいづち）うたなくたってよい。はじめから君の気持ちで言っているのだ。けれどもいまの僕なら、そんなことぐらい平気だ。かえって快感だ。枕のしたを清水がさらさら流れているようで。あきらめじゃない。王侯のよろこびだよ」ぐっと甘酒を呑みほしてから、だしぬけに碾茶の茶碗を私の方へのべてよこした。「この茶碗に書いてある文字、――白馬（ハクバ）驕（オゴリテ）不行（ユカズ）。よせばいいのに。てれくさくてかなわん。君にゆずろう。僕が浅草の骨董屋（こっとうや）から高い金を出して買って来て、この店にあずけてあるのだ。とくべつに僕用の茶碗としてね。僕は君の顔が好きなんだ。瞳（ひとみ）のいろが深い。あこがれている眼だ。僕が死んだなら、君がこの茶碗を使うのだ。僕はあしたあたり死ぬかも知れないからね」", "それからというもの、私たちはその甘酒屋で実にしばしば落ち合った。馬場はなかなかに死ななかったのである。死なないばかりか、少し太った。蒼黒（あおぐろ）い両頬が桃の実のようにむっつりふくれた。彼はそれを酒ぶとりであると言って、こうからだが太って来ると、いよいよ危いのだ、と小声で附け加えた。私は日ましに彼と仲良くなった。なぜ私は、こんな男から逃げ出さずに、かえって親密になっていったのか。馬場の天才を信じたからであろうか。昨年の晩秋、ヨオゼフ・シゲティというブダペスト生れのヴァイオリンの名手が日本へやって来て、日比谷の公会堂で三度ほど演奏会をひらいたが、三度が三度ともたいへんな不人気であった。孤高｜狷介（けんかい）のこの四十歳の天才は、憤ってしまって、東京朝日新聞へ一文を寄せ、日本人の耳は驢馬（ろば）の耳だ、なんて悪罵（あくば）したものであるが、日本の聴衆へのそんな罵言の後には、かならず、「ただしひとりの青年を除いて」という一句が詩のルフランのように括弧でくくられて書かれていた。いったい、ひとりの青年とは誰のことなんだとそのじぶん楽壇でひそひそ論議されたものだそうであるが、それは、馬場であった。馬場はヨオゼフ・シゲティと逢って話を交した。日比谷公会堂での三度目の辱かしめられた演奏会がおわった夜、馬場は銀座のある名高いビヤホオルの奥隅の鉢の木の蔭（かげ）に、シゲティの赤い大きな禿頭（はげあたま）を見つけた。馬場は躊躇せず、その報いられなかった世界的な名手がことさらに平気を装うて薄笑いしながらビイルを舐（な）めているテエブルのすぐ隣りのテエブルに、つかつか歩み寄っていって坐った。その夜、馬場とシゲティとは共鳴をはじめて、銀座一丁目から八丁目までのめぼしいカフエを一軒一軒、たんねんに呑んでまわった。勘定はヨオゼフ・シゲティが払った。シゲティは、酒を呑んでも行儀がよかった。黒の蝶ネクタイを固くきちんと結んだままで、女給たちにはついに一指も触れなかった。理智で切りきざんだ工合いの芸でなければ面白くないのです。文学のほうではアンドレ・ジッドとトオマス・マンが好きです、と言ってから淋しそうに右手の親指の爪を噛（か）んだ。ジッドをチットと発音していた。夜のまったく明けはなれたころ、二人は、帝国ホテルの前庭の蓮（はす）の池のほとりでお互いに顔をそむけながら力の抜けた握手を交してそそくさと別れ、その日のうちにシゲティは横浜からエムプレス・オブ・カナダ号に乗船してアメリカへむけて旅立ち、その翌（あく）る日、東京朝日新聞にれいのルフラン附きの文章が掲載されたというわけであった。けれども私は、彼もさすがにてれくさそうにして眼を激しくしばたたかせながら、そうして、おしまいにはほとんど不機嫌になってしまって語って聞かせたこんなふうの手柄話を、あんまり信じる気になれないのである。彼が異国人と夜のまったく明けはなれるまで談じ合うほど語学ができるかどうか、そういうことからして怪しいもんだと私は思っている。疑いだすと果しがないけれども、いったい、彼にはどのような音楽理論があるのか、ヴァイオリニストとしてどれくらいの腕前があるのか、作曲家としてはどんなものか、そんなことさえ私には一切わかって居らぬのだ。馬場はときたま、てかてか黒く光るヴァイオリンケエスを左腕にかかえて持って歩いていることがあるけれども、ケエスの中にはつねに一物もはいっていないのである。彼の言葉に依れば、彼のケエスそれ自体が現代のサンボルだ、中はうそ寒くからっぽであるというんだが、そんなときには私は、この男はいったいヴァイオリンを一度でも手にしたことがあるのだろうかという変な疑いをさえ抱くのである。そんな案配であるから、彼の天才を信じるも信じないも、彼の技倆（ぎりょう）を計るよすがさえない有様で、私が彼にひきつけられたわけは、他にあるのにちがいない。私もまたヴァイオリンよりヴァイオリンケエスを気にする組ゆえ、馬場の精神や技倆より、彼の風姿や冗談に魅せられたのだというような気もする。彼は実にしばしば服装をかえて、私のまえに現われる。さまざまの背広服のほかに、学生服を着たり、菜葉服を着たり、あるときには角帯に白足袋という恰好で私を狼狽（ろうばい）させ赤面させた。彼の平然と呟くところに依れば、彼がこのようにしばしば服装をかえるわけは、自分についてどんな印象をもひとに与えたくない心からなんだそうである。言い忘れていたが、馬場の生家は東京市外の三鷹村｜下連雀（しもれんじゃく）にあり、彼はそこから市内へ毎日かかさず出て来て遊んでいるのであって、親爺は地主か何かでかなりの金持ちらしく、そんな金持ちであるからこそ様様に服装をかえたりなんかしてみることもできるわけで、これも謂わば地主の悴（せがれ）の贅沢（ぜいたく）の一種類にすぎないのだし、――そう考えてみれば、べつだん私は彼の風采（ふうさい）のゆえにひきつけられているのでもないようだぞ。金銭のせいであろうか。頗（すこぶ）る言いにくい話であるが、彼とふたりで遊び歩いていると勘定はすべて彼が払う。私を押しのけてまで支払うのである。友情と金銭とのあいだには、このうえなく微妙な相互作用がたえずはたらいているものらしく、彼の豊潤の状態が私にとっていくぶん魅力になっていたことも争われない。これは、ひょっとしたら、馬場と私との交際は、はじめっから旦那と家来の関係にすぎず、徹頭徹尾、私がへえへえ牛耳られていたという話に終るだけのことのような気もする。", "ああ、どうやらこれは語るに落ちたようだ。つまりそのころの私は、さきにも鳥渡（ちょっと）言って置いたように金魚の糞（ふん）のような無意志の生活をしていたのであって、金魚が泳げば私もふらふらついて行くというような、そんなはかない状態で馬場とのつき合いをもつづけていたにちがいないのである。ところが、八十八夜。――妙なことには、馬場はなかなか暦に敏感らしく、きょうは、かのえさる、仏滅だと言ってしょげかえっているかと思うと、きょうは端午だ、やみまつり、などと私にはよく意味のわからぬようなことまでぶつぶつ呟いていたりする有様で、その日も、私が上野公園のれいの甘酒屋で、はらみ猫、葉桜、花吹雪、毛虫、そんな風物のかもし出す晩春のぬくぬくした爛熟の雰囲気をからだじゅうに感じながら、ひとりしてビイルを呑んでいたのであるが、ふと気がついてみたら、馬場がみどりいろの派手な背広服を着ていつの間にか私のうしろのほうに坐っていたのである。れいの低い声で、「きょうは八十八夜」そうひとこと呟いたかと思うともう、てれくさくてかなわんとでもいうようにむっくり立ちあがって両肩をぶるっと大きくゆすった。八十八夜を記念しようという、なんの意味もない決心を笑いながら固めて、二人、浅草へ呑みに出かけることになったのであるが、その夜、私はいっそく飛びに馬場へ離れがたない親狎（しんこう）の念を抱くにいたった。浅草の酒の店を五六軒。馬場はドクタア・プラアゲと日本の楽壇との喧嘩（けんか）を噛んで吐きだすようにしながらながながと語り、プラアゲは偉い男さ、なぜって、とまた独りごとのようにしてその理由を呟いているうちに、私は私の女と逢いたくて、居ても立ってもいられなくなった。私は馬場を誘った。幻燈を見に行こうと囁（ささや）いたのだ。馬場は幻燈を知らなかった。よし、よし。きょうだけは僕が先輩です。八十八夜だから連れていってあげましょう。私はそんなてれかくしの冗談を言いながら、プラアゲ、プラアゲ、となおも低く呟きつづけている馬場を無理、矢理、自動車に押しこんだ。急げ！　ああ、いつもながらこの大川を越す瞬間のときめき。幻燈のまち。そのまちには、よく似た路地が蜘蛛（くも）の巣のように四通八達していて、路地の両側の家々の、一尺に二尺くらいの小窓小窓でわかい女の顔が花やかに笑っているのであって、このまちへ一歩踏みこむと肩の重みがすっと抜け、ひとはおのれの一切の姿勢を忘却し、逃げ了（おお）せた罪人のように美しく落ちつきはらって一夜をすごす。馬場にはこのまちが始めてのようであったが、べつだん驚きもせずゆったりした歩調で私と少しはなれて歩きながら、両側の小窓小窓の女の顔をひとつひとつ熟察していた。路地へはいり路地を抜け路地を曲り路地へ行きついてから私は立ちどまり馬場の横腹をそっと小突いて、僕はこの女のひとを好きなのです。ええ、よっぽどまえからと囁いた。私の恋の相手はまばたきもせず小さい下唇だけをきゅっと左へうごかして見せた。馬場も立ちどまり、両腕をだらりとさげたまま首を前へ突きだして、私の女をつくづくと凝視しはじめたのである。やがて、振りかえりざま、叫ぶようにして言った。", "「やあ、似ている。似ている」", "はっとはじめて気づいた。", "「いいえ、菊ちゃんにはかないません」私は固くなって、へんな応えかたをした。ひどくりきんでいたのである。馬場はかるく狼狽（ろうばい）の様子で、", "「くらべたりするもんじゃないよ」と言って笑ったが、すぐにけわしく眉をひそめ、「いや、ものごとはなんでも比較してはいけないんだ。比較根性の愚劣」と自分へ説き聞かせるようにゆっくり呟きながら、ぶらぶら歩きだした。あくる朝、私たちはかえりの自動車のなかで、黙っていた。一口でも、ものを言えば殴り合いになりそうな気まずさ。自動車が浅草の雑沓（ざっとう）のなかにまぎれこみ、私たちもただの人の気楽さをようやく感じて来たころ、馬場はまじめに呟いた。", "「ゆうべ女のひとがねえ、僕にこういって教えたものだ。あたしたちだって、はたから見るほど楽じゃないんだよ」", "私は、つとめて大袈裟（おおげさ）に噴きだして見せた。馬場はいつになくはればれと微笑（ほほえ）み、私の肩をぽんと叩いて、", "「日本で一番よいまちだ。みんな胸を張って生きているよ。恥じていない。おどろいたなあ。一日一日をいっぱいに生きている」", "それ以後、私は馬場へ肉親のように馴れて甘えて、生れてはじめて友だちを得たような気さえしていた。友を得たと思ったとたんに私は恋の相手をうしなった。それが、口に出して言われないような、われながらみっともない形で女のひとに逃げられたものであるから、私は少し評判になり、とうとう、佐野次郎というくだらない名前までつけられた。いまだからこそ、こんなふうになんでもない口調で語れるのであるが、当時は、笑い話どころではなく、私は死のうと思っていた。幻燈のまちの病気もなおらず、いつ不具者になるかわからぬ状態であったし、ひとはなぜ生きていなければいけないのか、そのわけが私には呑みこめなかった。ほどなく暑中休暇にはいり、東京から二百里はなれた本州の北端の山の中にある私の生家にかえって、一日一日、庭の栗の木のしたで籐（とう）椅子にねそべり、煙草を七十本ずつ吸ってぼんやりくらしていた。馬場が手紙を寄こした。", "拝啓。", "死ぬことだけは、待って呉れないか。僕のために。君が自殺をしたなら、僕は、ああ僕へのいやがらせだな、とひそかに自惚（うぬぼ）れる。それでよかったら、死にたまえ。僕もまた、かつては、いや、いまもなお、生きることに不熱心である。けれども僕は自殺をしない。誰かに自惚れられるのが、いやなんだ。病気と災難とを待っている。けれどもいまのところ、僕の病気は歯痛と痔（じ）である。死にそうもない。災難もなかなか来ない。僕の部屋の窓を夜どおし明けはなして盗賊の来襲を待ち、ひとつ彼に殺させてやろうと思っているのであるが、窓からこっそり忍びこむ者は、蛾（が）と羽蟻（はあり）とかぶとむし、それから百万の蚊軍。（君｜曰（いわ）く、ああ僕とそっくりだ！）君、一緒に本を出さないか。僕は、本でも出して借金を全部かえしてしまって、それから三日三晩くらいぶっつづけにこんこんと眠りたいのだ。借金とは宙ぶらりんな僕の肉体だ。僕の胸には借金の穴が黒くぽかんとあいている。本を出したおかげでこの満たされぬ空洞がいよいよ深くなるかも知れないが、そのときにはまたそれでよし。とにかく僕は、僕自身にうまくひっこみをつけたいのだ。本の名は、海賊。具体的なことがらについては、君と相談のうえできめるつもりであるが、僕のプランとしては、輸出むきの雑誌にしたい。相手はフランスがよかろう。君はたしかにずば抜けて語学ができる様子だから、僕たちの書いた原稿をフランス語に直しておくれ。アンドレ・ジッドに一冊送って批評をもらおう。ああ、ヴァレリイと直接に論争できるぞ。あの眠たそうなプルウストをひとつうろたえさせてやろうじゃないか。（君曰く、残念、プルウストはもう死にました。）コクトオはまだ生きているよ。君、ラディゲが生きていたらねえ。デコブラ先生にも送ってやってよろこばせてやるか、可哀そうに。", "こんな空想はたのしくないか。しかも実現はさほど困難でない。（書きしだい、文字が乾く。手紙文という特異な文体。叙述でもなし、会話でもなし、描写でもなし、どうも不思議な、それでいてちゃんと独立している無気味な文体。いや、ばかなことを言った。）ゆうべ徹夜で計算したところに依ると、三百円で、素晴らしい本が出来る。それくらいなら、僕ひとりでも、どうにかできそうである。君は詩を書いてポオル・フォオルに読ませたらよい。僕はいま海賊の歌という四楽章からなる交響曲を考えている。できあがったら、この雑誌に発表し、どうにかしてラヴェルを狼狽させてやろうと思っている。くりかえして言うが、実現は困難でない。金さえあれば、できる。実現不可能の理由としては、何があるか。君もはなやかな空想でせいぜい胸をふくらませて置いたほうがよい。どうだ。（手紙というものは、なぜおしまいに健康を祈らなければいけないのか。頭はわるし、文章はまずく、話術が下手くそでも、手紙だけは巧い男という怪談がこの世の中にある。）ところで僕は、手紙上手であるか。それとも手紙下手であるか。さよなら。", "これは別なことだが、いまちょっと胸に浮んだから書いておく。古い質問、「知ることは幸福であるか」", "佐野次郎左衛門様　　　馬場数馬。", "二　海賊", "ナポリを見てから死ね！", "Pirate という言葉は、著作物の剽窃（ひょうせつ）者を指していうときにも使用されるようだが、それでもかまわないか、と私が言ったら、馬場は即座に、いよいよ面白いと答えた。Le Pirate, ――雑誌の名はまずきまった。マラルメやヴェルレエヌの関係していた La Basoche, ヴェルハアレン一派の La Jeune Belgique, そのほか La Semaine, Le Type. いずれも異国の芸苑（げいえん）に咲いた真紅の薔薇（ばら）。むかしの若き芸術家たちが世界に呼びかけた機関雑誌。ああ、われらもまた。暑中休暇がすんであたふたと上京したら、馬場の海賊熱はいよいよあがっていて、やがて私にもそのまま感染し、ふたり寄ると触ると Le Pirate についての、はなやかな空想を、いやいや、具体的なプランについて語り合ったのである。春と夏と秋と冬と一年に四回ずつ発行のこと。菊倍判六十頁。全部アート紙。クラブ員は海賊のユニフォオムを一着すること。胸には必ず季節の花を。クラブ員相互の合言葉。――一切誓うな。幸福とは？　審判する勿（なか）れ。ナポリを見てから死ね！　等々。仲間はかならず二十代の美青年たるべきこと。一芸に於いて秀抜の技倆を有すること。The Yellow Book の故智にならい、ビアズレイに匹敵する天才画家を見つけ、これにどんどん挿画をかかせる。国際文化振興会なぞをたよらずに異国へわれらの芸術をわれらの手で知らせてやろう。資金として馬場が二百円、私が百円、そのうえほかの仲間たちから二百円ほど出させる予定である。仲間、――馬場が彼の親類筋にあたる佐竹六郎という東京美術学校の生徒をまず私に紹介して呉れる段取りとなった。その日、私は馬場との約束どおり、午後の四時頃、上野公園の菊ちゃんの甘酒屋を訪れたのであるが、馬場は紺飛白（こんがすり）の単衣（ひとえ）に小倉の袴（はかま）という維新風俗で赤毛氈の縁台に腰かけて私を待っていた。馬場の足もとに、真赤な麻の葉模様の帯をしめ白い花の簪（かんざし）をつけた菊ちゃんが、お給仕の塗盆を持って丸く蹲（うずくま）って馬場の顔をふり仰いだまま、みじろぎもせずじっとしていた。馬場の蒼黒い顔には弱い西日がぽっと明るくさしていて、夕靄（ゆうもや）がもやもや烟（けむ）ってふたりのからだのまわりを包み、なんだかおかしな、狐狸のにおいのする風景であった。私が近づいていって、やあ、と馬場に声をかけたら、菊ちゃんが、あ、と小さく叫んで飛びあがり、ふりむいて私に白い歯を見せて挨拶したが、みるみる豊かな頬をあかくした。私も少しどぎまぎして、わるかったかな？　と思わず口を滑らせたら、菊ちゃんは一瞬はっと表情をかえて妙にまじめな眼つきで私の顔を見つめたかと思うと、くるっと私に背をむけお盆で顔をかくすようにして店の奥へ駈けこんでいったものだ。なんのことはない、あやつり人形の所作でも見ているような心地がした。私はいぶかしく思いながらその後姿をそれとなく見送り縁台に腰をおろすと、馬場はにやにやうす笑いして言いだした。", "「信じ切る。そんな姿はやっぱり好いな。あいつがねえ」白馬驕不行の碾茶の茶碗は流石（さすが）にてれくさい故をもってか、とうのむかしに廃止されて、いまは普通のお客と同じに店の青磁の茶碗。番茶を一口すすって、「僕のこの不精髭を見て、幾日くらいたてばそんなに伸びるの？　と聞くから、二日くらいでこんなになってしまうのだよ。ほら、じっとして見ていなさい。鬚がそよそよと伸びるのが肉眼でも判るほどだから、と真顔で教えたら、だまってしゃがんで僕の顎を皿のようなおおきい眼でじっと見つめるじゃないか。おどろいたね。君、無智ゆえに信じるのか、それとも利発ゆえに信じるのか。ひとつ、信じるという題目で小説でも書こうかなあ。ＡがＢを信じている。そこへＣやＤやＥやＦやＧやＨやそのほかたくさんの人物がつぎつぎに出て来て、手を変え品を変え、さまざまにＢを中傷する。――それから、――ＡはやっぱりＢを信じている。疑わない。てんから疑わない。安心している。Ａは女、Ｂは男、つまらない小説だね。ははん」へんにはしゃいでいた。私は、彼の言葉をそのままに聞いているだけで彼の胸のうちをべつだん何も忖度（そんたく）してはいないのだというところをすぐにも見せなければいけないと思ったから、", "「その小説は面白そうですね。書いてみたら？」", "できるだけ余念なさそうな口調で言って、前方の西郷隆盛の銅像をぼんやり眺めた。馬場は助かったようであった。いつもの不機嫌そうな表情を、円滑に、取り戻すことができたのである。", "「ところが、――僕には小説が書けないのだ。君は怪談を好むたちだね？」", "「ええ、好きですよ。なによりも、怪談がいちばん僕の空想力を刺激するようです」", "「こんな怪談はどうだ」馬場は下唇をちろと舐めた。「知性の極というものは、たしかにある。身の毛もよだつ無間（むけん）奈落（ならく）だ。こいつをちらとでも覗（のぞ）いたら最後、ひとは一こともものを言えなくなる。筆を執っても原稿用紙の隅に自分の似顔画を落書したりなどするだけで、一字も書けない。それでいて、そのひとは世にも恐ろしい或るひとつの小説をこっそり企てる。企てた、とたんに、世界じゅうの小説がにわかに退屈でしらじらしくなって来るのだ。それはほんとうに、おそろしい小説だ。たとえば、帽子をあみだにかぶっても気になるし、まぶかにかぶっても落ちつかないし、ひと思いに脱いでみてもいよいよ変だという場合、ひとはどこで位置の定着を得るかというような自意識過剰の統一の問題などに対しても、この小説は碁盤のうえに置かれた碁石のような涼しい解決を与えている。涼しい解決？　そうじゃない。無風。カットグラス。白骨。そんな工合いの冴（さ）え冴（ざ）えした解決だ。いや、そうじゃない。どんな形容詞もない、ただの、『解決』だ。そんな小説はたしかにある。けれども人は、ひとたびこの小説を企てたその日から、みるみる痩せおとろえ、はては発狂するか自殺するか、もしくは唖者（おし）になってしまうのだ。君、ラディゲは自殺したんだってね。コクトオは気がちがいそうになって日がな一日オピアムばかりやってるそうだし、ヴァレリイは十年間、唖者になった。このたったひとつの小説をめぐって、日本なんかでも一時ずいぶん悲惨な犠牲者が出たものだ。現に、君、――」", "「おい、おい」という嗄れた呼び声が馬場の物語の邪魔をした。ぎょっとして振りむくと、馬場の右脇にコバルト色の学生服を着た背のきわめてひくい若い男がひっそり立っていた。", "「おそいぞ」馬場は怒っているような口調で言った。「おい、この帝大生が佐野次郎左衛門さ。こいつは佐竹六郎だ。れいの画かきさ」", "佐竹と私とは苦笑しながら軽く目礼を交した。佐竹の顔は肌理（きめ）も毛穴も全然ないてかてかに磨きあげられた乳白色の能面の感じであった。瞳の焦点がさだかでなく、硝子（ガラス）製の眼玉のようで、鼻は象牙（ぞうげ）細工のように冷く、鼻筋が剣のようにするどかった。眉は柳の葉のように細長く、うすい唇は苺（いちご）のように赤かった。そんなに絢爛（けんらん）たる面貌にくらべて、四肢の貧しさは、これまた驚くべきほどであった。身長五尺に満たないくらい、痩せた小さい両の掌は蜥蜴（とかげ）のそれを思い出させた。佐竹は立ったまま、老人のように生気のない声でぼそぼそ私に話しかけたのである。", "「あんたのことを馬場から聞きましたよ。ひどいめに遭ったものですねえ。なかなかやると思っていますよ」私はむっとして、佐竹のまぶしいほど白い顔をもいちど見直した。箱のように無表情であった。", "馬場は音たかく舌打ちして、「おい佐竹、からかうのはやめろ。ひとを平気でからかうのは、卑劣な心情の証拠だ。罵（ののし）るなら、ちゃんと罵るがいい」", "「からかってやしないよ」しずかにそう応えて、胸のポケットからむらさき色のハンケチをとり出し、頸（くび）のまわりの汗をのろのろ拭きはじめた。", "「あああ」馬場は溜息（ためいき）ついて縁台にごろんと寝ころがった。「おめえは会話の語尾に、ねえ、とか、よ、とかをつけなければものを言えないのか。その語尾の感嘆詞みたいなものだけは、よせ。皮膚にべとつくようでかなわんのだ」私もそれは同じ思いであった。", "佐竹はハンケチをていねいに畳んで胸のポケットにしまいこみながら、よそごとのようにして呟いた。「朝顔みたいなつらをしやがって、と来るんじゃないかね？」", "馬場はそっと起きあがり、すこし声をはげまして言った。「おめえとはここで口論したくねえんだ。どっちも或る第三者を計算にいれてものを言っているのだからな。そうだろう？」何か私の知らない仔細（しさい）があるらしかった。", "佐竹は陶器のような青白い歯を出して、にやっと笑った。「もう僕への用事はすんだのかね？」", "「そうだ」馬場はことさらに傍見（わきみ）をしながら、さもさもわざとらしい小さなあくびをした。", "「じゃあ、僕は失敬するよ」佐竹は小声でそう呟き、金側の腕時計を余程ながいこと見つめて何か思案しているふうであったが、「日比谷へ新響を聞きに行くんだ。近衛もこのごろは商売上手になったよ。僕の座席のとなりにいつも異人の令嬢が坐るのでねえ。このごろはそれがたのしみさ」言い終えたら、鼠のような身軽さでちょこちょこ走り去った。", "「ちえっ！　菊ちゃん、ビイルをおくれ。おめえの色男がかえっちゃった。佐野次郎、呑まないか。僕はつまらん奴を仲間にいれたなあ。あいつは、いそぎんちゃくだよ。あんな奴と喧嘩したら、倒立（さかだ）ちしたってこっちが負けだ。ちっとも手むかいせずに、こっちの殴った手へべっとりくっついて来る」急に真剣そうに声をひそめて、「あいつ、菊の手を平気で握りしめたんだよ。あんなたちの男が、ひとの女房を易々と手にいれたりなどするんだねえ。インポテンスじゃないかと思うんだけれど。なに、名ばかりの親戚（しんせき）で僕とは血のつながりなんか絶対にない。――僕は菊のまえであいつと議論したくねえんだ。はり合うなんて、いやなこった。――君、佐竹の自尊心の高さを考えると、僕はいつでもぞっとするよ」ビイルのコップを握ったまま、深い溜息をもらした。「けれども、あいつの画だけは正当に認めなければいけない」", "私はぼんやりしていた。だんだん薄暗くなって色々の灯でいろどられてゆく上野広小路の雑沓の様子を見おろしていたのである。そうして馬場のひとりごととは千里万里もかけはなれた、つまらぬ感傷にとりつかれていた。「東京だなあ」というたったそれだけの言葉の感傷に。", "ところが、それから五六日して、上野動物園で貘（ばく）の夫婦をあらたに購入したという話を新聞で読み、ふとその貘を見たくなって学校の授業がすんでから、動物園に出かけていったのであるが、そのとき、水禽（みずどり）の大鉄傘ちかくのベンチに腰かけてスケッチブックへ何やらかいている佐竹を見てしまったのである。しかたなく傍へ寄っていって、軽く肩をたたいた。", "「ああ」と軽くうめいて、ゆっくり私のほうへ頸をねじむけた。「あなたですか。びっくりしましたよ。ここへお坐りなさい。いま、この仕事を大急ぎで片づけてしまいますから、それまで鳥渡（ちょっと）、待っていて下さいね。お話したいことがあるのです」へんによそよそしい口調でそう言って鉛筆を取り直し、またスケッチにふけりはじめた。私はそのうしろに立ったままで暫（しばら）くもじもじしていたが、やがて決心をつけてベンチへ腰をおろし、佐竹のスケッチブックをそっと覗いてみた。佐竹はすぐに察知したらしく、", "「ペリカンをかいているのです」とひくく私に言って聞かせながら、ペリカンの様様の姿態をおそろしく乱暴な線でさっさと写しとっていた。「僕のスケッチをいちまい二十円くらいで、何枚でも買って呉れるというひとがあるのです」にやにやひとりで笑いだした。「僕は馬場みたいに出鱈目（でたらめ）を言うことはきらいですねえ。荒城の月の話はまだですか？」", "「荒城の月、ですか？」私にはわけがわからなかった。", "「じゃあ、まだですね」うしろむきのペリカンを紙面の隅に大きく写しながら、「馬場がむかし、滝｜廉太郎（れんたろう）という匿名で荒城の月という曲を作って、その一切の権利を山田耕筰に三千円で売りつけた」", "「それが、あの、有名な荒城の月ですか？」私の胸は躍った。", "「嘘ですよ」一陣の風がスケッチブックをぱらぱらめくって、裸婦や花のデッサンをちらちら見せた。「馬場の出鱈目は有名ですよ。また巧妙ですからねえ。誰でもはじめは、やられますよ。ヨオゼフ・シゲティは、まだですか？」", "「それは聞きました」私は悲しい気持ちであった。", "「ルフラン附きの文章か」つまらなそうにそう言って、スケッチブックをぱちんと閉じた。「どうもお待たせしました。すこし歩きましょうよ。お話したいことがあるのです」", "きょうは貘の夫婦をあきらめよう。そうして、私にとって貘よりもさらにさらに異様に思われるこの佐竹という男の話に、耳傾けよう。水禽の大鉄傘を過ぎて、おっとせいの水槽のまえを通り、小山のように巨大なひぐまの、檻（おり）のまえにさしかかったころ、佐竹は語りはじめた。まえにも何回となく言って言い馴れているような諳誦（あんしょう）口調であって、文章にすればいくらか熱のある言葉のようにもみえるが実際は、れいの嗄（しわが）れた陰気くさい低声でもってさらさら言い流しているだけのことなのである。", "「馬場は全然だめです。音楽を知らない音楽家があるでしょうか。僕はあいつが音楽について論じているのをついぞ聞いたことがない。ヴァイオリンを手にしたのを見たことがない。作曲する？　おたまじゃくしさえ読めるかどうか。馬場の家では、あいつに泣かされているのですよ。いったい音楽学校にはいっているのかどうか、それさえはっきりしていないのです。むかしはねえ、あれで小説家になろうと思って勉強したこともあるんですよ。それがあんまり本を読みすぎた結果、なんにも書けなくなったのだそうです。ばかばかしい。このごろはまた、自意識過剰とかいう言葉のひとつ覚えで、恥かしげもなくほうぼうへそれを言いふらして歩いているようです。僕はむずかしい言葉じゃ言えないけれども、自意識過剰というのは、たとえば、道の両側に何百人かの女学生が長い列をつくってならんでいて、そこへ自分が偶然にさしかかり、そのあいだをひとりで、のこのこ通って行くときの一挙手一投足、ことごとくぎこちなく視線のやりば首の位置すべてに困（こう）じ果てきりきり舞いをはじめるような、そんな工合いの気持ちのことだと思うのですが、もしそれだったら、自意識過剰というものは、実にもう、七転八倒の苦しみであって、馬場みたいにあんな出鱈目な饒舌（じょうぜつ）を弄（ろう）することは勿論できない筈だし、――だいいち雑誌を出すなんて浮いた気持ちになれるのがおかしいじゃないですか！　海賊。なにが海賊だ。好い気なもんだ。あなた、あんまり馬場を信じ過ぎると、あとでたいへんなことになりますよ。それは僕がはっきり予言して置いていい。僕の予言は当りますよ」", "「でも」", "「でも？」", "「僕は馬場さんを信じています」", "「はあ、そうですか」私の精一ぱいの言葉を、なんの表情もなく聞き流して、「今度の雑誌のことだって、僕は徹頭徹尾、信じていません。僕に五十円出せと言うのですけれども、ばからしい。ただわやわや騒いでいたいのですよ。一点の誠実もありません。あなたはまだごぞんじないかも知れないが明後日、馬場と僕と、それから馬場が音楽学校の或る先輩に紹介されて識（し）った太宰治とかいうわかい作家と、三人であなたの下宿をたずねることになっているのですよ。そこで雑誌の最後的プランをきめてしまうのだとか言っていましたが、――どうでしょう。僕たちはその場合、できるだけつまらなそうな顔をしてやろうじゃありませんか。そうして相談に水をさしてやろうじゃありませんか。どんな素晴らしい雑誌を出してみたところで、世の中は僕たちにうまく恰好をつけては呉れません。どこまでやっていっても中途半端でほうり出されます。僕はビアズレイでなくても一向かまわんですよ。懸命に画をかいて、高い価で売って、遊ぶ。それで結構なんです」", "言い終えたところは山猫の檻のまえであった。山猫は青い眼を光らせ、脊（せ）を丸くして私たちをじっと見つめていた。佐竹はしずかに腕を伸ばして吸いかけの煙草の火を山猫の鼻にぴたっとおしつけた。そうして佐竹の姿は巖のように自然であった。", "三　登竜門", "ここを過ぎて、一つ二銭の栄螺（さざえ）かな。", "「なんだか、――とんでもない雑誌だそうですね」", "「いいえ。ふつうのパンフレットです」", "「すぐそんなことを言うからな。君のことは実にしばしば話に聞いて、よく知っています。ジッドとヴァレリイとをやりこめる雑誌なんだそうですね」", "「あなたは、笑いに来たのですか」", "私がちょっと階下へ行っているまに、もう馬場と太宰が言い合いをはじめた様子で、お茶道具をしたから持って来て部屋へはいったら、馬場は部屋の隅の机に頬杖（ほおづえ）ついて居汚く坐り、また太宰という男は馬場と対角線をなして向きあったもう一方の隅の壁に背をもたせ細長い両の毛臑（けずね）を前へ投げだして坐り、ふたりながら眠たそうに半分閉じた眼と大儀そうなのろのろした口調でもって、けれども腹綿は恚忿（いふん）と殺意のために煮えくりかえっているらしく眼がしらや言葉のはしはしが児蛇の舌のようにちろちろ燃えあがっているのが私にさえたやすくそれと察知できるくらいに、なかなか険しくわたり合っていたのである。佐竹は太宰のすぐ傍にながながと寝そべり、いかにも、つまらなそうに眼玉をきょろきょろうごかしながら煙草をふかしていた。はじめからいけなかった。その朝、私がまだ寝ているうちに馬場が私の下宿の部屋を襲った。きょうは学生服をきちんと着て、そのうえに、ぶくぶくした黄色いレンコオトを羽織っていた。雨にびっしょり濡れたそのレンコオトを脱ぎもせずに部屋をぐるぐるいそがしげに廻って歩いた。歩きながら、ひとりごとのようにして呟（つぶや）くのである。", "「君、君。起きたまえ。僕はひどい神経衰弱らしいぞ。こんなに雨が降っては、僕はきっと狂ってしまう。海賊の空想だけでも痩せてしまう。君、起きたまえ。ついせんだって僕は太宰治という男に逢ったよ。僕の学校の先輩から小説の素晴らしく巧い男だといって紹介されたのだが、――何も宿命だ。仲間にいれてやることにした。君、太宰ってのは、おそろしくいやな奴だぞ。そうだ。まさしく、いや、な奴だ。嫌悪の情だ。僕はあんなふうの男とは肉体的に相容れないものがあるようだ。頭は丸坊主。しかも君、意味深げな丸坊主だ。悪い趣味だよ。そうだ、そうだ。あいつはからだのぐるりを趣味でかざっているのだ。小説家ってのは、皆あんな工合いのものかねえ。思索や学究や情熱なぞをどこに置き忘れて来たのか。まるっきりの、根っからの戯作者（げさくしゃ）だ。蒼黒（あおぐろ）くでらでらした大きい油顔で、鼻が、――君レニエの小説で僕はあんな鼻を読んだことがあるぞ。危険きわまる鼻。危機一髪、団子鼻に墮そうとするのを鼻のわきの深い皺（しわ）がそれを助けた。まったくねえ。レニエはうまいことを言う。眉毛は太く短くまっ黒で、おどおどした両の小さい眼を被いかくすほどもじゃもじゃ繁茂していやがる。額はあくまでもせまく皺が横に二筋はっきりきざまれていて、もう、なっちゃいない。首がふとく、襟脚はいやに鈍重な感じで、顎（あご）の下に赤い吹出物の跡を三つも僕は見つけた。僕の目算では、身丈は五尺七寸、体重は十五貫、足袋は十一文、年齢は断じて三十まえだ。おう、だいじなことを言い忘れた。ひどい猫脊（ねこせ）で、とんとせむし、――君、ちょっと眼をつぶってそんなふうの男を想像してごらん。ところが、これは嘘なんだ。まるっきり嘘なんだ。おおやま師。装っているのだ。それにちがいないんだ。なにからなにまで見せかけなのだ。僕の睨（にら）んだ眼に狂いはない。ところどころに生え伸びたまだらな無精鬚（ぶしょうひげ）。いや、あいつに無精なんてあり得ない。どんな場合でもあり得ない。わざとつとめて生やした鬚だ。ああ、僕はいったい誰のことを言っているのだ！　ごらん下さい、私はいまこうしています、ああしていますと、いちいち説明をつけなければ指一本うごかせず咳ばらい一つできない。いやなこった！　あいつの素顔は、眼も口も眉毛もないのっぺらぼうさ。眉毛を描いて眼鼻をくっつけ、そうして知らんふりをしていやがる。しかも君、それをあいつは芸にしている。ちぇっ！　僕はあいつを最初｜瞥見（べっけん）したとき、こんにゃくの舌で顔をぺろっと舐（な）められたような気がしたよ。思えば、たいへんな仲間ばかり集って来たものさ。佐竹、太宰、佐野次郎、馬場、ははん、この四人が、ただ黙って立ち並んだだけでも歴史的だ。そうだ！　僕はやるぞ。なにも宿命だ。いやな仲間もまた一興じゃないか。僕はいのちをことし一年限りとして Le Pirate に僕の全部の運命を賭（か）ける。乞食になるか、バイロンになるか。神われに五ペンスを与う。佐竹の陰謀なんて糞（くそ）くらえだ！」ふいと声を落して、「君、起きろよ。雨戸をあけてやろう。もうすぐみんなここへ来るよ。きょうこの部屋で海賊の打ち合せをしようと思ってね」", "私は馬場の興奮に釣られてうろうろしはじめ、蒲団を蹴（け）って起きあがり、馬場とふたりで腐りかけた雨戸をがたぴしこじあけた。本郷のまちの屋根屋根は雨でけむっていた。", "ひるごろ、佐竹が来た。レンコオトも帽子もなく、天鵞絨（ビロード）のズボンに水色の毛糸のジャケツを着けたきりで、顔は雨に濡れて、月のように青く光った不思議な頬の色であった。夜光虫は私たちに一言の挨拶もせず、溶けて崩れるようにへたへたと部屋の隅に寝そべった。", "「かんにんして呉れよ。僕は疲れているんだ」", "すぐつづいて太宰が障子をあけてのっそりあらわれた。ひとめ見て、私はあわてふためいて眼をそらした。これはいけないと思った。彼の風貌は、馬場の形容を基にして私が描いて置いた好悪ふたつの影像のうち、わるいほうの影像と一分一厘の間隙（かんげき）もなくぴったり重なり合った。そうして尚さらいけないことには、そのときの太宰の服装がそっくり、馬場のかねがね最もいみきらっているたちのものだったではないか。派手な大島｜絣（がすり）の袷（あわせ）に総絞りの兵古帯（へこおび）、荒い格子縞のハンチング、浅黄の羽二重の長襦袢（ながじゅばん）の裾がちらちらこぼれて見えて、その裾をちょっとつまみあげて坐ったものであるが、窓のそとの景色を、形だけ眺めたふりをして、", "「ちまたに雨が降る」と女のような細い甲高い声で言って、私たちのほうを振りむき赤濁りに濁った眼を糸のように細くし顔じゅうをくしゃくしゃにして笑ってみせた。私は部屋から飛び出してお茶を取りに階下へ降りた。お茶道具と鉄瓶とを持って部屋へかえって来たら、もうすでに馬場と太宰が争っていたのである。", "太宰は坊主頭のうしろへ両手を組んで、「言葉はどうでもよいのです。いったいやる気なのかね？」", "「何をです」", "「雑誌をさ。やるなら一緒にやってもいい」", "「あなたは一体、何しにここへ来たのだろう」", "「さあ、――風に吹かれて」", "「言って置くけれども、御託宣と、警句と、冗談と、それから、そのにやにや笑いだけはよしにしましょう」", "「それじゃ、君に聞くが、君はなんだって僕を呼んだのだ」", "「おめえはいつでも呼べば必ず来るのかね？」", "「まあ、そうだ。そうしなければいけないと自分に言い聞かせてあるのです」", "「人間のなりわいの義務。それが第一。そうですね？」", "「ご勝手に」", "「おや、あなたは妙な言葉を体得していますね。ふてくされ。ああ、ごめんだ。あなたと仲間になるなんて！　とこう言い切るとあなたのほうじゃ、すぐもうこっちをポンチにしているのだからな。かなわんよ」", "「それは、君だって僕だってはじめからポンチなのだ。ポンチにするのでもなければ、ポンチになるのでもない」", "「私は在る。おおきいふぐりをぶらさげて、さあ、この一物をどうして呉れる。そんな感じだ。困りましたね」", "「言いすぎかも知れないけれど、君の言葉はひどくしどろもどろの感じです。どうかしたのですか？　――なんだか、君たちは芸術家の伝記だけを知っていて、芸術家の仕事をまるっきり知っていないような気がします」", "「それは非難ですか？　それともあなたの研究発表ですか？　答案だろうか。僕に採点しろというのですか？」", "「――中傷さ」", "「それじゃ言うが、そのしどろもどろは僕の特質だ。たぐい稀な特質だ」", "「しどろもどろの看板」", "「懐疑説の破綻（はたん）と来るね。ああ、よして呉れ。僕は掛合い万歳は好きでない」", "「君は自分の手塩にかけた作品を市場にさらしたあとの突き刺されるような悲しみを知らないようだ。お稲荷さまを拝んでしまったあとの空虚を知らない。君たちは、たったいま、一（いち）の鳥居をくぐっただけだ」", "「ちぇっ！　また御託宣か。――僕はあなたの小説を読んだことはないが、リリシズムと、ウイットと、ユウモアと、エピグラムと、ポオズと、そんなものを除き去ったら、跡になんにも残らぬような駄洒落（だじゃれ）小説をお書きになっているような気がするのです。僕はあなたに精神を感ぜずに世間を感ずる。芸術家の気品を感ぜずに、人間の胃腑（いふ）を感ずる」", "「わかっています。けれども、僕は生きて行かなくちゃいけないのです。たのみます、といって頭をさげる、それが芸術家の作品のような気さえしているのだ。僕はいま世渡りということについて考えている。僕は趣味で小説を書いているのではない。結構な身分でいて、道楽で書くくらいなら、僕ははじめから何も書きはせん。とりかかれば、一通りはうまくできるのが判っている。けれども、とりかかるまえに、これは何故に今さららしくとりかかる値打ちがあるのか、それを四方八方から眺めて、まあ、まあ、ことごとしくとりかかるにも及ぶまいということに落ちついて、結局、何もしない」", "「それほどの心情をお持ちになりながら、なんだって、僕たちと一緒に雑誌をやろうなどと言うのだろう」", "「こんどは僕を研究する気ですか？　僕は怒りたくなったからです。なんでもいい、叫びが欲しくなったのだ」", "「あ、それは判る。つまり楯を持って恰好をつけたいのですね。けれども、――いや、そむいてみることさえできない」", "「君を好きだ。僕なんかも、まだ自分の楯を持っていない。みんな他人の借り物だ。どんなにぼろぼろでも自分専用の楯があったら」", "「あります」私は思わず口をはさんだ。「イミテエション！」", "「そうだ。佐野次郎にしちゃ大出来だ。一世一代だぞ、これあ。太宰さん。附け鬚模様の銀｜鍍金（めっき）の楯があなたによく似合うそうですよ。いや、太宰さんは、もう平気でその楯を持って構えていなさる。僕たちだけがまるはだかだ」", "「へんなことを言うようですけれども、君はまるはだかの野苺と着飾った市場の苺とどちらに誇りを感じます。登竜門というものは、ひとを市場へ一直線に送りこむ外面（げめん）如菩薩（にょぼさつ）の地獄の門だ。けれども僕は着飾った苺の悲しみを知っている。そうしてこのごろ、それを尊く思いはじめた。僕は逃げない。連れて行くところまでは行ってみる」口を曲げて苦しそうに笑った。「そのうちに君、眼がさめて見ると、――」", "「おっとそれあ言うな」馬場は右手を鼻の先で力なく振って、太宰の言葉をさえぎった。「眼がさめたら、僕たちは生きて居れない。おい、佐野次郎。よそうよ。面白くねえや。君にはわるいけれども、僕は、やめる。僕はひとの食いものになりたくないのだ。太宰に食わせる油揚げはよそを捜して見つけたらいい。太宰さん。海賊クラブは一日きりで解散だ。そのかわり、――」立ちあがって、つかつか太宰のほうへ歩み寄り、「ばけもの！」", "太宰は右の頬を殴られた。平手で音高く殴られた。太宰は瞬間まったくの小児のような泣きべそを掻（か）いたが、すぐ、どす黒い唇を引きしめて、傲然（ごうぜん）と頭をもたげた。私はふっと、太宰の顔を好きに思った。佐竹は眼をかるくつぶって眠ったふりをしていた。", "雨は晩になってもやまなかった。私は馬場とふたり、本郷の薄暗いおでんやで酒を呑んだ。はじめは、ふたりながら死んだように黙って呑んでいたのであるが、二時間くらいたってから、馬場はそろそろしゃべりはじめた。", "「佐竹が太宰を抱き込んだにちがいないのさ。下宿のまえまでふたり一緒に来たのだ。それくらいのことは、やる男だ。君、僕は知っているよ。佐竹は君に何かこっそり相談したことがありはしないか」", "「あります」私は馬場に酌をした。なんとかしていたわりたかった。", "「佐竹は僕から君をとろうとしたのだ。別に理由はない。あいつは、へんな復讐心（ふくしゅうしん）を持っている。僕よりえらい。いや、僕にはよく判らない。――いや、ひょっとしたら、なんでもない俗な男なのかも知れん。そうだ、あんなのが世間から人並の男と言われるのだろう。だが、もういい。雑誌をよしてさばさばしたよ。今夜は僕、枕を高くしてのうのうと寝るぞ！　それに、君、僕はちかく勘当されるかも知れないのだよ。一朝めざむれば、わが身はよるべなき乞食であった。雑誌なんて、はじめから、やる気はなかったのさ。君を好きだから、君を離したくなかったから、海賊なんぞ持ちだしたまでのことだ。君が海賊の空想に胸をふくらめて、様様のプランを言いだすときの潤んだ眼だけが、僕の生き甲斐（がい）だった。この眼を見るために僕はきょうまで生きて来たのだと思った。僕は、ほんとうの愛情というものを君に教わって、はじめて知ったような気がしている。君は透明だ、純粋だ。おまけに、――美少年だ！　僕は君の瞳（ひとみ）のなかにフレキシビリティの極致を見たような気がする。そうだ。知性の井戸の底を覗いたのは、僕でもない太宰でもない佐竹でもない、君だ！　意外にも君であった。――ちぇっ！　僕はなぜこうべらべらしゃべってしまうのだろう。軽薄。狂躁（きょうそう）。ほんとうの愛情というものは死ぬまで黙っているものだ。菊のやつが僕にそう教えたことがある。君、ビッグ・ニュウス。どうしようもない。菊が君に惚（ほ）れているぞ。佐野次郎さんには、死んでも言うものか。死ぬほど好きなひとだもの。そんな逆説めいたことを口走って、サイダアを一瓶、頭から僕にぶっかけて、きゃっきゃっと気ちがいみたいに笑った。ところで君は、誰をいちばん好きなんだ。太宰を好きか？　え。佐竹か？　まさかねえ。そうだろう？　僕、――」", "「僕は」私はぶちまけてしまおうと思った。「誰もみんなきらいです。菊ちゃんだけを好きなんだ。川のむこうにいた女よりさきに菊ちゃんを見て知っていたような気もするのです」", "「まあ、いい」馬場はそう呟いて微笑んでみせたが、いきなり左手で顔をひたと覆って、嗚咽（おえつ）をはじめた。芝居の台詞（せりふ）みたいな一種リズミカルな口調でもって、「君、僕は泣いているのじゃないよ。うそ泣きだ。そら涙だ。ちくしょう！　みんなそう言って笑うがいい。僕は生れたときから死ぬるきわまで狂言をつづけ了せる。僕は幽霊だ。ああ、僕を忘れないで呉れ！　僕には才分があるのだ。荒城の月を作曲したのは、誰だ。滝廉太郎を僕じゃないという奴がある。それほどまでにひとを疑わなくちゃ、いけないのか。嘘なら嘘でいい。――いや、うそじゃない。正しいことは正しく言い張らなければいけない。絶対に嘘じゃない」", "私はひとりでふらふら外へ出た。雨が降っていた。ちまたに雨が降る。ああ、これは先刻、太宰が呟いた言葉じゃないか。そ 感ずる事が出来、言わば彼女は私と偕(とも)にある者となり、私にとつての永遠なるものであるという実感の方が強くなつた。私はそうして平静と心の健康とを取り戻し、仕事の張合がもう一度出て来た。一日の仕事を終つて製作を眺める時「どうだらう」といって後ろをふりむけば智恵子はきつと其処(そこ)に居る。彼女は何処(どこ)にでも居るのである。", "智恵子が結婚してから死ぬまでの二十四年間の生活は愛と生活苦と芸術への精進と矛盾と、そうして闘病との間断なき一連続に過ぎなかつた。彼女はそういう渦巻の中で、宿命的に持つていた精神上の素質の為に倒れ、歓喜と絶望と信頼と諦観(ていかん)とのあざなはれた波濤(はとう)の間に没し去つた。彼女の追憶について書く事を人から幾度か示唆(しさ)されても今日まで其を書く気がしなかつた。あまりなまなましい苦闘のあとは、たとひ小さな一隅の生活にしても筆にするに忍びなかつたし、又いはば単なる私生活の報告のようなものに果してどういう意味があり得るかという疑問も強く心を牽制(けんせい)していたのである。だが今は書こう。出来るだけ簡単に此の一人の女性の運命を書きとめて置こう。大正昭和の年代に人知れず斯(か)ういう事に悩み、こういう事に生き、こういう事に倒れた女性のあつた事を書き記して、それをあわれな彼女への餞(はなむけ)とする事を許させてもらはう。一人に極まれば万人に通ずるということを信じて、今日のような時勢の下にも敢て此の筆を執らうとするのである。", "今しづかに振りかへつて彼女の上を考へて見ると、その一生を要約すれば、まづ東北地方福島県二本松町の近在、漆原という所の酒造り長沼家に長女として明治十九年に生れ、土地の高女を卒業してから東京目白の日本女子大学校家政科に入学、寮生活をつづけているうちに洋画に興味を持ち始め、女子大学卒業後、郷里の父母の同意を辛うじて得て東京に留(とど)まり、太平洋絵画研究所に通学して油絵を学び、当時の新興画家であつた中村彜(つね)、斎藤与里治、津田青楓(せいうう)の諸氏に出入して其の影響をうけ、又一方、其頃平塚雷鳥女史等の提起した女子思想運動にも加はり、雑誌「青鞜(せいとう)」の表紙画などを画いたりした。それが明治末年頃の事であり、やがて柳八重子女史の紹介で初めて私と知るようになり、大正三年に私と結婚した。結婚後も油絵の研究に熱中していたが、芸術精進と家庭生活との板ばさみとなるような月日も漸く多くなり、その上肋膜(ろくまく)を病んで以来しばしば病臥(びようが)を余儀なくされ、後年郷里の家君を亡(うしな)ひ、つづいて実家の破産に瀕(ひん)するにあひ、心痛苦慮は一通りでなかつた。やがて更年期の心神変調が因(もと)となつて精神異状の徴候があらはれ、昭和七年アダリン自殺を計り、幸ひ薬毒からは免れて一旦健康を恢復(かいうく)したが、その後あらゆる療養をも押しのけて徐々に確実に進んで来る脳細胞の疾患のため昭和十年には完全に精神分裂症に捉(とら)へられ、其年二月ゼームス坂病院に入院、昭和十三年十月其処でしづかに瞑目(めいもく)したのである。", "彼女の一生は実に単純であり、純粋に一私人的生活に終始し、いささかも社会的意義を有(も)つ生活に触れなかつた。わづかに「青鞜」に関係していた短い期間がその社会的接触のあつた時と言へばいえる程度に過ぎなかつた。社会的関心を持たなかつたばかりでなく、生来社交的でなかつた。「青鞜」に関係していた頃所謂(いはゆる)新らしい女の一人として一部の人達の間に相当に顔を知られ、長沼智恵子という名がその仲間の口に時々上つたのも、実は当時のゴシツプ好きの連中が尾鰭(をひれ)をつけていろいろ面白そうに喧伝(けんでん)したのが因であつて、本人はむしろ無口な、非社交的な非論理的な、一途(いちず)な性格で押し通していたらしかつた。長沼さんとは話がしにくいというのが当時の女友達の本当の意見のやうであつた。私は其頃の彼女をあまり善く知らないのであるが、津田青楓氏が何かに書いていた中に、彼女が高い塗下駄をはいて着物の裾を長く引きずるようにして歩いていたのをよく見かけたというような事があつたのを記憶する。そんな様子や口数の少いところから何となく人が彼女に好奇的な謎(なぞ)でも感じていたのではないかと思はれる。女水滸伝(すいこでん)のように思はれたり、又風情(ふぜい)ごのみのように言はれたりしたやうであるが実際はもつと素朴で無頓着(むとんちやく)であつたのだらうと想像する。", "私は彼女の前半生を殆ど全く知らないと言つていい。彼女について私が知つているのは紹介されて彼女と識(し)つてから以後の事だけである。現在の事で一ぱいで、以前の事を知らうとする気も起らなかつたし、年齢さへ実は後年まで確実には知らなかつたのである。私が知つてからの彼女は実に単純真摯(しんし)な性格で、心に何か天上的なものをいつでも湛(たた)へて居り、愛と信頼とに全身を投げ出していたような女性であつた。生来の勝気から自己の感情はかなり内に抑へていたやうで、物腰はおだやかで軽佻(けいちよう)な風は見られなかつた。自己を乗り越えて進まうとする気力の強さには時々驚かされる事もあつたが、又そこに随分無理な努力も人知れず重ねていたのである事を今日から考へると推察する事が出来る。", "その時には分らなかつたが、後から考へてみれば、結局彼女の半生は精神病にまで到達するように進んでいたやうである。私との此の生活では外に往く道はなかつたように見える。どうしてそうかと考へる前に、もつと別な生活を想像してみると、例へば生活するのが東京でなくて郷里、或は何処かの田園であり、又配偶者が私のような美術家でなく、美術に理解ある他の職業の者、殊に農耕牧畜に従事しているような者であつた場合にはどうであつたらうと考へられる。或はもつと天然の寿を全うし得たかも知れない。そう思はれるほど彼女にとつては肉体的に既に東京が不適当の地であつた。東京の空気は彼女には常に無味乾燥でざらざらしていた。女子大で成瀬校長に奨励され、自転車に乗つたり、テニスに熱中したりして頗(すこぶ)る元気溌剌たる娘時代を過したやうであるが、卒業後は概してあまり頑健という方ではなく、様子もほつそりしていて、一年の半分近くは田舎や、山へ行つていたらしかつた。私と同棲してからも一年に三四箇月は郷里の家に帰つていた。田舎の空気を吸つて来なければ身体(からだ)が保(も)たないのであつた。彼女はよく東京には空が無いといって歎(なげ)いた。私の「あどけない話」という小詩がある。", "智恵子は東京に空が無いという、", "ほんとの空が見たいという。", "私は驚いて空を見る。", "桜若葉の間に在るのは、", "切つても切れない", "むかしなじみのきれいな空だ。", "どんよりけむる地平のぼかしは", "うすもも色の朝のしめりだ。", "智恵子は遠くを見ながらいう。", "阿多多羅山(あたたらやま)の山の上に", "毎日出ている青い空が", "智恵子のほんとの空だという。", "あどけない空の話である。", "私自身は東京に生れて東京に育つているため彼女の痛切な訴を身を以て感ずる事が出来ず、彼女もいつかは此の都会の自然に馴染(なじ)む事だらうと思つていたが、彼女の斯かる新鮮な透明な自然への要求は遂に身を終るまで変らなかつた。彼女は東京に居て此の要求をいろいろな方法で満たしていた。家のまはりに生える雑草の飽くなき写生、その植物学的探究、張出窓での百合(ゆり)花やトマトの栽培、野菜類の生食、ベトオフエンの第六交響楽レコオドへの惑溺(わくでき)というような事は皆この要求充足の変形であつたに相違なく、此の一事だけでも半生に亙(わた)る彼女の表現し得ない不断のせつなさは想像以上のものであつたであらう。その最後の日、死ぬ数時間前に私が持つて行つたサンキストのレモンの一顆(いつか)を手にした彼女の喜も亦(また)この一筋につながるものであつたらう。彼女はそのレモンに歯を立てて、すがしい香りと汁液とに身も心も洗はれているように見えた。", "彼女がつひに精神の破綻(はたん)を来すに至つた更に大きな原因は何といってもその猛烈な芸術精進と、私への純真な愛に基く日常生活の営みとの間に起る矛盾撞着(どうちやく)の悩みであつたであらう。彼女は絵画を熱愛した。女子大在学中既に油絵を画いていたらしく、学芸会に於(お)ける学生劇の背景製作などをいつも引きうけて居たという事であり、故郷の両親が初めは反対していたのに遂に画家になる事を承認したのも、其頃画いた祖父の肖像画の出来栄(ばえ)が故郷の人達を驚かしたのに因ると伝へ聞いている。この油絵は、私も後に見たが、素朴な中に渋い調和があり、色価の美しい作であつた。卒業後数年間の絵画については私はよく知らないが、幾分情調本位な甘い気分のものではなかつたかと思はれる。其頃のものを彼女はすべて破棄してしまつて私には見せなかつた。僅かに素描の下描などで私は其を想像するに過ぎなかつた。私と一緒になつてからは主に静物の勉強をつづけ幾百枚となく画いた。風景は故郷に帰つた時や、山などに旅行した時にかき、人物は素描では描いたが、油絵ではつひにまだ本格的に画くまでに至らなかつた。彼女はセザンヌに傾倒していて自然とその影響をうける事も強かつた。私もその頃は彫刻の外に油絵も画いていたが、勉強の部屋は別にしていた。彼女は色彩について実に苦しみ悩んだ。そして中途半端の成功を望まなかつたので自虐に等しいと思はれるほど自分自身を責めさいなんだ。或年、故郷に近い五色温泉に夏を過して其処の風景を画いて帰つて来た。その中の小品に相当に佳(よ)いものがあつたので、彼女も文展に出品する気になつて、他の大幅のものと一緒にそれを搬入したが、鑑査員の認めるところとならずに落選した。それ以来いくらすすめても彼女は何処の展覧会へも出品しようとしなかつた。自己の作品を公衆に展示する事によつて何か内に鬱積(うつせき)するものを世に訴へ、外に発散せしめる機会を得るという事も美術家には精神の助けとなるものだと思ふのであるが、そういう事から自己を内に閉じこめてしまつたのも精神の内攻的傾向を助長したかも知れない。彼女は最善をばかり目指していたので何時(いつ)でも自己に不満であり、いつでも作品は未完成に終つた。又事実その油絵にはまだ色彩に不十分なもののある事は争はれなかつた。その素描にはすばらしい力と優雅とを持つていたが、油絵具を十分に克服する事がどうしてもまだ出来なかつた。彼女はそれを悲しんだ。時々はひとり画架の前で涙を流していた。偶然二階の彼女の部屋に行つてそういうところを見ると、私も言ひしれぬ寂しさを感じ慰(なぐさめ)の言葉も出ない事がよくあつた。ところで、私は人の想像以上に生活不如意で、震災前後に唯一度女中を置いたことがあるだけで、其他(そのほか)は彼女と二人きりの生活であつたし、彼女も私も同じ様な造型美術家なので、時間の使用について中々むつかしいやりくりが必要であつた。互にその仕事に熱中すれば一日中二人とも食事も出来ず、掃除も出来ず、用事も足せず、一切の生活が停頓(ていとん)してしまふ。そういう日々もかなり重なり、結局やつぱり女性である彼女の方が家庭内の雑事を処理せねばならず、おまけに私が昼間彫刻の仕事をすれば、夜は食事の暇も惜しく原稿を書くというような事が多くなるにつれて、ますます彼女の絵画勉強の時間が食はれる事になるのであつた。詩歌(しいか)のような仕事などならば、或は頭の中で半分は進める事も出来、かなり零細な時間でも利用出来るかと思ふが、造型美術だけは或る定まつた時間の区劃が無ければどうする事も出来ないので、この点についての彼女の苦慮は思ひやられるものであつた。彼女はどんな事があつても私の仕事の時間を減らすまいとし、私の彫刻をかばひ、私を雑用から防がうと懸命に努力をした。彼女はいつの間にか油絵勉強の時間を縮少し、或時は粘土で彫刻を試みたり、又後には絹糸をつむいだり、其(それ)を草木染にしたり、機織(はたをり)を始めたりした。二人の着物や羽織を手織で作つたのが今でも残つている。同じ草木染の権威山崎斌(たけし)氏は彼女の死んだ時弔電に、", "袖のところ一すじ青きしまを織りて", "あてなりし人今はなしはや", "という歌を書いておくられた。結局彼女は口に出さなかつたが、油絵製作に絶望したのであつた。あれほど熱愛して生涯の仕事と思つていた自己の芸術に絶望する事はそう容易な心事である筈がない。後年服毒した夜には、隣室に千疋屋(せんびきや)から買つて来たばかりの果物籠が静物風に配置され、画架には新らしい画布が立てかけられてあつた。私はそれを見て胸をつかれた。慟哭(どうこく)したくなつた。", "彼女はやさしかつたが勝気であつたので、どんな事でも自分一人の胸に収めて唯黙つて進んだ。そして自己の最高の能力をつねに物に傾注した。芸術に関する事は素(もと)より、一般教養のこと、精神上の諸問題についても突きつめるだけつきつめて考へて、曖昧(あいまい)をゆるさず、妥協を卑しんだ。いはば四六時中張りきつていた弦のようなもので、その極度の緊張に堪へられずして脳細胞が破れたのである。精根つきて倒れたのである。彼女の此の内部生活の清浄さに私は幾度浄められる思をしたか知れない。彼女にくらべると私は実に茫漠として濁つている事を感じた。彼女の眼を見ているだけで私は百の教訓以上のものを感得するのが常であつた。彼女の眼には確かに阿多多羅山の山の上に出ている天空があつた。私は彼女の胸像を作る時この眼の及び難い事を痛感して自分の汚なさを恥じた。今から考へてみても彼女は到底この世に無事に生きながらへていられなかつた運命を内部的にも持つていたように見える。それほど隔絶的に此の世の空気と違つた世界の中に生きていた。私は時々何だか彼女は仮にこの世に存在している魂のように思へる事があつたのを記憶する。彼女には世間慾というものが無かつた。彼女は唯ひたむきに芸術と私とへの愛によつて生きていた。そうしていつでも若かつた。精神の若さと共に相貌の若さも著しかつた。彼女と一緒に旅行する度に、ゆくさきざきで人は彼女を私の妹と思ったり、娘とさへ思ったりした。彼女には何かそういう種類の若さがあつて、死ぬ頃になつても五十歳を超えた女性とは一見して思へなかつた。結婚当時も私は彼女の老年というものを想像する事が出来ず、「あなたでもお婆さんになるかしら」と戯れに言つたことがあるが、彼女はその時、「私年とらないうちに死ぬわ」と不用意に答へたことのあるのを覚えている。そうしてまつたくその通りになつた。", "精神病学者の意見では、普通の健康人の脳は随分ひどい苦悩にも堪へられるものであり、精神病に陥る者は、大部分何等かの意味でその素質を先天的に持つているか、又は怪我とか悪疾とかによつて後天的に持たせられた者であるという事である。彼女の家系には精神病の人は居なかつたやうであるが、ただ彼女の弟である実家の長男はかなり常規を逸した素行があり、そのため遂に実家は破産し、彼自身は悪疾をも病んで陋巷(らうこう)に窮死した。しかし遺伝的といひ得る程強い素質がそこに流れていると信じられない。又彼女は幼児の時切石で頭蓋にひどい怪我をした事があるという事であるがこれも其の後何の故障もなく平癒してしまつて後年の病気に関係があるとも思へない。又彼女が脳に変調を起した時、医者は私に外国で或る病気の感染を受けた事はないかと質問した。私にはまつたく其の記憶がなかつたし、又私の血液と彼女の血液とを再三検査してもらつたが、いつも結果は陰性であつた。そうすると彼女の精神分裂症という病気の起る素質が彼女に肉体的に存在したとは確定し難いのである。だが又あとから考へると、私が知つて以来の彼女の一切の傾向は此の病気の方へじりじりと一歩づつ進んでいたのだとも取れる。その純真さえも唯ならぬものがあつたのである。思ひつめれば他の一切を放棄して悔まづ、所謂(いはゆる)矢も楯もたまらぬ気性を持つていたし、私への愛と信頼の強さ深さは殆ど嬰児のそれのやうであつたといっていい。私が彼女に初めて打たれたのも此の異常な性格の美しさであつた。言ふことが出来れば彼女はすべて異常なのであつた。私が「樹下の二人」という詩の中で、", "ここはあなたの生れたふるさと", "この不思議な別箇の肉身を生んだ天地。", "と歌つたのも此の実感から来ているのであつた。彼女が一歩づつ最後の破綻(はたん)に近づいて行つたのか、病気が螺線(らせん)のようにぎりぎりと間違なく押し進んで来たのか、最後に近くなつてからはじめて私も何だか変なのではないかとそれとなく気がつくようになつたのであつて、それまでは彼女の精神状態などについて露ほどの疑も抱いてはいなかつた。つまり彼女は異常ではあつたが、異状ではなかつたのである。はじめて異状を感じたのは彼女の更年期が迫つて来た頃の事である。", "追憶の中の彼女をここに簡単に書きとめて置こう。", "前述の通り長沼智恵子を私に紹介したのは女子大の先輩柳八重子女史であつた。女史は私の紐育(ニユーヨーク)時代からの友人であつた画家柳敬助君の夫人で当時桜楓(おうふう)会の仕事をして居られた。明治四十四年の頃である。私は明治四十二年七月にフランスから帰つて来て、父の家の庭にあつた隠居所の屋根に孔をあけてアトリエ代りにし、そこで彫刻や油絵を盛んに勉強していた。一方神田淡路町に琅※［＃「王＋干」、第3水準1-87-83］洞(ろうかんどう)という小さな美術店を創設して新興芸術の展覧会などをやつたり、当時日本に勃興(ぼつこう)したスバル一派の新文学運動に加はつたりしていたと同時に、遅蒔(おそまき)の青春が爆発して、北原白秋氏、長田秀雄氏、木下杢太郎(もくたろう)氏などとさかんに往来してかなり烈しい所謂耽溺(たんでき)生活に陥つていた。不安と焦躁と渇望と、何か知られざるものに対する絶望とでめちやめちやな日々を送り、遂に北海道移住を企てたり、それにも忽ち失敗したり、どうなる事か自分でも分らないような精神の危機を経験していた時であつた。柳敬助君に友人としての深慮があつたのかも知れないが、丁度そういう時彼女が私に紹介されたのであつた。彼女はひどく優雅で、無口で、語尾が消えてしまひ、ただ私の作品を見て、お茶をのんだり、フランス絵画の話をきいたりして帰つてゆくのが常であつた。私は彼女の着こなしのうまさと、きやしやな姿の好ましさなどしか最初は眼につかなかつた。彼女は決して自分の画いた絵を持つて来なかつたのでどんなものを画いているのかまるで知らなかつた。そのうち私は現在のアトリエを父に建ててもらふ事になり、明治四十五年には出来上つて、一人で移り住んだ。彼女はお祝にグロキシニヤの大鉢を持つて此処へ訪ねて来た。丁度明治天皇様崩御の後、私は犬吠(いぬぼう)へ写生に出かけた。その時別の宿に彼女が妹さんと一人の親友と一緒に来ていて又会つた。後に彼女は私の宿へ来て滞在し、一緒に散歩したり食事したり写生したりした。様子が変に見えたものか、宿の女中が一人必ず私達二人の散歩を監視するためついて来た。心中しかねないと見たらしい。智恵子が後日語る所によると、その時若(も)し私が何か無理な事でも言ひ出すような事があつたら、彼女は即座に入水して死ぬつもりだつたという事であつた。私はそんな事は知らなかつたが、此の宿の滞在中に見た彼女の清純な態度と、無欲な素朴な気質と、限りなきその自然への愛とに強く打たれた。君が浜の浜防風を喜ぶ彼女はまつたく子供であつた。しかし又私は入浴の時、隣の風呂場に居る彼女を偶然に目にして、何だか運命のつながりが二人の間にあるのではないかという予感をふと感じた。彼女は実によく均整がとれていた。", "やがて彼女から熱烈な手紙が来るようになり、私も此の人の外に心を託すべき女性は無いと思ふようになつた。それでも幾度か此の心が一時的のものではないかと自ら疑つた。又彼女にも警告した。それは私の今後の生活の苦闘を思ふと彼女をその中に巻きこむに忍びない気がしたからである。其の頃せまい美術家仲間や女人達の間で二人に関する悪質のゴシツプが飛ばされ、二人とも家族などに対して随分困らせられた。然し彼女は私を信じ切り、私は彼女をむしろ崇拝した。悪声が四辺に満ちるほど、私達はますます強く結ばれた。私は自分の中にある不純の分子や溷濁(こんだく)の残留物を知つているので時々自信を失ひかけると、彼女はいつでも私の中にあるものを清らかな光に照らして見せてくれた。", "汚れ果てたる我がかずかずの姿の中に", "をさな児のまこともて", "君はたふとき吾がわれをこそ見出でつれ", "君の見出でつるものをわれは知らず", "ただ我は君をこよなき審判官(さばきのつかさ)とすれば", "君によりてこころよろこび", "わがしらぬわれの", "わがあたたかき肉のうちに籠(こも)れるを信ずるなり", "と私も歌つたのである。私を破れかぶれの廃頽(はいたい)気分から遂に引上げ救ひ出してくれたのは彼女の純一な愛であつた。", "大正二年八月九月の二箇月間私は信州上高地の清水屋に滞在して、その秋神田ヴヰナス倶楽部(クラブ)で岸田劉生(りゆうせい)君や木村荘八君等と共に開いた生活社の展覧会の油絵を数十枚画いた。其の頃上高地に行く人は皆島々から岩魚止(いはなどめ)を経て徳本(とくごう)峠を越えたもので、かなりの道のりであつた。その夏同宿には窪田空穂(くぼたうつほ)氏や、茨木猪之吉氏も居られ、又丁度穂高登山に来られたウエストン夫妻も居られた。九月に入つてから彼女が画の道具を持つて私を訪ねて来た。その知らせをうけた日、私は徳本峠を越えて岩魚止まで彼女を迎へに行つた。彼女は案内者に荷物を任せて身軽に登つて来た。山の人もその健脚に驚いていた。私は又徳本峠を一緒に越えて彼女を清水屋に案内した。上高地の風光に接した彼女の喜は実に大きかつた。それからは毎日私が二人分の画の道具を肩にかけて写生に歩きまはつた。彼女は其の頃肋膜(ろくまく)を少し痛めているらしかつたが山に居る間はどうやら大した事にもならなかつた。彼女の作画はこの時始めて見た。かなり主観的な自然の見方で一種の特色があり、大成すれば面白からうと思った。私は穂高、明神、焼岳、霞沢、六百岳、梓川と触目を悉(ことごと)く画いた。彼女は其の時私の画いた自画像の一枚を後年病臥中でも見ていた。その時ウエストンから彼女の事を妹さんか、夫人かと問はれた。友達ですと答へたら苦笑していた。当時東京の或新聞に「山上の恋」という見出しで上高地に於ける二人の事が誇張されて書かれた。多分下山した人の噂話を種にしたものであらう。それが又家族の人達の神経を痛めさせた。十月一日に一山挙(こぞ)つて島々へ下りた。徳本峠の山ふところを埋めていた桂の木の黄葉の立派さは忘れ難い。彼女もよくそれを思ひ出して語つた。", "それ以来私の両親はひどく心配した。私は母に実にすまないと思った。父や母の夢は皆破れた。所謂洋行帰りを利用して彫刻界へ押し出す事もせず、学校の先生をすすめても断り、然るべき江戸前のお嫁さんも貰はず、まるで了見が分らない事になつてしまつた。実にすまないと思ったが、結局大正三年に智恵子との結婚を許してもらふように両親に申出た。両親も許してくれた。両親のもとにかしづかず、アトリエに別居するわけなので、土地家屋等一切は両親と同居する弟夫妻の所有とする事にきめて置いた。私達二人はまつたく裸のままの家庭を持つた。もちろん熱海行などはしなかつた。それから実に長い間の貧乏生活がつづいたのである。", "彼女は裕福な豪家に育つたのであるが、或はその為か、金銭には実に淡泊で、貧乏の恐ろしさを知らなかつた。私が金に困つて古着屋を呼んで洋服を売つて居ても平気で見ていたし、勝手元の引出(ひきだし)に金が無ければ買物に出かけないだけであつた。いよいよ食べられなくなつたらというような話も時々出たが、だがどんな事があつてもやるだけの仕事をやつてしまはなければねというと、そう、あなたの彫刻が中途で無くなるような事があつてはならないと度々言つた。私達は定収入というものが無いので、金のある時は割にあり、無くなると明日からばつたり無くなつた。金は無くなると何処を探しても無い。二十四年間に私が彼女に着物を作つてやつたのは二三度くらいのものであつたらう。彼女は独身時代のぴらぴらした着物をだんだん着なくなり、つひに無装飾になり、家の内ではスエタアとヅボンで通すようになつた。しかも其が甚だ美しい調和を持つていた。「あなたはだんだんきれいになる」という詩の中で、", "をんなが附属品をだんだん棄てると", "どうしてこんなにきれいになるのか。", "年で洗はれたあなたのからだは", "無辺際を飛ぶ天の金属。", "と私が書いたのも其の頃である。", "自分の貧に驚かない彼女も実家の没落にはひどく心を傷(いた)めた。幾度か実家へ帰つて家計整理をしたやうであつたが結局破産した。二本松町の大火。実父の永眠。相続人の遊蕩(ゆうとう)。破滅。彼女にとつては堪へがたい痛恨事であつたらう。彼女はよく病気をしたが、その度に田舎の家に帰ると平癒した。もう帰る家も無いという寂しさはどんなに彼女を苦しめたらう。彼女の寂しさをまぎらす多くの交友を持たなかつたのも其の性情から出たものとはいへ一つの運命であつた。一切を私への愛にかけて学校時代の友達とも追々遠ざかつてしまつた。僅かに立川の農事試験場の佐藤澄子さん其の他両三名の親友があつたに過ぎなかつたのである。それでさへ年に一二度の往来であつた。学校時代には彼女は相当に健康であつて運動も過激なほどやつたやうであるが、卒業後肋膜にいつも故障があり、私と結婚してから数年のうちに遂に湿性肋膜炎の重症のにかかつて入院し、幸に全治したが、その後或る練習所で乗馬の稽古を始めた所、そのせいか後屈症を起して切開手術のため又入院した。盲腸などでも悩み、いつも何処かしらが悪かつた。彼女の半生の中で一番健康をたのしんだのは大正十四年頃の一二年間のことであつた。しかし病気でも彼女はじめじめしていなかつた。いつも清朗でおだやかであつた。悲しい時には涙を流して泣いたが、又じきに直つた。", "昭和六年私が三陸地方へ旅行している頃、彼女に最初の精神変調が来たらしかつた。私は彼女を家に一人残して二週間と旅行をつづけた事はなかつたのに、此の時は一箇月近く歩いた。不在中泊りに来ていた姪(めひ)や、又訪ねて来た母などの話をきくと余程孤独を感じていた様子で、母に、あたし死ぬわ、と言つた事があるという。丁度更年期に接している年齢であつた。翌七年はロザンゼルスでオリムピツクのあつた年であるが、その七月十五日の朝、彼女は眠から覚めなかつた。前夜十二時過にアダリンを服用したと見え、粉末二五瓦(グラム)入の瓶(びん)が空になつていた。彼女は童女のように円く肥つて眼をつぶり口を閉じ、寝台の上に仰臥(ぎようが)したままいくら呼んでも揺つても眠つていた。呼吸もあり、体温は中々高い。すぐ医者に来てもらつて解毒の手当し、医者から一応警察に届け、九段坂病院に入れた。遺書が出たが、其にはただ私への愛と感謝の言葉と、父への謝罪とが書いてあるだけだつた。その文章には少しも頭脳不調の痕跡(こんせき)は見られなかつた。一箇月の療養と看護とで平復退院。それから一箇年間は割に健康で過したが、そのうち種々な脳の故障が起るのに気づき、旅行でもしたらと思つて東北地方の温泉まはりを一緒にしたが、上野駅に帰着した時は出発した時よりも悪化していた。症状一進一退。彼女は最初幻覚を多く見るので寝台に臥(ふ)しながら、其を一々手帳に写生していた。刻々に変化するのを時間を記入しながら次々と描いては私に見せた。形や色の無類の美しさを感激を以て語つた。そうした或る期間を経ているうちに今度は全体に意識がひどくぼんやりするようになり、食事も入浴も嬰児(えいじ)のように私がさせた。私も医者もこれを更年期の一時的現象と思つて、母や妹の居る九十九里浜の家に転地させ、オバホルモンなどを服用させていた。私は一週一度汽車で訪ねた。昭和九年私の父が胃潰瘍(いかいよう)で大学病院に入院、退院後十月十日に他界した。彼女は海岸で身体は丈夫になり朦朧(もうろう)状態は脱したが、脳の変調はむしろ進んだ。鳥と遊んだり、自身が鳥になつたり、松林の一角に立つて、光太郎智恵子光太郎智恵子と一時間も連呼したりするようになつた。父死後の始末も一段落ついた頃彼女を海岸からアトリエに引きとつたが、病勢はまるで汽罐車(きかんしや)のように驀進(ばくしん)して来た。諸岡存博士の診察まうけたが、次第に狂暴の行為を始めるようになり、自宅療養が危険なので、昭和十年二月知人の紹介で南品川のゼームス坂病院に入院、一切を院長斎藤玉男博士の懇篤な指導に拠(よ)ることにした。又仕合(しあわせ)なことにさきに一等看護婦になつていた智恵子の姪のはる子さんという心やさしい娘さんに最後まで看護してもらふ事が出来た。昭和七年以来の彼女の経過追憶を細かに書くことはまだ私には痛々しすぎる。ただ此の病院生活の後半期は病状が割に平静を保持し、精神は分裂しながらも手は曾(かつ)て油絵具で成し遂げ得なかつたものを切紙によつて楽しく成就したかの観がある。百を以て数へる枚数の彼女の作つた切紙絵は、まつたく彼女のゆたかな詩であり、生活記録であり、たのしい造型であり、色階和音であり、ユウモアであり、また微妙な愛憐(あいれん)の情の訴でもある。彼女は此所に実に健康に生きている。彼女はそれを訪問した私に見せるのが何よりもうれしそうであつた。私がそれを見ている間、彼女は如何にも幸福そうに微笑したり、お辞儀したりしていた。最後の日其を一まとめに自分で整理して置いたものを私に渡して、荒い呼吸の中でかすかに笑ふ表情をした。すつかり安心した顔であつた。私の持参したレモンの香りで洗はれた彼女はそれから数時間のうちに極めて静かに此の世を去つた。昭和十三年十月五日の夜であつた。", "九十九里浜の初夏", "私は昭和九年五月から十二月末まで、毎週一度づつ九十九里浜の真亀納屋という小さな部落に東京から通つた。頭を悪くしていた妻を其処に住む親類の寓居(ぐうきよ)にあづけて置いたので、その妻を見舞ふために通つたのである。真亀という部落は、海水浴場としても知られている鰯(いわし)の漁場千葉県山武郡片貝村の南方一里足らずの浜辺に沿つた淋しい漁村である。", "九十九里浜は千葉県銚子のさきの外川の突端から南方太東岬(たいとうみさき)に至るまで、殆ど直線に近い大弓状の曲線を描いて十数里に亙る平坦な砂浜の間、眼をさへぎる何物も無いような、太平洋岸の豪宕(ごうとう)極まりない浜辺である。その丁度まんなかあたりに真亀の海岸は位する。", "私は汽車で両国から大網駅までゆく。ここからバスで今泉という海岸の部落迄まつ平らな水田の中を二里あまり走る。五月頃は水田に水がまんまんと漲(みなぎ)つていて、ところどころに白鷺(しらさぎ)が下りている。白鷺は必ず小さな群を成して、水田に好個の日本的画趣を与へる。私は今泉の四辻の茶店に一休みして、又別な片貝行のバスに乗る。そこからは一里も行かないうちに真亀川を渡つて真亀の部落につくのである。部落からすぐ浜辺の方へ小径(こみち)をたどると、黒松の防風林の中へはいる。妻の逗留(とうりゆう)している親戚の家は、此の防風林の中の小高い砂丘の上に立つていて、座敷の前は一望の砂浜となり、二三の小さな漁家の屋根が点々としているさきに九十九里浜の波打際が白く見え、まつ青な太平洋が土手のように高くつづいて際涯(さいはて)の無い水平線が風景を両断する。", "午前に両国駅を出ると、いつも午後二三時頃此の砂丘につく。私は一週間分の薬や、菓子や、妻の好きな果物などを出す。妻は熱つぽいような息をして私を喜び迎へる。私は妻を誘つていつも砂丘づたひに防風林の中をまづ歩く。そして小松のまばらな高みの砂へ腰をおろして二人で休む。五月の太陽が少し斜に白い砂を照らし、微風は海から潮の香をふくんで、あをあをとした松の枝をかすかに鳴らす。空気のうまさを満喫して私は陶然とする。丁度五月は松の花のさかりである。黒松の新芽ののびたさきに、あの小さな、黄いろい、俵のような、ほろほろとした単性の花球がこぼれるように着く。", "松の花粉の飛ぶ壮観を私は此の九十九里浜の初夏にはじめて見た。防風林の黒松の花が熟する頃、海から吹きよせる風にのつて、その黄いろい花粉が飛ぶさまは、むしろ恐しいほどの勢である。支那の黄土をまきあげた黄塵(こうじん)というのは、素(もと)より濁つて暗くすさまじいもののやうだが、松の花粉の風に流れるのはその黄塵をも想像させるほどで、ただそれが明かるく、透明の感じを持ち、不可言の芳香をただよはせて風のまにまに空間を満たすのである。さかんな時には座敷の中にまでその花粉がつもる。妻の浴衣(ゆかた)の肩につもつたその花粉を軽くはたいて私は立ち上る。妻は足もとの砂を掘つてしきりに松露の玉をあつめている。日が傾くにつれて海鳴りが強くなる。千鳥がつひそこを駈けるように歩いている。", "智恵子の切抜絵", "精神病者に簡単な手工をすすめるのはいいときいていたので、智恵子が病院に入院して、半年もたち、昂奮がやや鎮静した頃、私は智恵子の平常好きだつた千代紙を持つていつた。智恵子は大へんよろこんで其で千羽鶴を折つた。訪問するたびに部屋の天井から下つている鶴の折紙がふえて美しかつた。そのうち、鶴の外にも紙燈籠(かみどうろう)だとか其他の形のものが作られるようになり、中々意匠をこらしたものがぶら下つていた。すると或時、智恵子は訪問の私に一つの紙づつみを渡して見ろという風情(ふぜい)であつた。紙包をあけると中に色がみを鋏(はさみ)で切つた模様風の美しい紙細工が大切そうに仕舞つてあつた。其を見て私は驚いた。其がまつたく折鶴から飛躍的に進んだ立派な芸術品であつたからである。私の感嘆を見て智恵子は恥かしそうに笑つたり、お辞儀をしたりしていた。", "その頃は、何でもそこらにある紙きれを手あたり次第に用いていたのであるが、やがて色彩に対する要求が強くなつたと見えて、いろ紙を持つて来てくれというようになつた。私は早速丸の内のはい原へ行つて子供が折紙につかふいろ紙を幾種か買つて送つた。智恵子の「仕事」がそれから始まつた。看護婦さんのいうところによると、風邪(かぜ)をひいたり、熱を出したりした時以外は、毎日「仕事」をするのだといって、朝からしきりと切紙細工をやつていたらしい。鋏はマニキユアに使ふ小さな、尖端の曲つた鋏である。その鋏一丁を手にして、暫く紙を見つめていてから、あとはすらすらと切りぬいてゆくのだという事である。模様の類は紙を四つ折又は八つ折にして置いて切りぬいてから紙をひらくと其処にシムメトリイが出来るわけである。そういう模様に中々おもしろいのがある。はじめは一枚の紙で一枚を作る単色のものであつたが、後にはだんだん色調の配合、色量の均衡、布置の比例等に微妙な神経がはたらいて来て紙は一個のカムバスとなつた。十二単衣(ひとへ)に於ける色襲(がさ)ねの美を見るように、一枚の切抜きを又一枚の別のいろ紙の上に貼(は)りつけ、その色の調和や対照に妙味尽きないものが出来るようになつた。或は同色を襲ねたり、或は近似の色で構成したり、或は鋏で線だけ切つて切りぬかずに置いたり、いろいろの技巧をこらした。此の切りぬかずに置いて、其を別の紙の上に貼つたのは、下の紙の色がちらちらと上の紙の線の間に見えて不可言の美を作る。智恵子は触目のものを手あたり次第に題材にした。食膳が出ると其の皿の上のものを紙でつくらないうちは箸(はし)をとらず、そのため食事が遅れて看護婦さんを困らした事も多かつたらしい。千数百枚に及ぶ此等の切抜絵はすべて智恵子の詩であり、抒情であり、機智であり、生活記録であり、此世への愛の表明である。此を私に見せる時の智恵子の恥かしそうなうれしそうな顔が忘れられない。"]}, {"no": 30, "title": "注文の多い料理店", "author": "宮沢 賢治", "category": "日本文学-児童-童話", "chars": 5768, "volume": "中", "paras": ["二人の若い紳士(しんし)が、すっかりイギリスの兵隊のかたちをして、ぴかぴかする鉄砲(てっぽう)をかついで、白熊(しろくま)のような犬を二｜疋(ひき)つれて、だいぶ山奥(やまおく)の、木の葉のかさかさしたとこを、こんなことを云(い)いながら、あるいておりました。", "「ぜんたい、ここらの山は怪(け)しからんね。鳥も獣(けもの)も一疋も居やがらん。なんでも構わないから、早くタンタアーンと、やって見たいもんだなあ。」", "「鹿(しか)の黄いろな横っ腹なんぞに、二三発お見舞(みまい)もうしたら、ずいぶん痛快だろうねえ。くるくるまわって、それからどたっと倒(たお)れるだろうねえ。」", "それはだいぶの山奥でした。案内してきた専門の鉄砲打ちも、ちょっとまごついて、どこかへ行ってしまったくらいの山奥でした。", "それに、あんまり山が物凄(ものすご)いので、その白熊のような犬が、二疋いっしょにめまいを起こして、しばらく吠(うな)って、それから泡(あわ)を吐(は)いて死んでしまいました。", "「じつにぼくは、二千四百円の損害だ」と一人の紳士が、その犬の眼(ま)ぶたを、ちょっとかえしてみて言いました。", "「ぼくは二千八百円の損害だ。」と、もひとりが、くやしそうに、あたまをまげて言いました。", "はじめの紳士は、すこし顔いろを悪くして、じっと、もひとりの紳士の、顔つきを見ながら云いました。", "「ぼくはもう戻(もど)ろうとおもう。」", "「さあ、ぼくもちょうど寒くはなったし腹は空(す)いてきたし戻ろうとおもう。」", "「そいじゃ、これで切りあげよう。なあに戻りに、昨日(きのう)の宿屋で、山鳥を拾円(じゅうえん)も買って帰ればいい。」", "「兎(うさぎ)もでていたねえ。そうすれば結局おんなじこった。では帰ろうじゃないか」", "ところがどうも困ったことは、どっちへ行けば戻れるのか、いっこうに見当がつかなくなっていました。", "風がどうと吹(ふ)いてきて、草はざわざわ、木の葉はかさかさ、木はごとんごとんと鳴りました。", "「どうも腹が空いた。さっきから横っ腹が痛くてたまらないんだ。」", "「ぼくもそうだ。もうあんまりあるきたくないな。」", "「あるきたくないよ。ああ困ったなあ、何かたべたいなあ。」", "「喰(た)べたいもんだなあ」", "二人の紳士は、ざわざわ鳴るすすきの中で、こんなことを云いました。", "その時ふとうしろを見ますと、立派な一軒(いっけん)の西洋造りの家がありました。", "そして玄関(げんかん)には", "RESTAURANT", "西洋料理店", "WILDCAT HOUSE", "山猫軒", "という札がでていました。", "「君、ちょうどいい。ここはこれでなかなか開けてるんだ。入ろうじゃないか」", "「おや、こんなとこにおかしいね。しかしとにかく何か食事ができるんだろう」", "「もちろんできるさ。看板にそう書いてあるじゃないか」", "「はいろうじゃないか。ぼくはもう何か喰べたくて倒れそうなんだ。」", "二人は玄関に立ちました。玄関は白い瀬戸(せと)の煉瓦(れんが)で組んで、実に立派なもんです。", "そして硝子(がらす)の開き戸がたって、そこに金文字でこう書いてありました。", "「どなたもどうかお入りください。決してご遠慮(えんりょ)はありません」", "二人はそこで、ひどくよろこんで言いました。", "「こいつはどうだ、やっぱり世の中はうまくできてるねえ、きょう一日なんぎしたけれど、こんどはこんないいこともある。このうちは料理店だけれどもただでご馳走(ちそう)するんだぜ。」", "「どうもそうらしい。決してご遠慮はありませんというのはその意味だ。」", "二人は戸を押(お)して、なかへ入りました。そこはすぐ廊下(ろうか)になっていました。その硝子戸の裏側には、金文字でこうなっていました。", "「ことに肥(ふと)ったお方や若いお方は、大歓迎(だいかんげい)いたします」", "二人は大歓迎というので、もう大よろこびです。", "「君、ぼくらは大歓迎にあたっているのだ。」", "「ぼくらは両方兼ねてるから」", "ずんずん廊下を進んで行きますと、こんどは水いろのペンキ塗(ぬ)りの扉(と)がありました。", "「どうも変な家(うち)だ。どうしてこんなにたくさん戸があるのだろう。」", "「これはロシア式だ。寒いとこや山の中はみんなこうさ。」", "そして二人はその扉をあけようとしますと、上に黄いろな字でこう書いてありました。", "「当軒は注文の多い料理店ですからどうかそこはご承知ください」", "「なかなかはやってるんだ。こんな山の中で。」", "「それあそうだ。見たまえ、東京の大きな料理屋だって大通りにはすくないだろう」", "二人は云いながら、その扉をあけました。するとその裏側に、", "「注文はずいぶん多いでしょうがどうか一々こらえて下さい。」", "「これはぜんたいどういうんだ。」ひとりの紳士は顔をしかめました。", "「うん、これはきっと注文があまり多くて支度(したく)が手間取るけれどもごめん下さいと斯(こ)ういうことだ。」", "「そうだろう。早くどこか室(へや)の中にはいりたいもんだな。」", "「そしてテーブルに座(すわ)りたいもんだな。」", "ところがどうもうるさいことは、また扉が一つありました。そしてそのわきに鏡がかかって、その下には長い柄(え)のついたブラシが置いてあったのです。", "扉には赤い字で、", "「お客さまがた、ここで髪(かみ)をきちんとして、それからはきもの", "の泥(どろ)を落してください。」", "と書いてありました。", "「これはどうも尤(もっと)もだ。僕もさっき玄関で、山のなかだとおもって見くびったんだよ」", "「作法の厳しい家だ。きっとよほど偉(えら)い人たちが、たびたび来るんだ。」", "そこで二人は、きれいに髪をけずって、靴(くつ)の泥を落しました。", "そしたら、どうです。ブラシを板の上に置くや否(いな)や、そいつがぼうっとかすんで無くなって、風がどうっと室の中に入ってきました。", "二人はびっくりして、互(たがい)によりそって、扉をがたんと開けて、次の室へ入って行きました。早く何か暖いものでもたべて、元気をつけて置かないと、もう途方(とほう)もないことになってしまうと、二人とも思ったのでした。", "扉の内側に、また変なことが書いてありました。", "「鉄砲と弾丸(たま)をここへ置いてください。」", "見るとすぐ横に黒い台がありました。", "「なるほど、鉄砲を持ってものを食うという法はない。」", "「いや、よほど偉いひとが始終来ているんだ。」", "二人は鉄砲をはずし、帯皮を解いて、それを台の上に置きました。", "また黒い扉がありました。", "「どうか帽子(ぼうし)と外套(がいとう)と靴をおとり下さい。」", "「どうだ、とるか。」", "「仕方ない、とろう。たしかによっぽどえらいひとなんだ。奥に来ているのは」", "二人は帽子とオーバーコートを釘(くぎ)にかけ、靴をぬいでぺたぺたあるいて扉の中にはいりました。", "扉の裏側には、", "「ネクタイピン、カフスボタン、眼鏡(めがね)、財布(さいふ)、その他金物類、", "ことに尖(とが)ったものは、みんなここに置いてください」", "と書いてありました。扉のすぐ横には黒塗りの立派な金庫も、ちゃんと口を開けて置いてありました。鍵(かぎ)まで添(そ)えてあったのです。", "「ははあ、何かの料理に電気をつかうと見えるね。金気(かなけ)のものはあぶない。ことに尖ったものはあぶないと斯(こ)う云うんだろう。」", "「そうだろう。して見ると勘定(かんじょう)は帰りにここで払(はら)うのだろうか。」", "「どうもそうらしい。」", "「そうだ。きっと。」", "二人はめがねをはずしたり、カフスボタンをとったり、みんな金庫のなかに入れて、ぱちんと錠(じょう)をかけました。", "すこし行きますとまた扉(と)があって、その前に硝子(がらす)の壺(つぼ)が一つありました。扉には斯(こ)う書いてありました。", "「壺のなかのクリームを顔や手足にすっかり塗ってください。」", "みるとたしかに壺のなかのものは牛乳のクリームでした。", "「クリームをぬれというのはどういうんだ。」", "「これはね、外がひじょうに寒いだろう。室(へや)のなかがあんまり暖いとひびがきれるから、その予防なんだ。どうも奥には、よほどえらいひとがきている。こんなとこで、案外ぼくらは、貴族とちかづきになるかも知れないよ。」", "二人は壺のクリームを、顔に塗って手に塗ってそれから靴下をぬいで足に塗りました。それでもまだ残っていましたから、それは二人ともめいめいこっそり顔へ塗るふりをしながら喰べました。", "それから大急ぎで扉をあけますと、その裏側には、", "「クリームをよく塗りましたか、耳にもよく塗りましたか、」", "と書いてあって、ちいさなクリームの壺がここにも置いてありました。", "「そうそう、ぼくは耳には塗らなかった。あぶなく耳にひびを切らすとこだった。ここの主人はじつに用意｜周到(しゅうとう)だね。」", "「ああ、細かいとこまでよく気がつくよ。ところでぼくは早く何か喰べたいんだが、どうも斯うどこまでも廊下じゃ仕方ないね。」", "するとすぐその前に次の戸がありました。", "「料理はもうすぐできます。", "十五分とお待たせはいたしません。", "すぐたべられます。", "早くあなたの頭に瓶(びん)の中の香水をよく振(ふ)りかけてください。」", "そして戸の前には金ピカの香水の瓶が置いてありました。", "二人はその香水を、頭へぱちゃぱちゃ振りかけました。", "ところがその香水は、どうも酢(す)のような匂(におい)がするのでした。", "「この香水はへんに酢くさい。どうしたんだろう。」", "「まちがえたんだ。下女が風邪(かぜ)でも引いてまちがえて入れたんだ。」", "二人は扉をあけて中にはいりました。", "扉の裏側には、大きな字で斯う書いてありました。", "「いろいろ注文が多くてうるさかったでしょう。お気の毒でした。", "もうこれだけです。どうかからだ中に、壺の中の塩をたくさん", "よくもみ込んでください。」", "なるほど立派な青い瀬戸の塩壺は置いてありましたが、こんどというこんどは二人ともぎょっとしてお互にクリームをたくさん塗った顔を見合せました。", "「どうもおかしいぜ。」", "「ぼくもおかしいとおもう。」", "「沢山(たくさん)の注文というのは、向うがこっちへ注文してるんだよ。」", "「だからさ、西洋料理店というのは、ぼくの考えるところでは、西洋料理を、来た人にたべさせるのではなくて、来た人を西洋料理にして、食べてやる家(うち)とこういうことなんだ。これは、その、つ、つ、つ、つまり、ぼ、ぼ、ぼくらが……。」がたがたがたがた、ふるえだしてもうものが言えませんでした。", "「その、ぼ、ぼくらが、……うわあ。」がたがたがたがたふるえだして、もうものが言えませんでした。", "「遁(に)げ……。」がたがたしながら一人の紳士はうしろの戸を押(お)そうとしましたが、どうです、戸はもう一分(いちぶ)も動きませんでした。", "奥の方にはまだ一枚扉があって、大きなかぎ穴が二つつき、銀いろのホークとナイフの形が切りだしてあって、", "「いや、わざわざご苦労です。", "大へん結構にできました。", "さあさあおなかにおはいりください。」", "と書いてありました。おまけにかぎ穴からはきょろきょろ二つの青い眼玉(めだま)がこっちをのぞいています。", "「うわあ。」がたがたがたがた。", "「うわあ。」がたがたがたがた。", "ふたりは泣き出しました。", "すると戸の中では、こそこそこんなことを云っています。", "「だめだよ。もう気がついたよ。塩をもみこまないようだよ。」", "「あたりまえさ。親分の書きようがまずいんだ。あすこへ、いろいろ注文が多くてうるさかったでしょう、お気の毒でしたなんて、間抜(まぬ)けたことを書いたもんだ。」", "「どっちでもいいよ。どうせぼくらには、骨も分けて呉(く)れやしないんだ。」", "「それはそうだ。けれどももしここへあいつらがはいって来なかったら、それはぼくらの責任だぜ。」", "「呼ぼうか、呼ぼう。おい、お客さん方、早くいらっしゃい。いらっしゃい。いらっしゃい。お皿(さら)も洗ってありますし、菜っ葉ももうよく塩でもんで置きました。あとはあなたがたと、菜っ葉をうまくとりあわせて、まっ白なお皿にのせるだけです。はやくいらっしゃい。」", "「へい、いらっしゃい、いらっしゃい。それともサラドはお嫌(きら)いですか。そんならこれから火を起してフライにしてあげましょうか。とにかくはやくいらっしゃい。」", "二人はあんまり心を痛めたために、顔がまるでくしゃくしゃの紙屑(かみくず)のようになり、お互にその顔を見合せ、ぶるぶるふるえ、声もなく泣きました。", "中ではふっふっとわらってまた叫(さけ)んでいます。", "「いらっしゃい、いらっしゃい。そんなに泣いては折角(せっかく)のクリームが流れるじゃありませんか。へい、ただいま。じきもってまいります。さあ、早くいらっしゃい。」", "「早くいらっしゃい。親方がもうナフキンをかけて、ナイフをもって、舌なめずりして、お客さま方を待っていられます。」", "二人は泣いて泣いて泣いて泣いて泣きました。", "そのときうしろからいきなり、", "「わん、わん、ぐゎあ。」という声がして、あの白熊(しろくま)のような犬が二｜疋(ひき)、扉(と)をつきやぶって室(へや)の中に飛び込んできました。鍵穴(かぎあな)の眼玉はたちまちなくなり、犬どもはううとうなってしばらく室の中をくるくる廻(まわ)っていましたが、また一声", "「わん。」と高く吠(ほ)えて、いきなり次の扉に飛びつきました。戸はがたりとひらき、犬どもは吸い込まれるように飛んで行きました。", "その扉の向うのまっくらやみのなかで、", "「にゃあお、くゎあ、ごろごろ。」という声がして、それからがさがさ鳴りました。", "室はけむりのように消え、二人は寒さにぶるぶるふるえて、草の中に立っていました。", "見ると、上着や靴(くつ)や財布(さいふ)やネクタイピンは、あっちの枝(えだ)にぶらさがったり、こっちの根もとにちらばったりしています。風がどうと吹(ふ)いてきて、草はざわざわ、木の葉はかさかさ、木はごとんごとんと鳴りました。", "犬がふうとうなって戻(もど)ってきました。", "そしてうしろからは、", "「旦那(だんな)あ、旦那あ、」と叫ぶものがあります。", "二人は俄(にわ)かに元気がついて", "「おおい、おおい、ここだぞ、早く来い。」と叫びました。", "簔帽子(みのぼうし)をかぶった専門の猟師(りょうし)が、草をざわざわ分けてやってきました。", "そこで二人はやっと安心しました。", "そして猟師のもってきた団子(だんご)をたべ、途中(とちゅう)で十円だけ山鳥を買って東京に帰りました。", "しかし、さっき一ぺん紙くずのようになった二人の顔だけは、東京に帰っても、お湯にはいっても、もう　もとのとおりになおりませんでした。"]}, {"no": 31, "title": "ツェねずみ", "author": "宮沢 賢治", "category": "日本文学-児童-童話", "chars": 4986, "volume": "小", "paras": ["ある古い家の、まっくらな天井裏に、「ツェ」という名まえのねずみがすんでいました。", "ある日ツェねずみは、きょろきょろ四方を見まわしながら、床下街道（ゆかしたかいどう）を歩いていますと、向こうからいたちが、何かいいものをたくさんもって、風のように走って参りました。そしてツェねずみを見て、ちょっとたちどまって早口に言いました。", "「おい、ツェねずみ。お前んとこの戸棚（とだな）の穴から、金米糖（こんぺいとう）がばらばらこぼれているぜ。早く行ってひろいな。」", "ツェねずみは、もうひげもぴくぴくするくらいよろこんで、いたちにはお礼も言わずに、いっさんにそっちへ走って行きました。ところが戸棚の下まで来たとき、いきなり足がチクリとしました。そして、「止まれ、だれかっ。」と言う小さな鋭い声がします。", "ツェねずみはびっくりしてよく見ますと、それは蟻（あり）でした。蟻の兵隊は、もう金米糖のまわりに四重の非常線を張って、みんな黒いまさかりをふりかざしています。二三十匹は金米糖を片っぱしから砕いたり、とかしたりして、巣へはこぶしたくです。ツェねずみはぶるぶるふるえてしまいました。", "「ここから内へはいってならん。早く帰れ。帰れ、帰れ。」蟻の特務曹長（とくむそうちょう）が、低い太い声で言いました。", "ねずみはくるっと一つまわって、いちもくさんに天井裏へかけあがりました。そして巣の中へはいって、しばらくねころんでいましたが、どうもおもしろくなくて、おもしろくなくて、たまりません。蟻（あり）はまあ兵隊だし、強いからしかたもないが、あのおとなしいいたちめに教えられて、戸棚（とだな）の下まで走って行って蟻（あり）の曹長（そうちょう）にけんつくを食うとは、なんたるしゃくにさわることだとツェねずみは考えました。そこでねずみは巣からまたちょろちょろはい出して、木小屋の奥のいたちの家にやって参りました。", "いたちはちょうど、とうもろこしのつぶを、歯でこつこつかんで粉にしていましたが、ツェねずみを見て言いました。", "「どうだ。金米糖がなかったかい。」", "「いたちさん。ずいぶんお前もひどい人だね。私（わたし）のような弱いものをだますなんて。」", "「だましゃせん。たしかにあったのや。」", "「あるにはあっても、もう蟻が来てましたよ。」", "「蟻が、へい。そうかい。早いやつらだね。」", "「みんな蟻がとってしまいましたよ。私のような弱いものをだますなんて、償（まど）うてください。償うてください。」", "「それはしかたない。お前の行きようが少しおそかったのや。」", "「知らん、知らん。私のような弱いものをだまして。償うてください。償うてください。」", "「困ったやつだな。ひとの親切をさかさまにうらむとは。よしよし。そんならおれの金米糖をやろう。」", "「償うてください。償うてください。」", "「えい、それ。持って行け。てめえの持てるだけ持ってうせちまえ。てめえみたいな、ぐにゃぐにゃした男らしくもねえやつは、つらも見たくねえ。早く持てるだけ持ってどっかへうせろ。」いたちはプリプリして、金米糖を投げ出しました。ツェねずみはそれを持てるだけたくさんひろって、おじぎをしました。いたちはいよいよおこって叫びました。", "「えい、早く行ってしまえ。てめえの取った、のこりなんかうじむしにでもくれてやらあ。」", "ツェねずみは、いちもくさんに走って、天井裏の巣へもどって、金米糖をコチコチ食べました。", "こんなぐあいですから、ツェねずみはだんだんきらわれて、たれもあんまり相手にしなくなりました。そこでツェねずみはしかたなしに、こんどは、柱だの、こわれたちりとりだの、バケツだの、ほうきだのと交際をはじめました。中でも柱とは、いちばん仲よくしていました。", "柱がある日、ツェねずみに言いました。", "「ツェねずみさん、もうじき冬になるね。ぼくらはまたかわいてミリミリ言わなくちゃならない。お前さんも今のうちに、いい夜具のしたくをしておいた方がいいだろう。幸いぼくのすぐ頭の上に、すずめが春持って来た鳥の毛やいろいろ暖かいものがたくさんあるから、いまのうちに、すこしおろして運んでおいたらどうだい。僕（ぼく）の頭は、まあ少し寒くなるけれど、僕は僕でまたくふうをするから。」", "ツェねずみはもっともと思いましたので、さっそく、その日から運び方にかかりました。", "ところが、途中に急な坂が一つありましたので、ねずみは三度目に、そこからストンところげ落ちました。", "柱もびっくりして、", "「ねずみさん、けがはないかい。けがはないかい。」と一生けん命、からだを曲げながら言いました。ねずみはやっと起き上がって、それからかおをひどくしかめながら言いました。", "「柱さん。お前もずいぶんひどい人だ。僕のような弱いものをこんな目にあわすなんて。」", "柱はいかにも申しわけがないと思ったので、", "「ねずみさん、すまなかった。ゆるしてください。」と一生けん命わびました。", "ツェねずみは図にのって、", "「許してくれもないじゃないか。お前さえあんなこしゃくなさしずをしなければ、私はこんな痛い目にもあわなかったんだよ。償（まど）っておくれ。償っておくれ。さあ、償っておくれよ。」", "「そんなことを言ったって困るじゃありませんか。許してくださいよ。」", "「いいや、弱いものをいじめるのは私はきらいなんだから、償っておくれ。償っておくれ。さあ、償っておくれ。」", "柱は困ってしまって、おいおい泣きました。そこでねずみも、しかたなく、巣へかえりました。それからは、柱はもうこわがって、ねずみに口をききませんでした。", "さてそののちのことですが、ちりとりはある日、ツェねずみに半分になった最中（もなか）を一つやりました。するとちょうどその次の日、ツェねずみはおなかが痛くなりました。さあ、いつものとおりツェねずみは、まどっておくれを百ばかりも、ちりとりに言いました。ちりとりもあきれて、もうねずみとの交際はやめました。", "また、そののちのことですが、ある日バケツはツェねずみに、せんたくソーダのかけらをすこしやって、", "「これで毎朝お顔をお洗いなさい。」と言いましたら、ねずみはよろこんで次の日から、毎日それで顔を洗っていましたが、そのうちにねずみのおひげが十本ばかり抜けました。さあツェねずみは、さっそくバケツへやって来て、償（まど）っておくれ償っておくれを、二百五十ばかり言いました。しかしあいにくバケツにはおひげもありませんでしたし、償うわけにも行かず、すっかり参ってしまって、泣いてあやまりました。そして、もうそれからは、ちょっとも口をききませんでした。", "道具仲間は、みんな順ぐりにこんなめにあって、こりてしまいましたので、ついにはだれもツェねずみの顔を見るといそいでわきの方を向いてしまうのでした。", "ところがその道具仲間に、ただ一人だけ、まだツェねずみとつきあってみないものがありました。", "それは針がねを編んでこさえたねずみ捕（と）りでした。", "ねずみ捕りは全体、人間の味方なはずですが、ちかごろは、どうも毎日の新聞にさえ、猫（ねこ）といっしょにお払い物という札をつけた絵にまでして、広告されるのですし、そうでなくても、元来人間は、この針金のねずみ捕りを、一ぺんも優待したことはありませんでした。ええ、それはもうたしかにありませんとも。それに、さもさわるのさえきたないようにみんなから思われています。それですから実は、ねずみ捕りは人間よりはねずみの方に、よけい同情があるのです。けれども、たいていのねずみはなかなかこわがって、そばへやって参りません。ねずみ捕りは、毎日やさしい声で、", "「ねずちゃん、おいで。今夜のごちそうはあじのおつむだよ。お前さんの食べる間、わたしはしっかり押えておいてあげるから。ね、安心しておいで。入り口をパタンとしめるようなそんなことをするもんかね。わたしも人間にはもうこりこりしてるんだから。おいでよ。そら。」", "なんてねずみを呼びかけますが、ねずみはみんな、", "「へん、うまく言ってらあ。」とか、", "「へい、へい。よくわかりましてございます。いずれ、おやじや、せがれとも相談の上で。」とか言ってそろそろ逃げて行ってしまいます。", "そして朝になると、顔のまっ赤（か）な下男（げなん）が来て見て、", "「またはいらない。ねずみももう知ってるんだな。ねずみの学校で教えるんだな。しかしまあもう一日だけかけてみよう。」と言いながら、新しいえさととりかえるのでした。", "今夜も、ねずみ捕りは叫びました。", "「おいでおいで。今夜はやわらかな半ぺんだよ。えさだけあげるよ。大丈夫さ。早くおいで。」", "ツェねずみが、ちょうど通りかかりました。そして、", "「おや、ねずみ捕りさん、ほんとうにえさだけをくださるんですか。」と言いました。", "「おや、お前は珍しいねずみだね。そうだよ。えさだけあげるんだよ。そら、早くお食べ。」", "ツェねずみはプイッと中にはいって、むちゃむちゃむちゃっと半ぺんを食べて、またプイッと外へ出て言いました。", "「おいしかったよ。ありがとう。」", "「そうかい。よかったね。またあすの晩おいで。」", "次の朝、下男が来て見ておこって言いました。", "「えい。えさだけとって行きやがった。ずるいねずみだな。しかしとにかく中にはいったというのは感心だ。そら、きょうは鰯（いわし）だぞ。」", "そして鰯を半分つけて行きました。", "ねずみ捕りは、鰯をひっかけて、せっかくツェねずみの来るのを待っていました。", "夜になって、ツェねずみはすぐ出て来ました。そしていかにも恩に着せたように、", "「今晩は、お約束どおり来てあげましたよ。」と言いました。", "ねずみ捕りは少しむっとしたが、無理にこらえて、", "「さあ、食べなさい。」とだけ言いました。", "ツェねずみはプイッとはいって、ピチャピチャピチャッと食べて、またプイッと出て来て、それから大風（おおふう）に言いました。", "「じゃ、あした、また、来て食べてあげるからね。」", "「ブウ。」とねずみ捕りは答えました。", "次の朝、下男が来て見て、ますますおこって言いました。", "「えい。ずるいねずみだ。しかし、毎晩、そんなにうまくえさだけ取られるはずがない。どうも、このねずみ捕りめは、ねずみからわいろをもらったらしいぞ。」", "「もらわん。もらわん。あんまり人を見そこなうな。」とねずみ捕りはどなりましたが、もちろん、下男の耳には聞こえません。きょうも腐った半ぺんをくっつけていきました。", "ねずみ捕りは、とんだ疑いを受けたので、一日ぷんぷんおこっていました。夜になりました。ツェねずみが出て来て、さも大儀（たいぎ）らしく言いました。", "「あああ、毎日ここまでやって来るのも、並みたいていのこっちゃない。それにごちそうといったら、せいぜい魚（さかな）の頭だ。いやになっちまう。しかしまあ、せっかく来たんだからしかたない。食ってやるとしようか。ねずみ捕りさん。今晩は。」", "ねずみ捕りは、はりがねをぷりぷりさせておこっていましたので、ただ一こと、", "「お食べ。」と言いました。ツェねずみはすぐプイッと飛びこみましたが、半ぺんのくさっているのを見て、おこって叫びました、。", "「ねずみとりさん。あんまりひどいや。この半ぺんはくさってます。僕のような弱いものをだますなんて、あんまりだ。償（まど）ってください。償ってください。」", "ねずみ捕りは、思わず、はり金をりゅうりゅうと鳴らすくらい、おこってしまいました。そのりゅうりゅうが悪かったのです。", "「ピシャッ。シインン。」えさについていたかぎがはずれて、ねずみ捕りの入り口が閉じてしまいました。さあもうたいへんです。", "ツェねずみはきちがいのようになって、", "「ねずみ捕りさん。ひどいや。ひどいや。うう、くやしい。ねずみ捕りさん。あんまりだ。」と言いながら、はりがねをかじるやら、くるくるまわるやら、地だんだふむやら、わめくやら、泣くやら、それはそれは大さわぎです。それでも、償ってください、償ってくださいは、もう言う力がありませんでした。", "ねずみ捕りの方も、痛いやら、しゃくにさわるやら、ガタガタ、ブルブル、リュウリュウとふるえました。一晩そうやってとうとう朝になりました。", "顔のまっ赤（か）な下男が来て見て、こおどりして言いました。", "「しめた。しめた。とうとう、かかった。意地の悪そうなねずみだな。さあ、出て来い。こぞう。」"]}, {"no": 32, "title": "手袋を買いに", "author": "新美　南吉", "category": "日本文学-児童-童話", "chars": 3729, "volume": "小", "paras": ["寒い冬が北方から、狐(きつね)の親子の棲(す)んでいる森へもやって来ました。", "或朝(あるあさ)洞穴(ほらあな)から子供の狐が出ようとしましたが、", "「あっ」と叫んで眼(め)を抑(おさ)えながら母さん狐のところへころげて来ました。", "「母ちゃん、眼に何か刺さった、ぬいて頂戴(ちょうだい)早く早く」と言いました。", "母さん狐がびっくりして、あわてふためきながら、眼を抑えている子供の手を恐る恐るとりのけて見ましたが、何も刺さってはいませんでした。母さん狐は洞穴の入口から外へ出て始めてわけが解(わか)りました。昨夜のうちに、真白な雪がどっさり降ったのです。その雪の上からお陽(ひ)さまがキラキラと照(てら)していたので、雪は眩(まぶ)しいほど反射していたのです。雪を知らなかった子供の狐は、あまり強い反射をうけたので、眼に何か刺さったと思ったのでした。", "子供の狐は遊びに行きました。真綿(まわた)のように柔(やわら)かい雪の上を駈(か)け廻(まわ)ると、雪の粉(こ)が、しぶきのように飛び散って小さい虹(にじ)がすっと映るのでした。", "すると突然、うしろで、", "「どたどた、ざーっ」と物凄(ものすご)い音がして、パン粉のような粉雪(こなゆき)が、ふわーっと子狐におっかぶさって来ました。子狐はびっくりして、雪の中にころがるようにして十｜米(メートル)も向こうへ逃げました。何だろうと思ってふり返って見ましたが何もいませんでした。それは樅(もみ)の枝から雪がなだれ落ちたのでした。まだ枝と枝の間から白い絹糸のように雪がこぼれていました。", "間もなく洞穴へ帰って来た子狐は、", "「お母ちゃん、お手々が冷たい、お手々がちんちんする」と言って、濡(ぬ)れて牡丹色(ぼたんいろ)になった両手を母さん狐の前にさしだしました。母さん狐は、その手に、は――っと息をふっかけて、ぬくとい母さんの手でやんわり包んでやりながら、", "「もうすぐ暖(あたたか)くなるよ、雪をさわると、すぐ暖くなるもんだよ」といいましたが、かあいい坊やの手に霜焼(しもやけ)ができてはかわいそうだから、夜になったら、町まで行って、坊(ぼう)やのお手々にあうような毛糸の手袋を買ってやろうと思いました。", "暗い暗い夜が風呂敷(ふろしき)のような影をひろげて野原や森を包みにやって来ましたが、雪はあまり白いので、包んでも包んでも白く浮びあがっていました。", "親子の銀狐は洞穴から出ました。子供の方はお母さんのお腹(なか)の下へはいりこんで、そこからまんまるな眼をぱちぱちさせながら、あっちやこっちを見ながら歩いて行きました。", "やがて、行手(ゆくて)にぽっつりあかりが一つ見え始めました。それを子供の狐が見つけて、", "「母ちゃん、お星さまは、あんな低いところにも落ちてるのねえ」とききました。", "「あれはお星さまじゃないのよ」と言って、その時母さん狐の足はすくんでしまいました。", "「あれは町の灯(ひ)なんだよ」", "その町の灯を見た時、母さん狐は、ある時町へお友達と出かけて行って、とんだめにあったことを思出(おもいだ)しました。およしなさいっていうのもきかないで、お友達の狐が、或(あ)る家の家鴨(あひる)を盗もうとしたので、お百姓(ひゃくしょう)に見つかって、さんざ追いまくられて、命からがら逃げたことでした。", "「母ちゃん何してんの、早く行こうよ」と子供の狐がお腹の下から言うのでしたが、母さん狐はどうしても足がすすまないのでした。そこで、しかたがないので、坊(ぼう)やだけを一人で町まで行かせることになりました。", "「坊やお手々を片方お出し」とお母さん狐がいいました。その手を、母さん狐はしばらく握っている間に、可愛いい人間の子供の手にしてしまいました。坊やの狐はその手をひろげたり握ったり、抓(つね)って見たり、嗅(か)いで見たりしました。", "「何だか変だな母ちゃん、これなあに？」と言って、雪あかりに、またその、人間の手に変えられてしまった自分の手をしげしげと見つめました。", "「それは人間の手よ。いいかい坊や、町へ行ったらね、たくさん人間の家があるからね、まず表に円(まる)いシャッポの看板のかかっている家を探(さが)すんだよ。それが見つかったらね、トントンと戸を叩(たた)いて、今晩はって言うんだよ。そうするとね、中から人間が、すこうし戸をあけるからね、その戸の隙間(すきま)から、こっちの手、ほらこの人間の手をさし入れてね、この手にちょうどいい手袋頂戴って言うんだよ、わかったね、決して、こっちのお手々を出しちゃ駄目(だめ)よ」と母さん狐は言いきかせました。", "「どうして？」と坊やの狐はききかえしました。", "「人間はね、相手が狐だと解ると、手袋を売ってくれないんだよ、それどころか、掴(つか)まえて檻(おり)の中へ入れちゃうんだよ、人間ってほんとに恐(こわ)いものなんだよ」", "「ふーん」", "「決して、こっちの手を出しちゃいけないよ、こっちの方、ほら人間の手の方をさしだすんだよ」と言って、母さんの狐は、持って来た二つの白銅貨(はくどうか)を、人間の手の方へ握らせてやりました。", "子供の狐は、町の灯(ひ)を目あてに、雪あかりの野原をよちよちやって行きました。始めのうちは一つきりだった灯が二つになり三つになり、はては十にもふえました。狐の子供はそれを見て、灯には、星と同じように、赤いのや黄いのや青いのがあるんだなと思いました。やがて町にはいりましたが通りの家々はもうみんな戸を閉(し)めてしまって、高い窓から暖かそうな光が、道の雪の上に落ちているばかりでした。", "けれど表の看板の上には大てい小さな電燈がともっていましたので、狐の子は、それを見ながら、帽子屋を探して行きました。自転車の看板や、眼鏡(めがね)の看板やその他いろんな看板が、あるものは、新しいペンキで画(か)かれ、或(あ)るものは、古い壁のようにはげていましたが、町に始めて出て来た子狐にはそれらのものがいったい何であるか分らないのでした。", "とうとう帽子屋がみつかりました。お母さんが道々よく教えてくれた、黒い大きなシルクハットの帽子の看板が、青い電燈に照(てら)されてかかっていました。", "子狐は教えられた通り、トントンと戸を叩きました。", "「今晩は」", "すると、中では何かことこと音がしていましたがやがて、戸が一寸ほどゴロリとあいて、光の帯が道の白い雪の上に長く伸びました。", "子狐はその光がまばゆかったので、めんくらって、まちがった方の手を、――お母さまが出しちゃいけないと言ってよく聞かせた方の手をすきまからさしこんでしまいました。", "「このお手々にちょうどいい手袋下さい」", "すると帽子屋さんは、おやおやと思いました。狐の手です。狐の手が手袋をくれと言うのです。これはきっと木(こ)の葉(は)で買いに来たんだなと思いました。そこで、", "「先にお金を下さい」と言いました。子狐はすなおに、握って来た白銅貨を二つ帽子屋さんに渡しました。帽子屋さんはそれを人差指(ひとさしゆび)のさきにのっけて、カチ合せて見ると、チンチンとよい音がしましたので、これは木の葉じゃない、ほんとのお金だと思いましたので、棚(たな)から子供用の毛糸の手袋をとり出して来て子狐の手に持たせてやりました。子狐は、お礼を言ってまた、もと来た道を帰り始めました。", "「お母さんは、人間は恐ろしいものだって仰有(おっしゃ)ったがちっとも恐ろしくないや。だって僕の手を見てもどうもしなかったもの」と思いました。けれど子狐はいったい人間なんてどんなものか見たいと思いました。", "ある窓の下を通りかかると、人間の声がしていました。何というやさしい、何という美しい、何と言うおっとりした声なんでしょう。", "「ねむれ　ねむれ", "母の胸に、", "ねむれ　ねむれ", "母の手に――」", "子狐はその唄声(うたごえ)は、きっと人間のお母さんの声にちがいないと思いました。だって、子狐が眠る時にも、やっぱり母さん狐は、あんなやさしい声でゆすぶってくれるからです。", "するとこんどは、子供の声がしました。", "「母ちゃん、こんな寒い夜は、森の子狐は寒い寒いって啼(な)いてるでしょうね」", "すると母さんの声が、", "「森の子狐もお母さん狐のお唄をきいて、洞穴(ほらあな)の中で眠ろうとしているでしょうね。さあ坊やも早くねんねしなさい。森の子狐と坊やとどっちが早くねんねするか、きっと坊やの方が早くねんねしますよ」", "それをきくと子狐は急にお母さんが恋しくなって、お母さん狐の待っている方へ跳(と)んで行きました。", "お母さん狐は、心配しながら、坊やの狐の帰って来るのを、今か今かとふるえながら待っていましたので、坊やが来ると、暖(あたたか)い胸に抱きしめて泣きたいほどよろこびました。", "二匹の狐は森の方へ帰って行きました。月が出たので、狐の毛なみが銀色に光り、その足あとには、コバルトの影がたまりました。", "「母ちゃん、人間ってちっとも恐(こわ)かないや」", "「どうして？」", "「坊、間違えてほんとうのお手々出しちゃったの。でも帽子屋さん、掴(つか)まえやしなかったもの。ちゃんとこんないい暖い手袋くれたもの」", "と言って手袋のはまった両手をパンパンやって見せました。お母さん狐は、", "「まあ！」とあきれましたが、「ほんとうに人間はいいものかしら。ほんとうに人間はいいものかしら」とつぶやきました。"]}, {"no": 33, "title": "遠野物語", "author": "柳田 国男", "category": "その他", "chars": 45734, "volume": "大", "paras": ["この書を外国にある人々に呈す", "この話はすべて遠野（とおの）の人佐々木鏡石君より聞きたり。昨（さく）明治四十二年の二月ごろより始めて夜分おりおり訪（たず）ね来（き）たりこの話をせられしを筆記せしなり。鏡石君は話上手（はなしじょうず）にはあらざれども誠実なる人なり。自分もまた一字一句をも加減（かげん）せず感じたるままを書きたり。思うに遠野　郷（ごう）にはこの類の物語なお数百件あるならん。我々はより多くを聞かんことを切望す。国内の山村にして遠野よりさらに物深き所にはまた無数の山神山人の伝説あるべし。願わくはこれを語りて平地人を戦慄せしめよ。この書のごときは陳勝呉広（ちんしょうごこう）のみ。", "昨年八月の末自分は遠野郷に遊びたり。花巻（はなまき）より十余里の路上には町場（まちば）三箇所あり。その他はただ青き山と原野なり。人煙の希少（きしょう）なること北海道　石狩（いしかり）の平野よりも甚（はなは）だし。あるいは新道なるが故に民居の来たり就（つ）ける者少なきか。遠野の城下はすなわち煙花の街なり。馬を駅亭の主人に借りて独（ひと）り郊外の村々を巡（めぐ）りたり。その馬は黔（くろ）き海草をもって作りたる厚総（あつぶさ）を掛（か）けたり。虻（あぶ）多きためなり。猿（さる）ヶ　石（いし）の渓谷は土　肥（こ）えてよく拓（ひら）けたり。路傍に石塔の多きこと諸国その比を知らず。高処より展望すれば早稲（わせ）まさに熟し晩稲（ばんとう）は花盛（はなざか）りにて水はことごとく落ちて川にあり。稲の色合（いろあ）いは種類によりてさまざまなり。三つ四つ五つの田を続けて稲の色の同じきはすなわち一家に属する田にしていわゆる名処（みょうしょ）の同じきなるべし。小字（こあざ）よりさらに小さき区域の地名は持主にあらざればこれを知らず。古き売買譲与の証文には常に見ゆる所なり。付馬牛（つくもうし）の谷へ越ゆれば早池峯（はやちね）の山は淡く霞（かす）み山の形は菅笠（すげがさ）のごとくまた片仮名（かたかな）のへの字に似たり。この谷は稲熟することさらに遅く満目一色に青し。細き田中の道を行けば名を知らぬ鳥ありて雛（ひな）を連（つ）れて横ぎりたり。雛の色は黒に白き羽まじりたり。始めは小さき鶏かと思いしが溝（みぞ）の草に隠れて見えざればすなわち野鳥なることを知れり。天神の山には祭ありて獅子踊（ししおどり）あり。ここにのみは軽く塵（ちり）たち紅（あか）き物いささかひらめきて一村の緑に映じたり。獅子踊というは鹿（しか）の舞（まい）なり。鹿の角（つの）をつけたる面を被（かぶ）り童子五六人剣を抜きてこれとともに舞うなり。笛の調子高く歌は低くして側（かたわら）にあれども聞きがたし。日は傾きて風吹き酔いて人呼ぶ者の声も淋（さび）しく女は笑い児（こ）は走れどもなお旅愁をいかんともする能（あた）わざりき。盂蘭盆（うらぼん）に新しき仏ある家は紅白の旗を高く揚（あ）げて魂（たましい）を招く風（ふう）あり。峠（とうげ）の馬上において東西を指点するにこの旗十数所あり。村人の永住の地を去らんとする者とかりそめに入りこみたる旅人とまたかの悠々（ゆうゆう）たる霊山とを黄昏（たぞがれ）は徐（おもむろ）に来たりて包容し尽したり。遠野郷には八箇所の観音堂あり。一木をもって作りしなり。この日　報賽（ほうさい）の徒多く岡の上に灯火見え伏鉦（ふせがね）の音聞えたり。道ちがえの叢（くさむら）の中には雨風祭（あめかぜまつり）の藁人形（わらにんぎょう）あり。あたかもくたびれたる人のごとく仰臥（ぎょうが）してありたり。以上は自分が遠野郷にてえたる印象なり。", "思うにこの類の書物は少なくも現代の流行にあらず。いかに印刷が容易なればとてこんな本を出版し自己の狭隘（きょうあい）なる趣味をもって他人に強（し）いんとするは無作法（ぶさほう）の仕業（しわざ）なりという人あらん。されどあえて答う。かかる話を聞きかかる処（ところ）を見てきてのちこれを人に語りたがらざる者　果（はた）してありゃ。そのような沈黙にしてかつ慎（つつし）み深き人は少なくも自分の友人の中にはあることなし。いわんやわが九百年前の先輩（せんぱい）『今昔物語』のごときはその当時にありてすでに今は昔の話なりしに反しこれはこれ目前のでき事なり。たとえ敬虔（けいけん）の意と誠実の態度とにおいてはあえて彼を凌（しの）ぐことを得（う）という能わざらんも人の耳を経（ふ）ること多からず人の口と筆とを倩（やと）いたることはなはだ僅（わずか）なりし点においては彼の淡泊無邪気なる大納言殿（だいなごんどの）かえって来たり聴くに値せり。近代の御伽百物語（おとぎひゃくものがたり）の徒に至りてはその志（こころざし）やすでに陋（ろう）かつ決してその談の盲誕（もうたん）にあらざることを誓いえず。窃（ひそか）にもってこれと隣を比するを恥とせり。要するにこの書は現在の事実なり。単にこれのみをもってするも立派なる存在理由ありと信ず。ただ鏡石子は年わずかに二十四五自分もこれに十歳長ずるのみ。今の事業多き時代に生まれながら問題の大小をも弁（わきま）えず、その力を用いるところ当（とう）を失えりという人あらば如何（いかん）。明神の山の木兎（みみずく）のごとくあまりにその耳を先（とが）らしあまりにその眼を丸くし過ぎたりと責（せ）むる人あらば如何。はて是非もなし。この責任のみは自分が負わねばならぬなり。", "おきなさび飛ばず鳴かざるをちかたの森のふくろう笑うらんかも", "柳田国男", "題目", "地勢 一、五、六七、一一一", "神の始 二、六九、七四", "里の神 九八", "カクラサマ 七二―七四", "ゴンゲサマ 一一〇", "家の神 一六", "オクナイサマ 一四、一五、七〇", "オシラサマ 六九", "ザシキワラシ 一七、一八", "山の神 八九、九一、九三、一〇二、一〇七、一〇八", "神女 二七、五四", "天狗 二九、六二、九〇", "山男 五、六、七、九、二八、三〇、三一、九二", "山女 三、四、三四、三五、七五", "山の霊異 三二、三三、六一、九五", "仙人堂 四九", "蝦夷の跡 一一二", "塚と森と 六六、一一一、一一三、一一四", "姥（うば）神 六五、七一", "館（たて）の址 六七、六八、七六", "昔の人 八、一〇、一一、一二、二一、二六、八四", "家のさま 八〇、八三", "家の盛衰 一三、一八、一九、二四、二五、三八、六三", "マヨイガ 六三、六四", "前兆 二〇、五二、七八、九六", "魂の行方 二二、八六―八八、九五、九七、九九、一〇〇", "まぼろし 二三、七七、七九、八一、八二", "雪女 一〇三", "川童 五五―五九", "猿の経立（ふったち） 四五、四六", "猿 四七、四八", "狼（おいぬ） 三六―四二", "熊 四三", "狐 六〇、九四、一〇一", "色々の鳥 五一―五三", "花 三三、五〇", "小正月の行事 一四、一〇二―一〇五", "雨風祭 一〇九", "昔々 一一五―一一八", "歌謡 一一九", "一　　　　　　　　　　遠野郷（とおのごう）は今の陸中　上閉伊（かみへい）郡の西の半分、山々にて取り囲（かこ）まれたる平地なり。新町村（しんちょうそん）にては、遠野、土淵（つちぶち）、付馬牛（つくもうし）、松崎、青笹（あおざさ）、上郷（かみごう）、小友（おとも）、綾織（あやおり）、鱒沢（ますざわ）、宮守（みやもり）、達曽部（たっそべ）の一町十ヶ村に分かつ。近代あるいは西閉伊郡とも称し、中古にはまた遠野保（とおのほ）とも呼べり。今日郡役所のある遠野町はすなわち一郷の町場（まちば）にして、南部家（なんぶけ）一万石の城下なり。城を横田城（よこたじょう）ともいう。この地へ行くには花巻（はなまき）の停車場にて汽車を下（お）り、北上川（きたかみがわ）を渡り、その川の支流　猿（さる）ヶ　石川（いしがわ）の渓（たに）を伝（つた）いて、東の方へ入ること十三里、遠野の町に至る。山奥には珍しき繁華の地なり。伝えいう、遠野郷の地大昔はすべて一円の湖水なりしに、その水猿ヶ石川となりて人界に流れ出でしより、自然にかくのごとき邑落（ゆうらく）をなせしなりと。されば谷川のこの猿ヶ石に落合うもの甚（はなは）だ多く、俗に七内八崎（ななないやさき）ありと称す。内（ない）は沢または谷のことにて、奥州の地名には多くあり。", "○遠野郷のトー　　　　　　　　　　はもとアイヌ語の湖という語より出でたるなるべし、ナイ　　もアイヌ語なり。", "二　　　　　　　　　　　遠野の町は南北の川の落合（おちあい）にあり。以前は七七十里（しちしちじゅうり）とて、七つの渓谷おのおの七十里の奥より売買（ばいばい）の貨物を集（あっ）め、その市（いち）の日は馬千匹、人千人の賑（にぎ）わしさなりき。四方の山々の中に最も秀（ひい）でたるを早池峯（はやちね）という、北の方　付馬牛（つくもうし）の奥にあり。東の方には六角牛（ろっこうし）山立てり。石神（いしがみ）という山は付馬牛と達曽部（たっそべ）との間にありて、その高さ前の二つよりも劣（おと）れり。大昔に女神あり、三人の娘を伴（とも）ないてこの高原に来たり、今の来内（らいない）村の伊豆権現（いずごんげん）の社あるところに宿（やど）りし夜、今夜よき夢を見たらん娘によき山を与うべしと母の神の語りて寝たりしに、夜深く天より霊華（れいか）降（ふ）りて姉の姫（ひめ）の胸の上に止りしを、末の姫　眼覚（めさ）めて窃（ひそか）にこれを取り、わが胸の上に載せたりしかば、ついに最も美しき早池峯の山を得、姉たちは六角牛と石神とを得たり。若き三人の女神おのおの三の山に住し今もこれを領したもう故（ゆえ）に、遠野の女どもはその妬（ねたみ）を畏（おそ）れて今もこの山には遊ばずといえり。", "○この一里は小道すなわち坂東道（ばんどうみち）なり、一里が五丁または六丁なり。", "○タッソベ　もアイヌ語なるべし。岩手郡玉山村にも同じ大字（おおあざ）あり。", "○上郷村大字来内、ライナイもアイヌ語にてライ　は死のことナイ　は沢なり、水の静かなるよりの名か。", "三　　　　　　　　　　　山々の奥には山人住めり。栃内（とちない）村　和野（わの）の佐々木　嘉兵衛（かへえ）という人は今も七十余にて生存せり。この翁（おきな）若かりしころ猟をして山奥に入りしに、遥（はる）かなる岩の上に美しき女一人ありて、長き黒髪を梳（くしけず）りていたり。顔の色きわめて白し。不敵の男なれば直（ただち）に銃（つつ）を差し向けて打ち放せしに弾（たま）に応じて倒れたり。そこに馳（か）けつけて見れば、身のたけ高き女にて、解きたる黒髪はまたそのたけよりも長かりき。のちの験（しるし）にせばやと思いてその髪をいささか切り取り、これを綰（わが）ねて懐（ふところ）に入れ、やがて家路に向いしに、道の程にて耐（た）えがたく睡眠を催（もよお）しければ、しばらく物蔭（ものかげ）に立寄りてまどろみたり。その間　夢（ゆめ）と現（うつつ）との境のようなる時に、これもだけ（たけ）の高き男一人近よりて懐中に手を差し入れ、かの綰ねたる黒髪を取り返し立ち去ると見ればたちまち睡（ねむり）は覚めたり。山男なるべしといえり。", "○土淵村大字栃内。", "四　　　　　　　　　　　山口村の吉兵衛という家の主人、根子立（ねっこだち）という山に入り、笹（ささ）を苅（か）りて束（たば）となし担（かつ）ぎて立上らんとする時、笹原の上を風の吹き渡るに心づきて見れば、奥の方なる林の中より若き女の稚児（おさなご）を負（お）いたるが笹原の上を歩みてこの方へ来るなり。きわめてあでやかなる女にて、これも長き黒髪を垂れたり。児を結（ゆ）いつけたる紐（ひも）は藤の蔓（つる）にて、着（き）たる衣類は世の常の縞物（しまもの）なれど、裾（すそ）のあたりぼろぼろに破れたるを、いろいろの木の葉などを添えて綴（つづ）りたり。足は地に着（つ）くとも覚えず。事もなげにこの方に近より、男のすぐ前を通りて何方（いずかた）へか行き過ぎたり。この人はその折の怖（おそ）ろしさより煩（わずら）い始（はじ）めて、久しく病（や）みてありしが、近きころ亡（う）せたり。", "○土淵村大字山口、吉兵衛は代々の通称なればこの主人もまた吉兵衛ならん。", "五　　　　　　　　　　　遠野郷より海岸の田（た）ノ浜（はま）、吉利吉里（きりきり）などへ越ゆるには、昔より笛吹峠（ふえふきとうげ）という山路（やまみち）あり。山口村より六角牛（ろっこうし）の方へ入り路のりも近かりしかど、近年この峠を越ゆる者、山中にて必ず山男山女に出逢（であ）うより、誰もみな怖（おそ）ろしがりて次第に往来も希（まれ）になりしかば、ついに別の路を境木峠（さかいげとうげ）という方に開き、和山（わやま）を馬次場（うまつぎば）として今はこの方ばかりを越ゆるようになれり。二里以上の迂路（うろ）なり。", "○山口は六角牛に登る山口なれば村の名となれるなり。", "六　　　　　　　　　　　遠野郷にては豪農のことを今でも長者という。青笹村大字　糠前（ぬかのまえ）の長者の娘、ふと物に取り隠されて年久しくなりしに、同じ村の何某という猟師（りょうし）、ある（あ）る日山に入りて一人の女に遭（あ）う。怖ろしくなりてこれを撃たんとせしに、何おじではないか、ぶつなという。驚きてよく見れば彼（か）の長者がまな娘なり。なぜ（なにゆえ）にこんな処（ところ）にはおるぞと問えば、ある物に取られて今はその妻となれり。子もあまた生（う）みたれど、すべて夫（おっと）が食い尽（つく）して一人このごとくあり。おのれはこの地に一生涯を送ることなるべし。人にも言うな。御身も危うければ疾（と）く帰れというままに、その在所をも問い明（あき）らめずして遁（に）げ還（かえ）れりという。", "○糠の前は糠の森の前にある村なり、糠の森は諸国の糠塚と同じ。遠野郷にも糠森・糠塚多くあり。", "七　　　　　　　　　　　上郷村の民家の娘、栗（くり）を拾いに山に入りたるまま帰り来（き）たらず。家の者は死したるならんと思い、女のしたる枕（まくら）を形代（かたしろ）として葬式を執行（とりおこな）い、さて二三年を過ぎたり。しかるにその村の者猟をして五葉山（ごようざん）の腰のあたりに入りしに、大なる岩の覆（おお）いかかりて岩屈のようになれるところにて、図（はか）らずこの女に逢いたり。互いに打ち驚き、いかにしてかかる山にはおるかと問えば、女の曰（いわ）く、山に入りて恐ろしき人にさらわれ、こんなところに来たるなり。遁（に）げて帰らんと思えどいささか（いささか）の隙（すき）もなしとのことなり。その人はいかなる人かと問うに、自分には並（なみ）の人間と見ゆれど、ただだけ（たけ）きわめて高く眼の色少し凄（すご）しと思わる。子供も幾人か生みたれど、我に似ざれば我子にはあらずといいて食（くら）うにや殺すにや、みないずれへか持ち去りてしまうなりという。まことに我々と同じ人間かと押し返して問えば、衣類なども世の常なれど、ただ眼の色少しちがえり。一市間（ひといちあい）に一度か二度、同じようなる人四五人集まりきて、何事か話をなし、やがて何方（どちら）へか出て行くなり。食物など外より持ち来たるを見れば町へも出ることならん。かく言ううちにも今にそこへ帰って来るかも知れずという故、猟師も怖ろしくなりて帰りたりといえり。二十年ばかりも以前のことかと思わる。", "○一市間は遠野の町の市の日と次の市の日の間なり。月六度の市なれば一市間はすなわち五日のことなり。", "八　　　　　　　　　　　黄昏（たそがれ）に女や子供の家の外に出ている者はよく神隠（かみかく）しにあうことは他（よそ）の国々と同じ。松崎村の寒戸（さむと）というところの民家にて、若き娘　梨（なし）の樹（き）の下に草履（ぞうり）を脱（ぬ）ぎ置きたるまま行方（ゆくえ）を知らずなり、三十年あまり過ぎたりしに、ある日親類知音の人々その家に集（あっ）まりてありしところへ、きわめて老いさらぼいてその女帰り来
