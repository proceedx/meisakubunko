<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>声で聴ける日本文学館</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  background: #0f0e17; color: #fffffe; min-height: 100vh;
}
.screen { display: none; flex-direction: column; min-height: 100vh; }
.screen.active { display: flex; }

/* ===== TOP ===== */
.top-hero {
  background: linear-gradient(135deg, #0f0e17 0%, #1a1a3e 50%, #0f3460 100%);
  padding: 40px 20px 30px; text-align: center;
}
.top-logo { font-size: 36px; margin-bottom: 10px; }
.top-title { font-size: 22px; font-weight: 900; color: #fffffe; margin-bottom: 6px; letter-spacing: .05em; }
.top-sub { font-size: 13px; color: #a7a9be; margin-bottom: 24px; }
.top-stats { display: flex; justify-content: center; gap: 24px; margin-bottom: 24px; }
.top-stat { text-align: center; }
.top-stat-n { font-size: 26px; font-weight: 900; color: #ff8906; }
.top-stat-l { font-size: 11px; color: #a7a9be; }

/* 検索 */
.search-wrap { padding: 0 16px 16px; background: linear-gradient(135deg, #0f0e17 0%, #1a1a3e 50%, #0f3460 100%); }
.search-box {
  display: flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px; padding: 10px 16px;
}
.search-box input {
  flex: 1; background: none; border: none; outline: none;
  color: #fffffe; font-size: 15px; font-family: inherit;
}
.search-box input::placeholder { color: #a7a9be; }
.search-icon { font-size: 18px; color: #a7a9be; }

/* カテゴリタブ */
.cat-tabs { display: flex; gap: 6px; padding: 12px 16px; overflow-x: auto; background: #0f0e17; border-bottom: 1px solid rgba(255,255,255,0.08); }
.cat-tabs::-webkit-scrollbar { display: none; }
.cat-tab {
  padding: 6px 14px; border-radius: 20px; border: none;
  font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap;
  font-family: inherit; transition: all .2s;
}
.cat-tab.active { background: #ff8906; color: #0f0e17; }
.cat-tab.inactive { background: rgba(255,255,255,0.08); color: #a7a9be; }

/* 作品リスト */
.novel-list { flex: 1; padding: 12px 16px 40px; }
.novel-card {
  display: flex; align-items: center; gap: 14px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px; padding: 14px 16px; margin-bottom: 10px;
  cursor: pointer; transition: all .2s;
}
.novel-card:active { transform: scale(.98); background: rgba(255,137,6,0.1); }
.novel-icon { font-size: 28px; flex-shrink: 0; }
.novel-info { flex: 1; min-width: 0; }
.novel-title { font-size: 15px; font-weight: 700; color: #fffffe; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.novel-author { font-size: 12px; color: #a7a9be; margin-bottom: 4px; }
.novel-meta { display: flex; gap: 6px; }
.novel-badge {
  font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 700;
}
.badge-s { background: rgba(78,204,163,0.2); color: #4ecca3; }
.badge-m { background: rgba(255,137,6,0.2); color: #ff8906; }
.badge-l { background: rgba(233,69,96,0.2); color: #e94560; }
.novel-progress { font-size: 10px; color: #a7a9be; margin-left: auto; flex-shrink: 0; }
.no-results { text-align: center; padding: 60px 20px; color: #a7a9be; font-size: 14px; }

/* ===== READING ===== */
.read-topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(15,14,23,0.97); backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  padding: 10px 16px;
}
.read-topbar-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.read-back { background: none; border: none; color: #ff8906; font-size: 13px; cursor: pointer; font-family: inherit; padding: 4px 0; }
.read-title-bar { font-size: 13px; color: #a7a9be; flex: 1; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0 8px; }
.prog-bg { height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg, #ff8906, #e94560); border-radius: 2px; transition: width .3s; width: 0%; }
.prog-txt { font-size: 10px; color: #555; text-align: right; margin-top: 2px; }

.novel-body { padding: 20px 20px 220px; max-width: 680px; margin: 0 auto; width: 100%; }
.para { line-height: 2.2; margin-bottom: 1.2em; border-radius: 6px; padding: 4px 6px; cursor: pointer; transition: background .15s; }
.para.reading { background: rgba(255,137,6,0.2); }

/* コントロール */
.ctrl { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15,14,23,0.98); backdrop-filter: blur(14px); border-top: 1px solid rgba(255,255,255,0.08); padding: 10px 16px 28px; }
.ctrl-slider-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.ctrl-lbl { font-size: 11px; color: #666; white-space: nowrap; width: 50px; }
.ctrl-val { font-size: 13px; font-weight: 700; color: #ff8906; width: 38px; text-align: right; }
.ctrl-range { flex: 1; accent-color: #ff8906; cursor: pointer; }
.ctrl-btns { display: flex; gap: 8px; }
.ctrl-btn {
  flex: 1; padding: 11px 6px; border-radius: 10px; border: none;
  font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .15s;
}
.ctrl-btn:active { transform: scale(.96); }
.cb-play { background: linear-gradient(90deg, #ff8906, #e94560); color: #fff; }
.cb-rew { background: rgba(255,255,255,0.07); color: #a7a9be; font-size: 12px; }
.cb-exit { background: rgba(255,255,255,0.07); color: #a7a9be; }

/* ===== END ===== */
.end-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 40px 24px; text-align: center; }
.end-icon { font-size: 56px; margin-bottom: 16px; }
.end-title { font-size: 22px; font-weight: 900; margin-bottom: 8px; }
.end-sub { font-size: 14px; color: #a7a9be; margin-bottom: 36px; }
.end-btn { display: block; width: 100%; max-width: 320px; margin: 0 auto 12px; padding: 14px; border-radius: 12px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }
.eb-p { background: linear-gradient(90deg, #ff8906, #e94560); color: #fff; }
.eb-s { background: rgba(255,255,255,0.08); color: #ccc; }
</style>
</head>
<body>

<!-- TOP -->
<div id="screen-top" class="screen active">
  <div class="top-hero">
    <div class="top-logo">📚</div>
    <div class="top-title">声で聴ける日本文学館</div>
    <div class="top-sub">名作54作品 ｜ 読み上げ・速読トレーニング</div>
    <div class="top-stats">
      <div class="top-stat"><div class="top-stat-n">54</div><div class="top-stat-l">作品</div></div>
      <div class="top-stat"><div class="top-stat-n" id="s-authors">-</div><div class="top-stat-l">作家</div></div>
      <div class="top-stat"><div class="top-stat-n" id="s-read">0</div><div class="top-stat-l">読了</div></div>
    </div>
  </div>
  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="作品名・作家名で検索…" oninput="filterNovels()">
    </div>
  </div>
  <div class="cat-tabs" id="cat-tabs"></div>
  <div class="novel-list" id="novel-list"></div>
</div>

<!-- READING -->
<div id="screen-read" class="screen">
  <div class="read-topbar">
    <div class="read-topbar-row">
      <button class="read-back" onclick="exitRead()">← 一覧</button>
      <div class="read-title-bar" id="read-title-bar"></div>
      <div style="width:48px;"></div>
    </div>
    <div class="prog-bg"><div class="prog-fill" id="prog-fill"></div></div>
    <div class="prog-txt" id="prog-txt">0%</div>
  </div>
  <div class="novel-body" id="novel-body"></div>
  <div class="ctrl">
    <div class="ctrl-slider-row">
      <span class="ctrl-lbl">🔊 速度</span>
      <input type="range" class="ctrl-range" id="speed-range" min="0.5" max="3.0" step="0.1" value="1.0" oninput="onSpeed()">
      <span class="ctrl-val" id="speed-val">1.0x</span>
    </div>
    <div class="ctrl-slider-row">
      <span class="ctrl-lbl">🔤 文字</span>
      <input type="range" class="ctrl-range" id="font-range" min="13" max="30" step="1" value="17" oninput="onFont()">
      <span class="ctrl-val" id="font-val">17px</span>
    </div>
    <div class="ctrl-btns">
      <button class="ctrl-btn cb-rew" onclick="doRewind()">◀ 戻る</button>
      <button class="ctrl-btn cb-play" id="play-btn" onclick="togglePlay()">▶ 読み上げ</button>
      <button class="ctrl-btn cb-exit" onclick="exitRead()">⏹ 終了</button>
    </div>
  </div>
</div>

<!-- END -->
<div id="screen-end" class="screen">
  <div class="end-wrap">
    <div class="end-icon">🎉</div>
    <div class="end-title">読了しました！</div>
    <div class="end-sub" id="end-sub"></div>
    <button class="end-btn eb-p" onclick="retryRead()">もう一度読む</button>
    <button class="end-btn eb-s" onclick="showTop()">一覧へ戻る</button>
  </div>
</div>

<script>
const NOVELS = [{"no": 1, "title": "あたらしい憲法のはなし", "author": "文科省", "category": "その他", "chars": 20578, "volume": "大", "paras": ["一　憲法", "みなさん、あたらしい憲法ができました。そうして昭和二十二年五月三日から、私たち日本国民は、この憲法を守ってゆくことになりました。このあたらしい憲法をこしらえるために、たくさんの人々が、たいへん苦心をなさいました。ところでみなさんは、憲法というものはどんなものかごぞんじですか。じぶんの身にかゝわりのないことのようにおもっている人はないでしょうか。もしそうならば、それは大きなまちがいです。", "国の仕事は、一日も休むことはできません。また、国を治めてゆく仕事のやりかたは、はっきりときめておかなければなりません。そのためには、いろいろ規則がいるのです。この規則はたくさんありますが、そのうちで、いちばん大事な規則が憲法です。", "国をどういうふうに治め、国の仕事をどういうふうにやってゆくかということをきめた、いちばん根本になっている規則が憲法です。もしみなさんの家の柱がなくなったとしたらどうでしょう。家はたちまちたおれてしまうでしょう。いま国を家にたとえると、ちょうど柱にあたるものが憲法です。もし憲法がなければ、国の中におおぜいの人がいても、どうして国を治めてゆくかということがわかりません。それでどこの国でも、憲法をいちばん大事な規則として、これをたいせつに守ってゆくのです。国でいちばん大事な規則は、いいかえれば、いちばん高い位にある規則ですから、これを国の「最高法規」というのです。", "ところがこの憲法には、いまおはなししたように、国の仕事のやりかたのほかに、もう一つ大事なことが書いてあるのです。それは国民の権利のことです。この権利のことは、あとでくわしくおはなししますから、ここではただ、なぜそれが、国の仕事のやりかたをきめた規則と同じように大事であるか、ということだけをおはなししておきましょう。", "みなさんは日本国民のうちのひとりです。国民のひとりひとりが、かしこくなり、強くならなければ、国民ぜんたいがかしこく、また、強くなれません。国の力のもとは、ひとりひとりの国民にあります。そこで国は、この国民のひとりひとりの力をはっきりとみとめて、しっかりと守ってゆくのです。そのために、国民のひとりひとりに、いろいろ大事な権利があることを、憲法できめているのです。この国民の大事な権利のことを「基本的人権」というのです。これも憲法の中に書いてあるのです。", "そこでもういちど、憲法とはどういうものであるかということを申しておきます。憲法とは、国でいちばん大事な規則、すなわち「最高法規」というもので、その中には、だいたい二つのことが記されています。その一つは、国の治めかた、国の仕事のやりかたをきめた規則です。もう一つは、国民のいちばん大事な権利、すなわち「基本的人権」をきめた規則です。このほかにまた憲法は、その必要により、いろいろのことをきめることがあります。こんどの憲法にも、あとでおはなしするように、これからは戰爭をけっしてしないという、たいせつなことがきめられています。", "これまであった憲法は、明治二十二年にできたもので、これは明治天皇がおつくりになって、国民にあたえられたものです。しかし、こんどのあたらしい憲法は、日本国民がじぶんでつくったもので、日本国民ぜんたいの意見で、自由につくられたものであります。この国民ぜんたいの意見を知るために、昭和二十一年四月十日に総選挙が行われ、あたらしい国民の代表がえらばれて、その人々がこの憲法をつくったのです。それで、あたらしい憲法は、国民ぜんたいでつくったということになるのです。", "みなさんも日本国民のひとりです。そうすれば、この憲法は、みなさんのつくったものです。みなさんは、じぶんでつくったものを、大事になさるでしょう。こんどの憲法は、みなさんをふくめた国民ぜんたいのつくったものであり、国でいちばん大事な規則であるとするならば、みなさんは、国民のひとりとして、しっかりとこの憲法を守ってゆかなければなりません。そのためには、まずこの憲法に、どういうことが書いてあるかを、はっきりと知らなければなりません。", "みなさんが、何かゲームのために規則のようなものをきめるときに、みんないっしょに書いてしまっては、わかりにくい　　　わかりにくい」は底本では「わかりくい」］でしょう。国の規則もそれと同じで、一つ一つ事柄にしたがって分けて書き、それに番号をつけて、第何條、第何條というように順々に記します。こんどの憲法は、第一條から第百三條まであります。そうしてそのほかに、前書が、いちばんはじめにつけてあります。これを「前文」といいます。", "この前文には、だれがこの憲法をつくったかということや、どんな考えでこの憲法の規則ができているかということなどが記されています。この前文というものは、二つのはたらきをするのです。その一つは、みなさんが憲法をよんで、その意味を知ろうとするときに、手びきになることです。つまりこんどの憲法は、この前文に記されたような考えからできたものですから、前文にある考えと、ちがったふうに考えてはならないということです。もう一つのはたらきは、これからさき、この憲法をかえるときに、この前文に記された考え方と、ちがうようなかえかたをしてはならないということです。", "それなら、この前文の考えというのはなんでしょう。いちばん大事な考えが三つあります。それは、「民主主義」と「国際平和主義」と「主権在民主義」です。「主義」という言葉をつかうと、なんだかむずかしくきこえますけれども、少しもむずかしく考えることはありません。主義というのは、正しいと思う、もののやりかたのことです。それでみなさんは、この三つのことを知らなければなりません。まず「民主主義」からおはなししましょう。", "二　民主主義とは", "こんどの憲法の根本となっている考えの第一は民主主義です。ところで民主主義とは、いったいどういうことでしょう。みなさんはこのことばを、ほうぼうできいたでしょう。これがあたらしい憲法の根本になっているものとすれば、みなさんは、はっきりとこれを知っておかなければなりません。しかも正しく知っておかなければなりません。", "みなさんがおおぜいあつまって、いっしょに何かするときのことを考えてごらんなさい。だれの意見で物事をきめますか。もしもみんなの意見が同じなら、もんだいはありません。もし意見が分かれたときは、どうしますか。ひとりの意見できめますか。二人の意見できめますか。それともおゝぜいの意見できめますか。どれがよいでしょう。ひとりの意見が、正しくすぐれていて、おゝぜいの意見がまちがっておとっていることもあります。しかし、そのはんたいのことがもっと多いでしょう。そこで、まずみんなが十分にじぶんの考えをはなしあったあとで、おゝぜいの意見で物事をきめてゆくのが、いちばんまちがいがないということになります。そうして、あとの人は、このおゝぜいの人の意見に、すなおにしたがってゆくのがよいのです。このなるべくおゝぜいの人の意見で、物事をきめてゆくことが、民主主義のやりかたです。", "国を治めてゆくのもこれと同じです。わずかの人の意見で国を治めてゆくのは、よくないのです。国民ぜんたいの意見で、国を治めてゆくのがいちばんよいのです。つまり国民ぜんたいが、国を治めてゆく――これが民主主義の治めかたです。", "しかし国は、みなさんの学級とはちがいます。国民ぜんたいが、ひとところにあつまって、そうだんすることはできません。ひとりひとりの意見をきいてまわることもできません。そこで、みんなの代わりになって、国の仕事のやりかたをきめるものがなければなりません。それが国会です。国民が、国会の議員を選挙するのは、じぶんの代わりになって、国を治めてゆく者をえらぶのです。だから国会では、なんでも、国民の代わりである議員のおゝぜいの意見で物事をきめます。そうしてほかの議員は、これにしたがいます。これが国民ぜんたいの意見で物事をきめたことになるのです。これが民主主義です。ですから、民主主義とは、国民ぜんたいで、国を治めてゆくことです。みんなの意見で物事をきめてゆくのが、いちばんまちがいがすくないのです。だから民主主義で国を治めてゆけば、みなさんは幸福になり、また国もさかえてゆくでしょう。", "国は大きいので、このように国の仕事を国会の議員にまかせてきめてゆきますから、国会は国民の代わりになるものです。この「代わりになる」ということを「代表」といいます。まえに申しましたように、民主主義は、国民ぜんたいで国を治めてゆくことですが、国会が国民ぜんたいを代表して、国のことをきめてゆきますから、これを「代表制民主主義」のやりかたといいます。", "しかしいちばん大事なことは、国会にまかせておかないで、国民が、じぶんで意見をきめることがあります。こんどの憲法でも、たとえばこの憲法をかえるときは、国会だけできめないで、国民ひとりひとりが、賛成か反対かを投票してきめることになっています。このときは、国民が直接に国のことをきめますから、これを「直接民主主義」のやりかたといいます。あたらしい憲法は、代表制民主主義と直接民主主義と、二つのやりかたで国を治めてゆくことにしていますが、代表制民主主義のやりかたのほうが、おもになっていて、直接民主主義のやりかたは、いちばん大事なことにかぎられているのです。だからこんどの憲法は、だいたい代表制民主主義のやりかたになっているといってもよいのです。", "みなさんは日本国民のひとりです。しかしまだこどもです。国のことは、みなさんが二十歳になって、はじめてきめてゆくことができるのです。国会の議員をえらぶのも、国のことについて投票するのも、みなさんが二十歳になってはじめてできることです。みなさんのおにいさんや、おねえさんには、二十歳以上の方もおいででしょう。そのおにいさんやおねえさんが、選挙の投票にゆかれるのをみて、みなさんはどんな氣がしましたか。いまのうちに、よく勉強して、国を治めることや、憲法のことなどを、よく知っておいてください。もうすぐみなさんも、おにいさんやおねえさんといっしょに、国のことを、じぶんできめてゆくことができるのです。みなさんの考えとはたらきで国が治まってゆくのです。みんながなかよく、じぶんで、じぶんの国のことをやってゆくくらい、たのしいことはありません。これが民主主義というものです。", "三　国際平和主義", "国の中で、国民ぜんたいで、物事をきめてゆくことを、民主主義といいましたが、国民の意見は、人によってずいぶんちがっています。しかし、おおぜいのほうの意見に、すなおにしたがってゆき、またそのおおぜいのほうも、すくないほうの意見をよくきいてじぶんの意見をきめ、みんなが、なかよく国の仕事をやってゆくのでなければ、民主主義のやりかたは、なりたたないのです。", "これは、一つの国について申しましたが、国と国との間のことも同じことです。じぶんの国のことばかりを考え、じぶんの国のためばかりを考えて、ほかの国の立場を考えないでは、世界中の国が、なかよくしてゆくことはできません。世界中の国が、いくさをしないで、なかよくやってゆくことを、国際平和主義といいます。だから民主主義ということは、この国際平和主義と、たいへんふかい関係があるのです。こんどの憲法で民主主義のやりかたをきめたからには、またほかの国にたいしても国際平和主義でやってゆくということになるのは、あたりまえであります。この国際平和主義をわすれて、じぶんの国のことばかり考えていたので、とうとう戰爭をはじめてしまったのです。そこであたらしい憲法では、前文の中に、これからは、この国際平和主義でやってゆくということを、力強いことばで書いてあります。またこの考えが、あとでのべる戰爭の放棄、すなわち、これからは、いっさい、いくさはしないということをきめることになってゆくのであります。", "四　主権在民主義", "みなさんがあつまって、だれがいちばんえらいかをきめてごらんなさい。いったい「いちばんえらい」というのは、どういうことでしょう。勉強のよくできることでしょうか。それとも力の強いことでしょうか。いろいろきめかたがあってむずかしいことです。", "国を治めてゆく力のことを「主権」といいますが、この力が国民ぜんたいにあれば、これを「主権は国民にある」といいます。こんどの憲法は、いま申しましたように、民主主義を根本の考えとしていますから、主権は、とうぜん日本国民にあるわけです。そこで前文の中にも、また憲法の第一條にも、「主権が国民に存する」とはっきりかいてあるのです。主権が国民にあることを、「主権在民」といいます。あたらしい憲法は、主権在民という考えでできていますから、主権在民主義の憲法であるということになるのです。", "みなさんは、日本国民のひとりです。主権をもっている日本国民のひとりです。しかし、主権は日本国民ぜんたいにあるのです。ひとりひとりが、べつべつにもっているのではありません。ひとりひとりが、みなじぶんがいちばんえらいと思って、勝手なことをしてもよいということでは、けっしてありません。それは民主主義にあわないことになります。みなさんは、主権をもっている日本国民のひとりであるということに、ほこりをもつとともに、責任を感じなければなりません。よいこどもであるとともに、よい国民でなければなりません。", "五　天皇陛下", "こんどの戰爭で、天皇陛下は、たいへんごくろうをなさいました。なぜならば、古い憲法では、天皇をお助けして国の仕事をした人々は、国民ぜんたいがえらんだものでなかったので、国民の考えとはなれて、とうとう戰爭になったからです。そこで、これからさき国を治めてゆくについて、二度とこのようなことのないように、あたらしい憲法をこしらえるとき、たいへん苦心をいたしました。ですから、天皇は、憲法で定めたお仕事だけをされ、政治には関係されないことになりました。", "憲法は、天皇陛下を「象徴」としてゆくことにきめました。みなさんは、この象徴ということを、はっきり知らなければなりません。日の丸の国旗を見れば、日本の国をおもいだすでしょう。国旗が国の代わりになって、国をあらわすからです。みなさんの学校の記章を見れば、どこの学校の生徒かがわかるでしょう。記章が学校の代わりになって、学校をあらわすからです。いまこゝに何か眼に見えるものがあって、ほかの眼に見えないものの代わりになって、それをあらわすときに、これを「象徴」ということばでいいあらわすのです。こんどの憲法の第一條は、天皇陛下を「日本国の象徴」としているのです。つまり天皇陛下は、日本の国をあらわされるお方ということであります。", "また憲法第一條は、天皇陛下を「日本国民統合の象徴」であるとも書いてあるのです。「統合」というのは「一つにまとまっている」ということです。つまり天皇陛下は、一つにまとまった日本国民の象徴でいらっしゃいます。これは、私たち日本国民ぜんたいの中心としておいでになるお方ということなのです。それで天皇陛下は、日本国民ぜんたいをあらわされるのです。", "このような地位に天皇陛下をお置き申したのは、日本国民ぜんたいの考えにあるのです。これからさき、国を治めてゆく仕事は、みな国民がじぶんでやってゆかなければなりません。天皇陛下は、けっして神様ではありません。国民と同じような人間でいらっしゃいます。ラジオのほうそうもなさいました。小さな町のすみにもおいでになりました。ですから私たちは、天皇陛下を私たちのまん中にしっかりとお置きして、国を治めてゆくについてごくろうのないようにしなければなりません。これで憲法が天皇陛下を象徴とした意味がおわかりでしょう。", "六　戰爭の放棄", "みなさんの中には、こんどの戰爭に、おとうさんやにいさんを送りだされた人も多いでしょう。ごぶじにおかえりになったでしょうか。それともとうとうおかえりにならなかったでしょうか。また、くうしゅうで、家やうちの人を、なくされた人も多いでしょう。いまやっと戰爭はおわりました。二度とこんなおそろしい、かなしい思いをしたくないと思いませんか。こんな戰爭をして、日本の国はどんな利益があったでしょうか。何もありません。ただ、おそろしい、かなしいことが、たくさんおこっただけではありませんか。戰爭は人間をほろぼすことです。世の中のよいものをこわすことです。だから、こんどの戰爭をしかけた国には、大きな責任があるといわなければなりません。このまえの世界戰爭のあとでも、もう戰爭は二度とやるまいと、多くの国々ではいろいろ考えましたが、またこんな大戰爭をおこしてしまったのは、まことに残念なことではありませんか。", "そこでこんどの憲法では、日本の国が、けっして二度と戰爭をしないように、二つのことをきめました。その一つは、兵隊も軍艦も飛行機も、およそ戰爭をするためのものは、いっさいもたないということです。これからさき日本には、陸軍も海軍も空軍もないのです。これを戰力の放棄といいます。「放棄」とは「すててしまう」ということです。しかしみなさんは、けっして心ぼそく思うことはありません。日本は正しいことを、ほかの国よりさきに行ったのです。世の中に、正しいことぐらい強いものはありません。", "もう一つは、よその国と爭いごとがおこったとき、けっして戰爭によって、相手をまかして、じぶんのいいぶんをとおそうとしないということをきめたのです。おだやかにそうだんをして、きまりをつけようというのです。なぜならば、いくさをしかけることは、けっきょく、じぶんの国をほろぼすようなはめになるからです。また、戰爭とまでゆかずとも、国の力で、相手をおどすようなことは、いっさいしないことにきめたのです。これを戰爭の放棄というのです。そうしてよその国となかよくして、世界中の国が、よい友だちになってくれるようにすれば、日本の国は、さかえてゆけるのです。", "みなさん、あのおそろしい戰爭が、二度とおこらないように、また戰爭を二度とおこさないようにいたしましょう。", "七　基本的人権", "くうしゅうでやけたところへ行ってごらんなさい。やけたゞれた土から、もう草が青々とはえています。みんな生き生きとしげっています。草でさえも、力強く生きてゆくのです。ましてやみなさんは人間です。生きてゆく力があるはずです。天からさずかったしぜんの力があるのです。この力によって、人間が世の中に生きてゆくことを、だれもさまたげてはなりません。しかし人間は、草木とちがって、たゞ生きてゆくというだけではなく、人間らしい生活をしてゆかなければなりません。この人間らしい生活には、必要なものが二つあります。それは「自由」ということと、「平等」ということです。", "人間がこの世に生きてゆくからには、じぶんのすきな所に住み、じぶんのすきな所に行き、じぶんの思うことをいい、じぶんのすきな教えにしたがってゆけることなどが必要です。これらのことが人間の自由であって、この自由は、けっして奪われてはなりません。また、国の力でこの自由を取りあげ、やたらに刑罰を加えたりしてはなりません。そこで憲法は、この自由は、けっして侵すことのできないものであることをきめているのです。", "またわれわれは、人間である以上はみな同じです。人間の上に、もっとえらい人間があるはずはなく、人間の下に、もっといやしい人間があるわけはありません。男が女よりもすぐれ、女が男よりもおとっているということもありません。みな同じ人間であるならば、この世に生きてゆくのに、差別を受ける理由はないのです。差別のないことを「平等」といいます。そこで憲法は、自由といっしょに、この平等ということをきめているのです。", "国の規則の上で、何かはっきりとできることがみとめられていることを、「権利」といいます。自由と平等とがはっきりみとめられ、これを侵されないとするならば、この自由と平等とは、みなさんの権利です。これを「自由権」というのです。しかもこれは人間のいちばん大事な権利です。このいちばん大事な人間の権利のことを「基本的人権」といいます。あたらしい憲法は、この基本的人権を、侵すことのできない永久に與えられた権利として記しているのです。これを基本的人権を「保障する」というのです。", "しかし基本的人権は、こゝにいった自由権だけではありません。まだほかに二つあります。自由権だけで、人間の国の中での生活がすむものではありません。たとえばみなさんは、勉強をしてよい国民にならなければなりません。国はみなさんに勉強をさせるようにしなければなりません。そこでみなさんは、教育を受ける権利を憲法で與えられているのです。この場合はみなさんのほうから、国にたいして、教育をしてもらうことを請求できるのです。これも大事な基本的人権ですが、これを「請求権」というのです。爭いごとのおこったとき、国の裁判所で、公平にさばいてもらうのも、裁判を請求する権利といって、基本的人権ですが、これも請求権であります。", "それからまた、国民が、国を治めることにいろいろ関係できるのも、大事な基本的人権ですが、これを「参政権」といいます。国会の議員や知事や市町村長などを選挙したり、じぶんがそういうものになったり、国や地方の大事なことについて投票したりすることは、みな参政権です", "みなさん、いままで申しました基本的人権は大事なことですから、もういちど復習いたしましょう。みなさんは、憲法で基本的人権というりっぱな強い権利を與えられました。この権利は、三つに分かれます。第一は自由権です。第二は請求権です。第三は参政権です。", "こんなりっぱな権利を與えられましたからには、みなさんは、じぶんでしっかりとこれを守って、失わないようにしてゆかなければなりません。しかしまた、むやみにこれをふりまわして、ほかの人に迷惑をかけてはいけません。ほかの人も、みなさんと同じ権利をもっていることを、わすれてはなりません。国ぜんたいの幸福になるよう、この大事な基本的人権を守ってゆく責任があると、憲法に書いてあります。", "八　国会", "民主主義は、国民が、みんなでみんなのために国を治めてゆくことです。しかし、国民の数はたいへん多いのですから、だれかが、国民ぜんたいに代わって国の仕事をするよりほかはありません。この国民に代わるものが「国会」です。まえにも申しましたように、国民は国を治めてゆく力、すなわち主権をもっているのです。この主権をもっている国民に代わるものが国会ですから、国会は国でいちばん高い位にあるもので、これを「最高機関」といいます。「機関」というのは、ちょうど人間に手足があるように、国の仕事をいろいろ分けてする役目のあるものという意味です。国には、いろ／＼なはたらきをする機関があります。あとでのべる内閣も、裁判所も、みな国の機関です。しかし国会は、その中でいちばん高い位にあるのです。それは国民ぜんたいを代表しているからです。", "国の仕事はたいへん多いのですが、これを分けてみると、だいたい三つに分かれるのです。その第一は、国のいろいろの規則をこしらえる仕事で、これを「立法」というのです。第二は、爭いごとをさばいたり、罪があるかないかをきめる仕事で、これを「司法」というのです。ふつうに裁判といっているのはこれです。第三は、この「立法」と「司法」とをのぞいたいろいろの仕事で、これをひとまとめにして「行政」といいます。国会は、この三つのうち、どれをするかといえば、立法をうけもっている機関であります。司法は、裁判所がうけもっています。行政は、内閣と、その下にある、たくさんの役所がうけもっています。", "国会は、立法という仕事をうけもっていますから、国の規則はみな国会がこしらえるのです。国会のこしらえる国の規則を「法律」といいます。みなさんは、法律ということばをよくきくことがあるでしょう。しかし、国会で法律をこしらえるのには、いろ／＼手つづきがいりますから、あまりこま／″＼した規則までこしらえることはできません。そこで憲法は、ある場合には、国会でないほかの機関、たとえば内閣が、国の規則をこしらえることをゆるしています。これを「命令」といいます。", "しかし、国の規則は、なるべく国会でこしらえるのがよいのです。なぜならば、国会は、国民がえらんだ議員のあつまりで、国民の意見がいちばんよくわかっているからです。そこで、あたらしい憲法は、国の規則は、ただ国会だけがこしらえるということにしました。これを、国会は「唯一の立法機関である」というのです。「唯一」とは、ただ一つで、ほかにはないということです。立法機関とは、国の規則をこしらえる役目のある機関ということです。そうして、国会以外のほかの機関が、国の規則をこしらえてもよい場合は、憲法で、一つ一つきめているのです。また、国会のこしらえた国の規則、すなわち法律の中で、これこれのことは命令できめてもよろしいとゆるすこともあります。国民のえらんだ代表者が、国会で国民を治める規則をこしらえる、これが民主主義のたてまえであります。", "しかし国会には、国の規則をこしらえることのほかに、もう一つ大事な役目があります。それは、内閣や、その下にある、国のいろ／＼な役所の仕事のやりかたを、監督することです。これらの役所の仕事は、まえに申しました「行政」というはたらきですから、国会は、行政を監督して、まちがいのないようにする役目をしているのです。これで、国民の代表者が国の仕事を見はっていることになるのです。これも民主主義の国の治めかたであります。", "日本の国会は「衆議院」と「参議院」との二つからできています。その一つ一つを「議院」といいます。このように、国会が二つの議院からできているものを「二院制度」というのです。国によっては、一つの議院しかないものもあり、これを「一院制度」というのです。しかし、多くの国の国会は、二つの議院からできています。国の仕事はこの二つの議院がいっしょにきめるのです。", "なぜ二つの議院がいるのでしょう。みなさんは、野球や、そのほかのスポーツでいう「バック・アップ」ということをごぞんじですか。一人の選手が球を取りあつかっているとき、もう一人の選手が、うしろにまわって、まちがいのないように守ることを「バック・アップ」といいます。国会は、国の大事な仕事をするのですから、衆議院だけでは、まちがいが起るといけないから、参議院が「バック・アップ」するはたらきをするのです。たゞし、スポーツのほうでは、選手がおたがいに「バック・アップ」しますけれども、国会では、おもなはたらきをするのは衆議院であって、参議院は、たゞ衆議院を「バック・アップ」するだけのはたらきをするのです。したがって、衆議院のほうが、参議院よりも、強い力を與えられているのです。この強い力をもった衆議院を「第一院」といい、参議院を「第二院」といいます。なぜ衆議院のほうに強い力があるのでしょう。そのわけは次のとおりです。", "衆議院の選挙は、四年ごとに行われます。衆議院の議員は、四年間つとめるわけです。しかし、衆議院の考えが国民の考えを正しくあらわしていないと内閣が考えたときなどには、内閣は、国民の意見を知るために、いつでも天皇陛下に申しあげて、衆議院の選挙のやりなおしをしていただくことができます。これを衆議院の「解散」というのです。そうして、この解散のあとの選挙で、国民がどういう人をじぶんの代表にえらぶかということによって、国民のあたらしい意見が、あたらしい衆議院にあらわれてくるのです。", "参議院のほうは、議員が六年間つとめることになっており、三年ごとに半分ずつ選挙をして交代しますけれども、衆議院のように解散ということがありません。そうしてみると、衆議院のほうが、参議院よりも、その時、その時の国民の意見を、よくうつしているといわなければなりません。そこで衆議院のほうに、参議院よりも強い力が與えられているのです。どういうふうに衆議院の方が強い力をもっているかということは、憲法できめられていますが、ひと口でいうと、衆議院と参議院との意見がちがったときには、衆議院のほうの意見がとおるようになっているということです。", "しかし衆議院も参議院も、ともに国民ぜんたいの代表者ですから、その議員は、みな国民が国民の中からえらぶのです。衆議院のほうは、議員が四百六十六人、参議院のほうは二百五十人あります。この議員をえらぶために、国を「選挙区」というものに分けて、この選挙区に人口にしたがって議員の数をわりあてます。したがって選挙は、この選挙区ごとに、わりあてられた数だけの議員をえらんで出すことになります。", "議員を選挙するには、選挙の日に投票所へ行き、投票用紙を受け取り、じぶんのよいと思う人の名前を書きます。それから、その紙を折り、かぎのかゝった投票箱へ入れるのです。この投票は、ひじょうに大事な権利です。選挙する人は、みなじぶんの考えでだれに投票するかをきめなければなりません。けっして、品物や利益になる約束で説き伏せられてはなりません。この投票は、秘密投票といって、だれをえらんだかをいう義務もなく、ある人をえらんだ理由を問われても答える必要はありません。", "さて日本国民は、二十歳以上の人は、だれでも国会議員や知事市長などを選挙することができます。これを「選挙権」というのです。わが国では、ながいあいだ、男だけがこの選挙権をもっていました。また、財産をもっていて税金をおさめる人だけが、選挙権をもっていたこともありました。いまは、民主主義のやりかたで国を治めてゆくのですから、二十歳以上の人は、男も女もみんな選挙権をもっています。このように、国民がみな選挙権をもつことを、「普通選挙」といいます。こんどの憲法は、この普通選挙を、国民の大事な基本的人権としてみとめているのです。しかし、いくら普通選挙といっても、こどもや氣がくるった人まで選挙権をもつというわけではありませんが、とにかく男女人種の区別もなく、宗教や財産の上の区別もなく、みんながひとしく選挙権をもっているのです。", "また日本国民は、だれでも国会の議員などになることができます。男も女もみな議員になれるのです。これを「被選挙権」といいます。しかし、年齢が、選挙権のときと少しちがいます。衆議院議員になるには、二十五歳以上、参議院議員になるには、三十歳以上でなければなりません。この被選挙権の場合も、選挙権と同じように、だれが考えてもいけないと思われる者には、被選挙権がありません。国会議員になろうとする人は、じぶんでとどけでて、「候補者」というものになるのです。また、じぶんがよいと思うほかの人を、「候補者」としてとゞけでることもあります。これを候補者を「推薦する」といいます。", "この候補者をとゞけでるのは、選挙の日のまえにしめきってしまいます。投票をする人は、この候補者の中から、じぶんのよいと思う人をえらばなければなりません。ほかの人の名前を書いてはいけません。そうして、投票の数の多い候補者から、議員になれるのです。それを「当選する」といいます。", "みなさん、民主主義は、国民ぜんたいで国を治めてゆくことです。そうして国会は、国民ぜんたいの代表者です。それで、国会議員を選挙することは、国民の大事な権利で、また大事なつとめです。国民はぜひ選挙にでてゆかなければなりません。選挙にゆかないのは、この大事な権利をすててしまうことであり、また大事なつとめをおこたることです。選挙にゆかないことを、ふつう「棄権」といいます。これは、権利をすてるという意味です。国民は棄権してはなりません。みなさんも、いまにこの権利をもつことになりますから、選挙のことは、とくにくわしく書いておいたのです。", "国会は、このようにして、国民がえらんだ議員があつまって、国のことをきめるところですが、ほかの役所とちがって、国会で、議員が、国の仕事をしているありさまを、国民が知ることができるのです。国民はいつでも、国会へ行って、これを見たりきいたりすることができるのです。また、新聞やラジオにも国会のことがでます。", "つまり、国会での仕事は、国民の目の前で行われるのです。憲法は、国会はいつでも、国民に知れるようにして、仕事をしなければならないときめているのです。これはたいへん大事なことです。もし、まれな場合ですが秘密に会議を開こうとするときは、むずかしい手つゞきがいります。", "これで、どういうふうに国が治められてゆくのか、どんなことが国でおこっているのか、国民のえらんだ議員が、どんな意見を国会でのべているかというようなことが、みんな国民にわかるのです。", "国の仕事の正しい明かるいやりかたは、こゝからうまれてくるのです。国会がなくなれば、国の中がくらくなるのです。民主主義は明かるいやりかたです。国会は、民主主義にはなくてはならないものです。", "日本の国会は、年中開かれているものではありません。しかし、毎年一回はかならず開くことになっています。これを「常会」といいます。常会は百五十日間ときまっています。これを国会の「会期」といいます。このほかに、必要のあるときは、臨時に国会を開きます。これを「臨時会」といいます。また、衆議院が解散されたときは、解散の日から四十日以内に、選挙を行い、その選挙の日から三十日以内に、あたらしい国会が開かれます。これを「特別会」といいます。臨時会と特別会の会期は、国会がじぶんできめます。また国会の会期は、必要のあるときは、延ばすことができます。それも国会がじぶんできめるのです。国会を開くには、国会議員をよび集めなければなりません。これを、国会を「召集する」といって、天皇陛下がなさるのです。召集された国会は、じぶんで開いて仕事をはじめ、会期がおわれば、じぶんで国会を閉じて、国会は一時休むことになります。", "みなさん、国会の議事堂をごぞんじですか。あの白いうつくしい建物に、日の光りがさしているのをごらんなさい。あれは日本国民の力をあらわすところです。主権をもっている日本国民が国を治めてゆくところです。", "九　政党", "「政党」というのは、国を治めてゆくことについて、同じ意見をもっている人があつまってこしらえた團体のことです。みなさんは、社会党、民主党、自由党、国民協同党、共産党などという名前を、きいているでしょう。これらはみな政党です。政党は、国会の議員だけでこしらえているものではありません。政党からでている議員は、政党をこしらえている人の一部だけです。ですから、一つの政党があるということは、国の中に、それと同じ意見をもった人が、そうとうおゝぜいいるということになるのです。", "政党には、国を治めてゆくについてのきまった意見があって、これを国民に知らせています。国民の意見は、人によってずいぶんちがいますが、大きく分けてみると、この政党の意見のどれかになるのです。つまり政党は、国民ぜんたいが、国を治めてゆくについてもっている意見を、大きく色分けにしたものといってもよいのです。民主主義で国を治めてゆくには、国民ぜんたいが、みんな意見をはなしあって、きめてゆかなければなりません。政党がおたがいに国のことを議論しあうのはこのためです。", "日本には、この政党というものについて、まちがった考えがありました。それは、政党というものは、なんだか、国の中で、じぶんの意見をいいはっているいけないものだというような見方です。これはたいへんなまちがいです。民主主義のやりかたは、国の仕事について、国民が、おゝいに意見をはなしあってきめなければならないのですから、政党が爭うのは、けっしてけんかではありません。民主主義でやれば、かならず政党というものができるのです。また、政党がいるのです。政党はいくつあってもよいのです。政党の数だけ、国民の意見が、大きく分かれていると思えばよいのです。ドイツやイタリアでは政党をむりに一つにまとめてしまい、また日本でも、政党をやめてしまったことがありました。その結果はどうなりましたか。国民の意見が自由にきかれなくなって、個人の権利がふみにじられ、とうとうおそろしい戰爭をはじめるようになったではありませんか。", "国会の選挙のあるごとに、政党は、じぶんの團体から議員の候補者を出し、またじぶんの意見を国民に知らせて、国会でなるべくたくさんの議員をえようとします。衆議院は、参議院よりも大きな力をもっていますから、衆議院でいちばん多く議員を、じぶんの政党から出すことが必要です。それで衆議院の選挙は、政党にとっていちばん大事なことです。国民は、この政党の意見をよくしらべて、じぶんのよいと思う政党の候補者に投票すれば、じぶんの意見が、政党をとおして国会にとどくことになります。", "どの政党にもはいっていない人が、候補者になっていることもあります。国民は、このような候補者に投票することも、もちろん自由です。しかし政党には、きまった意見があり、それは国民に知らせてありますから、政党の候補者に投票をしておけば、その人が国会に出たときに、どういう意見をのべ、どういうふうにはたらくかということが、はっきりきまっています。もし政党の候補者でない人に投票したときは、その人が国会に出たとき、どういうようにはたらいてくれるかが、はっきりわからないふべんがあるのです。このようにして、選挙ごとに、衆議院に多くの議員をとった政党の意見で、国の仕事をやってゆくことになります。これは、いいかえれば、国民ぜんたいの中で、多いほうの意見で、国を治めてゆくことでもあります。", "みなさん、国民は、政党のことをよく知らなければなりません。じぶんのすきな政党にはいり、またじぶんたちですきな政党をつくるのは、国民の自由で、憲法は、これを「基本的人権」としてみとめています。だれもこれをさまたげることはできません。", "十　内閣", "「内閣」は、国の行政をうけもっている機関であります。行政ということは、まえに申しましたように、「立法」すなわち国の規則をこしらえることと、「司法」すなわち裁判をすることをのぞいたあとの、国の仕事をまとめていうのです。国会は、国民の代表になって、国を治めてゆく機関ですが、たくさんの議員でできているし、また一年中開いているわけにもゆきませんから、日常の仕事やこまごました仕事は、別に役所をこしらえて、こゝでとりあつかってゆきます。その役所のいちばん上にあるのが内閣です。", "内閣は、内閣総理大臣と国務大臣とからできています。「内閣総理大臣」は内閣の長で、内閣ぜんたいをまとめてゆく、大事な役目をするのです。それで、内閣総理大臣にだれがなるかということは、たいへん大事なことですが、こんどの　　　こんどの」は底本では「こんごの」］憲法は、内閣総理大臣は、国会の議員の中から、国会がきめて、天皇陛下に申しあげ、天皇陛下がこれをお命じになることになっています。国会できめるとき、衆議院と参議院の意見が分かれたときは、けっきょく衆議院の意見どおりにきめることになります。内閣総理大臣を国会できめるということは、衆議院でたくさんの議員をもっている政党の意見で、きまることになりますから、内閣総理大臣は、政党からでることになります。", "また、ほかの国務大臣は、内閣総理大臣が、自分でえらんで国務大臣にします。しかし、国務大臣の数の半分以上は、国会の議員からえらばなければなりません。国務大臣は国の行政をうけもつ役目がありますが、この国務大臣の中から、大蔵省、文部省、厚生省、商工省などの国の役所の長になって、その役所の仕事を分けてうけもつ人がきまります。これを「各省大臣」といいます。つまり国務大臣の中には、この各省大臣になる人と、たゞ国の仕事ぜんたいをみてゆく国務大臣とがあるわけです。内閣総理大臣が政党からでる以上、国務大臣もじぶんと同じ政党の人からとることが、国の仕事をやってゆく上にべんりでありますから、国務大臣の大部分が、同じ政党からでることになります。", "また、一つの政党だけでは、国会に自分の意見をとおすことができないと思ったときは、意見のちがうほかの政党と組んで内閣をつくります。このときは、それらの政党から、みな国務大臣がでて、いっしょに、国の仕事をすることになります。また政党の人でなくとも、国の仕事に明かるい人を、国務大臣に入れることもあります。しかし、民主主義のやりかたでは、けっきょく政党が内閣をつくることになり、政党から内閣総理大臣と国務大臣のおゝぜいがでることになるので、これを「政党内閣」というのです。", "内閣は、国の行政をうけもち、また、天皇陛下が国の仕事をなさるときには、これに意見を申しあげ、また、御同意を申します。そうしてじぶんのやったことについて、国民を代表する国会にたいして、責任を負うのです。これは、内閣総理大臣も、ほかの国務大臣も、みないっしょになって、責任を負うのです。ひとりひとりべつべつに責任を負うのではありません。これを「連帯して責任を負う」といいます。", "また国会のほうでも、内閣がわるいと思えば、いつでも「もう内閣を信用しない」ときめることができます。たゞこれは、衆議院だけができることで、参議院はできません。なぜならば、国民のその時々の意見がうつっているのは、衆議院であり、また、選挙のやり直しをして、内閣が、国民に、どっちがよいかをきめてもらうことができるのは、衆議院だけだからです。衆議院が内閣にたいして、「もう内閣を信用しない」ときめることを、「不信任決議」といいます。この不信任決議がきまったときは、内閣は天皇陛下に申しあげ、十日以内に衆議院を解散していただき、選挙のやり直しをして、国民にうったえてきめてもらうか、または辞職するかどちらかになります。また「内閣を信用する」ということ（これを「信任決議」といいます）が、衆議院で反対されて、だめになったときも同じことです。", "このようにこんどの憲法では、内閣は国会とむすびついて、国会の直接の力で動かされることになっており、国会の政党の勢力の変化で、かわってゆくのです。つまり内閣は、国会の支配の下にあることになりますから、これを「議院内閣制度」とよんでいます。民主主義と、政党内閣と、議院内閣とは、ふかい関係があるのです。", "十一　司法", "「司法」とは、爭いごとをさばいたり、罪があるかないかをきめることです。「裁判」というのも同じはたらきをさすのです。だれでも、じぶんの生命、自由、財産などを守るために、公平な裁判をしてもらうことができます。この司法という国の仕事は、国民にとってはたいへん大事なことで、何よりもまず、公平にさばいたり、きめたりすることがたいせつであります。そこで国には、「裁判所」というものがあって、この司法という仕事をうけもっているのです。", "裁判所は、その仕事をやってゆくについて、ただ憲法と国会のつくった法律とにしたがって、公平に裁判をしてゆくものであることを、憲法できめております。ほかからは、いっさい口出しをすることはできないのです。また、裁判をする役目をもっている人、すなわち「裁判官」は、みだりに役目を取りあげられないことになっているのです。これを「司法権の独立」といいます。また、裁判を公平にさせるために、裁判は、だれでも見たりきいたりすることができるのです。これは、国会と同じように、裁判所の仕事が国民の目の前で行われるということです。これも憲法ではっきりときめてあります。", "こんどの憲法で、ひじょうにかわったことを、一つ申しておきます。それは、裁判所は、国会でつくった法律が、憲法に合っているかどうかをしらべることができるようになったことです。もし法律が、憲法にきめてあることにちがっていると考えたときは、その法律にしたがわないことができるのです。だから裁判所は、たいへんおもい役目をすることになりました。", "みなさん、私たち国民は、国会を、じぶんの代わりをするものと思って、しんらいするとともに、裁判所を、じぶんたちの権利や自由を守ってくれるみかたと思って、そんけいしなければなりません。", "十二　財政", "みなさんの家に、それぞれくらしの立てかたがあるように、国にもくらしの立てかたがあります。これが国の「財政」です。国を治めてゆくのに、どれほど費用がかゝるか、その費用をどうしてとゝのえるか、とゝのえた費用をどういうふうにつかってゆくかというようなことは、みな国の財政です。国の費用は、国民が出さなければなりませんし、また、国の財政がうまくゆくかゆかないかは、たいへん大事なことですから、国民は、はっきりこれを知り、またよく監督してゆかなければなりません。", "そこで憲法では、国会が、国民に代わって、この監督の役目をすることにしています。この監督の方法はいろいろありますが、そのおもなものをいいますと、内閣は、毎年いくらお金がはいって、それをどういうふうにつかうかという見つもりを、国会に出して、きめてもらわなければなりません。それを「予算」といいます。また、つかった費用は、あとで計算して、また国会に出して、しらべてもらわなければなりません。これを「決算」といいます。国民から税金をとるには、国会に出して、きめてもらわなければなりません。内閣は、国会と国民にたいして、少なくとも毎年一回、国の財政が、どうなっているかを、知らさなければなりません。このような方法で、国の財政が、国民と国会とで監督されてゆくのです。", "また「会計檢査院」という役所があって、国の決算を檢査しています。", "十三　地方自治", "戰爭中は、なんでも「国のため」といって、国民のひとりひとりのことが、かるく考えられていました。しかし、国は国民のあつまりで、国民のひとり／＼がよくならなければ、国はよくなりません。それと同じように、日本の国は、たくさんの地方に分かれていますが、その地方が、それぞれさかえてゆかなければ、国はさかえてゆきません。そのためには、地方が、それぞれじぶんでじぶんのことを治めてゆくのが、いちばんよいのです。なぜならば、地方には、その地方のいろいろな事情があり、その地方に住んでいる人が、いちばんよくこれを知っているからです。じぶんでじぶんのことを自由にやってゆくことを「自治」といいます。それで国の地方ごとに、自治でやらせてゆくことを、「地方自治」というのです。", "こんどの憲法では、この地方自治ということをおもくみて、これをはっきりきめています。地方ごとに一つの團体になって、じぶんでじぶんの仕事をやってゆくのです。東京都、北海道、府県、市町村など、みなこの團体です。これを「地方公共團体」といいます。", "もし国の仕事のやりかたが、民主主義なら、地方公共團体の仕事のやりかたも、民主主義でなければなりません。地方公共團体は、国のひながたといってもよいでしょう。国に国会があるように、地方公共團体にも、その地方に住む人を代表する「議会」がなければなりません。また、地方公共團体の仕事をする知事や、その他のおもな役目の人も、地方公共團体の議会の議員も、みなその地方に住む人が、じぶんで選挙することに　　　選挙することに」は底本では「選挙すことに」］なりました。", "このように地方自治が、はっきり憲法でみとめられましたので、ある一つの地方公共團体だけのことをきめた法律を、国の国会でつくるには、その地方に住む人の意見をきくために、投票をして、その投票の半分以上の賛成がなければできないことになりました。", "みなさん、国を愛し国につくすように、じぶんの住んでいる地方を愛し、じぶんの地方のためにつくしましょう。地方のさかえは、国のさかえと思ってください。", "十四　改正", "「改正」とは、憲法をかえることです。憲法は、まえにも申しましたように、国の規則の中でいちばん大事なものですから、これをかえる手つづきは、げんじゅうにしておかなければなりません。", "そこでこんどの憲法では、憲法を改正するときは、国会だけできめずに、国民が、賛成か反対かを投票してきめることにしました。", "まず、国会の一つの議院で、ぜんたいの議員の三分の二以上の賛成で、憲法をかえることにきめます。これを、憲法改正の「発議」というのです。それからこれを国民に示して、賛成か反対かを投票してもらいます。そうしてぜんぶの投票の半分以上が賛成したとき、はじめて憲法の改正を、国民が承知したことになります。これを国民の「承認」といいます。国民の承認した改正は、天皇陛下が国民の名で、これを国に発表されます。これを改正の「公布」といいます。あたらしい憲法は、国民がつくったもので、国民のものですから、これをかえたときも、国民の名義で発表するのです。", "十五　最高法規", "このおはなしのいちばんはじめに申しましたように、「最高法規」とは、国でいちばん高い位にある規則で、つまり憲法のことです。この最高法規としての憲法には、国の仕事のやりかたをきめた規則と、国民の基本的人権をきめた規則と、二つあることもおはなししました。この中で、国民の基本的人権は、これまでかるく考えられていましたので、憲法第九十七條は、おごそかなことばで、この基本的人権は、人間がながいあいだ力をつくしてえたものであり、これまでいろ／＼のことにであってきたえあげられたものであるから、これからもけっして侵すことのできない永久の権利であると記しております。", "憲法は、国の最高法規ですから、この憲法できめられてあることにあわないものは、法律でも、命令でも、なんでも、いっさい規則としての力がありません。これも憲法がはっきりきめています。", "このように大事な憲法は、天皇陛下もこれをお守りになりますし、国務大臣も、国会の議員も、裁判官も、みなこれを守ってゆく義務があるのです。また、日本の国がほかの国ととりきめた約束（これを「條約」といいます）も、国と国とが交際してゆくについてできた規則（これを「国際法規」といいます）も、日本の国は、まごころから守ってゆくということを、憲法できめました。", "みなさん、あたらしい憲法は、日本国民がつくった、日本国民の憲法です。これからさき、この憲法を守って、日本の国がさかえるようにしてゆこうではありませんか。", "おわり"]}, {"no": 2, "title": "雨ニモマケズ", "author": "宮沢 賢治", "category": "日本文学-詩　絵本", "chars": 352, "volume": "小", "paras": ["雨ニモマケズ", "風ニモマケズ", "雪ニモ夏ノ暑サニモマケヌ", "丈夫ナカラダヲモチ", "欲ハナク", "決シテ瞋ラズ", "イツモシヅカニワラッテイル", "一日ニ玄米四合ト", "味噌ト少シノ野菜ヲタベ", "アラユルコトヲ", "ジブンヲカンジョウニ入レズニ", "ヨクミキキシワカリ", "ソシテワスレズ", "野原ノ松ノ林ノ", "小サナ萓ブキノ小屋ニイテ", "東ニ病気ノコドモアレバ", "行ッテ看病シテヤリ", "西ニツカレタ母アレバ", "行ッテソノ稲ノ朿ヲ負ヒ", "南ニ死ニサウナ人アレバ", "行ッテコハガラナクテモイイトイヒ", "北ニケンクヮヤソショウガアレバ", "ツマラナイカラヤメロトイヒ", "ヒドリノトキハナミダヲナガシ", "サムサノナツハオロオロアルキ", "ミンナニデクノボートヨバレ", "ホメラレモセズ", "クニモサレズ", "サウイフモノニ", "ワタシハナリタイ", "南無無辺行菩薩", "南無上行菩薩", "南無多宝如来", "南無妙法蓮華経", "南無釈迦牟尼仏", "南無浄行菩薩", "南無安立行菩薩"]}, {"no": 3, "title": "或阿呆の一生", "author": "芥川 竜之介", "category": "日本文学-児童-物語", "chars": 13085, "volume": "中", "paras": ["僕はこの原稿を発表する可否はもちろん、発表する時や機関も君に一任したいと思っている。", "君はこの原稿の中に出て来る大抵の人物を知っているだろう。しかし僕は発表するとしても、インデキスをつけずに貰いたいと思っている。", "僕は今最も不幸な幸福の中に暮らしている。しかし不思議にも後悔していない。ただ僕のごとき悪夫、悪子、悪親を持ったものたちを如何（いか）にも気の毒に感じている。ではさようなら。僕はこの原稿の中では少くとも意識的には自己弁護をしなかったつもりだ。", "最後に僕のこの原稿を特に君に託するのは君の恐らくは誰よりも僕を知っていると思うからだ。（都会人という僕の皮を剥（は）ぎさえすれば）どうかこの原稿の中に僕の阿呆さ加減を笑ってくれ給え。", "昭和二年六月二十日", "芥川竜之介", "久米正雄君", "一　時代", "それはある本屋の二階だった。二十歳の彼は書棚にかけた西洋風の梯子（はしご）に登り、新らしい本を探していた。モオパスサン、ボオドレエル、ストリントベリイ、イブセン、シヨウ、トルストイ、", "そのうちに日の暮は迫り出した。しかし彼は熱心に本の背文字を読みつづけた。そこに並んでいるのは本というよりも寧（むし）ろ世紀末それ自身だった。ニイチエ、ヴエルレエン、ゴンクウル兄弟、ダスタエフスキイ、ハウプトマン、フロオベエル、", "彼は薄暗がりと戦いながら、彼等の名前を数えて行った。が、本はおのずからもの憂い影の中に沈みはじめた。彼はとうとう根気も尽き、西洋風の梯子を下りようとした。すると傘のない電灯が一つ、ちょうど彼の頭の上に突然ぽかりと火をともした。彼は梯子の上に佇（たたず）んだまま、本の間に動いている店員や客を見下（みおろ）した。彼等は妙に小さかった。のみならずいかにも見すぼらしかった。", "「人生は一行（いちぎやう）のボオドレエルにも若（し）かない。」", "彼は暫（しばら）く梯子の上からこういう彼等を見渡していた。", "二　　母", "狂人たちは皆同じように鼠色の着物を着せられていた。広い部屋はその為に一層憂鬱に見えるらしかった。彼等の一人はオルガンに向い、熱心に賛美歌を弾（ひ）きつづけていた。同時にまた彼等の一人はちょうど部屋のまん中に立ち、踊るというよりも跳（は）ねまわっていた。", "彼は血色の善（い）い医者といっしょにこういう光景を眺めていた。彼の母も十年前には少しも彼等と変らなかった。少しも、――彼は実際彼等の臭気に彼の母の臭気を感じた。", "「じゃ行こうか？」", "医者は彼の先に立ちながら、廊下伝いにある部屋へ行った。その部屋の隅にはアルコオルを満した、大きいガラス（ガラス）の壷の中に脳髄が幾つも漬（つか）つていた。彼はある脳髄の上にかすかに白いものを発見した。それはちょうど卵の白味をちょっと滴（た）らしたのに近いものだった。彼は医者と立ち話をしながら、もう一度彼の母を思い出した。", "「この脳髄を持っていた男は××電灯会社の技師だったがね。いつも自分を黒光りのする、大きいダイナモだと思っていたよ。」", "彼は医者の目を避ける為にガラス窓の外を眺めていた。そこには空（あ）きビン（びん）の破片を植えた練瓦塀（れんぐわべい）の外に何もなかった。しかしそれは薄い苔（こけ）をまだらにぼんやりと白（し）らませていた。", "三　家", "彼はある郊外の二階の部屋に寝起きしていた。それは地盤の緩（ゆる）い為に妙に傾いた二階だった。", "彼の伯母はこの二階に度たび彼と喧嘩をした。それは彼の養父母の仲裁を受けることもないことはなかった。しかし彼は彼の伯母に誰よりも愛を感じていた。一生独身だった彼の伯母はもう彼の二十歳の時にも六十に近い年よりだった。", "彼はある郊外の二階に何度も互に愛し合うものは苦しめ合うのかを考えたりした。その間も何か気味の悪い二階の傾きを感じながら。", "四　東京", "隅田川はどんより曇っていた。彼は走っている小蒸汽の窓から向う島の桜を眺めていた。花を盛った桜は彼の目には一列の襤褸（ぼろ）のように憂鬱だった。が、彼はその桜に、――江戸以来の向う島の桜にいつか彼自身を見出していた。", "五　我", "彼は彼の先輩といっしょにあるカフエのテーブル（テーブル）に向い、絶えず巻煙草をふかしていた。彼は余り口をきかなかった。が、彼の先輩の言葉には熱心に耳を傾けていた。", "「きょうは半日自動車に乗っていた。」", "「何か用があったのですか？」", "彼の先輩は頬杖（ほほづえ）をしたまま、極めて無造作に返事をした。", "「何、ただ乗っていたかったから。」", "その言葉は彼の知らない世界へ、――神々に近い「我（が）」の世界へ彼自身を解放した。彼は何か痛みを感じた。が、同時にまた 歓（よろこ）びも感じた。", "そのカツフエは極（ごく）小さかった。しかしパンの神の額（がく）の下には赤（あか）い鉢に植えたゴムの樹が一本、肉の厚い葉をだらりと垂らしていた。", "六　病", "彼は絶え間ない潮風の中に大きいイギリス（イギリス）語の辞書をひろげ、指先に言葉を探していた。", "Talaria　翼の生えた靴、あるいはサンダアル。", "Tale　話。", "Talipot　東インドに産する椰子（やし）。幹は五十 フィート（フイート）より百フィートの高さに至り、葉は傘、扇、帽等に用ひらる。七十年に一度花を開く。", "彼の想像ははっきりとこの椰子の花を描き出した。すると彼は喉（のど）もとに今までに知らない痒（かゆ）さを感じ、思わず辞書の上へ啖（たん）を落した。啖を？――しかしそれは啖ではなかった。彼は短い命を思い、もう一度この椰子の花を想像した。この遠い海の向うに高だかと聳（そび）えている椰子の花を。", "七　画", "彼は突然、――それは実際突然だった。彼はある本屋の店先に立ち、ゴオグの画集を見ているうちに突然画というものを了解した。もちろんそのゴオグの画集は写真版だったのに違いなかった。が、彼は写真版の中にも鮮かに浮かび上る自然を感じた。", "この画に対する情熱は彼の視野を新たにした。彼はいつか木の枝のうねりや女の頬の膨（ふく）らみに絶え間ない注意を配り出した。", "ある雨を持った秋の日の暮、彼はある郊外のガアドの下を通りかかった。", "ガアドの向うの土手の下には荷馬車が一台止まっていた。彼はそこを通りながら、誰か前にこの道を通ったもののあるのを感じ出した。誰か？――それは彼自身に今更問いかける必要もなかった。二十三歳の彼の心の中には耳を切ったオランダ（オランダ）人が一人、長いパイプを銜（くは）へたまま、この憂鬱な風景画の上へじっと鋭い目を注いでいた。", "八　火花", "彼は雨に濡れたまま、アスフアルトの上を踏んで行った。雨はかなり（かなり）烈しかった。彼は水沫（しぶき）の満ちた中にゴム引の外套の匂を感じた。", "すると目の前の架空線が一本、紫いろの火花を発していた。彼は妙に感動した。彼の上着のポケツトは彼等の同人雑誌へ発表する彼の原稿を隠していた。彼は雨の中を歩きながら、もう一度後ろの架空線を見上げた。", "架空線は相変わらず（あいかわらず）鋭い火花を放っていた。彼は人生を見渡しても、何も特に欲しいものはなかった。が、この紫色の火花だけは、――凄（すさ）まじい空中の火花だけは命と取り換えてもつかまえたかった。", "九　死体", "死体は皆親指に針金のついた札をぶら下げていた。そのまた札は名前だの年齢だのを記していた。彼の友だちは腰をかがめ、器用にメスを動かしながら、ある死体の顔の皮を剥（は）ぎはじめた。皮の下に広がっているのは美しい黄いろの脂肪だった。", "彼はその死体を眺めていた。それは彼にはある短篇を、――王朝時代に背景を求めたある短篇を仕上げる為に必要だったのに違いなかった。が、腐敗した杏（あんず）の匂に近い死体の臭気は不快だった。彼の友だちは眉間（みけん）をひそめ、静かにメスを動かして行った。", "「この頃は死体も不足してね。」", "彼の友だちはこう言っていた。すると彼はいつの間にか彼の答を用意していた。――「己（おれ）は死体に不足すれば、何の悪意もなしに人殺しをするがね。」しかしもちろん彼の答は心の中にあっただけだった。", "十　先生", "彼は大きい （かし）の木の下に先生の本を読んでいた。かしの木は秋の日の光の中に一枚の葉さえ動さなかった。どこか遠い空中にガラスの皿を垂れた秤（はかり）が一つ、ちょうど平衡を保っている。――彼は先生の本を読みながら、こういう光景を感じていた。", "十一　夜明け", "夜は次第に明けて行った。彼はいつかある町の角に広い市場を見渡していた。市場に群（むらが）つた人々や車はいずれも薔薇（ばら）色に染まり出した。", "彼は一本の巻煙草に火をつけ、静かに市場の中へ進んで行った。するとか細い黒犬が一匹、いきなり彼に吠えかかった。が、彼は驚かなかった。のみならずその犬さえ愛していた。", "市場のまん中には篠懸（すずかけ）が一本、四方へ枝をひろげていた。彼はその根もとに立ち、枝越しに高い空を見上げた。空にはちょうど彼の真上に星が一つ輝いていた。", "それは彼の二十五の年、――先生に会った三月目だった。", "十二　軍港", "潜航艇の内部は薄暗かった。彼は前後左右を覆（おほ）つた機械の中に腰をかがめ、小さい目金（めがね）を覗（のぞ）いていた。そのまた目金に映っているのは明るい軍港の風景だった。「あすこに『金剛』も見えるでしょう。」", "ある海軍将校はこう彼に話しかけたりした。彼は四角いレンズの上に小さい軍艦を眺めながら、なぜかふと阿蘭陀芹（オランダぜり）を思い出した。一人前三十銭のビイフ・ステエクの上にもかすかに匂っている阿蘭陀芹を。", "十三　先生の死", "彼は雨上りの風の中にある新らしい停車場のプラツトフオオムを歩いていた。空はまだ薄暗かった。プラツトフオオムの向うには鉄道工夫が三四人、一斉に鶴嘴（つるはし）を上下させながら、何か高い声にうたっていた。", "雨上りの風は工夫の唄や彼の感情を吹きちぎった。彼は巻煙草に火もつけずに歓（よろこ）びに近い苦しみを感じていた。「センセイキトク」の電報を外套のポケツトへ押しこんだまま。", "そこへ向うの松山のかげから午前六時の上り列車が一列、薄い煙を靡（なび）かせながら、うねるようにこちらへ近づきはじめた。", "十四　結婚", "彼は結婚した翌日に（そうそう）無駄費いをしては困る」と彼の妻に小言を言った。しかしそれは彼の小言よりも彼の伯母の「言え」という小言だった。彼の妻は彼自身にはもちろん、彼の伯母にも詑（わ）びを言っていた。彼の為に買って来た黄水仙の鉢を前にしたまま。", "十五　彼等", "彼等は平和に生活した。大きい芭蕉の葉の広がったかげに。――彼等の家は東京から汽車でもたっぷり一時間かかるある海岸の町にあったから。", "十六　枕", "彼は薔薇の葉の匂のする懐疑主義を枕にしながら、アナトオル・フランスの本を読んでいた。が、いつかその枕の中にも半身半馬神のいることには気づかなかった。", "十七　蝶", "藻の匂の満ちた風の中に蝶が一羽ひらめいていた。彼はほんの一瞬間、乾いた彼の唇の上へこの蝶の翼（つばさ）の触れるのを感じた。が、彼の唇の上へいつか捺（なす）つて行った翼の粉だけは数年後にもまだきらめいていた。", "十八　月", "彼はあるホテルの階段の途中に偶然彼女に遭遇した。彼女の顔はこういう昼にも月の光りの中にいるようだった。彼は彼女を見送りながら、（彼等は一面識もない間がらだった。）今まで知らなかった寂しさを感じた。", "十九　人工の翼", "彼はアナトオル・フランスから十八世紀の哲学者たちに移って行った。が、ルツソオには近づかなかった。それはあるいは彼自身の一面、――情熱に駆られ易い一面のルツソオに近い為かも知れなかった。彼は彼自身の他の一面、――冷（ひやや）かな理知に富んだ一面に近い「カンデイイド」の哲学者に近づいて行った。", "人生は二十九歳の彼にはもう少しも明るくはなかった。が、ヴオルテエルはこういう彼に人工の翼を供給した。", "彼はこの人工の翼をひろげ、易（やす）やすと空へ舞い上った。同時にまた理知の光を浴びた人生の歓びや悲しみは彼の目の下へ沈んで行った。彼は見すぼらしい町々の上へ反語や微笑を落しながら、遮（さえぎ）るもののない空中をまっ直（すぐ）に太陽へ登って行った。ちょうどこういう人工の翼を太陽の光りに焼かれた為にとうとう海へ落ちて死んだ昔のギリシャ（ギリシヤ）人も忘れたように。", "二十　械（かせ）", "彼等夫妻は彼の養父母と一つ家に住むことになった。それは彼がある新聞社に入社することになった為だった。彼は黄いろい紙に書いた一枚の契約書を力にしていた。が、その契約書は後になって見ると、新聞社は何の義務も負わずに彼ばかり義務を負うものだった。", "二十一　狂人の娘", "二台の人力車は人気のない曇天の田舎道を走って行った。その道の海に向っていることは潮風の来るのでも明らかだった。後の人力車に乗っていた彼は少しもこのランデ・ブウに興味のないことを怪みながら、彼自身をここへ導いたものの何であるかを考えていた。それは決して恋愛ではなかった。若（も）し恋愛でないとすれば、――彼はこの答を避ける為に「兎（と）に角（かく）我等は対等だ」と考えない訳（わけ）には行かなかった。", "前の人力車に乗っているのはある狂人の娘だった。のみならず彼女の妹は嫉妬の為に自殺していた。", "「もうどうにも仕かたはない。」", "彼はもうこの狂人の娘に、――動物的本能ばかり強い彼女にある憎悪を感じていた。", "二台の人力車はその間に磯臭い墓地の外へ通りかかった。蛎殻（かきがら）のついた粗朶垣（そだがき）の中には石塔が幾つも黒（くろず）んでいた。彼はそれ等の石塔の向うにかすかにかがやいた海を眺め、何か急に彼女の夫を――彼女の心を捉えていない彼女の夫を軽蔑し出した。", "二十二　ある画家", "それはある雑誌の「挿」でつくりの縦棒が下に突き抜けている,（さ）し画（え）だった。が、一羽の雄鶏の墨画（すみえ）は著しい個性を示していた。彼はある友だちにこの画家のことを尋ねたりした。", "一週間ばかりたった後、この画家は彼を訪問した。それは彼の一生のうちでも特に著しい事件だった。彼はこの画家の中に誰も知らない詩を発見した。のみならず彼自身も知らずにいた彼の魂を発見した。", "ある薄ら寒い秋の日の暮、彼は一本の唐黍（からきび）に忽（たちま）ちこの画家を思い出した。丈の高い唐黍は荒あらしい葉をよろったまま、盛り土の上には神経のように細ぼそと根を露（あら）はしていた。それはまたもちろん 傷（きずつ）き易い彼の自画像にも違いなかった。しかしこういう発見は彼を憂鬱にするだけだった。", "「もう遅い。しかしいざとなった時には　　　　　」", "二十三　彼女", "ある広場の前は暮れかかっていた。彼はやや熱のある体にこの広場を歩いて行った。大きいビルデイングは幾 棟（むね）もかすかに銀色に澄んだ空に窓々の電灯をきらめかせていた。", "彼は道ばたに足を止め、彼女の来るのを待つことにした。五分ばかりたった後、彼女は何かやつれたように彼の方へ歩み寄った。が、彼の顔を見ると、「疲れたわ」と言って頬笑んだりした。彼等は肩を並べながら、薄明（うすあかる）い広場を歩いて行った。それは彼等には始めてだった。彼は彼女といっしょにいる為には何を捨てても善（い）い気もちだった。", "彼等の自動車に乗った後、彼女はじっと彼の顔を見つめ、「あなたは後悔なさらない？」と言った。彼はきっぱり「後悔しない」と答えた。彼女は彼の手を抑（おさ）へ、「あたしは後悔しないけれども」と言った。彼女の顔はこういう時にも月の光の中にいるようだった。", "二十四　出産", "彼は襖側（ふすまぎは）に佇（たたず）んだまま、白い手術着を着た産婆が一人、赤児を洗うのを見下していた。赤児は石鹸の目にしみる度にいぢらしい顰（しか）め顔（がほ）を繰り返した。のみならず高い声に啼（な）きつづけた。彼は何か鼠の仔（こ）に近い赤児の匂を感じながら、しみじみこう思わずにはいられなかった。――「何の為にこいつも生まれて来たのだらう？　この娑婆苦（しやばく）の充ち満ちた世界へ。――何の為にまたこいつも己（おれ）のようなものを父にする運命を荷（にな）ったのだらう？」", "しかもそれは彼の妻が最初に出産した男の子だった。", "二十五　ストリントベリイ", "彼は部屋の戸口に立ち、柘榴（ざくろ）の花のさいた月明りの中に薄汚い中国人が何人か、麻雀戯（マアチアン）をしているのを眺めていた。それから部屋の中へひき返すと、背の低いランプの下に「痴人の告白」を読みはじめた。が、二 頁（ペエジ）も読まないうちにいつか苦笑を洩らしていた。――ストリントベリイもまた情人だった伯爵夫人へ送る手紙の中に彼と大差のない（うそ）を書いている。", "二十六　古代", "彩色の剥（は）げた仏たちや天人や馬や蓮の華（はな）はほとんど彼を圧倒した。彼はそれ等を見上げたまま、あらゆることを忘れていた。狂人の娘の手を脱した彼自身の幸運さへ。", "二十七　スパルタ式訓練", "彼は彼の友だちとある裏町を歩いていた。そこへ幌（ほろ）をかけた人力車が一台、まっ直（すぐ）に向うから近づいて来た。しかもその上に乗っているのは意外にも昨夜の彼女だった。彼女の顔はこういう昼にも月の光の中にいるようだった。彼等は彼の友だちの手前、もちろん挨拶さえ交さなかった。", "「美人ですね。」", "彼の友だちはこんなことを言った。彼は往来の突き当りにある春の山を眺めたまま、少しもためらわずに返事をした。", "「ええ、中々美人ですね。」", "二十八　殺人", "田舎道は日の光りの中に牛の糞の臭気を漂わせていた。彼は汗を拭いながら、爪先き上りの道を登って行った。道の両側に熟した麦は香ばしい匂を放っていた。", "「殺せ、殺せ。　　　　　」", "彼はいつか口の中にこういう言葉を繰り返していた。誰を？――それは彼には明らかだった。彼は如何（いか）にも卑屈らしい五分刈の男を思い出していた。", "すると黄ばんだ麦の向うにローマ（ロオマ）カトリツク教の伽藍（がらん）が一宇（いちう）、いつの間にか円屋根（まるやね）を現し出した。", "二十九　形", "それは鉄の銚子だった。彼はこの糸目のついた銚子にいつか「形」の美を教えられていた。", "三十　雨", "彼は大きいベツドの上に彼女といろいろの話をしていた。寝室の窓の外は雨ふりだった。浜木綿（はまゆふ）の花はこの雨の中にいつか腐って行くらしかった。彼女の顔は相変わらず（あいかわらず）月の光の中にいるようだった。が、彼女と話していることは彼には退屈でないこともなかった。彼は腹這（はらば）いになったまま、静かに一本の巻煙草に火をつけ、彼女といっしょに日を暮らすのも七年になっていることを思い出した。", "「おれはこの女を愛しているだらうか？」", "彼は彼自身にこう質問した。この答は彼自身を見守りつけた彼自身にも意外だった。", "「おれは未（いま）だに愛している。」", "三十一　大地震", "それはどこか熟し切った杏（あんず）の匂に近いものだった。彼は焼けあとを歩きながら、かすかにこの匂を感じ、炎天に腐った死骸の匂も存外悪くないと思ったりした。が、死骸の重なり重（かさな）つた池の前に立って見ると、「酸鼻（さんび）」という言葉も感覚的に決して誇張でないことを発見した。ことに彼を動かしたのは十二三歳の子供の死骸だった。彼はこの死骸を眺め、何か羨ましさに近いものを感じた。「神々に愛せらるるものは夭折（えうせつ）す」――こういう言葉なども思い出した。彼の姉や異母弟はいずれも家を焼かれていた。しかし彼の姉の夫は偽証罪を犯した為に執行猶予中の体だった。", "「誰も彼も死んでしまえば善（い）い。」", "彼は焼け跡に佇（たたず）んだまま、しみじみこう思わずにはいられなかった。", "三十二　喧嘩", "彼は彼の異母弟と取り組み合いの喧嘩をした。彼の弟は彼の為に圧迫を受け易いのに違いなかった。同時にまた彼も彼の弟の為に自由を失っているのに違いなかった。彼の親戚は彼の弟に「彼を見慣（みなら）へ」と言いつづけていた。しかしそれは彼自身には手足を縛られるのも同じことだった。彼等は取り組み合ったまま、とうとう縁先へ転（ころ）げて行った。縁先の庭には百日紅（さるすべり）が一本、――彼は未だに覚えている。――雨を持った空の下に赤光りに花を盛り上げていた。", "三十三　英雄", "彼はヴオルテエルの家の窓からいつか高い山を見上げていた。氷河の懸った山の上には禿鷹（はげたか）の影さえ見えなかった。が、背の低いロシア（ロシア）人が一人、執拗（しつえう）に山道を登りつづけていた。", "ヴオルテエルの家も夜になった後、彼は明るいランプの下にこういう傾向詩を書いたりした。あの山道を登って行ったロシア人の姿を思い出しながら。", "――誰よりも十戒を守った君は", "誰よりも十戒を破った君だ。", "誰よりも民衆を愛した君は", "誰よりも民衆を軽蔑した君だ。", "誰よりも理想に燃え上った君は", "誰よりも現実を知っていた君だ。", "君は僕等の東洋が生んだ", "草花の匂のする電気機関車だ。――", "三十四　色彩", "三十歳の彼はいつの間かある空き地を愛していた。そこにはただ 苔（こけ）の生えた上に練瓦や瓦の欠片（かけら）などが幾つも散らかっているだけだった。が、それは彼の目にはセザンヌの風景画と変りはなかった。", "彼はふと七八年前の彼の情熱を思い出した。同時にまた彼の七八年前には色彩を知らなかったのを発見した。", "三十五　道化人形", "彼はいつ死んでも悔いないように烈しい生活をするつもりだった。が、相変わらず（あいかわらず）養父母や伯母に遠慮勝ちな生活をつづけていた。それは彼の生活に明暗の両面を造り出した。彼はある洋服屋の店に道化人形の立っているのを見、どの位彼も道化人形に近いかということを考えたりした。が、意識の外の彼自身は、――言わば第二の彼自身はとうにこういう心もちをある短篇の中に盛りこんでいた。", "三十六　倦怠", "彼はある大学生と芒原（すすきはら）の中を歩いていた。", "「君たちはまだ生活欲を盛に持っているだらうね？」", "「ええ、――だってあなたでも　　　　　」", "「ところが僕は持っていないんだよ。制作欲だけは持っているけれども。」", "それは彼の真情だった。彼は実際いつの間にか生活に興味を失っていた。", "「制作欲もやっぱり生活欲でしょう。」", "彼は何とも答えなかった。芒原はいつか赤い穂の上にはっきりと噴火山を露（あらは）し出した。彼はこの噴火山に何か羨望（せんばう）に近いものを感じた。しかしそれは彼自身にもなぜということはわからなかった。", "三十七　越し人", "彼は彼と才力の上にも格闘できる女に遭遇した。が、「越し人」等の叙情詩を作り、僅（わづ）かにこの危機を脱出した。それは何か木の幹に凍った、かがやかしい雪を落すように切ない心もちのするものだった。", "風に舞いたるすげ笠の", "何かは道に落ちざらん", "わが名はいかで惜しむべき", "惜しむは君が名のみとよ。", "三十八　復讐", "それは木の芽の中にあるあるホテルの露台だった。彼はそこに画を描きながら、一人の少年を遊ばせていた。七年前に絶縁した狂人の娘の一人息子と。", "狂人の娘は巻煙草に火をつけ、彼等の遊ぶのを眺めていた。彼は重苦しい心もちの中に汽車や飛行機を描きつづけた。少年は幸いにも彼の子ではなかった。が、彼を「おじさん」と呼ぶのは彼には何よりも苦しかった。", "少年のどこかへ行った後、狂人の娘は巻煙草を吸いながら、媚（こ）びるように彼に話しかけた。", "「あの子はあなたに似ていやしない？」", "「似ていません。第一　　　　　」", "「だって胎教ということもあるでしょう。」", "彼は黙って目を反（そ）らした。が、彼の心の底にはこういう彼女を絞め殺したい、残虐な欲望さへない訳（わけ）ではなかった。", "三十九　鏡", "彼はあるカツフエの隅に彼の友だちと話していた。彼の友だちは焼りんご（やきりんご）を食い、この頃の寒さの話などをした。彼はこういう話の中に急に矛盾を感じ出した。", "「君はまだ独身だったね。」", "「いや、もう来月結婚する。」", "彼は思わず黙ってしまった。カツフエの壁に嵌（は）めこんだ鏡は無数の彼自身を映していた。冷えびえと、何か脅（おびやか）すように。", "四十　問答", "なぜお前は現代の社会制度を攻撃するか？", "資本主義の生んだ悪を見ているから。", "悪を？　おれはお前は善悪の差を認めていないと思っていた。ではお前の生活は？", "――彼はこう天使と問答した。尤（もっと）も誰にも恥ずる所のないシルクハツトをかぶった天使と。", "四十一　病", "彼は不眠症に襲われ出した。のみならず体力も衰えはじめた。何人かの医者は彼の病にそれぞれ二三の診断を下した。――胃酸過多、胃アトニイ、乾性 肋膜炎（ろくまくえん）、神経衰弱、慢性結膜炎、脳疲労、", "しかし彼は彼自身彼の病源を承知していた。それは彼自身を恥じると共に彼等を恐れる心もちだった。彼等を、――彼の軽蔑していた社会を！", "ある雪曇りに曇った午後、彼はあるカツフエの隅に火のついた葉巻を銜（くは）へたまま、向うの蓄音機から流れて来る音楽に耳を傾けていた。それは彼の心もちに妙にしみ渡る音楽だった。彼はその音楽の了（をは）るのを待ち、蓄音機の前へ歩み寄ってレコオドの貼り札を検（しら）べることにした。", "Magic Flute――Mozart", "彼は咄嗟（とつさ）に了解した。十戒を破ったモツツアルトはやはり苦しんだのに違いなかった。しかしよもや彼のように、　　　　　彼は頭を垂れたまま、静かに彼のテーブル（テエブル）へ帰って行った。", "四十二　神々の笑い声", "三十五歳の彼は春の日の当った松林の中を歩いていた。二三年前に彼自身の書いた「神々は不幸にも我々のように自殺できない」という言葉を思い出しながら。", "四十三　夜", "夜はもう一度迫り出した。荒れ模様の海は薄明りの中に絶えず水沫（しぶき）を打ち上げていた。彼はこういう空の下に彼の妻と二度目の結婚をした。それは彼等には歓（よろこ）びだった。が、同時にまた苦しみだった。三人の子は彼等といっしょに沖の稲妻を眺めていた。彼の妻は一人の子を抱き、涙をこらえているらしかった。", "「あすこに船が一つ見えるね？」", "「ええ。」", "「檣（ほばしら）の二つに折れた船が。」", "四十四　死", "彼はひとり寝ているのを幸い、窓格子に帯をかけて縊死（いし）しようとした。が、帯に頚（くび）を入れて見ると、俄（には）かに死を恐れ出した。それは何も死ぬ刹那（せつな）の苦しみの為に恐れたのではなかった。彼は二度目には懐中時計を持ち、試みに縊死を計ることにした。するとちょっと苦しかった後、何も彼（か）もぼんやりなりはじめた。そこを一度通り越しさえすれば、死にはいってしまうのに違いなかった。彼は時計の針を検（しら）べ、彼の苦しみを感じたのは一分二十何秒かだったのを発見した。窓格子の外はまっ暗だった。しかしその暗（やみ）の中に荒あらしい鶏の声もしていた。", "四十五　Divan", "Divan はもう一度彼の心に新しい力を与えようとした。それは彼の知らずにいた「東洋的なゲエテ」だった。彼はあらゆる善悪の彼岸に悠々と立っているゲエテを見、絶望に近い羨ましさを感じた。詩人ゲエテは彼の目には詩人クリストよりも偉大だった。この詩人の心にはアクロポリスやゴルゴタの外にアラビアの薔薇さえ花をひらいていた。もしこの詩人の足あとを辿（たど）る多少の力を持っていたらば、――彼はデイヴアンを読み了（をは）り、恐しい感動の静まった後、しみじみ生活的 宦官（くわんぐわん）に生まれた彼自身を軽蔑せずにはいられなかった。", "四十六　「言＋墟のつくり」", "彼の姉の夫の自殺はにわかに彼を打ちのめした。彼は今度は姉の一家の面倒も見なければならなかった。彼の将来は少くとも彼には日の暮のように薄暗かった。彼は彼の精神的破産に冷笑に近いものを感じながら、（彼の悪徳や弱点は一つ残らず彼にはわかっていた。）相変わらずいろいろの本を読みつづけた。しかしルツソオの懴悔録さえ英雄的な（うそ）に充ち満ちていた。ことに「新生」に至っては、――彼は「新生」の主人公ほど老獪（らうくわい）な偽善者に出会ったことはなかった。が、フランソア・ヴイヨンだけは彼の心にしみ透（とほ）った。彼は何篇かの詩の中に「美しい牡」を発見した。", "絞罪を待っているヴイヨンの姿は彼の夢の中にも現れたりした。彼は何度もヴイヨンのように人生のどん底に落ちようとした。が、彼の境遇や肉体的エネルギイはこういうことを許す訳（わけ）はなかった。彼はだんだん衰えて行った。ちょうど昔スウイフトの見た、木末（こずえ）から枯れて来る立ち木のように。", "四十七　火あそび", "彼女はかがやかしい顔をしていた。それはちょうど朝日の光の薄氷（うすらい）にさしているようだった。彼は彼女に好意を持っていた。しかし恋愛は感じていなかった。のみならず彼女の体には指一つ触（さは）らずにいたのだった。", "「死にたがっていらっしゃるのですってね。」", "「ええ。――いえ、死にたがっているよりも生きることに飽（あ）きているのです。」", "彼等はこういう問答からいっしょに死ぬことを約束した。", "「プラトニツク・スウイサイドですね。」", "「ダブル・プラトニツク・スウイサイド。」", "彼は彼自身の落ち着いているのを不思議に思わずにはいられなかった。", "四十八　死", "彼は彼女とは死ななかった。ただ未だに彼女の体に指一つ触っていないことは彼には何か満足だった。彼女は何ごともなかったように時々彼と話したりした。のみならず彼に彼女の持っていた青酸加里を一ビン（ひとびん）渡し、「これさえあればお互に力強いでしょう」とも言ったりした。", "それは実際彼の心を丈夫にしたのに違いなかった。彼はひとり籐椅子に座り、椎（しい）の若葉を眺めながら、度々死の彼に与える平和を考えずにはいられなかった。", "四十九　剥製の白鳥", "彼は最後の力を尽（つく）し、彼の自叙伝を書いて見ようとした。が、それは彼自身には存外容易にできなかった。それは彼の自尊心や懐疑主義や利害の打算の未だに残っている為だった。彼はこういう彼自身を軽蔑せずにはいられなかった。しかしまた一面には「誰でも一皮 剥（む）いて見れば同じことだ」とも思わずにはいられなかった。「詩と真実と」という本の名前は彼にはあらゆる自叙伝の名前のようにも考えられ勝ちだった。のみならず文芸上の作品に必しも誰も動かされないのは彼にははっきりわかっていた。彼の作品の訴えるものは彼に近い生涯を送った彼に近い人々の外にあるはずはない。――こういう気も彼には働いていた。彼はその為に手短かに彼の「詩と真実と」を書いて見ることにした。", "彼は「ある阿呆の一生」を書き上げた後、偶然ある古道具屋の店に剥製（はくせい）の白鳥のあるのを見つけた。それは頚を挙げて立っていたものの、黄ばんだ羽根さえ虫に食われていた。彼は彼の一生を思い、涙や冷笑のこみ上げるのを感じた。彼の前にあるものはただ発狂か自殺かだけだった。彼は日の暮の往来をたった一人歩きながら、徐（おもむ）ろに彼を滅しに来る運命を待つことに決心した。", "五十　俘（とりこ）", "彼の友だちの一人は発狂した。彼はこの友だちにいつもある親しみを感じていた。それは彼にはこの友だちの孤独の、――軽快な仮面の下にある孤独の人一倍身にしみてわかる為だった。彼はこの友だちの発狂した後、二三度この友だちを訪問した。", "「君や僕は悪鬼につかれているんだね。世紀末の悪鬼というやつにねえ。」", "この友だちは声をひそめながら、こんなことを彼に話したりしたが、それから二三日後にはある温泉宿へ出かける途中、薔薇（ばら）の花さえ食っていたということだった。彼はこの友だちの入院した後、いつか彼のこの友だちに贈つたテラコツタの半身像を思い出した。それはこの友だちの愛した「検察官」の作者の半身像だった。彼はゴオゴリイも狂死したのを思い、何か彼等を支配している力を感じずにはいられなかった。", "彼はすっかり疲れ切った揚句（あげく）、ふとラデイゲの臨終の言葉を読み、もう一度神々の笑い声を感じた。それは「神の兵卒たちは己（おれ）をつかまえに来る」という言葉だった。彼は彼の迷信や彼の感傷主義と闘おうとした。しかしどういう闘いも肉体的に彼には不可能だった。「世紀末の悪鬼」は実際彼を虐（さいな）んでいるのに違いなかった。彼は神を力にした中世紀の人々に羨しさを感じた。しかし神を信ずることは――神の愛を信ずることは到底彼にはできなかった。あのコクトオさえ信じた神を！", "五十一　敗北", "彼はペンを執（と）る手も震え出した。のみならず涎（よだれ）さえ流れ出した。彼の頭は〇・八のヴエロナアルを用いて覚めた後の外は一度もはっきりしたことはなかった。しかもはっきりしているのはやっと半時間か一時間だった。彼はただ薄暗い中にその日暮らしの生活をしていた。言わば刃のこぼれてしまった、細い剣を杖にしながら。", "（昭和二年六月、遺稿）"]}, {"no": 4, "title": "一握の砂", "author": "石川 啄木", "category": "日本文学-詩　絵本", "chars": 20623, "volume": "大", "paras": ["函館なる郁雨宮崎大四郎君", "同国の友文学士花明金田一京助君", "この集を両君に捧ぐ。予はすでに予のすべてを両君の前に示しっくしたるもののごとし。従って両君はここに歌われたる歌の一一につきて最も多く知るの人なるを信ずればなり。", "また一本をとりて亡児真一に手向く。この集の稿本を書肆の手に渡したるは汝の生れたる朝なりき。この集の稿料は汝の薬餌となりたり。而してこの集の見本刷を予の閲したるは汝の火葬の夜なりき。", "著者", "明治四十一年夏以後の作一千余首中より五百五十一首を抜きてこの集に収む。集中五章、感興の来由するところ相 　邇（ちか）きをたずねて仮にわかてるのみ。「秋風のこころよさに」は明治四十一年秋の紀念なり。", "我を愛する歌", "東海（とうかい）の小島（こじま）の磯（いそ）の白砂（しらすな）に", "われ泣（な）きぬれて", "蟹（かに）とたはむる", "頬（ほ）につたう", "なみだのごはず", "一握（いちあく）の砂を示（しめ）しし人を忘れず", "大海（だいかい）にむかいて一人（ひとり）", "七八日（ななようか）", "泣きなむとすと家を出（い）でにき", "いたく錆（さ）びしピストル出（い）でぬ", "砂山（すなやま）の", "砂を指もて掘（ほ）りてありしに", "ひと夜（よ）さに嵐（あらし）来（きた）りて築（きづ）きたる", "この砂山は", "何（なに）の墓（はか）ぞも", "砂山の砂に腹這（はらば）ひ", "初恋の", "いたみを遠くおもい出（い）づる日", "砂山の裾（すそ）によこたわる流木（りうぼく）に", "あたり見まわし", "物（もの）言（い）ひてみる", "いのちなき砂のかなしさよ", "さらさらと", "握（にぎ）れば指のあいだより落つ", "しっとりと", "なみだを吸（す）へる砂の玉", "なみだは重きものにしあるかな", "大（だい）という字を百あまり", "砂に書き", "死ぬことをやめて帰り来（きた）れり", "目さましてなお（なほ）起（お）き出（い）でぬ児の癖（くせ）は", "かなしき癖ぞ", "母よ咎（とが）むな", "ひと塊（くれ）の土に涎（よだれ）し", "泣く母の肖顔（にがほ）つくりぬ", "かなしくもあるか", "灯影（ほかげ）なき室（しつ）に我あり", "父と母", "壁のなかより杖（つえ）つきて出（い）づ", "たはむれに母を背負（せお）ひて", "そのあまり軽（かろ）きに泣きて", "三歩あゆまず", "飄然（へうぜん）と家を出（い）でては", "飄然と帰りし癖よ", "友はわらえど", "ふるさとの父の咳（せき）する度（たび）に斯（か）く", "咳の出（い）づるや", "病（や）めばはかなし", "わが泣くを少女等（おとめら）きかば", "病犬（やまいぬ）の", "月に吠（ほ）ゆるに似たりというらむ", "何処（いづく）やらむかすかに虫のなくごとき", "こころ細（ぼそ）さを", "今日（きょう）もおぼゆる", "いと暗き", "穴（あな）に心を吸（す）はれゆくごとく思いて", "つかれて眠る", "こころよく", "我にはたらく仕事あれ", "それを仕遂（しと）げて死なむと思う", "こみ合（あ）へる電車の隅（すみ）に", "ちぢこまる", "ゆうべゆうべの我のいとしさ", "浅草（あさくさ）の夜（よ）のにぎはいに", "まぎれ入（い）り", "まぎれ出（い）で来（き）しさびしき心", "愛犬（あいけん）の耳斬（き）りてみぬ", "あはれこれも", "物に倦（う）みたる心にかあらむ", "鏡（かがみ）とり", "能（あた）うかぎりのさまざまの顔をしてみぬ", "泣き飽（あ）きし時", "なみだなみだ", "不思議なるかな", "それをもて洗（あら）へば心 　戯（おど）けたくなれり", "呆（あき）れたる母の言葉に", "気がつけば", "茶碗（ちやわん）を箸（はし）もて敲（たた）きてありき", "草に臥（ね）て", "おもうことなし", "わが額（ぬか）に糞（ふん）して鳥は空に遊べり", "わが髭（ひげ）の", "下向く癖（くせ）がいきどほろし", "このごろ憎（にく）き男に似たれば", "森の奥より銃声（じうせい）聞ゆ", "あはれあわれ", "自（みづか）ら死ぬる音のよろしさ", "大木（たいぼく）の幹（みき）に耳あて", "小半日（こはんにち）", "堅（かた）き皮をばむしりてありき", "「さばかりの事に死ぬるや」", " の話の主人公である。", "五位は、風采の甚（はなはだ）揚（あが）らない男であった。第一背が低い。それから赤鼻で、眼尻が下っている。口髭はもちろん薄い。頬が、こけているから、頤（あご）が、人並はずれて、細く見える。唇は――一々、数へ立てていれば、際限はない。我五位の外貌はそれ程、非凡に、だらしなく、でき上っていたのである。", "この男が、何時（いつ）、どうして、基経に仕えるようになったのか、それは誰も知っていない。が、よほど以前から、同じような色の退（さ）めた水干（すいかん）に、同じような萎々（なえなえ）した烏帽子（えぼし）をかけて、同じような役目を、飽きずに、毎日、繰返している事だけは、確である。その結果であろう、今では、誰が見ても、この男に若い時があったとは思われない。（五位は四十を越していた。）その代り、生れた時から、あの通り寒むそうな赤鼻と、形ばかりの口髭とを、朱雀大路（すざくおほぢ）の衢風（ちまたかぜ）に、吹かせていたという気がする。上（かみ）は主人の基経から、下（しも）は牛飼の童児まで、無意識ながら、悉（ことごとく）そう信じて疑う者がない。", "こういう風采を具えた男が、周囲から受ける待遇は、恐らく書くまでもないことであろう。侍所（さぶらひどころ）にいる連中は、五位に対して、ほとんど蠅（はへ）程の注意も払わない。有位（うい）無位（むい）、併せて二十人に近い下役さへ、彼の出入りには、不思議な位、冷淡を極めている。五位が何かいいつけても、決して彼等同志の雑談をやめた事はない。彼等にとっては、空気の存在が見えないように、五位の存在も、眼を遮（さえぎ）らないのであろう。下役でさえそうだとすれば、別当とか、侍所の司（つかさ）とかいう上役たちが頭から彼を相手にしないのは、寧（むし）ろ自然の数（すう）である。彼等は、五位に対すると、ほとんど、子供らしい無意味な悪意を、冷然とした表情の後に隠して、何をいうのでも、手真似だけで用を足した。人間に、言語があるのは、偶然ではない。従って、彼等も手真似では用を弁じない事が、時々ある。が、彼等は、それを全然五位の悟性に、欠陥があるからだと、思っているらしい。そこで彼等は用が足りないと、この男の歪んだ揉（もみ）烏帽子の先から、切れかかった藁草履（わらぞうり）の尻まで、万遍なく見上げたり、見下したりして、それから、鼻で哂（わら）ひながら、急に後を向いてしまう。それでも、五位は、腹を立てた事がない。彼は、一切の不正を、不正として感じない程、意気地のない、憶病な人間だったのである。", "所が、同僚の侍たちになると、進んで、彼を翻弄（ほんろう）しようとした。年かさの同僚が、彼れの振わない風采を材料にして、古いしゃれ（しゃれ）を聞かせようとするごとく、年下の同僚も、またそれを機会にして、いわゆる（いわゆる）興言利口（きようげんりこう）の練習をしようとしたからである。彼等は、この五位の面前で、その鼻と口髭と、烏帽子と水干とを、品隲（ひんしつ）して飽きる事を知らなかった。そればかりではない。彼が五六年前に別れたうけ唇（くち）の女房と、その女房と関係があったという酒のみの法師とも、しばしば（しばしば）彼等の話題になった。その上、どうかすると、彼等は甚（はなはだ）、性質（たち）の悪い悪戯（いたずら）さえする。それを今一々、列記する事はできない。が、彼の篠枝（ささえ）の酒を飲んで、後（あと）へ尿（いばり）を入れて置いたという事を書けば、その外は凡（およそ）、想像される事だろうと思う。", "しかし、五位はこれらの揶揄（やゆ）に対して、全然無感覚であった。少くもわき眼には、無感覚であるらしく思われた。彼は何をいわれても、顔の色さえ変えた事がない。黙って例の薄い口髭を撫でながら、するだけの事をしてすましている。ただ、同僚の悪戯が、高（こう）じすぎて、髷（まげ）に紙切れをつけたり、太刀（たち）の鞘（さや）に草履を結びつけたりすると、彼は笑うのか、泣くのか、わからないような笑顔をして、「いけぬのう、お身たちは。」という。その顔を見、その声を聞いた者は、誰でも一時あるいぢらしさに打たれてしまう。（彼等にいじめられるのは、一人、この赤鼻の五位だけではない、彼等の知らない誰かが――多数の誰かが、彼の顔と声とを借りて、彼等の無情を責めている。）――そういう気が、朧（おぼろ）げながら、彼等の心に、一瞬の間、しみこんで来るからである。ただその時の心もちを、何時までも持続ける者は甚少い。その少い中の一人に、ある無位の侍があった。これは丹波（たんば）の国から来た男で、まだ柔かい口髭が、やっと鼻の下に、生えかかった位の青年である。もちろん、この男も始めは皆といっしょに、何の理由もなく、赤鼻の五位を軽蔑（けいべつ）した。所が、ある日何かの折に、「いけぬのう、お身たちは」という声を聞いてからは、どうしても、それが頭を離れない。それ以来、この男の眼にだけは、五位が全く別人として、映るようになった。栄養の不足した、血色の悪い、間のぬけた五位の顔にも、世間の迫害にべそを掻いた、「人間」が覗いているからである。この無位の侍には、五位の事を考える度に、世の中のすべてが急に本来の下等さを露（あらは）すように思われた。そうしてそれと同時に霜げた赤鼻と数える程の口髭とが何となく一味（いちみ）の慰安を自分の心に伝えてくれるように思われた。", "しかし、それは、ただこの男一人に、限った事である。こういう例外を除けば、五位は、依然として周囲の軽蔑の中に、犬のような生活を続けて行かなければならなかった。第一彼には着物らしい着物が一つもない。青鈍（あをにび）の水干と、同じ色の指貫（さしぬき）とが一つずつあるのが、今ではそれが上白（うはじろ）んで、藍（あい）とも紺とも、つかないような色に、なっている。水干はそれでも、肩が少し落ちて、丸組の緒や菊綴（きくとぢ）の色が怪しくなっているだけだが、指貫になると、裾のあたりのいたみ方が一通りでない。その指貫の中から、下の袴もはかない、細い足が出ているのを見ると、口の悪い同僚でなくとも、痩公卿の車を牽（ひ）いている、痩牛の歩みを見るような、みすぼらしい心もちがする。それに佩（は）いている太刀も、すこぶる覚束（おぼつか）ない物で、柄（つか）の金具も如何（いかが）はしければ、黒鞘の塗も剥げかかっている。これが例の赤鼻で、だらしなく草履をひきずりながら、ただでさえ猫背なのを、一層寒空の下に背ぐくまって、もの欲しそうに、左右を眺め眺め、きざみ足に歩くのだから、通りがかりの物売りまで莫迦（ばか）にするのも、無理はない。現に、こういう事さえあった。", "ある日、五位が三条坊門を神泉苑の方へ行く所で、子供が六七人、路ばたに集って、何かしているのを見た事がある。「こまつぶり」でも、回しているのかと思って、後ろから覗いて見ると、何処（どこ）かから迷って来た、尨犬（むくいぬ）の首へ縄をつけて、打ったり殴（たた）いたりしているのであった。憶病な五位は、これまで何かに同情を寄せる事があっても、あたりへ気を兼ねて、まだ一度もそれを行為に現わしたことがない。が、この時だけは相手が子供だというので、幾分か勇気が出た。そこでできるだけ、笑顔をつくりながら、年かさらしい子供の肩を叩いて、「もう、堪忍してやりなされ。犬も打たれれば、痛いでのう」と声をかけた。すると、その子供ほうりかえりながら、上眼を使って、蔑（さげ）すむように、ぢろぢろ五位の姿を見た。いわば侍所の別当が用の通じない時に、この男を見るような顔をして、見たのである。「いらぬ世話はやかれたうもない。」その子供は一足下りながら、高慢な唇を反らせて、こういった。「何じゃ、この鼻赤めが。」五位はこの語（ことば）が自分の顔を打ったように感じた。が、それは悪態をつかれて、腹が立ったからでは毛頭ない。いわなくともいい事をいって、恥をかいた自分が、情なくなったからである。彼は、きまりが悪いのを苦しい笑顔に隠しながら、黙って、また、神泉苑の方へ歩き出した。後では、子供が、六七人、肩を寄せて、「べつかつかう」をしたり、舌を出したりしている。もちろん彼はそんな事を知らない。知っていたにしても、それが、この意気地のない五位にとって、何であろう。", "では、この話の主人公は、ただ、軽蔑される為にのみ生れて来た人間で、別に何の希望も持っていないかというと、そうでもない。五位は五六年前から芋粥（いもがゆ）という物に、異常な執着を持っている。芋粥とは山の芋を中に切込んで、それを甘葛（あまずら）の汁で煮た、粥の事をいうのである。当時はこれが、無上の佳味として、上は万乗（ばんじよう）の君の食膳にさへ、上せられた。従って、我五位のごとき人間の口へは、年に一度、臨時の客の折にしか、はいらない。その時でさへ、飲めるのは僅に喉（のど）を沾（うるほ）すに足る程の少量である。そこで芋粥を飽きる程飲んで見たいという事が、久しい前から、彼の唯一の欲望になっていた。もちろん、彼は、それを誰にも話した事がない。いや彼自身さえそれが、彼の一生を貫いている欲望だとは、明白に意識しなかった事であろう。が事実は彼がその為に、生きているといっても、差支（さしつかえ）ない程であった。――人間は、時として、充されるか充されないか、わからない欲望の為に、一生を捧げてしまう。その愚を哂（わら）ふ者は、畢竟（ひっきやう）、人生に対する路傍の人に過ぎない。", "しかし、五位が夢想していた、「芋粥に飽かむ」事は、存外容易に事実となって現れた。その始終を書こうというのが、芋粥の話の目的なのである。", "―――――――――――――――――", "ある年の正月二日、基経の第（だい）に、いわゆる（いわゆる）臨時の客があった時の事である。（臨時の客は二宮（にぐう）の大供（だいきやう）と同日に摂政関白家が、大臣以下の上達部（かんだちめ）を招いて催す供宴で、大供と別に変りがない。）五位も、外の侍たちにまじって、その残肴（ざんこう）の相伴（しやうばん）をした。当時はまだ、取食（とりば）みの習慣がなくて、残肴は、その家の侍が一堂に集まって、食う事になっていたからである。尤（もっと）も、大供に等しいといっても昔の事だから、品数の多い割りに碌な物はない、餅、伏兎（ふと）、蒸鮑（むしあはび）、干鳥（ほしどり）、宇治の氷魚（ひを）、近江（あふみ）の鮒（ふな）、鯛の楚割（すはやり）、鮭の内子（こごもり）、焼蛸（やきだこ）、大海老（おほえび）、大柑子（おほこうじ）、小柑子、橘、串柿などの類（たぐい）である。ただ、その中に、例の芋粥があった。五位は毎年、この芋粥を楽しみにしている。が、何時も人数が多いので、自分が飲めるのは、いくらもない。それが今年は、特に、少かった。そうして気のせいか、何時もより、よほど味がいい。そこで、彼は飲んでしまった後の椀をしげしげと眺めながら、うすい口髭についている滴（しづく）を、掌で拭いて誰にいうともなく、「何時になったら、これに飽ける事かのう」と、こういった。", "「大夫殿は、芋粥に飽かれた事がないそうな。」", "五位の語（ことば）が完（をは）らない中に、誰かが、嘲笑（あざわら）った。錆（さび）のある、鷹揚（おうやう）な、武人らしい声である。五位は、猫背の首を挙げて、憶病らしく、その人の方を見た。声の主は、その頃同じ基経の恪勤（かくごん）になっていた、民部卿時長の子藤原　　利仁（としひと）である。肩幅の広い、身長（みのたけ）の群を抜いた逞（たくま）しい大男で、これは、　栗（ゆでぐり）を噛みながら、黒酒（くろき）の杯（さかづき）を重ねていた。もう大分酔がまわっているらしい。", "「お気の毒な事じゃの。」利仁は、五位が顔を挙げたのを見ると、軽蔑と憐憫（れんびん）とを一つにしたような声で、語を継いだ。「お望みなら、利仁がお飽かせ申そう。」", "始終、いじめられている犬は、たまに肉を貰っても容易によりつかない。五位は、例の笑うのか、泣くのか、わからないような笑顔をして、利仁の顔と、空（から）の椀とを等分に見比べていた。", "「おいやかな。」", "「　　　」", "「どうじゃ。」", "「　　　」", "五位は、その中に、衆人の視線が、自分の上に、集まっているのを感じ出した。答え方一つで、また、一同の嘲弄を、受けなければならない。あるいは、どう答えても、結局、莫迦（ばか）にされそうな気さえする。彼は躊躇（ちうちよ）した。もし、その時に、相手が、少し面倒臭そうな声で、「おいやなら、たってとは申すまい」といわなかったなら、五位は、何時（いつ）までも、椀と利仁とを、見比べていた事であろう。", "彼は、それを聞くと、慌（あわただ）しく答えた。", "「いや　　　　　　忝（かたじけな）うござる。」", "この問答を聞いていた者は、皆、一時に、失笑した。「いや　　　　　　忝うござる。」――こういって、五位の答を、真似る者さえある。いわゆる、橙黄橘紅（とうくわうきつこう）を盛った窪坏（くぼつき）や高坏の上に多くの揉（もみ）烏帽子や立（たて）烏帽子が、笑声と共に一しきり、波のように動いた。中でも、最（もっとも）、大きな声で、機嫌よく、笑ったのは、利仁自身である。", "「では、その中に、御誘い申そう。」そういいながら、彼は、ちょいと顔をしかめた。こみ上げて来る笑と今飲んだ酒とが、喉で一つになったからである。「　　　　　　しかと、よろしいな。」", "「忝うござる。」", "五位は赤くなって、喫（ども）りながら、また、前の答を繰返した。一同が今度も、笑ったのは、いうまでもない。それがいわせたさに、わざわざ念を押した当の利仁に至っては、前よりも一層　　　　　可笑（をか）しそうに広い肩をゆすって、笑笑（こうせう）した。この朔北（さくほく）の野人は、生活の方法を二つしか心得ていない。一つは酒を飲む事で、他の一つは笑う事である。", "しかし幸（さいわい）に談話の中心は、程なく、この二人を離れてしまった。これは事によると、外の連中が、たとい嘲弄にしろ、一同の注意をこの赤鼻の五位に集中させるのが、不快だったからかも知れない。とにかく、談柄（だんぺい）はそれからそれへと移って、酒も肴（さかな）も残少（のこりずくな）になった時分には、某（なにがし）という侍　学生（がくしゃう）が、行縢（むかばき）の片皮へ、両足を入れて馬に乗ろうとした話が、一座の興味を集めていた。が、五位だけは、まるで外の話が聞えないらしい。恐らく芋粥の二字が、彼のすべての思量を支配しているからであろう。前に雉子（きぎす）の炙（や）いたのがあっても、箸をつけない。黒酒の杯があっても、口を触れない。彼は、ただ、両手を膝の上に置いて、見合いをする娘のように霜に犯されかかった鬢（びん）の辺まで、初心（うぶ）らしく上気しながら、何時までも空になった黒塗の椀を見つめて、多愛もなく、微笑しているのである。", "―――――――――――――――――", "それから、四五日たった日の午前、加茂川の河原に沿って、粟田口（あはたぐち）へ通う街道を、静に馬を進めてゆく二人の男があった。一人は濃い縹（はなだ）の狩衣（かりぎぬ）に同じ色の袴をして、打出（うちで）の太刀を佩（は）いた「鬚黒く鬢（びん）ぐきよき」男である。もう一人は、みすぼらしい青鈍（あをにび）の水干に、薄綿の衣（きぬ）を二つばかり重ねて着た、四十かっこうの侍で、これは、帯のむすび方のだらしのない容子（ようす）といい、赤鼻でしかも穴のあたりが、洟（はな）にぬれている容子といい、身のまわり万端のみすぼらしい事　　　　　夥（おびただ）しい。最も、馬は二人とも、前のは月毛（つきげ）、後のは芦毛（あしげ）の三歳駒で、道をゆく物売りや侍も、振向いて見る程の俊足である。その後からまた二人、馬の歩みに遅れまいとして随（つ）いて行くのは、調度掛と舎人（とねり）とに相違ない。――これが、利仁と五位との一行である事は、わざわざ、ここに断るまでもない話であろう。", "冬とはいいながら、物静に晴れた日で、白けた河原の石の間、潺湲（せんくわん）たる水の辺（ほとり）に立枯れている蓬（よもぎ）の葉を、ゆする程の風もない。川に臨んだ背の低い柳は、葉のない枝に飴（あめ）のごとく滑かな日の光りをうけて、梢（こずえ）にいる鶺鴒（せきれい）の尾を動かすのさへ、鮮かに、それと、影を街道に落している。東山の暗い緑の上に、霜に焦げた天鵞絨（びろうど）のような肩を、丸々と出しているのは、大方、比英（ひえい）の山であろう。二人はその中に鞍（くら）の螺鈿（らでん）を、まばゆく日にきらめかせながら鞭をも加えず悠々と、粟田口を指して行くのである。", "「どこでござるかな、手前をつれて行って、やらうと仰せられるのは。」五位が馴れない手に手綱をかいくりながら、いった。", "「すぐ、そこじゃ。お案じになる程遠くはない。」", "「すると、粟田口辺でござるかな。」", "「まず、そう思われたがよろしかろう。」", "利仁は今朝五位を誘うのに、東山の近くに湯の湧いている所があるから、そこへ行こうといってでてきたのである。赤鼻の五位は、それを真（ま）にうけた。久しく湯にはいらないので、体中がこの間からむづ痒（がゆ）い。芋粥の馳走になった上に、入湯ができれば、願ってもない仕合せである。こう思って、予（あらかじ）め利仁が牽かせて来た、芦毛の馬に跨（またが）った。所が、轡（くつわ）を並べてここまで来て見ると、どうも利仁はこの近所へ来るつもりではないらしい。現に、そうこうしている中に、粟田口は通りすぎた。", "「粟田口では、ござらぬのう。」", "「いかにも、もそっと、あなたでな。」", "利仁は、微笑を含みながら、わざと、五位の顔を見ないようにして、静に馬を歩ませている。両側の人家は、次第に希になって、今は、広々とした冬田の上に、餌をあさる鴉（からす）が見えるばかり、山の陰に消残って、雪の色も仄（ほのか）に青く煙っている。晴れながら、とげとげしい櫨（はじ）の梢が、眼に痛く空を刺しているのさへ、何となく肌寒い。", "「では、山科（やましな）辺ででもござるかな。」", "「山科は、これじゃ。もそっと、さきでござるよ。」", "なるほど、そういう中に、山科も通りすぎた。それ所ではない。何かとする中に、関山も後にして、彼これ（かれこれ）、午（ひる）少しすぎた時分には、とうとう三井寺の前へ来た。三井寺には、利仁の懇意にしている僧がある。二人はその僧を訪ねて、午餐（ひるげ）の馳走になった。それがすむと、また、馬に乗って、途を急ぐ。行手は今まで来た路に比べると遥に人煙が少ない。ことに当時は盗賊が四方に横行した、物騒な時代である。――五位は猫背を一層低くしながら、利仁の顔を見上げるようにして尋ねた。", "「まだ、さきでござるのう。」", "利仁は微笑した。悪戯（いたずら）をして、それを見つけられそうになった子供が、年長者に向ってするような微笑である。鼻の先へよせた皺（しわ）と、眼尻にたたえた筋肉のたるみとが、笑ってしまおうか、しまうまいかとためらっているらしい。そうして、とうとう、こういった。", "「実はな、敦賀（つるが）まで、お連れ申そうと思うたのじゃ。」笑いながら、利仁は鞭を挙げて遠くの空を指さした。その鞭の下には、（てきれき）として、午後の日を受けた近江（あふみ）の湖が光つている。", "五位は、狼狽（らうばい）した。", "「敦賀と申すと、あの越前（えちぜん）の敦賀でござるかな。あの越前の――」", "利仁が、敦賀の人、藤原　　　　　有仁（ありひと）の女婿（ぢよせい）になってから、多くは敦賀に住んでいるという事も、日頃から聞いていない事はない。が、その敦賀まで自分をつれて行く気だろうとは、今の今まで思わなかった。第一、幾多の山河を隔てている越前の国へ、この通り、僅二人の伴人（ともびと）をつれただけで、どうして無事に行かれよう。ましてこの頃は、往来（ゆきき）の旅人が、盗賊の為に殺されたという噂（うはさ）さへ、諸方にある。――五位は嘆願するように、利仁の顔を見た。", "「それはまた、滅相な、東山じゃと心得れば、山科。山科じゃと心得れば、三井寺。揚句が越前の敦賀とは、一体どうしたという事でござる。始めから、そう仰せられうなら、下人共なりと、召つれようものを。――敦賀とは、滅相な。」", "五位は、ほとんどべそを掻かないばかりになって、呟（つぶや）いた。もし「芋粥に飽かむ」事が、彼の勇気を鼓舞しなかったとしたら、彼は恐らく、そこから別れて、京都へ独り帰って来た事であろう。", "「利仁が一人いるのは、千人ともお思いなされ。路次の心配は、御無用じゃ。」", "五位の狼狽するのを見ると、利仁は、少し眉を顰（しか）めながら、嘲笑（あざわら）った。そうして調度掛を呼寄せて、持たせて来た壷胡（つぼやなぐひ）を背に負うと、やはり、その手から、黒漆（こくしつ）の真弓（まゆみ）をうけ取って、それを鞍上に横へながら、先に立って、馬を進めた。こうなる以上、意気地のない五位は、利仁の意志に盲従するより外に仕方がない。それで、彼は心細そうに、荒涼とした周囲の原野を眺めながら、うろ覚えの観音経（くわんおんぎやう）を口の中に念じ念じ、例の赤鼻を鞍の前輪にすりつけるようにして、覚束ない馬の歩みを、相変わらず（あいかわらず）とぼとぼと進めて行った。", "馬蹄の反響する野は、茫々たる黄茅（くわうばう）に覆（おほ）はれて、その所々にある行潦（みづたまり）も、つめたく、青空を映したまま、この冬の午後を、何時かそれなり凍つてしまうかと疑われる。その涯（はて）には、一帯の山脈が、日に背いているせいか、かがやく可き残雪の光もなく、紫がかった暗い色を、長々となすっているが、それさえ蕭条（せうでう）たる幾叢（いくむら）の枯薄（かれすすき）に遮（さえぎ）られて、二人の従者の眼には、はいらない事が多い。――すると、利仁が、突然、五位の方をふりむいて、声をかけた。", "「あれに、よい使者が参った。敦賀への言づけを申そう。」", "五位は利仁のいう意味が、よくわからないので、怖々（こはごは）ながら、その弓で指さす方を、眺めて見た。元より人の姿が見えるような所ではない。ただ、野葡萄（のぶどう）か何かの蔓（つる）が、潅木の一むらにからみついている中を、一疋の狐が、暖かな毛の色を、傾きかけた日に暴（さら）しながら、のそりのそり歩いて行く。――と思う中に、狐は、慌（あわ）ただしく身を跳らせて、一散に、どこともなく走り出した。利仁が急に、鞭を鳴らせて、その方へ馬を飛ばし始めたからである。五位も、われを忘れて、利仁の後を、逐（お）った。従者ももちろん、遅れてはいられない。しばらくは、石を蹴る馬蹄の音が、戞々（かつかつ）として、広野の静けさを破っていたが、やがて利仁が、馬を止めたのを見ると、何時、捕えたのか、もう狐の後足を掴（つか）んで、倒（さかさま）に、鞍の側へ、ぶら下げている。狐が、走れなくなるまで、追いつめた所で、それを馬の下に敷いて、手取りにしたものであろう。五位は、うすい髭にたまる汗を、慌しく拭きながら、漸（やうやく）、その傍へ馬を乗りつけた。", "「これ、狐、よう聞けよ。」利仁は、狐を高く眼の前へつるし上げながら、わざと物々しい声を出してこういった。「その方、今夜の中に、敦賀の利仁が館（やかた）へ参って、こう申せ。『利仁は、ただいま　　　　　俄（にはか）に客人を具して下ろうとする所じゃ。明日、巳時（みのとき）頃、高島の辺まで、男たちを迎ひに遣（つか）はし、それに、鞍置馬二疋、牽かせて参れ。』よいか忘れるなよ。」", "いい畢（をは）ると共に、利仁は、一ふり振って狐を、遠くの叢（くさむら）の中へ、放（はふ）り出した。", "「いや、走るわ。走るわ。」", "やっと、追いついた二人の従者は、逃げてゆく狐の行方を眺めながら、手を拍（う）つて囃（はや）し立てた。落葉のような色をしたその獣の背は、夕日の中を、まつしぐらに、木の根石くれの嫌いなく、何処までも、走って行く。それが一行の立っている所から、手にとるようによく見えた。狐を追っている中に、何時か彼等は、広野が緩（ゆる）い斜面を作って、水の枯れた川床と一つになる、そのちょうど上の所へ、出ていたからである。", "「広量（くわうりやう）の御使でござるのう。」", "五位は、ナイイヴな尊敬と賛嘆とを洩らしながら、この狐さえ頤使（いし）する野育ちの武人の顔を、今更のように、仰いで見た。自分と利仁との間に、どれ程の懸隔があるか、そんな事は、考える暇がない。ただ、利仁の意志に、支配される範囲が広いだけに、その意志の中に包容される自分の意志も、それだけ自由が利くようになった事を、心強く感じるだけである。――阿諛（あゆ）は、恐らく、こういう時に、最（もっとも）自然に生れて来るものであろう。読者は、今後、赤鼻の五位の態度に、幇間（ほうかん）のような何物かを見出しても、それだけで盲（みだり）にこの男の人格を、疑う可きではない。", "放り出された狐は、なぞへ　　の斜面を、転げるようにして、駈け下りると、水のない河床の石の間を、器用に、ぴよいぴよい、飛び越えて、今度は、向うの斜面へ、勢よく、すぢかひに駈け上った。駈け上りながら、ふりかえって見ると、自分を手捕りにした侍の一行は、まだ遠い傾斜の上に馬を並べて立っている。それが皆、指を揃えた程に、小さく見えた。ことに入日を浴びた、月毛と芦毛とが、霜を含んだ空気の中に、描いたよりもくっきりと、浮き上っている。", "狐は、頭をめぐらすと、また枯薄の中を、風のように走り出した。", "―――――――――――――――――", "一行は、予定通り翌日の巳時（みのとき）ばかりに、高島の辺へ来た。ここは琵琶湖に臨んだ、ささやかな部落で、昨日に似ず、どんよりと曇った空の下に、幾戸の藁屋（わらや）が、疎（まばら）にちらばっているばかり、岸に生えた松の樹の間には、灰色の漣　（さざなみ）をよせる湖の水面が、磨くのを忘れた鏡のように、さむざむと開けている。――ここまで来ると利仁が、五位を顧みていった。", "「あれを御覧（ごらん）じろ。男どもが、迎ひに参ったげでござる。」", "見ると、なるほど、二疋の鞍置馬を牽いた、二三十人の男たちが、馬に跨がったのもあり徒歩（かち）のもあり、皆水干の袖を寒風に翻へして、湖の岸、松の間を、一行の方へ急いで来る。やがてこれが、間近くなったと思うと、馬に乗っていた連中は、慌ただしく鞍を下り、徒歩の連中は、路傍に蹲踞（そんきよ）して、いずれも恭々しく、利仁の来るのを、待ちうけた。", "「やはり、あの狐が、使者を勤めたと見えますのう。」", "「生得（しやうとく）、変化（へんげ）ある獣じゃて、あの位の用を勤めるのは、何でもござらぬ。」", "五位と利仁とが、こんな話をしている中に、一行は、郎等（らうどう）たちの待っている所へ来た。「大儀じゃ。」と、利仁が声をかける。蹲踞していた連中が、忙しく立って、二人の馬の口を取る。急に、すべてが陽気になった。", "「夜前、希有（けう）な事が、ございましてな。」", "二人が、馬から下りて、敷皮の上へ、腰を下すか下さない中に、桧皮色（ひはだいろ）の水干を着た、白髪の郎等が、利仁の前へ来て、こういった。「何じゃ。」利仁は、郎等たちの持って来た篠枝（ささえ）や破篭（わりご）を、五位にも勧めながら、鷹揚（おうやう）に問いかけた。", "「さればでございまする。夜前、戌時（いぬのとき）ばかりに、奥方が俄（にはか）に、人心地（ひとごこち）をお失いなされましてな。『おのれは、阪本の狐じゃ。今日、殿の仰せられた事を、言伝（ことづ）てせうほどに、近う寄って、よう聞きやれ。』と、こう仰有（おつしや）るのでございまする。さて、一同がお前に参りますると、奥方の仰せられまするには、『殿はただいま俄に客人を具して、下られようとする所じゃ。明日巳時頃、高島の辺まで、男どもを迎ひに遺はし、それに鞍置馬二疋牽かせて参れ。』と、こう御意（ぎよい）遊ばすのでございまする。」", "「それは、また、希有（けう）な事でござるのう。」五位は利仁の顔と、郎等の顔とを、仔細らしく見比べながら、両方に満足を与えるような、相槌（あひづち）を打った。", "「それもただ、仰せられるのではございませぬ。さも、恐ろしそうに、わなわなとお震へになりましてな、『遅れまいぞ。遅れれば、おのれが、殿の御勘当をうけねばならぬ。』と、しつきりなしに、お泣きになるのでございまする。」", "「して、それから、如何（いかが）した。」", "「それから、多愛なく、お休みになりましてな。手前共の出て参りまする時にも、まだ、お眼覚にはならぬようで、ございました。」", "「いかがでござるな。」郎等の話を聞き完（をは）ると、利仁は五位を見て、得意らしくいった。「利仁には、獣（けもの）も使われ申すわ。」", "「何とも驚き入る外は、ござらぬのう。」五位は、赤鼻を掻きながら、ちょいと、頭を下げて、それから、わざとらしく、呆れたように、口を開いて見せた。口髭には、今飲んだ酒が、滴（しづく）になって、くっついている。", "―――――――――――――――――", "その日の夜の事である。五位は、利仁の館（やかた）の一間（ひとま）に、切灯台の灯を眺めるともなく、眺めながら、寝つかれない長の夜をまぢまぢして、明（あか）していた。すると、夕方、ここへ着くまでに、利仁や利仁の従者と、談笑しながら、越えて来た松山、小川、枯野、あるいは、草、木の葉、石、野火の煙のにおい、――そういうものが、一つずつ、五位の心に、浮んで来た。ことに、雀色時（すずめいろどき）の靄（もや）の中を、やっと、この館へ辿（たど）りついて、長櫃（ながびつ）に起してある、炭火の赤い炎を見た時の、ほっとした心もち、――それも、今こうして、寝ていると、遠い昔にあった事としか、思われない。五位は綿の四五寸もはいった、黄いろい直垂（ひたたれ）の下に、楽々と、足をのばしながら、ぼんやり、われとわが寝姿を見回した。", "直垂の下に利仁が貸してくれた、練色（ねりいろ）の衣（きぬ）の綿厚（わたあつ）なのを、二枚まで重ねて、着こんでいる。それだけでも、どうかすると、汗が出かねない程、暖かい。そこへ、夕飯の時に一杯やった、酒の酔が手伝っている。枕元の蔀（しとみ）一つ隔てた向うは、霜の冴えた広庭だが、それも、こう陶然としていれば、少しも苦にならない。万事が、京都の自分の曹司（ぞうし）にいた時と比べれば、雲泥の相違である。が、それにも係わらず、我五位の心には、何となく釣合のとれない不安があった。第一、時間のたって行くのが、待遠い。しかもそれと同時に、夜の明けるという事が、――芋粥を食う時になるという事が、そう早く、来てはならないような心もちがする。そうしてまた、この矛盾した二つの感情が、互に克し合う後には、境遇の急激な変化から来る、落着かない気分が、今日の天気のように、うすら寒く控えている。それが、皆、邪魔になって、折角の暖かさも、容易に、眠りを誘いそうもない。", "すると、外の広庭で、誰か大きな声を出しているのが、耳にはいった。声がらでは、どうも、今日、途中まで迎えに出た、白髪の郎等が何か告（ふ）れているらしい。その乾（ひ）からびた声が、霜に響くせいか、凛々（りんりん）として凩（こがらし）のように、一語ずつ五位の骨に、応えるような気さえする。", "「この辺の下人、承はれ。殿の御意遊ばさるるには、明朝、卯時（うのとき）までに、切口三寸、長さ五尺の山の芋を、老若各（おのおの）、一筋ずつ、持って参る様にとある。忘れまいぞ、卯時までにじゃ。」", "それが、二三度、繰返されたかと思うと、やがて、人のけはひが止んで、あたりは忽（たちま）ち元のように、静な冬の夜になった。その静な中に、切灯台の油が鳴る。赤い真綿のような火が、ゆらゆらする。五位は欠伸（あくび）を一つ、噛みつぶして、また、とりとめのない、思量に耽（ふけ）り出した。――山の芋というからには、もちろん芋粥にする気で、持って来させるのに相違ない。そう思うと、一時、外に注意を集中したおかげで忘れていた、さっきの不安が、何時の間にか、心に帰って来る。ことに、前よりも、一層強くなったのは、あまり早く芋粥にありつきたくないという心もちで、それが意地悪く、思量の中心を離れない。どうもこう容易に「芋粥に飽かむ」事が、事実となって現れては、折角今まで、何年となく、辛抱して待っていたのが、いかにも、無駄な骨折のように、見えてしまう。できる事なら、突然何か故障が起って一旦、芋粥が飲めなくなってから、また、その故障がなくなって、今度は、やっとこれにありつけるというような、そんな手続きに、万事を運ばせたい。――こんな考えが、「こまつぶり」のように、ぐるぐる一つ所を回っている中に、何時か、五位は、旅の疲れで、ぐっすり、熟睡してしまった。", "翌朝、眼がさめると、直（すぐ）に、昨夜の山の芋の一件が、気になるので、五位は、何よりも先に部屋の蔀（しとみ）をあげて見た。すると、知らない中に、寝すごして、もう卯時（うのとき）をすぎていたのであろう。広庭へ敷いた、四五枚の長筵（ながむしろ）の上には、丸太のような物が、凡（およ）そ、二三千本、斜につき出した、桧皮葺（ひはだぶき）の軒先へつかえる程、山のように、積んである。見るとそれが、ことごとく、切口三寸、長さ五尺の途方もなく大きい、山の芋であった。", "五位は、寝起きの眼をこすりながら、ほとんど周章に近い驚愕（きやうがく）に襲われて、呆然（ばうぜん）と、周囲を見回した。広庭の所々には、新しく打ったらしい杭の上に五斛納釜（ごくなふがま）を五つ六つ、かけ連ねて、白い布の襖（あを）を着た若い下司女（げすおんな）が、何十人となく、そのまわりに動いている。火を焚きつけるもの、灰を掻くもの、あるいは、新しい白木の桶（をけ）に、「あまずらみせん」を汲んで釜の中へ入れるもの、皆芋粥をつくる準備で、眼のまわる程忙しい。釜の下から上る煙と、釜の中から湧く湯気とが、まだ消え残っている明方の靄と一つになって、広庭一面、はっきり物も見定められない程、灰色のものが罩（こ）めた中で、赤いのは、烈々と燃え上る釜の下の炎ばかり、眼に見るもの、耳に聞くものことごとく、戦場か火事場へでも行ったような騒ぎである。五位は、今更のように、この巨大な山の芋が、この巨大な五斛納釜の中で、芋粥になる事を考えた。そうして、自分が、その芋粥を食う為に京都から、わざわざ、越前の敦賀まで旅をして来た事を考えた。考えれば考える程、何一つ、情なくならないものはない。我五位の同情すべき食欲は、実に、この時もう、一半を減却（げんきやく）してしまったのである。", "それから、一時間の後、五位は利仁や舅（しうと）の有仁（ありひと）と共に、朝飯の膳に向った。前にあるのは、銀（しろがね）の提（ひさげ）の一斗ばかりはいるのに、なみなみと海のごとくたたえた、恐るべき芋粥である。五位はさっき、あの軒まで積上げた山の芋を、何十人かの若い男が、薄刃を器用に動かしながら、片端から削るように、勢よく切るのを見た。それからそれを、あの下司女たちが、右往左往に馳せちがって、一つのこらず、五斛納釜へすくっては入れ、すくっては入れするのを見た。最後に、その山の芋が、一つも長筵の上に見えなくなった時に、芋のにおいと、甘葛（あまずら）のにおいとを含んだ、幾道（いくどう）かの湯気の柱が、蓬々然（ほうほうぜん）として、釜の中から、晴れた朝の空へ、舞上って行くのを見た。これを、目（ま）のあたりに見た彼が、今、提に入れた芋粥に対した時、まだ、口をつけない中から、すでに、満腹を感じたのは、恐らく、無理もない次第であろう。――五位は、提を前にして、間の悪そうに、額の汗を拭いた。", "「芋粥に飽かれた事が、ござらぬげな。どうぞ、遠慮なく召上って下され。」", "舅の有仁は、童児たちにいいつけて、更に幾つかの銀の提を膳の上に並べさせた。中にはどれも芋粥が、溢（あふ）れんばかりにはいっている。五位は眼をつぶって、ただでさえ赤い鼻を、一層赤くしながら、提に半分ばかりの芋粥を大きな土器（かはらけ）にすくって、いやいやながら飲み干した。", "「父も、そう申すじゃて。平（ひら）に、遠慮は御無用じゃ。」", "利仁も側から、新な提をすすめて、意地悪く笑いながらこんな事をいう。弱ったのは五位である。遠慮のない所をいえば、始めから芋粥は、一椀も吸いたくない。それを今、我慢して、やっと、提に半分だけ平げた。これ以上、飲めば、喉を越さない中にもどしてしまう、そうかといって、飲まなければ、利仁や有仁の厚意を無にするのも、同じである。そこで、彼はまた眼をつぶって、残りの半分を三分の一程飲み干した。もう後は一口も吸いようがない。", "「何とも、忝うござった。もう十分頂戴致したて。――いやはや、何とも忝うござった。」", "五位は、しどろもどろになって、こういった。よほど弱ったと見えて、口髭にも、鼻の先にも、冬とは思われない程、汗が玉になって、垂れている。", "「これはまた、御少食じゃ。客人は、遠慮をされると見えたぞ。それそれその方ども、何を致している。」", "童児たちは、有仁の語につれて、新な提の中から、芋粥を、土器（かはらけ）に汲まうとする。五位は、両手を蠅でも逐ふように動かして、平に、辞退の意を示した。", "「いや、もう、十分でござる。　　　　　　失礼ながら、十分でござる。」", "もし、この時、利仁が、突然、向うの家の軒を指して、「あれを御覧（ごらん）じろ」といわなかったなら、有仁はなお（なほ）、五位に、芋粥をすすめて、止まなかったかも知れない。が、幸いにして、利仁の声は、一同の注意を、その軒の方へ持って行った。桧皮葺（ひはだぶき）の軒には、ちょうど、朝日がさしている。そうして、そのまばゆい光に、光沢（つや）のいい毛皮を洗わせながら、一疋の獣が、おとなしく、座っている。見るとそれは一昨日（おととい）、利仁が枯野の路で手捕りにした、あの阪本の野狐であった。", "「狐も、芋粥が欲しさに、見参したそうな。男ども、しやつにも、物を食わせてつかわせ。」", "利仁の命令は、言下（ごんか）に行われた。軒からとび下りた狐は、直に広庭で芋粥の馳走に、与（あづか）ったのである。", "五位は、芋粥を飲んでいる狐を眺めながら、ここへ来ない前の彼自身を、なつかしく、心の中でふり返った。それは、多くの侍たちに愚弄されている彼である。京童（きやうわらべ）にさえ「何じゃ。この鼻赤めが」と、罵られている彼である。色のさめた水干に、指貫（さしぬき）をつけて、飼主のない尨犬（むくいぬ）のように、朱雀大路をうろついて歩く、憐む可き、孤独な彼である。しかし、同時にまた、芋粥に飽きたいという欲望を、唯一人大事に守っていた、幸福な彼である。――彼は、この上芋粥を飲まずにすむという安心と共に、満面の汗が次第に、鼻の先から、乾いてゆくのを感じた。晴れてはいても、敦賀の朝は、身にしみるように、風が寒い。五位は慌てて、鼻をおさへると同時に銀（しろがね）の提に向って大きな嚔（くさめ）をした。", "（大正五年八月）"]}, {"no": 6, "title": "ヴィヨンの妻", "author": "太宰 治", "category": "日本文学-物語", "chars": 20707, "volume": "大", "paras": ["あわただしく、玄関をあける音が聞えて、私はその音で、眼をさましましたが、それは泥酔の夫の、深夜の帰宅にきまっているのでございますから、そのまま黙って寝ていました。", "夫は、隣の部屋に電気をつけ、はあっはあっ、とすさまじく荒い呼吸をしながら、机の引出しや本箱の引出しをあけて掻（か）きまわし、何やら捜している様子でしたが、やがて、どたりと畳に腰をおろして坐ったような物音が聞えまして、あとはただ、はあっはあっという荒い呼吸ばかりで、何をしている事やら、私が寝たまま、", "「おかえりなさいまし。ごはんは、おすみですか？　お戸棚に、おむすびがございますけど」", "と申しますと、", "「や、ありがとう」といつになく優しい返事をいたしまして、「坊やはどうです。熱は、まだありますか？」とたずねます。", "これも珍らしい事でございました。坊やは、来年は四つになるのですが、栄養不足のせいか、または夫の酒毒のせいか、病毒のせいか、よその二つの子供よりも小さいくらいで、歩く足許（あしもと）さえおぼつかなく、言葉もウマウマとか、イヤイヤとかを言えるくらいが関の山で、脳が悪いのではないかとも思われ、私はこの子を銭湯に連れて行きはだかにして抱き上げて、あんまり小さく醜く痩（や）せているので、凄（さび）しくなって、おおぜいの人の前で泣いてしまった事さえございました。そうしてこの子は、しょっちゅう、おなかをこわしたり、熱を出したり、夫は殆ど家に落ちついている事は無く、子供の事など何と思っているのやら、坊やが熱を出しまして、と私が言っても、あ、そう、お医者に連れて行ったらいいでしょう、と言って、いそがしげに二重廻しを羽織ってどこかへ出掛けてしまいます。お医者に連れて行きたくっても、お金も何も無いのですから、私は坊やに添寝して、坊やの頭を黙って撫（な）でてやっているより他は無いのでございます。", "けれどもその夜はどういうわけか、いやに優しく、坊やの熱はどうだ、など珍らしくたずねて下さって、私はうれしいよりも、何だかおそろしい予感で、脊筋が寒くなりました。何とも返辞の仕様が無く黙っていますと、それから、しばらくは、ただ、夫の烈（はげ）しい呼吸ばかり聞えていましたが、", "「ごめん下さい」", "と、女のほそい声が玄関で致します。私は、総身に冷水を浴びせられたように、ぞっとしました。", "「ごめん下さい。大谷さん」", "こんどは、ちょっと鋭い語調でした。同時に、玄関のあく音がして、", "「大谷さん！　いらっしゃるんでしょう？」", "と、はっきり怒っている声で言うのが聞えました。", "夫は、その時やっと玄関に出た様子で、", "「なんだい」", "と、ひどくおどおどしているような、まの抜けた返辞をいたしました。", "「なんだいではありませんよ」と女は、声をひそめて言い、「こんな、ちゃんとしたお家もあるくせに、どろぼうを働くなんて、どうした事です。ひとのわるい冗談はよして、あれを返して下さい。でなければ、私はこれからすぐ警察に訴えます」", "「何を言うんだ。失敬な事を言うな。ここは、お前たちの来るところでは無い。帰れ！　帰らなければ、僕のほうからお前たちを訴えてやる」", "その時、もうひとりの男の声が出ました。", "「先生、いい度胸だね。お前たちの来るところではない、とは出かした。呆（あき）れてものが言えねえや。他の事とは違う。よその家の金を、あんた、冗談にも程度がありますよ。いままでだって、私たち夫婦は、あんたのために、どれだけ苦労をさせられて来たか、わからねえのだ。それなのに、こんな、今夜のような情ねえ事をし出かしてくれる。先生、私は見そこないましたよ」", "「ゆすりだ」と夫は、威たけ高に言うのですが、その声は震えていました。「恐喝だ。帰れ！　文句があるなら、あした聞く」", "「たいへんな事を言いやがるなあ、先生、すっかりもう一人前の悪党だ。それではもう警察へお願いするより手がねえぜ」", "その言葉の響きには、私の全身鳥肌立ったほどの凄（すご）い憎悪がこもっていました。", "「勝手にしろ！」と叫ぶ夫の声は既に上ずって、空虚な感じのものでした。", "私は起きて寝巻きの上に羽織を引掛け、玄関に出て、二人のお客に、", "「いらっしゃいまし」", "と挨拶しました。", "「や、これは奥さんですか」", "膝（ひざ）きりの短い外套（がいとう）を着た五十すぎくらいの丸顔の男のひとが、少しも笑わずに私に向ってちょっと首肯（うなず）くように会釈しました。", "女のほうは四十前後の痩せて小さい、身なりのきちんとしたひとでした。", "「こんな夜中にあがりまして」", "とその女のひとは、やはり少しも笑わずにショールをはずして私にお辞儀をかえしました。", "その時、矢庭に夫は、下駄を突っかけて外に飛び出ようとしました。", "「おっと、そいつあいけない」", "男のひとは、その夫の片腕をとらえ、二人は瞬時もみ合いました。", "「放せ！　刺すぞ」", "夫の右手にジャックナイフが光っていました。そのナイフは、夫の愛蔵のものでございまして、たしか夫の机の引出しの中にあったので、それではさっき夫が家へ帰るなり何だか引出しを掻きまわしていたようでしたが、かねてこんな事になるのを予期して、ナイフを捜し、懐にいれていたのに、違いありません。", "男のひとは身をひきました。そのすきに夫は大きい鴉（からす）のように二重廻しの袖をひるがえして、外に飛び出しました。", "「どろぼう！」", "と男のひとは大声を挙げ、つづいて外に飛び出そうとしましたが、私は、はだしで土間に降りて男を抱いて引きとめ、", "「およしなさいまし。どちらにもお怪我があっては、なりませぬ。あとの始末は、私がいたします」", "と申しますと、傍から四十の女のひとも、", "「そうですね、とうさん。気ちがいに刃物です。何をするかわかりません」", "と言いました。", "「ちきしょう！　警察だ。もう承知できねえ」", "ぼんやり外の暗闇を見ながら、ひとりごとのようにそう呟（つぶや）き、けれども、その男のひとの総身の力は既に抜けてしまっていました。", "「すみません。どうぞ、おあがりになって、お話を聞かして下さいまし」", "と言って私は式台にあがってしゃがみ、", "「私でも、あとの始末は出来るかも知れませんから。どうぞ、おあがりになって、どうぞ。きたないところですけど」", "二人の客は顔を見あわせ、幽（かす）かに首肯き合って、それから男のひとは様子をあらため、", "「何とおっしゃっても、私どもの気持は、もうきまっています。しかし、これまでの経緯（いきさつ）は一応、奥さんに申し上げて置きます」", "「はあ、どうぞ。おあがりになって。そうして、ゆっくり」", "「いや、そんな、ゆっくりもしておられませんが」", "と言い、男のひとは外套を脱ぎかけました。", "「そのままで、どうぞ。お寒いんですから、本当に、そのままで、お願いします。家の中には火の気が一つも無いのでございますから」", "「では、このままで失礼します」", "「どうぞ。そちらのお方も、どうぞ、そのままで」", "男のひとがさきに、それから女のひとが、夫の部屋の六畳間にはいり、腐りかけているような畳、破れほうだいの障子、落ちかけている壁、紙がはがれて中の骨が露出している襖（ふすま）、片隅に机と本箱、それもからっぽの本箱、そのような荒涼たる部屋の風景に接して、お二人とも息を呑んだような様子でした。", "破れて綿のはみ出ている座蒲団（ざぶとん）を私はお二人にすすめて、", "「畳が汚うございますから、どうぞ、こんなものでも、おあてになって」", "と言い、それから改めてお二人に御挨拶を申しました。", "「はじめてお目にかかります。主人がこれまで、たいへんなご迷惑ばかりおかけしてまいりましたようで、また、今夜は何をどう致しました事やら、あのようなおそろしい真似などして、おわびの申し上げ様もございませぬ。何せ、あのような、変った気象の人なので」", "と言いかけて、言葉がつまり、落涙しました。", "「奥さん。まことに失礼ですが、いくつにおなりで？」", "と男のひとは、破れた座蒲団に悪びれず大あぐらをかいて、肘（ひじ）をその膝の上に立て、こぶしで顎（あご）を支え、上半身を乗り出すようにして私に尋ねます。", "「あの、私でございますか？」", "「ええ。たしか旦那は三十、でしたね？」", "「はあ、私は、あの、……四つ下です」", "「すると、二十、六、いやこれはひどい。まだ、そんなですか？　いや、その筈（はず）だ。旦那が三十ならば、そりゃその筈だけど、おどろいたな」", "「私も、さきほどから」と女のひとは、男のひとの脊中の蔭から顔を出すようにして、「感心しておりました。こんな立派な奥さんがあるのに、どうして大谷さんは、あんなに、ねえ」", "「病気だ。病気なんだよ。以前はあれほどでもなかったんだが、だんだん悪くなりやがった」", "と言って大きい溜息（ためいき）をつき、", "「実は、奥さん」とあらたまった口調になり、「私ども夫婦は、中野駅の近くに小さい料理屋を経営していまして、私もこれも上州の生れで、私はこれでも堅気のあきんどだったのでございますが、道楽気が強い、というのでございましょうか、田舎のお百姓を相手のケチな商売にもいや気がさして、かれこれ二十年前、この女房を連れて東京へ出て来まして、浅草の、或る料理屋に夫婦ともに住込みの奉公をはじめまして、まあ人並に浮き沈みの苦労をして、すこし蓄えも出来ましたので、いまのあの中野の駅ちかくに、昭和十一年でしたか、六畳一間に狭い土間附きのまことにむさくるしい小さい家を借りまして、一度の遊興費が、せいぜい一円か二円の客を相手の、心細い飲食店を開業いたしまして、それでもまあ夫婦がぜいたくもせず、地道に働いて来たつもりで、そのおかげか焼酎（しょうちゅう）やらジンやらを、割にどっさり仕入れて置く事が出来まして、その後の酒不足の時代になりましてからも、よその飲食店のように転業などせずに、どうやら頑張って商売をつづけてまいりまして、また、そうなると、ひいきのお客もむきになって応援をして下さって、所謂（いわゆる）あの軍官の酒さかなが、こちらへも少しずつ流れて来るような道を、ひらいて下さるお方もあり、対米英戦がはじまって、だんだん空襲がはげしくなって来てからも、私どもには足手まといの子供は無し、故郷へ疎開などする気も起らず、まあこの家が焼ける迄（まで）は、と思って、この商売一つにかじりついて来て、どうやら罹災（りさい）もせず終戦になりましたのでほっとして、こんどは大ぴらに闇酒を仕入れて売っているという、手短かに語ると、そんな身の上の人間なのでございます。けれども、こうして手短かに語ると、さして大きな難儀も無く、割に運がよく暮して来た人間のようにお思いになるかも知れませんが、人間の一生は地獄でございまして、寸善尺魔、とは、まったく本当の事でございますね。一寸（いっすん）の仕合せには一尺の魔物が必ずくっついてまいります。人間三百六十五日、何の心配も無い日が、一日、いや半日あったら、それは仕合せな人間です。あなたの旦那の大谷さんが、はじめて私どもの店に来ましたのは、昭和十九年の、春でしたか、とにかくその頃はまだ、対米英戦もそんなに負けいくさでは無く、いや、そろそろもう負けいくさになっていたのでしょうが、私たちにはそんな、実体、ですか、真相、ですか、そんなものはわからず、ここ二、三年頑張れば、どうにかこうにか対等の資格で、和睦（わぼく）が出来るくらいに考えていまして、大谷さんがはじめて私どもの店にあらわれた時にも、たしか、久留米絣（くるめがすり）の着流しに二重廻しを引っかけていた筈で、けれども、それは大谷さんだけでなく、まだその頃は東京でも防空服装で身をかためて歩いている人は少く、たいてい普通の服装でのんきに外出できた頃でしたので、私どもも、その時の大谷さんの身なりを、別段だらし無いとも何とも感じませんでした。大谷さんは、その時、おひとりではございませんでした。奥さんの前ですけれども、いや、もう何も包みかくし無く洗いざらい申し上げましょう、旦那は、或る年増女に連れられて店の勝手口からこっそりはいってまいりましたのです。もっとも、もうその頃は、私どもの店も、毎日おもての戸は閉めっきりで、その頃のはやり言葉で言うと閉店開業というやつで、ほんの少数の馴染客だけ、勝手口からこっそりはいり、そうしてお店の土間の椅子席でお酒を飲むという事は無く、奥の六畳間で電気を暗くして大きい声を立てずに、こっそり酔っぱらうという仕組になっていまして、また、その年増女というのは、そのすこし前まで、新宿のバアで女給さんをしていたひとで、その女給時代に、筋のいいお客を私の店に連れて来て飲ませて、私の家の馴染にしてくれるという、まあ蛇（じゃ）の道はへび、という工合いの附合いをしておりまして、そのひとのアパートはすぐ近くでしたので、新宿のバアが閉鎖になって女給をよしましてからも、ちょいちょい知合いの男のひとを連れてまいりまして、私どもの店にもだんだん酒が少くなり、どんなに筋のいいお客でも、飲み手がふえるというのは、以前ほど有難くないばかりか、迷惑にさえ思われたのですが、しかし、その前の四、五年間、ずいぶん派手な金遣いをするお客ばかり、たくさん連れて来てくれたのでございますから、その義理もあって、その年増のひとから紹介された客には、私どもも、いやな顔をせずお酒を差し上げる事にしていたのでした。だから旦那がその時、その年増のひと、秋ちゃん、といいますが、そのひとに連れられて裏の勝手口からこっそりはいって来ても、別に私どもも怪しむ事なく、れいのとおり、奥の六畳間に上げて、焼酎を出しました。大谷さんは、その晩はおとなしく飲んで、お勘定は秋ちゃんに払わせて、また裏口からふたり一緒に帰って行きましたが、私には奇妙にあの晩の、大谷さんのへんに静かで上品な素振りが忘れられません。魔物がひとの家にはじめて現われる時には、あんなひっそりした、ういういしいみたいな姿をしているものなのでしょうか。その夜から、私どもの店は大谷さんに見込まれてしまったのでした。それから十日ほど経って、こんどは大谷さんがひとりで裏口からまいりまして、いきなり百円紙幣を一枚出して、いやその頃はまだ百円と言えば大金でした、いまの二、三千円にも、それ以上にも当る大金でした、それを無理矢理、私の手に握らせて、たのむ、と言って、気弱そうに笑うのです。もう既に、だいぶ召上っている様子でしたが、とにかく、奥さんもご存じでしょう、あんな酒の強いひとはありません。酔ったのかと思うと、急にまじめな、ちゃんと筋のとおった話をするし、いくら飲んでも、足もとがふらつくなんて事は、ついぞ一度も私どもに見せた事は無いのですからね。人間三十前後は謂（い）わば血気のさかりで、酒にも強い年頃ですが、しかし、あんなのは珍らしい。その晩も、どこかよそで、かなりやって来た様子なのに、それから私の家で、焼酎を立てつづけに十杯も飲み、まるでほとんど無口で、私ども夫婦が何かと話しかけても、ただはにかむように笑って、うん、うん、とあいまいに首肯き、突然、何時（なんじ）ですか、と時間をたずねて立ち上り、お釣を、と私が言いますと、いや、いい、と言い、それは困ります、と私が強く言いましたら、にやっと笑って、それではこの次まであずかって置いて下さい、また来ます、と言って帰りましたが、奥さん、私どもがあのひとからお金をいただいたのは、あとにもさきにも、ただこの時いちど切り、それからはもう、なんだかんだとごまかして、三年間、一銭のお金も払わずに、私どものお酒をほとんどひとりで、飲みほしてしまったのだから、呆れるじゃありませんか」", "思わず、私は、噴き出しました。理由のわからない可笑（おか）しさが、ひょいとこみ上げて来たのです。あわてて口をおさえて、おかみさんのほうを見ると、おかみさんも妙に笑ってうつむきました。それから、ご亭主も、仕方無さそうに苦笑いして、", "「いや、まったく、笑い事では無いんだが、あまり呆れて、笑いたくもなります。じっさい、あれほどの腕前を、他のまともな方面に用いたら、大臣にでも、博士にでも、なんにでもなれますよ。私ども夫婦ばかりでなく、あの人に見込まれて、すってんてんになってこの寒空に泣いている人間が他にもまだまだある様子だ。げんにあの秋ちゃんなど、大谷さんと知合ったばかりに、いいパトロンには逃げられるし、お金も着物も無くしてしまうし、いまはもう長屋の汚い一部屋で乞食みたいな暮しをしているそうだが、じっさい、あの秋ちゃんは、大谷さんと知合った頃には、あさましいくらいのぼせて、私たちにも何かと吹聴していたものです。だいいち、ご身分が凄い。四国の或る殿様の別家の、大谷男爵の次男で、いまは不身持のため勘当せられているが、いまに父の男爵が死ねば、長男と二人で、財産をわける事になっている。頭がよくて、天才、というものだ。二十一で本を書いて、それが石川｜啄木（たくぼく）という大天才の書いた本よりも、もっと上手で、それからまた十何冊だかの本を書いて、としは若いけれども、日本一の詩人、という事になっている。おまけに大学者で、学習院から一高、帝大とすすんで、ドイツ語フランス語、いやもう、おっそろしい、何が何だか秋ちゃんに言わせるとまるで神様みたいな人で、しかし、それもまた、まんざら皆うそではないらしく、他のひとから聞いても、大谷男爵の次男で、有名な詩人だという事に変りはないので、こんな、うちの婆まで、いいとしをして、秋ちゃんと競争してのぼせ上って、さすがに育ちのいいお方はどこか違っていらっしゃる、なんて言って大谷さんのおいでを心待ちにしているていたらくなんですから、たまりません。いまはもう、華族もへったくれも無くなったようですが、終戦前までは、女を口説くには、とにかくこの華族の勘当息子という手に限るようでした。へんに女が、くわっとなるらしいんです。やっぱりこれは、その、いまはやりの言葉で言えば奴隷根性というものなんでしょうね。私なんぞは、男の、それも、すれっからしと来ているのでございますから、たかが華族の、いや、奥さんの前ですけれども、四国の殿様のそのまた分家の、おまけに次男なんて、そんなのは何も私たちと身分のちがいがあろう筈が無いと思っていますし、まさかそんな、あさましく、くわっとなったりなどはしやしません。ですけれども、やはり、何だかどうもあの先生は、私にとっても苦手（にがて）でして、もうこんどこそ、どんなにたのまれてもお酒は飲ませまいと固く決心していても、追われて来た人のように、意外の時刻にひょいとあらわれ、私どもの家へ来てやっとほっとしたような様子をするのを見ると、つい決心もにぶってお酒を出してしまうのです。酔っても、別に馬鹿騒ぎをするわけじゃないし、あれでお勘定さえきちんとしてくれたら、いいお客なんですがねえ。自分で自分の身分を吹聴するわけでもないし、天才だのなんだのとそんな馬鹿げた自慢をした事もありませんし、秋ちゃんなんかが、あの先生の傍で、私どもに、あの人の偉さに就いて広告したりなどすると、僕はお金がほしいんだ、ここの勘定を払いたいんだ、とまるっきり別な事を言って座を白けさせてしまいます。あの人が私どもに今までお酒の代を払った事はありませんが、あのひとのかわりに、秋ちゃんが時々支払って行きますし、また、秋ちゃんの他にも、秋ちゃんに知られては困るらしい内緒の女のひともありまして、そのひとはどこかの奥さんのようで、そのひとも時たま大谷さんと一緒にやって来まして、これもまた大谷さんのかわりに、過分のお金を置いて行く事もありまして、私どもだって、商人でございますから、そんな事でもなかった日には、いくら大谷先生であろうが宮様であろうが、そんなにいつまでも、ただで飲ませるわけにはまいりませんのです。けれども、そんな時たまの支払いだけでは、とても足りるものではなく、もう私どもの大損で、なんでも小金井に先生の家があって、そこにはちゃんとした奥さんもいらっしゃるという事を聞いていましたので、いちどそちらへお勘定の相談にあがろうと思って、それとなく大谷さんにお宅はどのへんでしょうと、たずねる事もありましたが、すぐ勘附いて、無いものは無いんだよ、どうしてそんなに気をもむのかね、喧嘩（けんか）わかれは損だぜ、などと、いやな事を言います。それでも、私どもは何とかして、先生のお家だけでも突きとめて置きたくて、二、三度あとをつけてみた事もありましたが、そのたんびに、うまく巻かれてしまうのです。そのうちに東京は大空襲の連続という事になりまして、何が何やら、大谷さんが戦闘帽などかぶって舞い込んで来て、勝手に押入れの中からブランデイの瓶なんか持ち出して、ぐいぐい立ったまま飲んで風のように立ち去ったりなんかして、お勘定も何もあったものでなく、やがて終戦になりましたので、こんどは私どもも大っぴらで闇の酒さかなを仕入れて、店先には新しいのれんを出し、いかに貧乏の店でも張り切って、お客への愛嬌（あいきょう）に女の子をひとり雇ったり致しましたが、またもや、あの魔物の先生があらわれまして、こんどは女連れでなく、必ず二、三人の新聞記者や雑誌記者と一緒にまいりまして、なんでもこれからは、軍人が没落して今まで貧乏していた詩人などが世の中からもてはやされるようになったとかいうその記者たちの話でございまして、大谷先生は、その記者たちを相手に、外国人の名前だか、英語だか、哲学だか、何だかわけのわからないような、へんな事を言って聞かせて、そうしてひょいと立って外へ出て、それっきり帰りません。記者たちは、興覚め顔に、あいつどこへ行きやがったんだろう、そろそろおれたちも帰ろうか、など帰り支度をはじめ、私は、お待ち下さい、先生はいつもあの手で逃げるのです、お勘定はあなたたちから戴きます、と申します。おとなしく皆で出し合って支払って帰る連中もありますが、大谷に払わせろ、おれたちは五百円生活をしているんだ、と言って怒る人もあります。怒られても私は、いいえ、大谷さんの借金が、いままでいくらになっているかご存じですか？　もしあなたたちが、その借金をいくらでも大谷さんから取って下さったら、私は、あなたたちに、その半分は差し上げます、と言いますと、記者たちも呆れた顔を致しまして、なんだ、大谷がそんなひでえ野郎とは思わなかった、こんどからはあいつと飲むのはごめんだ、おれたちには今夜は金は百円も無い、あした持って来るから、それまでこれをあずかって置いてくれ、と威勢よく外套を脱いだりなんかするのでございます。記者というものは柄が悪い、と世間から言われているようですけれども、大谷さんにくらべると、どうしてどうして、正直であっさりして、大谷さんが男爵の御次男なら、記者たちのほうが、公爵の御総領くらいの値打があります。大谷さんは、終戦後は一段と酒量もふえて、人相がけわしくなり、これまで口にした事の無かったひどく下品な冗談などを口走り、また、連れて来た記者を矢庭に殴って、つかみ合いの喧嘩をはじめたり、また、私どもの店で使っているまだはたち前の女の子を、いつのまにやらだまし込んで手に入れてしまった様子で、私どもも実に驚き、まったく困りましたが、既にもう出来てしまった事ですから泣き寝入りの他は無く、女の子にもあきらめるように言いふくめて、こっそり親御の許（もと）にかえしてやりました。大谷さん、何ももう言いません、拝むから、これっきり来ないで下さい、と私が申しましても、大谷さんは、闇でもうけているくせに人並の口をきくな、僕はなんでも知っているぜ、と下司（げす）な脅迫がましい事など言いまして、またすぐ次の晩に平気な顔してまいります。私どもも、大戦中から闇の商売などして、その罰が当って、こんな化け物みたいな人間を引受けなければならなくなったのかも知れませんが、しかし、今晩のような、ひどい事をされては、もう詩人も先生もへったくれもない、どろぼうです、私どものお金を五千円ぬすんで逃げ出したのですからね。いまはもう私どもも、仕入れに金がかかって、家の中にはせいぜい五百円か千円の現金があるくらいのもので、いや本当の話、売り上げの金はすぐ右から左へ仕入れに注ぎ込んでしまわなければならないんです。今夜、私どもの家に五千円などという大金があったのは、もうことしも大みそかが近くなって来ましたし、私が常連のお客さんの家を廻ってお勘定をもらって歩いて、やっとそれだけ集めてまいりましたのでして、これはすぐ今夜にでも仕入れのほうに手渡してやらなければ、もう来年の正月からは私どもの商売をつづけてやって行かれなくなるような、そんな大事な金で、女房が奥の六畳間で勘定して戸棚の引出しにしまったのを、あのひとが土間の椅子席でひとりで酒を飲みながらそれを見ていたらしく、急に立ってつかつかと六畳間にあがって、無言で女房を押しのけ引出しをあけ、その五千円の札束をわしづかみにして二重まわしのポケットにねじ込み、私どもがあっけにとられているうちに、さっさと土間に降りて店から出て行きますので、私は大声を挙げて呼びとめ、女房と一緒に後を追い、私はこうなればもう、どろぼう！　と叫んで、往来のひとたちを集めてしばってもらおうかとも思ったのですが、とにかく大谷さんは私どもとは知合いの間柄ですし、それもむごすぎるように思われ、今夜はどんな事があっても大谷さんを見失わないようにどこまでも後をつけて行き、その落ちつく先を見とどけて、おだやかに話してあの金をかえてしてもらおう［＃「かえしてもらおう」は底本では「かえてしてもらおう」］、とまあ私どもも弱い商売でございますから、私ども夫婦は力を合せ、やっと今夜はこの家をつきとめて、かんにん出来ぬ気持をおさえて、金をかえして下さいと、おんびんに申し出たのに、まあ、何という事だ、ナイフなんか出して、刺すぞだなんて、まあ、なんという」", "またもや、わけのわからぬ可笑しさがこみ上げて来まして、私は声を挙げて笑ってしまいました。おかみさんも、顔を赤くして少し笑いました。私は笑いがなかなかとまらず、ご亭主に悪いと思いましたが、なんだか奇妙に可笑しくて、いつまでも笑いつづけて涙が出て、夫の詩の中にある「文明の果の大笑い」というのは、こんな気持の事を言っているのかしらと、ふと考えました。", "とにかく、しかし、そんな大笑いをして、すまされる事件ではございませんでしたので、私も考え、その夜お二人に向って、それでは私が何とかしてこの後始末をする事に致しますから、警察沙汰にするのは、もう一日お待ちになって下さいまし、明日そちらさまへ、私のほうからお伺い致します、と申し上げまして、その中野のお店の場所をくわしく聞き、無理にお二人にご承諾をねがいまして、その夜はそのままでひとまず引きとっていただき、それから、寒い六畳間のまんなかに、ひとり坐って物案じいたしましたが、べつだん何のいい工夫も思い浮びませんでしたので、立って羽織を脱いで、坊やの寝ている蒲団（ふとん）にもぐり、坊やの頭を撫（な）でながら、いつまでも、いつまで経っても、夜が明けなければいい、と思いました。", "私の父は以前、浅草公園の瓢箪池（ひょうたんいけ）のほとりに、おでんの屋台を出していました。母は早くなくなり、父と私と二人きりで長屋住居をしていて、屋台のほうも父と二人でやっていましたのですが、いまのあの人がときどき屋台に立ち寄って、私はそのうちに父をあざむいて、あの人と、よそで逢うようになりまして、坊やがおなかに出来ましたので、いろいろごたごたの末、どうやらあの人の女房というような形になったものの、もちろん籍も何もはいっておりませんし、坊やは、てて無し児という事になっていますし、あの人は家を出ると三晩も四晩も、いいえ、ひとつきも帰らぬ事もございまして、どこで何をしている事やら、帰る時は、いつも泥酔していて、真蒼（まっさお）な顔で、はあっはあっと、くるしそうな呼吸をして、私の顔を黙って見て、ぽろぽろ涙を流す事もあり、またいきなり、私の寝ている蒲団にもぐり込んで来て、私のからだを固く抱きしめて、", "「ああ、いかん。こわいんだ。こわいんだよ、僕は。こわい！　たすけてくれ！」", "などと言いまして、がたがた震えている事もあり、眠ってからも、うわごとを言うやら、呻（うめ）くやら、そうして翌（あく）る朝は、魂の抜けた人みたいにぼんやりして、そのうちにふっといなくなり、それっきりまた三晩も四晩も帰らず、古くからの夫の知合いの出版のほうのお方が二、三人、そのひとたちが私と坊やの身を案じて下さって、時たまお金を持って来てくれますので、どうやら私たちも飢え死にせずにきょうまで暮してまいりましたのです。", "とろとろと、眠りかけて、ふと眼をあけると、雨戸のすきまから、朝の光線がさし込んでいるのに気附いて、起きて身支度をして坊やを脊負い、外に出ました。もうとても黙って家の中におられない気持でした。", "どこへ行こうというあてもなく、駅のほうに歩いて行って、駅の前の露店で飴（あめ）を買い、坊やにしゃぶらせて、それから、ふと思いついて吉祥寺までの切符を買って電車に乗り、吊皮（つりかわ）にぶらさがって何気なく電車の天井にぶらさがっているポスターを見ますと、夫の名が出ていました。それは雑誌の広告で、夫はその雑誌に「フランソワ・ヴィヨン」という題の長い論文を発表している様子でした。私はそのフランソワ・ヴィヨンという題と夫の名前を見つめているうちに、なぜだかわかりませぬけれども、とてもつらい涙がわいて出て、ポスターが霞（かす）んで見えなくなりました。", "吉祥寺で降りて、本当にもう何年振りかで井の頭公園に歩いて行って見ました。池のはたの杉の木が、すっかり伐（き）り払われて、何かこれから工事でもはじめられる土地みたいに、へんにむき出しの寒々した感じで、昔とすっかり変っていました。", "坊やを背中からおろして、池のはたのこわれかかったベンチに二人ならんで腰をかけ、家から持って来たおいもを坊やに食べさせました。", "「坊や。綺麗（きれい）なお池でしょ？　昔はね、このお池に鯉（こい）トトや金（きん）トトが、たくさんたくさんいたのだけれども、いまはなんにも、いないわねえ。つまんないねえ」", "坊やは、何と思ったのか、おいもを口の中に一ぱい頬張ったまま、けけ、と妙に笑いました。わが子ながら、ほとんど阿呆の感じでした。", "その池のはたのベンチにいつまでいたって、何のらちのあく事では無し、私はまた坊やを背負って、ぶらぶら吉祥寺の駅のほうへ引返し、にぎやかな露店街を見て廻って、それから、駅で中野行きの切符を買い、何の思慮も計画も無く、謂わばおそろしい魔の淵（ふち）にするすると吸い寄せられるように、電車に乗って中野で降りて、きのう教えられたとおりの道筋を歩いて行って、あの人たちの小料理屋の前にたどりつきました。", "表の戸は、あきませんでしたので、裏へまわって勝手口からはいりました。ご亭主さんはいなくて、おかみさんひとり、お店の掃除をしていました。おかみさんと顔が合ったとたんに私は、自分でも思いがけなかった嘘（うそ）をすらすらと言いました。", "「あの、おばさん、お金は私が綺麗におかえし出来そうですの。今晩か、でなければ、あした、とにかく、はっきり見込みがついたのですから、もうご心配なさらないで」", "「おや、まあ、それはどうも」", "と言って、おかみさんは、ちょっとうれしそうな顔をしましたが、それでも何か腑（ふ）に落ちないような不安な影がその顔のどこやらに残っていました。", "「おばさん、本当よ。かくじつに、ここへ持って来てくれるひとがあるのよ。それまで私は、人質になって、ここにずっといる事になっていますの。それなら、安心でしょう？　お金が来るまで、私はお店のお手伝いでもさせていただくわ」", "私は坊やを背中からおろし、奥の六畳間にひとりで遊ばせて置いて、くるくると立ち働いて見せました。坊やは、もともとひとり遊びには馴（な）れておりますので、少しも邪魔になりません。また頭が悪いせいか、人見知りをしないたちなので、おかみさんにも笑いかけたりして、私がおかみさんのかわりに、おかみさんの家の配給物をとりに行ってあげている留守にも、おかみさんからアメリカの罐詰（かんづめ）の殻を、おもちゃ代りにもらって、それを叩いたりころがしたりしておとなしく六畳間の隅で遊んでいたようでした。", "お昼頃、ご亭主がおさかなや野菜の仕入れをして帰って来ました。私は、ご亭主の顔を見るなり、また早口に、おかみさんに言ったのと同様の嘘を申しました。", "ご亭主は、きょとんとした顔になって、", "「へえ？　しかし、奥さん、お金ってものは、自分の手に、握ってみないうちは、あてにならないものですよ」", "と案外、しずかな、教えさとすような口調で言いました。", "「いいえ、それがね、本当にたしかなのよ。だから、私を信用して、おもて沙汰にするのは、きょう一日待って下さいな。それまで私は、このお店でお手伝いしていますから」", "「お金が、かえって来れば、そりゃもう何も」とご亭主は、ひとりごとのように言い、「何せことしも、あと五、六日なのですからね」", "「ええ、だから、それだから、あの私は、おや？　お客さんですわよ。いらっしゃいまし」と私は、店へはいって来た三人連れの職人ふうのお客に向って笑いかけ、それから小声で、「おばさん、すみません。エプロンを貸して下さいな」", "「や、美人を雇いやがった。こいつあ、凄い」", "と客のひとりが言いました。", "「誘惑しないで下さいよ」とご亭主は、まんざら冗談でもないような口調で言い、「お金のかかっているからだですから」", "「百万ドルの名馬か？」", "ともうひとりの客は、げびた洒落（しゃれ）を言いました。", "「名馬も、雌は半値だそうです」", "と私は、お酒のお燗（かん）をつけながら、負けずに、げびた受けこたえを致しますと、", "「けんそんするなよ。これから日本は、馬でも犬でも、男女同権だってさ」と一ばん若いお客が、呶鳴（どな）るように言いまして、「ねえさん、おれは惚（ほ）れた。一目惚れだ。が、しかし、お前は、子持ちだな？」", "「いいえ」と奥から、おかみさんは、坊やを抱いて出て来て、「これは、こんど私どもが親戚（しんせき）からもらって来た子ですの。これでもう、やっと私どもにも、あとつぎが出来たというわけですわ」", "「金も出来たし」", "と客のひとりが、からかいますと、ご亭主はまじめに、", "「いろも出来、借金も出来」と呟（つぶや）き、それから、ふいと語調をかえて、「何にしますか？　よせ鍋（なべ）でも作りましょうか？」", "と客にたずねます。私には、その時、或る事が一つ、わかりました。やはりそうか、と自分でひとり首肯（うなず）き、うわべは何気なく、お客にお銚子（ちょうし）を運びました。", "その日は、クリスマスの、前夜祭とかいうのに当っていたようで、そのせいか、お客が絶えること無く、次々と参りまして、私は朝からほとんど何一つ戴いておらなかったのでございますが、胸に思いがいっぱい籠（こも）っているためか、おかみさんから何かおあがりと勧められても、いいえ沢山と申しまして、そうしてただもう、くるくると羽衣一まいを纏（まと）って舞っているように身軽く立ち働き、自惚（うぬぼ）れかも知れませぬけれども、その日のお店は異様に活気づいていたようで、私の名前をたずねたり、また握手などを求めたりするお客さんが二人、三人どころではございませんでした。", "けれども、こうしてどうなるのでしょう。私には何も一つも見当が附いていないのでした。ただ笑って、お客のみだらな冗談にこちらも調子を合せて、更にもっと下品な冗談を言いかえし、客から客へ滑り歩いてお酌して廻って、そうしてそのうちに、自分のこのからだがアイスクリームのように溶けて流れてしまえばいい、などと考えるだけでございました。", "奇蹟はやはり、この世の中にも、ときたま、あらわれるものらしゅうございます。", "九時すこし過ぎくらいの頃でございましたでしょうか。クリスマスのお祭りの、紙の三角帽をかぶり、ルパンのように顔の上半分を覆いかくしている黒の仮面をつけた男と、それから三十四、五の痩（や）せ型の綺麗な奥さんと二人連れの客が見えまして、男のひとは、私どもには後向きに、土間の隅の椅子に腰を下しましたが、私はその人がお店にはいってくると直ぐに、誰だか解りました。どろぼうの夫です。", "向うでは、私のことに何も気附かぬようでしたので、私も知らぬ振りして他のお客とふざけ合い、そうして、その奥さんが夫と向い合って腰かけて、", "「ねえさん、ちょっと」", "と呼びましたので、", "「へえ」", "と返辞して、お二人のテーブルのほうに参りまして、", "「いらっしゃいまし。お酒でございますか？」", "と申しました時に、ちらと夫は仮面の底から私を見
