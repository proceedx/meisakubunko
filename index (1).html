てドイツに若（し）くはなからん。幾百種の新聞雑誌に散見する議論には頗（すこぶ）る高なおなるもの多きを、余は通信員となりし日より、曽（かつ）て大学に繁く通いし折、養い得たる一隻の眼孔もて、読みてはまた読み、写してはまた写す程に、今まで一筋の道をのみ走りし知識は、自（おのずか）ら総括的になりて、同郷の留学生などの大かたは、夢にも知らぬ境地に到りぬ。彼等の仲間にはドイツ新聞の社説をだに善くはえ読まぬがあるに。", "明治廿一年の冬は来にけり。表街（おもてまち）の人道にてこそ沙（すな）をも蒔（ま）け、※［＃「金＋※［＃「挿」でつくりの縦棒が下に突き抜けている、（すき）をも揮え、クロステル街のあたりは凸凹（とつあふ）坎「土可」、（かんか）の処は見ゆめれど、表のみは一面に氷りて、朝に戸を開けば飢え凍（こご）えし雀の落ちて死にたるも哀れなり。室（へや）を温め、竃に火を焚きつけても、壁の石を徹し、衣の綿を穿（うが）つ北ヨーロッパの寒さは、なか／＼に堪えがたかり。エリスは二三日前の夜、舞台にて卒倒しつとて、人に扶（たす）けられて帰り来しが、それより心地あしとて休み、もの食うごとに吐くを、悪阻（つはり）というものならんと始めて心づきしは母なりき。嗚呼、さらぬだに覚束（おぼつか）なきは我身の行末なるに、もし真（まこと）なりせばいかにせまし。", "今朝は日曜なれば家に在れど、心は楽しからず。エリスは床に臥（ふ）すほどにはあらねど、小（ちさ）き鉄炉の畔（ほとり）に椅子さし寄せて言葉 寡（すくな）し。この時戸口に人の声して、程なく庖厨（はうちゅう）にありしエリスが母は、郵便の書状を持て来て余にわたしつ。見れば見覚えある相沢が手なるに、郵便切手は普魯西（プロシヤ）のものにて、消印にはベルリン（ベルリン）とあり。訝（いぶか）りつつも披（ひら）きて読めば、とみの事にて預（あらかじ）め知らするに由なかりしが、昨夜（よべ）ここに着せられし天方大臣に付きてわれも来たり。伯の汝（なんぢ）を見まほしとのたまうに疾（と）く来よ。汝が名誉を回復するもこの時にあるべきぞ。心のみ急がれて用事をのみいひ遣（や）るとなり。読み畢（をは）りて茫然たる面もちを見て、エリスいう。「故郷よりの文なりや。悪しき便（たより）にてはよも。」彼は例の新聞社の報酬に関する書状と思いしならん。「否、心にな掛けそ。おん身も名を知る相沢が、大臣と倶にここに来てわれを呼ぶなり。急ぐといえば今よりこそ。」", "かはゆき独り子を出し遣る母もかくは心を用いじ。大臣にまみえもやせんと思えばならん、エリスは病をつとめて起ち、上襦袢（うはじゅばん）も極めて白きを選び、丁寧にしまい置きし「ゲエロツク」という二列ぼたんの服を出して着せ、襟飾りさえ余が為めに手づから結びつ。", "「これにて見苦しとは誰（た）れも得言はじ。我鏡に向きて見玉へ。なぜ（なにゆえ）にかく不興なる面もちを見せ玉ふか。われも諸共（もろとも）に行かまほしきを。」少し容（かたち）をあらためて。「否、かく衣を更め玉ふを見れば、何となくわが豊太郎の君とは見えず。」またた少し考えて。「例え（よしや）富貴になり玉ふ日はありとも、われをば見棄て玉はじ。我病は母の宣（のたま）ふごとくならずとも。」", "「何、富貴。」余は微笑しつ。「政治社会などに出でんの望みは絶ちしより幾年（いくとせ）をか経ぬるを。大臣は見たくもなし。ただ年久しく別れたりし友にこそ逢いには行け。」エリスが母の呼びし一等「ドロシユケ」は、輪下にきしる雪道を「窓心」の下まで来ぬ。余は手袋をはめ、少し汚れたる外套を背に被（おほ）ひて手をば通さず帽を取りてエリスに接吻して楼（たかどの）を下りつ。彼は凍れる「窓／心」、を明け、乱れし髪を朔風（さくふう）に吹かせて余が乗りし車を見送りぬ。", "余が車を下りしは「カイゼルホオフ」の入口なり。門者に秘書官相沢が室の番号を問いて、久しく踏み慣れぬ大理石の階（はしご）を登り、中央の柱に「プリユツシユ」を被える「ゾフア」を据えつけ、正面には鏡を立てたる前房に入りぬ。外套をばここにて脱ぎ、廊（わたどの）をつたいて室の前まで往きしが、余は少し踟「足厨」（ちちう）したり。同じく大学に在りし日に、余が品行の方正なるを激賞したる相沢が、きょうは怎（いか）なる面もちして出迎ふらん。室に入りて相対して見れば、形こそ旧に比ぶれば肥えて逞（たく）ましくなりたれ、依然たる快活の気象、我失行をもさまで意に介せざりきと見ゆ。別後の情を細叙するにも遑（いとま）あらず、引かれて大臣に謁し、委託せられしはドイツ語にて記せる文書の急を要するを翻訳せよとの事なり。余が文書を受領して大臣の室を出でし時、相沢は跡より来て余と午餐（ひるげ）を共にせんといいぬ。", "食卓にては彼多く問いて、我多く答えき。彼が生路は概（おほむ）ね平滑なりしに、轗軻（かんか）数奇（さくき）なるは我身の上なりければなり。", "余が胸憶を開いて物語りし不幸なる閲歴を聞きて、かれはしばしば驚きしが、なかなかに余を譴（せ）めんとはせず、却りて他の凡庸なる諸生輩を罵りき。されど物語の畢（をは）りしとき、彼は色を正して諌（いさ）むるよう、この一段のことは素（も）と生れながらなる弱き心より出でしなれば、今更に言わんも甲斐なし。とはいえ、学識あり、才能あるものが、いつまでか一少女の情にかかづらひて、目的なき生活（なりわい）をなすべき。今は天方伯もただだドイツ語を利用せんの心のみなり。おのれもまた（また）伯が当時の免官の理由を知れるが故に、強（しひ）てその成心を動かさんとはせず、伯が心中にて曲庇者（きよくひもの）なりなんど思われんは、朋友に利なく、おのれに損あればなり。人を薦（すす）むるはまずその能を示すに若（し）かず。これを示して伯の信用を求めよ。また彼少女との関係は、例え彼に誠ありとも、例え情交は深くなりぬとも、人材を知りてのこひにあらず、慣習という一種の惰性より生じたる交なり。意を決して断てと。これ（こ）れその言（こと）のおほむねなりき。", "大洋に舵（かぢ）を失いしふな人が、遥（はるか）なる山を望むごときは、相沢が余に示したる前途の方針（はうしん）なり。されどこの山はなお重霧の間に在りて、いつ往きつかんも、否、果して往きつきぬとも、我中心に満足を与へんも定かならず。貧きが中にも楽しきは今の生活（なりわい）、棄て難きはエリスが愛。わが弱き心には思い定めんよしなかりしが、姑（しばら）く友の言（こと）に従いて、この情縁を断たんと約しき。余は守る所を失はじと思いて、おのれに敵するものには抗抵すれども、友に対して否とはえ対（こた）へぬが常なり。", "別れて出ずれば風 面（おもて）を撲（う）てり。二重（ふたへ）の玻璃（ガラス）「窓心」を緊しく鎖して、大いなる陶炉に火を焚きたる「ホテル」の食堂を出でしなれば、薄き外套を透る午後四時の寒さは殊さらに堪え難く、膚（はだへ）粟立（あはだ）つと共に、余は心の中に一種の寒さを覚えき。", "翻訳は一夜になし果てつ。「カイゼルホオフ」へ通うことはこれより漸く繁くなりもて行く程に、初めは伯の言葉も用事のみなりしが、後には近比（ちかごろ）故郷にてありしことなどを挙げて余が意見を問い、折に触れては道中にて人々の失錯ありしことどもを告げて打笑い玉ひき。", "一月ばかり過ぎて、ある日伯は突然われに向いて、「余は明旦（あす）、魯西亜（ロシア）に向いて出発すべし。随（したが）ひて来（く）べきか、」と問う。余は数日間、かの公務に遑なき相沢を見ざりしかば、この問は不意に余を驚かしつ。「いかで命に従わざらむ。」余は我恥を表わさん。この答はいち早く決断して言いしにあらず。余はおのれが信じて頼む心を生じたる人に、卒しかものを問われたるときは、咄嗟（とつさ）の間（かん）、その答の範囲を善くも量らず、直ちにうべなふことあり。さてうべなひし上にて、その為（な）し難きに心づきても、強（しひ）て当時の心虚なりしを援ひ隠し、耐忍してこれを実行することしばしばなり。", "この日は翻訳の代（しろ）に、旅費さえ添えて賜（たま）はりしを持て帰りて、翻訳の代をばエリスに預けつ。これにて魯西亜より帰り来んまでの費（ついえ）をば支えつべし。彼は医者に見せしに常ならぬ身なりという。貧血の性（さが）なりしゆえ、幾月か心づかでありけん。座頭よりは休むことのあまりに久しければ籍を除きぬと言いおこせつ。まだ一月ばかりなるに、かく厳しきは故あればなるべし。旅立の事にはいたく心を悩ますとも見えず。偽りなき我心を厚く信じたれば。", "鉄路にては遠くもあらぬ旅なれば、用意とてもなし。身に合せて借りたる黒き礼服、新に買求めたるゴタ板の魯廷（ろてい）の貴族譜、二三種の辞書などを、小「カバン」に入れたるのみ。流石に心細きことのみ多きこの程なれば、出で行く跡に残らんも物憂かるべく、また停車場にて涙こぼしなどしたらんには影護（うしろめた）かるべければとて、翌朝早くエリスをば母につけて知る人がり出（いだ）しやりつ。余は旅装整えて戸を鎖し、鍵をば入口に住む靴屋の主人に預けて出でぬ。", "魯国行につきては、何事をか叙すべき。わが舌人（ぜつじん）たる任務（つとめ）は忽地（たちまち）に余を拉（らつ）し去りて、青雲の上に堕（おと）したり。余が大臣の一行に随いて、ペエテルブルクに在りし間に余を囲繞（いねう）せしは、パリ絶頂の驕奢（けうしや）を、氷雪の裡（うち）に移したる王城の粧飾（そうしよく）、故（ことさ）らに黄蝋（わうらふ）の燭（しよく）を幾つ共なく点（とも）したるに、幾星の勲章、幾枝の「エポレツト」が映射する光、彫鏤（てうる）の工（たくみ）を尽したる「カミン」の火に寒さを忘れて使う宮女の扇の閃きなどにて、この間フランス語を最も円滑に使うものはわれなるがゆえに、賓主の間に周旋して事を弁ずるものもまた多くは余なりき。", "この間余はエリスを忘れざりき、否、彼は日毎に書（ふみ）を寄せしかばえ忘れざりき。余が立ちし日には、いつになく独りにて灯火に向わん事の心憂さに、知る人の許（もと）にて夜に入るまでもの語りし、疲るるを待ちて家に還り、直ちにいねつ。次の朝（あした）目醒めし時は、なお独り跡に残りしことを夢にはあらずやと思いぬ。起き出でし時の心細さ、かかる思いをば、生計（たつき）に苦みて、きょうの日の食なかりし折にもせざりき。これ彼が第一の書の略（あらまし）なり。", "また程経てのふみはすこぶる思いせまりて書きたるごとくなりき。文をば否という字にて起したり。否、君を思う心の深き底（そこひ）をば今ぞ知りぬる。君は故里（ふるさと）に頼もしき族（やから）なしとのたまえば、この地に善き世渡のたつきあらば、留り玉はぬことやはある。また我愛もて繋ぎ留めでは止（や）まじ。それも　還り玉はんとならば、親と共に往かんは易けれど、か程に多き路用を何処（いづく）よりか得ん。怎（いか）なる業をなしてもこの地に留りて、君が世に出で玉はん日をこそ待ためと常には思いしが、暫しの旅とて立出で玉ひしよりこの二十日ばかり、別離の思は日にけに茂りゆくのみ。袂（たもと）を分つはただ一瞬の苦艱（くげん）なりと思いしは迷なりけり。我身の常ならぬが漸くにしるくなれる、それさえあるに、例え（よしや）いかなることありとも、我をば努（ゆめ）な棄て玉ひそ。母とはいたく争いぬ。されど我身の過ぎし頃には似で思い定めたるを見て心折れぬ。わが東（ひんがし）に往かん日には、ステツチンわたりの農家に、遠き縁者あるに、身を寄せんとぞいうなる。書きおくり玉ひしごとく、大臣の君に重く用いられ玉はば、我路用の金は兎も角もなりなん。今はただ管（ひたすら）君がベルリンにかえり玉はん日を待つのみ。", "嗚呼、余はこの書を見て始めて我地位を明視し得たり。恥かしきはわが鈍（にぶ）き心なり。余は我身一つの進退につきても、また我身に係らぬ他人（ひと）の事につきても、決断ありと自ら心に誇りしが、この決断は順境にのみありて、逆境にはあらず。我と人との関係を照さんとするときは、頼みし胸中の鏡は曇りたり。", "大臣はすでに我に厚し。されどわが近眼はただだおのれが尽したる職分をのみ見き。余はこれに未来の望を繋ぐことには、神も知るらむ、絶えて想（おもい）到らざりき。されど今ここに心づきて、我心はなお冷然たりし歟（か）。先に友の勧めしときは、大臣の信用は屋上の禽（とり）のごとくなりしが、今は稍（やや）これを得たるかと思わるるに、相沢がこの頃の言葉の端に、本国に帰りて後も倶にかくてあらばうんぬん（しかじか）といいしは、大臣のかく宣（のたま）ひしを、友ながらも公事なれば明には告げざりし歟。今更おもえば、余が軽卒にも彼に向いてエリスとの関係を絶たんといいしを、早く大臣に告げやしけん。", "嗚呼、ドイツに来し初に、自ら我本領を悟りきと思いて、また器械的人物とはならじと誓いしが、こは足を縛して放たれし鳥の暫し羽を動かして自由を得たりと誇りしにはあらずや。足の糸は解くに由なし。曩（さき）にこれを繰（あや）つりしは、我（わが）某（なにがし）省の官長にて、今はこの糸、あなあはれ、天方伯の手中に在り。余が大臣の一行と倶にベルリンに帰りしは、恰（あたか）もこれ新年の旦（あした）なりき。停車場に別を告げて、我家をさして車を駆（か）りつ。ここにては今も除夜に眠らず、元旦に眠るが習なれば、万戸寂然たり。寒さは強く、路上の雪は稜角ある氷片となりて、晴れたる日に映じ、きらきらと輝けり。車はクロステル街に曲りて、家の入口に駐（とど）まりぬ。この時窓を開く音せしが、車よりは見えず。御丁（ぎよてい）に「カバン」持たせて梯を登らんとする程に、エリスの梯を駈け下るに逢いぬ。彼が一声叫びて我 頚（うなじ）を抱きしを見て御丁は呆れたる面もちにて、何やらむ髭（ひげ）の内にていいしが聞えず。「善くぞ帰り来玉ひし。帰り来玉はずば我命は絶えなんを。」", "我心はこの時までも定まらず、故郷を憶（おも）ふ念と栄達を求むる心とは、時として愛情を圧せんとせしが、ただだこの一 刹那（せつな）、低徊踟「足厨」、（ていくわいちちう）の思は去りて、余は彼を抱き、彼の頭（かしら）は我肩に倚りて、彼が喜びの涙ははらはらと肩の上に落ちぬ。", "「幾階か持ちて行くべき。」と鑼（どら）のごとく叫びし御丁は、いち早く登りて梯の上に立てり。", "戸の外に出迎えしエリスが母に、御丁を労（ねぎら）ひ玉へと銀貨をわたして、余は手を取りて引くエリスに伴われ、急ぎて室に入りぬ。一瞥（いちべつ）して余は驚きぬ、机の上には白き木綿、白き「レエス」などを堆（うづたか）く積み上げたれば。", "エリスは打笑（うちえ）みつっこれを指（ゆびさ）して、「何とか見玉ふ、この心がまへを。」といいつつ一つの木綿ぎれを取上ぐるを見れば襁褓（むつき）なりき。「わが心の楽しさを思い玉へ。産れん子は君に似て黒き瞳子（ひとみ）をや持ちたらん。この瞳子。嗚呼、夢にのみ見しは君が黒き瞳子なり。産れたらん日には君が正しき心にて、よもあだし名をばなのらせ玉はじ。」彼は頭を垂れたり。「稚（おさな）しと笑い玉はんが、寺に入らん日はいかに嬉しからまし。」見上げたる目には涙満ちたり。", "二三日の間は大臣をも、たびの疲れやおはさんとて敢（あへ）て訪（とぶ）らはず、家にのみ篭り居（をり）しが、ある日の夕暮使して招かれぬ。往きて見れば待遇ことにめでたく、魯西亜行の労を問い慰めて後、われと共に東にかえる心なきか、君が学問こそわが測り知る所ならね、語学のみにて世の用には足りなむ、滞留の余りに久しければ、様々の係累もやあらんと、相沢に問いしに、さることなしと聞きて落居（おちい）たりと宣う。その気色 辞（いな）むべくもあらず。あなやと思いしが、流石に相沢の言（こと）を偽なりともいい難きに、もしこの手にしも縋（すが）らずば、本国をも失い、名誉を挽（ひ）きかえさん道をも絶ち、身はこの広漠たる欧州大都の人の海に葬られんかと思う念、心頭を衝（つ）いて起れり。嗚呼、何等の特操なき心ぞ、「承（うけたま）はり侍（はべ）り」と応（こた）へたるは。", "黒がねの額（ぬか）はありとも、帰りてエリスに何とかいわん。「ホテル」を出でしときの我心の錯乱は、譬（たと）へんに物なかりき。余は道の東西をも分かず、思に沈みて行く程に、往きあう馬車の御丁に幾度か叱（しつ）せられ、驚きて飛びのきつ。しばらくしてふとあたりを見れば、獣苑の傍（かたはら）に出でたり。倒るるごとくに路の辺（べ）の榻（こしかけ）に倚りて、灼くがごとく熱し、椎（つち）にて打たるるごとく響く頭（かしら）を榻背（たふはい）に持たせ、死したるごときさまにて幾時をか過しけん。劇しき寒さ骨に徹すと覚えて醒めし時は、夜に入りて雪は繁く降り、帽の庇（ひさし）、外套の肩にはちょっと 許（ばかり）もつもりたりき。", "もはや（もはや）十一時をや過ぎけん、モハビツト、カルル街通いの鉄道馬車の軌道も雪に埋もれ、ブランデンブルゲル門の畔（ほとり）の瓦斯灯（ガスとう）は寂しき光を放ちたり。立ち上らんとするに足の凍えたれば、両手にて擦（さす）りて、漸やく歩み得る程にはなりぬ。", "足の運びの捗（はかど）らねば、クロステル街まで来しときは、半夜をや過ぎたりけん。ここ迄来し道をばいかに歩みしか知らず。一月上旬の夜なれば、ウンテル、デン、リンデンの酒家、茶店はなお人の出入盛りにて賑（にぎ）はしかりしならめど、ふつに覚えず。我脳中には唯我は免（ゆる）すべからぬ罪人なりと思う心のみ満ちみちたりき。", "四階の屋根裏には、エリスはまだ寝（い）ねずと覚（お）ぼしく、烱然（けいぜん）たる一星の火、暗き空にすかせば、明かに見ゆるが、降りしきる鷺のごとき雪片に、ながら（たちま）ち援はれ、ながらちまた顕れて、風に弄（もてあそ）ばるるに似たり。戸口に入りしより疲を覚えて、身の節の痛み堪え難ければ、這（は）ふごとくに梯を登りつ。庖厨（はうちゅう）を過ぎ、室の戸を開きて入りしに、机に倚りて襁褓（むつき）縫いたりしエリスは振り返へりて、「あ」と叫びぬ。「いかにかし玉ひし。おん身の姿は。」", "驚きしも宜（うべ）なりけり、蒼然として死人に等しき我面色、帽をばいつの間にか失い、髪は蓬（おど）ろと乱れて、幾度か道にて跌（つまず）き倒れしことなれば、衣は泥まじりの雪に※［＃「さんずい＋于」、第3水準1-86-49］（よご）れ、処々は裂けたれば。", "余は答えんとすれど声出でず、膝の頻（しき）りに戦（をのの）かれて立つに堪えねば、椅子を握（つか）まんとせしまでは覚えしが、そのまま（まま）に地に倒れぬ。", "人事を知る程になりしは数週（すしう）の後なりき。熱劇しくて譫語（うはこと）のみ言いしを、エリスが慇（ねもごろ）にみとる程に、ある日相沢は尋ね来て、余がかれに隠したる転末（てんまつ）を審（つば）らに知りて、大臣には病の事のみ告げ、よきやうに繕（つくろ）ひ置きしなり。余は始めて、病床に侍するエリスを見て、その変りたる姿に驚きぬ。彼はこの数週の内にいたく痩せて、血走りし目は窪み、灰色の頬（ほ）は落ちたり。相沢の助にて日々の生計（たつき）には窮せざりしが、この恩人は彼を精神的に殺ししなり。", "後に聞けば彼は相沢に逢いしとき、余が相沢に与へし約束を聞き、またかの夕べ大臣に聞え上げし一諾を知り、俄（にはか）に座より躍り上がり、面色さながら土のごとく、「我豊太郎ぬし、かくまでに我をば欺き玉ひしか」と叫び、その場に僵（たふ）れぬ。相沢は母を呼びて共に扶（たす）けて床に臥させしに、しばらくして醒めしときは、目は直視したるままにて傍の人をも見知らず、我名を呼びていたく罵り、髪をむしり、蒲団（ふとん）を噛みなどし、また遽（にはか）に心づきたる様にて物を探り討（もと）めたり。母の取りて与うるものをば悉（ことごと）く放（なげう）ちしが、机の上なりし襁褓を与えたるとき、探りみて顔に押しあて、涙を流して泣きぬ。", "これよりは騒ぐことはなけれど、精神の作用は殆（ほとんど）全く廃して、その痴（ち）なること赤児のごとくなり。医に見せしに、過劇なる心労にて急に起りし「パラノイア」という病（やまひ）なれば、治癒の見込なしという。ダルドルフの癲狂院（てんきやういん）に入れむとせしに、泣き叫びて聴かず、後にはかの襁褓一つを身につけて、幾度か出しては見、見ては欷歔（ききよ）す。余が病床をば離れねど、これさえ心ありてにはあらずと見ゆ。ただをり／＼思い出したるように「薬を、薬を」というのみ。", "余が病は全く癒えぬ。エリスが生ける死（かばね）を抱きて千行（ちすぢ）の涙を濺（そそ）ぎしは幾度ぞ。大臣に随いて帰東の途に上ぼりしときは、相沢と議（はか）りてエリスが母に微（かすか）なる生計（たつき）を営むに足るほどの資本を与え、あはれなる狂女の胎内に遺しし子の生れむをりの事をも頼みおきぬ。", "嗚呼、相沢謙吉がごとき良友は世にまた得がたかるべし。されど我 脳裡（なうり）に一点の彼を憎むこころ今日までも残れりけり。", "（明治二十三年一月―n"]}, {"no": 47, "title": "名人伝", "author": "中島 敦", "category": "日本文学-物語", "chars": 7403, "volume": "中", "paras": ["趙（ちょう）の邯鄲（かんたん）の都に住む紀昌（きしょう）という男が、天下第一の弓の名人になろうと志を立てた。己（おのれ）の師と頼（たの）むべき人物を物色するに、当今弓矢をとっては、名手・飛衛（ひえい）に及（およ）ぶ者があろうとは思われぬ。百歩を隔（へだ）てて柳葉（りゅうよう）を射るに百発百中するという達人だそうである。紀昌は遥々（はるばる）飛衛をたずねてその門に入った。", "飛衛は新入の門人に、まず瞬（またた）きせざることを学べと命じた。紀昌は家に帰り、妻の機織台（はたおりだい）の下に潜（もぐ）り込（こ）んで、そこに仰向（あおむ）けにひっくり返った。眼（め）とすれすれに機躡（まねき）が忙しく上下往来するのをじっと　　瞬かずに見詰（みつ）めていようという工夫（くふう）である。理由を知らない妻は大いに驚（おどろ）いた。第一、妙（みょう）な姿勢を妙な角度から良人（おっと）に覗（のぞ）かれては困るという。厭（いや）がる妻を紀昌は叱（しか）りつけて、無理に機を織り続けさせた。来る日も来る日も彼（かれ）はこの可笑（おか）しな恰好（かっこう）で、瞬きせざる修練を重ねる。二年の後（のち）には、遽（あわた）だしく往返する牽挺（まねき）が睫毛（まつげ）を掠（かす）めても、絶えて瞬くことがなくなった。彼はようやく機の下から匍出（はいだ）す。もはや、鋭利（えいり）な錐（きり）の先をもって瞼（まぶた）を突（つ）かれても、まばたきをせぬまでになっていた。不意に火（ひ）の粉（こ）が目に飛入ろうとも、目の前に突然（とつぜん）灰神楽（はいかぐら）が立とうとも、彼は決して目をパチつかせない。彼の瞼はもはやそれを閉じるべき筋肉の使用法を忘れ果て、夜、熟睡（じゅくすい）している時でも、紀昌の目はカッと大きく見開かれたままである。ついに、彼の目の睫毛と睫毛との間に小さな一　匹（ぴき）の蜘蛛（くも）が巣（す）をかけるに及んで、彼はようやく自信を得て、師の飛衛にこれを告げた。", "それを聞いて飛衛がいう。瞬かざるのみではまだ射（しゃ）を授けるに足りぬ。次には、視（み）ることを学べ。視ることに熟して、さて、小を視ること大のごとく、微（び）を見ること著（ちょ）のごとくなったならば、来（きた）って我に告げるがよいと。", "紀昌は再び家に戻（もど）り、肌着（はだぎ）の縫目（ぬいめ）から虱（しらみ）を一匹探し出して、これを己（おの）が髪（かみ）の毛をもって繋（つな）いだ。そうして、それを南向きの窓に懸（か）け、終日　睨（にら）み暮（く）らすことにした。毎日毎日彼は窓にぶら下った虱を見詰める。初め、もちろんそれは一匹の虱に過ぎない。二三日たっても、依然（いぜん）として虱である。ところが、十日余り過ぎると、気のせいか、どうやらそれがほん　の少しながら大きく見えて来たように思われる。三月目（みつきめ）の終りには、明らかに蚕（かいこ）ほどの大きさに見えて来た。虱を吊（つ）るした窓の外の風物は、次第に移り変る。煕々（きき）として照っていた春の陽（ひ）はいつか烈（はげ）しい夏の光に変り、澄（す）んだ秋空を高く雁（がん）が渡（わた）って行ったかと思うと、はや、寒々とした灰色の空から霙（みぞれ）が落ちかかる。紀昌は根気よく、毛髪（もうはつ）の先にぶら下った有吻類（ゆうふんるい）・催痒性（さいようせい）の小節足動物を見続けた。その虱も何十匹となく取換（とりか）えられて行く中（うち）に、早くも三年の月日が流れた。ある日ふと気が付くと、窓の虱が馬のような大きさに見えていた。占（し）めたと、紀昌は膝（ひざ）を打ち、表へ出る。彼は我が目を疑った。人は高塔（こうとう）であった。馬は山であった。豚（ぶた）は丘（おか）のごとく、奚隹は城楼（じょうろう）と見える。雀躍（じゃくやく）して家にとって返した紀昌は、再び窓際の虱に立向い、燕角（えんかく）の弧（ゆみ）に朔蓬（さくほう）竹幹、（やがら）をつがえてこれを射れば、矢は見事に虱の心の臓を貫（つらぬ）いて、しかも虱を繋いだ毛さえ断（き）れぬ。", "紀昌は早速（さっそく）師の許（もと）に赴（おもむ）いてこれを報ずる。飛衛は高蹈（こうとう）して胸を打ち、初めて「出かしたぞ」と褒（ほ）めた。そうして、直ちに射術の奥儀秘伝（おうぎひでん）を剰（あま）すところなく紀昌に授け始めた。", "目の基礎訓練に五年もかけた甲斐（かい）があって紀昌の腕前（うでまえ）の上達は、驚くほど速い。", "奥儀伝授が始まってから十日の後、試みに紀昌が百歩を隔てて柳葉を射るに、既（すで）に百発百中である。二十日の後、いっぱいに水を湛（たた）えた盃（さかずき）を右　肱（ひじ）の上に載（の）せて剛弓（ごうきゅう）を引くに、狙（ねら）いに狂（くる）いの無いのはもとより、杯中の水も微動だにしない。一月（ひとつき）の後、百本の矢をもって速射を試みたところ、第一矢が的（まと）に中（あた）れば、続いて飛来った第二矢は誤たず第一矢の括（やはず）に中って突き刺（さ）さり、更（さら）に間髪を入れず第三矢の鏃（やじり）が第二矢の括にガッシと喰（く）い込む。矢矢（しし）相属し、発発（はつはつ）相及んで、後矢の鏃は必ず前矢の括に喰入るが故に、絶えて地に墜（お）ちることがない。瞬く中に、百本の矢は一本のごとくに相連なり、的から一直線に続いたその最後の括はなお弦（げん）を銜（ふく）むがごとくに見える。傍で見ていた師の飛衛も思わず「善し！」と言った。", "二月（ふたつき）の後、たまたま家に帰って妻といさかい　をした紀昌がこれを威（おど）そうとて烏号（うごう）の弓に棊木糸、衛（きえい）の矢をつがえきりりと引絞（ひきしぼ）って妻の目を射た。矢は妻の睫毛三本を射切ってかなたへ飛び去ったが、射られた本人は一向に気づかず、まばたきもしないで亭主（ていしゅ）を罵（ののし）り続けた。けだし、彼の至芸による矢の速度と狙いの精妙さとは、実にこの域にまで達していたのである。", "もはや師から学び取るべき何ものも無くなった紀昌は、ある日、ふと良からぬ考えを起した。", "彼がその時独りつくづくと考えるには、今や弓をもって己に敵すべき者は、師の飛衛をおいて外（ほか）に無い。天下第一の名人となるためには、どうあっても飛衛を除かねばならぬと。秘（ひそ）かにその機会を窺（うかが）っている中に、一日たまたま郊野（こうや）において、向うからただ一人歩み来る飛衛に出遇（であ）った。とっさに意を決した紀昌が矢を取って狙いをつければ、その気配を察して飛衛もまた弓を執（と）って相応ずる。二人　互（たが）いに射れば、矢はその度に中道にして相当り、共に地に墜ちた。地に落ちた矢が軽塵（けいじん）をも揚（あ）げなかったのは、両人の技がいずれも神（しん）に入っていたからであろう。さて、飛衛の矢が尽（つ）きた時、紀昌の方はなお一矢を余していた。得たりと勢込んで紀昌がその矢を放てば、飛衛はとっさに、傍なる野茨（のいばら）の枝（えだ）を折り取り、その棘（とげ）の先端（せんたん）をもってハッシと鏃を叩（たた）き落した。ついに非望の遂（と）げられないことを悟（さと）った紀昌の心に、成功したならば決して生じなかったに違（ちが）いない道義的　慚愧（ざんき）の念が、この時　忽焉（こつえん）として湧起（わきおこ）った。飛衛の方では、また、危機を脱（だっ）し得た安堵（あんど）と己が伎倆（ぎりょう）についての満足とが、敵に対する憎（にく）しみをすっかり忘れさせた。二人は互いに駈寄（かけよ）ると、野原の真中（まんなか）に相抱（あいいだ）いて、しばし美しい師弟愛の涙（なみだ）にかきくれた。（こうした事を今日の道義観をもって見るのは当らない。美食家の斉（せい）の桓公（かんこう）が己のいまだ味わったことのない珍味（ちんみ）を求めた時、厨宰（ちゅうさい）の易牙（えきが）は己が息子（むすこ）を蒸焼（むしやき）にしてこれをすすめた。十六　歳（さい）の少年、秦（しん）の始皇帝は父が死んだその晩に、父の愛妾（あいしょう）を三度　襲（おそ）うた。すべてそのような時代の話である。）", "涙にくれて相擁（あいよう）しながらも、再び弟子（でし）がかかる企（たくら）みを抱くようなことがあっては甚（はなは）だ危いと思った飛衛は、紀昌に新たな目標を与（あた）えてその気を転ずるにしくはないと考えた。彼はこの危険な弟子に向って言った。もはや、伝うべきほどのことはことごとく伝えた。なんじがもしこれ以上この道の蘊奥（うんのう）を極めたいと望むならば、ゆいて西の方（かた）大行（たいこう）の嶮（けん）に攀（よ）じ、霍山（かくざん）の頂を極めよ。そこには甘蠅（かんよう）老師とて古今（ここん）を曠（むな）しゅうする斯道（しどう）の大家がおられるはず。老師の技に比べれば、我々の射のごときはほとんど児戯（じぎ）に類する。爾の師と頼むべきは、今は甘蠅師の外にあるまいと。", "紀昌はすぐに西に向って旅立つ。その人の前に出ては我々の技のごとき児戯にひとしいと言った師の言葉が、彼の自尊心にこたえた。もしそれが本当だとすれば、天下第一を目指す彼の望も、まだまだ前途（ぜんと）程遠（ほどとお）い訳である。己が業（わざ）が児戯に類するかどうか、とにもかくにも早くその人に会って腕を比べたいとあせりつつ、彼はひたすらに道を急ぐ。足裏を破り脛（すね）を傷つけ、危巌（きがん）を攀じ桟道（さんどう）を渡って、一月の後に彼はようやく目指す山顛（さんてん）に辿（たど）りつく。", "気負い立つ紀昌を迎（むか）えたのは、羊のような柔和（にゅうわ）な目をした、しかし酷（ひど）くよぼよぼの爺（じい）さんである。年齢は百歳をも超（こ）えていよう。腰（こし）の曲っているせいもあって、白髯（はくぜん）は歩く時も地に曳（ひ）きずっている。", "相手が聾（ろう）かも知れぬと、大声に遽だしく紀昌は来意を告げる。己が技の程を見てもらいたいむねを述べると、あせり立った彼は相手の返辞をも待たず、いきなり背に負うた楊幹麻筋（ようかんまきん）の弓を外して手に執（と）った。そうして、石碣（せきけつ）の矢をつがえると、折から空の高くを飛び過ぎて行く渡り鳥の群に向って狙いを定める。弦に応じて、一箭（いっせん）たちまち五　羽（わ）の大鳥が鮮（あざ）やかに碧空（へきくう）を切って落ちて来た。", "一通り出来るようじゃな、と老人が穏（おだや）かな微笑を含（ふく）んで言う。だが、それは所詮（しょせん）射之射（しゃのしゃ）というもの、好漢いまだ不射之射（ふしゃのしゃ）を知らぬと見える。", "ムッとした紀昌を導いて、老隠者（ろういんじゃ）は、そこから二百歩ばかり離（はな）れた絶壁（ぜっぺき）の上まで連れて来る。脚下（きゃっか）は文字通りの屏風（びょうぶ）のごとき壁立千仭（へきりつせんじん）、遥か真下に糸のような細さに見える渓流（けいりゅう）をちょっと覗いただけでたちまち眩暈（めまい）を感ずるほどの高さである。その断崖（だんがい）から半（なか）ば宙に乗出した危石の上につかつかと老人は駈上り、振返（ふりかえ）って紀昌に言う。どうじゃ。この石の上で先刻の業を今一度見せてくれぬか。今更　引込（ひっこみ）もならぬ。老人と入代りに紀昌がその石を履（ふ）んだ時、石は微（かす）かにグラリと揺（ゆ）らいだ。強（し）いて気を励（はげ）まして矢をつがえようとすると、ちょうど崖（がけ）の端（はし）から小石が一つ転がり落ちた。その行方（ゆくえ）を目で追うた時、覚えず紀昌は石上に伏（ふ）した。脚（あし）はワナワナと顫（ふる）え、汗（あせ）は流れて踵（かかと）にまで至った。老人が笑いながら手を差し伸（の）べて彼を石から下し、自ら代ってこれに乗ると、では射というものをお目にかけようかな、と言った。まだ動悸（どうき）がおさまらず蒼（あお）ざめた顔をしてはいたが、紀昌はすぐに気が付いて言った。しかし、弓はどうなさる？　弓は？　老人は素手（すで）だったのである。弓？　と老人は笑う。弓矢の要（い）る中はまだ射之射じゃ。不射之射には、烏漆（うしつ）の弓も粛慎（しゅくしん）の矢もいらぬ。", "ちょうど彼　等（ら）の真上、空の極めて高い所を一羽の鳶（とび）が悠々（ゆうゆう）と輪を画（えが）いていた。その胡麻粒（ごまつぶ）ほどに小さく見える姿をしばらく見上げていた甘蠅が、やがて、見えざる矢を無形の弓につがえ、満月のごとくに引絞ってひょう　と放てば、見よ、鳶は羽ばたきもせず中空から石のごとくに落ちて来るではないか。", "紀昌は慄然（りつぜん）とした。今にして始めて芸道の深淵（しんえん）を覗き得た心地であった。", "九年の間、紀昌はこの老名人の許に留（とど）まった。その間いかなる修業を積んだものやらそれは誰（だれ）にも判（わか）らぬ。", "九年たって山を降りて来た時、人々は紀昌の顔付の変ったのに驚いた。以前の負けず嫌（ぎら）いな精悍（せいかん）な面魂（つらだましい）はどこかに影（かげ）をひそめ、なんの表情も無い、木偶（でく）のごとく愚者（ぐしゃ）のごとき容貌（ようぼう）に変っている。久しぶりに旧師の飛衛を訪ねた時、しかし、飛衛はこの顔付を一見すると感嘆（かんたん）して叫（さけ）んだ。これでこそ初めて天下の名人だ。我儕（われら）のごとき、足下（あしもと）にも及ぶものでないと。", "邯鄲の都は、天下一の名人となって戻って来た紀昌を迎（むか）えて、やがて眼前に示されるに違いないその妙技への期待に湧返った。", "ところが紀昌は一向にその要望に応（こた）えようとしない。いや、弓さえ絶えて手に取ろうとしない。山に入る時に携（たずさ）えて行った楊幹麻筋の弓もどこかへ棄（す）てて来た様子である。そのわけ　を訊（たず）ねた一人に答えて、紀昌は懶（ものう）げに言った。至為（しい）は為（な）す無く、至言は言を去り、至射は射ることなしと。なるほどと、至極（しごく）物分（ものわか）りのいい邯鄲の都人士はすぐに合点（がてん）した。弓を執らざる弓の名人は彼等の誇（ほこり）となった。紀昌が弓に触（ふ）れなければ触れないほど、彼の無敵の評判はいよいよ喧伝（けんでん）された。", "様々な噂（うわさ）が人々の口から口へと伝わる。毎夜　三更（さんこう）を過ぎる頃（ころ）、紀昌の家の屋上（おくじょう）で何者の立てるとも知れぬ弓弦の音がする。名人の内に宿る射道の神が主人公の睡（ねむ）っている間に体内を脱（ぬ）け出し、妖魔（ようま）を払（はら）うべく徹宵（てっしょう）守護（しゅご）に当っているのだという。彼の家の近くに住む一商人はある夜紀昌の家の上空で、雲に乗った紀昌が珍（めずら）しくも弓を手にして、古（いにしえ）の名人　羽と養由基の二人を相手に腕比べをしているのを確かに見たと言い出した。その時三名人の放った矢はそれぞれ夜空に青白い光芒（こうぼう）を曳きつつ参宿（さんしゅく）と天狼星（てんろうせい）との間に消去ったと。紀昌の家に忍（しの）び入ろうとしたところ、塀（へい）に足を掛（か）けた途端（とたん）に一道の殺気が森閑（しんかん）とした家の中から奔（はし）り出てまとも　に額（ひたい）を打ったので、覚えず外に顛落（てんらく）したと白状した盗賊（とうぞく）もある。爾来（じらい）、邪心（じゃしん）を抱く者共は彼の住居の十町四方は避（さ）けて廻（まわ）り道をし、賢（かしこ）い渡り鳥共は彼の家の上空を通らなくなった。", "雲と立罩（たちこ）める名声のただ中に、名人紀昌は次第に老いて行く。既に早く射を離れた彼の心は、ますます枯淡虚静（こたんきょせい）の域にはいって行ったようである。木偶のごとき顔は更に表情を失い、語ることも稀（まれ）となり、ついには呼吸の有無さえ疑われるに至った。「既に、我と彼との別、是と非との分を知らぬ。眼は耳のごとく、耳は鼻のごとく、鼻は口のごとく思われる。」というのが、老名人晩年の述懐（じゅっかい）である。", "甘蠅師の許を辞してから四十年の後、紀昌は静かに、誠に煙（けむり）のごとく静かに世を去った。その四十年の間、彼は絶えて射を口にすることが無かった。口にさえしなかった位だから、弓矢を執っての活動などあろうはずが無い。もちろん、寓話（ぐうわ）作者としてはここで老名人に掉尾（ちょうび）の大活躍（だいかつやく）をさせて、名人の真に名人たるゆえんを明らかにしたいのは山々ながら、一方、また、何としても古書に記された事実を曲げる訳には行かぬ。実際、老後の彼についてはただ無為にして化したとばかりで、次のような妙な話の外には何一つ伝わっていないのだから。", "その話というのは、彼の死ぬ一二年前のことらしい。ある日老いたる紀昌が知人の許に招かれて行ったところ、その家で一つの器具を見た。確かに見憶（みおぼ）えのある道具だが、どうしてもその名前が思出せぬし、その用途（ようと）も思い当らない。老人はその家の主人に尋（たず）ねた。それは何と呼ぶ品物で、また何に用いるのかと。主人は、客が冗談（じょうだん）を言っているとのみ思って、ニヤリととぼけた笑い方をした。老紀昌は真剣（しんけん）になって再び尋ねる。それでも相手は曖昧（あいまい）な笑を浮（うか）べて、客の心をはかりかねた様子である。三度紀昌が真面目（まじめ）な顔をして同じ問を繰返（くりかえ）した時、始めて主人の顔に驚愕（きょうがく）の色が現れた。彼は客の眼を凝乎（じっ）と見詰める。相手が冗談を言っているのでもなく、気が狂っているのでもなく、また自分が聞き違えをしているのでもないことを確かめると、彼はほとんど恐怖（きょうふ）に近い狼狽（ろうばい）を示して、吃（ども）りながら叫んだ。", "「ああ、夫子（ふうし）が、――古今無双（ここんむそう）の射の名人たる夫子が、弓を忘れ果てられたとや？　ああ、弓という名も、その使い途（みち）も！」", "その後当分の間、邯鄲の都では、画家は絵筆を隠（かく）し、楽人は瑟（しつ）の絃（げん）を断ち、工匠（こうしょう）は規矩（きく）を手にするのを恥（は）じたということである。", "（昭和十七年十二月）"]}, {"no": 48, "title": "燃ゆる頬", "author": "堀　辰雄", "category": "日本文学-物語", "chars": 8467, "volume": "中", "paras": ["私は十七になった。そして中学校から高等学校へはいったばかりの時分であった。", "私の両親は、私が彼等（ら）の許（もと）であんまり神経質に育つことを恐れて、私をそこの寄宿舎に入れた。そういう環境の変化は、私の性格にいちじるしい影響を与えずにはおかなかった。それによって、私の少年時からの脱皮は、気味悪いまでに促されつつあった。", "寄宿舎は、あたかも蜂（はち）の巣のように、いくつもの小さい部屋に分れていた。そしてその一つ一つの部屋には、それぞれ十人余りの生徒等が一しょくたに生きていた。それに部屋とは云うものの、中にはただ、穴だらけの、大きな卓（つくえ）が二つ三つ置いてあるきりだった。そしてその卓の上には誰のものともつかず、白筋のはいった制帽とか、辞書とか、ノオトブックとか、インク壺（つぼ）とか、煙草の袋とか、それらのものがごっちゃになって積まれてあった。そんなものの中で、或る者は独逸（ドイツ）語の勉強をしていたり、或る者は足のこわれかかった古椅子にあぶなっかしそうに馬乗りになって煙草ばかり吹かしていた。私は彼等の中で一番小さかった。私は彼等から仲間はずれにされないように、苦しげに煙草をふかし、まだ髭（ひげ）の生（は）えていない頬（ほお）にこわごわ剃刀（かみそり）をあてたりした。", "二階の寝室はへんに臭かった。その汚（よご）れた下着類のにおいは私をむかつかせた。私が眠ると、そのにおいは私の夢の中にまで入ってきて、まだ現実では私の見知らない感覚を、その夢に与えた。私はしかし、そのにおいにもだんだん慣れて行った。", "こうして私の脱皮はすでに用意されつつあった。そしてただ最後の一撃だけが残されていた", "或る日の昼休みに、私は一人でぶらぶらと、植物実験室の南側にある、ひっそりした花壇のなかを歩いていた。そのうちに、私はふと足を止めた。そこの一隅に簇（むら）がりながら咲いている、私の名前を知らない真白な花から、花粉まみれになって、一匹の蜜蜂（みつばち）の飛び立つのを見つけたのだ。そこで、その蜜蜂がその足にくっついている花粉の塊（かたま）りを、今度はどの花へ持っていくか、見ていてやろうと思ったのである。しかし、そいつはどの花にもなかなか止まりそうもなかった。そしてあたかもそれらの花のどれを選んだらいいかと迷っているようにも見えた。　　　　　その瞬間だった。私はそれらの見知らない花が一せいに、その蜜蜂を自分のところへ誘おうとして、なんだかめいめいの雌蕋（めしべ）を妙な姿態にくねらせるのを認めたような気がした。", "そのうちに、とうとうその蜜蜂は或る花を選んで、それにぶらさがるようにして止まった。その花粉まみれの足でその小さな柱頭にしがみつきながら。やがてその蜜蜂はそれからも飛び立っていった。私はそれを見ると、なんだか急に子供のような残酷な気持になって、いま受精を終ったばかりの、その花をいきなり※［＃「てへん＋毟」、第4水準2-78-12］（むし）りとった。そしてじいっと、他の花の花粉を浴びている、その柱頭に見入っていたが、しまいには私はそれを私の掌（て）で揉（も）みくちゃにしてしまった。それから私はなおも、さまざまな燃えるような紅や紫の花の咲いている花壇のなかをぶらついていた。その時、その花壇にＴ字形をなして面している植物実験室の中から、硝子戸（ガラスど）ごしに私の名前を呼ぶものがあった。見ると、それは魚住（うおずみ）と云う上級生であった。", "「来て見たまえ。顕微鏡を見せてやろう　　　　　」", "その魚住と云う上級生は、私の倍もあるような大男で、円盤投げの選手をしていた。グラウンドに出ているときの彼は、その頃私たちの間に流行していた希臘（ギリシヤ）彫刻の独逸製の絵はがきの一つの、「円盤投手（ディスカスヴェルフェル）」と云うのに少し似ていた。そしてそれが下級生たちに彼を偶像化させていた。が、彼は誰に向っても、何時（いつ）も人を馬鹿にしたような表情を浮べていた。私はそういう彼の気に入りたいと思った。私はその植物実験室のなかへ這入（はい）っていった。", "そこには魚住ひとりしかいなかった。彼は毛ぶかい手で、不器用そうに何かのプレパラアトをつくっていた。そしてときどきツァイスの顕微鏡でそれを覗（のぞ）いていた。それからそれを私にも覗かせた。私はそれを見るためには、身体を海老（えび）のように折り曲げていなければならなかった。", "「見えるか？」", "「ええ　　　　　」", "私はそういうぎごちない姿勢を続けながら、しかしもう一方の、顕微鏡を見ていない眼でもって、そっと魚住の動作を窺（うかが）っていた。すこし前から私は彼の顔が異様に変化しだしたのに気づいていた。そこの実験室の中の明るい光線のせいか、それとも彼が何時もの仮面をぬいでいるせいか、彼の頬の肉は妙にたるんでいて、その眼は真赤に充血していた。そして口許（くちもと）にはたえず少女のような弱弱しい微笑をちらつかせていた。私は何とはなしに、今のさっき見たばかりの一匹の蜜蜂と見知らない真白な花のことを思い出した。彼の熱い呼吸が私の頬にかかって来た", "私はついと顕微鏡から顔を上げた。", "「もう、僕　　　」と腕時計を見ながら、私は口ごもるように云った。", "「教室へ行かなくっちゃ　　　　　」", "「そうか」", "いつのまにか魚住は巧妙に新しい仮面をつけていた。そしていくぶん青くなっている私の顔を見下ろしながら、彼は平生の、人を馬鹿にしたような表情を浮べていた。", "五月になってから、私たちの部屋に三枝（さいぐさ）と云う私の同級生が他から転室してきた。彼は私より一つだけ年上だった。彼が上級生たちから少年視されていたことはかなり有名だった。彼は瘠（や）せた、静脈の透いて見えるような美しい皮膚の少年だった。まだ薔薇（ばら）いろの頬の所有者、私は彼のそういう貧血性の美しさを羨（うらや）んだ。私は教室で、屡（しばしば）、教科書の蔭から、彼のほっそりした頸（くび）を偸（ぬす）み見ているようなことさえあった。", "夜、三枝は誰よりも先に、二階の寝室へ行った。", "寝室は毎夜、規定の就眠時間の十時にならなければ電燈がつかなかった。それだのに彼は九時頃から寝室へ行ってしまうのだった。私はそんな闇（やみ）のなかで眠っている彼の寝顔を、いろんな風に夢みた。", "しかし私は習慣から十二時頃にならなければ寝室へは行かなかった。", "或る夜、私は喉（のど）が痛かった。私はすこし熱があるように思った。私は三枝が寝室へ行ってから間もなく、西洋蝋燭（ろうそく）を手にして階段を昇って行った。そして何の気なしに自分の寝室のドアを開けた。そのなかは真暗だったが、私の手にしていた蝋燭が、突然、大きな鳥のような恰好（かっこう）をした異様な影を、その天井に投げた。それは格闘か何んかしているように、無気味に、揺れ動いていた。私の心臓はどきどきした。　　　　　が、それは一瞬間に過ぎなかった。私がその天井に見出した幻影は、ただ蝋燭の光りの気まぐれな動揺のせいらしかった。何故（なぜ）なら、私の蝋燭の光りがそれほど揺れなくなった時分には、ただ、三枝が壁ぎわの寝床に寝ているほか、その枕（まくら）もとに、もうひとりの大きな男が、マントをかぶったまま、むっつりと不機嫌（ふきげん）そうに坐っているのを見たきりであったから", "「誰だ？」とそのマントをかぶった男が私の方をふりむいた。", "私は惶（あわ）てて私の蝋燭を消した。それが魚住らしいのを認めたからだった。私はいつかの植物実験室の時から、彼が私を憎んでいるにちがいないと信じていた。私は黙ったまま、三枝の隣りの、自分のうす汚（よご）れた蒲団（ふとん）の中にもぐり込んだ。", "三枝もさっきから黙っているらしかった。", "私の悪い喉をしめつけるような数分間が過ぎた。その魚住らしい男はとうとう立上った。そして何も云わずに暗がりの中で荒あらしい音を立てながら、寝室を出て行った。その足音が遠のくと、私は三枝に、", "「僕は喉が痛いんだ　　　　　」とすこし具合が悪そうに云った。", "「熱はないの？」彼が訊（き）いた。", "「すこしあるらしいんだ」", "「どれ、見せたまえ　　　　　」", "そう云いながら三枝は自分の蒲団からすこし身体をのり出して、私のずきずきする顳（こめかみ）の上に彼の冷たい手をあてがった。私は息をつめていた。それから彼は私の手頸（てくび）を握った。私の脈を見るのにしては、それは少しへんてこな握り方だった。それだのに私は、自分の脈搏（みゃくはく）の急に高くなったのを彼に気づかれはしまいかと、そればかり心配していた", "翌日、私は一日中寝床の中にもぐりながら、これからも毎晩早く寝室へ来られるため、私の喉の痛みが何時までも癒（なお）らなければいいとさえ思っていた。", "数日後、夕方から私の喉がまた痛みだした。私はわざと咳（せき）をしながら、三枝のすぐ後から寝室に行った。しかし、彼の床はからっぽだった。何処（どこ）へ行ってしまったのか、彼はなかなか帰って来なかった。", "一時間ばかり過ぎた。私はひとりで苦しがっていた。私は自分の喉がひどく悪いように思い、ひょっとしたら自分はこの病気で死んでしまうかも知れないなぞと考えたりしていた。", "彼はやっと帰って来た。私はさっきから自分の枕許に蝋燭をつけぱなしにしておいた。その光りが、服をぬごうとして身もだえしている彼の姿を、天井に無気味に映した。私はいつかの晩の幻を思い浮べた。私は彼に今まで何処へ行っていたのかと訊いた。彼は眠れそうもなかったからグラウンドを一人で散歩して来たのだと答えた。それはいかにも嘘（うそ）らしい云い方だった。が、私はなんにも云わずにいた。", "「蝋燭はつけておくのかい？」彼が訊いた。", "「どっちでもいいよ」", "「じゃ、消すよ　　　　　」", "そう云いながら、彼は私の枕許の蝋燭を消すために、彼の顔を私の顔に近づけてきた。私は、その長い睫毛（まつげ）のかげが蝋燭の光りでちらちらしている彼の頬を、じっと見あげていた。私の火のようにほてった頬には、それが神々（こうごう）しいくらい冷たそうに感ぜられた。", "私と三枝との関係は、いつしか友情の限界を超（こ）え出したように見えた。しかしそのように三枝が私に近づいてくるにつれ、その一方では、魚住がますます寄宿生たちに対して乱暴になり、時々グラウンドに出ては、ひとりで狂人のように円盤投げをしているのが、見かけられるようになった。", "そのうちに学期試験が近づいてきた。寄宿生たちはその準備をし出した。魚住がその試験を前にして、寄宿舎から姿を消してしまったことを私たちは知った。しかし私たちは、それについては口をつぐんでいた。", "夏休みになった。", "私は三枝と一週間ばかりの予定で、或る半島へ旅行しようとしていた。", "或るどんよりと曇った午前、私たちはまるで両親をだまして悪戯（いたずら）かなんかしようとしている子供らのように、いくぶん陰気になりながら、出発した。", "私たちはその半島の或る駅で下り、そこから二里ばかり海岸に沿うた道を歩いた後、鋸（のこぎり）のような形をした山にいだかれた、或る小さな漁村に到着した。宿屋はもの悲しかった。暗くなると、何処からともなく海草の香りがしてきた。少婢（こおんな）がランプをもって入ってきた、私はそのうす暗いランプの光りで、寝床へ入ろうとしてシャツをぬいでいる、三枝の裸かになった脊中に、一ところだけ脊骨が妙な具合に突起しているのを見つけた。私は何だかそれがいじってみたくなった。そして私はそこのところへ指をつけながら、", "「これは何だい？」と訊いてみた。", "「それかい　　　　　」彼は少し顔を赧（あか）らめながら云った。「それは脊椎（せきつい）カリエスの痕（あと）なんだ」", "「ちょっといじらせない？」", "そう云って、私は彼を裸かにさせたまま、その脊骨のへんな突起を、象牙（ぞうげ）でもいじるように、何度も撫（な）でてみた。彼は目をつぶりながら、なんだか擽（くすぐ）ったそうにしていた。", "翌日もまたどんよりと曇っていた。それでも私たちは出発した。そして再び海岸に沿うた小石の多い道を歩きだした。いくつか小さい村を通り過ぎた。だが、正午頃、それらの村の一つに近づこうとした時分になると、今にも雨が降って来そうな暗い空合になった。それに私たちはもう歩きつかれ、互にすこし不機嫌になっていた。私たちはその村へ入ったら、いつ頃乗合馬車がその村を通るかを、尋ねてみようと思っていた。", "その村へ入ろうとするところに、一つの小さな板橋がかかっていた。そしてその板橋の上には、五六人の村の娘たちが、めいめいに魚籠（びく）をさげながら、立ったままで、何かしゃべっていた。私たちが近づくのを見ると、彼女たちはしゃべるのを止（や）めた。そして私たちの方を珍らしそうに見つめていた。私はそれらの少女たちの中から、一人の眼つきの美しい少女を選びだすと、その少女ばかりじっと見つめた。彼女は少女たちの中では一番年上らしかった。そして彼女は私がいくら無作法に見つめても、平気で私に見られるがままになっていた。そんな場合にあらゆる若者がするであろうように、私は短い時間のうちに出来るだけ自分を強くその少女に印象させようとして、さまざまな動作を工夫した。そして私は彼女と一ことでもいいから何か言葉を交（か）わしたいと思いながら、しかしそれも出来ずに、彼女のそばを離れようとしていた。そのとき突然、三枝が歩みを弛（ゆる）めた。そして彼はその少女の方へずかずかと近づいて行った。私も思わず立ち止りながら、彼が私に先廻りしてその少女に馬車のことを尋ねようとしているらしいのを認めた。", "私はそういう彼の機敏な行為によってその少女の心に彼の方が私よりも一そう強く印象されはすまいかと気づかった。そこで私もまた、その少女に近づいて行きながら、彼が質問している間、彼女の魚籠の中をのぞいていた。", "少女はすこしも羞（はに）かまずに彼に答えていた。彼女の声は、彼女の美しい眼つきを裏切るような、妙に咳枯（しゃが）れた声だった。が、その声がわりのしているらしい少女の声は、かえって私をふしぎに魅惑した。", "今度は私が質問する番だった。私はさっきからのぞき込んでいた魚籠を指さしながら、おずおずと、その小さな魚は何という魚かと尋ねた。", "「ふふふ　　　　　」", "少女はさも可笑（おか）しくって溜（たま）らないように笑った。それにつれて、他の少女たちもどっと笑った。よほど私の問い方が可笑しかったものと見える。私は思わず顔を赧らめた。そのとき私は、三枝の顔にも、ちらりと意地悪そうな微笑の浮んだのを認めた。", "私は突然、彼に一種の敵意のようなものを感じ出した。", "私たちは黙りあって、その村はずれにあるという乗合馬車の発着所へ向った。そこへ着いてからも馬車はなかなか来なかった。そのうちに雨が降ってきた。", "空（す）いていた馬車の中でも、私たちは殆（ほと）んど無言だった。そして互に相手を不機嫌にさせ合っていた。夕方、やっと霧のような雨の中を、宿屋のあるという或る海岸町に着いた。そこの宿屋も前日のうす汚（ぎたな）い宿屋に似ていた。同じような海草のかすかな香（かお）り、同じようなランプの仄（ほの）あかりが、僅（わず）かに私たちの中に前夜の私たちを蘇（よみがえ）らせた。私たちは漸（ようや）く打解けだした。私たちは私たちの不機嫌を、旅先きで悪天候ばかりを気にしているせいにしようとした。そしてしまいに私は、明日汽車の出る町まで馬車で一直線に行って、ひと先（ま）ず東京に帰ろうではないかと云い出した。彼も仕方なさそうにそれに同意した。", "その夜は疲れていたので、私たちはすぐに寝入った。　　　　　明け方近く、私はふと目をさました。三枝は私の方に脊なかを向けて眠っていた。私は寝巻の上からその脊骨の小さな突起を確めると、昨夜のようにそれをそっと撫でてみた。私はそんなことをしながら、ふときのう橋の上で見かけた、魚籠をさげた少女の美しい眼つきを思い浮べた。その異様な声はまだ私の耳についていた。三枝がかすかに歯ぎしりをした。私はそれを聞きながら、またうとうとと眠り出した", "翌日も雨が降っていた。それは昨日より一そう霧に似ていた。それが私たちに旅行を中止することを否応（いやおう）なく決心させた。", "雨の中をさわがしい響をたてて走ってゆく乗合馬車の中で、それから私たちの乗り込んだ三等客車の混雑のなかで、私たちは出来るだけ相手を苦しめまいと努力し合っていた。それはもはや愛の休止符だ。そして私は何故かしら三枝にはもうこれっきり会えぬように感じていた。彼は何度も私の手を握った。私は私の手を彼の自由にさせていた。しかし私の耳は、ときどき、何処からともなく、ちぎれちぎれになって飛んでくる、例の少女の異様な声ばかり聴（き）いていた。", "別れの時はもっとも悲しかった。私は、自分の家へ帰るにはその方が便利な郊外電車に乗り換えるために、或る途中の駅で汽車から下りた。私は混雑したプラットフォムの上を歩き出しながら、何度も振りかえって汽車の中にいる彼の方を見た。彼は雨でぐっしょり濡（ぬ）れた硝子窓に顔をくっつけて、私の方をよく見ようとしながら、かえって自分の呼吸でその硝子を白く曇らせ、そしてますます私の方を見えなくさせていた。", "八月になると、私は私の父と一しょに信州の或る湖畔へ旅行した。そして私はその後、三枝には会わなかった。彼は屡（しばしば）、その湖畔に滞在中の私に、まるでラヴ・レタアのような手紙をよこした。しかし私はだんだんそれに返事を出さなくなった。すでに少女らの異様な声が私の愛を変えていた。私は彼の最近の手紙によって彼が病気になったことを知った。脊椎カリエスが再発したらしかった。が、それにも私は遂（つい）に手紙を出さずにしまった。", "秋の新学期になった。湖畔から帰ってくると、私は再び寄宿舎に移った。しかし其処（そこ）ではすべてが変っていた。三枝はどこかの海岸へ転地していた。魚住はもはや私を空気を見るようにしか見なかった。　　　　　冬になった。或る薄氷りの張っている朝、私は校内の掲示板に三枝の死が報じられてあるのを見出（みいだ）した。私はそれを未知の人でもあるかのように、ぼんやりと見つめていた。", "それから数年が過ぎた。", "その数年の間に私はときどきその寄宿舎のことを思い出した。そして私は其処に、私の少年時の美しい皮膚を、丁度灌木（かんぼく）の枝にひっかかっている蛇（へび）の透明な皮のように、惜しげもなく脱いできたような気がしてならなかった。――そしてその数年の間に、私はまあ何んと多くの異様な声をした少女らに出会ったことか！　が、それらの少女らは一人として私を苦しめないものはなく、それに私は彼女らのために苦しむことを余りにも愛していたので、そのために私はとうとう取りかえしのつかない打撃を受けた。", "私ははげしい喀血（かっけつ）後、嘗（かつ）て私の父と旅行したことのある大きな湖畔に近い、或る高原のサナトリウムに入れられた。医者は私を肺結核だと診断した。が、そんなことはどうでもいい。ただ薔薇（ばら）がほろりとその花弁を落すように、私もまた、私の薔薇いろの頬（ほお）を永久に失ったまでのことだ。", "私の入れられたそのサナトリウムの「白樺（しらかば）」という病棟には、私の他には一人の十五六の少年しか収容されていなかった。", "その少年は脊椎カリエス患者だったが、もうすっかり恢復期（かいふくき）にあって、毎日数時間ずつヴェランダに出ては、せっせと日光浴をやっていた。私が私のベッドに寝たきりで起きられないことを知ると、その少年はときどき私の病室に見舞いにくるようになった。或る時、私はその少年の日に黒く焼けた、そして唇（くちびる）だけがほのかに紅（あか）い色をしている細面（ほそおもて）の顔の下から、死んだ三枝の顔が透かしのように現われているのに気がついた。その時から、私はなるべくその少年の顔を見ないようにした。", "或る朝、私はふとベッドから起き上って、こわごわ一人で、窓際（まどぎわ）まで歩いて行ってみたい気になった。それほどそれは気持のいい朝だった。私はそのとき自分の病室の窓から、向うのヴェランダに、その少年が猿股（さるまた）もはかずに素っ裸になって日光浴をしているのを見つけた。彼は少し前屈（まえこご）みになりながら、自分の体の或る部分をじっと見入っていた。彼は誰にも見られていないと信じているらしかった。私の心臓ははげしく打った。そしてそれをもっとよく見ようとして、近眼の私が目を細くして見ると、彼の真黒な脊なかにも、三枝のと同じような特有な突起のあるらしいのが、私の眼に入った。", "私は不意に目まいを感じながら、やっとのことでベッドまで帰り、そしてその上へ打つ伏せになった。", "少年は数日後、彼が私に与えた大きな打撃については少しも気がつかずに、退院した。"]}, {"no": 49, "title": "山羊の歌", "author": "中原　中也", "category": "日本文学-詩　絵本", "chars": 15779, "volume": "中", "paras": ["初期詩篇", "春の日の夕暮", "トタンがセンベイ食べて", "春の日の夕暮は穏かです", "アンダースローされた灰が蒼ざめて", "春の日の夕暮は静かです", "吁（ああ）！　案山子（かかし）はないか――あるまい", "馬嘶（いなな）くか――嘶きもしまい", "ただただ月の光のヌメランとするまゝに", "従順なのは　春の日の夕暮か", "ポトホトと野の中に伽藍（がらん）は紅く", "荷馬車の車輪　油を失い", "私が歴史的現在に物を云へば", "嘲る嘲る　空と山とが", "瓦が一枚　はぐれました", "これから春の日の夕暮は", "無言ながら　前進します", "自（みづか）らの　静脈管の中へです", "月", "今宵月はいよよ愁（かな）しく、", "養父の疑惑に瞳を（みは）る。", "秒刻（とき）は銀波を砂漠に流し", "老男（らうなん）の耳朶（じだ）は螢光をともす。", "あゝ忘られた運河の岸堤", "胸に残つた戦車の地音", "銹（さ）びつく鑵の煙草とりいで", "月は懶（ものう）く喫つている。", "それのめぐりを七人の天女は", "趾頭舞踊しつづけているが、", "汚辱に浸る月の心に", "なんの慰愛もあたへはしない。", "遠（をち）にちらばる星と星よ！", "おまへのそうしゆ　を月は待つてる", "サーカス", "幾時代かがありまして", "茶色い戦争ありました", "幾時代かがあ (なめ)らかな青い石の板で出来ているらしいのです。", "「堅雪(かたゆき)かんこ、しみ雪しんこ。」", "お日様がまっ白に燃えて百合(ゆり)の匂(におい)を撒(ま)きちらし又(また)雪をぎらぎら照らしました。", "木なんかみんなザラメを掛(か)けたように霜(しも)でぴかぴかしています。", "「堅雪かんこ、凍(し)み雪しんこ。」", "四郎とかん子とは小さな雪沓(ゆきぐつ)をはいてキックキックキック、野原に出ました。", "こんな面白(おもしろ)い日が、またとあるでしょうか。いつもは歩けない黍(きび)の畑の中でも、すすきで一杯(いっぱい)だった野原の上でも、すきな方へどこ迄(まで)でも行けるのです。平らなことはまるで一枚の板です。そしてそれが沢山(たくさん)の小さな小さな鏡のようにキラキラキラキラ光るのです。", "「堅雪かんこ、凍み雪しんこ。」", "二人は森の近くまで来ました。大きな柏(かしわ)の木は枝(えだ)も埋(うず)まるくらい立派な透(す)きとおった氷柱(つらら)を下げて重そうに身体(からだ)を曲げて居(お)りました。", "「堅雪かんこ、凍み雪しんこ。狐の子ぁ、嫁(よめい)ほしい、ほしい。」と二人は森へ向いて高く叫(さけ)びました。", "しばらくしいんとしましたので二人はも一度叫ぼうとして息をのみこんだとき森の中から", "「凍み雪しんしん、堅雪かんかん。」と云(い)いながら、キシリキシリ雪をふんで白い狐の子が出て来ました。", "四郎は少しぎょっとしてかん子をうしろにかばって、しっかり足をふんばって叫びました。", "「狐こんこん白狐、お嫁ほしけりゃ、とってやろよ。」", "すると狐がまだまるで小さいくせに銀の針のようなおひげをピンと一つひねって云いました。", "「四郎はしんこ、かん子はかんこ、おらはお嫁はいらないよ。」", "四郎が笑って云いました。", "「狐こんこん、狐の子、お嫁がいらなきゃ餅(もち)やろか。」", "すると狐の子も頭を二つ三つ振(ふ)って面白そうに云いました。", "「四郎はしんこ、かん子はかんこ、黍の団子をおれやろか。」", "かん子もあんまり面白いので四郎のうしろにかくれたままそっと歌いました。", "「狐こんこん狐の子、狐の団子は兎(うさ)のくそ。」", "すると小狐紺三郎が笑って云いました。", "「いいえ、決してそんなことはありません。あなた方のような立派なお方が兎(うさぎ)の茶色の団子なんか召(め)しあがるもんですか。私らは全体いままで人をだますなんてあんまりむじつの罪をきせられていたのです。」", "四郎がおどろいて尋(たず)ねました。", "「そいじゃきつねが人をだますなんて偽(うそ)かしら。」", "紺三郎が熱心に云いました。", "「偽ですとも。けだし最もひどい偽です。だまされたという人は大抵(たいてい)お酒に酔(よ)ったり、臆病(おくびょう)でくるくるしたりした人です。面白いですよ。甚兵衛(じんべえ)さんがこの前、月夜の晩私たちのお家(うち)の前に坐(すわ)って一晩じょうるりをやりましたよ。私らはみんな出て見たのです。」", "四郎が叫びました。", "「甚兵衛さんならじょうるりじゃないや。きっと浪花(なにわ)ぶしだぜ。」", "子狐紺三郎はなるほどという顔をして、", "「ええ、そうかもしれません。とにかくお団子をおあがりなさい。私のさしあげるのは、ちゃんと私が畑を作って播(ま)いて草をとって刈(か)って叩(たた)いて粉にして練ってむしてお砂糖をかけたのです。いかがですか。一｜皿(さら)さしあげましょう。」", "と云いました。", "と四郎が笑って、", "「紺三郎さん、僕らは丁度いまね、お餅をたべて来たんだからおなかが減らないんだよ。この次におよばれしようか。」", "子狐の紺三郎が嬉(うれ)しがってみじかい腕(うで)をばたばたして云いました。", "「そうですか。そんなら今度｜幻燈会(げんとうかい)のときさしあげましょう。幻燈会にはきっといらっしゃい。この次の雪の凍った月夜の晩です。八時からはじめますから、入場券をあげて置きましょう。何枚あげましょうか。」", "「そんなら五枚お呉(く)れ。」と四郎が云いました。", "「五枚ですか。あなた方が二枚にあとの三枚はどなたですか。」と紺三郎が云いました。", "「兄さんたちだ。」と四郎が答えますと、", "「兄さんたちは十一歳以下ですか。」と紺三郎が又尋ねました。", "「いや小兄(ちいにい)さんは四年生だからね、八つの四つで十二歳。」と四郎が云いました。", "すると紺三郎は尤(もっと)もらしく又おひげを一つひねって云いました。", "「それでは残念ですが兄さんたちはお断わりです。あなた方だけいらっしゃい。特別席をとって置きますから、面白いんですよ。幻燈は第一が『お酒をのむべからず。』これはあなたの村の太右衛門(たえもん)さんと、清作さんがお酒をのんでとうとう目がくらんで野原にあるへんてこなおまんじゅうや、おそばを喰(た)べようとした所です。私も写真の中にうつっています。第二が『わなに注意せよ。』これは私共のこん兵衛(べえ)が野原でわなにかかったのを画(か)いたのです。絵です。写真ではありません。第三が『火を軽べつすべからず。』これは私共のこん助があなたのお家(うち)へ行って尻尾(しっぽ)を焼いた景色です。ぜひおいで下さい。」", "二人は悦(よろこ)んでうなずきました。", "狐(きつね)は可笑(おか)しそうに口を曲げて、キックキックトントンキックキックトントンと足ぶみをはじめてしっぽと頭を振ってしばらく考えていましたがやっと思いついたらしく、両手を振って調子をとりながら歌いはじめました。", "「凍(し)み雪しんこ、堅雪かんこ、", "野原のまんじゅうはポッポッポ。", "酔ってひょろひょろ太右衛門が、", "去年、三十八、たべた。", "凍み雪しんこ、堅雪かんこ、", "野原のおそばはホッホッホ。", "酔ってひょろひょろ清作が、", "去年十三ばいたべた。」", "四郎もかん子もすっかり釣(つ)り込(こ)まれてもう狐と一緒(いっしょ)に踊(おど)っています。", "キック、キック、トントン。キック、キック、トントン。キック、キック、キック、キック、トントントン。", "四郎が歌いました。", "「狐こんこん狐の子、去年狐のこん兵衛が、ひだりの足をわなに入れ、こんこんばたばたこんこんこん。」", "かん子が歌いました。", "「狐こんこん狐の子、去年狐のこん助が、焼いた魚を取ろとしておしりに火がつききゃんきゃんきゃん。」", "キック、キック、トントン。キック、キック、トントン。キック、キック、キック、キックトントントン。", "そして三人は踊りながらだんだん林の中にはいって行きました。赤い封蝋(ふうろう)細工のほおの木の芽が、風に吹(ふ)かれてピッカリピッカリと光り、林の中の雪には藍色(あいいろ)の木の影(かげ)がいちめん網(あみ)になって落ちて日光のあたる所には銀の百合(ゆり)が咲いたように見えました。", "すると子狐紺三郎が云いました。", "「鹿(しか)の子もよびましょうか。鹿の子はそりゃ笛(ふえ)がうまいんですよ。」", "四郎とかん子とは手を叩いてよろこびました。そこで三人は一緒に叫びました。", "「堅雪かんこ、凍み雪しんこ、鹿(しか)の子ぁ嫁ぃほしいほしい。」", "すると向うで、", "「北風ぴいぴい風三郎、西風どうどう又三郎」と細いいい声がしました。", "狐の子の紺三郎がいかにもばかにしたように、口を尖(とが)らして云いました。", "「あれは鹿の子です。あいつは臆病ですからとてもこっちへ来そうにありません。けれどもう一遍(いっぺん)叫んでみましょうか。」", "そこで三人は又叫びました。", "「堅雪かんこ、凍み雪しんこ、しかの子ぁ嫁(よめい)ほしい、ほしい。」", "すると今度はずうっと遠くで風の音か笛の声か、又は鹿の子の歌かこんなように聞えました。", "「北風ぴいぴい、かんこかんこ", "西風どうどう、どっこどっこ。」", "狐(きつね)が又ひげをひねって云いました。", "「雪が柔(やわ)らかになるといけませんからもうお帰りなさい。今度月夜に雪が凍ったらきっとおいで下さい。さっきの幻燈をやりますから。」", "そこで四郎とかん子とは", "「堅雪かんこ、凍み雪しんこ。」と歌いながら銀の雪を渡っておうちへ帰りました。", "「堅雪かんこ、凍み雪しんこ。」", "雪渡(ゆきわた)り　その二（狐小学校の幻燈会）", "青白い大きな十五夜のお月様がしずかに氷(ひ)の上山(かみやま)から登りました。", "雪はチカチカ青く光り、そして今日も寒水石(かんすいせき)のように堅(かた)く凍(こお)りました。", "四郎は狐の紺三郎との約束(やくそく)を思い出して妹のかん子にそっと云いました。", "「今夜狐の幻燈会なんだね。行こうか。」", "するとかん子は、", "「行きましょう。行きましょう。狐こんこん狐の子、こんこん狐の紺三郎。」とはねあがって高く叫(さけ)んでしまいました。", "すると二番目の兄さんの二郎が", "「お前たちは狐のとこへ遊びに行くのかい。僕(ぼく)も行きたいな。」と云いました。", "四郎は困ってしまって肩(かた)をすくめて云(い)いました。", "「大兄(おおにい)さん。だって、狐の幻燈会は十一歳までですよ、入場券に書いてあるんだもの。」", "二郎が云いました。", "「ど
