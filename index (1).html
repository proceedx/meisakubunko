, "なまぐさい春のにおいがする。", "おれはまたあのいやのことをかんがへこんだ。", "人間が人間の皮膚のにおいを嫌うということ。", "人間が人間の生殖器を醜悪にかんずること。", "あるとき人間が馬のように見えること。", "人間が人間の愛にうらぎりすること。", "人間が人間をきらうこと。", "ああ、厭人病者。", "ある有名なロシヤ人の小説、非常に重たい小説をよむと厭人病者の話が出ていた。", "それは立派な小説だ、けれども恐ろしい小説だ。", "心が愛するものを肉体で愛することのできないというのは、なんたる邪悪の思想であろう。なんたる醜悪の病気であろう。", "おれは生れていっぺんでも娘たちに接吻したことはない、", "ただ愛する小鳥たちの肩に手をかけて、せめては兄らしい言葉を言ったことすらもない。", "ああ、愛する、愛する、愛する小鳥たち。", "おれは人間を愛する。けれどもおれは人間を恐れる。", "おれはときどき、すべての人々から脱れて孤独になる。そしておれの心は、すべての人々を愛することによって涙ぐましくなる。", "おれはいつでも、人気のない寂しい海岸を歩きながら、遠い都の雑閙を思うのがすきだ。", "遠い都の灯ともし頃に、ひとりで故郷(ふるさと)の公園地をあるくのがすきだ。", "ああ、きのうもきのうとて、おれは悲しい夢をみつづけた。", "おれはくさった人間の血のにおいをかいだ。", "おれはくるしくなる。", "おれはさびしくなる。", "心で愛するものを、なにゆえに肉体で愛することができないのか。", "おれは懴悔する。", "懴悔する。", "おれはいつでも、くるしくなると懴悔する。", "利根川の河原の砂の上に座って懴悔をする。", "ぴよ、ぴよ、ぴよ、ぴよ、ぴよ、ぴよ、ぴよ、ぴよと、空では雲雀の親たちが鳴いている。", "河原蓬の根がぼうぼうとひろがっている。", "利根川はぬすびとのようにこっそりと流れている。", "あちらにも、こちらにも、うれはしげな農人の顔がみえる。", "それらの顔はくらくして地面をばかりみる。", "地面には春が包瘡のようにむっくりと吹き出している。", "おれはいぢらしくも雲雀の卵を拾いあげた。", "笛", "子供は笛が欲しかった。", "その時子供のお父さんは書きものをしているらしく思われた。", "子供はお父さんの部屋をのぞきに行った。", "子供はひっそりと扉(とびら)のかげに立っていた。", "扉のかげにはさくらの花のにおいがする。", "そのとき室内で大人(おとな)はかんがへこんでいた、", "大人(おとな)の思想がくるくると渦まきをした、ある混み入った思想のぢれんま［＃「ぢれんま」に傍点］が大人の心を痙攣(ひきつけ)させた。", "みれば、ですくの上に突つ伏した大人の額を、いつのまにか蛇がぎりぎりとまきつけていた。", "それは春らしい今朝のでき事が、そのひとの心を憂わしくしたのである。", "本能と良心と、", "わかちがたき一つの心をふたつにわかたんとする大人(おとな)の心のうらさびしさよ、", "力をこめて引きはなされた二つの影は、糸のようにもつれあいつつ、ほのぐらき明窓(あかりまど)のあたりをさまようた。", "人は自分の頭のうえに、それらの悲しい幽霊の通りゆく姿をみた。", "大人(おとな)は恐ろしさに息をひそめながら祈をはじめた", "「神よ、ふたつの心をひとつにすることなからしめたまえ」", "けれどもながいあいだ、幽霊は扉(とびら)のかげを出這入りした。", "扉のかげにはさくらの花のにおいがした。", "そこには青白い顔をした病身のかれの子供が立っていた。", "子供は笛が欲しかったのである。", "子供は扉をひらいて部屋の一隅に立っていた。", "子供は窓際のですくに突つ伏したおおいなる父の頭脳をみた。", "その頭脳のあたりははなはだしい陰影になっていた。", "子供の視線が蠅のようにその場所にとまっていた。", "子供のわびしい心がなにものかにひきつけられていたのだ。", "しだいに子供の心が力をかんじはじめた、", "子供は実に、はっきりとした声で叫んだ。", "みればそこには笛がおいてあったのだ。", "子供が欲しいと思っていた紫いろの小さい笛があったのだ。", "子供は笛についてなにごとも父に話してはなかった。", "それ故この事実はまったく偶然のでき事であった。", "おそらくはなにかの不思議なめぐりあわせであったのだ。", "けれども子供はかたく父の奇跡を信じた。", "もっとも偉大なる大人の思想が生み落した陰影の笛について、", "卓の上に置かれた笛について。", "故田中恭吉氏の芸術について", "雑誌「月映」を通じて、私が恭吉氏の芸術を始めて知ったのは、今から二年ほど以前のことである。当時、私があの素ばらしい芸術に接して、どんなに驚異と嘆美の瞳をみはったかと言うことは、殊更らに言うまでもないことであろう。実に私は自分の求めている心境の世界の一部分を、田中氏の芸術によって一層はっきりと凝視することができたのである。", "その頃、私は自分の詩集の装丁やでつくりの縦棒が下に突き抜けている、第4水準2-13-28］画を依頼する人を物色していた際なので、この新らしい知己を得た悦びは一層深甚なものであった。まもなく恩地孝氏の紹介によって私と恭吉氏とは、互にその郷里から書簡を往復するような間柄になった。", "幸にも、恭吉氏は以前から私の詩を愛読していられたので、二人の友情はたちまち深い所まで進んで行った。当時、重患の病床中にあった恭吉氏は、私の詩集の計画をきいて自分のことのように悦んでくれた。そしてその装丁とでつくりの縦棒が下に突き抜けている、画のために、彼のすべての「生命の残部」を傾注することを約束された。", "とはいえ、それ以来、氏からの消息はばったり絶えてしまった。そして恩地氏からの手紙では「いよいよ恭吉の最後も近づいた」ということであった。それから暫らくしてある日突然、恩地氏から一封の書留小包が届いた。それは恭吉氏の私のために傾注しつくされた「生命の残部」であった。床中で握りつめながら死んだという傷ましい形見の遺作であった。私はきびしい心でそれを押頂いた。（この詩集につくりの縦棒が下に突き抜けている、入した金泥の口絵と、赤地に赤いインキで薄く画いた線画がその形見である。この赤い絵は、劇薬を包む赤い四角の紙に赤いインキで描かれてあった。恐らくは未完成の下図であったろう。非常に緊張した鋭どいものである。その他の数葉は氏の遺作集から恩地君が選抜した。）", "恭吉氏は自分の芸術を称して、自ら「傷める芽」と言っていた。世にも希有な鬼才をもちながら、不幸にして現代に認められることができないで、あまつさえその若い生涯の殆んど全部を不治の病床生活に終って寂しく夭死してしまった無名の天才画家のことを考えると、私は胸に釘をうたれたような苦しい痛みをかんずる。", "思うに恭吉氏の芸術は「傷める生命(いのち)」そのもののやるせない［＃「やるせない」に傍点］絶叫であった。実に氏の芸術は「語る」というのではなくして、殆んど「絶叫」に近いほど張りつめた生命の苦喚の声であった。私は日本人の手になったあらゆる芸術の中で、氏の芸術ほど真に生命的な、恐ろしい真実性にふれたものを、他に決して見たことはない。", "恭吉氏の病床生活を通じて、彼の生命を悩ましたものは、その異常なる性欲の発作と、死に面接する絶えまなき恐怖であった。", "就中、その性欲は、ああした病気に特有な一種の恐ろしい熱病的執拗をもって、絶えずこの不幸な青年を苦しめたものである。恭吉氏の芸術に接した人は、そのありとあらゆる線が、無気味にもことごとく「性欲の嘆き」を語っている事に気がつくであろう。それらの異常なる絵画は、見る人にとっては真に戦慄すべきものである。", "「押えても押えても押えきれない性欲の発作」それはむざむざと彼の若い生命を食いつめた悪魔の手であった。しかも身動きもできないような重病人にとって、こうした性欲の発作が何にならうぞ。彼の芸術では、凡ての線がこの「対象の得られない性欲」の悲しみを訴えている。そこには気味の悪いほど深酷な音楽と祈祷とがある。", "襲いくる性欲の発作のまえに、彼はいつも瞳を閉じて低く唄った。", "こころよ　こころよ　しずまれ　しのびて　しのびて　しのべよ", "何という善良な、至純な心根をもった人であろう。たれかこのいぢらしい感傷の声をきいて涙を流さずにいられよう。", "一方、こうした肉体の苦悩に呪われながら、一方に彼はまた、眼のあたり死に面接する絶えまなき恐怖に襲われていた。彼はどんなに死を恐れていたか解らない。「とても取り返すことのできない生」を取り返そうとして、墓場の下から身を起そうとして無益に焦心する、悲しいたましひのすすりなき［＃「すすりなき」に傍点］のようなものが、彼の不思議の芸術の一面であった。そこには深い深い絶望の嗟嘆と、人間の心のどん底からにじみ出た恐ろしい深酷なセンチメンタリズムとがある。", "しかしこの等のことは、私がここに拙悪な文章で紹介するまでもないことである。見る人が、彼の芸術を見さえすれば、何もかも全感的に解ることである。すべて芸術をみるに、その形状や事実の概念を離れて、直接その内部生命であるリズムにまで触感することのできる人にとっては、一切の解説や紹介は不要なものにすぎないから。", "要するに、田中恭吉氏の芸術は「異常な性欲のなやみ」と「死に面接する恐怖」との感傷的交錯である。", "もちろん、私は絵画の方面では、全く知識のない素人であるから、専門的の立場から観照的に氏の芸術の優劣を批判することはできない。ただ私の限りなく氏を愛敬してその夭折を傷むゆえんは、もちろん、氏の態度や思想や趣味性に私と共鳴する所の多かったにもよるが、それよりも更に大切なことは、氏の芸術が真に恐ろしい人間の生命そのものに根ざした絶叫であったと言うことである。そしてこうした第一義的の貴重な創作を見ることは、現代の日本においては、極めて極めて特異な現象であるということである。", "萩原朔太郎"]}, {"no": 23, "title": "白雪姫", "author": "菊池　寛訳", "category": "外国文学-児童-物語", "chars": 11281, "volume": "中", "paras": ["菊池寛訳", "むかしむかし、冬のさなかのことでした。雪が、鳥の羽のように、ヒラヒラと天からふっていましたときに、ひとりの女王（じょおう）さまが、こくたんのわくのはまった窓（まど）のところにすわって、ぬいものをしておいでになりました。女王さまは、ぬいものをしながら、雪をながめておいでになりましたが、チクリとゆびを針（はり）でおさしになりました。すると、雪のつもった中に、ポタポタポタと三滴（てき）の血（ち）がおちました。まっ白い雪の中で、そのまっ赤な血（ち）の色が、たいへんきれいに見えたものですから、女王さまはひとりで、こんなことをお考えになりました。", "「どうかして、わたしは、雪のようにからだが白く、血のように赤いうつくしいほっぺたをもち、このこくたんのわくのように黒い髪（かみ）をした子がほしいものだ。」と。", "それから、すこしたちまして、女王さまは、ひとりのお姫（ひめ）さまをおうみになりましたが、そのお姫さまは色が雪のように白く、ほおは血のように赤く、髪の毛はこくたんのように黒くつやがありました。それで、名も白雪姫（しらゆきひめ）とおつけになりました。けれども、女王さまは、このお姫さまがおうまれになりますと、すぐおなくなりになりました。", "一年以上たちますと、王さまはあとがわりの女王さまをおもらいになりました。その女王さまはうつくしいかたでしたが、たいへんうぬぼれが強く、わがままなかたで、じぶんよりもほかの人がすこしでもうつくしいと、じっとしてはいられないかたでありました。ところが、この女王さまは、まえから一つのふしぎな鏡（かがみ）を持っておいでになりました。その鏡をごらんになるときは、いつでも、こうおっしゃるのでした。", "「鏡（かがみ）や、鏡、壁（かべ）にかかっている鏡よ。", "国じゅうで、だれがいちばんうつくしいか、いっておくれ。」", "すると、鏡はいつもこう答えていました。", "「女王さま、あなたこそ、お国でいちばんうつくしい。」", "それをきいて、女王さまはご安心なさるのでした。というのは、この鏡は、うそをいわないということを、女王さまは、よく知っていられたからです。", "そのうちに、白雪姫（しらゆきひめ）は、大きくなるにつれて、だんだんうつくしくなってきました。お姫さまが、ちょうど七つになられたときには、青々と晴れた日のように、うつくしくなって、女王さまよりも、ずっとうつくしくなりました。ある日、女王さまは、鏡の前にいって、おたずねになりました。", "「鏡や、鏡、壁にかかっている鏡よ。", "国じゅうで、だれがいちばんうつくしいか、いっておくれ。」", "すると、鏡は答えていいました。", "「女王（じょおう）さま、ここでは、あなたがいちばんうつくしい。", "けれども、白雪姫（しらゆきひめ）は、千ばいもうつくしい。」", "女王さまは、このことをおききになると、びっくりして、ねたましくなって、顔色を黄いろくしたり、青くしたりなさいました。", "さて、それからというものは、女王さまは、白雪姫をごらんになるたびごとに、ひどくいじめるようになりました。そして、ねたみと、こうまんとが、野原の草がいっぱいはびこるように、女王さまの、心の中にだんだんとはびこってきましたので、いまでは夜もひるも、もうじっとしてはいられなくなりました。", "そこで、女王さまは、ひとりのかりうどをじぶんのところにおよびになって、こういいつけられました。", "「あの子を、森の中につれていっておくれ。わたしは、もうあの子を、二どと見たくないんだから。だが、おまえはあの子をころして、そのしょうこに、あの子の血（ち）を、このハンケチにつけてこなければなりません。」", "かりうどは、そのおおせにしたがって、白雪姫（しらゆきひめ）を森の中へつれていきました。かりうどが、狩（か）りにつかう刀（かたな）をぬいて、なにも知らない白雪姫の胸（むね）をつきさそうとしますと、お姫さまは泣いて、おっしゃいました。", "「ああ、かりうどさん、わたしを助けてちょうだい。そのかわり、わたしは森のおくの方にはいっていって、もう家にはけっしてかえらないから。」", "これをきくと、かりうども、お姫さまがあまりにうつくしかったので、かわいそうになってしまって、", "「じゃあ、はやくおにげなさい。かわいそうなお子さまだ。」といいました。", "「きっと、けものが、すぐでてきて、くいころしてしまうだろう。」と、心のうちで思いましたが、お姫さまをころさないですんだので、胸の上からおもい石でもとれたように、らくな気もちになりました。ちょうどそのとき、イノシシの子が、むこうからとびだしてきましたので、かりうどはそれをころして、その血（ち）をハンケチにつけて、お姫さまをころしたしょうこに、女王さまのところに持っていきました。女王さまは、それをごらんになって、すっかり安心して、白雪姫は死んだものと思っていました。", "さて、かわいそうなお姫さまは、大きな森の中で、たったひとりぼっちになってしまって、こわくってたまらず、いろいろな木の葉っぱを見ても、どうしてよいのか、わからないくらいでした。お姫さまは、とにかくかけだして、とがった石の上をとびこえたり、イバラの中をつきぬけたりして、森のおくの方へとすすんでいきました。ところが、けだものはそばをかけすぎますけれども、すこしもお姫さまをきずつけようとはしませんでした。白雪姫は、足のつづくかぎり走りつづけて、とうとうゆうがたになるころに、一軒（けん）の小さな家（うち）を見つけましたので、つかれを休めようと思って、その中にはいりました。その家の中にあるものは、なんでもみんな小さいものばかりでしたが、なんともいいようがないくらいりっぱで、きよらかでした。", "そのへやのまん中には、ひとつの白い布（きれ）をかけたテーブルがあって、その上には、七つの小さなお皿（さら）があって、またその一つ一つには、さじに、ナイフに、フォークがつけてあって、なおそのほかに、七つの小さなおさかずきがおいてありました。そして、また壁（かべ）ぎわのところには、七つの小さな寝（ね）どこが、すこしあいだをおいて、じゅんじゅんにならんで、その上には、みんな雪のように白い麻（あさ）の敷布（しきふ）がしいてありました。", "白雪姫は、たいへんおなかがすいて、おまけにのどもかわいていましたから、一つ一つのお皿（さら）から、すこしずつやさいのスープとパンをたべ、それから、一つ一つのおさかずきから、一滴（てき）ずつブドウ酒（しゅ）をのみました。それは、一つところのを、みんなたべてしまうのは、わるいと思ったからでした。それが、すんでしまうと、こんどは、たいへんつかれていましたから、ねようと思って、一つの寝どこにはいってみました。けれども、どれもこれもちょうどうまくからだにあいませんでした。長すぎたり、短すぎたりしましたが、いちばんおしまいに、七ばんめの寝どこが、やっとからだにあいました。それで、その寝どこにはいって、神さまにおいのりをして、そのままグッスリねむってしまいました。", "日がくれて、あたりがまっくらになったときに、この小さな家の主人たちがかえってきました。その主人たちというのは、七人の小人（こびと）でありました。この小人たちは、毎日、山の中にはいりこんで、金や銀（ぎん）のはいった石をさがして、よりわけたり、ほりだしたりするのが、しごとでありました。小人（こびと）はじぶんたちの七つのランプに火をつけました。すると、家の中がパッとあかるくなりますと、だれかが、その中にいるということがわかりました。それは、小人たちが家をでかけたときのように、いろいろのものが、ちゃんとおいてなかったからでした。第一の小人が、まず口をひらいて、いいました。", "「だれか、わしのいすに腰（こし）をかけた者があるぞ。」", "すると、第二の小人がいいました。", "「だれか、わしのお皿（さら）のものをすこしたべた者があるぞ。」", "第三の小人がいいました。", "「だれか、わしのパンをちぎった者があるぞ。」", "第四の小人がいいました。", "「だれか、わしのやさいをたべた者があるぞ。」", "第五の小人がいいました。", "「だれかわしのフォークを使った者があるぞ。」", "第六の小人（こびと）がいいました。", "「だれか、わしのナイフで切った者があるぞ。」", "第七の小人がいいました。", "「だれか、わしのさかずきでのんだ者があるぞ。」", "それから、第一の小人が、ほうぼうを見まわしますと、じぶんの寝（ね）どこが、くぼんでいるのを見つけて、声をたてました。", "「だれが、わしの寝どこにはいりこんだのだ。」", "すると、ほかの小人（こびと）たちが寝（ね）どこへかけつけてきて、さわぎだしました。", "「わしの寝どこにも、だれかがねたぞ。」", "けれども、第七ばんめの小人は、じぶんの寝どこへいってみると、その中に、はいってねむっている白雪姫を見つけました。こんどは、第七ばんめの小人が、みんなをよびますと、みんなは、なにがおこったのかと思ってかけよってきて、びっくりして声をたてながら七つのランプを持ってきて白雪姫をてらしました。", "「おやおやおやおや、なんて、この子は、きれいなんだろう。」と、小人（こびと）はさけびました。それから小人たちは、大よろこびで、白雪姫（しらゆきひめ）をおこさないで、寝（ね）どこの中に、そのままソッとねさせておきました。そして、七ばんめの小人は、一時間ずつほかの小人の寝どこにねるようにして、その夜をあかしました。", "朝になって、白雪姫は目をさまして、七人の小人を見て、おどろきました。けれども、小人たちは、たいへんしんせつにしてくれて、「おまえさんの名まえはなんというのかな。」とたずねました。すると、", "「わたしの名まえは、白雪姫というのです。」と、お姫さまは答えました。", "「おまえさんは、どうして、わたしたちの家（うち）にはいってきたのかね。」と、小人たちはききました。そこで、お姫さまは、まま母が、じぶんをころそうとしたのを、かりうどが、そっと助けてくれたので、一日じゅう、かけずりまわって、やっと、この家を見つけたことを、小人たちに話しました。その話をきいて、小人たちは、", "「もしも、おまえさんが、わしたちの家の中のしごとをちゃんと引きうけて、にたきもすれば、おとこものべるし、せんたくも、ぬいものも、あみものも、きちんときれいにする気があれば、わしたちは、おまえさんを家（うち）においてあげて、なんにもふそくのないようにしてあげるんだが。」といいました。", "「どうぞ、おねがいします。」と、お姫さまはたのみました。それからは、白雪姫（しらゆきひめ）は、小人（こびと）の家にいることになりました。", "白雪姫は、小人の家のしごとを、きちんとやります。小人の方では毎朝、山にはいりこんで、金や銀（ぎん）のはいった石をさがし、夜になると、家にかえってくるのでした。そのときまでに、ごはんのしたくをしておかねばなりませんでした。ですから、ひるまは白雪姫は、たったひとりでるすをしなければなりませんので、しんせつな小人たちは、こんなことをいいました。", "「おまえさんのまま母さんに用心なさいよ。おまえさんが、ここにいることを、すぐ知るにちがいない。だから、だれも、この家の中にいれてはいけないよ。」", "こんなことはすこしも知らない女王さまは、かりうどが白雪姫をころしてしまったものだと思って、じぶんが、また第一のうつくしい女になったと安心していましたので、あるとき鏡（かがみ）の前にいって、いいました。", "「鏡や、鏡、壁（かべ）にかかっている鏡よ。", "国じゅうで、だれがいちばんうつくしいか、いっておくれ。」", "すると、鏡が答えました。", "「女王（じょおう）さま、ここでは、あなたがいちばんうつくしい。", "けれども、いくつも山こした、", "七人の小人の家にいる白雪姫（しらゆきひめ）は、", "まだ千ばいもうつくしい。」", "これをきいたときの、女王さまのおどろきようといったらありませんでした。この鏡は、けっしてまちがったことをいわない、ということを知っていましたので、かりうどが、じぶんをだましたということも、白雪姫が、まだ生きているということも、みんなわかってしまいました。そこで、どうにかして、白雪姫をころしてしまいたいものだと思いまして、またあたらしく、いろいろと考えはじめました。女王さまは、国じゅうでじぶんがいちばんうつくしい女にならないうちは、ねたましくて、どうしても、安心していられないからでありました。", "そこで、女王さまは、おしまいになにか一つの計略（けいりゃく）を考えだしました。そしてじぶんの顔を黒くぬって、年よりの小間物屋（こまものや）のような着物（きもの）をきて、だれにも女王さまとは思えないようになってしまいました。こんなふうをして、七つの山をこえて、七人の小人（こびと）の家にいって、戸をトントンとたたいて、いいました。", "「よい品物（しなもの）がありますが、お買いになりませんか。」", "白雪姫はなにかと思って、窓（まど）から首をだしてよびました。", "「こんにちは、おかみさん、なにがあるの。」", "「上等（じょうとう）な品で、きれいな品を持ってきました。いろいろかわったしめひもがあります。」といって、いろいろな色の絹糸（きぬいと）であんだひもを、一つ取りだしました。白雪姫は、", "「この正直（しょうじき）そうなおかみさんなら、家の中にいれてもかまわないだろう。」と思いまして、戸をあけて、きれいなしめひもを買いとりました。", "「おじょうさんには、よくにあうことでしょう。さあ、わたしがひとつよくむすんであげましょう。」と、年よりの小間物屋（こまものや）はいいました。", "白雪姫は、すこしもうたがう気がありませんから、そのおかみさんの前に立って、あたらしい買いたてのひもでむすばせました。すると、そのばあさんは、すばやく、そのしめひもを白雪姫の首をまきつけて、強くしめましたので、息ができなくなって、死んだようにたおれてしまいました。", "「さあ、これで、わたしが、いちばんうつくしい女になったのだ。」といって、まま母はいそいで、でていってしまいました。", "それからまもなく、日がくれて、七人の小人（こびと）たちが、家にかえってきましたが、かわいがっていた白雪姫が、地べたの上にたおれているのを見たときには、小人たちのおどろきようといったらありませんでした。白雪姫は、まるで死人のように、息もしなければ、動きもしませんでした。みんなで白雪姫を地べたから高いところにつれていきました。そして、のどのところが、かたくしめつけられているのを見て、小人たちは、しめひもを二つに切ってしまいました。すると、すこし息をしはじめて、だんだん元気づいてきました。小人たちは、どんなことがあったのかをききますと、姫はきょうあった、いっさいのことを話しました。", "「その小間物売（こまものう）りの女こそ、鬼（おに）のような女王にちがいない。よく気をつけなさいよ。わたしたちがそばにいないときには、どんな人だって、家にいれないようにするんですよ。」と。", "わるい女王の方では、家にかえってくると、すぐ鏡（かがみ）の前にいって、たずねました。", "「鏡や、鏡、壁（かべ）にかかっている鏡よ。", "国じゅうで、だれがいちばんうつくしいか、いっておくれ。」", "すると、鏡は、正直（しょうじき）にまえとおなじに答えました。", "「女王さま、ここでは、あなたがいちばんうつくしい。", "けれども、いくつも山こした、", "七人の小人（こびと）の家にいる白雪姫は、", "まだ千ばいもうつくしい。」", "と、このことを女王さまがきいたときには、からだじゅうの血（ち）がいっぺんに、胸（むね）によってきたかと思うくらいおどろいてしまいました。白雪姫が、また生きかえったということを知ったからです。", "「だが、こんどこそは、おまえを、ほんとうにころしてしまうようなことを工夫（くふう）してやるぞ。」そういって、じぶんの知っている魔法（まほう）をつかって、一つの毒（どく）をぬった櫛（くし）をこしらえました。それから、女王さまは、みなりをかえ、まえとはべつなおばあさんのすがたになって、七つの山をこえ、七人の小人のところにいって、トントンと戸をたたいて、いいました。", "「よい品物（しなもの）がありますが、お買いになりませんか。」", "白雪姫は、中からちょっと顔をだして、", "「さあ、あっちにいってちょうだい。だれも、ここにいれないことになっているんですから。」", "「でも、見るだけなら、かまわないでしょう。」", "おばあさんはそういって、毒（どく）のついている櫛（くし）を、箱（はこ）から取りだし、手のひらにのせて高くさしあげてみせました。ところが、その櫛がばかに、白雪姫のお気にいりましたので、その方に気をとられて、思わず戸をあけてしまいました。そして、櫛を買うことがきまったときに、おばあさんは、", "「では、わたしが、ひとつ、いいぐあいに髪（かみ）をといてあげましょう。」といいました。", "かわいそうな白雪姫は、なんの気なしに、おばあさんのいうとおりにさせました。ところが、櫛（くし）の歯（は）が髪の毛のあいだにはいるかはいらないうちに、おそろしい毒が、姫の頭（あたま）にしみこんだものですから、姫はそのばで気をうしなってたおれてしまいました。", "「いくら、おまえがきれいでも、こんどこそおしまいだろう。」と、心のまがった女は、きみのわるい笑いを浮かべながら、そこをでていってしまいました。", "けれども、ちょうどいいぐあいに、すぐゆうがたになって、七人の小人（こびと）がかえってきました。そして、白雪姫が、また死んだようになって、地べたにたおれているのを見て、すぐまま母のしわざと気づきました。それで、ほうぼう姫のからだをしらべてみますと、毒（どく）の櫛（くし）が見つかりましたので、それをひきぬきますと、すぐに姫は息をふきかえしました。そして、きょうのことを、すっかり小人たちに話しました。小人たちは、白雪姫にむかってもういちど、よく用心して、けっしてだれがきても、戸をあけてはいけないと、ちゅういしました。", "心のねじけた女王さまは、家にかえって、鏡（かがみ）の前に立っていいました。", "「鏡や、鏡、壁（かべ）にかかっている鏡よ。", "国じゅうで、だれがいちばんうつくしいか、いっておくれ。」", "すると、鏡は、まえとおなじようにに答えました。", "「女王さま、ここでは、あなたがいちばんうつくしい。", "けれども、いくつも山こした、", "七人の小人の家にいる白雪姫は、", "まだ千ばいもうつくしい。」", "女王さまは、鏡（かがみ）が、こういったのをきいたとき、あまりの腹（はら）だちに、からだじゅうをブルブルとふるわしてくやしがりました。", "「白雪姫のやつ、どうしたって、ころさないではおくものか。たとえ、わたしの命がなくなっても、そうしてやるのだ。」と、大きな声でいいました。それからすぐ、女王さまは、まだだれもはいったことのない、はなれたひみつのへやにいって、そこで、毒（どく）の上に毒をぬった一つのリンゴをこさえました。そのリンゴは、見かけはいかにもうつくしくて、白いところに赤みをもっていて、一目見ると、だれでもかじりつきたくなるようにしてありました。けれども、その一きれでもたべようものなら、それこそ、たちどころに死んでしまうという、おそろしいリンゴでした。", "さて、リンゴが、すっかりできあがりますと、顔を黒くぬって、百姓（しょう）のおかみさんのふうをして、七つの山をこして、七人の小人（こびと）の家へいきました。そして、戸をトントンとたたきますと、白雪姫が、窓（まど）から頭（あたま）をだして、", "「七人の小人が、いけないといいましたから、わたしは、だれも中にいれるわけにはいきません。」といいました。", "「いいえ、はいらなくてもいいんですよ。わたしはね、いまリンゴをすててしまおうかと思っているところなので、おまえさんにも、ひとつあげようかと思ってね。」と、百姓（しょう）の女はいいました。", "「いいえ、わたしはどんなものでも、人からもらってはいけないのよ。」と、白雪姫はことわりました。", "「おまえさんは、毒（どく）でもはいっていると思いなさるのかね。まあ、ごらんなさい。このとおり、二つに切って、半分はわたしがたべましょう。よくうれた赤い方を、おまえさんおあがりなさい。」といいました。", "そのリンゴは、たいへんじょうずに、こしらえてありまして、赤い方のがわだけに、毒（どく）がはいっていました。白雪姫は、百姓のおかみさんが、さもうまそうにたべているのを見ますと、そのきれいなリンゴがほしくてたまらなくなりました。それで、ついなんの気なしに手をだして、毒（どく）のはいっている方の半分を受けとってしまいました。けれども、一かじり口にいれるかいれないうちに、バッタリとたおれ、そのまま息がたえてしまいました。すると、女王さまは、そのようすをおそろしい目つきでながめて、さもうれしそうに、大きな声で笑いながら、", "「雪のように白く、血（ち）のように赤く、こくたん［＃「こくたん」に傍点］のように黒いやつ、こんどこそは、小人（こびと）たちだって、助けることはできまい。」といいました。そして、大いそぎで家にかえりますと、まず鏡（かがみ）のところにかけつけてたずねました。", "「鏡や、鏡、壁（かべ）にかかっている鏡よ。", "国じゅうで、だれがいちばんうつくしいか、いっておくれ。」", "すると、とうとう鏡が答えました。", "「女王さま、お国でいちばん、あなたがうつくしい。」", "これで、女王さまの、ねたみぶかい心も、やっとしずめることができて、ほんとうにおちついた気もちになりました。", "ゆうがたになって、小人たちは、家にかえってきましたが、さあたいへん、こんども、また白雪姫が、地べたにころがって、たおれているではありませんか。びっくりして、かけよってみれば、もう姫の口からは息一つすらしていません。かわいそうに死んで、もうひえきってしまっているのでした。小人たちは、お姫さまを、高いところにはこんでいって、なにか毒（どく）になるものはありはしないかと、さがしてみたり、ひもをといたり、髪（かみ）の毛をすいたり、水や、お酒で、よくあらってみたりしましたが、なんの役にもたちませんでした。みんなでかわいがっていたこどもは、こうしてほんとうに死んでしまって、ふたたび生きかえりませんでした。", "小人たちは、白雪姫のからだを、一つの棺（かん）の上にのせました。そして、七人の者が、のこらずそのまわりにすわって、三日三晩泣きくらしました。それから、姫をうずめようと思いましたが、なにしろ姫はまだ生きていたそのままで、いきいきと顔色も赤く、かわいらしく、きれいなものですから、小人たちは、", "「まあ見ろよ。これを、あのまっ黒い土の中に、うめることなんかできるものか。」そういって、外から中が見られるガラスの棺（かん）をつくり、その中に姫のからだをねかせ、その上に金文字（きんもじ）で白雪姫という名を書き、王さまのお姫さまであるということも、書きそえておきました。それから、みんなで、棺を山の上にはこびあげ、七人のうちのひとりが、いつでも、そのそばにいて番をすることになりました。すると、鳥や、けだものまでが、そこにやってきて、白雪姫のことを泣きかなしむのでした。いちばんはじめにきたのは、フクロウで、そのつぎがカラス、いちばんおしまいにハトがきました。", "さて、白雪姫は、ながいながいあいだ棺（かん）の中によこになっていましたが、そのからだは、すこしもかわらず、まるで眠っているようにしか見えませんでした。お姫さまは、まだ雪のように白く、血（ち）のように赤く、こくたんのように黒い髪（かみ）の毛をしていました。", "すると、そのうち、ある日のこと、ひとりの王子（おうじ）が、森の中にまよいこんで、七人の小人の家にきて、一晩とまりました。王子は、ふと山の上にきて、ガラスの棺に目をとめました。近よってのぞきますと、じつにうつくしいうつくしい少女のからだがはいっています。しばらくわれをわすれて見とれていました王子は、棺の上に金文字で書いてあることばをよみ、すぐ小人たちに、", "「この棺（かん）を、わたしにゆずってくれませんか。そのかわりわたしは、なんでも、おまえさんたちのほしいと思うものをやるから。」といわれました。けれども、小人たちは、", "「たとえわたしたちは、世界じゅうのお金を、みんないただいても、こればかりはさしあげられません。」とお答えしました。", "「そうだ、これにかわるお礼なんぞあるもんじゃあない。だがわたしは、白雪姫を見ないでは、もう生きていられない。お礼なぞしないから、ただください。わたしの生きているあいだは、白雪姫をうやまい、きっとそまつにはしないから。」王子（おうじ）はおりいっておたのみになりました。", "王子が、こんなにまでおっしゃるので、気だてのよい小人たちは、王子の心もちを、気のどくに思って、その棺をさしあげることにしました。王子は、それを、家来（けらい）たちにめいじて、肩（かた）にかついではこばせました。ところが、まもなく、家来のひとりが、一本の木につまずきました。で、棺がゆれたひょうしに、白雪姫がかみ切った毒（どく）のリンゴの一きれが、のどからとびだしたものです。すると、まもなく、お姫さまは目をパッチリ見ひらいて、棺（かん）のふたをもちあげて、起きあがってきました。そして元気づいて、", "「おやまあ、わたしは、どこにいるんでしょう。」といいました。それをきいた王子のよろこびはたとえようもありませんでした。", "「わたしのそばにいるんですよ。」といって、いままであったことをお話しになって、そのあとから、", "「わたしは、あなたが世界じゅうのなにものよりもかわいいのです。さあ、わたしのおとうさんのお城（しろ）へいっしょにいきましょう。そしてあなたは、わたしのお嫁（よめ）さんになってください。」といわれました。", "そこで、白雪姫もしょうちして、王子といっしょにお城にいきました。そして、ふたりのごこんれいは、できるだけりっぱに、さかんにいわわれることになりました。", "けれども、このおいわいの式（しき）には、白雪姫のまま母である女王さまもまねかれることになりました。女王さまは、わかい花嫁（はなよめ）が白雪姫だとは知りませんでした。女王さまはうつくしい着物（きもの）をきてしまったときに、鏡（かがみ）の前にいって、たずねました。", "「鏡や、鏡、壁（かべ）にかかっている鏡よ。", "国じゅうで、だれがいちばんうつくしいか、いっておくれ。」", "鏡は答えていいました。", "「女王さま、ここでは、あなたがいちばんうつくしい。", "けれども、わかい女王さまは、千ばいもうつくしい。」", "これをきいたわるい女王さまは、腹をたてまいことか、のろいのことばをつぎつぎにあびせかけました。そして、気になって気になって、どうしてよいか、わからないくらいでした。女王さまは、はじめのうちは、もうごこんれいの式（しき）にはいくのをやめようかと思いましたけれども、それでも、じぶんででかけていって、そのわかい女王さまを見ないでは、とても、安心できませんでした。女王さまは、まねかれたご殿（てん）にはいりました。そして、ふと見れば、わかい女王になる人とは白雪姫ではありませんか。女王はおそろしさで、そこに立ちすくんだまま動くことができなくなりました。", "けれども、そのときは、もう人々がまえから石炭（せきたん）の火の上に、鉄（てつ）でつくったうわぐつをのせておきましたのが、まっ赤にやけてきましたので、それを火ばしでへやの中に持ってきて、わるい女王さまの前におきました。そして、むりやり女王さまに、そのまっ赤にやけたくつをはかせて、たおれて死ぬまでおどらせました。"]}, {"no": 24, "title": "セロ弾きのゴーシュ", "author": "宮沢 賢治", "category": "日本文学-児童-童話", "chars": 12291, "volume": "中", "paras": ["ゴーシュは町の活動写真館でセロを弾く係りでした。けれどもあんまり上手でないという評判でした。上手でないどころではなく実は仲間の楽手のなかではいちばん下手でしたから、いつでも楽長にいじめられるのでした。", "ひるすぎみんなは楽屋に円くならんで今度の町の音楽会へ出す第六交響曲（こうきょうきょく）の練習をしていました。", "トランペットは一生けん命歌っています。", "ヴァイオリンも二いろ風のように鳴っています。", "クラリネットもボーボーとそれに手伝っています。", "ゴーシュも口をりんと結んで眼（め）を皿（さら）のようにして楽譜（がくふ）を見つめながらもう一心に弾いています。", "にわかにぱたっと楽長が両手を鳴らしました。みんなぴたりと曲をやめてしんとしました。楽長がどなりました。", "「セロがおくれた。トォテテ　テテテイ、ここからやり直し。はいっ。」", "みんなは今の所の少し前の所からやり直しました。ゴーシュは顔をまっ赤にして額に汗（あせ）を出しながらやっといま云（い）われたところを通りました。ほっと安心しながら、つづけて弾いていますと楽長がまた手をぱっと拍（う）ちました。", "「セロっ。糸が合わない。困るなあ。ぼくはきみにドレミファを教えてまでいるひまはないんだがなあ。」", "みんなは気の毒そうにしてわざとじぶんの譜をのぞき込（こ）んだりじぶんの楽器をはじいて見たりしています。ゴーシュはあわてて糸を直しました。これはじつはゴーシュも悪いのですがセロもずいぶん悪いのでした。", "「今の前の小節から。はいっ。」", "みんなはまたはじめました。ゴーシュも口をまげて一生けん命です。そしてこんどはかなり進みました。いいあんばいだと思っていると楽長がおどすような形をしてまたぱたっと手を拍ちました。またかとゴーシュはどきっとしましたがありがたいことにはこんどは別の人でした。ゴーシュはそこでさっきじぶんのときみんながしたようにわざとじぶんの譜へ眼を近づけて何か考えるふりをしていました。", "「ではすぐ今の次。はいっ。」", "そらと思って弾き出したかと思うといきなり楽長が足をどんと踏（ふ）んでどなり出しました。", "「だめだ。まるでなっていない。このへんは曲の心臓なんだ。それがこんながさがさしたことで。諸君。演奏までもうあと十日しかないんだよ。音楽を専門にやっているぼくらがあの金沓鍛冶（かなぐつかじ）だの砂糖屋の丁稚（でっち）なんかの寄り集りに負けてしまったらいったいわれわれの面目（めんもく）はどうなるんだ。おいゴーシュ君。君には困るんだがなあ。表情ということがまるでできてない。怒（おこ）るも喜ぶも感情というものがさっぱり出ないんだ。それにどうしてもぴたっと外の楽器と合わないもなあ。いつでもきみだけとけた靴（くつ）のひもを引きずってみんなのあとをついてあるくようなんだ、困るよ、しっかりしてくれないとねえ。光輝（こうき）あるわが金星音楽団がきみ一人のために悪評をとるようなことでは、みんなへもまったく気の毒だからな。では今日は練習はここまで、休んで六時にはかっきりボックスへ入ってくれ給（たま）え。」", "みんなはおじぎをして、それからたばこをくわえてマッチをすったりどこかへ出て行ったりしました。ゴーシュはその粗末（そまつ）な箱（はこ）みたいなセロをかかえて壁（かべ）の方へ向いて口をまげてぼろぼろ泪（なみだ）をこぼしましたが、気をとり直してじぶんだけたったひとりいまやったところをはじめからしずかにもいちど弾きはじめました。", "その晩遅（おそ）くゴーシュは何か巨（おお）きな黒いものをしょってじぶんの家へ帰ってきました。家といってもそれは町はずれの川ばたにあるこわれた水車小屋で、ゴーシュはそこにたった一人ですんでいて午前は小屋のまわりの小さな畑でトマトの枝（えだ）をきったり甘藍（キャベジ）の虫をひろったりしてひるすぎになるといつも出て行っていたのです。ゴーシュがうちへ入ってあかりをつけるとさっきの黒い包みをあけました。それは何でもない。あの夕方のごつごつしたセロでした。ゴーシュはそれを床（ゆか）の上にそっと置くと、いきなり棚（たな）からコップをとってバケツの水をごくごくのみました。", "それから頭を一つふって椅子（いす）へかけるとまるで虎（とら）みたいな勢（いきおい）でひるの譜を弾きはじめました。譜をめくりながら弾いては考え考えては弾き一生けん命しまいまで行くとまたはじめからなんべんもなんべんもごうごうごうごう弾きつづけました。", "夜中もとうにすぎてしまいはもうじぶんが弾いているのかもわからないようになって顔もまっ赤になり眼もまるで血走ってとても物凄（ものすご）い顔つきになりいまにも倒（たお）れるかと思うように見えました。", "そのとき誰（たれ）かうしろの扉（と）をとんとんと叩（たた）くものがありました。", "「ホーシュ君か。」ゴーシュはねぼけたように叫（さけ）びました。ところがすうと扉を押（お）してはいって来たのはいままで五六ぺん見たことのある大きな三毛猫（みけねこ）でした。", "ゴーシュの畑からとった半分熟したトマトをさも重そうに持って来てゴーシュの前におろして云いました。", "「ああくたびれた。なかなか運搬（うんぱん）はひどいやな。」", "「何だと」ゴーシュがききました。", "「これおみやです。たべてください。」三毛猫が云いました。", "ゴーシュはひるからのむしゃくしゃを一ぺんにどなりつけました。", "「誰がきさまにトマトなど持ってこいと云った。第一おれがきさまらのもってきたものなど食うか。それからそのトマトだっておれの畑のやつだ。何だ。赤くもならないやつをむしって。いままでもトマトの茎（くき）をかじったりけちらしたりしたのはおまえだろう。行ってしまえ。ねこめ。」", "すると猫は肩（かた）をまるくして眼をすぼめてはいましたが口のあたりでにやにやわらって云いました。", "「先生、そうお怒りになっちゃ、おからだにさわります。それよりシューマンのトロメライをひいてごらんなさい。きいてあげますから。」", "「生意気なことを云うな。ねこのくせに。」", "セロ弾きはしゃくにさわってこのねこのやつどうしてくれようとしばらく考えました。", "「いやご遠慮（えんりょ）はありません。どうぞ。わたしはどうも先生の音楽をきかないとねむられないんです。」", "「生意気だ。生意気だ。生意気だ。」", "ゴーシュはすっかりまっ赤になってひるま楽長のしたように足ぶみしてどなりましたがにわかに気を変えて云いました。", "「では弾くよ。」", "ゴーシュは何と思ったか扉（と）にかぎをかって窓もみんなしめてしまい、それからセロをとりだしてあかしを消しました。すると外から二十日過ぎの月のひかりが室（へや）のなかへ半分ほどはいってきました。", "「何をひけと。」", "「トロメライ、ロマチックシューマン作曲。」猫は口を拭（ふ）いて済まして云いました。", "「そうか。トロメライというのはこういうのか。」", "セロ弾きは何と思ったかまずはんけちを引きさいてじぶんの耳の穴へぎっしりつめました。それからまるで嵐（あらし）のような勢（いきおい）で「印度（インド）の虎狩（とらがり）」という譜を弾きはじめました。", "すると猫はしばらく首をまげて聞いていましたがいきなりパチパチパチッと眼をしたかと思うとぱっと扉の方へ飛びのきました。そしていきなりどんと扉へからだをぶっつけましたが扉はあきませんでした。猫はさあこれはもう一生一代の失敗をしたという風にあわてだして眼や額からぱちぱち火花を出しました。するとこんどは口のひげからも鼻からも出ましたから猫はくすぐったがってしばらくくしゃみをするような顔をしてそれからまたさあこうしてはいられないぞというようにはせあるきだしました。ゴーシュはすっかり面白（おもしろ）くなってますます勢よくやり出しました。", "「先生もうたくさんです。たくさんですよ。ご生ですからやめてください。これからもう先生のタクトなんかとりませんから。」", "「だまれ。これから虎をつかまえる所だ。」", "猫はくるしがってはねあがってまわったり壁にからだをくっつけたりしましたが壁についたあとはしばらく青くひかるのでした。しまいは猫はまるで風車のようにぐるぐるぐるぐるゴーシュをまわりました。", "ゴーシュもすこしぐるぐるして来ましたので、", "「さあこれで許してやるぞ」と云いながらようようやめました。", "すると猫もけろりとして", "「先生、こんやの演奏はどうかしてますね。」と云いました。", "セロ弾きはまたぐっとしゃくにさわりましたが何気ない風で巻たばこを一本だして口にくわえそれからマッチを一本とって", "「どうだい。工合（ぐあい）をわるくしないかい。舌を出してごらん。」", "猫はばかにしたように尖（とが）った長い舌をベロリと出しました。", "「ははあ、少し荒（あ）れたね。」セロ弾きは云いながらいきなりマッチを舌でシュッとすってじぶんのたばこへつけました。さあ猫は愕（おどろ）いたの何の舌を風車のようにふりまわしながら入り口の扉（と）へ行って頭でどんとぶっつかってはよろよろとしてまた戻（もど）って来てどんとぶっつかってはよろよろまた戻って来てまたぶっつかってはよろよろにげみちをこさえようとしました。", "ゴーシュはしばらく面白そうに見ていましたが", "「出してやるよ。もう来るなよ。ばか。」", "セロ弾きは扉をあけて猫が風のように萱（かや）のなかを走って行くのを見てちょっとわらいました。それから、やっとせいせいしたというようにぐっすりねむりました。", "次の晩もゴーシュがまた黒いセロの包みをかついで帰ってきました。そして水をごくごくのむとそっくりゆうべのとおりぐんぐんセロを弾きはじめました。十二時は間もなく過ぎ一時もすぎ二時もすぎてもゴーシュはまだやめませんでした。それからもう何時だかもわからず弾いているかもわからずごうごうやっていますと誰（たれ）か屋根裏をこっこっと叩くものがあります。", "「猫、まだこりないのか。」", "ゴーシュが叫びますといきなり天井（てんじょう）の穴からぽろんと音がして一疋（ぴき）の灰いろの鳥が降りて来ました。床へとまったのを見るとそれはかっこうでした。", "「鳥まで来るなんて。何の用だ。」ゴーシュが云いました。", "「音楽を教わりたいのです。」", "かっこう鳥はすまして云いました。", "ゴーシュは笑って", "「音楽だと。おまえの歌は、かっこう、かっこうというだけじゃあないか。」", "するとかっこうが大へんまじめに", "「ええ、それなんです。けれどもむずかしいですからねえ。」と云いました。", "「むずかしいもんか。おまえたちのはたくさん啼（な）くのがひどいだけで、なきようは何でもないじゃないか。」", "「ところがそれがひどいんです。たとえばかっこうとこうなくのとかっこうとこうなくのとでは聞いていてもよほどちがうでしょう。」", "「ちがわないね。」", "「ではあなたにはわからないんです。わたしらのなかまならかっこうと一万云えば一万みんなちがうんです。」", "「勝手だよ。そんなにわかってるなら何もおれの処（ところ）へ来なくてもいいではないか。」", "「ところが私はドレミファを正確にやりたいんです。」", "「ドレミファもくそもあるか。」", "「ええ、外国へ行く前にぜひ一度いるんです。」", "「外国もくそもあるか。」", "「先生どうかドレミファを教えてください。わたしはついてうたいますから。」", "「うるさいなあ。そら三べんだけ弾（ひ）いてやるからすんだらさっさと帰るんだぞ。」", "ゴーシュはセロを取り上げてボロンボロンと糸を合わせてドレミファソラシドとひきました。するとかっこうはあわてて羽をばたばたしました。", "「ちがいます、ちがいます。そんなんでないんです。」", "「うるさいなあ。ではおまえやってごらん。」", "「こうですよ。」かっこうはからだをまえに曲げてしばらく構えてから", "「かっこう」と一つなきました。", "「何だい。それがドレミファかい。おまえたちには、それではドレミファも第六交響楽（こうきょうがく）も同じなんだな。」", "「それはちがいます。」", "「どうちがうんだ。」", "「むずかしいのはこれをたくさん続けたのがあるんです。」", "「つまりこうだろう。」セロ弾きはまたセロをとって、かっこうかっこうかっこうかっこうかっこうとつづけてひきました。", "するとかっこうはたいへんよろこんで途中（とちゅう）から　かっこうかっこうかっこうかっこうとついて叫（さけ）びました。それももう一生けん命からだをまげていつまでも叫ぶのです。", "ゴーシュはとうとう手が痛くなって", "「こら、いいかげんにしないか。」と云いながらやめました。するとかっこうは残念そうに眼（め）をつりあげてまだしばらくないていましたがやっと", "「……かっこうかくうかっかっかっかっか」と云ってやめました。", "ゴーシュがすっかりおこってしまって、", "「こらとり、もう用が済んだらかえれ」と云いました。", "「どうかもういっぺん弾いてください。あなたのはいいようだけれどもすこしちがうんです。」", "「何だと、おれがきさまに教わってるんではないんだぞ。帰らんか。」", "「どうかたったもう一ぺんおねがいです。どうか。」かっこうは頭を何べんもこんこん下げました。", "「ではこれっきりだよ。」", "ゴーシュは弓をかまえました。かっこうは「くっ」とひとつ息をして", "「ではなるべく永くおねがいいたします。」といってまた一つおじぎをしました。", "「いやになっちまうなあ。」ゴーシュはにが笑いしながら弾きはじめました。するとかっこうはまたまるで本気になって「かっこうかっこうかっこう」とからだをまげてじつに一生けん命叫びました。ゴーシュははじめはむしゃくしゃしていましたがいつまでもつづけて弾いているうちにふっと何だかこれは鳥の方がほんとうのドレミファにはまっているかなという気がしてきました。どうも弾けば弾くほどかっこうの方がいいような気がするのでした。", "「えいこんなばかなことしていたらおれは鳥になってしまうんじゃないか。」とゴーシュはいきなりぴたりとセロをやめました。", "するとかっこうはどしんと頭を叩（たた）かれたようにふらふらっとしてそれからまたさっきのように", "「かっこうかっこうかっこうかっかっかっかっかっ」と云（い）ってやめました。それから恨（うら）めしそうにゴーシュを見て", "「なぜやめたんですか。ぼくらならどんな意気地ないやつでものどから血が出るまでは叫ぶんですよ。」と云いました。", "「何を生意気な。こんなばかなまねをいつまでしていられるか。もう出て行け。見ろ。夜があけるんじゃないか。」ゴーシュは窓を指さしました。", "東のそらがぼうっと銀いろになってそこをまっ黒な雲が北の方へどんどん走っています。", "「ではお日さまの出るまでどうぞ。もう一ぺん。ちょっとですから。」", "かっこうはまた頭を下げました。", "「黙（だま）れっ。いい気になって。このばか鳥め。出て行かんとむしって朝飯に食ってしまうぞ。」ゴーシュはどんと床をふみました。", "するとかっこうはにわかにびっくりしたようにいきなり窓をめがけて飛び立ちました。そして硝子（ガラス）にはげしく頭をぶっつけてばたっと下へ落ちました。", "「何だ、硝子へばかだなあ。」ゴーシュはあわてて立って窓をあけようとしましたが元来この窓はそんなにいつでもするする開く窓ではありませんでした。ゴーシュが窓のわくをしきりにがたがたしているうちにまたかっこうがばっとぶっつかって下へ落ちました。見ると嘴（くちばし）のつけねからすこし血が出ています。", "「いまあけてやるから待っていろったら。」ゴーシュがやっと二寸ばかり窓をあけたとき、かっこうは起きあがって何が何でもこんどこそというようにじっと窓の向うの東のそらをみつめて、あらん限りの力をこめた風でぱっと飛びたちました。もちろんこんどは前よりひどく硝子につきあたってかっこうは下へ落ちたまましばらく身動きもしませんでした。つかまえてドアから飛ばしてやろうとゴーシュが手を出しましたらいきなりかっこうは眼をひらいて飛びのきました。そしてまたガラスへ飛びつきそうにするのです。ゴーシュは思わず足を上げて窓をばっとけりました。ガラスは二三枚物すごい音して砕（くだ）け窓はわくのまま外へ落ちました。そのがらんとなった窓のあとをかっこうが矢のように外へ飛びだしました。そしてもうどこまでもどこまでもまっすぐに飛んで行ってとうとう見えなくなってしまいました。ゴーシュはしばらく呆（あき）れたように外を見ていましたが、そのまま倒（たお）れるように室（へや）のすみへころがって睡（ねむ）ってしまいました。", "次の晩もゴーシュは夜中すぎまでセロを弾いてつかれて水を一杯（いっぱい）のんでいますと、また扉（と）をこつこつ叩（たた）くものがあります。", "今夜は何が来てもゆうべのかっこうのようにはじめからおどかして追い払（はら）ってやろうと思ってコップをもったまま待ち構えて居（お）りますと、扉がすこしあいて一疋の狸（たぬき）の子がはいってきました。ゴーシュはそこでその扉をもう少し広くひらいて置いてどんと足をふんで、", "「こら、狸、おまえは狸汁（たぬきじる）ということを知っているかっ。」とどなりました。すると狸の子はぼんやりした顔をしてきちんと床へ座（すわ）ったままどうもわからないというように首をまげて考えていましたが、しばらくたって", "「狸汁ってぼく知らない。」と云いました。ゴーシュはその顔を見て思わず吹（ふ）き出そうとしましたが、まだ無理に恐（こわ）い顔をして、", "「では教えてやろう。狸汁というのはな。おまえのような狸をな、キャベジや塩とまぜてくたくたと煮（に）ておれさまの食うようにしたものだ。」と云いました。すると狸の子はまたふしぎそうに", "「だってぼくのお父さんがね、ゴーシュさんはとてもいい人でこわくないから行って習えと云ったよ。」と云いました。そこでゴーシュもとうとう笑い出してしまいました。", "「何を習えと云ったんだ。おれはいそがしいんじゃないか。それに睡いんだよ。」", "狸の子は俄（にわか）に勢（いきおい）がついたように一足前へ出ました。", "「ぼくは小太鼓（こだいこ）の係りでねえ。セロへ合わせてもらって来いと云われたんだ。」", "「どこにも小太鼓がないじゃないか。」", "「そら、これ」狸の子はせなかから棒きれを二本出しました。", "「それでどうするんだ。」", "「ではね、『愉快（ゆかい）な馬車屋』を弾いてください。」", "「なんだ愉快な馬車屋ってジャズか。」", "「ああこの譜（ふ）だよ。」狸の子はせなかからまた一枚の譜をとり出しました。ゴーシュは手にとってわらい出しました。", "「ふう、変な曲だなあ。よし、さあ弾くぞ。おまえは小太鼓を叩くのか。」ゴーシュは狸の子がどうするのかと思ってちらちらそっちを見ながら弾きはじめました。", "すると狸の子は棒をもってセロの駒（こま）の下のところを拍子（ひょうし）をとってぽんぽん叩きはじめました。それがなかなかうまいので弾いているうちにゴーシュはこれは面白（おもしろ）いぞと思いました。", "おしまいまでひいてしまうと狸の子はしばらく首をまげて考えました。", "それからやっと考えついたというように云いました。", "「ゴーシュさんはこの二番目の糸をひくときはきたいに遅（おく）れるねえ。なんだかぼくがつまずくようになるよ。」", "ゴーシュははっとしました。たしかにその糸はどんなに手早く弾いてもすこしたってからでないと音が出ないような気がゆうべからしていたのでした。", "「いや、そうかもしれない。このセロは悪いんだよ。」とゴーシュはかなしそうに云いました。すると狸は気の毒そうにしてまたしばらく考えていましたが", "「どこが悪いんだろうなあ。ではもう一ぺん弾いてくれますか。」", "「いいとも弾くよ。」ゴーシュははじめました。狸の子はさっきのようにとんとん叩きながら時々頭をまげてセロに耳をつけるようにしました。そしておしまいまで来たときは今夜もまた東がぼうと明るくなっていました。", "「ああ夜が明けたぞ。どうもありがとう。」狸の子は大へんあわてて譜や棒きれをせなかへしょってゴムテープでぱちんととめておじぎを二つ三つすると急いで外へ出て行ってしまいました。", "ゴーシュはぼんやりしてしばらくゆうべのこわれたガラスからはいってくる風を吸っていましたが、町へ出て行くまで睡って元気をとり戻（もど）そうと急いでねどこへもぐり込（こ）みました。", "次の晩もゴーシュは夜通しセロを弾いて明方近く思わずつかれて楽譜をもったままうとうとしていますとまた誰（たれ）か扉（と）をこつこつと叩くものがあります。それもまるで聞えるか聞えないかの位でしたが毎晩のことなのでゴーシュはすぐ聞きつけて「おはいり。」と云いました。すると戸のすきまからはいって来たのは一ぴきの野ねずみでした。そして大へんちいさなこどもをつれてちょろちょろとゴーシュの前へ歩いてきました。そのまた野ねずみのこどもときたらまるでけしごむのくらいしかないのでゴーシュはおもわずわらいました。すると野ねずみは何をわらわれたろうというようにきょろきょろしながらゴーシュの前に来て、青い栗（くり）の実を一つぶ前においてちゃんとおじぎをして云いました。", "「先生、この児（こ）があんばいがわるくて死にそうでございますが先生お慈悲（じひ）になおしてやってくださいまし。」", "「おれが医者などやれるもんか。」ゴーシュはすこしむっとして云いました。すると野ねずみのお母さんは下を向いてしばらくだまっていましたがまた思い切ったように云いました。", "「先生、それはうそでございます、先生は毎日あんなに上手にみんなの病気をなおしておいでになるではありませんか。」", "「何のことだかわからんね。」", "「だって先生先生のおかげで、兎（うさぎ）さんのおばあさんもなおりましたし狸さんのお父さんもなおりましたしあんな意地悪のみみずくまでなおしていただいたのにこの子ばかりお助けをいただけないとはあんまり情ないことでございます。」", "「おいおい、それは何かの間ちがいだよ。おれはみみずくの病気なんどなおしてやったことはないからな。もっとも狸の子はゆうべ来て楽隊のまねをして行ったがね。ははん。」ゴーシュは呆（あき）れてその子ねずみを見おろしてわらいました。", "すると野鼠（のねずみ）のお母さんは泣きだしてしまいました。", "「ああこの児（こ）はどうせ病気になるならもっと早くなればよかった。さっきまであれ位ごうごうと鳴らしておいでになったのに、病気になるといっしょにぴたっと音がとまってもうあとはいくらおねがいしても鳴らしてくださらないなんて。何てふしあわせな子どもだろう。」", "ゴーシュはびっくりして叫（さけ）びました。", "「何だと、ぼくがセロを弾けばみみずくや兎の病気がなおると。どういうわけだ。それは。」", "野ねずみは眼（め）を片手でこすりこすり云いました。", "「はい、ここらのものは病気になるとみんな先生のおうちの床下にはいって療（なお）すのでございます。」", "「すると療るのか。」", "「はい。からだ中とても血のまわりがよくなって大へんいい気持ちですぐ療る方もあればうちへ帰ってから療る方もあります。」", "「ああそうか。おれのセロの音がごうごうひびくと、それがあんまの代りになっておまえたちの病気がなおるというのか。よし。わかったよ。やってやろう。」ゴーシュはちょっとギウギウと糸を合せてそれからいきなりのねずみのこどもをつまんでセロの孔（あな）から中へ入れてしまいました。", "「わたしもいっしょについて行きます。どこの病院でもそうですから。」おっかさんの野ねずみはきちがいのようになってセロに飛びつきました。", "「おまえさんもはいるかね。」セロ弾きはおっかさんの野ねずみをセロの孔からくぐしてやろうとしましたが顔が半分しかはいりませんでした。", "野ねずみはばたばたしながら中のこどもに叫びました。", "「おまえそこはいいかい。落ちるときいつも教えるように足をそろえてうまく落ちたかい。」", "「いい。うまく落ちた。」こどものねずみはまるで蚊（か）のような小さな声でセロの底で返事しました。", "「大丈夫（だいじょうぶ）さ。だから泣き声出すなというんだ。」ゴーシュはおっかさんのねずみを下におろしてそれから弓をとって何とかラプソディとかいうものをごうごうがあがあ弾きました。するとおっかさんのねずみはいかにも心配そうにその音の工合（ぐあい）をきいていましたがとうとうこらえ切れなくなったふうで", "「もう沢山（たくさん）です。どうか出してやってください。」と云いました。", "「なあんだ、これでいいのか。」ゴーシュはセロをまげて孔のところに手をあてて待っていましたら間もなくこどものねずみが出てきました。ゴーシュは、だまってそれをおろしてやりました。見るとすっかり目をつぶってぶるぶるぶるぶるふるえていました。", "「どうだったの。いいかい。気分は。」", "こどものねずみはすこしもへんじもしないでまだしばらく眼をつぶったままぶるぶるぶるぶるふるえていましたがにわかに起きあがって走りだした。", "「ああよくなったんだ。ありがとうございます。ありがとうございます。」おっかさんのねずみもいっしょに走っていましたが、まもなくゴーシュの前に来てしきりにおじぎをしながら", "「ありがとうございますありがとうございます」と十ばかり云いました。", "ゴーシュは何がなかあいそうになって", "「おい、おまえたちはパンはたべるのか。」とききました。", "すると野鼠はびっくりしたようにきょろきょろあたりを見まわしてから", "「いえ、もうおパンというものは小麦の粉をこねたりむしたりしてこしらえたものでふくふく膨（ふく）らんでいておいしいものなそうでございますが、そうでなくても私どもはおうちの戸棚（とだな）へなど参ったこともございませんし、ましてこれ位お世話になりながらどうしてそれを運びになんど参れましょう。」と云いました。", "「いや、そのことではないんだ。ただたべるのかときいたんだ。ではたべるんだな。ちょっと待てよ。その腹の悪いこどもへやるからな。」", "ゴーシュはセロを床へ置いて戸棚からパンを一つまみむしって野ねずみの前へ置きました。", "野ねずみはもうまるでばかのようになって泣いたり笑ったりおじぎをしたりしてから大じそうにそれをくわえてこどもをさきに立てて外へ出て行きました。", "「あああ。鼠と話するのもなかなかつかれるぞ。」ゴーシュはねどこへどっかり倒（たお）れてすぐぐうぐうねむってしまいました。", "それから六日目の晩でした。金星音楽団の人たちは町の公会堂のホールの裏にある控室（ひかえしつ）へみんなぱっと顔をほてらしてめいめい楽器をもって、ぞろぞろホールの舞台（ぶたい）から引きあげて来ました。首尾よく第六交響曲を仕上げたのです。ホールでは拍手（はくしゅ）の音がまだ嵐（あらし）のように鳴って居（お）ります。楽長はポケットへ手をつっ込んで拍手なんかどうでもいいというようにのそのそみんなの間を歩きまわっていましたが、じつはどうして嬉（うれ）しさでいっぱいなのでした。みんなはたばこをくわえてマッチをすったり楽器をケースへ入れたりしました。", "ホールはまだぱちぱち手が鳴っています。それどころではなくいよいよそれが高くなって何だかこわいような手がつけられないような音になりました。大きな白いリボンを胸につけた司会者がはいって来ました。", "「アンコールをやっていますが、何かみじかいものでもきかせてやってくださいませんか。」", "すると楽長がきっとなって答えました。「いけませんな。こういう大物のあとへ何を出したってこっちの気の済むようには行くもんでないんです。」", "「では楽長さん出て一寸（ちょっと）挨拶（あいさつ）してください。」", "「だめだ。おい、ゴーシュ君、何か出て弾いてやってくれ。」", "「わたしがですか。」ゴーシュは呆気（あっけ）にとられました。", "「君だ、君だ。」ヴァイオリンの一番の人がいきなり顔をあげて云いました。", "「さあ出て行きたまえ。」楽長が云いました。みんなもセロをむりにゴーシュに持たせて扉（と）をあけるといきなり舞台へゴーシュを押（お）し出してしまいました。ゴーシュがその孔のあいたセロをもってじつに困ってしまって舞台へ出るとみんなはそら見ろというように一そうひどく手を叩（たた）きました。わあと叫んだものもあるようでした。", "「どこまでひとをばかにするんだ。よし見ていろ。印度（インド）の虎狩（とらがり）をひいてやるから。」ゴーシュはすっかり落ちついて舞台のまん中へ出ました。", "それからあの猫（ねこ）の来たときのようにまるで怒（おこ）った象のような勢（いきおい）で虎狩りを弾きました。ところが聴衆（ちょうしゅう）はしいんとなって一生けん命聞いています。ゴーシュはどんどん弾きました。猫が切ながってぱちぱち火花を出したところも過ぎました。扉へからだを何べんもぶっつけた所も過ぎました。", "曲が終るとゴーシュはもうみんなの方などは見もせずちょうどその猫のようにすばやくセロをもって楽屋へ遁（に）げ込みました。すると楽屋では楽長はじめ仲間がみんな火事にでもあったあとのように眼をじっとしてひっそりとすわり込んでいます。ゴーシュはやぶれかぶれだと思ってみんなの間をさっさとあるいて行って向うの長椅子（ながいす）へどっかりとからだをおろして足を組んですわりました。", "するとみんなが一ぺんに顔をこっちへ向けてゴーシュを見ましたがやはりまじめでべつにわらっているようでもありませんでした。", "「こんやは変な晩だなあ。」", "ゴーシュは思いました。ところが楽長は立って云いました。", "「ゴーシュ君、よかったぞお。あんな曲だけれどもここではみんなかなり本気になって聞いてたぞ。一週間か十日の間にずいぶん仕上げたなあ。十日前とくらべたらまるで赤ん坊と兵隊だ。やろうと思えばいつでもやれたんじゃないか、君。」", "仲間もみんな立って来て「よかったぜ」とゴーシュに云いました。", "「いや、からだが丈夫だからこんなこともできるよ。普通（ふつう）の人なら死んでしまうからな。」楽長が向うで云っていました。", "その晩遅（おそ）くゴーシュは自分のうちへ帰って来ました。", "そしてまた水をがぶがぶ呑（の）みました。それから窓をあけていつかかっこうの飛んで行ったと思った遠くのそらをながめながら", "「ああかっこう。あのときはすまなかったなあ。おれは怒ったんじゃなかったんだ。」と云いました。"]}, {"no": 25, "title": "戦争責任者の問題", "author": "伊丹 万作", "category": "その他", "chars": 7041, "volume": "中", "paras": ["最近、自由映画人連盟の人たちが映画界の戦争責任者を指摘し、その追放を主張しており、主唱者の中には私の名前もまじつているということを聞いた。それがいつどのような形で発表されたのか、くわしいことはまだ聞いていないが、それを見た人たちが私のところに来て、あれはほんとうに君の意見かときくようになつた。", "そこでこの機会に、この問題に対する私のほんとうの意見を述べて立場を明らかにしておきたいと思うのであるが、実のところ、私にとつて、近ごろこの問題ほどわかりにくい問題はない。考えれば考えるほどわからなくなる。そこで、わからないというのはどうわからないのか、それを述べて意見のかわりにしたいと思う。", "さて、多くの人が、今度の戦争でだまされていたという。みながみな口を揃えてだまされていたという。私の知つている範囲ではおれがだましたのだといつた人間はまだ一人もいない。ここらあたりから、もうぼつぼつわからなくなつてくる。多くの人はだましたものとだまされたものとの区別は、はつきりしていると思つているようであるが、それが実は錯覚らしいのである。たとえば、民間のものは軍や官にだまされたと思つているが、軍や官の中へはいればみな上のほうをさして、上からだまされたというだろう。上のほうへ行けば、さらにもつと上のほうからだまされたというにきまつている。すると、最後にはたつた一人か二人の人間が残る勘定になるが、いくら何でも、わずか一人や二人の智慧で一億の人間がだませるわけのものではない。", "すなわち、だましていた人間の数は、一般に考えられているよりもはるかに多かつたにちがいないのである。しかもそれは、「だまし」の専門家と「だまされ」の専門家とに劃然と分れていたわけではなく、いま、一人の人間がだれかにだまされると、次の瞬間には、もうその男が別のだれかをつかまえてだますというようなことを際限なくくりかえしていたので、つまり日本人全体が夢中になつて互にだましたりだまされたりしていたのだろうと思う。", "このことは、戦争中の末端行政の現われ方や、新聞報道の愚劣さや、ラジオのばかばかしさや、さては、町会、隣組、警防団、婦人会といつたような民間の組織がいかに熱心にかつ自発的にだます側に協力していたかを思い出してみれば直ぐにわかることである。", "たとえば、最も手近な服装の問題にしても、ゲートルを巻かなければ門から一歩も出られないようなこつけいなことにしてしまつたのは、政府でも官庁でもなく、むしろ国民自身だつたのである。私のような病人は、ついに一度もあの醜い戦闘帽というものを持たずにすんだが、たまに外出するとき、普通のあり合わせの帽子をかぶつて出ると、たちまち国賊を見つけたような憎悪の眼を光らせたのは、だれでもない、親愛なる同胞諸君であつたことを私は忘れない。もともと、服装は、実用的要求に幾分かの美的要求が結合したものであつて、思想的表現ではないのである。しかるに我が同胞諸君は、服装をもつて唯一の思想的表現なりと勘違いしたか、そうでなかつたら思想をカムフラージュする最も簡易な隠れ蓑としてそれを愛用したのであろう。そしてたまたま服装をその本来の意味に扱つている人間を見ると、彼らは眉を逆立てて憤慨するか、ないしは、眉を逆立てる演技をして見せることによつて、自分の立場の保鞏 (ほきよう)につとめていたのであろう。", "少なくとも戦争の期間をつうじて、だれが一番直接に、そして連続的に我々を圧迫しつづけたか、苦しめつづけたかということを考えるとき、だれの記憶にも直ぐ蘇つてくるのは、直ぐ近所の小商人の顔であり、隣組長や町会長の顔であり、あるいは郊外の百姓の顔であり、あるいは区役所や郵便局や交通機関や配給機関などの小役人や雇員や労働者であり、あるいは学校の先生であり、といつたように、我々が日常的な生活を営むうえにおいていやでも接触しなければならない、あらゆる身近な人々であつたということはいつたい何を意味するのであろうか。", "いうまでもなく、これは無計画な癲狂戦争の必然の結果として、国民同士が相互に苦しめ合うことなしには生きて行けない状態に追い込まれてしまつたためにほかならぬのである。そして、もしも諸君がこの見解の正しさを承認するならば、同じ戦争の間、ほとんど全部の国民が相互にだまし合わなければ生きて行けなかつた事実をも、等しく承認されるにちがいないと思う。", "しかし、それにもかかわらず、諸君は、依然として自分だけは人をだまさなかつたと信じているのではないかと思う。", "そこで私は、試みに諸君にきいてみたい。「諸君は戦争中、ただの一度も自分の子にうそをつかなかつたか」と。たとえ、はつきりうそを意識しないまでも、戦争中、一度もまちがつたことを我子に教えなかつたといいきれる親がはたしているだろうか。", "いたいけな子供たちは何もいいはしないが、もしも彼らが批判の眼を持つていたとしたら、彼らから見た世の大人たちは、一人のこらず戦争責任者に見えるにちがいないのである。", "もしも我々が、真に良心的に、かつ厳粛に考えるならば、戦争責任とは、そういうものであろうと思う。", "しかし、このような考え方は戦争中にだました人間の範囲を思考の中で実際の必要以上に拡張しすぎているのではないかという疑いが起る。", "ここで私はその疑いを解くかわりに、だました人間の範囲を最少限にみつもつたらどういう結果になるかを考えてみたい。", "もちろんその場合は、ごく少数の人間のために、非常に多数の人間がだまされていたことになるわけであるが、はたしてそれによつてだまされたものの責任が解消するであろうか。", "だまされたということは、不正者による被害を意味するが、しかしだまされたものは正しいとは、古来いかなる辞書にも決して書いてはないのである。だまされたとさえいえば、一切の責任から解放され、無条件で正義派になれるように勘ちがいしている人は、もう一度よく顔を洗い直さなければならぬ。", "しかも、だまされたもの必ずしも正しくないことを指摘するだけにとどまらず、私はさらに進んで、「だまされるということ自体がすでに一つの悪である」ことを主張したいのである。", "だまされるということはもちろん知識の不足からもくるが、半分は信念すなわち意志の薄弱からくるのである。我々は昔から「不明を謝す」という一つの表現を持つている。これは明らかに知能の不足を罪と認める思想にほかならぬ。つまり、だまされるということもまた一つの罪であり、昔から決していばつていいこととは、されていないのである。", "もちろん、純理念としては知の問題は知の問題として終始すべきであつて、そこに善悪の観念の交叉する余地はないはずである。しかし、有機的生活体としての人間の行動を純理的に分析することはまず不可能といつてよい。すなわち知の問題も人間の行動と結びついた瞬間に意志や感情をコンプレックスした複雑なものと変化する。これが「不明」という知的現象に善悪の批判が介在し得るゆえんである。", "また、もう一つ別の見方から考えると、いくらだますものがいてもだれ一人だまされるものがなかつたとしたら今度のような戦争は成り立たなかつたにちがいないのである。", "つまりだますものだけでは戦争は起らない。だますものとだまされるものとがそろわなければ戦争は起らないということになると、戦争の責任もまた（たとえ軽重の差はあるにしても）当然両方にあるものと考えるほかはないのである。", "そしてだまされたものの罪は、ただ単にだまされたという事実そのものの中にあるのではなく、あんなにも造作なくだまされるほど批判力を失い、思考力を失い、信念を失い、家畜的な盲従に自己の一切をゆだねるようになつてしまつていた国民全体の文化的無気力、無自覚、無反省、無責任などが悪の本体なのである。", "このことは、過去の日本が、外国の力なしには封建制度も鎖国制度も独力で打破することができなかつた事実、個人の基本的人権さえも自力でつかみ得なかつた事実とまつたくその本質を等しくするものである。", "そして、このことはまた、同時にあのような専横と圧制を支配者にゆるした国民の奴隷根性とも密接につながるものである。", "それは少なくとも個人の尊厳の冒涜 (ぼうとく)、すなわち自我の放棄であり人間性への裏切りである。また、悪を憤る精神の欠如であり、道徳的無感覚である。ひいては国民大衆、すなわち被支配階級全体に対する不忠である。", "我々は、はからずも、いま政治的には一応解放された。しかしいままで、奴隷状態を存続せしめた責任を軍や警察や官僚にのみ負担させて、彼らの跳梁を許した自分たちの罪を真剣に反省しなかつたならば、日本の国民というものは永久に救われるときはないであろう。", "「だまされていた」という一語の持つ便利な効果におぼれて、一切の責任から解放された気でいる多くの人々の安易きわまる態度を見るとき、私は日本国民の将来に対して暗澹たる不安を感ぜざるを得ない。", "「だまされていた」といつて平気でいられる国民なら、おそらく今後も何度でもだまされるだろう。いや、現在でもすでに別のうそによつてだまされ始めているにちがいないのである。", "一度だまされたら、二度とだまされまいとする真剣な自己反省と努力がなければ人間が進歩するわけはない。この意味から戦犯者の追求ということもむろん重要ではあるが、それ以上に現在の日本に必要なことは、まず国民全体がだまされたということの意味を本当に理解し、だまされるような脆弱 (せいじやく)な自分というものを解剖し、分析し、徹底的に自己を改造する努力を始めることである。", "こうして私のような性質のものは、まず自己反省の方面に思考を奪われることが急であつて、だました側の責任を追求する仕事には必ずしも同様の興味が持てないのである。", "こんなことをいえば、それは興味の問題ではないといつてしかられるかもしれない。たしかにそれは興味の問題ではなく、もつとさし迫つた、いやおうなしの政治問題にちがいない。", "しかし、それが政治問題であるということは、それ自体がすでにある限界を示すことである。", "すなわち、政治問題であるかぎりにおいて、この戦争責任の問題も、便宜的な一定の規準を定め、その線を境として一応形式的な区別をして行くより方法があるまい。つまり、問題の性質上、その内容的かつ徹底的なる解決は、あらかじめ最初から断念され、放棄されているのであつて、残されているのは一種の便宜主義による解決だけだと思う。便宜主義による解決の最も典型的な行き方は、人間による判断を一切省略して、その人の地位や職能によつて判断する方法である。現在までに発表された数多くの公職追放者のほとんど全部はこの方法によつて決定された。もちろん、そのよいわるいは問題ではない。ばかりでなく、あるいはこれが唯一の実際的方法かもしれない。", "しかし、それなら映画の場合もこれと同様に取り扱つたらいいではないか。しかもこの場合は、いじめたものといじめられたものの区別は実にはつきりしているのである。", "いうまでもなく、いじめたものは監督官庁であり、いじめられたものは業者である。これ以上に明白なるいかなる規準も存在しないと私は考える。", "しかるに、一部の人の主張するがごとく、業者の間からも、むりに戦争責任者を創作してお目にかけなければならぬとなると、その規準の置き方、そして、いつたいだれが裁くかの問題、いずれもとうてい私にはわからないことばかりである。", "たとえば、自分の場合を例にとると、私は戦争に関係のある作品を一本も書いていない。けれどもそれは必ずしも私が確固たる反戦の信念を持ちつづけたためではなく、たまたま病身のため、そのような題材をつかむ機会に恵まれなかつたり、その他諸種の偶然的なまわり合せの結果にすぎない。", "もちろん、私は本質的には熱心なる平和主義者である。しかし、そんなことがいまさら何の弁明になろう。戦争が始まつてからのちの私は、ただ自国の勝つこと以外は何も望まなかつた。そのためには何事でもしたいと思つた。国が敗れることは同時に自分も自分の家族も死に絶えることだとかたく思いこんでいた。親友たちも、親戚も、隣人も、そして多くの貧しい同胞たちもすべて一緒に死ぬることだと信じていた。この馬鹿正直をわらう人はわらうがいい。", "このような私が、ただ偶然のなりゆきから一本の戦争映画も作らなかつたというだけの理由で、どうして人を裁く側にまわる権利があろう。", "では、結局、だれがこの仕事をやればいいのか。それも私にはわからない。ただ一ついえることは、自分こそ、それに適当した人間だと思う人が出て行つてやるより仕方があるまいということだけである。", "では、このような考え方をしている私が、なぜ戦犯者を追放する運動に名まえを連ねているのか。", "私はそれを説明するために、まず順序として、私と自由映画人集団との関係を明らかにする必要を感じる。", "昨年の十二月二十八日に私は一通の手紙を受け取つた。それは自由映画人集団発起人の某氏から同連盟への加盟を勧誘するため、送られたものであるが、その文面に現われたかぎりでは、同連盟の目的は「文化運動」という漠然たる言葉で説明されていた以外、具体的な記述はほとんど何一つなされていなかつた。", "そこで私はこれに対してほぼ次のような意味の返事を出したのである。", "「現在の自分の心境としては、単なる文化運動というものにはあまり興味が持てない。また来信の範囲では文化運動の内容が具体的にわからないので、それがわかるまでは積極的に賛成の意を表することができない。しかし、便宜上、小生の名まえを使うことが何かの役に立てば、それは使つてもいいが、ただしこの場合は小生の参加は形式的のものにすぎない。」", "つまり、小生と集団との関係というのは、以上の手紙の、応酬にすぎないのであるが、右の文面において一見だれの目にも明らかなことは、小生が集団に対して、自分の名まえの使用を承認していることである。つまり、そのかぎりにおいては集団はいささかもまちがつたことをやつていないのである。もしも、どちらかに落度があつたとすれば、それは私のほうにあつたというほかはあるまい。", "しからば私のほうには全然言い分を申し述べる余地がないかというと、必ずしもそうとのみはいえないのである。なぜならば、私が名まえの使用を容認したことは、某氏の手紙の示唆によつて集団が単なる文化事業団体にすぎないという予備知識を前提としているからである。この団体の仕事が、現在知られているような、尖鋭な、政治的実際運動であることが、最初から明らかにされていたら、いくらのんきな私でも、あんなに放漫に名まえの使用を許しはしなかつたと思うのである。", "なお、私としていま一つの不満は、このような実際運動の賛否について、事前に何らの諒解を求められなかつたということである。", "しかし、これも今となつては騒ぐほうがやぼであるかもしれない。最初のボタンをかけちがえたら最後のボタンまで狂うのはやむを得ないことだからである。", "要するに、このことは私にとつて一つの有益な教訓であつた。元来私は一個の芸術家としてはいかなる団体にも所属しないことを理想としているものである。（生活を維持するための所属や、生活権擁護のための組合は別である）。", "それが自分の意志の弱さから、つい、うつかり禁制を破つてはいつも後悔する羽目に陥つている。今度のこともそのくり返しの一つにすぎないわけであるが、しかし、おかげで私はこれをくり返しの最後にしたいという決意を、やつと持つことができたのである。", "最近、私は次のような手紙を連盟の某氏にあてて差し出したことを付記しておく。", "「前略、小生は先般自由映画人集団加入の御勧誘を受けた際、形式的には小生の名前を御利用になることを承諾いたしました。しかし、それは、御勧誘の書面に自由映画人連盟の目的が単なる文化運動とのみしるされてあつたからであつて、昨今うけたまわるような尖鋭な実際運動であることがわかつていたら、また別答のしかたがあつたと思います。", "ことに戦犯人の指摘、追放というような具体的な問題になりますと、たとえ団体の立場がいかにあろうとも、個人々々の思考と判断の余地は、別に認められなければなるまいと思います。", "そして小生は自分独自の心境と見解を持つものであり、他からこれをおかされることをきらうものであります。したがつて、このような問題についてあらかじめ小生の意志を確かめることなく名まえを御使用になつたことを大変遺憾に存ずるのであります。", "しかし、集団の仕事がこの種のものとすれば、このような問題は今後においても続出するでありましようし、その都度、いちいち正確に連絡をとつて意志を疎通するということはとうてい望み得ないことが明らかですから、この際、あらためて集団から小生の名前を除いてくださることをお願いいたしたいのです。", "なにぶんにも小生は、ほとんど日夜静臥中の病人であり、第一線的な運動に名前を連ねること自体がすでにこつけいなことなのです。また、療養の目的からも遠いことなのです。", "では、除名の件はたしかにお願い申しました。", "草々頓首」（四月二十八日）", "（『映画春秋』創刊号・昭和二十一年八月）"]}, {"no": 26, "title": "高瀬舟", "author": "森 鴎外", "category": "日本文学-物語", "chars": 9405, "volume": "中", "paras": ["高瀬舟（たかせぶね）は京都の高瀬川（たかせがわ）を上下（じょうげ）する小舟である。徳川時代に京都の罪人が遠島（えんとう）を申し渡されると、本人の親類が牢屋敷（ろうやしき）へ呼び出されて、そこで暇乞（いとまご）いをすることを許された。それから罪人は高瀬舟に載せられて、大阪（おおさか）へ回されることであった。それを護送するのは、京都  　町奉行（まちぶぎょう）の配下にいる同心（どうしん）で、この同心は罪人の親類の中で、おも立った一  　人（にん）を大阪まで同船させることを許す慣例であった。これは上（かみ）へ通った事ではないが、いわゆる大目に見るのであった、黙許であった。", "当時遠島を申し渡された罪人は、もちろん重い科（とが）を犯したものと認められた人ではあるが、決して盗みをするために、人を殺し火を放ったというような、獰悪（どうあく）な人物が多数を占めていたわけではない。高瀬舟に乗る罪人の過半は、いわゆる心得違いのために、思わぬ科を犯した人であった。有りふれた例をあげてみれば、当時  　相対死（あいたいし）と言った情死をはかって、相手の女を殺して、自分だけ生き残った男というような類（たぐい）である。", "そういう罪人を載せて、入相（いりあい）の鐘の鳴るころにこぎ出された高瀬舟は、黒ずんだ京都の町の家々を両岸に見つつ、東へ走って、加茂川（かもがわ）を横ぎって下るのであった。この舟の中で、罪人とその親類の者とは夜どおし身の上を語り合う。いつもいつも悔やんでも返らぬ繰（く）り言（ごと）である。護送の役をする同心（どうしん）は、そばでそれを聞いて、罪人を出した親戚眷族（しんせきけんぞく）の悲惨な境遇を細かに知ることができた。所詮（しょせん）町奉行の白州（しらす）で、表向きの口供（こうきょう）を聞いたり、役所の机の上で、口書（くちがき）を読んだりする役人の夢にもうかがうことのできぬ境遇である。", "同心を勤める人にも、いろいろの性質があるから、この時ただうるさいと思って、耳をおおいたく思う冷淡な同心があるかと思えば、またしみじみと人の哀れを身に引き受けて、役がらゆえ気色（けしき）には見せぬながら、無言のうちにひそかに胸を痛める同心もあった。場合によって非常に悲惨な境遇に陥った罪人とその親類とを、特に心弱い、涙もろい同心が宰領してゆくことになると、その同心は不覚の涙を禁じ得ぬのであった。", "そこで高瀬舟の護送は、町奉行所の同心仲間で不快な職務としてきらわれていた。", "――――――――――――――――", "いつのころであったか。たぶん江戸で白河楽翁侯（しらかわらくおうこう）が政柄（せいへい）を執っていた寛政のころででもあっただろう。智恩院（ちおんいん）の桜が入相（いりあい）の鐘に散る春の夕べに、これまで類のない、珍しい罪人が高瀬舟に載せられた。", "それは名を喜助（きすけ）と言って、三十歳ばかりになる、住所不定（じゅうしょふじょう）の男である。もとより牢屋敷（ろうやしき）に呼び出されるような親類はないので、舟にもただ一人（ひとり）で乗った。", "護送を命ぜられて、いっしょに舟に乗り込んだ同心  　羽田庄兵衛（はねだしょうべえ）は、ただ喜助が弟殺しの罪人だということだけを聞いていた。さて牢屋敷から棧橋（さんばし）まで連れて来る間、この痩肉（やせじし）の、色の青白い喜助の様子を見るに、いかにも神妙（しんびょう）に、いかにもおとなしく、自分をば公儀の役人として敬って、何事につけても逆らわぬようにしている。しかもそれが、罪人の間に往々見受けるような、温順を装って権勢に媚（こ）びる態度ではない。", "庄兵衛は不思議に思った。そして舟に乗ってからも、単に役目の表で見張っているばかりでなく、絶えず喜助の挙動に、細かい注意をしていた。", "その日は暮れ方から風がやんで、空一面をおおった薄い雲が、月の輪郭をかすませ、ようよう近寄って来る夏の温（あたた）かさが、両岸の土からも、川床（かわどこ）の土からも、もやになって立ちのぼるかと思われる夜（よ）であった。下京（しもきょう）の町を離れて、加茂川を横ぎったころからは、あたりがひっそりとして、ただ舳（へさき）にさかれる水のささやきを聞くのみである。", "夜舟（よふね）で寝ることは、罪人にも許されているのに、喜助は横になろうともせず、雲の濃淡に従って、光の増したり減じたりする月を仰いで、黙っている。その額は晴れやかで目にはかすかなかがやきがある。", "庄兵衛はまともには見ていぬが、始終喜助の顔から目を離さずにいる。そして不思議だ、不思議だと、心の内で繰り返している。それは喜助の顔が縦から見ても、横から見ても、いかにも楽しそうで、もし役人に対する気がねがなかったなら、口笛を吹きはじめるとか、鼻歌を歌い出すとかしそうに思われたからである。", "庄兵衛は心の内に思った。これまでこの高瀬舟の宰領をしたことは幾たびだか知れない。しかし載せてゆく罪人は、いつもほとんど同じように、目も当てられぬ気の毒な様子をしていた。それにこの男はどうしたのだろう。遊山船（ゆさんぶね）にでも乗ったような顔をしている。罪は弟を殺したのだそうだが、よしやその弟が悪いやつで、それをどんなゆきがかりになって殺したにせよ、人の情（じょう）としていい心持ちはせぬはずである。この色の青いやせ男が、その人の情というものが全く欠けているほどの、世にもまれな悪人であろうか。どうもそうは思われない。ひょっと気でも狂っているのではあるまいか。いやいや。それにしては何一つつじつまの合わぬことばや挙動がない。この男はどうしたのだろう。庄兵衛がためには喜助の態度が考えれば考えるほどわからなくなるのである。", "――――――――――――――――", "しばらくして、庄兵衛はこらえ切れなくなって呼びかけた。「喜助。お前何を思っているのか。」", "「はい」と言ってあたりを見回した喜助は、何事をかお役人に見とがめられたのではないかと気づかうらしく、居ずまいを直して庄兵衛の気色（けしき）を伺った。", "庄兵衛は自分が突然問いを発した動機を明かして、役目を離れた応対を求める言いわけをしなくてはならぬように感じた。そこでこう言った。「いや。別にわけがあって聞いたのではない。実はな、おれはさっきからお前の島へゆく心持ちが聞いてみたかったのだ。おれはこれまでこの舟でおおぜいの人を島へ送った。それはずいぶんいろいろな身の上の人だったが、どれもどれも島へゆくのを悲しがって、見送りに来て、いっしょに舟に乗る親類のものと、夜どおし泣くにきまっていた。それにお前の様子を見れば、どうも島へゆくのを苦にしてはいないようだ。いったいお前はどう思っているのだい。」", "喜助はにっこり笑った。「御親切におっしゃってくだすって、ありがとうございます。なるほど島へゆくということは、ほかの人には悲しい事でございましょう。その心持ちはわたくしにも思いやってみることができます。しかしそれは世間でらくをしていた人だからでございます。京都は結構な土地ではございますが、その結構な土地で、これまでわたくしのいたして参ったような苦しみは、どこへ参ってもなかろうと存じます。お上（かみ）のお慈悲で、命を助けて島へやってくださいます。島はよしやつらい所でも、鬼のすむ所ではございますまい。わたくしはこれまで、どこといって自分のいていい所というものがございませんでした。こん度お上（かみ）で島にいろとおっしゃってくださいます。そのいろとおっしゃる所に落ち着いていることができますのが、まず何よりもありがたい事でございます。それにわたくしはこんなにかよわいからだではございますが、ついぞ病気をいたしたことはございませんから、島へ行ってから、どんなつらい仕事をしたって、からだを痛めるようなことはあるまいと存じます。それからこん度島へおやりくださるにつきまして、二百  　文（もん）の鳥目（ちょうもく）をいただきました。それをここに持っております。」こう言いかけて、喜助は胸に手を当てた。遠島を仰せつけられるものには、鳥目二百銅をつかわすというのは、当時の掟（おきて）であった。", "喜助はことばをついだ。「お恥ずかしい事を申し上げなくてはなりませぬが、わたくしは今日（こんにち）まで二百文というお足（あし）を、こうしてふところに入れて持っていたことはございませぬ。どこかで仕事に取りつきたいと思って、仕事を尋ねて歩きまして、それが見つかり次第、骨を惜しまずに働きました。そしてもらった銭（ぜに）は、いつも右から左へ人手に渡さなくてはなりませなんだ。それも現金で物が買って食べられる時は、わたくしの工面（くめん）のいい時で、たいていは借りたものを返して、またあとを借りたのでございます。それがお牢（ろう）にはいってからは、仕事をせずに食べさせていただきます。わたくしはそればかりでも、お上（かみ）に対して済まない事をいたしているようでなりませぬ。それにお牢を出る時に、この二百文をいただきましたのでございます。こうして相変わらずお上（かみ）の物を食べていて見ますれば、この二百  　文（もん）はわたくしが使わずに持っていることができます。お足を自分の物にして持っているということは、わたくしにとっては、これが始めでございます。島へ行ってみますまでは、どんな仕事ができるかわかりませんが、わたくしはこの二百文を島でする仕事の本手（もとで）にしようと楽しんでおります。」こう言って、喜助は口をつぐんだ。", "庄兵衛は「うん、そうかい」とは言ったが、聞く事ごとにあまり意表に出たので、これもしばらく何も言うことができずに、考え込んで黙っていた。", "庄兵衛はかれこれ初老に手の届く年になっていて、もう女房に子供を四人生ませている。それに老母が生きているので、家は七人暮らしである。平生人には吝嗇（りんしょく）と言われるほどの、倹約な生活をしていて、衣類は自分が役目のために着るもののほか、寝巻しかこしらえぬくらいにしている。しかし不幸な事には、妻をいい身代（しんだい）の商人の家から迎えた。そこで女房は夫のもらう扶持米（ふちまい）で暮らしを立ててゆこうとする善意はあるが、ゆたかな家にかわいがられて育った癖があるので、夫が満足するほど手元を引き締めて暮らしてゆくことができない。ややもすれば月末になって勘定が足りなくなる。すると女房が内証で里から金を持って来て帳尻（ちょうじり）を合わせる。それは夫が借財というものを毛虫のようにきらうからである。そういう事は所詮（しょせん）夫に知れずにはいない。庄兵衛は五節句だと言っては、里方（さとかた）から物をもらい、子供の七五三の祝いだと言っては、里方から子供に衣類をもらうのでさえ、心苦しく思っているのだから、暮らしの穴をうめてもらったのに気がついては、いい顔はしない。格別平和を破るような事のない羽田の家に、おりおり波風の起こるのは、これが原因である。", "庄兵衛は今喜助の話を聞いて、喜助の身の上をわが身の上に引き比べてみた。喜助は仕事をして給料を取っても、右から左へ人手に渡してなくしてしまうと言った。いかにも哀れな、気の毒な境界（きょうがい）である。しかし一転してわが身の上を顧みれば、彼と我れとの間に、はたしてどれほどの差があるか。自分も上（かみ）からもらう扶持米（ふちまい）を、右から左へ人手に渡して暮らしているに過ぎぬではないか。彼と我れとの相違は、いわば十露盤（そろばん）の桁（けた）が違っているだけで、喜助のありがたがる二百  　文（もん）に相当する貯蓄だに、こっちはないのである。", "さて桁を違えて考えてみれば、鳥目（ちょうもく）二百文をでも、喜助がそれを貯蓄と見て喜んでいるのに無理はない。その心持ちはこっちから察してやることができる。しかしいかに桁を違えて考えてみても、不思議なのは喜助の欲のないこと、足ることを知っていることである。", "喜助は世間で仕事を見つけるのに苦しんだ。それを見つけさえすれば、骨を惜しまずに働いて、ようよう口を糊（のり）することのできるだけで満足した。そこで牢（ろう）に入ってからは、今まで得がたかった食が、ほとんど天から授けられるように、働かずに得られるのに驚いて、生まれてから知らぬ満足を覚えたのである。", "庄兵衛はいかに桁（けた）を違えて考えてみても、ここに彼と我れとの間に、大いなる懸隔（けんかく）のあることを知った。自分の扶持米（ふちまい）で立ててゆく暮らしは、おりおり足らぬことがあるにしても、たいてい出納（すいとう）が合っている。手いっぱいの生活である。しかるにそこに満足を覚えたことはほとんどない。常は幸いとも不幸とも感ぜずに過ごしている。しかし心の奥には、こうして暮らしていて、ふいとお役が御免になったらどうしよう、大病にでもなったらどうしようという疑懼（ぎく）が潜んでいて、おりおり妻が里方から金を取り出して来て穴うめをしたことなどがわかると、この疑懼が意識の閾（しきい）の上に頭をもたげて来るのである。", "いったいこの懸隔はどうして生じて来るだろう。ただ上（うわ）べだけを見て、それは喜助には身に係累がないのに、こっちにはあるからだと言ってしまえばそれまでである。しかしそれはうそである。よしや自分が一人者（ひとりもの）であったとしても、どうも喜助のような心持ちにはなられそうにない。この根底はもっと深いところにあるようだと、庄兵衛は思った。", "庄兵衛はただ漠然（ばくぜん）と、人の一生というような事を思ってみた。人は身に病があると、この病がなかったらと思う。その日その日の食がないと、食ってゆかれたらと思う。万一の時に備えるたくわえがないと、少しでもたくわえがあったらと思う。たくわえがあっても、またそのたくわえがもっと多かったらと思う。かくのごとくに先から先へと考えてみれば、人はどこまで行って踏み止まることができるものやらわからない。それを今目の前で踏み止まって見せてくれるのがこの喜助だと、庄兵衛は気がついた。", "庄兵衛は今さらのように驚異の目をみはって喜助を見た。この時庄兵衛は空を仰いでいる喜助の頭から毫光（ごうこう）がさすように思った。", "――――――――――――――――", "庄兵衛は喜助の顔をまもりつつまた、「喜助さん」と呼びかけた。今度は「さん」と言ったが、これは充分の意識をもって称呼を改めたわけではない。その声がわが口から出てわが耳に入（い）るや否や、庄兵衛はこの称呼の不穏当なのに気がついたが、今さらすでに出たことばを取り返すこともできなかった。", "「はい」と答えた喜助も、「さん」と呼ばれたのを不審に思うらしく、おそるおそる庄兵衛の気色（けしき）をうかがった。", "庄兵衛は少し間（ま）の悪いのをこらえて言った。「いろいろの事を聞くようだが、お前が今度島へやられるのは、人をあやめたからだという事だ。おれについでにそのわけを話して聞せてくれぬか。」", "喜助はひどく恐れ入った様子で、「かしこまりました」と言って、小声で話し出した。「どうも飛んだ心得違いで、恐ろしい事をいたしまして、なんとも申し上げようがございませぬ。あとで思ってみますと、どうしてあんな事ができたかと、自分ながら不思議でなりませぬ。全く夢中でいたしましたのでございます。わたくしは小さい時に二親（ふたおや）が時疫（じえき）でなくなりまして、弟と二人（ふたり）あとに残りました。初めはちょうど軒下に生まれた犬の子にふびんを掛けるように町内の人たちがお恵みくださいますので、近所じゅうの走り使いなどをいたして、飢え凍えもせずに、育ちました。次第に大きくなりまして職を捜しますにも、なるたけ二人が離れないようにいたして、いっしょにいて、助け合って働きました。去年の秋の事でございます。わたくしは弟といっしょに、西陣（にしじん）の織場（おりば）にはいりまして、空引（そらび）きということをいたすことになりました。そのうち弟が病気で働けなくなったのでございます。そのころわたくしどもは北山（きたやま）の掘立小屋（ほったてごや）同様の所に寝起きをいたして、紙屋川（かみやがわ）の橋を渡って織場へ通（かよ）っておりましたが、わたくしが暮れてから、食べ物などを買って帰ると、弟は待ち受けていて、わたくしを一人（ひとり）でかせがせてはすまないすまないと申しておりました。ある日いつものように何心なく帰って見ますと、弟はふとんの上に突っ伏していまして、周囲（まわり）は血だらけなのでございます。わたくしはびっくりいたして、手に持っていた竹の皮包みや何かを、そこへおっぽり出して、そばへ行って『どうしたどうした』と申しました。すると弟はまっ青（さお）な顔の、両方の頬（ほお）からあごへかけて血に染まったのをあげて、わたくしを見ましたが、物を言うことができませぬ。息をいたすたびに、傷口でひゅうひゅうという音がいたすだけでございます。わたくしにはどうも様子がわかりませんので、『どうしたのだい、血を吐いたのかい』と言って、そばへ寄ろうといたすと、弟は右の手を床（とこ）に突いて、少しからだを起こしました。左の手はしっかりあごの下の所を押えていますが、その指の間から黒血の固まりがはみ出しています。弟は目でわたくしのそばへ寄るのを留めるようにして口をききました。ようよう物が言えるようになったのでございます。『すまない。どうぞ堪忍してくれ。どうせなおりそうにもない病気だから、早く死んで少しでも兄きにらくがさせたいと思ったのだ。笛（ふえ）を切ったら、すぐ死ねるだろうと思ったが息がそこから漏れるだけで死ねない。深く深くと思って、力いっぱい押し込むと、横へすべってしまった。刃はこぼれはしなかったようだ。これをうまく抜いてくれたらおれは死ねるだろうと思っている。物を言うのがせつなくっていけない。どうぞ手を借して抜いてくれ』と言うのでございます。弟が左の手をゆるめるとそこからまた息が漏ります。わたくしはなんと言おうにも、声が出ませんので、黙って弟の喉（のど）の傷をのぞいて見ますと、なんでも右の手に剃刀（かみそり）を持って、横に笛を切ったが、それでは死に切れなかったので、そのまま剃刀を、えぐるように深く突っ込んだものと見えます。柄（え）がやっと二寸ばかり傷口から出ています。わたくしはそれだけの事を見て、どうしようという思案もつかずに、弟の顔を見ました。弟はじっとわたくしを見詰めています。わたくしはやっとの事で、『待っていてくれ、お医者を呼んで来るから』と申しました。弟は恨めしそうな目つきをいたしましたが、また左の手で喉（のど）をしっかり押えて、『医者がなんになる、あゝ苦しい、早く抜いてくれ、頼む』と言うのでございます。わたくしは途方に暮れたような心持ちになって、ただ弟の顔ばかり見ております。こんな時は、不思議なもので、目が物を言います。弟の目は『早くしろ、早くしろ』と言って、さも恨めしそうにわたくしを見ています。わたくしの頭の中では、なんだかこう車の輪のような物がぐるぐる回っているようでございましたが、弟の目は恐ろしい催促をやめません。それにその目の恨めしそうなのがだんだん険しくなって来て、とうとう敵（かたき）の顔をでもにらむような、憎々しい目になってしまいます。それを見ていて、わたくしはとうとう、これは弟の言ったとおりにしてやらなくてはならないと思いました。わたくしは『しかたがない、抜いてやるぞ』と申しました。すると弟の目の色がからりと変わって、晴れやかに、さもうれしそうになりました。わたくしはなんでもひと思いにしなくてはと思ってひざを撞（つ）くようにしてからだを前へ乗り出しました。弟は突いていた右の手を放して、今まで喉を押えていた手のひじを床（とこ）に突いて、横になりました。わたくしは剃刀（かみそり）の柄をしっかり握って、ずっと引きました。この時わたくしの内から締めておいた表口の戸をあけて、近所のばあさんがはいって来ました。留守の間、弟に薬を飲ませたり何かしてくれるように、わたくしの頼んでおいたばあさんなのでございます。もうだいぶ内のなかが暗くなっていましたから、わたくしにはばあさんがどれだけの事を見たのだかわかりませんでしたが、ばあさんはあっと言ったきり、表口をあけ放しにしておいて駆け出してしまいました。わたくしは剃刀（かみそり）を抜く時、手早く抜こう、まっすぐに抜こうというだけの用心はいたしましたが、どうも抜いた時の手ごたえは、今まで切れていなかった所を切ったように思われました。刃が外のほうへ向いていましたから、外のほうが切れたのでございましょう。わたくしは剃刀を握ったまま、ばあさんのはいって来てまた駆け出して行ったのを、ぼんやりして見ておりました。ばあさんが行ってしまってから、気がついて弟を見ますと、弟はもう息が切れておりました。傷口からはたいそうな血が出ておりました。それから年寄衆（としよりしゅう）がおいでになって、役場へ連れてゆかれますまで、わたくしは剃刀をそばに置いて、目を半分あいたまま死んでいる弟の顔を見詰めていたのでございます。」", "少しうつ向きかげんになって庄兵衛の顔を下から見上げて話していた喜助は、こう言ってしまって視線をひざの上に落とした。", "喜助の話はよく条理が立っている。ほとんど条理が立ち過ぎていると言ってもいいくらいである。これは半年ほどの間、当時の事を幾たびも思い浮かべてみたのと、役場で問われ、町奉行所（まちぶぎょうしょ）で調べられるそのたびごとに、注意に注意を加えてさらってみさせられたのとのためである。", "庄兵衛はその場の様子を目（ま）のあたり見るような思いをして聞いていたが、これがはたして弟殺しというものだろうか、人殺しというものだろうかという疑いが、話を半分聞いた時から起こって来て、聞いてしまっても、その疑いを解くことができなかった。弟は剃刀（かみそり）を抜いてくれたら死なれるだろうから、抜いてくれと言った。それを抜いてやって死なせたのだ、殺したのだとは言われる。しかしそのままにしておいても、どうせ死ななくてはならぬ弟であったらしい。それが早く死にたいと言ったのは、苦しさに耐えなかったからである。喜助はその苦（く）を見ているに忍びなかった。苦から救ってやろうと思って命を絶った。それが罪であろうか。殺したのは罪に相違ない。しかしそれが苦から救うためであったと思うと、そこに疑いが生じて、どうしても解けぬのである。", "庄兵衛の心の中には、いろいろに考えてみた末に、自分よりも上のものの判断に任すほかないという念、オオトリテエに従うほかないという念が生じた。庄兵衛はお奉行（ぶぎょう）様の判断を、そのまま自分の判断にしようと思ったのである。そうは思っても、庄兵衛はまだどこやらにふに落ちぬものが残っているので、なんだかお奉行様に聞いてみたくてならなかった。", "次第にふけてゆくおぼろ夜に、沈黙の人  　二人（ふたり）を載せた高瀬舟は、黒い水の面（おもて）をすべって行った。"]}, {"no": 27, "title": "たけくらべ", "author": "樋口 一葉", "category": "日本文学-物語", "chars": 30866, "volume": "大", "paras": ["一", "回れば大門の見返り柳いと長けれど、お歯ぐろ溝に灯火（ともしび）うつる三階の騷ぎも手に取るごとく、明けくれなしの車の行来（ゆきき）にはかり知られぬ全盛をうらなひて、大音寺前（だいおんじまへ）と名は仏くさけれど、さりとは陽気の町と住みたる人の申き、三嶋神社（みしまさま）の角をまがりてよりこれぞと見ゆる大厦（いえ）もなく、かたぶく軒端の十軒長屋二十軒長や、商いはかつうつ利かぬ処とて半さしたる雨戸の外に、あやしき形（なり）に紙を切りなして、胡粉ぬりくり彩色のある田楽（でんがく）みるよう、裏にはりたる串のさまもおかし、一軒ならず二軒ならず、朝日に干して夕日にしまう手当ことごとしく、一家内これにかかりてそれは何ぞと問うに、知らずや霜月酉（とり）の日例の神社に欲深様のかつぎ給うこれぞ熊手の下ごしらへという、正月門松とりすっるよりかかりて、一年うち通しのそれは誠の商売人、片手わざにも夏より手足を色どりて、新年着（はるぎ）の支度もこれをば当てぞかし、南無や大鳥大明神、買う人にさえ大福をあたへ給えば製造もとの我等万倍の利益をと人ごとに言うめれど、さりとは思いのほかなるもの、このあたりに大長者のうわさも聞かざりき、住む人の多くは郭者（くるわもの）にて良人は小格子の何とやら、下足札そろえてがらんがらんの音もいそがしや夕暮より羽織引かけて立出れば、うしろに切火打かくる女房の顔もこれが見納めか十人ぎりの側杖無理情死（しんじゅう）のしそこね、恨みはかかる身のはて危ふく、すはと言はば命がけの勤めに遊山（ゆさん）らしく見ゆるもおかし、娘は大籬（おほまがき）の下新造（したしんぞ）とやら、七軒の何屋が客回しとやら、提灯（かんばん）さげてちょこちょこ走りの修業、卒業して何にかなる、とかくは桧舞台と見たつるもおかしからずや、垢ぬけのせし三十あまりの年増、小ざっぱりとせし唐桟ぞろひに紺足袋はきて、雪駄ちやら／＼忙がしげに横抱きの小包はとはでもしるし、茶屋が桟橋とんと沙汰して、回り遠やここからあげまする、誂え物の仕事やさんとこのあたりには言うぞかし、一体の風俗よそと変りて、女子（おなご）の後帯きちんとせし人少なく、がらを好みて巾広の巻帯、年増はまだよし、十五六の小癪なるが酸漿（ほほづき）ふくんでこの姿（なり）はと目をふさぐ人もあるべし、所がら是非もなや、昨日河岸店に何紫の源氏名耳に残れど、きょうは地回りの吉と手馴れぬ焼鳥の夜店を出して、身代たたき骨になれば再び古巣への内儀（かみさま）姿、どこやら素人よりは見よげに覚えて、これに染まらぬ子供もなし、秋は九月仁和賀（にわか）の頃の大路を見給え、さりとは宜くも学びし露八（ろはち）が物真似、栄喜（えいき）が処（しょ）作、孟子の母やおどろかん上達の速やかさ、うまいと褒められて今宵も一回りと生意気は七つ八つよりつのりて、やがては肩に置手ぬぐい、鼻歌のそそり節、十五の少年がませかた恐ろし、学校の唱歌にもぎっちょんちょんぎっちょんちょんに傍点と拍子を取りて、運動会に木やり音頭もなしかねまじき風情、さらでも教育はむずかしきに教師の苦心さこそと思わるる入谷（いりや）ぢかくに育英舍とて、私立なれども生徒の数は千人近く、狭き校舍に目白押の窮屈さも教師が人望いよいよあらわれて、ただ学校と一ト口にてこのあたりには呑込みのつくほど成るがあり、通う子供の数々にあるいは火消鳶人足、おとつさんは刎橋（は
