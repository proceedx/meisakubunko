たれり。いかにして帰って来たかと問えば人々に逢いたかりし故帰りしなり。さらばまた行かんとて、再び跡（あと）を留（とど）めず行き失（う）せたり。その日は風の烈（はげ）しく吹く日なりき。されば遠野郷の人は、今でも風の騒がしき日には、きょうはサムトの婆（ばば）が帰って来そうな日なりという。", "九　　　　　　　　　　　菊池　弥之助（やのすけ）という老人は若きころ駄賃（だちん）を業とせり。笛の名人にて夜通（よどお）しに馬を追いて行く時などは、よく笛を吹きながら行きたり。ある薄月夜（うすづきよ）に、あまたの仲間の者とともに浜へ越ゆる境木峠を行くとて、また笛を取り出して吹きすさみつつ、大谷地（おおやち）というところの上を過ぎたり。大谷地は深き谷にて白樺（しらかんば）の林しげく、その下は葦（あし）など生じ湿（しめ）りたる沢なり。この時谷の底より何者か高き声にて面白いぞーと呼（よ）ばわる者あり。一同ことごとく色を失い遁げ走りたりといえり。", "○ヤチ　はアイヌ語にて湿地の義なり、内地に多くある地名なり。またヤツ　ともヤト　　　　　　　　　　　　　　　　　ともいう。", "一〇　　　　　　　　　　　この男ある奥山に入り、茸（きのこ）を採るとて小屋を掛（か）け宿（とま）りてありしに、深夜に遠きところにてきゃーという女の叫び声聞え胸を轟（とどろ）かしたることあり。里へ帰りて見れば、その同じ夜、時も同じ刻限に、自分の妹なる女その息子（むすこ）のために殺されてありき。", "一一　　　　　　　　　　　この女というは母一人子一人の家なりしに、嫁（よめ）と姑（しゅうと）との仲　悪（あ）しくなり、嫁はしばしば親里へ行きて帰り来ざることあり。その日は嫁は家にありて打ち臥（ふ）しておりしに、昼のころになり突然と伜（せがれ）のいうには、ガガはとても生（い）かしては置かれぬ、今日（きょう）はきっと殺すべしとて、大なる草苅鎌（くさかりがま）を取り出し、ごしごしと磨（と）ぎ始めたり。そのありさまさらに戯言（たわむれごと）とも見えざれば、母はさまざまに事を分（わ）けて詫（わ）びたれども少しも聴かず。嫁も起き出（い）でて泣きながら諌（いさ）めたれど、露（つゆ）従（したが）う色もなく、やがて母が遁（のが）れ出でんとする様子（ようす）あるを見て、前後の戸口をことごとく鎖（とざ）したり。便用に行きたしといえば、おのれみずから外より便器を持ち来たりてこれへせよという。夕方にもなりしかば母もついにあきらめて、大なる囲炉裡（いろり）の側（かたわら）にうずくまりただ泣きていたり。伜（せがれ）はよくよく磨（と）ぎたる大鎌を手にして近より来たり、まず左の肩口を目がけて薙（な）ぐようにすれば、鎌の刃先（はさき）炉（ろ）の上（うえ）の火棚（ひだな）に引（ひ）っかかりてよく斬（き）れず。その時に母は深山の奥にて弥之助が聞きつけしようなる叫び声を立てたり。二度目には右の肩より切（き）り下（さ）げたるが、これにてもなお死絶（しにた）えずしてあるところへ、里人（さとびと）ら驚きて馳（は）せつけ伜を取（と）り抑（おさ）え直に警察官を呼（よ）びて渡（わた）したり。警官がまだ棒を持ちてある時代のことなり。母親は男が捕（とら）えられ引き立てられて行くを見て、滝のように血の流るる中より、おのれは恨（うらみ）も抱（いだ）かずに死ぬるなれば、孫四郎は宥（ゆる）したまわれという。これを聞きて心を動（うご）かさぬ者はなかりき。孫四郎は途中にてもその鎌を振り上げて巡査を追い回しなどせしが、狂人なりとて放免せられて家に帰り、今も生きて里にあり。", "○ガガ　　は方言にて母ということなり。", "一二　　　　　　　　　　　土淵村山口に新田乙蔵（にったおとぞう）という老人あり。村の人は乙爺（おとじい）という。今は九十に近く病（や）みてまさに死（し）なんとす。年頃（としごろ）遠野郷の昔の話をよく知りて、誰かに話して聞かせ置きたしと口癖（くちぐせ）のようにいえど、あまり臭（くさ）ければ立ち寄りて聞かんとする人なし。処々（ところどころ）の館（たて）の主（ぬし）の伝記、家々（いえいえ）の盛衰、昔よりこの郷（ごう）に行（おこな）われし歌の数々を始めとして、深山の伝説またはその奥に住める人々の物語など、この老人最もよく知れり。", "○惜（おし）むべし、乙爺は明治四十二年の夏の始めになくなりたり。", "一三　　　　　　　　　　　この老人は数十年の間山の中に独（ひと）りにて住みし人なり。よき家柄（いえがら）なれど、若きころ財産を傾け失いてより、世の中に思いを絶（た）ち、峠の上に小屋（こや）を掛け、甘酒（あまざけ）を往来（おうらい）の人に売りて活計とす。駄賃（だちん）の徒（と）はこの翁を父親（ちちおや）のように思いて、親（した）しみたり。少しく収入の余（あまり）あれば、町に下（くだ）りきて酒を飲む。赤毛布（あかゲット）にて作りたる半纏（はんてん）を着て、赤き頭巾（ずきん）を被（かぶ）り、酔えば、町の中を躍（おど）りて帰るに巡査もとがめず。いよいよ老衰して後、旧里（きゅうり）に帰りあわれなる暮（くら）しをなせり。子供はすべて北海道へ行き、翁ただ一人なり。", "一四　　　　　　　　　　　部落（ぶらく）には必ず一戸の旧家ありて、オクナイサマという神を祀（まつ）る。その家をば大同（だいどう）という。この神の像（ぞう）は桑（くわ）の木を削（けず）りて顔（かお）を描（えが）き、四角なる布（ぬの）の真中（まんなか）に穴を明（あ）け、これを上（うえ）より通（とお）して衣装（いしょう）とす。正月の十五日には小字中（こあざじゅう）の人々この家に集まり来（き）たりてこれを祭る。またオシラサマという神あり。この神の像もまた同じようにして造り設（もう）け、これも正月の十五日に里人（さとびと）集まりてこれを祭る。その式には白粉（おしろい）を神像の顔に塗ることあり。大同の家には必ず畳（たたみ）一帳（いちじょう）の室（しつ）あり。この部屋（へや）にて夜（よる）寝（ね）る者はいつも不思議に遭（あ）う。枕（まくら）を反（かえ）すなどは常のことなり。あるいは誰かに抱（だ）き起（お）こされ、または室より突（つ）き出（いだ）さるることもあり。およそ静かに眠ることを許さぬなり。", "○オシラサマ　は双神なり。アイヌの中にもこの神あること『蝦夷（えぞ）風俗　彙聞（いぶん）』に見ゆ。", "○羽後苅和野の町にて市の神の神体なる陰陽の神に正月十五日白粉を塗りて祭ることあり。これと似たる例なり。", "一五　　　　　　　　　　　オクナイサマを祭れば幸（さいわい）多し。土淵村大字　柏崎（かしわざき）の長者阿部氏、村にては田圃（たんぼ）の家（うち）という。この家にてある年　田植（たうえ）の人手（ひとで）足（た）らず、明日（あす）は空（そら）も怪（あや）しきに、わずかばかりの田を植え残すことかなどつぶやきてありしに、ふと何方（いずち）よりともなくだけ（たけ）低（ひく）き小僧（こぞう）一人来たりて、おのれも手伝い申さんというに任（まか）せて働（はたら）かせて置きしに、午飯時（ひるめしどき）に飯（めし）を食わせんとて尋（たず）ねたれど見えず。やがて再び帰りきて終日、代（しろ）を掻（か）きよく働（はたら）きてくれしかば、その日に植えはてたり。どこの人かは知らぬが、晩にはきて物を食（く）いたまえと誘（さそ）いしが、日暮れてまたその影（かげ）見えず。家に帰りて見れば、縁側（えんがわ）に小さき泥（どろ）の足跡（あしあと）あまたありて、だんだんに座敷に入り、オクナイサマの神棚（かみだな）のところに止（とどま）りてありしかば、さてはと思いてその扉（とびら）を開き見れば、神像の腰より下は田の泥（どろ）にまみれていませし由（よし）。", "一六　　　　　　　　　　　コンセサマを祭れる家も少なからず。この神の神体はオコマサマとよく似たり。オコマサマの社は里に多くあり。石または木にて男の物を作りて捧（ささ）ぐるなり。今はおいおいとその事少なくなれり。", "一七　　　　　　　　　　　旧家（きゅうか）にはザシキワラシという神の住みたもう家少なからず。この神は多くは十二三ばかりの童児なり。おりおり人に姿を見することあり。土淵村大字　飯豊（いいで）の今淵（いまぶち）勘十郎という人の家にては、近きころ高等女学校にいる娘の休暇にて帰りてありしが、ある日　廊下（ろうか）にてはたとザシキワラシに行き逢（あ）い大いに驚きしことあり。これは正（まさ）しく男の児（こ）なりき。同じ村山口なる佐々木氏にては、母人ひとり縫物（ぬいもの）しておりしに、次の間にて紙のがさがさという音あり。この室は家の主人の部屋（へや）にて、その時は東京に行き不在の折なれば、怪しと思いて板戸を開き見るに何の影もなし。しばらくの間（あいだ）座（すわ）りて居ればやがてまた頻（しきり）に鼻を鳴（な）らす音あり。さては座敷（ざしき）ワラシなりけりと思えり。この家にも座敷ワラシ住めりということ、久しき以前よりの沙汰（さた）なりき。この神の宿（やど）りたもう家は富貴自在なりということなり。", "○ザシキワラシ　は座敷童衆なり。この神のこと『石神（いしがみ）問答』中にも記事あり。", "一八　　　　　　　　　　　ザシキワラシまた女の児なることあり。同じ山口なる旧家にて山口孫左衛門という家には、童女の神二人いませりということを久しく言い伝えたりしが、ある年同じ村の何某という男、町より帰るとて留場（とめば）の橋のほとりにて見馴（みな）れざる二人のよき娘に逢えり。物思わしき様子にてこの方へ来（き）たる。お前たちはどこから来たと問えば、おら山口の孫左衛門がところからきたと答う。これから何処へ行くのかと聞けば、それの村の何某が家にと答う。その何某はやや離れたる村にて、今も立派に暮せる豪農なり。さては孫左衛門が世も末だなと思いしが、それより久しからずして、この家の主従二十幾人、茸（きのこ）の毒に中（あた）りて一日のうちに死に絶（た）え、七歳の女の子一人を残せしが、その女もまた年老いて子なく、近きころ病（や）みて失せたり。", "一九　　　　　　　　　　　孫左衛門が家にては、ある日　梨（なし）の木のめぐりに見馴（みな）れぬ茸（きのこ）のあまた生（は）えたるを、食わんか食うまじきかと男どもの評議してあるを聞きて、最後の代の孫左衛門、食わぬがよしと制したれども、下男の一人がいうには、いかなる茸にても水桶（みずおけ）の中に入れて苧殻（おがら）をもってよくかき回（まわ）してのち食えば決して中（あた）ることなしとて、一同この言に従い家内ことごとくこれを食いたり。七歳の女の児（こ）はその日外に出（い）でて遊びに気を取られ、昼飯を食いに帰ることを忘れしために助かりたり。不意の主人の死去にて人々の動転してある間に、遠き近き親類の人々、あるいは生前に貸（かし）ありといい、あるいは約束ありと称して、家の貨財は味噌（みそ）の類（たぐい）までも取り去りしかば、この村　草分（くさわけ）の長者なりしかども、一朝にして跡方（あとかた）もなくなりたり。", "二〇　　　　　　　　　　　この凶変の前にはいろいろの前兆ありき。男ども苅置（かりお）きたる秣（まぐさ）を出すとて三ツ歯の鍬（くわ）にて掻（か）きまわせしに、大なる蛇（へび）を見出（みいだ）したり。これも殺すなと主人が制せしをも聴かずして打ち殺したりしに、その跡より秣の下にいくらともなき蛇ありて、うごめき出でたるを、男ども面白半分にことごとくこれを殺したり。さて取り捨つべきところもなければ、屋敷の外（そと）に穴を掘りてこれを埋（う）め、蛇塚を作る。その蛇は簣（あじか）に何荷（なんが）ともなくありたりといえり。", "二一　　　　　　　　　　　右の孫左衛門は村には珍しき学者にて、常に京都より和漢の書を取り寄せて読み耽（ふけ）りたり。少し変人という方なりき。狐（きつね）と親しくなりて家を富ます術を得んと思い立ち、まず庭の中に稲荷（いなり）の祠（ほこら）を建（た）て、自身京に上（のぼ）りて正一位の神階を請（う）けて帰り、それよりは日々一枚の油揚（あぶらげ）を欠かすことなく、手ずから社頭に供（そな）えて拝をなせしに、のちには狐　馴（な）れて近づけども遁（に）げず。手を延ばしてその首を抑（おさ）えなどしたりという。村にありし薬師の堂守（どうもり）は、わが仏様は何ものをも供（そな）えざれども、孫左衛門の神様よりは御利益（ごりやく）ありと、たびたび笑いごとにしたりとなり。", "二二　　　　　　　　　　　佐々木氏の曽祖母（そうそぼ）年よりて死去せし時、棺（かん）に取り納（おさ）め親族の者集まりきてその夜は一同座敷にて寝たり。死者の娘にて乱心のため離縁せられたる婦人もまたその中にありき。喪（も）の間は火の気（け）を絶（た）やすことを忌（い）むがところの風（ふう）なれば、祖母と母との二人のみは、大なる囲炉裡（いろり）の両側（りょうがわ）に座（すわ）り、母人（ははびと）は旁（かたわら）に炭篭（すみかご）を置き、おりおり炭を継（つ）ぎてありしに、ふと裏口の方より足音してくる者あるを見れば、亡（な）くなりし老女なり。平生（へいぜい）腰かがみて衣物（きもの）の裾（すそ）の引きずるを、三角に取り上げて前に縫いつけてありしが、まざまざとその通りにて、縞目（しまめ）にも見覚（みおぼ）えあり。あなやと思う間もなく、二人の女の座れる炉の脇を通り行くとて、裾にて炭取（すみとり）にさわりしに、丸き炭取なればくるくるとまわりたり。母人は気だけ（きじょう）の人なれば振り返りあとを見送りたれば、親縁の人々の打ち臥（ふ）したる座敷の方へ近より行くと思うほどに、かの狂女のけたたましき声にて、おばあさんが来たと叫びたり。その余の人々はこの声に睡（ねむり）を覚（さま）しただ打ち驚くばかりなりしといえり。", "○マーテルリンクの『侵入者』を想い起こさしむ。", "二三　　　　　　　　　　　同じ人の二七日の逮夜（たいや）に、知音の者集まりて、夜　更（ふ）くるまで念仏を唱（とな）え立ち帰らんとする時、門口（かどぐち）の石に腰掛けてあちらを向ける老女あり。そのうしろ付（つき）正しく亡（な）くなりし人の通りなりき。これは数多（あまた）の人見たる故（ゆえ）に誰も疑わず。いかなる執着（しゅうじゃく）のありしにや、ついに知る人はなかりしなり。", "二四　　　　　　　　　　　村々の旧家を大同（だいどう）というは、大同元年に甲斐国（かいのくに）より移り来たる家なればかくいうとのことなり。大同は田村将軍征討の時代なり。甲斐は南部家の本国なり。二つの伝説を混じたるに非（あら）ざるか。", "○大同は大洞かも知れず、洞とは東北にて家門または族ということなり。『常陸国志（ひたちのこくし）』に例あり、ホラマエ　　　　　　　　　　という語のちに見ゆ。", "二五　　　　　　　　　　　大同の祖先たちが、始めてこの地方に到着せしは、あたかも歳（とし）の暮（くれ）にて、春のいそぎの門松（かどまつ）を、まだ片方（かたほう）はえ立てぬうちに早（はや）元日になりたればとて、今もこの家々にては吉例として門松の片方を地に伏せたるままにて、標縄（しめなわ）を引き渡すとのことなり。", "二六　　　　　　　　　　　柏崎の田圃（たんぼ）のうちと称する阿倍氏はことに聞えたる旧家なり。この家の先代に彫刻に巧（たくみ）なる人ありて、遠野一郷の神仏の像にはこの人の作りたる者多し。", "二七　　　　　　　　　　　早池峯（はやちね）より出でて東北の方　宮古（みやこ）の海に流れ入る川を閉伊川（へいがわ）という。その流域はすなわち下閉伊郡なり。遠野の町の中にて今は池（いけ）の端（はた）という家の先代の主人、宮古に行きての帰るさ、この川の原台（はらだい）の淵（ふち）というあたりを通りしに、若き女ありて一封の手紙を託（たく）す。遠野の町の後なる物見山の中腹にある沼に行きて、手を叩（たた）けば宛名（あてな）の人いで来（く）べしとなり。この人　請（う）け合いはしたれども路々（みちみち）心に掛りてとつおいつせしに、一人の六部（ろくぶ）に行き逢（あ）えり。この手紙を開きよみて曰（いわ）く、これを持ち行かば汝（なんじ）の身に大なる災（わざわい）あるべし。書き換（か）えて取らすべしとて更に別の手紙を与えたり。これを持ちて沼に行き教えのごとく手を叩きしに、果して若き女いでて手紙を受け取り、その礼なりとてきわめて小さき石臼（いしうす）をくれたり。米を一粒入れて回（まわ）せば下より黄金　出（い）づ。この宝物（たからもの）の力にてその家やや富有になりしに、妻なる者欲深くして、一度にたくさんの米をつかみ入れしかば、石臼はしきりに自ら回りて、ついには朝ごとに主人がこの石臼に供えたりし水の、小さき窪（くぼ）みの中に留（たま）りてありし中へ滑（すべ）り入りて見えずなりたり。その水留りはのちに小さき池になりて、今も家の旁（かたわら）にあり。家の名を池の端というもその為（ため）なりという。", "○この話に似たる物語西洋にもあり、偶合にや。", "二八　　　　　　　　　　　始めて早池峯に山路（やまみち）をつけたるは、付馬牛村の何某という猟師にて、時は遠野の南部家　入部（にゅうぶ）の後のことなり。その頃までは土地の者一人としてこの山には入りたる者なかりしと。この猟師半分ばかり道を開きて、山の半腹に仮小屋（かりごや）を作りておりしころ、ある（あ）る日　炉（ろ）の上に餅（もち）をならべ焼きながら食いおりしに、小屋の外を通る者ありて頻（しきり）に中を窺（うかが）うさまなり。よく見れば大なる坊主なり。やがて小屋の中に入り来たり、さも珍しげに餅の焼くるを見てありしが、ついにこらえ兼（か）ねて手をさし延べて取りて食う。猟師も恐ろしければ自らもまた取りて与えしに、嬉（うれ）しげになお食いたり。餅　皆（みな）になりたれば帰りぬ。次の日もまた来るならんと思い、餅によく似たる白き石を二つ三つ、餅にまじえて炉の上に載せ置きしに、焼けて火のようになれり。案のごとくその坊主きょうもきて、餅を取りて食うこと昨日のごとし。餅　尽（つ）きてのちその白石をも同じように口に入れたりしが、大いに驚きて小屋を飛び出し姿見えずなれり。のちに谷底にてこの坊主の死してあるを見たりといえり。", "○北上川の中古の大洪水に白髪水というがあり、白髪の姥（うば）を欺（あざむ）き餅に似たる焼石を食わせし祟（たたり）なりという。この話によく似たり。", "二九　　　　　　　　　　　鶏頭山（けいとうざん）は早池峯の前面に立てる峻峯（しゅんぽう）なり。麓（ふもと）の里にてはまた前薬師（まえやくし）ともいう。天狗（てんぐ）住めりとて、早池峯に登る者も決してこの山は掛（か）けず。山口のハネトという家の主人、佐々木氏の祖父と竹馬の友なり。きわめて無法者にて、鉞（まさかり）にて草を苅（か）り鎌（かま）にて土を掘るなど、若き時は乱暴の振舞（ふるまい）のみ多かりし人なり。ある時人と賭（かけ）をして一人にて前薬師に登りたり。帰りての物語に曰く、頂上に大なる岩あり、その岩の上に大男三人いたり。前にあまたの金銀をひろげたり。この男の近よるを見て、気色（けしき）ばみて振り返る、その眼の光きわめて恐ろし。早池峯に登りたるが途（みち）に迷いて来たるなりと言えば、然（しか）らば送りて遣（や）るべしとて先（さき）に立ち、麓（ふもと）近きところまで来たり、眼を塞（ふさ）げと言うままに、暫時そこに立ちている間に、たちまち異人は見えずなりたりという。", "三〇　　　　　　　　　　　小国（おぐに）村の何某という男、ある日早池峯に竹を伐（き）りに行きしに、地竹（じだけ）のおびただしく茂りたる中に、大なる男一人寝ていたるを見たり。地竹にて編みたる三尺ばかりの草履（ぞうり）を脱（ぬ）ぎてあり。仰（あお）に臥（ふ）して大なる鼾（いびき）をかきてありき。", "○下閉伊郡小国村大字小国。", "○地竹は深山に生ずる低き竹なり。", "三一　　　　　　　　　　　遠野郷の民家の子女にして、異人にさらわれて行く者年々多くあり。ことに女に多しとなり。", "三二　　　　　　　　　　　千晩（せんば）ヶ　岳（だけ）は山中に沼（ぬま）あり。この谷は物すごく腥（なまぐさ）き臭（か）のするところにて、この山に入り帰りたる者はまことに少（すく）なし。昔何の隼人（はやと）という猟師あり。その子孫今もあり。白き鹿を見てこれを追いこの谷に千晩こもりたれば山の名とす。その白鹿撃たれて遁げ、次の山まで行きて片肢（かたあし）折れたり。その山を今　片羽山（かたはやま）という。さてまた前なる山へきてついに死したり。その地を死助（しすけ）という。死助権現（しすけごんげん）とて祀（まつ）れるはこの白鹿なりという。", "○宛然（えんぜん）として古風土記をよむがごとし。", "三三　　　　　　　　　　　白望（しろみ）の山に行きて泊（とま）れば、深夜にあたりの薄明（うすあか）るくなることあり。秋のころ茸（きのこ）を採りに行き山中に宿する者、よくこの事に逢う。また谷のあなたにて大木を伐（き）り倒す音、歌の声など聞（きこ）ゆることあり。この山の大さは測（はか）るべからず。五月に萱（かや）を苅りに行くとき、遠く望めば桐（きり）の花の咲き満（み）ちたる山あり。あたかも紫（むらさき）の雲のたなびけるがごとし。されどもついにそのあたりに近づくこと能（あた）わず。かつて茸を採りに入りし者あり。白望の山奥にて金の樋（とい）と金の杓（しゃく）とを見たり。持ち帰らんとするにきわめて重く、鎌（かま）にて片端（かたはし）を削（けず）り取らんとしたれどそれもかなわず。また来（こ）んと思いて樹の皮を白くし栞（しおり）としたりしが、次の日人々とともに行きてこれを求めたれど、ついにその木のありかをも見出しえずしてやみたり。", "三四　　　　　　　　　　　白望の山続きに離森（はなれもり）というところあり。その小字（こあざ）に長者屋敷というは、全く無人の境なり。ここに行きて炭を焼く者ありき。ある夜その小屋の垂菰（たれごも）をかかげて、内を窺（うかが）う者を見たり。髪を長く二つに分けて垂（た）れたる女なり。このあたりにても深夜に女の叫び声を聞くことは珍しからず。", "三五　　　　　　　　　　　佐々木氏の祖父の弟、白望に茸を採りに行きて宿（やど）りし夜、谷を隔てたるあなたの大なる森林の前を横ぎりて、女の走り行くを見たり。中空を走るように思われたり。待てちゃアと二声ばかり呼（よ）ばわりたるを聞けりとぞ。", "三六　　　　　　　　　　　猿の経立（ふったち）、御犬（おいぬ）の経立は恐ろしきものなり。御犬（おいぬ）とは狼（おおかみ）のことなり。山口の村に近き二（ふた）ツ石山（いしやま）は岩山なり。ある雨の日、小学校より帰る子どもこの山を見るに、処々（ところどころ）の岩の上に御犬うずくまりてあり。やがて首を下（した）より押（お）しあぐるようにしてかわるがわる吠（ほ）えたり。正面より見れば生（う）まれ立（た）ての馬の子ほどに見ゆ。後（うしろ）から見れば存外（ぞんがい）小さしといえり。御犬のうなる声ほど物凄（ものすご）く恐ろしきものはなし。", "三七　　　　　　　　　　　境木峠（さかいげとうげ）と和山峠（わやまとうげ）との間にて、昔は駄賃馬（だちんば）を追（お）う者、しばしば狼に逢いたりき。馬方（うまかた）らは夜行には、たいてい十人ばかりも群（むれ）をなし、その一人が牽（ひ）く馬は一端綱（ひとはづな）とてたいてい五六七　匹（ぴき）までなれば、常に四五十匹の馬の数なり。ある時二三百ばかりの狼追い来たり、その足音山もどよむばかりなれば、あまりの恐ろしさに馬も人も一所に集まりて、そのめぐりに火を焼きてこれを防ぎたり。されどなおその火を躍り越えて入り来るにより、ついには馬の綱（つな）を解（と）きこれを張（は）り回（めぐ）らせしに、穽（おとしあな）などなりとや思いけん、それよりのちは中に飛び入らず。遠くより取（と）り囲（かこ）みて夜の明（あけ）るまで吠えてありきとぞ。", "三八　　　　　　　　　　　小友（おとも）村の旧家の主人にて今も生存せる某爺（なにがしじい）という人、町より帰りに頻（しきり）に御犬の吠（ほ）ゆるを聞きて、酒に酔いたればおのれもまたその声をまねたりしに、狼も吠えながら跡（あと）より来るようなり。恐ろしくなりて急ぎ家に帰り入り、門の戸を堅（かた）く鎖（とざ）して打（う）ち潜（ひそ）みたれども、夜通し狼の家をめぐりて吠ゆる声やまず。夜明（よあ）けて見れば、馬屋の土台（どだい）の下を掘り穿（うが）ちて中に入り、馬の七頭ありしをことごとく食い殺していたり。この家はそのころより産やや傾きたりとのことなり。", "三九　　　　　　　　　　　佐々木君幼きころ、祖父と二人にて山より帰りしに、村に近き谷川の岸の上に、大なる鹿の倒れてあるを見たり。横腹は破れ、殺されて間（ま）もなきにや、そこよりはまだ湯気（ゆげ）立てり。祖父の曰く、これは狼が食いたるなり。この皮ほしけれども御犬は必ずどこかこの近所に隠れて見ておるに相違なければ、取ることができぬといえり。", "四〇　　　　　　　　　　　草の長さ三寸あれば狼は身を隠すといえり。草木（そうもく）の色の移り行くにつれて、狼の毛の色も季節（きせつ）ごとに変りて行くものなり。", "四一　　　　　　　　　　　和野の佐々木嘉兵衛、ある年　境木越（さかいげごえ）の大谷地（おおやち）へ狩にゆきたり。死助（しすけ）の方より走れる原なり。秋の暮のことにて木の葉は散り尽し山もあらわなり。向（むこ）うの峯より何百とも知れぬ狼この方へ群（む）れて走りくるを見て恐ろしさに堪えず、樹の梢（こずえ）に上（のぼ）りてありしに、その樹の下を夥（おびただ）しき足音して走り過ぎ北の方へ行けり。そのころより遠野郷には狼はなはだ少なくなれりとのことなり。", "四二　　　　　　　　　　　六角牛（ろっこうし）山の麓（ふもと）にオバヤ、板小屋などいうところあり。広き萱山（かややま）なり。村々より苅（か）りに行く。ある年の秋　飯豊村（いいでむら）の者ども萱を苅るとて、岩穴の中より狼の子三匹を見出し、その二つを殺し一つを持ち帰りしに、その日より狼の飯豊衆（いいでし）の馬を襲（おそ）うことやまず。外（ほか）の村々の人馬にはいささかも害をなさず。飯豊衆相談して狼狩をなす。その中には相撲（すもう）を取り平生（へいぜい）力自慢（ちからじまん）の者あり。さて野に出（い）でて見るに、雄（おす）の狼は遠くにおりて来（き）たらず。雌（めす）狼一つ鉄という男に飛びかかりたるを、ワッポロを脱ぎて腕（うで）に巻き、やにわにその狼の口の中に突き込みしに、狼これを噛（か）む。なお強く突き入れながら人を喚（よ）ぶに、誰も誰も怖（おそ）れて近よらず。その間に鉄の腕は狼の腹まで入（はい）り、狼は苦しまぎれに鉄の腕骨を噛（か）み砕（くだ）きたり。狼はその場にて死したれども、鉄も担（かつ）がれて帰り程（ほど）なく死したり。", "○ワッポロ　は上羽織のことなり。", "四三　　　　　　　　　　　一昨年の『遠野新聞』にもこの記事を載せたり。上郷（かみごう）村の熊という男、友人とともに雪の日に六角牛に狩に行き谷深く入りしに、熊の足跡を見出でたれば、手分（てわけ）してその跡を（もと）め、自分は峯の方を行きしに、とある岩の陰（かげ）より大なる熊この方を見る。矢頃（やごろ）あまりに近かりしかば、銃をすてて熊に抱（かか）えつき雪の上を転（ころ）びて、谷へ下る。連（つれ）の男これを救わんと思えども力及ばず。やがて谷川に落ち入りて、人の熊　下（した）になり水に沈みたりしかば、その隙（ひま）に獣の熊を打ち取りぬ。水にも溺（おぼ）れず、爪（つめ）の傷は数箇所受けたれども命に障（さわ）ることはなかりき。", "四四　　　　　　　　　　　六角牛の峯続きにて、橋野（はしの）という村の上なる山に金坑（きんこう）あり。この鉱山のために炭を焼きて生計とする者、これも笛の上手（じょうず）にて、ある日　昼（ひる）の間（あいだ）小屋（こや）におり、仰向（あおむき）に寝転（ねころ）びて笛を吹きてありしに、小屋の口なる垂菰（たれごも）をかかぐる者あり。驚きて見れば猿の経立（ふったち）なり。恐ろしくて起き直りたれば、おもむろに彼方（かなた）へ走り行きぬ。", "○上閉伊郡栗橋村大字橋野。", "四五　　　　　　　　　　　猿の経立（ふったち）はよく人に似て、女色を好み里の婦人を盗み去ること多し。松脂（まつやに）を毛に塗（ぬ）り砂をその上につけておる故、毛皮（けがわ）は鎧（よろい）のごとく鉄砲の弾（たま）も通（とお）らず。", "四六　　　　　　　　　　　栃内村の林崎（はやしざき）に住む何某という男、今は五十に近し。十年あまり前のことなり。六角牛山に鹿を撃ちに行き、オキを吹きたりしに、猿の経立あり、これを真（まこと）の鹿なりと思いしか、地竹（じだけ）を手にて分（わ）けながら、大なる口をあけ嶺の方より下（くだ）り来たれり。胆潰（きもつぶ）れて笛を吹きやめたれば、やがて反（そ）れて谷の方へ走り行きたり。", "○オキ　とは鹿笛のことなり。", "四七　　　　　　　　　　　この地方にて子供をおどす言葉（ことば）に、六角牛の猿の経立が来るぞということ常の事なり。この山には猿多し。おがせの滝（たき）を見に行けば、崖（がけ）の樹の梢（こずえ）にあまたおり、人を見れば遁（に）げながら木の実（み）などを叩（なげう）ちて行くなり。", "四八　　　　　　　　　　　仙人峠（せんにんとうげ）にもあまた猿おりて行人に戯（たわむ）れ石を打ちつけなどす。", "四九　　　　　　　　　　　仙人峠は登り十五里　降（くだ）り十五里あり。その中ほどに仙人の像を祀りたる堂あり。この堂の壁（かべ）には旅人がこの山中にて遭いたる不思議のでき事を書き識（しる）すこと昔よりの習（ならい）なり。例えば、我は越後の者なるが、何月何日の夜、この山路（やまみち）にて若き女の髪を垂（た）れたるに逢えり。こちらを見てにこと笑いたりという類（たぐい）なり。またこの所にて猿に悪戯（いたずら）をせられたりとか、三人の盗賊に逢えりというようなる事をも記（しる）せり。", "○この一里も小道なり。", "五〇　　　　　　　　　　　死助（しすけ）の山にカッコ花あり。遠野郷にても珍しという花なり。五月　閑古鳥（かんこどり）の啼（な）くころ、女や子どもこれを採（と）りに山へ行く。酢（す）の中に漬（つ）けて置けば紫色（むらさきいろ）になる。酸漿（ほおずき）の実（み）のように吹きて遊ぶなり。この花を採ることは若き者の最も大なる遊楽なり。", "五一　　　　　　　　　　　山にはさまざまの鳥　住（す）めど、最も寂（さび）しき声の鳥はオット鳥なり。夏の夜中（よなか）に啼（な）く。浜の大槌（おおづち）より駄賃付（だちんづけ）の者など峠を越え来たれば、遥（はるか）に谷底にてその声を聞くといえり。昔ある長者の娘あり。またある長者の男の子と親（した）しみ、山に行きて遊びしに、男見えずなりたり。夕暮になり夜になるまで探（さが）しあるきしが、これを見つくることをえずして、ついにこの鳥になりたりという。オットーン、オットーンというは夫（おっと）のことなり。末の方かすれてあわれなる鳴声（なきごえ）なり。", "五二　　　　　　　　　　　馬追鳥（うまおいどり）は時鳥（ほととぎす）に似て少（すこ）し大きく、羽（はね）の色は赤に茶を帯（お）び、肩には馬の綱（つな）のようなる縞（しま）あり。胸のあたりにクツゴコ（口篭）のようなるかたあり。これもある（あ）る長者が家の奉公人、山へ馬を放（はな）しに行き、家に帰らんとするに一匹不足せり。夜通しこれを求めあるきしがついにこの鳥となる。アーホー、アーホーと啼くはこの地方にて野におる馬を追う声なり。年により馬追鳥　里（さと）にきて啼くことあるは飢饉（ききん）の前兆なり。深山には常に住みて啼く声を聞くなり。", "○クツゴコ　は馬の口に嵌（は）める網の袋なり。", "五三　　　　　　　　　　　郭公（かっこう）と時鳥（ほととぎす）とは昔ありし姉妹（あねいもと）なり。郭公は姉なるがある時　芋（いも）を掘りて焼き、そのまわりの堅（かた）きところを自ら食い、中の軟（やわら）かなるところを妹に与えたりしを、妹は姉の食う分（ぶん）は一層　旨（うま）かるべしと想いて、庖丁（ほうちょう）にてその姉を殺せしに、たちまちに鳥となり、ガンコ、ガンコと啼きて飛び去りぬ。ガンコは方言にて堅いところということなり。妹さてはよきところをのみおのれにくれしなりけりと思い、悔恨に堪えず、やがてまたこれも鳥になりて庖丁かけたと啼きたりという。遠野にては時鳥のことを庖丁かけと呼ぶ。盛岡（もりおか）辺にては時鳥はどちゃへ飛んでたと啼くという。", "○この芋は馬鈴薯（ばれいしょ）のことなり。", "五四　　　　　　　　　　　閉伊川（へいがわ）の流（なが）れには淵（ふち）多く恐ろしき伝説少なからず。小国川との落合に近きところに、川井（かわい）という村あり。その村の長者の奉公人、ある淵の上なる山にて樹を伐るとて、斧（おの）を水中に取（と）り落（おと）したり。主人の物なれば淵に入りてこれを探（さぐ）りしに、水の底に入るままに物音聞ゆ。これを求めて行くに岩の陰に家あり。奥の方に美しき娘　機（はた）を織りていたり。そのハタシに彼の斧は立てかけてありたり。これを返したまわらんという時、振り返りたる女の顔を見れば、二三年前に身まかりたる我が主人の娘なり。斧は返すべければ我がこの所（ところ）にあることを人にいうな。その礼としてはその方　身上（しんしょう）良（よ）くなり、奉公をせずともすむようにして遣（や）らんといいたり。そのためなるか否かは知らず、その後　胴引（どうびき）などいう博奕（ばくち）に不思議に勝ち続（つづ）けて金留（かねたま）り、ほどなく奉公をやめ家に引き込みて中（ちゅう）ぐらいの農民になりたれど、この男は疾（と）くに物忘れして、この娘のいいしことも心づかずしてありしに、ある日同じ淵の辺（ほとり）を過（す）ぎて町へ行くとて、ふと前の事を思い出し、伴（とも）なえる者に以前かかることありきと語りしかば、やがてその噂（うわさ）は近郷に伝わりぬ。その頃より男は家産再び傾（かたむ）き、また昔の主人に奉公して年を経たり。家の主人は何と思いしにや、その淵に何荷（なんが）ともなく熱湯を注（そそ）ぎ入れなどしたりしが、何の効もなかりしとのことなり。", "○下閉伊郡川井村大字川井、川井はもちろん川合の義なるべし。", "五五　　　　　　　　　　　川には川童（かっぱ）多く住めり。猿ヶ石川ことに多し。松崎村の川端（かわばた）の家（うち）にて、二代まで続けて川童の子を孕（はら）みたる者あり。生れし子は斬（き）り刻（きざ）みて一升樽（いっしょうだる）に入れ、土中に埋（うず）めたり。その形（かたち）きわめて醜怪なるものなりき。女の婿（むこ）の里は新張（にいばり）村の何某とて、これも川端の家なり。その主人　人（ひと）にその始終（しじゅう）を語れり。かの家の者一同ある日　畑（はたけ）に行きて夕方に帰らんとするに、女川の汀（みぎわ）に踞（うずくま）りてにこにこと笑いてあり。次の日は昼（ひる）の休みにまたこの事あり。かくすること日を重ねたりしに、次第にその女のところへ村の何某という者　夜々（よるよる）通（かよ）うという噂（うわさ）立ちたり。始めには婿が浜の方へ駄賃付（だちんづけ）に行きたる留守（るす）をのみ窺（うかが）いたりしが、のちには婿（むこ）と寝（ね）たる夜（よる）さえくるようになれり。川童なるべしという評判だんだん高くなりたれば、一族の者集まりてこれを守れどもなんの甲斐（かい）もなく、婿の母も行きて娘の側（かたわら）に寝（ね）たりしに、深夜にその娘の笑う声を聞きて、さては来てありと知りながら身動きもかなわず、人々いかにともすべきようなかりき。その産はきわめて難産なりしが、ある者のいうには、馬槽（うまうね）に水をたたえその中にて産（う）まば安く産まるべしとのことにて、これを試みたれば果してその通りなりき。その子は手に水掻（みずかき）あり。この娘の母もまたかって川童の子を産みしことありという。二代や三代の因縁にはあらずという者もあり。この家も如法（にょほう）の豪家にて何の某という士族なり。村会議員をしたることもあり。", "五六　　　　　　　　　　　上郷村の何某の家にても川童らしき物の子を産（う）みたることあり。確（たしか）なる証とてはなけれど、身内（みうち）真赤（まっか）にして口大きく、まことにいやな子なりき。忌（いま）わしければ棄（す）てんとてこれを携えて道ちがえに持ち行き、そこに置きて一間ばかりも離れたりしが、ふと思い直し、惜しきものなり、売りて見せ物にせば金になるべきにとて立ち帰りたるに、早取り隠されて見えざりきという。", "○道ちがえは道の二つに別かるるところすなわち追分（おいわけ）なり。", "五七　　　　　　　　　　　川の岸の砂（すな）の上には川童の足跡（あしあと）というものを見ること決して珍しからず。雨の日の翌日などはことにこの事あり。猿の足と同じく親指（おやゆび）は離れて人間の手の跡（あと）に似たり。長さは三寸に足らず。指先のあとは人ののように明らかには見えずという。", "五八　　　　　　　　　　小烏瀬川（こがらせがわ）の姥子淵（おばこふち）の辺に、新屋（しんや）の家（うち）という家（いえ）あり。ある日　淵（ふち）へ馬を冷（ひや）しに行き、馬曳（うまひき）の子は外（ほか）へ遊びに行きし間に、川童出でてその馬を引き込まんとし、かえりて馬に引きずられて厩（うまや）の前に来たり、馬槽（うまうね）に覆（おお）われてありき。家のもの馬槽の伏せてあるを怪しみて少しあけて見れば川童の手出でたり。村中のもの集まりて殺さんか宥（ゆる）さんかと評議せしが、結局　今後（こんご）は村中の馬に悪戯（いたずら）をせぬという堅き約束をさせてこれを放したり。その川童今は村を去りて相沢（あいざわ）の滝の淵に住めりという。", "○この話などは類型全国に充満せり。いやしくも川童のおるという国には必ずこの話あり。何の故にか。", "五九　　　　　　　　　　　外（ほか）の地にては川童の顔は青しというようなれど、遠野の川童は面（つら）の色（いろ）赤（あか）きなり。佐々木氏の曽祖母（そうそぼ）、稚（おさな）かりしころ友だちと庭にて遊びてありしに、三本ばかりある胡桃（くるみ）の木の間より、真赤（まっか）なる顔したる男の子の顔見えたり。これは川童なりしとなり。今もその胡桃大木にてあり。この家の屋敷のめぐりはすべて胡桃の樹なり。", "六〇　　　　　　　　　　　和野（わの）村の嘉兵衛爺（かへえじい）、雉子小屋（きじごや）に入りて雉子を待ちしに狐（きつね）しばしば出でて雉子を追う。あまり憎（にく）ければこれを撃たんと思い狙（ねら）いたるに、狐はこの方を向きて何ともなげなる顔してあり。さて引金（ひきがね）を引きたれども火　移（うっ）らず。胸騒（むなさわ）ぎして銃を検せしに、筒口（つつぐち）より手元（てもと）のところまでいつのまにかことごとく土をつめてありたり。", "六一　　　　　　　　　　　同じ人六角牛に入りて白き鹿（しか）に逢（あ）えり。白鹿（はくろく）は神（かみ）なりという言（い）い伝（つた）えあれば、もし傷（きず）つけて殺すこと能（あた）わずば、必ず祟（たたり）あるべしと思案（しあん）せしが、名誉（めいよ）の猟人（かりうど）なれば世間（せけん）の嘲（あざけ）りをいとい、思い切りてこれを撃（う）つに、手応（てごた）えはあれども鹿少しも動かず。この時もいたく胸騒（むなさわ）ぎして、平生（へいぜい）魔除（まよ）けとして危急（ききゅう）の時のために用意したる黄金（おうごん）の丸（たま）を取り出し、これに蓬（よもぎ）を巻きつけて打ち放したれど、鹿はなお動かず、あまり怪しければ近よりて見るに、よく鹿の形に似たる白き石なりき。数十年の間山中に暮（くら）せる者が、石と鹿とを見誤（みあやま）るべくもあらず、全く魔障（ましょう）の仕業（しわざ）なりけりと、この時ばかりは猟を止（や）めばやと思いたりきという。", "六二　　　　　　　　　　　また同じ人、ある夜（よ）山中（さんちゅう）にて小屋（こや）を作るいとまなくて、とある大木の下に寄り、魔除（まよ）けのサンズ縄（なわ）をおのれと木のめぐりに三囲（みめぐり）引きめぐらし、鉄砲を竪（たて）に抱（かか）えてまどろみたりしに、夜深く物音のするに心づけば、大なる僧形（そうぎょう）の者赤き衣（ころも）を羽（はね）のように羽ばたきして、その木の梢に覆（おお）いかかりたり。すわやと銃を打ち放せばやがてまた羽ばたきして中空（なかぞら）を飛びかえりたり。この時の恐ろしさも世の常ならず。前後三たびまでかかる不思議に遭（あ）い、そのたびごとに鉄砲を止（や）めんと心に誓い、氏神（うじがみ）に願掛（がんが）けなどすれど、やがて再び思い返して、年取るまで猟人（かりうど）の業を棄（す）つること能（あた）わずとよく人に語りたり。", "六三　　　　　　　　　　　小国（おぐに）の三浦某というは村一の金持（かねもち）なり。今より二三代前の主人、まだ家は貧しくして、妻は少しく魯鈍（ろどん）なりき。この妻ある日　門（かど）の前（まえ）を流るる小さき川に沿いて蕗（ふき）を採（と）りに入りしに、よき物少なければ次第に谷奥深く登りたり。さてふと見れば立派なる黒き門（もん）の家あり。訝（いぶか）しけれど門の中に入りて見るに、大なる庭にて紅白の花一面に咲き鶏（にわとり）多く遊べり。その庭を裏（うら）の方へ回（まわ）れば、牛小屋ありて牛多くおり、馬舎（うまや）ありて馬多くおれども、一向に人はおらず。ついに玄関より上（あが）りたるに、その次の間には朱と黒との膳椀（ぜんわん）をあまた取り出したり。奥の座敷には火鉢（ひばち）ありて鉄ビン（てつびん）の湯のたぎれるを見たり。されどもついに人影はなければ、もしや山男の家ではないかと急に恐ろしくなり、駆（か）け出（だ）して家に帰りたり。この事を人に語れども実（まこと）と思う者もなかりしが、またある日わが家のカドに出でて物を洗いてありしに、川上より赤き椀一つ流れてきたり。あまり美しければ拾い上げたれど、これを食器に用いたらば汚（きたな）しと人に叱（しか）られんかと思い、ケセネギツの中に置きてケセネを量（はか）る器（うつわ）となしたり。しかるにこの器にて量り始めてより、いつまで経（た）ちてもケセネ尽きず。家の者もこれを怪しみて女に問いたるとき、始めて川より拾い上げし由（よし）をば語りぬ。この家はこれより幸運に向い、ついに今の三浦家となれり。遠野にては山中の不思議（ふしぎ）なる家をマヨイガという。マヨイガに行き当りたる者は、必ずその家の内の什器（じゅうき）家畜何にてもあれ持ち出でて来べきものなり。その人に授（さず）けんがためにかかる家をば見するなり。女が無欲にて何ものをも盗み来ざりしが故に、この椀自ら流れて来たりしなるべしといえり。", "○このカド　は門にはあらず。川戸にて門前を流るる川の岸に水を汲（く）み物を洗うため家ごとに設けたるところなり。", "○ケセネ　は米　稗（ひえ）その他の穀物（こくもつ）をいう。キツ　はその穀物を容（い）るる箱なり。大小種々のキツ　　あり。", "六四　　　　　　　　　　　金沢村（かねさわむら）は白望（しろみ）の麓（ふもと）、上閉伊郡の内にてもことに山奥にて、人の往来する者少なし。六七年前この村より栃内村の山崎なる某（なにがし）かかが家に娘の婿を取りたり。この婿実家に行かんとして山路に迷い、またこのマヨイガに行き当りぬ。家のありさま、牛馬※　　　奚＋隹　　　　　　　、第3水準1-93-66］の多きこと、花の紅白に咲きたりしことなど、すべて前の話の通りなり。同じく玄関に入りしに、膳椀を取り出したる室あり。座敷に鉄ビン（てつびん）の湯たぎりて、今まさに茶を煮（に）んとするところのように見え、どこか便所などのあたりに人が立ちてあるようにも思われたり。茫然（ぼうぜん）として後にはだんだん恐ろしくなり、引き返してついに小国（おぐに）の村里に出でたり。小国にてはこの話を聞きて実（まこと）とする者もなかりしが、山崎の方にてはそはマヨイガなるべし、行きて膳椀の類を持ち来（き）たり長者にならんとて、婿殿（むこどの）を先に立てて人あまたこれを求めに山の奥に入り、ここに門ありきというところに来たれども、眼にかかるものもなく空（むな）しく帰り来たりぬ。その婿もついに金持になりたりということを聞かず。", "○上閉伊郡金沢村。", "六五　　　　　　　　　　　早池峯（はやちね）は御影石（みかげいし）の山なり。この山の小国に向（む）きたる側（かわ）に安倍ヶ城（あべがじょう）という岩あり。険（けわ）しき崖（がけ）の中ほどにありて、人などはとても行きゅうべきところにあらず。ここには今でも安倍貞任（あべのさだとう）の母住めりと言い伝う。雨（あめ）の降（ふ）るべき夕方など、岩屋（いわや）の扉（とびら）を鎖（とざ）す音聞ゆという。小国、付馬牛（つくもうし）の人々は、安倍ヶ城の錠（じょう）の音がする、明日（あす）は雨ならんなどいう。", "六六　　　　　　　　　　　同じ山の付馬牛よりの登り口にもまた安倍屋敷（あべやしき）という巌屈あり。とにかく早池峯は安倍貞任にゆかりある山なり。小国より登る山口にも八幡太郎（はちまんたろう）の家来（けらい）の討死（うちじに）したるを埋めたりという塚三つばかりあり。", "六七　　　　　　　　　　　安倍貞任に関する伝説はこのほかにも多し。土淵村と昔は橋野（はしの）といいし栗橋村との境にて、山口よりは二三里も登りたる山中に、広く平（たいら）なる原あり。そのあたりの地名に貞任というところあり。沼ありて貞任が馬を冷（ひや）せしところなりという。貞任が陣屋（じんや）を構（かま）えし址（あと）とも言い伝う。景色（けしき）よきところにて東海岸よく見ゆ。", "六八　　　　　　　　　　　土淵村には安倍氏という家ありて貞任が末なりという。昔は栄えたる家なり。今も屋敷（やしき）の周囲には堀ありて水を通ず。刀剣馬具あまたあり。当主は安倍　与右衛門（よえもん）、今も村にては二三等の物持（ものも）ちにて、村会議員なり。安倍の子孫はこのほかにも多し。盛岡の安倍館（あべだて）の付近にもあり。厨川（くりやがわ）の柵（しゃく）に近き家なり。土淵村の安倍家の四五町北、小烏瀬川（こがらせがわ）の河隈（かわくま）に館（たて）の址あり。八幡沢（はちまんざ）の館（たて）という。八幡太郎が陣屋というものこれなり。これより遠野の町への路（みち）にはまた八幡山という山ありて、その山の八幡沢の館の方に向かえる峯にもまた一つの館址（たてあと）あり。貞任が陣屋なりという。二つの館の間二十余町を隔つ。矢戦（やいくさ）をしたりという言い伝えありて、矢の根を多く掘り出せしことあり。この間に似田貝（にたかい）という部落あり。戦の当時このあたりは芦（あし）しげりて土　固（かた）まらず、ユキユキと動揺せり。ある時八幡太郎ここを通りしに、敵味方（てきみかた）いずれの兵糧（ひょうりょう）にや、粥（かゆ）を多く置きてあるを見て、これは煮（に）た粥かといいしより村の名となる。似田貝の村の外を流るる小川を鳴川（なるかわ）という。これを隔てて足洗川村（あしらがむら）あり。鳴川にて義家（よしいえ）が足を洗いしより村の名となるという。", "○ニタカイ　　はアイヌ語のニタト　すなわち湿地より出しなるべし。地形よく合えり。西の国々にてはニタ　ともヌタ　ともいう皆これなり。下閉伊郡小川村にも二田貝という字あり。", "六九　　　　　　　　　　　今の土淵村には大同（だいどう）という家二軒あり。山口の大同は当主を大洞万之丞（おおほらまんのじょう）という。この人の養母名はおひで、八十を超（こ）えて今も達者なり。佐々木氏の祖母の姉なり。魔法に長じたり。まじないにて蛇を殺し、木に止（とま）れる鳥を落しなどするを佐々木君はよく見せてもらいたり。昨年の旧暦正月十五日に、この老女の語りしには、昔あるところに貧しき百姓あり。妻はなくて美しき娘あり。また一匹の馬を養う。娘この馬を愛して夜（よる）になれば厩舎（うまや）に行きて寝（い）ね、ついに馬と夫婦になれり。ある夜父はこの事を知りて、その次の日に娘には知らせず、馬を連（つ）れ出して桑の木につり下げて殺したり。その夜娘は馬のおらぬより父に尋ねてこの事を知り、驚き悲しみて桑の木の下に行き、死したる馬の首に縋（すが）りて泣きいたりしを、父はこれを悪（にく）みて斧をもって後（うしろ）より馬の首を切り落せしに、たちまち娘はその首に乗りたるまま天に昇（のぼ）り去れり。オシラサマというはこの時より成りたる神なり。馬をつり下げたる桑の枝にてその神の像を作る。その像三つありき。本（もと）にて作りしは山口の大同にあり。これを姉神とす。中にて作りしは山崎の在家権十郎（ざいけごんじゅうろう）という人の家にあり。佐々木氏の伯母が縁づきたる家なるが、今は家絶えて神の行方（ゆくえ）を知らず。末（すえ）にて作りし妹神の像は今（いま）付馬牛村にありといえり。", "七〇　　　　　　　　　　　同じ人の話に、オクナイサマはオシラサマのある家には必ず伴ないて在（いま）す神なり。されどオシラサマはなくてオクナイサマのみある家もあり。また家によりて神の像も同じからず。山口の大同にあるオクナイサマは木像なり。山口の辷石（はねいし）たにえという人の家なるは掛軸（かけじく）なり。田圃（たんぼ）のうちにいませるはまた木像なり。飯豊（いいで）の大同にもオシラサマはなけれどオクナイサマのみはいませりという。", "七一　　　　　　　　　　　この話をしたる老女は熱心なる念仏者なれど、世の常の念仏者とは様（さま）かわり、一種邪宗らしき信仰あり。信者に道を伝うることはあれども、互いに厳重なる秘密を守り、その作法（さほう）につきては親にも子にもいささかたりとも知らしめず。また寺とも僧とも少しも関係はなくて、在家（ざいけ）の者のみの集（あっ）まりなり。その人の数も多からず。辷石（はねいし）たにえという婦人などは同じ仲間なり。阿弥陀仏（あみだぶつ）の斎日（さいにち）には、夜中人の静まるを待ちて会合し、隠れたる室にて祈祷（きとう）す。魔法まじないを善（よ）くする故に、郷党に対して一種の権威あり。", "七二　　　　　　　　　　　栃内（とちない）村の字　琴畑（ことばた）は深山の沢にあり。家の数は五軒ばかり、小烏瀬（こがらせ）川の支流の水上（みなかみ）なり。これより栃内の民いまで二里を隔（へだ）つ。琴畑の入口に塚あり。塚の上には木の座像（ざぞう）あり。およそ人の大きさにて、以前は堂の中にありしが、今は雨（あま）ざらしなり。これをカクラサマという。村の子供これを玩物（もてあそびもの）にし、引き出して川へ投げ入れまた路上を引きずりなどする故に、今は鼻も口も見えぬようになれり。ある（ある）いは子供を叱（しか）り戒めてこれを制止する者あれば、かえりて祟（たたり）を受け病むことありといえり。", "○神体仏像子供と遊ぶを好みこれを制止するを怒りたもうことほかにも例多し。遠江小笠郡大池村東光寺の薬師仏（『掛川志』）、俊河安倍郡豊田村曲金の軍陣坊社の神（『新風土記』）、または信濃筑摩郡射手の弥陀堂（みだどう）の木仏（『信濃奇勝録』）などこれなり。", "七三　　　　　　　　　　　カクラサマの木像は遠野郷のうちに数多（あまた）あり。栃内の字　西内（にしない）にもあり。山口分の大洞（おおほら）というところにもありしことを記憶する者あり。カクラサマは人のこれを信仰する者なし。粗末なる彫刻にて、衣装頭（いしょうかしら）の飾（かざり）のありさまも不分明なり。", "七四　　　　　　　　　　　栃内のカクラサマは右の大小二つなり。土淵一村にては三つか四つあり。いずれのカクラサマも木の半身像にてなたの荒削（あらけず）りのなかっこう（ぶかっこう）なるものなり。されど人の顔なりということだけは分（わ）かるなり。カクラサマとは以前は神々の旅をして休息したもうべき場所の名なりしが、その地に常（つね）います神をかく唱（とな）うることとなれり。", "七五　　　　　　　　　　　離森（はなれもり）の長者屋敷にはこの数年前まで燐寸（マッチ）の軸木（じくぎ）の工場（こうば）ありたり。その小屋の戸口に夜（よる）になれば女の伺い寄りて人を見てげたげたと笑う者ありて、淋しさに堪えざる故、ついに工場を大字山口に移したり。その後また同じ山中に枕木（まくらぎ）伐出（きりだ）しのために小屋をかけたる者ありしが、夕方になると人夫の者いずれへか迷い行き、帰りてのち茫然（ぼうぜん）としてあることしばしばなり。かかる人夫四五人もありてその後も絶えず何方（いずかた）へか出でて行くことありき。この者どもが後に言うを聞けば、女がきて何処（どこ）へか連れだすなり。帰りてのちは二日も三日も物を覚えずといえり。", "七六　　　　　　　　　　　長者屋敷は昔時長者の住みたりし址（あと）なりとて、そのあたりにも糠森（ぬかもり）という山あり。長者の家の糠を捨てたるがなれるなりという。この山中には五（いつ）つ葉（ば）のうつ木（ぎ）ありて、その下に黄金を埋めてありとて、今もそのうつぎの有処（ありか）を求めあるく者　希々（まれまれ）にあり。この長者は昔の金山師なりしならんか、このあたりには鉄を吹きたる滓（かす）あり。恩徳（おんどく）の金山（きんざん）もこれより山続きにて遠からず。", "○諸国のヌカ　塚スクモ　塚には多くはこれと同じき長者伝説を伴なえり。また黄金埋蔵の伝説も諸国に限りなく多くあり。", "七七　　　　　　　　　　　山口の田尻（たじり）長三郎というは土淵村一番の物持（ものもち）なり。当主なる老人の話に、この人四十あまりのころ、おひで老人の息子（むすこ）亡（な）くなりて葬式の夜、人々念仏を終りおのおの帰り行きし跡（あと）に、自分のみは話好（はなしず）きなれば少しあとになりて立ち出でしに、軒の雨落（あまお）ちの石を枕にして仰臥（ぎょうが）したる男あり。よく見れば見も知らぬ人にて死してあるようなり。月のある夜なればその光にて見るに、膝（ひざ）を立て口を開きてあり。この人大胆者にて足にて揺（うご）かして見たれど少しも身じろぎせず。道を妨（さまた）げて外（ほか）にせん方（かた）もなければ、ついにこれを跨（また）ぎて家に帰りたり。次の朝行きて見ればもちろんその跡方（あとかた）もなく、また誰も外（ほか）にこれを見たりという人はなかりしかど、その枕にしてありし石の形と在（あ）りどころとは昨夜の見覚（みおぼ）えの通りなり。この人の曰く、手をかけて見たらばよかりしに、半（なか）ば恐ろしければただ足にて触（ふ）れたるのみなりし故、さらに何もののわざとも思いつかずと。", "七八　　　　　　　　　　　同じ人の話に、家に奉公せし山口の長蔵なる者、今も七十余の老翁にて生存す。かつて夜遊びに出でて遅くかえり来たりしに、主人の家の門は大槌（おおづち）往還に向いて立てるが、この門の前にて浜の方よりくる人に逢えり。雪合羽（ゆきがっぱ）を着たり。近づきて立ちとまる故、長蔵も怪しみてこれを見たるに、往還を隔てて向側なる畑地の方へすっと反（そ）れて行きたり。かしこには垣根（かきね）ありしはずなるにと思いて、よく見れば垣根は正（まさ）しくあり。急に怖ろしくなりて家の内に飛び込み、主人にこの事を語りしが、のちになりて聞けば、これと同じ時刻に新張村（にいばりむら）の何某という者、浜よりの帰り途（みち）に馬より落ちて死したりとのことなり。", "七九　　　　　　　　　　　この長蔵の父をもまた長蔵という。代々田尻家の奉公人にて、その妻とともに仕えてありき。若きころ夜遊びに出で、まだ宵（よい）のうちに帰り来たり、門（かど）の口（くち）より入りしに、洞前（ほらまえ）に立てる人影あり。懐手（ふところで）をして筒袖（つつそで）の袖口を垂れ、顔は茫（ぼう）としてよく見えず。妻は名をおつねといえり。おつねのところへ来たるヨバヒトではないかと思い、つかつかと近よりしに、奥の方へは遁（に）げずして、かえって右手の玄関の方へ寄る故、人を馬鹿にするなと腹立たしくなりて、なお進みたるに、懐手のまま後（あと）ずさりして玄関の戸の三寸ばかり明きたるところより、すっと内に入（はい）りたり。されど長蔵はなお不思議とも思わず、その戸の隙（すき）に手を差し入れて中を探らんとせしに、中の障子（しょうじ）は正（まさ）しく閉（とざ）してあり。ここに始めて恐ろしくなり、少し引き下らんとして上を見れば、今の男玄関の雲壁（くもかべ）にひたとっきて我を見下すごとく、その首は低く垂（た）れてわが頭に触るるばかりにて、その眼の球は尺余も、抜け出でてあるように思われたりという。この時はただ恐ろしかりしのみにて何事の前兆にてもあらざりき。", "○ヨバヒト　は呼ばい人なるべし。女に思いを運ぶ人をかくいう。", "○雲壁はなげしの外側の壁なり。", "八〇　　　　　　　　　　　右の話をよく呑（の）みこむためには、田尻氏の家のさまを図にする必要あり。遠野一郷の家の建てかたはいずれもこれと大同小異なり。", "門はこの家のは北向（きたむ）きなれど、通例は東向きなり。右の図にて厩舎（うまや）のあるあたりにあるなり。門のことを城前（じょうまえ）という。屋敷（やしき）のめぐりは畑にて、囲墻（いしょう）を設けず。主人の寝室とウチとの間に小さく暗き室あり。これを座頭部屋（ざとうべや）という。昔は家に宴会あれば必ず座頭を喚（よ）びたり。これを待たせ置く部屋なり。", "○この地方を旅行して最も心とまるは家の形の何（いず）れもかぎの手なることなり。この家などそのよき例なり。", "八一　　　　　　　　　　　栃内の字　野崎（のざき）に前川万吉という人あり。二三年前に三十余にて亡くなりたり。この人も死ぬる二三年前に夜遊びに出でて帰りしに、門（かど）の口（くち）より回（まわ）り縁（えん）に沿いてその角（かど）まで来たるとき、六月の月夜のことなり、何心（なにごころ）なく雲壁（くもかべ）を見れば、ひたとこれにつきて寝たる男あり。色の蒼（あお）ざめたる顔なりき。大いに驚きて病みたりしがこれも何の前兆にてもあらざりき。田尻氏の息子丸吉この人と懇親にてこれを聞きたり。", "八二　　　　　　　　　　　これは田尻丸吉という人が自ら遭（あ）いたることなり。少年の頃ある夜　常居（じょうい）より立ちて便所に行かんとして茶の間に入りしに、座敷（ざしき）との境に人立てり。幽（かす）かに茫としてはあれど、衣類の縞（しま）も眼鼻もよく見え、髪をば垂（た）れたり。恐ろしけれどそこへ手を延ばして探りしに、板戸にがたと突き当り、戸のさんにも触（さわ）りたり。されどわが手は見えずして、その上に影のように重（かさ）なりて人の形あり。その顔のところへ手を遣（や）ればまた手の上に顔見ゆ。常居（じょうい）に帰りて人々に話し、行灯（あんどん）を持ち行きて見たれば、すでに何ものもあらざりき。この人は近代的の人にて怜利（れいり）なる人なり。また虚言をなす人にもあらず。", "八三　　　　　　　　　　　山口の大同、大洞万之丞（おおほらまんのじょう）の家の建てざまは少しく外（ほか）の家とはかわれり。その図次のページに出す。玄関は巽（たつみ）の方に向かえり。きわめて古き家なり。この家には出して見れば祟（たたり）ありとて開かざる古文書の葛篭（つづら）一つあり。", "八四　　　　　　　　　　　佐々木氏の祖父は七十ばかりにて三四年前に亡くなりし人なり。この人の青年のころといえば、嘉永（かえい）の頃なるべきか。海岸の地には西洋人あまた来住してありき。釜石（かまいし）にも山田にも西洋館あり。船越（ふなこし）の半島の突端にも西洋人の住みしことあり。耶蘇（ヤソ）教は密々に行われ、遠野郷にてもこれを奉じて磔（はりつけ）になりたる者あり。浜に行きたる人の話に、異人はよく抱き合いては嘗（な）め合う者なりなどいうことを、今でも話にする老人あり。海岸地方には合（あい）の子（こ）なかなか多かりしということなり。", "八五　　　　　　　　　　　土淵村の柏崎（かしわざき）にては両親とも正（まさ）しく日本人にして白子（しらこ）二人ある家あり。髪も肌も眼も西洋人の通りなり。今は二十六七ぐらいなるべし。家にて農業を営（いとな）む。語音も土地の人とは同じからず、声細くして鋭（するど）し。", "八六　　　　　　　　　　　土淵村の中央にて役場小学校などのあるところを字　本宿（もとじゅく）という。この所に豆腐屋（とうふや）を業とする政という者、今三十六七なるべし。この人の父大病にて死なんとするころ、この村と小烏瀬（こがらせ）川を隔てたる字　下栃内（しもとちない）に普請（ふしん）ありて、地固めの堂突（どうずき）をなすところへ、夕方に政の父ひとり来たりて人々に挨拶（あいさつ）し、おれも堂突をなすべしとて暫時仲間に入りて仕事をなし、やや暗くなりて皆とともに帰りたり。あとにて人々あの人は大病のはずなるにと少し不思議に思いしが、後に聞けばその日亡くなりたりとのことなり。人々悔みに行き今日のことを語りしが、その時刻はあたかも病人が息を引き取らんとするころなりき。", "八七　　　　　　　　　　　人の名は忘れたれど、遠野の町の豪家にて、主人　大煩（おおわずら）いして命の境に臨みしころ、ある日ふと菩提寺（ぼだいじ）に訪い来たれり。和なお（おしょう）丁重（ていちょう）にあしらい茶などすすめたり。世間話（せけんばなし）をしてやがて帰らんとする様子に少々不審あれば、跡より小僧を見せに遣（や）りしに、門を出でて家の方に向い、町の角（かど）を回りて見えずなれり。その道にてこの人に逢いたる人まだほかにもあり。誰にもよく挨拶して常（つね）の体（てい）なりしが、この晩に死去してもちろんその時は外出などすべき様態（ようだい）にてはあらざりしなり。後に寺にては茶は飲みたりや否やと茶椀を置きしところを改めしに、畳（たたみ）の敷合（しきあ）わせへ皆こぼしてありたり。", "八八　　　　　　　　　　　これも似たる話なり。土淵村大字土淵の常堅寺（じょうけんじ）は曹洞宗（そうとうしゅう）にて、遠野郷十二ヶ寺の触頭（ふれがしら）なり。ある日の夕方に村人何某という者、本宿（もとじゅく）より来る路にて何某という老人にあえり。この老人はかねて大病をしている者なれば、いつのまによくなりしやと問うに、二三日気分も宜（よろ）しければ、今日は寺へ話を聞きに行くなりとて、寺の門前にてまた言葉を掛け合いて別れたり。常堅寺にても和なおはこの老人が訪ね来たりし故（ゆえ）出迎え、茶を進めしばらく話をして帰る。これも小僧に見させたるに門の外（そと）にて見えずなりしかば、驚きて和なおに語り、よく見ればまた茶は畳の間にこぼしてあり、老人はその日　失（う）せたり。", "八九　　　　　　　　　　　山口より柏崎へ行くには愛宕山（あたごやま）の裾（すそ）を回（まわ）るなり。田圃（たんぼ）に続ける松林にて、柏崎の人家見ゆる辺より雑木（ぞうき）の林となる。愛宕山の頂（いただき）には小さき祠（ほこら）ありて、参詣（さんけい）の路は林の中にあり。登口（のぼりくち）に鳥居（とりい）立ち、二三十本の杉の古木あり。その旁（かたわら）にはまた一つのがらんとしたる堂あり。堂の前には山神の字を刻みたる石塔を立つ。昔より山の神出ずと言い伝うるところなり。和野（わの）の何某という若者、柏崎に用事ありて夕方堂のあたりを通りしに、愛宕山の上より降（くだ）り来るだけ（たけ）高き人あり。誰ならんと思い林の樹木越しにその人の顔のところを目がけて歩み寄りしに、道の角（かど）にてはたと行き逢いぬ。先方は思い掛けざりしにや大いに驚きてこの方を見たる顔は非常に赤く、眼は耀（かがや）きてかついかにも驚きたる顔なり。山の神なりと知りて後（あと）をも見ずに柏崎の村に走りつきたり。", "○遠野郷には山神塔多く立てり、そのところはかつて山神に逢いまたは山神の祟を受けたる場所にて神をなだむるために建てたる石なり。", "九十　　　　　　　　　　　松崎村に天狗森（てんぐもり）という山あり。その麓なる桑畑（くわばたけ）にて村の若者何某という者、働きていたりしに、頻（しきり）に睡（ねむ）くなりたれば、しばらく畑の畔（くろ）に腰掛けて居眠（いねむ）りせんとせしに、きわめて大なる男の顔は真赤（まっか）なるが出で来たれり。若者は気軽にて平生（へいぜ）相撲（すもう）などの好きなる男なれば、この見馴（みな）れぬ大男が立ちはだかりて上より見下すようなるを面悪（つらにく）く思い、思わず立ち上りてお前はどこから来たかと問うに、何の答えもせざれば、一つ突き飛ばしてやらんと思い、力自慢（ちからじまん）のまま飛びかかり手を掛けたりと思うや否や、かえりて自分の方が飛ばされて気を失いたり。夕方に正気づきてみれば無論その大男はおらず。家に帰りてのち人にこの事を話したり。その秋のことなり。早池峯の腰へ村人大勢とともに馬を曳（ひ）きて萩（はぎ）を苅りに行き、さて帰らんとするころになりてこの男のみ姿見えず。一同驚きて尋ねたれば、深き谷の奥にて手も足も一つ一つ抜き取られて死していたりという。今より二三十年前のことにて、この時の事をよく知れる老人今も存在せり。天狗森には天狗多くいるということは昔より人の知るところなり。", "九一　　　　　　　　　　　遠野の町に山々の事に明るき人あり。もとは南部　男爵（だんしゃく）家の鷹匠（たかじょう）なり。町の人　綽名（あだな）して鳥御前（とりごぜん）という。早池峯、六角牛の木や石や、すべてその形状と在処（ありどころ）とを知れり。年取りてのち茸採（きのこと）りにとて一人の連（つれ）とともに出でたり。この連の男というは水練の名人にて、藁（わら）と槌（つち）とを持ちて水の中に入り、草鞋（わらじ）を作りて出てくるという評判の人なり。さて遠野の町と猿ヶ石川を隔つる向山（むけえやま）という山より、綾織（あやおり）村の続石（つづきいし）とて珍しき岩のある所の少し上の山に入り、両人別れ別れになり、鳥御前一人はまた少し山を登りしに、あたかも秋の空の日影、西の山の端（は）より四五　間（けん）ばかりなる時刻なり。ふと大なる岩の陰（かげ）に赤（あか）き顔の男と女とが立ちて何か話をしているに出逢（であ）いたり。彼らは鳥御前の近づくを見て、手を拡（ひろ）げて押し戻すようなる手つきをなし制止したれども、それにも構（かま）わず行きたるに女は男の胸に縋（すが）るようにしたり。事のさまより真の人間にてはあるまじと思いながら、鳥御前はひょうきんな人なれば戯（たわむ）れて遣（や）らんとて腰なる切刃（きりは）を抜き、打ちかかるようにしたれば、その色赤き男は足を挙（あ）げて蹴（け）りたるかと思いしが、たちまちに前後を知らず。連なる男はこれを探（さが）しまわりて谷底に気絶してあるを見つけ、介抱して家に帰りたれば、鳥御前は今日の一部始終を話し、かかる事は今までに更になきことなり。おのれはこのために死ぬかも知れず、ほかの者には誰にもいうなと語り、三日ほどの間病みて身まかりたり。家の者あまりにその死にようの不思議なればとて、山臥（やまぶし）のケンコウ院というに相談せしに、その答えには、山の神たちの遊べるところを邪魔したる故、その祟（たたり）をうけて死したるなりといえり。この人は伊能先生なども知合（しりあい）なりき。今より十余年前の事なり。", "九二　　　　　　　　　　　昨年のことなり。土淵村の里の子十四五人にて早池峯に遊びに行き、はからず夕方近くなりたれば、急ぎて山を下り麓（ふもと）近くなるころ、だけ（たけ）の高き男の下より急ぎ足に昇りくるに逢えり。色は黒く眼（まなこ）はきらきらとして、肩には麻かと思わるる古き浅葱色（あさぎいろ）の風呂敷（ふろしき）にて小さき包を負いたり。恐ろしかりしかども子供の中の一人、どこへ行くかとこの方より声を掛けたるに、小国（おぐに）さ行くと答う。この路は小国へ越ゆべき方角にはあらざれば、立ちとまり不審するほどに、行き過ぐると思うまもなく、はや見えずなりたり。山男よと口々に言いてみなみな遁げ帰りたりといえり。", "九三　　　　　　　　　　　これは和野の人菊池菊蔵という者、妻は笛吹峠のあなたなる橋野より来たる者なり。この妻親里へ行きたる間に、糸蔵という五六歳の男の児（こ）病気になりたれば、昼過（ひるす）ぎより笛吹峠を越えて妻を連れに親里へ行きたり。名に負う六角牛の峯続きなれば山路は樹深く、ことに遠野分より栗橋分へ下らんとするあたりは、路はウドになりて両方は岨（そば）なり。日影はこの岨に隠れてあたりやや薄暗くなりたるころ、後の方より菊蔵と呼ぶ者あるに振り返りて見れば、崖（がけ）の上より下を覗（のぞ）くものあり。顔は赤く眼の光りかがやけること前の話のごとし。お前の子はもう死んでいるぞという。この言葉を聞きて恐ろしさよりも先にはっと思いたりしが、はやその姿は見えず。急ぎ夜の中に妻を伴（とも）ないて帰りたれば、果して子は死してありき。四五年前のことなり。", "○ウド　とは両側高く切込みたる路のことなり。東海道の諸国にてウタウ　　　　　　　　坂・謡坂などいうはすべてかくのごとき小さき切通しのことならん。", "九四　　　　　　　　　　　この菊蔵、柏崎なる姉の家に用ありて行き、振舞（ふるま）われたる残りの餅（もち）を懐（ふところ）に入れて、愛宕山の麓（ふもと）の林を過ぎしに、象坪（ぞうつぼ）の藤七という大酒呑（おおざけのみ）にて彼と仲善（なかよし）の友に行き逢えり。そこは林の中なれど少しく芝原（しばはら）あるところなり。藤七はにこにことしてその芝原を指（ゆびさ）し、ここで相撲（すもう）を取らぬかという。菊蔵これを諾し、二人草原にてしばらく遊びしが、この藤七いかにも弱く軽く自由に抱（かか）えては投げらるる故（ゆえ）、面白きままに三番まで取りたり。藤七が曰く、今日はとてもかなわず、さあ行くべしとて別れたり。四五　間（けん）も行きてのち心づきたるにかの餅見えず。相撲場に戻りて探したれどなし。始めて狐ならんかと思いたれど、外聞を恥じて人にもいわざりしが、四五日ののち酒屋にて藤七に逢いその話をせしに、おれは相撲など取るものか、その日は浜へ行きてありしものをと言いて、いよいよ狐と相撲を取りしこと露顕したり。されど菊蔵はなお他の人々には包み隠してありしが、昨年の正月の休みに人々酒を飲み狐の話をせしとき、おれもじつはとこの話を白状し、大いに笑われたり。", "○象坪は地名にしてかつ藤七の名字なり。象坪という地名のこと『石神問答（いしがみもんどう）』の中にてこれを研究したり。", "九五　　　　　　　　　　　松崎の菊池某という今年四十三四の男、庭作りの上手（じょうず）にて、山に入り草花を掘りてはわが庭に移し植え、形の面白き岩などは重きを厭（いと）わず家に担（にな）い帰るを常とせり。ある日少し気分重ければ家を出でて山に遊びしに、今までついに見たることなき美しき大岩を見つけたり。平生（へいぜい）の道楽なればこれを持ち帰らんと思い、持ち上げんとせしが非常に重し。あたかも人の立ちたる形してだけ（たけ）もやがて人ほどあり。されどおしさのあまりこれを負い、我慢して十間ばかり歩みしが、気の遠くなるくらい重ければ怪しみをなし、路（みち）の旁（かたわら）にこれを立て少しくもたれかかるようにしたるに、そのまま石とともにすっと空中に昇（のぼ）り行く心地（ここち）したり。雲より上になりたるように思いしがじつに明るく清きところにて、あたりにいろいろの花咲き、しかも何処（いずこ）ともなく大勢の人声聞えたり。されど石はなおますます昇（のぼ）り行き、ついには昇り切りたるか、何事も覚えぬようになりたり。その後時過ぎて心づきたる時は、やはり以前のごとく不思議の石にもたれたるままにてありき。この石を家の内へ持ち込みてはいかなることあらんも測（はか）りがたしと、恐ろしくなりて遁げ帰りぬ。この石は今も同じところにあり。おりおりはこれを見て再びほしくなることありといえり。", "九六　　　　　　　　　　　遠野の町に芳公馬鹿（よしこうばか）とて三十五六なる男、白痴にて一昨年まで生きてありき。この男の癖は路上にて木の切れ塵（ちり）などを拾い、これを捻（ひね）りてつくづくと見つめまたはこれを嗅（か）ぐことなり。人の家に行きては柱などをこすりてその手を嗅ぎ、何ものにても眼の先きまで取り上げ、にこにことしておりおりこれを嗅ぐなり。この男往来をあるきながら急に立ち留（どま）り、石などを拾い上げてこれをあたりの人家に打ちつけ、けたたましく火事だ火事だと叫ぶことあり。かくすればその晩か次の日か物を投げつけられたる家火を発せざることなし。同じこと幾度となくあれば、のちにはその家々も注意して予防をなすといえども、ついに火事を免（まぬか）れたる家は一軒もなしといえり。", "九七　　　　　　　　　　　飯豊（いいで）の菊池　松之丞（まつのじょう）という人　傷寒（しょうかん）を病み、たびたび息を引きつめし時、自分は田圃に出でて菩提寺（ぼだいじ）なるキセイ院へ急ぎ行かんとす。足に少し力を入れたるに、図らず空中に飛び上り、およそ人の頭ほどのところを次第に前下（まえさが）りに行き、また少し力を入るれば昇ること始めのごとし。何とも言われず快（こころよ）し。寺の門に近づくに人群集せり。なぜ（なにゆえ）ならんと訝（いぶか）りつつ門を入れば、紅（くれない）の芥子（けし）の花咲き満ち、見渡すかぎりも知らず。いよいよ心持よし。この花の間に亡（な）くなりし父立てり。お前もきたのかという。これに何か返事をしながらなお行くに、以前失いたる男の子おりて、トッチャお前もきたかという。お前はここにいたのかと言いつつ近よらんとすれば、今きてはいけないという。この時門の辺にて騒しくわが名を喚（よ）ぶ者ありて、うるさきこと限りなけれど、よんどころなければ心も重くいやいやながら引き返したりと思えば正気づきたり。親族の者寄り集（つど）い水など打ちそそぎて喚（よ）び生（い）かしたるなり。", "九八　　　　　　　　　　　路の傍に山の神、田の神、塞（さえ）の神の名を彫りたる石を立つるは常のことなり。また早池峯山・六角牛山の名を刻したる石は、遠野郷にもあれど、それよりも浜にことに多し。", "九九　　　　　　　　　　　土淵村の助役北川清という人の家は字　火石（ひいし）にあり。代々の山臥（やまぶし）にて祖父は正福院といい、学者にて著作多く、村のために尽したる人なり。清の弟に福二という人は海岸の田の浜へ婿（むこ）に行きたるが、先年の大海嘯（おおつなみ）に遭いて妻と子とを失い、生き残りたる二人の子とともに元（もと）の屋敷の地に小屋を掛けて一年ばかりありき。夏の初めの月夜に便所に起き出でしが、遠く離れたるところにありて行く道も浪（なみ）の打つ渚（なぎさ）なり。霧の布（し）きたる夜なりしが、その霧の中より男女二人の者の近よるを見れば、女は正（まさ）しく亡くなりしわが妻なり。思わずその跡をつけて、遥々（はるばる）と船越（ふなこし）村の方へ行く崎の洞（ほこら）あるところまで追い行き、名を呼びたるに、振り返りてにこと笑いたり。男はとみればこれも同じ里の者にて海嘯の難に死せし者なり。自分が婿に入りし以前に互いに深く心を通わせたりと聞きし男なり。今はこの人と夫婦になりてありというに、子供は可愛（かわい）くはないのかといえば、女は少しく顔の色を変えて泣きたり。死したる人と物いうとは思われずして、悲しく情なくなりたれば足元（あしもと）を見てありし間に、男女は再び足早にそこを立ち退（の）きて、小浦（おうら）へ行く道の山陰（やまかげ）を回（めぐ）り見えずなりたり。追いかけて見たりしがふと死したる者なりしと心づき、夜明けまで道中（みちなか）に立ちて考え、朝になりて帰りたり。その後久しく煩（わずら）いたりといえり。", "一〇〇　　　　　　　　　　　船越の漁夫何某。ある日仲間の者とともに吉利吉里（きりきり）より帰るとて、夜深く四十八坂のあたりを通りしに、小川のあるところにて一人の女に逢う。見ればわが妻なり。されどもかかる夜中にひとりこの辺に来（く）べき道理なければ、必定（ひつじょう）化物（ばけもの）ならんと思い定め、やにわに魚切庖丁（うおきりぼうちょう）を持ちて後の方より差し通したれば、悲しき声を立てて死したり。しばらくの間は正体を現わさざれば流石（さすが）に心に懸り、後（あと）の事を連（つれ）の者に頼み、おのれは馳せて家に帰りしに、妻は事もなく家に待ちてあり。今恐ろしき夢を見たり。あまり帰りの遅ければ夢に途中まで見に出でたるに、山路にて何とも知れぬ者に脅（おびや）かされて、命を取らるると思いて目覚めたりという。さてはと合点（がてん）して再び以前の場所へ引き返してみれば、山にて殺したりし女は連の者が見ておる中についに一匹の狐（きつね）となりたりといえり。夢の野山を行くにこの獣の身を用（やと）うことありと見ゆ。", "一〇一　　　　　　　　　　　旅人　豊間根（とよまね）村を過ぎ、夜　更（ふ）け疲れたれば、知音（ちいん）の者の家に灯火の見ゆるを幸（さいわい）に、入りて休息せんとせしに、よき時に来合（きあわ）せたり、今夕死人あり、留守（るす）の者なくていかにせんかと思いしところなり、しばらくの間頼むといいて主人は人を喚（よ）びに行きたり。迷惑千万（めいわくせんばん）なる話なれど是非もなく、囲炉裡（いろり）の側にて煙草（タバコ）を吸いてありしに、死人は老女にて奥の方に寝させたるが、ふと見れば床（とこ）の上にむくむくと起き直る。胆潰（きもつぶ）れたれど心を鎮（しず）め静かにあたりを見回（みまわ）すに、流し元（もと）の水口の穴より狐のごとき物あり、面（つら）をさし入れて頻（しきり）に死人の方を見つめていたり。さてこそと身を潜（ひそ）め窃（ひそ）かに家の外に出で、背戸（せと）の方に回りて見れば、正しく狐にて首を流し元の穴に入れ後足（あとあし）を爪立（つまた）てていたり。有合（ありゃ）わせたる棒をもてこれを打ち殺したり。", "○下閉伊郡豊間根村大字豊間根。", "一〇二　　　　　　　　　　　正月十五日の晩を小正月（こしょうがつ）という。宵（よい）のほどは子供ら福の神と称して四五人群を作り、袋を持ちて人の家に行き、明（あけ）の方から福の神が舞い込んだと唱（とな）えて餅を貰（もら）う習慣あり。宵を過ぐればこの晩に限り人々決して戸の外に出ずることなし。小正月の夜半過ぎは山の神出でて遊ぶと言（い）い伝えてあればなり。山口の字　丸古立（まるこだち）におまさという今三十五六の女、まだ十二三の年のことなり。いかなるわけにてか唯一人にて福の神に出で、ところどころをあるきて遅くなり、淋（さび）しき路を帰りしに、向うの方よりだけ（たけ）の高き男来てすれちがいたり。顔はすてきに赤く眼はかがやけり。袋を捨てて遁げ帰り大いに煩いたりといえり。", "一〇三　　　　　　　　　　　小正月の夜、または小正月ならずとも冬の満月の夜は、雪女が出でて遊ぶともいう。童子をあまた引き連れてくるといえり。里の子ども冬は近辺の丘に行き、橇遊（そりっこあそ）びをして面白さのあまり夜になることあり。十五日の夜に限り、雪女が出るから早く帰れと戒めらるるは常のことなり。されど雪女を見たりという者は少なし。", "一〇四　　　　　　　　　　　小正月の晩には行事　甚（はなは）だ多し。月見（つきみ）というは六つの胡桃（くるみ）の実（み）を十二に割り一時（いっとき）に炉（ろ）の火にくべて一時にこれを引き上げ、一列にして右より正月二月と数うるに、満月の夜晴なるべき月にはいつまでも赤く、曇るべき月には直（すぐ）に黒くなり、風ある月にはフーフーと音をたてて火が振（ふる）うなり。何遍繰り返しても同じことなり。村中いずれの家にても同じ結果を得るは妙なり。翌日はこの事を語り合い、例えば八月の十五夜風とあらば、その歳（とし）の稲の苅入（かりいれ）を急ぐなり。", "○五穀の占、月の占多少のヴァリエテをもって諸国に行なわる。陰陽道（おんようどう）に出でしものならん。", "一〇五　　　　　　　　　　　また世中見（よなかみ）というは、同じく小正月の晩に、いろいろの米にて餅をこしらえて鏡となし、同種の米を膳（ぜん）の上に平（たい）らに敷き、鏡餅（かがみもち）をその上に伏せ、鍋（なべ）を被（かぶ）せ置きて翌朝これを見るなり。餅につきたる米粒（こめつぶ）の多きものその年は豊作なりとして、早中晩の種類を択び定むるなり。", "一〇六　　　　　　　　　　　海岸の山田にては蜃気楼（しんきろう）年々見ゆ。常に外国の景色なりという。見馴（みな）れぬ都のさまにして、路上の車馬しげく人の往来眼ざましきばかりなり。年ごとに家の形などいささかも違うことなしといえり。", "一〇七　　　　　　　　　　　上郷村に河ぷちのうちという家あり。早瀬川の岸にあり。この家の若き娘、ある日河原に出でて石を拾いてありしに、見馴れぬ男来たり、木の葉とか何とかを娘にくれたり。だけ（たけ）高く面　朱（しゅ）のようなる人なり。娘はこの日より占（うらない）の術を得たり。異人は山の神にて、山の神の子になりたるなりといえり。", "一〇八　　　　　　　　　　　山の神の乗り移りたりとて占をなす人は所々にあり。付馬牛（つくもうし）村にもあり。本業は木挽（こびき）なり。柏崎の孫太郎もこれなり。以前は発狂して喪心したりしに、ある日山に入りて山の神よりその術を得たりしのちは、不思議に人の心中を読むこと驚くばかりなり。その占いの法は世間の者とは全く異なり。何の書物をも見ず、頼みにきたる人と世間話をなし、その中にふと立ちて常居（じょうい）の中（なか）をあちこちとあるき出すと思うほどに、その人の顔は少しも見ずして心に浮びたることをいうなり。当らずということなし。例えばお前のウチの板敷（いたじき）を取り離し、土を掘りて見よ。古き鏡または刀の折れあるべし。それを取り出さねば近き中に死人ありとか家が焼くるとかいうなり。帰りて掘りて見るに必ずあり。かかる例は指を屈するに勝（た）えず。", "一〇九　　　　　　　　　　　盆のころには雨風祭とて藁（わら）にて人よりも大なる人形（にんぎょう）を作り、道の岐（ちまた）に送り行きて立つ。紙にて顔を描（えが）き瓜（うり）にて陰陽の形を作り添えなどす。虫祭の藁人形にはかかることはなくその形も小さし。雨風祭の折は一部落の中にて頭屋（とうや）を択（えら）び定め、里人（さとびと）集まりて酒を飲みてのち、一同　笛太鼓（ふえたいこ）にてこれを道の辻まで送り行くなり。笛の中には桐（きり）の木にて作りたるホラなどあり。これを高く吹く。さてその折の歌は「二百十日の雨風まつるよ、どちの方さ祭る、北の方さ祭る　　　　　　　という。", "○『東国　与地（よち）勝覧』によれば韓国にても　を必ず城の北方に作ること見ゆ。ともに玄武神の信仰より来たれるなるべし。", "一一〇　　　　　　　　　　　ゴンゲサマというは、神楽舞（かぐらまい）の組ごとに一つずつ備われる木彫（きぼり）の像にして、獅子頭（ししがしら）とよく似て少しく異（こと）なれり。はなはだ御利生（ごりしょう）のあるものなり。新張（にいばり）の八幡社の神楽組のゴンゲサマと、土淵村字　五日市（いつかいち）の神楽組のゴンゲサマと、かつて途中にて争いをなせしことあり。新張のゴンゲサマ負けて片耳（かたみみ）を失いたりとて今もなし。毎年村々を舞いてあるく故、これを見知らぬ者なし。ゴンゲサマの霊験（れいげん）はことに火伏（ひぶせ）にあり。右の八幡の神楽組かって付馬牛村に行きて日暮（ひぐ）れ宿を取り兼ねしに、ある貧しき者の家にて快（こころよ）くこれを泊（と）めて、五升　枡（ます）を伏せてその上にゴンゲサマを座（す）え置き、人々は臥（ふ）したりしに、夜中にがつがつと物を噛（か）む音のするに驚きて起きてみれば、軒端（のきばた）に火の燃えつきてありしを、枡の上なるゴンゲサマ飛び上り飛び上りして火を食（く）い消してありしなりと。子どもの頭を病む者など、よくゴンゲサマを頼み、その病を噛みてもらうことあり。", "一一一　　　　　　　　　　　山口、飯豊、付馬牛の字荒川東禅寺および火渡（ひわたり）、青笹の字中沢ならびに土淵村の字土淵に、ともにダンノハナという地名あり。その近傍にこれと相対して必ず蓮台野（れんだいの）という地あり。昔は六十を超えたる老人はすべてこの蓮台野へ追い遣るの習（ならい）ありき。老人はいたずらに死んで了（しま）うこともならぬ故に、日中は里へ下り農作して口を糊（ぬら）したり。そのために今も山口土淵辺にては朝（あした）に野らに出ずるをハカダチといい、夕方野らより帰ることをハカアガリというといえり。", "○ダンノハナ　は壇の塙なるべし。すなわち丘の上にて塚を築きたる場所ならん。境の神を祭るための塚なりと信ず。蓮台野もこの類なるべきこと『石神問答』中にいえり。", "一一二　　　　　　　　　　ダンノハナは昔　館（たて）のありし時代に囚人を斬（き）りし場所なるべしという。地形は山口のも土淵飯豊のもほぼ同様にて、村境の岡の上なり。仙台にもこの地名あり。山口のダンノハナは大洞（おおほら）へ越ゆる丘の上にて館址（たてあと）よりの続きなり。蓮台野はこれと山口の民居を隔てて相対す。蓮台野の四方はすべて沢なり。東はすなわちダンノハナとの間の低地、南の方を星谷という。この所には蝦夷屋敷（えぞやしき）という四角に凹（へこ）みたるところ多くあり。その跡（あと）きわめて明白なり。あまた石器を出す。石器土器の出るところ山口に二箇所あり。他の一は小字（こあざ）をホウリョウという。ここの土器と蓮台野の土器とは様式全然　殊（こと）なり。後者のは技巧いささかもなく、ホウリョウのは模様（もよう）なども巧（たくみ）なり。埴輪（はにわ）もここより出ず。また石斧石刀の類も出ず。蓮台野には蝦夷銭（えぞせん）とて土にて銭の形をしたる径二寸ほどの物多く出ず。これには単純なる渦紋（うずもん）などの模様あり。字ホウリョウには丸玉・管玉（くだたま）も出ず。ここの石器は精巧にて石の質も一致したるに、蓮台野のは原料いろいろなり。ホウリョウの方は何の跡ということもなく、狭き一町歩（いっちょうぶ）ほどの場所なり。星谷は底の方（かた）今は田となれり。蝦夷屋敷はこの両側に連なりてありしなりという。このあたりに掘れば祟（たたり）ありという場所二箇所ほどあり。", "○外（ほか）の村々にても二所の地形および関係これに似たりという。", "○星谷という地名も諸国にあり星を祭りしところなり。", "○ホウリョウ　　　ホウリョウ　　　　　　　権現は遠野をはじめ奥羽一円に祀らるる神なり。蛇の神なりという。名義を知らず。", "一一三　　　　　　　　　　　和野にジョウヅカ森というところあり。象を埋めし場所なりといえり。この所だけには地震なしとて、近辺にては地震の折はジョウヅカ森へ遁げよと昔より言い伝えたり。これは確かに人を埋めたる墓なり。塚のめぐりには堀あり。塚の上には石あり。これを掘れば祟（たたり）ありという。", "○ジョウズカ　は定塚、庄塚または塩塚などとかきて諸国にあまたあり。これも境の神を祀りしところにて地獄のショウツカ　　　　　　　　　の奪衣婆（だつえば）の話などと関係あること『石神問答』に詳（つまびらか）にせり。また象坪などの象頭神とも関係あれば象の伝説は由（よし）なきにあらず、塚を森ということも東国の風なり。", "一一四　　　　　　　　　　　山口のダンノハナは今は共同墓地なり。岡の頂上にうつ木を栽（う）えめぐらしその口は東方に向かいて門口（もんぐち）めきたるところあり。その中ほどに大なる青石あり。かつて一たびその下を掘りたる者ありしが、何ものをも発見せず。のち再びこれを試みし者は大なるビン（かめ）あるを見たり。村の老人たち大いに叱（しか）りければ、またもとのままになし置きたり。館（たて）の主の墓なるべしという。この所に近き館の名はボンシャサの館という。いくつかの山を掘り割りて水を引き、三重四重に堀を取り回（めぐ）らせり。寺屋敷・砥石森（といしもり）などいう地名あり。井の跡とて石垣（いしがき）残れり。山口孫左衛門の祖先ここに住めりという。『遠野古事記（とおのこじき）』に詳（つまびら）かなり。", "一一五　　　　　　　　　　　御伽話（おとぎばなし）のことを昔々（むかしむかし）という。ヤマハハの話最も多くあり。ヤマハハは山姥（やまうば）のことなるべし。その一つ二つを次に記すべし。", "一一六　　　　　　　　　　　昔々あるところにトトとガガとあり。娘を一人持てり。娘を置きて町へ行くとて、誰がきても戸を明けるなと戒しめ、鍵（かぎ）を掛けて出でたり。娘は恐ろしければ一人炉にあたりすくみていたりしに、真昼間（まひるま）に戸を叩きてここを開けと呼ぶ者あり。開かずば蹴破（けやぶ）るぞと嚇（おど）す故（ゆえ）に、是非なく戸を明けたれば入りきたるはヤマハハなり。炉の横座（よこざ）に踏（ふ）みはたかりて火にあたり、飯をたきて食わせよという。その言葉に従い膳（ぜん）を支度してヤマハハに食わせ、その間に家を遁げ出したるに、ヤマハハは飯を食い終りて娘を追い来たり、おいおいにその間（あいだ）近く今にも背（せな）に手の触（ふ）るるばかりになりし時、山の蔭（かげ）にて柴（しば）を苅る翁に逢う。おれはヤマハハにぼっかけられてあるなり、隠（かく）してくれよと頼み、苅り置きたる柴の中に隠れたり。ヤマハハ尋ね来たりて、どこに隠れたかと柴の束（たば）をのけんとして柴を抱（かか）えたるまま山より滑（すべ）り落ちたり。その隙（ひま）にここを遁（のが）れてまた萱（かや）を苅る翁に逢う。おれはヤマハハにぼっかけられてあるなり、隠してくれよと頼み、苅り置きたる萱の中に隠れたり。ヤマハハはまた尋ね来たりて、どこに隠れたかと萱の束をのけんとして、萱を抱えたるまま山より滑り落ちたり。その隙にまたここを遁れ出でて大きなる沼の岸に出でたり。これよりは行くべき方（かた）もなければ、沼の岸の大木の梢に昇（のぼ）りいたり。ヤマハハはどけえ行ったとて遁（の）がすものかとて、沼の水に娘の影の映（うっ）れるを見てすぐに沼の中に飛び入りたり。この間に再びこの所を走り出で、一つの笹小屋（ささごや）のあるを見つけ、中に入りて見れば若き女いたり。これにも同じことを告げて石の唐櫃（からうど）のありし中へ隠してもらいたるところへ、ヤマハハまた飛び来たり娘のありかを問えども隠して知らずと答えたれば、いんね来ぬはずはない、人くさい香がするものという。それは今　雀（すずめ）を炙（あぶ）って食った故（ゆえ）なるべしと言えば、ヤマハハも納得（なっとく）してそんなら少し寝（ね）ん、石のからうどの中にしようか、木のからうどの中がよいか、石はつめたし木のからうどの中にと言いて、木の唐櫃の中に入りて寝たり。家の女はこれに鍵（かぎ）を下（おろ）し、娘を石のからうどより連れ出し、おれもヤマハハに連れて来られたる者なればともどもにこれを殺して里へ帰らんとて、錐（きり）を紅（あか）く焼きて木の唐櫃の中に差し通したるに、ヤマハハはかくとも知らず、ただ二十日鼠（はつかねずみ）がきたと言えり。それより湯を煮立（にた）てて焼錐（やききり）の穴より注（そそ）ぎ込みて、ついにそのヤマハハを殺し二人ともに親々の家に帰りたり。昔々の話の終りはいずれもコレデドンドハレという語をもって結ぶなり。", "一一七　　　　　　　　　　　昔々これもあるところにトトとガガと、娘の嫁に行く支度を買いに町へ出で行くとて戸を鎖（とざ）し、誰がきても明けるなよ、はアと答えたれば出でたり。昼のころヤマハハ来たりて娘を取りて食い、娘の皮を被（かぶ）り娘になりておる。夕方二人の親帰りて、おりこひめこいたかと門の口より呼べば、あ、いたます、早かったなしと答え、二親（ふたおや）は買い来たりしいろいろの支度の物を見せて娘の悦（よろこ）ぶ顔を見たり。次の日　夜（よ）の明けたる時、家の鶏　羽（は）ばたきして、糠屋（ぬかや）の隅（すみ）ッ子（こ）見ろじゃ、けけろと啼（な）く。はて常（つね）に変りたる鶏の啼きようかなと二親（ふたおや）は思いたり。それより花嫁を送り出すとてヤマハハのおりこひめこを馬に載せ、今や引き出さんとするときまた鶏啼く。その声は、おりこひめこを載せなえでヤマハハのせた、けけろと聞（きこ）ゆ。これを繰り返して歌いしかば、二親も始めて心づき、ヤマハハを馬より引き下（おろ）して殺したり。それより糠屋の隅を見に行きしに娘の骨あまた有（あ）りたり。", "○糠屋は物おきなり。", "一一八　　　　　　　　　　　紅皿欠皿（べにざらかけざら）の話も遠野郷に行（おこ）なわる。ただ欠皿の方はその名をヌカボという。ヌカボは空穂（うつぼ）のことなり。継母（ままはは）に悪（にく）まれたれど神の恵（めぐみ）ありて、ついに長者の妻となるという話なり。エピソードにはいろいろの美しき絵様（えよう）あり。折（おり）あらば詳しく書き記すべし。", "一一九　　　　　　　　　　　遠野郷の獅子踊（ししおどり）に古くより用いたる歌の曲あり。村により人によりて少しずつの相異あれど、自分の聞きたるは次のごとし。百年あまり以前の筆写なり。", "○獅子踊はさまでこの地方に古きものにあらず。中代これを輸入せしものなることを人よく知れり。", "橋ほめ", "一　まいり来てこの（この）橋を見申（みもう）せや、いかなもをざは踏（ふ）みそめたやら、わだるがくかいざるもの", "一　この御馬場（このおんばば）を見申せや、杉原七里大門（すぎはらななりおおもん）まで", "門（かど）ほめ", "一　まいり来てこの（この）もんを見申せや、ひの木さわらで門立（かどた）てて、これ（これ）ぞ目出（めで）たい白かねの門", "一　門（もん）の戸びらおすひらき見申せや、あらの御せだい", "○", "一　まいり来てこの御本堂を見申せや、いかな大工（だいく）は建てたやら", "一　建てた御人（おひと）は御手とから、むかしひたのたくみの立てた寺　也（なり）", "小島ぶし", "一　小島ではひの木さわらで門立（かどた）てて、これぞ目出たい白金（しろかね）の門", "一　白金の門戸びらおすひらき見申せや、あらの御（お）せだい", "一　八つ棟（むね）ぢくりにひわだぶきの、上（かみ）におひたるから松", "一　から松のみぎり左に涌（わ）くいぢみ、汲めども呑（の）めどもつきひざるもの", "一　あさ日さすよう日かがやく大寺（おおてら）也、さくら色のちごは百人", "一　天からおづるちよ硯水（すずりみず）、まって立たれる", "馬屋（まや）ほめ", "一　まいり来てこの御台所（みだいどころ）見申せや、め釜（がま）を釜に釜は十六", "一　十六の釜で御代（ごよ）たく時は、四十八の馬で朝草　苅（か）る", "一　その（その）馬で朝草にききやう小萱（こがや）を苅りまぜて、花でかがやく馬屋なり", "一　かがやく中のかげ駒（こま）は、せたいあがれを足（あ）がきする", "○", "一　この庭に歌のぞうじはありと聞く、あしびながらも心はづかし", "一　われ／＼はきによならひしきょうあすぶ、そつ事ごめんなり", "一　しやうぢ申せや限（かぎり）なし、一礼申して立てや友だつ", "枡形ほめ", "一　まいり来てこの枡（ます）を見申せや、四方四角枡形の庭也", "一　まいり来てこの　宿（やど）を見申せや、人のなさげの宿と申（もうす）", "町ほめ", "一　参（まい）り来てこのお町を見申せや、竪町（たてまち）十五里横七里、△△出羽にまよおな友たつ", "○出羽の字もじつは不明なり。", "けんだんほめ", "一　まいり来てこのけんだん様（さま）を見申せや、御町間中（おんまちまなか）にはたを立前（たてまえ）", "一　まいは立町油町（たてまちあぶらまち）", "一　けんだん殿は二かい座敷に昼寝すて、銭（ぜに）を枕に金の手遊（てあそび）", "一　参り来てこの御　札（ふだ）見申せば、おすがいろぢきあるまじき札", "一　高き処（ところ）は城（しろ）と申し、ひくき処は城下（しょうか）と申す也", "橋ほめ", "一　まいり来てこの橋を見申せば、こ金（がね）の辻（つじ）に白金のはし", "上ほめ", "一　まいり来てこの御堂（おどう）見申せや、四方四面くさび一本", "一　扇（おうぎ）とりすず取り、上（かみ）さ参らばりそうある物", "○すずは数珠（じゅず）、りそうは利生か。", "家ほめ", "一　こりばすらに小金（こがね）のたる木に、水のせ懸（がく）るぐしになみたち", "○こりばすら文字不分明。", "浪合（なみあい）", "一　この庭に歌の上（じょう）ずはありと聞く、歌えながらも心はづかし", "一　おんげんべりこおらいべり、山と花ござこれ（こ）の御庭へさららすかれ", "○雲繝縁、高麗縁なり。", "一　まぎえの台に玉のさかすきよりすえて、これの御庭へ直し置く", "一　十七はちょうすひやけ御手（おて）にもぢをすやく回（まわし）や御庭かかやく", "一　この御酒（ごしゅ）一つ引受（ひきゅうけ）たもるなら、命長くじめうさかよる", "一　さかなには鯛（たい）もすずきもござれ共（ども）、おどにきこいしからのかるうめ", "一　正（しよう）ぢ申や限なし、一礼申て立や友たつ、京（みやこ）", "柱懸り", "一　仲だぢ入れよや仲入れろ、仲たづなけれや庭はすんげない", "一　すかの子は生れておりれや山めぐる、我等も回（まわ）る庭めぐる", "○すかの子は鹿の子なり。遠野の獅子踊の面は鹿のようなり。", "一　これの御庭におい柱の立っときは、ちのみがき若くなるもの", "○ちのみがきは鹿の角磨（つのみが）きなるべし。", "一　松島の松をそだてて見どすれば、松にからするちたのえせもの", "○ちたは蔦（つた）。", "一　松島の松にからまるちたの葉も、えんが無（なけ）れやぶろりふぐれる", "一　京で九貫のから絵のびよぼ、三よへにさらりたてまわす", "○びよぼは屏風（びょうぶ）なり。三よへは三四重か、この歌最もおもしろし。", "めず　　　ぐり", "一　仲たぢ入れろや仲入れろ、仲立なけれや庭すんげなえ", "○めずぐりは鹿の妻択（つまえら）びなるべし。", "一　鹿の子は生れおりれや山回る、我らもめぐる庭を回るな", "一　女鹿（めじか）たずねていかんとして白山（はくさん）の御山かすみかかる", "○して、字は〆（しめ）てとあり。不明", "一　うるすやな風はかすみを吹き払て、今こそ女鹿あけてたちねる", "○うるすやなは嬉（うれ）しやななり。", "一　何と女鹿はかくれてもひと村すすきあけてたつねる", "一　笹（ささ）のこのはの女鹿子（めじし）は、何とかくてもおひき出さる", "一　女鹿大鹿ふりを見ろ、鹿の心みやこなるもの", "一　奥のみ山の大鹿はことすはじめておどりでき候（そろそろ）", "一　女鹿とらてあうがれて心ぢくすくをろ鹿かな", "一　松島の松をそだてて見とすれば松にからまるちたのえせもの", "一　松島の松にからまるちたの葉も、えんがなけれやぞろりふぐれる", "一　沖のと中（ちゅう）の浜す鳥、ゆらりこがれるそろりたつ物", "なげくさ", "一　なげくさを如何（いかな）御人（おひと）は御出（おいで）あった、出た御人は心ありがたい", "一　この代（よ）を如何（いか）な大工は御　指（さ）しあた、四つ角（かど）て宝遊ばし", "一　この御酒を如何な御酒だと思（おぼ）し召（め）す、おどに聞いしが　　　菊の酒", "一　この銭（このぜに）を如何な銭たと思し召す、伊勢お八まち銭　熊野参（くまのまいり）の遣（つか）ひあまりか", "一　この紙を如何な紙と思し召す、はりまだんぜかかしま紙か、おりめにそたひ遊はし", "○播磨檀紙（はりまだんし）にや。", "一　あおぎのお所いぢくなり、あおぎの御所三内の宮、内てすめるはかなめなり　　　、おりめにそたかさなる", "○いぢくなりはいずこなるなり。三内の字不明。仮（かり）にかくよめり。"]}, {"no": 34, "title": "土佐日記", "author": "紀貫之", "category": "日本文学-古典", "chars": 11858, "volume": "中", "paras": ["男もすなる日記というものを、女もしてみむとてするなり。それの年（承平四年）のしはすの二十日あまり一日の、戌の時に門出す。そのよしいささかものにかきつく。ある人県の四年五年はてて例のことども皆しおえて、解由など取りて住むたちより出でて船に乗るべき所へわたる。かれこれ知る知らぬおくりす。年ごろよく具しつる人々（共イ）なむわかれ難く思いてその日頻にとかくしつつののしるうちに夜更けぬ。", "廿二日（にイ有）、和泉の国までとたひらかにねがいたつ。藤原の言実船路なれど馬の餞す。上中下ながら酔い過ぎていと怪しくしほ海のほとりにてあざれあへり。", "廿三日、八木の康教という人あり。この人国に必ずしもいいつかう者にもあらざる（二字ずイ）なり。これぞ正しきようにて馬の餞したる。かみがらにやあらむ、国人の心の常として今はとて見えざなるを心あるものは恥じずき（ぞイ）なむきける。これは物によりて誉むるにしもあらず。", "廿四日、講師馬の餞しに出でませり。ありとある上下童まで酔いしれて、一文字をだに知らぬものしが、足は十文字に踏みてぞ遊ぶ。", "廿五日、守のたちより呼びに文もて来れり。呼ばれて至りて日ひとひ夜ひとよとかく遊ぶようにて明けにけり。", "廿六日、なお守のたちにてあるじしののしりてをのこらまでに物かずけたり。からうた声あげていいけり。やまとうた、あるじもまらうどもこと人もいいあへりけり。からうたはこれにはえ書かず。やまとうたあるじの守のよめりける、", "「都いでて君に逢はむとこしものをこしかひもなく別れぬるかな」", "となむありければ、かえる前の守のよめりける、", "「しろたへの浪路を遠くゆきかひて我に似べきはたれならなくに」。", "ことひとびとのもありけれどさかしきもなかるべし。とかくいひて前の守も今のも諸共におりて、今のあるじも前のも手取りかわしてえひごとに心よげなることして出でにけり。", "廿七日、大津より浦戸をさして漕ぎ出ず。かくあるうちに京にて生れたりし女子（子イ無）ここにて俄にうせにしかば、この頃の出立いそぎを見れど何事もえいわず。京へ帰るに女子のなきのみぞ悲しび恋うる。ある人々もえ堪えず。この間にある人のかきて出せる歌、", "「都へとおもうももののかなしきはかえらぬ人のあればなりけり」。", "また、ある時には、", "「あるものと忘れつつなほなき人をいづらと問うぞ悲しかりける」", "といいける間に鹿児の崎という所に守のはらからまたことひとこれかれ酒なにど持て追いきて、磯におりいて別れ難きことをいう。守のたちの人々の中にこの来る人々ぞ心あるようにはいわれほのめく。かく別れ難くいひて、かの人々の口網ももろもちにてこの海辺にて荷ひいだせる歌、", "「をしと思う人やとまるとあし鴨のうち群れてこそ我はきにけれ」", "といいてありければ、いといたく愛でて行く人のよめりける、", "「棹させど底ひも知らぬわたつみのふかきこころを君に見るかな」", "という間に楫取ものの哀も知らでおのれし酒をくらひつれば、早くいなむとて「潮満ちぬ。風も吹きぬべし」とさわげば船に乗りなむとす。この折にある人々折節につけて、からうたども時に似つかわしき（をイ有）いふ。またある人西国なれど甲斐歌などいう。かくうたうに、ふなやかたの塵も散り、空ゆく雲もただよひぬとぞいふなる。今宵浦戸にとまる。藤原のとき実、橘の季衡、こと人々追いきたり。", "廿八日、浦戸より漕ぎ出でて大湊をおふ。この間にはやくの国の守の子山口の千岑、酒よき物どももてきて船に入れたり。ゆくゆく飲みくふ。", "廿九日、大湊にとまれり。くす師ふりはへて屠蘇白散酒加えてもて来たり。志あるに似たり。", "元日、なお同じとまりなり。白散をあるもの夜のまとてふなやかたにさしはさめりければ、風に吹きならさせて海に入れてえ飲まずなりぬ。芋し（もカ）あらめも歯固めもなし。かようの物もなき国なり。求めもおかず。ただおしあゆの口をのみぞ吸う。このすふ人々の口を押年魚もし思うやうあらむや。今日は都のみぞ思いやらるる。「九重の門のしりくめ縄のなよしの頭ひひら木らいかに」とぞいひあへる。", "二日、なお大湊にとまれり。講師、物、酒などおこせたり。", "三日、同じ所なり。もし風浪のしばしと惜む心やあらむ、心もとなし。", "四日、風吹けばえ出でたたず。昌連酒よき物たてまつれり。このこうようの物もて来るひとになおしもえあらでいささげわざせさすものもなし。にぎははしきようなれどまくるここちす。", "五日、風浪やまねばなお同じ所にあり。人々絶えずとぶらひにく。", "六日、きのうのごとし。", "七日になりぬ。同じ湊にあり。今日は白馬を思えどかひなし。ただ　浪の白きのみぞ見ゆる。かかる間に人の家（野イ）の池と名ある所より鯉はなくて鮒よりはじめて川のも、海のも、ことものども、ながびつににないつづけておこせたり。わかなこに入れて雉など花につけたり（十七字イ無）。若菜ぞ今日をば知らせたる。歌あり。そのうた、", "「浅茅生の野辺にしあれば水もなき池につみつるわかななりけり」。", "いとおかしかし。この池というは所の名なり。よき人の男につきて下りて住みけるなり。この長櫃の物は皆人童までにくれたれば、飽き満ちて舟子どもは腹皷をうちて海をさえおどろかして浪たてつべし。かくてこの間に事おほかり。きょうわりごもたせてきたる人、その名などぞや、今思い出でむ。この人歌よまむと思う心ありてなりけり。とかくいひいひて浪の立つなることと憂へいひて詠める歌、", "「ゆくさきにたつ白浪の声よりもおくれて泣かむわれやまさらむ」", "とぞ（ぞイ無）詠める。いと大声なるべし。持てきたる物より歌はいかがあらむ。この歌をこの彼あはれがれども一人も返しせず。しつべき人も交れれどこれをのみいたがり物をのみくひて夜更けぬ。この歌ぬしなむ「またまからず」といいてたちぬ。ある人の子の童なる密にいう「まろこの歌の返しせむ」という。驚きて「いとおかしきことかな。よみてむやは。詠みつべくばはやいへかし」という（にイ有）。「まからずとて立ちぬる人を待ちてよまむ」とて求めけるを、夜更けぬとにやありけむ、やがていにけり。「そもそもいかが詠んだる」といぶかしがりて問う。この童さすがに耻ぢていわず。強いて問えばいえるうた、", "「ゆく人もとまるも袖のなみだ川みぎはのみこそぬれまさりけれ」", "となむ詠める。かくはいうものか、うつくしければにやあらむ、いと思わずなり。童ごとにては何かはせむ、女翁にをしつべし、悪しくもあれいかにもあれ、たよりあらば遣らむとておかれぬめり。", "八日、さはる事ありてなお同じ所なり。今宵の月は海にぞ入る。これを見て業平の君の「山のはにげて入れずもあらなむ」という歌なむおもほゆる。もし海辺にてよまましかば「浪たちさへて入れずもあらなむ」と詠みてましや。今この歌を思い出でてある人のよめりける、", "「てる月のながるる見ればあまの川いづるみなとは海にざ（ぞあイ）りける」", "とや。", "九日、つとめて大湊より那波の泊をおはむとて漕ぎ出でにけり。これかれ互に国の境の内はとて見おくりにくる人数多が中に藤原のときざね、橘の季衡、長谷部の行政等なむみたちより出でたうびし日よりこの所彼所におひくる。この人々ぞ志ある人なりける。この人々の深き志はこの海には劣らざるべし。これより今は漕ぎ離れて往く。これを見送らむとてぞこの人どもは追いきける。かくて漕ぎ行くまにまに海の辺にとまれる人も遠くなりぬ。船の人も見えずなりぬ。岸にもいう事あるべし、船にも思うことあれどかひなし。かかれどこの歌を独言にしてやみぬ。", "「おもいやる心は海を渡れどもふみしなければ 知らずやあるらむ」。", "かくて宇多の松原を行き過ぐ。その松の数幾そばく、幾千年へたりと知らず。もとごとに浪うちよせ枝ごとに鶴ぞ飛びかふ。おもしろしと見るに堪えずして船人のよめる歌、", "「見渡せば松のうれごとにすむ鶴は千代のどちとぞ思うべらなる」", "とや。この歌は所を見るにえまさらず。かくあるを見つつ漕ぎ行くまにまに、山も海もみなくれ、夜更けて、西ひんがしも見えずして、てけのこと 「楫戈」、 取の心にまかせつ。男もならはねば いとも心細し。まして女は船底に頭をつきあててねをのみぞなく。かく思えば舟子 「楫戈」、 取は船歌うたいて何とも思えらず。そのうたううたは、", "「春の野にてぞねをばなく。わが薄にて手をきるきる、つんだる菜を、親やまほるらむ、姑やくふらむ。かへらや。よんべのうないもがな。ぜにこはむ。そらごとをして、おぎのりわざをして、ぜにももてこずおのれだにこず」。", "これならず多かれども（もイ無）書かず。これらを人の笑うを聞きて、海は荒るれども心は少しなぎぬ。かくゆきくらして泊にいたりて、おきな人ひとり、たうめ一人あるがなかに、心ちあしみしてものも物し給はでひそまりぬ。", "十日、きょうはこの那波の泊にとまりぬ。", "十一日、暁に船を出して室津をおふ。人皆まだねたれば海のありゃう も見えず、ただ月を見てぞ西東をば知りける。かかる間に皆夜明けて手あらい例の事どもして昼になりぬ。いましはねという所にきぬ。わかき童この所の名を聞きて「はねという所は鳥の羽のようにやある」という。まだ幼き童のことなれば人々笑う。時にありける女の童なむこの歌をよめる、", "「まことにて名に聞く所はねならば飛ぶがごとくにみやこへもがな」", "とぞいえる。男も女もいかで疾く都へもがなと思う心あれば、この歌よしとにはあらねどげにと思いて人々わすれず。このはねという所問う童のついでにて（ぞイ）、また昔の人を思い出でていずれの時にか忘るる。今日はまして母の悲しがらるる事は、くだりし時の人の数足らねば、ふるき歌に「数はたらでぞかえるべらなる」ということを思い出でて人のよめる、", "「世の中におもいや（あイ）れども子を恋うる思いにまさる思いなきかな」", "といいつつなむ。", "十二日、雨降らず。文時、維茂が船のおくれたりし。ならしつより室津に（つイ有）きぬ。", "十三日の暁にいささか小（にイ）雨ふる。しばしありて止みぬ。男女これかれ、ゆあみなどせむとてあたりのよろしき所におりて行く。海を見やれば、", "「雲もみな浪とぞ見ゆる海士もがないずれか海と問いて知るべく」", "となむ歌よめる。さて十日あまりなれば月おもしろし。船に乗り始めし日より船には紅こくよききぬ着ず。それは海の神に怖じてといいて、何の芦蔭にことずけてほやのつまのいずしすしあはびをぞ心にもあらぬはぎにあげて見せける。", "十四日、暁より雨降れば同じ所に泊れり。船君せちみす。そうじものなければ午の時より後に 「楫戈」、 取の昨日釣りたりし鯛に、銭なければよねをとりかけておちられぬ。かかる事なほありぬ。 「楫戈」、 取また鯛もてきたり。よね酒しばしばくる。 「楫戈」、 取けしきあしからず。", "十五日、今日小豆粥煮ず。口おしくなほ日のあしければいざるほどにぞ今日廿日あまり経ぬる。徒に日をふれば人々海をながめつつぞある。めの童のいえる、", "「立てばたついれば　　またいる吹く風と浪とは思うどちにやあるらむ」。", "いうかひなきもののいえるにはいと似つかわし。", "十六日、風浪やまねばなお同じ所にとまれり。ただ　海に浪なくしていつしかみさきという所渡らむとのみなむおもう。風浪ともにやむべくもあらず。ある人のこの浪立つを見て詠めるうた、", "「霜だにもおかぬかたぞというなれど浪の中にはゆきぞ降りける」。", "さて船に乗りし日よりきょうまでに廿日あまり五日になりにけり。", "十七日、曇れる雲なくなりて暁月夜いとおもしろければ、船を出して漕ぎ行く。このあいだに雲のうえも海の底も同じごとくになむありける。うべも昔のをのこは「棹は穿つ波の上の月を。船は襲う海のうちの空を」とはいいけむ。ききされに聞けるなり。またある人のよめる歌、", "「みなそこの月のうえより漕ぐふねの棹にさはるは桂なるら（べイ）し」。", "これを聞きてある人のまたよめる、", "「かげ見れば浪の底なるひさかたの空こぎわたるわれぞさびしき」。", "かくいふあいだに夜やうやく明けゆくに、 「楫戈」、 取等「黒き雲にわかに出できぬ。風も吹きぬべし。御船返してむ」といいてかえる。このあいだに雨ふりぬ。いとわびし。", "十八日、なお同じ所にあり。海あらければ船いださず。この泊遠く見れども近く見れどもいとおもしろし。かかれども苦しければ何事もおもほえず。男どちは心やりにやあらむ、からうたなどいうべし。船もいださでいたずらなればある人の詠める、", "「いそぶりの寄する磯には年月をいっとも分かぬ雪のみぞふる」", "この歌は常にせぬ人のごとなり。また人のよめる、", "「風による浪のいそにはうぐいすも春もえしらぬ花のみぞ咲く」。", "この歌どもを少しよろしと聞きて、船のをさしける翁、月頃の苦しき心やりに詠める、", "「立つなみを雪か花かと吹く風ぞよせつつ人をはかるべらなる」。", "この歌どもを人の何かというを、ある人のまた聞きゅうけりて詠める。その歌よめるもじ三十文字あまり七文字、人皆えあらで笑うようなり。歌ぬしいと気色あしくてえず。まねべどもえまねばず。書けりともえ読みあえがたかるべし。今日だにいい難し。まして後にはいかならむ。", "十九日、日あしければ船いださず。", "二十日、昨日のようなれば船いださず、皆人々憂へ嘆く。苦しく心もとなければ、ただ日の経ぬる数を、今日いくか、二十日、三十日と数ふれば、およびもそこなわれぬべし。いとわびし。夜はいも寝ず。二十日の夜の月出でにけり。山のはもなくて海の中よりぞ出でくる。こうようなるを見てや、むかし安倍の仲麻呂といいける人は、もろこしに渡りて帰りきける時に、船に乗るべき所にて、かの国人馬の餞し、わかれ惜みて、かしこのからうた作りなどしける。あかずやありけむ、二十日の夜の月出ずるまでぞありける。その月は海よりぞ出でける。これを見てぞ仲麻呂のぬし「我が国にはかかる歌をなむ神代より神もよんたび、今は上中下の人もこうやうに別れ惜み、よろこびもあり、かなしみもある時には詠む」とてよめりける歌、", "「あをうなばらうりさけ見れば春日なる三笠の山にいでし月かも」", "とぞよめりける。かの国の人聞き知るまじくおもほえたれども、ことの心を男文字にさまを書き出して、ここの詞伝えたる人にいい知らせければ、心をや聞き得たりけむ、いと思いの外になむめでける。もろこしとこの国とはこと（ばイ有）ことなるものなれど、月の影は同じことなるべければ人の心も同じことにやあらむ。さて今そのかみを思いやりて、ある人のよめる歌、", "「都にてやまのはに見し月なれどなみより出でてなみにこそ入れ」。", "廿一日、卯の時ばかりに船出す。皆人々の船出ず。これを見れば春の海に秋の木の葉しも散れるようにぞありける。おぼろげの願に依りてにやあらむ、風も吹かずよき日いできて漕ぎ行く。この間につかわれむとて、付きてくる童あり。それがうたう舟うた、", "「なほこそ国のかたは見やらるれ、わが父母ありとしおもえば。かへらや」", "とうたうぞ哀なる。かくうたうを聞きつつ漕ぎくるに、くろとりという鳥岩のうえに集りおり。その岩のもとに浪しろくうち寄す。 「楫戈」、 取のいうやう「黒（きイ有）鳥のもとに白き浪をよす」とぞいふ。この詞何とにはなけれど、ものいうやうにぞ聞えたる。人の程にあわねば咎むるなり。かくいひっつ行くに、船君なる人浪を見て、国よりはじめて海賊報いせむというなる事を思ううえに、海のまたおそろしければ、頭も皆しらけぬ。七十八十は海にあるものなりけり。", "「わが髪のゆきといそべのしら浪といずれまされりおきつ島もり」", "廿二日、よんべのとまりよりことどまりをおひてぞ行く。遥に山見ゆ。年九つばかりなるをの童、年よりは幼くぞある。この童、船を漕ぐ　まにまに、山も行くと見ゆるを見て、あやしきこと歌をぞよめる。そのうた、", "「漕ぎて行く船にて見ればあしびきの山さえゆくを松は知らずや」", "とぞいえる。幼き童のことにては似つかわし。きょう海あらげにて磯に雪ふり浪の花さけり。ある人のよめる。", "「浪とのみひとえに聞けどいろ見れば雪と花とにまがいけるかな」。", "廿三日、日てりて曇りぬ。このわたり、海賊のおそりゃりといえば神仏を祈る。", "廿四日、昨日のおなじ所なり。", "廿五日、 「楫戈」、 取らの北風あしといえば、船いださず。海賊追いくという事絶えずきこゆ。", "廿六日、まことにやあらむ、海賊追うといえば夜はばかりより船をいだして漕ぎくる。道にたむけする所あり。 「楫戈」、 取してぬさたいまつらするに、幣のひんがしへちれば 「楫戈」 取の申し奉ることは、「この幣のちるかたにみふね速にこがしめ給え」と申してたてまつる。これを聞きてある女の童のよめる、", "「わたつみのちぶりの神にたむけするぬさのおい風やまずふかなむ」", "とぞ詠める。このあいだに風のよければ 、 取いたくほこりて、船に帆あ（かイ）げなど喜ぶ。その音を聞きてわらはもおきなもいつしかとし思えばにやあらむ、いたく喜ぶ。このなかに淡路のたうめという人のよめる歌、", "「追風の吹きぬる時はゆくふねの帆手うちてこそうれしかりけれ」", "とぞ。ていけのことにつけていのる。", "廿七日、風吹き浪あらければ船いださず。これかれかしこく（八字誰も誰もおそれイ）嘆く。男たちの心なぐさめに、からうたに「日を望めば都遠し」などいうなる事のさまを聞きて、ある女のよめる歌、", "「日をだにもあま雲ちかく見るものを都へとおもう道のはるけさ」。", "またある人のよめる。", "「吹くかぜの絶えぬ限りし立ちくれば波路はいとどはるけかりけり」。", "日ひと日風やまず。つまはじきしてねぬ。", "廿八日、よもすがら雨やまず。けさも。", "廿九日、船出して行く。うらうらと照りてこぎゆく。爪のいと長くなりにたるを見て日を数ふれば、今日は子の日なりければ切らず。正月なれば京の子の日の事いひ出でて、「小松もがな」といえど海中なれば難しかし。ある女の書きて出せる歌、", "「おぼつかなきょうは子の日かあまならば海松をだに引かましものを」", "とぞいえる。海にて子の日の歌にてはいかがあらむ。またある人のよめるうた、", "「きょうなれど若菜もつまず春日野のわがこぎわたる浦になければ」。", "かくいひっつ漕ぎ行く。おもしろき所に船を寄せて「ここやいずこ」と問いければ、「土佐のとまり」とぞいひける。昔土佐といいける所に住みける女、この船にまじれりけり。そがいいけらく、「昔しばしありし所の名たぐいにぞあなる。あはれ」といいてよめる歌、", "「年ごろをすみし所の名にしおへばきよる浪をもあわれとぞ見る」。", "三十日、雨風ふかず。海賊は夜ありきせざなりと聞きて、夜中ばかりに船を出して阿波のみとを渡る。夜中なれば西ひんがしも見えず、男女辛く神仏を祈りてこのみとを渡りぬ。寅卯の時ばかりに、ぬ島という所を過ぎてたな川という所を渡る。からく急ぎて和泉の灘という所に至りぬ。今日海に浪に似たる物なし。神仏の惠蒙ぶれるに似たり。きょう船に乗りし日より数ふればみそかあまり九日になりにけり。今は和泉の国に来ぬれば海賊ものならず。", "二月朔日、あしたのま雨降る。午の時ばかりにやみぬれば、和泉の灘という所より出でて漕ぎ行く。海のうえ昨日のごとく風浪見えず。黒崎の松原を経て行く。所の名は黒く、松の色は青く、磯の浪は雪のごとくに、貝のいろは蘇枋にて五色に今ひといろぞ足らぬ。この間に今日は箱の浦という所より綱手ひきて行く。かく行くあいだにある人の詠める歌、", "「玉くしげ箱のうらなみたたぬ日は海をかがみとたれか見ざらむ」。", "また船君のいわく「この月までなりぬること」と嘆きて苦しきに堪えずして、人もいうこととて心やりにいえる歌、", "「ひく船の綱手のながき春の日をよそかいかまでわれはへにけり」。", "聞く人の思えるよう、なぞただごとなると密にいうべし。「船君の辛くひねり出してよしと思える事をえしもこそしいへ」とてつつめきてやみぬ。俄に風なみたかければとどまりぬ。", "二日、雨風止まず。日ひとひ夜もすがら神仏をいのる。", "三日、海のうえ昨日のようなれば船いださず。風の吹くことやまねば岸の浪たちかえる。これにつけてよめる歌、", "「緒をよりてかひなきものは落ちつもる涙の玉をぬかぬなりけり」。", "かくて、今日（はイ有）暮れぬ。", "四日、 「楫戈」、 取「きょう風雲のけしきはなはだあし」といいて船出さずなりぬ。然れどもひねもすに浪風たたず。この 「楫戈」、 取は日も得計らぬかたいなりけり。この泊の浜にはくさぐさの麗しき貝石など多かり。かかればただ昔の人をのみ恋いつつ船なる人の詠める、", "「よする浪うちも寄せなむわが恋うる人わすれ貝おりてひろはむ」", "といえれば、ある人堪えずして船の心やりによめる、", "「わすれ貝ひろいしもせじ白玉を恋うるをだにもかたみと思わむ」", "となむいえる。女児のためには親おさなくなりぬべし。玉ならずもありけむをと人いはむや。されども死にし子顔よかりきというようもあり。なおおなじ所に日を経ることを嘆きて、ある女のよめるうた、", "「手をひでて寒さも知らぬ泉にぞ汲むとはなしに日ごろ経にける」。", "五日、きょう辛くして和泉の灘より小津のとまりをおふ。松原めもはるばるなり。かれこれ苦しければ詠めるうた、", "「ゆけどなほ行きやられぬはいもがうむをつの浦なるきしの松原」。", "かくいひつづくる程に「船疾くこげ、日のよきに」と催せば 「楫戈」、 取船子どもにいわく「御船より仰せたぶなり。あさぎたの出で来ぬさきに綱手はやひけ」という。この詞の歌のようなるは 「楫戈」、 取のおのずからの詞なり。 「楫戈」、 取おうつたへにわれ歌のようなる事いふとにもあらず。聞く人の「あやしく歌めきてもいいつるかな」とて書き出せればげに三十文字あまりなりけり。今日浪なたちそと、人々ひねもすに祈るしるしありて風浪たたず。今し鴎むれいてあそぶ所あり。京のちかづくよろこびのあまりにある童のよめる歌、", "「いのりくる風間と思うをあやなくに鴎さえだになみと見ゆらむ」", "といいて行く間に、石津という所の松原おもしろくて浜辺遠し。また住吉のわたりを漕ぎ行く。ある人の詠める歌、", "「今見てぞ身をば知りぬる住のえの松よりさきにわれは経にけり」。", "ここにむかしつ人の母、一日片時も忘れねばよめる、", "「住の江に船さしよせよわすれ草しるしありゃとつみて行くべく」", "となむ。うつたへに忘れなむとにはあらで、恋しき心ちしばしやすめてまたも恋うる力にせむとなるべし。かくいひて眺めつづくるあいだに、ゆくりなく風吹きてこげどもこげどもしりへしぞきにしぞきてほとほとしくうちはめつべし。 「楫戈」、 取のいわく「この住吉の明神は例の神ぞかし。ほしきものぞおはすらむ」とは今めくものか。さて「幣をたてまつり給え」というにしたがいてぬさたいまつる。かくたいまつれどももはら風やまで、いや吹きにいや立ちに風浪の危ふければ 「楫戈」、 取またいわく「幣には御心のいかねば御船も行かぬなり。なおうれしと思いたぶべき物たいまつりたべ」という。またいふに従いて「いかがはせむ」とて「眼もこそ二つあれ。ただ一つある鏡をたいまつる」とて海にうちはめつればいとくちをし。さればうちつけに海は鏡のごとなりぬれば、ある人のよめるうた、", "「ちはやぶる神のこころのあるる海に鏡を入れてかつ見つるかな」。", "いたく住の江の忘草、岸の姫松などいう神にはあらずかし。目もうつらうつら鏡に神の心をこそは見つれ。 「楫戈」、 取の心は神の御心なりけり。", "六日、澪標のもとより出でて難波につ（二字のつをイ）きて河尻に入る。みな人々女おきなひたひに手をあてて喜ぶこと二つなし。かの船酔の淡路の島のおおい子、都近くなりぬというを喜びて、船底より頭をもたげてかくぞいえる、", "「いつしかといぶせかりつる難波がた芦こぎそけて御船きにけり」。", "いとおもいの外なる人のいえれば、人々あやしがる。これが中に心ちなやむ船君いたくめでて「船酔したうべりし御顔には似ずもあるかな」といいける。", "七日、きょうは川尻に船入り立ちて漕ぎのぼるに、川の水ひて悩みわずらう。船ののぼることいと難し。かかる間に船君の病者もとよりこちごちしき人にて、こうようの事更に知らざりけり。かかれども淡路のたうめの歌にめでて、みやこぼこりにもやあらむ、からくしてあやしき歌いねり出せり。そのうたは、", "「きときては川のほりえの水をあさみ船も我が身もなずむきょうかな」。", "これは病をすればよめるなるべし。ひとうたにことの飽かねば今ひとつ、", "「とくと思う船なやますは我がために水のこころのあさきなりけり」。", "この歌は、みやこ近くなりぬるよろこびに堪えずして言えるなるべし。淡路の御の歌におとれり。ねたき、いわざらましものをとくやしがるうちによるになりて寝にけり。", "八日、なお川のほとりになずみて、鳥養の御牧というほとりにとまる。こよひ船君例の病起りていたく悩む。ある人あさらかなる物もてきたり。よねしてかえりごとす。男ども密にいうなり「いいぼしてもてる」とや。こうようの事所々にあり。今日節みすればいをもちいず。", "九日、心もとなさに明けぬから船をひきつつのぼれども川の水なければいざりにのみいざる。この間に和田の泊りのあかれのところという所あり。よねいをなどこへばおこない（三字くりイ）つ。かくて船ひきのぼるに渚の院という所を見つつ行く。その院むかしを思いやりて見れば、おもしろかりける所なり。しりへなる岡には松の木どもあり。中の庭には梅の花さけり。ここに人々のいわく「これむかし名高く聞えたる所なり。故惟喬のみこのおほん供に故在原の業平の中将の「世の中に絶えて桜のさかざらは春のこころはのどけからまし」という歌よめる所なりけり。今興ある人所に似たる歌よめり、", "「千代えたる松にはあれどいにしえの声の寒さはかはらざりけり」。", "またある人のよめる、", "「君恋いて世をふる宿のうめの花むかしの香かにぞなほにおいける」", "といいつつぞ都のちかづくを悦びつつのぼる。かくのぼる人々のなかに京よりくだりし時に、皆人子どもなかりき。いたれりし国にてぞ子生める者どもありゃえる。みな人船のとまる所に子を抱きつつおりのりす。これを見て昔の子の母かなしきに堪えずして、", "「なかりしもありつつ帰る人の子をありしもなくてくるが悲しさ」", "といいてぞ泣きける。父もこれを聞きていかがあらむ。こうようの事ども歌もこのむとてあるにもあらざるべし。もろこしもここも思うことに堪えぬ時のわざとか。こよひ宇土野という所にとまる。", "十日、さはることありてのぼらず。", "十一日、雨いささか降りてやみぬ。かくてさしのぼるに東のかたに山のよこおれるを見て人に問えば「八幡の宮」という。これを聞きてよろこびて人々おがみ奉る。山崎の橋見ゆ。嬉しきこと限りなし。ここに相応寺のほとりに、しばし船をとどめてとかく定むる事あり。この寺の岸のほとりに柳多くあり。ある人この柳のかげの川の底にうつれるを見てよめる歌、", "「さざれ浪よするあやをば青柳のかげのいとして織るかとぞ見る」", "十二日、山崎にとまれり。", "十三日、なお山崎に。", "十四日、雨ふる。きょう車京へとりにやる。", "十五日、今日車いてきたれり。船のむつかしさに船より人の家にうつる。この人の家よろこべるようにてあるじしたり。このあるじのまたあるじのよきを見るに、うたておもほゆ。いろいろにかえりごとす。家の人のいで入りにくげならずいややかなり。", "十六日、きょうのようさりつかた京へのぼるついでに見れば、山崎の小櫃の絵もまがりのおほちの形もかはらざりけり。「売る人の心をぞ知らぬ」とぞいふなる。かくて京へ行くに島坂にて人あるじしたり。必ずしもあるまじきわざなり。立ちてゆきし時よりはくる時ぞ人はとかくありける。これにも（それにもイ有）かえりごとす。よるになして京にはいらむと思えば、急ぎしもせぬ程に月いでぬ。桂川月あかきにぞわたる。人々のいわく「この川飛鳥川にあらねば、淵瀬更にかはらざりけり」といいてある人のよめる歌、", "「ひさかたの月におひたるかつら川そこなる影もかはらざりけり」。", "またある人のいえる、", "「あまぐものはるかなりつる桂川そでをひでてもわたりぬるかな」。", "またある人よめる、", "「桂川わがこころにもかよわねどおなじふかさはながるべらなり」。", "みやこのうれしきあまりに歌もあまりぞおほかる。夜更けてくれば所々も見えず。京に入り立ちてうれし。家にいたりて門に入るに、月あかければいとよくありさま見ゆ。聞きしよりもましていうかひなくぞこぼれ破れたる。家を預けたりつる人の心も荒れたるなりけり。中垣こそあれ、ひとつ家のようなればのぞみて預れるなり。さるはたよりごとに物も絶えず得させたり。こよひかかることと声高にものもいわせず、いとはつらく見ゆれど志をばせむとす。さて池めいてくぼまり水ずける所あり。ほとりに松もありき。五年六年のうちに千年や過ぎにけむ、かた枝はなくなりにけり。いま生ひたるぞまじれる。大かたの皆あれにたれば、「あはれ」とぞ人々いふ。思い出でぬ事なく思い恋しきがうちに、この家にて生れし女子のもろともに帰らねばいかがはかなしき。船人も皆子（いイ有）だかりてののしる。かかるうちになおかなしきに堪えずして密に心知れる人といえりけるうた、", "「うまれしもかえらぬものを我がやどに小松のあるを見るがかなしさ」", "とぞいえる。なおあかずやあらむ、またかくなむ、", "「見し人の松のちとせにみましかばとほくかなしきわかれせましや」。", "わすれがたくくちおしきことおおかれどえつくさず。とまれかくまれ疾くやりてむ。"]}, {"no": 35, "title": "杜子春", "author": "芥川 竜之介", "category": "日本文学-児童-物語", "chars": 9756, "volume": "中", "paras": ["一", "或春の日暮です。", "唐の都洛陽(らくよう)の西の門の下に、ぼんやり空を仰いでいる、一人の若者がありました。", "若者は名は杜子春(とししゆん)といつて、元は金持の息子でしたが、今は財産を費(つか)い尽(つく)して、その日の暮しにも困る位、憐(あはれ)な身分になつているのです。", "何しろその頃洛陽といへば、天下に並ぶもののない、繁昌を極めた都ですから、往来(わうらい)にはまだしつきりなく、人や車が通つていました。門一ぱいに当つている、油のような夕日の光の中に、老人のかぶつた紗(しや)の帽子や、土耳古(トルコ)の女の金の耳環や、白馬に飾つた色糸の手綱(たづな)が、絶えず流れて行く容子(ようす)は、まるで画のような美しさです。", "しかし杜子春は相変らず、門の壁に身を凭(もた)せて、ぼんやり空ばかり眺めていました。空には、もう細い月が、うらうらと靡(なび)いた霞の中に、まるで爪の痕(あと)かと思う程、かすかに白く浮んでいるのです。", "「日は暮れるし、腹は減るし、その上もうどこへ行つても、泊めてくれる所はなさそうだし――こんな思いをして生きている位なら、いっそ川へでも身を投げて、死んでしまった方がましかも知れない。」", "杜子春はひとりさっきから、こんな取りとめもないことを思ひめぐらしていたのです。", "するとどこからやって来たか、突然彼の前へ足を止めた、片目眇(すがめ)の老人があります。それが夕日の光を浴びて、大きな影を門へ落すと、ぢつと杜子春の顔を見ながら、", "「お前は何を考えているのだ。」と、横柄(わうへい)に言葉をかけました。", "「私ですか。私は今夜寝る所もないので、どうしたものかと考えているのです。」", "老人の尋ね方が急でしたから、杜子春はさすがに眼を伏せて、思わず正直な答をしました。", "「そうか。それは可哀そうだな。」", "老人は暫(しばら)く何事か考えているようでしたが、やがて、往来にさしている夕日の光を指さしながら、", "「ではおれが好いことを一つ教えてやろう。今この夕日の中に立って、お前の影が地に映つたら、その頭に当る所を夜中に掘つて見るが好い。きつと車に一ぱいの黄金が埋まつている筈だから。」", "「ほんたうですか。」", "杜子春は驚いて、伏せていた眼を挙げました。所が更に不思議なことには、あの老人はどこへ行つたか、もうあたりにはそれらしい、影も形も見当りません。その代り空の月の色は前よりも猶(なほ)白くなつて、休みない往来の人通りの上には、もう気の早い蝙蝠(かうもり)が二三匹ひらひら舞つていました。", "二", "杜子春(とししゆん)は一日の内に、洛陽の都でも唯一人という大金持になりました。あの老人の言葉通り、夕日に影を映して見て、その頭に当る所を、夜中にそつと掘つて見たら、大きな車にも余る位、黄金が一山出て来たのです。", "大金持になつた杜子春は、すぐに立派な家を買つて、玄宗(げんそう)皇帝にも負けない位、贅沢(ぜいたく)な暮しをし始めました。蘭陵(らんりよう)の酒を買はせるやら、桂州の竜眼肉(りゆうがんにく)をとりよせるやら、日に四度色の変る牡丹(ぼたん)を庭に植ゑさせるやら、白孔雀(しろくじやく)を何羽も放し飼いにするやら、玉を集めるやら、錦を縫はせるやら、香木(かうぼく)の車を造らせるやら、象牙の椅子を誂(あつら)へるやら、その贅沢を一々書いていては、いつになつてもこの話がおしまいにならない位です。", "するとかういう噂(うはさ)を聞いて、今までは路で行き合つても、挨拶さへしなかつた友だちなどが、朝夕遊びにやって来ました。それも一日毎に数が増して、半年ばかり経つ内には、洛陽の都に名を知られた才子や美人が多い中で、杜子春の家へ来ないものは、一人もない位になつてしまったのです。杜子春はこの御客たちを相手に、毎日酒盛りを開きました。その酒盛りの又盛なことは、中々口には尽されません。極(ごく)かいつまんだだけをお話しても、杜子春が金の杯に西洋から来た葡萄酒を汲んで、天竺(てんぢく)生れの魔法使が刀を呑んで見せる芸に見とれていると、そのまはりには二十人の女たちが、十人は翡翠(ひすい)の蓮の花を、十人は瑪瑙(めなう)の牡丹の花を、いづれも髪に飾りながら、笛や琴を節面白く奏しているという景色なのです。", "しかしいくら大金持でも、御金には際限がありますから、さすがに贅沢家(ぜいたくや)の杜子春も、一年二年と経つ内には、だんだん貧乏になり出しました。そうすると人間は薄情なもので、昨日までは毎日来た友だちも、今日は門の前を通つてさへ、挨拶一つして行きません。ましてとうとう三年目の春、又杜子春が以前の通り、一文無しになつて見ると、広い洛陽の都の中にも、彼に宿を貸そうという家は、一軒もなくなつてしまいました。いや、宿を貸す所か、今では椀に一杯の水も、恵んでくれるものはないのです。", "そこで彼は或日の夕方、もう一度あの洛陽の西の門の下へ行つて、ぼんやり空を眺めながら、途方に暮れて立っていました。するとやはり昔のように、片目眇(すがめ)の老人が、どこからか姿を現して、", "「お前は何を考えているのだ。」と、声をかけるではありませんか。", "杜子春は老人の顔を見ると、恥しそうに下を向いた儘(まま)、暫(しばら)くは返事もしませんでした。が、老人はその日も親切そうに、同じ言葉を繰返しますから、こちらも前と同じように、", "「私は今夜寝る所もないので、どうしたものかと考えているのです。」と、恐る恐る返事をしました。", "「そうか。それは可哀そうだな、ではおれが好いことを一つ教えてやろう。今この夕日の中へ立って、お前の影が地に映つたら、その胸に当る所を、夜中に掘つて見るが好い。きつと車に一ぱいの黄金が埋まつている筈だから。」", "老人はかう言つたと思うと、今度も亦(また)人ごみの中へ、掻き消すように隠れてしまいました。", "杜子春はその翌日から、忽(たちま)ち天下第一の大金持に返りました。と同時に相変らず、仕放題(しはうだい)な贅沢をし始めました。庭に咲いている牡丹の花、その中に眠つている白孔雀、それから刀を呑んで見せる、天竺から来た魔法使――すべてが昔の通りなのです。", "ですから車に一ぱいあつた、あの夥(おびただ)しい黄金も、又三年ばかり経(た)つ内には、すつかりなくなつてしまいました。", "三", "「お前は何を考えているのだ。」", "片目眇の老人は、三度杜子春の前へ来て、同じことを問いかけました。勿論彼はその時も、洛陽の西の門の下に、ほそぼそと霞を破つている三日月の光を眺めながら、ぼんやり佇(たたず)んでいたのです。", "「私ですか。私は今夜寝る所もないので、どうしようかと思っているのです。」", "「そうか。それは可哀そうだな。ではおれが好いことを教えてやろう。今この夕日の中へ立って、お前の影が地に映つたら、その腹に当る所を、夜中に掘つて見るが好い。きつと車に一ぱいの――」", "老人がここまで言いかけると、杜子春は急に手を挙げて、その言葉を遮(さへぎ)りました。", "「いや、お金はもう入らないのです。」", "「金はもう入らない？　ははあ、では贅沢をするにはとうとう飽きてしまったと見えるな。」", "老人は審(いぶか)しそうな眼つきをしながら、ぢつと杜子春の顔を見つめました。", "「何、贅沢に飽きたのぢやありません。人間というものに愛想がつきたのです。」", "杜子春は不平そうな顔をしながら、突慳貪(つつけんどん)にかう言いました。", "「それは面白いな。どうして又　人間に愛想が尽きたのだ？」", "「人間は皆薄情です。私が大金持になつた時には、世辞も追従(ついしよう)もしますけれど、一旦貧乏になつて御覧なさい。柔(やさ)しい顔さへもして見せはしません。そんなことを考えると、たといもう一度大金持になつた所が、何にもならないような気がするのです。」", "老人は杜子春の言葉を聞くと、急ににやにや笑い出しました。", "「そうか。いや、お前は若い者に似合はず、感心に物のわかる男だ。ではこれからは貧乏をしても、安らかに暮して行くつもりか。」", "杜子春はちよいとためらいました。が、すぐに思い切つた眼を挙げると、訴へるように老人の顔を見ながら、", "「それも今の私には出来ません。ですから私はあなたの弟子になつて、仙術の修業をしたいと思うのです。いいえ、隠してはいけません。あなたは道徳の高い仙人でせう。仙人でなければ、一夜の内に私を天下第一の大金持にすることは出来ない筈です。どうか私の先生になつて、不思議な仙術を教えて下さい。」", "老人は眉をひそめた儘、暫くは黙つて、何事か考えているようでしたが、やがて又につこり笑いながら、", "「いかにもおれは峨眉山(がびさん)に棲(す)んでいる、鉄冠子(てつくわんし)という仙人だ。始めお前の顔を見た時、どこか物わかりが好さそうだつたから、二度まで大金持にしてやつたのだが、それ程仙人になりたければ、おれの弟子にとり立ててやろう。」と、快く願を容(い)れてくれました。", "杜子春は喜んだの、喜ばないのではありません。老人の言葉がまだ終らない内に、彼は大地に額をつけて、何度も鉄冠子に御時宜(おじぎ)をしました。", "「いや、そう御礼などは言つて貰ふまい。いくらおれの弟子にした所で、立派な仙人になれるかなれないかは、お前次第できまることだからな。――が、兎も角もまづおれと一しよに、峨眉山の奥へ来て見るが好い。おお、幸(さいはい)、ここに竹杖が一本落ちている。では早速これへ乗つて、一飛びに空を渡るとしよう。」", "鉄冠子はそこにあつた青竹を一本拾い上げると、口の中に呪文(じゆもん)を唱へながら、杜子春と一しよにその竹へ、馬にでも乗るように跨(またが)りました。すると不思議ではありませんか。竹杖は忽(たちま)ち竜のように、勢よく大空へ舞い上つて、晴れ渡つた春の夕空を峨眉山の方角へ飛んで行きました。", "杜子春は胆(きも)をつぶしながら、恐る恐る下を見下しました。が、下には唯青い山々が夕明りの底に見えるばかりで、あの洛陽の都の西の門は、（とうに霞に紛(まぎ)れたのでせう。）どこを探しても見当りません。その内に鉄冠子は、白い鬢(びん)の毛を風に吹かせて、高らかに歌を唱い出しました。", "朝(あした)に北海に遊び、暮には蒼梧(そうご)。", "袖裏(しうり)の青蛇(せいだ)、胆気(たんき)粗(そ)なり。", "三たび嶽陽(がくよう)に入れども、人識らず。", "朗吟して、飛過(ひくわ)す洞庭湖。", "四", "二人を乗せた青竹は、間もなく峨眉山へ舞い下りました。", "そこは深い谷に臨んだ、幅の広い一枚岩の上でしたが、よくよく高い所だと見えて、中空に垂れた北斗の星が、茶碗程の大きさに光つていました。元より人跡の絶えた山ですから、あたりはしんと静まり返つて、やつと耳にはいるものは、後の絶壁に生えている、曲りくねつた一株の松が、こうこうと夜風に鳴る音だけです。", "二人がこの岩の上に来ると、鉄冠子は杜子春を絶壁の下に坐らせて、", "「おれはこれから天上へ行つて、西王母(せいわうぼ)に御眼にかかつて来るから、お前はその間ここに坐つて、おれの帰るのを待つているが好い。多分おれがいなくなると、いろいろな魔性(ましよう)が現れて、お前をたぶらかそうとするだらうが、たといどんなことが起らうとも、決して声を出すのではないぞ。もし一言でも口を利いたら、お前は到底仙人にはなれないものだと覚悟をしろ。好いか。天地が裂けても、黙つているのだぞ。」と言いました。", "「大丈夫です。決して声なぞは出しはしません。命がなくなつても、黙つています。」", "「そうか。それを聞いて、おれも安心した。ではおれは行つて来るから。」", "老人は杜子春に別れを告げると、又あの竹杖に跨(またが)つて、夜目にも削つたような山々の空へ、一文字に消えてしまいました。", "杜子春はたつた一人、岩の上に坐つた儘、静に星を眺めていました。すると彼是(かれこれ)半時ばかり経つて、深山の夜気が肌寒く薄い着物に透(とほ)り出した頃、突然空中に声があつて、", "「そこにいるのは何者だ。」と叱りつけるではありませんか。", "しかし杜子春は仙人の教通り、何とも返事をしずにいました。", "所が又暫くすると、やはり同じ声が響いて、", "「返事をしないと立ち所に、命はないものと覚悟しろ。」と、いかめしく嚇(おど)しつけるのです。", "杜子春は勿論黙つていました。", "と、どこから登つて来たか、爛々(らんらん)と眼を光らせた虎が一匹、忽然(こつぜん)と岩の上に躍り上つて、杜子春の姿を睨みながら、一声高く哮(たけ)りました。のみならずそれと同時に、頭の上の松の枝が、烈しくざわざわ揺れたと思うと、後の絶壁の頂からは、四斗樽程の白蛇(はくだ)が一匹、炎のような舌を吐いて、見る見る近くへ下りて来るのです。", "杜子春はしかし平然と、眉毛も動かさずに坐つていました。", "虎と蛇とは、一つ餌食を狙つて、互に隙でも窺(うかが)ふのか、暫くは睨合いの体でしたが、やがてどちらが先ともなく、一時に杜子春に飛びかかりました。が、虎の牙に噛まれるか、蛇の舌に呑まれるか、杜子春の命は瞬(またた)く内に、なくなつてしまふと思つた時、虎と蛇とは霧の如く、夜風と共に消え失せて、後には唯、絶壁の松が、さっきの通りこうこうと枝を鳴らしているばかりなのです。杜子春はほつと一息しながら、今度はどんなことが起るかと、心待ちに待つていました。", "すると一陣の風が吹き起つて、墨のような黒雲が一面にあたりをとざすや否や、うす紫の稲妻がやにはに闇を二つに裂いて、凄じく雷(らい)が鳴り出しました。いや、雷ばかりではありません。それと一しよに瀑(たき)のような雨も、いきなりどうどうと降り出したのです。杜子春はこの天変の中に、恐れ気もなく坐つていました。風の音、雨のしぶき、それから絶え間ない稲妻の光、――暫くはさすがの峨眉山(がびさん)も、覆(くつがへ)るかと思う位でしたが、その内に耳をもつんざく程、大きな雷鳴が轟(とどろ)いたと思うと、空に渦巻いた黒雲の中から、まつ赤な一本の火柱が、杜子春の頭へ落ちかかりました。", "杜子春は思わず耳を抑へて、一枚岩の上へひれ伏しました。が、すぐに眼を開いて見ると、空は以前の通り晴れ渡つて、向うに聳(そび)えた山山の上にも、茶碗程の北斗の星が、やはりきらきら輝いています。して見れば今の大あらしも、あの虎や白蛇と同じように、鉄冠子(てつくわんし)の留守をつけこんだ、魔性の悪戯(いたづら)に違いありません。杜子春は漸(ようや)く安心して、額の冷汗を拭いながら、又岩の上に坐り直しました。", "が、そのため息がまだ消えない内に、今度は彼の坐つている前へ、金の鎧(よろい)を着下(きくだ)した、身の丈三丈もあらうという、厳かな神将が現れました。神将は手に三叉(みつまた)の戟(ほこ)を持つていましたが、いきなりその戟の切先を杜子春の胸もとへ向けながら、眼を嗔(いか)らせて叱りつけるのを聞けば、", "「こら、その方は一体何物だ。この峨眉山という山は、天地開闢(かいびやく)の昔から、おれが住居(すまい)をしている所だぞ。それも憚(はばか)らずたつた一人、ここへ足を踏み入れるとは、よもや唯の人間ではあるまい。さあ命が惜しかつたら、一刻も早く返答しろ。」と言ふのです。", "しかし杜子春は老人の言葉通り、黙然(もくねん)と口を噤(つぐ)んでいました。", "「返事をしないか。――しないな。好し。しなければ、しないで勝手にしろ。その代りおれの眷属(けんぞく)たちが、その方をずたずたに斬つてしまふぞ。」", "神将は戟(ほこ)を高く挙げて、向うの山の空を招きました。その途端に闇がさつと裂けると、驚いたことには無数の神兵が、雲の如く空に充満(みちみ)ちて、それが皆槍や刀をきらめかせながら、今にもここへ一なだれに攻め寄せようとしているのです。", "この景色を見た杜子春は、思わずあつと叫びそうにしましたが、すぐに又鉄冠子の言葉を思い出して、一生懸命に黙つていました。神将は彼が恐れないのを見ると、怒つたの怒らないのではありません。", "「この剛情者め。どうしても返事をしなければ、約束通り命はとつてやるぞ。」", "神将はかう喚(わめ)くが早いか、三叉(みつまた)の戟(ほこ)を閃(ひらめ)かせて、一突きに杜子春を突き殺しました。そうして峨眉山もどよむ程、からからと高く笑いながら、どこともなく消えてしまいました。勿論この時はもう無数の神兵も、吹き渡る夜風の音と一しよに、夢のように消え失せた後だつたのです。", "北斗の星は又寒そうに、一枚岩の上を照らし始めました。絶壁の松も前に変らず、こうこうと枝を鳴らせています。が、杜子春はとうに息が絶えて、仰向(あふむ)けにそこへ倒れていました。", "五", "杜子春の体は岩の上へ、仰向けに倒れていましたが、杜子春の魂は、静に体から抜け出して、地獄の底へ下りて行きました。", "この世と地獄との間には、闇穴道(あんけつだう)という道があつて、そこは年中暗い空に、氷のような冷たい風がぴゆうぴゆう吹き荒(すさ)んでいるのです。杜子春はその風に吹かれながら、暫くは唯(ただ)木の葉のように、空を漂つて行きましたが、やがて森羅殿(しんらでん)という額の懸つた立派な御殿の前へ出ました。", "御殿の前にいた大勢の鬼は、杜子春の姿を見るや否や、すぐにそのまはりを取り捲いて、階(きざはし)の前へ引き据ゑました。階の上には一人の王様が、まつ黒な袍(きもの)に金の冠(かんむり)をかぶつて、いかめしくあたりを睨んでいます。これは兼ねて噂(うはさ)に聞いた、閻魔(えんま)大王に違いありません。杜子春はどうなることかと思いながら、恐る恐るそこへ跪(ひざまづ)いていました。", "「こら、その方は何の為に、峨眉山の上へ坐つていた？」", "閻魔大王の声は雷のように、階の上から響きました。杜子春は早速その問に答へようとしましたが、ふと又思い出したのは、「決して口を利くな。」という鉄冠子の戒めの言葉です。そこで唯頭を垂れた儘、唖(おし)のように黙つていました。すると閻魔大王は、持つていた鉄の笏(しやく)を挙げて、顔中の鬚(ひげ)を逆立てながら、", "「その方はここをどこだと思う？　速(すみやか)に返答をすれば好し、さもなければ時を移さず、地獄の呵責(かしやく)に遇(あ)はせてくれるぞ。」と、威丈高(いたけだか)に罵(ののし)りました。", "が、杜子春は相変らず唇(くちびる)一つ動かしません。それを見た閻魔大王は、すぐに鬼どもの方を向いて、荒々しく何か言いつけると、鬼どもは一度に畏(かしこま)つて、忽ち杜子春を引き立てながら、森羅殿の空へ舞い上りました。", "地獄には誰でも知つている通り、剣(つるぎ)の山や血の池の外にも、焦熱(せうねつ)地獄という焔の谷や極寒(ごくかん)地獄という氷の海が、真暗な空の下に並んでいます。鬼どもはそういう地獄の中へ、代る代る杜子春を抛(はふ)りこみました。ですから杜子春は無残にも、剣に胸を貫かれるやら、焔に顔を焼かれるやら、舌を抜かれるやら、皮を剥がれるやら、鉄の杵(きね)に撞(つ)かれるやら、油の鍋に煮られるやら、毒蛇に脳味噌を吸はれるやら、熊鷹に眼を食はれるやら、――その苦しみを数へ立てていては、到底際限がない位、あらゆる責苦(せめく)に遇はされたのです。それでも杜子春は我慢強く、ぢつと歯を食いしばつた儘、一言も口を利きませんでした。", "これにはさすがの鬼どもも、呆れ返つてしまったのでせう。もう一度夜のような空を飛んで、森羅殿の前へ帰つて来ると、さっきの通り杜子春を階(きざはし)の下に引き据ゑながら、御殿の上の閻魔大王に、", "「この罪人はどうしても、ものを言ふ気色(けしき)がございません。」と、口を揃へて言上(ごんじよう)しました。", "閻魔大王は眉をひそめて、暫く思案に暮れていましたが、やがて何か思いついたと見えて、", "「この男の父母(ちちはは)は、畜生道に落ちている筈だから、早速ここへ引き立てて来い。」と、一匹の鬼に云いつけました。", "鬼は忽ち風に乗つて、地獄の空へ舞い上りました。と思うと、又星が流れるように、二匹の獣を駆り立てながら、さつと森羅殿の前へ下りて来ました。その獣を見た杜子春は、驚いたの驚かないのではありません。なぜかといへばそれは二匹とも、形は見すぼらしい痩せ馬でしたが、顔は夢にも忘れない、死んだ父母の通りでしたから。", "「こら、その方は何のために、峨眉山の上に坐つていたか、まっすぐに白状しなければ、今度はその方の父母に痛い思いをさせてやるぞ。」", "杜子春はかう嚇(おど)されても、やはり返答をしずにいました。", "「この不孝者めが。その方は父母が苦しんでも、その方さへ都合が好ければ、好いと思っているのだな。」", "閻魔大王は森羅殿も崩れる程、凄じい声で喚きました。", "「打て。鬼ども。その二匹の畜生を、肉も骨も打ち砕いてしまへ。」", "鬼どもは一斉に「はつ」と答へながら、鉄の鞭(むち)をとって立ち上ると、四方八方から二匹の馬を、未練未釈(みれんみしやく)なく打ちのめしました。鞭はりうりうと風を切って、所嫌はず雨のように、馬の皮肉を打ち破るのです。馬は、――畜生になった父母は、苦しそうに身を悶(もだ)えて、眼には血の涙を浮べた儘、見てもいられない程嘶(いなな)き立てました。", "「どうだ。まだその方は白状しないか。」", "閻魔大王は鬼どもに、暫く鞭の手をやめさせて、もう一度杜子春の答を促しました。もうその時には二匹の馬も、肉は裂け骨は砕けて、息も絶え絶えに階(きざはし)の前へ、倒れ伏していたのです。", "杜子春は必死になって、鉄冠子の言葉を思い出しながら、緊(かた)く眼をつぶつていました。するとその時彼の耳には、殆(ほとんど)声とはいへない位、かすかな声が伝はって来ました。", "「心配をおしでない。私たちはどうなっても、お前さへ仕合せになれるのなら、それより結構なことはないのだからね。大王が何と仰(おっしや)っても、言いたくないことは黙って御出(おい)で。」", "それは確に懐しい、母親の声に違いありません。杜子春は思わず、眼をあきました。そうして馬の一匹が、力なく地上に倒れた儘、悲しそうに彼の顔へ、ぢっと眼をやっているのを見ました。母親はこんな苦しみの中にも、息子の心を思いやって、鬼どもの鞭に打たれたことを、怨む気色(けしき)さへも見せないのです。大金持になれば御世辞を言い、貧乏人になれば口も利かない世間の人たちに比べると、何という有難い志でせう。何という健気な決心でせう。杜子春は老人の戒めも忘れて、転(まろ)ぶようにその側へ走りよると、両手に半死の馬の頸を抱いて、はらはらと涙を落しながら、「お母さん。」と一声を叫びました。……", "六", "その声に気がついて見ると、杜子春はやはり夕日を浴びて、洛陽の西の門の下に、ぼんやり佇んでいるのでした。霞んだ空、白い三日月、絶え間ない人や車の波、――すべてがまだ峨眉山へ、行かない前と同じことです。", "「どうだな。おれの弟子になった所が、とても仙人にはなれはすまい。」", "片目眇(すがめ)の老人は微笑を含みながら言いました。", "「なれません。なれませんが、しかし私はなれなかったことも、反(かへ)って嬉しい気がするのです。」", "杜子春はまだ眼に涙を浮べた儘、思わず老人の手を握りました。", "「いくら仙人になれた所が、私はあの地獄の森羅殿の前に、鞭を受けている父母を見ては、黙っている訳には行きません。」", "「もしお前が黙っていたら――」と鉄冠子は急に厳(おごそか)な顔になって、ぢっと杜子春を見つめました。", "「もしお前が黙つていたら、おれは即座にお前の命を絶ってしまはうと思っていたのだ。――お前はもう仙人になりたいという望も持っていまい。大金持になることは、元より愛想がつきた筈だ。ではお前はこれから後、何になつたら好いと思うな。」", "「何になっても、人間らしい、正直な暮しをするつもりです。」", "杜子春の声には今までにない晴れ晴れした調子が罩(こも)っていました。", "「その言葉を忘れるなよ。ではおれは今日限り、二度とお前には遇はないから。」", "鉄冠子はかう言ふ内に、もう歩き出していましたが、急に又足を止めて、杜子春の方を振り返ると、", "「おお、幸(さいはい)、今思い出したが、おれは泰山の南の麓(ふもと)に一軒の家を持っている。その家を畑ごとお前にやるから、早速行って住まふが好い。今頃は丁度家のまはりに、桃の花が一面に咲いているだらう。」と、さも愉快そうにつけ加へました。", "（大正九年六月）"]}, {"no": 36, "title": "トロッコ", "author": "芥川 竜之介", "category": "日本文学-児童-物語", "chars": 4972, "volume": "小", "paras": ["小田原熱海（あたみ）間に、軽便鉄道敷設（ふせつ）の工事が始まったのは、良平（りょうへい）の八つの年だった。良平は毎日村外（はず）れへ、その工事を見物に行った。工事を――といったところが、唯（ただ）トロッコで土を運搬する――それが面白さに見に行ったのである。", "トロッコの上には土工が二人、土を積んだ後（うしろ）に佇（たたず）んでいる。トロッコは山を下（くだ）るのだから、人手を借りずに走って来る。煽（あお）るように車台が動いたり、土工の袢天（はんてん）の裾（すそ）がひらついたり、細い線路がしなったり――良平はそんなけしきを眺（なが）めながら、土工になりたいと思う事がある。せめては一度でも土工と一しょに、トロッコへ乗りたいと思う事もある。トロッコは村外れの平地へ来ると、自然と其処（そこ）に止まってしまう。と同時に土工たちは、身軽にトロッコを飛び降りるが早いか、その線路の終点へ車の土をぶちまける。それから今度はトロッコを押し押し、もと来た山の方へ登り始める。良平はその時乗れないまでも、押す事さえ出来たらと思うのである。", "或（ある）夕方、――それは二月の初旬だった。良平は二つ下の弟や、弟と同じ年の隣の子供と、トロッコの置いてある村外れへ行った。トロッコは泥だらけになったまま、薄明るい中に並んでいる。が、その外（ほか）は何処（どこ）を見ても、土工たちの姿は見えなかった。三人の子供は恐る恐る、一番端（はし）にあるトロッコを押した。トロッコは三人の力が揃（そろ）うと、突然ごろりと車輪をまわした。良平はこの音にひやりとした。しかし二度目の車輪の音は、もう彼を驚かさなかった。ごろり、ごろり、――トロッコはそう云う音と共に、三人の手に押されながら、そろそろ線路を登って行った。", "その内にかれこれ十間（けん）程来ると、線路の勾配（こうばい）が急になり出した。トロッコも三人の力では、いくら押しても動かなくなった。どうかすれば車と一しょに、押し戻されそうにもなる事がある。良平はもう好（よ）いと思ったから、年下の二人に合図をした。", "「さあ、乗ろう！」", "彼等は一度に手をはなすと、トロッコの上へ飛び乗った。トロッコは最初徐（おもむ）ろに、それから見る見る勢（いきおい）よく、一息に線路を下（くだ）り出した。その途端につき当りの風景は、忽（たちま）ち両側へ分かれるように、ずんずん目の前へ展開して来る。顔に当る薄暮（はくぼ）の風、足の下に躍（おど）るトロッコの動揺、――良平は殆（ほとん）ど有頂天（うちょうてん）になった。", "しかしトロッコは二三分の後（のち）、もうもとの終点に止まっていた。", "「さあ、もう一度押すじゃあ」", "良平は年下の二人と一しょに、又トロッコを押し上げにかかった。が、まだ車輪も動かない内に、突然彼等の後（うしろ）には、誰かの足音が聞え出した。のみならずそれは聞え出したと思うと、急にこう云う怒鳴り声に変った。", "「この野郎！　誰に断（ことわ）ってトロに触（さわ）った？」", "其処には古い印袢天（しるしばんてん）に、季節外れの麦藁帽（むぎわらぼう）をかぶった、背の高い土工が佇んでいる。――そう云う姿が目にはいった時、良平は年下の二人と一しょに、もう五六間逃げ出していた。――それぎり良平は使の帰りに、人気のない工事場のトロッコを見ても、二度と乗って見ようと思った事はない。唯その時の土工の姿は、今でも良平の頭の何処かに、はっきりした記憶を残している。薄明りの中に仄（ほの）めいた、小さい黄色の麦藁帽、――しかしその記憶さえも、年毎（としごと）に色彩は薄れるらしい。", "その後（のち）十日余りたってから、良平は又たった一人、午（ひる）過ぎの工事場に佇みながら、トロッコの来るのを眺めていた。すると土を積んだトロッコの外（ほか）に、枕木（まくらぎ）を積んだトロッコが一輛（りょう）、これは本線になる筈（はず）の、太い線路を登って来た。このトロッコを押しているのは、二人とも若い男だった。良平は彼等を見た時から、何だか親しみ易（やす）いような気がした。「この人たちならば叱（しか）られない」――彼はそう思いながら、トロッコの側（そば）へ駈（か）けて行った。", "「おじさん。押してやろうか？」", "その中の一人、――縞（しま）のシャツを着ている男は、俯向（うつむ）きにトロッコを押したまま、思った通り快い返事をした。", "「おお、押してくよう」", "良平は二人の間にはいると、力一杯押し始めた。", "「われは中中（なかなか）力があるな」", "他（た）の一人、――耳に巻煙草（まきたばこ）を挟（はさ）んだ男も、こう良平を褒（ほ）めてくれた。", "その内に線路の勾配は、だんだん楽になり始めた。「もう押さなくとも好（よ）い」――良平は今にも云われるかと内心気がかりでならなかった。が、若い二人の土工は、前よりも腰を起したぎり、黙黙と車を押し続けていた。良平はとうとうこらえ切れずに、怯（お）ず怯（お）ずこんな事を尋ねて見た。", "「何時（いつ）までも押していて好（い）い？」", "「好いとも」", "二人は同時に返事をした。良平は「優しい人たちだ」と思った。", "五六町余り押し続けたら、線路はもう一度急勾配になった。其処には両側の蜜柑畑（みかんばたけ）に、黄色い実がいくつも日を受けている。", "「登り路（みち）の方が好い、何時（いつ）までも押させてくれるから」――良平はそんな事を考えながら、全身でトロッコを押すようにした。", "蜜柑畑の間を登りつめると、急に線路は下（くだ）りになった。縞のシャツを着ている男は、良平に「やい、乗れ」と云った。良平は直（すぐ）に飛び乗った。トロッコは三人が乗り移ると同時に、蜜柑畑の（におい）を煽（あお）りながら、ひた辷（すべ）りに線路を走り出した。「押すよりも乗る方がずっと好い」――良平は羽織に風を孕（はら）ませながら、当り前の事を考えた。「行きに押す所が多ければ、帰りに又乗る所が多い」――そうもまた考えたりした。", "竹藪（たけやぶ）のある所へ来ると、トロッコは静かに走るのを止（や）めた。三人は又前のように、重いトロッコを押し始めた。竹藪は何時か雑木林になった。爪先（つまさき）上りの所所（ところどころ）には、赤錆（あかさび）の線路も見えない程、落葉のたまっている場所もあった。その路をやっと登り切ったら、今度は高い崖（がけ）の向うに、広広と薄ら寒い海が開けた。と同時に良平の頭には、余り遠く来過ぎた事が、急にはっきりと感じられた。", "三人は又トロッコへ乗った。車は海を右にしながら、雑木の枝の下を走って行った。しかし良平はさっきのように、面白い気もちにはなれなかった。「もう帰ってくれれば好（い）い」――彼はそうも念じて見た。が、行く所まで行きつかなければ、トロッコも彼等も帰れない事は、勿論（もちろん）彼にもわかり切っていた。", "その次に車の止まったのは、切崩（きりくず）した山を背負っている、藁屋根の茶店の前だった。二人の土工はその店へはいると、乳呑児（ちのみご）をおぶった上（かみ）さんを相手に、悠悠（ゆうゆう）と茶などを飲み始めた。良平は独（ひと）りいらいらしながら、トロッコのまわりをまわって見た。トロッコには頑丈（がんじょう）な車台の板に、跳（は）ねかえった泥が乾（かわ）いていた。", "少時（しばらく）の後（のち）茶店を出て来しなに、巻煙草を耳に挟（はさ）んだ男は、（その時はもう挟んでいなかったが）トロッコの側にいる良平に新聞紙に包んだ駄菓子をくれた。良平は冷淡に「難有（ありがと）う」と云った。が、直（すぐ）に冷淡にしては、相手にすまないと思い直した。彼はその冷淡さを取り繕うように、包み菓子の一つを口へ入れた。菓子には新聞紙にあったらしい、石油がしみついていた。", "三人はトロッコを押しながら緩（ゆる）い傾斜を登って行った。良平は車に手をかけていても、心は外（ほか）の事を考えていた。", "その坂を向うへ下（お）り切ると、又同じような茶店があった。土工たちがその中へはいった後（あと）、良平はトロッコに腰をかけながら、帰る事ばかり気にしていた。茶店の前には花のさいた梅に、西日の光が消えかかっている。「もう日が暮れる」――彼はそう考えると、ぼんやり腰かけてもいられなかった。トロッコの車輪を蹴（け）って見たり、一人では動かないのを承知しながらうんうんそれを押して見たり、――そんな事に気もちを紛らせていた。", "ところが土工たちは出て来ると、車の上の枕木（まくらぎ）に手をかけながら、無造作（むぞうさ）に彼にこう云った。", "「われはもう帰んな。おれたちは今日は向う泊りだから」", "「あんまり帰りが遅くなるとわれの家（うち）でも心配するずら", "良平は一瞬間呆気（あっけ）にとられた。もうかれこれ暗くなる事、去年の暮母と岩村まで来たが、今日の途（みち）はその三四倍ある事、それを今からたった一人、歩いて帰らなければならない事、――そう云う事が一時にわかったのである。良平は殆（ほとん）ど泣きそうになった。が、泣いても仕方がないと思った。泣いている場合ではないとも思った。彼は若い二人の土工に、取って附けたような御時宜（おじぎ）をすると、どんどん線路伝いに走り出した。", "良平は少時（しばらく）無我夢中に線路の側を走り続けた。その内に懐（ふところ）の菓子包みが、邪魔になる事に気がついたから、それを路側（みちばた）へ抛（ほ）り出す次手（ついで）に、板草履（いたぞうり）も其処へ脱ぎ捨ててしまった。すると薄い足袋（たび）の裏へじかに小石が食いこんだが、足だけは遙（はる）かに軽くなった。彼は左に海を感じながら、急な坂路（さかみち）を駈（か）け登った。時時涙がこみ上げて来ると、自然に顔が歪（ゆが）んで来る。――それは無理に我慢しても、鼻だけは絶えずくうくう鳴った。", "竹藪の側を駈け抜けると、夕焼けのした日金山（ひがねやま）の空も、もう火照（ほて）りが消えかかっていた。良平は、愈（いよいよ）気が気でなかった。往（ゆ）きと返（かえ）りと変るせいか、景色の違うのも不安だった。すると今度は着物までも、汗の濡（ぬ）れ通ったのが気になったから、やはり必死に駈け続けたなり、羽織を路側（みちばた）へ脱いで捨てた。", "蜜柑畑へ来る頃には、あたりは暗くなる一方だった。「命さえ助かれば――」良平はそう思いながら、辷（すべ）ってもつまずいても走って行った。", "やっと遠い夕闇（ゆうやみ）の中に、村外れの工事場が見えた時、良平は一思いに泣きたくなった。しかしその時もべそはかいたが、とうとう泣かずに駈け続けた。", "彼の村へはいって見ると、もう両側の家家には、電燈の光がさし合っていた。良平はその電燈の光に、頭から汗の湯気（ゆげ）の立つのが、彼自身にもはっきりわかった。井戸端に水を汲（く）んでいる女衆（おんなしゅう）や、畑から帰って来る男衆（おとこしゅう）は、良平が喘（あえ）ぎ喘ぎ走るのを見ては、「おいどうしたね？」などと声をかけた。が、彼は無言のまま、雑貨屋だの床屋だの、明るい家の前を走り過ぎた。", "彼の家（うち）の門口（かどぐち）へ駈けこんだ時、良平はとうとう大声に、わっと泣き出さずにはいられなかった。その泣き声は彼の周囲（まわり）へ、一時に父や母を集まらせた。殊（こと）に母は何とか云いながら、良平の体を抱（かか）えるようにした。が、良平は手足をもがきながら、啜（すす）り上げ啜り上げ泣き続けた。その声が余り激しかったせいか、近所の女衆も三四人、薄暗い門口へ集って来た。父母は勿論その人たちは、口口に彼の泣く訣（わけ）を尋ねた。しかし彼は何と云われても泣き立てるより外に仕方がなかった。あの遠い路を駈け通して来た、今までの心細さをふり返ると、いくら大声に泣き続けても、足りない気もちに迫られながら、…………", "良平は二十六の年、妻子（さいし）と一しょに東京へ出て来た。今では或雑誌社の二階に、校正の朱筆（しゅふで）を握っている。が、彼はどうかすると、全然何の理由もないのに、その時の彼を思い出す事がある。全然何の理由もないのに？――塵労（じんろう）に疲れた彼の前には今でもやはりその時のように、薄暗い藪や坂のある路が、細細と一すじ断続している。…………"]}, {"no": 37, "title": "なめとこ山の熊", "author": "宮沢 賢治", "category": "日本文学-児童-童話", "chars": 7723, "volume": "中", "paras": ["なめとこ山の熊（くま）のことならおもしろい。なめとこ山は大きな山だ。淵沢（ふちざわ）川はなめとこ山から出て来る。なめとこ山は一年のうち大ていの日はつめたい霧か雲かを吸ったり吐いたりしている。まわりもみんな青黒いなまこや海坊主のような山だ。山のなかごろに大きな洞穴（ほらあな）ががらんとあいている。そこから淵沢川がいきなり三百尺ぐらいの滝になってひのきやいたやのしげみの中をごうと落ちて来る。", "中山街道はこのごろは誰（たれ）も歩かないから蕗（ふき）やいたどりがいっぱいに生えたり牛が遁（に）げて登らないように柵（さく）をみちにたてたりしているけれどもそこをがさがさ三里ばかり行くと向うの方で風が山の頂を通っているような音がする。気をつけてそっちを見ると何だかわけのわからない白い細長いものが山をうごいて落ちてけむりを立てているのがわかる。それがなめとこ山の大空滝だ。そして昔はそのへんには熊がごちゃごちゃ居たそうだ。ほんとうはなめとこ山も熊の胆（い）も私は自分で見たのではない。人から聞いたり考えたりしたことばかりだ。間ちがっているかもしれないけれども私はそう思うのだ。とにかくなめとこ山の熊の胆（い）は名高いものになっている。", "腹の痛いのにもきけば傷もなおる。鉛の湯の入口になめとこ山の熊の胆（い）ありという昔からの看板もかかっている。だからもう熊はなめとこ山で赤い舌をべろべろ吐いて谷をわたったり熊の子供らがすもうをとっておしまいぽかぽか撲（なぐ）りあったりしていることはたしかだ。熊捕りの名人の淵沢小十郎がそれを片っぱしから捕ったのだ。", "淵沢小十郎はすがめの赭黒（あかぐろ）いごりごりしたおやじで胴は小さな臼（うす）ぐらいはあったし掌（てのひら）は北島の毘沙門（びしゃもん）さんの病気をなおすための手形ぐらい大きく厚かった。小十郎は夏なら菩提樹（マダ）の皮でこさえたけらを着てはむばきをはき生蕃（せいばん）の使うような山刀とポルトガル伝来というような大きな重い鉄砲をもってたくましい黄いろな犬をつれてなめとこ山からしどけ沢から三つ又からサッカイの山からマミ穴森から白沢からまるで縦横にあるいた。木がいっぱい生えているから谷を溯（のぼ）っているとまるで青黒いトンネルの中を行くようで時にはぱっと緑と黄金（きん）いろに明るくなることもあればそこら中が花が咲いたように日光が落ちていることもある。そこを小十郎が、まるで自分の座敷の中を歩いているというふうでゆっくりのっしのっしとやって行く。犬はさきに立って崖（がけ）を横這（よこば）いに走ったりざぶんと水にかけ込んだり淵ののろのろした気味の悪いとこをもう一生けん命に泳いでやっと向うの岩にのぼるとからだをぶるぶるっとして毛をたてて水をふるい落しそれから鼻をしかめて主人の来るのを待っている。小十郎は膝（ひざ）から上にまるで屏風（びょうぶ）のような白い波をたてながらコンパスのように足を抜き差しして口を少し曲げながらやって来る。そこであんまり一ぺんに言ってしまって悪いけれどもなめとこ山あたりの熊は小十郎をすきなのだ。その証拠には熊どもは小十郎がぼちゃぼちゃ谷をこいだり谷の岸の細い平らないっぱいにあざみなどの生えているとこを通るときはだまって高いとこから見送っているのだ。木の上から両手で枝にとりついたり崖の上で膝をかかえて座ったりしておもしろそうに小十郎を見送っているのだ。まったく熊どもは小十郎の犬さえすきなようだった。けれどもいくら熊どもだってすっかり小十郎とぶっつかって犬がまるで火のついたまりのようになって飛びつき小十郎が眼（め）をまるで変に光らして鉄砲をこっちへ構えることはあんまりすきではなかった。そのときは大ていの熊は迷惑そうに手をふってそんなことをされるのを断わった。けれども熊もいろいろだから気の烈（はげ）しいやつならごうごう咆（ほ）えて立ちあがって、犬などはまるで踏みつぶしそうにしながら小十郎の方へ両手を出してかかって行く。小十郎はぴったり落ち着いて樹（き）をたてにして立ちながら熊の月の輪をめがけてズドンとやるのだった。すると森までががあっと叫んで熊はどたっと倒れ赤黒い血をどくどく吐き鼻をくんくん鳴らして死んでしまうのだった。小十郎は鉄砲を木へたてかけて注意深くそばへ寄って来てこう言うのだった。", "「熊。おれはてまえを憎くて殺したのでねえんだぞ。おれも商売ならてめえも射（う）たなけぁならねえ。ほかの罪のねえ仕事していんだが畑はなし木はお上のものにきまったし里へ出ても誰（たれ）も相手にしねえ。仕方なしに猟師なんぞしるんだ。てめえも熊に生れたが因果ならおれもこんな商売が因果だ。やい。この次には熊なんぞに生れなよ」", "そのときは犬もすっかりしょげかえって眼を細くして座っていた。", "何せこの犬ばかりは小十郎が四十の夏うち中みんな赤痢（せきり）にかかってとうとう小十郎の息子とその妻も死んだ中にぴんぴんして生きていたのだ。", "それから小十郎はふところからとぎすまされた小刀を出して熊の顎（あご）のとこから胸から腹へかけて皮をすうっと裂いていくのだった。それからあとの景色は僕は大きらいだ。けれどもとにかくおしまい小十郎がまっ赤な熊の胆（い）をせなかの木のひつに入れて血で毛がぼとぼと房になった毛皮を谷であらってくるくるまるめせなかにしょって自分もぐんなりした風で谷を下って行くことだけはたしかなのだ。", "小十郎はもう熊のことばだってわかるような気がした。ある年の春はやく山の木がまだ一本も青くならないころ小十郎は犬を連れて白沢をずうっとのぼった。夕方になって小十郎はばっかぃ沢へこえる峯（みね）になった処（ところ）へ去年の夏こさえた笹小屋（ささごや）へ泊ろうと思ってそこへのぼって行った。そしたらどういう加減か小十郎の柄にもなく登り口をまちがってしまった。", "なんべんも谷へ降りてまた登り直して犬もへとへとにつかれ小十郎も口を横にまげて息をしながら半分くずれかかった去年の小屋を見つけた。小十郎がすぐ下に湧水（わきみず）のあったのを思い出して少し山を降りかけたら愕（おどろ）いたことは母親とやっと一歳になるかならないような子熊と二疋（ひき）ちょうど人が額に手をあてて遠くを眺（なが）めるといったふうに淡い六日の月光の中を向うの谷をしげしげ見つめているのにあった。小十郎はまるでその二疋の熊のからだから後光が射すように思えてまるで釘付（くぎづ）けになったように立ちどまってそっちを見つめていた。すると小熊が甘えるように言ったのだ。", "「どうしても雪だよ、おっかさん谷のこっち側だけ白くなっているんだもの。どうしても雪だよ。おっかさん」", "すると母親の熊はまだしげしげ見つめていたがやっと言った。", "「雪でないよ、あすこへだけ降るはずがないんだもの」", "子熊はまた言った。", "「だから溶けないで残ったのでしょう」", "「いいえ、おっかさんはあざみの芽を見に昨日あすこを通ったばかりです」", "小十郎もじっとそっちを見た。", "月の光が青じろく山の斜面を滑っていた。そこがちょうど銀の鎧（よろい）のように光っているのだった。しばらくたって子熊が言った。", "「雪でなけぁ霜だねえ。きっとそうだ」", "ほんとうに今夜は霜が降るぞ、お月さまの近くで胃（コキエ）もあんなに青くふるえているし第一お月さまのいろだってまるで氷のようだ、小十郎がひとりで思った。", "「おかあさまはわかったよ、あれねえ、ひきざくらの花」", "「なぁんだ、ひきざくらの花だい。僕知ってるよ」", "「いいえ、お前まだ見たことありません」", "「知ってるよ、僕この前とって来たもの」", "「いいえ、あれひきざくらでありません、お前とって来たのきささげの花でしょう」", "「そうだろうか」子熊はとぼけたように答えました。小十郎はなぜかもう胸がいっぱいになってもう一ぺん向うの谷の白い雪のような花と余念なく月光をあびて立っている母子の熊をちらっと見てそれから音をたてないようにこっそりこっそり戻りはじめた。風があっちへ行くな行くなと思いながらそろそろと小十郎は後退（あとずさ）りした。くろもじの木の匂（におい）が月のあかりといっしょにすうっとさした。", "ところがこの豪儀な小十郎がまちへ熊の皮と胆（きも）を売りに行くときのみじめさといったら全く気の毒だった。", "町の中ほどに大きな荒物屋があって笊（ざる）だの砂糖だの砥石（といし）だの金天狗（きんてんぐ）やカメレオン印の煙草（たばこ）だのそれから硝子（ガラス）の蠅（はえ）とりまでならべていたのだ。小十郎が山のように毛皮をしょってそこのしきいを一足またぐと店では又来たかというようにうすわらっているのだった。店の次の間に大きな唐金（からかね）の火鉢（ひばち）を出して主人がどっかり座っていた。", "「旦那（だんな）さん、先（せん）ころはどうもありがどうごあんした」", "あの山では主のような小十郎は毛皮の荷物を横におろして叮（てい）ねいに敷板に手をついて言うのだった。", "「はあ、どうも、今日は何のご用です」", "「熊の皮また少し持って来たます」", "「熊の皮か。この前のもまだあのまましまってあるし今日ぁまんついいます」", "「旦那さん、そう言わなぃでどうか買って呉（く）んなさぃ。安くてもいいます」", "「なんぼ安くても要らなぃます」主人は落ち着きはらってきせるをたんたんとてのひらへたたくのだ、あの豪気な山の中の主の小十郎はこう言われるたびにもうまるで心配そうに顔をしかめた。何せ小十郎のとこでは山には栗（くり）があったしうしろのまるで少しの畑からは稗（ひえ）がとれるのではあったが米などは少しもできず味噌（みそ）もなかったから九十になるとしよりと子供ばかりの七人家内にもって行く米はごくわずかずつでも要ったのだ。", "里の方のものなら麻もつくったけれども、小十郎のとこではわずか藤（ふじ）つるで編む入れ物の外に布にするようなものはなんにも出来なかったのだ。小十郎はしばらくたってからまるでしわがれたような声で言ったもんだ。", "「旦那さん、お願だます。どうが何ぼでもいいはんて買って呉（く）なぃ」小十郎はそう言いながら改めておじぎさえしたもんだ。", "主人はだまってしばらくけむりを吐いてから顔の少しでにかにか笑うのをそっとかくして言ったもんだ。", "「いいます。置いでお出れ。じゃ、平助、小十郎さんさ二円あげろじゃ」", "店の平助が大きな銀貨を四枚小十郎の前へ座って出した。小十郎はそれを押しいただくようにしてにかにかしながら受け取った。それから主人はこんどはだんだん機嫌がよくなる。", "「じゃ、おきの、小十郎さんさ一杯あげろ」", "小十郎はこのころはもううれしくてわくわくしている。主人はゆっくりいろいろ談（はな）す。小十郎はかしこまって山のもようや何か申しあげている。間もなく台所の方からお膳（ぜん）できたと知らせる。小十郎は半分辞退するけれども結局台所のとこへ引っぱられてってまた叮寧な挨拶（あいさつ）をしている。", "間もなく塩引の鮭（さけ）の刺身やいかの切り込みなどと酒が一本黒い小さな膳にのって来る。", "小十郎はちゃんとかしこまってそこへ腰掛けていかの切り込みを手の甲にのせてべろりとなめたりうやうやしく黄いろな酒を小さな猪口（ちょこ）についだりしている。いくら物価の安いときだって熊の毛皮二枚で二円はあんまり安いと誰（たれ）でも思う。実に安いしあんまり安いことは小十郎でも知っている。けれどもどうして小十郎はそんな町の荒物屋なんかへでなしにほかの人へどしどし売れないか。それはなぜか大ていの人にはわからない。けれども日本では狐（きつね）けんというものもあって狐は猟師に負け猟師は旦那に負けるときまっている。ここでは熊は小十郎にやられ小十郎が旦那にやられる。旦那は町のみんなの中にいるからなかなか熊に食われない。けれどもこんないやなずるいやつらは世界がだんだん進歩するとひとりで消えてなくなっていく。僕はしばらくの間でもあんな立派な小十郎が二度とつらも見たくないようないやなやつにうまくやられることを書いたのが実にしゃくにさわってたまらない。", "こんなふうだったから小十郎は熊どもは殺してはいても決してそれを憎んではいなかったのだ。ところがある年の夏こんなようなおかしなことが起ったのだ。", "小十郎が谷をばちゃばちゃ渉（わた）って一つの岩にのぼったらいきなりすぐ前の木に大きな熊が猫（ねこ）のようにせなかを円くしてよじ登っているのを見た。小十郎はすぐ鉄砲をつきつけた。犬はもう大悦（おおよろこ）びで木の下に行って木のまわりを烈（はげ）しく馳（は）せめぐった。", "すると樹の上の熊はしばらくの間おりて小十郎に飛びかかろうかそのまま射（う）たれてやろうか思案しているらしかったがいきなり両手を樹からはなしてどたりと落ちて来たのだ。小十郎は油断なく銃を構えて打つばかりにして近寄って行ったら熊は両手をあげて叫んだ。", "「おまえは何がほしくておれを殺すんだ」", "「ああ、おれはお前の毛皮と、胆（きも）のほかにはなんにもいらない。それも町へ持って行ってひどく高く売れるというのではないしほんとうに気の毒だけれどもやっぱり仕方ない。けれどもお前に今ごろそんなことを言われるともうおれなどは何か栗かしだのみでも食っていてそれで死ぬならおれも死んでもいいような気がするよ」", "「もう二年ばかり待ってくれ、おれも死ぬのはもうかまわないようなもんだけれども少しし残した仕事もあるしただ二年だけ待ってくれ。二年目にはおれもおまえの家の前でちゃんと死んでいてやるから。毛皮も胃袋もやってしまうから」", "小十郎は変な気がしてじっと考えて立ってしまいました。熊はそのひまに足うらを全体地面につけてごくゆっくりと歩き出した。小十郎はやっぱりぼんやり立っていた。熊はもう小十郎がいきなりうしろから鉄砲を射ったり決してしないことがよくわかってるというふうでうしろも見ないでゆっくりゆっくり歩いて行った。そしてその広い赤黒いせなかが木の枝の間から落ちた日光にちらっと光ったとき小十郎は、う、うとせつなそうにうなって谷をわたって帰りはじめた。それからちょうど二年目だったがある朝小十郎があんまり風が烈しくて木もかきねも倒れたろうと思って外へ出たらひのきのかきねはいつものようにかわりなくその下のところに始終見たことのある赤黒いものが横になっているのでした。ちょうど二年目だしあの熊がやって来るかと少し心配するようにしていたときでしたから小十郎はどきっとしてしまいました。そばに寄って見ましたらちゃんとあのこの前の熊が口からいっぱいに血を吐いて倒れていた。小十郎は思わず拝むようにした。", "一月のある日のことだった。小十郎は朝うちを出るときいままで言ったことのないことを言った。", "「婆（ば）さま、おれも年老（と）ったでばな、今朝まず生れで始めで水へ入るの嫌（や）んたよな気するじゃ」", "すると縁側の日なたで糸を紡いでいた九十になる小十郎の母はその見えないような眼をあげてちょっと小十郎を見て何か笑うか泣くかするような顔つきをした。小十郎はわらじを結えてうんとこさと立ちあがって出かけた。子供らはかわるがわる厩（うまや）の前から顔を出して「爺（じ）さん、早ぐお出（で）や」と言って笑った。小十郎はまっ青なつるつるした空を見あげてそれから孫たちの方を向いて「行って来るじゃぃ」と言った。", "小十郎はまっ白な堅雪の上を白沢の方へのぼって行った。", "犬はもう息をはあはあし赤い舌を出しながら走ってはとまり走ってはとまりして行った。間もなく小十郎の影は丘の向うへ沈んで見えなくなってしまい子供らは稗（ひえ）の藁（わら）でふじつきをして遊んだ。", "小十郎は白沢の岸を溯（のぼ）って行った。水はまっ青に淵（ふち）になったり硝子（ガラス）板をしいたように凍ったりつららが何本も何本もじゅずのようになってかかったりそして両岸からは赤と黄いろのまゆみの実が花が咲いたようにのぞいたりした。小十郎は自分と犬との影法師がちらちら光り樺（かば）の幹の影といっしょに雪にかっきり藍（あい）いろの影になってうごくのを見ながら溯って行った。", "白沢から峯を一つ越えたとこに一疋の大きなやつが棲（す）んでいたのを夏のうちにたずねておいたのだ。", "小十郎は谷に入って来る小さな支流を五つ越えて何べんも何べんも右から左左から右へ水をわたって溯って行った。そこに小さな滝があった。小十郎はその滝のすぐ下から長根の方へかけてのぼりはじめた。雪はあんまりまばゆくて燃えているくらい。小十郎は眼がすっかり紫の眼鏡（めがね）をかけたような気がして登って行った。犬はやっぱりそんな崖（がけ）でも負けないというようにたびたび滑りそうになりながら雪にかじりついて登ったのだ。やっと崖を登りきったらそこはまばらに栗の木の生えたごくゆるい斜面の平らで雪はまるで寒水石という風にギラギラ光っていたしまわりをずうっと高い雪のみねがにょきにょきつったっていた。小十郎がその頂上でやすんでいたときだ。いきなり犬が火のついたように咆（ほ）え出した。小十郎がびっくりしてうしろを見たらあの夏に眼をつけておいた大きな熊が両足で立ってこっちへかかって来たのだ。", "小十郎は落ちついて足をふんばって鉄砲を構えた。熊は棒のような両手をびっこにあげてまっすぐに走って来た。さすがの小十郎もちょっと顔いろを変えた。", "ぴしゃというように鉄砲の音が小十郎に聞えた。ところが熊は少しも倒れないで嵐（あらし）のように黒くゆらいでやって来たようだった。犬がその足もとに噛（か）み付いた。と思うと小十郎はがあんと頭が鳴ってまわりがいちめんまっ青になった。それから遠くでこう言うことばを聞いた。", "「おお小十郎おまえを殺すつもりはなかった」", "もうおれは死んだと小十郎は思った。そしてちらちらちらちら青い星のような光がそこらいちめんに見えた。", "「これが死んだしるしだ。死ぬとき見る火だ。熊ども、ゆるせよ」と小十郎は思った。それからあとの小十郎の心持はもう私にはわからない。", "とにかくそれから三日目の晩だった。まるで氷の玉のような月がそらにかかっていた。雪は青白く明るく水は燐光（りんこう）をあげた。すばるや参（しん）の星が緑や橙（だいだい）にちらちらして呼吸をするように見えた。", "その栗の木と白い雪の峯々にかこまれた山の上の平らに黒い大きなものがたくさん環（わ）になって集って各々黒い影を置き回々（フイフイ）教徒の祈るときのようにじっと雪にひれふしたままいつまでもいつまでも動かなかった。そしてその雪と月のあかりで見るといちばん高いとこに小十郎の死骸（しがい）が半分座ったようになって置かれていた。", "思いなしかその死んで凍えてしまった小十郎の顔はまるで生きてるときのように冴（さ）え冴（ざ）えして何か笑っているようにさえ見えたのだ。ほんとうにそれらの大きな黒いものは参の星が天のまん中に来てももっと西へ傾いてもじっと化石したようにうごかなかった。"]}, {"no": 38, "title": "野菊の墓", "author": "藤 左千夫", "category": "日本文学-物語", "chars": 35474, "volume": "大", "paras": ["後（のち）　の月という時分が来ると、どうも思わずには居られない。幼い訣（わけ）　とは思うが何分にも忘れることが出来ない。もはや十年　余（よ）　も過去った昔のことであるから、細かい事実は多くは覚えて居ないけれど、心持だけは今なお昨日の如く、その時の事を考えてると、全く当時の心持に立ち返って、涙が留めどなく湧くのである。悲しくもあり楽しくもありというような状態で、忘れようと思うこともないではないが、寧（むし）　ろ繰返し繰返し考えては、夢幻的の興味を貪（むさぼ）　って居る事が多い。そんな訣から一寸（ちょっと）　物に書いて置こうかという気になったのである。", "僕の家というのは、松戸から二里ばかり下って、矢切（やぎり）　の渡（わたし）　を東へ渡り、小高い岡の上でやはり矢切村と云ってる所。矢切の斎藤と云えば、この界隈（かいわい）　での旧家で、里見の崩れが二三人ここへ落ちて百姓になった内の一人が斎藤と云ったのだと祖父から聞いて居る。屋敷の西側に一丈五六尺も廻るような椎（しい）　の樹が四五本重なり合って立って居る。村一番の忌森（いもり）　で村じゅうから羨（うらや）　ましがられて居る。昔から何ほど暴風（あらし）　が吹いても、この椎森のために、僕の家ばかりは屋根を剥（は）　がれたことはただの一度もないとの話だ。家なども随分と古い、柱が残らず椎の木だ。それがまた煤（すす）　やら垢（あか）　やらで何の木か見別けがつかぬ位、奥の間の最も煙に遠いとこでも、天井板がまるで油炭で塗った様に、板の木目（もくめ）　も判らぬほど黒い。それでも建ちは割合に高くて、簡単な欄間もあり銅の釘隠（くぎかくし）　なども打ってある。その釘隠が馬鹿に大きい雁（がん）　であった。勿論（もちろん）　一寸見たのでは木か金かも知れないほど古びている。", "僕の母なども先祖の言い伝えだからといって、この戦国時代の遺物的古家を、大へんに自慢されていた。その頃母は血の道で久しく煩（わずら）　って居られ、黒塗的な奥の一間がいつも母の病褥（びょうじょく）　となって居た。その次の十畳の間の南隅（みなみすみ）　に、二畳の小座敷がある。僕が居ない時は機織場（はたおりば）　で、僕が居る内は僕の読書室にしていた。手摺窓（てすりまど）　の障子を明けて頭を出すと、椎の枝が青空を遮（さえぎ）　って北を掩（おお）　うている。", "母が永らくぶらぶらして居たから、市川の親類で僕には縁の従妹（いとこ）　になって居る、民子という女の児が仕事の手伝やら母の看護やらに来て居った。僕が今忘れることが出来ないというのは、その民子と僕との関係である。その関係と云っても、僕は民子と下劣な関係をしたのではない。", "僕は小学校を卒業したばかりで十五歳、月を数えると十三歳何ヶ月という頃、民子は十七だけれどそれも生れが晩（おそ）　いから、十五と少しにしかならない。痩（や）　せぎすであったけれども顔は丸い方で、透き徹るほど白い皮膚に紅味（あかみ）　をおんだ、誠に光沢（つや）　の好い児であった。いつでも活々（いきいき）　として元気がよく、その癖気は弱くて憎気の少しもない児であった。", "勿論僕とは大の仲好しで、座敷を掃くと云っては僕の所をのぞく、障子をはたくと云っては僕の座敷へ這入（は
