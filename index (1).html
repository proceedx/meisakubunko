い）　ってくる、私も本が読みたいの手習がしたいのと云う、たまにはハタキの柄で僕の背中を突いたり、僕の耳を摘まんだりして逃げてゆく。僕も民子の姿を見れば来い来いと云うて二人で遊ぶのが何より面白かった。", "母からいつでも叱られる。", "「また民やは政の所へ這入（はい）ってるナ。コラァさっさと掃除をやってしまえ。これからは政の読書の邪魔などしてはいけません。民やは年上の癖に         」", "などと頻（しき）　りに小言を云うけれど、その実（じつ）　母も民子をば非常に可愛がって居るのだから、一向に小言がきかない。私にも少し手習をさして         などと時々民子はだだをいう。そういう時の母の小言もきまっている。", "「お前は手習よか裁縫です。着物が満足に縫えなくては女　一人前（いちにんまえ）　として嫁にゆかれません」", "この頃僕に一点の邪念が無かったは勿論であれど、民子の方にも、いやな考えなどは少しも無かったに相違ない。しかし母がよく小言を云うにも拘（かかわ）　らず、民子はなお朝の御飯だ昼の御飯だというては僕を呼びにくる。呼びにくる度に、急いで這入って来て、本を見せろの筆を借せのと云ってはしばらく遊んでいる。その間にも母の薬を持ってきた帰りや、母の用を達（た）　した帰りには、きっと僕の所へ這入ってくる。僕も民子がのぞかない日は何となく淋しく物足らず思われた。今日は民さんは何をしているかナと思い出すと、ふらふらッと書室を出る。民子を見にゆくというほどの心ではないが、一寸民子の姿が目に触れれば気が落着くのであった。何のこったやっぱり民子を見に来たんじゃないかと、自分で自分を嘲（あざけ）　った様なことがしばしばあったのである。", "村の或家さ瞽女（ごぜ）　がとまったから聴きにゆかないか、祭文（さいもん）　がきたから聴きに行こうのと近所の女共が誘うても、民子は何とか断りを云うて決して家を出ない。隣村の祭で花火や飾物があるからとの事で、例の向うのお浜や隣のお仙等が大騒ぎして見にゆくというに、内のものらまで民さんも一所に行って見てきたらと云うても、民子は母の病気を言い前にして行かない。僕も余りそんな所へ出るは嫌（いや）　であったから家に居る。民子は狐鼠狐鼠（こそこそ）　と僕の所へ這入ってきて、小声で、私は内に居るのが一番面白いわと云ってニッコリ笑う。僕も何となし民子をばそんな所へやりたくなかった。", "僕が三日置き四日置きに母の薬を取りに松戸へゆく。どうかすると帰りが晩くなる。民子は三度も四度も裏坂の上まで出て渡しの方を見ていたそうで、いつでも家中のものに冷かされる。民子は真面目（まじめ）　になって、お母さんが心配して、見てお出（い）　で見てお出でというからだと云い訣（わけ）　をする。家の者は皆ひそひそ笑っているとの話であった。", "そういう次第だから、作おんなのお増などは、無上（むしょう）　と民子を小面（こづら）　憎がって、何かというと、", "「民子さんは政夫さんとこへ許り行きたがる、隙（ひま）　さえあれば政夫さんにこびりついている」", "などと頻りに云いはやしたらしく、隣のお仙や向うのお浜等までかれこれ噂をする。これを聞いてか嫂（あによめ）　が母に注意したらしく、或日母は常になくむずかしい顔をして、二人を枕もとへ呼びつけ意味有り気な小言を云うた。", "「男も女も十五六になればもはや児供（こども）　ではない。お前等二人が余り仲が好過ぎるとて人がかれこれ云うそうじゃ。気をつけなくてはいけない。民子が年かさの癖によくない。これからはもう決して政の所へなど行くことはならぬ。吾子（わがこ）　を許すではないが政は未だ児供だ。民やは十七ではないか。つまらぬ噂をされるとお前の体に疵（きず）　がつく。政夫だって気をつけろ         。来月から千葉の中学へ行くんじゃないか」", "民子は年が多いし且（かつ）　は意味あって僕の所へゆくであろうと思われたと気がついたか、非常に愧（は）　じ入った様子に、顔真赤にして俯向（うつむ）　いている。常は母に少し位小言云われても随分だだをいうのだけれど、この日はただ両手をついて俯向いたきり一言もいわない。何の疚（やま）　しい所のない僕は頗（すこぶ）　る不平で、", "「お母さん、そりゃ余り御無理です。人が何と云ったって、私等は何の訣もないのに、何か大変悪いことでもした様なお小言じゃありませんか。お母さんだっていつもそう云ってたじゃありませんか。民子とお前とは兄弟も同じだ、お母さんの眼からはお前も民子も少しも隔てはない、仲よくしろよといつでも云ったじゃありませんか」", "母の心配も道理のあることだが、僕等もそんないやらしいことを云われようとは少しも思って居なかったから、僕の不平もいくらかの理はある。母は俄（にわか）　にやさしくなって、", "「お前達に何の訣もないことはお母さんも知ってるがネ、人の口がうるさいから、ただこれから少し気をつけてと云うのです」", "色青ざめた母の顔にもいつしか僕等を真から可愛がる笑みが湛（たた）　えて居る。やがて、", "「民やはあのまた薬を持ってきて、それから縫掛けの袷（あわせ）　を今日中に仕上げてしまいなさい         。政は立った次手（ついで）　に花を剪（き）　って仏壇へ捧（あ）　げて下さい。菊はまだ咲かないか、そんなら紫苑（しおん）　でも切ってくれよ」", "本人達は何の気なしであるのに、人がかれこれ云うのでかえって無邪気でいられない様にしてしまう。僕は母の小言も一日しか覚えていない。二三日たって民さんはなぜ近頃は来ないのか知らんと思った位であったけれど、民子の方では、それからというものは様子がからっと変ってしもうた。", "民子はその後僕の所へは一切顔出ししないばかりでなく、座敷の内で行逢っても、人のいる前などでは容易に物も云わない。何となく極（きま）　りわるそうに、まぶしい様な風で急いで通り過ぎて終う。拠処（よんどころ）　なく物を云うにも、今までの無遠慮に隔てのない風はなく、いやに丁寧に改まって口をきくのである。時には僕が余り俄に改まったのを可笑（おか）　しがって笑えば、民子も遂には袖で笑いを隠して逃げてしまうという風で、とにかく一重の垣が二人の間に結ばれた様な気合になった。", "それでも或日の四時過ぎに、母の云いつけで僕が背戸の茄子畑（なすばたけ）　に茄子をもいで居ると、いつのまにか民子が笊（ざる）　を手に持って、僕の後にきていた。", "「政夫さん         」", "出し抜けに呼んで笑っている。", "「私もお母さんから云いつかって来たのよ。今日の縫物は肩が凝（こ）ったろう、少し休みながら茄子をもいできてくれ。明日　麹漬（こうじづけ）　をつけるからって、お母さんがそう云うから、私飛んできました」", "民子は非常に嬉しそうに元気一パイで、僕が、", "「それでは僕が先にきているのを民さんは知らないで来たの」", "と云うと民子は、", "「知らなくてサ」", "にこにこしながら茄子を採り始める。", "茄子畑というは、椎森の下から一重の藪（やぶ）　を通り抜けて、家より西北に当る裏の前栽畑（せんざいばたけ）　。崖（がけ）　の上になってるので、利根川は勿論中川までもかすかに見え、武蔵一えんが見渡される。秩父から足柄箱根の山山、富士の高峯（たかね）　も見える。東京の上野の森だと云うのもそれらしく見える。水のように澄みきった秋の空、日は一間半ばかりの辺に傾いて、僕等二人が立って居る茄子畑を正面に照り返して居る。あたり一体にシンとしてまた如何（いか）　にもハッキリとした景色、吾等二人は真に画中の人である。", "「マア何という好い景色でしょう」", "民子もしばらく手をやめて立った。", "僕はここで白状するが、この時の僕は慥（たしか）　に十日以前の僕ではなかった。二人は決してこの時無邪気な友達ではなかった。いつの間にそういう心持が起って居たか、自分には少しも判らなかったが、やはり母に叱られた頃から、僕の胸の中にも小さな恋の卵が幾個（いくつ）　か湧きそめて居ったに違いない。僕の精神状態がいつの間にか変化してきたは、隠すことの出来ない事実である。この日初めて民子を女として思ったのが、僕に邪念の萌芽（めざし）　ありし何よりの証拠じゃ。", "民子が体をくの字にかがめて、茄子をもぎつつあるその横顔を見て、今更のように民子の美しく可愛らしさに気がついた。これまでにも可愛らしいと思わぬことはなかったが、今日はしみじみとその美しさが身にしみた。しなやかに光沢（つや）　のある鬢（びん）　の毛につつまれた耳たぼ、豊かな頬の白く鮮かな、顎（あご）　のくくしめの愛らしさ、頸（くび）　のあたり如何にも清げなる、藤色の半襟（はんえり）　や花染の襷（たすき）　や、それらが悉（ことごと）　く優美に眼にとまった。そうなると恐ろしいもので、物を云うにも思い切った言（こと）　は云えなくなる、羞（はず）かしくなる、極りが悪くなる、皆例の卵の作用から起ることであろう。", "ここ十日ほど仲垣の隔てが出来て、ロクロク話もせなかったから、これも今までならば無論そんなこと考えもせぬにきまって居るが、今日はここで何か話さねばならぬ様な気がした。僕は初め無造作に民さんと呼んだけれど、跡は無造作に詞（ことば）　が継がない。おかしく喉（のど）　がつまって声が出ない。民子は茄子を一つ手に持ちながら体を起して、", "「政夫さん、なに         」", "「何でもないけど民さんは近頃へんだからさ。僕なんかすっかり嫌いになったようだもの」", "民子はさすがに女性（にょしょう）　で、そういうことには僕などより遙に神経が鋭敏になっている。さも口惜（くや）しそうな顔して、つと僕の側へ寄ってきた。", "「政夫さんはあんまりだわ。私がいつ政夫さんに隔てをしました         」", "「何さ、この頃民さんは、すっかり変っちまって、僕なんかに用はないらしいからよ。それだって民さんに不足を云う訣ではないよ」", "民子はせきこんで、", "「そんな事いうはそりゃ政夫さんひどいわ、御無理だわ。この間は二人を並べて置いて、お母さんにあんなに叱られたじゃありませんか。あなたは男ですから平気でお出でだけど、私は年は多いし女ですもの、あァ云われては実に面目がないじゃありませんか。それですから、私は一生懸命になってたしなんで居るんでさ。それを政夫さん隔てるの嫌になったろうのと云うんだもの、私はほんとにつまらない         」", "民子は泣き出しそうな顔つきで僕の顔をじいッと視（み）　ている。僕もただ話の小口にそう云うたまでであるから、民子に泣きそうになられては、かわいそうに気の毒になって、", "「僕は腹を立って言ったでは無いのに、民さんは腹を立ったの         僕はただ民さんが俄に変って、逢っても口もきかず、遊びにも来ないから、いやに淋しく悲しくなっちまったのさ。それだからこれからも時時は遊びにお出でよ。お母さんに叱られたら僕が咎（とが）　を背負うから   人が何と云ったってよいじゃないか」", "何というても児供だけに無茶なことをいう。無茶なことを云われて民子は心配やら嬉しいやら、嬉しいやら心配やら、心配と嬉しいとが胸の中で、ごったになって争うたけれど、とうとう嬉しい方が勝を占めて終った。なお三言四言話をするうちに、民子は鮮かな曇りのない元の元気になった。僕も勿論愉快が溢（あふ）れる   、宇宙間にただ二人きり居るような心持にお互になったのである。やがて二人は茄子のもぎくらをする。大きな畑だけれど、十月の半過ぎでは、茄子もちらほらしかなって居ない。二人で漸（ようや）く二升ばかり宛（ずつ）　を採り得た。", "「まァ民さん、御覧なさい、入日の立派なこと」", "民子はいつしか笊を下へ置き、両手を鼻の先に合せて太陽を拝んでいる。西の方の空は一体に薄紫にぼかした様な色になった。ひた赤く赤いばかりで光線の出ない太陽が今その半分を山に埋めかけた処、僕は民子が一心入日を拝むしおらしい姿が永く眼に残ってる。", "二人が余念なく話をしながら帰ってくると、背戸口の四つ目垣の外にお増がぼんやり立って、こっちを見て居る。民子は小声で、", "「お増がまた何とか云いますよ」", "「二人共お母さんに云いつかって来たのだから、お増なんか何と云ったって、かまやしないさ」", "一事件を経（ふ）　る度に二人が胸中に湧いた恋の卵は層（かさ）　を増してくる。機に触れて交換する双方の意志は、直（ただち）　に互いの胸中にある例の卵に至大な養分を給与する。今日の日暮はたしかにその機であった。ぞっと身振いをするほど、著しき徴候を現したのである。しかし何というても二人の関係は卵時代で極（きわ）　めて取りとめがない。人に見られて見苦しい様なこともせず、顧みて自ら疚（やま）　しい様なこともせぬ。従ってまだまだ暢気（のんき）　なもので、人前を繕（つくろ）　うと云う様な心持は極めて少なかった。僕と民子との関係も、この位でお終いになったならば、十年忘れられないというほどにはならなかっただろうに。", "親というものはどこの親も同じで、吾子をいつまでも児供のように思うている。僕の母などもその一人に漏れない。民子はその後時折僕の書室へやってくるけれど、よほど人目を計らって気ぼねを折ってくる様な風で、いつきても少しも落着かない。先に僕に厭味（いやみ）　を云われたから仕方なしにくるかとも思われたが、それは間違っていた。僕等二人の精神状態は二三日と云われぬほど著しき変化を遂げている。僕の変化は最も甚（はなはだ）しい。三日前には、お母さんが叱れば私が科（とが）　を背負うから遊びにきてとまで無茶を云うた僕が、今日はとてもそんな訣のものでない。民子が少し長居をすると、もう気が咎めて心配でならなくなった。", "「民さん、またお出（いで）　よ、余り長く居ると人がつまらぬことを云うから」", "民子も心持は同じだけれど、僕にもう行けと云われると妙にすねだす。", "「あレあなたは先日何と云いました。人が何と云ったッてよいから遊びに来いと云いはしませんか。私はもう人に笑われてもかまいませんの」", "困った事になった。二人の関係が密接するほど、人目を恐れてくる。人目を恐れる様になっては、もはや罪悪を犯しつつあるかの如く、心もおどおどするのであった。母は口でこそ、男も女も十五六になれば児供ではないと云っても、それは理窟の上のことで、心持ではまだまだ二人をまるで児供の様に思っているから、その後民子が僕の室（へや）　へきて本を見たり話をしたりしているのを、直ぐ前を通りながら一向気に留める様子もない。この間の小言も実は嫂（あによめ）　が言うから出たまでで、ほんとうに腹から出た小言ではない。母の方はそうであったけれど、兄や嫂やお増などは、盛に蔭言をいうて笑っていたらしく、村中の評判には、二つも年の多いのを嫁にする気かしらんなどと専（もっぱら）　いうているとの話。それやこれやのことが薄々二人に知れたので、僕から言いだして当分二人は遠ざかる相談をした。", "人間の心持というものは不思議なもの。二人が少しも隔意なき得心上の相談であったのだけれど、僕の方から言い出したばかりに、民子は妙に鬱（ふさ）　ぎ込んで、まるで元気がなくなり、悄然（しょうぜん）　としているのである。それを見ると僕もまたたまらなく気の毒になる。感情の一進一退はこんな風にもつれつつ危くなるのである。とにかく二人は表面だけは立派に遠ざかって四五日を経過した。", "陰暦の九月十三日、今夜が豆の月だという日の朝、露霜が降りたと思うほどつめたい。その代り天気はきらきらしている。十五日がこの村の祭で明日は宵祭という訣故（わけゆえ）　、野の仕事も今日一渡り極（きま）　りをつけねばならぬ所から、家中手分けをして野へ出ることになった。それで甘露的恩命が僕等　両人（ふたり）　に下ったのである。兄夫婦とお増と外に男一人とは中稲（なかて）　の刈残りを是非刈って終（しま）わねばならぬ。民子は僕を手伝いとして山畑の棉（わた）　を採ってくることになった。これはもとより母の指図で誰にも異議は云えない。", "「マアあの二人を山の畑へ遣るッて、親というものよッぽどお目出たいものだ」", "奥底のないお増と意地曲りの嫂とは口を揃えてそう云ったに違いない。僕等二人はもとより心の底では嬉しいに相違ないけれど、この場合二人で山畑へゆくとなっては、人に顔を見られる様な気がして大いに極りが悪い。義理にも進んで行きたがる様な素振りは出来ない。僕は朝飯前は書室を出ない。民子も何か愚図愚図して支度もせぬ様子。もう嬉しがってと云われるのが口惜しいのである。母は起きてきて、", "「政夫も支度しろ。民やもさっさと支度して早く行け。二人でゆけば一日には楽な仕事だけれど、道が遠いのだから、早く行かないと帰りが夜になる。なるたけ日の暮れない内に帰ってくる様によ。お増は二人の弁当を拵（こしら）　えてやってくれ。お菜はこれこれの物で         」", "まことに親のこころだ。民子に弁当を拵えさせては、自分のであるから、お菜などはロクな物を持って行かないと気がついて、ちゃんとお増に命じて拵えさせたのである。僕はズボン下に足袋（たび）　裸足（はだし）　麦藁帽（むぎわらぼう）　という出で立ち、民子は手指（てさし）　を佩（は）いて股引（ももひき）も佩いてゆけと母が云うと、手指ばかり佩いて股引佩くのにぐずぐずしている。民子は僕のところへきて、股引佩かないでもよい様にお母さんにそう云ってくれと云う。僕は民さんがそう云いなさいと云う。押問答をしている内に、母はききつけて笑いながら、", "「民やは町場者（まちばもの）　だから、股引佩くのは極りが悪いかい。私はまたお前が柔かい手足へ、茨（いばら）　や薄（すすき）　で傷をつけるが可哀相だから、そう云ったんだが、いやだと云うならお前のすきにするがよいさ」", "それで民子は、例の襷（たすき）　に前掛姿で麻裏草履という支度。二人が一斗笊　一個宛（ひとつずつ）　を持ち、僕が別に番（ばん）　ニョ片籠（かたかご）　と天秤（てんびん）　とを肩にして出掛ける。民子が跡から菅笠（すげがさ）を被（かむ）って出ると、母が笑声で呼びかける。", "「民や、お前が菅笠を被って歩くと、ちょうど木の子が歩くようで見っともない。編笠がよかろう。新らしいのが一つあった筈だ」", "稲刈連は出てしまって別に笑うものもなかったけれど、民子はあわてて菅笠を脱いで、顔を赤くしたらしかった。今度は編笠を被らずに手に持って、それじゃお母さんいってまいりますと挨拶して走って出た。", "村のものらもかれこれいうと聞いてるので、二人揃うてゆくも人前恥かしく、急いで村を通抜けようとの考えから、僕は一足先になって出掛ける。村はずれの坂の降口（おりくち）　の大きな銀杏（いちょう）　の樹の根で民子のくるのを待った。ここから見おろすと少しの田圃（たんぼ）　がある。色よく黄ばんだ晩稲（おくて）　に露をおんで、シットリと打伏した光景は、気のせいか殊に清々（すがすが）しく、胸のすくような眺めである。民子はいつの間にか来ていて、昨日の雨で洗い流した赤土の上に、二葉三葉銀杏の葉の落ちるのを拾っている。", "「民さん、もうきたかい。この天気のよいことどうです。ほんとに心持のよい朝だねイ」", "「ほんとに天気がよくて嬉しいわ。このまア銀杏の葉の綺麗なこと。さア出掛けましょう」", "民子の美しい手で持ってると銀杏の葉も殊に綺麗に見える。二人は坂を降りてようやく窮屈な場所から広場へ出た気になった。今日は大いそぎで棉を採り片付け、さんざん面白いことをして遊ぼうなどと相談しながら歩く。道の真中は乾いているが、両側の田についている所は、露にしとしとに濡（ぬ）　れて、いろいろの草が花を開いてる。タウコギは末枯（うらが）　れて、水蕎麦蓼（みずそばたで）など一番多く繁っている。都草も黄色く花が見える。野菊がよろよろと咲いている。民さんこれ野菊がと僕は吾知らず足を留めたけれど、民子は聞えないのかさっさと先へゆく。僕は一寸　脇（わき）へ物を置いて、野菊の花を一握り採った。", "民子は一町ほど先へ行ってから、気がついて振り返るや否や、あれッと叫んで駆け戻ってきた。", "「民さんはそんなに戻ってきないッたって僕が行くものを         」", "「まア政夫さんは何をしていたの。私びッくりして    まあ綺麗な野菊、政夫さん、私に半分おくれッたら、私ほんとうに野菊が好き」", "「僕はもとから野菊がだい好き。民さんも野菊が好き         」", "「私なんでも野菊の生れ返りよ。野菊の花を見ると身振いの出るほど好（この）　もしいの。どうしてこんなかと、自分でも思う位」", "「民さんはそんなに野菊が好き         道理でどうやら民さんは野菊のような人だ」", "民子は分けてやった半分の野菊を顔に押しあてて嬉しがった。二人は歩きだす。", "「政夫さん         私野菊の様だってどうしてですか」", "「さアどうしてということはないけど、民さんは何がなし野菊の様な風だからさ」", "「それで政夫さんは野菊が好きだって         」", "「僕大好きさ」", "民子はこれからはあなたが先になってと云いながら、自らは後になった。今の偶然に起った簡単な問答は、お互の胸に強く有意味に感じた。民子もそう思った事はその素振りで解る。ここまで話が迫ると、もうその先を言い出すことは出来ない。話は一寸途切れてしまった。", "何と言っても幼い両人は、今罪の神に翻弄（ほんろう）　せられつつあるのであれど、野菊の様な人だと云った詞についで、その野菊を僕はだい好きだと云った時すら、僕は既に胸に動悸（どうき）　を起した位で、直ぐにそれ以上を言い出すほどに、まだまだずうずうしくはなっていない。民子も同じこと、物に突きあたった様な心持で強くお互に感じた時に声はつまってしまったのだ。二人はしばらく無言で歩く。", "真（まこと）　に民子は野菊の様な児であった。民子は全くの田舎風ではあったが、決して粗野ではなかった。可憐（かれん）　で優しくてそうして品格もあった。厭味とか憎気とかいう所は爪の垢（あか）　ほどもなかった。どう見ても野菊の風だった。", "しばらくは黙っていたけれど、いつまで話もしないでいるはなおおかしい様に思って、無理と話を考え出す。", "「民さんはさっき何を考えてあんなに脇見もしないで歩いていたの」", "「わたし何も考えていやしません」", "「民さんはそりゃ嘘だよ。何か考えごとでもしなくてあんな風をする訣はないさ。どんなことを考えていたのか知らないけれど、隠さないだってよいじゃないか」", "「政夫さん、済まない。私さっきほんとに考事（かんがえごと）　していました。私つくづく考えて情なくなったの。わたしはどうして政夫さんよか年が多いんでしょう。私は十七だと言うんだもの、ほんとに情なくなるわ         」", "「民さんは何のこと言うんだろう。先に生れたから年が多い、十七年育ったから十七になったのじゃないか。十七だから何で情ないのですか。僕だって、さ来年になれば十七歳さ。民さんはほんとに妙なことを云う人だ」", "僕も今民子が言ったことの心を解せぬほど児供でもない。解ってはいるけど、わざと戯れの様に聞きなして、振りかえって見ると、民子は真に考え込んでいる様であったが、僕と顔合せて極りわるげににわかに側（わき）　を向いた。", "こうなってくると何をいうても、直ぐそこへ持ってくるので話がゆきつまってしまう。二人の内でどちらか一人が、すこうしほんの僅かにでも押が強ければ、こんなに話がゆきつまるのではない。お互に心持は奥底まで解っているのだから、吉野紙を突破るほどにも力がありさえすれば、話の一歩を進めてお互に明放してしまうことが出来るのである。しかしながら真底からおぼこな二人は、その吉野紙を破るほどの押がないのである。またここで話の皮を切ってしまわねばならぬと云う様な、はっきり［＃「はっきり」に傍点］した意識も勿論ないのだ。言わば未（ま）　だ取止めのない卵的の恋であるから、少しく心の力が必要な所へくると話がゆきつまってしまうのである。", "お互に自分で話し出しては自分が極りわるくなる様なことを繰返しつつ幾町かの道を歩いた。詞数こそ少なけれ、その詞の奥には二人共に無量の思いを包んで、極りがわるい感情の中には何とも云えない深き愉快を湛えて居る。それでいわゆる足も空に、いつしか田圃も通りこし、山路へ這入った。今度は民子が心を取り直したらしく鮮かな声で、", "「政夫さん、もう半分道来ましてしょうか。大長柵（おおながさく）　へは一里に遠いッて云いましたねイ」", "「そうです、一里半には近いそうだが、もう半分の余来ましたろうよ。少し休みましょうか」", "「わたし休まなくとも、ようございますが、早速お母さんの罰があたって、薄（すすき）　の葉でこんなに手を切りました。ちょいとこれで結わえて下さいな」", "親指の中ほどで疵（きず）　は少しだが、血が意外に出た。僕は早速紙を裂いて結わえてやる。民子が両手を赤くしているのを見た時非常にかわいそうであった。こんな山の中で休むより、畑へ往（い）　ってから休もうというので、今度は民子を先に僕が後になって急ぐ。八時少し過ぎと思う時分に大長柵の畑へ着いた。", "十年許り前に親父（おやじ）　が未だ達者な時分、隣村の親戚から頼まれて余儀なく買ったのだそうで、畑が八反と山林が二町ほどここにあるのである。この辺一体に高台は皆山林でその間の柵が畑になって居る。越石（こしこく）　を持っていると云えば、世間体はよいけど、手間ばかり掛って割に合わないといつも母が言ってる畑だ。", "三方林で囲まれ、南が開いて余所（よそ）　の畑とつづいている。北が高く南が低い傾斜（こうばい）　になっている。母の推察通り、棉は末にはなっているが、風が吹いたら溢れるかと思うほど棉はえんでいる。点々として畑中白くなっているその棉に朝日がさしていると目（ま）　ぶしい様に綺麗だ。", "「まアよくえんでること。今日採りにきてよい事しました」", "民子は女だけに、棉の綺麗にえんでるのを見て嬉しそうにそう云った。畑の真中ほどに桐の樹が二本繁っている。葉が落ちかけて居るけれど、十月の熱を凌（しの）　ぐには十分だ。ここへあたりの黍殻（きびがら）　を寄せて二人が陣どる。弁当包みを枝へ釣る。天気のよいのに山路を急いだから、汗ばんで熱い。着物を一枚ずつ脱ぐ。風を懐（ふところ）　へ入れ足を展（のば）　して休む。青ぎった空に翠（みどり）　の松林、百舌（もず）　もどこかで鳴いている。声の響くほど山は静かなのだ。天と地との間で広い畑の真ン中に二人が話をしているのである。", "「ほんとに民子さん、きょうというきょうは極楽の様な日ですねイ」", "顔から頸から汗を拭いた跡のつやつやしさ、今更に民子の横顔を見た。", "「そうですねイ、わたし何だか夢の様な気がするの。今朝　家（うち）　を出る時はほんとに極りが悪くて     嫂（ねえ）　さんには変な眼つきで視られる、お増には冷かされる、私はのぼせてしまいました。政夫さんは平気でいるから憎らしかったわ」", "「僕だって平気なもんですか。村の奴らに逢うのがいやだから、僕は一足先に出て銀杏の下で民さんを待っていたんでさア。それはそうと、民さん、今日はほんとに面白く遊ぼうね。僕は来月は学校へ行くんだし、今月とて十五日しかないし、二人でしみじみ話の出来る様なことはこれから先はむずかしい。あわれッぽいこと云うようだけど、二人の中も今日だけかしらと思うのよ。ねイ民さん         」", "「そりゃア政夫さん、私は道々そればかり考えて来ました。私がさっきほんとに情なくなってと言ったら、政夫さんは笑っておしまいなしたけど         」", "面白く遊ぼう遊ぼう言うても、話を始めると直ぐにこうなってしまう。民子は涙を拭うた様であった。ちょうどよくそこへ馬が見えてきた。西側の山路から、がさがさ笹にさわる音がして、薪（たきぎ）　をつけた馬を引いて頬冠（ほおかむり）　の男が出て来た。よく見ると意外にも村の常吉である。この奴はいつか向うのお浜に民子を遊びに連れだしてくれと頻（しき）　りに頼んだという奴だ。いやな野郎がきやがったなと思うていると、", "「や政夫さん。コンチャどうも結構なお天気ですな。今日は御夫婦で棉採りかな。洒落（しゃ）　れてますね。アハハハハハ」", "「オウ常さん、今日は駄賃かな。大変早く御精が出ますね」", "「ハア吾々なんざア駄賃取りでもして適（たま）　に一盃（いっぱい）　やるより外に楽しみもないんですからな。民子さん、いやに見せつけますね。余（あんま）　り罪ですぜ。アハハハハハ」", "この野郎失敬なと思ったけれど、吾々も余り威張れる身でもなし、笑いとぼけて常吉をやり過ごした。", "「馬鹿野郎、実に厭なやつだ。さア民さん、始めましょう。ほんとに民さん、元気をお直しよ。そんなにくよくよおしでないよ。僕は学校へ行ったて千葉だもの、盆正月の外にも来ようと思えば土曜の晩かけて日曜に来られるさ         」", "「ほんとに済みません。泣面（なきつら）　などして。あの常さんて男、何といういやな人でしょう」", "民子は襷掛け僕はシャツに肩を脱いで一心に採って三時間ばかりの間に七分通り片づけてしまった。もう跡はわけがないから弁当にしようということにして桐の蔭に戻る。僕はかねて用意の水筒を持って、", "「民さん、僕は水を汲（く）　んで来ますから、留守番を頼みます。帰りに『えびづる』や『あけび』をうんと土産（みやげ）　に採って来ます」", "「私は一人で居るのはいやだ。政夫さん、一所に連れてって下さい。さっきの様な人にでも来られたら大変ですもの」", "「だって民さん、向うの山を一つ越して先ですよ、清水（しみず）　のある所は。道という様な道もなくて、それこそ茨（いばら）　や薄（すすき）で足が疵だらけになりますよ。水がなくちゃ弁当が食べられないから、困ったなア、民さん、待っていられるでしょう」", "「政夫さん、後生だから連れて行って下さい。あなたが歩ける道なら私にも歩けます。一人でここにいるのはわたしゃどうしても         」", "「民さんは山へ来たら大変だだッ児になりましたネー。それじゃ一所に行きましょう」", "弁当は棉の中へ隠し、着物はてんでに着てしまって出掛ける。民子は頻りに、にこにこしている。端（はた）　から見たならば、馬鹿馬鹿しくも見苦しくもあろうけれど、本人同志の身にとっては、そのらちもなき押問答の内にも限りなき嬉しみを感ずるのである。高くもないけど道のない所をゆくのであるから、笹原を押分け樹の根につかまり、崖を攀（よ）　ずる。しばしば民子の手を採って曳（ひ）　いてやる。", "近く二三日以来の二人の感情では、民子が求めるならば僕はどんなことでも拒まれない、また僕が求めるならやはりどんなことでも民子は決して拒みはしない。そういう間柄でありつつも、飽くまで臆病に飽くまで気の小さな両人（ふたり）　は、嘗（かつ）　て一度も有意味に手などを採ったことはなかった。しかるに今日は偶然の事から屡手を採り合うに至った。這辺（このへん）　の一種云うべからざる愉快な感情は経験ある人にして初めて語ることが出来る。", "「民さん、ここまでくれば、清水はあすこに見えます。これから僕が一人で行ってくるからここに待って居なさい。僕が見えて居たら居られるでしょう」", "「ほんとに政夫さんの御厄介ですね         そんなにだだを言っては済まないから、ここで待ちましょう。あらア野葡萄（えびづる）　があった」", "僕は水を汲んでの帰りに、水筒は腰に結いつけ、あたりを少し許り探って、『あけび』四五十と野葡萄一もくさを採り、竜胆（りんどう）　の花の美しいのを五六本見つけて帰ってきた。帰りは下りだから無造作に二人で降りる。畑へ出口で僕は春蘭（しゅんらん）　の大きいのを見つけた。", "「民さん、僕は一寸『アックリ』を掘ってゆくから、この『あけび』と『えびづる』を持って行って下さい」", "「『アックリ』てなにい。あらア春蘭じゃありませんか」", "「民さんは町場もんですから、春蘭などと品のよいこと仰（おっ）　しゃるのです。矢切の百姓なんぞは『アックリ』と申しましてね、皸（あかぎれ）　の薬に致します。ハハハハ」", "「あらア口の悪いこと。政夫さんは、きょうはほんとに口が悪くなったよ」", "山の弁当と云えば、土地の者は一般に楽しみの一つとしてある。何か生理上の理由でもあるか知らんが、とにかく、山の仕事をしてやがてたべる弁当が不思議とうまいことは誰も云う所だ。今吾々二人は新らしき清水を汲み来り母の心を籠（こ）　めた弁当を分けつつたべるのである。興味の尋常でないは言うも愚（おろか）　な次第だ。僕は『あけび』を好み民子は野葡萄をたべつつしばらく話をする。", "民子は笑いながら、", "「政夫さんは皸の薬に『アックリ』とやらを採ってきて学校へお持ちになるの。学校で皸がきれたらおかしいでしょうね         」", "僕は真面目に、", "「なアにこれはお増にやるのさ。お増はもうとうに皸を切らしているでしょう。この間も湯に這入る時にお増が火を焚（た）　きにきて非常に皸を痛がっているから、その内に僕が山へ行ったら『アックリ』を採ってきてやると言ったのさ」", "「まアあなたは親切な人ですことね         お増は蔭日向（かげひなた）　のない憎気のない女ですから、私も仲好くしていたんですが、この頃は何となし私に突き当る様な事ばかし言って、何でもわたしを憎んでいますよ」", "「アハハハ、それはお増どんが焼餅をやくのでさ。つまらんことにもすぐ焼餅を焼くのは、女の癖さ。僕がそら『アックリ』を採っていってお増にやると云えば、民さんがすぐに、まアあなたは親切な人とか何とか云うのと同じ訣（わけ）　さ」", "「この人はいつのまにこんなに口がわるくなったのでしょう。何を言っても政夫さんにはかないやしない。いくら私だってお増が根も底もない焼もちだ位は承知していますよ         」", "「実はお増も不憫（ふびん）　な女よ。両親があんなことになりさえせねば、奉公人とまでなるのではない。親父は戦争で死ぬ、お袋はこれを嘆いたがもとでの病死、一人の兄がはずれものという訣で、とうとうあの始末。国家のために死んだ人の娘だもの、民さん、いたわってやらねばならない。あれでも民さん、あなたをば大変ほめているよ。意地曲りの嫂にこきつかわれるのだから一層かわいそうでさ」", "「そりゃ政夫さん私もそう思って居ますさ。お母さんもよくそうおっしゃいました。つまらないものですけど何とかかとか分けてやってますが、また政夫さんの様に情深くされると         」", "民子は云いさしてまた話を詰らしたが、桐の葉に包んで置いた竜胆の花を手に採って、急に話を転じた。", "「こんな美しい花、いつ採ってお出でなして。りんどうはほんとによい花ですね。わたしりんどうがこんなに美しいとは知らなかったわ。わたし急にりんどうが好きになった。おオえエ花         」", "花好きな民子は例の癖で、色白の顔にその紫紺の花を押しつける。やがて何を思いだしてか、ひとりでにこにこ笑いだした。", "「民さん、なんです、そんなにひとりで笑って」", "「政夫さんはりんどうの様な人だ」", "「どうして」", "「さアどうしてということはないけど、政夫さんは何がなし竜胆の様な風だからさ」", "民子は言い終って顔をかくして笑った。", "「民さんもよっぽど人が悪くなった。それでさっきの仇討（あだうち）　という訣ですか。口真似なんか恐入りますナ。しかし民さんが野菊で僕が竜胆とは面白い対ですね。僕は悦（よろこ）　んでりんどうになります。それで民さんがりんどうを好きになってくれればなお嬉しい」", "二人はこんならちもなき事いうて悦んでいた。秋の日足の短さ、日はようやく傾きそめる。さアとの掛声で棉もぎにかかる。午後の分は僅であったから一時間半ばかりでもぎ終えた。何やかやそれぞれまとめて番ニョに乗せ、二人で差しあいにかつぐ。民子を先に僕が後に、とぼとぼ畑を出掛けた時は、日は早く松の梢をかぎりかけた。", "半分道も来たと思う頃は十三夜の月が、木（こ）　の間（ま）　から影をさして尾花にゆらぐ風もなく、露の置くさえ見える様な夜になった。今朝は気がつかなかったが、道の西手に一段低い畑には、蕎麦（そば）　の花が薄絹を曳き渡したように白く見える。こおろぎが寒げに鳴いているにも心とめずにはいられない。", "「民さん、くたぶれたでしょう。どうせおそくなったんですから、この景色のよい所で少し休んで行きましょう」", "「こんなにおそくなるなら、今少し急げばよかったに。家の人達にきっと何とか言われる。政夫さん、私はそれが心配になるわ」", "「今更心配しても追（おっ）　つかないから、まア少し休みましょう。こんなに景色のよいことは滅多（めった）　にありません。そんなに人に申訣のない様な悪いことはしないもの、民さん、心配することはないよ」", "月あかりが斜にさしこんでいる道端の松の切株に二人は腰をかけた。目の先七八間の所は木の蔭で薄暗いがそれから向うは畑一ぱいに月がさして、蕎麦の花が際（きわ）　立って白い。", "「何というえい景色でしょう。政夫さん歌とか俳句とかいうものをやったら、こんなときに面白いことが云えるでしょうね。私ら様な無筆でもこんな時には心配も何も忘れますもの。政夫さん、あなた歌をおやんなさいよ」", "「僕は実は少しやっているけど、むずかしくて容易に出来ないのさ。山畑の蕎麦の花に月がよくて、こおろぎが鳴くなどは実にえいですなア。民さん、これから二人で歌をやりましょうか」", "お互に一つの心配を持つ身となった二人は、内に思うことが多くてかえって話は少ない。何となく覚束（おぼつか）　ない二人の行末、ここで少しく話をしたかったのだ。民子は勿論のこと、僕よりも一層話したかったに相違ないが、年の至らぬのと浮いた心のない二人は、なかなか差向いでそんな話は出来なかった。しばらくは無言でぼんやり時間を過ごすうちに、一列の雁（がん）　が二人を促すかの様に空近く鳴いて通る。", "ようやく田圃へ降りて銀杏の木が見えた時に、二人はまた同じ様に一種の感情が胸に湧いた。それは外でもない、何となく家に這入（はい）　りづらいと言う心持である。這入りづらい訣はないと思うても、どうしても這入りづらい。躊躇（ちゅうちょ）　する暇もない、忽（たちまち）　門前近く来てしまった。", "「政夫さん         あなた先になって下さい。私　極（きま）　りわるくてしょうがないわ」", "「よしとそれじゃ僕が先になろう」", "僕は頗（すこぶ）　る勇気を鼓（こ）　し殊に平気な風を装うて門を這入った。家の人達は今夕飯最中で盛んに話が湧いているらしい。庭場の雨戸は未だ開いたなりに月が軒口までさし込んでいる。僕が咳払（せきばらい）　を一ツやって庭場へ這入ると、台所の話はにわかに止んでしまった。民子は指の先で僕の肩を撞（つ）　いた。僕も承知しているのだ、今御膳会議で二人の噂が如何（いか）　に盛んであったか。", "宵祭ではあり十三夜ではあるので、家中表座敷へ揃（そろ）　うた時、母も奥から起きてきた。母は一通り二人の余り遅かったことを咎めて深くは言わなかったけれど、常とは全く違っていた。何か思っているらしく、少しも打解けない。これまでは口には小言を言うても、心中に疑わなかったのだが、今夜は口には余り言わないが、心では十分に二人に疑いを起したに違いない。民子はいよいよ小さくなって座敷　中（なか）　へは出ない。僕は山から採ってきた、あけびや野葡萄（えびづる）　やを沢山座敷　中（じゅう）　へ並べ立てて、暗に僕がこんな事をして居たから遅くなったのだとの意を示し無言の弁解をやっても何のききめもない。誰一人それをそうと見るものはない。今夜は何の話にも僕等二人は除（の）　けものにされる始末で、もはや二人は全く罪あるものと黙決されてしまったのである。", "「お母さんがあんまり甘過ぎる。あアして居る二人を一所に山畑へやるとは目のないにもほどがある。はたでいくら心配してもお母さんがあれでは駄目だ」", "これが台所会議の決定であったらしい。母の方でもいつまで児供と思っていたが誤りで、自分が悪かったという様な考えに今夜はなったのであろう。今更二人を叱って見ても仕方がない。なに政夫を学校へ遣（や）　ってしまいさえせば仔細（しさい）　はないと母の心はちゃんときまって居るらしく、", "「政や、お前はナ十一月へ入って直ぐ学校へやる積りであったけれど、そうしてぶらぶらして居ても為にならないから、お祭が終ったら、もう学校へゆくがよい。十七日にゆくとしろ         えいか、そのつもりで小支度して置け」", "学校へゆくは固より僕の願い、十日や二十日早くとも遅くともそれに仔細はないが、この場合しかも今夜　言渡（いいわたし）　があって見ると、二人は既に罪を犯したものと定められての仕置であるから、民子は勿論僕に取ってもすこぶる心苦しい処がある。実際二人はそれほどに堕落した訣でないから、頭からそうときめられては、聊（いささ）　か妙な心持がする。さりとて弁解の出来ることでもなし、また強いことを言える資格も実は無いのである。これが一ヶ月前であったらば、それはお母さん御無理だ、学校へ行くのは望みであるけど、科（とが）　を着せられての仕置に学校へゆけとはあんまりでしょう         などと直ぐだだを言うのであるが、今夜はそんな我儘（わがまま）　を言えるほど無邪気ではない。全くの処、恋に陥ってしまっている。", "あれほど可愛がられた一人の母に隠立てをする、何となく隔てを作って心のありたけを言い得ぬまでになっている。おのずから人前を憚（はばか）　り、人前では殊更に二人がうとうとしく取りなす様になっている。かくまで私心（わたくしごころ）　が長じてきてどうして立派な口がきけよう。僕はただ一言（いちごん）　、", "「はア         」", "と答えたきりなんにも言わず、母の言いつけに盲従する外はなかった。", "「僕は学校へ往ってしまえばそれでよいけど、民さんは跡でどうなるだろうか」", "不図（ふと）　そう思って、そっと民子の方を見ると、お増が枝豆をあさってる後に、民子はうつむいて膝の上に襷（たすき）　をこねくりつつ沈黙している。如何にも元気のない風で夜のせいか顔色も青白く見えた。民子の風を見て僕も俄に悲しくなって泣きたくなった。涙は瞼（まぶた）　を伝って眼が曇った。なぜ悲しくなったか理由は判然（はっきり）　しない。ただ民子が可哀相でならなくなったのである。民子と僕との楽しい関係もこの日の夜までは続かなく、十三日の昼の光と共に全く消えうせてしまった。嬉しいにつけても思いのたけは語りつくさず、憂き悲しいことについては勿論百分の一だも語りあわないで、二人の関係は闇（やみ）　の幕に這入ってしまったのである。", "十四日は祭の初日でただ物せわしく日がくれた。お互に気のない風はしていても、手にせわしい仕事のあるばかりに、とにかく思い紛らすことが出来た。", "十五日と十六日とは、食事の外用事もないままに、書室へ籠（こも）　りとおしていた。ぼんやり机にもたれたなり何をするでもなく、また二人の関係をどうしようかという様なことすらも考えてはいない。ただ民子のことが頭に充ちているばかりで、極めて単純に民子を思うている外に考えは働いて居らぬ。この二日の間に民子と三四回は逢ったけれど、話も出来ず微笑を交換する元気もなく、うら淋しい心持を互に目に訴うるのみであった。二人の心持が今少しませて居ったならば、この二日の間にも将来の事など随分話し合うことが出来たのであろうけれど、しぶとい心持などは毛ほどもなかった二人には、その場合になかなかそんな事は出来なかった。それでも僕は十六日の午後になって、何とはなしに以下のような事を巻紙へ書いて、日暮に一寸来た民子に僕が居なくなってから見てくれと云って渡した。", "朝からここへ這入ったきり、何をする気にもならない。外へ出る気にもならず、本を読む気にもならず、ただ繰返し繰返し民さんの事ばかり思って居る。民さんと一所に居れば神様に抱かれて雲にでも乗って居る様だ。僕はどうしてこんなになったんだろう。学問をせねばならない身だから、学校へは行くけれど、心では民さんと離れたくない。民さんは自分の年の多いのを気にしているらしいが、僕はそんなことは何とも思わない。僕は民さんの思うとおりになるつもりですから、民さんもそう思っていて下さい。明日は早く立ちます。冬期の休みには帰ってきて民さんに逢うのを楽しみにして居ります。", "十月十六日", "政夫", "民子様", "学校へ行くとは云え、罪があって早くやられると云う境遇であるから、人の笑声話声にも一々ひがみ心が起きる。皆二人に対する嘲笑かの様に聞かれる。いっそ早く学校へ行ってしまいたくなった。決心が定まれば元気も恢復（かいふく）　してくる。この夜は頭も少しくさえて夕飯も心持よくたべた。学校のこと何くれとなく母と話をする。やがて寝に就いてからも、", "「何だ馬鹿馬鹿しい、十五かそこらの小僧の癖に、女のことなどばかりくよくよ考えて         そうだそうだ、明朝（あした）　は早速学校へ行こう。民子は可哀相だけれど         もう考えまい、考えたって仕方がない、学校学校         」", "独口（ひとりぐち）　ききつつ眠りに入った様な訣であった。", "船で河から市川へ出るつもりだから、十七日の朝、小雨の降るのに、一切の持物をカバン一個（ひとつ）　につめ込み民子とお増に送られて矢切の渡へ降りた。村の者の荷船に便乗する訣でもう船は来て居る。僕は民さんそれじゃ         と言うつもりでも咽（のど）　がつまって声が出ない。民子は僕に包を渡してからは、自分の手のやりばに困って胸を撫（な）　でたり襟（えり）　を撫でたりして、下ばかり向いている。眼にもつ涙をお増に見られまいとして、体を脇へそらしている、民子があわれな姿を見ては僕も涙が抑え切れなかった。民子は今日を別れと思ってか、髪はさっぱりとした銀杏返（いちょうがえ）　しに薄く化粧をしている。煤色（すすいろ）　と紺の細かい弁慶縞（べんけいじま）　で、羽織も長着も同じい米沢紬（よねざわつむぎ）　に、品のよい友禅縮緬（ゆうぜんちりめん）　の帯をしめていた。襷を掛けた民子もよかったけれど今日の民子はまた一層引立って見えた。", "僕の気のせいででもあるか、民子は十三日の夜からは一日（ひとひ）　一日とやつれてきて、この日のいたいたしさ、僕は泣かずには居られなかった。虫が知らせるとでもいうのか、これが生涯の別れになろうとは、僕は勿論民子とて、よもやそうは思わなかったろうけれど、この時のつらさ悲しさは、とても他人に話しても信じてくれるものはないと思う位であった。", "尤（もっと）　も民子の思いは僕より深かったに相違ない。僕は中学校を卒業するまでにも、四五年間のある体であるのに、民子は十七で今年の内にも縁談の話があって両親からそう言われれば、無造作に拒むことの出来ない身であるから、行末のことをいろいろ考えて見ると心配の多い訣である。当時の僕はそこまでは考えなかったけれど、親しく目に染（し）　みた民子のいたいたしい姿は幾年経っても昨日の事のように眼に浮んでいるのである。", "余所から見たならば、若いうちによくあるいたずらの勝手な泣面と見苦しくもあったであろうけれど、二人の身に取っては、真にあわれに悲しき別れであった。互に手を取って後来を語ることも出来ず、小雨のしょぼしょぼ降る渡場に、泣きの涙も人目を憚（はばか）　り、一言の詞（ことば）　もかわし得ないで永久の別れをしてしまったのである。無情の舟は流を下って早く、十分間と経たぬ内に、五町と下らぬ内に、お互の姿は雨の曇りに隔てられてしまった。物も言い得ないで、しょんぼりと悄（しお）　れていた不憫（ふびん）　な民さんの俤（おもかげ）　、どうして忘れることが出来よう。民さんを思うために神の怒りに触れて即座に打殺さるる様なことがあるとても僕には民さんを思わずに居られない。年をとっての後の考えから言えば、あアもしたらこうもしたらと思わぬこともなかったけれど、当時の若い同志（どうし）　の思慮には何らの工夫も無かったのである。八百屋お七は家を焼いたらば、再度（ふたたび）　思う人に逢われることと工夫をしたのであるが、吾々二人は妻戸一枚を忍んで開けるほどの智慧（ちえ）　も出なかった。それほどに無邪気な可憐な恋でありながら、なお親に怖（お）　じ兄弟に憚り、他人の前にて涙も拭き得なかったのは如何に気の弱い同志であったろう。", "僕は学校へ行ってからも、とかく民子のことばかり思われて仕方がない。学校に居ってこんなことを考えてどうするものかなどと、自分で自分を叱り励まして見ても何の甲斐もない。そういう詞の尻からすぐ民子のことが湧いてくる。多くの人中に居ればどうにか紛れるので、日の中はなるたけ一人で居ない様に心掛けて居た。夜になっても寝ると仕方がないから、なるたけ人中で騒いで居て疲れて寝る工夫をして居た。そういう始末でようやく年もくれ冬期休業になった。", "僕が十二月二十五日の午前に帰って見ると、庭一面に籾（もみ）　を干してあって、母は前の縁側に蒲団（ふとん）　を敷いて日向ぼっこをしていた。近頃はよほど体の工合もよい。今日は兄夫婦と男とお増とは山へ落葉（くず）　をはきに行ったとの話である。僕は民さんはと口の先まで出たけれど遂（つい）　に言い切らなかった。母も意地悪く何とも言わない。僕は帰り早々民子のことを問うのが如何にも極り悪く、そのまま例の書室を片づけてここに落着いた。しかし日暮までには民子も帰ってくることと思いながら、おろおろして待って居る。皆が帰っていよいよ夕飯ということになっても民子の姿は見えない、誰もまた民子のことを一言も言うものもない。僕はもう民子は市川へ帰ったものと察して、人に問うのもいまいましいから、外の話もせず、飯がすむとそれなり書室へ這入ってしまった。", "今日は必ず民子に逢われることと一方ならず楽しみにして帰って来たのに、この始末で何とも言えず力が落ちて淋しかった。さりとて誰にこの苦悶（くもん）　を話しようもなく、民子の写真などを取出して見て居ったけれど、ちっとも気が晴れない。またあの奴民子が居ないから考え込んで居やがると思われるも口惜（くや）　しく、ようやく心を取直し、母の枕元へいって夜遅くまで学校の話をして聞かせた。", "翌（あ）　くる日は九時頃にようやく起きた。母は未だ寝ている。台所へ出て見ると外の者は皆また山へ往ったとかで、お増が一人台所片づけに残っている。僕は顔を洗ったなり飯も食わずに、背戸の畑へ出てしまった。この秋、民子と二人で茄子（なす）　をとった畑が今は青々と菜がほきている。僕はしばらく立って何所（いずこ）　を眺めるともなく、民子の俤を脳中にえがきつつ思いに沈んでいる。", "「政夫さん、何をそんなに考えているの」", "お増が出し抜けに後からそいって、近くへ寄ってきた。僕がよい加減なことを一言二言いうと、お増はいきなり僕の手をとって、も少しこっちへきてここへ腰を掛けなさいまアと言いつつ、藁（わら）　を積んである所へ自分も腰をかけて僕にも掛けさせた。", "「政夫さん         お民さんはほんとに可哀相でしたよ。うちの姉さんたらほんとに意地曲りですからネ。何という根性の悪い人だか、私もはアここのうちに居るのは厭になってしまった。昨日政夫さんが来るのは解りきって居るのに、姉さんがいろんなことを云って、一昨日お民さんを市川へ帰したんですよ。待つ人があるだっぺとか逢いたい人が待ちどおかっぺとか、当こすりを云ってお民さんを泣かせたりしてネ、お母さんにも何でもいろいろなこと言ったらしい、とうとう一昨日お昼前に帰してしまったのでさ。政夫さんが一昨日きたら逢われたんですよ。政夫さん、私はお民さんが可哀相で可哀相でならないだよ。何だってあなたが居なくなってからはまるで泣きの涙で日を暮らして居るんだもの、政夫さんに手紙をやりたいけれど、それがよく自分には出来ないから口惜しいと云ってネ。私の部屋へ三晩も硯（すずり）　と紙を持ってきては泣いて居ました。お民さんも始まりは私にも隠していたけれど、後には隠して居られなくなったのさ。私もお民さんのためにいくら泣いたか知れない         」", "見ればお増はもうぽろぽろ涙をこぼしている。一体お増はごく人のよい親切な女で、僕と民子が目の前で仲好い風をすると、嫉妬心（しっとしん）　を起すけれど、もとより執念深い性でないから、民子が一人になれば民子と仲が好く、僕が一人になれば僕を大騒ぎするのである。", "それからなおお増は、僕が居ない跡で民子が非常に母に叱られたことなどを話した。それは概略こうである。意地悪の嫂（あによめ）　が何を言うても、母が民子を愛することは少しも変らないけれど、二つも年の多い民子を僕の嫁にすることはどうしてもいけぬと云うことになったらしく、それには嫂もいろいろ言うて、嫁にしないとすれば、二人の仲はなるたけ裂く様な工夫をせねばならぬ。母も嫂もそういう心持になって居るから、民子に対する仕向けは、政夫のことを思うて居ても到底駄目であると遠廻しに諷示（ふうじ）　して居た。そこへきて民子が明けてもくれてもくよくよして、人の眼にもとまるほどであるから、時々は物忘れをしたり、呼んでも返辞が遅かったりして、母の疳癪（かんしゃく）　にさわったことも度々あった。僕が居なくなってから二十日許り経って十一月の月初めの頃、民子も外の者と野へ出ることとなって、母が民子にお前は一足跡になって、座敷のまわりを雑巾掛（ぞうきんがけ）　してそれから庭に広げてある蓆（むしろ）　を倉へ片づけてから野へゆけと言いつけた。民子は雑巾がけをしてからうっかり忘れてしまって、蓆を入れずに野へ出た処、間がわるくその日雨が降ったから、その蓆十枚ばかりを濡らしてしまった。民子は雨が降ってから気がついたけれど、もう間に合わない。うちへ帰って早速母に詫（わ）　びたけれど母は平日の事が胸にあるから、", "「何も十枚ばかりの蓆が惜しいではないけれど、一体私の言いつけを疎（おろそ）　かに聞いているから起ったことだ。もとの民子はそうでなかった。得手勝手な考えごとなどしているから、人の言うことも耳へ這入（はい）　らないのだ         」", "という様な随分痛い小言を云った。民子は母の枕元近くへいって、どうか私が悪かったのですから堪忍（かんにん）　して         と両手をついてあやまった。そうすると母はまたそう何も他人らしく改まってあやまらなくともだと叱ったそうで、民子はたまらなくなってワッと泣き伏した。そのまま民子が泣きやんでしまえば何のこともなく済んだであろうが、民子はとうとう一晩中泣きとおしたので翌朝は眼を赤くして居た。母も夜時々眼をさましてみると、民子はいつでも、すくすく泣いている声がしていたというので、今度は母が非常に立腹して、お増と民子と二人呼んで母が顫声（ふるえごえ）　になって云うには、", "「相対（あいたい）　では私がどんな我儘なことを云うかも知れないからお増は聞人（ききて）　になってくれ。民子はゆうべ一晩中泣きとおした。定めし私に云われたことが無念でたまらなかったからでしょう」", "民子はここで私はそうでありませんと泣声でいうたけれど、母は耳にもかけずに、", "「なるほど私の小言も少し云い過ぎかも知れないが、民子だって何もそれほど口惜（くや）　しがってくれなくてもよさそうなものじゃないか。私はほんとに考えると情なくなってしまった。かわいがったのを恩に着せるではないが、もとを云えば他人だけれど、乳呑児（ちのみご）　の時から、民子はしょっちゅう家へきて居て今の政夫と二つの乳房を一つ宛（ずつ）　含ませて居た位、お増がきてからもあの通りで、二つのものは一つ宛四つのものは二つ宛、着物を拵えてもあれに一枚これに一枚と少しも分け隔てをせないできた。民子も真の親の様に思ってくれ私も吾子と思って余所の人は誰だって二人を兄弟と思わないものはなかったほどであるのに、あとにも先にも一度の小言をあんなに悔しがって夜中泣いて呉れなくともよさそうなもの。市川の人達に聞かれたらば、斎藤の婆（ばあ）　がどんな非度（ひど）　いことを云ったかと思うだろう。十何年という間我子の様に思ってきたこともただ一度の小言で忘れられてしまったかと思うと私は口惜しい。人間というものはそうしたものかしら。お増、よく聞いてくれ、私が無理か民子が無理か。なアお増」", "母は眼に涙を一ぱいに溜めてそういった。民子は身も世もあらぬさまでいきなりにお増の膝へすがりついて泣き泣き、", "「お増や、お母さんに申訣をしておくれ。私はそんなだいそれた了簡（りょうけん）　ではない。ゆんべあんなに泣いたは全く私が悪かったから、全く私がとどかなかったのだから、お増や、お前がよく申訣をそういっておくれ         」", "それからお増が、", "「お母さんの御立腹も御尤もですけれど、私が思うにャお母さんも少し勘違いをして御いでなさいます。お母さんは永年お民さんをかわいがって御いでですから、お民さんの気質（きだて）　は解って居りましょう。私もこうして一年御厄介になって居てみれば、お民さんはほんと優しい温和（おとな）　しい人です。お母さんに少し許り叱られたって、それを悔しがって泣いたりなんぞする様な人ではありますまい。私がこんなことを申してはおかしいですが、政夫さんとお民さんとは、あアして仲好くして居たのを、何かの御都合で急にお別れなさったもんですから、それからというもの、お民さんは可哀相なほど元気がないのです。木の葉のそよぐにも溜息（ためいき）　をつき烏（からす）　の鳴くにも涙ぐんで、さわれば泣きそうな風でいたところへ、お母さんから少しきつく叱られたから留度（とめど）　なく泣いたのでしょう。お母さん、私は全くそう思いますわ。お民さんは決してあなたに叱られたとて悔しがるような人ではありません。お民さんの様な温和しい人を、お母さんの様にあアいって叱っては、あんまり可哀相ですわ」", "お増が共泣きをして言訣をいうたので、もとより民子は憎くない母だから、俄に顔色を直して、", "「なるほどお増がそういえば、私も少し勘違いをしていました。よくお増そういうてくれた。私はもうすっかり心持がなおった。民や、だまっておくれ、もう泣いてくれるな。民やも可哀相であった。なに政夫は学校へ行ったんじゃないか、暮には帰ってくるよ。なアお増、お前は今日は仕事を休んで、うまい物でも拵（こしら）　えてくれ」", "その日は三人がいく度もよりあって、いろいろな物を拵えては茶ごとをやり、一日面白く話をした。民子はこの日はいつになく高笑いをし元気よく遊んだ。何と云っても母の方は直ぐ話が解るけれど、嫂が間（ま）　がな隙（すき）　がな種々（いろいろ）　なことを言うので、とうとう僕の帰らない内に民子を市川へ帰したとの話であった。お増は長い話を終るや否やすぐ家へ帰った。", "なるほどそうであったか、姉は勿論母までがそういう心になったでは、か弱い望も絶えたも同様。心細さの遣瀬（やるせ）　がなく、泣くより外に詮（せん）　がなかったのだろう。そんなに母に叱られたか         一晩中泣きとおした         なるほどなどと思うと、再び熱い涙が漲（みなぎ）　り出してとめどがない。僕はしばらくの間、涙の出るがままにそこにぼんやりして居った。その日はとうとう朝飯もたべず、昼過ぎまで畑のあたりをうろついてしまった。", "そうなると俄（にわか）　に家に居るのが厭でたまらない。出来るならば暮の内に学校へ帰ってしまいたかったけれど、そうもならないでようやくこらえて、年を越し元日一日置いて二日の日には朝早く学校へ立ってしまった。", "今度は陸路市川へ出て、市川から汽車に乗ったから、民子の近所を通ったのであれど、僕は極りが悪くてどうしても民子の家へ寄れなかった。また僕に寄られたらば、民子が困るだろうとも思って、いくたび寄ろうと思ったけれどついに寄らなかった。", "思えば実に人の境遇は変化するものである。その一年前までは、民子が僕の所へ来て居なければ、僕は日曜のたびに民子の家へ行ったのである。僕は民子の家へ行っても外の人には用はない。いつでも、", "「お祖母さん、民さんは」", "そら「民さんは」が来たといわれる位で、或る時などは僕がゆくと、民子は庭に菊の花を摘んで居た。僕は民さん一寸（ちょっと）　御出でと無理に背戸へ引張って行って、二間梯子（にけんばしご）　を二人で荷（にな）　い出し、柿の木へ掛けたのを民子に抑えさせ、僕が登って柿を六個（むっつ）　許りとる。民子に半分やれば民子は一つで沢山というから、僕はその五つを持ってそのまま裏から抜けて帰ってしまった。さすがにこの時は戸村の家でも家中で僕を悪く言ったそうだけれど、民子一人はただにこにこ笑って居て、決して政夫さん悪いとは言わなかったそうだ。これ位隔てなくした間柄だに、恋ということ覚えてからは、市川の町を通るすら恥（はず）　かしくなったのである。", "この年の暑中休みには家に帰らなかった。暮にも帰るまいと思ったけれど、年の暮だから一日でも二日でも帰れというて母から手紙がきた故、大三十日（おおみそか）　の夜帰ってきた。お増も今年きりで下（さが）　ったとの話でいよいよ話相手もないから、また元日一日で二日の日に出掛けようとすると、母がお前にも言うて置くが民子は嫁に往（い）　った、去年の霜月やはり市川の内で、大変裕福な家だそうだ、と簡単にいうのであった。僕ははアそうですかと無造作に答えて出てしまった。", "民子は嫁に往った。この一語を聞いた時の僕の心持は自分ながら不思議と思うほどの平気であった。僕が民子を思っている感情に何らの動揺を起さなかった。これには何か相当の理由があるかも知れねど、ともかくも事実はそうである。僕はただ理窟なしに民子は如何な境涯に入ろうとも、僕を思っている心は決して変らぬものと信じている。嫁にいこうがどうしようが、民子は依然民子で、僕が民子を思う心に寸分の変りない様に民子にも決して変りない様に思われて、その観念は殆ど大石の上に坐して居る様で毛の先ほどの危惧心（きぐしん）　もない。それであるから民子は嫁に往ったと聞いても少しも驚かなかった。しかしその頃から今までにない考えも出て来た。民子はただただ少しも元気がなく、痩（やせ）　衰えて鬱（ふさ）　いで許り居るだろうとのみ思われてならない。可哀相な民さんという観念ばかり高まってきたのである。そういう訣であるから、学校へ往っても以前とは殆ど反対になって、以前は勉めて人中へ這入って、苦悶を紛らそうとしたけれど、今度はなるべく人を避けて、一人で民子の上に思いを馳（は）　せて楽しんで居った。茄子畑の事や棉畑（わたばたけ）　の事や、十三日の晩の淋しい風や、また矢切の渡で別れた時の事やを、繰返し繰返し考えては独り慰めて居った。民子の事さえ考えればいつでも気分がよくなる。勿論悲しい心持になることがしばしばあるけれど、さんざん涙を出せばやはり跡は気分がよくなる。民子の事を思って居ればかえって学課の成績も悪くないのである。これらも不思議の一つで、如何なる理由か知らねど、僕は実際そうであった。", "いつしか月も経って、忘れもせぬ六月二十二日、僕が算術の解題に苦んで考えて居ると、小使が斎藤さんおうちから電報です、と云って机の端へ置いて去った。例のスグカエレであるから、早速舎監に話をして即日帰省した。何事が起ったかと胸に動悸をはずませて帰って見ると、宵闇（よいやみ）　の家の有様は意外に静かだ。台所で家中夕飯時であったが、ただそこに母が見えない許り、何の変った様子もない。僕は台所へは顔も出さず、直ぐと母の寝所へきた。行燈（あんどん）　の灯（ひ）　も薄暗く、母はひったり枕に就いて臥（ふ）　せって居る。", "「お母さん、どうかしましたか」", "「あア政夫、よく早く帰ってくれた。今私も起きるからお前御飯前なら御飯を済ましてしまえ」", "僕は何のことか頻（しき）　りに気になるけれど、母がそういうままに早々に飯をすまして再び母の所へくる。母は帯を結（ゆ）　うて蒲団の上に起きていた。僕が前に坐ってもただ無言でいる。見ると母は雨の様な涙を落して俯向（うつむ）　いている。", "「お母さん、まアどうしたんでしょう」", "僕の詞に励まされて母はようやく涙を拭き、", "「政夫、堪忍してくれ         民子は死んでしまった         私が殺した様なものだ         」", "「そりゃいつです。どうして民さんは死んだんです」", "僕が夢中になって問返すと、母は嗚咽（むせ）　び返って顔を抑えて居る。", "「始終をきいたら、定めし非度（ひど）　い親だと思うだろうが、こらえてくれ、政夫         お前に一言の話もせず、たっていやだと言う民子を無理に勧めて嫁にやったのが、こういうことになってしまった         たとい女の方が年上であろうとも本人同志が得心であらば、何も親だからとて余計な口出しをせなくもよいのに、この母が年　甲斐（がい）　もなく親だてらにいらぬお世話を焼いて、取返しのつかぬことをしてしまった。民子は私が手を掛けて殺したも同じ。どうぞ堪忍してくれ、政夫         私は民子の跡追ってゆきたい         」", "母はもうおいおいおいおい声を立てて泣いている。民子の死ということだけは判ったけれど、何が何やら更に判らぬ。僕とて民子の死と聞いて、失神するほどの思いであれど、今目の前で母の嘆きの一通りならぬを見ては、泣くにも泣かれず、僕がおろおろしている所へ兄夫婦が出てきた。", "「お母さん、まアそう泣いたって仕方がない」", "と云えば母は、かまわずに泣かしておくれ泣かしておくれと云うのである、どうしようもない。", "その間で嫂が僅（わずか）　に話す所を聞けば、市川の某（それがし）　という家で先の男の気性も知れているに財産も戸村の家に倍以上であり、それで向うから民子を強（た）　っての所望、媒妁人（なこうど）　というのも戸村が世話になる人である、是非やりたい是非往ってくれということになった。民子はどうでもいやだと云う。民子のいやだという精神（こころ）　はよく判っているけれど、政夫さんの方は年も違い先の永いことだから、どうでも某の家へやりたいとは、戸村の人達は勿論親類までの希望であった。それでいよいよ斎藤のおッ母さんに意見をして貰うということに相談が極り、それで家のお母さんが民子に幾度意見をしても泣いてばかり承知しないから、とどのつまり、お前がそう剛情はるのも政夫の処へきたい考えからだろうけれど、それはこの母が不承知でならないよ、お前はそれでも今度の縁談が不承知か。こんな風に言われたから、民子はすっかり自分をあきらめたらしく、とうとう皆様のよい様にといって承知をした。それからは何もかも他（ひと）　の言うなりになって、霜月　半（なかば）　に祝儀をしたけれど、民子の心持がほんとうの承知でないから、向うでもいくらかいや気になり、民子は身持になったが、六月（むつき）　でおりてしまった。跡の肥立ちが非常に悪くついに六月十九日に息を引き取った。病中僕に知らせようとの話もあったが、今更政夫に知らせる顔もないという訣から知らせなかった。家のお母さんは民子が未だ口をきく時から、市川へ往って居って、民子がいけなくなると、もう泣いて泣いて泣きぬいた。一口まぜに、民子は私が殺した様なものだ、とばかりいって居て、市川へ置いたではどうなるか知れぬという訣から、昨日車で家へ送られてきたのだ。話さえすれば泣く、泣けば私が悪かった悪かったと云って居る。誰にも仕様がないから、政夫さんの所へ電報を打った。民子も可哀相だしお母さんも可哀相だし、飛んだことになってしまった。政夫さん、どうしたらよいでしょう。", "嫂（あによめ）　の話で大方は判ったけれど、僕もどうしてよいやら殆ど途方にくれた。母はもう半気違いだ。何しろここでは母の心を静めるのが第一とは思ったけれど、慰めようがない。僕だっていっそ気違いになってしまったらと思った位だから、母を慰めるほどの気力はない。そうこうしている内にようやく母も少し落着いてきて、また話し出した。", "「政夫や、聞いてくれ。私はもう自分の悪党にあきれてしまった。何だってあんな非度（ひど）　いことを民子に言ったっけかしら。今更なんぼ悔いても仕方がないけど、私は政夫         民子にこう云ったんだ。政夫と夫婦にすることはこの母が不承知だからおまえは外へ嫁に往け。なるほど民子は私にそう云われて見れば自分の身を諦（あきら）　める外はない訣だ。どうしてあんな酷（むご）　たらしいことを云ったのだろう。ああ可哀相な事をしてしまった。全く私が悪党を云うた為に民子は死んだ。お前はネ、明朝（あした）　は夜が明けたら直ぐに往ってよオく民子の墓に参ってくれ。それでお母さんの悪かったことをよく詫びてくれ。ねイ政夫」", "僕もようやく泣くことが出来た。たといどういう都合があったにせよ、いよいよ見込がなくなった時には逢わせてくれてもよかったろうに、死んでから知らせるとは随分非度い訣だ。民さんだって僕には逢いたかったろう。嫁に往ってしまっては申訣がなく思ったろうけれど、それでもいよいよの真際（まぎわ）　になっては僕に逢いたかったに違いない。実に情ない事だ。考えて見れば僕もあんまり児供であった。その後市川を三回も通りながらたずねなかったは、今更残念でならぬ。僕は民子が嫁にゆこうがゆくまいが、ただ民子に逢いさえせばよいのだ。今一目逢いたかった         次から次と果てしなく思いは溢れてくる。しかし母にそういうことを言えば、今度は僕が母を殺す様なことになるかも知れない。僕は屹（きっ）　と心を取り直した。", "「お母さん、真（ほんと）　に民子は可哀相でありました。しかし取って返らぬことをいくら悔んでも仕方がないですから、跡の事を懇（ねんごろ）　にしてやる外はない。お母さんはただただ御自分の悪い様にばかりとっているけれど、お母さんとて精神（こころ）　はただ民子のため政夫のためと一筋に思ってくれた事ですから、よしそれが思う様にならなかったとて、民子や私等が何とてお母さんを恨みましょう。お母さんの精神はどこまでも情心（なさけごころ）　でしたものを、民子も決して恨んではいやしまい。何もかもこうなる運命であったのでしょう。私はもう諦めました。どうぞこの上お母さんも諦めて下さい。明日の朝は夜があけたら直ぐ市川へ参ります」", "母はなお詞を次いで、", "「なるほど何もかもこうなる運命かも知らねど今度という今度私はよくよく後悔しました。俗に親馬鹿という事があるが、その親馬鹿が飛んでもない悪いことをした。親がいつまでも物の解ったつもりで居るが、大へんな間違いであった。自分は阿弥陀（あみだ）　様におすがり申して救うて頂く外に助かる道はない。政夫や、お前は体を大事にしてくれ。思えば民子はなが年の間にもついぞ私にさからったことはなかった、おとなしい児であっただけ、自分のした事が悔いられてならない、どうしても可哀相でたまらない。民子が今はの時の事もお前に話して聞かせたいけれど私にはとてもそれが出来ない」", "などとまた声をくもらしてきた。もう話せば話すほど悲しくなるからとて強（し）　いて一同寝ることにした。", "母の手前兄夫婦の手前、泣くまいとこらえてようやくこらえていた僕は、自分の蚊帳（かや）　へ這入り蒲団に倒れると、もうたまらなく一度にこみ上げてくる。口へは手拭を噛んで、涙を絞った。どれだけ涙が出たか、隣室の母から夜が明けた様だよと声を掛けられるまで、少しも止まず涙が出た。着たままで寝ていた僕はそのまま起きて顔を洗うや否や、未だほの闇（ぐら）　いのに家を出る。夢のように二里の路を走って、太陽がようやく地平線に現われた時分に戸村の家の門前まで来た。この家の竃（かまど）　のある所は庭から正面に見透して見える。朝炊（あさだ）　きに麦藁を焚（た）　いてパチパチ音がする。僕が前の縁先に立つと奥に居たお祖母（ばあ）　さんが、目敏（めざと）　く見つけて出てくる。", "「かねや、かねや、とみや         政夫さんが来ました。まア政夫さんよく来てくれました。大そう早く。さアお上んなさい。起き抜きでしょう。さあ         かねや         」", "民子のお父さんとお母さん、民子の姉さんも来た。", "「まアよく来てくれました。あなたの来るのを待ってました。とにかくに上って御飯をたべて         」", "僕は上りもせず腰もかけず、しばらく無言で立っていた。ようやくと、", "「民さんのお墓に参りにきました」", "切なる様は目に余ったと見え、四人（よつたり）とも口がきけなくなってしまった。   やがてお父さんが、", "「それでもまア一寸御飯を済して往ったら         あアそうですか。それでは皆して参ってくるがよかろう         いや着物など着替えんでよいじゃないか」", "女達は、もう鼻啜（はなすす）　りをしながら、それじゃアとて立ちあがる。水を持ち、線香を持ち、庭の花を沢山に採る。小田巻草千日草　天竺牡丹（てんじくぼたん）　と各々（めいめい）　手にとり別けて出かける。柿の木の下から背戸へ抜け槇屏（まきべい）　の裏門を出ると松林である。桃畑梨畑の間をゆくと僅の田がある。その先の松林の片隅に雑木の森があって数多（あまた）　の墓が見える。戸村家の墓地は冬青（もちのき）　四五本を中心として六坪許りを区別けしてある。そのほどよい所の新墓（にいはか）　が民子が永久（とわ）　の住家（すみか）　であった。葬（ほうむ）　りをしてから雨にも逢わないので、ほんの新らしいままで、力紙（ちからがみ）　なども今結んだ様である。お祖母さんが先に出でて、", "「さア政夫さん、何もかもあなたの手でやって下さい。民子のためには真（ほん）　に千僧の供養にまさるあなたの香花（こうげ）　、どうぞ政夫さん、よオくお参りをして下さい         今日は民子も定めて草葉の蔭で嬉しかろう         なあ此人にせめて一度でも、目をねむらない民子に         まアせめて一度でも逢わせてやりたかった         」", "三人は眼をこすっている様子。僕は香を上げ花を上げ水を注いでから、前に蹲（つくば）　って心のゆくまで拝んだ。真（しん）　に情ない訣だ。寿命で死ぬは致方ないにしても、長く煩（わずら）　って居る間に、あア見舞ってやりたかった、一目逢いたかった。僕も民さんに逢いたかったもの、民さんだって僕に逢いたかったに違いない。無理無理に強（し）　いられたとは云え、嫁に往っては僕に合わせる顔がないと思ったに違いない。思えばそれが愍然（あわれ）　でならない。あんな温和（おとな）　しい民さんだもの、両親から親類中かかって強いられ、どうしてそれが拒まれよう。民さんが気の強い人ならきっと自殺をしたのだけれど、温和しい人だけにそれも出来なかったのだ。民さんは嫁に往っても僕の心に変りはないと、せめて僕の口から一言いって死なせたかった。世の中に情ないといってこういう情ないことがあろうか。もう私も生きて居たくない         吾知らず声を出して僕は両　膝（ひざ）　と両手を地べたへ突いてしまった。", "僕の様子を見て、後に居た人がどんなに泣いたか。僕も吾一人でないに気がついてようやく立ちあがった。三人の中の誰がいうのか、", "「なんだって民子は、政夫さんということをば一言も言わなかったのだろう         」", "「それほどに思い合ってる仲と知ったらあんなに勧めはせぬものを」", "「うすうすは知れて居たのだに、この人の胸も聞いて見ず、民子もあれほどいやがったものを         いくら若いからとてあんまりであった         可哀相に         」", "三人も香花を手向（たむ）　け水を注いだ。お祖母さんがまた、", "「政夫さん、あなた力紙を結んで下さい。沢山結んで下さい。民子はあなたが情の力を便りにあの世へゆきます。南無阿弥陀仏、南無阿弥陀仏」", "僕は懐（ふところ）　にあった紙の有りたけを力杖に結ぶ。この時ふっと気がついた。民さんは野菊が大変好きであったに野菊を掘ってきて植えればよかった。いや直ぐ掘ってきて植えよう。こう考えてあたりを見ると、不思議に野菊が繁ってる。弔いの人に踏まれたらしいがなお茎立って青々として居る。民さんは野菊の中へ葬られたのだ。僕はようやく少し落着いて人々と共に墓場を辞した。", "僕は何にもほしくありません。御飯は勿論茶もほしくないです、このままお暇願います、明日はまた早く上りますからといって帰ろうとすると、家中（うちじゅう）　で引留める。民子のお母さんはもうたまらなそうな風で、", "「政夫さん、あなたにそうして帰られては私等は居ても起ってもいられません。あなたが面白くないお心持は重々察しています。考えてみれば私どもの届かなかったために、民子にも不憫（ふびん）　な死にようをさせ、政夫さんにも申訣のないことをしたのです。私共は如何様にもあなたにお詫びを致します。民子可哀相と思召（おぼしめ）　したら、どうぞ民子が今はの話も聞いて行って下さいな。あなたがお出（い）　でになったら、お話し申すつもりで、今日はお出でか明日はお出でかと、実は家中がお待ち申したのですからどうぞ         」", "そう言われては僕も帰る訣にゆかず、母もそう言ったのに気がついて座敷へ上った。茶や御飯やと出されたけれども真似ばかりで済ます。その内に人々皆奥へ集りお祖母さんが話し出した。", "「政夫さん、民子の事については、私共一同誠に申訣がなく、あなたに合せる顔はないのです。あなたに色々御無念な処もありましょうけれど、どうぞ政夫さん、過ぎ去った事と諦めて、御勘弁を願います。あなたにお詫びをするのが何より民子の供養になるのです」", "僕はただもう胸一ぱいで何も言うことが出来ない。お祖母さんは話を続ける。", "「実はと申すと、あなたのお母さん始め、私また民子の両親とも、あなたと民子がそれほど深い間（なか）であったとは知らなかったもんですから」", "僕はここで一言いいだす。", "「民さんと私と深い間とおっしゃっても、民さんと私とはどうもしやしません」", "「いイえ、あなたと民子がどうしたと申すではないのです。もとからあなたと民子は非常な仲好しでしたから、それが判らなかったんです。それに民子はあの通りの内気な児でしたから、あなたの事は一言も口に出さない。それはまるきり知らなかったとは申されません。それですからお詫びを申す様な訣         」", "僕は皆さんにそんなにお詫びを云われる訣はないという。民子のお父さんはお詫びを言わしてくれという。", "「そりゃ政夫さんのいうのは御もっともです、私共が勝手なことをして、勝手なことをお前さんに言うというものですが、政夫さん聞いて下さい、理窟の上のことではないです。男親の口からこんなことをいうも如何（いかが）　ですが、民子は命に替えられない思いを捨てて両親の希望に従ったのです。親のいいつけで背（そむ）　かれないと思うても、道理で感情を抑えるは無理な処もありましょう。民子の死は全くそれ故ですから、親の身になって見ると、どうも残念でありまして、どうもしやしませんと政夫さんが言う通り、お前さん等（たち）　二人に何の罪もないだけ、親の目からは不憫が一層でな。あの通り温和（おとな）　しかった民子は、自分の死ぬのは心柄とあきらめてか、ついぞ一度不足らしい風も見せなかったです。それやこれやを思いますとな、どう考えてもちと親が無慈悲であった様で         。政夫さん、察して下さい。見る通り家中がもう、悲しみの闇に鎖（とざ）　されて居るのです。愚かなことでしょうがこの場合お前さんに民子の話を聞いて貰うのが何よりの慰藉（いしゃ）　に思われますから、年がいもないこと申す様だが、どうぞ聞いて下さい」", "お祖母さんがまた話を続ける［＃「続ける」は底本では「読ける」］。結婚の話からいよいよむずかしくなったまでの話は嫂が家での話と同じで、今はという日の話はこうであった。", "「六月十七日の午後に医者がきて、もう一日二日の処だから、親類などに知らせるならば今日中にも知らせるがよいと言いますから、それではとて取敢（とりあえ）　ずあなたのお母さんに告げると十八日の朝飛んできました。その日は民子は顔色がよく、はっきりと話も致しました。あなたのおっかさんがきまして、民や、決して気を弱くしてはならないよ、どうしても今一度なおる気になっておくれよ、民や         民子はにっこり笑顔さえ見せて、矢切（やぎり）　のお母さん、いろいろ有難う御座います。長長可愛がって頂いた御恩は死んでも忘れません。私も、もう長いことはありますまい         。民や、そんな気の弱いことを思ってはいけない。決してそんなことはないから、しっかりしなくてはいけないと、あなたのお母さんが云いましたら、民子はしばらくたって、矢切のお母さん、私は死ぬが本望であります、死ねばそれでよいのです         といいましてからなお口の内で何か言った様で、何でも、政夫さん、あなたの事を言ったに違いないですが、よく聞きとれませんでした。それきり口はきかないで、その夜の明方に息を引取りました         。それから政夫さん、こういう訣です         夜が明けてから、枕を直させます時、あれの母が見つけました、民子は左の手に紅絹（もみ）　の切れに包んだ小さな物を握ってその手を胸へ乗せているのです。それで家中の人が皆集って、それをどうしようかと相談しましたが、可哀相なような気持もするけれど、見ずに置くのも気にかかる、とにかく開いて見るがよいと、あれの父が言い出しまして、皆の居る中であけました。それが政さん、あなたの写真とあなたのお手紙でありまして         」", "お祖母さんが、泣き出して、そこにいた人皆涙を拭いている。僕は一心に畳を見つめていた。やがてお祖母さんがようよう話を次ぐ。", "「そのお手紙をお富が読みましたから、誰も彼も一度に声を立って泣きました。あれの父は男ながら大声して泣くのです。あなたのお母さんは、気がふれはしないかと思うほど、口説（くど）　いて泣く。お前達二人がこれほどの語らいとは知らずに、無理無体に勧めて嫁にやったは悪かった。あア悪いことをした、不憫だった。民や、堪忍して、私は悪かったから堪忍してくれ。俄（にわか）　の騒ぎですから、近隣の人達が、どうしましたと云って尋ねにきた位でありました。それであなたのお母さんはどうしても泣き止まないです。体に障（さわ）　ってはと思いまして葬式が済むと車で御送り申した次第です。身を諦めた民子の心持が、こう判って見ると、誰も彼も同じことで今更の様に無理に嫁にやった事が後悔され、たまらないですよ。考えれば考えるほどあの児が可哀相で可哀相で居ても起（た）　っても居られない         せめてあなたに来て頂いて、皆が悪かったことを十分あなたにお詫（わ）　びをし、またあれの墓にも香花（こうげ）　をあなたの手から手向けて頂いたら、少しは家中の心持も休まるかと思いまして         今日のことをなんぼう待ちましたろ。政夫さん、どうぞ聞き分けて下さい。ねイ民子はあなたにはそむいては居ません。どうぞ不憫と思うてやって下さい         」", "一語一句皆涙で、僕も一時泣きふしてしまった。民子は死ぬのが本望だと云ったか、そういったか         家の母があんなに［＃「あんなに」は底本では「あんたに」］身を責めて泣かれるのも、その筈であった。僕は、", "「お祖母さん、よく判りました。私は民さんの心持はよく知っています。去年の春、民さんが嫁にゆかれたと聞いた時でさえ、私は民さんを毛ほども疑わなかったですもの。どの様なことがあろうとも、私が民さんを思う心持は変りません。家の母などもただそればかり言って嘆いて居ますが、それも皆悪気があっての業（わざ）　でないのですから、私は勿論民さんだって決して恨みに思やしません。何もかも定まった縁と諦めます。私は当分毎日お墓へ参ります         」", "話しては泣き泣いては話し、甲一語乙一語いくら泣いても果てしがない。僕は母のことも気にかかるので、もうお昼だという時分に戸村の家を辞した。戸村のお母さんは、民子の墓の前で僕の素振りが余り痛わしかったから、途中が心配になるとて、自分で矢切の入口まで送ってきてくれた。民子の愍然（あわれ）　なことはいくら思うても思いきれない。いくら泣いても泣ききれない。しかしながらまた目の前の母が、悔悟の念に攻められ、自ら大罪を犯したと信じて嘆いている愍然（あわれ）　さを見ると、僕はどうしても今は民子を泣いては居られない。僕がめそめそして居ったでは、母の苦しみは増すばかりと気がついた。それから一心に自分で自分を励まし、元気をよそおうてひたすら母を慰める工夫をした。それでも心にない事は仕方のないもの、母はいつしかそれと気がついてる様子、そうなっては僕が家に居ないより外はない。", "毎日　七日（なぬか）　の間市川へ通って、民子の墓の周囲には野菊が一面に植えられた。その翌（あ）くる日に僕は十分母の精神の休まる様に自分の心持を話して、決然学校へ出た。", "＊　　　　　　＊　　　　　　＊", "民子は余儀なき結婚をして遂に世を去り、僕は余儀なき結婚をして長らえている。民子は僕の写真と僕の手紙とを胸を離さずに持って居よう。", "幽明　遙（はる）　けく隔つとも僕の心は一日も民子の上を去らぬ。"]}, {"no": 39, "title": "走れメロス", "author": "太宰 治", "category": "日本文学-児童-物語", "chars": 10155, "volume": "中", "paras": ["メロスは激怒した。必ず、かの邪智暴虐(じゃちぼうぎゃく)の王を除かなければならぬと決意した。メロスには政治がわからぬ。メロスは、村の牧人である。笛を吹き、羊と遊んで暮して来た。けれども邪悪に対しては、人一倍に敏感であった。きょう未明メロスは村を出発し、野を越え山越え、十里はなれた此(こ)のシラクスの市にやって来た。メロスには父も、母も無い。女房も無い。十六の、内気な妹と二人暮しだ。この妹は、村の或る律気な一牧人を、近々、花婿(はなむこ)として迎える事になっていた。結婚式も間近かなのである。メロスは、それゆえ、花嫁の衣裳やら祝宴の御馳走やらを買いに、はるばる市にやって来たのだ。先ず、その品々を買い集め、それから都の大路をぶらぶら歩いた。メロスには竹馬の友があった。セリヌンティウスである。今は此のシラクスの市で、石工をしている。その友を、これから訪ねてみるつもりなのだ。久しく逢わなかったのだから、訪ねて行くのが楽しみである。歩いているうちにメロスは、まちの様子を怪しく思った。ひっそりしている。もう既に日も落ちて、まちの暗いのは当りまえだが、けれども、なんだか、夜のせいばかりでは無く、市全体が、やけに寂しい。のんきなメロスも、だんだん不安になって来た。路で逢った若い衆をつかまえて、何かあったのか、二年まえに此の市に来たときは、夜でも皆が歌をうたって、まちは賑やかであった筈(はず)だが、と質問した。若い衆は、首を振って答えなかった。しばらく歩いて老爺(ろうや)に逢い、こんどはもっと、語勢を強くして質問した。老爺は答えなかった。メロスは両手で老爺のからだをゆすぶって質問を重ねた。老爺は、あたりをはばかる低声で、わずか答えた。", "「王様は、人を殺します。」", "「なぜ殺すのだ。」", "「悪心を抱いている、というのですが、誰もそんな、悪心を持っては居りませぬ。」", "「たくさんの人を殺したのか。」", "「はい、はじめは王様の妹婿さまを。それから、御自身のお世嗣(よつぎ)を。それから、妹さまを。それから、妹さまの御子さまを。それから、皇后さまを。それから、賢臣のアレキス様を。」", "「おどろいた。国王は乱心か。」", "「いいえ、乱心ではございませぬ。人を、信ずる事が出来ぬ、というのです。このごろは、臣下の心をも、お疑いになり、少しく派手な暮しをしている者には、人質ひとりずつ差し出すことを命じて居ります。御命令を拒めば十字架にかけられて、殺されます。きょうは、六人殺されました。」", "聞いて、メロスは激怒した。「呆(あき)れた王だ。生かして置けぬ。」", "メロスは、単純な男であった。買い物を、背負ったままで、のそのそ王城にはいって行った。たちまち彼は、巡邏(じゅんら)の警吏に捕縛された。調べられて、メロスの懐中からは短剣が出て来たので、騒ぎが大きくなってしまった。メロスは、王の前に引き出された。", "「この短刀で何をするつもりであったか。言え！」暴君ディオニスは静かに、けれども威厳を以(もっ)て問いつめた。その王の顔は蒼白(そうはく)で、眉間(みけん)の皺(しわ)は、刻み込まれたように深かった。", "「市を暴君の手から救うのだ。」とメロスは悪びれずに答えた。", "「おまえがか？」王は、憫笑(びんしょう)した。「仕方の無いやつじゃ。おまえには、わしの孤独がわからぬ。」", "「言うな！」とメロスは、いきり立って反駁(はんばく)した。「人の心を疑うのは、最も恥ずべき悪徳だ。王は、民の忠誠をさえ疑って居られる。」", "「疑うのが、正当の心構えなのだと、わしに教えてくれたのは、おまえたちだ。人の心は、あてにならない。人間は、もともと私慾のかたまりさ。信じては、ならぬ。」暴君は落着いて呟(つぶや)き、ほっと溜息(ためいき)をついた。「わしだって、平和を望んでいるのだが。」", "「なんの為の平和だ。自分の地位を守る為か。」こんどはメロスが嘲笑した。「罪の無い人を殺して、何が平和だ。」", "「だまれ、下賤(げせん)の者。」王は、さっと顔を挙げて報いた。「口では、どんな清らかな事でも言える。わしには、人の腹綿の奥底が見え透いてならぬ。おまえだって、いまに、磔(はりつけ)になってから、泣いて詫(わ)びたって聞かぬぞ。」", "「ああ、王は悧巧(りこう)だ。自惚(うぬぼ)れているがよい。私は、ちゃんと死ぬる覚悟で居るのに。命乞いなど決してしない。ただ、――」と言いかけて、メロスは足もとに視線を落し瞬時ためらい、「ただ、私に情をかけたいつもりなら、処刑までに三日間の日限を与えて下さい。たった一人の妹に、亭主を持たせてやりたいのです。三日のうちに、私は村で結婚式を挙げさせ、必ず、ここへ帰って来ます。」", "「ばかな。」と暴君は、嗄(しわが)れた声で低く笑った。「とんでもない嘘(うそ)を言うわい。逃がした小鳥が帰って来るというのか。」", "「そうです。帰って来るのです。」メロスは必死で言い張った。「私は約束を守ります。私を、三日間だけ許して下さい。妹が、私の帰りを待っているのだ。そんなに私を信じられないならば、よろしい、この市にセリヌンティウスという石工がいます。私の無二の友人だ。あれを、人質としてここに置いて行こう。私が逃げてしまって、三日目の日暮まで、ここに帰って来なかったら、あの友人を絞め殺して下さい。たのむ、そうして下さい。」", "それを聞いて王は、残虐な気持で、そっと北叟笑(ほくそえ)んだ。生意気なことを言うわい。どうせ帰って来ないにきまっている。この嘘つきに騙(だま)された振りして、放してやるのも面白い。そうして身代りの男を、三日目に殺してやるのも気味がいい。人は、これだから信じられぬと、わしは悲しい顔して、その身代りの男を磔刑に処してやるのだ。世の中の、正直者とかいう奴輩(やつばら)にうんと見せつけてやりたいものさ。", "「願いを、聞いた。その身代りを呼ぶがよい。三日目には日没までに帰って来い。おくれたら、その身代りを、きっと殺すぞ。ちょっとおくれて来るがいい。おまえの罪は、永遠にゆるしてやろうぞ。」", "「なに、何をおっしゃる。」", "「はは。いのちが大事だったら、おくれて来い。おまえの心は、わかっているぞ。」", "メロスは口惜しく、地団駄(じだんだ)踏んだ。ものも言いたくなくなった。", "竹馬の友、セリヌンティウスは、深夜、王城に召された。暴君ディオニスの面前で、佳(よ)き友と佳き友は、二年ぶりで相逢うた。メロスは、友に一切の事情を語った。セリヌンティウスは無言で首肯(うなず)き、メロスをひしと抱きしめた。友と友の間は、それでよかった。セリヌンティウスは、縄打たれた。メロスは、すぐに出発した。初夏、満天の星である。", "メロスはその夜、一睡もせず十里の路を急ぎに急いで、村へ到着したのは、翌(あく)る日の午前、陽は既に高く昇って、村人たちは野に出て仕事をはじめていた。メロスの十六の妹も、きょうは兄の代りに羊群の番をしていた。よろめいて歩いて来る兄の、疲労｜困憊(こんぱい)の姿を見つけて驚いた。そうして、うるさく兄に質問を浴びせた。", "「なんでも無い。」メロスは無理に笑おうと努めた。「市に用事を残して来た。またすぐ市に行かなければならぬ。あす、おまえの結婚式を挙げる。早いほうがよかろう。」", "妹は頬をあからめた。", "「うれしいか。綺麗(きれい)な衣裳も買って来た。さあ、これから行って、村の人たちに知らせて来い。結婚式は、あすだと。」", "メロスは、また、よろよろと歩き出し、家へ帰って神々の祭壇を飾り、祝宴の席を調え、間もなく床に倒れ伏し、呼吸もせぬくらいの深い眠りに落ちてしまった。", "眼が覚めたのは夜だった。メロスは起きてすぐ、花婿の家を訪れた。そうして、少し事情があるから、結婚式を明日にしてくれ、と頼んだ。婿の牧人は驚き、それはいけない、こちらには未だ何の仕度も出来ていない、葡萄(ぶどう)の季節まで待ってくれ、と答えた。メロスは、待つことは出来ぬ、どうか明日にしてくれ給え、と更に押してたのんだ。婿の牧人も頑強であった。なかなか承諾してくれない。夜明けまで議論をつづけて、やっと、どうにか婿をなだめ、すかして、説き伏せた。結婚式は、真昼に行われた。新郎新婦の、神々への宣誓が済んだころ、黒雲が空を覆い、ぽつりぽつり雨が降り出し、やがて車軸を流すような大雨となった。祝宴に列席していた村人たちは、何か不吉なものを感じたが、それでも、めいめい気持を引きたて、狭い家の中で、むんむん蒸し暑いのも怺(こら)え、陽気に歌をうたい、手を拍(う)った。メロスも、満面に喜色を湛(たた)え、しばらくは、王とのあの約束をさえ忘れていた。祝宴は、夜に入っていよいよ乱れ華やかになり、人々は、外の豪雨を全く気にしなくなった。メロスは、一生このままここにいたい、と思った。この佳い人たちと生涯暮して行きたいと願ったが、いまは、自分のからだで、自分のものでは無い。ままならぬ事である。メロスは、わが身に鞭打ち、ついに出発を決意した。あすの日没までには、まだ十分の時が在る。ちょっと一眠りして、それからすぐに出発しよう、と考えた。その頃には、雨も小降りになっていよう。少しでも永くこの家に愚図愚図とどまっていたかった。メロスほどの男にも、やはり未練の情というものは在る。今宵呆然、歓喜に酔っているらしい花嫁に近寄り、", "「おめでとう。私は疲れてしまったから、ちょっとご免こうむって眠りたい。眼が覚めたら、すぐに市に出かける。大切な用事があるのだ。私がいなくても、もうおまえには優しい亭主があるのだから、決して寂しい事は無い。おまえの兄の、一ばんきらいなものは、人を疑う事と、それから、嘘をつく事だ。おまえも、それは、知っているね。亭主との間に、どんな秘密でも作ってはならぬ。おまえに言いたいのは、それだけだ。おまえの兄は、たぶん偉い男なのだから、おまえもその誇りを持っていろ。」", "花嫁は、夢見心地で首肯(うなず)いた。メロスは、それから花婿の肩をたたいて、", "「仕度の無いのはお互さまさ。私の家にも、宝といっては、妹と羊だけだ。他には、何も無い。全部あげよう。もう一つ、メロスの弟になったことを誇ってくれ。」", "花婿は揉(も)み手して、てれていた。メロスは笑って村人たちにも会釈(えしゃく)して、宴席から立ち去り、羊小屋にもぐり込んで、死んだように深く眠った。", "眼が覚めたのは翌る日の薄明の頃である。メロスは跳ね起き、南無三、寝過したか、いや、まだまだ大丈夫、これからすぐに出発すれば、約束の刻限までには十分間に合う。きょうは是非とも、あの王に、人の信実の存するところを見せてやろう。そうして笑って磔の台に上ってやる。メロスは、悠々と身仕度をはじめた。雨も、いくぶん小降りになっている様子である。身仕度は出来た。さて、メロスは、ぶるんと両腕を大きく振って、雨中、矢の如く走り出た。", "私は、今宵、殺される。殺される為に走るのだ。身代りの友を救う為に走るのだ。王の奸佞(かんねい)邪智を打ち破る為に走るのだ。走らなければならぬ。そうして、私は殺される。若い時から名誉を守れ。さらば、ふるさと。若いメロスは、つらかった。幾度か、立ちどまりそうになった。えい、えいと大声挙げて自身を叱りながら走った。村を出て、野を横切り、森をくぐり抜け、隣村に着いた頃には、雨も止(や)み、日は高く昇って、そろそろ暑くなって来た。メロスは額(ひたい)の汗をこぶしで払い、ここまで来れば大丈夫、もはや故郷への未練は無い。妹たちは、きっと佳い夫婦になるだろう。私には、いま、なんの気がかりも無い筈だ。まっすぐに王城に行き着けば、それでよいのだ。そんなに急ぐ必要も無い。ゆっくり歩こう、と持ちまえの呑気(のんき)さを取り返し、好きな小歌をいい声で歌い出した。ぶらぶら歩いて二里行き三里行き、そろそろ全里程の半ばに到達した頃、降って湧(わ)いた災難、メロスの足は、はたと、とまった。見よ、前方の川を。きのうの豪雨で山の水源地は氾濫(はんらん)し、濁流｜滔々(とうとう)と下流に集り、猛勢一挙に橋を破壊し、どうどうと響きをあげる激流が、木葉微塵(こっぱみじん)に橋桁(はしげた)を跳ね飛ばしていた。彼は茫然と、立ちすくんだ。あちこちと眺めまわし、また、声を限りに呼びたててみたが、繋舟(けいしゅう)は残らず浪に浚(さら)われて影なく、渡守りの姿も見えない。流れはいよいよ、ふくれ上り、海のようになっている。メロスは川岸にうずくまり、男泣きに泣きながらゼウスに手を挙げて哀願した。「ああ、鎮(しず)めたまえ、荒れ狂う流れを！　時は刻々に過ぎて行きます。太陽も既に真昼時です。あれが沈んでしまわぬうちに、王城に行き着くことが出来なかったら、あの佳い友達が、私のために死ぬのです。」", "濁流は、メロスの叫びをせせら笑う如く、ますます激しく躍り狂う。浪は浪を呑み、捲き、煽(あお)り立て、そうして時は、刻一刻と消えて行く。今はメロスも覚悟した。泳ぎ切るより他に無い。ああ、神々も照覧あれ！　濁流にも負けぬ愛と誠の偉大な力を、いまこそ発揮して見せる。メロスは、ざんぶと流れに飛び込み、百匹の大蛇のようにのた打ち荒れ狂う浪を相手に、必死の闘争を開始した。満身の力を腕にこめて、押し寄せ渦巻き引きずる流れを、なんのこれしきと掻(か)きわけ掻きわけ、めくらめっぽう獅子奮迅の人の子の姿には、神も哀れと思ったか、ついに憐愍(れんびん)を垂れてくれた。押し流されつつも、見事、対岸の樹木の幹に、すがりつく事が出来たのである。ありがたい。メロスは馬のように大きな胴震いを一つして、すぐにまた先きを急いだ。一刻といえども、むだには出来ない。陽は既に西に傾きかけている。ぜいぜい荒い呼吸をしながら峠をのぼり、のぼり切って、ほっとした時、突然、目の前に一隊の山賊が躍り出た。", "「待て。」", "「何をするのだ。私は陽の沈まぬうちに王城へ行かなければならぬ。放せ。」", "「どっこい放さぬ。持ちもの全部を置いて行け。」", "「私にはいのちの他には何も無い。その、たった一つの命も、これから王にくれてやるのだ。」", "「その、いのちが欲しいのだ。」", "「さては、王の命令で、ここで私を待ち伏せしていたのだな。」", "山賊たちは、ものも言わず一斉に棍棒(こんぼう)を振り挙げた。メロスはひょいと、からだを折り曲げ、飛鳥の如く身近かの一人に襲いかかり、その棍棒を奪い取って、", "「気の毒だが正義のためだ！」と猛然一撃、たちまち、三人を殴り倒し、残る者のひるむ隙(すき)に、さっさと走って峠を下った。一気に峠を駈け降りたが、流石(さすが)に疲労し、折から午後の灼熱(しゃくねつ)の太陽がまともに、かっと照って来て、メロスは幾度となく眩暈(めまい)を感じ、これではならぬ、と気を取り直しては、よろよろ二、三歩あるいて、ついに、がくりと膝を折った。立ち上る事が出来ぬのだ。天を仰いで、くやし泣きに泣き出した。ああ、あ、濁流を泳ぎ切り、山賊を三人も撃ち倒し韋駄天(いだてん)、ここまで突破して来たメロスよ。真の勇者、メロスよ。今、ここで、疲れ切って動けなくなるとは情無い。愛する友は、おまえを信じたばかりに、やがて殺されなければならぬ。おまえは、稀代(きたい)の不信の人間、まさしく王の思う壺(つぼ)だぞ、と自分を叱ってみるのだが、全身｜萎(な)えて、もはや芋虫(いもむし)ほどにも前進かなわぬ。路傍の草原にごろりと寝ころがった。身体疲労すれば、精神も共にやられる。もう、どうでもいいという、勇者に不似合いな不貞腐(ふてくさ)れた根性が、心の隅に巣喰った。私は、これほど努力したのだ。約束を破る心は、みじんも無かった。神も照覧、私は精一ぱいに努めて来たのだ。動けなくなるまで走って来たのだ。私は不信の徒では無い。ああ、できる事なら私の胸を截(た)ち割って、真紅の心臓をお目に掛けたい。愛と信実の血液だけで動いているこの心臓を見せてやりたい。けれども私は、この大事な時に、精も根も尽きたのだ。私は、よくよく不幸な男だ。私は、きっと笑われる。私の一家も笑われる。私は友を欺(あざむ)いた。中途で倒れるのは、はじめから何もしないのと同じ事だ。ああ、もう、どうでもいい。これが、私の定った運命なのかも知れない。セリヌンティウスよ、ゆるしてくれ。君は、いつでも私を信じた。私も君を、欺かなかった。私たちは、本当に佳い友と友であったのだ。いちどだって、暗い疑惑の雲を、お互い胸に宿したことは無かった。いまだって、君は私を無心に待っているだろう。ああ、待っているだろう。ありがとう、セリヌンティウス。よくも私を信じてくれた。それを思えば、たまらない。友と友の間の信実は、この世で一ばん誇るべき宝なのだからな。セリヌンティウス、私は走ったのだ。君を欺くつもりは、みじんも無かった。信じてくれ！　私は急ぎに急いでここまで来たのだ。濁流を突破した。山賊の囲みからも、するりと抜けて一気に峠を駈け降りて来たのだ。私だから、出来たのだよ。ああ、この上、私に望み給うな。放って置いてくれ。どうでも、いいのだ。私は負けたのだ。だらしが無い。笑ってくれ。王は私に、ちょっとおくれて来い、と耳打ちした。おくれたら、身代りを殺して、私を助けてくれると約束した。私は王の卑劣を憎んだ。けれども、今になってみると、私は王の言うままになっている。私は、おくれて行くだろう。王は、ひとり合点して私を笑い、そうして事も無く私を放免するだろう。そうなったら、私は、死ぬよりつらい。私は、永遠に裏切者だ。地上で最も、不名誉の人種だ。セリヌンティウスよ、私も死ぬぞ。君と一緒に死なせてくれ。君だけは私を信じてくれるにちがい無い。いや、それも私の、ひとりよがりか？　ああ、もういっそ、悪徳者として生き伸びてやろうか。村には私の家が在る。羊も居る。妹夫婦は、まさか私を村から追い出すような事はしないだろう。正義だの、信実だの、愛だの、考えてみれば、くだらない。人を殺して自分が生きる。それが人間世界の定法ではなかったか。ああ、何もかも、ばかばかしい。私は、醜い裏切り者だ。どうとも、勝手にするがよい。やんぬる哉(かな)。――四肢を投げ出して、うとうと、まどろんでしまった。", "ふと耳に、潺々(せんせん)、水の流れる音が聞えた。そっと頭をもたげ、息を呑んで耳をすました。すぐ足もとで、水が流れているらしい。よろよろ起き上って、見ると、岩の裂目から滾々(こんこん)と、何か小さく囁(ささや)きながら清水が湧き出ているのである。その泉に吸い込まれるようにメロスは身をかがめた。水を両手で掬(すく)って、一くち飲んだ。ほうと長い溜息が出て、夢から覚めたような気がした。歩ける。行こう。肉体の疲労｜恢復(かいふく)と共に、わずかながら希望が生れた。義務遂行の希望である。わが身を殺して、名誉を守る希望である。斜陽は赤い光を、樹々の葉に投じ、葉も枝も燃えるばかりに輝いている。日没までには、まだ間がある。私を、待っている人があるのだ。少しも疑わず、静かに期待してくれている人があるのだ。私は、信じられている。私の命なぞは、問題ではない。死んでお詫び、などと気のいい事は言って居られぬ。私は、信頼に報いなければならぬ。いまはただその一事だ。走れ！　メロス。", "私は信頼されている。私は信頼されている。先刻の、あの悪魔の囁きは、あれは夢だ。悪い夢だ。忘れてしまえ。五臓が疲れているときは、ふいとあんな悪い夢を見るものだ。メロス、おまえの恥ではない。やはり、おまえは真の勇者だ。再び立って走れるようになったではないか。ありがたい！　私は、正義の士として死ぬ事が出来るぞ。ああ、陽が沈む。ずんずん沈む。待ってくれ、ゼウスよ。私は生れた時から正直な男であった。正直な男のままにして死なせて下さい。", "路行く人を押しのけ、跳(は)ねとばし、メロスは黒い風のように走った。野原で酒宴の、その宴席のまっただ中を駈け抜け、酒宴の人たちを仰天させ、犬を蹴(け)とばし、小川を飛び越え、少しずつ沈んでゆく太陽の、十倍も早く走った。一団の旅人と颯(さ)っとすれちがった瞬間、不吉な会話を小耳にはさんだ。「いまごろは、あの男も、磔にかかっているよ。」ああ、その男、その男のために私は、いまこんなに走っているのだ。その男を死なせてはならない。急げ、メロス。おくれてはならぬ。愛と誠の力を、いまこそ知らせてやるがよい。風態なんかは、どうでもいい。メロスは、いまは、ほとんど全裸体であった。呼吸も出来ず、二度、三度、口から血が噴き出た。見える。はるか向うに小さく、シラクスの市の塔楼が見える。塔楼は、夕陽を受けてきらきら光っている。", "「ああ、メロス様。」うめくような声が、風と共に聞えた。", "「誰だ。」メロスは走りながら尋ねた。", "「フィロストラトスでございます。貴方のお友達セリヌンティウス様の弟子でございます。」その若い石工も、メロスの後について走りながら叫んだ。「もう、駄目でございます。むだでございます。走るのは、やめて下さい。もう、あの方(かた)をお助けになることは出来ません。」", "「いや、まだ陽は沈まぬ。」", "「ちょうど今、あの方が死刑になるところです。ああ、あなたは遅かった。おうらみ申します。ほんの少し、もうちょっとでも、早かったなら！」", "「いや、まだ陽は沈まぬ。」メロスは胸の張り裂ける思いで、赤く大きい夕陽ばかりを見つめていた。走るより他は無い。", "「やめて下さい。走るのは、やめて下さい。いまはご自分のお命が大事です。あの方は、あなたを信じて居りました。刑場に引き出されても、平気でいました。王様が、さんざんあの方をからかっても、メロスは来ます、とだけ答え、強い信念を持ちつづけている様子でございました。」", "「それだから、走るのだ。信じられているから走るのだ。間に合う、間に合わぬは問題でないのだ。人の命も問題でないのだ。私は、なんだか、もっと恐ろしく大きいものの為に走っているのだ。ついて来い！　フィロストラトス。」", "「ああ、あなたは気が狂ったか。それでは、うんと走るがいい。ひょっとしたら、間に合わぬものでもない。走るがいい。」", "言うにや及ぶ。まだ陽は沈まぬ。最後の死力を尽して、メロスは走った。メロスの頭は、からっぽだ。何一つ考えていない。ただ、わけのわからぬ大きな力にひきずられて走った。陽は、ゆらゆら地平線に没し、まさに最後の一片の残光も、消えようとした時、メロスは疾風の如く刑場に突入した。間に合った。", "「待て。その人を殺してはならぬ。メロスが帰って来た。約束のとおり、いま、帰って来た。」と大声で刑場の群衆にむかって叫んだつもりであったが、喉(のど)がつぶれて嗄(しわが)れた声が幽(かす)かに出たばかり、群衆は、ひとりとして彼の到着に気がつかない。すでに磔の柱が高々と立てられ、縄を打たれたセリヌンティウスは、徐々に釣り上げられてゆく。メロスはそれを目撃して最後の勇、先刻、濁流を泳いだように群衆を掻きわけ、掻きわけ、", "「私だ、刑吏！　殺されるのは、私だ。メロスだ。彼を人質にした私は、ここにいる！」と、かすれた声で精一ぱいに叫びながら、ついに磔台に昇り、釣り上げられてゆく友の両足に、齧(かじ)りついた。群衆は、どよめいた。あっぱれ。ゆるせ、と口々にわめいた。セリヌンティウスの縄は、ほどかれたのである。", "「セリヌンティウス。」メロスは眼に涙を浮べて言った。「私を殴れ。ちから一ぱいに頬を殴れ。私は、途中で一度、悪い夢を見た。君が若(も)し私を殴ってくれなかったら、私は君と抱擁する資格さえ無いのだ。殴れ。」", "セリヌンティウスは、すべてを察した様子で首肯(うなず)き、刑場一ぱいに鳴り響くほど音高くメロスの右頬を殴った。殴ってから優しく微笑(ほほえ)み、", "「メロス、私を殴れ。同じくらい音高く私の頬を殴れ。私はこの三日の間、たった一度だけ、ちらと君を疑った。生れて、はじめて君を疑った。君が私を殴ってくれなければ、私は君と抱擁できない。」", "メロスは腕に唸(うな)りをつけてセリヌンティウスの頬を殴った。", "「ありがとう、友よ。」二人同時に言い、ひしと抱き合い、それから嬉し泣きにおいおい声を放って泣いた。", "群衆の中からも、歔欷(きょき)の声が聞えた。暴君ディオニスは、群衆の背後から二人の様を、まじまじと見つめていたが、やがて静かに二人に近づき、顔をあからめて、こう言った。", "「おまえらの望みは叶(かな)ったぞ。おまえらは、わしの心に勝ったのだ。信実とは、決して空虚な妄想ではなかった。どうか、わしをも仲間に入れてくれまいか。どうか、わしの願いを聞き入れて、おまえらの仲間の一人にしてほしい。」", "どっと群衆の間に、歓声が起った。", "「万歳、王様万歳。」", "ひとりの少女が、緋(ひ)のマントをメロスに捧げた。メロスは、まごついた。佳き友は、気をきかせて教えてやった。", "「メロス、君は、まっぱだかじゃないか。早くそのマントを着るがいい。この可愛い娘さんは、メロスの裸体を、皆に見られるのが、たまらなく口惜しいのだ。」", "勇者は、ひどく赤面した。", "（古伝説と、シルレルの詩から。）"]}, {"no": 40, "title": "鼻", "author": "芥川 竜之介", "category": "日本文学-児童-物語", "chars": 6511, "volume": "中", "paras": ["禅智内供（ぜんちないぐ）の鼻と云えば、池（いけ）の尾（お）で知らない者はない。長さは五六寸あって上唇（うわくちびる）の上から顋（あご）の下まで下っている。形は元も先も同じように太い。云わば細長い腸詰（ちょうづ）めのような物が、ぶらりと顔のまん中からぶら下っているのである。", "五十歳を越えた内供は、沙弥（しゃみ）の昔から、内道場供奉（ないどうじょうぐぶ）の職に陞（のぼ）った今日（こんにち）まで、内心では始終この鼻を苦に病んで来た。勿論（もちろん）表面では、今でもさほど気にならないような顔をしてすましている。これは専念に当来（とうらい）の浄土（じょうど）を渇仰（かつぎょう）すべき僧侶（そうりょ）の身で、鼻の心配をするのが悪いと思ったからばかりではない。それよりむしろ、自分で鼻を気にしていると云う事を、人に知られるのが嫌だったからである。内供は日常の談話の中に、鼻と云う語が出て来るのを何よりも惧（おそ）れていた。", "内供が鼻を持てあました理由は二つある。――一つは実際的に、鼻の長いのが不便だったからである。第一飯を食う時にも独りでは食えない。独りで食えば、鼻の先が鋺（かなまり）の中の飯へとどいてしまう。そこで内供は弟子の一人を膳の向うへ坐らせて、飯を食う間中、広さ一寸長さ二尺ばかりの板で、鼻を持上げていて貰う事にした。しかしこうして飯を食うと云う事は、持上げている弟子にとっても、持上げられている内供にとっても、決して容易な事ではない。一度この弟子の代りをした中童子（ちゅうどうじ）が、嚏（くさめ）をした拍子に手がふるえて、鼻を粥（かゆ）の中へ落した話は、当時京都まで喧伝（けんでん）された。――けれどもこれは内供にとって、決して鼻を苦に病んだ重（おも）な理由ではない。内供は実にこの鼻によって傷つけられる自尊心のために苦しんだのである。", "池の尾の町の者は、こう云う鼻をしている禅智内供のために、内供の俗でない事を仕合せだと云った。あの鼻では誰も妻になる女があるまいと思ったからである。中にはまた、あの鼻だから出家（しゅっけ）したのだろうと批評する者さえあった。しかし内供は、自分が僧であるために、幾分でもこの鼻に煩（わずらわ）される事が少くなったと思っていない。内供の自尊心は、妻帯と云うような結果的な事実に左右されるためには、余りにデリケイトに出来ていたのである。そこで内供は、積極的にも消極的にも、この自尊心の毀損（きそん）を恢復（かいふく）しようと試みた。", "第一に内供の考えたのは、この長い鼻を実際以上に短く見せる方法である。これは人のいない時に、鏡へ向って、いろいろな角度から顔を映しながら、熱心に工夫（くふう）を凝（こ）らして見た。どうかすると、顔の位置を換えるだけでは、安心が出来なくなって、頬杖（ほおづえ）をついたり頤（あご）の先へ指をあてがったりして、根気よく鏡を覗いて見る事もあった。しかし自分でも満足するほど、鼻が短く見えた事は、これまでにただの一度もない。時によると、苦心すればするほど、かえって長く見えるような気さえした。内供は、こう云う時には、鏡を箱へしまいながら、今更のようにため息をついて、不承不承にまた元の経机（きょうづくえ）へ、観音経（かんのんぎょう）をよみに帰るのである。", "それからまた内供は、絶えず人の鼻を気にしていた。池の尾の寺は、僧供講説（そうぐこうせつ）などのしばしば行われる寺である。寺の内には、僧坊が隙なく建て続いて、湯屋では寺の僧が日毎に湯を沸かしている。従ってここへ出入する僧俗の類（たぐい）も甚だ多い。内供はこう云う人々の顔を根気よく物色した。一人でも自分のような鼻のある人間を見つけて、安心がしたかったからである。だから内供の眼には、紺の水干（すいかん）も白の帷子（かたびら）もはいらない。まして柑子色（こうじいろ）の帽子や、椎鈍（しいにび）の法衣（ころも）なぞは、見慣れているだけに、有れども無きが如くである。内供は人を見ずに、ただ、鼻を見た。――しかし鍵鼻（かぎばな）はあっても、内供のような鼻は一つも見当らない。その見当らない事が度重なるに従って、内供の心は次第にまた不快になった。内供が人と話しながら、思わずぶらりと下っている鼻の先をつまんで見て、年甲斐（としがい）もなく顔を赤らめたのは、全くこの不快に動かされての所為（しょい）である。", "最後に、内供は、内典外典（ないてんげてん）の中に、自分と同じような鼻のある人物を見出して、せめても幾分の心やりにしようとさえ思った事がある。けれども、目連（もくれん）や、舎利弗（しゃりほつ）の鼻が長かったとは、どの経文にも書いてない。勿論｜竜樹（りゅうじゅ）や馬鳴（めみょう）も、人並の鼻を備えた菩薩（ぼさつ）である。内供は、震旦（しんたん）の話の序（ついで）に蜀漢（しょくかん）の劉玄徳（りゅうげんとく）の耳が長かったと云う事を聞いた時に、それが鼻だったら、どのくらい自分は心細くなくなるだろうと思った。", "内供がこう云う消極的な苦心をしながらも、一方ではまた、積極的に鼻の短くなる方法を試みた事は、わざわざここに云うまでもない。内供はこの方面でもほとんど出来るだけの事をした。烏瓜（からすうり）を煎（せん）じて飲んで見た事もある。鼠の尿（いばり）を鼻へなすって見た事もある。しかし何をどうしても、鼻は依然として、五六寸の長さをぶらりと唇の上にぶら下げているではないか。", "所がある年の秋、内供の用を兼ねて、京へ上った弟子（でし）の僧が、知己（しるべ）の医者から長い鼻を短くする法を教わって来た。その医者と云うのは、もと震旦（しんたん）から渡って来た男で、当時は長楽寺（ちょうらくじ）の供僧（ぐそう）になっていたのである。", "内供は、いつものように、鼻などは気にかけないと云う風をして、わざとその法もすぐにやって見ようとは云わずにいた。そうして一方では、気軽な口調で、食事の度毎に、弟子の手数をかけるのが、心苦しいと云うような事を云った。内心では勿論弟子の僧が、自分を説伏（ときふ）せて、この法を試みさせるのを待っていたのである。弟子の僧にも、内供のこの策略がわからない筈はない。しかしそれに対する反感よりは、内供のそう云う策略をとる心もちの方が、より強くこの弟子の僧の同情を動かしたのであろう。弟子の僧は、内供の予期通り、口を極めて、この法を試みる事を勧め出した。そうして、内供自身もまた、その予期通り、結局この熱心な勧告に聴従（ちょうじゅう）する事になった。", "その法と云うのは、ただ、湯で鼻を茹（ゆ）でて、その鼻を人に踏ませると云う、極めて簡単なものであった。", "湯は寺の湯屋で、毎日沸かしている。そこで弟子の僧は、指も入れられないような熱い湯を、すぐに提（ひさげ）に入れて、湯屋から汲んで来た。しかしじかにこの提へ鼻を入れるとなると、湯気に吹かれて顔を火傷（やけど）する惧（おそれ）がある。そこで折敷（おしき）へ穴をあけて、それを提の蓋（ふた）にして、その穴から鼻を湯の中へ入れる事にした。鼻だけはこの熱い湯の中へ浸（ひた）しても、少しも熱くないのである。しばらくすると弟子の僧が云った。", "――もう茹（ゆだ）った時分でござろう。", "内供は苦笑した。これだけ聞いたのでは、誰も鼻の話とは気がつかないだろうと思ったからである。鼻は熱湯に蒸（む）されて、蚤（のみ）の食ったようにむず痒（がゆ）い。", "弟子の僧は、内供が折敷の穴から鼻をぬくと、そのまだ湯気の立っている鼻を、両足に力を入れながら、踏みはじめた。内供は横になって、鼻を床板の上へのばしながら、弟子の僧の足が上下（うえした）に動くのを眼の前に見ているのである。弟子の僧は、時々気の毒そうな顔をして、内供の禿（は）げ頭を見下しながら、こんな事を云った。", "――痛うはござらぬかな。医師は責（せ）めて踏めと申したで。じゃが、痛うはござらぬかな。", "内供は首を振って、痛くないと云う意味を示そうとした。所が鼻を踏まれているので思うように首が動かない。そこで、上眼（うわめ）を使って、弟子の僧の足に皹（あかぎれ）のきれているのを眺めながら、腹を立てたような声で、", "――痛うはないて。", "と答えた。実際鼻はむず痒い所を踏まれるので、痛いよりもかえって気もちのいいくらいだったのである。", "しばらく踏んでいると、やがて、粟粒（あわつぶ）のようなものが、鼻へ出来はじめた。云わば毛をむしった小鳥をそっくり丸炙（まるやき）にしたような形である。弟子の僧はこれを見ると、足を止めて独り言のようにこう云った。", "――これを鑷子（けぬき）でぬけと申す事でござった。", "内供は、不足らしく頬をふくらせて、黙って弟子の僧のするなりに任せて置いた。勿論弟子の僧の親切がわからない訳ではない。それは分っても、自分の鼻をまるで物品のように取扱うのが、不愉快に思われたからである。内供は、信用しない医者の手術をうける患者のような顔をして、不承不承に弟子の僧が、鼻の毛穴から鑷子（けぬき）で脂（あぶら）をとるのを眺めていた。脂は、鳥の羽の茎（くき）のような形をして、四分ばかりの長さにぬけるのである。", "やがてこれが一通りすむと、弟子の僧は、ほっと一息ついたような顔をして、", "――もう一度、これを茹でればようござる。", "と云った。", "内供はやはり、八の字をよせたまま不服らしい顔をして、弟子の僧の云うなりになっていた。", "さて二度目に茹でた鼻を出して見ると、成程、いつになく短くなっている。これではあたりまえの鍵鼻と大した変りはない。内供はその短くなった鼻を撫（な）でながら、弟子の僧の出してくれる鏡を、極（きま）りが悪るそうにおずおず覗（のぞ）いて見た。", "鼻は――あの顋（あご）の下まで下っていた鼻は、ほとんど嘘のように萎縮して、今は僅（わずか）に上唇の上で意気地なく残喘（ざんぜん）を保っている。所々まだらに赤くなっているのは、恐らく踏まれた時の痕（あと）であろう。こうなれば、もう誰も哂（わら）うものはないにちがいない。――鏡の中にある内供の顔は、鏡の外にある内供の顔を見て、満足そうに眼をしばたたいた。", "しかし、その日はまだ一日、鼻がまた長くなりはしないかと云う不安があった。そこで内供は誦経（ずぎょう）する時にも、食事をする時にも、暇さえあれば手を出して、そっと鼻の先にさわって見た。が、鼻は行儀（ぎょうぎ）よく唇の上に納まっているだけで、格別それより下へぶら下って来る景色もない。それから一晩寝てあくる日早く眼がさめると内供はまず、第一に、自分の鼻を撫でて見た。鼻は依然として短い。内供はそこで、幾年にもなく、法華経（ほけきょう）書写の功を積んだ時のような、のびのびした気分になった。", "所が二三日たつ中に、内供は意外な事実を発見した。それは折から、用事があって、池の尾の寺を訪れた侍（さむらい）が、前よりも一層｜可笑（おか）しそうな顔をして、話も碌々（ろくろく）せずに、じろじろ内供の鼻ばかり眺めていた事である。それのみならず、かつて、内供の鼻を粥（かゆ）の中へ落した事のある中童子（ちゅうどうじ）なぞは、講堂の外で内供と行きちがった時に、始めは、下を向いて可笑（おか）しさをこらえていたが、とうとうこらえ兼ねたと見えて、一度にふっと吹き出してしまった。用を云いつかった下法師（しもほうし）たちが、面と向っている間だけは、慎（つつし）んで聞いていても、内供が後（うしろ）さえ向けば、すぐにくすくす笑い出したのは、一度や二度の事ではない。", "内供ははじめ、これを自分の顔がわりがしたせいだと解釈した。しかしどうもこの解釈だけでは十分に説明がつかないようである。――勿論、中童子や下法師が哂（わら）う原因は、そこにあるのにちがいない。けれども同じ哂うにしても、鼻の長かった昔とは、哂うのにどことなく容子（ようす）がちがう。見慣れた長い鼻より、見慣れない短い鼻の方が滑稽（こっけい）に見えると云えば、それまでである。が、そこにはまだ何かあるらしい。", "――前にはあのようにつけつけとは哂わなんだて。", "内供は、誦（ず）しかけた経文をやめて、禿（は）げ頭を傾けながら、時々こう呟（つぶや）く事があった。愛すべき内供は、そう云う時になると、必ずぼんやり、傍（かたわら）にかけた普賢（ふげん）の画像を眺めながら、鼻の長かった四五日前の事を憶（おも）い出して、「今はむげにいやしくなりさがれる人の、さかえたる昔をしのぶがごとく」ふさぎこんでしまうのである。――内供には、遺憾（いかん）ながらこの問に答を与える明が欠けていた。", "――人間の心には互に矛盾（むじゅん）した二つの感情がある。勿論、誰でも他人の不幸に同情しない者はない。所がその人がその不幸を、どうにかして切りぬける事が出来ると、今度はこっちで何となく物足りないような心もちがする。少し誇張して云えば、もう一度その人を、同じ不幸に陥（おとしい）れて見たいような気にさえなる。そうしていつの間にか、消極的ではあるが、ある敵意をその人に対して抱くような事になる。――内供が、理由を知らないながらも、何となく不快に思ったのは、池の尾の僧俗の態度に、この傍観者の利己主義をそれとなく感づいたからにほかならない。", "そこで内供は日毎に機嫌（きげん）が悪くなった。二言目には、誰でも意地悪く叱（しか）りつける。しまいには鼻の療治（りょうじ）をしたあの弟子の僧でさえ、「内供は法慳貪（ほうけんどん）の罪を受けられるぞ」と陰口をきくほどになった。殊に内供を怒らせたのは、例の悪戯（いたずら）な中童子である。ある日、けたたましく犬の吠（ほ）える声がするので、内供が何気なく外へ出て見ると、中童子は、二尺ばかりの木の片（きれ）をふりまわして、毛の長い、痩（や）せた尨犬（むくいぬ）を逐（お）いまわしている。それもただ、逐いまわしているのではない。「鼻を打たれまい。それ、鼻を打たれまい」と囃（はや）しながら、逐いまわしているのである。内供は、中童子の手からその木の片をひったくって、したたかその顔を打った。木の片は以前の鼻持上（はなもた）げの木だったのである。", "内供はなまじいに、鼻の短くなったのが、かえって恨（うら）めしくなった。", "するとある夜の事である。日が暮れてから急に風が出たと見えて、塔の風鐸（ふうたく）の鳴る音が、うるさいほど枕に通（かよ）って来た。その上、寒さもめっきり加わったので、老年の内供は寝つこうとしても寝つかれない。そこで床の中でまじまじしていると、ふと鼻がいつになく、むず痒（かゆ）いのに気がついた。手をあてて見ると少し水気（すいき）が来たようにむくんでいる。どうやらそこだけ、熱さえもあるらしい。", "――無理に短うしたで、病が起ったのかも知れぬ。", "内供は、仏前に香花（こうげ）を供（そな）えるような恭（うやうや）しい手つきで、鼻を抑えながら、こう呟いた。", "翌朝、内供がいつものように早く眼をさまして見ると、寺内の銀杏（いちょう）や橡（とち）が一晩の中に葉を落したので、庭は黄金（きん）を敷いたように明るい。塔の屋根には霜が下りているせいであろう。まだうすい朝日に、九輪（くりん）がまばゆく光っている。禅智内供は、蔀（しとみ）を上げた縁に立って、深く息をすいこんだ。", "ほとんど、忘れようとしていたある感覚が、再び内供に帰って来たのはこの時である。", "内供は慌てて鼻へ手をやった。手にさわるものは、昨夜（ゆうべ）の短い鼻ではない。上唇の上から顋（あご）の下まで、五六寸あまりもぶら下っている、昔の長い鼻である。内供は鼻が一夜の中に、また元の通り長くなったのを知った。そうしてそれと同時に、鼻が短くなった時と同じような、はればれした心もちが、どこからともなく帰って来るのを感じた。", "――こうなれば、もう誰も哂（わら）うものはないにちがいない。", "内供は心の中でこう自分に囁（ささや）いた。長い鼻をあけ方の秋風にぶらつかせながら。", "（大正五年一月）"]}, {"no": 41, "title": "富嶽百景", "author": "太宰 治", "category": "日本文学-歴史", "chars": 15357, "volume": "中", "paras": ["富士の頂角、広重（ひろしげ）の富士は八十五度、文晁（ぶんてう）の富士も八十四たくらい、けれども、陸軍の実測図によって東西及南北に断面図を作ってみると、東西縦断は頂角、百二十四度となり、南北は百十七度である。広重、文晁に限らず、たいていの絵の富士は、鋭角である。いただきが、細く、高く、華奢（きやしや）である。北斎にいたっては、その頂角、ほとんど三十たくらい、エッフェル鉄塔のような富士をさえ描いている。けれども、実際の富士は、鈍角も鈍角、のろくさと拡がり、東西、百二十四度、南北は百十七度、決して、秀抜の、すらと高い山ではない。たとえば私が、インド（インド）かどこかの国から、突然、鷲（わし）にさらわれ、すとんと日本の沼津あたりの海岸に落されて、ふと、この山を見つけても、そんなに驚嘆しないだろう。ニツポンのフジヤマを、あらかじめ憧（あこが）れているからこそ、ワンダフルなのであって、そうでなくて、そのような俗な宣伝を、一さい知らず、素朴な、純粋の、うつろな心に、果して、どれだけ訴へ得るか、そのことになると、多少、心細い山である。低い。裾のひろがっている割に、低い。あれくらいの裾を持っている山ならば、少くとも、もう一・五倍、高くなければいけない。", "十国峠から見た富士だけは、高かった。あれは、よかった。はじめ、雲のために、いただきが見えず、私は、その裾の勾配から判断して、たぶん、あそこあたりが、いただきであろうと、雲の一点にしるしをつけて、そのうちに、雲が切れて、見ると、ちがった。私が、あらかじめ印（しるし）をつけて置いたところより、その倍も高いところに、青い頂きが、すっと見えた。おどろいた、というよりも私は、へんにくすぐつたく、げらげら笑った。やっていやがる、と思った。人は、完全のたのもしさに接すると、まず、だらしなくげらげら笑うものらしい。全身のネヂが、他愛なくゆるんで、これはおかしな言いかたであるが、帯紐（おびひも）といて笑うといったような感じである。諸君が、もし恋人と逢って、逢ったとたんに、恋人がげらげら笑い出したら、慶祝である。必ず、恋人の非礼をとがめてはならぬ。恋人は、君に逢って、君の完全のたのもしさを、全身に浴びているのだ。", "東京の、アパートの窓から見る富士は、くるしい。冬には、はっきり、よく見える。小さい、真白い三角が、地平線にちょこんと出ていて、それが富士だ。なんのことはない、クリスマスの飾り菓子である。しかも左のほうに、肩が傾いて心細く、船尾のほうからだんだん沈没しかけてゆく軍艦の姿に似ている。三年まえの冬、私はある人から、意外の事実を打ち明けられ、途方に暮れた。その夜、アパートの一室で、ひとりで、がぶがぶ酒のんだ。一睡もせず、酒のんだ。あかつき、小用に立って、アパートの便所の金網張られた四角い窓から、富士が見えた。小さく、真白で、左のほうにちょっと傾いて、あの富士を忘れない。窓の下のアスファルト路を、さかなやの自転車が疾駆（しつく）し、おう、けさは、やけに富士がはっきり見えるじゃねえか、めっぽふ寒いや、など呟（つぶや）きのこして、私は、暗い便所の中に立ちつくし、窓の金網撫でながら、じめじめ泣いて、あんな思いは、二度と繰りかえしたくない。", "昭和十三年の初秋、思いをあらたにする覚悟で、私は、かばんひとつさげて旅に出た。", "甲州。ここの山々の特徴は、山々の起伏の線の、へんに虚（むな）しい、なだらかさにある。小島烏水という人の日本山水論にも、「山の拗（す）ね者は多く、この土に仙遊するがごとし。」と在った。甲州の山々は、あるひは山の、げてものなのかも知れない。私は、甲府市からバスにゆられて一時間。御坂峠（みさかたうげ）へたどりつく。", "御坂峠、海抜千三百 米（メエトル）。この峠の頂上に、天下茶屋という、小さい茶店があって、井伏鱒二氏が初夏のころから、ここの二階に、こもって仕事をしていられる。私は、それを知ってここへ来た。井伏氏のお仕事の邪魔にならないようなら、隣室でも借りて、私も、しばらくそこで仙遊しようと思っていた。", "井伏氏は、仕事をしていられた。私は、井伏氏のゆるしを得て、当分その茶屋に落ちつくことになって、それから、毎日、いやでも富士と真正面から、向き合っていなければならなくなった。この峠は、甲府から東海道に出る鎌倉往還の衝（しよう）に当っていて、北面富士の代表観望台であると言われ、ここから見た富士は、むかしから富士三景の一つにかぞへられているのだそうであるが、私は、あまり好かなかった。好かないばかりか、軽蔑（けいべつ）さえした。あまりに、おあつらひむきの富士である。まんなかに富士があって、その下に河口湖が白く寒々とひろがり、近景の山々がその両袖にひっそり蹲（うずくま）つて湖を抱きかかえるようにしている。私は、ひとめ見て、狼狽し、顔を赤らめた。これは、まるで、風呂屋のペンキ画だ。芝居の書割だ。どうにも注文どおりの景色で、私は、恥ずかしくてならなかった。", "私が、その峠の茶屋へ来て二、三日経って、井伏氏の仕事も一段落ついて、ある晴れた午後、私たちは三ツ峠へのぼった。三ツ峠、海抜千七百米。御坂峠より、少し高い。急坂を這（は）ふようにしてよぢ登り、一時間ほどにして三ツ峠頂上に達する。蔦（つた）かづら掻きわけて、細い山路、這うようにしてよぢ登る私の姿は、決して見よいものではなかった。井伏氏は、ちゃんと登山服着ていられて、軽快の姿であったが、私には登山服の持ち合せがなく、ドテラ姿であった。茶屋のドテラは短く、私の毛臑（けづね）は、一尺以上も露出して、しかもそれに茶屋の老爺から借りたゴム底の地下足袋をはいたので、われながらむさ苦しく、少し工夫して、角帯をしめ、茶屋の壁にかかっていた古い麦藁帽（むぎわらばう）をかぶってみたのであるが、いよいよ変で、井伏氏は、人のなりふりを決して軽蔑しない人であるが、このときだけは流石（さすが）に少し、気の毒そうな顔をして、男は、しかし、身なりなんか気にしないほうがいい、と小声で呟いて私をいたわってくれたのを、私は忘れない。とかくして頂上についたのであるが、急に濃い霧が吹き流れて来て、頂上のパノラマ台という、断崖（だんがい）の縁（へり）に立ってみても、いつかうに眺望がきかない。何も見えない。井伏氏は、濃い霧の底、岩に腰をおろし、ゆっくり煙草を吸いながら、放屁なされた。いかにも、つまらなそうであった。パノラマ台には、茶店が三軒ならんで立っている。そのうちの一軒、老爺と老婆と二人きりで経営しているじみな一軒を選んで、そこで熱い茶を呑んだ。茶店の老婆は気の毒がり、ほんたうに生憎（あいにく）の霧で、もう少し経ったら霧もはれると思いますが、富士は、ほんのすぐそこに、くっきり見えます、と言い、茶店の奥から富士の大きい写真を持ち出し、崖の端に立ってその写真を両手で高く掲示して、ちようどこの辺に、このとおりに、こんなに大きく、こんなにはっきり、このとおりに見えます、と懸命に注釈するのである。私たちは、番茶をすすりながら、その富士を眺めて、笑った。いい富士を見た。霧の深いのを、残念にも思わなかった。", "その翌々日であったらうか、井伏氏は、御坂峠を引きあげることになって、私も甲府までおともした。甲府で私は、ある娘さんと見合いすることになっていた。井伏氏に連れられて甲府のまちはずれの、その娘さんのお家へお伺いした。井伏氏は、無雑作な登山服姿である。私は、角帯に、夏羽織を着ていた。娘さんの家のお庭には、薔薇がたくさん植えられていた。母堂に迎えられて客間に通され、挨拶して、そのうちに娘さんもでてきて、私は、娘さんの顔を見なかった。井伏氏と母堂とは、おとな同士の、よもやまの話をして、ふと、井伏氏が、", "「おや、富士。」と呟いて、私の背後の長押（なげし）を見あげた。私も、からだを捻（ね）ぢ曲げて、うしろの長押を見上げた。富士山頂大噴火口の鳥瞰（てうかん）写真が、額縁にいれられて、かけられていた。まつしろい睡蓮（すいれん）の花に似ていた。私は、それを見とどけ、また、ゆっくりからだを捻じ戻すとき、娘さんを、ちらと見た。きめた。多少の困難があっても、このひとと結婚したいものだと思った。あの富士は、ありがたかった。", "井伏氏は、その日に帰京なされ、私は、ふたたび御坂にひきかえした。それから、九月、十月、十一月の十五日まで、御坂の茶屋の二階で、少しずつ、少しずつ、仕事をすすめ、あまり好かないこの「富士三景の一つ」と、へたばるほど対談した。", "いちど、大笑いしたことがあった。大学の講師か何かやっている浪漫派の一友人が、ハイキングの途中、私の宿に立ち寄って、そのときに、ふたり二階の廊下に出て、富士を見ながら、", "「どうも俗だねえ。お富士さん、という感じじゃないか。」", "「見ているほうで、かえって、てれるね。」", "などと生意気なこと言って、煙草をふかし、そのうちに、友人は、ふと、", "「おや、あの僧形（そうぎよう）のものは、なんだね？」と顎でしやくった。", "墨染の破れたころもを身にまとい、長い杖を引きずり、富士を振り仰ぎ振り仰ぎ、峠をのぼって来る五十歳くらいの小男がある。", "「富士見西行、といったところだね。かたちが、できてる。」私は、その僧をなつかしく思った。「いずれ、名のある聖僧かも知れないね。」", "「ばか言うなよ、乞食（こじき）だよ。」友人は、冷淡だった。", "「いや、いや。脱俗しているところがあるよ。歩きかたなんか、なかなか、できてるじゃないか。むかし、能因法師が、この峠で富士をほめた歌を作ったそうだが、――」", "私が言っているうちに友人は、笑い出した。", "「おい、見給え。できてないよ。」", "能因法師は、茶店のハチという飼犬に吠えられて、周章狼狽（しうしようらうばい）であった。その有様は、いやになるほど、みつともなかった。", "「だめだねえ。やっぱり。」私は、がっかりした。", "乞食の狼狽は、むしろ、あさましいほどに右往左往、ついには杖をかなぐり捨て、取り乱し、取り乱し、いまはかなわずと退散した。実に、それは、できてなかった。富士も俗なら、法師も俗だ、ということになって、いま思い出しても、ばかばかしい。", "新田という二十五歳の温厚な青年が、峠を降りきつた岳麓の吉田という細長い町の、郵便局につとめていて、そのひとが、郵便物によって、私がここに来ていることを知った、と言って、峠の茶屋をたずねて来た。二階の私の部屋で、しばらく話をして、ようやく馴れて来たころ、新田は笑いながら、実は、もう二、三人、僕の仲間がありまして、皆で一緒にお邪魔にあがるつもりだったのですが、いざとなると、どうも皆、しりごみしまして、太宰さんは、ひどいデカダンで、それに、性格破産者だ、と佐藤春夫先生の小説に書いてございましたし、まさか、こんなまじめな、ちゃんとしたお方だとは、思いませんでしたから、僕も、無理に皆を連れて来るわけには、いきませんでした。こんどは、皆を連れて来ます。かまいませんでしょうか。", "「それは、かまいませんけれど。」私は、苦笑していた。「それでは、君は、必死の勇をふるって、君の仲間を代表して僕を偵察に来たわけですね。」", "「決死隊でした。」新田は、率直だった。「ゆうべも、佐藤先生のあの小説を、もういちど繰りかえして読んで、いろいろ覚悟をきめて来ました。」", "私は、部屋のガラス戸越しに、富士を見ていた。富士は、のっそり黙って立っていた。偉いなあ、と思った。", "「いいねえ。富士は、やっぱり、いいとこあるねえ。よくやってるなあ。」富士には、かなはないと思った。念々と動く自分の愛憎が恥ずかしく、富士は、やっぱり偉い、と思った。よくやってる、と思った。", "「よくやっていますか。」新田には、私の言葉がおかしかったらしく、聡明に笑っていた。", "新田は、それから、いろいろな青年を連れて来た。皆、静かなひとである。皆は、私を、先生、と呼んだ。私はまじめにそれを受けた。私には、誇るべき何もない。学問もない。才能もない。肉体よごれて、心もまずしい。けれども、苦悩だけは、その青年たちに、先生、と言われて、だまってそれを受けていいくらいの、苦悩は、経て来た。たったそれだけ。藁（わら）一すぢの自負である。けれども、私は、この自負だけは、はっきり持っていたいと思っている。わがままな駄々っ子のように言われて来た私の、裏の苦悩を、一たい幾人知っていたろう。新田と、それから田辺という短歌の上手な青年と、二人は、井伏氏の読者であって、その安心もあって、私は、この二人と一ばん仲良くなった。いちど吉田に連れていってもらった。おそろしく細長い町であった。岳麓の感じがあった。富士に、日も、風もさえぎられて、ひよろひよろに伸びた茎のようで、暗く、うすら寒い感じの町であった。道路に沿って清水が流れている。これは、岳麓の町の特徴らしく、三島でも、こんな具合いに、町ぢゆうを清水が、どんどん流れている。富士の雪が溶けて流れて来るのだ、とその地方の人たちが、まじめに信じている。吉田の水は、三島の水に較べると、水量も不足だし、汚い。水を眺めながら、私は、話した。", "「モウパスサンの小説に、どこかの令嬢が、貴公子のところへ毎晩、河を泳いで逢いにいったと書いて在ったが、着物は、どうしたのだらうね。まさか、裸ではなかろう。」", "「そうですね。」青年たちも、考えた。「海水着じゃないでしょうか。」", "「頭の上に着物を載せて、むすびつけて、そうして泳いでいったのかな？」", "青年たちは、笑った。", "「それとも、着物のままはひつて、ずぶ濡れの姿で貴公子と逢って、ふたりでストオヴでかわかしたのかな？　そうすると、かえるときには、どうするだろう。せっかく、かわかした着物を、またずぶ濡れにして、泳がなければいけない。心配だね。貴公子のほうで泳いで来ればいいのに。男なら、猿股一つで泳いでも、そんなにみつともなくないからね。貴公子、鉄鎚（かなづち）だったのかな？」", "「いや、令嬢のほうで、たくさん惚れていたからだと思います。」新田は、まじめだった。", "「そうかも知れないね。外国の物語の令嬢は、勇敢で、可愛いね。好きだとなったら、河を泳いでまで逢いに行くんだからな。日本では、そうはいかない。なんとかいう芝居があるじゃないか。まんなかに川が流れて、両方の岸で男と姫君とが、愁嘆（しうたん）している芝居が。あんなとき、何も姫君、愁嘆する必要がない。泳いでゆけば、どんなものだろう。芝居で見ると、とても狭い川なんだ。じゃぶじゃぶ渡っていったら、どんなもんだろう。あんな愁嘆なんて、意味ないね。同情しないよ。朝顔の大井川は、あれは大水で、それに朝顔は、めくらの身なんだし、あれには多少、同情するが、けれども、あれだって、泳いで泳げないことはない。大井川の棒杭（ぼうぐひ）にしがみついて、天道（てんどう）さまを、うらんでいたんじゃ、意味ないよ。あ、ひとりあるよ。日本にも、勇敢なやつが、ひとり在ったぞ。あいつは、すごい。知ってるかい？」", "「ありますか。」青年たちも、眼を輝かせた。", "「清姫。安珍を追いかけて、日高川を泳いだ。泳ぎまくった。あいつは、すごい。ものの本によると、清姫は、あのとき十四だったんだってね。」", "路を歩きながら、ばかな話をして、まちはずれの田辺の知合いらしい、ひっそり古い宿屋に着いた。", "そこで飲んで、その夜の富士がよかった。夜の十時ごろ、青年たちは、私ひとりを宿に残して、おのおの家へ帰っていった。私は、眠れず、どてら姿で、外へ出てみた。おそろしく、明るい月夜だった。富士が、よかった。月光を受けて、青く透きとほるようで、私は、狐に化かされているような気がした。富士が、したたるように青いのだ。燐が燃えているような感じだった。鬼火。狐火。ほたる。すすき。葛（くず）の葉。私は、足のないような気持で、夜道を、まつすぐに歩いた。下駄の音だけが、自分のものでないように、他の生きもののように、からんころんからんころん、とても澄んで響く。そっと、振りむくと、富士がある。青く燃えて空に浮んでいる。私は留息をつく。維新の志士。鞍馬天狗（くらまてんぐ）。私は、自分を、それだと思った。ちょっと気取って、ふところ手して歩いた。ずいぶん自分が、いい男のように思われた。ずいぶん歩いた。財布を落した。五十銭銀貨が二十枚くらいはひつていたので、重すぎて、それで懐からするつと脱け落ちたのだろう。私は、不思議に平気だった。金がなかったら、御坂まで歩いてかえればいい。そのまま歩いた。ふと、いま来た路を、そのとおりに、もういちど歩けば、財布はある、ということに気がついた。懐手のまま、ぶらぶら引きかえした。富士。月夜。維新の志士。財布を落した。興あるロマンスだと思った。財布は路のまんなかに光つていた。あるにきまっている。私は、それを拾って、宿へ帰って、寝た。", "富士に、化かされたのである。私は、あの夜、阿呆（あはう）であった。完全に、無意志であった。あの夜のことを、いま思い出しても、へんに、だるい。", "吉田に一泊して、あくる日、御坂へ帰って来たら、茶店のおかみさんは、にやにや笑って、十五の娘さんは、つんとしていた。私は、不潔なことをして来たのではないということを、それとなく知らせたく、きのう一日の行動を、聞かれもしないのに、ひとりでこまかに言いたてた。泊った宿屋の名前、吉田のお酒の味、月夜富士、財布を落したこと、みんな言った。娘さんも、機嫌が直った。", "「お客さん！　起きて見よ！」かん高い声である朝、茶店の外で、娘さんが絶叫したので、私は、しぶしぶ起きて、廊下へ出て見た。", "娘さんは、興奮して頬をまつかにしていた。だまって空を指さした。見ると、雪。はつと思った。富士に雪が降ったのだ。山頂が、まつしろに、光りかがやいていた。御坂の富士も、ばかにできないぞと思った。", "「いいね。」", "とほめてやると、娘さんは得意そうに、", "「すばらしいでしょう？」といい言葉使って、「御坂の富士は、これでも、だめ？」としゃがんで言った。私が、かねがね、こんな富士は俗でだめだ、と教えていたので、娘さんは、内心しよげていたのかも知れない。", "「やはり、富士は、雪が降らなければ、だめなものだ。」もっともらしい顔をして、私は、そう教えなおした。", "私は、どてら着て山を歩きまわって、月見草の種を両の手のひらに一ぱいとって来て、それを茶店の背戸に播（ま）いてやって、", "「いいかい、これは僕の月見草だからね、来年また来て見るのだからね、ここへお洗濯の水なんか捨てちやいけないよ。」娘さんは、うなずいた。", "ことさらに、月見草を選んだわけは、富士には月見草がよく似合うと、思い込んだ事情があったからである。御坂峠のその茶店は、謂（い）はば山中の一軒家であるから、郵便物は、配達されない。峠の頂上から、バスで三十分程ゆられて峠の麓、河口湖畔の、河口村という文字通りの寒村にたどり着くのであるが、その河口村の郵便局に、私宛の郵便物が留め置かれて、私は三日に一たくらいの割で、その郵便物を受け取りに出かけなければならない。天気の良い日を選んで行く。ここのバスの女車掌は、遊覧客のために、格別風景の説明をしてくれない。それでもときどき、思い出したように、はなはだ散文的な口調で、あれが三ツ峠、向うが河口湖、わかさぎという魚がいます、など、物憂そうな、呟きに似た説明をして聞かせることもある。", "河口局から郵便物を受け取り、またバスにゆられて峠の茶屋に引返す途中、私のすぐとなりに、濃い茶色の被布（ひふ）を着た青白い端正の顔の、六十歳くらい、私の母とよく似た老婆がしやんと座っていて、女車掌が、思い出したように、みなさん、きょうは富士がよく見えますね、と説明ともつかず、また自分ひとりの咏嘆（えいたん）ともつかぬ言葉を、突然言い出して、リュックサックしょった若いサラリイマンや、大きい日本髪ゆつて、口もとを大事にハンケチでおおいかくし、絹物まとった芸者風の女など、からだをねじ曲げ、一せいに車窓から首を出して、いまさらのごとく、その変哲もない三角の山を眺めては、やあ、とか、まあ、とか間抜けた嘆声を発して、車内はひとしきり、ざわめいた。けれども、私のとなりの御隠いは、胸に深い憂悶（いうもん）でもあるのか、他の遊覧客とちがって、富士には一瞥（いちべつ）も与えず、かえって富士と反対側の、山路に沿った断崖をじっと見つめて、私にはその様が、からだがしびれるほど快く感ぜられ、私もまた、富士なんか、あんな俗な山、見たくもないという、高なおな虚無の心を、その老婆に見せてやりたく思って、あなたのお苦しみ、わびしさ、みなよくわかる、と頼まれもせぬのに、共鳴の素振りを見せてあげたく、老婆に甘えかかるように、そっとすり寄って、老婆とおなじ姿勢で、ぼんやり崖の方を、眺めてやった。", "老婆も何かしら、私に安心していたところがあったのだろう、ぼんやりひとこと、", "「おや、月見草。」", "そう言って、細い指でもって、路傍の一箇所をゆびさした。さつと、バスは過ぎてゆき、私の目には、いま、ちらとひとめ見た黄金色の月見草の花ひとつ、花弁もあざやかに消えず残った。", "三七七八米の富士の山と、立派に相対峙（あひたいぢ）し、みぢんもゆるがず、なんと言うのか、金剛力草とでも言いたいくらい、けなげにすっくと立っていたあの月見草は、よかった。富士には、月見草がよく似合う。", "十月のなかば過ぎても、私の仕事は遅々として進まぬ。人が恋しい。夕焼け赤き雁（がん）の腹雲（はらぐも）、二階の廊下で、ひとり煙草を吸いながら、わざと富士には目もくれず、それこそ血の滴（したた）るような真赤な山の紅葉を、凝視していた。茶店のまえの落葉を掃きあつめている茶店のおかみさんに、声をかけた。", "「おばさん！　あしたは、天気がいいね。」", "自分でも、びっくりするほど、うはずつて、歓声にも似た声であった。おばさんは箒（はうき）の手をやすめ、顔をあげて、不審げに眉をひそめ、", "「あした、何かおありなさるの？」", "そう聞かれて、私は窮した。", "「なにもない。」", "おかみさんは笑い出した。", "「おさびしいのでしょう。山へでもおのぼりになったら？」", "「山は、のぼっても、すぐまた降りなければいけないのだから、つまらない。どの山へのぼっても、おなじ富士山が見えるだけで、それを思うと、気が重くなります。」", "私の言葉が変だったのだろう。おばさんはただ曖昧（あいまい）にうなずいただけで、また枯葉を掃いた。", "ねるまえに、部屋のカーテンをそっとあけてガラス窓越しに富士を見る。月のある夜は富士が青白く、水の精みたいな姿で立っている。私は留息をつく。ああ、富士が見える。星が大きい。あしたは、お天気だな、とそれだけが、幽（かす）かに生きている喜びで、そうしてまた、そっとカーテンをしめて、そのまま寝るのであるが、あした、天気だからとて、別段この身には、なんということもないのに、と思えば、おかしく、ひとりで蒲団の中で苦笑するのだ。くるしいのである。仕事が、――純粋に運筆することの、その苦しさよりも、いや、運筆はかえって私の楽しみでさえあるのだが、そのことではなく、私の世界観、芸術というもの、あすの文学というもの、謂（い）はば、新しさというもの、私はそれらについて、未（ま）だ愚図愚図、思い悩み、誇張ではなしに、身悶えしていた。", "素朴な、自然のもの、従って簡潔な鮮明なもの、そいつをさつと一挙動で掴まへて、そのままに紙にうつしとること、それより他にはないと思い、そう思うときには、眼前の富士の姿も、別な意味をもって目にうつる。この姿は、この表現は、結局、私の考えている「単一表現」の美しさなのかも知れない、と少し富士に妥協しかけて、けれどもやはりどこかこの富士の、あまりにも棒状の素朴には閉口しているところもあり、これがいいなら、ほていさまの置物だっていいはずだ、ほていさまの置物は、どうにも我慢できない、あんなもの、とても、いい表現とは思えない、この富士の姿も、やはりどこか間違っている、これは違う、と再び思いまどうのである。", "朝に、夕に、富士を見ながら、陰鬱な日を送っていた。十月の末に、麓の吉田のまちの、遊女の一団体が、御坂峠へ、おそらくは年に一たくらいの開放の日なのであろう、自動車五台に分乗してやって来た。私は二階から、その様を見ていた。自動車からおろされて、色さまざまの遊女たちは、バスケットからぶちまけられた一群の伝書鳩のように、はじめは歩く方向を知らず、ただかたまってうろうろして、沈黙のまま押し合い、へし合いしていたが、やがてそろそろ、その異様の緊張がほどけて、てんでにぶらぶら歩きはじめた。茶店の店頭に並べられてある絵葉書を、おとなしく選んでいるもの、佇（たたず）んで富士を眺めているもの、暗く、わびしく、見ちや居れない風景であった。二階のひとりの男の、いのち惜しまぬ共感も、これら遊女の幸福に関しては、なんの加えるところがない。私は、ただ、見ていなければならぬのだ。苦しむものは苦しめ。落ちるものは落ちよ。私に関係したことではない。それが世の中だ。そう無理につめたく装ひ、かれらを見下ろしているのだが、私は、かなり苦しかった。", "富士にたのまう。突然それを思いついた。おい、こいつらを、よろしく頼むぜ、そんな気持で振り仰げば、寒空のなか、のっそり突つ立っている富士山、そのときの富士はまるで、どてら姿に、ふところ手して傲然（がうぜん）とかまえている大親分のようにさえ見えたのであるが、私は、そう富士に頼んで、大いに安心し、気軽くなって茶店の六歳の男の子と、ハチというむく犬を連れ、その遊女の一団を見捨てて、峠のちかくのトンネルの方へ遊びに出掛けた。トンネルの入口のところで、三十歳くらいの痩せた遊女が、ひとり、何かしらつまらぬ草花を、だまって摘み集めていた。私たちが傍を通っても、ふりむきもせず熱心に草花をつんでいる。この女のひとのことも、ついでに頼みます、とまた振り仰いで富士にお願いして置いて、私は子供の手をひき、とつとと、トンネルの中にはいって行った。トンネルの冷い地下水を、頬に、首筋に、滴々と受けながら、おれの知ったことじゃない、とわざと大股に歩いてみた。", "そのころ、私の結婚の話も、一頓挫（いちとんざ）のかたちであった。私のふるさとからは、全然、助力が来ないということが、はっきり判つてきたので、私は困って了った。せめて百円くらいは、助力してもらえるだろうと、虫のいい、ひとりぎめをして、それでもって、ささやかでも、厳粛な結婚式を挙げ、あとの、世帯を持つに当っての費用は、私の仕事でかせいで、しようと思っていた。けれども、二、三の手紙の往復に依り、うちから助力は、全くないということが明らかになって、私は、途方にくれていたのである。このうえは、縁談ことわられても仕方がない、と覚悟をきめ、とにかく先方へ、事の次第を洗いざらひ言って見よう、と私は単身、峠を下り、甲府の娘さんのお家へお伺いした。さいわい娘さんも、家にいた。私は客間に通され、娘さんと母堂と二人を前にして、悉皆（しつかい）の事情を告白した。ときどき演説口調になって、閉口した。けれども、割に素直に語りつくしたように思われた。娘さんは、落ちついて、", "「それで、おうちでは、反対なのでございましょうか。」と、首おかしげて私にたずねた。", "「いいえ、反対というのではなく、」私は右の手のひらを、そっと卓の上に押し当て、「おまえひとりで、やれ、という具合いらしく思われます。」", "「結構でございます。」母堂は、品よく笑いながら、「私たちも、ごらんのとおりお金持ではございませぬし、ことごとしい式などは、かえって当惑するようなもので、ただ、あなたおひとり、愛情と、職業に対する熱意さへ、お持ちならば、それで私たち、結構でございます。」", "私は、お辞儀するのも忘れて、しばらく呆然と庭を眺めていた。眼の熱いのを意識した。この母に、孝行しようと思った。", "かえりに、娘さんは、バスの発着所まで送って来てくれた。歩きながら、", "「どうです。もう少し交際してみますか？」", "きざなことを言ったものである。", "「いいえ。もう、たくさん。」娘さんは、笑っていた。", "「なにか、質問ありませんか？」いよいよ、ばかである。", "「ございます。」", "私は何を聞かれても、ありのまま答えようと思っていた。", "「富士山には、もう雪が降ったでしょうか。」", "私は、その質問に拍子抜けがした。", "「降りました。いただきのほうに、――」と言いかけて、ふと前方を見ると、富士が見える。へんな気がした。", "「なあんだ。甲府からでも、富士が見えるじゃないか。ばかにしていやがる。」やくざな口調になってしまって、「いまのは、愚問です。ばかにしていやがる。」", "娘さんは、うつむいて、くすくす笑って、", "「だって、御坂峠にいらっしゃるのですし、富士のことでもお聞きしなければ、わるいと思って。」", "おかしな娘さんだと思った。", "甲府から帰って来ると、やはり、呼吸ができないくらいにひどく肩が凝（こ）つているのを覚えた。", "「いいねえ、おばさん。やっぱし御坂は、いいよ。自分のうちに帰って来たような気さえするのだ。」", "夕食後、おかみさんと、娘さんと、交る交る、私の肩をたたいてくれる。おかみさんの拳（こぶし）は固く、鋭い。娘さんのこぶしは柔かく、あまり効きめがない。もっと強く、もっと強くと私に言われて、娘さんは薪（まき）を持ち出し、それでもって私の肩をとんとん叩いた。それ程にしてもらわなければ、肩の凝りがとれないほど、私は甲府で緊張し、一心に努めたのである。", "甲府へ行って来て、二、三日、流石（さすが）に私はぼんやりして、仕事する気も起らず、机のまえに座って、とりとめのない楽書をしながら、バットを七箱も八箱も吸い、また寝ころんで、金剛石も磨かずば、という唱歌を、繰り返し繰り返し歌ってみたりしているばかりで、小説は、一枚も書きすすめることができなかった。", "「お客さん。甲府へ行ったら、わるくなったわね。」", "朝、私が机に頬杖つき、目をつぶって、さまざまのことを考えていたら、私の背後で、床の間ふきながら、十五の娘さんは、しんからいまいましそうに、多少、とげとげしい口調で、そう言った。私は、振りむきもせず、", "「そうかね。わるくなったかね。」", "娘さんは、拭き掃除の手を休めず、", "「ああ、わるくなった。この二、三日、ちっとも勉強すすまないじゃないの。あたしは毎朝、お客さんの書き散らした原稿用紙、番号順にそろえるのが、とっても、たのしい。たくさんお書きになって居れば、うれしい。ゆうべもあたし、二階へそっと様子を見に来たの、知ってる？　お客さん、ふとん頭からかぶって、寝てたじゃないか。」", "私は、ありがたい事だと思った。大袈裟な言いかたをすれば、これは人間の生き抜く努力に対しての、純粋な声援である。なんの報酬も考えていない。私は、娘さんを、美しいと思った。", "十月末になると、山の紅葉も黒ずんで、汚くなり、とたんに一夜あらしがあって、みるみる山は、真黒い冬木立に化してしまった。遊覧の客も、いまはほとんど、数えるほどしかない。茶店もさびれて、ときたま、おかみさんが、六つになる男の子を連れて、峠のふもとの船津、吉田に買物をしに出かけて行って、あとには娘さんひとり、遊覧の客もなし、一日中、私と娘さんと、ふたり切り、峠の上で、ひっそり暮すことがある。私が二階で退屈して、外をぶらぶら歩きまわり、茶店の背戸で、お洗濯している娘さんの傍へ近寄り、", "「退屈だね。」", "と大声で言って、ふと笑いかけたら、娘さんはうつむき、私はその顔を覗（のぞ）いてみて、はつと思った。泣きべそかいているのだ。あきらかに恐怖の情である。そうか、と苦が苦がしく私は、くるりと回れ右して、落葉しきつめた細い山路を、まったくいやな気持で、どんどん荒く歩きまわった。", "それからは、気をつけた。娘さんひとりきりのときには、なるべく二階の室から出ないようにつとめた。茶店にお客でも来たときには、私がその娘さんを守る意味もあり、のしのし二階から降りていって、茶店の一隅に腰をおろしゆっくりお茶を飲むのである。いつか花嫁姿のお客が、紋付を着た爺さんふたりに付き添われて、自動車に乗ってやって来て、この峠の茶屋でひと休みしたことがある。そのときも、娘さんひとりしか茶店にいなかった。私は、やはり二階から降りていって、隅の椅子に腰をおろし、煙草をふかした。花嫁は裾模様の長い着物を着て、金襴（きんらん）の帯を背負い、角隠しつけて、堂々正式の礼装であった。全く異様のお客様だったので、娘さんもどうあしらいしていいのかわからず、花嫁さんと、二人の老人にお茶をついでやっただけで、私の背後にひっそり隠れるように立ったまま、だまって花嫁のさまを見ていた。一生にいちどの晴の日に、――峠の向う側から、反対側の船津か、吉田のまちへ嫁入りするのであろうが、その途中、この峠の頂上で一休みして、富士を眺めるということは、はたで見ていても、くすぐつたい程、ロマンチックで、そのうちに花嫁は、そっと茶店から出て、茶店のまえの崖のふちに立ち、ゆっくり富士を眺めた。脚をＸ形に組んで立っていて、大胆なポオズであった。余裕のあるひとだな、となほも花嫁を、富士と花嫁を、私は観賞していたのであるが、間もなく花嫁は、富士に向って、大きな欠伸（あくび）をおした。", "「あら！」", "と背後で、小さい叫びを挙げた。娘さんも、素早くその欠伸を見つけたらしいのである。やがて花嫁の一行は、待たせて置いた自動車に乗り、峠を降りていったが、あとで花嫁さんは、さんざんだった。", "「馴れていやがる。あいつは、きっと二度目、いや、三度目くらいだよ。おむこさんが、峠の下で待っているだろうに、自動車から降りて、富士を眺めるなんて、はじめてのお嫁だったら、そんな太いこと、できるわけがない。」", "「欠伸したのよ。」娘さんも、力こめて賛意を表した。「あんな大きい口あけて欠伸して、図々しいのね。お客さん、あんなお嫁さんもらつちゃ、いけない。」", "私は年甲斐もなく、顔を赤くした。私の結婚の話も、だんだん好転していって、ある先輩に、すべてお世話になってしまった。結婚式も、ほんの身内の二、三のひとにだけ立ち会ってもらって、まずしくとも厳粛に、その先輩の宅で、していただけるようになって、私は人の情に、少年のごとく感奮していた。", "十一月にはいると、もはや御坂の寒気、堪えがたくなった。茶店では、ストオヴを備えた。", "「お客さん、二階はお寒いでしょう。お仕事のときは、ストオヴの傍でなさったら。」と、おかみさんは言うのであるが、私は、人の見ているまえでは、仕事のできないたちなので、それは断った。おかみさんは心配して、峠の麓の吉田へ行き、炬燵（こたつ）をひとつ買って来た。私は二階の部屋でそれにもぐって、この茶店の人たちの親切には、しんからお礼を言いたく思って、けれども、もはやその全容の三分の二ほど、雪をかぶった富士の姿を眺め、また近くの山々の、蕭条（せうでう）たる冬木立に接しては、これ以上、この峠で、皮膚を刺す寒気に辛抱していることも無意味に思われ、山を下ることに決意した。山を下る、その前日、私は、どてらを二枚かさねて着て、茶店の椅子に腰かけて、熱い番茶を啜（すす）つていたら、冬の外套着た、タイピストでもあらうか、若い知的の娘さんがふたり、トンネルの方から、何かきやつきやつ笑いながら歩いて来て、ふと眼前に真白い富士を見つけ、打たれたように立ち止り、それから、ひそひそ相談の様子で、そのうちのひとり、眼鏡かけた、色の白い子が、にこにこ笑いながら、私のほうへやって来た。", "「相すみません。シャッタア切って下さいな。」", "私は、へどもどした。私は機械のことには、あまり明るくないのだし、写真の趣味は皆無であり、しかも、どてらを二枚もかさねて着ていて、茶店の人たちさへ、山賊みたいだ、といって笑っているような、そんなむさくるしい姿でもあり、多分は東京の、そんな華やかな娘さんから、はいからの用事を頼まれて、内心ひどく狼狽したのである。けれども、また思い直し、こんな姿はしていても、やはり、見る人が見れば、どこかしら、きやしやな俤（おもかげ）もあり、写真のシャッタアくらい器用に手さばきできるほどの男に見えるのかも知れない、などと少し浮き浮きした気持も手伝い、私は平静を装ひ、娘さんの差し出すカメラを受け取り、何気なさそうな口調で、シャッタアの切りかたを鳥渡（ちょっと）たずねてみてから、わななきわななき、レンズをのぞいた。まんなかに大きい富士、その下に小さい、罌粟（けし）の花ふたつ。ふたり揃いの赤い外套を着ているのである。ふたりは、ひしと抱き合うように寄り添い、屹（き）つとまじめな顔になった。私は、おかしくてならない。カメラ持つ手がふるえて、どうにもならぬ。笑いをこらえて、レンズをのぞけば、罌粟の花、いよいよ澄まして、固くなっている。どうにも狙いがつけにくく、私は、ふたりの姿をレンズから追放して、ただ富士山だけを、レンズ一ぱいにキャッチして、富士山、さようなら、お世話になりました。パチリ。", "「はい、うつりました。」", "「ありがとう。」", "ふたり声をそろえてお礼を言う。うちへ帰って現像してみた時には驚くだろう。富士山だけが大きく写っていて、ふたりの姿はどこにも見えない。", "その翌る日に、山を下りた。まず、甲府の安宿に一泊して、そのあくる朝、安宿の廊下の汚い欄干によりかかり、富士を見ると、甲府の富士は、山々のうしろから、三分の一ほど顔を出している。酸漿（ほほづき）に似ていた。", "（昭和十四年二月―三月）"]}, {"no": 42, "title": "双子の星", "author": "太宰 治", "category": "日本文学-物語", "chars": 11853, "volume": "中", "paras": ["双子の星　一", "天(あま)の川(がわ)の西の岸にすぎなの胞子(ほうし)ほどの小さな二つの星が見えます。あれはチュンセ童子とポウセ童子という双子のお星さまの住んでいる小さな水精(すいしょう)のお宮です。", "このすきとおる二つのお宮は、まっすぐに向い合っています。夜は二人とも、きっとお宮に帰って、きちんと座(すわ)り、空の星めぐりの歌に合せて、一晩 銀笛(ぎんてき)を吹(ふ)くのです。それがこの双子のお星様の役目でした。", "ある朝、お日様がカツカツカツと厳(おごそ)かにお身体(からだ)をゆすぶって、東から昇(のぼ)っておいでになった時、チュンセ童子は銀笛を下に置いてポウセ童子に申しました。", "「ポウセさん。もういいでしょう。お日様もお昇りになったし、雲もまっ白に光っています。今日は西の野原の泉へ行きませんか。」", "ポウセ童子が、まだ夢中(むちゅう)で、半分 眼(め)をつぶったまま、銀笛を吹いていますので、チュンセ童子はお宮から下りて、沓(くつ)をはいて、ポウセ童子のお宮の段にのぼって、もう一度 云(い)いました。", "「ポウセさん。もういいでしょう。東の空はまるで白く燃えているようですし、下では小さな鳥なんかもう目をさましている様子です。今日は西の野原の泉へ行きませんか。そして、風車(かざぐるま)で霧(きり)をこしらえて、小さな虹(にじ)を飛ばして遊ぼうではありませんか。」", "ポウセ童子はやっと気がついて、びっくりして笛を置いて云いました。", "「あ、チュンセさん。失礼いたしました。もうすっかり明るくなったんですね。僕(ぼく)今すぐ沓をはきますから。」", "そしてポウセ童子は、白い貝殻(かいがら)の沓をはき、二人は連れだって空の銀の芝原(しばはら)を仲よく歌いながら行きました。", "「お日さまの、", "お通りみちを　はき浄(きよ)め、", "ひかりをちらせ　あまの白雲。", "お日さまの、", "お通りみちの　石かけを", "深くうずめよ、あまの青雲。」", "そしてもういつか空の泉に来ました。", "この泉は霽(は)れた晩には、下からはっきり見えます。天の川の西の岸から、よほど離(はな)れた処(ところ)に、青い小さな星で円くかこまれてあります。底は青い小さなつぶ石でたいらにうずめられ、石の間から奇麗(きれい)な水が、ころころころころ湧(わ)き出して泉の一方のふちから天の川へ小さな流れになって走って行きます。私共の世界が旱(ひでり)の時、瘠(や)せてしまった夜鷹(よだか)やほととぎすなどが、それをだまって見上げて、残念そうに咽喉(のど)をくびくび［＃「くびくび」に傍点］させているのを時々見ることがあるではありませんか。どんな鳥でもとてもあそこまでは行けません。けれども、天(てん)の大烏(おおがらす)の星や蠍(さそり)の星や兎(うさぎ)の星ならもちろんすぐ行けます。", "「ポウセさんまずここへ滝(たき)をこしらえましょうか。」", "「ええ、こしらえましょう。僕石を運びますから。」", "チュンセ童子が沓をぬいで小流れの中に入り、ポウセ童子は岸から手ごろの石を集めはじめました。", "今は、空は、りんごのいい匂(におい)いで一杯(いっぱい)です。西の空に消え残った銀色のお月様が吐(は)いたのです。", "ふと野原の向うから大きな声で歌うのが聞えます。", "「あまのがわの　にしのきしを、", "すこしはなれたそらの井戸。", "みずはころろ、そこもきらら、", "まわりをかこむあおいほし。", "夜鷹ふくろう、ちどり、かけす、", "来よとすれども、できもせぬ。」", "「あ、大烏の星だ。」童子たちは一緒(いっしょ)に云いました。", "もう空のすすきをざわざわと分けて大烏が向うから肩(かた)をふって、のっしのっしと大股(おおまた)にやって参りました。まっくろなびろうどのマントを着て、まっくろなびろうどの股引(ももひき)をはいて居(お)ります。", "大烏は二人を見て立ちどまって丁寧(ていねい)にお辞儀(じぎ)しました。", "「いや、今日は。チュンセ童子とポウセ童子。よく晴れて結構ですな。しかしどうも晴れると咽喉が乾(かわ)いていけません。それに昨夜(ゆうべ)は少し高く歌い過ぎましてな。ご免下さい。」と云いながら大烏は泉に頭をつき込(こ)みました。", "「どうか構わないで沢山(たくさん)呑(の)んで下さい。」とポウセ童子が云いました。", "大烏は息もつかずに三分ばかり咽喉を鳴らして呑んでからやっと顔をあげて一寸(ちょっと)眼をパチパチ云わせてそれからブルルッと頭をふって水を払(はら)いました。", "その時向うから暴(あら)い声の歌が又(また)聞えて参りました。大烏は見る見る顔色を変えて身体(からだ)を烈(はげ)しくふるわせました。", "「みなみのそらの、赤眼のさそり", "毒ある鉤(かぎ)と　大きなはさみを", "知らない者は　阿呆鳥(あほうどり)。」", "そこで大烏が怒って云いました。", "「蠍星(さそりぼし)です。畜生(ちくしょう)。阿呆鳥だなんて人をあてつけてやがる。見ろ。ここへ来たらその赤眼を抜(ぬ)いてやるぞ。」", "チュンセ童子が", "「大烏さん。それはいけないでしょう。王様がご存じですよ。」という間もなくもう赤い眼の蠍星が向うから二つの大きな鋏(はさみ)をゆらゆら動かし長い尾をカラカラ引いてやって来るのです。その音はしずかな天の野原中にひびきました。", "大烏はもう怒ってぶるぶる顫(ふる)えて今にも飛びかかりそうです。双子の星は一生けん命手まねでそれを押(おさ)えました。", "蠍は大烏を尻眼(しりめ)にかけてもう泉のふち迄(まで)這(は)って来て云いました。", "「ああ、どうも咽喉(のど)が乾いてしまった。やあ双子さん。今日は。ご免なさい。少し水を呑んでやろうかな。はてな、どうもこの水は変に土臭(つちくさ)いぞ。どこかのまっ黒な馬鹿ァが頭をつっ込んだと見える。えい。仕方ない。我慢(がまん)してやれ。」", "そして蠍は十分ばかりごくりごくりと水を呑みました。その間も、いかにも大烏を馬鹿にする様に、毒の鉤のついた尾をそちらにパタパタ動かすのです。", "とうとう大烏は、我慢し兼ねて羽をパッと開いて叫(さけ)びました。", "「こら蠍。貴様はさっきから阿呆鳥だの何だのと俺(おれ)の悪口を云ったな。早くあやまったらどうだ。」", "蠍がやっと水から頭をはなして、赤い眼をまるで火が燃えるように動かしました。", "「へん。誰(たれ)か何か云ってるぜ。赤いお方だろうか。鼠色(ねずみいろ)のお方だろうか。一つ鉤をお見舞(みまい)しますかな。」", "大烏はかっとして思わず飛びあがって叫びました。", "「何を。生意気な。空の向う側へまっさかさまに落してやるぞ。」", "蠍も怒って大きなからだをすばやくひねって尾の鉤を空に突(つ)き上げました。大烏は飛びあがってそれを避(さ)け今度はくちばしを槍(やり)のようにしてまっすぐに蠍の頭をめがけて落ちて来ました。", "チュンセ童子もポウセ童子もとめるすきがありません。蠍は頭に深い傷を受け、大烏は胸を毒の鉤でさされて、両方ともウンとうなったまま重なり合って気絶してしまいました。", "蠍の血がどくどく空に流れて、いやな赤い雲になりました。", "チュンセ童子が急いで沓(くつ)をはいて、申しました。", "「さあ大変だ。大烏には毒がはいったのだ。早く吸いとってやらないといけない。ポウセさん。大烏をしっかり押えていて下さいませんか。」", "ポウセ童子も沓をはいてしまっていそいで大烏のうしろにまわってしっかり押えました。チュンセ童子が大烏の胸の傷口に口をあてました。ポウセ童子が申しました。", "「チュンセさん。毒を呑んではいけませんよ。すぐ吐き出してしまわないといけませんよ。」", "チュンセ童子が黙(だま)って傷口から六 遍(ぺん)ほど毒のある血を吸ってはき出しました。すると大烏がやっと気がついて、うすく目を開いて申しました。", "「あ、どうも済みません。私はどうしたのですかな。たしか野郎をし止めたのだが。」", "チュンセ童子が申しました。", "「早く流れでその傷口をお洗いなさい。歩けますか。」", "大烏はよろよろ立ちあがって蠍を見て又 身体(からだ)をふるわせて云いました。", "「畜生。空の毒虫め。空で死んだのを有り難(がた)いと思え。」", "二人は大烏を急いで流れへ連れて行きました。そして奇麗(きれい)に傷口を洗ってやって、その上、傷口へ二三度 香(かぐわ)しい息を吹きかけてやって云いました。", "「さあ、ゆるゆる歩いて明るいうちに早くおうちへお帰りなさい。これからこんな事をしてはいけません。王様はみんなご存じですよ。」", "大烏はすっかり悄気(しょげ)て翼(つばさ)を力なく垂れ、何遍もお辞儀をして", "「ありがとうございます。ありがとうございます。これからは気をつけます。」と云いながら脚(あし)を引きずって銀のすすきの野原を向うへ行ってしまいました。", "二人は蠍を調べて見ました。頭の傷はかなり深かったのですがもう血がとまっています。二人は泉の水をすくって、傷口にかけて奇麗に洗いました。そして交(かわ)る交(がわ)るふっふっと息をそこへ吹き込みました。", "お日様が丁度空のまん中においでになった頃(ころ)蠍はかすかに目を開きました。", "ポウセ童子が汗をふきながら申しました。", "「どうですか気分は。」", "蠍がゆるく呟(つぶや)きました。", "「大烏めは死にましたか。」", "チュンセ童子が少し怒って云いました。", "「まだそんな事を云うんですか。あなたこそ死ぬ所でした。さあ早くうちへ帰る様に元気をお出しなさい。明るいうちに帰らなかったら大変ですよ。」", "蠍が目を変に光らして云いました。", "「双子さん。どうか私を送って下さいませんか。お世話の序(ついで)です。」", "ポウセ童子が云いました。", "「送ってあげましょう。さあおつかまりなさい。」", "チュンセ童子も申しました。", "「そら、僕にもおつかまりなさい。早くしないと明るいうちに家に行けません。そうすると今夜の星めぐりが出来なくなります。」", "蠍(さそり)は二人につかまってよろよろ歩き出しました。二人の肩(かた)の骨は曲りそうになりました。実に蠍のからだは重いのです。大きさから云っても童子たちの十倍位はあるのです。", "けれども二人は顔をまっ赤にしてこらえて一足ずつ歩きました。", "蠍は尾をギーギーと石ころの上に引きずっていやな息をはあはあ吐いてよろりよろりとあるくのです。一時間に十町とも進みません。", "もう童子たちは余り重い上に蠍の手がひどく食い込(こ)んで痛いので、肩や胸が自分のものかどうかもわからなくなりました。", "空の野原はきらきら白く光っています。七つの小流れと十の芝原(しばはら)とを過ぎました。", "童子たちは頭がぐるぐるしてもう自分が歩いているのか立っているのかわかりませんでした。それでも二人は黙ってやはり一足ずつ進みました。", "さっきから六時間もたっています。蠍の家まではまだ一時間半はかかりましょう。もうお日様が西の山にお入りになる所です。", "「もう少し急げませんか。私らも、もう一時間半のうちにおうちへ帰らないといけないんだから。けれども苦しいんですか。大変痛みますか。」とポウセ童子が申しました。", "「へい。も少しでございます。どうかお慈悲(じひ)でございます。」と蠍が泣きました。", "「ええ。も少しです。傷は痛みますか。」とチュンセ童子が肩の骨の砕(くだ)けそうなのをじっとこらえて申しました。", "お日様がもうサッサッサッと三遍 厳(おごそ)かにゆらいで西の山にお沈(しず)みになりました。", "「もう僕(ぼく)らは帰らないといけない。困ったな。ここらの人は誰(たれ)か居ませんか。」ポウセ童子が叫びました。天の野原はしんとして返事もありません。", "西の雲はまっかにかがやき蠍の眼(め)も赤く悲しく光りました。光の強い星たちはもう銀の鎧(よろい)を着て歌いながら遠くの空へ現われた様子です。", "「一つ星めつけた。長者になあれ。」下で一人の子供がそっちを見上げて叫んでいます。", "チュンセ童子が", "「蠍さん。も少しです。急げませんか。疲(つか)れましたか。」と云いました。", "蠍が哀(あわ)れな声で、", "「どうもすっかり疲れてしまいました。どうか少しですからお許し下さい。」と云います。", "「星さん星さん一つの星で出ぬもんだ。", "千も万もででるもんだ。」", "下で別の子供が叫んでいます。もう西の山はまっ黒です。あちこち星がちらちら現われました。", "チュンセ童子は背中がまがってまるで潰(つぶ)れそうになりながら云いました。", "「蠍さん。もう私らは今夜は時間に遅(おく)れました。きっと王様に叱(しか)られます。事によったら流されるかも知れません。けれどもあなたがふだんの所に居なかったらそれこそ大変です。」", "ポウセ童子が", "「私はもう疲れて死にそうです。蠍さん。もっと元気を出して早く帰って行って下さい。」", "と云いながらとうとうバッタリ倒(たお)れてしまいました。蠍は泣いて云いました。", "「どうか許して下さい。私は馬鹿です。あなた方の髪(かみ)の毛一本にも及(およ)びません。きっと心を改めてこのおわびは致(いた)します。きっといたします。」", "この時水色の烈(はげ)しい光の外套(がいとう)を着た稲妻(いなずま)が、向うからギラッとひらめいて飛んで来ました。そして童子たちに手をついて申しました。", "「王様のご命でお迎(むか)いに参りました。さあご一緒(いっしょ)に私のマントへおつかまり下さい。もうすぐお宮へお連れ申します。王様はどう云う訳かさっきからひどくお悦(よろこ)びでございます。それから、蠍。お前は今まで憎(にく)まれ者だったな。さあこの薬を王様から下すったんだ。飲め。」", "童子たちは叫(さけ)びました。", "「それでは蠍さん。さよなら。早く薬をのんで下さい。それからさっきの約束(やくそく)ですよ。きっとですよ。さよなら。」", "そして二人は一緒に稲妻のマントにつかまりました。蠍が沢山(たくさん)の手をついて平伏(へいふく)して薬をのみそれから丁寧(ていねい)にお辞儀(じぎ)をします。", "稲妻がぎらぎらっと光ったと思うともういつかさっきの泉のそばに立って居(お)りました。そして申しました。", "「さあ、すっかりおからだをお洗いなさい。王様から新らしい着物と沓(くつ)を下さいました。まだ十五分 間(ま)があります。」", "双子のお星様たちは悦んでつめたい水晶(すいしょう)のような流れを浴び、匂(におい)のいい青光りのうすものの衣(ころも)を着け新らしい白光りの沓をはきました。するともう身体(からだ)の痛みもつかれも一遍にとれてすがすがしてしまいました。", "「さあ、参りましょう。」と稲妻が申しました。そして二人が又(また)そのマントに取りつきますと紫色(むらさきいろ)の光が一遍ぱっとひらめいて童子たちはもう自分のお宮の前に居ました。稲妻はもう見えません。", "「チュンセ童子、それでは支度(したく)をしましょう。」", "「ポウセ童子、それでは支度をしましょう。」", "二人はお宮にのぼり、向き合ってきちんと座(すわ)り銀笛(ぎんてき)をとりあげました。", "丁度あちこちで星めぐりの歌がはじまりました。", "「あかいめだまの　さそり", "ひろげた鷲(わし)の　　つばさ", "あおいめだまの　小いぬ、", "ひかりのへびの　とぐろ。", "オリオンは高く　うたい", "つゆとしもとを　おとす、", "アンドロメダの　くもは", "さかなのくちの　かたち。", "大ぐまのあしを　きたに", "五つのばした　　ところ。", "小熊(こぐま)のひたいの　うえは", "そらのめぐりの　めあて。」", "双子のお星様たちは笛を吹(ふ)きはじめました。", "双子(ふたご)の星　二", "（天(あま)の川(がわ)の西の岸に小さな小さな二つの青い星が見えます。あれはチュンセ童子とポウセ童子という双子のお星様でめいめい水精(すいしょう)でできた小さなお宮に住んでいます。", "二つのお宮はまっすぐに向い合っています。夜は二人ともきっとお宮に帰ってきちんと座ってそらの星めぐりの歌に合せて一晩銀笛を吹くのです。それがこの双子のお星様たちの役目でした。）", "ある晩空の下の方が黒い雲で一杯(いっぱい)に埋(う)まり雲の下では雨がザアッザアッと降って居(お)りました。それでも二人はいつものようにめいめいのお宮にきちんと座って向いあって笛を吹いていますと突然(とつぜん)大きな乱暴ものの彗星(ほうきぼし)がやって来て二人のお宮にフッフッと青白い光の霧(きり)をふきかけて云(い)いました。", "「おい、双子の青星。すこし旅に出て見ないか。今夜なんかそんなにしなくてもいいんだ。いくら難船の船乗りが星で方角を定(さだ)めようたって雲で見えはしない。天文台の星の係りも今日は休みであくびをしてる。いつも星を見ているあの生意気な小学生も雨ですっかりへこたれてうちの中で絵なんか書いているんだ。お前たちが笛なんか吹かなくたって星はみんなくるくるまわるさ。どうだ。一寸(ちょっと)旅へ出よう。あしたの晩方までにはここに連れて来てやるぜ。」", "チュンセ童子が一寸笛をやめて云いました。", "「それは曇(くも)った日は笛をやめてもいいと王様からお許しはあるとも。私らはただ面白(おもしろ)くて吹いていたんだ。」", "ポウセ童子も一寸笛をやめて云いました。", "「けれども旅に出るなんてそんな事はお許しがないはずだ。雲がいつはれるかもわからないんだから。」", "彗星(ほうきぼし)が云いました。", "「心配するなよ。王様がこの前 俺(おれ)にそう云ったぜ。いつか曇った晩あの双子を少し旅させてやって呉(く)れってな。行こう。行こう。俺なんか面白いぞ。俺のあだ名は空の鯨(くじら)と云うんだ。知ってるか。俺は鰯(いわし)のようなヒョロヒョロの星やめだかのような黒い隕石(いし)はみんなパクパク呑(の)んでしまうんだ。それから一番痛快なのはまっすぐに行ってそのまままっすぐに戻(もど)る位ひどくカーブを切って廻(まわ)るときだ。まるで身体(からだ)が壊(こわ)れそうになってミシミシ云うんだ。光の骨までカチカチ云うぜ。」", "ポウセ童子が云いました。", "「チュンセさん。行きましょうか。王様がいいっておっしゃったそうですから。」", "チュンセ童子が云いました。", "「けれども王様がお許しになったなんて一体本当でしょうか。」", "彗星が云いました。", "「へん。偽(うそ)なら俺の頭が裂(さ)けてしまうがいいさ。頭と胴と尾とばらばらになって海へ落ちて海鼠(なまこ)にでもなるだろうよ。偽なんか云うもんか。」", "ポウセ童子が云いました。", "「そんなら王様に誓(ちか)えるかい。」", "彗星はわけもなく云いました。", "「うん、誓うとも。そら、王様ご照覧。ええ今日、王様のご命令で双子の青星は旅に出ます。ね。いいだろう。」", "二人は一緒(いっしょ)に云いました。", "「うん。いい。そんなら行こう。」", "そこで彗星がいやに真面目(まじめ)くさって云いました。", "「それじゃ早く俺のしっぽにつかまれ。しっかりとつかまるんだ。さ。いいか。」", "二人は彗星のしっぽにしっかりつかまりました。彗星は青白い光を一つフウとはいて云いました。", "「さあ、発(た)つぞ。ギイギイギイフウ。ギイギイフウ。」", "実に彗星は空のくじらです。弱い星はあちこち逃(に)げまわりました。もう大分来たのです。二人のお宮もはるかに遠く遠くなってしまい今は小さな青白い点にしか見えません。", "チュンセ童子が申しました。", "「もう余程(よほど)来たな。天の川の落ち口はまだだろうか。」", "すると彗星の態度がガラリと変ってしまいました。", "「へん。天の川の落ち口よりお前らの落ち口を見ろ。それ一(ひ)ぃ二(ふ)の三(み)。」", "彗星は尾を強く二三 遍(べん)動かしおまけにうしろをふり向いて青白い霧を烈(はげ)しくかけて二人を吹き落してしまいました。", "二人は青ぐろい虚空(こくう)をまっしぐらに落ちました。", "彗星は、", "「あっはっは、あっはっは。さっきの誓いも何もかもみんな取り消しだ。ギイギイギイ、フウ。ギイギイフウ。」と云いながら向うへ走って行ってしまいました。二人は落ちながらしっかりお互(たがい)の肱(ひじ)をつかみました。この双子のお星様はどこ迄(まで)でも一緒に落ちようとしたのです。", "二人のからだが空気の中にはいってからは雷(かみなり)のように鳴り赤い火花がパチパチあがり見ていてさえめまいがする位でした。そして二人はまっ黒な雲の中を通り暗い波の咆(ほ)えていた海の中に矢のように落ち込みました。", "二人はずんずん沈(しず)みました。けれども不思議なことには水の中でも自由に息ができたのです。", "海の底はやわらかな泥(どろ)で大きな黒いものが寝(ね)ていたりもやもやの藻(も)がゆれたりしました。", "チュンセ童子が申しました。", "「ポウセさん。ここは海の底でしょうね。もう僕(ぼく)たちは空に昇(のぼ)れません。これからどんな目に遭(あ)うでしょう。」", "ポウセ童子が云いました。", "「僕らは彗星に欺(だま)されたのです。彗星は王さまへさえ偽(うそ)をついたのです。本当に憎(にく)いやつではありませんか。」", "するとすぐ足もとで星の形で赤い光の小さなひとでが申しました。", "「お前さんたちはどこの海の人たちですか。お前さんたちは青いひとでのしるしをつけていますね。」", "ポウセ童子が云いました。", "「私らはひとでではありません。星ですよ。」", "するとひとでが怒(おこ)って云いました。", "「何だと。星だって。ひとではもとはみんな星さ。お前たちはそれじゃ今やっとここへ来たんだろう。何だ。それじゃ新米のひとでだ。ほやほやの悪党だ。悪いことをしてここへ来ながら星だなんて鼻にかけるのは海の底でははやらないさ。おいらだって空に居た時は第一等の軍人だぜ。」", "ポウセ童子が悲しそうに上を見ました。", "もう雨がやんで雲がすっかりなくなり海の水もまるで硝子(ガラス)のように静まってそらがはっきり見えます。天の川もそらの井戸も鷲(わし)の星や琴弾(ことひ)きの星やみんなはっきり見えます。小さく小さく二人のお宮も見えます。", "「チュンセさん。すっかり空が見えます。私らのお宮も見えます。それだのに私らはとうとうひとでになってしまいました。」", "「ポウセさん。もう仕方ありません。ここから空のみなさんにお別れしましょう。またおすがたは見えませんが王様におわびをしましょう。」", "「王様さよなら。私共は今日からひとでになるのでございます。」", "「王様さよなら。ばかな私共は彗星(ほうきぼし)に欺(だま)されました。今日からはくらい海の底の泥を私共は這(は)いまわります。」", "「さよなら王様。又(また)天上の皆さま。おさかえを祈(いの)ります。」", "「さよならみな様。又すべての上の尊い王さま、いつまでもそうしておいで下さい。」", "赤いひとでが沢山(たくさん)集って来て二人を囲んでがやがや云って居りました。", "「こら着物をよこせ。」「こら。剣を出せ。」「税金を出せ。」「もっと小さくなれ。」「俺(おれ)の靴(くつ)をふけ。」", "その時みんなの頭の上をまっ黒な大きな大きなものがゴーゴーゴーと哮(ほ)えて通りかかりました。ひとではあわててみんなお辞儀(じぎ)をしました。黒いものは行き過ぎようとしてふと立ちどまってよく二人をすかして見て云いました。", "「ははあ、新兵だな。まだお辞儀のしかたも習わないのだな。このくじら様を知らんのか。俺のあだなは海の彗星(ほうきぼし)と云うんだ。知ってるか。俺は鰯(いわし)のようなひょろひょろの魚やめだかの様なめくらの魚はみんなパクパク呑(の)んでしまうんだ。それから一番痛快なのはまっすぐに行ってぐるっと円を描いてまっすぐにかえる位ゆっくりカーブを切るときだ。まるでからだの油がねとねとするぞ。さて、お前は天からの追放の書き付けを持って来たろうな。早く出せ。」",
