い袴(はかま)をはいて向うで見ているけしきです。", "みんなは足踏(あしぶ)みをして歌いました。", "キックキックトントン、キックキック、トントン、", "凍み雪しんこ、堅雪かんこ、", "野原のおそばはぽっぽっぽ、", "酔ってひょろひょろ清作が", "去年十三ばい喰べた。", "キック、キック、キック、キック、トン、トン、トン。", "写真が消えて一寸(ちょっと)やすみになりました。", "可愛(かあい)らしい狐の女の子が黍団子(きびだんご)をのせたお皿を二つ持って来ました。", "四郎はすっかり弱ってしまいました。なぜってたった今太右衛門と清作との悪いものを知らないで喰べたのを見ているのですから。", "それに狐の学校生徒がみんなこっちを向いて「食うだろうか。ね。食うだろうか。」なんてひそひそ話し合っているのです。かん子ははずかしくてお皿を手に持ったまままっ赤になってしまいました。すると四郎が決心して云いました。", "「ね、喰べよう。お喰べよ。僕(ぼく)は紺三郎さんが僕らを欺(だま)すなんて思わないよ。」そして二人は黍団子をみんな喰べました。そのおいしいことは頬(ほ)っぺたも落ちそうです。狐の学校生徒はもうあんまり悦んでみんな踊りあがってしまいました。", "キックキックトントン、キックキックトントン。", "「ひるはカンカン日のひかり", "よるはツンツン月あかり、", "たとえからだを、さかれても", "狐の生徒はうそ云うな。」", "キック、キックトントン、キックキックトントン。", "「ひるはカンカン日のひかり", "よるはツンツン月あかり", "たとえこごえて倒(たお)れても", "狐の生徒はぬすまない。」", "キックキックトントン、キックキックトントン。", "「ひるはカンカン日のひかり", "よるはツンツン月あかり", "たとえからだがちぎれても", "狐の生徒はそねまない。」", "キックキックトントン、キックキックトントン。", "四郎もかん子もあんまり嬉(うれ)しくて涙(なみだ)がこぼれました。", "笛がピーとなりました。", "『わなを軽べつすべからず』と大きな字がうつりそれが消えて絵がうつりました。狐のこん兵衛(べえ)がわなに左足をとられた景色です。", "「狐こんこん狐の子、去年狐のこん兵衛が", "左の足をわなに入れ、こんこんばたばた", "こんこんこん。」", "とみんなが歌いました。", "四郎がそっとかん子に云いました。", "「僕の作った歌だねい。」", "絵が消えて『火を軽べつすべからず』という字があらわれました。それも消えて絵がうつりました。狐のこん助が焼いたお魚を取ろうとしてしっぽに火がついた所です。", "狐の生徒がみな叫びました。", "「狐こんこん狐の子。去年狐のこん助が", "焼いた魚を取ろとしておしりに火がつき", "きゃんきゃんきゃん。」", "笛がピーと鳴り幕は明るくなって紺三郎が又出て来て云いました。", "「みなさん。今晩の幻燈はこれでおしまいです。今夜みなさんは深く心に留(と)めなければならないことがあります。それは狐のこしらえたものを賢(かしこ)いすこしも酔わない人間のお子さんが喰べて下すったという事です。そこでみなさんはこれからも、大人になってもうそをつかず人をそねまず私共狐の今迄(いままで)の悪い評判をすっかり無くしてしまうだろうと思います。閉会の辞です。」", "狐の生徒はみんな感動して両手をあげたりワーッと立ちあがりました。そしてキラキラ涙をこぼしたのです。", "紺三郎が二人の前に来て、丁寧におじぎをして云いました。", "「それでは。さようなら。今夜のご恩は決して忘れません。」", "二人もおじぎをしてうちの方へ帰りました。狐の生徒たちが追いかけて来て二人のふところやかくしにどんぐりだの栗だの青びかりの石だのを入れて、", "「そら、あげますよ。」「そら、取って下さい。」なんて云って風の様に逃(に)げ帰って行きます。", "紺三郎は笑って見ていました。", "二人は森を出て野原を行きました。", "その青白い雪の野原のまん中で三人の黒い影(かげ)が向うから来るのを見ました。それは迎(むか)いに来た兄さん達でした。"]}, {"no": 51, "title": "羅生門", "author": "芥川 竜之介", "category": "日本文学-児童-物語", "chars": 6390, "volume": "中", "paras": ["ある日の暮方の事である。一人の下人（げにん）が、羅生門（らしょうもん）の下で雨やみを待っていた。", "広い門の下には、この男のほかに誰もいない。ただ、所々丹塗（にぬり）の剥（は）げた、大きな円柱（まるばしら）に、蟋蟀（きりぎりす）が一匹とまっている。羅生門が、朱雀大路（すざくおおじ）にある以上は、この男のほかにも、雨やみをする市女笠（いちめがさ）や揉烏帽子（もみえぼし）が、もう二三人はありそうなものである。それが、この男のほかには誰もいない。", "何故かと云うと、この二三年、京都には、地震とか辻風（つじかぜ）とか火事とか饑饉とか云う災（わざわい）がつづいて起った。そこで洛中（らくちゅう）のさびれ方は一通りではない。旧記によると、仏像や仏具を打砕いて、その丹（に）がついたり、金銀の箔（はく）がついたりした木を、路ばたにつみ重ねて、薪（たきぎ）の料（しろ）に売っていたと云う事である。洛中がその始末であるから、羅生門の修理などは、元より誰も捨てて顧る者がなかった。するとその荒れ果てたのをよい事にして、狐狸（こり）が棲（す）む。盗人（ぬすびと）が棲む。とうとうしまいには、引取り手のない死人を、この門へ持って来て、棄てて行くと云う習慣さえ出来た。そこで、日の目が見えなくなると、誰でも気味を悪るがって、この門の近所へは足ぶみをしない事になってしまったのである。", "その代りまた鴉（からす）がどこからか、たくさん集って来た。昼間見ると、その鴉が何羽となく輪を描いて、高い鴟尾（しび）のまわりを啼きながら、飛びまわっている。ことに門の上の空が、夕焼けであかくなる時には、それが胡麻（ごま）をまいたようにはっきり見えた。鴉は、勿論、門の上にある死人の肉を、啄（ついば）みに来るのである。――もっとも今日は、刻限（こくげん）が遅いせいか、一羽も見えない。ただ、所々、崩れかかった、そうしてその崩れ目に長い草のはえた石段の上に、鴉の糞（ふん）が、点々と白くこびりついているのが見える。下人は七段ある石段の一番上の段に、洗いざらした紺の襖（あお）の尻を据えて、右の頬に出来た、大きな面皰（にきび）を気にしながら、ぼんやり、雨のふるのを眺めていた。", "作者はさっき、「下人が雨やみを待っていた」と書いた。しかし、下人は雨がやんでも、格別どうしようと云う当てはない。ふだんなら、勿論、主人の家へ帰る可き筈である。所がその主人からは、四五日前に暇を出された。前にも書いたように、当時京都の町は一通りならず衰微（すいび）していた。今この下人が、永年、使われていた主人から、暇を出されたのも、実はこの衰微の小さな余波にほかならない。だから「下人が雨やみを待っていた」と云うよりも「雨にふりこめられた下人が、行き所がなくて、途方にくれていた」と云う方が、適当である。その上、今日の空模様も少からず、この平安朝の下人の Sentimentalisme に影響した。申（さる）の刻（こく）下（さが）りからふり出した雨は、いまだに上るけしきがない。そこで、下人は、何をおいても差当り明日（あす）の暮しをどうにかしようとして――云わばどうにもならない事を、どうにかしようとして、とりとめもない考えをたどりながら、さっきから朱雀大路にふる雨の音を、聞くともなく聞いていたのである。", "雨は、羅生門をつつんで、遠くから、ざあっと云う音をあつめて来る。夕闇は次第に空を低くして、見上げると、門の屋根が、斜につき出した甍（いらか）の先に、重たくうす暗い雲を支えている。", "どうにもならない事を、どうにかするためには、手段を選んでいる遑（いとま）はない。選んでいれば、築土（ついじ）の下か、道ばたの土の上で、饑死（うえじに）をするばかりである。そうして、この門の上へ持って来て、犬のように棄てられてしまうばかりである。選ばないとすれば――下人の考えは、何度も同じ道を低徊（ていかい）した揚句（あげく）に、やっとこの局所へ逢着（ほうちゃく）した。しかしこの「すれば」は、いつまでたっても、結局「すれば」であった。下人は、手段を選ばないという事を肯定しながらも、この「すれば」のかたをつけるために、当然、その後に来る可き「盗人（ぬすびと）になるよりほかに仕方がない」と云う事を、積極的に肯定するだけの、勇気が出ずにいたのである。", "下人は、大きな嚔（くさめ）をして、それから、大儀（たいぎ）そうに立上った。夕冷えのする京都は、もう火桶（ひおけ）が欲しいほどの寒さである。風は門の柱と柱との間を、夕闇と共に遠慮なく、吹きぬける。丹塗（にぬり）の柱にとまっていた蟋蟀（きりぎりす）も、もうどこかへ行ってしまった。", "下人は、頸（くび）をちぢめながら、山吹（やまぶき）の汗袗（かざみ）に重ねた、紺の襖（あお）の肩を高くして門のまわりを見まわした。雨風の患（うれえ）のない、人目にかかる惧（おそれ）のない、一晩楽にねられそうな所があれば、そこでともかくも、夜を明かそうと思ったからである。すると、幸い門の上の楼へ上る、幅の広い、これも丹を塗った梯子（はしご）が眼についた。上なら、人がいたにしても、どうせ死人ばかりである。下人はそこで、腰にさげた聖柄（ひじりづか）の太刀（たち）が鞘走（さやばし）らないように気をつけながら、藁草履（わらぞうり）をはいた足を、その梯子の一番下の段へふみかけた。", "それから、何分かの後である。羅生門の楼の上へ出る、幅の広い梯子の中段に、一人の男が、猫のように身をちぢめて、息を殺しながら、上の容子（ようす）を窺っていた。楼の上からさす火の光が、かすかに、その男の右の頬をぬらしている。短い鬚の中に、赤く膿（うみ）を持った面皰（にきび）のある頬である。下人は、始めから、この上にいる者は、死人ばかりだと高を括（くく）っていた。それが、梯子を二三段上って見ると、上では誰か火をとぼして、しかもその火をそこここと動かしているらしい。これは、その濁った、黄いろい光が、隅々に蜘蛛（くも）の巣をかけた天井裏に、揺れながら映ったので、すぐにそれと知れたのである。この雨の夜に、この羅生門の上で、火をともしているからは、どうせただの者ではない。", "下人は、守宮（やもり）のように足音をぬすんで、やっと急な梯子を、一番上の段まで這うようにして上りつめた。そうして体を出来るだけ、平（たいら）にしながら、頸を出来るだけ、前へ出して、恐る恐る、楼の内を覗（のぞ）いて見た。", "見ると、楼の内には、噂に聞いた通り、幾つかの死骸（しがい）が、無造作に棄ててあるが、火の光の及ぶ範囲が、思ったより狭いので、数は幾つともわからない。ただ、おぼろげながら、知れるのは、その中に裸の死骸と、着物を着た死骸とがあるという事である。勿論、中には女も男もまじっているらしい。そうして、その死骸は皆、それが、かつて、生きていた人間だと云う事実さえ疑われるほど、土を捏（こ）ねて造った人形のように、口を開（あ）いたり手を延ばしたりして、ごろごろ床の上にころがっていた。しかも、肩とか胸とかの高くなっている部分に、ぼんやりした火の光をうけて、低くなっている部分の影を一層暗くしながら、永久に唖（おし）の如く黙っていた。", "下人（げにん）は、それらの死骸の腐爛（ふらん）した臭気に思わず、鼻を掩（おお）った。しかし、その手は、次の瞬間には、もう鼻を掩う事を忘れていた。ある強い感情が、ほとんどことごとくこの男の嗅覚を奪ってしまったからだ。", "下人の眼は、その時、はじめてその死骸の中に蹲（うずくま）っている人間を見た。檜皮色（ひわだいろ）の着物を着た、背の低い、痩（や）せた、白髪頭（しらがあたま）の、猿のような老婆である。その老婆は、右の手に火をともした松の木片（きぎれ）を持って、その死骸の一つの顔を覗きこむように眺めていた。髪の毛の長い所を見ると、多分女の死骸であろう。", "下人は、六分の恐怖と四分の好奇心とに動かされて、暫時（ざんじ）は呼吸（いき）をするのさえ忘れていた。旧記の記者の語を借りれば、「頭身（とうしん）の毛も太る」ように感じたのである。すると老婆は、松の木片を、床板の間に挿して、それから、今まで眺めていた死骸の首に両手をかけると、丁度、猿の親が猿の子の虱（しらみ）をとるように、その長い髪の毛を一本ずつ抜きはじめた。髪は手に従って抜けるらしい。", "その髪の毛が、一本ずつ抜けるのに従って、下人の心からは、恐怖が少しずつ消えて行った。そうして、それと同時に、この老婆に対するはげしい憎悪が、少しずつ動いて来た。――いや、この老婆に対すると云っては、語弊（ごへい）があるかも知れない。むしろ、あらゆる悪に対する反感が、一分毎に強さを増して来たのである。この時、誰かがこの下人に、さっき門の下でこの男が考えていた、饑死（うえじに）をするか盗人（ぬすびと）になるかと云う問題を、改めて持出したら、恐らく下人は、何の未練もなく、饑死を選んだ事であろう。それほど、この男の悪を憎む心は、老婆の床に挿した松の木片（きぎれ）のように、勢いよく燃え上り出していたのである。", "下人には、勿論、何故老婆が死人の髪の毛を抜くかわからなかった。従って、合理的には、それを善悪のいずれに片づけてよいか知らなかった。しかし下人にとっては、この雨の夜に、この羅生門の上で、死人の髪の毛を抜くと云う事が、それだけで既に許すべからざる悪であった。勿論、下人は、さっきまで自分が、盗人になる気でいた事なぞは、とうに忘れていたのである。", "そこで、下人は、両足に力を入れて、いきなり、梯子から上へ飛び上った。そうして聖柄（ひじりづか）の太刀に手をかけながら、大股に老婆の前へ歩みよった。老婆が驚いたのは云うまでもない。", "老婆は、一目下人を見ると、まるで弩（いしゆみ）にでも弾（はじ）かれたように、飛び上った。", "「おのれ、どこへ行く。」", "下人は、老婆が死骸につまずきながら、慌てふためいて逃げようとする行手を塞（ふさ）いで、こう罵（ののし）った。老婆は、それでも下人をつきのけて行こうとする。下人はまた、それを行かすまいとして、押しもどす。二人は死骸の中で、しばらく、無言のまま、つかみ合った。しかし勝敗は、はじめからわかっている。下人はとうとう、老婆の腕をつかんで、無理にそこへ、（ね）じ倒した。丁度、鶏（にわとり）の脚のような、骨と皮ばかりの腕である。", "「何をしていた。云え。云わぬと、これだぞよ。」", "下人は、老婆をつき放すと、いきなり、太刀の鞘（さや）を払って、白い鋼（はがね）の色をその眼の前へつきつけた。けれども、老婆は黙っている。両手をわなわなふるわせて、肩で息を切りながら、眼を、眼球（めだま）が（まぶた）の外へ出そうになるほど、見開いて、唖のように執拗（しゅうね）く黙っている。これを見ると、下人は始めて明白にこの老婆の生死が、全然、自分の意志に支配されていると云う事を意識した。そうしてこの意識は、今までけわしく燃えていた憎悪の心を、いつの間にか冷ましてしまった。後（あと）に残ったのは、ただ、ある仕事をして、それが円満に成就した時の、安らかな得意と満足とがあるばかりである。そこで、下人は、老婆を見下しながら、少し声を柔らげてこう云った。", "「己（おれ）は検非違使（けびいし）の庁の役人などではない。今し方この門の下を通りかかった旅の者だ。だからお前に縄（なわ）をかけて、どうしようと云うような事はない。ただ、今時分この門の上で、何をして居たのだか、それを己に話しさえすればいいのだ。」", "すると、老婆は、見開いていた眼を、一層大きくして、じっとその下人の顔を見守った。（まぶた）の赤くなった、肉食鳥のような、鋭い眼で見たのである。それから、皺で、ほとんど、鼻と一つになった唇を、何か物でも噛んでいるように動かした。細い喉で、尖った喉仏（のどぼとけ）の動いているのが見える。その時、その喉から、鴉（からす）の啼くような声が、喘（あえ）ぎ喘ぎ、下人の耳へ伝わって来た。", "「この髪を抜いてな、この髪を抜いてな、鬘（かずら）にしようと思うたのじゃ。」", "下人は、老婆の答が存外、平凡なのに失望した。そうして失望すると同時に、また前の憎悪が、冷やかな侮蔑（ぶべつ）と一しょに、心の中へはいって来た。すると、その気色（けしき）が、先方へも通じたのであろう。老婆は、片手に、まだ死骸の頭から奪った長い抜け毛を持ったなり、蟇（ひき）のつぶやくような声で、口ごもりながら、こんな事を云った。", "「成程な、死人（しびと）の髪の毛を抜くと云う事は、何ぼう悪い事かも知れぬ。じゃが、ここにいる死人どもは、皆、そのくらいな事を、されてもいい人間ばかりだぞよ。現在、わしが今、髪を抜いた女などはな、蛇を四寸（しすん）ばかりずつに切って干したのを、干魚（ほしうお）だと云うて、太刀帯（たてわき）の陣へ売りに往（い）んだわ。疫病（えやみ）にかかって死ななんだら、今でも売りに往んでいた事であろ。それもよ、この女の売る干魚は、味がよいと云うて、太刀帯どもが、欠かさず菜料（さいりよう）に買っていたそうな。わしは、この女のした事が悪いとは思うていぬ。せねば、饑死をするのじゃて、仕方がなくした事であろ。されば、今また、わしのしていた事も悪い事とは思わぬぞよ。これとてもやはりせねば、饑死をするじゃて、仕方がなくする事じゃわいの。じゃて、その仕方がない事を、よく知っていたこの女は、大方わしのする事も大目に見てくれるであろ。」", "老婆は、大体こんな意味の事を云った。", "下人は、太刀を鞘（さや）におさめて、その太刀の柄（つか）を左の手でおさえながら、冷然として、この話を聞いていた。勿論、右の手では、赤く頬に膿を持った大きな面皰（にきび）を気にしながら、聞いているのである。しかし、これを聞いている中に、下人の心には、ある勇気が生まれて来た。それは、さっき門の下で、この男には欠けていた勇気である。そうして、またさっきこの門の上へ上って、この老婆を捕えた時の勇気とは、全然、反対な方向に動こうとする勇気である。下人は、饑死をするか盗人になるかに、迷わなかったばかりではない。その時のこの男の心もちから云えば、饑死などと云う事は、ほとんど、考える事さえ出来ないほど、意識の外に追い出されていた。", "「きっと、そうか。」", "老婆の話が完（おわ）ると、下人は嘲（あざけ）るような声で念を押した。そうして、一足前へ出ると、不意に右の手を面皰（にきび）から離して、老婆の襟上（えりがみ）をつかみながら、噛みつくようにこう云った。", "「では、己（おれ）が引剥（ひはぎ）をしようと恨むまいな。己もそうしなければ、饑死をする体なのだ。」", "下人は、すばやく、老婆の着物を剥ぎとった。それから、足にしがみつこうとする老婆を、手荒く死骸の上へ蹴倒した。梯子の口までは、僅に五歩を数えるばかりである。下人は、剥ぎとった檜皮色（ひわだいろ）の着物をわきにかかえて、またたく間に急な梯子を夜の底へかけ下りた。", "しばらく、死んだように倒れていた老婆が、死骸の中から、その裸の体を起したのは、それから間もなくの事である。老婆はつぶやくような、うめくような声を立てながら、まだ燃えている火の光をたよりに、梯子の口まで、這って行った。そうして、そこから、短い白髪（しらが）を倒（さかさま）にして、門の下を覗きこんだ。外には、ただ、黒洞々（こくとうとう）たる夜があるばかりである。", "下人の行方（ゆくえ）は、誰も知らない。", "（大正四年九月）"]}, {"no": 52, "title": "料理メモ", "author": "北大路 魯山人", "category": "その他", "chars": 3141, "volume": "小", "paras": ["鮎（あゆ）", "＊食べ頃はあゆのとれ出した若あゆから七月初旬まで。さばのように大きく成長したのはまずい。卵子を持つまでが一等美味。", "＊あゆの産地ではめいめいお国自慢をしているが、結局はだいたいとれたての新鮮なのをすぐ食べること。", "＊はらわたをぬかないはらもちにかぎる。東京に来るのははらわたをぬいたもの九分九厘。買うときにこのことを留意すること。", "＊活（いき）あゆの刺身は洗い作りの王、一尾から四切れか六切れ。", "＊背ごしはその次。", "＊生きのいいものは塩焼き。生きの悪いのは照り焼き。", "＊あゆの食べ方。塩焼きは頭から食え。頭の中のエキスがうまい。骨はかんで吐き出す。はらわたは無論美味。", "＊あゆの雑炊はふぐの雑炊に次ぐ雑炊の王。岐阜辺りでやっている。粥（かゆ）の中にあゆを入れて煮えたら頭を持って箸で肉をこそげ落とし骨をぬき棄（す）てる。", "＊たくさんあって焼いたり保存したり、焼きざましになったものは焼き豆腐と煮ると美味。", "握り鮨（ずし）", "＊握り鮨は男子の食べるもので婦女子向きではない。なぜなら、ひと口に食べてうまいものでそれを二つ箸で割ったり、まぐろを別にはがしたりしては鮨の美味は味わえぬ。", "＊まぐろのとろ、てっか巻きなどはしょうがを載せて食え。まぐろは酢に好適のものなれども少しくさい点がある。これをおぎなうのがしょうが。", "＊小あじは皮付きの方がうまい。しかし適当に塩や酢が回らないとなまぐさい。たいがいは皮剥（かわはぎ）。", "＊わたしの嗜好（しこう）からいうと赤貝か赤貝のヒモが一等いい。", "＊のり巻きはしっとりしめったのはまずい。のりが乾燥してカサカサしているうちに食べないとまずい。立ち食い以外はのり巻きは食えぬ。", "＊あなごに、赤貝は一個十五銭以上のものを食え。もともと原料の高価なもの。安いものは場違いの味のまずいもの。", "＊えび、玉子焼き、いかなどは問題にするほどでない。女、子供に任しておけ。", "天麩羅（てんぷら）", "＊てんぷら好きは食道楽として誇ったものではない。", "＊材料、種第一。えびが多いが、えびは養殖でなく天然のもので大きなものは不可。大きいのは見かけだおし。一匹七、八 匁（もんめ）か、それ以下。", "＊揚げたて第二。てんぷらは揚げてすぐ食べなくては種がよくても味は落ちる。", "＊油第三。種がよくても油がまずくては不可。", "＊油は胡麻（ごま）の古い貯蔵品が味がこなれていていい。", "＊かや油、椿（つばき）油は単独はいけないが、これを三割くらい加えると胡麻油の味は軽くなっておちつく。", "＊今の東京風のだしは甘からく重くるしいもので味を落とす。昔の天金はうすい甘くないだしだった。", "＊てんぷらに新鮮なだいこんおろし、これにしょうゆをかけて食べれば俗なだしに優（まさ）る。", "＊だし、種、油、揚げたてをやかましくいうが、新しい掘りたてのだいこんのおろしを吟味する必要がある。", "鰻（うなぎ）蒲焼（かばや）き", "＊うなぎ好きは食通の至ったものではない。うなぎやてんぷらの美味（うま）さは高の知れた美味さだ。これをやかましく喜ぶのは低級な食道楽だ。", "＊うなぎもあたたかいうちに食べる。往年、上野駅前の山城屋主人なる通人の食べ方を見るに、四枚重ねて片方から食べていったのを見て感心した。", "＊うなぎは中串以下の大きさが美味い。", "＊養殖のうなぎはまずくてくさい。", "＊八幡巻きのうなぎは火箸のようなびりうなぎが適す。", "＊うなぎをじかに焼く関西風と、関東風の蒸し焼きといずれがよいか。関西風はうまいが堅い。めいめい好きな方をやればいい、一得一失。", "＊うなぎ酒は蓋（ふた）茶碗にうなぎの焼いたのを入れて熱い酒をかけて、茶碗の蓋をしたまま飲（の）む。この場合は関西風の焼き方にかぎる。", "＊所詮（しょせん）うなぎは飯の菜で酒の肴（さかな）にはならない。", "刺身", "＊わさびを生かして食う方法。この頃のひとにはわさびはあまり好かれないようであるが、刺身の上にのせて、しょうゆをつけて食べるとわさびは利く。しょうゆの中にわさびを入れてしまっては辛味はなくなる。しかししょうゆの味がよくなる。わさびは最も調子の高い味の素と心得てよい。", "＊だいこんおろしは新しくないと不味（まず）い。畑から掘り上げて間のない新鮮なのにかぎる。", "＊赤い身の刺身にはだいこんおろし。脂がこくてしょうゆが第一つかない。だいこんにしょうゆをしませて刺身につけて食べる。まぐろの場合など特に注意。", "＊白の刺身はわさびだけでいい。", "＊赤い刺身は飯の菜。", "＊白い刺身は酒に適す。", "＊刺身の茶漬けは美味。たい茶とかぎらず、刺身はなんでも茶漬けになる。煎茶（せんちゃ）のやや濃いめのものをかける。", "鶏", "＊にわとりの美味は東京では食えぬ。ただし、洋食に出るにわとりは雛鳥（ひなどり）だから、ももの肉だけは相当食える。", "＊京、大阪がいい。わけても京都の鳥政の肉はいい。", "＊東京で皮の付かないにわとりを食って喜んでいるひとは、にわとりの味を知らぬひとといっていい。", "＊にわとりは皮ごとやわらかく食えるものにかぎる。", "＊にわとりは卵を生むまでの肉がいい。", "＊この頃食ってうまいものに合鴨（あいがも）、あひるがある。合鴨の青首はあひると同じ格好で区別がつかぬ。しかし煮てみると前歯で皮がプツプツと切れるのが合鴨、切れないでいつまでもしねしねしているのはあひる。", "＊水鶏（くいな）は冬より夏の方がうまい。鴨も夏池に残っているものはうまいだろう。", "＊あひるは昔は夏食べるものときまっていたものだった。", "牛肉屋のすきやき", "＊東京の牛肉屋のタレは悪い。出来合いのタレの中に三割くらいの酒と、甘いから生（き）じょうゆ一割くらい加えること。", "＊ロースやヒレを食う時は肉の両面を焼くべからず。必ず片面を焼き、半熟の表面が桃色の肉の色をしているまま食べること。", "＊豆腐、ねぎ、こんにゃくなど、いっしょにゴッタ煮する書生食いの場合は別。", "＊ロース、ヒレはタレをよくつけて鍋で焼く。汁の中に肉を入れるのではない。", "蔬菜（そさい）", "＊極力新鮮を採れ、畑からじかが一等。たけのこ、まつたけなどは採取後も育って変質さえする。", "＊名高き野菜も古くては無名の新鮮に劣る。", "＊促成栽培を馬鹿にするな。促成には促成の美味がある。", "＊東京の野菜は食うより見る野菜が多い。", "＊しかし根岸しょうがのような名品もある。だがだんだん家が建てこみ、これも場違いになりかけている。", "＊えびいもは京都駅裏の九条、かぼちゃは鹿ヶ谷（ししがたに）、壬生菜（みぶな）は壬生が名産で他では出来なかったが、今は住宅となってだんだん場違いになりかけている。", "鼈（すっぽん）", "＊九州柳川、江州（ごうしゅう）彦根及び八幡、雲州松江等の天然物が最良。", "＊京都の大市（だいいち）は天然産のすっぽんをほとんど一手に買い占め約七割、これでも不足を生じ、今は養殖を混用するにいたった。", "＊大きいのはいけない。精々二百匁内外。もしくはそれ以下。", "＊五分間か八分間くらいで甲羅の皮がやわらかくなる程度のものにかぎる。朝鮮産なんどの養殖は、三十分煮てもやわらかくならぬものが多い。", "＊食い方は京都の大市式が一等。昆布だし、かつおだしはまったく不用。", "＊煮方は水に酒を加えた汁仕立がよい。すっぽんのブツに切ったのを血みどろのまま、水八、酒二に薄口しょうゆを少し入れて、煮たてた中に入れて煮る。五分ないし八分で食べられる。", "河豚（ふぐ）", "＊美食はふぐにとどめを刺す。その証拠にはふぐが出ると他のものは食えぬ。", "＊ふぐの刺身に優る刺身はない。", "＊ふぐの身皮（三河）の間の遠江（とおとうみ）というところは皮より美味い。", "＊ふぐの美味さはすっぽんなどの比でなく、いかなる美食も比べられない。", "＊下関のふぐには危険なし。", "＊ふぐには酒、煙草（たばこ）のような一種の止められない普通の味以外の味がある。"]}, {"no": 53, "title": "檸檬", "author": "梶井 基次郎", "category": "外国文学-物語", "chars": 5404, "volume": "中", "paras": ["えたいの知れない不吉な塊が私の心を始終　圧（おさ）えつけていた。焦躁（しょうそう）と言おうか、嫌悪と言おうか――酒を飲んだあとに宿酔　（ふつかよい）があるように、酒を毎日飲んでいると宿酔に相当した時期がやって来る。それが来たのだ。これはちょっといけなかった。結果した肺尖　（はいせん）カタルや神経衰弱がいけないのではない。また背を焼くような借金などがいけないのではない。いけないのはその不吉な塊だ。以前私を喜ばせたどんな美しい音楽も、どんな美しい詩の一節も辛抱がならなくなった。蓄音器を聴かせてもらいにわざわざ出かけて行っても、最初の二三小節で不意に立ち上がってしまいたくなる。何かが私を居堪　（いたたま）らずさせるのだ。それで始終私は街から街を浮浪し続けていた。", "何故　（なぜ）だかその頃私は見すぼらしくて美しいものに強くひきつけられたのを覚えている。風景にしても壊れかかった街だとか、その街にしてもよそよそしい表通りよりもどこか親しみのある、汚い洗濯物が干してあったりがらくた　が転がしてあったりむさくるしい部屋が覗　（のぞ）いていたりする裏通りが好きであった。雨や風が蝕　（むしば）んでやがて土に帰ってしまう、と言ったような趣きのある街で、土塀　（どべい）が崩れていたり家並が傾きかかっていたり――勢いのいいのは植物だけで、時とするとびっくりさせるような向日葵　（ひまわり）があったりカンナが咲いていたりする。", "時どき私はそんな路を歩きながら、ふと、そこが京都ではなくて京都から何百里も離れた仙台とか長崎とか――そのような市へ今自分が来ているのだ――という錯覚を起こそうと努める。私は、できることなら京都から逃げ出して誰一人知らないような市へ行ってしまいたかった。第一に安静。がらんとした旅館の一室。清浄な蒲団　（ふとん）。匂　（にお）いのいい蚊帳　（かや）と糊　（のり）のよくきいた浴衣　（ゆかた）。そこで一月ほど何も思わず横になりたい。希　（ねが）わくはここがいつの間にかその市になっているのだったら。――錯覚がようやく成功しはじめると私はそれからそれへ想像の絵具を塗りつけてゆく。なんのことはない、私の錯覚と壊れかかった街との二重写しである。そして私はその中に現実の私自身を見失うのを楽しんだ。", "私はまたあの花火というやつが好きになった。花火そのものは第二段として、あの安っぽい絵具で赤や紫や黄や青や、さまざまの縞模様　（しまもよう）を持った花火の束、中山寺の星下り、花合戦、枯れすすき。それから鼠花火　（ねずみはなび）というのは一つずつ輪になっていて箱に詰めてある。そんなものが変に私の心を唆　（そそ）った。", "それからまた、びいどろ　という色　硝子　（ガラス）で鯛や花を打ち出してあるおはじきが好きになったし、南京玉　（なんきんだま）が好きになった。またそれを嘗　（な）めてみるのが私にとってなんともいえない享楽だったのだ。あのびいどろ　の味ほど幽　（かす）かな涼しい味があるものか。私は幼い時よくそれを口に入れては父母に叱られたものだが、その幼時のあまい記憶が大きくなって落ち魄　（ぶ）れた私に蘇　（よみが）えってくる故　（せい）だろうか、まったくあの味には幽　（かす）かな爽　（さわ）やかななんとなく詩美と言ったような味覚が漂って来る。", "察しはつくだろうが私にはまるで金がなかった。とは言えそんなものを見て少しでも心の動きかけた時の私自身を慰めるためには贅沢　（ぜいたく）ということが必要であった。二銭や三銭のもの――と言って贅沢なもの。美しいもの――と言って無気力な私の触角にむしろ媚　（こ）びて来るもの。――そう言ったものが自然私を慰めるのだ。", "生活がまだ蝕　（むしば）まれていなかった以前私の好きであった所は、たとえば丸善であった。赤や黄のオードコロンやオードキニン。洒落　（しゃれ）た切子細工や典雅なロココ趣味の浮模様を持った琥珀色や翡翠色　（ひすいいろ）の香水壜　（こうすいびん）。煙管　（きせる）、小刀、石鹸　（せっけん）、煙草　（たばこ）。私はそんなものを見るのに小一時間も費すことがあった。そして結局一等いい鉛筆を一本買うくらいの贅沢をするのだった。しかしここももうその頃の私にとっては重くるしい場所に過ぎなかった。書籍、学生、勘定台、これらはみな借金取りの亡霊のように私には見えるのだった。", "ある朝――その頃私は甲の友達から乙の友達へというふうに友達の下宿を転々として暮らしていたのだが――友達が学校へ出てしまったあとの空虚な空気のなかにぽつねんと一人取り残された。私はまたそこから彷徨　（さまよ）い出なければならなかった。何かが私を追いたてる。そして街から街へ、先に言ったような裏通りを歩いたり、駄菓子屋の前で立ち留　（ど）まったり、乾物屋の乾蝦　（ほしえび）や棒鱈　（ぼうだら）や湯葉　（ゆば）を眺めたり、とうとう私は二条の方へ寺町を下　（さが）り、そこの果物屋で足を留　（と）めた。ここでちょっとその果物屋を紹介したいのだが、その果物屋は私の知っていた範囲で最も好きな店であった。そこは決して立派な店ではなかったのだが、果物屋固有の美しさが最も露骨に感ぜられた。果物はかなり勾配の急な台の上に並べてあって、その台というのも古びた黒い漆塗（うるしぬ）りの板だったように思える。何か華やかな美しい音楽の快速調　（アッレグロ）の流れが、見る人を石に化したというゴルゴンの鬼面――的なものを差しつけられて、あんな色彩やあんなヴォリウムに凝　（こ）り固まったというふうに果物は並んでいる。青物もやはり奥へゆけばゆくほど堆　（うず）高く積まれている。――実際あそこの人参葉　（にんじんば）の美しさなどは素晴　（すばら）しかった。それから水に漬　（つ）けてある豆だとか慈姑　（くわい）だとか。", "またそこの家の美しいのは夜だった。寺町通はいったいに賑　（にぎや）かな通りで――と言って感じは東京や大阪よりはずっと澄んでいるが――飾窓の光がおびただしく街路へ流れ出ている。それがどうしたわけかその店頭の周囲だけが妙に暗いのだ。もともと片方は暗い二条通に接している街角になっているので、暗いのは当然であったが、その隣家が寺町通にある家にもかかわらず暗かったのが瞭然　（はっきり）しない。しかしその家が暗くなかったら、あんなにも私を誘惑するには至らなかったと思う。もう一つはその家の打ち出した廂　（ひさし）なのだが、その廂が眼深　（まぶか）に冠った帽子の廂のように――これは形容というよりも、「おや、あそこの店は帽子の廂をやけに下げているぞ」と思わせるほどなので、廂の上はこれも真暗なのだ。そう周囲が真暗なため、店頭に点　（つ）けられた幾つもの電燈が驟雨（しゅうう）のように浴びせかける絢爛　（けんらん）は、周囲の何者にも奪われることなく、ほしいままにも美しい眺めが照らし出されているのだ。裸の電燈が細長い螺旋棒　（らせんぼう）をきりきり眼の中へ刺し込んでくる往来に立って、また近所にある鎰屋　（かぎや）の二階の硝子　（ガラス）窓をすかして眺めたこの果物店の眺めほど、その時どきの私を興がらせたものは寺町の中でも稀　（まれ）だった。", "その日私はいつになくその店で買物をした。というのはその店には珍しい檸檬　（れもん）が出ていたのだ。檸檬などごくありふれている。がその店というのも見すぼらしくはないまでもただあたりまえの八百屋に過ぎなかったので、それまであまり見かけたことはなかった。いったい私はあの檸檬が好きだ。レモンエロウの絵具をチューブから搾り出して固めたようなあの単純な色も、それからあの丈　（たけ）の詰まった紡錘形の恰好　（かっこう）も。――結局私はそれを一つだけ買うことにした。それからの私はどこへどう歩いたのだろう。私は長い間街を歩いていた。始終私の心を圧えつけていた不吉な塊がそれを握った瞬間からいくらか弛　（ゆる）んで来たとみえて、私は街の上で非常に幸福であった。あんなに執拗　（しつこ）かった憂鬱が、そんなものの一顆　（いっか）で紛らされる――あるいは不審なことが、逆説的なほんとうであった。それにしても心というやつはなんという不可思議なやつだろう。", "その檸檬の冷たさはたとえようもなくよかった。その頃私は肺尖　（はいせん）を悪くしていていつも身体に熱が出た。事実友達の誰彼　（だれかれ）に私の熱を見せびらかすために手の握り合いなどをしてみるのだが、私の掌が誰のよりも熱かった。その熱い故　（せい）だったのだろう、握っている掌から身内に浸み透ってゆくようなその冷たさは快いものだった。", "私は何度も何度もその果実を鼻に持っていっては嗅　（か）いでみた。それの産地だというカリフォルニヤが想像に上って来る。漢文で習った「売柑者之言」の中に書いてあった「鼻を撲　（う）つ」という言葉が断　（き）れぎれに浮かんで来る。そしてふかぶかと胸一杯に匂やかな空気を吸い込めば、ついぞ胸一杯に呼吸したことのなかった私の身体や顔には温い血のほとぼりが昇って来てなんだか身内に元気が目覚めて来たのだった。……", "実際あんな単純な冷覚や触覚や嗅覚や視覚が、ずっと昔からこればかり探していたのだと言いたくなったほど私にしっくりしたなんて私は不思議に思える――それがあの頃のことなんだから。", "私はもう往来を軽やかな昂奮に弾んで、一種誇りかな気持さえ感じながら、美的装束をして街を闊歩　（かっぽ）した詩人のことなど思い浮かべては歩いていた。汚れた手拭の上へ載せてみたりマントの上へあてがってみたりして色の反映を量　（はか）ったり、またこんなことを思ったり、", "――つまりはこの重さなんだな。――", "その重さこそ常　（つね）づね尋ねあぐんでいたもので、疑いもなくこの重さはすべての善いものすべての美しいものを重量に換算して来た重さであるとか、思いあがった諧謔心　（かいぎゃくしん）からそんな馬鹿げたことを考えてみたり――なにがさて私は幸福だったのだ。", "どこをどう歩いたのだろう、私が最後に立ったのは丸善の前だった。平常あんなに避けていた丸善がその時の私にはやすやすと入れるように思えた。", "「今日は一　（ひと）つ入ってみてやろう」そして私はずかずか入って行った。", "しかしどうしたことだろう、私の心を充たしていた幸福な感情はだんだん逃げていった。香水の壜にも煙管　（きせる）にも私の心はのしかかってはゆかなかった。憂鬱が立て罩　（こ）めて来る、私は歩き廻った疲労が出て来たのだと思った。私は画本の棚の前へ行ってみた。画集の重たいのを取り出すのさえ常に増して力が要るな！　と思った。しかし私は一冊ずつ抜き出してはみる、そして開けてはみるのだが、克明にはぐってゆく気持はさらに湧いて来ない。しかも呪われたことにはまた次の一冊を引き出して来る。それも同じことだ。それでいて一度バラバラとやってみなくては気が済まないのだ。それ以上は堪　（たま）らなくなってそこへ置いてしまう。以前の位置へ戻すことさえできない。私は幾度もそれを繰り返した。とうとうおしまいには日頃から大好きだったアングルの橙色　（だいだいろ）の重い本までなおいっそうの堪（た）えがたさのために置いてしまった。――なんという呪われたことだ。手の筋肉に疲労が残っている。私は憂鬱になってしまって、自分が抜いたまま積み重ねた本の群を眺めていた。", "以前にはあんなに私をひきつけた画本がどうしたことだろう。一枚一枚に眼を晒　（さら）し終わって後、さてあまりに尋常な周囲を見廻すときのあの変にそぐわない気持を、私は以前には好んで味わっていたものであった。……", "「あ、そうだそうだ」その時私は袂　（たもと）の中の檸檬　（れもん）を憶い出した。本の色彩をゴチャゴチャに積みあげて、一度この檸檬で試してみたら。「そうだ」", "私にまた先ほどの軽やかな昂奮が帰って来た。私は手当たり次第に積みあげ、また慌　（あわただ）しく潰し、また慌しく築きあげた。新しく引き抜いてつけ加えたり、取り去ったりした。奇怪な幻想的な城が、そのたびに赤くなったり青くなったりした。", "やっとそれはでき上がった。そして軽く跳りあがる心を制しながら、その城壁の頂きに恐る恐る檸檬　（れもん）を据えつけた。そしてそれは上出来だった。", "見わたすと、その檸檬の色彩はガチャガチャした色の階調をひっそりと紡錘形の身体の中へ吸収してしまって、カーンと冴えかえっていた。私は埃　（ほこり）っぽい丸善の中の空気が、その檸檬の周囲だけ変に緊張しているような気がした。私はしばらくそれを眺めていた。", "不意に第二のアイディアが起こった。その奇妙なたくらみはむしろ私をぎょっとさせた。", "――それをそのままにしておいて私は、なに喰　（く）わぬ顔をして外へ出る。――", "私は変にくすぐったい気持がした。「出て行こうかなあ。そうだ出て行こう」そして私はすたすた出て行った。", "変にくすぐったい気持が街の上の私を微笑　（ほほえ）ませた。丸善の棚へ黄金色に輝く恐ろしい爆弾を仕掛けて来た奇怪な悪漢が私で、もう十分後にはあの丸善が美術の棚を中心として大爆発をするのだったらどんなにおもしろいだろう。", "私はこの想像を熱心に追求した。「そうしたらあの気詰まりな丸善も粉葉　（こっぱ）みじんだろう」", "そして私は活動写真の看板画が奇体な趣きで街を彩　（いろど）っている京極を下って行った。"]}, {"no": 54, "title": "私の個人主義", "author": "夏目　漱石", "category": "その他", "chars": 25852, "volume": "大", "paras": ["大正三年十一月二十五日学習院輔仁会において述", "私は今日初めてこの学習院というものの中に這入（はい）りました。もっとも以前から学習院は多分この見当だろうぐらいに考えていたには相違（そうい）ありませんが、はっきりとは存じませんでした。中へ這入ったのは無論今日が初めてでございます。", "さきほど岡田さんが紹介（しょうかい）かたがたちょっとお話になった通りこの春何か講演をというご注文でありましたが、その当時は何か差支（さしつかえ）があって、――岡田さんの方が当人の私よりよくご記憶（きおく）と見えてあなたがたにご納得のできるようにただいまご説明がありましたが、とにかくひとまずお断りを致（いた）さなければならん事になりました。しかしただお断りを致すのもあまり失礼と存じまして、この次には参りますからという条件をつけ加えておきました。その時念のためこの次はいつごろになりますかと岡田さんに伺（うかが）いましたら、此年（ことし）の十月だというお返事であったので、心のうちに春から十月までの日数を大体繰（く）ってみて、それだけの時間があればそのうちにどうにかできるだろうと思ったものですから、よろしゅうございますとはっきりお受合（うけあい）申したのであります。ところが幸か不幸か病気に罹（かか）りまして、九月いっぱい床（とこ）についておりますうちにお約束（やくそく）の十月が参りました。十月にはもう臥（ふ）せってはおりませんでしたけれども、何しろひょろひょろするので講演はちょっとむずかしかったのです。しかしお約束を忘れてはならないのですから、腹の中では、今に何か云（い）って来られるだろう来られるだろうと思って、内々（ないない）は怖（こわ）がっていました。", "そのうちひょろひょろもついに癒（なお）ってしまったけれども、こちらからは十月末まで何のご沙汰（さた）もなく打ち過ぎました。私は無論病気の事をご通知はしておきませんでしたが、二三の新聞にちょっと出たという話ですから、あるいはその辺の事情を察せられて、誰（だれ）かが私の代りに講演をやって下さったのだろうと推測して安心し出しました。ところへまた岡田さんがまた突然（とつぜん）見えたのであります。岡田さんはわざわざ長靴を穿（は）いて見えたのであります。（もっとも雨の降る日であったからでもありましょうが、）そう云った身拵（みごしら）えで、早稲田（わせだ）の奥（おく）まで来て下すって、例の講演は十一月の末まで繰り延ばす事にしたから約束通りやってもらいたいというご口上なのです。私はもう責任を逃（のが）れたように考えていたものですから実は少々驚（おど）ろきました。しかしまだ一カ月も余裕（よゆう）があるから、その間にどうかなるだろうと思って、よろしゅうございますとまたご返事を致しました。", "右の次第で、この春から十月に至るまで、十月末からまた十一月二十五日に至るまでの間に、何か纏（まとま）ったお話をすべき時間はいくらでも拵えられるのですが、どうも少し気分が悪くって、そんな事を考えるのが面倒（めんどう）でたまらなくなりました。そこでまあ十一月二十五日が来るまでは構うまいという横着な料簡（りょうけん）を起（おこ）して、ずるずるべったりにその日その日を送っていたのです。いよいよと時日が逼（せま）った二三日前になって、何か考えなければならないという気が少ししたのですが、やはり考えるのが不愉快（ふゆかい）なので、とうとう絵を描（か）いて暮（く）らしてしまいました。絵を描くというと何かえらいものが描けるように聞（きこ）えるかも知れませんが、実は他愛もないものを描いて、それを壁（かべ）に貼（は）りつけて一人で二日も三日もぼんやり眺（なが）めているだけなのです。昨日でしたかある人が来て、この絵は大変面白い――いや面白いと云ったのではありません、面白い気分の時に描いた画（え）らしく見えると云ってくれたのでした。それから私は愉快だから描いたのではない、不愉快だから描いたのだと云って私の心の状態をその男に説明してやりました。世の中には愉快でじっとしていられない結果を画にしたり、書にしたり、または文にしたりする人がある通り、不愉快だから、どうかして好い心持（こころもち）になりたいと思って、筆を執（と）って画なり文章なりを作る人もあります。そうして不思議にもこの二つの心的状態が結果に現われたところを見るとよく一致（いっち）している場合が起るのです。しかしこれはほんのついでに申し上（あげ）る事で、話の筋に関係した問題でもありませんから深くは立ち入りません。――何しろ私はその変な画を眺めるだけで、講演の内容をちっとも組み立てずに暮らしてしまったのです。", "そのうちいよいよ二十五日が来たので、否（いや）でも応でもここへ顔を出さなければすまない事になりました。それで今朝（けさ）少し考（かんがえ）を纏（まと）めてみましたが、準備がどうも不足のようです。とてもご満足の行くようなお話はできかねますから、そのつもりでご辛防（しんぼう）を願います。", "この会はいつごろから始まって今日まで続いているのか存じませんが、そのつどあなたがたがよその人を連れて来て、講演をさせるのは、一般の慣例として毫（ごう）も不都合でないと私も認めているのですが、また一方から見ると、それほどあなた方の希望するような面白い講演は、いくらどこからどんな人を引張（ひっぱ）って来ても容易に聞かれるものではなかろうとも思うのです。あなたがたにはただよその人が珍（めず）らしく見えるのではありますまいか。", "私が落語家（はなしか）から聞いた話の中にこんな諷刺的（ふうしてき）のがあります。――昔（むか）しあるお大名が二人（ふたり）目黒辺へ鷹狩（たかがり）に行って、所々方々を馳（か）け廻（まわ）った末、大変空腹になったが、あいにく弁当の用意もなし、家来とも離（はな）れ離（ばな）れになって口腹を充（み）たす糧（かて）を受ける事ができず、仕方なしに二人はそこにある汚（きた）ない百姓家（ひゃくしょうや）へ馳け込んで、何でも好いから食わせろと云ったそうです。するとその農家の爺（じい）さんと婆（ばあ）さんが気の毒がって、ありあわせの秋刀魚（さんま）を炙（あぶ）って二人の大名に麦飯を勧めたと云います。二人はその秋刀魚を肴（さかな）に非常に旨（うま）く飯を済まして、そこを立出（たちいで）たが、翌日になっても昨日の秋刀魚の香（かおり）がぷんぷん鼻を衝（つ）くといった始末で、どうしてもその味を忘れる事ができないのです。それで二人のうちの一人が他を招待して、秋刀魚のご馳走（ちそう）をする事になりました。その旨（むね）を承（うけたま）わって驚ろいたのは家来です。しかし主命ですから反抗（はんこう）する訳にも行きませんので、料理人に命じて秋刀魚の細い骨を毛抜（けぬき）で一本一本抜（ぬ）かして、それを味淋（みりん）か何かに漬（つ）けたのを、ほどよく焼いて、主人と客とに勧めました。ところが食う方は腹も減っていず、また馬鹿丁寧（ばかていねい）な料理方で秋刀魚の味を失った妙（みょう）な肴を箸（はし）で突（つ）っついてみたところで、ちっとも旨くないのです。そこで二人が顔を見合せて、どうも秋刀魚は目黒に限るねといったような変な言葉を発したと云うのが話の落（おち）になっているのですが、私から見ると、この学習院という立派な学校で、立派な先生に始終接している諸君が、わざわざ私のようなものの講演を、春から秋の末まで待ってもお聞きになろうというのは、ちょうど大牢の美味に飽（あ）いた結果、目黒の秋刀魚がちょっと味わってみたくなったのではないかと思われるのです。", "この席におられる大森教授は私と同年かまたは前後して大学を出られた方ですが、その大森さんが、かつて私にどうも近頃（ちかごろ）の生徒は自分の講義をよく聴（き）かないで困る、どうも真面目（まじめ）が足りないで不都合（ふつごう）だというような事を云われた事があります。その評はこの学校の生徒についてではなく、どこかの私立学校の生徒についてだったろうと記憶していますが、何しろ私はその時大森さんに対して失礼な事を云いました。", "ここで繰り返していうのもお恥（は）ずかしい訳ですが、私はその時、君などの講義をありがたがって聴く生徒がどこの国にいるものかと申したのです。もっとも私の主意はその時の大森君には通じていなかったかも知れませんから、この機会を利用して、誤解を防いでおきますが、私どもの書生時代、あなたがたと同年輩（どうねんぱい）、もしくはもう少し大きくなった時代、には、今のあなたがたよりよほど横着で、先生の講義などはほとんど聴いた事がないと云っても好いくらいのものでした。もちろんこれは私や私の周囲のものを本位として述べるのでありますから、圏外（けんがい）にいたものには通用しないかも知れませんけれども、どうも今の私からふり返ってみると、そんな気がどこかでするように思われるのです。現にこの私は上部（うわべ）だけは温順らしく見えながら、けっして講義などに耳を傾（かたむ）ける性質ではありませんでした。始終怠（なま）けてのらくらしていました。その記憶をもって、真面目な今の生徒を見ると、どうしても大森君のように、彼らを攻撃（こうげき）する勇気が出て来ないのです。そう云った意味からして、つい大森さんに対してすまない乱暴を申したのであります。今日は大森君に詫（あや）まるためにわざわざ出かけた次第ではありませんけれども、ついでだからみんなのいる前で、謝罪しておくのです。", "話がついとんだところへ外（そ）れてしまいましたから、再び元へ引き返して筋の立つように云いますと、つまりこうなるのです。", "あなたがたは立派な学校に入って、立派な先生から始終指導を受けていらっしゃる、またその方々の専門的もしくは一般的（いっぱんてき）の講義を毎日聞いていらっしゃる。それだのに私みたようなものを、ことさらによそから連れて来て、講演を聴こうとなされるのは、ちょうど先刻お話したお大名が目黒の秋刀魚を賞翫（しょうがん）したようなもので、つまりは珍らしいから、一口食ってみようという料簡じゃないかと推察されるのです。実際をいうと、私のようなものよりも、あなたがたが毎日顔を見ていらっしゃる常雇（じょうやと）いの先生のお話の方がよほど有益でもあり、かつまた面白かろうとも思われるのです。たとい私にしたところで、もしこの学校の教授にでもなっていたならば、単に新らしい刺戟（しげき）のないというだけでも、このくらいの人数が集って私の講演をお聴きになる熱心なり好奇心（こうきしん）なりは起るまいと考えるのですがどんなものでしょう。", "私がなぜそんな仮定をするかというと、この私は現に昔しこの学習院の教師になろうとした事があるのです。もっとも自分で運動した訳でもないのですが、この学校にいた知人が私を推薦（すいせん）してくれたのです。その時分の私は卒業する間際まで何をして衣食の道を講じていいか知らなかったほどの迂濶者（うかつもの）でしたが、さていよいよ世間へ出てみると、懐手（ふところで）をして待っていたって、下宿料が入って来る訳でもないので、教育者になれるかなれないかの問題はとにかく、どこかへ潜（もぐ）り込（こ）む必要があったので、ついこの知人のいう通りこの学校へ向けて運動を開始した次第であります。その時分私の敵が一人ありました。しかし私の知人は私に向ってしきりに大丈夫（だいじょうぶ）らしい事をいうので、私の方でも、もう任命されたような気分になって、先生はどんな着物を着なければならないのかなどと訊（き）いてみたものです。するとその男はモーニングでなくては教場へ出られないと云いますから、私はまだ事のきまらない先に、モーニングを誂（あつ）らえてしまったのです。そのくせ学習院とはどこにある学校かよく知らなかったのだから、すこぶる変なものです。さていよいよモーニングが出来上（できあが）ってみると、あに計らんやせっかく頼（たの）みにしていた学習院の方は落第と事がきまったのです。そうしてもう一人の男が英語教師の空位を充たす事になりました。その人は何という名でしたか今は忘れてしまいました。別段悔（くや）しくも何ともなかったからでしょう。何でも米国帰りの人とか聞いていました。――それで、もしその時にその米国帰りの人が採用されずに、この私がまぐれ当りに学習院の教師になって、しかも今日まで永続していたなら、こうした鄭重（ていちょう）なお招きを受けて、高い所からあなたがたにお話をする機会もついに来なかったかも知れますまい。それをこの春から十一月までも待って聴いて下さろうというのは、とりも直さず、私が学習院の教師に落第して、あなたがたから目黒の秋刀魚のように珍らしがられている証拠（しょうこ）ではありませんか。", "私はこれから学習院を落第してから以後の私について少々申上（もうしあ）げようと思います。これは今までお話をして来た順序だからという意味よりも、今日の講演に必要な部分だからと思って聴いていただきたいのです。", "私は学習院は落第したが、モーニングだけは着ていました。それよりほかに着るべき洋服は持っていなかったのだから仕方がありません。そのモーニングを着てどこへ行ったと思いますか？　その時分は今と違（ちが）って就職の途（みち）は大変楽でした。どちらを向いても相当の口は開いていたように思われるのです。つまりは人が払底（ふってい）なためだったのでしょう。私のようなものでも高等学校と、高等師範（しはん）からほとんど同時に口がかかりました。私は高等学校へ周旋（しゅうせん）してくれた先輩に半分承諾（しょうだく）を与えながら、高等師範の方へも好（い）い加減な挨拶（あいさつ）をしてしまったので、事が変な具合にもつれてしまいました。もともと私が若いから手ぬかりやら、不行届（ふゆきとどき）がちで、とうとう自分に祟（たた）って来たと思えば仕方がありませんが、弱らせられた事は事実です。私は私の先輩なる高等学校の古参の教授の所へ呼びつけられて、こっちへ来るような事を云いながら、他（ほか）にも相談をされては、仲に立った私が困ると云って譴責（けんせき）されました。私は年の若い上に、馬鹿の肝癪持（かんしゃくもち）ですから、いっそ双方（そうほう）とも断ってしまったら好いだろうと考えて、その手続きをやり始めたのです。するとある日当時の高等学校長、今ではたしか京都の理科大学長をしている久原さんから、ちょっと学校まで来てくれという通知があったので、さっそく出かけてみると、その座に高等師範の校長嘉納治五郎（かのうじごろう）さんと、それに私を周旋してくれた例の先輩がいて、相談はきまった、こっちに遠慮（えんりょ）は要（い）らないから高等師範の方へ行ったら好かろうという忠告です。私は行（いき）がかり上否（いや）だとは云えませんから承諾の旨を答えました。が腹の中では厄介（やっかい）な事になってしまったと思わざるを得なかったのです。というものは今考えるともったいない話ですが、私は高等師範などをそれほどありがたく思っていなかったのです。嘉納さんに始めて会った時も、そうあなたのように教育者として学生の模範（もはん）になれというような注文だと、私にはとても勤まりかねるからと逡巡（しゅんじゅん）したくらいでした。嘉納さんは上手な人ですから、否そう正直に断わられると、私はますますあなたに来ていただきたくなったと云って、私を離さなかったのです。こういう訳で、未熟な私は双方の学校を懸持（かけもち）しようなどという慾張根性（よくばりこんじょう）は更（さら）になかったにかかわらず、関係者に要らざる手数をかけた後、とうとう高等師範の方へ行く事になりました。", "しかし教育者として偉（えら）くなり得るような資格は私に最初から欠けていたのですから、私はどうも窮屈（きゅうくつ）で恐（おそ）れ入りました。嘉納さんもあなたはあまり正直過ぎて困ると云ったくらいですから、あるいはもっと横着をきめていてもよかったのかも知れません。しかしどうあっても私には不向（ふむき）な所だとしか思われませんでした。奥底のない打ち明けたお話をすると、当時の私はまあ肴屋が菓子家（かしや）へ手伝いに行ったようなものでした。", "一年の後私はとうとう田舎（いなか）の中学へ赴任（ふにん）しました。それは伊予（いよ）の松山にある中学校です。あなたがたは松山の中学と聞いてお笑いになるが、おおかた私の書いた「坊ちゃん」でもご覧になったのでしょう。「坊ちゃん」の中に赤シャツという渾名（あだな）をもっている人があるが、あれはいったい誰の事だと私はその時分よく訊かれたものです。誰の事だって、当時その中学に文学士と云ったら私一人なのですから、もし「坊ちゃん」の中の人物を一々実在のものと認めるならば、赤シャツはすなわちこういう私の事にならなければならんので、――はなはだありがたい仕合せと申上げたいような訳になります。", "松山にもたった一カ年しかおりませんでした。立つ時に知事が留めてくれましたが、もう先方と内約ができていたので、とうとう断ってそこを立ちました。そうして今度は熊本（くまもと）の高等学校に腰（こし）を据（す）えました。こういう順序で中学から高等学校、高等学校から大学と順々に私は教えて来た経験をもっていますが、ただ小学校と女学校だけはまだ足を入れた試（ためし）がございません。", "熊本には大分長くおりました。突然文部省から英国へ留学をしてはどうかという内談のあったのは、熊本へ行ってから何年目になりましょうか。私はその時留学を断（こと）わろうかと思いました。それは私のようなものが、何の目的ももたずに、外国へ行ったからと云って、別に国家のために役に立つ訳もなかろうと考えたからです。しかるに文部省の内意を取次（とりつ）いでくれた教頭が、それは先方の見込みなのだから、君の方で自分を評価する必要はない、ともかくも行った方が好かろうと云うので、私も絶対に反抗する理由もないから、命令通り英国へ行きました。しかし果（はた）せるかな何もする事がないのです。", "それを説明するためには、それまでの私というものを一応お話ししなければならん事になります。そのお話がすなわち今日の講演の一部分を構成する訳なのですからそのつもりでお聞きを願います。", "私は大学で英文学という専門をやりました。その英文学というものはどんなものかとお尋（たず）ねになるかも知れませんが、それを三年専攻した私にも何が何だかまあ夢中（むちゅう）だったのです。その頃はジクソンという人が教師でした。私はその先生の前で詩を読ませられたり文章を読ませられたり、作文を作って、冠詞（かんし）が落ちていると云って叱（しか）られたり、発音が間違っていると怒（おこ）られたりしました。試験にはウォーズウォースは何年に生れて何年に死んだとか、シェクスピヤのフォリオは幾通りあるかとか、あるいはスコットの書いた作物を年代順に並（なら）べてみろとかいう問題ばかり出たのです。年の若いあなた方にもほぼ想像ができるでしょう、はたしてこれが英文学かどうだかという事が。英文学はしばらく措（お）いて第一文学とはどういうものだか、これではとうてい解（わか）るはずがありません。それなら自力でそれを窮（きわ）め得るかと云うと、まあ盲目（めくら）の垣覗（かきのぞ）きといったようなもので、図書館に入って、どこをどううろついても手掛（てがかり）がないのです。これは自力の足りないばかりでなくその道に関した書物も乏（とぼ）しかったのだろうと思います。とにかく三年勉強して、ついに文学は解らずじまいだったのです。私の煩悶（はんもん）は第一ここに根ざしていたと申し上げても差支ないでしょう。", "私はそんなあやふやな態度で世の中へ出てとうとう教師になったというより教師にされてしまったのです。幸に語学の方は怪（あや）しいにせよ、どうかこうかお茶を濁（にご）して行かれるから、その日その日はまあ無事に済んでいましたが、腹の中は常に空虚（くうきょ）でした。空虚ならいっそ思い切りがよかったかも知れませんが、何だか不愉快な煮（に）え切らない漠然（ばくぜん）たるものが、至る所に潜（ひそ）んでいるようで堪（た）まらないのです。しかも一方では自分の職業としている教師というものに少しの興味ももち得ないのです。教育者であるという素因の私に欠乏している事は始めから知っていましたが、ただ教場で英語を教える事がすでに面倒なのだから仕方がありません。私は始終中腰で隙（すき）があったら、自分の本領へ飛び移ろう飛び移ろうとのみ思っていたのですが、さてその本領というのがあるようで、無いようで、どこを向いても、思い切ってやっと飛び移れないのです。", "私はこの世に生れた以上何かしなければならん、といって何をして好いか少しも見当がつかない。私はちょうど霧（きり）の中に閉じ込められた孤独（こどく）の人間のように立ち竦（すく）んでしまったのです。そうしてどこからか一筋の日光が射（さ）して来ないかしらんという希望よりも、こちらから探照灯を用いてたった一条（ひとすじ）で好いから先まで明らかに見たいという気がしました。ところが不幸にしてどちらの方角を眺めてもぼんやりしているのです。ぼうっとしているのです。あたかも嚢（ふくろ）の中に詰（つ）められて出る事のできない人のような気持がするのです。私は私の手にただ一本の錐（きり）さえあればどこか一カ所突き破って見せるのだがと、焦燥（あせ）り抜（ぬ）いたのですが、あいにくその錐は人から与えられる事もなく、また自分で発見する訳にも行かず、ただ腹の底ではこの先自分はどうなるだろうと思って、人知れず陰欝（いんうつ）な日を送ったのであります。", "私はこうした不安を抱（いだ）いて大学を卒業し、同じ不安を連れて松山から熊本へ引越（ひっこ）し、また同様の不安を胸の底に畳（たた）んでついに外国まで渡（わた）ったのであります。しかしいったん外国へ留学する以上は多少の責任を新たに自覚させられるにはきまっています。それで私はできるだけ骨を折って何かしようと努力しました。しかしどんな本を読んでも依然（いぜん）として自分は嚢の中から出る訳に参りません。この嚢を突き破る錐は倫敦（ロンドン）中探して歩いても見つかりそうになかったのです。私は下宿の一間の中で考えました。つまらないと思いました。いくら書物を読んでも腹の足（たし）にはならないのだと諦（あきら）めました。同時に何のために書物を読むのか自分でもその意味が解らなくなって来ました。", "この時私は始めて文学とはどんなものであるか、その概念（がいねん）を根本的に自力で作り上げるよりほかに、私を救う途はないのだと悟（さと）ったのです。今までは全く他人本位で、根のない萍（うきぐさ）のように、そこいらをでたらめに漂（ただ）よっていたから、駄目（だめ）であったという事にようやく気がついたのです。私のここに他人本位というのは、自分の酒を人に飲んでもらって、後からその品評を聴いて、それを理が非でもそうだとしてしまういわゆる人真似（ひとまね）を指すのです。一口にこう云ってしまえば、馬鹿らしく聞こえるから、誰もそんな人真似をする訳がないと不審（ふしん）がられるかも知れませんが、事実はけっしてそうではないのです。近頃流行（はや）るベルグソンでもオイケンでもみんな向（むこ）うの人がとやかくいうので日本人もその尻馬（しりうま）に乗って騒（さわ）ぐのです。ましてその頃は西洋人のいう事だと云えば何でもかでも盲従（もうじゅう）して威張（いば）ったものです。だからむやみに片仮名を並べて人に吹聴（ふいちょう）して得意がった男が比々皆（みな）是（これ）なりと云いたいくらいごろごろしていました。他（ひと）の悪口ではありません。こういう私が現にそれだったのです。たとえばある西洋人が甲（こう）という同じ西洋人の作物を評したのを読んだとすると、その評の当否はまるで考えずに、自分の腑（ふ）に落ちようが落ちまいが、むやみにその評を触（ふ）れ散らかすのです。つまり鵜呑（うのみ）と云ってもよし、また機械的の知識と云ってもよし、とうていわが所有とも血とも肉とも云われない、よそよそしいものを我物顔（わがものがお）にしゃべって歩くのです。しかるに時代が時代だから、またみんながそれを賞（ほ）めるのです。", "けれどもいくら人に賞められたって、元々人の借着をして威張っているのだから、内心は不安です。手もなく孔雀（くじゃく）の羽根を身に着けて威張っているようなものですから。それでもう少し浮華（ふか）を去って摯実（しじつ）につかなければ、自分の腹の中はいつまで経（た）ったって安心はできないという事に気がつき出したのです。", "たとえば西洋人がこれは立派な詩だとか、口調が大変好いとか云っても、それはその西洋人の見るところで、私の参考にならん事はないにしても、私にそう思えなければ、とうてい受売（うけうり）をすべきはずのものではないのです。私が独立した一個の日本人であって、けっして英国人の奴婢（どひ）でない以上はこれくらいの見識は国民の一員として具（そな）えていなければならない上に、世界に共通な正直という徳義を重んずる点から見ても、私は私の意見を曲げてはならないのです。", "しかし私は英文学を専攻する。その本場の批評家のいうところと私の考（かんがえ）と矛盾（むじゅん）してはどうも普通（ふつう）の場合気が引ける事になる。そこでこうした矛盾がはたしてどこから出るかという事を考えなければならなくなる。風俗、人情、習慣、溯（さかのぼ）っては国民の性格皆この矛盾の原因になっているに相違ない。それを、普通の学者は単に文学と科学とを混同して、甲の国民に気に入るものはきっと乙（おつ）の国民の賞讃を得るにきまっている、そうした必然性が含（ふく）まれていると誤認してかかる。そこが間違っていると云わなければならない。たといこの矛盾を融和（ゆうわ）する事が不可能にしても、それを説明する事はできるはずだ。そうして単にその説明だけでも日本の文壇（ぶんだん）には一道の光明を投げ与（あた）える事ができる。――こう私はその時始めて悟ったのでした。はなはだ遅（おそ）まきの話で慚愧（ざんき）の至（いたり）でありますけれども、事実だから偽（いつわ）らないところを申し上げるのです。", "私はそれから文芸に対する自己の立脚地（りっきゃくち）を堅（かた）めるため、堅めるというより新らしく建設するために、文芸とは全く縁（えん）のない書物を読み始めました。一口でいうと、自己本位という四字をようやく考えて、その自己本位を立証するために、科学的な研究やら哲学的（てつがくてき）の思索（しさく）に耽（ふけ）り出したのであります。今は時勢が違いますから、この辺の事は多少頭のある人にはよく解せられているはずですが、その頃は私が幼稚（ようち）な上に、世間がまだそれほど進んでいなかったので、私のやり方は実際やむをえなかったのです。", "私はこの自己本位という言葉を自分の手に握（にぎ）ってから大変強くなりました。彼（かれ）ら何者ぞやと気慨（きがい）が出ました。今まで茫然（ぼうぜん）と自失していた私に、ここに立って、この道からこう行かなければならないと指図（さしず）をしてくれたものは実にこの自我本位の四字なのであります。", "自白すれば私はその四字から新たに出立したのであります。そうして今のようにただ人の尻馬にばかり乗って空騒ぎをしているようでははなはだ心元ない事だから、そう西洋人ぶらないでも好いという動かすべからざる理由を立派に彼らの前に投げ出してみたら、自分もさぞ愉快だろう、人もさぞ喜ぶだろうと思って、著書その他の手段によって、それを成就するのを私の生涯（しょうがい）の事業としようと考えたのです。", "その時私の不安は全く消えました。私は軽快な心をもって陰欝（いんうつ）な倫敦を眺めたのです。比喩（ひゆ）で申すと、私は多年の間懊悩（おうのう）した結果ようやく自分の鶴嘴（つるはし）をがちりと鉱脈に掘（ほ）り当てたような気がしたのです。なお繰（く）り返（かえ）していうと、今まで霧の中に閉じ込まれたものが、ある角度の方向で、明らかに自分の進んで行くべき道を教えられた事になるのです。", "かく私が啓発（けいはつ）された時は、もう留学してから、一年以上経過していたのです。それでとても外国では私の事業を仕上（しあげ）る訳に行かない、とにかくできるだけ材料を纏めて、本国へ立ち帰った後、立派に始末をつけようという気になりました。すなわち外国へ行った時よりも帰って来た時の方が、偶然（ぐうぜん）ながらある力を得た事になるのです。", "ところが帰るや否や私は衣食のために奔走（ほんそう）する義務がさっそく起りました。私は高等学校へも出ました。大学へも出ました。後では金が足りないので、私立学校も一軒（けん）稼（かせ）ぎました。その上私は神経衰弱（しんけいすいじゃく）に罹りました。最後に下らない創作などを雑誌に載（の）せなければならない仕儀（しぎ）に陥（おちい）りました。いろいろの事情で、私は私の企（くわだ）てた事業を半途（はんと）で中止してしまいました。私の著（あら）わした文学論はその記念というよりもむしろ失敗の亡骸（なきがら）です。しかも畸形児（きけいじ）の亡骸です。あるいは立派に建設されないうちに地震（じしん）で倒（たお）された未成市街の廃墟（はいきょ）のようなものです。", "しかしながら自己本位というその時得た私の考は依然としてつづいています。否年を経るに従ってだんだん強くなります。著作的事業としては、失敗に終りましたけれども、その時確かに握った自己が主で、他は賓（ひん）であるという信念は、今日の私に非常の自信と安心を与えてくれました。私はその引続きとして、今日なお生きていられるような心持がします。実はこうした高い壇の上に立って、諸君を相手に講演をするのもやはりその力のお蔭（かげ）かも知れません。", "以上はただ私の経験だけをざっとお話ししたのでありますけれども、そのお話しを致した意味は全くあなたがたのご参考になりはしまいかという老婆心（ろうばしん）からなのであります。あなたがたはこれからみんな学校を去って、世の中へお出かけになる。それにはまだ大分時間のかかる方もございましょうし、またはおっつけ実社界に活動なさる方もあるでしょうが、いずれも私の一度経過した煩悶（はんもん）（たとい種類は違っても）を繰返（くりかえ）しがちなものじゃなかろうかと推察されるのです。私のようにどこか突き抜けたくっても突き抜ける訳にも行かず、何か掴（つか）みたくっても薬缶頭（やかんあたま）を掴むようにつるつるして焦燥（じ）れったくなったりする人が多分あるだろうと思うのです。もしあなたがたのうちですでに自力で切り開いた道を持っている方は例外であり、また他（ひと）の後に従って、それで満足して、在来の古い道を進んで行く人も悪いとはけっして申しませんが、（自己に安心と自信がしっかり附随（ふずい）しているならば、）しかしもしそうでないとしたならば、どうしても、一つ自分の鶴嘴で掘り当てるところまで進んで行かなくってはいけないでしょう。いけないというのは、もし掘りあてる事ができなかったなら、その人は生涯不愉快で、始終中腰になって世の中にまごまごしていなければならないからです。私のこの点を力説するのは全くそのためで、何も私を模範（もはん）になさいという意味ではけっしてないのです。私のようなつまらないものでも、自分で自分が道をつけつつ進み得たという自覚があれば、あなた方から見てその道がいかに下らないにせよ、それはあなたがたの批評と観察で、私には寸毫（すんごう）の損害がないのです。私自身はそれで満足するつもりであります。しかし私自身がそれがため、自信と安心をもっているからといって、同じ径路（けいろ）があなたがたの模範になるとはけっして思ってはいないのですから、誤解してはいけません。", "それはとにかく、私の経験したような煩悶があなたがたの場合にもしばしば起るに違いないと私は鑑定（かんてい）しているのですが、どうでしょうか。もしそうだとすると、何かに打ち当るまで行くという事は、学問をする人、教育を受ける人が、生涯の仕事としても、あるいは十年二十年の仕事としても、必要じゃないでしょうか。ああここにおれの進むべき道があった！　ようやく掘り当てた！　こういう感投詞を心の底から叫（さけ）び出される時、あなたがたは始めて心を安んずる事ができるのでしょう。容易に打ち壊（こわ）されない自信が、その叫び声とともにむくむく首を擡（もた）げて来るのではありませんか。すでにその域に達している方も多数のうちにはあるかも知れませんが、もし途中で霧か靄（もや）のために懊悩していられる方があるならば、どんな犠牲（ぎせい）を払（はら）っても、ああここだという掘当（ほりあ）てるところまで行ったらよろしかろうと思うのです。必ずしも国家のためばかりだからというのではありません。またあなた方のご家族のために申し上げる次第でもありません。あなたがた自身の幸福のために、それが絶対に必要じゃないかと思うから申上げるのです。もし私の通ったような道を通り過ぎた後なら致し方もないが、もしどこかにこだわり　　があるなら、それを踏潰（ふみつぶ）すまで進まなければ駄目ですよ。――もっとも進んだってどう進んで好いか解らないのだから、何かにぶつかる所まで行くよりほかに仕方がないのです。私は忠告がましい事をあなたがたに強いる気はまるでありませんが、それが将来あなたがたの幸福の一つになるかも知れないと思うと黙（だま）っていられなくなるのです。腹の中の煮え切らない、徹底（てってい）しない、ああでもありこうでもあるというような海鼠（なまこ）のような精神を抱（いだ）いてぼんやりしていては、自分が不愉快ではないか知らんと思うからいうのです。不愉快でないとおっしゃればそれまでです、またそんな不愉快は通り越（こ）しているとおっしゃれば、それも結構であります。願（ねがわ）くは通り越してありたいと私は祈（いの）るのであります。しかしこの私は学校を出て三十以上まで通り越せなかったのです。その苦痛は無論鈍痛（どんつう）ではありましたが、年々歳々（さいさい）感ずる痛（いたみ）には相違なかったのであります。だからもし私のような病気に罹った人が、もしこの中にあるならば、どうぞ勇猛（ゆうもう）にお進みにならん事を希望してやまないのです。もしそこまで行ければ、ここにおれの尻を落ちつける場所があったのだという事実をご発見になって、生涯の安心と自信を握る事ができるようになると思うから申し上げるのです。", "今まで申し上げた事はこの講演の第一篇（ぺん）に相当するものですが、私はこれからその第二篇に移ろうかと考えます。学習院という学校は社会的地位の好い人が這入る学校のように世間から見傚（みな）されております。そうしてそれがおそらく事実なのでしょう。もし私の推察通り大した貧民はここへ来ないで、むしろ上流社会の子弟ばかりが集まっているとすれば、向後あなたがたに附随してくるもののうちで第一番に挙げなければならないのは権力であります。換言（かんげん）すると、あなた方が世間へ出れば、貧民が世の中に立った時よりも余計権力が使えるという事なのです。前申した、仕事をして何かに掘りあてるまで進んで行くという事は、つまりあなた方の幸福のため安心のためには相違ありませんが、なぜそれが幸福と安心とをもたらすかというと、あなた方のもって生れた個性がそこにぶつかって始めて腰がすわるからでしょう。そうしてそこに尻を落ちつけてだんだん前の方へ進んで行くとその個性がますます発展して行くからでしょう。ああここにおれの安住の地位があったと、あなた方の仕事とあなたがたの個性が、しっくり合った時に、始めて云い得るのでしょう。", "これと同じような意味で、今申し上げた権力というものを吟味（ぎんみ）してみると、権力とは先刻（さっき）お話した自分の個性を他人の頭の上に無理矢理に圧（お）しつける道具なのです。道具だと断然云い切ってわるければ、そんな道具に使い得る利器なのです。", "権力に次ぐものは金力です。これもあなたがたは貧民よりも余計に所有しておられるに相違ない。この金力を同じくそうした意味から眺めると、これは個性を拡張するために、他人の上に誘惑（ゆうわく）の道具として使用し得る至極重宝なものになるのです。", "してみると権力と金力とは自分の個性を貧乏人（びんぼうにん）より余計に、他人の上に押し被（かぶ）せるとか、または他人をその方面に誘（おび）き寄せるとかいう点において、大変便宜（べんぎ）な道具だと云わなければなりません。こういう力があるから、偉いようでいて、その実非常に危険なのです。先刻申した個性はおもに学問とか文芸とか趣味（しゅみ）とかについて自己の落ちつくべき所まで行って始めて発展するようにお話し致したのですが、実をいうとその応用ははなはだ広いもので、単に学芸だけにはとどまらないのです。私の知っている兄弟で、弟の方は家に引込（ひっこ）んで書物などを読む事が好きなのに引（ひ）き易（か）えて、兄はまた釣道楽（つりどうらく）に憂身（うきみ）をやつしているのがあります。するとこの兄が自分の弟の引込思案でただ家にばかり引籠（ひきこも）っているのを非常に忌（い）まわしいもののように考えるのです。必竟（ひっきょう）は釣をしないからああいう風に厭世的（えんせいてき）になるのだと合点（がてん）して、むやみに弟を釣に引張り出そうとするのです。弟はまたそれが不愉快でたまらないのだけれども、兄が高圧的に釣竿（つりざお）を担がしたり、魚籃（びく）を提げさせたりして、釣堀へ随行を命ずるものだから、まあ目を瞑（つむ）ってくっついて行って、気味の悪い鮒（ふな）などを釣っていやいや帰ってくるのです。それがために兄の計画通り弟の性質が直ったかというと、けっしてそうではない、ますますこの釣というものに対して反抗心を起してくるようになります。つまり釣と兄の性質とはぴたりと合ってその間に何の隙間もないのでしょうが、それはいわゆる兄の個性で、弟とはまるで交渉（こうしょう）がないのです。これはもとより金力の例ではありません、権力の他を威圧する説明になるのです。兄の個性が弟を圧迫（あっぱく）して無理に魚を釣らせるのですから。もっともある場合には、――例えば授業を受ける時とか、兵隊になった時とか、また寄宿舎でも軍隊生活を主位におくとか――すべてそう云った場合には多少この高圧的手段は免（まぬ）かれますまい。しかし私はおもにあなたがたが一本立（いっぽんだち）になって世間へ出た時の事を云っているのだからそのつもりで聴いて下さらなくては困ります。", "そこで前申した通り自分が好いと思った事、好きな事、自分と性の合う事、幸にそこにぶつかって自分の個性を発展させて行くうちには、自他の区別を忘れて、どうかあいつもおれの仲間に引（ひ）き摺（ず）り込んでやろうという気になる。その時権力があると前云った兄弟のような変な関係が出来上るし、また金力があると、それをふりまいて、他（ひと）を自分のようなものに仕立上げようとする。すなわち金を誘惑の道具として、その誘惑の力で他を自分に気に入るように変化させようとする。どっちにしても非常な危険が起るのです。", "それで私は常からこう考えています。第一にあなたがたは自分の個性が発展できるような場所に尻を落ちつけべく、自分とぴたりと合った仕事を発見するまで邁進（まいしん）しなければ一生の不幸であると。しかし自分がそれだけの個性を尊重し得るように、社会から許されるならば、他人に対してもその個性を認めて、彼らの傾向（けいこう）を尊重するのが理の当然になって来るでしょう。それが必要でかつ正しい事としか私には見えません。自分は天性右を向いているから、あいつが左を向いているのは怪（け）しからんというのは不都合じゃないかと思うのです。もっとも複雑な分子の寄って出来上った善悪とか邪正（じゃせい）とかいう問題になると、少々込み入った解剖（かいぼう）の力を借りなければ何とも申されませんが、そうした問題の関係して来ない場合もしくは関係しても面倒（めんどう）でない場合には、自分が他（ひと）から自由を享有（きょうゆう）している限り、他にも同程度の自由を与えて、同等に取り扱（あつか）わなければならん事と信ずるよりほかに仕方がないのです。", "近頃自我とか自覚とか唱えていくら自分の勝手な真似をしても構わないという符徴（ふちょう）に使うようですが、その中にははなはだ怪しいのがたくさんあります。彼らは自分の自我をあくまで尊重するような事を云いながら、他人の自我に至っては毫も認めていないのです。いやしくも公平の眼を具し正義の観念をもつ以上は、自分の幸福のために自分の個性を発展して行くと同時に、その自由を他にも与えなければすまん事だと私は信じて疑わないのです。我々は他が自己の幸福のために、己（おの）れの個性を勝手に発展するのを、相当の理由なくして妨害（ぼうがい）してはならないのであります。私はなぜここに妨害という字を使うかというと、あなたがたは正しく妨害し得る地位に将来立つ人が多いからです。あなたがたのうちには権力を用い得る人があり、また金力を用い得る人がたくさんあるからです。", "元来をいうなら、義務の附着しておらない権力というものが世の中にあろうはずがないのです。私がこうやって、高い壇の上からあなた方を見下して、一時間なり二時間なり私の云う事を静粛（せいしゅく）に聴いていただく権利を保留する以上、私の方でもあなた方を静粛にさせるだけの説を述べなければすまないはずだと思います。よし平凡（へいぼん）な講演をするにしても、私の態度なり様子なりが、あなたがたをして礼を正さしむるだけの立派さをもっていなければならんはずのものであります。ただ私はお客である、あなたがたは主人である、だからおとなしくしなくてはならない、とこう云おうとすれば云われない事もないでしょうが、それは上面（うわつら）の礼式にとどまる事で、精神には何の関係もない云わば因襲（いんしゅう）といったようなものですから、てんで議論にはならないのです。別の例を挙げてみますと、あなたがたは教場で時々先生から叱られる事があるでしょう。しかし叱りっ放しの先生がもし世の中にあるとすれば、その先生は無論授業をする資格のない人です。叱る代りには骨を折って教えてくれるにきまっています。叱る権利をもつ先生はすなわち教える義務をももっているはずなのですから。先生は規律をただすため、秩序（ちつじょ）を保つために与えられた権利を十分に使うでしょう。その代りその権利と引き離す事のできない義務も尽（つく）さなければ、教師の職を勤め終（おお）せる訳に行きますまい。", "金力についても同じ事であります。私の考（かんがえ）によると、責任を解しない金力家は、世の中にあってならないものなのです。その訳を一口にお話しするとこうなります。金銭というものは至極重宝なもので、何へでも自由自在に融通（ゆうずう）が利く。たとえば今私がここで、相場をして十万円儲（もう）けたとすると、その十万円で家屋を立てる事もできるし、書籍（しょせき）を買う事もできるし、または花柳（かりゅう）社界を賑（にぎ）わす事もできるし、つまりどんな形にでも変って行く事ができます。そのうちでも人間の精神を買う手段に使用できるのだから恐ろしいではありませんか。すなわちそれをふりまいて、人間の徳義心を買い占（し）める、すなわちその人の魂（たましい）を堕落（だらく）させる道具とするのです。相場で儲（もう）けた金が徳義的倫理的（りんりてき）に大きな威力をもって働らき得るとすれば、どうしても不都合な応用と云わなければならないかと思われます。思われるのですけれども、実際その通りに金が活動する以上は致し方がない。ただ金を所有している人が、相当の徳義心をもって、それを道義上害のないように使いこなすよりほかに、人心の腐敗（ふはい）を防ぐ道はなくなってしまうのです。それで私は金力には必ず責任がついて廻らなければならないといいたくなります。自分は今これだけの富の所有者であるが、それをこういう方面にこう使えば、こういう結果になるし、ああいう社会にああ用いればああいう影響（えいきょう）があると呑み込むだけの見識を養成するばかりでなく、その見識に応じて、責任をもってわが富を所置しなければ、世の中にすまないと云うのです。いな自分自身にもすむまいというのです。", "今までの論旨（ろんし）をかい摘（つま）んでみると、第一に自己の個性の発展を仕遂（しと）げようと思うならば、同時に他人の個性も尊重しなければならないという事。第二に自己の所有している権力を使用しようと思うならば、それに附随している義務というものを心得なければならないという事。第三に自己の金力を示そうと願うなら、それに伴（ともな）う責任を重（おもん）じなければならないという事。つまりこの三カ条に帰着するのであります。", "これをほかの言葉で言い直すと、いやしくも倫理的に、ある程度の修養を積んだ人でなければ、個性を発展する価値もなし、権力を使う価値もなし、また金力を使う価値もないという事になるのです。それをもう一遍（ぺん）云い換（か）えると、この三者を自由に享（う）け楽しむためには、その三つのものの背後にあるべき人格の支配を受ける必要が起って来るというのです。もし人格のないものがむやみに個性を発展しようとすると、他（ひと）を妨害する、権力を用いようとすると、濫用（らんよう）に流れる、金力を使おうとすれば、社会の腐敗をもたらす。ずいぶん危険な現象を呈（てい）するに至るのです。そうしてこの三つのものは、あなたがたが将来において最も接近しやすいものであるから、あなたがたはどうしても人格のある立派な人間になっておかなくてはいけないだろうと思います。", "話が少し横へそれますが、ご存じの通り英吉利（イギリス）という国は大変自由を尊ぶ国であります。それほど自由を愛する国でありながら、また英吉利ほど秩序の調った国はありません。実をいうと私は英吉利を好かないのです。嫌（きら）いではあるが事実だから仕方なしに申し上げます。あれほど自由でそうしてあれほど秩序の行き届いた国は恐らく世界中にないでしょう。日本などはとうてい比較（ひかく）にもなりません。しかし彼らはただ自由なのではありません。自分の自由を愛するとともに他の自由を尊敬するように、小供の時分から社会的教育をちゃんと受けているのです。だから彼らの自由の背後にはきっと義務という観念が伴っています。 England expects every man to do his duty といった有名なネルソンの言葉はけっして当座限りの意味のものではないのです。彼らの自由と表裏して発達して来た深い根柢（こんてい）をもった思想に違（ちがい）ないのです。", "彼らは不平があるとよく示威運動をやります。しかし政府はけっして干渉（かんしょう）がましい事をしません。黙って放っておくのです。その代り示威運動をやる方でもちゃんと心得ていて、むやみに政府の迷惑（めいわく）になるような乱暴は働かないのです。近頃女権拡張論者と云ったようなものがむやみに狼藉（ろうぜき）をするように新聞などに見えていますが、あれはまあ例外です。例外にしては数が多過ぎると云われればそれまでですが、どうも例外と見るよりほかに仕方がないようです。嫁（よめ）に行かれないとか、職業が見つからないとか、または昔しから養成された、女を尊敬するという気風につけ込むのか、何しろあれは英国人の平生の態度ではないようです。名画を破る、監獄（かんごく）で断食（だんじき）して獄丁（ごくてい）を困らせる、議会のベンチへ身体（からだ）を縛（しば）りつけておいて、わざわざ騒々（そうぞう）しく叫び立てる。これは意外の現象ですが、ことによると女は何をしても男の方で遠慮するから構わないという意味でやっているのかも分りません。しかしまあどういう理由にしても変則らしい気がします。一般の英国気質というものは、今お話しした通り義務の観念を離れない程度において自由を愛しているようです。", "それで私は何も英国を手本にするという意味ではないのですけれども、要するに義務心を持っていない自由は本当の自由ではないと考えます。と云うものは、そうしたわがままな自由はけっして社会に存在し得ないからであります。よし存在してもすぐ他から排斥（はいせき）され踏（ふ）み潰（つぶ）されるにきまっているからです。私はあなたがたが自由にあらん事を切望するものであります。同時にあなたがたが義務というものを納得せられん事を願ってやまないのであります。こういう意味において、私は個人主義だと公言して憚（はばか）らないつもりです。", "この個人主義という意味に誤解があってはいけません。ことにあなたがたのようなお若い人に対して誤解を吹（ふ）き込（こ）んでは私がすみませんから、その辺はよくご注意を願っておきます。時間が逼っているからなるべく単簡に説明致しますが、個人の自由は先刻お話した個性の発展上極めて必要なものであって、その個性の発展がまたあなたがたの幸福に非常な関係を及（およ）ぼすのだから、どうしても他に影響のない限り、僕（ぼく）は左を向く、君は右を向いても差支ないくらいの自由は、自分でも把持（はじ）し、他人にも附与（ふよ）しなくてはなるまいかと考えられます。それがとりも直さず私のいう個人主義なのです。金力権力の点においてもその通りで、俺（おれ）の好かないやつだから畳んでしまえとか、気に喰（く）わない者だからやっつけてしまえとか、悪い事もないのに、ただそれらを濫用（らんよう）したらどうでしょう。人間の個性はそれで全く破壊（はかい）されると同時に、人間の不幸もそこから起らなければなりません。たとえば私が何も不都合を働らかないのに、単に政府に気に入らないからと云って、警視総監（けいしそうかん）が巡査（じゅんさ）に私の家を取り巻かせたらどんなものでしょう。警視総監にそれだけの権力はあるかも知れないが、徳義はそういう権力の使用を彼に許さないのであります。または三井とか岩崎とかいう豪商（ごうしょう）が、私を嫌うというだけの意味で、私の家の召使（めしつかい）を買収して事ごとに私に反抗させたなら、これまたどんなものでしょう。もし彼らの金力の背後に人格というものが多少でもあるならば、彼らはけっしてそんな無法を働らく気にはなれないのであります。", "こうした弊害（へいがい）はみな道義上の個人主義を理解し得ないから起るので、自分だけを、権力なり金力なりで、一般に推し広めようとするわがままにほかならんのであります。だから個人主義、私のここに述べる個人主義というものは、けっして俗人の考えているように国家に危険を及ぼすものでも何でもないので、他の存在を尊敬すると同時に自分の存在を尊敬するというのが私の解釈なのですから、立派な主義だろうと私は考えているのです。", "もっと解りやすく云えば、党派心がなくって理非がある主義なのです。朋党（ほうとう）を結び団隊を作って、権力や金力のために盲動（もうどう）しないという事なのです。それだからその裏面には人に知られない淋（さび）しさも潜んでいるのです。すでに党派でない以上、我は我の行くべき道を勝手に行くだけで、そうしてこれと同時に、他人の行くべき道を妨げないのだから、ある時ある場合には人間がばらばらにならなければなりません。そこが淋しいのです。私がかつて朝日新聞の文芸欄（ぶんげいらん）を担任していた頃、だれであったか、三宅雪嶺（みやけせつれい）さんの悪口を書いた事がありました。もちろん人身攻撃ではないので、ただ批評に過ぎないのです。しかもそれがたった二三行あったのです。出たのはいつごろでしたか、私は担任者であったけれども病気をしたからあるいはその病気中かも知れず、または病気中でなくって、私が出して好いと認定したのかも知れません。とにかくその批評が朝日の文芸欄に載ったのです。すると「日本及び日本人」の連中が怒りました。私の所へ直接にはかけ合わなかったけれども、当時私の下働きをしていた男に取消（とりけし）を申し込んで来ました。それが本人からではないのです。雪嶺さんの子分――子分というと何だか博奕打（ばくちうち）のようでおかしいが、――まあ同人といったようなものでしょう、どうしても取り消せというのです。それが事実の問題ならもっともですけれども、批評なんだから仕方がないじゃありませんか。私の方ではこちらの自由だというよりほかに途はないのです。しかもそうした取消を申し込んだ「日本及び日本人」の一部では毎号私の悪口を書いている人があるのだからなおのこと人を驚ろかせるのです。私は直接談判はしませんでしたけれども、その話を間接に聞いた時、変な心持（こころもち）がしました。というのは、私の方は個人主義でやっているのに反して、向うは党派主義で活動しているらしく思われたからです。当時私は私の作物をわるく評したものさえ、自分の担任している文芸欄へ載せたくらいですから、彼らのいわゆる同人なるものが、一度に雪嶺さんに対する評語が気に入らないと云って怒ったのを、驚ろきもしたし、また変にも感じました。失礼ながら時代後れだとも思いました。封建（ほうけん）時代の人間の団隊のようにも考えました。しかしそう考えた私はついに一種の淋しさを脱却（だっきゃく）する訳に行かなかったのです。私は意見の相違はいかに親しい間柄（あいだがら）でもどうする事もできないと思っていましたから、私の家に出入りをする若い人達に助言はしても、その人々の意見の発表に抑圧（よくあつ）を加えるような事は、他に重大な理由のない限り、けっしてやった事がないのです。私は他（ひと）の存在をそれほどに認めている、すなわち他にそれだけの自由を与えているのです。だから向うの気が進まないのに、いくら私が汚辱を感ずるような事があっても、けっして助力は頼めないのです。そこが個人主義の淋しさです。個人主義は人を目標として向背（こうはい）を決する前に、まず理非を明らめて、去就を定めるのだから、ある場合にはたった一人ぼっちになって、淋しい心持がするのです。それはそのはずです。槙雑木（まきざっぽう）でも束（たば）になっていれば心丈夫（こころじょうぶ）ですから。", "それからもう一つ誤解を防ぐために一言しておきたいのですが、何だか個人主義というとちょっと国家主義の反対で、それを打ち壊すように取られますが、そんな理窟（りくつ）の立たない漫然（まんぜん）としたものではないのです。いったい何々主義という事は私のあまり好まないところで、人間がそう一つ主義に片づけられるものではあるまいとは思いますが、説明のためですから、ここにはやむをえず、主義という文字の下にいろいろの事を申し上げます。ある人は今の日本はどうしても国家主義でなければ立ち行かないように云いふらしまたそう考えています。しかも個人主義なるものを蹂躙（じゅうりん）しなければ国家が亡（ほろ）びるような事を唱道するものも少なくはありません。けれどもそんな馬鹿気たはずはけっしてありようがないのです。事実私共は国家主義でもあり、世界主義でもあり、同時にまた個人主義でもあるのであります。", "個人の幸福の基礎（きそ）となるべき個人主義は個人の自由がその内容になっているには相違ありませんが、各人の享有（きょうゆう）するその自由というものは国家の安危に従って、寒暖計のように上ったり下ったりするのです。これは理論というよりもむしろ事実から出る理論と云った方が好いかも知れません、つまり自然の状態がそうなって来るのです。国家が危くなれば個人の自由が狭（せば）められ、国家が泰平（たいへい）の時には個人の自由が膨脹（ぼうちょう）して来る、それが当然の話です。いやしくも人格のある以上、それを踏み違えて、国家の亡びるか亡びないかという場合に、疳違（かんちが）いをしてただむやみに個性の発展ばかりめがけている人はないはずです。私のいう個人主義のうちには、火事が済んでもまだ火事頭巾（ずきん）が必要だと云って、用もないのに窮屈がる人に対する忠告も含まれていると考えて下さい。また例になりますが、昔し私が高等学校にいた時分、ある会を創設したものがありました。その名も主意も詳（くわ）しい事は忘れてしまいましたが、何しろそれは国家主義を標榜（ひょうぼう）したやかましい会でした。もちろん悪い会でも何でもありません。当時の校長の木下広次さんなどは大分肩を入れていた様子でした。その会員はみんな胸にめだる　　　　　　　　　めだる」に傍点］を下げていました。私はめだる　　　　　　　　　めだる」に傍点］だけはご免（めん）蒙（こうむ）りましたが、それでも会員にはされたのです。無論発起人でないから、ずいぶん異存もあったのですが、まあ入っても差支なかろうという主意から入会しました。ところがその発会式が広い講堂で行なわれた時に、何かの機（はずみ）でしたろう、一人の会員が壇上に立って演説めいた事をやりました。ところが会員ではあったけれども私の意見には大分反対のところもあったので、私はその前ずいぶんその会の主意を攻撃していたように記憶しています。しかるにいよいよ発会式となって、今申した男の演説を聴いてみると、全く私の説の反駁（はんばく）に過ぎないのです。故意だか偶然だか解りませんけれども勢い私はそれに対して答弁の必要が出て来ました。私は仕方なしに、その人のあとから演壇に上りました。当時の私の態度なり行儀なりははなはだ見苦しいものだと思いますが、それでも簡潔に云う事だけは云って退（の）けました。ではその時何と云ったかとお尋ねになるかも知れませんが、それはすこぶる簡単なのです。私はこう云いました。――国家は大切かも知れないが、そう朝から晩まで国家国家と云ってあたかも国家に取りつかれたような真似はとうてい我々にできる話でない。常住坐臥（じょうじゅうざが）国家の事以外を考えてならないという人はあるかも知れないが、そう間断なく一つ事を考えている人は事実あり得ない。豆腐（とうふ）屋が豆腐を売ってあるくのは、けっして国家のために売って歩くのではない。根本的の主意は自分の衣食の料を得るためである。しかし当人はどうあろうともその結果は社会に必要なものを供するという点において、間接に国家の利益になっているかも知れない。これと同じ事で、今日の午（ひる）に私は飯を三杯（ばい）たべた、晩にはそれを四杯に殖（ふ）やしたというのも必ずしも国家のために増減したのではない。正直に云えば胃の具合できめたのである。しかしこれらも間接のまた間接に云えば天下に影響しないとは限らない、否観方（みかた）によっては世界の大勢に幾分（いくぶん）か関係していないとも限らない。しかしながら肝心（かんじん）の当人はそんな事を考えて、国家のために飯を食わせられたり、国家のために顔を洗わせられたり、また国家のために便所に行かせられたりしては大変である。国家主義を奨励（しょうれい）するのはいくらしても差支ないが、事実できない事をあたかも国家のためにするごとくに装（よそお）うのは偽りである。――私の答弁はざっとこんなものでありました。", "いったい国家というものが危くなれば誰だって国家の安否を考えないものは一人もない。国が強く戦争の憂（うれい）が少なく、そうして他から犯される憂がなければないほど、国家的観念は少なくなってしかるべき訳で、その空虚を充たすために個人主義が這入ってくるのは理の当然と申すよりほかに仕方がないのです。今の日本はそれほど安泰でもないでしょう。貧乏である上に、国が小さい。したがっていつどんな事が起ってくるかも知れない。そういう意味から見て吾々は国家の事を考えていなければならんのです。けれどもその日本が今が今潰れるとか滅亡（めつぼう）の憂目にあうとかいう国柄でない以上は、そう国家国家と騒ぎ廻る必要はないはずです。火事の起らない先に火事装束（しょうぞく）をつけて窮屈な思いをしながら、町内中駈（か）け歩くのと一般であります。必竟ずるにこういう事は実際程度問題で、いよいよ戦争が起った時とか、危急存亡の場合とかになれば、考えられる頭の人、――考えなくてはいられない人格の修養の積んだ人は、自然そちらへ向いて行く訳で、個人の自由を束縛（そくばく）し個人の活動を切りつめても、国家のために尽すようになるのは天然自然と云っていいくらいなものです。だからこの二つの主義はいつでも矛盾して、いつでも撲殺（ぼくさつ）し合うなどというような厄介なものでは万々ないと私は信じているのです。この点についても、もっと詳しく申し上げたいのですけれども時間がないからこのくらいにして切り上げておきます。ただもう一つご注意までに申し上げておきたいのは、国家的道徳というものは個人的道徳に比べると、ずっと段の低いもののように見える事です。元来国と国とは辞令はいくらやかましくっても、徳義心はそんなにありゃしません。詐欺（さぎ）をやる、ごまかしをやる、ペテンにかける、めちゃくちゃなものであります。だから国家を標準とする以上、国家を一団と見る以上、よほど低級な道徳に甘（あま）んじて平気でいなければならないのに、個人主義の基礎から考えると、それが大変高くなって来るのですから考えなければなりません。だから国家の平穏（へいおん）な時には、徳義心の高い個人主義にやはり重きをおく方が、私にはどうしても当然のように思われます。その辺は時間がないから今日はそれより以上申上げる訳に参りません。", "私はせっかくのご招待だから今日まかり出て、できるだけ個人の生涯を送らるべきあなたがたに個人主義の必要を説きました。これはあなたがたが世の中へ出られた後、幾分かご参考になるだろうと思うからであります。はたして私のいう事が、あなた方に通じたかどうか、私には分りませんが、もし私の意味に不明のところがあるとすれば、それは私の言い方が足りないか、または悪いかだろうと思います。で私の云うところに、もし曖昧（あいまい）の点があるなら、好い加減にきめないで、私の宅までおいで下さい。できるだけはいつでも説明するつもりでありますから。またそうした手数を尽さないでも、私の本意が充分（じゅうぶん）ご会得になったなら、私の満足はこれに越した事はありません。あまり時間が長くなりますからこれでご免を蒙ります。"]}];

let curNovel = null;
let curIdx = 0;
let isPlaying = false;
let synth = window.speechSynthesis;
let utter = null;
let speed = 1.0;
let fontSize = 17;
let currentCat = 'すべて';
let searchQ = '';

// カテゴリ一覧
const CATS = ['すべて', '日本文学', '詩　絵本', '外国文学', 'その他'];
const CAT_ICONS = { 'すべて':'📚', '日本文学':'🖋', '詩　絵本':'🌸', '外国文学':'🌍', 'その他':'📄' };

window.addEventListener('load', () => {
  // 作家数
  const authors = new Set(NOVELS.map(n => n.author));
  document.getElementById('s-authors').textContent = authors.size;
  // 読了数
  updateReadCount();
  // カテゴリタブ
  buildCatTabs();
  // 作品リスト
  renderList();
});

function updateReadCount() {
  const count = NOVELS.filter(n => localStorage.getItem('read_' + n.no)).length;
  document.getElementById('s-read').textContent = count;
}

function buildCatTabs() {
  const wrap = document.getElementById('cat-tabs');
  wrap.innerHTML = CATS.map(c =>
    `<button class="cat-tab ${c === currentCat ? 'active' : 'inactive'}" onclick="selectCat('${c}')">${CAT_ICONS[c]} ${c}</button>`
  ).join('');
}

function selectCat(cat) {
  currentCat = cat;
  buildCatTabs();
  renderList();
}

function filterNovels() {
  searchQ = document.getElementById('search-input').value.trim();
  renderList();
}

function getVolumeLabel(v) {
  if (v === '小') return ['badge-s', '短編'];
  if (v === '中') return ['badge-m', '中編'];
  return ['badge-l', '長編'];
}

function getCatMatch(novel) {
  if (currentCat === 'すべて') return true;
  return novel.category.includes(currentCat);
}

function renderList() {
  const list = document.getElementById('novel-list');
  let filtered = NOVELS.filter(n => {
    const catOk = getCatMatch(n);
    const searchOk = !searchQ || n.title.includes(searchQ) || n.author.includes(searchQ);
    return catOk && searchOk;
  });

  if (filtered.length === 0) {
    list.innerHTML = '<div class="no-results">🔍 作品が見つかりません</div>';
    return;
  }

  list.innerHTML = filtered.map(n => {
    const [badgeClass, badgeLabel] = getVolumeLabel(n.volume);
    const saved = localStorage.getItem('pos_' + n.no);
    const isRead = localStorage.getItem('read_' + n.no);
    const pct = n.paras.length > 0 && saved ? Math.round((parseInt(saved) / n.paras.length) * 100) : 0;
    const progressTxt = isRead ? '✅ 読了' : (pct > 0 ? pct + '%' : '');
    const icons = ['📖','🌿','⚔️','🌙','🌸','🏔️','🦋','🎭','✨','🍃'];
    const icon = icons[n.no % icons.length];
    return `<div class="novel-card" onclick="openNovel(${n.no - 1})">
      <div class="novel-icon">${icon}</div>
      <div class="novel-info">
        <div class="novel-title">${n.title}</div>
        <div class="novel-author">${n.author}</div>
        <div class="novel-meta">
          <span class="novel-badge ${badgeClass}">${badgeLabel}</span>
          <span class="novel-badge badge-s">${parseInt(n.chars).toLocaleString()}文字</span>
        </div>
      </div>
      ${progressTxt ? `<div class="novel-progress">${progressTxt}</div>` : ''}
    </div>`;
  }).join('');
}

function openNovel(idx) {
  curNovel = NOVELS[idx];
  const saved = parseInt(localStorage.getItem('pos_' + curNovel.no) || '0');
  curIdx = saved;

  // 本文生成
  const body = document.getElementById('novel-body');
  body.style.fontSize = fontSize + 'px';
  body.innerHTML = curNovel.paras.map((p, i) =>
    `<div class="para" id="p${i}" onclick="jumpTo(${i})">${p}</div>`
  ).join('');

  document.getElementById('read-title-bar').textContent = curNovel.title + ' / ' + curNovel.author;
  document.getElementById('end-sub').textContent = curNovel.title + ' / ' + curNovel.author;
  document.getElementById('speed-range').value = speed;
  document.getElementById('speed-val').textContent = speed.toFixed(1) + 'x';

  showScreen('read');
  updateProgress();
  scrollToPara(curIdx);
  highlightPara(curIdx);
}

function jumpTo(i) {
  stopSpeech();
  curIdx = i;
  highlightPara(i);
  updateProgress();
}

function togglePlay() {
  if (isPlaying) {
    stopSpeech();
    document.getElementById('play-btn').textContent = '▶ 読み上げ';
  } else {
    isPlaying = true;
    document.getElementById('play-btn').textContent = '⏸ 停止';
    speakFrom(curIdx);
  }
}

function speakFrom(i) {
  if (!isPlaying) return;
  if (i >= curNovel.paras.length) {
    stopSpeech();
    localStorage.setItem('read_' + curNovel.no, '1');
    localStorage.removeItem('pos_' + curNovel.no);
    updateReadCount();
    showScreen('end');
    return;
  }
  curIdx = i;
  savePos();
  highlightPara(i);
  scrollToPara(i);
  updateProgress();

  utter = new SpeechSynthesisUtterance(curNovel.paras[i]);
  utter.lang = 'ja-JP';
  utter.rate = speed;
  utter.onend = () => { if (isPlaying) speakFrom(i + 1); };
  utter.onerror = () => { if (isPlaying) speakFrom(i + 1); };
  synth.cancel();
  synth.speak(utter);
}

function stopSpeech() {
  synth.cancel();
  isPlaying = false;
  document.getElementById('play-btn').textContent = '▶ 読み上げ';
}

function doRewind() {
  const t = Math.max(0, curIdx - 3);
  stopSpeech();
  curIdx = t;
  highlightPara(t);
  scrollToPara(t);
  updateProgress();
}

function exitRead() {
  savePos();
  stopSpeech();
  showTop();
  updateReadCount();
  renderList();
}

function retryRead() {
  curIdx = 0;
  localStorage.removeItem('read_' + curNovel.no);
  openNovel(curNovel.no - 1);
}

function highlightPara(i) {
  document.querySelectorAll('.para').forEach(el => el.classList.remove('reading'));
  const el = document.getElementById('p' + i);
  if (el) el.classList.add('reading');
}

function scrollToPara(i) {
  const el = document.getElementById('p' + i);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function updateProgress() {
  if (!curNovel) return;
  const pct = curNovel.paras.length > 0 ? Math.round(((curIdx + 1) / curNovel.paras.length) * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-txt').textContent = pct + '% (' + (curIdx + 1) + ' / ' + curNovel.paras.length + '段落)';
}

function savePos() {
  if (curNovel) localStorage.setItem('pos_' + curNovel.no, curIdx);
}

function onSpeed() {
  speed = parseFloat(document.getElementById('speed-range').value);
  document.getElementById('speed-val').textContent = speed.toFixed(1) + 'x';
  if (isPlaying) { synth.cancel(); setTimeout(() => speakFrom(curIdx), 50); }
}

function onFont() {
  fontSize = parseInt(document.getElementById('font-range').value);
  document.getElementById('font-val').textContent = fontSize + 'px';
  document.getElementById('novel-body').style.fontSize = fontSize + 'px';
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo(0, 0);
}

function showTop() {
  stopSpeech();
  showScreen('top');
}
</script>
</body>
</html>
