し気が動いた。", "行進　（一）", "田島は、やってみる気になった。しかし、ここにも難関がある。", "すごい美人。醜くてすごい女なら、電車の停留場の一区間を歩く度毎（たびごと）に、三十人くらいは発見できるが、すごいほど美しい、という女は、伝説以外に存在しているものかどうか、疑わしい。", "もともと田島は器量自慢、おしゃれで虚栄心が強いので、不美人と一緒に歩くと、にわかに腹痛を覚えると称してこれを避け、かれの現在のいわゆる愛人たちも、それぞれかなりの美人ばかりではあったが、しかし、すごいほどの美人、というほどのものは無いようであった。", "あの雨の日に、初老の不良文士の口から出まかせの「秘訣（ひけつ）」をさずけられ、何のばからしいと内心一応は反撥（はんぱつ）してみたものの、しかし、自分にも、ちっとも名案らしいものは浮ばない。", "まず、試みよ。ひょっとしたらどこかの人生の片すみに、そんなすごい美人がころがっているかも知れない。眼鏡の奥のかれの眼は、にわかにキョロキョロいやらしく動きはじめる。", "ダンス・ホール。喫茶店。待合。いない、いない。醜くてすごいものばかり。オフィス、デパート、工場、映画館、はだかレヴュウ。いるはずが無い。女子大の校庭のあさましい垣（かき）のぞきをしたり、ミス何とかの美人競争の会場にかけつけたり、映画のニューフェースとやらの試験場に見学と称してまぎれ込んだり、やたらと歩き廻ってみたが、いない。", "獲物は帰り道にあらわれる。", "かれはもう、絶望しかけて、夕暮の新宿駅裏の闇市をすこぶる憂鬱（ゆううつ）な顔をして歩いていた。彼のいわゆる愛人たちのところを訪問してみる気も起らぬ。思い出すさえ、ぞっとする。別れなければならぬ。", "「田島さん！」", "出し抜けに背後から呼ばれて、飛び上らんばかりに、ぎょっとした。", "「ええっと、どなただったかな？」", "「あら、いやだ。」", "声が悪い。鴉声（からすごえ）というやつだ。", "「へえ？」", "と見直した。まさに、お見それ申したわけであった。", "彼は、その女を知っていた。闇屋、いや、かつぎ屋である。彼はこの女と、ほんの二、三度、闇の物資の取引きをした事があるだけだが、しかし、この女の鴉声と、それから、おどろくべき怪力に依（よ）って、この女を記憶している。やせた女ではあるが、十貫は楽に背負う。さかなくさくて、ドロドロのものを着て、モンペにゴム長、男だか女だか、わけがわからず、ほとんど乞食（こじき）の感じで、おしゃれの彼は、その女と取引きしたあとで、いそいで手を洗ったくらいであった。", "とんでもないシンデレラ姫。洋装の好みも高雅。からだが、ほっそりして、手足が可憐（かれん）に小さく、二十三、四、いや、五、六、顔は愁（うれ）いを含んで、梨（なし）の花の如（ごと）く幽（かす）かに青く、まさしく高貴、すごい美人、これがあの十貫を楽に背負うかつぎ屋とは。", "声の悪いのは、傷だが、それは沈黙を固く守らせておればいい。", "使える。", "行進　（二）", "馬子（まご）にも衣裳（いしょう）というが、ことに女は、その装い一つで、何が何やらわけのわからぬくらいに変る。元来、化け物なのかも知れない。しかし、この女（永井キヌ子という）のように、こんなに見事に変身できる女も珍らしい。", "「さては、相当ため込んだね。いやに、りゅうとしてるじゃないか。」", "「あら、いやだ。」", "どうも、声が悪い。高貴性も何も、一ぺんに吹き飛ぶ。", "「君に、たのみたい事があるのだがね。」", "「あなたは、ケチで値切ってばかりいるから、」", "「いや、商売の話じゃない。ぼくはもう、そろそろ足を洗うつもりでいるんだ。君は、まだ相変らず、かついでいるのか。」", "「あたりまえよ。かつがなきゃおまんまが食べられませんからね。」", "言うことが、いちいちゲスである。", "「でも、そんな身なりでも無いじゃないか。」", "「そりゃ、女性ですもの。たまには、着飾って映画も見たいわ。」", "「きょうは、映画か？」", "「そう。もう見て来たの。あれ、何ていったかしら、アシクリゲ、」", "「膝栗毛（ひざくりげ）だろう。ひとりでかい？」", "「あら、いやだ。男なんて、おかしくって。」", "「そこを見込んで、頼みがあるんだ。一時間、いや、三十分でいい、顔を貸してくれ。」", "「いい話？」", "「君に損はかけない。」", "二人ならんで歩いていると、すれ違うひとの十人のうち、八人は、振りかえって、見る。田島を見るのでは無く、キヌ子を見るのだ。さすが好男子の田島も、それこそすごいほどのキヌ子の気品に押されて、ゴミっぽく、貧弱に見える。", "田島はなじみの闇の料理屋へキヌ子を案内する。", "「ここ、何か、自慢の料理でもあるの？」", "「そうだな、トンカツが自慢らしいよ。」", "「いただくわ。私、おなかが空（す）いてるの。それから、何が出来るの？」", "「たいてい出来るだろうけど、いったい、どんなものを食べたいんだい。」", "「ここの自慢のもの。トンカツの他に何か無いの？」", "「ここのトンカツは、大きいよ。」", "「ケチねえ。あなたは、だめ。私奥へ行って聞いて来るわ。」", "怪力、大食い、これが、しかし、全くのすごい美人なのだ。取り逃がしてはならぬ。", "田島はウイスキイを飲み、キヌ子のいくらでもいくらでも澄まして食べるのを、すこぶるいまいましい気持でながめながら、彼のいわゆる頼み事について語った。キヌ子は、ただ食べながら、聞いているのか、いないのか、ほとんど彼の物語りには興味を覚えぬ様子であった。", "「引受けてくれるね？」", "「バカだわ、あなたは。まるでなってやしないじゃないの。」", "行進　（三）", "田島は敵の意外の鋭鋒（えいほう）にたじろぎながらも、", "「そうさ、全くなってやしないから、君にこうして頼むんだ。往生しているんだよ。」", "「何もそんな、めんどうな事をしなくても、いやになったら、ふっとそれっきりあわなけれあいいじゃないの。」", "「そんな乱暴な事は出来ない。相手の人たちだって、これから、結婚するかも知れないし、また、新しい愛人をつくるかも知れない。相手のひとたちの気持をちゃんときめさせるようにするのが、男の責任さ。」", "「ぷ！　とんだ責任だ。別れ話だの何だのと言って、またイチャつきたいのでしょう？　ほんとに助平（すけべい）そうなツラをしている。」", "「おいおい、あまり失敬な事を言ったら怒るぜ。失敬にも程度があるよ。食ってばかりいるじゃないか。」", "「キントンが出来ないかしら。」", "「まだ、何か食う気かい？　胃拡張とちがうか。病気だぜ、君は。いちど医者に見てもらったらどうだい。さっきから、ずいぶん食ったぜ。もういい加減によせ。」", "「ケチねえ、あなたは。女は、たいてい、これくらい食うの普通だわよ。もうたくさん、なんて断っているお嬢さんや何か、あれは、ただ、色気があるから体裁をとりつくろっているだけなのよ。私なら、いくらでも、食べられるわよ。」", "「いや、もういいだろう。ここの店は、あまり安くないんだよ。君は、いつも、こんなにたくさん食べるのかね。」", "「じょうだんじゃない。ひとのごちそうになる時だけよ。」", "「それじゃね、これから、いくらでも君に食べさせるから、ぼくの頼み事も聞いてくれ。」", "「でも、私の仕事を休まなければならないんだから、損よ。」", "「それは別に支払う。君のれいの商売で、儲（もう）けるぶんくらいは、その都度（つど）きちんと支払う。」", "「ただ、あなたについて歩いていたら、いいの？」", "「まあ、そうだ。ただし、条件が二つある。よその女のひとの前では一言も、ものを言ってくれるな。たのむぜ。笑ったり、うなずいたり、首を振ったり、まあ、せいぜいそれくらいのところにしていただく。もう一つは、ひとの前で、ものを食べない事。ぼくと二人きりになったら、そりゃ、いくら食べてもかまわないけど、ひとの前では、まずお茶一ぱいくらいのところにしてもらいたい。」", "「その他、お金もくれるんでしょう？　あなたは、ケチで、ごまかすから。」", "「心配するな。ぼくだって、いま一生懸命なんだ。これが失敗したら、身の破滅さ。」", "「フクスイの陣って、とこね。」", "「フクスイ？　バカ野郎、ハイスイ（背水）の陣だよ。」", "「あら、そう？」", "けろりとしている。田島は、いよいよ、にがにがしくなるばかり。しかし、美しい。りんとして、この世のものとも思えぬ気品がある。", "トンカツ。鶏のコロッケ。マグロの刺身（さしみ）。イカの刺身。支那（しな）そば。ウナギ。よせなべ。牛の串焼（くしやき）。にぎりずしの盛合せ。海老（えび）サラダ。イチゴミルク。", "その上、キントンを所望とは。まさか女は誰でも、こんなに食うまい。いや、それとも？", "行進　（四）", "キヌ子のアパートは、世田谷方面にあって、朝はれいの、かつぎの商売に出るので、午後二時以後なら、たいていひまだという。田島は、そこへ、一週間にいちどくらい、みなの都合のいいような日に、電話をかけて連絡をして、そうしてどこかで落ち合せ、二人そろって別離の相手の女のところへ向って行進することをキヌ子と約す。", "そうして、数日後、二人の行進は、日本橋のあるデパート内の美容室に向って開始せられる事になる。", "おしゃれな田島は、一昨年の冬、ふらりとこの美容室に立ち寄って、パーマネントをしてもらった事がある。そこの「先生」は、青木さんといって三十歳前後の、いわゆる戦争未亡人である。ひっかけるなどというのではなく、むしろ女のほうから田島について来たような形であった。青木さんは、そのデパートの築地（つきじ）の寮から日本橋のお店にかよっているのであるが、収入は、女ひとりの生活にやっとというところ。そこで、田島はその生活費の補助をするという事になり、いまでは、築地の寮でも、田島と青木さんとの仲は公認せられている。", "けれども、田島は、青木さんの働いている日本橋のお店に顔を出す事はめったに無い。田島の如きあか抜けた好男子の出没は、やはり彼女の営業を妨げるに違いないと、田島自身が考えているのである。", "それが、いきなり、すごい美人を連れて、彼女のお店にあらわれる。", "「こんちは。」というあいさつさえも、よそよそしく、「きょうは女房を連れて来ました。疎開先から、こんど呼び寄せたのです。」", "それだけで十分。青木さんも、目もと涼しく、肌（はだ）が白くやわらかで、愚かしいところの無いかなりの美人ではあったが、キヌ子と並べると、まるで銀の靴と兵隊靴くらいの差があるように思われた。", "二人の美人は、無言で挨拶（あいさつ）を交（かわ）した。青木さんは、既に卑屈な泣きべそみたいな顔になっている。もはや、勝敗の数は明かであった。", "前にも言ったように、田島は女に対して律儀（りちぎ）な一面も持っていて、いまだ女に、自分が独身だなどとウソをついた事が無い。田舎に妻子を疎開させてあるという事は、はじめから皆に打明けてある。それが、いよいよ夫の許（もと）に帰って来た。しかも、その奥さんたるや、若くて、高貴で、教養のゆたからしい絶世の美人。", "さすがの青木さんも、泣きべそ以外、てが無かった。", "「女房の髪をね、一つ、いじってやって下さい。」と田島は調子に乗り、完全にとどめを刺そうとする。「銀座にも、どこにも、あなたほどの腕前のひとは無いってうわさですからね。」", "それは、しかし、あながちお世辞でも無かった。事実、すばらしく腕のいい美容師であった。", "キヌ子は鏡に向って腰をおろす。", "青木さんは、キヌ子に白い肩掛けを当て、キヌ子の髪をときはじめ、その眼には、涙が、いまにもあふれ出るほど一ぱい。", "キヌ子は平然。", "かえって、田島は席をはずした。", "行進　（五）", "セットの終ったころ、田島は、そっとまた美容室にはいって来て、一すんくらいの厚さの紙幣のたばを、美容師の白い上衣（うわぎ）のポケットに滑りこませ、ほとんど祈るような気持で、", "「グッド・バイ。」", "とささやき、その声が自分でも意外に思ったくらい、いたわるような、あやまるような、優しい、哀調に似たものを帯びていた。", "キヌ子は無言で立上る。青木さんも無言で、キヌ子のスカートなど直してやる。田島は、一足さきに外に飛び出す。", "ああ、別離は、くるしい。", "キヌ子は無表情で、あとからやって来て、", "「そんなに、うまくも無いじゃないの。」", "「何が？」", "「パーマ。」", "バカ野郎！　とキヌ子を怒鳴ってやりたくなったが、しかし、デパートの中なので、こらえた。青木という女は、他人の悪口など決して言わなかった。お金もほしがらなかったし、よく洗濯もしてくれた。", "「これで、もう、おしまい？」", "「そう。」", "田島は、ただもう、やたらにわびしい。", "「あんな事で、もう、わかれてしまうなんて、あの子も、意久地（いくじ）が無いね。ちょっと、べっぴんさんじゃないか。あのくらいの器量なら、」", "「やめろ！　あの子だなんて、失敬な呼び方は、よしてくれ。おとなしいひとなんだよ、あのひとは。君なんかとは、違うんだ。とにかく、黙っていてくれ。君のその鴉（からす）の声みたいなのを聞いていると、気が狂いそうになる。」", "「おやおや、おそれいりまめ。」", "わあ！　何というゲスな駄じゃれ。全く、田島は気が狂いそう。", "田島は妙な虚栄心から、女と一緒に歩く時には、彼の財布（さいふ）を前以（もっ）て女に手渡し、もっぱら女に支払わせて、彼自身はまるで勘定などに無関心のような、おうようの態度を装うのである。しかし、いままで、どの女も、彼に無断で勝手な買い物などはしなかった。", "けれども、おそれいりまめ女史は、平気でそれをやった。デパートには、いくらでも高価なものがある。堂々と、ためらわず、いわゆる高級品を選び出し、しかも、それは不思議なくらい優雅で、趣味のよい品物ばかりである。", "「いい加減に、やめてくれねえかなあ。」", "「ケチねえ。」", "「これから、また何か、食うんだろう？」", "「そうね、きょうは、我慢してあげるわ。」", "「財布をかえしてくれ。これからは、五千円以上、使ってはならん。」", "いまは、虚栄もクソもあったものでない。", "「そんなには、使わないわ。」", "「いや、使った。あとでぼくが残金を調べてみれば、わかる。一万円以上は、たしかに使った。こないだの料理だって安くなかったんだぜ。」", "「そんなら、よしたら、どう？　私だって何も、すき好んで、あなたについて歩いているんじゃないわよ。」", "脅迫にちかい。", "田島は、ため息をつくばかり。", "怪力　（一）", "しかし、田島だって、もともとただものでは無いのである。闇商売（やみしょうばい）の手伝いをして、一挙に数十万は楽にもうけるという、いわば目から鼻に抜けるほどの才物であった。", "キヌ子にさんざんムダ使いされて、黙って海容（かいよう）の美徳を示しているなんて、とてもそんな事の出来る性格ではなかった。何か、それ相当のお返しをいただかなければ、どうしたって、気がすまない。", "あんちきしょう！　生意気だ。ものにしてやれ。", "別離の行進は、それから後の事だ。まず、あいつを完全に征服し、あいつを遠慮深くて従順で質素で小食の女に変化させ、しかるのちにまた行進を続行する。いまのままだと、とにかく金がかかって、行進の続行が不可能だ。", "勝負の秘訣（ひけつ）。敵をして近づかしむべからず、敵に近づくべし。", "彼は、電話の番号帳により、キヌ子のアパートの所番地を調べ、ウイスキイ一本とピイナツを二袋だけ買い求め、腹がへったらキヌ子に何かおごらせてやろうという下心、そうしてウイスキイをがぶがぶ飲んで、酔いつぶれた振りをして寝てしまえば、あとは、こっちのものだ。だいいち、ひどく安上りである。部屋代も要（い）らない。", "女に対して常に自信満々の田島ともあろう者が、こんな乱暴な恥知らずの、エゲツない攻略の仕方を考えつくとは、よっぽど、かれ、どうかしている。あまりに、キヌ子にむだ使いされたので、狂うような気持になっているのかも知れない。色慾のつつしむべきも、さる事ながら、人間あんまり金銭に意地汚くこだわり、モトを取る事ばかりあせっていても、これもまた、結果がどうもよくないようだ。", "田島は、キヌ子を憎むあまりに、ほとんど人間ばなれのしたケチな卑（いや）しい計画を立て、果して、死ぬほどの大難に逢うに到った。", "夕方、田島は、世田谷のキヌ子のアパートを捜し当てた。古い木造の陰気くさい二階建のアパートである。キヌ子の部屋は、階段をのぼってすぐ突当りにあった。", "ノックする。", "「だれ？」", "中から、れいの鴉声（からすごえ）。", "ドアをあけて、田島はおどろき、立ちすくむ。", "乱雑。悪臭。", "ああ、荒涼（こうりょう）。四畳半。その畳の表は真黒く光り、波の如く高低があり、縁（へり）なんてその痕跡（こんせき）をさえとどめていない。部屋一ぱいに、れいのかつぎの商売道具らしい石油かんやら、りんご箱やら、一升ビンやら、何だか風呂敷に包んだものやら、鳥かごのようなものやら、紙くずやら、ほとんど足の踏み場も無いくらいに、ぬらついて散らばっている。", "「なんだ、あなたか。なぜ、来たの？」", "そのまた、キヌ子の服装たるや、数年前に見た時の、あの乞食姿、ドロドロによごれたモンペをはき、まったく、男か女か、わからないような感じ。", "部屋の壁には、無尽会社の宣伝ポスター、たった一枚、他にはどこを見ても装飾らしいものがない。カーテンさえ無い。これが、二十五、六の娘の部屋か。小さい電球が一つ暗くともって、ただ荒涼。", "怪力　（二）", "「あそびに来たのだけどね、」と田島は、むしろ恐怖におそわれ、キヌ子同様の鴉声になり、「でも、また出直して来てもいいんだよ。」", "「何か、こんたんがあるんだわ。むだには歩かないひとなんだから。」", "「いや、きょうは、本当に、」", "「もっと、さっぱりなさいよ。あなた、少しニヤケ過ぎてよ。」", "それにしても、ひどい部屋だ。", "ここで、あのウイスキイを飲まなければならぬのか。ああ、もっと安いウイスキイを買って来るべきであった。", "「ニヤケているんじゃない。キレイというものなんだ。君は、きょうはまた、きたな過ぎるじゃないか。」", "にがり切って言った。", "「きょうはね、ちょっと重いものを背負ったから、少し疲れて、いままで昼寝をしていたの。ああ、そう、いいものがある。お部屋へあがったらどう？　割に安いのよ。」", "どうやら商売の話らしい。もうけ口なら、部屋の汚なさなど問題でない。田島は、靴を脱ぎ、畳の比較的無難なところを選んで、外套（がいとう）のままあぐらをかいて坐る。", "「あなた、カラスミなんか、好きでしょう？　酒飲みだから。」", "「大好物だ。ここにあるのかい？　ごちそうになろう。」", "「冗談じゃない。お出しなさい。」", "キヌ子は、おくめんも無く、右の手のひらを田島の鼻先に突き出す。", "田島は、うんざりしたように口をゆがめて、", "「君のする事なす事を見ていると、まったく、人生がはかなくなるよ。その手は、ひっこめてくれ。カラスミなんて、要らねえや。あれは、馬が食うもんだ。」", "「安くしてあげるったら、ばかねえ。おいしいのよ、本場ものだから。じたばたしないで、お出し。」", "からだをゆすって、手のひらを引込めそうも無い。", "不幸にして、田島は、カラスミが実に全く大好物、ウイスキイのさかなに、あれがあると、もう何も要らん。", "「少し、もらおうか。」", "田島はいまいましそうに、キヌ子の手のひらに、大きい紙幣を三枚、載せてやる。", "「もう四枚。」", "キヌ子は平然という。", "田島はおどろき、", "「バカ野郎、いい加減にしろ。」", "「ケチねえ、一ハラ気前よく買いなさい。鰹節（かつおぶし）を半分に切って買うみたい。ケチねえ。」", "「よし、一ハラ買う。」", "さすが、ニヤケ男の田島も、ここに到って、しんから怒り、", "「そら、一枚、二枚、三枚、四枚。これでいいだろう。手をひっこめろ。君みたいな恥知らずを産んだ親の顔が見たいや。」", "「私も見たいわ。そうして、ぶってやりたいわ。捨てりゃ、ネギでも、しおれて枯れる、ってさ。」", "「なんだ、身の上話はつまらん。コップを借してくれ。これから、ウイスキイとカラスミだ。うん、ピイナツもある。これは、君にあげる。」", "怪力　（三）", "田島は、ウイスキイを大きいコップで、ぐい、ぐい、と二挙動で飲みほす。きょうこそは、何とかしてキヌ子におごらせてやろうという下心で来たのに、逆にいわゆる「本場もの」のおそろしく高いカラスミを買わされ、しかも、キヌ子は惜しげも無くその一ハラのカラスミを全部、あっと思うまもなくざくざく切ってしまって汚いドンブリに山盛りにして、それに代用味（あじ）の素（もと）をどっさり振りかけ、", "「召し上れ。味の素は、サーヴィスよ。気にしなくたっていいわよ。」", "カラスミ、こんなにたくさん、とても食べられるものでない。それにまた、味の素を振りかけるとは滅茶苦茶だ。田島は悲痛な顔つきになる。七枚の紙幣をろうそくの火でもやしたって、これほど痛烈な損失感を覚えないだろう。実に、ムダだ。意味無い。", "山盛りの底のほうの、代用味の素の振りかかっていない一片のカラスミを、田島は、泣きたいような気持で、つまみ上げて食べながら、", "「君は、自分でお料理した事ある？」", "と今は、おっかなびっくりで尋ねる。", "「やれば出来るわよ。めんどうくさいからしないだけ。」", "「お洗濯は？」", "「バカにしないでよ。私は、どっちかと言えば、きれいずきなほうだわ。」", "「きれいずき？」", "田島はぼう然と、荒涼、悪臭の部屋を見廻す。", "「この部屋は、もとから汚くて、手がつけられないのよ。それに私の商売が商売だから、どうしたって、部屋の中がちらかってね。見せましょうか、押入れの中を。」", "立って押入れを、さっとあけて見せる。", "田島は眼をみはる。", "清潔、整然、金色の光を放ち、ふくいくたる香気が発するくらい。タンス、鏡台、トランク、下駄箱（げたばこ）の上には、可憐（かれん）に小さい靴が三足、つまりその押入れこそ、鴉声のシンデレラ姫の、秘密の楽屋であったわけである。", "すぐにまた、ぴしゃりと押入れをしめて、キヌ子は、田島から少し離れて居汚く坐り、", "「おしゃれなんか、一週間にいちどくらいでたくさん。べつに男に好かれようとも思わないし、ふだん着は、これくらいで、ちょうどいいのよ。」", "「でも、そのモンペは、ひどすぎるんじゃないか？　非衛生的だ。」", "「なぜ？」", "「くさい。」", "「上品ぶったって、ダメよ。あなただって、いつも酒くさいじゃないの。いやな、におい。」", "「くさい仲、というものさね。」", "酔うにつれて、荒涼たる部屋の有様も、またキヌ子の乞食の如き姿も、あまり気にならなくなり、ひとつこれは、当初のあのプランを実行して見ようかという悪心がむらむら起る。", "「ケンカするほど深い仲、ってね。」", "とはまた、下手（へた）な口説（くど）きよう。しかし、男は、こんな場合、たとい大人物、大学者と言われているほどのひとでも、かくの如きアホーらしい口説き方をして、しかも案外に成功しているものである。", "怪力　（四）", "「ピアノが聞えるね。」", "彼は、いよいよキザになる。眼を細めて、遠くのラジオに耳を傾ける。", "「あなたにも音楽がわかるの？　音痴みたいな顔をしているけど。」", "「ばか、僕の音楽通を知らんな、君は。名曲ならば、一日一ぱいでも聞いていたい。」", "「あの曲は、何？」", "「ショパン。」", "でたらめ。", "「へえ？　私は越後獅子（えちごじし）かと思った。」", "音痴同志のトンチンカンな会話。どうも、気持が浮き立たぬので、田島は、すばやく話頭を転ずる。", "「君も、しかし、いままで誰かと恋愛した事は、あるだろうね。」", "「ばからしい。あなたみたいな淫乱（いんらん）じゃありませんよ。」", "「言葉をつつしんだら、どうだい。ゲスなやつだ。」", "急に不快になって、さらにウイスキイをがぶりと飲む。こりゃ、もう駄目（だめ）かも知れない。しかし、ここで敗退しては、色男としての名誉にかかわる。どうしても、ねばって成功しなければならぬ。", "「恋愛と淫乱とは、根本的にちがいますよ。君は、なんにも知らんらしいね。教えてあげましょうかね。」", "自分で言って、自分でそのいやらしい口調に寒気を覚えた。これは、いかん。少し時刻が早いけど、もう酔いつぶれた振りをして寝てしまおう。", "「ああ、酔った。すきっぱらに飲んだので、ひどく酔った。ちょっとここへ寝かせてもらおうか。」", "「だめよ！」", "鴉声が蛮声に変った。", "「ばかにしないで！　見えすいていますよ。泊りたかったら、五十万、いや百万円お出し。」", "すべて、失敗である。", "「何も、君、そんなに怒る事は無いじゃないか。酔ったから、ここへ、ちょっと、」", "「だめ、だめ、お帰り。」", "キヌ子は立って、ドアを開け放す。", "田島は窮して、最もぶざまで拙劣な手段、立っていきなりキヌ子に抱きつこうとした。", "グワンと、こぶしで頬（ほお）を殴（なぐ）られ、田島は、ぎゃっという甚（はなは）だ奇怪な悲鳴を挙げた。その瞬間、田島は、十貫を楽々とかつぐキヌ子のあの怪力を思い出し、慄然（りつぜん）として、", "「ゆるしてくれえ。どろぼう！」", "とわけのわからぬ事を叫んで、はだしで廊下に飛び出した。", "キヌ子は落ちついて、ドアをしめる。", "しばらくして、ドアの外で、", "「あのう、僕の靴を、すまないけど。それから、ひものようなものがありましたら、お願いします。眼鏡のツルがこわれましたから。」", "色男としての歴史に於いて、かつて無かった大屈辱にはらわたの煮えくりかえるのを覚えつつ、彼はキヌ子から恵まれた赤いテープで、眼鏡をつくろい、その赤いテープを両耳にかけ、", "「ありがとう！」", "ヤケみたいにわめいて、階段を降り、途中、階段を踏みはずして、また、ぎゃっと言った。", "コールド・ウォー　（一）", "田島は、しかし、永井キヌ子に投じた資本が、惜しくてならぬ。こんな、割の合わぬ商売をした事が無い。何とかして、彼女を利用し活用し、モトをとらなければ、ウソだ。しかし、あの怪力、あの大食い、あの強慾。", "あたたかになり、さまざまの花が咲きはじめたが、田島ひとりは、頗（すこぶ）る憂鬱（ゆううつ）。あの大失敗の夜から、四、五日経ち、眼鏡も新調し、頬のはれも引いてから、彼は、とにかくキヌ子のアパートに電話をかけた。ひとつ、思想戦に訴えて見ようと考えたのである。", "「もし、もし。田島ですがね、こないだは、酔っぱらいすぎて、あはははは。」", "「女がひとりでいるとね、いろんな事があるわ。気にしてやしません。」", "「いや、僕もあれからいろいろ深く考えましたがね、結局、ですね、僕が女たちと別れて、小さい家を買って、田舎（いなか）から妻子を呼び寄せ、幸福な家庭をつくる、という事ですね、これは、道徳上、悪い事でしょうか。」", "「あなたの言う事、何だか、わけがわからないけど、男のひとは誰でも、お金が、うんとたまると、そんなケチくさい事を考えるようになるらしいわ。」", "「それが、だから、悪い事でしょうか。」", "「けっこうな事じゃないの。どうも、よっぽどあなたは、ためたな？」", "「お金の事ばかり言ってないで、道徳のね、つまり、思想上のね、その問題なんですがね、君はどう考えますか？」", "「何も考えないわ。あなたの事なんか。」", "「それは、まあ、無論そういうものでしょうが、僕はね、これはね、いい事だと思うんです。」", "「そんなら、それで、いいじゃないの？　電話を切るわよ。そんな無駄話は、いや。」", "「しかし、僕にとっては、本当に死活の大問題なんです。僕は、道徳は、やはり重んじなけりゃならん、と思っているんです。たすけて下さい、僕を、たすけて下さい。僕は、いい事をしたいんです。」", "「へんねえ。また酔った振りなんかして、ばかな真似（まね）をしようとしているんじゃないでしょうね。あれは、ごめんですよ。」", "「からかっちゃいけません。人間には皆、善事を行おうとする本能がある。」", "「電話を切ってもいいんでしょう？　他にもう用なんか無いんでしょう？　さっきから、おしっこが出たくて、足踏みしているのよ。」", "「ちょっと待って下さい、ちょっと。一日、三千円でどうです。」", "思想戦にわかに変じて金の話になった。", "「ごちそうが、つくの？」", "「いや、そこを、たすけて下さい。僕もこの頃どうも収入が少くてね。」", "「一本（一万円のこと）でなくちゃ、いや。」", "「それじゃ、五千円。そうして下さい。これは、道徳の問題ですからね。」", "「おしっこが出たいのよ。もう、かんにんして。」", "「五千円で、たのみます。」", "「ばかねえ、あなたは。」", "くつくつ笑う声が聞える。承知の気配だ。", "コールド・ウォー　（二）", "こうなったら、とにかく、キヌ子を最大限に利用し活用し、一日五千円を与える他は、パン一かけら、水一ぱいも饗応（きょうおう）せず、思い切り酷使しなければ、損だ。温情は大の禁物、わが身の破滅。", "キヌ子に殴られ、ぎゃっという奇妙な悲鳴を挙げても、田島は、しかし、そのキヌ子の怪力を逆に利用する術（すべ）を発見した。", "彼のいわゆる愛人たちの中のひとりに、水原ケイ子という、まだ三十前の、あまり上手（じょうず）でない洋画家がいた。田園調布のアパートの二部屋を借りて、一つは居間、一つはアトリエに使っていて、田島は、その水原さんが或る画家の紹介状を持って、「オベリスク」に、さし画でもカットでも何でも描かせてほしいと顔を赤らめ、おどおどしながら申し出たのを可愛く思い、わずかずつ彼女の生計を助けてやる事にしたのである。物腰がやわらかで、無口で、そうして、ひどい泣き虫の女であった。けれども、吠（ほ）え狂うような、はしたない泣き方などは決してしない。童女のような可憐な泣き方なので、まんざらでない。", "しかし、たった一つ非常な難点があった。彼女には、兄があった。永く満洲で軍隊生活をして、小さい時からの乱暴者の由で、骨組もなかなか頑丈（がんじょう）の大男らしく、彼は、はじめてその話をケイ子から聞かされた時には、実に、いやあな気持がした。どうも、この、恋人の兄の軍曹（ぐんそう）とか伍長（ごちょう）とかいうものは、ファウストの昔から、色男にとって甚だ不吉な存在だという事になっている。", "その兄が、最近、シベリヤ方面から引揚げて来て、そうして、ケイ子の居間に、頑張っているらしいのである。", "田島は、その兄と顔を合せるのがイヤなので、ケイ子をどこかへ引っぱり出そうとして、そのアパートに電話をかけたら、いけない、", "「自分は、ケイ子の兄でありますが。」", "という、いかにも力のありそうな男の強い声。はたして、いたのだ。", "「雑誌社のものですけど、水原先生に、ちょっと、画の相談、」", "語尾が震えている。", "「ダメです。風邪（かぜ）をひいて寝ています。仕事は、当分ダメでしょう。」", "運が悪い。ケイ子を引っぱり出す事は、まず不可能らしい。", "しかし、ただ兄をこわがって、いつまでもケイ子との別離をためらっているのは、ケイ子に対しても失礼みたいなものだ。それに、ケイ子が風邪で寝ていて、おまけに引揚者の兄が寄宿しているのでは、お金にも、きっと不自由しているだろう。かえって、いまは、チャンスというものかも知れない。病人に優しい見舞いの言葉をかけ、そうしてお金をそっと差し出す。兵隊の兄も、まさか殴りやしないだろう。或（ある）いは、ケイ子以上に、感激し握手など求めるかも知れない。もし万一、自分に乱暴を働くようだったら、その時こそ、永井キヌ子の怪力のかげに隠れるといい。", "まさに百パーセントの利用、活用である。", "「いいかい？　たぶん大丈夫だと思うけどね、そこに乱暴な男がひとりいてね、もしそいつが腕を振り上げたら、君は軽くこう、取りおさえて下さい。なあに、弱いやつらしいんですがね。」", "彼は、めっきりキヌ子に、ていねいな言葉でものを言うようになっていた。", "（未完）"]}, {"no": 15, "title": "蜘蛛の糸", "author": "芥川 竜之介", "category": "日本文学-児童-物語", "chars": 3082, "volume": "小", "paras": ["一", "ある日の事でございます。御釈迦様(おしゃかさま)は極楽の蓮池(はすいけ)のふちを、独りでぶらぶら御歩きになっていらっしゃいました。池の中に咲いている蓮(はす)の花は、みんな玉のようにまっ白で、そのまん中にある金色(きんいろ)の蕊(ずい)からは、何とも云えない好(よ)い匂(におい)が、絶間(たえま)なくあたりへ溢(あふ)れて居ります。極楽は丁度朝なのでございましょう。", "やがて御釈迦様はその池のふちに御佇(おたたず)みになって、水の面(おもて)を蔽(おお)っている蓮の葉の間から、ふと下の容子(ようす)を御覧になりました。この極楽の蓮池の下は、丁度地獄(じごく)の底に当って居りますから、水晶(すいしよう)のような水を透き徹して、三途(さんず)の河や針の山の景色が、丁度覗(のぞ)き眼鏡(めがね)を見るように、はっきりと見えるのでございます。", "するとその地獄の底に、(かんだた)と云う男が一人、ほかの罪人と一しょに蠢(うごめ)いている姿が、御眼に止まりました。このと云う男は、人を殺したり家に火をつけたり、いろいろ悪事を働いた大泥坊でございますが、それでもたった一つ、善い事を致した覚えがございます。と申しますのは、ある時この男が深い林の中を通りますと、小さな蜘蛛(くも)が一匹、路ばたを這(は)って行くのが見えました。そこでは早速足を挙げて、踏み殺そうと致しましたが、「いや、いや、これも小さいながら、命のあるものに違いない。その命を無暗(むやみ)にとると云う事は、いくら何でも可哀そうだ。」と、こう急に思い返して、とうとうその蜘蛛を殺さずに助けてやったからでございます。", "御釈迦様は地獄の容子を御覧になりながら、このには蜘蛛を助けた事があるのを御思い出しになりました。そうしてそれだけの善い事をした報(むくい)には、出来るなら、この男を地獄から救い出してやろうと御考えになりました。幸い、側を見ますと、翡翠(ひすい)のような色をした蓮の葉の上に、極楽の蜘蛛が一匹、美しい銀色の糸をかけて居ります。御釈迦様はその蜘蛛の糸をそっと御手に御取りになって、玉のような白蓮(しらはす)の間から、遥か下にある地獄の底へ、まっすぐにそれを御下(おろ)しなさいました。", "二", "こちらは地獄の底の血の池で、ほかの罪人と一しょに、浮いたり沈んだりしていた(かんだた)でございます。何しろどちらを見ても、まっ暗で、たまにそのくら暗からぼんやり浮き上っているものがあると思いますと、それは恐しい針の山の針が光るのでございますから、その心細さと云ったらございません。その上あたりは墓の中のようにしんと静まり返って、たまに聞えるものと云っては、ただ罪人がつく微(かすか)な嘆息(たんそく)ばかりでございます。これはここへ落ちて来るほどの人間は、もうさまざまな地獄の責苦(せめく)に疲れはてて、泣声を出す力さえなくなっているのでございましょう。ですからさすが大泥坊のも、やはり血の池の血に咽(むせ)びながら、まるで死にかかった蛙(かわず)のように、ただもがいてばかり居りました。", "ところがある時の事でございます。何気(なにげ)なくが頭を挙げて、血の池の空を眺めますと、そのひっそりとした暗の中を、遠い遠い天上から、銀色の蜘蛛(くも)の糸が、まるで人目にかかるのを恐れるように、一すじ細く光りながら、するすると自分の上へ垂れて参るのではございませんか。はこれを見ると、思わず手を拍(う)って喜びました。この糸に縋(すが)りついて、どこまでものぼって行けば、きっと地獄からぬけ出せるのに相違ございません。いや、うまく行くと、極楽へはいる事さえも出来ましょう。そうすれば、もう針の山へ追い上げられる事もなくなれば、血の池に沈められる事もある筈はございません。", "こう思いましたから(かんだた)は、早速その蜘蛛の糸を両手でしっかりとつかみながら、一生懸命に上へ上へとたぐりのぼり始めました。元より大泥坊の事でございますから、こう云う事には昔から、慣れ切っているのでございます。", "しかし地獄と極楽との間は、何万里となくございますから、いくら焦(あせ)って見た所で、容易に上へは出られません。ややしばらくのぼる中(うち)に、とうとうもくたびれて、もう一たぐりも上の方へはのぼれなくなってしまいました。そこで仕方がございませんから、まず一休み休むつもりで、糸の中途にぶら下りながら、遥かに目の下を見下しました。", "すると、一生懸命にのぼった甲斐があって、さっきまで自分がいた血の池は、今ではもう暗の底にいつの間にかかくれて居ります。それからあのぼんやり光っている恐しい針の山も、足の下になってしまいました。この分でのぼって行けば、地獄からぬけ出すのも、存外わけがないかも知れません。は両手を蜘蛛の糸にからみながら、ここへ来てから何年にも出した事のない声で、「しめた。しめた。」と笑いました。ところがふと気がつきますと、蜘蛛の糸の下の方には、数限(かずかぎり)もない罪人たちが、自分ののぼった後をつけて、まるで蟻(あり)の行列のように、やはり上へ上へ一心によじのぼって来るではございませんか。はこれを見ると、驚いたのと恐しいのとで、しばらくはただ、莫迦(ばか)のように大きな口を開(あ)いたまま、眼ばかり動かして居りました。自分一人でさえ断(き)れそうな、この細い蜘蛛の糸が、どうしてあれだけの人数(にんず)の重みに堪える事が出来ましょう。もし万一途中で断(き)れたと致しましたら、折角ここへまでのぼって来たこの肝腎(かんじん)な自分までも、元の地獄へ逆落(さかおと)しに落ちてしまわなければなりません。そんな事があったら、大変でございます。が、そう云う中にも、罪人たちは何百となく何千となく、まっ暗な血の池の底から、うようよと這(は)い上って、細く光っている蜘蛛の糸を、一列になりながら、せっせとのぼって参ります。今の中にどうかしなければ、糸はまん中から二つに断れて、落ちてしまうのに違いありません。", "そこでは大きな声を出して、「こら、罪人ども。この蜘蛛の糸は己(おれ)のものだぞ。お前たちは一体誰に尋(き)いて、のぼって来た。下りろ。下りろ。」と喚(わめ)きました。", "その途端でございます。今まで何ともなかった蜘蛛の糸が、急にのぶら下っている所から、ぷつりと音を立てて断(き)れました。ですからもたまりません。あっと云う間(ま)もなく風を切って、独楽(こま)のようにくるくるまわりながら、見る見る中に暗の底へ、まっさかさまに落ちてしまいました。", "後にはただ極楽の蜘蛛の糸が、きらきらと細く光りながら、月も星もない空の中途に、短く垂れているばかりでございます。", "三", "御釈迦様(おしゃかさま)は極楽の蓮池(はすいけ)のふちに立って、この一部始終(しじゅう)をじっと見ていらっしゃいましたが、やがて(かんだた)が血の池の底へ石のように沈んでしまいますと、悲しそうな御顔をなさりながら、またぶらぶら御歩きになり始めました。自分ばかり地獄からぬけ出そうとする、の無慈悲な心が、そうしてその心相当な罰をうけて、元の地獄へ落ちてしまったのが、御釈迦様の御目から見ると、浅間しく思召されたのでございましょう。", "しかし極楽の蓮池の蓮は、少しもそんな事には頓着(とんじゃく)致しません。その玉のような白い花は、御釈迦様の御足(おみあし)のまわりに、ゆらゆら萼(うてな)を動かして、そのまん中にある金色の蕊(ずい)からは、何とも云えない好(よ)い匂が、絶間(たえま)なくあたりへ溢(あふ)れて居ります。極楽ももう午(ひる)に近くなったのでございましょう。", "（大正七年四月十六日）"]}, {"no": 16, "title": "黒猫", "author": "エドガー・アラン・ポー", "category": "外国文学-冒険・推理・怪談", "chars": 10552, "volume": "中", "paras": ["エドガー・アラン・ポー　Edgar Allan Poe", "佐々木直次郎訳", "私がこれから書こうとしているきわめて奇怪な、またきわめて素朴（そぼく）な物語については、自分はそれを信じてもらえるとも思わないし、そう願いもしない。自分の感覚でさえが自分の経験したことを信じないような場合に、他人に信じてもらおうなどと期待するのは、ほんとに正気の沙汰（さた）とは言えないと思う。だが、私は正気を失っている訳ではなく、――また決して夢みているのでもない。しかしあす私は死ぬべき身だ。で、今日のうちに自分の魂の重荷をおろしておきたいのだ。私の第一の目的は、一連の単なる家庭の出来事を、はっきりと、簡潔に、注釈ぬきで、世の人々に示すことである。それらの出来事は、その結果として、私を恐れさせ――苦しめ――そして破滅させた。だが私はそれをくどくどと説明しようとは思わない。私にはそれはただもう恐怖だけを感じさせた。――多くの人々には恐ろしいというよりも怪奇（バロック）なものに見えるであろう。今後、あるいは、誰か知者があらわれてきて、私の幻想を単なる平凡なことにしてしまうかもしれぬ。――誰か私などよりももっと冷静な、もっと論理的な、もっとずっと興奮しやすくない知性人が、私が畏怖（いふ）をもって述べる事がらのなかに、ごく自然な原因結果の普通の連続以上のものを認めないようになるであろう。", "子供のころから私はおとなしくて情けぶかい性質で知られていた。私の心の優しさは仲間たちにからかわれるくらいにきわだっていた。とりわけ動物が好きで、両親もさまざまな生きものを私の思いどおりに飼ってくれた。私はたいていそれらの生きものを相手にして時を過し、それらに食物をやったり、それらを愛撫（あいぶ）したりするときほど楽しいことはなかった。この特質は成長するとともにだんだん強くなり、大人になってからは自分の主な楽しみの源泉の一つとなったのであった。忠実な利口な犬をかわいがったことのある人には、そのような愉快さの性質や強さをわざわざ説明する必要はほとんどない。動物の非利己的な自己犠牲的な愛のなかには、単なる人間のさもしい友情や薄っぺらな信義をしばしば嘗（な）めたことのある人の心をじかに打つなにものかがある。", "私は若いころ結婚したが、幸いなことに妻は私と性の合う気質だった。私が家庭的な生きものを好きなのに気がつくと、彼女はおりさえあればとても気持のいい種類の生きものを手に入れた。私たちは鳥類や、金魚や、一匹の立派な犬や、兎（うさぎ）や、一匹の小猿（こざる）や、一匹の猫　　　などを飼った。", "この最後のものは非常に大きな美しい動物で、体じゅう黒く、驚くほどに利口だった。この猫の知恵のあることを話すときには、心ではかなり迷信にかぶれていた妻は、黒猫というものがみんな魔女が姿を変えたものだという、あの昔からの世間の言いつたえを、よく口にしたものだった。もっとも、彼女だっていつでもこんなことを本気で考えていたというのではなく、――私がこの事がらを述べるのはただ、ちょうどいまふと思い出したからにすぎない。", "プルートォ――というのがその猫の名であった――は私の気に入りであり、遊び仲間であった。食物をやるのはいつも私だけだったし、彼は家じゅう私の行くところへどこへでも一緒に来た。往来へまでついて来ないようにするのには、かなり骨が折れるくらいであった。", "私と猫との親しみはこんなぐあいにして数年間つづいたが、そのあいだに私の気質や性格は一般に――酒癖という悪鬼のために――急激に悪いほうへ（白状するのも恥ずかしいが）変ってしまった。私は一日一日と気むずかしくなり、癇癪（かんしゃく）もちになり、他人の感情などちっともかまわなくなってしまった。妻に対しては乱暴な言葉を使うようになった。しまいには彼女の体に手を振り上げるまでになった。飼っていた生きものも、もちろん、その私の性質の変化を感じさせられた。私は彼らをかまわなくなっただけではなく、虐待（ぎゃくたい）した。けれども、兎や、猿や、あるいは犬でさえも、なにげなく、または私を慕って、そばへやって来ると、遠慮なしにいじめてやったものだったのだが、プルートォをいじめないでおくだけの心づかいはまだあった。しかし私の病気はつのってきて――ああ、アルコールのような恐ろしい病気が他にあろうか！　――ついにはプルートォでさえ――いまでは年をとって、したがっていくらか怒りっぽくなっているプルートォでさえ、私の不機嫌（ふきげん）のとばっちりをうけるようになった。", "ある夜、町のそちこちにある自分の行きつけの酒場の一つからひどく酔っぱらって帰って来ると、その猫がなんだか私の前を避けたような気がした。私は彼をひっとらえた。そのとき彼は私の手荒さにびっくりして、歯で私の手にちょっとした傷をつけた。と、たちまち悪魔のような憤怒（ふんぬ）が私にのりうつった。私は我を忘れてしまった。生来のやさしい魂はすぐに私の体から飛び去ったようであった。そしてジン酒におだてられた悪鬼以上の憎悪（ぞうお）が体のあらゆる筋肉をぶるぶる震わせた。私はチョッキのポケットからペンナイフを取り出し、それを開き、そのかわいそうな動物の咽喉（のど）をつかむと、悠々（ゆうゆう）とその眼窩（がんか）から片眼（かため）をえぐり取った。この憎むべき凶行をしるしながら、私は面（おもて）をあからめ、体がほてり、身ぶるいする。", "朝になって理性が戻ってきたとき――一晩眠って前夜の乱行の毒気が消えてしまったとき――自分の犯した罪にたいしてなかば恐怖の、なかば悔恨の情を感じた。が、それもせいぜい弱い曖昧（あいまい）な感情で、心まで動かされはしなかった。私はふたたび無節制になって、間もなくその行為のすべての記憶を酒にまぎらしてしまった。", "そのうちに猫はいくらかずつ回復してきた。眼のなくなった眼窩はいかにも恐ろしい様子をしてはいたが、もう痛みは少しもないようだった。彼はもとどおりに家のなかを歩きまわっていたけれども、当りまえのことであろうが私が近づくとひどく恐ろしがって逃げて行くのだった。私は、前にあんなに自分を慕っていた動物がこんなに明らかに自分を嫌（きら）うようになったことを、初めは悲しく思うくらいに、昔の心が残っていた。しかしこの感情もやがて癇癪に変っていった。それから、まるで私を最後の取りかえしのつかない破滅に陥らせるためのように、天邪鬼の心持がやってきた。この心持を哲学は少しも認めてはいない。けれども、私は、自分の魂が生きているということと同じくらいに、天邪鬼（あまのじゃく）が人間の心の原始的な衝動の一つ――人の性格に命令する、分つことのできない本源的な性能もしくは感情の一つ――であるということを確信している。してはいけないという、ただそれだけの理由で、自分が邪悪な、あるいは愚かな行為をしていることに、人はどんなにかしばしば気づいたことであろう。人は、掟を、単にそれが掟（おきて）であると知っているだけのために、その最善の判断に逆らってまでも、その掟を破ろうとする永続的な性向を、持っていはしないだろうか？　この天邪鬼の心持がいま言ったように、私の最後の破滅を来たしたのであった。なんの罪もない動物に対して自分の加えた傷害をなおもつづけさせ、とうとう仕遂げさせるように私をせっついたのは、魂の自らを苦しめようとする――それ自身の本性に暴虐を加えようとする――悪のためにのみ悪をしようとする、この不可解な切望であったのだ。ある朝、冷然と、私は猫の首に輪索（わなわ）をはめて、一本の木の枝につるした。――眼から涙を流しながら、心に痛切な悔恨を感じながら、つるした。――その猫が私を慕っていたということを知っていればこそ  　、猫が私を怒らせるようなことはなに一つしなかったということを感じていればこそ  　、つるしたのだ。――そうすれば自分は罪を犯すのだ、――自分の不滅の魂をいとも慈悲ぶかく、いとも畏（おそ）るべき神の無限の慈悲の及ばない彼方（かなた）へ置く――もしそういうことがありうるなら――ほどにも危うくするような極悪罪を犯すのだ、ということを知っていればこそ  　、つるしたのだった。", "この残酷な行為をやった日の晩、私は火事だという叫び声で眠りから覚まされた。私の寝台のカーテンに火がついていた。家全体が燃え上がっていた。妻と、召使と、私自身とは、やっとのことでその火災からのがれた。なにもかも焼けてしまった。私の全財産はなくなり、それ以来私は絶望に身をまかせてしまった。", "この災難とあの凶行とのあいだに因果関係をつけようとするほど、私は心の弱い者ではない。しかし私は事実のつながりを詳しく述べているのであって、――一つの鐶（かん）でも不完全にしておきたくないのである。火事のつぎの日、私は焼跡へ行ってみた。壁は、一カ所だけをのぞいて、みんな焼け落ちていた。この一カ所というのは、家の真ん中あたりにある、私の寝台の頭板に向っていた、あまり厚くない仕切壁のところであった。ここの漆喰（しっくい）だけはだいたい火の力に耐えていたが、――この事実を私は最近そこを塗り換えたからだろうと思った。この壁のまわりに真っ黒に人がたかっていて、多くの人々がその一部分を綿密な熱心な注意をもって調べているようだった。「妙だな！」「不思議だね？」という言葉や、その他それに似たような文句が、私の好奇心をそそった。近づいてみると、その白い表面に薄肉彫りに彫ったかのように、巨大な猫の姿が見えた。その痕（あと）はまったく驚くほど正確にあらわれていた。その動物の首のまわりには縄（なわ）があった。", "最初この妖怪（ようかい）――というのは私にはそれ以外のものとは思えなかったからだが――を見たとき、私の驚愕（きょうがく）と恐怖とは非常なものだった。しかしあれこれと考えてみてやっと気が安まった。猫が家につづいている庭につるしてあったことを私は思い出した。火事の警報が伝わると、この庭はすぐに大勢の人でいっぱいになり、――そのなかの誰かが猫を木から切りはなして、開いていた窓から私の部屋のなかへ投げこんだものにちがいない。これはきっと私の寝ているのを起すためにやったものだろう。そこへ他の壁が落ちかかって、私の残虐の犠牲者を、その塗りたての漆喰の壁のなかへ押しつけ、そうして、その漆喰の石灰と、火炎と、死骸（しがい）から出たアンモニアとで、自分の見たような像ができあがったのだ。", "いま述べた驚くべき事実を、自分の良心にたいしてはぜんぜんできなかったとしても、理性にたいしてはこんなにたやすく説明したのであるが、それでも、それが私の想像に深い印象を与えたことに変りはなかった。幾月ものあいだ私はその猫の幻像を払いのけることができなかった。そしてそのあいだ、悔恨に似ているがそうではないある漠然（ばくぜん）とした感情が、私の心のなかへ戻ってきた。私は猫のいなくなったことを悔むようにさえなり、そのころ行きつけの悪所（あくしょ）でそれの代りになる同じ種類の、またいくらか似たような毛並のものがいないかと自分のまわりを捜すようにもなった。", "ある夜、ごくたちの悪い酒場に、なかば茫然（ぼうぜん）として腰かけていると、その部屋の主な家具をになっているジン酒かラム酒の大樽（おおだる）の上に、なんだか黒い物がじっとしているのに、とつぜん注意をひかれた。私はそれまで数分間その大樽のてっぺんのところをじっと見ていたので、いま私を驚かせたことは、自分がもっと早くその物に気がつかなかったという事実なのであった。私は近づいて行って、それに手を触れてみた。それは一匹の黒猫――非常に大きな猫――で、プルートォくらいの大きさは十分あり、一つの点をのぞいて、あらゆる点で彼にとてもよく似ていた。プルートォは体のどこにも白い毛が一本もなかったが、この猫は、胸のところがほとんど一面に、ぼんやりした形ではあるが、大きな、白い斑点（はんてん）で蔽（おお）われているのだ。", "私がさわると、その猫はすぐに立ち上がり、さかんにごろごろ咽喉を鳴らし、私の手に体をすりつけ、私が目をつけてやったのを喜んでいるようだった。これこそ私の探している猫だった。私はすぐにそこの主人にそれを買いたいと言い出した。が主人はその猫を自分のものだとは言わず、――ちっとも知らないし――いままでに見たこともないと言うのだった。", "私は愛撫をつづけていたが、家へ帰りかけようとすると、その動物はついて来たいような様子を見せた。で、ついて来るままにさせ、歩いて行く途中でおりおりかがんで軽く手で叩（たた）いてやった。家へ着くと、すぐに居ついてしまい、すぐ妻の非常なお気に入りになった。", "私はというと、間もなくその猫に対する嫌悪の情が心のなかに湧（わ）き起るのに気がついた。これは自分の予想していたこととは正反対であった。しかし――どうしてだか、またなぜだかは知らないが――猫がはっきり私を好いていることが私をかえって厭（いや）がらせ、うるさがらせた。だんだんに、この厭でうるさいという感情が嵩（こう）じてはげしい憎しみになっていった。私はその動物を避けた。ある慚愧（ざんき）の念と、以前の残酷な行為の記憶とが、私にそれを肉体的に虐待しないようにさせたのだ。数週の間、私は打つとか、その他手荒なことはしなかった。がしだいしだいに――ごくゆっくりと――言いようのない嫌悪の情をもってその猫を見るようになり、悪疫（あくえき）の息吹（いぶき）から逃げるように、その忌（い）むべき存在から無言のままで逃げ出すようになった。", "疑いもなく、その動物に対する私の憎しみを増したのは、それを家へ連れてきた翌朝、それにもプルートォのように片眼がないということを発見したことであった。けれども、この事がらのためにそれはますます妻にかわいがられるだけであった。妻は、以前は私のりっぱな特徴であり、また多くのもっとも単純な、もっとも純粋な快楽の源であったあの慈悲ぶかい気持を、前にも言ったように、多分に持っていたのだ。", "しかし、私がこの猫を嫌えば嫌うほど、猫のほうはいよいよ私を好くようになってくるようだった。私のあとをつけまわり、そのしつこさは読者に理解してもらうのが困難なくらいであった。私が腰かけているときにはいつでも、椅子（いす）の下にうずくまったり、あるいは膝（ひざ）の上へ上がって、しきりにどこへでもいまいましくじゃれついたりした。立ち上がって歩こうとすると、両足のあいだへ入って、私を倒しそうにしたり、あるいはその長い鋭い爪（つめ）を私の着物にひっかけて、胸のところまでよじ登ったりする。そんなときには、殴り殺してしまいたかったけれども、そうすることを差し控えたのは、いくらか自分の以前の罪悪を思い出すためであったが、主としては――あっさり白状してしまえば――その動物がほんとうに怖かったためであった。", "この怖さは肉体的災害の怖さとは少し違っていた、――が、それでもそのほかにそれをなんと説明してよいか私にはわからない。私は告白するのが恥ずかしいくらいだが――そうだ、この重罪人の監房のなかにあってさえも、告白するのが恥ずかしいくらいだが――その動物が私の心に起させた恐怖の念は、実にくだらない一つの妄想（もうそう）のために強められていたのであった。その猫と前に殺した猫との唯一（ゆいいつ）の眼に見える違いといえば、さっき話したあの白い毛の斑点なのだが、妻はその斑点のことで何度か私に注意していた。この斑点は、大きくはあったが、もとはたいへんぼんやりした形であったということを、読者は記憶せられるであろう。ところが、だんだんに――ほとんど眼につかないほどにゆっくりと、そして、長いあいだ私の理性はそれを気の迷いだとして否定しようとあせっていたのだが――それが、とうとう、まったくきっぱりした輪郭となった。それはいまや私が名を言うも身ぶるいするような物の格好になった。――そして、とりわけこのために、私はその怪物を嫌い、恐れ、できるなら思いきってやっつけてしまいたいと思ったのであるが、――それはいまや、恐ろしい――もの凄（すご）い物の――絞首台の――形になったのだ！　――おお、恐怖と罪悪との――苦悶（くもん）と死との痛ましい恐ろしい刑具の形になったのだ！", "そしていまこそ私は実に単なる人間の惨（みじ）めさ以上に惨めであった。一匹の畜生が　――その仲間の奴（やつ）を私は傲然（ごうぜん）と殺してやったのだ――一匹の畜生が私に――いと高き神の像（かたち）に象（かたど）って造られた人間である　私に――かくも多くの堪えがたい苦痛を与えるとは！　ああ！　昼も夜も私はもう安息の恩恵というものを知らなくなった！　昼間はかの動物がちょっとも私を一人にしておかなかった。夜には、私は言いようもなく恐ろしい夢から毎時間ぎょっとして目覚めると、そいつの熱い息が自分の顔にかかり、そのどっしりした重さが――私には払い落す力のない悪魔の化身が――いつもいつも私の心臓　の上に圧（お）しかかっているのだった！", "こういった呵責（かしゃく）に押しつけられて、私のうちに少しばかり残っていた善も敗北してしまった。邪悪な考えが私の唯一の友となった、――もっとも暗黒な、もっとも邪悪な考えが。私のいつもの気むずかしい気質はますますつのって、あらゆる物やあらゆる人を憎むようになった。そして、いまでは幾度もとつぜんに起るおさえられぬ激怒の発作に盲目的に身をまかせたのだが、なんの苦情も言わない私の妻は、ああ！　それを誰よりもいつもひどく受けながら、辛抱づよく我慢したのだった。", "ある日、妻はなにかの家の用事で、貧乏のために私たちが仕方なく住んでいた古い穴蔵のなかへ、私と一緒に降りてきた。猫もその急な階段を私のあとへついて降りてきたが、もう少しのことで私を真っ逆さまに突き落そうとしたので、私はかっと激怒した。怒りのあまり、これまで自分の手を止めていたあの子供らしい怖さも忘れて、斧（おの）を振り上げ、その動物をめがけて一撃に打ち下ろそうとした。それを自分の思ったとおりに打ち下ろしたなら、もちろん、猫は即座に死んでしまったろう。が、その一撃は妻の手でさえぎられた。この邪魔立てに悪鬼以上の憤怒に駆られて、私は妻につかまれている腕をひき放し、斧を彼女の脳天に打ちこんだ。彼女は呻（うめ）き声もたてずに、その場で倒れて死んでしまった。", "この恐ろしい殺人をやってしまうと、私はすぐに、きわめて慎重に、死体を隠す仕事に取りかかった。昼でも夜でも、近所の人々の目にとまる恐れなしには、それを家から運び去ることができないということは、私にはわかっていた。いろいろの計画が心に浮んだ。あるときは死骸を細かく切って火で焼いてしまおうと考えた。またあるときには穴蔵の床にそれを埋める穴を掘ろうと決心した。さらにまた、庭の井戸のなかへ投げこもうかとも――商品のように箱のなかへ入れて普通やるように荷造りして、運搬人に家から持ち出させようかとも、考えてみた。最後に、これらのどれよりもずっといいと思われる工夫を考えついた。中世紀の僧侶（そうりょ）たちが彼らの犠牲者を壁に塗りこんだと伝えられているように――それを穴蔵の壁に塗りこむことに決めたのだ。", "そういった目的にはその穴蔵はたいへん適していた。そこの壁はぞんざいにできていたし、近ごろ粗い漆喰を一面に塗られたばかりで、空気が湿っているためにその漆喰が固まっていないのだった。その上に、一方の壁には、穴蔵の他のところと同じようにしてある、見せかけだけの煙突か暖炉のためにできた、突き出た一カ所があった。ここの煉瓦（れんが）を取りのけて、死骸を押しこみ、誰の目にもなに一つ怪しいことの見つからないように、前のとおりにすっかり壁を塗り潰（つぶ）すことは、造作なくできるにちがいない、と私は思った。", "そしてこの予想ははずれなかった。鉄梃（かなてこ）を使って私はたやすく煉瓦を動かし、内側の壁に死体を注意深く寄せかけると、その位置に支えておきながら、大した苦もなく全体をもとのとおりに積み直した。できるかぎりの用心をして膠泥（モルタル）と、砂と、毛髪とを手に入れると、前のと区別のつけられない漆喰をこしらえ、それで新しい煉瓦細工の上をとても念入りに塗った。仕上げてしまうと、万事がうまくいったのに満足した。壁には手を加えたような様子が少しも見えなかった。床の上の屑（くず）はごく注意して拾い上げた。私は得意になってあたりを見まわして、こう独言（ひとりごと）を言った。――「さあ、これで少なくとも今度だけは己（おれ）の骨折りも無駄（むだ）じゃなかったぞ」", "次に私のやることは、かくまでの不幸の原因であったあの獣を捜すことであった。とうとう私はそれを殺してやろうと堅く決心していたからである。そのときそいつに出会うことができたなら、そいつの命はないに決っていた。が、そのずるい動物は私のさっきの怒りのはげしさにびっくりしたらしく、私がいまの気分でいるところへは姿を見せるのを控えているようであった。その厭でたまらない生きものがいなくなったために私の胸に生じた、深い、この上なく幸福な、安堵（あんど）の感じは、記述することも、想像することもできないくらいである。猫はその夜じゅう姿をあらわさなかった。――で、そのために、あの猫を家へ連れてきて以来、少なくとも一晩だけは、私はぐっすりと安らかに眠った。そうだ、魂に人殺しの重荷を負いながらも眠ったのだ！", "二日目も過ぎ三日目も過ぎたが、それでもまだ私の呵責者は出てこなかった。もう一度私は自由な人間として呼吸した。あの怪物は永久にこの屋内から逃げ去ってしまったのだ！　私はもうあいつを見ることはないのだ！　私の幸福はこの上もなかった！　自分の凶行の罪はほとんど私を不安にさせなかった。二、三の訊問（じんもん）は受けたが、それには造作なく答えた。家宅捜索さえ一度行われた、――が無論なにも発見されるはずがなかった。私は自分の未来の幸運を確実だと思った。", "殺人をしてから四日目に、まったく思いがけなく、一隊の警官が家へやって来て、ふたたび屋内を厳重に調べにかかった。けれども、自分の隠匿（いんとく）の場所はわかるはずがないと思って、私はちっともどぎまぎしなかった。警官は私に彼らの捜索について来いと命じた。彼らはすみずみまでも残るくまなく捜した。とうとう、三度目か四度目に穴蔵へ降りて行った。私は体の筋一つ動かさなかった。私の心臓は罪もなくて眠っている人の心臓のように穏やかに鼓動していた。私は穴蔵を端から端へと歩いた。腕を胸の上で組み、あちこち悠々（ゆうゆう）と歩きまわった。警官はすっかり満足して、引き揚げようとした。私の心の歓喜は抑えきれないくらい強かった。私は、凱歌（がいか）のつもりでたった一言でも言ってやり、また自分の潔白を彼らに確かな上にも確かにしてやりたくてたまらなかった。", "「皆さん」と、とうとう私は、一行が階投をのぼりかけたときに、言った。「お疑いが晴れたことをわたしは嬉（うれ）しく思います。皆さん方のご健康を祈り、それからも少し礼儀を重んぜられんことを望みます。ときに、皆さん、これは――これはなかなかよくできている家ですぜ」〔なにかをすらすら言いたいはげしい欲望を感じて、私は自分の口にしていることがほとんどわからなかった〕――「すてきに　よくできている家だと言っていいでしょうな。この壁は――お帰りですか？　皆さん――この壁はがんじょうにこしらえてありますよ」そう言って、ただ気違いじみた空威張（からいば）りから、手にした杖（つえ）で、ちょうど愛妻の死骸が内側に立っている部分の煉瓦細工を、強くたたいた。", "だが、神よ、魔王の牙（きば）より私を護（まも）りまた救いたまえ！　私の打った音の反響が鎮（しず）まるか鎮まらぬかに、その墓のなかから一つの声が私に答えたのであった！　――初めは、子供の啜（すす）り泣きのように、なにかで包まれたような、きれぎれな叫び声であったが、それから急に高まって、まったく異様な、人間のものではない、一つの長い、高い、連続した金切声となり、――地獄に墜（お）ちてもだえ苦しむ者と、地獄に墜（おと）して喜ぶ悪魔との咽喉（のど）から一緒になって、ただ地獄からだけ聞えてくるものと思われるような、なかば恐怖の、なかば勝利の、号泣――慟哭（どうこく）するような悲鳴――となった。", "私自身の気持は語るも愚かである。気が遠くなって、私は反対の側の壁へとよろめいた。一瞬間、階段の上にいた一行は、極度の恐怖と畏懼（いく）とのために、じっと立ち止った。次の瞬間には、幾本かの逞（たくま）しい腕が壁をせっせとくずしていた。壁はそっくり落ちた。もうひどく腐爛（ふらん）して血魂が固まりついている死骸が、そこにいた人々の眼前にすっくと立った。その頭の上に、赤い口を大きくあけ、爛々たる片眼（かため）を光らせて、あのいまわしい獣が坐（すわ）っていた。そいつの奸策（かんさく）が私をおびきこんで人殺しをさせ、そいつのたてた声が私を絞刑吏に引渡したのだ。その怪物を私はその墓のなかへ塗りこめておいたのだった！", "（１）Pluto ――ローマ神話の下界の王。冥府（めいふ）の王の名。", "（２）旧約全書創世記第一章第二十六―二十七節、「神いい給いけるは我儕（われら）に象（かたど）りて我儕の像（かたち）のごとく我儕人を造り……と、神その像の如（ごと）くに人を創造（つくり）たまえり。即（すなわ）ち神の像の如くに之を造り云々（うんぬん）」"]}, {"no": 17, "title": "ごん狐", "author": "新美 南吉", "category": "日本文学-詩　絵本", "chars": 5183, "volume": "中", "paras": ["一", "これは、私（わたし）が小さいときに、村の茂平（もへい）というおじいさんからきいたお話です。", "むかしは、私たちの村のちかくの、中山（なかやま）というところに小さなお城があって、中山さまというおとのさまが、おられたそうです。", "その中山から、少しはなれた山の中に、「ごん狐（ぎつね）」という狐がいました。ごんは、一人（ひとり）ぼっちの小狐で、しだ　の一ぱいしげった森の中に穴をほって住んでいました。そして、夜でも昼でも、あたりの村へ出てきて、いたずらばかりしました。はたけへ入って芋をほりちらしたり、菜種（なたね）がら　の、ほしてあるのへ火をつけたり、百姓家（ひゃくしょうや）の裏手につるしてあるとんがらしをむしりとって、いったり、いろんなことをしました。", "或（ある）秋（あき）のことでした。二、三日雨がふりつづいたその間（あいだ）、ごんは、外へも出られなくて穴の中にしゃがんでいました。", "雨があがると、ごんは、ほっとして穴からはい出ました。空はからっと晴れていて、百舌鳥（もず）の声がきんきん、ひびいていました。", "ごんは、村の小川（おがわ）の堤（つつみ）まで出て来ました。あたりの、すすきの穂には、まだ雨のしずくが光っていました。川は、いつもは水が少（すくな）いのですが、三日もの雨で、水が、どっとましていました。ただのときは水につかることのない、川べりのすすきや、萩（はぎ）の株が、黄いろくにごった水に横だおしになって、もまれています。ごんは川下（かわしも）の方へと、ぬかるみみちを歩いていきました。", "ふと見ると、川の中に人がいて、何かやっています。ごんは、見つからないように、そうっと草の深いところへ歩きよって、そこからじっとのぞいてみました。", "「兵十（ひょうじゅう）だな」と、ごんは思いました。兵十はぼろぼろの黒いきものをまくし上げて、腰のところまで水にひたりながら、魚をとる、はりきり　という、網をゆすぶっていました。はちまきをした顔の横っちょうに、まるい萩の葉が一まい、大きな黒子（ほくろ）みたいにへばりついていました。", "しばらくすると、兵十は、はりきり　網の一ばんうしろの、袋のようになったところを、水の中からもちあげました。その中には、芝の根や、草の葉や、くさった木ぎれなどが、ごちゃごちゃはいっていましたが、でもところどころ、白いものがきらきら光っています。それは、ふというなぎ　の腹や、大きなきす　の腹でした。兵十は、びくの中へ、そのうなぎやきすを、ごみと一しょにぶちこみました。そして、また、袋の口をしばって、水の中へ入れました。", "兵十はそれから、びくをもって川から上（あが）りびくを土手（どて）においといて、何をさがしにか、川上（かわかみ）の方へかけていきました。", "兵十がいなくなると、ごんは、ぴょいと草の中からとび出して、びくのそばへかけつけました。ちょいと、いたずらがしたくなったのです。ごんはびくの中の魚をつかみ出しては、はりきり　網のかかっているところより下手（しもて）の川の中を目がけて、ぽんぽんなげこみました。どの魚も、「とぼん」と音を立てながら、にごった水の中へもぐりこみました。", "一ばんしまいに、太いうなぎをつかみにかかりましたが、何しろぬるぬるとすべりぬけるので、手ではつかめません。ごんはじれったくなって、頭をびくの中につッこんで、うなぎの頭を口にくわえました。うなぎは、キュッと言ってごんの首へまきつきました。そのとたんに兵十が、向うから、", "「うわアぬすと狐め」と、どなりたてました。ごんは、びっくりしてとびあがりました。うなぎをふりすててにげようとしましたが、うなぎは、ごんの首にまきついたままはなれません。ごんはそのまま横っとびにとび出して一しょうけんめいに、にげていきました。", "ほら穴の近くの、はん　の木の下でふりかえって見ましたが、兵十は追っかけては来ませんでした。", "ごんは、ほっとして、うなぎの頭をかみくだき、やっとはずして穴のそとの、草の葉の上にのせておきました。", "二", "十日（とおか）ほどたって、ごんが、弥助（やすけ）というお百姓の家の裏を通りかかりますと、そこの、いちじくの木のかげで、弥助の家内（かない）が、おはぐろをつけていました。鍛冶屋（かじや）の新兵衛（しんべえ）の家のうらを通ると、新兵衛の家内が髪をすいていました。ごんは、", "「ふふん、村に何かあるんだな」と、思いました。", "「何（なん）だろう、秋祭かな。祭なら、太鼓や笛の音がしそうなものだ。それに第一、お宮にのぼりが立つはずだが」", "こんなことを考えながらやって来ますと、いつの間（ま）にか、表に赤い井戸のある、兵十の家の前へ来ました。その小さな、こわれかけた家の中には、大勢（おおぜい）の人があつまっていました。よそいきの着物を着て、腰に手拭（てぬぐい）をさげたりした女たちが、表のかまどで火をたいています。大きな鍋（なべ）の中では、何かぐずぐず煮えていました。", "「ああ、葬式だ」と、ごんは思いました。", "「兵十の家のだれが死んだんだろう」", "お午（ひる）がすぎると、ごんは、村の墓地へ行って、六地蔵（ろくじぞう）さんのかげにかくれていました。いいお天気で、遠く向うには、お城の屋根瓦（やねがわら）が光っています。墓地には、ひがん花（ばな）が、赤い布（きれ）のようにさきつづいていました。と、村の方から、カーン、カーン、と、鐘（かね）が鳴って来ました。葬式の出る合図（あいず）です。", "やがて、白い着物を着た葬列のものたちがやって来るのがちらちら見えはじめました。話声（はなしごえ）も近くなりました。葬列は墓地へはいって来ました。人々が通ったあとには、ひがん花が、ふみおられていました。", "ごんはのびあがって見ました。兵十が、白いかみしもをつけて、位牌（いはい）をささげています。いつもは、赤いさつま芋（いも）みたいな元気のいい顔が、きょうは何だかしおれていました。", "「ははん、死んだのは兵十のおっ母（かあ）だ」", "ごんはそう思いながら、頭をひっこめました。", "その晩、ごんは、穴の中で考えました。", "「兵十のおっ母は、床（とこ）についていて、うなぎが食べたいと言ったにちがいない。それで兵十がはりきり網をもち出したんだ。ところが、わしがいたずらをして、うなぎをとって来てしまった。だから兵十は、おっ母にうなぎを食べさせることができなかった。そのままおっ母は、死んじゃったにちがいない。ああ、うなぎが食べたい、うなぎが食べたいとおもいながら、死んだんだろう。ちょッ、あんないたずらをしなけりゃよかった。」", "三", "兵十が、赤い井戸のところで、麦をといでいました。", "兵十は今まで、おっ母と二人（ふたり）きりで、貧しいくらしをしていたもので、おっ母が死んでしまっては、もう一人ぼっちでした。", "「おれと同じ一人ぼっちの兵十か」", "こちらの物置（ものおき）の後（うしろ）から見ていたごんは、そう思いました。", "ごんは物置のそばをはなれて、向うへいきかけますと、どこかで、いわしを売る声がします。", "「いわしのやすうりだアい。いきのいいいわしだアい」", "ごんは、その、いせいのいい声のする方へ走っていきました。と、弥助（やすけ）のおかみさんが、裏戸口から、", "「いわしをおくれ。」と言いました。いわし売（うり）は、いわしのかごをつんだ車を、道ばたにおいて、ぴかぴか光るいわしを両手でつかんで、弥助の家の中へもってはいりました。ごんはそのすきまに、かごの中から、五、六ぴきのいわしをつかみ出して、もと来た方へかけだしました。そして、兵十の家の裏口から、家の中へいわしを投げこんで、穴へ向（むか）ってかけもどりました。途中の坂の上でふりかえって見ますと、兵十がまだ、井戸のところで麦をといでいるのが小さく見えました。", "ごんは、うなぎのつぐないに、まず一つ、いいことをしたと思いました。", "つぎの日には、ごんは山で栗（くり）をどっさりひろって、それをかかえて、兵十の家へいきました。裏口からのぞいて見ますと、兵十は、午飯（ひるめし）をたべかけて、茶椀（ちゃわん）をもったまま、ぼんやりと考えこんでいました。へんなことには兵十の頬（ほっ）ぺたに、かすり傷がついています。どうしたんだろうと、ごんが思っていますと、兵十がひとりごとをいいました。", "「一たいだれが、いわしなんかをおれの家へほうりこんでいったんだろう。おかげでおれは、盗人（ぬすびと）と思われて、いわし屋のやつに、ひどい目にあわされた」と、ぶつぶつ言っています。", "ごんは、これはしまったと思いました。かわいそうに兵十は、いわし屋にぶんなぐられて、あんな傷までつけられたのか。", "ごんはこうおもいながら、そっと物置の方へまわってその入口に、栗をおいてかえりました。", "つぎの日も、そのつぎの日もごんは、栗をひろっては、兵十の家へもって来てやりました。そのつぎの日には、栗ばかりでなく、まつたけも二、三ぼんもっていきました。", "四", "月のいい晩でした。ごんは、ぶらぶらあそびに出かけました。中山さまのお城の下を通ってすこしいくと、細い道の向うから、だれか来るようです。話声が聞えます。チンチロリン、チンチロリンと松虫が鳴いています。", "ごんは、道の片がわにかくれて、じっとしていました。話声はだんだん近くなりました。それは、兵十と加助（かすけ）というお百姓でした。", "「そうそう、なあ加助」と、兵十がいいました。", "「ああん？」", "「おれあ、このごろ、とてもふしぎなことがあるんだ」", "「何が？」", "「おっ母が死んでからは、だれだか知らんが、おれに栗やまつたけなんかを、まいにちまいにちくれるんだよ」", "「ふうん、だれが？」", "「それがわからんのだよ。おれの知らんうちに、おいていくんだ」", "ごんは、ふたりのあとをつけていきました。", "「ほんとかい？」", "「ほんとだとも。うそと思うなら、あした見に来（こ）いよ。その栗を見せてやるよ」", "「へえ、へんなこともあるもんだなア」", "それなり、二人はだまって歩いていきました。", "加助がひょいと、後（うしろ）を見ました。ごんはびくっとして、小さくなってたちどまりました。加助は、ごんには気がつかないで、そのままさっさとあるきました。吉兵衛（きちべえ）というお百姓の家まで来ると、二人はそこへはいっていきました。ポンポンポンポンと木魚（もくぎょ）の音がしています。窓の障子（しょうじ）にあかりがさしていて、大きな坊主頭（ぼうずあたま）がうつって動いていました。ごんは、", "「おねんぶつがあるんだな」と思いながら井戸のそばにしゃがんでいました。しばらくすると、また三人ほど、人がつれだって吉兵衛の家へはいっていきました。お経を読む声がきこえて来ました。", "五", "ごんは、おねんぶつがすむまで、井戸のそばにしゃがんでいました。兵十と加助は、また一しょにかえっていきます。ごんは、二人の話をきこうと思って、ついていきました。兵十の影法師（かげぼうし）をふみふみいきました。", "お城の前まで来たとき、加助が言い出しました。", "「さっきの話は、きっと、そりゃあ、神さまのしわざだぞ」", "「えっ？」と、兵十はびっくりして、加助の顔を見ました。", "「おれは、あれからずっと考えていたが、どうも、そりゃ、人間じゃない、神さまだ、神さまが、お前がたった一人になったのをあわれに思わっしゃって、いろんなものをめぐんで下さるんだよ」", "「そうかなあ」", "「そうだとも。だから、まいにち神さまにお礼を言うがいいよ」", "「うん」", "ごんは、へえ、こいつはつまらないなと思いました。おれが、栗や松たけを持っていってやるのに、そのおれにはお礼をいわないで、神さまにお礼をいうんじゃア、おれは、引き合わないなあ。", "六", "そのあくる日もごんは、栗をもって、兵十の家へ出かけました。兵十は物置で縄（なわ）をなっていました。それでごんは家の裏口から、こっそり中へはいりました。", "そのとき兵十は、ふと顔をあげました。と狐が家の中へはいったではありませんか。こないだうなぎをぬすみやがったあのごん狐めが、またいたずらをしに来たな。", "「ようし。」", "兵十は立ちあがって、納屋（なや）にかけてある火縄銃（ひなわじゅう）をとって、火薬をつめました。", "そして足音をしのばせてちかよって、今戸口を出ようとするごんを、ドンと、うちました。ごんは、ばたりとたおれました。兵十はかけよって来ました。家の中を見ると、土間（どま）に栗が、かためておいてあるのが目につきました。", "「おや」と兵十は、びっくりしてごんに目を落しました。", "「ごん、お前（まい）だったのか。いつも栗をくれたのは」", "ごんは、ぐったりと目をつぶったまま、うなずきました。", "兵十は火縄銃をばたりと、とり落しました。青い煙が、まだ筒口（つつぐち）から細く出ていました。"]}, {"no": 18, "title": "桜の樹の下には", "author": "梶井 基次郎", "category": "外国文学-物語", "chars": 1872, "volume": "小", "paras": ["桜の樹の下には屍体（したい）が埋まっている！", "これは信じていいことなんだよ。何故（なぜ）って、桜の花があんなにも見事に咲くなんて信じられないことじゃないか。俺はあの美しさが信じられないので、この二三日不安だった。しかしいま、やっとわかるときが来た。桜の樹の下には屍体が埋まっている。これは信じていいことだ。", "どうして俺が毎晩家へ帰って来る道で、俺の部屋の数ある道具のうちの、選（よ）りに選ってちっぽけな薄っぺらいもの、安全剃刀の刃なんぞが、千里眼のように思い浮かんで来るのか――おまえはそれがわからないと言ったが――そして俺にもやはりそれがわからないのだが――それもこれもやっぱり同じようなことにちがいない。", "いったいどんな樹の花でも、いわゆる真っ盛りという状態に達すると、あたりの空気のなかへ一種神秘な雰囲気を撒き散らすものだ。それは、よく廻った独楽（こま）が完全な静止に澄むように、また、音楽の上手な演奏がきまってなにかの幻覚を伴うように、灼熱（しゃくねつ）した生殖の幻覚させる後光のようなものだ。それは人の心を撲（う）たずにはおかない、不思議な、生き生きとした、美しさだ。", "しかし、昨日、一昨日、俺の心をひどく陰気にしたものもそれなのだ。俺にはその美しさがなにか信じられないもののような気がした。俺は反対に不安になり、憂鬱（ゆううつ）になり、空虚な気持になった。しかし、俺はいまやっとわかった。", "おまえ、この爛漫（らんまん）と咲き乱れている桜の樹の下へ、一つ一つ屍体が埋まっていると想像してみるがいい。何が俺をそんなに不安にしていたかがおまえには納得がいくだろう。", "馬のような屍体、犬猫のような屍体、そして人間のような屍体、屍体はみな腐爛（ふらん）して蛆（うじ）が湧き、堪（たま）らなく臭い。それでいて水晶のような液をたらたらとたらしている。桜の根は貪婪（どんらん）な蛸（たこ）のように、それを抱きかかえ、いそぎんちゃくの食糸のような毛根を聚（あつ）めて、その液体を吸っている。", "何があんな花弁を作り、何があんな蕊（しべ）を作っているのか、俺は毛根の吸いあげる水晶のような液が、静かな行列を作って、維管束のなかを夢のようにあがってゆくのが見えるようだ。", "――おまえは何をそう苦しそうな顔をしているのだ。美しい透視術じゃないか。俺はいまようやく瞳（ひとみ）を据えて桜の花が見られるようになったのだ。昨日、一昨日、俺を不安がらせた神秘から自由になったのだ。", "二三日前、俺は、ここの溪（たに）へ下りて、石の上を伝い歩きしていた。水のしぶきのなかからは、あちらからもこちらからも、薄羽かげろうがアフロディットのように生まれて来て、溪の空をめがけて舞い上がってゆくのが見えた。おまえも知っているとおり、彼らはそこで美しい結婚をするのだ。しばらく歩いていると、俺は変なものに出喰（でく）わした。それは溪の水が乾いた磧（かわら）へ、小さい水溜を残している、その水のなかだった。思いがけない石油を流したような光彩が、一面に浮いているのだ。おまえはそれを何だったと思う。それは何万匹とも数の知れない、薄羽かげろうの屍体だったのだ。隙間なく水の面を被っている、彼らのかさなりあった翅（はね）が、光にちぢれて油のような光彩を流しているのだ。そこが、産卵を終わった彼らの墓場だったのだ。", "俺はそれを見たとき、胸が衝（つ）かれるような気がした。墓場を発（あば）いて屍体を嗜（この）む変質者のような残忍なよろこびを俺は味わった。", "この溪間ではなにも俺をよろこばすものはない。鶯（うぐいす）や四十雀（しじゅうから）も、白い日光をさ青に煙らせている木の若芽も、ただそれだけでは、もうろうとした心象に過ぎない。俺には惨劇が必要なんだ。その平衡があって、はじめて俺の心象は明確になって来る。俺の心は悪鬼のように憂鬱に渇いている。俺の心に憂鬱が完成するときにばかり、俺の心は和（なご）んでくる。", "――おまえは腋（わき）の下を拭（ふ）いているね。冷汗が出るのか。それは俺も同じことだ。何もそれを不愉快がることはない。べたべたとまるで精液のようだと思ってごらん。それで俺達の憂鬱は完成するのだ。", "ああ、桜の樹の下には屍体が埋まっている！", "いったいどこから浮かんで来た空想かさっぱり見当のつかない屍体が、いまはまるで桜の樹と一つになって、どんなに頭を振っても離れてゆこうとはしない。", "今こそ俺は、あの桜の樹の下で酒宴をひらいている村人たちと同じ権利で、花見の酒が呑（の）めそうな気がする。"]}, {"no": 19, "title": "猿蟹合戦", "author": "芥川 竜之介", "category": "日本文学-児童-童話", "chars": 2673, "volume": "小", "paras": ["蟹（かに）の握り飯を奪った猿（さる）はとうとう蟹に仇（かたき）を取られた。蟹は臼（うす）、蜂（はち）、卵と共に、怨敵（おんてき）の猿を殺したのである。――その話はいまさらしないでも好（よ）い。ただ猿を仕止めた後（のち）、蟹を始め同志のものはどう云う運命に逢着（ほうちゃく）したか、それを話すことは必要である。なぜと云えばお伽噺（とぎばなし）は全然このことは話していない。", "いや、話していないどころか、あたかも蟹は穴の中に、臼は台所の土間（どま）の隅に、蜂は軒先（のきさき）の蜂の巣に、卵は籾殻（もみがら）の箱の中に、太平無事な生涯でも送ったかのように装（よそお）っている。", "しかしそれは偽（いつわり）である。彼等は仇（かたき）を取った後、警官の捕縛（ほばく）するところとなり、ことごとく監獄（かんごく）に投ぜられた。しかも裁判（さいばん）を重ねた結果、主犯（しゅはん）蟹は死刑になり、臼、蜂、卵等の共犯は無期徒刑の宣告を受けたのである。お伽噺（とぎばなし）のみしか知らない読者はこう云う彼等の運命に、怪訝（かいが）の念を持つかも知れない。が、これは事実である。寸毫（すんごう）も疑いのない事実である。", "蟹（かに）は蟹自身の言によれば、握り飯と柿（かき）と交換した。が、猿は熟柿（じゅくし）を与えず、青柿（あおがき）ばかり与えたのみか、蟹に傷害を加えるように、さんざんその柿を投げつけたと云う。しかし蟹は猿との間（あいだ）に、一通の証書も取り換（か）わしていない。よしまたそれは不問（ふもん）に附しても、握り飯と柿と交換したと云い、熟柿とは特に断（ことわ）っていない。最後に青柿を投げつけられたと云うのも、猿に悪意があったかどうか、その辺（へん）の証拠は不十分である。だから蟹の弁護に立った、雄弁の名の高い某弁護士も、裁判官の同情を乞うよりほかに、策の出づるところを知らなかったらしい。その弁護士は気の毒そうに、蟹の泡を拭ってやりながら、「あきらめ給え」と云ったそうである。もっともこの「あきらめ給え」は、死刑の宣告を下されたことをあきらめ給えと云ったのだか、弁護士に大金（たいきん）をとられたことをあきらめ給えと云ったのだか、それは誰にも決定出来ない。", "その上新聞雑誌の輿論（よろん）も、蟹に同情を寄せたものはほとんど一つもなかったようである。蟹の猿を殺したのは私憤（しふん）の結果にほかならない。しかもその私憤たるや、己（おのれ）の無知と軽卒（けいそつ）とから猿に利益を占められたのを忌々（いまいま）しがっただけではないか？　優勝劣敗の世の中にこう云う私憤を洩（も）らすとすれば、愚者にあらずんば狂者である。――と云う非難が多かったらしい。現に商業会議所会頭某男爵（だんしゃく）のごときは大体上（かみ）のような意見と共に、蟹の猿を殺したのも多少は流行の危険思想にかぶれたのであろうと論断した。そのせいか蟹の仇打（かたきう）ち以来、某男爵は壮士のほかにも、ブルドッグを十頭飼（か）ったそうである。", "かつまた蟹の仇打ちはいわゆる識者の間（あいだ）にも、一向（いっこう）好評を博さなかった。大学教授某博士（はかせ）は倫理学上の見地から、蟹の猿を殺したのは復讐（ふくしゅう）の意志に出（で）たものである、復讐は善と称し難いと云った。それから社会主義の某首領は蟹は柿とか握り飯とか云う私有財産を難有（ありがた）がっていたから、臼や蜂や卵なども反動的思想を持っていたのであろう、事によると尻押（しりお）しをしたのは国粋会（こくすいかい）かも知れないと云った。それから某宗（ぼうしゅう）の管長某師は蟹は仏慈悲（ぶつじひ）を知らなかったらしい、たとい青柿を投げつけられたとしても、仏慈悲を知っていさえすれば、猿の所業を憎む代りに、反（かえ）ってそれを憐んだであろう。ああ、思えば一度でも好（い）いから、わたしの説教を聴かせたかったと云った。それから――また各方面にいろいろ批評する名士はあったが、いずれも蟹の仇打ちには不賛成（ふさんせい）の声ばかりだった。そう云う中にたった一人、蟹のために気を吐いたのは酒豪（しゅごう）兼詩人の某代議士である。代議士は蟹の仇打ちは武士道の精神と一致すると云った。しかしこんな時代遅れの議論は誰の耳にも止（とま）るはずはない。のみならず新聞のゴシップによると、その代議士は数年以前、動物園を見物中、猿に尿（いばり）をかけられたことを遺恨（いこん）に思っていたそうである。", "お伽噺（とぎばなし）しか知らない読者は、悲しい蟹の運命に同情の涙を落すかも知れない。しかし蟹の死は当然である。それを気の毒に思いなどするのは、婦女童幼のセンティメンタリズムに過ぎない。天下は蟹の死を是（ぜ）なりとした。現に死刑の行われた夜（よ）、判事、検事、弁護士、看守（かんしゅ）、死刑執行人、教誨師（きょうかいし）等は四十八時間熟睡したそうである。その上皆夢の中に、天国の門を見たそうである。天国は彼等の話によると、封建時代の城に似たデパアトメント・ストアらしい。", "ついでに蟹の死んだ後（のち）、蟹の家庭はどうしたか、それも少し書いて置きたい。蟹の妻は売笑婦（ばいしょうふ）になった。なった動機は貧困のためか、彼女自身の性情のためか、どちらか未（いまだ）に判然しない。蟹の長男は父の没後、新聞雑誌の用語を使うと、「飜然（ほんぜん）と心を改めた。」今は何でもある株屋の番頭か何かしていると云う。この蟹はある時自分の穴へ、同類の肉を食うために、怪我（けが）をした仲間を引きずりこんだ。クロポトキンが相互扶助論（そうごふじょろん）の中に、蟹も同類を劬（いたわ）ると云う実例を引いたのはこの蟹である。次男の蟹は小説家になった。勿論（もちろん）小説家のことだから、女に惚（ほ）れるほかは何もしない。ただ父蟹の一生を例に、善は悪の異名（いみょう）であるなどと、好（い）い加減（かげん）な皮肉を並べている。三男の蟹は愚物（ぐぶつ）だったから、蟹よりほかのものになれなかった。それが横這（よこば）いに歩いていると、握り飯が一つ落ちていた。握り飯は彼の好物だった。彼は大きい鋏（はさみ）の先にこの獲物（えもの）を拾い上げた。すると高い柿の木の梢（こずえ）に虱（しらみ）を取っていた猿が一匹、――その先は話す必要はあるまい。", "とにかく猿と戦ったが最後、蟹は必ず天下のために殺されることだけは事実である。語を天下の読者に寄す。君たちもたいてい蟹なんですよ。", "（大正十二年二月）"]}, {"no": 20, "title": "山月記", "author": "中島 敦", "category": "日本文学-物語", "chars": 6988, "volume": "中", "paras": ["隴西（ろうさい）の李徴（りちょう）は博学才穎（さいえい）、天宝の末年、若くして名を虎榜（こぼう）に連ね、ついで江南尉（こうなんい）に補せられたが、性、狷介（けんかい）、自（みずか）ら恃（たの）むところ頗（すこぶ）る厚く、賤吏（せんり）に甘んずるを潔（いさぎよ）しとしなかった。いくばくもなく官を退いた後は、故山（こざん）、略（かくりゃく）に帰臥（きが）し、人と交（まじわり）を絶って、ひたすら詩作に耽（ふけ）った。下吏となって長く膝（ひざ）を俗悪な大官の前に屈するよりは、詩家としての名を死後百年に遺（のこ）そうとしたのである。しかし、文名は容易に揚らず、生活は日を逐（お）うて苦しくなる。李徴は漸（ようや）く焦躁（しょうそう）に駆られて来た。この頃（ころ）からその容貌（ようぼう）も峭刻（しょうこく）となり、肉落ち骨秀（ひい）で、眼光のみ徒（いたず）らに炯々（けいけい）として、曾（かつ）て進士に登第（とうだい）した頃の豊頬（ほうきょう）の美少年の俤（おもかげ）は、何処（どこ）に求めようもない。数年の後、貧窮に堪（た）えず、妻子の衣食のために遂（つい）に節を屈して、再び東へ赴き、一地方官吏の職を奉ずることになった。一方、これは、己（おのれ）の詩業に半ば絶望したためでもある。曾ての同輩は既に遥（はる）か高位に進み、彼が昔、鈍物として歯牙（しが）にもかけなかったその連中の下命を拝さねばならぬことが、往年の儁才（しゅんさい）李徴の自尊心を如何（いか）に傷（きずつ）けたかは、想像に難（かた）くない。彼は怏々（おうおう）として楽しまず、狂悖（きょうはい）の性は愈々（いよいよ）抑え難（がた）くなった。一年の後、公用で旅に出、汝水（じょすい）のほとりに宿った時、遂に発狂した。或（ある）夜半、急に顔色を変えて寝床から起上ると、何か訳の分らぬことを叫びつつそのまま下にとび下りて、闇（やみ）の中へ駈出（かけだ）した。彼は二度と戻（もど）って来なかった。附近の山野を捜索しても、何の手掛りもない。その後李徴がどうなったかを知る者は、誰（だれ）もなかった。", "翌年、監察御史（かんさつぎょし）、陳郡（ちんぐん）の袁  　（えんさん）という者、勅命を奉じて嶺南（れいなん）に使（つかい）し、途（みち）に商於（しょうお）の地に宿った。次の朝未（ま）だ暗い中（うち）に出発しようとしたところ、駅吏が言うことに、これから先の道に人喰虎（ひとくいどら）が出る故（ゆえ）、旅人は白昼でなければ、通れない。今はまだ朝が早いから、今少し待たれたが宜（よろ）しいでしょうと。袁  　は、しかし、供廻（ともまわ）りの多勢なのを恃み、駅吏の言葉を斥（しりぞ）けて、出発した。残月の光をたよりに林中の草地を通って行った時、果して一匹の猛虎（もうこ）が叢（くさむら）の中から躍り出た。虎は、あわや袁  　に躍りかかるかと見えたが、忽（たちま）ち身を飜（ひるがえ）して、元の叢に隠れた。叢の中から人間の声で「あぶないところだった」と繰返し呟（つぶや）くのが聞えた。その声に袁  　は聞き憶（おぼ）えがあった。驚懼（きょうく）の中にも、彼は咄嗟（とっさ）に思いあたって、叫んだ。「その声は、我が友、李徴子ではないか？」袁、は李徴と同年に進士の第に登り、友人の少かった李徴にとっては、最も親しい友であった。温和な袁 の性格が、峻峭（しゅんしょう）な李徴の性情と衝突しなかったためであろう。", "叢の中からは、暫（しばら）く返辞が無かった。しのび泣きかと思われる微（かす）かな声が時々洩（も）れるばかりである。ややあって、低い声が答えた。「如何にも自分は隴西の李徴である」と。", "袁 は恐怖を忘れ、馬から下りて叢に近づき、懐（なつ）かしげに久闊（きゅうかつ）を叙した。そして、何故（なぜ）叢から出て来ないのかと問うた。李徴の声が答えて言う。自分は今や異類の身となっている。どうして、おめおめと故人（とも）の前にあさましい姿をさらせようか。かつ又、自分が姿を現せば、必ず君に畏怖嫌厭（いふけんえん）の情を起させるに決っているからだ。しかし、今、図らずも故人に遇（あ）うことを得て、愧赧（きたん）の念をも忘れる程に懐かしい。どうか、ほんの暫くでいいから、我が醜悪な今の外形を厭（いと）わず、曾て君の友李徴であったこの自分と話を交してくれないだろうか。", "後で考えれば不思議だったが、その時、袁は、この超自然の怪異を、実に素直に受容（うけい）れて、少しも怪もうとしなかった。彼は部下に命じて行列の進行を停（と）め、自分は叢の傍（かたわら）に立って、見えざる声と対談した。都の噂（うわさ）、旧友の消息、袁  　が現在の地位、それに対する李徴の祝辞。青年時代に親しかった者同志の、あの隔てのない語調で、それ等（ら）が語られた後、袁  　は、李徴がどうして今の身となるに至ったかを訊（たず）ねた。草中の声は次のように語った。", "今から一年程前、自分が旅に出て汝水のほとりに泊った夜のこと、一睡してから、ふと眼（め）を覚ますと、戸外で誰かが我が名を呼んでいる。声に応じて外へ出て見ると、声は闇の中から頻（しき）りに自分を招く。覚えず、自分は声を追うて走り出した。無我夢中で駈けて行く中に、何時（いつ）しか途は山林に入り、しかも、知らぬ間に自分は左右の手で地を攫（つか）んで走っていた。何か身体（からだ）中に力が充（み）ち満ちたような感じで、軽々と岩石を跳び越えて行った。気が付くと、手先や肱（ひじ）のあたりに毛を生じているらしい。少し明るくなってから、谷川に臨んで姿を映して見ると、既に虎となっていた。自分は初め眼を信じなかった。次に、これは夢に違いないと考えた。夢の中で、これは夢だぞと知っているような夢を、自分はそれまでに見たことがあったから。どうしても夢でないと悟らねばならなかった時、自分は茫然（ぼうぜん）とした。そうして懼（おそ）れた。全く、どんな事でも起り得るのだと思うて、深く懼れた。しかし、何故こんな事になったのだろう。分らぬ。全く何事も我々には判（わか）らぬ。理由も分らずに押付けられたものを大人しく受取って、理由も分らずに生きて行くのが、我々生きもののさだめ［＃「さだめ」に傍点］だ。自分は直（す）ぐに死を想（おも）うた。しかし、その時、眼の前を一匹の兎（うさぎ）が駈け過ぎるのを見た途端に、自分の中の人間　は忽ち姿を消した。再び自分の中の人間　が目を覚ました時、自分の口は兎の血に塗（まみ）れ、あたりには兎の毛が散らばっていた。これが虎としての最初の経験であった。それ以来今までにどんな所行をし続けて来たか、それは到底語るに忍びない。ただ、一日の中に必ず数時間は、人間の心が還（かえ）って来る。そういう時には、曾ての日と同じく、人語も操（あやつ）れれば、複雑な思考にも堪え得るし、経書（けいしょ）の章句を誦（そら）んずることも出来る。その人間の心で、虎としての己（おのれ）の残虐（ざんぎゃく）な行（おこない）のあとを見、己の運命をふりかえる時が、最も情なく、恐しく、憤（いきどお）ろしい。しかし、その、人間にかえる数時間も、日を経るに従って次第に短くなって行く。今までは、どうして虎などになったかと怪しんでいたのに、この間ひょいと気が付いて見たら、己（おれ）はどうして以前、人間だったのかと考えていた。これは恐しいことだ。今少し経（た）てば、己（おれ）の中の人間の心は、獣としての習慣の中にすっかり埋（うも）れて消えて了（しま）うだろう。ちょうど、古い宮殿の礎（いしずえ）が次第に土砂に埋没するように。そうすれば、しまいに己は自分の過去を忘れ果て、一匹の虎として狂い廻り、今日のように途で君と出会っても故人（とも）と認めることなく、君を裂き喰（くろ）うて何の悔も感じないだろう。一体、獣でも人間でも、もとは何か他（ほか）のものだったんだろう。初めはそれを憶えているが、次第に忘れて了い、初めから今の形のものだったと思い込んでいるのではないか？　いや、そんな事はどうでもいい。己の中の人間の心がすっかり消えて了えば、恐らく、その方が、己はしあわせになれるだろう。だのに、己の中の人間は、その事を、この上なく恐しく感じているのだ。ああ、全く、どんなに、恐しく、哀（かな）しく、切なく思っているだろう！　己が人間だった記憶のなくなることを。この気持は誰にも分らない。誰にも分らない。己と同じ身の上に成った者でなければ。ところで、そうだ。己がすっかり人間でなくなって了う前に、一つ頼んで置きたいことがある。", "袁  　はじめ一行は、息をのんで、叢中（そうちゅう）の声の語る不思議に聞入っていた。声は続けて言う。", "他でもない。自分は元来詩人として名を成す積りでいた。しかも、業未（いま）だ成らざるに、この運命に立至った。曾て作るところの詩数百篇（ぺん）、固（もと）より、まだ世に行われておらぬ。遺稿の所在も最早（もはや）判らなくなっていよう。ところで、その中、今も尚（なお）記誦（きしょう）せるものが数十ある。これを我が為（ため）に伝録して戴（いただ）きたいのだ。何も、これに仍（よ）って一人前の詩人面（づら）をしたいのではない。作の巧拙は知らず、とにかく、産を破り心を狂わせてまで自分が生涯（しょうがい）それに執着したところのものを、一部なりとも後代に伝えないでは、死んでも死に切れないのだ。", "袁  　は部下に命じ、筆を執って叢中の声に随（したが）って書きとらせた。李徴の声は叢の中から朗々と響いた。長短凡（およ）そ三十篇、格調高雅、意趣卓逸、一読して作者の才の非凡を思わせるものばかりである。しかし、袁  　は感嘆しながらも漠然（ばくぜん）と次のように感じていた。成程（なるほど）、作者の素質が第一流に属するものであることは疑いない。しかし、このままでは、第一流の作品となるのには、何処（どこ）か（非常に微妙な点に於（おい）て）欠けるところがあるのではないか、と。", "旧詩を吐き終った李徴の声は、突然調子を変え、自らを嘲（あざけ）るか如（ごと）くに言った。", "羞（はずか）しいことだが、今でも、こんなあさましい［＃「あさましい」に傍点］身と成り果てた今でも、己（おれ）は、己の詩集が長安（ちょうあん）風流人士の机の上に置かれている様を、夢に見ることがあるのだ。岩窟（がんくつ）の中に横たわって見る夢にだよ。嗤（わら）ってくれ。詩人に成りそこなって虎になった哀れな男を。（袁  　は昔の青年李徴の自嘲癖（じちょうへき）を思出しながら、哀しく聞いていた。）そうだ。お笑い草ついでに、今の懐（おもい）を即席の詩に述べて見ようか。この虎の中に、まだ、曾ての李徴が生きているしるしに。", "袁  　は又下吏に命じてこれを書きとらせた。その詩に言う。", "偶因狂疾成殊類　災患相仍不可逃", "今日爪牙誰敢敵　当時声跡共相高", "我為異物蓬茅下　君已乗　気勢豪", "此夕渓山対明月　不成長嘯但成", "時に、残月、光冷（ひや）やかに、白露は地に滋（しげ）く、樹間を渡る冷風は既に暁の近きを告げていた。人々は最早、事の奇異を忘れ、粛然として、この詩人の薄倖（はっこう）を嘆じた。李徴の声は再び続ける。", "何故（なぜ）こんな運命になったか判らぬと、先刻は言ったが、しかし、考えように依（よ）れば、思い当ることが全然ないでもない。人間であった時、己（おれ）は努めて人との交（まじわり）を避けた。人々は己を倨傲（きょごう）だ、尊大だといった。実は、それが殆（ほとん）ど羞恥心（しゅうちしん）に近いものであることを、人々は知らなかった。勿論（もちろん）、曾ての郷党（きょうとう）の鬼才といわれた自分に、自尊心が無かったとは云（い）わない。しかし、それは臆病（おくびょう）な自尊心とでもいうべきものであった。己は詩によって名を成そうと思いながら、進んで師に就いたり、求めて詩友と交って切磋琢磨（せっさたくま）に努めたりすることをしなかった。かといって、又、己は俗物の間に伍（ご）することも潔（いさぎよ）しとしなかった。共に、我が臆病な自尊心と、尊大な羞恥心との所為（せい）である。己（おのれ）の珠（たま）に非（あら）ざることを惧（おそ）れるが故（ゆえ）に、敢（あえ）て刻苦して磨（みが）こうともせず、又、己の珠なるべきを半ば信ずるが故に、碌々（ろくろく）として瓦（かわら）に伍することも出来なかった。己（おれ）は次第に世と離れ、人と遠ざかり、憤悶（ふんもん）と慙恚（ざんい）とによって益々（ますます）己（おのれ）の内なる臆病な自尊心を飼いふとらせる［＃「ふとらせる」に傍点］結果になった。人間は誰でも猛獣使であり、その猛獣に当るのが、各人の性情だという。己（おれ）の場合、この尊大な羞恥心が猛獣だった。虎だったのだ。これが己を損い、妻子を苦しめ、友人を傷つけ、果ては、己の外形をかくの如く、内心にふさわしいものに変えて了ったのだ。今思えば、全く、己は、己の有（も）っていた僅（わず）かばかりの才能を空費して了った訳だ。人生は何事をも為（な）さぬには余りに長いが、何事かを為すには余りに短いなどと口先ばかりの警句を弄（ろう）しながら、事実は、才能の不足を暴露（ばくろ）するかも知れないとの卑怯（ひきょう）な危惧（きぐ）と、刻苦を厭（いと）う怠惰とが己の凡（すべ）てだったのだ。己よりも遥かに乏しい才能でありながら、それを専一に磨いたがために、堂々たる詩家となった者が幾らでもいるのだ。虎と成り果てた今、己は漸（ようや）くそれに気が付いた。それを思うと、己は今も胸を灼（や）かれるような悔を感じる。己には最早人間としての生活は出来ない。たとえ、今、己が頭の中で、どんな優れた詩を作ったにしたところで、どういう手段で発表できよう。まして、己の頭は日毎（ひごと）に虎に近づいて行く。どうすればいいのだ。己の空費された過去は？　己は堪（たま）らなくなる。そういう時、己は、向うの山の頂の巖（いわ）に上り、空谷（くうこく）に向って吼（ほ）える。この胸を灼く悲しみを誰かに訴えたいのだ。己は昨夕も、彼処（あそこ）で月に向って咆（ほ）えた。誰かにこの苦しみが分って貰（もら）えないかと。しかし、獣どもは己の声を聞いて、唯（ただ）、懼（おそ）れ、ひれ伏すばかり。山も樹（き）も月も露も、一匹の虎が怒り狂って、哮（たけ）っているとしか考えない。天に躍り地に伏して嘆いても、誰一人己の気持を分ってくれる者はない。ちょうど、人間だった頃、己の傷つき易（やす）い内心を誰も理解してくれなかったように。己の毛皮の濡（ぬ）れたのは、夜露のためばかりではない。", "漸く四辺（あたり）の暗さが薄らいで来た。木の間を伝って、何処（どこ）からか、暁角（ぎょうかく）が哀しげに響き始めた。", "最早、別れを告げねばならぬ。酔わねばならぬ時が、（虎に還らねばならぬ時が）近づいたから、と、李徴の声が言った。だが、お別れする前にもう一つ頼みがある。それは我が妻子のことだ。彼等（かれら）は未（ま）だ「（かくりゃく）にいる。固より、己の運命に就いては知る筈（はず）がない。君が南から帰ったら、己は既に死んだと彼等に告げて貰えないだろうか。決して今日のことだけは明かさないで欲しい。厚かましいお願だが、彼等の孤弱を憐（あわ）れんで、今後とも道塗（どうと）に飢凍（きとう）することのないように計らって戴けるならば、自分にとって、恩倖（おんこう）、これに過ぎたるは莫（な）い。", "言終って、叢中から慟哭（どうこく）の声が聞えた。袁もまた涙を泛（うか）べ、欣（よろこ）んで李徴の意に副（そ）いたい旨（むね）を答えた。李徴の声はしかし忽（たちま）ち又先刻の自嘲的な調子に戻（もど）って、言った。", "本当は、先（ま）ず、この事の方を先にお願いすべきだったのだ、己が人間だったなら。飢え凍えようとする妻子のことよりも、己（おのれ）の乏しい詩業の方を気にかけているような男だから、こんな獣に身を堕（おと）すのだ。", "そうして、附加（つけくわ）えて言うことに、袁  　が嶺南からの帰途には決してこの途（みち）を通らないで欲しい、その時には自分が酔っていて故人（とも）を認めずに襲いかかるかも知れないから。又、今別れてから、前方百歩の所にある、あの丘に上ったら、此方（こちら）を振りかえって見て貰いたい。自分は今の姿をもう一度お目に掛けよう。勇に誇ろうとしてではない。我が醜悪な姿を示して、以（もっ）て、再び此処（ここ）を過ぎて自分に会おうとの気持を君に起させない為であると。", "袁  　は叢に向って、懇（ねんご）ろに別れの言葉を述べ、馬に上った。叢の中からは、又、堪（た）え得ざるが如き悲泣（ひきゅう）の声が洩（も）れた。袁  　も幾度か叢を振返りながら、涙の中に出発した。", "一行が丘の上についた時、彼等は、言われた通りに振返って、先程の林間の草地を眺（なが）めた。忽ち、一匹の虎が草の茂みから道の上に躍り出たのを彼等は見た。虎は、既に白く光を失った月を仰いで、二声三声咆哮（ほうこう）したかと思うと、又、元の叢に躍り入って、再びその姿を見なかった。"]}, {"no": 21, "title": "三国志", "author": "吉川 英治", "category": "日本文学-歴史", "chars": 1659, "volume": "小", "paras": ["吉川英治", "三国志は、いうまでもなく、今から約千八百年前の古典であるが、三国志の中に活躍している登場人物は、現在でも中国大陸の至る所にそのまま居るような気がする。――中国大陸へ行って、そこの雑多な庶民や要人などに接し、特に親しんでみると、三国志の中に出て来る人物の誰かしらときっと似ている。或いは、共通したものを感じる場合がしばしばある。", "だから、現代の中国大陸には、三国志時代の治乱興亡（ちらんこうぼう）がそのままあるし、作中の人物も、文化や姿こそ変っているが、なお、今日にも生きているといっても過言でない。", "三国志には、詩がある。", "単に尨大（ぼうだい）な治乱興亡を記述した戦記軍談の類（たぐい）でない所に、東洋人の血を大きく搏（う）つ一種の諧調（かいちょう）と音楽と色彩とがある。", "三国志から詩を除いてしまったら、世界的といわれる大構想の価値もよほど無味乾燥なものになろう。", "故に、三国志は、強（し）いて簡略にしたり抄訳（しょうやく）したものでは、大事な詩味も逸（いっ）してしまうし、もっと重要な人の胸底を搏つものを失（な）くしてしまうおそれがある。", "で私は、簡訳や抄略をあえてせずに、長篇執筆に適当な新聞小説にこれを試みた。そして劉玄徳（りゅうげんとく）とか、曹操（そうそう）とか関羽（かんう）、張飛（ちょうひ）そのほか、主要人物などには、自分の解釈や創意をも加えて書いた。随所、原本にない辞句、会話なども、わたくしの点描（てんびょう）である。", "いうまでもなく三国志は、中国の歴史に取材しているが、正史ではない。けれど史中の人物を巧妙自在に拉（らっ）して活躍させ、後漢（ごかん）の第十二代霊帝の代（わが朝（ちょう）の成務天皇の御世、西暦百六十八年頃）から、武帝が呉を亡ぼす太康元年までのおよそ百十二年間の長期にわたる治乱が書いてある。構想の雄大と、舞台の地域の広さは、世界の古典小説中でも比類ないものといわれている。登場人物なども、審（つまび）らかに数えたなら何千何万人にものぼるであろう。しかも、これに加うるに中国一流の華麗豪壮な調（ちょう）と、哀婉（あいえん）切々の情、悲歌慷慨（こうがい）の辞句と、誇張幽幻な趣と、拍案（はくあん）三嘆（たん）の熱とを以て縷述（るじゅつ）されてあるので、読む者をして百年の地上に明滅する種々雑多な人間の浮沈と文化の興亡とを、一巻に偲ばせて、転（うたた）深思（しんし）の感慨に耽（ふけ）らしめる魅力がある。", "見方によれば三国志は、一つの民俗小説ともいえる。三国志の中に見られる人間の愛欲、道徳、宗教、その生活、また、主題たる戦争行為だとか群雄割拠（ぐんゆうかっきょ）の状などは、さながら彩（いろど）られた彼の民俗絵巻でもあり、その生々動流（せいせいどうりゅう）する相（すがた）は、天地間を舞台として、壮大なる音楽に伴って演技された人類の大演劇（だいドラマ）とも観られるのである。", "現在の地名と、原本（げんぽん）の誌（しる）す地名とは、当然時代による異（ちが）いがあるので、分っている地方は下に註を加えておいた。分らない旧名もかなりある。また、登場人物の爵位官職など、ほぼ文字で推察のつきそうなのはそのまま用いた。あまりに現代語化しすぎると、その文字の持っている特有な色彩や感覚を失ってしまうからである。", "原本には「通俗三国志」「三国志演義」その他数種あるが、私はそのいずれの直訳にもよらないで、随時、長所を択（と）って、わたくし流に書いた。これを書きながら思い出されるのは、少年の頃、久保天随氏の演義三国志を熱読して、三更（こう）四更（こう）まで燈下にしがみついていては、父に寝ろ寝ろといって叱られたことである。本来、三国志の真味を酌（く）むにはこの原書を読むに如（し）くはないのであるが、今日の読者にその難渋（なんじゅう）は耐え得ぬことだし、また、一般の求める目的も意義も、大いに異（ちが）うはずなので、あえて書肆（しょし）の希望にまかせて再訂上梓（じょうし）することにした。", "著者"]}, {"no": 22, "title": "詩集（月に吠える）", "author": "萩原朔太郎", "category": "日本文学-詩　絵本", "chars": 23104, "volume": "大", "paras": ["序", "萩原君。", "何といっても私は君を愛する。そうして室生君を。それは何といっても素直な優しい愛だ。いつまでもそれは永続するもので、いつでも同じ温かさを保ってゆかれる愛だ。この三人の生命を通じ、縦(よ)しそこにそれぞれ天稟の相違はあっても、何といってもおのずからひとつ流の交感がある。私は君達を思う時、いつでも同じ泉の底から更に新らしく湧き出してくる水の清(すず)しさを感ずる。限りなき親しさと驚きの眼をもって私は君達のよろこびとかなしみとを理会する。そうして以心伝心に同じ哀憐の情が三人の上に益々深められてゆくのを感ずる。それは互の胸の奥底に直接に互の手を触れ得るたった一つの尊いものである。", "私は君をよく知っている。そうして室生君を。そうして君達の詩とその詩の生ひたちとをよく知っている。『朱欒』のむかしから親しく君達は私に君達の心を開いてくれた。いい意味においてその後もわれわれの心の交流は常住新鮮であった。恐らく今後においても。それは回り澄む三つの独楽が今や将に相触れむとする刹那の静謐である。そこには限りの知られぬおののきがある。無論三つの生命は確実に三つの据りを保っていなければならぬ。しかるのちにそれぞれ澄みきるのである。微妙な接吻がそののちに来(く)る。同じ単純と誠実とをもって。しかも互の動悸を聴きわけるほどの澄徹さをもって。幸に君達の生命も玲瓏乎としている。", "室生君と同じく君もまた生れた詩人の一人である事は誰も否むわけにはゆくまい。私は信ずる。そうして君の異常な神経と感情の所有者である事も。例えばそれは憂鬱な香水に深く涵した剃刀である。しかもその予覚は常に来る可き悲劇に向て顫へている。しかしそれは恐らく凶悪自身の為に使用されるというよりも、凶悪に対する自衛、若くは自分自身に向けらるる懴悔の刃となる種類のものである。なぜならば、君の感情は恐怖の一刹那において、正(まさ)しく君の肋骨の一本一本をも数へ得るほどの鋭さを持っているからだ。", "しかしこの剃刀は幾分君の好奇な趣味性に匂づけられている事もほんとうである。時には安らかにそれでもって君は君の薄い髯を当(あた)る。", "清純な凄さ、それは君の詩を読むものの誰しも認め得る特色であろう。しかしそれは室生君のいう通り、ポオやボオドレエルの凄さとは違う。君は寂しい、君は正直で、清楚で、透明で、もっと細かにぴちぴち動く。少くとも彼等の絶望的な暗さや退廃した幻覚の魔睡はない。宛然凉しい水銀の鏡に映る剃刀の閃めきである。その鏡に映るものは真実である。そしてそこには玻璃製の上品な市街や青空やが映る。そうして恐る可き殺人事件が突如として映ったり、素敵に気の利いた探偵が走ったりする。", "君の気稟はまた例えば地面に直角に立つ一本の竹である。その細い幹は鮮かな青緑で、その葉は華奢(きやしや)でこまかに動く。たった一本の竹、竹は天を直観する。しかもこの竹の感情は凡てその根に沈潜して行くのである。根の根の細(こま)かな繊毛のその岐れのほとんど有るかなきかの毛の先(さき)のイルミネエション、それがセンチメンタリズムの極致とすれば、その毛の先端にかじりついて泣く男、それは病気の朔太郎である。それは君も認めている。", "「詩は神秘でも象徴でも何でもない。詩はただ病める魂の所有者と孤独者との寂しい慰めである。」と君はいう。まことに君が一本の竹は水面にうつる己が影を神秘とし象徴として不思議がる以前に、ほんとうの竹、ほんとうの自分自身を切に痛感するであろう。鮮純なリズムの歔欷(すすりなき)はそこから来(く)る。そうしてその葉その根の先(さき)まで光り出す。", "君の霊魂は私の知っている限りまさしく蒼い顔をしていた。ほとんど病み暮らしてばかりいるように見えた。しかしそれは真珠貝の生身(なまみ)が一顆小砂に擦(す)られる痛さである。痛みが突きつめれば突きつめるほど小砂は真珠になる。それがほんとうの生身(なまみ)であり、生身から滴(したた)らす粘液がほんとうの苦しみからにじみ出たものである事は、君の詩が証明している。", "外面的に見た君も極めて痩せて先っている。そうしてその四肢(てあし)が常に鋭角に動く、まさしく竹の感覚である。しかも突如として電流体の感情が頭から足の爪先まで震はす時、君はぴよんぴよん跳ねる。そうでない時の君はいつも眼から涙がこぼれ落ちそうで、何かに縋りつきたい風である。", "潔癖で我ままなお坊つちゃんで（この点は私とよく似ている）その癖寂しがりの、いつも白い神経を露はに顫へさしている人だ。それは電流の来ぬ前の電球のガラスの中の顫へてやまぬ竹の線である。", "君の電流体の感情はあらゆる液体を固体に凝結せずんばやまない。竹の葉の水気が集って一滴の露となり、腐れた酒の蒸気が冷(つめ)たいランビキの玻璃に透明な酒精の雫を形づくる迄のそれ自身の洗練はかりそめのものではない。君のセンチメンタリズムの信条はまさしく木炭が金剛石になるまでの永い永い時の長さを、一瞬の間に縮める、この凝念の強さであろう。摩訶不思議なるこの真言の秘密はただ詩人のみが知る。", "月に吠える、それは正しく君の悲しい心である。冬になって私のところの白い小犬もいよいよ吠える。昼のうちは空に一羽の雀が啼いても吠える。夜はなおさらきらきらと霜が下りる。霜の下りる声まで嗅ぎ知って吠える。天を仰ぎ、真実に地面(ぢべた)に生きているものは悲しい。", "ぴようぴようと吠える、何かがぴようぴようと吠える。聴いていてさえも身の痺れるような寂しい遣瀬ない声、その声が今夜も向うの竹林を透してきこえる。降り注ぐものは新鮮な竹の葉に雪のごとく結晶し、君を思えば蒼白い月天がいつもその上にかかる。", "萩原君。", "何といっても私は君を愛する。そうして室生君を。君は私より二つ年下で、室生君は君よりまた二つ年下である。私は私より少しでも年若く、私より更に新らしく生れて来た二つの相似た霊魂の為めに祝福し、更に甚深な肉親の交歓に酔う。", "また更に君と室生君との芸術上の熱愛を思うと涙が流れる。君の歓びは室生君の歓びである。そうしてまた私の歓びである。", "この機会を利用して、私は更に君に賛嘆の辞を贈る。", "大正六年一月十日", "葛飾の紫煙草舎にて", "北原白秋", "序", "詩の表現の目的は単に情調のための情調を表現することではない。幻覚のための幻覚を描くことでもない。同時にまたある種の思想を宣伝演繹することのためでもない。詩の本来の目的はむしろそれらの者を通じて、人心の内部に顫動する所の感情そのものの本質を凝視し、かつ感情をさかんに流露させることである。", "詩とは感情の神経を掴んだものである。生きて働く心理学である。", "すべてのよい叙情詩には、理屈や言葉で説明することのできない一種の美感が伴う。これを詩のにおいという。（人によっては気韻とか気稟とかいう）においは詩の主眼とする陶酔的気分の要素である。順つてこのにおいの希薄な詩は韻文としての価値のすくないものであって、言わば香味を欠いた酒のようなものである。こういう酒を私は好まない。", "詩の表現は素樸なれ、詩のにおいは芳純でありたい。", "私の詩の読者にのぞむ所は、詩の表面に表われた概念や「ことがら」ではなくして、内部の核心である感情そのものに感触してもらいたいことである。私の心の「かなしみ」「よろこび」「さびしみ」「おそれ」その他言葉や文章では言い現わしがたい複雑した特種の感情を、私は自分の詩のリズムによって表現する。しかしリズムは説明ではない。リズムは以心伝心である。そのリズムを無言で感知することのできる人とのみ、私は手をとって語り合うことができる。", "『どういうわけでうれしい？』という質問に対して人は容易にその理由を説明することができる。けれども『どういう具合にうれしい』という問に対しては何人(ぴと)もたやすくその心理を説明することはできない。", "思うに人間の感情というものは、極めて単純であって、同時に極めて複雑したものである。極めて普遍性のものであって、同時に極めて個性的な特異なものである。", "どんな場合にも、人が自己の感情を完全に表現しようと思ったら、それは容易のわざではない。この場合には言葉は何の役にもたたない。そこには音楽と詩があるばかりである。", "私はときどき不幸な狂水病者のことを考える。", "あの病気にかかった人間は非常に水を恐れるということだ。コップに盛った一杯の水が絶息するほど恐ろしいというようなことは、どんなにしても我々には想像のおよばないことである。", "『どういうわけで水が恐ろしい？』『どういう具合に水が恐ろしい？』これらの心理は、我々にとってはただ々不可思議千万のものというの外はない。けれどもあの患者にとってはそれが何よりも真実な事実なのである。そしてこの場合にもしその患者自身が……何等かの必要に迫られて……この苦しい実感を傍人に向って説明しようと試みるならば（それはずいぶん有りそうに思われることだ。もし傍人がこの病気について特種の知識をもたなかった場合には彼に対してどんな惨酷な悪戯が行われないとも限らない。こんな場合を考えると私は戦慄せずにはいられない。）患者自身はどんな手段をとるべきであろう。恐らくはどのような言葉の説明をもってしても、この奇異な感情を表現することはできないであろう。", "けれども、もし彼に詩人としての才能があったら、もちろん彼は詩を作るにちがいない。詩は人間の言葉で説明することのできないものまでも説明する。詩は言葉以上の言葉である。", "狂水病者の例は極めて特異の例である。けれどもまた同時に極めてありふれた例でもある。", "人間は一人一人にちがった肉体と、ちがった神経とをもっている。我のかなしみは彼のかなしみではない。彼のよろこびは我のよろこびではない。", "人は一人一人では、いつも永久に、永久に、恐ろしい孤独である。", "原始以来、神は幾億万人という人間を造った。けれども全く同じ顔の人間を、決して二人とは造りはしなかった。人はだれでも単位で生れて、永久に単位で死ななければならない。", "とはいえ、我々は決してぽつねんと切りはなされた宇宙の単位ではない。", "我々の顔は、我々の皮膚は、一人一人にみんな異っている。けれども、実際は一人一人にみんな同一のところをもっているのである。この共通［＃「共通」に傍点］を人間同志の間に発見するとき、人類間の『道徳』と『愛』とが生れるのである。この共通［＃「共通」に傍点］を人類と植物との間に発見するとき、自然間の『道徳』と『愛』とが生れるのである。そして我々はもはや永久に孤独ではない。", "私のこの肉体とこの感情とは、もちろん世界中で私一人しか所有していない。またそれを完全に理解している人も一人しかない。これは極めて極めて特異な性質をもったものである。けれども、それはまた同時に、世界中の何ぴとにも共通なものでなければならない。この特異にして共通なる個々の感情の焦点に、詩歌のほんとの『よろこび』と『秘密性』とが存在するのだ。この道理をはなれて、私は自ら詩を作る意義を知らない。", "詩は一瞬間における霊知の産物である。ふだんにもっている所のある種の感情が、電流体のごときものに触れて始めてリズムを発見する。この電流体は詩人にとっては奇跡である。詩は予期して作らるべき者ではない。", "以前、私は詩というものを神秘のように考えていた。ある霊妙な宇宙の聖霊と人間の英知との交霊作用のようにも考えていた。あるいはまた不可思議な自然の謎を解くための鍵のようにも思っていた。しかし今から思うと、それは笑うべき迷信であった。", "詩とは、決してそんな奇怪な鬼のようなものではなく、実はかえって我々とは親しみ易い兄妹や愛人のようなものである。", "私どもは時々、不具な子供のようないぢらしい心で、部屋の暗い片隅にすすり泣きをする。そういう時、ぴったりと肩により添いながら、ふるえる自分の心臓の上に、やさしい手をおいてくれる乙女がある。その看護婦の乙女が詩である。", "私は詩を思うと、烈しい人間のなやみ［＃「なやみ」に傍点］とそのよろこび［＃「よろこび」に傍点］とをかんずる。", "詩は神秘でも象徴でも鬼でもない。詩はただ、病める魂の所有者と孤独者との寂しいなぐさめである。", "詩を思うとき、私は人情のいぢらしさに自然と涙ぐましくなる。", "過去は私にとって苦しい思い出である。過去は焦燥と無為と悩める心肉との不吉な悪夢であった。", "月に吠える犬は、自分の影に怪しみ恐れて吠えるのである。疾患する犬の心に、月は青白い幽霊のような不吉の謎である。犬は遠吠えをする。", "私は私自身の陰鬱な影を、月夜の地上に釘づけにしてしまいたい。影が、永久に私のあとを追って来ないように。", "萩原朔太郎", "詩集例言", "一、過去三年以来の創作九十余篇中より叙情詩五十五篇、及び長篇詩篇二篇を選びてこの集に納む。集中の詩篇は主として「地上巡礼」「詩歌」「アルス」「卓上噴水」「プリズム」「感情」及び一、二の地方雑誌に掲載した者の中から抜粋した。その他、機会がなくて創作当時発表することのできなかったもの数篇を加えた。詩稿はこの集に納めるについて概ね推敲を加えた。", "一、詩篇の排列順序は必ずしも正確な創作年順を追ってはいない。けれども大体においては旧稿からはじめて新作に終っている。即ち「竹とその哀傷」「雲雀料理」最も古く、「悲しい月夜」これに次ぎ、「くさった蛤」「さびしい情欲」等は大抵同年代の作である。而して「見知らぬ犬」と「長詩二篇」とは比較的最近の作に属す。", "一、極めて初期の作で「ザムボア」「創作」等に発表した小曲風のもの、及び「異端」「水甕」「アララギ」「風景」等に発表した二、三の作はこの集では割愛することにした。詩風の関係から詩集の感じの統一を保っためである。", "すべて初期に属する詩篇は作者にとってはなつかしいものである。それらは機会をみて別の集にまとめることにする。", "一、この詩集の装丁については、以前著者から田中恭吉氏にお願いして氏の意匠を煩わしたのである。所が不幸にしてこの仕事が完成しない中に田中氏は病死してしまった。そこで改めて恩地孝氏にたのんで著者のために田中氏の遺志を次いでもらうことにしたのである。恩地氏は田中氏とは生前無二の親友であったのみならず、その芸術上の信念を共にすることにおいて田中氏とは唯一の知己であったからである。（なお、本集の画については巻末の付録「画付言」を参照してもらいたい。）", "一、詩集出版に関して恩地孝氏と前田夕暮氏とには色々な方面から一方ならぬ迷惑をかけている。二兄の深甚なる好意に対しては深く感謝の意を表する次第である。", "一、集中二、三の旧作は目下の著者の芸術的信念や思想の上から見て飽き足らないものである。しかしそれらの詩篇も過去の道程の記念として貴重なものであるので特に採篇したのである。", "再版の序", "この詩集の初版は大正六年に出版された。自費の負担で僅かに五百部ほど印刷し、内四百部ほど市場に出したがその年の中に売り切れてしまった。その後今日に到るまでかなり長い間絶版になっていた。私はこれをそのままで絶版にしておこうかと思った。これはこの詩集に珍貴な値を求めたいという物好きな心からであった。", "しかし私の詩の愛好者は、私が当初に予期したよりも遥かに多数であり且つ熱心でさえあった。最初市場に出した少数の詩集は、人々によって手から手へ譲られ奪いあひの有様となった。古本屋は法外の高価でそれを皆に売りつけていた。（古本の時価は最初の定価の五倍にもなっていた。）私の許へは幾通となく未知の人々から手紙が来た。どうにしても再版を出してくれという督促の書簡である。", "すべてそれらの人々の熱心な要求に対し、私はいつも心苦しい思いをしなければならなかった。やがて私は自分のつまらぬ物好きを後悔するようになった。そんなにも多数の人々によって示された自分への切実の愛を裏切りたくなくなった。自分は再版の意を決した。しかも私の骨に徹する怠惰癖と物臭さ根性とは、書肆との交渉をはなはだ煩わしいものに考えてしまった。そしておよそこの等の理由からして、今日まで長い間この詩集が絶版となっていたのである。", "顧みれば詩壇は急調の変化をした。この詩集の初版が初めて世に出た時の詩壇と今日の詩壇とは、何という著しい相違であろう。始め私は、友人室生犀星と結んで人魚詩社を起し次に感情詩社を設立した。その頃の私等を考えると我ながら情ない次第である。当時の文壇において「詩」は文芸の仲間に入れられなかった。稿料を払って詩を掲載するような雑誌はどこにもなかった。もちろんこの事実は、詩というものが極めて特殊なものであって、一般的の読者を殆んど持たなかったことに基因する。我々の詩が、なぜそんなに民衆から遠ざかっていたか。そこには色々な理由があろう。しかしその最も主なる理由は、時代が久しく自然主義の美学によって誤まられ、叙情的な一切の感情を排斥したことに原因する。然り、そしてそこにはもちろん真の時代的叙情詩が発生しなかったことも原因である。我々の芸術は日本語の純真性を失っていた。言い代えれば日本的な感情――時代の求めている日本的な感情――が、皮相なる翻訳詩の西洋模倣によって光輝を汚されていた。我が国の詩人らはリズムを失っていた。かかる芸術は特殊なペダンチズムに属するであろう。そこには「気取り」を悦ぶ一階級の趣味が満足される。そして一般公衆の生活はこれに関与されないのである。", "ともあれ当時の詩壇はかような薄命の状態にあった。詩は公衆から顧みられず、文壇は詩を犬小舎の隅に廃棄してしまった。されば私等の仕事には、ある根本的な力が［＃「ある根本的な力が」に傍点］要求された。私等の仕事は、正に荒寥たる地方における流刑囚の移民のごときものであった。私等はすべて［＃「すべて」に傍点］を開墾せねばならなかった。詳説すれば、すでにある一切の物を根本からくつがえして、新しき最初の土壌を地に盛りあげねばならなかった。即ち私等のした最初の行動は、徹頭徹尾「時流への反逆」であった。当時自然主義の文壇において最もひどく軽蔑された言葉は、実に「感情」という言葉の響であった。それ故私等は故意にその「呪われたる言葉」をとって詩社の標語とした。それは明白なる時流への反逆であり、併せて詩の新興を絶叫する最初の狼火(のろし)であったのだ。況んやまた詩の情想においても、表現においても、言葉においても、まるで私等のスタイルは当時の時流とちがっていた。むしろ私等は流行の裏を突破した［＃「流行の裏を突破した」に傍点］。そのため私等の創作は詩壇の正流から異端視され、衆俗からは様々の嘲笑と悪罵とを蒙つたほどである。", "しかるに幾程もなく時代の潮流は変向した。さしも暴威を振った自然主義の美学は、新しい浪漫主義の美学によって論駁されてしまった。今や廃れたる一切の情緒が出水のように溢れてきた。二度(ふたたび)我が叙情詩の時代が来た。一旦民衆によって閑却された詩は、更にまた彼等の生活にまで帰って来た。しかも之より先、我等の雑誌『感情』は詩壇の標準時計となっていた。主義においても、内容においても、殆んど全然『感情』を標準にしたところのパンフレットが続々として後から後から刊行された。正に感情型雑誌の発行は詩壇の一流行であった。なお且つ私等の詩風は詩壇の「時代的流行」にまでなってしまった。先には反時代的な詩風であり、珍奇な異端的なものであった私等の詩のスタイルは、今日では最も有りふれた一般的な詩風となり、正にそれが時代の流行を示す通俗のスタイルとまでなってしまっている。げにやこの所数年の間に、我が国の詩壇は驚くべき変化をした。すべてが面目を一新した。そしてすべてが私の「予感の実証」として現実されている。", "されば私の詩集『月に吠える』――それは感情詩社の記念事業である――は、正に今日の詩壇を予感した最初の黎明であったにちがいない。およそこの詩集以前にこうしたスタイルの口語詩は一つもなく、この詩集以前に今日のごとき発剌たる詩壇の気運は感じられなかった。すべての新しき詩のスタイルはこの所から発生されて来た。すべての時代的な叙情詩のリズムはこの所から生まれて来た。即ちこの詩集によって、正に時代は一つのエポックを作ったのである。げにそれは夜明けんとする時の最初の鶏鳴であった。――そして、実に私はこの詩集に対する最大の自信がこの所にある。", "千九百二十二年二月", "著者", "竹とその哀傷", "地面の底の病気の顔", "地面の底に顔があらわれ、", "さみしい病人の顔があらわれ。", "地面の底のくらやみに、", "うらうら草の茎が萌えそめ、", "鼠の巣が萌えそめ、", "巣にこんがらかっている、", "かずしれぬ髪の毛がふるえ出し、", "冬至のころの、", "さびしい病気の地面から、", "ほそい青竹の根が生えそめ、", "生えそめ、", "それがじつにあわれふかくみえ、", "けぶれるごとくに視え、", "じつに、じつに、あはれふかげに視え。", "地面の底のくらやみに、", "さみしい病人の顔があらわれ。", "草の茎", "冬のさむさに、", "ほそき毛をもてつつまれし、", "草の茎をみよや、", "あをらみ茎はさみしげなれども、", "いちめんにうすき毛をもてつつまれし、", "草の茎をみよや。", "雪もよひする空のかなたに、", "草の茎はもえいづる。", "竹", "ますぐなるもの地面に生え、", "するどき青きもの地面に生え、", "凍れる冬をつらぬきて、", "そのみどり葉光る朝の空路に、", "なみだたれ、", "なみだをたれ、", "いまはや懴悔をはれる肩の上より、", "けぶれる竹の根はひろごり、", "するどき青きもの地面に生え。", "竹", "光る地面に竹が生え、", "青竹が生え、", "地下には竹の根が生え、", "根がしだいにほそらみ、", "根の先より繊毛が生え、", "かすかにけぶる繊毛が生え、", "かすかにふるえ。", "かたき地面に竹が生え、", "地上にするどく竹が生え、", "まつしぐらに竹が生え、", "凍れる節節りんりんと、", "青空のもとに竹が生え、", "竹、竹、竹が生え。", "みよすべての罪はしるされたり、", "されどすべては我にあらざりき、", "まことにわれに現はれしは、", "かげなき青き炎の幻影のみ、", "雪の上に消えさる哀傷の幽霊のみ、", "ああかかる日のせつなる懴悔をも何かせむ、", "すべては青きほのほの幻影のみ。", "すえたる菊", "その菊は酢え、", "その菊はいたみしたたる、", "あはれあれ霜つきはじめ、", "わがぷらちなの手はしなへ、", "するどく指をとがらして、", "菊をつまむとねがうより、", "その菊をばつむことなかれとて、", "かがやく天の一方に、", "菊は病み、", "饐(す)えたる菊はいたみたる。", "亀", "林あり、", "沼あり、", "蒼天あり、", "ひとの手にはおもみを感じ", "しづかに純金の亀ねむる、", "この光る、", "寂しき自然のいたみにたえ、", "ひとの心霊(こころ)にまさぐりしずむ、", "亀は蒼天のふかみにしずむ。", "笛", "あおげば高き松が枝に琴かけ鳴らす、", "をゆびに紅をさしぐみて、", "ふくめる琴をかきならす、", "ああ　かき鳴らすひとづま琴の音にもつれぶき、", "いみじき笛は天にあり。", "きょうの霜夜の空に冴え冴え、", "松の梢を光らして、", "かなしむものの一念に、", "懴悔の姿をあらわしぬ。", "いみじき笛は天にあり。", "冬", "つみとがのしるし天にあらわれ、", "ふりつむ雪のうえにあらわれ、", "木木の梢にかがやきいで、", "ま冬をこえて光るがに、", "おかせる罪のしるしよもに現われぬ。", "みよや眠れる、", "くらき土壌にいきものは、", "懴悔の家をぞ建てそめし。", "天上縊死", "遠夜に光る松の葉に、", "懴悔の涙したたりて、", "遠夜の空にしも白ろき、", "天上の松に首をかけ。", "天上の松を恋うるより、", "祈れるさまに吊されぬ。", "卵", "いと高き梢にありて、", "ちいさなる卵ら光り、", "あおげば小鳥の巣は光り、", "いまはや罪びとの祈るときなる。", "雲雀料理", "五月の朝の新緑と薫風は私の生活を貴族にする。したたる空色の窓の下で、私の愛する女と共に純銀のふおうくを動かしたい。私の生活にもいつかは一度、あの空に光る、雲雀料理の愛の皿を盗んで食べたい。", "感傷の手", "わが性のせんちめんたる、", "あまたある手をかなしむ、", "手はつねに頭上におどり、", "また胸にひかりさびしみしが、"
