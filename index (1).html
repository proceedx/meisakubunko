よ。しっぽがまるで箒（ほうき）のようだ。ぼくが行くと鼻（はな）を鳴らしてついてくるよ。ずうっと町の角（かど）までついてくる。もっとついてくることもあるよ。今夜はみんなで烏瓜（からすうり）のあかりを川へながしに行くんだって。きっと犬もついて行くよ」", "「そうだ。今晩（こんばん）は銀河（ぎんが）のお祭（まつ）りだねえ」", "「うん。ぼく牛乳（ぎゅうにゅう）をとりながら見てくるよ」", "「ああ行っておいで。川へははいらないでね」", "「ああぼく岸（きし）から見るだけなんだ。一時間で行ってくるよ」", "「もっと遊（あそ）んでおいで。カムパネルラさんといっしょなら心配（しんぱい）はないから」", "「ああきっといっしょだよ。お母さん、窓をしめておこうか」", "「ああ、どうか。もう涼（すず）しいからね」", "ジョバンニは立って窓（まど）をしめ、お皿（さら）やパンの袋（ふくろ）をかたづけると勢（いきお）いよく靴（くつ）をはいて、", "「では一時間半（はん）で帰ってくるよ」と言（い）いながら暗（くら）い戸口（とぐち）を出ました。", "四　ケンタウル祭（さい）の夜", "ジョバンニは、口笛（くちぶえ）を吹（ふ）いているようなさびしい口つきで、檜（ひのき）のまっ黒にならんだ町の坂（さか）をおりて来たのでした。", "坂（さか）の下に大きな一つの街燈（がいとう）が、青白く立派（りっぱ）に光って立っていました。ジョバンニが、どんどん電燈（でんとう）の方へおりて行きますと、いままでばけもののように、長くぼんやり、うしろへ引いていたジョバンニの影（かげ）ぼうしは、だんだん濃（こ）く黒くはっきりなって、足をあげたり手を振（ふ）ったり、ジョバンニの横（よこ）の方へまわって来るのでした。", "（ぼくは立派（りっぱ）な機関車（きかんしゃ）だ。ここは勾配（こうばい）だから速（はや）いぞ。ぼくはいまその電燈（でんとう）を通り越（こ）す。そうら、こんどはぼくの影法師（かげぼうし）はコンパスだ。あんなにくるっとまわって、前の方へ来た）", "とジョバンニが思いながら、大股（おおまた）にその街燈（がいとう）の下を通り過（す）ぎたとき、いきなりひるまのザネリが、新しいえりのとがったシャツを着（き）て、電燈（でんとう）の向（む）こう側（がわ）の暗（くら）い小路（こうじ）から出て来て、ひらっとジョバンニとすれちがいました。", "「ザネリ、烏瓜（からすうり）ながしに行くの」ジョバンニがまだそう言（い）ってしまわないうちに、", "「ジョバンニ、お父さんから、ラッコの上着（うわぎ）が来るよ」その子が投（な）げつけるようにうしろから叫（さけ）びました。", "ジョバンニは、ばっと胸（むね）がつめたくなり、そこらじゅうきいんと鳴るように思いました。", "「なんだい、ザネリ」とジョバンニは高く叫（さけ）び返（かえ）しましたが、もうザネリは向（む）こうのひばの植（う）わった家の中へはいっていました。", "（ザネリはどうしてぼくがなんにもしないのにあんなことを言（い）うのだろう。走るときはまるで鼠（ねずみ）のようなくせに。ぼくがなんにもしないのにあんなことを言（い）うのはザネリがばかなからだ）", "ジョバンニは、せわしくいろいろのことを考えながら、さまざまの灯（あかり）や木の枝（えだ）で、すっかりきれいに飾（かざ）られた街（まち）を通って行きました。時計屋（とけいや）の店には明るくネオン燈（とう）がついて、一秒（びょう）ごとに石でこさえたふくろうの赤い眼（め）が、くるっくるっとうごいたり、いろいろな宝石（ほうせき）が海のような色をした厚（あつ）い硝子（ガラス）の盤（ばん）に載（の）って、星のようにゆっくり循（めぐ）ったり、また向（む）こう側（がわ）から、銅（どう）の人馬がゆっくりこっちへまわって来たりするのでした。そのまん中にまるい黒い星座早見（せいざはやみ）が青いアスパラガスの葉（は）で飾（かざ）ってありました。", "ジョバンニはわれを忘（わす）れて、その星座（せいざ）の図に見入りました。", "それはひる学校で見たあの図よりはずうっと小さかったのですが、その日と時間に合わせて盤（ばん）をまわすと、そのとき出ているそらがそのまま楕円形（だえんけい）のなかにめぐってあらわれるようになっており、やはりそのまん中には上から下へかけて銀河（ぎんが）がぼうとけむったような帯（おび）になって、その下の方ではかすかに爆発（ばくはつ）して湯（ゆ）げでもあげているように見えるのでした。またそのうしろには三本の脚（あし）のついた小さな望遠鏡（ぼうえんきょう）が黄いろに光って立っていましたし、いちばんうしろの壁（かべ）には空じゅうの星座（せいざ）をふしぎな獣（けもの）や蛇（へび）や魚や瓶（びん）の形に書いた大きな図（ず）がかかっていました。ほんとうにこんなような蠍（さそり）だの勇士（ゆうし）だのそらにぎっしりいるだろうか、ああぼくはその中をどこまでも歩いてみたいと思ってたりしてしばらくぼんやり立っていました。", "それからにわかにお母さんの牛乳（ぎゅうにゅう）のことを思いだしてジョバンニはその店をはなれました。", "そしてきゅうくつな上着（うわぎ）の肩（かた）を気にしながら、それでもわざと胸（むね）を張（は）って大きく手を振（ふ）って町を通って行きました。", "空気は澄（す）みきって、まるで水のように通りや店の中を流（なが）れましたし、街燈（がいとう）はみなまっ青なもみや楢（なら）の枝（えだ）で包（つつ）まれ、電気会社の前の六本のプラタナスの木などは、中にたくさんの豆電燈（まめでんとう）がついて、ほんとうにそこらは人魚の都（みやこ）のように見えるのでした。子どもらは、みんな新しい折（おり）のついた着物（きもの）を着（き）て、星めぐりの口笛（くちぶえ）を吹（ふ）いたり、", "「ケンタウルス、露（つゆ）をふらせ」と叫（さけ）んで走ったり、青いマグネシヤの花火を燃（も）したりして、たのしそうに遊（あそ）んでいるのでした。けれどもジョバンニは、いつかまた深（ふか）く首（くび）をたれて、そこらのにぎやかさとはまるでちがったことを考えながら、牛乳屋（ぎゅうにゅうや）の方へ急（いそ）ぐのでした。", "ジョバンニは、いつか町はずれのポプラの木が幾本（いくほん）も幾本（いくほん）も、高く星ぞらに浮（う）かんでいるところに来ていました。その牛乳屋（ぎゅうにゅうや）の黒い門（もん）をはいり、牛のにおいのするうすくらい台所（だいどころ）の前に立って、ジョバンニは帽子（ぼうし）をぬいで、", "「今晩（こんばん）は」と言（い）いましたら、家の中はしいんとして誰（だれ）もいたようではありませんでした。", "「今晩（こんばん）は、ごめんなさい」ジョバンニはまっすぐに立ってまた叫（さけ）びました。するとしばらくたってから、年とった女の人が、どこかぐあいが悪（わる）いようにそろそろと出て来て、何か用かと口の中で言（い）いました。", "「あの、今日、牛乳（ぎゅうにゅう）が僕（ぼく）※［＃小書き平仮名ん、183-7］とこへ来なかったので、もらいにあがったんです」ジョバンニが一生けん命（めい）勢（いきお）いよく言（い）いました。", "「いま誰（だれ）もいないでわかりません。あしたにしてください」その人は赤い眼（め）の下のとこをこすりながら、ジョバンニを見おろして言（い）いました。", "「おっかさんが病気（びょうき）なんですから今晩（こんばん）でないと困（こま）るんです」", "「ではもう少したってから来てください」その人はもう行ってしまいそうでした。", "「そうですか。ではありがとう」ジョバンニは、お辞儀（じぎ）をして台所（だいどころ）から出ました。", "十字になった町のかどを、まがろうとしましたら、向（む）こうの橋（はし）へ行く方の雑貨店（ざっかてん）の前で、黒い影（かげ）やぼんやり白いシャツが入り乱（みだ）れて、六、七人の生徒らが、口笛（くちぶえ）を吹（ふ）いたり笑（わら）ったりして、めいめい烏瓜（からすうり）の燈火（あかり）を持（も）ってやって来（く）るのを見（み）ました。その笑（わら）い声も口笛（くちぶえ）も、みんな聞きおぼえのあるものでした。ジョバンニの同級（どうきゅう）の子供（こども）らだったのです。ジョバンニは思わずどきっとして戻（もど）ろうとしましたが、思い直（なお）して、いっそう勢（いきお）いよくそっちへ歩いて行きました。", "「川へ行くの」ジョバンニが言（い）おうとして、少しのどがつまったように思ったとき、", "「ジョバンニ、ラッコの上着（うわぎ）が来るよ」さっきのザネリがまた叫（さけ）びました。", "「ジョバンニ、ラッコの上着（うわぎ）が来るよ」すぐみんなが、続（つづ）いて叫（さけ）びました。ジョバンニはまっ赤になって、もう歩いているかもわからず、急（いそ）いで行きすぎようとしましたら、そのなかにカムパネルラがいたのです。カムパネルラはきのどくそうに、だまって少しわらって、おこらないだろうかというようにジョバンニの方を見ていました。", "ジョバンニは、にげるようにその眼（め）を避（さ）け、そしてカムパネルラのせいの高いかたちが過（す）ぎて行ってまもなく、みんなはてんでに口笛（くちぶえ）を吹（ふ）きました。町かどを曲（ま）がるとき、ふりかえって見ましたら、ザネリがやはりふりかえって見ていました。そしてカムパネルラもまた、高く口笛（くちぶえ）を吹（ふ）いて向（む）こうにぼんやり見える橋（はし）の方へ歩いて行ってしまったのでした。ジョバンニは、なんとも言（い）えずさびしくなって、いきなり走りだしました。すると耳に手をあてて、わあわあと言（い）いながら片足（かたあし）でぴょんぴょん跳（と）んでいた小さな子供（こども）らは、ジョバンニがおもしろくてかけるのだと思って、わあいと叫（さけ）びました。", "まもなくジョバンニは走りだして黒い丘（おか）の方へ急（いそ）ぎました。", "五　天気輪（てんきりん）の柱（はしら）", "牧場（ぼくじょう）のうしろはゆるい丘（おか）になって、その黒い平（たい）らな頂上（ちょうじょう）は、北の大熊星（おおくまぼし）の下に、ぼんやりふだんよりも低（ひく）く、連（つら）なって見えました。", "ジョバンニは、もう露（つゆ）の降（お）りかかった小さな林のこみちを、どんどんのぼって行きました。まっくらな草や、いろいろな形に見えるやぶのしげみの間を、その小さなみちが、一すじ白く星あかりに照（て）らしだされてあったのです。草の中には、ぴかぴか青びかりを出す小さな虫もいて、ある葉（は）は青くすかし出され、ジョバンニは、さっきみんなの持（も）って行った烏瓜（からすうり）のあかりのようだとも思いました。", "そのまっ黒な、松（まつ）や楢（なら）の林を越（こ）えると、にわかにがらんと空がひらけて、天の川がしらしらと南から北へ亙（わた）っているのが見え、また頂（いただき）の、天気輪（てんきりん）の柱（はしら）も見わけられたのでした。つりがねそうか野ぎくかの花が、そこらいちめんに、夢（ゆめ）の中からでもかおりだしたというように咲（さ）き、鳥が一疋（ぴき）、丘（おか）の上を鳴き続（つづ）けながら通って行きました。", "ジョバンニは、頂（いただき）の天気輪（てんきりん）の柱（はしら）の下に来て、どかどかするからだを、つめたい草に投（な）げました。", "町の灯（あかり）は、暗（やみ）の中をまるで海の底（そこ）のお宮（みや）のけしきのようにともり、子供（こども）らの歌う声や口笛（くちぶえ）、きれぎれの叫（さけ）び声もかすかに聞こえて来るのでした。風が遠くで鳴り、丘（おか）の草もしずかにそよぎ、ジョバンニの汗（あせ）でぬれたシャツもつめたく冷（ひ）やされました。", "野原から汽車の音が聞こえてきました。その小さな列車（れっしゃ）の窓（まど）は一列（いちれつ）小さく赤く見え、その中にはたくさんの旅人（たびびと）が、苹果（りんご）をむいたり、わらったり、いろいろなふうにしていると考えますと、ジョバンニは、もうなんとも言（い）えずかなしくなって、また眼（め）をそらに挙（あ）げました。", "（この間原稿（げんこう）五枚分（まいぶん）なし）", "ところがいくら見ていても、そのそらは、ひる先生の言（い）ったような、がらんとした冷（つめ）たいとこだとは思われませんでした。それどころでなく、見れば見るほど、そこは小さな林や牧場（ぼくじょう）やらある野原（のはら）のように考えられてしかたなかったのです。そしてジョバンニは青い琴（こと）の星が、三つにも四つにもなって、ちらちらまたたき、脚（あし）が何べんも出たり引っ込（こ）んだりして、とうとう蕈（きのこ）のように長く延（の）びるのを見ました。またすぐ眼（め）の下のまちまでが、やっぱりぼんやりしたたくさんの星の集（あつ）まりか一つの大きなけむりかのように見えるように思いました。", "六　銀河（ぎんが）ステーション", "そしてジョバンニはすぐうしろの天気輪（てんきりん）の柱（はしら）がいつかぼんやりした三角標（さんかくひょう）の形になって、しばらく蛍（ほたる）のように、ぺかぺか消（き）えたりともったりしているのを見ました。それはだんだんはっきりして、とうとうりんとうごかないようになり、濃（こ）い鋼青（はがね）のそらの野原にたちました。いま新しく灼（や）いたばかりの青い鋼（はがね）の板（いた）のような、そらの野原に、まっすぐにすきっと立ったのです。", "するとどこかで、ふしぎな声が、銀河（ぎんが）ステーション、銀河（ぎんが）ステーションと言（い）う声がしたと思うと、いきなり眼（め）の前が、ぱっと明るくなって、まるで億万（おくまん）の蛍烏賊（ほたるいか）の火を一ぺんに化石（かせき）させて、そらじゅうに沈（しず）めたというぐあい、またダイアモンド会社で、ねだんがやすくならないために、わざと穫（と）れないふりをして、かくしておいた金剛石（こんごうせき）を、誰（だれ）かがいきなりひっくりかえして、ばらまいたというふうに、眼（め）の前がさあっと明るくなって、ジョバンニは、思わず何べんも眼（め）をこすってしまいました。", "気がついてみると、さっきから、ごとごとごとごと、ジョバンニの乗（の）っている小さな列車（れっしゃ）が走りつづけていたのでした。ほんとうにジョバンニは、夜の軽便鉄道（けいべんてつどう）の、小さな黄いろの電燈（でんとう）のならんだ車室に、窓（まど）から外を見ながらすわっていたのです。車室の中は、青い天鵞絨（ビロード）を張（は）った腰掛（こしか）けが、まるでがらあきで、向（む）こうの鼠（ねずみ）いろのワニスを塗（ぬ）った壁（かべ）には、真鍮（しんちゅう）の大きなぼたんが二つ光っているのでした。", "すぐ前の席（せき）に、ぬれたようにまっ黒な上着（うわぎ）を着た、せいの高い子供（こども）が、窓から頭を出して外を見ているのに気がつきました。そしてそのこどもの肩（かた）のあたりが、どうも見たことのあるような気がして、そう思うと、もうどうしても誰（だれ）だかわかりたくて、たまらなくなりました。いきなりこっちも窓（まど）から顔を出そうとしたとき、にわかにその子供（こども）が頭を引っ込（こ）めて、こっちを見ました。", "それはカムパネルラだったのです。ジョバンニが、", "カムパネルラ、きみは前からここにいたの、と言（い）おうと思ったとき、カムパネルラが、", "「みんなはね、ずいぶん走ったけれども遅（おく）れてしまったよ。ザネリもね、ずいぶん走ったけれども追（お）いつかなかった」と言（い）いました。", "ジョバンニは、", "（そうだ、ぼくたちはいま、いっしょにさそって出かけたのだ）とおもいながら、", "「どこかで待（ま）っていようか」と言（い）いました。するとカムパネルラは、", "「ザネリはもう帰ったよ。お父さんが迎（むか）いにきたんだ」", "カムパネルラは、なぜかそう言（い）いながら、少し顔いろが青ざめて、どこか苦（くる）しいというふうでした。するとジョバンニも、なんだかどこかに、何か忘（わす）れたものがあるというような、おかしな気持（きも）ちがしてだまってしまいました。", "ところがカムパネルラは、窓（まど）から外をのぞきながら、もうすっかり元気が直（なお）って、勢（いきお）いよく言（い）いました。", "「ああしまった。ぼく、水筒（すいとう）を忘（わす）れてきた。スケッチ帳（ちょう）も忘（わす）れてきた。けれどかまわない。もうじき白鳥の停車場（ていしゃば）だから。ぼく、白鳥を見るなら、ほんとうにすきだ。川の遠くを飛（と）んでいたって、ぼくはきっと見える」", "そして、カムパネルラは、まるい板（いた）のようになった地図（ちず）を、しきりにぐるぐるまわして見ていました。まったく、その中に、白くあらわされた天の川の左の岸（きし）に沿（そ）って一条（じょう）の鉄道線路（てつどうせんろ）が、南へ南へとたどって行くのでした。そしてその地図の立派（りっぱ）なことは、夜のようにまっ黒な盤（ばん）の上に、一々の停車場（ていしゃば）や三角標（さんかくひょう）、泉水（せんすい）や森が、青や橙（だいだい）や緑（みどり）や、うつくしい光でちりばめられてありました。", "ジョバンニはなんだかその地図をどこかで見たようにおもいました。", "「この地図（ちず）はどこで買ったの。黒曜石（こくようせき）でできてるねえ」", "ジョバンニが言（い）いました。", "「銀河（ぎんが）ステーションで、もらったんだ。君（きみ）もらわなかったの」", "「ああ、ぼく銀河（ぎんが）ステーションを通ったろうか。いまぼくたちのいるとこ、ここだろう」", "ジョバンニは、白鳥と書いてある停車場（ていしゃば）のしるしの、すぐ北を指（さ）しました。", "「そうだ。おや、あの河原（かわら）は月夜だろうか」そっちを見ますと、青白く光る銀河（ぎんが）の岸（きし）に、銀（ぎん）いろの空のすすきが、もうまるでいちめん、風にさらさらさらさら、ゆられてうごいて、波（なみ）を立てているのでした。", "「月夜でないよ。銀河（ぎんが）だから光るんだよ」ジョバンニは言（い）いながら、まるではね上がりたいくらい愉快（ゆかい）になって、足をこつこつ鳴らし、窓（まど）から顔を出して、高く高く星めぐりの口笛（くちぶえ）を吹（ふ）きながら一生けん命（めい）延（の）びあがって、その天の川の水を、見きわめようとしましたが、はじめはどうしてもそれが、はっきりしませんでした。けれどもだんだん気をつけて見ると、そのきれいな水は、ガラスよりも水素（すいそ）よりもすきとおって、ときどき眼（め）のかげんか、ちらちら紫（むらさき）いろのこまかな波（なみ）をたてたり、虹（にじ）のようにぎらっと光ったりしながら、声もなくどんどん流（なが）れて行き、野原にはあっちにもこっちにも、燐光（りんこう）の三角標（さんかくひょう）が、うつくしく立っていたのです。遠いものは小さく、近いものは大きく、遠いものは橙（だいだい）や黄いろではっきりし、近いものは青白く少しかすんで、あるいは三角形（さんかくけい）、あるいは四辺形（しへんけい）、あるいは電（いなずま）や鎖（くさり）の形、さまざまにならんで、野原いっぱいに光っているのでした。ジョバンニは、まるでどきどきして、頭をやけに振（ふ）りました。するとほんとうに、そのきれいな野原（のはら）じゅうの青や橙（だいだい）や、いろいろかがやく三角標（さんかくひょう）も、てんでに息をつくように、ちらちらゆれたり顫（ふる）えたりしました。", "「ぼくはもう、すっかり天の野原に来た」ジョバンニは言（い）いました。", "「それに、この汽車石炭（せきたん）をたいていないねえ」ジョバンニが左手をつき出して窓（まど）から前の方を見ながら言（い）いました。", "「アルコールか電気だろう」カムパネルラが言（い）いました。", "するとちょうど、それに返事（へんじ）するように、どこか遠くの遠くのもやのもやの中から、セロのようなごうごうした声がきこえて来ました。", "「ここの汽車は、スティームや電気でうごいていない。ただうごくようにきまっているからうごいているのだ。ごとごと音をたてていると、そうおまえたちは思っているけれども、それはいままで音をたてる汽車にばかりなれているためなのだ」", "「あの声、ぼくなんべんもどこかできいた」", "「ぼくだって、林の中や川で、何べんも聞いた」", "ごとごとごとごと、その小さなきれいな汽車は、そらのすすきの風にひるがえる中を、天の川の水や、三角点（さんかくてん）の青じろい微光（びこう）の中を、どこまでもどこまでもと、走って行くのでした。", "「ああ、りんどうの花が咲（さ）いている。もうすっかり秋だねえ」カムパネルラが、窓（まど）の外を指（ゆび）さして言（い）いました。", "線路（せんろ）のへりになったみじかい芝草（しばくさ）の中に、月長石（げっちょうせき）ででも刻（きざ）まれたような、すばらしい紫（むらさき）のりんどうの花が咲（さ）いていました。", "「ぼく飛（と）びおりて、あいつをとって、また飛（と）び乗（の）ってみせようか」ジョバンニは胸（むね）をおどらせて言（い）いました。", "「もうだめだ。あんなにうしろへ行ってしまったから」", "カムパネルラが、そう言（い）ってしまうかしまわないうち、次（つぎ）のりんどうの花が、いっぱいに光って過（す）ぎて行きました。", "と思ったら、もう次（つぎ）から次（つぎ）から、たくさんのきいろな底（そこ）をもったりんどうの花のコップが、湧（わ）くように、雨のように、眼（め）の前を通り、三角標（さんかくひょう）の列（れつ）は、けむるように燃（も）えるように、いよいよ光って立ったのです。", "七　北十字（きたじゅうじ）とプリオシン海岸（かいがん）", "「おっかさんは、ぼくをゆるしてくださるだろうか」", "いきなり、カムパネルラが、思い切ったというように、少しどもりながら、せきこんで言（い）いました。", "ジョバンニは、", "（ああ、そうだ、ぼくのおっかさんは、あの遠い一つのちりのように見える橙（だいだい）いろの三角標（さんかくひょう）のあたりにいらっしゃって、いまぼくのことを考えているんだった）と思いながら、ぼんやりしてだまっていました。", "「ぼくはおっかさんが、ほんとうに幸（さいわい）になるなら、どんなことでもする。けれども、いったいどんなことが、おっかさんのいちばんの幸（さいわい）なんだろう」カムパネルラは、なんだか、泣（な）きだしたいのを、一生けん命（めい）こらえているようでした。", "「きみのおっかさんは、なんにもひどいことないじゃないの」ジョバンニはびっくりして叫（さけ）びました。", "「ぼくわからない。けれども、誰（だれ）だって、ほんとうにいいことをしたら、いちばん幸（さいわい）なんだねえ。だから、おっかさんは、ぼくをゆるしてくださると思う」カムパネルラは、なにかほんとうに決心（けっしん）しているように見えました。", "にわかに、車のなかが、ぱっと白く明るくなりました。見ると、もうじつに、金剛石（こんごうせき）や草の露（つゆ）やあらゆる立派（りっぱ）さをあつめたような、きらびやかな銀河（ぎんが）の河床（かわどこ）の上を、水は声もなくかたちもなく流（なが）れ、その流（なが）れのまん中に、ぼうっと青白く後光（ごこう）の射（さ）した一つの島（しま）が見えるのでした。その島（しま）の平（たい）らないただきに、立派（りっぱ）な眼（め）もさめるような、白い十字架（じゅうじか）がたって、それはもう、凍（こお）った北極（ほっきょく）の雲で鋳（い）たといったらいいか、すきっとした金いろの円光をいただいて、しずかに永久（えいきゅう）に立っているのでした。", "「ハレルヤ、ハレルヤ」前からもうしろからも声が起（お）こりました。ふりかえって見ると、車室の中の旅人（たびびと）たちは、みなまっすぐにきもののひだを垂（た）れ、黒いバイブルを胸（むね）にあてたり、水晶（すいしょう）の数珠（じゅず）をかけたり、どの人もつつましく指（ゆび）を組み合わせて、そっちに祈（いの）っているのでした。思わず二人（ふたり）ともまっすぐに立ちあがりました。カムパネルラの頬（ほお）は、まるで熟（じゅく）した苹果（りんご）のあかしのようにうつくしくかがやいて見えました。", "そして島（しま）と十字架（じゅうじか）とは、だんだんうしろの方へうつって行きました。", "向（む）こう岸（ぎし）も、青じろくぼうっと光ってけむり、時々、やっぱりすすきが風にひるがえるらしく、さっとその銀（ぎん）いろがけむって、息（いき）でもかけたように見え、また、たくさんのりんどうの花が、草をかくれたり出たりするのは、やさしい狐火（きつねび）のように思われました。", "それもほんのちょっとの間、川と汽車との間は、すすきの列（れつ）でさえぎられ、白鳥の島（しま）は、二度（ど）ばかり、うしろの方に見えましたが、じきもうずうっと遠く小さく、絵（え）のようになってしまい、またすすきがざわざわ鳴って、とうとうすっかり見えなくなってしまいました。ジョバンニのうしろには、いつから乗（の）っていたのか、せいの高い、黒いかつぎをしたカトリックふうの尼（あま）さんが、まんまるな緑（みどり）の瞳（ひとみ）を、じっとまっすぐに落（お）として、まだ何かことばか声かが、そっちから伝（つた）わって来るのを、虔（つつし）んで聞いているというように見えました。旅人（たびびと）たちはしずかに席（せき）に戻（もど）り、二人（ふたり）も胸（むね）いっぱいのかなしみに似（に）た新しい気持（きも）ちを、何気なくちがった語（ことば）で、そっと談（はな）し合ったのです。", "「もうじき白鳥の停車場（ていしゃば）だねえ」", "「ああ、十一時かっきりには着（つ）くんだよ」", "早くも、シグナルの緑（みどり）の燈と、ぼんやり白い柱（はしら）とが、ちらっと窓（まど）のそとを過（す）ぎ、それから硫黄（いおう）のほのおのようなくらいぼんやりした転（てん）てつ機（き）の前のあかりが窓（まど）の下を通り、汽車はだんだんゆるやかになって、まもなくプラットホームの一列（れつ）の電燈（でんとう）が、うつくしく規則（きそく）正しくあらわれ、それがだんだん大きくなってひろがって、二人はちょうど白鳥停車場（ていしゃじょう）の、大きな時計（とけい）の前に来てとまりました。", "さわやかな秋の時計（とけい）の盤面（ばんめん）には、青く灼（や）かれたはがねの二本の針（はり）が、くっきり十一時を指（さ）しました。みんなは、一ぺんにおりて、車室の中はがらんとなってしまいました。", "〔二十分停車（ていしゃ）〕と時計（とけい）の下に書いてありました。", "「ぼくたちも降（お）りて見ようか」ジョバンニが言（い）いました。", "「降（お）りよう」二人（ふたり）は一度（ど）にはねあがってドアを飛（と）び出して改札口（かいさつぐち）へかけて行きました。ところが改札口（かいさつぐち）には、明るい紫（むらさき）がかった電燈（でんとう）が、一つ点（つ）いているばかり、誰（だれ）もいませんでした。そこらじゅうを見ても、駅長（えきちょう）や赤帽（あかぼう）らしい人の、影（かげ）もなかったのです。", "二人（ふたり）は、停車場（ていしゃば）の前の、水晶細工（すいしょうざいく）のように見える銀杏（いちょう）の木に囲（かこ）まれた、小さな広場に出ました。", "そこから幅（はば）の広いみちが、まっすぐに銀河（ぎんが）の青光（あおびかり）の中へ通っていました。", "さきに降（お）りた人たちは、もうどこへ行ったか一人（ひとり）も見えませんでした。二人（ふたり）がその白い道を、肩（かた）をならべて行きますと、二人（ふたり）の影（かげ）は、ちょうど四方に窓（まど）のある室（へや）の中の、二本の柱（はしら）の影（かげ）のように、また二つの車輪（しゃりん）の輻（や）のように幾本（いくほん）も幾本（いくほん）も四方へ出るのでした。そしてまもなく、あの汽車から見えたきれいな河原（かわら）に来ました。", "カムパネルラは、そのきれいな砂（すな）を一つまみ、掌（てのひら）にひろげ、指（ゆび）できしきしさせながら、夢（ゆめ）のように言（い）っているのでした。", "「この砂（すな）はみんな水晶（すいしょう）だ。中で小さな火が燃（も）えている」", "「そうだ」どこでぼくは、そんなことを習（なら）ったろうと思いながら、ジョバンニもぼんやり答えていました。", "河原（かわら）の礫（こいし）は、みんなすきとおって、たしかに水晶（すいしょう）や黄玉（トパーズ）や、またくしゃくしゃの皺曲（しゅうきょく）をあらわしたのや、また稜（かど）から霧（きり）のような青白い光を出す鋼玉（コランダム）やらでした。ジョバンニは、走ってその渚（なぎさ）に行って、水に手をひたしました。けれどもあやしいその銀河（ぎんが）の水は、水素（すいそ）よりももっとすきとおっていたのです。それでもたしかに流（なが）れていたことは、二人（ふたり）の手首（てくび）の、水にひたったとこが、少し水銀（すいぎん）いろに浮（う）いたように見え、その手首（てくび）にぶっつかってできた波（なみ）は、うつくしい燐光（りんこう）をあげて、ちらちらと燃（も）えるように見えたのでもわかりました。", "川上の方を見ると、すすきのいっぱいにはえている崖（がけ）の下に、白い岩（いわ）が、まるで運動場（うんどうじょう）のように平（たい）らに川に沿（そ）って出ているのでした。そこに小さな五、六人の人かげが、何か掘（ほ）り出すか埋（う）めるかしているらしく、立ったりかがんだり、時々なにかの道具（どうぐ）が、ピカッと光ったりしました。", "「行ってみよう」二人（ふたり）は、まるで一度（ど）に叫（さけ）んで、そっちの方へ走りました。その白い岩（いわ）になったところの入口に、〔プリオシン海岸（かいがん）〕という、瀬戸物（せともの）のつるつるした標札（ひょうさつ）が立って、向こうの渚（なぎさ）には、ところどころ、細（ほそ）い鉄（てつ）の欄干（らんかん）も植（う）えられ、木製（もくせい）のきれいなベンチも置（お）いてありました。", "「おや、変（へん）なものがあるよ」カムパネルラが、不思議（ふしぎ）そうに立ちどまって、岩（いわ）から黒い細長（ほそなが）いさきのとがったくるみの実（み）のようなものをひろいました。", "「くるみの実（み）だよ。そら、たくさんある。流（なが）れて来たんじゃない。岩（いわ）の中にはいってるんだ」", "「大きいね、このくるみ、倍（ばい）あるね。こいつはすこしもいたんでない」", "「早くあすこへ行って見よう。きっと何か掘（ほ）ってるから」", "二人（ふたり）は、ぎざぎざの黒いくるみの実（み）を持（も）ちながら、またさっきの方へ近よって行きました。左手の渚（なぎさ）には、波（なみ）がやさしい稲妻（いなずま）のように燃（も）えて寄（よ）せ、右手の崖（がけ）には、いちめん銀（ぎん）や貝殻（かいがら）でこさえたようなすすきの穂（ほ）がゆれたのです。", "だんだん近づいて見ると、一人のせいの高い、ひどい近眼鏡（きんがんきょう）をかけ、長靴（ながぐつ）をはいた学者（がくしゃ）らしい人が、手帳（てちょう）に何かせわしそうに書きつけながら、つるはしをふりあげたり、スコップをつかったりしている、三人の助手（じょしゅ）らしい人たちに夢中（むちゅう）でいろいろ指図（さしず）をしていました。", "「そこのその突起（とっき）をこわさないように、スコップを使いたまえ、スコップを。おっと、も少し遠くから掘（ほ）って。いけない、いけない、なぜそんな乱暴（らんぼう）をするんだ」", "見ると、その白い柔（やわ）らかな岩（いわ）の中から、大きな大きな青じろい獣（けもの）の骨（ほね）が、横に倒（たお）れてつぶれたというふうになって、半分以上（はんぶんいじょう）掘（ほ）り出されていました。そして気をつけて見ると、そこらには、蹄（ひづめ）の二つある足跡（あしあと）のついた岩（いわ）が、四角（しかく）に十ばかり、きれいに切り取られて番号（ばんごう）がつけられてありました。", "「君たちは参観（さんかん）かね」その大学士（だいがくし）らしい人が、眼鏡（めがね）をきらっとさせて、こっちを見て話しかけました。", "「くるみがたくさんあったろう。それはまあ、ざっと百二十万年（まんねん）ぐらい前のくるみだよ。ごく新しい方さ。ここは百二十万年前（まんねんまえ）、第三紀（だいさんき）のあとのころは海岸（かいがん）でね、この下からは貝（かい）がらも出る。いま川の流れているとこに、そっくり塩水（しおみず）が寄（よ）せたり引いたりもしていたのだ。このけものかね、これはボスといってね、おいおい、そこ、つるはしはよしたまえ。ていねいに鑿（のみ）でやってくれたまえ。ボスといってね、いまの牛（うし）の先祖（せんぞ）で、昔（むかし）はたくさんいたのさ」", "「標本（ひょうほん）にするんですか」", "「いや、証明（しょうめい）するに要（い）るんだ。ぼくらからみると、ここは厚（あつ）い立派（りっぱ）な地層（ちそう）で、百二十万年（まんねん）ぐらい前にできたという証拠（しょうこ）もいろいろあがるけれども、ぼくらとちがったやつからみてもやっぱりこんな地層（ちそう）に見えるかどうか、あるいは風か水や、がらんとした空かに見えやしないかということなのだ。わかったかい。けれども、おいおい、そこもスコップではいけない。そのすぐ下に肋骨（ろっこつ）が埋（う）もれてるはずじゃないか」", "大学士（だいがくし）はあわてて走って行きました。", "「もう時間だよ。行こう」カムパネルラが地図と腕時計（うでどけい）とをくらべながら言（い）いました。", "「ああ、ではわたくしどもは失礼（しつれい）いたします」ジョバンニは、ていねいに大学士（だいがくし）におじぎしました。", "「そうですか。いや、さよなら」大学士（だいがくし）は、また忙（いそが）しそうに、あちこち歩きまわって監督（かんとく）をはじめました。", "二人（ふたり）は、その白い岩（いわ）の上を、一生けん命（めい）汽車におくれないように走りました。そしてほんとうに、風のように走れたのです。息（いき）も切れず膝（ひざ）もあつくなりませんでした。", "こんなにしてかけるなら、もう世界（せかい）じゅうだってかけれると、ジョバンニは思いました。", "そして二人（ふたり）は、前のあの河原（かわら）を通り、改札口（かいさつぐち）の電燈（でんとう）がだんだん大きくなって、まもなく二人（ふたり）は、もとの車室の席（せき）にすわっていま行って来た方を、窓（まど）から見ていました。", "八　鳥を捕（と）る人", "「ここへかけてもようございますか」", "がさがさした、けれども親切そうな、大人（おとな）の声が、二人（ふたり）のうしろで聞こえました。", "それは、茶いろの少しぼろぼろの外套（がいとう）を着（き）て、白い巾（きれ）でつつんだ荷物（にもつ）を、二つに分けて肩（かた）に掛（か）けた、赤髯（あかひげ）のせなかのかがんだ人でした。", "「ええ、いいんです」ジョバンニは、少し肩（かた）をすぼめてあいさつしました。その人は、ひげの中でかすかに微笑（わら）いながら荷物（にもつ）をゆっくり網棚（あみだな）にのせました。ジョバンニは、なにかたいへんさびしいようなかなしいような気がして、だまって正面（しょうめん）の時計（とけい）を見ていましたら、ずうっと前の方で、硝子（ガラス）の笛（ふえ）のようなものが鳴りました。汽車はもう、しずかにうごいていたのです。カムパネルラは、車室の天井（てんじょう）を、あちこち見ていました。その一つのあかりに黒い甲虫（かぶとむし）がとまって、その影（かげ）が大きく天井（てんじょう）にうつっていたのです。赤ひげの人は、なにかなつかしそうにわらいながら、ジョバンニやカムパネルラのようすを見ていました。汽車はもうだんだん早くなって、すすきと川と、かわるがわる窓（まど）の外から光りました。", "赤ひげの人が、少しおずおずしながら、二人に訊（き）きました。", "「あなた方は、どちらへいらっしゃるんですか」", "「どこまでも行くんです」ジョバンニは、少しきまり悪（わる）そうに答えました。", "「それはいいね。この汽車は、じっさい、どこまででも行きますぜ」", "「あなたはどこへ行くんです」カムパネルラが、いきなり、喧嘩（けんか）のようにたずねましたので、ジョバンニは思わずわらいました。すると、向（む）こうの席（せき）にいた、とがった帽子（ぼうし）をかぶり、大きな鍵（かぎ）を腰（こし）に下げた人も、ちらっとこっちを見てわらいましたので、カムパネルラも、つい顔を赤くして笑（わら）いだしてしまいました。ところがその人は別（べつ）におこったでもなく、頬（ほお）をぴくぴくしながら返事（へんじ）をしました。", "「わっしはすぐそこで降（お）ります。わっしは、鳥をつかまえる商売（しょうばい）でね」", "「何鳥ですか」", "「鶴（つる）や雁（がん）です。さぎも白鳥もです」", "「鶴（つる）はたくさんいますか」", "「いますとも、さっきから鳴いてまさあ。聞かなかったのですか」", "「いいえ」", "「いまでも聞こえるじゃありませんか。そら、耳をすまして聴（き）いてごらんなさい」", "二人（ふたり）は眼（め）を挙（あ）げ、耳をすましました。ごとごと鳴る汽車のひびきと、すすきの風との間から、ころんころんと水の湧（わ）くような音が聞こえて来るのでした。", "「鶴（つる）、どうしてとるんですか」", "「鶴（つる）ですか、それとも鷺（さぎ）ですか」", "「鷺（さぎ）です」ジョバンニは、どっちでもいいと思いながら答えました。", "「そいつはな、雑作（ぞうさ）ない。さぎというものは、みんな天の川の砂（すな）が凝（かたま）って、ぼおっとできるもんですからね、そして始終（しじゅう）川へ帰りますからね、川原で待（ま）っていて、鷺（さぎ）がみんな、脚（あし）をこういうふうにしておりてくるとこを、そいつが地べたへつくかつかないうちに、ぴたっと押（おさ）えちまうんです。するともう鷺（さぎ）は、かたまって安心（あんしん）して死（し）んじまいます。あとはもう、わかり切ってまさあ。押（お）し葉（ば）にするだけです」", "「鷺（さぎ）を押（お）し葉（ば）にするんですか。標本（ひょうほん）ですか」", "「標本（ひょうほん）じゃありません。みんなたべるじゃありませんか」", "「おかしいねえ」カムパネルラが首（くび）をかしげました。", "「おかしいも不審（ふしん）もありませんや。そら」その男は立って、網棚（あみだな）から包（つつ）みをおろして、手ばやくくるくると解（と）きました。", "「さあ、ごらんなさい。いまとって来たばかりです」", "「ほんとうに鷺（さぎ）だねえ」二人（ふたり）は思わず叫（さけ）びました。まっ白な、あのさっきの北の十字架（じゅうじか）のように光る鷺（さぎ）のからだが、十ばかり、少しひらべったくなって、黒い脚（あし）をちぢめて、浮彫（うきぼ）りのようにならんでいたのです。", "「眼（め）をつぶってるね」カムパネルラは、指（ゆび）でそっと、鷺（さぎ）の三日月（みかづき）がたの白いつぶった眼（め）にさわりました。頭の上の槍（やり）のような白い毛もちゃんとついていました。", "「ね、そうでしょう」鳥捕（とりと）りは風呂敷（ふろしき）を重（かさ）ねて、またくるくると包（つつ）んで紐（ひも）でくくりました。誰（だれ）がいったいここらで鷺（さぎ）なんぞたべるだろうとジョバンニは思いながら訊（き）きました。", "「鷺（さぎ）はおいしいんですか」", "「ええ、毎日注文（ちゅうもん）があります。しかし雁（がん）の方が、もっと売れます。雁（がん）の方がずっと柄（がら）がいいし、第一（だいいち）手数（てすう）がありませんからな。そら」鳥捕（とりと）りは、また別（べつ）の方の包（つつ）みを解（と）きました。すると黄と青じろとまだらになって、なにかのあかりのようにひかる雁（がん）が、ちょうどさっきの鷺（さぎ）のように、くちばしをそろえて、少しひらべったくなって、ならんでいました。", "「こっちはすぐたべられます。どうです、少しおあがりなさい」鳥捕（とりと）りは、黄いろの雁（がん）の足を、軽（かる）くひっぱりました。するとそれは、チョコレートででもできているように、すっときれいにはなれました。", "「どうです。すこしたべてごらんなさい」鳥捕（とりと）りは、それを二つにちぎってわたしました。ジョバンニは、ちょっとたべてみて、", "（なんだ、やっぱりこいつはお菓子（かし）だ。チョコレートよりも、もっとおいしいけれども、こんな雁（がん）が飛（と）んでいるもんか。この男は、どこかそこらの野原の菓子屋（かしや）だ。けれどもぼくは、このひとをばかにしながら、この人のお菓子（かし）をたべているのは、たいへんきのどくだ）とおもいながら、やっぱりぽくぽくそれをたべていました。", "「も少しおあがりなさい」鳥捕（とりと）りがまた包（つつ）みを出しました。ジョバンニは、もっとたべたかったのですけれども、", "「ええ、ありがとう」といって遠慮（えんりょ）しましたら、鳥捕（とりと）りは、こんどは向（む）こうの席（せき）の、鍵（かぎ）をもった人に出しました。", "「いや、商売（しょうばい）ものをもらっちゃすみませんな」その人は、帽子（ぼうし）をとりました。", "「いいえ、どういたしまして。どうです、今年の渡（わた）り鳥（どり）の景気（けいき）は」", "「いや、すてきなもんですよ。一昨日（おととい）の第二限（だいにげん）ころなんか、なぜ燈台（とうだい）の灯（ひ）を、規則以外（きそくいがい）に間（一時空白）させるかって、あっちからもこっちからも、電話で故障（こしょう）が来ましたが、なあに、こっちがやるんじゃなくて、渡（わた）り鳥（どり）どもが、まっ黒にかたまって、あかしの前を通るのですからしかたありませんや、わたしぁ、べらぼうめ、そんな苦情（くじょう）は、おれのとこへ持（も）って来たってしかたがねえや、ばさばさのマントを着（き）て脚（あし）と口との途方（とほう）もなく細（ほそ）い大将（たいしょう）へやれって、こう言（い）ってやりましたがね、はっは」", "すすきがなくなったために、向（む）こうの野原から、ぱっとあかりが射（さ）して来ました。", "「鷺（さぎ）の方はなぜ手数（てすう）なんですか」カムパネルラは、さっきから、訊（き）こうと思っていたのです。", "「それはね、鷺（さぎ）をたべるには」鳥捕（とりと）りは、こっちに向（む）き直（なお）りました。「天の川の水あかりに、十日もつるしておくかね、そうでなけぁ、砂（すな）に三、四日うずめなけぁいけないんだ。そうすると、水銀（すいぎん）がみんな蒸発（じょうはつ）して、たべられるようになるよ」", "「こいつは鳥じゃない。ただのお菓子（かし）でしょう」やっぱりおなじことを考えていたとみえて、カムパネルラが、思い切ったというように、尋（たず）ねました。鳥捕（とりと）りは、何かたいへんあわてたふうで、", "「そうそう、ここで降（お）りなけぁ」と言（い）いながら、立って荷物（にもつ）をとったと思うと、もう見えなくなっていました。", "「どこへ行ったんだろう」二人（ふたり）は顔を見合わせましたら、燈台守（とうだいもり）は、にやにや笑（わら）って、少し伸（の）びあがるようにしながら、二人の横（よこ）の窓（まど）の外をのぞきました。二人（ふたり）もそっちを見ましたら、たったいまの鳥捕（とりと）りが、黄いろと青じろの、うつくしい燐光（りんこう）を出す、いちめんのかわらははこぐさの上に立って、まじめな顔をして両手（りょうて）をひろげて、じっとそらを見ていたのです。", "「あすこへ行ってる。ずいぶん奇体（きたい）だねえ。きっとまた鳥をつかまえるとこだねえ。汽車が走って行かないうちに、早く鳥がおりるといいな」と言（い）ったとたん、がらんとした桔梗（ききょう）いろの空から、さっき見たような鷺（さぎ）が、まるで雪の降（ふ）るように、ぎゃあぎゃあ叫（さけ）びながら、いっぱいに舞（ま）いおりて来ました。するとあの鳥捕（とりと）りは、すっかり注文（ちゅうもん）通りだというようにほくほくして、両足（りょうあし）をかっきり六十度（ど）に開いて立って、鷺（さぎ）のちぢめて降（お）りて来る黒い脚（あし）を両手（りょうて）で片（かた）っぱしから押（おさ）えて、布（ぬの）の袋（ふくろ）の中に入れるのでした。すると鷺（さぎ）は、蛍（ほたる）のように、袋（ふくろ）の中でしばらく、青くぺかぺか光ったり消（き）えたりしていましたが、おしまいとうとう、みんなぼんやり白くなって、眼（め）をつぶるのでした。ところが、つかまえられる鳥よりは、つかまえられないで無事（ぶじ）に天の川の砂（すな）の上に降（お）りるものの方が多（おお）かったのです。それは見ていると、足が砂（すな）へつくや否（いな）や、まるで雪（ゆき）の解（と）けるように、縮（ちぢ）まってひらべったくなって、まもなく溶鉱炉（ようこうろ）から出た銅（どう）の汁（しる）のように、砂（すな）や砂利（じゃり）の上にひろがり、しばらくは鳥の形が、砂（すな）についているのでしたが、それも二、三度（ど）明るくなったり暗（くら）くなったりしているうちに、もうすっかりまわりと同じいろになってしまうのでした。", "鳥捕（とりと）りは、二十疋（ぴき）ばかり、袋（ふくろ）に入れてしまうと、急（きゅう）に両手（りょうて）をあげて、兵隊（へいたい）が鉄砲弾（てっぽうだま）にあたって、死（し）ぬときのような形をしました。と思ったら、もうそこに鳥捕（とりと）りの形はなくなって、かえって、", "「ああせいせいした。どうもからだにちょうど合うほど稼（かせ）いでいるくらい、いいことはありませんな」というききおぼえのある声が、ジョバンニの隣（とな）りにしました。見ると鳥捕（とりと）りは、もうそこでとって来た鷺（さぎ）を、きちんとそろえて、一つずつ重（かさ）ね直（なお）しているのでした。", "「どうして、あすこから、いっぺんにここへ来たんですか」ジョバンニが、なんだかあたりまえのような、あたりまえでないような、おかしな気がして問（と）いました。", "「どうしてって、来ようとしたから来たんです。ぜんたいあなた方は、どちらからおいでですか」", "ジョバンニは、すぐ返事（へんじ）をしようと思いましたけれども、さあ、ぜんたいどこから来たのか、もうどうしても考えつきませんでした。カムパネルラも、顔をまっ赤にして何か思い出そうとしているのでした。", "「ああ、遠くからですね」鳥捕（とりと）りは、わかったというように雑作（ぞうさ）なくうなずきました。", "九　ジョバンニの切符（きっぷ）", "「もうここらは白鳥区（く）のおしまいです。ごらんなさい。あれが名高いアルビレオの観測所（かんそくじょ）です」", "窓（まど）の外の、まるで花火でいっぱいのような、あまの川のまん中に、黒い大きな建物（たてもの）が四棟（むね）ばかり立って、その一つの平屋根（ひらやね）の上に、眼（め）もさめるような、青宝玉（サファイア）と黄玉（トパーズ）の大きな二つのすきとおった球（たま）が、輪（わ）になってしずかにくるくるとまわっていました。黄いろのがだんだん向（む）こうへまわって行って、青い小さいのがこっちへ進（すす）んで来、まもなく二つのはじは、重（かさ）なり合って、きれいな緑（みどり）いろの両面凸（りょうめんとつ）レンズのかたちをつくり、それもだんだん、まん中がふくらみだして、とうとう青いのは、すっかりトパーズの正面（しょうめん）に来ましたので、緑（みどり）の中心と黄いろな明るい環（わ）とができました。それがまただんだん横（よこ）へ外（そ）れて、前のレンズの形を逆（ぎゃく）にくり返（かえ）し、とうとうすっとはなれて、サファイアは向（む）こうへめぐり、黄いろのはこっちへ進（すす）み、またちょうどさっきのようなふうになりました。銀河（ぎんが）の、かたちもなく音もない水にかこまれて、ほんとうにその黒い測候所（そっこうじょ）が、睡（ねむ）っているように、しずかによこたわったのです。", "「あれは、水の速（はや）さをはかる器械（きかい）です。水も……」鳥捕（とりと）りが言（い）いかけたとき、", "「切符（きっぷ）を拝見（はいけん）いたします」三人の席（せき）の横（よこ）に、赤い帽子（ぼうし）をかぶったせいの高い車掌（しゃしょう）が、いつかまっすぐに立っていて言（い）いました。鳥捕（とりと）りは、だまってかくしから、小さな紙きれを出しました。車掌（しゃしょう）はちょっと見て、すぐ眼（め）をそらして（あなた方のは？）というように、指（ゆび）をうごかしながら、手をジョバンニたちの方へ出しました。", "「さあ」ジョバンニは困（こま）って、もじもじしていましたら、カムパネルラはわけもないというふうで、小さな鼠（ねずみ）いろの切符（きっぷ）を出しました。ジョバンニは、すっかりあわててしまって、もしか上着（うわぎ）のポケットにでも、はいっていたかとおもいながら、手を入れてみましたら、何か大きなたたんだ紙きれにあたりました。こんなものはいっていたろうかと思って、急（いそ）いで出してみましたら、それは四つに折（お）ったはがきぐらいの大さ　　　　大さ」はママ］の緑（みどり）いろの紙でした。車掌（しゃしょう）が手を出しているもんですからなんでもかまわない、やっちまえと思って渡（わた）しましたら、車掌（しゃしょう）はまっすぐに立ち直（なお）ってていねいにそれを開いて見ていました。そして読みながら上着（うわぎ）のぼたんやなんかしきりに直（なお）したりしていましたし燈台看守（とうだいかんしゅ）も下からそれを熱心（ねっしん）にのぞいていましたから、ジョバンニはたしかにあれは証明書（しょうめいしょ）か何かだったと考えて少し胸（むね）が熱（あつ）くなるような気がしました。", "「これは三次空間（じくうかん）の方からお持（も）ちになったのですか」車掌（しゃしょう）がたずねました。", "「なんだかわかりません」もう大丈夫（だいじょうぶ）だと安心しながらジョバンニはそっちを見あげてくつくつ笑（わら）いました。", "「よろしゅうございます。南十字（サウザンクロス）へ着（つ）きますのは、次（つぎ）の第（だい）三時ころになります」車掌（しゃしょう）は紙をジョバンニに渡（わた）して向（む）こうへ行きました。", "カムパネルラは、その紙切れが何だったか待（ま）ちかねたというように急（いそ）いでのぞきこみました。ジョバンニも全（まった）く早く見たかったのです。ところがそれはいちめん黒い唐草（からくさ）のような模様（もよう）の中に、おかしな十ばかりの字を印刷（いんさつ）したもので、だまって見ているとなんだかその中へ吸（す）い込（こ）まれてしまうような気がするのでした。すると鳥捕（とりと）りが横からちらっとそれを見てあわてたように言（い）いました。", "「おや、こいつはたいしたもんですぜ。こいつはもう、ほんとうの天上へさえ行ける切符（きっぷ）だ。天上どこじゃない、どこでもかってにあるける通行券（つうこうけん）です。こいつをお持（も）ちになれぁ、なるほど、こんな不完全（ふかんぜん）な幻想第四次（げんそうだいよじ）の銀河鉄道（ぎんがてつどう）なんか、どこまででも行けるはずでさあ、あなた方たいしたもんですね」", "「なんだかわかりません」ジョバンニが赤くなって答えながら、それをまたたたんでかくしに入れました。そしてきまりが悪（わる）いのでカムパネルラと二人（ふたり）、また窓（まど）の外をながめていましたが、その鳥捕（とりと）りの時々たいしたもんだというように、ちらちらこっちを見ているのがぼんやりわかりました。", "「もうじき鷲（わし）の停車場（ていしゃじょう）だよ」カムパネルラが向（む）こう岸（ぎし）の、三つならんだ小さな青じろい三角標（さんかくひょう）と、地図とを見くらべて言（い）いました。", "ジョバンニはなんだかわけもわからずに、にわかにとなりの鳥捕（とりと）りがきのどくでたまらなくなりました。鷺（さぎ）をつかまえてせいせいしたとよろこんだり、白いきれでそれをくるくる包（つつ）んだり、ひとの切符（きっぷ）をびっくりしたように横目（よこめ）で見てあわててほめだしたり、そんなことを一々考えていると、もうその見ず知らずの鳥捕（とりと）りのために、ジョバンニの持（も）っているものでも食べるものでもなんでもやってしまいたい、もうこの人のほんとうの幸（さいわい）になるなら、自分があの光る天の川の河原（かわら）に立って百年つづけて立って鳥をとってやってもいいというような気がして、どうしてももう黙（だま）っていられなくなりました。ほんとうにあなたのほしいものはいったい何ですかと訊（き）こうとして、それではあんまり出し抜（ぬ）けだから、どうしようかと考えてふり返（かえ）って見ましたら、そこにはもうあの鳥捕（とりと）りがいませんでした。網棚（あみだな）の上には白い荷物（にもつ）も見えなかったのです。また窓（まど）の外で足をふんばってそらを見上げて鷺（さぎ）を捕（と）るしたくをしているのかと思って、急（いそ）いでそっちを見ましたが、外はいちめんのうつくしい砂子（すなご）と白いすすきの波（なみ）ばかり、あの鳥捕（とりと）りの広いせなかもとがった帽子（ぼうし）も見えませんでした。", "「あの人どこへ行ったろう」カムパネルラもぼんやりそう言（い）っていました。", "「どこへ行ったろう。いったいどこでまたあうのだろう。僕（ぼく）はどうしても少しあの人に物（もの）を言（い）わなかったろう」", "「ああ、僕（ぼく）もそう思っているよ」", "「僕（ぼく）はあの人が邪魔（じゃま）なような気がしたんだ。だから僕（ぼく）はたいへんつらい」ジョバンニはこんなへんてこな気もちは、ほんとうにはじめてだし、こんなこと今まで言（い）ったこともないと思いました。", "「なんだか苹果（りんご）のにおいがする。僕（ぼく）いま苹果（りんご）のことを考えたためだろうか」カムパネルラが不思議（ふしぎ）そうにあたりを見まわしました。", "「ほんとうに苹果（りんご）のにおいだよ。それから野茨（のいばら）のにおいもする」", "ジョバンニもそこらを見ましたがやっぱりそれは窓（まど）からでもはいって来るらしいのでした。いま秋だから野茨（のいばら）の花のにおいのするはずはないとジョバンニは思いました。", "そしたらにわかにそこに、つやつやした黒い髪（かみ）の六つばかりの男の子が赤いジャケツのぼたんもかけず、ひどくびっくりしたような顔をして、がたがたふるえてはだしで立っていました。隣（とな）りには黒い洋服（ようふく）をきちんと着（き）たせいの高い青年がいっぱいに風に吹（ふ）かれているけやきの木のような姿勢（しせい）で、男の子の手をしっかりひいて立っていました。", "「あら、ここどこでしょう。まあ、きれいだわ」青年のうしろに、もひとり、十二ばかりの眼（め）の茶いろな可愛（かわい）らしい女の子が、黒い外套（がいとう）を着（き）て青年の腕（うで）にすがって不思議（ふしぎ）そうに窓（まど）の外を見ているのでした。", "「ああ、ここはランカシャイヤだ。いや、コンネクテカット州（しゅう）だ。いや、ああ、ぼくたちはそらへ来たのだ。わたしたちは天へ行くのです。ごらんなさい。あのしるしは天上のしるしです。もうなんにもこわいことありません。わたくしたちは神（かみ）さまに召（め）されているのです」黒服（くろふく）の青年はよろこびにかがやいてその女の子に言（い）いました。けれどもなぜかまた額（ひたい）に深（ふか）く皺（しわ）を刻（きざ）んで、それにたいへんつかれているらしく、無理（むり）に笑（わら）いながら男の子をジョバンニのとなりにすわらせました。それから女の子にやさしくカムパネルラのとなりの席（せき）を指（ゆび）さしました。女の子はすなおにそこへすわって、きちんと両手（りょうて）を組み合わせました。", "「ぼく、おおねえさんのとこへ行くんだよう」腰掛（こしか）けたばかりの男の子は顔を変（へん）にして燈台看守（とうだいかんしゅ）の向（む）こうの席（せき）にすわったばかりの青年に言（い）いました。青年はなんとも言（い）えず悲（かな）しそうな顔をして、じっとその子の、ちぢれたぬれた頭を見ました。女の子は、いきなり両手（りょうて）を顔にあててしくしく泣（な）いてしまいました。", "「お父さんやきくよねえさんはまだいろいろお仕事（しごと）があるのです。けれどももうすぐあとからいらっしゃいます。それよりも、おっかさんはどんなに永（なが）く待（ま）っていらっしゃったでしょう。わたしの大事（だいじ）なタダシはいまどんな歌をうたっているだろう、雪（ゆき）の降（ふ）る朝にみんなと手をつないで、ぐるぐるにわとこのやぶをまわってあそんでいるだろうかと考えたり、ほんとうに待（ま）って心配（しんぱい）していらっしゃるんですから、早く行って、おっかさんにお目にかかりましょうね」", "「うん、だけど僕（ぼく）、船に乗（の）らなけぁよかったなあ」", "「ええ、けれど、ごらんなさい、そら、どうです、あの立派（りっぱ）な川、ね、あすこはあの夏じゅう、ツィンクル、ツィンクル、リトル、スターをうたってやすむとき、いつも窓（まど）からぼんやり白く見えていたでしょう。あすこですよ。ね、きれいでしょう、あんなに光っています」", "泣（な）いていた姉（あね）もハンケチで眼（め）をふいて外を見ました。青年は教えるようにそっと姉弟（きょうだい）にまた言（い）いました。", "「わたしたちはもう、なんにもかなしいことないのです。わたしたちはこんないいとこを旅（たび）して、じき神（かみ）さまのとこへ行きます。そこならもう、ほんとうに明るくてにおいがよくて立派（りっぱ）な人たちでいっぱいです。そしてわたしたちの代（か）わりにボートへ乗（の）れた人たちは、きっとみんな助（たす）けられて、心配（しんぱい）して待（ま）っているめいめいのお父さんやお母さんや自分のお家へやら行くのです。さあ、もうじきですから元気を出しておもしろくうたって行きましょう」青年は男の子のぬれたような黒い髪（かみ）をなで、みんなを慰（なぐさ）めながら、自分もだんだん顔いろがかがやいてきました。", "「あなた方はどちらからいらっしゃったのですか。どうなすったのですか」", "さっきの燈台看守（とうだいかんしゅ）がやっと少しわかったように青年にたずねました。青年はかすかにわらいました。", "「いえ、氷山（ひょうざん）にぶっつかって船が沈（しず）みましてね、わたしたちはこちらのお父さんが急（きゅう）な用（よう）で二か月前、一足さきに本国へお帰りになったので、あとから発（た）ったのです。私は大学へはいっていて、家庭教師（かていきょうし）にやとわれていたのです。ところがちょうど十二日目、今日か昨日（きのう）のあたりです、船が氷山（ひょうざん）にぶっつかって一ぺんに傾（かたむ）きもう沈（しず）みかけました。月のあかりはどこかぼんやりありましたが、霧（きり）が非常（ひじょう）に深（ふか）かったのです。ところがボートは左舷（さげん）の方半分（はんぶん）はもうだめになっていましたから、とてもみんなは乗（の）り切らないのです。もうそのうちにも船は沈（しず）みますし、私は必死（ひっし）となって、どうか小さな人たちを乗（の）せてくださいと叫（さけ）びました。近くの人たちはすぐみちを開いて、そして子供たちのために祈（いの）ってくれました。けれどもそこからボートまでのところには、まだまだ小さな子どもたちや親たちやなんかいて、とても押（お）しのける勇気（ゆうき）がなかったのです。それでもわたくしはどうしてもこの方たちをお助（たす）けするのが私の義務（ぎむ）だと思いましたから前にいる子供らを押（お）しのけようとしました。けれどもまた、そんなにして助（たす）けてあげるよりはこのまま神（かみ）の御前（みまえ）にみんなで行く方が、ほんとうにこの方たちの幸福（こうふく）だとも思いました。それからまた、その神（かみ）にそむく罪（つみ）はわたくしひとりでしょってぜひとも助（たす）けてあげようと思いました。けれども、どうしても見ているとそれができないのでした。子どもらばかりのボートの中へはなしてやって、お母さんが狂気（きょうき）のようにキスを送（おく）りお父さんがかなしいのをじっとこらえてまっすぐに立っているなど、とてももう腸（はらわた）もちぎれるようでした。そのうち船はもうずんずん沈（しず）みますから、私たちはかたまって、もうすっかり覚悟（かくご）して、この人たち二人を抱（だ）いて、浮（う）かべるだけは浮（う）かぼうと船の沈（しず）むのを待（ま）っていました。誰（だれ）が投（な）げたかライフヴイが一つ飛（と）んで来ましたけれどもすべってずうっと向（む）こうへ行ってしまいました。私は一生けん命（めい）で甲板（かんぱん）の格子（こうし）になったとこをはなして、三人それにしっかりとりつきました。どこからともなく三〇六番の声があがりました。たちまちみんなはいろいろな国語で一ぺんにそれをうたいました。そのときにわかに大きな音がして私たちは水に落（お）ち、もう渦（うず）にはいったと思いながらしっかりこの人たちをだいて、それからぼうっとしたと思ったらもうここへ来ていたのです。この方たちのお母さんは一昨年（さくねん）没（な）くなられました。ええ、ボートはきっと助（たす）かったにちがいありません、なにせよほど熟練（じゅくれん）な水夫（すいふ）たちが漕（こ）いで、すばやく船からはなれていましたから」", "そこらから小さな嘆息（たんそく）やいのりの声が聞こえジョバンニもカムパネルラもいままで忘（わす）れていたいろいろのことをぼんやり思い出して眼（め）が熱（あつ）くなりました。", "（ああ、その大きな海はパシフィックというのではなかったろうか。その氷山（ひょうざん）の流（なが）れる北のはての海で、小さな船に乗（の）って、風や凍（こお）りつく潮水（しおみず）や、はげしい寒（さむ）さとたたかって、たれかが一生けんめいはたらいている。ぼくはそのひとにほんとうにきのどくでそしてすまないような気がする。ぼくはそのひとのさいわいのためにいったいどうしたらいいのだろう）", "ジョバンニは首（くび）をたれて、すっかりふさぎ込（こ）んでしまいました。", "「なにがしあわせかわからないです。ほんとうにどんなつらいことでもそれがただしいみちを進（すす）む中でのできごとなら、峠（とうげ）の上りも下りもみんなほんとうの幸福（こうふく）に近づく一あしずつですから」", "燈台守（とうだいもり）がなぐさめていました。", "「ああそうです。ただいちばんのさいわいに至（いた）るためにいろいろのかなしみもみんなおぼしめしです」", "青年が祈（いの）るようにそう答えました。", "そしてあの姉弟（きょうだい）はもうつかれてめいめいぐったり席（せき）によりかかって睡（ねむ）っていました。さっきのあのはだしだった足にはいつか白い柔（やわ）らかな靴（くつ）をはいていたのです。", "ごとごとごとごと汽車はきらびやかな燐光（りんこう）の川の岸（きし）を進（すす）みました。向（む）こうの方の窓（まど）を見ると、野原はまるで幻燈（げんとう）のようでした。百も千もの大小さまざまの三角標（さんかくひょう）、その大きなものの上には赤い点々をうった測量旗（そくりょうき）も見え、野原（のはら）のはてはそれらがいちめん、たくさんたくさん集（あつ）まってぼおっと青白い霧（きり）のよう、そこからか、またはもっと向（む）こうからか、ときどきさまざまの形のぼんやりした狼煙（のろし）のようなものが、かわるがわるきれいな桔梗（ききょう）いろのそらにうちあげられるのでした。じつにそのすきとおった奇麗（きれい）な風は、ばらのにおいでいっぱいでした。", "「いかがですか。こういう苹果（りんご）はおはじめてでしょう」向（む）こうの席（せき）の燈台看守（とうだいかんしゅ）がいつか黄金（きん）と紅（べに）でうつくしくいろどられた大きな苹果（りんご）を落（お）とさないように両手（りょうて）で膝（ひざ）の上にかかえていました。", "「おや、どっから来たのですか。立派（りっぱ）ですねえ。ここらではこんな苹果（りんご）ができるのですか」青年はほんとうにびっくりしたらしく、燈台看守（とうだいかんしゅ）の両手（りょうて）にかかえられた一もりの苹果（りんご）を、眼（め）を細（ほそ）くしたり首（くび）をまげたりしながら、われを忘（わす）れてながめていました。", "「いや、まあおとりください。どうか、まあおとりください」", "青年は一つとってジョバンニたちの方をちょっと見ました。", "「さあ、向（む）こうの坊（ぼっ）ちゃんがた。いかがですか。おとりください」", "ジョバンニは坊（ぼっ）ちゃんといわれたので、すこししゃくにさわってだまっていましたが、カムパネルラは、", "「ありがとう」と言（い）いました。", "すると青年は自分でとって一つずつ二人に送（おく）ってよこしましたので、ジョバンニも立って、ありがとうと言（い）いました。", "燈台看守（とうだいかんしゅ）はやっと両腕（りょううで）があいたので、こんどは自分で一つずつ睡（ねむ）っている姉弟（きょうだい）の膝（ひざ）にそっと置（お）きました。", "「どうもありがとう。どこでできるのですか。こんな立派（りっぱ）な苹果（りんご）は」", "青年はつくづく見ながら言（い）いました。", "「この辺（あたり）ではもちろん農業（のうぎょう）はいたしますけれどもたいていひとりでにいいものができるような約束（やくそく）になっております。農業（のうぎょう）だってそんなにほねはおれはしません。たいてい自分の望（のぞ）む種子（たね）さえ播（ま）けばひとりでにどんどんできます。米だってパシフィック辺（へん）のように殻（から）もないし十倍（ばい）も大きくてにおいもいいのです。けれどもあなたがたのいらっしゃる方なら農業（のうぎょう）はもうありません。苹果（りんご）だってお菓子（かし）だって、かすが少しもありませんから、みんなそのひとそのひとによってちがった、わずかのいいかおりになって毛あなからちらけてしまうのです」", "にわかに男の子がばっちり眼（め）をあいて言（い）いました。", "「ああぼくいまお母（っか）さんの夢（ゆめ）をみていたよ。お母（っか）さんがね、立派（りっぱ）な戸棚（とだな）や本のあるとこにいてね、ぼくの方を見て手をだしてにこにこにこにこわらったよ。ぼく、おっかさん。りんごをひろってきてあげましょうか、と言（い）ったら眼（め）がさめちゃった。ああここ、さっきの汽車のなかだねえ」", "「その苹果（りんご）がそこにあります。このおじさんにいただいたのですよ」青年が言（い）いました。", "「ありがとうおじさん。おや、かおるねえさんまだねてるねえ、ぼくおこしてやろう。ねえさん。ごらん、りんごをもらったよ。おきてごらん」", "姉（あね）はわらって眼（め）をさまし、まぶしそうに両手（りょうて）を眼（め）にあてて、それから苹果（りんご）を見ました。", "男の子はまるでパイをたべるように、もうそれをたべていました。またせっかくむいたそのきれいな皮（かわ）も、くるくるコルク抜（ぬ）きのような形になって床（ゆか）へ落（お）ちるまでの間にはすうっと、灰（はい）いろに光って蒸発（じょうはつ）してしまうのでした。", "二人（ふたり）はりんごをたいせつにポケットにしまいました。", "川下の向（む）こう岸（ぎし）に青く茂（しげ）った大きな林が見え、その枝（えだ）には熟（じゅく）してまっ赤に光るまるい実（み）がいっぱい、その林のまん中に高い高い三角標（さんかくひょう）が立って、森の中からはオーケストラベルやジロフォンにまじってなんとも言（い）えずきれいな音（ね）いろが、とけるように浸（し）みるように風につれて流（なが）れて来るのでした。", "青年はぞくっとしてからだをふるうようにしました。", "だまってその譜（ふ）を聞いていると、そこらにいちめん黄いろや、うすい緑（みどり）の明るい野原（のはら）か敷物（しきもの）かがひろがり、またまっ白な蝋（ろう）のような露（つゆ）が太陽（たいよう）の面（めん）をかすめて行くように思われました。", "「まあ、あの烏（からす）」カムパネルラのとなりの、かおると呼（よ）ばれた女の子が叫（さけ）びました。", "「からすでない。みんなかささぎだ」カムパネルラがまた何気なくしかるように叫（さけ）びましたので、ジョバンニはまた思わず笑（わら）い、女の子はきまり悪（わる）そうにしました。まったく河原（かわら）の青じろいあかりの上に、黒い鳥がたくさんたくさんいっぱいに列（れつ）になってとまってじっと川の微光（びこう）を受けているのでした。", "「かささぎですねえ、頭のうしろのとこに毛がぴんと延（の）びてますから」青年はとりなすように言（い）いました。", "向（む）こうの青い森の中の三角標（さんかくひょう）はすっかり汽車の正面（しょうめん）に来ました。そのとき汽車のずうっとうしろの方から、あの聞きなれた三〇六番の讃美歌（さんびか）のふしが聞こえてきました。よほどの人数で合唱（がっしょう）しているらしいのでした。青年はさっと顔いろが青ざめ、たって一ぺんそっちへ行きそうにしましたが思いかえしてまたすわりました。かおる子はハンケチを顔にあててしまいました。", "ジョバンニまでなんだか鼻（はな）が変（へん）になりました。けれどもいつともなく誰（だれ）ともなくその歌は歌い出されだんだんはっきり強くなりました。思わずジョバンニもカムパネルラもいっしょにうたいだしたのです。", "そして青い橄欖（かんらん）の森が、見えない天の川の向（む）こうにさめざめと光りながらだんだんうしろの方へ行ってしまい、そこから流（なが）れて来るあやしい楽器（がっき）の音も、もう汽車のひびきや風の音にすりへらされてずうっとかすかになりました。", "「あ、孔雀（くじゃく）がいるよ。あ、孔雀（くじゃく）がいるよ」", "「あの森琴（ライラ）の宿（やど）でしょう。あたしきっとあの森の中にむかしの大きなオーケストラの人たちが集（あつ）まっていらっしゃると思うわ、まわりには青い孔雀（くじゃく）やなんかたくさんいると思うわ」", "「ええ、たくさんいたわ」女の子がこたえました。", "ジョバンニはその小さく小さくなっていまはもう一つの緑（みどり）いろの貝（かい）ぼたんのように見える森の上にさっさっと青じろく時々光ってその孔雀（くじゃく）がはねをひろげたりとじたりする光の反射（はんしゃ）を見ました。", "「そうだ、孔雀（くじゃく）の声だってさっき聞こえた」カムパネルラが女の子に言（い）いました。", "「ええ、三十疋（ぴき）ぐらいはたしかにいたわ」女の子が答えました。", "ジョバンニはにわかになんとも言（い）えずかなしい気がして思わず、", "「カムパネルラ、ここからはねおりて遊（あそ）んで行こうよ」とこわい顔をして言（い）おうとしたくらいでした。", "ところがそのときジョバンニは川下の遠くの方に不思議（ふしぎ）なものを見ました。それはたしかになにか黒いつるつるした細長（ほそなが）いもので、あの見えない天の川の水の上に飛（と）び出してちょっと弓（ゆみ）のようなかたちに進（すす）んで、また水の中にかくれたようでした。おかしいと思ってまたよく気をつけていましたら、こんどはずっと近くでまたそんなことがあったらしいのでした。そのうちもうあっちでもこっちでも、その黒いつるつるした変（へん）なものが水から飛（と）び出して、まるく飛（と）んでまた頭から水へくぐるのがたくさん見えてきました。みんな魚のように川上へのぼるらしいのでした。", "「まあ、なんでしょう。たあちゃん。ごらんなさい。まあたくさんだわね。なんでしょうあれ」", "睡（ねむ）そうに眼（め）をこすっていた男の子はびっくりしたように立ちあがりました。", "「なんだろう」青年も立ちあがりました。", "「まあ、おかしな魚だわ、なんでしょうあれ」", "「海豚（いるか）です」カムパネルラがそっちを見ながら答えました。", "「海豚（いるか）だなんてあたしはじめてだわ。けどここ海じゃないんでしょう」", "「いるかは海にいるときまっていない」あの不思議（ふしぎ）な低（ひく）い声がまたどこからかしました。", "ほんとうにそのいるかのかたちのおかしいことは、二つのひれをちょうど両手（りょうて）をさげて不動（ふどう）の姿勢（しせい）をとったようなふうにして水の中から飛（と）び出して来て、うやうやしく頭を下にして不動（ふどう）の姿勢（しせい）のまままた水の中へくぐって行くのでした。見えない天の川の水もそのときはゆらゆらと青い焔（ほのお）のように波（なみ）をあげるのでした。", "「いるかお魚でしょうか」女の子がカムパネルラにはなしかけました。男の子はぐったりつかれたように席（せき）にもたれて睡（ねむ）っていました。", "「いるか、魚じゃありません。くじらと同じようなけだものです」カムパネルラが答えました。", "「あなたくじら見たことあって」", "「僕（ぼく）あります。くじら、頭と黒いしっぽだけ見えます。潮（しお）を吹（ふ）くとちょうど本にあるようになります」", "「くじらなら大きいわねえ」", "「くじら大きいです。子供（こども）だっているかぐらいあります」", "「そうよ、あたしアラビアンナイトで見たわ」姉（あね）は細（ほそ）い銀（ぎん）いろの指輪（ゆびわ）をいじりながらおもしろそうにはなししていました。", "（カムパネルラ、僕（ぼく）もう行っちまうぞ。僕（ぼく）なんか鯨（くじら）だって見たことないや）", "ジョバンニはまるでたまらないほどいらいらしながら、それでも堅（かた）く、唇（くちびる）を噛（か）んでこらえて窓（まど）の外を見ていました。その窓（まど）の外には海豚（いるか）のかたちももう見えなくなって川は二つにわかれました。そのまっくらな島（しま）のまん中に高い高いやぐらが一つ組まれて、その上に一人の寛（ゆる）い服（ふく）を着（き）て赤い帽子（ぼうし）をかぶった男が立っていました。そして両手（りょうて）に赤と青の旗（はた）をもってそらを見上げて信号（しんごう）しているのでした。", "ジョバンニが見ている間その人はしきりに赤い旗（はた）をふっていましたが、にわかに赤旗（あかはた）をおろしてうしろにかくすようにし、青い旗（はた）を高く高くあげてまるでオーケストラの指揮者（しきしゃ）のようにはげしく振（ふ）りました。すると空中にざあっと雨のような音がして、何かまっくらなものが、いくかたまりもいくかたまりも鉄砲丸（てっぽうだま）のように川の向（む）こうの方へ飛（と）んで行くのでした。ジョバンニは思わず窓（まど）からからだを半分出して、そっちを見あげました。美（うつく）しい美（うつく）しい桔梗（ききょう）いろのがらんとした空の下を、実（じつ）に何万（なんまん）という小さな鳥どもが、幾組（いくくみ）も幾組（いくくみ）もめいめいせわしくせわしく鳴いて通って行くのでした。", "「鳥が飛（と）んで行くな」ジョバンニが窓（まど）の外で言いました。", "「どら」カムパネルラもそらを見ました。", "そのときあのやぐらの上のゆるい服（ふく）の男はにわかに赤い旗（はた）をあげて狂気（きょうき）のようにふりうごかしました。するとぴたっと鳥の群（む）れは通らなくなり、それと同時にぴしゃあんというつぶれたような音が川下の方で起（お）こって、それからしばらくしいんとしました。と思ったらあの赤帽（あかぼう）の信号手（しんごうしゅ）がまた青い旗（はた）をふって叫（さけ）んでいたのです。", "「いまこそわたれわたり鳥、いまこそわたれわたり鳥」その声もはっきり聞こえました。", "それといっしょにまた幾万（いくまん）という鳥の群（む）れがそらをまっすぐにかけたのです。二人（ふたり）の顔を出しているまん中の窓（まど）からあの女の子が顔を出して美（うつく）しい頬（ほお）をかがやかせながらそらを仰（あお）ぎました。", "「まあ、この鳥、たくさんですわねえ、あらまあそらのきれいなこと」女の子はジョバンニにはなしかけましたけれどもジョバンニは生意気（なまいき）な、いやだいと思いながら、だまって口をむすんでそらを見あげていました。女の子は小さくほっと息（いき）をして、だまって席（せき）へ戻（もど）りました。カムパネルラがきのどくそうに窓（まど）から顔を引っ込（こ）めて地図を見ていました。", "「あの人鳥へ教えてるんでしょうか」女の子がそっとカムパネルラにたずねました。", "「わたり鳥へ信号（しんごう）してるんです。きっとどこからかのろしがあがるためでしょう」", "カムパネルラが少しおぼつかなそうに答えました。そして車の中はしいんとなりました。ジョバンニはもう頭を引っ込（こ）めたかったのですけれども明るいとこへ顔を出すのがつらかったので、だまってこらえてそのまま立って口笛（くちぶえ）を吹（ふ）いていました。", "（どうして僕（ぼく）はこんなにかなしいのだろう。僕（ぼく）はもっとこころもちをきれいに大きくもたなければいけない。あすこの岸（きし）のずうっと向（む）こうにまるでけむりのような小さな青い火が見える。あれはほんとうにしずかでつめたい。僕（ぼく）はあれをよく見てこころもちをしずめるんだ）", "ジョバンニは熱（ほて）って痛（いた）いあたまを両手（りょうて）で押（おさ）えるようにして、そっちの方を見ました。", "（ああほんとうにどこまでもどこまでも僕（ぼく）といっしょに行くひとはないだろうか。カムパネルラだってあんな女の子とおもしろそうに談（はな）しているし僕（ぼく）はほんとうにつらいなあ）", "ジョバンニの眼（め）はまた泪（なみだ）でいっぱいになり、天の川もまるで遠くへ行（い）ったようにぼんやり白く見えるだけでした。", "そのとき汽車はだんだん川からはなれて崖（がけ）の上を通るようになりました。向（む）こう岸（ぎし）もまた黒いいろの崖（がけ）が川の岸（きし）を下流（かりゅう）に下るにしたがって、だんだん高くなっていくのでした。そしてちらっと大きなとうもろこしの木を見ました。その葉（は）はぐるぐるに縮（ちぢ）れ葉（は）の下にはもう美しい緑（みどり）いろの大きな苞（ほう）が赤い毛を吐（は）いて真珠（しんじゅ）のような実（み）もちらっと見えたのでした。それはだんだん数を増（ま）してきて、もういまは列（れつ）のように崖（がけ）と線路（せんろ）との間にならび、思わずジョバンニが窓（まど）から顔を引っ込（こ）めて向（む）こう側（がわ）の窓（まど）を見ましたときは、美（うつく）しいそらの野原の地平線（ちへいせん）のはてまで、その大きなとうもろこしの木がほとんどいちめんに植（う）えられて、さやさや風にゆらぎ、その立派（りっぱ）なちぢれた葉（は）のさきからは、まるでひるの間にいっぱい日光を吸（す）った金剛石（こんごうせき）のように露（つゆ）がいっぱいについて、赤や緑（みどり）やきらきら燃（も）えて光っているのでした。カムパネルラが、", "「あれとうもろこしだねえ」とジョバンニに言（い）いましたけれども、ジョバンニはどうしても気持（きも）ちがなおりませんでしたから、ただぶっきらぼうに野原を見たまま、", "「そうだろう」と答えました。", "そのとき汽車はだんだんしずかになって、いくつかのシグナルとてんてつ器（き）の灯（あかり）を過ぎ、小さな停車場（ていしゃば）にとまりました。", "その正面（しょうめん）の青じろい時計（とけい）はかっきり第二時（だいにじ）を示（しめ）し、風もなくなり汽車もうごかず、しずかなしずかな野原のなかにその振（ふ）り子（こ）はカチッカチッと正しく時を刻（きざ）んでいくのでした。", "そしてまったくその振（ふ）り子（こ）の音のたえまを遠くの遠くの野原のはてから、かすかなかすかな旋律（せんりつ）が糸のように流（なが）れて来るのでした。", "「新世界交響楽（しんせかいこうきょうがく）だわ」向（む）こうの席（せき）の姉（あね）がひとりごとのようにこっちを見ながらそっと言（い）いました。", "全（まった）くもう車の中ではあの黒服（くろふく）の丈高（たけたか）い青年も誰（だれ）もみんなやさしい夢（ゆめ）を見ているのでした。", "（こんなしずかないいとこで僕（ぼく）はどうしてもっと愉快（ゆかい）になれないだろう。どうしてこんなにひとりさびしいのだろう。けれどもカムパネルラなんかあんまりひどい、僕（ぼく）といっしょに汽車に乗（の）っていながら、まるであんな女の子とばかり談（はな）しているんだもの。僕（ぼく）はほんとうにつらい）", "ジョバンニはまた手で顔を半分（はんぶん）かくすようにして向（む）こうの窓（まど）のそとを見つめていました。", "すきとおった硝子（ガラス）のような笛（ふえ）が鳴って汽車はしずかに動きだし、カムパネルラもさびしそうに星めぐりの口笛（くちぶえ）を吹（ふ）きました。", "「ええ、ええ、もうこの辺（へん）はひどい高原ですから」", "うしろの方で誰（だれ）かとしよりらしい人の、いま眼（め）がさめたというふうではきはき談（はな）している声がしました。", "「とうもろこしだって棒（ぼう）で二尺も孔（あな）をあけておいてそこへ播（ま）かないとはえないんです」", "「そうですか。川まではよほどありましょうかねえ」", "「ええ、ええ、河（かわ）までは二千尺（じゃく）から六千尺（じゃく）あります。もうまるでひどい峡谷（きょうこく）になっているんです」", "そうそうここはコロラドの高原じゃなかったろうか、ジョバンニは思わずそう思いました。", "あの姉（あね）は弟を自分の胸（むね）によりかからせて睡（ねむ）らせながら黒い瞳（ひとみ）をうっとりと遠くへ投（な）げて何を見るでもなしに考え込（こ）んでいるのでしたし、カムパネルラはまださびしそうにひとり口笛（くちぶえ）を吹（ふ）き、男の子はまるで絹（きぬ）で包（つつ）んだ苹果（りんご）のような顔いろをしてジョバンニの見る方を見ているのでした。", "突然（とつぜん）とうもろこしがなくなって巨（おお）きな黒い野原（のはら）がいっぱいにひらけました。", "新世界交響楽（しんせかいこうきょうがく）はいよいよはっきり地平線（ちへいせん）のはてから湧（わ）き、そのまっ黒な野原（のはら）のなかを一人のインデアンが白い鳥の羽根（はね）を頭につけ、たくさんの石を腕（うで）と胸（むね）にかざり、小さな弓（ゆみ）に矢（や）をつがえていちもくさんに汽車を追（お）って来るのでした。", "「あら、インデアンですよ。インデアンですよ。おねえさまごらんなさい」", "黒服（くろふく）の青年も眼（め）をさましました。", "ジョバンニもカムパネルラも立ちあがりました。", "「走って来るわ、あら、走って来るわ。追（お）いかけているんでしょう」", "「いいえ、汽車を追（お）ってるんじゃないんですよ。猟（りょう）をするか踊（おど）るかしてるんですよ」", "青年はいまどこにいるか忘（わす）れたというふうにポケットに手を入れて立ちながら言（い）いました。", "まったくインデアンは半分（はんぶん）は踊（おど）っているようでした。第一（だいいち）かけるにしても足のふみようがもっと経済（けいざい）もとれ本気にもなれそうでした。にわかにくっきり白いその羽根（はね）は前の方へ倒（たお）れるようになり、インデアンはぴたっと立ちどまって、すばやく弓（ゆみ）を空にひきました。そこから一羽（わ）の鶴（つる）がふらふらと落（お）ちて来て、また走り出したインデアンの大きくひろげた両手（りょうて）に落（お）ちこみました。インデアンはうれしそうに立ってわらいました。そしてその鶴（つる）をもってこっちを見ている影（かげ）も、もうどんどん小さく遠くなり、電しんばしらの碍子（がいし）がきらっきらっと続（つづ）いて二つばかり光って、またとうもろこしの林になってしまいました。こっち側（がわ）の窓（まど）を見ますと汽車はほんとうに高い高い崖（がけ）の上を走っていて、その谷の底（そこ）には川がやっぱり幅（はば）ひろく明るく流（なが）れていたのです。", "「ええ、もうこの辺（へん）から下りです。なんせこんどは一ぺんにあの水面（すいめん）までおりて行くんですから容易（ようい）じゃありません。この傾斜（けいしゃ）があるもんですから汽車は決（けっ）して向（む）こうからこっちへは来ないんです。そら、もうだんだん早くなったでしょう」さっきの老人（ろうじん）らしい声が言（い）いました。", "どんどんどんどん汽車は降（お）りて行きました。崖（がけ）のはじに鉄道（てつどう）がかかるときは川が明るく下にのぞけたのです。ジョバンニはだんだんこころもちが明るくなってきました。汽車が小さな小屋（こや）の前を通って、その前にしょんぼりひとりの子供（こども）が立ってこっちを見ているときなどは思わず、ほう、と叫（さけ）びました。", "どんどんどんどん汽車は走って行きました。室中（へやじゅう）のひとたちは半分（はんぶん）うしろの方へ倒（たお）れるようになりながら腰掛（こしかけ）にしっかりしがみついていました。ジョバンニは思わずカムパネルラとわらいました。もうそして天の川は汽車のすぐ横手（よこて）をいままでよほど激（はげ）しく流（なが）れて来たらしく、ときどきちらちら光ってながれているのでした。うすあかい河原（かわら）なでしこの花があちこち咲（さ）いていました。汽車はようやく落（お）ち着（つ）いたようにゆっくり走っていました。", "向（む）こうとこっちの岸（きし）に星のかたちとつるはしを書いた旗（はた）がたっていました。", "「あれなんの旗（はた）だろうね」ジョバンニがやっとものを言（い）いました。", "「さあ、わからないねえ、地図にもないんだもの。鉄（てつ）の舟（ふね）がおいてあるねえ」", "「ああ」", "「橋（はし）を架（か）けるとこじゃないんでしょうか」女の子が言（い）いました。", "「ああ、あれ工兵（こうへい）の旗（はた）だねえ。架橋演習（かきょうえんしゅう）をしてるんだ。けれど兵隊（へいたい）のかたちが見えないねえ」", "その時向（む）こう岸（ぎし）ちかくの少し下流（かりゅう）の方で、見えない天の川の水がぎらっと光って、柱（はしら）のように高くはねあがり、どおとはげしい音がしました。", "「発破（はっぱ）だよ、発破（はっぱ）だよ」カムパネルラはこおどりしました。", "その柱（はしら）のようになった水は見えなくなり、大きな鮭（さけ）や鱒（ます）がきらっきらっと白く腹（はら）を光らせて空中にほうり出されてまるい輪（わ）を描（えが）いてまた水に落（お）ちました。ジョバンニはもうはねあがりたいくらい気持（きも）ちが軽（かる）くなって言（い）いました。", "「空の工兵大隊（こうへいだいたい）だ。どうだ、鱒（ます）なんかがまるでこんなになってはねあげられたねえ。僕（ぼく）こんな愉快（ゆかい）な旅（たび）はしたことない。いいねえ」", "「あの鱒（ます）なら近くで見たらこれくらいあるねえ、たくさんさかないるんだな、この水の中に」", "「小さなお魚もいるんでしょうか」女の子が談（はなし）につり込（こ）まれて言（い）いました。", "「いるんでしょう。大きなのがいるんだから小さいのもいるんでしょう。けれど遠くだから、いま小さいの見えなかったねえ」ジョバンニはもうすっかり機嫌（きげん）が直（なお）っておもしろそうにわらって女の子に答えました。", "「あれきっと双子（ふたご）のお星さまのお宮（みや）だよ」男の子がいきなり窓（まど）の外をさして叫（さけ）びました。", "右手の低（ひく）い丘（おか）の上に小さな水晶（すいしょう）ででもこさえたような二つのお宮（みや）がならんで立っていました。", "「双子（ふたご）のお星さまのお宮（みや）ってなんだい」", "「あたし前になんべんもお母（っか）さんから聞いたわ。ちゃんと小さな水晶（すいしょう）のお宮（みや）で二つならんでいるからきっとそうだわ」", "「はなしてごらん。双子（ふたご）のお星さまが何をしたっての」", "「ぼくも知ってらい。双子（ふたご）のお星さまが野原へ遊（あそ）びにでて、からすと喧嘩（けんか）したんだろう」", "「そうじゃないわよ。あのね、天の川の岸（きし）にね、おっかさんお話しなすったわ、……」", "「それから彗星（ほうきぼし）がギーギーフーギーギーフーて言（い）って来たねえ」", "「いやだわ、たあちゃん、そうじゃないわよ。それはべつの方だわ」", "「するとあすこにいま笛（ふえ）を吹（ふ）いているんだろうか」", "「いま海へ行ってらあ」", "「いけないわよ。もう海からあがっていらっしゃったのよ」", "「そうそう。ぼく知ってらあ、ぼくおはなししよう」", "川の向こう岸（ぎし）がにわかに赤くなりました。", "楊（やなぎ）の木や何かもまっ黒にすかし出され、見えない天の川の波（なみ）も、ときどきちらちら針（はり）のように赤く光りました。まったく向（む）こう岸（ぎし）の野原に大きなまっ赤な火が燃（もや）され、その黒いけむりは高く桔梗（ききょう）いろのつめたそうな天をも焦（こ）がしそうでした。ルビーよりも赤くすきとおり、リチウムよりもうつくしく酔（よ）ったようになって、その火は燃（も）えているのでした。", "「あれはなんの火だろう。あんな赤く光る火は何を燃（も）やせばできるんだろう」ジョバンニが言（い）いました。", "「蠍（さそり）の火だな」カムパネルラがまた地図と首（くび）っぴきして答えました。", "「あら、蠍（さそり）の火のことならあたし知ってるわ」", "「蠍（さそり）の火ってなんだい」ジョバンニがききました。", "「蠍（さそり）がやけて死んだのよ。その火がいまでも燃（も）えてるって、あたし何べんもお父さんから聴（き）いたわ」", "「蠍（さそり）って、虫だろう」", "「ええ、蠍（さそり）は虫よ。だけどいい虫だわ」", "「蠍（さそり）いい虫じゃないよ。僕（ぼく）博物館（はくぶつかん）でアルコールにつけてあるの見た。尾（お）にこんなかぎがあってそれで螫（さ）されると死（し）ぬって先生が言（い）ってたよ」", "「そうよ。だけどいい虫だわ、お父さんこう言（い）ったのよ。むかしのバルドラの野原に一ぴきの蠍（さそり）がいて小さな虫やなんか殺（ころ）してたべて生きていたんですって。するとある日いたちに見つかって食べられそうになったんですって。さそりは一生けん命（めい）にげてにげたけど、とうとういたちに押（おさ）えられそうになったわ、そのときいきなり前に井戸（いど）があってその中に落（お）ちてしまったわ、もうどうしてもあがられないで、さそりはおぼれはじめたのよ。そのときさそりはこう言（い）ってお祈（いの）りしたというの。", "ああ、わたしはいままで、いくつのものの命（いのち）をとったかわからない、そしてその私がこんどいたちにとられようとしたときはあんなに一生けん命（めい）にげた。それでもとうとうこんなになってしまった。ああなんにもあてにならない。どうしてわたしはわたしのからだを、だまっていたちにくれてやらなかったろう。そしたらいたちも一日生きのびたろうに。どうか神（かみ）さま。私の心をごらんください。こんなにむなしく命（いのち）をすてず、どうかこの次（つぎ）には、まことのみんなの幸（さいわい）のために私のからだをおつかいください。って言（い）ったというの。", "そしたらいつか蠍（さそり）はじぶんのからだが、まっ赤なうつくしい火になって燃（も）えて、よるのやみを照（て）らしているのを見たって。いまでも燃（も）えてるってお父さんおっしゃったわ。ほんとうにあの火、それだわ」", "「そうだ。見たまえ。そこらの三角標（さんかくひょう）はちょうどさそりの形にならんでいるよ」", "ジョバンニはまったくその大きな火の向（む）こうに三つの三角標（さんかくひょう）が、ちょうどさそりの腕（うで）のように、こっちに五つの三角標（さんかくひょう）がさそりの尾（お）やかぎのようにならんでいるのを見ました。そしてほんとうにそのまっ赤なうつくしいさそりの火は音なくあかるくあかるく燃（も）えたのです。", "その火がだんだんうしろの方になるにつれて、みんなはなんとも言（い）えずにぎやかな、さまざまの楽（がく）の音（ね）や草花のにおいのようなもの、口笛（くちぶえ）や人々のざわざわ言（い）う声やらを聞きました。それはもうじきちかくに町か何かがあって、そこにお祭（まつ）りでもあるというような気がするのでした。", "「ケンタウル露（つゆ）をふらせ」いきなりいままで睡（ねむ）っていたジョバンニのとなりの男の子が向（む）こうの窓（まど）を見ながら叫（さけ）んでいました。", "ああそこにはクリスマストリイのようにまっ青な唐檜（とうひ）かもみの木がたって、その中にはたくさんのたくさんの豆電燈（まめでんとう）がまるで千の蛍（ほたる）でも集（あつ）まったようについていました。", "「ああ、そうだ、今夜ケンタウル祭（さい）だねえ」", "「ああ、ここはケンタウルの村だよ」カムパネルラがすぐ言（い）いました。", "「ボール投げなら僕（ぼく）決（けっ）してはずさない」", "男の子が大いばりで言（い）いました。", "「もうじきサウザンクロスです。おりるしたくをしてください」青年がみんなに言（い）いました。", "「僕（ぼく）、も少し汽車に乗ってるんだよ」男の子が言（い）いました。", "カムパネルラのとなりの女の子はそわそわ立ってしたくをはじめましたけれどもやっぱりジョバンニたちとわかれたくないようなようすでした。", "「ここでおりなけぁいけないのです」青年はきちっと口を結（むす）んで男の子を見おろしながら言（い）いました。", "「厭（いや）だい。僕（ぼく）もう少し汽車へ乗（の）ってから行くんだい」", "ジョバンニがこらえかねて言（い）いました。", "「僕（ぼく）たちといっしょに乗（の）って行こう。僕（ぼく）たちどこまでだって行ける切符（きっぷ）持（も）ってるんだ」", "「だけどあたしたち、もうここで降（お）りなけぁいけないのよ。ここ天上へ行くとこなんだから」", "女の子がさびしそうに言（い）いました。", "「天上へなんか行かなくたっていいじゃないか。ぼくたちここで天上よりももっといいとこをこさえなけぁいけないって僕（ぼく）の先生が言（い）ったよ」", "「だっておっ母（か）さんも行ってらっしゃるし、それに神（かみ）さまがおっしゃるんだわ」", "「そんな神（かみ）さまうその神（かみ）さまだい」", "「あなたの神（かみ）さまうその神（かみ）さまよ」", "「そうじゃないよ」", "「あなたの神（かみ）さまってどんな神（かみ）さまですか」青年は笑（わら）いながら言（い）いました。", "「ぼくほんとうはよく知りません。けれどもそんなんでなしに、ほんとうのたった一人（ひとり）の神（かみ）さまです」", "「ほんとうの神（かみ）さまはもちろんたった一人（ひとり）です」", "「ああ、そんなんでなしに、たったひとりのほんとうのほんとうの神（かみ）さまです」", "「だからそうじゃありませんか。わたくしはあなた方がいまにそのほんとうの神（かみ）さまの前に、わたくしたちとお会いになることを祈（いの）ります」青年はつつましく両手（りょうて）を組みました。", "女の子もちょうどその通りにしました。みんなほんとうに別（わか）れが惜（お）しそうで、その顔いろも少し青ざめて見えました。ジョバンニはあぶなく声をあげて泣（な）き出そうとしました。", "「さあもうしたくはいいんですか。じきサウザンクロスですから」", "ああそのときでした。見えない天の川のずうっと川下に青や橙（だいだい）や、もうあらゆる光でちりばめられた十字架（じゅうじか）が、まるで一本の木というふうに川の中から立ってかがやき、その上には青じろい雲がまるい環（わ）になって後光のようにかかっているのでした。汽車の中がまるでざわざわしました。みんなあの北の十字のときのようにまっすぐに立ってお祈（いの）りをはじめました。あっちにもこっちにも子供が瓜（うり）に飛（と）びついたときのようなよろこびの声や、なんとも言いようない深（ふか）いつつましいためいきの音ばかりきこえました。そしてだんだん十字架（じゅうじか）は窓（まど）の正面（しょうめん）になり、あの苹果（りんご）の肉（にく）のような青じろい環（わ）の雲も、ゆるやかにゆるやかに繞（めぐ）っているのが見えました。", "「ハレルヤ、ハレルヤ」明るくたのしくみんなの声はひびき、みんなはそのそらの遠くから、つめたいそらの遠くから、すきとおったなんとも言（い）えずさわやかなラッパの声をききました。そしてたくさんのシグナルや電燈（でんとう）の灯（あかり）のなかを汽車はだんだんゆるやかになり、とうとう十字架（じゅうじか）のちょうどま向（む）かいに行ってすっかりとまりました。", "「さあ、おりるんですよ」青年は男の子の手をひき姉（あね）は互（たが）いにえりや肩（かた）をなおしてやってだんだん向（む）こうの出口の方へ歩き出しました。", "「じゃさよなら」女の子がふりかえって二人に言（い）いました。", "「さよなら」ジョバンニはまるで泣（な）き出したいのをこらえておこったようにぶっきらぼうに言（い）いました。", "女の子はいかにもつらそうに眼（め）を大きくして、も一度（ど）こっちをふりかえって、それからあとはもうだまって出て行ってしまいました。汽車の中はもう半分以上（はんぶんいじょう）も空（す）いてしまいにわかにがらんとして、さびしくなり風がいっぱいに吹（ふ）き込（こ）みました。", "そして見ているとみんなはつつましく列（れつ）を組んで、あの十字架（じゅうじか）の前の天の川のなぎさにひざまずいていました。そしてその見えない天の川の水をわたって、ひとりのこうごうしい白いきものの人が手をのばしてこっちへ来るのを二人は見ました。けれどもそのときはもう硝子（ガラス）の呼（よ）び子は鳴らされ汽車はうごきだし、と思ううちに銀（ぎん）いろの霧（きり）が川下の方から、すうっと流（なが）れて来て、もうそっちは何も見えなくなりました。ただたくさんのくるみの木が葉（は）をさんさんと光らしてその霧（きり）の中に立ち、黄金（きん）の円光をもった電気栗鼠（でんきりす）が可愛（かわい）い顔をその中からちらちらのぞいているだけでした。", "そのとき、すうっと霧（きり）がはれかかりました。どこかへ行く街道（かいどう）らしく小さな電燈（でんとう）の一列（いちれつ）についた通りがありました。それはしばらく線路（せんろ）に沿（そ）って進（すす）んでいました。そして二人（ふたり）がそのあかしの前を通って行くときは、その小さな豆いろの火はちょうどあいさつでもするようにぽかっと消（き）え、二人（ふたり）が過ぎて行くときまた点（つ）くのでした。", "ふりかえって見ると、さっきの十字架（じゅうじか）はすっかり小さくなってしまい、ほんとうにもうそのまま胸（むね）にもつるされそうになり、さっきの女の子や青年たちがその前の白い渚（なぎさ）にまだひざまずいているのか、それともどこか方角（ほうがく）もわからないその天上へ行ったのか、ぼんやりして見分けられませんでした。", "ジョバンニは、ああ、と深（ふか）く息（いき）しました。", "「カムパネルラ、また僕（ぼく）たち二人（ふたり）きりになったねえ、どこまでもどこまでもいっしょに行こう。僕（ぼく）はもう、あのさそりのように、ほんとうにみんなの幸（さいわい）のためならば僕（ぼく）のからだなんか百ぺん灼（や）いてもかまわない」", "「うん。僕（ぼく）だってそうだ」カムパネルラの眼（め）にはきれいな涙（なみだ）がうかんでいました。", "「けれどもほんとうのさいわいはいったいなんだろう」", "ジョバンニが言（い）いました。", "「僕（ぼく）わからない」カムパネルラがぼんやり言（い）いました。", "「僕（ぼく）たちしっかりやろうねえ」ジョバンニが胸（むね）いっぱい新しい力が湧（わ）くように、ふうと息（いき）をしながら言（い）いました。", "「あ、あすこ石炭袋（せきたんぶくろ）だよ。そらの孔（あな）だよ」カムパネルラが少しそっちを避（さ）けるようにしながら天の川のひととこを指（ゆび）さしました。", "ジョバンニはそっちを見て、まるでぎくっとしてしまいました。天の川の一とこに大きなまっくらな孔（あな）が、どおんとあいているのです。その底（そこ）がどれほど深（ふか）いか、その奥（おく）に何があるか、いくら眼（め）をこすってのぞいてもなんにも見えず、ただ眼（め）がしんしんと痛（いた）むのでした。ジョバンニが言（い）いました。", "「僕（ぼく）もうあんな大きな暗（やみ）の中だってこわくない。きっとみんなのほんとうのさいわいをさがしに行く。どこまでもどこまでも僕（ぼく）たちいっしょに進（すす）んで行こう」", "「ああきっと行くよ。ああ、あすこの野原はなんてきれいだろう。みんな集（あつ）まってるねえ。あすこがほんとうの天上なんだ。あっ、あすこにいるのはぼくのお母さんだよ」", "カムパネルラはにわかに窓（まど）の遠くに見えるきれいな野原を指（さ）して叫（さけ）びました。", "ジョバンニもそっちを見ましたけれども、そこはぼんやり白くけむっているばかり、どうしてもカムパネルラが言（い）ったように思われませんでした。", "なんとも言（い）えずさびしい気がして、ぼんやりそっちを見ていましたら、向（む）こうの河岸（かわぎし）に二本の電信（でんしん）ばしらが、ちょうど両方（りょうほう）から腕（うで）を組んだように赤い腕木（うでぎ）をつらねて立っていました。", "「カムパネルラ、僕（ぼく）たちいっしょに行こうねえ」ジョバンニがこう言（い）いながらふりかえって見ましたら、そのいままでカムパネルラのすわっていた席（せき）に、もうカムパネルラの形は見えず、ただ黒いびろうどばかりひかっていました。", "ジョバンニはまるで鉄砲丸（てっぽうだま）のように立ちあがりました。そして誰（だれ）にも聞こえないように窓（まど）の外へからだを乗（の）り出して、力いっぱいはげしく胸（むね）をうって叫（さけ）び、それからもう咽喉（のど）いっぱい泣（な）きだしました。", "もうそこらが一ぺんにまっくらになったように思いました。そのとき、", "「おまえはいったい何を泣（な）いているの。ちょっとこっちをごらん」いままでたびたび聞こえた、あのやさしいセロのような声が、ジョバンニのうしろから聞こえました。", "ジョバンニは、はっと思って涙（なみだ）をはらってそっちをふり向（む）きました、さっきまでカムパネルラのすわっていた席（せき）に黒い大きな帽子（ぼうし）をかぶった青白い顔のやせた大人（おとな）が、やさしくわらって大きな一冊（さつ）の本をもっていました。", "「おまえのともだちがどこかへ行ったのだろう。あのひとはね、ほんとうにこんや遠くへ行ったのだ。おまえはもうカムパネルラをさがしてもむだだ」", "「ああ、どうしてなんですか。ぼくはカムパネルラといっしょにまっすぐに行こうと言（い）ったんです」", "「ああ、そうだ。みんながそう考える。けれどもいっしょに行けない。そしてみんながカムパネルラだ。おまえがあうどんなひとでも、みんな何べんもおまえといっしょに苹果（りんご）をたべたり汽車に乗（の）ったりしたのだ。だからやっぱりおまえはさっき考えたように、あらゆるひとのいちばんの幸福（こうふく）をさがし、みんなといっしょに早くそこに行くがいい、そこでばかりおまえはほんとうにカムパネルラといつまでもいっしょに行けるのだ」", "「ああぼくはきっとそうします。ぼくはどうしてそれをもとめたらいいでしょう」", "「ああわたくしもそれをもとめている。おまえはおまえの切符（きっぷ）をしっかりもっておいで。そして一しんに勉強（べんきょう）しなけぁいけない。おまえは化学（かがく）をならったろう、水は酸素（さんそ）と水素（すいそ）からできているということを知っている。いまはたれだってそれを疑（うたが）やしない。実験（じっけん）してみるとほんとうにそうなんだから。けれども昔（むかし）はそれを水銀（すいぎん）と塩（しお）でできていると言（い）ったり、水銀（すいぎん）と硫黄（いおう）でできていると言（い）ったりいろいろ議論（ぎろん）したのだ。みんながめいめいじぶんの神（かみ）さまがほんとうの神さまだというだろう、けれどもお互（たが）いほかの神（かみ）さまを信（しん）ずる人たちのしたことでも涙（なみだ）がこぼれるだろう。それからぼくたちの心がいいとかわるいとか議論（ぎろん）するだろう。そして勝負（しょうぶ）がつかないだろう。けれども、もしおまえがほんとうに勉強（べんきょう）して実験（じっけん）でちゃんとほんとうの考えと、うその考えとを分けてしまえば、その実験（じっけん）の方法（ほうほう）さえきまれば、もう信仰（しんこう）も化学（かがく）と同じようになる。けれども、ね、ちょっとこの本をごらん、いいかい、これは地理（ちり）と歴史（れきし）の辞典（じてん）だよ。この本のこの頁（ページ）はね、紀元前（きげんぜん）二千二百年の地理（ちり）と歴史（れきし）が書いてある。よくごらん、紀元前（きげんぜん）二千二百年のことでないよ、紀元前（きげんぜん）二千二百年のころにみんなが考えていた地理（ちり）と歴史（れきし）というものが書いてある。", "だからこの頁（ページ）一つが一冊（さつ）の地歴（ちれき）の本にあたるんだ。いいかい、そしてこの中に書いてあることは紀元前（きげんぜん）二千二百年ころにはたいてい本当（ほんとう）だ。さがすと証拠（しょうこ）もぞくぞく出ている。けれどもそれが少しどうかなとこう考えだしてごらん、そら、それは次（つぎ）の頁（ページ）だよ。", "紀元前（きげんぜん）一千年。だいぶ、地理（ちり）も歴史（れきし）も変（か）わってるだろう。このときにはこうなのだ。変（へん）な顔をしてはいけない。ぼくたちはぼくたちのからだだって考えだって、天の川だって汽車だって歴史（れきし）だって、ただそう感じているのなんだから、そらごらん、ぼくといっしょにすこしこころもちをしずかにしてごらん。いいか」", "そのひとは指（ゆび）を一本あげてしずかにそれをおろしました。するといきなりジョバンニは自分というものが、じぶんの考えというものが、汽車やその学者（がくしゃ）や天の川や、みんないっしょにぽかっと光って、しいんとなくなって、ぽかっとともってまたなくなって、そしてその一つがぽかっとともると、あらゆる広（ひろ）い世界（せかい）ががらんとひらけ、あらゆる歴史（れきし）がそなわり、すっと消（き）えると、もうがらんとした、ただもうそれっきりになってしまうのを見ました。だんだんそれが早くなって、まもなくすっかりもとのとおりになりました。", "「さあいいか。だからおまえの実験（じっけん）は、このきれぎれの考えのはじめから終（お）わりすべてにわたるようでなければいけない。それがむずかしいことなのだ。けれども、もちろんそのときだけのでもいいのだ。ああごらん、あすこにプレシオスが見える。おまえはあのプレシオスの鎖（くさり）を解（と）かなければならない」", "そのときまっくらな地平線（ちへいせん）の向（む）こうから青じろいのろしが、まるでひるまのようにうちあげられ、汽車の中はすっかり明るくなりました。そしてのろしは高くそらにかかって光りつづけました。", "「ああマジェランの星雲（せいうん）だ。さあもうきっと僕（ぼく）は僕（ぼく）のために、僕（ぼく）のお母さんのために、カムパネルラのために、みんなのために、ほんとうのほんとうの幸福（こうふく）をさがすぞ」", "ジョバンニは唇（くちびる）を噛（か）んで、そのマジェランの星雲（せいうん）をのぞんで立ちました。そのいちばん幸福（こうふく）なそのひとのために！", "「さあ、切符（きっぷ）をしっかり持（も）っておいで。お前はもう夢（ゆめ）の鉄道（てつどう）の中でなしにほんとうの世界（せかい）の火やはげしい波（なみ）の中を大股（おおまた）にまっすぐに歩いて行かなければいけない。天の川のなかでたった一つの、ほんとうのその切符（きっぷ）を決（けっ）しておまえはなくしてはいけない」", "あのセロのような声がしたと思うとジョバンニは、あの天の川がもうまるで遠く遠くなって風が吹（ふ）き自分はまっすぐに草の丘（おか）に立っているのを見、また遠くからあのブルカニロ博士（はかせ）の足おとのしずかに近づいて来るのをききました。", "「ありがとう。私はたいへんいい実験（じっけん）をした。私はこんなしずかな場所（ばしょ）で遠くから私の考えを人に伝（つた）える実験（じっけん）をしたいとさっき考えていた。お前の言（い）った語はみんな私の手帳（てちょう）にとってある。さあ帰っておやすみ。お前は夢（ゆめ）の中で決心（けっしん）したとおりまっすぐに進（すす）んで行くがいい。そしてこれからなんでもいつでも私のとこへ相談（そうだん）においでなさい」", "「僕（ぼく）きっとまっすぐに進（すす）みます。きっとほんとうの幸福（こうふく）を求（もと）めます」ジョバンニは力強（ちからづよ）く言（い）いました。", "「ああではさよなら。これはさっきの切符（きっぷ）です」", "博士（はかせ）は小さく折（お）った緑（みどり）いろの紙をジョバンニのポケットに入れました。そしてもうそのかたちは天気輪（てんきりん）の柱（はしら）の向（む）こうに見えなくなっていました。", "ジョバンニはまっすぐに走って丘（おか）をおりました。", "そしてポケットがたいへん重（おも）くカチカチ鳴るのに気がつきました。林の中でとまってそれをしらべてみましたら、あの緑（みどり）いろのさっき夢（ゆめ）の中で見たあやしい天の切符（きっぷ）の中に大きな二枚（まい）の金貨（きんか）が包（つつ）んでありました。", "「博士（はかせ）ありがとう、おっかさん。すぐ乳（ちち）をもって行きますよ」", "ジョバンニは叫（さけ）んでまた走りはじめました。何かいろいろのものが一ぺんにジョバンニの胸（むね）に集（あつ）まってなんとも言（い）えずかなしいような新しいような気がするのでした。", "琴（こと）の星がずうっと西の方へ移（うつ）ってそしてまた夢（ゆめ）のように足をのばしていました。", "ジョバンニは眼（め）をひらきました。もとの丘（おか）の草の中につかれてねむっていたのでした。胸（むね）はなんだかおかしく熱（ほて）り、頬（ほお）にはつめたい涙（なみだ）がながれていました。", "ジョバンニはばねのようにはね起（お）きました。町はすっかりさっきの通りに下でたくさんの灯（あかり）を綴（つづ）ってはいましたが、その光はなんだかさっきよりは熱（ねっ）したというふうでした。", "そしてたったいま夢（ゆめ）であるいた天の川もやっぱりさっきの通りに白くぼんやりかかり、まっ黒な南の地平線（ちへいせん）の上ではことにけむったようになって、その右には蠍座（さそりざ）の赤い星がうつくしくきらめき、そらぜんたいの位置（いち）はそんなに変（か）わってもいないようでした。", "ジョバンニはいっさんに丘（おか）を走って下りました。まだ夕ごはんをたべないで待（ま）っているお母さんのことが胸（むね）いっぱいに思いだされたのです。どんどん黒い松（まつ）の林の中を通って、それからほの白い牧場（ぼくじょう）の柵（さく）をまわって、さっきの入口から暗（くら）い牛舎（ぎゅうしゃ）の前へまた来ました。そこには誰（だれ）かがいま帰ったらしく、さっきなかった一つの車が何かの樽（たる）を二つ載（の）っけて置（お）いてありました。", "「今晩（こんばん）は」ジョバンニは叫（さけ）びました。", "「はい」白い太いずぼんをはいた人がすぐ出て来て立ちました。", "「なんのご用ですか」", "「今日牛乳（ぎゅうにゅう）がぼくのところへ来なかったのですが」", "「あ、済（す）みませんでした」その人はすぐ奥（おく）へ行って一本の牛乳瓶（ぎゅうにゅうびん）をもって来てジョバンニに渡（わた）しながら、また言（い）いました。", "「ほんとうに済（す）みませんでした。今日はひるすぎ、うっかりしてこうしの柵（さく）をあけておいたもんですから、大将（たいしょう）さっそく親牛（おやうし）のところへ行って半分（はんぶん）ばかりのんでしまいましてね……」その人はわらいました。", "「そうですか。ではいただいて行きます」", "「ええ、どうも済（す）みませんでした」", "「いいえ」", "ジョバンニはまだ熱（あつ）い乳（ちち）の瓶（びん）を両方（りょうほう）のてのひらで包（つつ）むようにもって牧場（ぼくじょう）の柵（さく）を出ました。", "そしてしばらく木のある町を通って大通りへ出てまたしばらく行きますとみちは十文字になって、その右手の方、通りのはずれにさっきカムパネルラたちのあかりを流（なが）しに行った川へかかった大きな橋（はし）のやぐらが夜のそらにぼんやり立っていました。", "ところがその十字になった町かどや店の前に女たちが七、八人ぐらいずつ集（あつ）まって橋（はし）の方を見ながら何かひそひそ談（はな）しているのです。それから橋（はし）の上にもいろいろなあかりがいっぱいなのでした。", "ジョバンニはなぜかさあっと胸（むね）が冷（つめ）たくなったように思いました。そしていきなり近くの人たちへ、", "「何かあったんですか」と叫（さけ）ぶようにききました。", "「こどもが水へ落（お）ちたんですよ」一人（ひとり）が言（い）いますと、その人たちは一斉（いっせい）にジョバンニの方を見ました。ジョバンニはまるで夢中（むちゅう）で橋（はし）の方へ走りました。橋（はし）の上は人でいっぱいで河（かわ）が見えませんでした。白い服（ふく）を着（き）た巡査（じゅんさ）も出ていました。", "ジョバンニは橋（はし）の袂（たもと）から飛（と）ぶように下の広い河原（かわら）へおりました。", "その河原（かわら）の水ぎわに沿（そ）ってたくさんのあかりがせわしくのぼったり下ったりしていました。向（む）こう岸（ぎし）の暗（くら）いどてにも火が七つ八つうごいていました。そのまん中をもう烏瓜（からすうり）のあかりもない川が、わずかに音をたてて灰（はい）いろにしずかに流（なが）れていたのでした。", "河原（かわら）のいちばん下流（かりゅう）の方へ洲（す）のようになって出たところに人の集（あつ）まりがくっきりまっ黒に立っていました。ジョバンニはどんどんそっちへ走りました。するとジョバンニはいきなりさっきカムパネルラといっしょだったマルソに会（あ）いました。マルソがジョバンニに走り寄（よ）って言（い）いました。", "「ジョバンニ、カムパネルラが川へはいったよ」", "「どうして、いつ」", "「ザネリがね、舟（ふね）の上から烏（からす）うりのあかりを水の流（なが）れる方へ押（お）してやろうとしたんだ。そのとき舟（ふね）がゆれたもんだから水へ落（お）っこったろう。するとカムパネルラがすぐ飛（と）びこんだんだ。そしてザネリを舟（ふね）の方へ押（お）してよこした。ザネリはカトウにつかまった。けれどもあとカムパネルラが見えないんだ」", "「みんなさがしてるんだろう」", "「ああ、すぐみんな来た。カムパネルラのお父さんも来た。けれども見つからないんだ。ザネリはうちへ連（つ）れられてった」", "ジョバンニはみんなのいるそっちの方へ行きました。そこに学生たちや町の人たちに囲（かこ）まれて青じろいとがったあごをしたカムパネルラのお父さんが黒い服（ふく）を着（き）てまっすぐに立って左手に時計（とけい）を持（も）ってじっと見つめていたのです。", "みんなもじっと河（かわ）を見ていました。誰（だれ）も一言（ひとこと）も物（もの）を言（い）う人もありませんでした。ジョバンニはわくわくわくわく足がふるえました。魚をとるときのアセチレンランプがたくさんせわしく行ったり来たりして、黒い川の水はちらちら小さな波（なみ）をたてて流（なが）れているのが見えるのでした。", "下流（かりゅう）の方の川はばいっぱい銀河（ぎんが）が巨（おお）きく写（うつ）って、まるで水のないそのままのそらのように見えました。", "ジョバンニは、そのカムパネルラはもうあの銀河（ぎんが）のはずれにしかいないというような気がしてしかたなかったのです。", "けれどもみんなはまだ、どこかの波（なみ）の間から、", "「ぼくずいぶん泳（およ）いだぞ」と言いながらカムパネルラが出て来るか、あるいはカムパネルラがどこかの人の知らない洲（す）にでも着（つ）いて立っていて誰（だれ）かの来るのを待（ま）っているかというような気がしてしかたないらしいのでした。けれどもにわかにカムパネルラのお父さんがきっぱり言（い）いました。", "「もう駄目（だめ）です。落（お）ちてから四十五分たちましたから」", "ジョバンニは思わずかけよって博士（はかせ）の前に立って、ぼくはカムパネルラの行った方を知っています、ぼくはカムパネルラといっしょに歩いていたのです、と言（い）おうとしましたが、もうのどがつまってなんとも言（い）えませんでした。すると博士（はかせ）はジョバンニがあいさつに来たとでも思ったものですか、しばらくしげしげジョバンニを見ていましたが、", "「あなたはジョバンニさんでしたね。どうも今晩（こんばん）はありがとう」とていねいに言（い）いました。", "ジョバンニは何も言（い）えずにただおじぎをしました。", "「あなたのお父さんはもう帰っていますか」博士（はかせ）は堅（かた）く時計（とけい）を握（にぎ）ったまま、またききました。", "「いいえ」ジョバンニはかすかに頭をふりました。", "「どうしたのかなあ、ぼくには一昨日（おととい）たいへん元気な便（たよ）りがあったんだが。今日（きょう）あたりもう着（つ）くころなんだが。船（ふね）が遅（おく）れたんだな。ジョバンニさん。あした放課後（ほうかご）みなさんとうちへ遊（あそ）びに来てくださいね」", "そう言（い）いながら博士（はかせ）はまた、川下の銀河（ぎんが）のいっぱいにうつった方へじっと眼（め）を送（おく）りました。", "ジョバンニはもういろいろなことで胸（むね）がいっぱいで、なんにも言（い）えずに博士（はかせ）の前をはなれて、早くお母さんに牛乳（ぎゅうにゅう）を持（も）って行って、お父さんの帰ることを知らせようと思うと、もういちもくさんに河原（かわら）を街（まち）の方へ走りました。"]}, {"no": 13, "title": "グスコーブドリの伝記", "author": "宮沢 賢治", "category": "日本文学-児童-童話", "chars": 25790, "volume": "大", "paras": ["一　森", "グスコーブドリは、イーハトーヴの大きな森のなかに生まれました。おとうさんは、グスコーナドリという名高い木こりで、どんな大きな木でも、まるで赤ん坊を寝かしつけるようにわけなく切ってしまう人でした。", "ブドリにはネリという妹があって、二人は毎日森で遊びました。ごしっごしっとおとうさんの木を挽（ひ）く音が、やっと聞こえるくらいな遠くへも行きました。二人はそこで木いちごの実をとってわき水につけたり、空を向いてかわるがわる山鳩（やまばと）の鳴くまねをしたりしました。するとあちらでもこちらでも、ぽう、ぽう、と鳥が眠そうに鳴き出すのでした。", "おかあさんが、家の前の小さな畑に麦を播（ま）いているときは、二人はみちにむしろをしいてすわって、ブリキかんで蘭（らん）の花を煮たりしました。するとこんどは、もういろいろの鳥が、二人のぱさぱさした頭の上を、まるで挨拶（あいさつ）するように鳴きながらざあざあざあざあ通りすぎるのでした。", "ブドリが学校へ行くようになりますと、森はひるの間たいへんさびしくなりました。そのかわりひるすぎには、ブドリはネリといっしょに、森じゅうの木の幹に、赤い粘土や消し炭で、木の名を書いてあるいたり、高く歌ったりしました。", "ホップのつるが、両方からのびて、門のようになっている白樺（しらかば）の木には、", "「カッコウドリ、トオルベカラズ」と書いたりもしました。", "そして、ブドリは十になり、ネリは七つになりました。ところがどういうわけですか、その年は、お日さまが春から変に白くて、いつもなら雪がとけるとまもなく、まっしろな花をつけるこぶしの木もまるで咲かず、五月になってもたびたび霙（みぞれ）がぐしゃぐしゃ降り、七月の末になってもいっこうに暑さが来ないために、去年播（ま）いた麦も粒の入らない白い穂しかできず、たいていの果物（くだもの）も、花が咲いただけで落ちてしまったのでした。", "そしてとうとう秋になりましたが、やっぱり栗（くり）の木は青いからのいがばかりでしたし、みんなでふだんたべるいちばんたいせつなオリザという穀物も、一つぶもできませんでした。野原ではもうひどいさわぎになってしまいました。", "ブドリのおとうさんもおかあさんも、たびたび薪（たきぎ）を野原のほうへ持って行ったり、冬になってからは何べんも大きな木を町へそりで運んだりしたのでしたが、いつもがっかりしたようにして、わずかの麦の粉などもって帰ってくるのでした。それでもどうにかその冬は過ぎて次の春になり、畑にはたいせつにしまっておいた種も播かれましたが、その年もまたすっかり前の年のとおりでした。そして秋になると、とうとうほんとうの饑饉（ききん）になってしまいました。もうそのころは学校へ来るこどももまるでありませんでした。ブドリのおとうさんもおかあさんも、すっかり仕事をやめていました。そしてたびたび心配そうに相談しては、かわるがわる町へ出て行って、やっとすこしばかりの黍（きび）の粒など持って帰ることもあれば、なんにも持たずに顔いろを悪くして帰ってくることもありました。そしてみんなは、こならの実や、葛（くず）やわらびの根や、木の柔らかな皮やいろんなものをたべて、その冬をすごしました。", "けれども春が来たころは、おとうさんもおかあさんも、何かひどい病気のようでした。", "ある日おとうさんは、じっと頭をかかえて、いつまでもいつまでも考えていましたが、にわかに起きあがって、", "「おれは森へ行って遊んでくるぞ。」と言いながら、よろよろ家を出て行きましたが、まっくらになっても帰って来ませんでした。二人がおかあさんに、おとうさんはどうしたろうときいても、おかあさんはだまって二人の顔を見ているばかりでした。", "次の日の晩方になって、森がもう黒く見えるころ、おかあさんはにわかに立って、炉に榾（ほだ）をたくさんくべて家じゅうすっかり明るくしました。それから、わたしはおとうさんをさがしに行くから、お前たちはうちにいてあの戸棚（とだな）にある粉を二人ですこしずつたべなさいと言って、やっぱりよろよろ家を出て行きました。二人が泣いてあとから追って行きますと、おかあさんはふり向いて、", "「なんたらいうことをきかないこどもらだ。」としかるように言いました。", "そしてまるで足早に、つまずきながら森へはいってしまいました。二人は何べんも行ったり来たりして、そこらを泣いて回りました。とうとうこらえ切れなくなって、まっくらな森の中へはいって、いつかのホップの門のあたりや、わき水のあるあたりをあちこちうろうろ歩きながら、おかあさんを一晩呼びました。森の木の間からは、星がちらちら何か言うようにひかり、鳥はたびたびおどろいたように暗（やみ）の中を飛びましたけれども、どこからも人の声はしませんでした。とうとう二人はぼんやり家へ帰って中へはいりますと、まるで死んだように眠ってしまいました。", "ブドリが目をさましたのは、その日のひるすぎでした。", "おかあさんの言った粉のことを思い出して戸棚（とだな）をあけて見ますと、なかには、袋に入れたそば粉やこならの実がまだたくさんはいっていました。ブドリはネリをゆり起こして二人でその粉をなめ、おとうさんたちがいたときのように炉に火をたきました。", "それから、二十日（はつか）ばかりぼんやり過ぎましたら、ある日戸口で、", "「今日は、だれかいるかね。」と言うものがありました。おとうさんが帰って来たのかと思って、ブドリがはね出して見ますと、それは籠（かご）をしょった目の鋭い男でした。その男は籠の中から丸い餅（もち）をとり出してぽんと投げながら言いました。", "「私はこの地方の飢饉（ききん）を助けに来たものだ。さあなんでも食べなさい。」二人はしばらくあきれていましたら、", "「さあ食べるんだ、食べるんだ。」とまた言いました。二人がこわごわたべはじめますと、男はじっと見ていましたが、", "「お前たちはいい子供だ。けれどもいい子供だというだけではなんにもならん。わしといっしょについておいで。もっとも男の子は強いし、わしも二人はつれて行けない。おい女の子、おまえはここにいてももうたべるものがないんだ。おじさんといっしょに町へ行こう。毎日パンを食べさしてやるよ。」そしてぷいっとネリを抱きあげて、せなかの籠へ入れて、そのまま、", "「おおほいほい。おおほいほい。」とどなりながら、風のように家を出て行きました。ネリはおもてではじめてわっと泣き出し、ブドリは、", "「どろぼう、どろぼう。」と泣きながら叫んで追いかけましたが、男はもう森の横を通ってずうっと向こうの草原を走っていて、そこからネリの泣き声が、かすかにふるえて聞こえるだけでした。", "ブドリは、泣いてどなって森のはずれまで追いかけて行きましたが、とうとう疲れてばったり倒れてしまいました。", "二　てぐす工場", "ブドリがふっと目をひらいたとき、いきなり頭の上で、いやに平べったい声がしました。", "「やっと目がさめたな。まだお前は飢饉（ききん）のつもりかい。起きておれに手伝わないか。」見るとそれは茶いろなきのこしゃっぽ　　　きのこしゃっぽ」に傍点］をかぶって外套（がいとう）にすぐシャツを着た男で、何か針金でこさえたものをぶらぶら持っているのでした。", "「もう飢饉は過ぎたの？　手伝えって何を手伝うの？」", "ブドリがききました。", "「網掛けさ。」", "「ここへ網を掛けるの？」", "「掛けるのさ。」", "「網をかけて何にするの？」", "「てぐすを飼うのさ。」見るとすぐブドリの前の栗（くり）の木に、二人の男がはしごをかけてのぼっていて、一生けん命何か網を投げたり、それを操（あやつ）ったりしているようでしたが、網も糸もいっこう見えませんでした。", "「あれでてぐすが飼えるの？」", "「飼えるのさ。うるさいこどもだな。おい、縁起でもないぞ。てぐすも飼えないところにどうして工場なんか建てるんだ。飼えるともさ。現におれをはじめたくさんのものが、それでくらしを立てているんだ。」", "ブドリはかすれた声で、やっと、", "「そうですか。」と言いました。", "「それにこの森は、すっかりおれが買ってあるんだから、ここで手伝うならいいが、そうでもなければどこかへ行ってもらいたいな。もっともお前はどこへ行ったって食うものもなかろうぜ。」", "ブドリは泣き出しそうになりましたが、やっとこらえて言いました。", "「そんなら手伝うよ。けれどもどうして網をかけるの？」", "「それはもちろん教えてやる。こいつをね。」男は、手に持った針金の籠（かご）のようなものを両手で引き伸ばしました。", "「いいか。こういう具合にやるとはしごになるんだ。」", "男は大またに右手の栗（くり）の木に歩いて行って、下の枝に引っ掛けました。", "「さあ、今度はおまえが、この網をもって上へのぼって行くんだ。さあ、のぼってごらん。」", "男は変なまりのようなものをブドリに渡しました。ブドリはしかたなくそれをもってはしご　　　はしご」に傍点］にとりついて登って行きましたが、はしごの段々がまるで細くて手や足に食いこんでちぎれてしまいそうでした。", "「もっと登るんだ。もっと、もっとさ。そしたらさっきのまりを投げてごらん。栗の木を越すようにさ。そいつを空へ投げるんだよ。なんだい、ふるえてるのかい。いくじなしだなあ。投げるんだよ。投げるんだよ。そら、投げるんだよ。」", "ブドリはしかたなく力いっぱいにそれを青空に投げたと思いましたら、にわかにお日さまがまっ黒に見えて逆しまに下へおちました。そしていつか、その男に受けとめられていたのでした。男はブドリを地面におろしながらぶりぶりおこり出しました。", "「お前もいくじのないやつだ。なんというふにゃふにゃだ。おれが受け止めてやらなかったらお前は今ごろは頭がはじけていたろう。おれはお前の命の恩人だぞ。これからは、失礼なことを言ってはならん。ところで、さあ、こんどはあっちの木へ登れ。も少したったらごはん　　　ごはん」に傍点］もたべさせてやるよ。」男はまたブドリへ新しいまりを渡しました。ブドリははしご　をもって次の木へ行ってまりを投げました。", "「よし、なかなかじょうずになった。さあ、まりはたくさんあるぞ。なまけるな。木も栗の木ならどれでもいいんだ。」", "男はポケットから、まりを十ばかり出してブドリに渡すと、すたすた向こうへ行ってしまいました。ブドリはまた三つばかりそれを投げましたが、どうしても息がはあはあして、からだがだるくてたまらなくなりました。もう家へ帰ろうと思って、そっちへ行って見ますと、おどろいたことには、家にはいつか赤い土管の煙突がついて、戸口には、「イーハトーヴてぐす工場」という看板がかかっているのでした。そして中からたばこをふかしながら、さっきの男が出て来ました。", "「さあこども、たべものをもってきてやったぞ。これを食べて暗くならないうちにもう少しかせぐんだ。」", "「ぼくはもういやだよ、うちへ帰るよ。」", "「うちっていうのはあすこか。あすこはおまえのうちじゃない。おれのてぐす工場だよ。あの家もこの辺の森もみんなおれが買ってあるんだからな。」", "ブドリはもうやけになって、だまってその男のよこした蒸しパンをむしゃむしゃたべて、またまりを十ばかり投げました。", "その晩ブドリは、昔のじぶんのうち、いまはてぐす工場になっている建物のすみに、小さくなってねむりました。", "さっきの男は、三四人の知らない人たちとおそくまで炉ばたで火をたいて、何か飲んだりしゃべったりしていました。次の朝早くから、ブドリは森に出て、きのうのようにはたらきました。", "それから一月ばかりたって、森じゅうの栗（くり）の木に網がかかってしまいますと、てぐす飼いの男は、こんどは粟（あわ）のようなものがいっぱいついた板きれを、どの木にも五六枚ずつつるさせました。そのうちに木は芽を出して森はまっ青（さお）になりました。すると、木につるした板きれから、たくさんの小さな青じろい虫が糸をつたって列になって枝へはいあがって行きました。", "ブドリたちはこんどは毎日薪（たきぎ）とりをさせられました。その薪が、家のまわりに小山のように積み重なり、栗（くり）の木が青じろいひものかたちの花を枝いちめんにつけるころになりますと、あの板からはいあがって行った虫も、ちょうど栗の花のような色とかたちになりました。そして森じゅうの栗の葉は、まるで形もなくその虫に食い荒らされてしまいました。", "それからまもなく、虫は大きな黄いろな繭を、網の目ごとにかけはじめました。", "するとてぐす飼いの男は、狂気のようになって、ブドリたちをしかりとばして、その繭を籠（かご）に集めさせました。それをこんどは片っぱしから鍋（なべ）に入れてぐらぐら煮て、手で車をまわしながら糸をとりました。夜も昼もがらがらがらがら三つの糸車をまわして糸をとりました。こうしてこしらえた黄いろな糸が小屋に半分ばかりたまったころ、外に置いた繭からは、大きな白い蛾（が）がぽろぽろぽろぽろ飛びだしはじめました。てぐす飼いの男は、まるで鬼みたいな顔つきになって、じぶんも一生けん命糸をとりましたし、野原のほうからも四人の人を連れてきて働かせました。けれども蛾のほうは日ましに多く出るようになって、しまいには森じゅうまるで雪でも飛んでいるようになりました。するとある日、六七台の荷馬車が来て、いままでにできた糸をみんなつけて、町のほうへ帰りはじめました。みんなも一人ずつ荷馬車について行きました。いちばんしまいの荷馬車がたったとき、てぐす飼いの男が、ブドリに、", "「おい、お前の来春まで食うくらいのものは家の中に置いてやるからな。それまでここで森と工場の番をしているんだぞ。」", "と言って、変ににやにやしながら荷馬車についてさっさと行ってしまいました。", "ブドリはぼんやりあとへ残りました。うちの中はまるできたなくてあらしのあとのようでしたし、森は荒れはてて山火事にでもあったようでした。ブドリが次の日、家のなかやまわりを片付けはじめましたら、てぐす飼いの男がいつもすわっていた所から古いボール紙の箱を見つけました。中には十冊ばかりの本がぎっしりはいっておりました。開いて見ると、てぐすの絵や機械の図がたくさんある、まるで読めない本もありましたし、いろいろな木や草の図と名前の書いてあるものもありました。", "ブドリはいっしょうけんめい、その本のまねをして字を書いたり、図をうつしたりしてその冬を暮らしました。", "春になりますと、またあの男が六七人のあたらしい手下を連れて、たいへん立派ななりをしてやって来ました。そして次の日からすっかり去年のような仕事がはじまりました。", "そして網はみんなかかり、黄いろな板もつるされ、虫は枝にはい上がり、ブドリたちはまた、薪（たきぎ）作りにかかることになりました。ある朝ブドリたちが薪をつくっていましたら、にわかにぐらぐらっと地震がはじまりました。それからずうっと遠くでどーんという音がしました。", "しばらくたつと日が変にくらくなり、こまかな灰がばさばさばさばさ降って来て、森はいちめんにまっ白になりました。ブドリたちがあきれて木の下にしゃがんでいましたら、てぐす飼いの男がたいへんあわててやって来ました。", "「おい、みんな、もうだめだぞ。噴火だ。噴火がはじまったんだ。てぐすはみんな灰をかぶって死んでしまった。みんな早く引き揚げてくれ。おい、ブドリ、お前ここにいたかったらいてもいいが、こんどはたべ物は置いてやらないぞ。それにここにいてもあぶないからな。お前も野原へ出て何かかせぐほうがいいぜ。」", "そう言ったかと思うと、もうどんどん走って行ってしまいました。ブドリが工場へ行って見たときは、もうだれもおりませんでした。そこでブドリは、しょんぼりとみんなの足跡のついた白い灰をふんで野原のほうへ出て行きました。", "三　沼ばたけ", "ブドリは、いっぱいに灰をかぶった森の間を、町のほうへ半日歩きつづけました。灰は風の吹くたびに木からばさばさ落ちて、まるでけむりか吹雪（ふぶき）のようでした。けれどもそれは野原へ近づくほど、だんだん浅く少なくなって、ついには木も緑に見え、みちの足跡も見えないくらいになりました。", "とうとう森を出切ったとき、ブドリは思わず目をみはりました。野原は目の前から、遠くのまっしろな雲まで、美しい桃いろと緑と灰いろのカードでできているようでした。そばへ寄って見ると、その桃いろなのには、いちめんにせいの低い花が咲いていて、蜜蜂（みつばち）がいそがしく花から花をわたってあるいていましたし、緑いろなのには小さな穂を出して草がぎっしりはえ、灰いろなのは浅い泥の沼でした。そしてどれも、低い幅のせまい土手でくぎられ、人は馬を使ってそれを掘り起こしたりかき回したりしてはたらいていました。", "ブドリがその間を、しばらく歩いて行きますと、道のまん中に二人の人が、大声で何かけんかでもするように言い合っていました。右側のほうのひげの赭（あか）い人が言いました。", "「なんでもかんでも、おれは山師張るときめた。」", "するとも一人の白い笠（かさ）をかぶった、せいの高いおじいさんが言いました。", "「やめろって言ったらやめるもんだ。そんなに肥料うんと入れて、藁（わら）はとれるたって、実は一粒もとれるもんでない。」", "「うんにゃ、おれの見込みでは、ことしは今までの三年分暑いに相違ない。一年で三年分とって見せる。」", "「やめろ。やめろ。やめろったら。」", "「うんにゃ、やめない。花はみんな埋めてしまったから、こんどは豆玉を六十枚入れて、それから鶏の糞（かえし）、百駄（だん）入れるんだ。急がしったらなんの、こう忙しくなればささげのつるでもいいから手伝いに頼みたいもんだ。」", "ブドリは思わず近寄っておじぎをしました。", "「そんならぼくを使ってくれませんか。」", "すると二人は、ぎょっとしたように顔をあげて、あごに手をあててしばらくブドリを見ていましたが、赤ひげがにわかに笑い出しました。", "「よしよし。お前に馬の指竿（させ）とりを頼むからな。すぐおれについて行くんだ。それではまず、のるかそるか、秋まで見ててくれ。さあ行こう。ほんとに、ささげ　のつるでもいいから頼みたい時でな。」赤ひげは、ブドリとおじいさんにかわるがわる言いながら、さっさと先に立って歩きました。あとではおじいさんが、", "「年寄りの言うこと聞かないで、いまに泣くんだな。」とつぶやきながら、しばらくこっちを見送っているようすでした。", "それからブドリは、毎日毎日沼ばたけへはいって馬を使って泥をかき回しました。一日ごとに桃いろのカードも緑のカードもだんだんつぶされて、泥沼に変わるのでした。馬はたびたびぴしゃっと泥水をはねあげて、みんなの顔へ打ちつけました。一つの沼ばたけがすめばすぐ次の沼ばたけへはいるのでした。一日がとても長くて、しまいには歩いているのかどうかもわからなくなったり、泥が飴（あめ）のような、水がスープのような気がしたりするのでした。風が何べんも吹いて来て、近くの泥水に魚のうろこのような波をたて、遠くの水をブリキいろにして行きました。そらでは、毎日甘くすっぱいような雲が、ゆっくりゆっくりながれていて、それがじつにうらやましそうに見えました。", "こうして二十日（はつか）ばかりたちますと、やっと沼ばたけはすっかりどろどろになりました。次の朝から主人はまるで気が立って、あちこちから集まって来た人たちといっしょに、その沼ばたけに緑いろの槍（やり）のようなオリザの苗をいちめん植えました。それが十日ばかりで済むと、今度はブドリたちを連れて、今まで手伝ってもらった人たちの家へ毎日働きにでかけました。それもやっと一まわり済むと、こんどはまたじぶんの沼ばたけへ戻って来て、毎日毎日草取りをはじめました。ブドリの主人の苗は大きくなってまるで黒いくらいなのに、となりの沼ばたけはぼんやりしたうすい緑いろでしたから、遠くから見ても、二人の沼ばたけははっきり境まで見わかりました。七日ばかりで草取りが済むとまたほかへ手伝いに行きました。", "ところがある朝、主人はブドリを連れて、じぶんの沼ばたけを通りながら、にわかに「あっ」と叫んで棒立ちになってしまいました。見るとくちびるのいろまで水いろになって、ぼんやりまっすぐを見つめているのです。", "「病気が出たんだ。」主人がやっと言いました。", "「頭でも痛いんですか。」ブドリはききました。", "「おれでないよ。オリザよ。それ。」主人は前のオリザの株を指さしました。ブドリはしゃがんでしらべてみますと。なるほどどの葉にも、いままで見たことのない赤い点々がついていました。主人はだまってしおしおと沼ばたけを一まわりしましたが、家へ帰りはじめました。ブドリも心配してついて行きますと、主人はだまって巾（きれ）を水でしぼって、頭にのせると、そのまま板の間に寝てしまいました。するとまもなく、主人のおかみさんが表からかけ込んで来ました。", "「オリザへ病気が出たというのはほんとうかい。」", "「ああ、もうだめだよ。」", "「どうにかならないのかい。」", "「だめだろう。すっかり五年前のとおりだ。」", "「だから、あたしはあんたに山師をやめろといったんじゃないか。おじいさんもあんなにとめたんじゃないか。」", "おかみさんはおろおろ泣きはじめました。すると主人がにわかに元気になってむっくり起き上がりました。", "「よし。イーハトーヴの野原で、指折り数えられる大百姓のおれが、こんなことで参るか。よし。来年こそやるぞ。ブドリ、おまえおれのうちへ来てから、まだ一晩も寝たいくらい寝たことがないな。さあ、五日でも十日でもいいから、ぐうというくらい寝てしまえ。おれはそのあとで、あすこの沼ばたけでおもしろい手品（てずま）をやって見せるからな。その代わりことしの冬は、家じゅうそばばかり食うんだぞ。おまえそばはすきだろうが。」それから主人はさっさと帽子をかぶって外へ出て行ってしまいました。", "ブドリは主人に言われたとおり納屋（なや）へはいって眠ろうと思いましたが、なんだかやっぱり沼ばたけが苦になってしかたないので、またのろのろそっちへ行って見ました。するといつ来ていたのか、主人がたった一人腕組みをして土手に立っておりました。見ると沼ばたけには水がいっぱいで、オリザの株は葉をやっと出しているだけ、上にはぎらぎら石油が浮かんでいるのでした。主人が言いました。", "「いまおれ、この病気を蒸し殺してみるところだ。」", "「石油で病気の種が死ぬんですか。」とブドリがききますと、主人は、", "「頭から石油につけられたら人だって死ぬだ。」と言いながら、ほうと息を吸って首をちぢめました。その時、水下の沼ばたけの持ち主が、肩をいからして、息を切ってかけて来て、大きな声でどなりました。", "「なんだって油など水へ入れるんだ。みんな流れて来て、おれのほうへはいってるぞ。」", "主人は、やけくそに落ちついて答えました。", "「なんだって油など水へ入れるったって、オリザへ病気がついたから、油など水へ入れるのだ。」", "「なんだってそんならおれのほうへ流すんだ。」", "「なんだってそんならおまえのほうへ流すったって、水は流れるから油もついて流れるのだ。」", "「そんならなんだっておれのほうへ水こないように水口（みなくち）とめないんだ。」", "「なんだっておまえのほうへ水行かないように水口とめないかったって、あすこはおれのみな口でないから水とめないのだ。」", "となりの男は、かんかんおこってしまってもう物も言えず、いきなりがぶがぶ水へはいって、自分の水口に泥を積みあげはじめました。主人はにやりと笑いました。", "「あの男むずかしい男でな。こっちで水をとめると、とめたといっておこるからわざと向こうにとめさせたのだ。あすこさえとめれば今夜じゅうに水はすっかり草の頭までかかるからな、さあ帰ろう。」主人はさきに立ってすたすた家へあるきはじめました。", "次の朝ブドリはまた主人と沼ばたけへ行ってみました。主人は水の中から葉を一枚とってしきりにしらべていましたが、やっぱり浮かない顔でした。その次の日もそうでした。その次の日もそうでした。その次の日もそうでした。その次の朝、とうとう主人は決心したように言いました。", "「さあブドリ、いよいよここへ蕎麦播（そばま）きだぞ。おまえあすこへ行って、となりの水口こわして来い。」", "ブドリは、言われたとおりこわして来ました。石油のはいった水は、恐ろしい勢いでとなりの田へ流れて行きます。きっとまたおこってくるなと思っていますと、ひるごろ例のとなりの持ち主が、大きな鎌（かま）をもってやってきました。", "「やあ、なんだってひとの田へ石油ながすんだ。」", "主人がまた、腹の底から声を出して答えました。", "「石油ながれればなんだって悪いんだ。」", "「オリザみんな死ぬでないか。」", "「オリザみんな死ぬか、オリザみんな死なないか、まずおれの沼ばたけのオリザ見なよ。きょうで四日頭から石油かぶせたんだ。それでもちゃんとこのとおりでないか。赤くなったのは病気のためで、勢いのいいのは石油のためなんだ。おまえの所など、石油がただオリザの足を通るだけでないか。かえっていいかもしれないんだ。」", "「石油こやしになるのか。」向こうの男は少し顔いろをやわらげました。", "「石油こやしになるか、石油こやしにならないか知らないが、とにかく石油は油でないか。」", "「それは石油は油だな。」男はすっかりきげんを直してわらいました。水はどんどん退（ひ）き、オリザの株は見る見る根もとまで出て来ました。すっかり赤い斑（まだら）ができて焼けたようになっています。", "「さあおれの所ではもうオリザ刈りをやるぞ。」", "主人は笑いながら言って、それからブドリといっしょに、片っぱしからオリザの株を刈り、跡へすぐ蕎麦（そば）を播（ま）いて土をかけて歩きました。そしてその年はほんとうに主人の言ったとおり、ブドリの家では蕎麦ばかり食べました。次の春になると主人が言いました。", "「ブドリ、ことしは沼ばたけは去年よりは三分の一減ったからな、仕事はよほどらくだ。そのかわりおまえは、おれの死んだ息子（むすこ）の読んだ本をこれから一生けん命勉強して、いままでおれを山師だといってわらったやつらを、あっと言わせるような立派なオリザを作るくふうをしてくれ。」", "そして、いろいろな本を一山ブドリに渡しました。ブドリは仕事のひまに片っぱしからそれを読みました。ことにその中の、クーボーという人の物の考え方を教えた本はおもしろかったので何べんも読みました。またその人が、イーハトーヴの市で一か月の学校をやっているのを知って、たいへん行って習いたいと思ったりしました。", "そして早くもその夏、ブドリは大きな手柄をたてました。それは去年と同じころ、またオリザに病気ができかかったのを、ブドリが木の灰と食塩（しお）を使って食いとめたのでした。そして八月のなかばになると、オリザの株はみんなそろって穂を出し、その穂の一枝ごとに小さな白い花が咲き、花はだんだん水いろの籾（もみ）にかわって、風にゆらゆら波をたてるようになりました。主人はもう得意の絶頂でした。来る人ごとに、", "「なんの、おれも、オリザの山師で四年しくじったけれども、ことしは一度に四年分とれる。これもまたなかなかいいもんだ。」などと言って自慢するのでした。", "ところがその次の年はそうは行きませんでした。植え付けのころからさっぱり雨が降らなかったために、水路はかわいてしまい、沼にはひびが入って、秋のとりいれはやっと冬じゅう食べるくらいでした。来年こそと思っていましたが、次の年もまた同じようなひでりでした。それからも、来年こそ来年こそと思いながら、ブドリの主人は、だんだんこやしを入れることができなくなり、馬も売り、沼ばたけもだんだん売ってしまったのでした。", "ある秋の日、主人はブドリにつらそうに言いました。", "「ブドリ、おれももとはイーハトーヴの大百姓だったし、ずいぶんかせいでも来たのだが、たびたびの寒さと旱魃（かんばつ）のために、いまでは沼ばたけも昔の三分の一になってしまったし、来年はもう入れるこやしもないのだ。おれだけでない。来年こやしを買って入れれる人ったらもうイーハトーヴにも何人もないだろう。こういうあんばいでは、いつになっておまえにはたらいてもらった礼をするというあてもない。おまえも若い働き盛りを、おれのとこで暮らしてしまってはあんまり気の毒だから、済まないがどうかこれを持って、どこへでも行っていい運を見つけてくれ。」そして主人は、一ふくろのお金と新しい紺で染めた麻の服と赤皮の靴（くつ）とをブドリにくれました。", "ブドリはいままでの仕事のひどかったことも忘れてしまって、もう何もいらないから、ここで働いていたいとも思いましたが、考えてみると、いてもやっぱり仕事もそんなにないので、主人に何べんも何べんも礼を言って、六年の間はたらいた沼ばたけと主人に別れて、停車場をさして歩きだしました。", "四　クーボー大博士", "ブドリは二時間ばかり歩いて、停車場へ来ました。それから切符を買って、イーハトーヴ行きの汽車に乗りました。汽車はいくつもの沼ばたけをどんどんどんどんうしろへ送りながら、もう一散に走りました。その向こうには、たくさんの黒い森が、次から次と形を変えて、やっぱりうしろのほうへ残されて行くのでした。ブドリはいろいろな思いで胸がいっぱいでした。早くイーハトーヴの市に着いて、あの親切な本を書いたクーボーという人に会い、できるなら、働きながら勉強して、みんながあんなにつらい思いをしないで沼ばたけを作れるよう、また火山の灰だのひでりだの寒さだのを除くくふうをしたいと思うと、汽車さえまどろこくってたまらないくらいでした。汽車はその日のひるすぎ、イーハトーヴの市に着きました。停車場を一足出ますと、地面の底から、何かのんのんわくようなひびきやどんよりとしたくらい空気、行ったり来たりするたくさんの自動車に、ブドリはしばらくぼうとしてつっ立ってしまいました。やっと気をとりなおして、そこらの人にクーボー博士の学校へ行くみちをたずねました。するとだれへきいても、みんなブドリのあまりまじめな顔を見て、吹き出しそうにしながら、", "「そんな学校は知らんね。」とか、", "「もう五六丁行ってきいてみな。」とかいうのでした。そしてブドリがやっと学校をさがしあてたのはもう夕方近くでした。その大きなこわれかかった白い建物の二階で、だれか大きな声でしゃべっていました。", "「今日は。」ブドリは高く叫びました。だれも出てきませんでした。", "「今日はあ。」ブドリはあらん限り高く叫びました。するとすぐ頭の上の二階の窓から、大きな灰いろの顔が出て、めがねが二つぎらりと光りました。それから、", "「今授業中だよ、やかましいやつだ。用があるならはいって来い。」とどなりつけて、すぐ顔を引っ込めますと、中ではおおぜいでどっと笑い、その人はかまわずまた何か大声でしゃべっています。", "ブドリはそこで思い切って、なるべく足音をたてないように二階にあがって行きますと、階段のつき当たりの扉（とびら）があいていて、じつに大きな教室が、ブドリのまっ正面にあらわれました。中にはさまざまの服装をした学生がぎっしりです。向こうは大きな黒い壁になっていて、そこにたくさんの白い線が引いてあり、さっきのせいの高い目がねをかけた人が、大きな櫓（やぐら）の形の模型をあちこち指さしながら、さっきのままの高い声で、みんなに説明しておりました。", "ブドリはそれを一目見ると、ああこれは先生の本に書いてあった歴史の歴史ということの模型だなと思いました。先生は笑いながら、一つのとって　を回しました。模型はがちっと鳴って奇体な船のような形になりました。またがちっととって　を回すと、模型はこんどは大きなむかでのような形に変わりました。", "みんなはしきりに首をかたむけて、どうもわからんというふうにしていましたが、ブドリにはただおもしろかったのです。", "「そこでこういう図ができる。」先生は黒い壁へ別の込み入った図をどんどん書きました。", "左手にもチョークをもって、さっさと書きました。学生たちもみんな一生けん命そのまねをしました。ブドリもふところから、いままで沼ばたけで持っていたきたない手帳を出して図を書きとりました。先生はもう書いてしまって、壇の上にまっすぐに立って、じろじろ学生たちの席を見まわしています。ブドリも書いてしまって、その図を縦横から見ていますと、ブドリのとなりで一人の学生が、", "「あああ。」とあくびをしました。ブドリはそっとききました。", "「ね、この先生はなんて言うんですか。」", "すると学生はばかにしたように鼻でわらいながら答えました。", "「クーボー大博士さ、お前知らなかったのかい。」それからじろじろブドリのようすを見ながら、", "「はじめから、この図なんか書けるもんか。ぼくでさえ同じ講義をもう六年もきいているんだ。」", "と言って、じぶんのノートをふところへしまってしまいました。その時教室に、ぱっと電燈がつきました。もう夕方だったのです。大博士が向こうで言いました。", "「いまや夕べははるかにきたり、拙講もまた全課をおえた。諸君のうちの希望者は、けだしいつもの例により、そのノートをば拙者に示し、さらに数箇の試問を受けて、所属を決すべきである。」学生たちはわあと叫んで、みんなばたばたノートをとじました。それからそのまま帰ってしまうものが大部分でしたが、五六十人は一列になって大博士の前をとおりながらノートを開いて見せるのでした。すると大博士はそれをちょっと見て、一言か二言質問をして、それから白墨でえりへ、「合」とか、「再来」とか、「奮励」とか書くのでした。学生はその間、いかにも心配そうに首をちぢめているのでしたが、それからそっと肩をすぼめて廊下まで出て、友だちにそのしるしを読んでもらって、よろこんだりしょげたりするのでした。", "ぐんぐん試験が済んで、いよいよブドリ一人になりました。ブドリがその小さなきたない手帳を出したとき、クーボー大博士は大きなあくびをやりながら、かがんで目をぐっと手帳につけるようにしましたので、手帳はあぶなく大博士に吸い込まれそうになりました。", "ところが大博士は、うまそうにこくっと一つ息をして、「よろしい。この図は非常に正しくできている。そのほかのところは、なんだ。ははあ、沼ばたけのこやしのことに、馬のたべ物のことかね。では問題に答えなさい。工場の煙突から出るけむりには、どういう色の種類があるか。」", "ブドリは思わず大声に答えました。", "「黒、褐（かつ）、黄、灰、白、無色。それからこれらの混合です。」", "大博士はわらいました。", "「無色のけむりはたいへんいい。形について言いたまえ。」", "「無風で煙が相当あれば、たての棒にもなりますが、さきはだんだんひろがります。雲の非常に低い日は、棒は雲までのぼって行って、そこから横にひろがります。風のある日は、棒は斜めになりますが、その傾きは風の程度に従います。波やいくつもきれになるのは、風のためにもよりますが、一つはけむりや煙突のもつ癖のためです。あまり煙の少ないときは、コルク抜きの形にもなり、煙も重いガスがまじれば、煙突の口から房（ふさ）になって、一方ないし四方におちることもあります。」", "大博士はまたわらいました。", "「よろしい。きみはどういう仕事をしているのか。」", "「仕事をみつけに来たんです。」", "「おもしろい仕事がある。名刺をあげるから、そこへすぐ行きなさい。」博士は名刺をとり出して、何かするする書き込んでブドリにくれました。ブドリはおじぎをして、戸口を出て行こうとしますと、大博士はちょっと目で答えて、", "「なんだ、ごみを焼いてるのかな。」と低くつぶやきながら、テーブルの上にあった鞄（かばん）に、白墨（チョーク）のかけらや、はんけちや本や、みんないっしょに投げ込んで小わきにかかえ、さっき顔を出した窓から、プイッと外へ飛び出しました。びっくりしてブドリが窓へかけよって見ますと、いつか大博士は玩具（おもちゃ）のような小さな飛行船に乗って、じぶんでハンドルをとりながら、もううす青いもやのこめた町の上を、まっすぐに向こうへ飛んでいるのでした。ブドリがいよいよあきれて見ていますと、まもなく大博士は、向こうの大きな灰いろの建物の平屋根に着いて、船を何かかぎのようなものにつなぐと、そのままぽろっと建物の中へはいって見えなくなってしまいました。", "五　イーハトーヴ火山局", "ブドリが、クーボー大博士からもらった名刺のあて名をたずねて、やっと着いたところは大きな茶いろの建物で、うしろには房（ふさ）のような形をした高い柱が夜のそらにくっきり白く立っておりました。ブドリは玄関に上がって呼び鈴を押しますと、すぐ人が出て来て、ブドリの出した名刺を受け取り、一目見ると、すぐブドリを突き当たりの大きな室へ案内しました。", "そこにはいままでに見たこともないような大きなテーブルがあって、そのまん中に一人の少し髪の白くなった人のよさそうな立派な人が、きちんとすわって耳に受話器をあてながら何か書いていました。そしてブドリのはいって来たのを見ると、すぐ横の椅子（いす）を指さしながら、また続けて何か書きつけています。", "その室の右手の壁いっぱいに、イーハトーヴ全体の地図が、美しく色どった大きな模型に作ってあって、鉄道も町も川も野原もみんな一目でわかるようになっており、そのまん中を走るせぼねのような山脈と、海岸に沿って縁をとったようになっている山脈、またそれから枝を出して海の中に点々の島をつくっている一列の山々には、みんな赤や橙（だいだい）や黄のあかりがついていて、それがかわるがわる色が変わったりジーと蝉（せみ）のように鳴ったり、数字が現われたり消えたりしているのです。下の壁に添った棚（たな）には、黒いタイプライターのようなものが三列に百でもきかないくらい並んで、みんなしずかに動いたり鳴ったりしているのでした。ブドリがわれを忘れて見とれておりますと、その人が受話器をことっと置いて、ふところから名刺入れを出して、一枚の名刺をブドリに出しながら「あなたが、グスコーブドリ君ですか。私はこういうものです。」と言いました。見ると、〔イーハトーヴ火山局技師ペンネンナーム〕と書いてありました。その人はブドリの挨拶（あいさつ）になれないでもじもじしているのを見ると、重ねて親切に言いました。", "「さっきクーボー博士から電話があったのでお待ちしていました。まあこれから、ここで仕事をしながらしっかり勉強してごらんなさい。ここの仕事は、去年はじまったばかりですが、じつに責任のあるもので、それに半分はいつ噴火するかわからない火山の上で仕事するものなのです。それに火山の癖というものは、なかなか学問でわかることではないのです。われわれはこれからよほどしっかりやらなければならんのです。では今晩はあっちにあなたの泊まるところがありますから、そこでゆっくりお休みなさい。あしたこの建物じゅうをすっかり案内しますから。」", "次の朝、ブドリはペンネン老技師に連れられて、建物のなかを一々つれて歩いてもらい、さまざまの機械やしかけを詳しく教わりました。その建物のなかのすべての器械はみんなイーハトーヴじゅうの三百幾つかの活火山や休火山に続いていて、それらの火山の煙や灰を噴（ふ）いたり、熔岩（ようがん）を流したりしているようすはもちろん、みかけはじっとしている古い火山でも、その中の熔岩やガスのもようから、山の形の変わりようまで、みんな数字になったり図になったりして、あらわれて来るのでした。そしてはげしい変化のあるたびに、模型はみんな別々の音で鳴るのでした。", "ブドリはその日からベンネン老技師について、すべての器械の扱い方や観測のしかたを習い、夜も昼も一心に働いたり勉強したりしました。そして二年ばかりたちますと、ブドリはほかの人たちといっしょにあちこちの火山へ器械を据え付けに出されたり、据え付けてある器械の悪くなったのを修繕にやられたりもするようになりましたので、もうブドリにはイーハトーヴの三百幾つの火山と、その働き具合は掌（たなごころ）の中にあるようにわかって来ました。", "じつにイーハトーヴには、七十幾つの火山が毎日煙をあげたり、熔岩を流したりしているのでしたし、五十幾つかの休火山は、いろいろなガスを噴（ふ）いたり、熱い湯を出したりしていました。そして残りの百六七十の死火山のうちにも、いつまた何をはじめるかわからないものもあるのでした。", "ある日ブドリが老技師とならんで仕事をしておりますと、にわかにサンムトリという南のほうの海岸にある火山が、むくむく器械に感じ出して来ました。老技師が叫びました。", "「ブドリ君。サンムトリは、けさまで何もなかったね。」", "「はい、いままでサンムトリのはたらいたのを見たことがありません。」", "「ああ、これはもう噴火が近い。けさの地震が刺激したのだ。この山の北十キロのところにはサンムトリの市がある。今度爆発すれば、たぶん山は三分の一、北側をはねとばして、牛やテーブルぐらいの岩は熱い灰やガスといっしょに、どしどしサンムトリ市におちてくる。どうでも今のうちに、この海に向いたほうへボーリングを入れて傷口をこさえて、ガスを抜くか熔岩を出させるかしなければならない。今すぐ二人で見に行こう。」二人はすぐにしたくして、サンムトリ行きの汽車に乗りました。", "六　サンムトリ火山", "二人は次の朝、サンムトリの市に着き、ひるごろサンムトリ火山の頂近く、観測器械を置いてある小屋に登りました。そこは、サンムトリ山の古い噴火口の外輪山が、海のほうへ向いて欠けた所で、その小屋の窓からながめますと、海は青や灰いろの幾つもの縞（しま）になって見え、その中を汽船は黒いけむりを吐き、銀いろの水脈（みお）を引いていくつもすべっているのでした。", "老技師はしずかにすべての観測機を調べ、それからブドリに言いました。", "「きみはこの山はあと何日ぐらいで噴火すると思うか。」", "「一月はもたないと思います。」", "「一月はもたない。もう十日ももたない。早く工作してしまわないと、取り返しのつかないことになる。私はこの山の海に向いたほうでは、あすこがいちばん弱いと思う。」老技師は山腹の谷の上のうす緑の草地を指さしました。そこを雲の影がしずかに青くすべっているのでした。", "「あすこには熔岩（ようがん）の層が二つしかない。あとは柔らかな火山灰と火山礫（かざんれき）の層だ。それにあすこまでは牧場の道も立派にあるから、材料を運ぶことも造作（ぞうさ）ない。ぼくは工作隊を申請しよう。」", "老技師は忙しく局へ発信をはじめました。その時足の下では、つぶやくようなかすかな音がして、観測小屋はしばらくぎしぎしきしみました。老技師は器械をはなれました。", "「局からすぐ工作隊を出すそうだ。工作隊といっても半分決死隊だ。私はいままでに、こんな危険に迫った仕事をしたことがない。」", "「十日のうちにできるでしょうか。」", "「きっとできる。装置には三日、サンムトリ市の発電所から、電線を引いてくるには五日かかるな。」", "技師はしばらく指を折って考えていましたが、やがて安心したようにまたしずかに言いました。", "「とにかくブドリ君。一つ茶をわかして飲もうではないか。あんまりいい景色だから。」", "ブドリは持って来たアルコールランプに火を入れて、茶をわかしはじめました。空にはだんだん雲が出て、それに日ももう落ちたのか、海はさびしい灰いろに変わり、たくさんの白い波がしらは、いっせいに火山のすそに寄せて来ました。", "ふとブドリはすぐ目の前に、いつか見たことのあるおかしな形の小さな飛行船が飛んでいるのを見つけました。老技師もはねあがりました。", "「あ、クーボー君がやって来た。」ブドリも続いて小屋をとび出しました。飛行船はもう小屋の左側の大きな岩の壁の上にとまって、中からせいの高いクーボー大博士がひらりと飛びおりていました。博士はしばらくその辺の岩の大きなさけ目をさがしていましたが、やっとそれを見つけたと見えて、手早くねじをしめて飛行船をつなぎました。", "「お茶をよばれに来たよ。ゆれるかい。」大博士はにやにやわらって言いました。老技師が答えました。", "「まだそんなでない。けれども、どうも岩がぼろぼろ上から落ちているらしいんだ。」", "ちょうどその時、山はにわかにおこったように鳴り出し、ブドリは目の前が青くなったように思いました。山はぐらぐら続けてゆれました。見るとクーボー大博士も老技師もしゃがんで岩へしがみついていましたし、飛行船も大きな波に乗った船のようにゆっくりゆれておりました。", "地震はやっとやみ、クーボー大博士は起きあがってすたすたと小屋へはいって行きました。中ではお茶がひっくり返って、アルコールが青くぽかぽか燃えていました。クーボー大博士は器械をすっかり調べて、それから老技師といろいろ話しました。そしてしまいに言いました。", "「もうどうしても、来年は潮汐（ちょうせき）発電所を全部作ってしまわなければならない。それができれば今度のような場合にもその日のうちに仕事ができるし、ブドリ君が言っている沼ばたけの肥料も降らせられるんだ。」", "「旱魃（かんばつ）だってちっともこわくなくなるからな。」ペンネン技師も言いました。ブドリは胸がわくわくしました。山まで踊りあがっているように思いました。じっさい山は、その時はげしくゆれ出して、ブドリは床へ投げ出されていたのです。大博士が言いました。", "「やるぞ、やるぞ。いまのはサンムトリの市へも、かなり感じたにちがいない。」", "老技師が言いました。", "「今のはぼくらの足もとから、北へ一キロばかり、地表下七百メートルぐらいの所で、この小屋の六七十倍ぐらいの岩の塊（かたまり）が熔岩（ようがん）の中へ落ち込んだらしいのだ。ところがガスがいよいよ最後の岩の皮をはね飛ばすまでには、そんな塊を百も二百も、じぶんのからだの中にとらなければならない。」", "大博士はしばらく考えていましたが、", "「そうだ、僕はこれで失敬しよう。」と言って小屋を出て、いつかひらりと船に乗ってしまいました。老技師とブドリは、大博士があかりを二三度振って挨拶（あいさつ）しながら、山をまわって向こうへ行くのを見送ってまた小屋にはいり、かわるがわる眠ったり観測したりしました。そして明け方ふもとへ工作隊がつきますと、老技師はブドリを一人小屋に残して、きのう指さしたあの草地まで降りて行きました。みんなの声や、鉄の材料の触れ合う音は、下から風の吹き上げるときは、手にとるように聞こえました。ペンネン技師からはひっきりなしに、向こうの仕事の進み具合も知らせてよこし、ガスの圧力や山の形の変わりようも尋ねて来ました。それから三日の間は、はげしい地震や地鳴りのなかで、ブドリのほうもふもとのほうもほとんど眠るひまさえありませんでした。その四日目の午前、老技師からの発信が言って来ました。", "「ブドリ君だな。すっかりしたくができた。急いで降りてきたまえ。観測の器械は一ぺん調べてそのままにして、表（ひょう）は全部持ってくるのだ。もうその小屋はきょうの午後にはなくなるんだから。」", "ブドリはすっかり言われたとおりにして山を降りて行きました。そこにはいままで局の倉庫にあった大きな鉄材が、すっかり櫓（やぐら）に組み立っていて、いろいろな器械はもう電流さえ来ればすぐに働き出すばかりになっていました。ペンネン技師の頬（ほお）はげっそり落ち、工作隊の人たちも青ざめて目ばかり光らせながら、それでもみんな笑ってブドリに挨拶（あいさつ）しました。", "老技師が言いました。", "「では引き上げよう。みんなしたくして車に乗りたまえ。」みんなは大急ぎで二十台の自動車に乗りました。車は列になって山のすそを一散にサンムトリの市に走りました。ちょうど山と市とのまん中どこで、技師は自動車をとめさせました。「ここへ天幕（てんと）を張りたまえ。そしてみんなで眠るんだ。」みんなは、物をひとことも言えずに、そのとおりにして倒れるようにねむってしまいました。その午後、老技師は受話器を置いて叫びました。", "「さあ電線は届いたぞ。ブドリ君、始めるよ。」老技師はスイッチを入れました。ブドリたちは、天幕（てんと）の外に出て、サンムトリの中腹を見つめました。野原には、白百合（しらゆり）がいちめんに咲き、その向こうにサンムトリが青くひっそり立っていました。", "にわかにサンムトリの左のすそがぐらぐらっとゆれ、まっ黒なけむりがぱっと立ったと思うとまっすぐに天までのぼって行って、おかしなきのこの形になり、その足もとから黄金色（きんいろ）の熔岩（ようがん）がんきらきら流れ出して、見るまにずうっと扇形にひろがりながら海へはいりました。と思うと地面ははげしくぐらぐらゆれ、百合の花もいちめんゆれ、それからごうっというような大きな音が、みんなを倒すくらい強くやってきました。それから風がどうっと吹いて行きました。", "「やったやった。」とみんなはそっちに手を延ばして高く叫びました。この時サンムトリの煙は、くずれるようにそらいっぱいひろがって来ましたが、たちまちそらはまっ暗になって、熱いこいしがばらばらばらばら降ってきました。みんなは天幕の中にはいって心配そうにしていましたが、ペンネン技師は、時計を見ながら、", "「ブドリ君、うまく行った。危険はもう全くない。市のほうへは灰をすこし降らせるだけだろう。」と言いました。こいしはだんだん灰にかわりました。それもまもなく薄くなって、みんなはまた天幕の外へ飛び出しました。野原はまるで一めんねずみいろになって、灰は一寸ばかり積もり、百合の花はみんな折れて灰に埋まり、空は変に緑いろでした。そしてサンムトリのすそには小さなこぶができて、そこから灰いろの煙が、まだどんどんのぼっておりました。", "その夕方、みんなは灰やこいしを踏んで、もう一度山へのぼって、新しい観測の器械を据え着けて帰りました。", "七　雲の海", "それから四年の間に、クーボー大博士の計画どおり、潮汐（ちょうせき）発電所は、イーハトーヴの海岸に沿って、二百も配置されました。イーハトーヴをめぐる火山には、観測小屋といっしょに、白く塗られた鉄の櫓（やぐら）が順々に建ちました。", "ブドリは技師心得になって、一年の大部分は火山から火山と回ってあるいたり、あぶなくなった火山を工作したりしていました。", "次の年の春、イーハトーヴの火山局では、次のようなポスターを村や町へ張りました。", "「窒素肥料を降らせます。", "ことしの夏、雨といっしょに、硝酸アムモニヤをみなさんの沼ばたけや蔬菜（そさい）ばたけに降らせますから、肥料を使うかたは、その分を入れて計算してください。分量は百メートル四方につき百二十キログラムです。", "雨もすこしは降らせます。", "旱魃（かんばつ）の際には、とにかく作物の枯れないぐらいの雨は降らせることができますから、いままで水が来なくなって作付（さくづけ）しなかった沼ばたけも、ことしは心配せずに植え付けてください。」", "その年の六月、ブドリはイーハトーヴのまん中にあたるイーハトーヴ火山の頂上の小屋におりました。下はいちめん灰いろをした雲の海でした。そのあちこちからイーハトーヴじゅうの火山のいただきが、ちょうど島のように黒く出ておりました。その雲のすぐ上を一隻（せき）の飛行船が、船尾からまっ白な煙を噴（ふ）いて、一つの峯から一つの峯へちょうど橋をかけるように飛びまわっていました。そのけむりは、時間がたつほどだんだん太くはっきりなってしずかに下の雲の海に落ちかぶさり、まもなく、いちめんの雲の海にはうす白く光る大きな網が山から山へ張りわたされました。いつか飛行船はけむりを納めて、しばらく挨拶（あいさつ）するように輪を描いていましたが、やがて船首をたれてしずかに雲の中へ沈んで行ってしまいました。", "受話器がジーと鳴りました。ペンネン技師の声でした。", "「飛行船はいま帰って来た。下のほうのしたくはすっかりいい。雨はざあざあ降っている。もうよかろうと思う。はじめてくれたまえ。」", "ブドリはぼたんを押しました。見る見るさっきのけむりの網は、美しい桃いろや青や紫に、パッパッと目もさめるようにかがやきながら、ついたり消えたりしました。ブドリはまるでうっとりとしてそれに見とれました。そのうちにだんだん日は暮れて、雲の海もあかりが消えたときは、灰いろかねずみいろかわからないようになりました。", "受話器が鳴りました。", "「硝酸アムモニヤはもう雨の中へでてきている。量もこれぐらいならちょうどいい。移動のぐあいもいいらしい。あと四時間やれば、もうこの地方は今月中はたくさんだろう。つづけてやってくれたまえ。」", "ブドリはもううれしくってはね上がりたいくらいでした。", "この雲の下で昔の赤ひげの主人も、となりの石油がこやしになるかと言った人も、みんなよろこんで雨の音を聞いている。そしてあすの朝は、見違えるように緑いろになったオリザの株を手でなでたりするだろう。まるで夢のようだと思いながら、雲のまっくらになったり、また美しく輝いたりするのをながめておりました。ところが短い夏の夜はもう明けるらしかったのです。電光の合間に、東の雲の海のはてがぼんやり黄ばんでいるのでした。", "ところがそれは月が出るのでした。大きな黄いろな月がしずかにのぼってくるのでした。そして雲が青く光るときは変に白っぽく見え、桃いろに光るときは何かわらっているように見えるのでした。ブドリは、もうじぶんがだれなのか、何をしているのか忘れてしまって、ただぼんやりそれをみつめていました。", "受話器はジーと鳴りました。", "「こっちではだいぶ雷が鳴りだして来た。網があちこちちぎれたらしい。あんまり鳴らすとあしたの新聞が悪口を言うからもう十分ばかりでやめよう。」", "ブドリは受話器を置いて耳をすましました。雲の海はあっちでもこっちでもぶつぶつぶつぶつつぶやいているのです。よく気をつけて聞くとやっぱりそれはきれぎれの雷の音でした。", "ブドリはスイッチを切りました。にわかに月のあかりだけになった雲の海は、やっぱりしずかに北へ流れています。ブドリは毛布をからだに巻いてぐっすり眠りました。", "八　秋", "その年の農作物の収穫は、気候のせいもありましたが、十年の間にもなかったほど、よくできましたので、火山局にはあっちからもこっちからも感謝状や激励の手紙が届きました。ブドリははじめてほんとうに生きがいがあるように思いました。", "ところがある日、ブドリがタチナという火山へ行った帰り、とりいれの済んでがらんとした沼ばたけの中の小さな村を通りかかりました。ちょうどひるころなので、パンを買おうと思って、一軒の雑貨や菓子を買っている店へ寄って、", "「パンはありませんか。」とききました。するとそこには三人のはだしの人たちが、目をまっ赤（か）にして酒を飲んでおりましたが、一人が立ち上がって、", "「パンはあるが、どうも食われないパンでな。石盤（セキパン）だもな。」とおかしなことを言いますと、みんなはおもしろそうにブドリの顔を見てどっと笑いました。ブドリはいやになって、ぷいっと表へ出ましたら、向こうから髪を角刈りにしたせいの高い男が来て、いきなり、", "「おい、お前、ことしの夏、電気でこやし降らせたブドリだな。」と言いました。", "「そうだ。」ブドリは何げなく答えました。その男は高く叫びました。", "「火山局のブドリが来たぞ。みんな集まれ。」", "すると今の家の中やそこらの畑から、十八人の百姓たちが、げらげらわらってかけて来ました。", "「この野郎、きさまの電気のおかげで、おいらのオリザ、みんな倒れてしまったぞ。何（な）してあんなまねしたんだ。」一人が言いました。", "ブドリはしずかに言いました。", "「倒れるなんて、きみらは春に出したポスターを見なかったのか。」", "「何この野郎。」いきなり一人がブドリの帽子をたたき落としました。それからみんなは寄ってたかってブドリをなぐったりふんだりしました。ブドリはとうとう何がなんだかわからなくなって倒れてしまいました。", "気がついてみるとブドリはどこかの病院らしい室の白いベッドに寝ていました。枕（まくら）もとには見舞いの電報や、たくさんの手紙がありました。ブドリのからだじゅうは痛くて熱く、動くことができませんでした。けれどもそれから一週間ばかりたちますと、もうブドリはもとの元気になっていました。そして新聞で、あのときの出来事は、肥料の入れようをまちがって教えた農業技師が、オリザの倒れたのをみんな火山局のせいにして、ごまかしていたためだということを読んで、大きな声で一人で笑いました。", "その次の日の午後、病院の小使がはいって来て、", "「ネリというご婦人のおかたがたずねておいでになりました。」と言いました。ブドリは夢ではないかと思いましたら、まもなく一人の日に焼けた百姓のおかみさんのような人が、おずおずとはいって来ました。それはまるで変わってはいましたが、あの森の中からだれかにつれて行かれたネリだったのです。二人はしばらく物も言えませんでしたが、やっとブドリが、その後のことをたずねますと、ネリもぼつぼつとイーハトーヴの百姓のことばで、今までのことを話しました。ネリを連れて行ったあの男は、三日ばかりの後、めんどうくさくなったのか、ある小さな牧場の近くへネリを残して、どこかへ行ってしまったのでした。", "ネリがそこらを泣いて歩いていますと、その牧場の主人がかわいそうに思って家へ入れて、赤ん坊のお守（もり）をさせたりしていましたが、だんだんネリはなんでも働けるようになったので、とうとう三四年前にその小さな牧場のいちばん上の息子（むすこ）と結婚したというのでした。そしてことしは肥料も降ったので、いつもなら厩肥（まやごえ）を遠くの畑まで運び出さなければならず、たいへん難儀したのを、近くのかぶら畑へみんな入れたし、遠くの玉蜀黍（とうもろこし）もよくできたので、家じゅうみんなよろこんでいるというようなことも言いました。またあの森の中へ主人の息子といっしょに何べんも行って見たけれども、家はすっかりこわれていたし、ブドリはどこへ行ったかわからないので、いつもがっかりして帰っていたら、きのう新聞で主人がブドリのけがをしたことを読んだので、やっとこっちへたずねて来たということも言いました。ブドリは、なおったらきっとその家へたずねて行ってお礼を言う約束をしてネリを帰しました。", "九　カルボナード島", "それからの五年は、ブドリにはほんとうに楽しいものでした。赤ひげの主人の家にも何べんもお礼に行きました。", "もうよほど年はとっていましたが、やはり非常な元気で、こんどは毛の長いうさぎを千匹以上飼ったり、赤い甘藍（かんらん）ばかり畑に作ったり、相変わらずの山師はやっていましたが、暮らしはずうっといいようでした。", "ネリには、かわいらしい男の子が生まれました。冬に仕事がひまになると、ネリはその子にすっかりこどもの百姓のようなかたちをさせて、主人といっしょに、ブドリの家にたずねて来て、泊まって行ったりするのでした。", "ある日、ブドリのところへ、昔てぐす飼いの男にブドリといっしょに使われていた人がたずねて来て、ブドリたちのおとうさんのお墓が森のいちばんはずれの大きな榧（かや）の木の下にあるということを教えて行きました。それは、はじめ、てぐす飼いの男が森に来て、森じゅうの木を見てあるいたとき、ブドリのおとうさんたちの冷たくなったからだを見つけて、ブドリに知らせないように、そっと土に埋めて、上へ一本の樺（かば）の枝をたてておいたというのでした。ブドリは、すぐネリたちをつれてそこへ行って、白い石灰岩の墓をたてて、それからもその辺を通るたびにいつも寄ってくるのでした。", "そしてちょうどブドリが二十七の年でした。どうもあの恐ろしい寒い気候がまた来るような模様でした。測候所では、太陽の調子や北のほうの海の氷の様子から、その年の二月にみんなへそれを予報しました。それが一足ずつだんだんほんとうになって、こぶしの花が咲かなかったり、五月に十日もみぞれが降ったりしますと、みんなはもうこの前の凶作を思い出して、生きたそらもありませんでした。クーボー大博士も、たびたび気象や農業の技師たちと相談したり、意見を新聞へ出したりしましたが、やっぱりこの激しい寒さだけはどうともできないようすでした。", "ところが六月もはじめになって、まだ黄いろなオリザの苗や、芽を出さない木を見ますと、ブドリはもういても立ってもいられませんでした。このままで過ぎるなら、森にも野原にも、ちょうどあの年のブドリの家族のようになる人がたくさんできるのです。ブドリはまるで物も食べずに幾晩も幾晩も考えました。ある晩ブドリは、クーボー大博士のうちをたずねました。", "「先生、気層のなかに炭酸ガスがふえて来れば暖かくなるのですか。」", "「それはなるだろう。地球ができてからいままでの気温は、たいてい空気中の炭酸ガスの量できまっていたと言われるくらいだからね。」", "「カルボナード火山島が、いま爆発したら、この気候を変えるくらいの炭酸ガスを噴（ふ）くでしょうか。」", "「それは僕も計算した。あれがいま爆発すれば、ガスはすぐ大循環の上層の風にまじって地球ぜんたいを包むだろう。そして下層の空気や地表からの熱の放散を防ぎ、地球全体を平均で五度ぐらい暖かくするだろうと思う。」", "「先生、あれを今すぐ噴かせられないでしょうか。」", "「それはできるだろう。けれども、その仕事に行ったもののうち、最後の一人はどうしても逃げられないのでね。」", "「先生、私にそれをやらしてください。どうか先生からペンネン先生へお許しの出るようおことばをください。」", "「それはいけない。きみはまだ若いし、いまのきみの仕事にかわれるものはそうはない。」", "「私のようなものは、これからたくさんできます。私よりもっともっとなんでもできる人が、私よりもっと立派にもっと美しく、仕事をしたり笑ったりして行くのですから。」", "「その相談は僕はいかん。ペンネン技師に話したまえ。」", "ブドリは帰って来て、ペンネン技師に相談しました。技師はうなずきました。", "「それはいい。けれども僕がやろう。僕はことしもう六十三なのだ。ここで死ぬなら全く本望というものだ。」", "「先生、けれどもこの仕事はまだあんまり不確かです。一ぺんうまく爆発してもまもなくガスが雨にとられてしまうかもしれませんし、また何もかも思ったとおりいかないかもしれません。先生が今度おいでになってしまっては、あとなんともくふうがつかなくなると存じます。」", "老技師はだまって首をたれてしまいました。", "それから三日の後、火山局の船が、カルボナード島へ急いで行きました。そこへいくつものやぐらは建ち、電線は連結されました。", "すっかりしたくができると、ブドリはみんなを船で帰してしまって、じぶんは一人島に残りました。", "そしてその次の日、イーハトーヴの人たちは、青ぞらが緑いろに濁り、日や月が銅（あかがね）いろになったのを見ました。", "けれどもそれから三四日たちますと、気候はぐんぐん暖かくなってきて、その秋はほぼ普通の作柄になりました。そしてちょうど、このお話のはじまりのようになるはずの、たくさんのブドリのおとうさんやおかあさんは、たくさんのブドリやネリといっしょに、その冬を暖かいたべものと、明るい薪（たきぎ）で楽しく暮らすことができたのでした。"]}, {"no": 14, "title": "グッド・バイ", "author": "太宰 治", "category": "日本文学-物語", "chars": 15190, "volume": "中", "paras": ["変心　（一）", "文壇の、或（あ）る老大家が亡（な）くなって、その告別式の終り頃から、雨が降りはじめた。早春の雨である。", "その帰り、二人の男が相合傘（あいあいがさ）で歩いている。いずれも、その逝去（せいきょ）した老大家には、お義理一ぺん、話題は、女に就（つ）いての、極（きわ）めて不きんしんな事。紋服の初老の大男は、文士。それよりずっと若いロイド眼鏡（めがね）、縞（しま）ズボンの好男子は、編集者。", "「あいつも、」と文士は言う。「女が好きだったらしいな。お前も、そろそろ年貢（ねんぐ）のおさめ時じゃねえのか。やつれたぜ。」", "「全部、やめるつもりでいるんです。」", "その編集者は、顔を赤くして答える。", "この文士、ひどく露骨で、下品な口をきくので、その好男子の編集者はかねがね敬遠していたのだが、きょうは自身に傘の用意が無かったので、仕方なく、文士の蛇（じゃ）の目傘（めがさ）にいれてもらい、かくは油をしぼられる結果となった。", "全部、やめるつもりでいるんです。しかし、それは、まんざら嘘（うそ）で無かった。", "何かしら、変って来ていたのである。終戦以来、三年経（た）って、どこやら、変った。", "三十四歳、雑誌「オベリスク」編集長、田島周二、言葉に少し関西なまりがあるようだが、自身の出生に就いては、ほとんど語らぬ。もともと、抜け目の無い男で、「オベリスク」の編集は世間へのお体裁（ていさい）、実は闇商売（やみしょうばい）のお手伝いして、いつも、しこたま、もうけている。けれども、悪銭身につかぬ例えのとおり、酒はそれこそ、浴びるほど飲み、愛人を十人ちかく養っているという噂（うわさ）。", "かれは、しかし、独身では無い。独身どころか、いまの細君は後妻である。先妻は、白痴の女児ひとりを残して、肺炎で死に、それから彼は、東京の家を売り、埼玉県の友人の家に疎開（そかい）し、疎開中に、いまの細君をものにして結婚した。細君のほうは、もちろん初婚で、その実家は、かなり内福の農家である。", "終戦になり、細君と女児を、細君のその実家にあずけ、かれは単身、東京に乗り込み、郊外のアパートの一部屋を借り、そこはもうただ、寝るだけのところ、抜け目なく四方八方を飛び歩いて、しこたま、もうけた。", "けれども、それから三年経ち、何だか気持が変って来た。世の中が、何かしら微妙に変って来たせいか、または、彼のからだが、日頃の不節制のために最近めっきり痩（や）せ細って来たせいか、いや、いや、単に「とし」のせいか、色即是空（しきそくぜくう）、酒もつまらぬ、小さい家を一軒買い、田舎（いなか）から女房子供を呼び寄せて、という里心に似たものが、ふいと胸をかすめて通る事が多くなった。", "もう、この辺で、闇商売からも足を洗い、雑誌の編集に専念しよう。それに就いて、", "それに就いて、さし当っての難関。まず、女たちと上手（じょうず）に別れなければならぬ。思いがそこに到ると、さすが、抜け目の無い彼も、途方にくれて、溜息（ためいき）が出るのだ。", "「全部、やめるつもり、」大男の文士は口をゆがめて苦笑し、「それは結構だが、いったい、お前には、女が幾人あるんだい？」", "変心　（二）", "田島は、泣きべその顔になる。思えば、思うほど、自分ひとりの力では、到底、処理の仕様が無い。金ですむ事なら、わけないけれども、女たちが、それだけで引下るようにも思えない。", "「いま考えると、まるで僕は狂っていたみたいなんですよ。とんでもなく、手をひろげすぎて、」", "この初老の不良文士にすべて打ち明け、相談してみようかしらと、ふと思う。", "「案外、殊勝（しゅしょう）な事を言いやがる。もっとも、多情な奴に限って奇妙にいやらしいくらい道徳におびえて、そこがまた、女に好かれる所以（ゆえん）でもあるのだがね。男振りがよくて、金があって、若くて、おまけに道徳的で優しいと来たら、そりゃ、もてるよ。当り前の話だ。お前のほうでやめるつもりでも、先方が承知しないぜ、これは。」", "「そこなんです。」", "ハンケチで顔を拭（ふ）く。", "「泣いてるんじゃねえだろうな。」", "「いいえ、雨で眼鏡の玉が曇（くも）って、」", "「いや、その声は泣いてる声だ。とんだ色男さ。」", "闇商売の手伝いをして、道徳的も無いものだが、その文士の指摘したように、田島という男は、多情のくせに、また女にへんに律儀（りちぎ）な一面も持っていて、女たちは、それ故（ゆえ）、少しも心配せずに田島に深くたよっているらしい様子。", "「何か、いい工夫（くふう）が無いものでしょうか。」", "「無いね。お前が五、六年、外国にでも行って来たらいいだろうが、しかし、いまは簡単に洋行なんか出来ない。いっそ、その女たちを全部、一室に呼び集め、蛍（ほたる）の光でも歌わせて、いや、仰げば尊し、のほうがいいかな、お前が一人々々に卒業証書を授与してね、それからお前は、発狂の真似（まね）をして、まっぱだかで表に飛び出し、逃げる。これなら、たしかだ。女たちも、さすがに呆（あき）れて、あきらめるだろうさ。」", "まるで相談にも何もならぬ。", "「失礼します。僕は、あの、ここから電車で、」", "「まあ、いいじゃないか。つぎの停留場まで歩こう。何せ、これは、お前にとって重大問題だろうからな。二人で、対策を研究してみようじゃないか。」", "文士は、その日、退屈していたものと見えて、なかなか田島を放さぬ。", "「いいえ、もう、僕ひとりで、何とか、」", "「いや、いや、お前ひとりでは解決できない。まさか、お前、死ぬ気じゃないだろうな。実に、心配になって来た。女に惚（ほ）れられて、死ぬというのは、これは悲劇じゃない、喜劇だ。いや、ファース（茶番）というものだ。滑稽（こっけい）の極（きわみ）だね。誰も同情しやしない。死ぬのはやめたほうがよい。うむ、名案。すごい美人を、どこからか見つけて来てね、そのひとに事情を話し、お前の女房という形になってもらって、それを連れて、お前のその女たち一人々々を歴訪する。効果てきめん。女たちは、皆だまって引下る。どうだ、やってみないか。」", "おぼれる者のワラ。田島は少
