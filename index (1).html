て、さすがに驚いた様子でしたが、私はその肩を軽く撫でて、", "「クリスマスおめでとうって言うの？　なんていうの？　もう一升くらいは飲めそうね」", "と申しました。", "奥さんはそれには取り合わず、改まった顔つきをして、", "「あの、ねえさん、すみませんがね、ここのご主人にないないお話し申したい事がございますのですけど、ちょっとここへご主人を」", "と言いました。", "私は奥で揚物（あげもの）をしているご亭主のところへ行き、", "「大谷が帰ってまいりました。会ってやって下さいまし。でも、連れの女のかたに、私のことは黙っていて下さいね。大谷が恥かしい思いをするといけませんから」", "「いよいよ、来ましたね」", "ご亭主は、私の、あの嘘を半ばは危（あやぶ）みながらも、それでもかなり信用していてくれたもののようで、夫が帰って来たことも、それも私の何か差しがねに依っての事と単純に合点している様子でした。", "「私のことは、黙っててね」", "と重ねて申しますと、", "「そのほうがよろしいのでしたら、そうします」", "と気さくに承知して、土間に出て行きました。", "ご亭主は土間のお客を一わたりざっと見廻し、それから真っ直ぐに夫のいるテーブルに歩み寄って、その綺麗な奥さんと何か二言、三言話を交して、それから三人そろって店から出て行きました。", "もういいのだ。万事が解決してしまったのだと、なぜだかそう信ぜられて、流石（さすが）にうれしく、紺絣（こんがすり）の着物を着たまだはたち前くらいの若いお客さんの手首を、だしぬけに強く掴（つか）んで、", "「飲みましょうよ、ね、飲みましょう。クリスマスですもの」", "ほんの三十分、いいえ、もっと早いくらい、おや、と思ったくらいに早く、ご亭主がひとりで帰って来まして、私の傍に寄り、", "「奥さん、ありがとうございました。お金はかえして戴きました」", "「そう。よかったわね。全部？」", "ご亭主は、へんな笑い方をして、", "「ええ、きのうの、あの分（ぶん）だけはね」", "「これまでのが全部で、いくらなの？　ざっと、まあ、大負けに負けて」", "「二万円」", "「それだけでいいの？」", "「大負けに負けました」", "「おかえし致します。おじさん、あすから私を、ここで働かせてくれない？　ね、そうして！　働いて返すわ」", "「へえ？　奥さん、とんだ、おかるだね」", "私たちは、声を合せて笑いました。", "その夜、十時すぎ、私は中野の店をおいとまして、坊やを背負い、小金井の私たちの家にかえりました。やはり夫は帰って来ていませんでしたが、しかし私は、平気でした。あすまた、あのお店へ行けば、夫に逢えるかも知れない。どうして私はいままで、こんないい事に気づかなかったのかしら。きのうまでの私の苦労も、所詮（しょせん）は私が馬鹿で、こんな名案に思いつかなかったからなのだ。私だって昔は浅草の父の屋台で、客あしらいは決して下手ではなかったのだから、これからあの中野のお店できっと巧く立ちまわれるに違いない。現に今夜だって私は、チップを五百円ちかくもらったのだもの。", "ご亭主の話に依ると、夫は昨夜あれから何処（どこ）か知合いの家へ行って泊ったらしく、それから、けさ早く、あの綺麗な奥さんの営んでいる京橋のバーを襲って、朝からウイスキーを飲み、そうして、そのお店に働いている五人の女の子に、クリスマス・プレゼントだと言って無闇にお金をくれてやって、それからお昼頃にタキシーを呼び寄せさせて何処かへ行き、しばらくたって、クリスマスの三角帽やら仮面やら、デコレーションケーキやら七面鳥まで持ち込んで来て、四方に電話を掛けさせ、お知合いの方たちを呼び集め、大宴会をひらいて、いつもちっともお金を持っていない人なのにと、バーのマダムが不審がって、そっと問いただしてみたら、夫は平然と、昨夜のことを洗いざらいそのまま言うので、そのマダムも前から大谷とは他人の仲では無いらしく、とにかくそれは警察沙汰になって騒ぎが大きくなっても、つまらないし、かえさなければなりませんと親身に言って、お金はそのマダムがたてかえて、そうして夫に案内させ、中野のお店に来てくれたのだそうで、中野のお店のご亭主は私に向って、", "「たいがい、そんなところだろうとは思っていましたが、しかし、奥さん、あなたはよくその方角にお気が附きましたね。大谷さんのお友だちにでも頼んだのですか」", "とやはり私が、はじめからこうしてかえって来るのを見越して、このお店に先廻りして待っていたもののように考えているらしい口振りでしたから、私は笑って、", "「ええ、そりゃもう」", "とだけ、答えて置きましたのです。", "その翌る日からの私の生活は、今までとはまるで違って、浮々した楽しいものになりました。さっそく電髪屋に行って、髪の手入れも致しましたし、お化粧品も取りそろえまして、着物を縫い直したり、また、おかみさんから新しい白足袋を二足もいただき、これまでの胸の中の重苦しい思いが、きれいに拭（ぬぐ）い去られた感じでした。", "朝起きて坊やと二人で御飯をたべ、それから、お弁当をつくって坊やを脊負い、中野にご出勤ということになり、大みそか、お正月、お店のかきいれどきなので、椿屋（つばきや）の、さっちゃん、というのがお店での私の名前なのでございますが、そのさっちゃんは毎日、眼のまわるくらいの大忙しで、二日に一度くらいは夫も飲みにやって参りまして、お勘定は私に払わせて、またふっといなくなり、夜おそく私のお店を覗（のぞ）いて、", "「帰りませんか」", "とそっと言い、私も首肯いて帰り支度をはじめ、一緒にたのしく家路をたどる事も、しばしばございました。", "「なぜ、はじめからこうしなかったのでしょうね。とっても私は幸福よ」", "「女には、幸福も不幸も無いものです」", "「そうなの？　そう言われると、そんな気もして来るけど、それじゃ、男の人は、どうなの？」", "「男には、不幸だけがあるんです。いつも恐怖と、戦ってばかりいるのです」", "「わからないわ、私には。でも、いつまでも私、こんな生活をつづけて行きとうございますわ。椿屋のおじさんも、おばさんも、とてもいいお方ですもの」", "「馬鹿なんですよ、あのひとたちは。田舎者ですよ。あれでなかなか慾張りでね。僕に飲ませて、おしまいには、もうけようと思っているのです」", "「そりゃ商売ですもの、当り前だわ。だけど、それだけでも無いんじゃない？　あなたは、あのおかみさんを、かすめたでしょう」", "「昔ね。おやじは、どう？　気附いているの？」", "「ちゃんと知っているらしいわ。いろも出来、借金も出来、といつか溜息（ためいき）まじりに言ってたわ」", "「僕はね、キザのようですけど、死にたくて、仕様が無いんです。生れた時から、死ぬ事ばかり考えていたんだ。皆のためにも、死んだほうがいいんです。それはもう、たしかなんだ。それでいて、なかなか死ねない。へんな、こわい神様みたいなものが、僕の死ぬのを引きとめるのです」", "「お仕事が、おありですから」", "「仕事なんてものは、なんでもないんです。傑作も駄作もありやしません。人がいいと言えば、よくなるし、悪いと言えば、悪くなるんです。ちょうど吐くいきと、引くいきみたいなものなんです。おそろしいのはね、この世の中の、どこかに神がいる、という事なんです。いるんでしょうね？」", "「え？」", "「いるんでしょうね？」", "「私には、わかりませんわ」", "「そう」", "十日、二十日とお店にかよっているうちに、私には、椿屋にお酒を飲みに来ているお客さんがひとり残らず犯罪人ばかりだという事に、気がついてまいりました。夫などはまだまだ、優しいほうだと思うようになりました。また、お店のお客さんばかりでなく、路を歩いている人みなが、何か必ずうしろ暗い罪をかくしているように思われて来ました。立派な身なりの、五十年配の奥さんが、椿屋の勝手口にお酒を売りに来て、一升三百円、とはっきり言いまして、それはいまの相場にしては安いほうですので、おかみさんがすぐに引きとってやりましたが、水酒でした。あんな上品そうな奥さんさえ、こんな事をたくらまなければならなくなっている世の中で、我が身にうしろ暗いところが一つも無くて生きて行く事は、不可能だと思いました。トランプの遊びのように、マイナスを全部あつめるとプラスに変るという事は、この世の道徳には起り得ない事でしょうか。", "神がいるなら、出て来て下さい！　私は、お正月の末に、お店のお客にけがされました。", "その夜は、雨が降っていました。夫は、あらわれませんでしたが、夫の昔からの知合いの出版のほうの方で、時たま私のところへ生活費をとどけて下さった矢島さんが、その同業のお方らしい、やはり矢島さんくらいの四十年配のお方と二人でお見えになり、お酒を飲みながら、お二人で声高く、大谷の女房がこんなところで働いているのは、よろしくないとか、よろしいとか、半分は冗談みたいに言い合い、私は笑いながら、", "「その奥さんは、どこにいらっしゃるの？」", "とたずねますと、矢島さんは、", "「どこにいるのか知りませんがね、すくなくとも、椿屋のさっちゃんよりは、上品で綺麗だ」", "と言いますので、", "「やけるわね。大谷さんみたいな人となら、私は一夜でもいいから、添ってみたいわ。私はあんな、ずるいひとが好き」", "「これだからねえ」", "と矢島さんは、連れのお方のほうに顔を向け、口をゆがめて見せました。", "その頃になると、私が大谷という詩人の女房だという事が、夫と一緒にやって来る記者のお方たちにも知られていましたし、またそのお方たちから聞いてわざわざ私をからかいにおいでになる物好きなお方などもありまして、お店はにぎやかになる一方で、ご亭主のご機嫌もいよいよ、まんざらでございませんでしたのです。", "その夜は、それから矢島さんたちは紙の闇取引の商談などして、お帰りになったのは十時すぎで、私も今夜は雨も降るし、夫もあらわれそうもございませんでしたので、お客さんがまだひとり残っておりましたけれども、そろそろ帰り支度をはじめて、奥の六畳の隅に寝ている坊やを抱き上げて脊負い、", "「また、傘をお借りしますわ」", "と小声でおかみさんにお頼みしますと、", "「傘なら、おれも持っている。お送りしましょう」", "とお店に一人のこっていた二十五、六の、痩せて小柄な工員ふうのお客さんが、まじめな顔をして立ち上りました。それは、私には今夜がはじめてのお客さんでした。", "「はばかりさま。ひとり歩きには馴れていますから」", "「いや、お宅は遠い。知っているんだ。おれも、小金井の、あの近所の者なんだ。お送りしましょう。おばさん、勘定をたのむ」", "お店では三本飲んだだけで、そんなに酔ってもいないようでした。", "一緒に電車に乗って、小金井で降りて、それから雨の降るまっくらい路を相合傘で、ならんで歩きました。その若いひとは、それまでほとんど無言でいたのでしたが、ぽつりぽつり言いはじめ、", "「知っているのです。おれはね、あの大谷先生の詩のファンなのですよ。おれもね、詩を書いているのですがね。そのうち、大谷先生に見ていただこうと思っていたのですがね。どうもね、あの大谷先生が、こわくてね」", "家につきました。", "「ありがとうございました。また、お店で」", "「ええ、さようなら」", "若いひとは、雨の中を帰って行きました。", "深夜、がらがらと玄関のあく音に、眼をさましましたが、れいの夫の泥酔のご帰宅かと思い、そのまま黙って寝ていましたら、", "「ごめん下さい。大谷さん、ごめん下さい」", "という男の声が致します。", "起きて電燈をつけて玄関に出て見ますと、さっきの若いひとが、ほとんど直立できにくいくらいにふらふらして、", "「奥さん、ごめんなさい。かえりにまた屋台で一ぱいやりましてね、実はね、おれの家は立川でね、駅へ行ってみたらもう、電車がねえんだ。奥さん、たのみます。泊めて下さい。ふとんも何も要りません。この玄関の式台でもいいのだ。あしたの朝の始発が出るまで、ごろ寝させて下さい。雨さえ降ってなけや、その辺の軒下にでも寝るんだが、この雨では、そうもいかねえ。たのみます」", "「主人もおりませんし、こんな式台でよろしかったら、どうぞ」", "と私は言い、破れた座蒲団を二枚、式台に持って行ってあげました。", "「すみません。ああ酔った」", "と苦しそうに小声で言い、すぐにそのまま式台に寝ころび、私が寝床に引返した時には、もう高い鼾（いびき）が聞えていました。", "そうして、その翌る日のあけがた、私は、あっけなくその男の手にいれられました。", "その日も私は、うわべは、やはり同じ様に、坊やを背負って、お店の勤めに出かけました。", "中野のお店の土間で、夫が、酒のはいったコップをテーブルの上に置いて、ひとりで新聞を読んでいました。コップに午前の陽の光が当って、きれいだと思いました。", "「誰もいないの？」", "夫は、私のほうを振り向いて見て、", "「うん。おやじはまだ仕入れから帰らないし、ばあさんは、ちょっといままでお勝手のほうにいたようだったけど、いませんか？」", "「ゆうべは、おいでにならなかったの？」", "「来ました。椿屋のさっちゃんの顔を見ないとこのごろ眠れなくなってね、十時すぎにここを覗いてみたら、いましがた帰りましたというのでね」", "「それで？」", "「泊っちゃいましたよ、ここへ。雨はざんざ降っているし」", "「あたしも、こんどから、このお店にずっと泊めてもらう事にしようかしら」", "「いいでしょう、それも」", "「そうするわ。あの家をいつまでも借りてるのは、意味ないもの」", "夫は、黙ってまた新聞に眼をそそぎ、", "「やあ、また僕の悪口を書いている。エピキュリアンのにせ貴族だってさ。こいつは、当っていない。神におびえるエピキュリアン、とでも言ったらよいのに。さっちゃん、ごらん、ここに僕のことを、人非人なんて書いていますよ。違うよねえ。僕は今だから言うけれども、去年の暮にね、ここから五千円持って出たのは、さっちゃんと坊やに、あのお金で久し振りのいいお正月をさせたかったからです。人非人でないから、あんな事も仕出かすのです」", "私は格別うれしくもなく、", "「人非人でもいいじゃないの。私たちは、生きていさえすればいいのよ」", "と言いました。"]}, {"no": 7, "title": "オツベルと象", "author": "宮沢 賢治", "category": "日本文学-児童-童話", "chars": 6125, "volume": "中", "paras": ["ある牛飼（うしか）いがものがたる", "第一日曜", "オツベルときたら大したもんだ。稲扱（いねこき）器械の六台も据（す）えつけて、のんのんのんのんのんのんと、大そろしない音をたててやっている。", "十六人の百姓（ひゃくしょう）どもが、顔をまるっきりまっ赤にして足で踏（ふ）んで器械をまわし、小山のように積まれた稲を片っぱしから扱（こ）いて行く。藁（わら）はどんどんうしろの方へ投げられて、また新らしい山になる。そこらは、籾（もみ）や藁から発（た）ったこまかな塵（ちり）で、変にぼうっと黄いろになり、まるで沙漠（さばく）のけむりのようだ。", "そのうすくらい仕事場を、オツベルは、大きな琥珀（こわく）のパイプをくわえ、吹殻（ふきがら）を藁に落さないよう、眼（め）を細くして気をつけながら、両手を背中に組みあわせて、ぶらぶら往（い）ったり来たりする。", "小屋はずいぶん頑だけ（がんじょう）で、学校ぐらいもあるのだが、何せ新式稲扱器械が、六台もそろってまわってるから、のんのんのんのんふるうのだ。中にはいるとそのために、すっかり腹が空（す）くほどだ。そしてじっさいオツベルは、そいつで上手に腹をへらし、ひるめしどきには、六寸ぐらいのビフテキだの、雑巾（ぞうきん）ほどあるオムレツの、ほくほくしたのをたべるのだ。", "とにかく、そうして、のんのんのんのんやっていた。", "そしたらそこへどういうわけか、その、白象がやって来た。白い象だぜ、ペンキを塗（ぬ）ったのでないぜ。どういうわけで来たかって？　そいつは象のことだから、たぶんぶらっと森を出て、ただなにとなく来たのだろう。", "そいつが小屋の入口に、ゆっくり顔を出したとき、百姓どもはぎょっとした。なぜぎょっとした？　よくきくねえ、何をしだすか知れないじゃないか。かかり合っては大へんだから、どいつもみな、いっしょうけんめい、じぶんの稲を扱いていた。", "ところがそのときオツベルは、ならんだ器械のうしろの方で、ポケットに手を入れながら、ちらっと鋭（するど）く象を見た。それからすばやく下を向き、何でもないというふうで、いままでどおり往ったり来たりしていたもんだ。", "するとこんどは白象が、片脚（かたあし）床（ゆか）にあげたのだ。百姓どもはぎょっとした。それでも仕事が忙（いそが）しいし、かかり合ってはひどいから、そっちを見ずに、やっぱり稲を扱いていた。", "オツベルは奥（おく）のうすくらいところで両手をポケットから出して、も一度ちらっと象を見た。それからいかにも退屈（たいくつ）そうに、わざと大きなあくびをして、両手を頭のうしろに組んで、行ったり来たりやっていた。ところが象が威勢（いせい）よく、前肢（まえあし）二つっきだして、小屋にあがって来ようとする。百姓どもはぎくっとし、オツベルもすこしぎょっとして、大きな琥珀のパイプから、ふっとけむりをはきだした。それでもやっぱりしらないううで、ゆっくりそこらをあるいていた。", "そしたらとうとう、象がのこのこ上って来た。そして器械の前のとこを、呑気（のんき）にあるきはじめたのだ。", "ところが何せ、器械はひどく回（まわ）っていて、籾（もみ）は夕立か霰（あられ）のように、パチパチ象にあたるのだ。象はいかにもうるさいらしく、小さなその眼を細めていたが、またよく見ると、たしかに少しわらっていた。", "オツベルはやっと覚悟（かくご）をきめて、稲扱（いねこき）器械の前に出て、象に話をしようとしたが、そのとき象が、とてもきれいな、鴬（うぐいす）みたいないい声で、こんな文句をい（い）ったのだ。", "「ああ、だめだ。あんまりせわしく、砂がわたしの歯にあたる。」", "まったく籾は、パチパチパチパチ歯にあたり、またまっ白な頭や首にぶっつかる。", "さあ、オツベルは命懸（いのちが）けだ。パイプを右手にもち直し、度胸を据えて斯（こ）ういった。", "「どうだい、ここ（ここ）は面白（おもしろ）いかい。」", "「面白いねえ。」象がからだを斜（なな）めにして、眼を細くして返事した。", "「ずうっとこっちにいたらどうだい。」", "百姓どもははっとして、息を殺して象を見た。オツベルはいってしまってから、にわかにがたがた顫（ふる）え出す。ところが象はけろりとして", "「いてもいいよ。」と答えたもんだ。", "「そうか。それではそうしよう。そういうことにしようじゃないか。」オツベルが顔をくしゃくしゃにして、まっ赤になって悦（よろこ）びながらそういった。", "どうだ、そうしてこの象は、もうオツベルの財産だ。いまに見たまえ、オツベルは、あの白象を、はたらかせるか、サーカス団に売りとばすか、どっちにしても万円以上もうけるぜ。", "第二日曜", "オツベルときたら大したもんだ。それにこの前稲扱小屋で、うまく自分のものにした、象もじっさい大したもんだ。力も二十馬力もある。第一みかけがまっ白で、牙（きば）はぜんたいきれいな象牙（ぞうげ）でできている。皮も全体、立派で丈夫（じょうぶ）な象皮なのだ。そしてずいぶんはたらくもんだ。けれどもそんなに稼（かせ）ぐのも、やっぱり主人が偉（えら）いのだ。", "「おい、お前は時計は要（い）らないか。」丸太で建てたその象小屋の前に来て、オツベルは琥珀のパイプをくわえ、顔をしかめてこう尋（き）いた。", "「ぼくは時計は要らないよ。」象がわらって返事した。", "「まあ持って見ろ、いいもんだ。」こう言いながらオツベルは、ブリキでこさへた大きな時計を、象の首からぶらさげた。", "「なかなかいいね。」象もいう。", "「鎖（くさり）もなくちゃだめだろう。」オツベルときたら、百キロもある鎖をさ、その前肢にくっつけた。", "「うん、なかなか鎖はいいね。」三あし歩いて象がいう。", "「靴（くつ）をはいたらどうだろう。」", "「ぼくは靴などはかないよ。」", "「まあはいてみろ、いいもんだ。」オツベルは顔をしかめながら、赤い張子の大きな靴を、象のうしろのかかとにはめた。", "「なかなかいいね。」象もいう。", "「靴に飾（かざ）りをつけなくちゃ。」オツベルはもう大急ぎで、四百キロある分銅を靴の上から、穿（は）め込んだ。", "「うん、なかなかいいね。」象は二あし歩いてみて、さもうれしそうにそういった。", "次の日、ブリキの大きな時計と、やくざな紙の靴とはやぶけ、象は鎖と分銅だけで、大よろこびであるいて居（お）った。", "「済まないが税金も高いから、今日はすこうし、川から水を汲（く）んでくれ。」オツベルは両手をうしろで組んで、顔をしかめて象にいう。", "「ああ、ぼく水を汲んで来よう。もう何ばいでも汲んでやるよ。」", "象は眼を細くしてよろこんで、そのひるすぎに五十だけ、川から水を汲んで来た。そして菜っ葉の畑にかけた。", "夕方象は小屋にいて、十｜把（ぱ）の藁（わら）をたべながら、西の三日の月を見て、", "「ああ、稼（かせ）ぐのは愉快（ゆかい）だねえ、さっぱりするねえ」といっていた。", "「済まないが税金がまたあがる。今日は少うし森から、たきぎを運んでくれ」オツベルは房（ふさ）のついた赤い帽子（ぼうし）をかぶり、両手をかくしにつっ込んで、次の日象にそう言った。", "「ああ、ぼくたきぎを持って来よう。いい天気だねえ。ぼくはぜんたい森へ行くのは大すきなんだ」象はわらってこう言った。", "オツベルは少しぎょっとして、パイプを手からあぶなく落としそうにしたがもうあのときは、象がいかにも愉快なふうで、ゆっくりあるきだしたので、また安心してパイプをくわえ、小さな咳（せき）を一つして、百姓どもの仕事の方を見に行った。", "そのひるすぎの半日に、象は九百把たきぎを運び、眼を細くしてよろこんだ。", "晩方象は小屋にいて、八把の藁をたべながら、西の四日の月を見て", "「ああ、せいせいした。サンタマリア」と斯（こ）うひとりごとしたそうだ。", "その次の日だ、", "「済まないが、税金が五倍になった、今日は少うし鍛冶場（かじば）へ行って、炭火を吹（ふ）いてくれないか」", "「ああ、吹いてやろう。本気でやったら、ぼく、もう、息で、石もなげとばせるよ」", "オツベルはまたどきっとしたが、気を落ち付けてわらっていた。", "象はのそのそ鍛冶場へ行って、べたんと肢を折って座（すわ）り、ふいごの代りに半日炭を吹いたのだ。", "その晩、象は象小屋で、七｜把（わ）の藁をたべながら、空の五日の月を見て", "「ああ、つかれたな、うれしいな、サンタマリア」とこう言った。", "どうだ、そうして次の日から、象は朝からかせぐのだ。藁も昨日はただ五把だ。よくまあ、五把の藁などで、あんな力がでるもんだ。", "じっさい象はけいざいだよ。それというのもオツベルが、頭がよくてえらいためだ。オツベルときたら大したもんさ。", "第五日曜", "オツベルかね、そのオツベルは、おれもいおうとしてたんだが、いなくなったよ。", "まあ落ちついてききたまえ。前にはなしたあの象を、オツベルはすこしひどくし過ぎた。しかたがだんだんひどくなったから、象がなかなか笑わなくなった。時には赤い竜（りゅう）の眼をして、じっとこんなにオツベルを見おろすようになってきた。", "ある晩象は象小屋で、三把の藁をたべながら、十日の月を仰（あお）ぎ見て、", "「苦しいです。サンタマリア。」といったということだ。", "こいつを聞いたオツベルは、ことごと象につらくした。", "ある晩、象は象小屋で、ふらふら倒（たお）れて地べたに座り、藁もたべずに、十一日の月を見て、", "「もう、さようなら、サンタマリア。」とこう言った。", "「おや、何だって？　さよならだ？」月が俄（にわ）かに象に尋（き）く。", "「ええ、さよならです。サンタマリア。」", "「何だい、なりばかり大きくて、からっきし意気地（いくじ）のないやつだなあ。仲間へ手紙を書いたらいいや。」月がわらってこういった。", "「お筆も紙もありませんよう。」象は細ういきれいな声で、しくしくしくしく泣き出した。", "「そら、これでしょう。」すぐ眼の前で、可愛（かあい）い子どもの声がした。象が頭を上げて見ると、赤い着物の童子が立って、硯（すずり）と紙を捧（ささ）げていた。象は早速手紙を書いた。", "「ぼくはずいぶん眼にあっている。みんなででてきて助けてくれ。」", "童子はすぐに手紙をもって、林の方へあるいて行った。", "赤衣（せきい）の童子が、そうして山に着いたのは、ちょうどひるめしごろだった。このとき山の象どもは、沙羅樹（さらじゅ）の下のくらがりで、碁（ご）などをやっていたのだが、額をあつめてこれを見た。", "「ぼくはずいぶん眼にあっている。みんなで出てきて助けてくれ。」", "象は一せいに立ちあがり、まっ黒になって吠（ほ）えだした。", "「オツベルをやっつけよう」議長の象が高く叫（さけ）ぶと、", "「おう、でかけよう。グララアガア、グララアガア。」みんながいちどに呼応する。", "さあ、もうみんな、嵐（あらし）のように林の中をなきぬけて、グララアガア、グララアガア、野原の方へとんで行く。どいつもみんなきちがいだ。小さな木などは根こぎになり、藪（やぶ）や何かもめちゃめちゃだ。グワア　グワア　グワア　グワア、花火みたいに野原の中へ飛び出した。それから、何の、走って、走って、とうとう向うの青くかすんだ野原のはてに、オツベルの邸（やしき）の黄いろな屋根を見付（みつ）けると、象はいちどに噴火（ふんか）した。", "グララアガア、グララアガア。その時はちょうど一時半、オツベルは皮の寝台（しんだい）の上でひるねのさかりで、烏（からす）の夢（ゆめ）を見ていたもんだ。あまり大きな音なので、オツベルの家の百姓どもが、門から少し外へ出て、小手をかざして向うを見た。林のような象だろう。汽車より早くやってくる。さあ、まるっきり、血の気も失せてかけ込（こ）んで、", "「旦那（だんな）あ、象です。押し寄せやした。旦那あ、象です。」と声をかぎりに叫んだもんだ。", "ところがオツベルはやっぱりえらい。眼をぱっちりとあいたときは、もう何もかもわかっていた。", "「おい、象のやつは小屋にいるのか。いる？　いる？　いるのか。よし、戸をしめろ。戸をしめるんだよ。早く象小屋の戸をしめるんだ。ようし、早く丸太を持って来い。とじこめちまえ、畜生（ちくしょう）めじたばたしやがるな、丸太をそこへしばりつけろ。何ができるもんか。わざと力を減らしてあるんだ。ようし、もう五六本持って来い。さあ、大丈夫だ。大丈夫だとも。あわてるなったら。おい、みんな、こんどは門だ。門をしめろ。かんぬきをかえ。つっぱり。つっぱり。そうだ。おい、みんな心配するなったら。しっかりしろよ。」オツベルはもう支度（したく）ができて、ラッパみたいないい声で、百姓どもをはげました。ところがどうして、百姓どもは気が気じゃない。こんな主人に巻き添（ぞ）いなんぞ食いたくないから、みんなタオルやはんけちゃ、よごれたような白いようなものを、ぐるぐる腕（うで）に巻きつける。降参をするしるしなのだ。", "オツベルはいよいよやっきとなって、そこらあたりをかけまわる。オツベルの犬も気が立って、火のつくように吠（ほ）えながら、やしきの中をはせまわる。", "間もなく地面はぐらぐらとゆられ、そこらはばしゃばしゃくらくなり、象はやしきをとりまいた。グララアガア、グララアガア、その恐（おそ）ろしいさわぎの中から、", "「今助けるから安心しろよ。」やさしい声もきこえてくる。", "「ありがとう。よく来てくれて、ほんとに僕（ぼく）はうれしいよ。」象小屋からも声がする。さあ、そうすると、まわりの象は、一そうひどく、グララアガア、グララアガア、塀（へい）のまわりをぐるぐる走っているらしく、度々中から、怒（おこ）ってふりまわす鼻も見える。けれども塀はセメントで、中には鉄も入っているから、なかなか象もこわせない。塀の中にはオツベルが、たった一人で叫んでいる。百姓どもは眼もくらみ、そこらをうろうろするだけだ。そのうち外の象どもは、仲間のからだを台にして、いよいよ塀を越（こ）しかかる。だんだんにゅうと顔を出す。その皺（しわ）くちゃで灰いろの、大きな顔を見あげたとき、オツベルの犬は気絶した。さあ、オツベルは射（う）ちだした。六連発のピストルさ。ドーン、グララアガア、ドーン、グララアガア、ドーン、グララアガア、ところが弾丸（たま）は通らない。牙（きば）にあたればはねかえる。一｜疋（ぴき）なぞは斯（こ）う言った。", "「なかなかこいつはうるさいねえ。ぱちぱち顔へあたるんだ。」", "オツベルはいつかどこかで、こんな文句をきいたようだと思いながら、ケースを帯からつめかえた。そのうち、象の片脚が、塀からこっちへはみ出した。それからも一つはみ出した。五匹の象が一ぺんに、塀からどっと落ちて来た。オツベルはケースを握ったまま、もうくしゃくしゃに潰（つぶ）れていた。早くも門があいていて、グララアガア、グララアガア、象がどしどしなだれ込む。", "「牢（ろう）はどこだ。」みんなは小屋に押し寄せる。丸太なんぞは、マッチのようにへし折られ、あの白象は大へん瘠（や）せて小屋を出た。", "「まあ、よかったねやせたねえ。」みんなはしずかにそばにより、鎖と銅をはずしてやった。", "「ああ、ありがとう。ほんとにぼくは助かったよ。」白象はさびしくわらってそういった。", "おや、川へはいっちゃいけないったら。"]}, {"no": 8, "title": "快走", "author": "岡本 かの子", "category": "外国文学-物語", "chars": 5438, "volume": "中", "paras": ["中の間で道子は弟の準二の正月着物を縫（ぬ）い終って、今度は兄の陸郎の分を縫いかけていた。", "「それおやじのかい」", "離れから廊下を歩いて来た陸郎は、通りすがりにちらと横目に見て訊（き）いた。", "「兄さんのよ。これから兄さんも会社以外はなるべく和服で済ますのよ」", "道子は顔も上げないで、忙がしそうに縫い進みながら言った。", "「国策の線に添ってというのだね」", "「だから、着物の縫い直しや新調にこの頃は一日中大変よ」", "「はははははは、一人で忙がしがってら、だがね、断って置くが、銀ぶらなぞに出かけるとき、俺は和服なんか着ないよ」", "そう言ってさっさと廊下を歩いて行く兄の後姿を、道子は顔を上げてじっと見ていたが、ほーっと吐息をついて縫い物を畳の上に置いた。すると急に屈托して来て、大きな脊伸びをした。肩が凝（こ）って、坐り続けた両腿がだるく張った感じだった。道子は立上って廊下を歩き出した。そのまま玄関で下駄を履（は）くと、冬晴れの午後の戸外へ出てみた。", "陽は既に西に遠退（とおの）いて、西の空を薄桃色に燃え立たせ、眼の前のまばらに立つ住宅は影絵のように黝（くろ）ずんで見えていた。道子は光りを求めて進むように、住宅街を突っ切って空の開けた多摩川脇の草原に出た。一面に燃えた雑草の中に立って、思い切り手を振った。", "冬の陽はみるみるうちに西に沈んで、桃色の西の端（はず）れに、藍色の山脈の峰を浮き上らせた。秩父の連山だ！　道子はこういう夕景色をゆっくり眺めたのは今春女学校を卒業してから一度もなかったような気がした。あわただしい、始終追いつめられて、縮（ちぢ）こまった生活ばかりして来たという感じが道子を不満にした。", "ほーっと大きな吐息をまたついて、彼女は堤防の方に向って歩き出した。冷たい風が吹き始めた。彼女は勢い足に力を入れて草を踏みにじって進んだ。道子が堤防の上に立ったときは、輝いていた西の空は白く濁って、西の川上から川霧と一緒に夕靄（ゆうもや）が迫って来た。東の空には満月に近い月が青白い光りを刻々に増して来て、幅三尺の堤防の上を真白な坦道のように目立たせた。道子は急に総毛立ったので、身体をぶるぶる震わせながら堤防の上を歩き出した。途中、振り返っていると住宅街の窓々には小さく電燈がともって、人の影も定かではなかった。ましてその向うの表通りはただ一列の明りの線となって、川下の橋に連なっている。", "誰も見る人がない　―――　　よし　―――　　思い切り手足を動かしてやろう　―――　　道子は心の中で呟いた。膝を高く折り曲げて足踏みをしながら両腕を前後に大きく振った。それから下駄を脱いで駈け出してみた。女学校在学中ランニングの選手だった当時の意気込みが全身に湧き上って来た。道子は着物の裾を端折（はしょ）って堤防の上を駆けた。髪はほどけて肩に振りかかった。ともすれば堤防の上から足を踏み外（はず）しはしないかと思うほどまっしぐらに駆けた。もとの下駄を脱いだところへ駈け戻って来ると、さすがに身体全体に汗が流れ息が切れた。胸の中では心臓が激しく衝（う）ち続けた。その心臓の鼓動と一緒に全身の筋肉がぴくぴくとふるえた。――ほんとうに溌剌（はつらつ）と活きている感じがする。女学校にいた頃はこれほど感じなかったのに。毎日窮屈な仕事に圧えつけられて暮していると、こんな駈足ぐらいでもこうまで活きている感じが珍らしく感じられるものか。いっそ毎日やったら――", "道子は髪を束（たば）ねながら急ぎ足で家に帰って来た。彼女はこの計画を家の者に話さなかった。両親はきっと差止めるように思われたし、兄弟は親し過ぎて揶揄（からか）うぐらいのものであろうから。いやそれよりも彼女は月明の中に疾駆（しっく）する興奮した気持ちを自分独りで内密に味わいたかったから。", "翌日道子はアンダーシャツにパンツを穿（は）き、その上に着物を着て隠し、汚れ足袋（たび）も新聞紙にくるんで家を出ようとした。", "「どこへ行くんです、この忙がしいのに。それに夕飯時じゃありませんか」", "母親の声は鋭かった。道子は腰を折られて引返した。夕食を兄弟と一緒に済ました後でも、道子は昨晩の駈足の快感が忘れられなかった。外出する口実はないかと頻（しき）りに考えていた。", "「ちょっと銭湯に行って来ます」", "道子の思いつきは至極当然のことのように家の者に聞き流された。道子は急いで石鹸と手拭と湯銭を持って表へ出た。彼女は着物の裾を蹴って一散に堤防へ駈けて行った。冷たい風が耳に痛かった。堤防の上で、さっと着物を脱ぐと手拭でうしろ鉢巻をした。凜々（りり）しい女流選手の姿だった。足袋を履（は）くのももどかしげに足踏みの稽古から駈足のスタートにかかった。爪先立って身をかがめると、冷たいコンクリートの上に手を触れた。オン・ユアー・マーク、ゲットセッ、道子は弾条（ばね）仕掛のように飛び出した。昨日の如く青白い月光に照らし出された堤防の上を、遥かに下を多摩川が銀色に光って淙々（そうそう）と音を立てて流れている。", "次第に脚の疲れを覚えて速力を緩めたとき、道子は月の光りのためか一種悲壮な気分に衝たれた――自分はいま溌剌と生きてはいるが、違った世界に生きているという感じがした。人類とは離れた、淋しいがしかも厳粛な世界に生きているという感じだった。", "道子は着物を着て小走りに表通りのお湯屋へ来た。湯につかって汗を流すとき、初めてまたもとの人間界に立ち戻った気がした。道子は自分独特の生き方を発見した興奮にわくわくして肌を強くこすった。", "家に帰って茶の間に行くと、母親が不審そうな顔をして", "「お湯から何処へまわったの」と訊いた。道子は", "「お湯にゆっくり入ってたの。肩の凝りをほごすために」", "傍で新聞を読んでいた兄の陸郎はこれを聞いて「おばあさんのようなことをいう」と言って笑った。道子は黙って中の間へ去った。", "道子はその翌晩から出来るだけ素早くランニングを済まし、お湯屋に駆けつけて汗もざっと流しただけで帰ることにした。だが母親は娘の長湯を気にしていた。ある晩、道子がお湯に出かけた直後", "「陸郎さん、お前、直ぐ道子の後をつけてみて呉れない。それから出来たら待ってて帰るところもね」", "と母親は頼んだ。陸郎は妹の後をつけるということが親し過ぎるだけに妙に照れくさかった。「こんな寒い晩にかい」彼は別な言葉で言い現しながら、母親のせき立てるのもかまわず、ゆっくりマントを着て帽子をかぶって出て行った。陸郎はなかなか帰って来なかった。母親はじりじりして待っていた。そのうちに道子が帰って来てしまった。", "「また例の通り長湯ですね。そんなに叮嚀（ていねい）に洗うなら一日置きだってもいいでしょう」", "「でもお湯に行くと足がほてって、よく眠れますもの」", "兎（と）も角（かく）、眠れることは事実だったので、道子は真剣になって言えた。母親は", "「明日は日曜でお父様も家においでですから、昼間私と一緒に行きなさい」", "と言った。道子は何て親というものはうるさいものだろうと弱って", "「なぜそう私の長湯が気になるの。眠る前に行く方がいいけれど、それじゃ明日は昼間行きましょう」", "道子は一日ぐらいは我慢しようと諦めた。それが丁度（ちょうど）翌日は雨降りになった。道子は降り続く雨を眺めて――この天気、天祐（てんゆう）っていうもんかしら　―――　　少くとも私の悲観を慰めて呉れたんだから　―――　　そう思うと何だか可笑（おか）しくなって独りくすくす笑った。", "お昼過ぎに母親と傘をさして済した顔でお湯に行った。", "「そんなに長くお湯につかってるんじゃありませんよ」", "母親が呆（あき）れて叱ったけれど、道子は自分の長湯を信用させるために顔を真赤にしてまで堪えて、長くお湯につかっていた。", "やがて洗（なが）し場（ば）に出て洗い桶（おけ）を持って来るときは、お湯に逆上（のぼ）せてふらふらしたが、額を冷水で冷したり、もじもじしているうちに癒（なお）った。", "「いい加減に出ませんか」", "母親は道子のそばへ寄って来て小声で急（せ）き立てるので、やっと身体を拭いて着物を着たが、家へ帰るとまた可笑しくなって奥座敷へ行って独りくすくす笑った。", "「道子はこの頃変ですよ。毎晩お湯に行きたがって、行ったが最後一時間半もかかるんですからね。あんまり変ですから今日は私昼間連れて行ってみました」", "母親は茶の間で日記を書き込んでいた道子の父親に相談しかけた。", "「そしたら」", "父親も不審そうな顔を上げて訊いた。", "「随分長くいたつもりでしたが四十分しかかかりませんもの」", "「そりゃお湯のほかに何処かへ廻るんじゃないかい」", "「ですからゆうべは陸郎に後をつけさせたんですよ。そしたらお湯に入ったというんですがねえ、その陸郎が当てになりませんのよ。様子を見に行ったついでに、友達の家へ寄って十二時近くまで遊んで来るのですから」", "「ふーん」", "父親はじっと考え込んでしまった。", "雨のために響きの悪い玄関のベルがちりと鳴って止むと、受信箱の中に手紙が落された音がした。母親は早速立って行って手紙を持って来たが", "「道子宛ての手紙だけですよ。お友達からですがねえ、この頃の道子の様子では手紙まで気になります。これを一つ中を調べて見ましょうか」", "「そうだね、上手（じょうず）に開けられたらね」", "父親も賛成の顔付きだった。母親は長火鉢にかかった鉄瓶（てつびん）の湯気の上に封じ目をかざした。", "「すっかり濡れてしまいましたけれど、どうやら開きました」", "母親は四つに折った書簡箋をそっと抜き出して拡げた。", "「声を出して読みなさい」", "父親は表情を緊張さした。", "勇ましいおたより、学生時代に帰った思いがしました。毎晩パンツ姿も凜々しく月光を浴びて多摩川の堤防の上を疾駆するあなたを考えただけでも胸が躍ります。一度出かけて見たいと思います。それに引きかえこの頃の私はどうでしょう。風邪ばかり引いて、とてもそんな元気が出ません……", "「へえ、そりゃほんとうかい」", "父親はいつもの慎重な態度も忘れて、頓狂（とんきょう）な声を出してしまった。", "「まあ、あの娘が、何ていう乱暴なことをしてるんでしょう。呼び寄せて叱ってやりましょうか」", "母親は手紙を持ったまま少し厳しい目付きで立上りかけた。", "「まあ待ちなさい。あれとしてはこの寒い冬の晩に、人の目のないところでランニングをするなんて、よくよく屈托したからなんだろう。俺だって毎日遅くまで会社の年末整理に忙殺されてると、何か突飛なことがしたくなるからね。それより俺は、娘の友達が言ってるように、自分の娘が月光の中で走るところを見たくなったよ　―――　　俺の分身がね、そんなところで走ってるのをね」", "「まあ、あんたまで変に好奇心を持ってしまって。でも万一のことでもあったらどうします」", "「そこだよ、場合によったら弟の準二を連れて行かせたら」", "「そりゃ準二が可哀そうですわ」", "「兎も角、明日月夜だったら道子の様子を見に行く」", "「呆れた方ね、そいじゃ私も一緒に行きますわ」", "「お前もか」", "二人は真剣な顔をつき合せて言い合っていたが、急に可笑しくなって、ははははははと笑い出してしまった。二人は明日の月夜が待たれた。", "道子には友達からの手紙は手渡されなかったし、両親の相談なぞ知るよしもなかった。ただいつも晩飯前に帰らない父親が今日は早目に帰って来て自分等の食卓に加わったのが気になった。今晩お湯に行きたいなぞといえば母親が一緒に行くと言うかも知れぬ。弱った。今日は午前中に雨が上って、月もやがて出るであろう。この好夜、一晩休んで肉体が待ち兼ねたようにうずいているのに。段々遅くなって来ると道子はいらいらして来て遂々（とうとう）母親に言った。", "「お湯へやって下さい。頭が痛いんですから」", "母親は別に気にも止めない振りで答えた。", "「いいとも、ゆっくり行ってらっしゃい」", "道子はわれ知らず顔をほころばした。こんなことってあるかしらん――道子は夢のような気がした。夢なら醒めないうちにと手早く身支度（みじたく）をし終って表へ出た。寒風の中を一散に堤防目がけて走った。――今夜は二日分、往復四回駆けてやる――", "道子は堤防の上に駆け上って着物を脱いだ。青白い月の光が彼女の白いアンダー・シャツを銀色に光らせ、腰から下は黒のパンツに切れて宙に浮んだ空想の胸像の如く見えた。彼女は先ず腕を自由に振り動かし、足を踏んで体ならしを済ました。それからスタートの準備もせずに、いきなり弾丸のように川上へ向って疾走した。やがて遥かの向うでターンしてまた元のところへ駆け戻って来た。そこで狭い堤防上でまたくるりとターンすると再び川上へ向って駆けて行った。", "このとき後から追っかけて来た父親は草原の中に立って遥かに堤防の上を白い塊が飛ぶのを望んだ。", "「あれだ、あれだ」", "父親は指さしながら後を振り返って、ずっと後れて駈けて来る妻をもどかしがった。妻は、はあはあ言いながら", "「あなたったら、まるで青年のように走るんですもの、追いつけやしませんわ」", "妻のこの言葉に夫は得意になり", "「それにしてもお前の遅いことったら」", "妻は息をついで", "「これでも一生懸命だもんで、家からここまで一度も休まずに駈けて来たんですからね」", "「俺達は案外まだ若いんだね」", "「おほほほほほほほほほほ」", "「あはははははははははは」", "二人は月光の下を寒風を切って走ったことが近来にない喜びだった。二人は娘のことも忘れて、声を立てて笑い合った。"]}, {"no": 9, "title": "風立ちぬ", "author": "堀 辰雄", "category": "日本文学-物語", "chars": 56692, "volume": "大", "paras": ["〔Le vent se le`ve, il faut tenter de vivre.〕", "〔PAUL VALE\\'RY〕", "序曲", "それらの夏の日々、一面に薄（すすき）の生い茂った草原の中で、お前が立ったまま熱心に絵を描いていると、私はいつもその傍らの一本の白樺の木蔭に身を横たえていたものだった。そうして夕方になって、お前が仕事をすませて私のそばに来ると、それからしばらく私達は肩に手をかけ合ったまま、遥か彼方の、縁だけ茜色（あかねいろ）を帯びた入道雲のむくむくした塊りに覆われている地平線の方を眺めやっていたものだった。ようやく暮れようとしかけているその地平線から、反対に何物かが生れて来つつあるかのように　―――", "そんな日の或る午後、（それはもう秋近い日だった）私達はお前の描きかけの絵を画架に立てかけたまま、その白樺の木蔭に寝そべって果物を齧（か）じっていた。砂のような雲が空をさらさらと流れていた。そのとき不意に、何処からともなく風が立った。私達の頭の上では、木の葉の間からちらっと覗いている藍色（あいいろ）が伸びたり縮んだりした。それと殆んど同時に、草むらの中に何かがばったりと倒れる物音を私達は耳にした。それは私達がそこに置きっぱなしにしてあった絵が、画架と共に、倒れた音らしかった。すぐ立ち上って行こうとするお前を、私は、いまの一瞬の何物をも失うまいとするかのように無理に引き留めて、私のそばから離さないでいた。お前は私のするがままにさせていた。", "風立ちぬ、いざ生きめやも。", "ふと口を衝（つ）いて出て来たそんな詩句を、私は私に靠（もた）れているお前の肩に手をかけながら、口の裡（うち）で繰り返していた。それからやっとお前は私を振りほどいて立ち上って行った。まだよく乾いてはいなかったカンヴァスは、その間に、一めんに草の葉をこびつかせてしまっていた。それを再び画架に立て直し、パレット・ナイフでそんな草の葉を除（と）りにくそうにしながら、", "「まあ！　こんなところを、もしお父様にでも見つかったら　―――　」", "お前は私の方をふり向いて、なんだか曖昧（あいまい）な微笑をした。", "「もう二三日したらお父様がいらっしゃるわ」", "或る朝のこと、私達が森の中をさまよっているとき、突然お前がそう言い出した。私はなんだか不満そうに黙っていた。するとお前は、そういう私の方を見ながら、すこし嗄（しゃが）れたような声で再び口をきいた。", "「そうしたらもう、こんな散歩も出来なくなるわね」", "「どんな散歩だって、しようと思えば出来るさ」", "私はまだ不満らしく、お前のいくぶん気づかわしそうな視線を自分の上に感じながら、しかしそれよりももっと、私達の頭上の梢が何んとはなしにざわめいているのに気を奪（と）られているような様子をしていた。", "「お父様がなかなか私を離して下さらないわ」", "私はとうとう焦（じ）れったいとでも云うような目つきで、お前の方を見返した。", "「じゃあ、僕達はもうこれでお別れだと云うのかい？」", "「だって仕方がないじゃないの」", "そう言ってお前はいかにも諦め切ったように、私につとめて微笑（ほほえ）んで見せようとした。ああ、そのときのお前の顔色の、そしてその唇（くちびる）の色までも、何んと蒼ざめていたことったら！", "「どうしてこんなに変っちゃったんだろうなあ。あんなに私に何もかも任せ切っていたように見えたのに　―――　」と私は考えあぐねたような恰好（かっこう）で、だんだん裸根のごろごろし出して来た狭い山径（やまみち）を、お前をすこし先きにやりながら、いかにも歩きにくそうに歩いて行った。そこいらはもうだいぶ木立が深いと見え、空気はひえびえとしていた。ところどころに小さな沢が食いこんだりしていた。突然、私の頭の中にこんな考えが閃（ひらめ）いた。お前はこの夏、偶然出逢った私のような者にもあんなに従順だったように、いや、もっともっと、お前の父や、それからまたそういう父をも数に入れたお前のすべてを絶えず支配しているものに、素直に身を任せ切っているのではないだろうか？　　―――　「節子！　そういうお前であるのなら、私はお前がもっともっと好きになるだろう。私がもっとしっかりと生活の見透しがつくようになったら、どうしたってお前を貰いに行くから、それまではお父さんの許（もと）に今のままのお前でいるがいい　―――　」そんなことを私は自分自身にだけ言い聞かせながら、しかしお前の同意を求めでもするかのように、いきなりお前の手をとった。お前はその手を私にとられるがままにさせていた。それから私達はそうして手を組んだまま、一つの沢の前に立ち止まりながら、押し黙って、私達の足許に深く食いこんでいる小さな沢のずっと底の、下生（したばえ）の羊歯（しだ）などの上まで、日の光が数知れず枝をさしかわしている低い灌木（かんぼく）の隙間をようやくのことで潜り抜けながら、斑（まだ）らに落ちていて、そんな木洩れ日がそこまで届くうちに殆んどあるかないか位になっている微風にちらちらと揺れ動いているのを、何か切ないような気持で見つめていた。", "それから二三日した或る夕方、私は食堂で、お前がお前を迎えに来た父と食事を共にしているのを見出した。お前は私の方にぎごちなさそうに背中を向けていた。父の側にいることがお前に殆んど無意識的に取らせているにちがいない様子や動作は、私にはお前をついぞ見かけたこともないような若い娘のように感じさせた。", "「たとい私がその名を呼んだにしたって　―――　」と私は一人でつぶやいた。「あいつは平気でこっちを見向きもしないだろう。まるでもう私の呼んだものではないかのように　―――　」", "その晩、私は一人でつまらなそうに出かけて行った散歩からかえって来てからも、しばらくホテルの人けのない庭の中をぶらぶらしていた。山百合が匂っていた。私はホテルの窓がまだ二つ三つあかりを洩らしているのをぼんやりと見つめていた。そのうちすこし霧がかかって来たようだった。それを恐れでもするかのように、窓のあかりは一つびとつ消えて行った。そしてとうとうホテル中がすっかり真っ暗になったかと思うと、軽いきしりがして、ゆるやかに一つの窓が開いた。そして薔薇色（ばらいろ）の寝衣（ねまき）らしいものを着た、一人の若い娘が、窓の縁にじっと凭（よ）りかかり出した。それはお前だった。　―――", "お前達が発って行ったのち、日ごと日ごとずっと私の胸をしめつけていた、あの悲しみに似たような幸福の雰囲気を、私はいまだにはっきりと蘇（よみがえ）らせることが出来る。", "私は終日、ホテルに閉（と）じ籠（こも）っていた。そうして長い間お前のために打棄（うっちゃ）って置いた自分の仕事に取りかかり出した。私は自分にも思いがけない位、静かにその仕事に没頭することが出来た。そのうちにすべてが他の季節に移って行った。そしていよいよ私も出発しようとする前日、私はひさしぶりでホテルから散歩に出かけて行った。", "秋は林の中を見ちがえるばかりに乱雑にしていた。葉のだいぶ少くなった木々は、その間から、人けの絶えた別荘のテラスをずっと前方にのり出させていた。菌類の湿っぽい匂いが落葉の匂いに入りまじっていた。そういう思いがけない位の季節の推移が、――お前と別れてから私の知らぬ間にこんなにも立ってしまった時間というものが、私には異様に感じられた。私の心の裡（うち）の何処かしらに、お前から引き離されているのはただ一時的だと云った確信のようなものがあって、そのためこうした時間の推移までが、私には今までとは全然異った意味を持つようになり出したのであろうか？　　―――　そんなようなことを、私はすぐあとではっきりと確かめるまで、何やらぼんやりと感じ出していた。", "私はそれから十数分後、一つの林の尽きたところ、そこから急に打ちひらけて、遠い地平線までも一帯に眺められる、一面に薄（すすき）の生い茂った草原の中に、足を踏み入れていた。そして私はその傍らの、既に葉の黄いろくなりかけた一本の白樺の木蔭に身を横たえた。其処は、その夏の日々、お前が絵を描いているのを眺めながら、私がいつも今のように身を横たえていたところだった。あの時には殆んどいつも入道雲に遮られていた地平線のあたりには、今は、何処か知らない、遠くの山脈までが、真っ白な穂先をなびかせた薄の上を分けながら、その輪廓（りんかく）を一つ一つくっきりと見せていた。", "私はそれらの遠い山脈の姿をみんな暗記してしまう位、じっと目に力を入れて見入っているうちに、いままで自分の裡に潜んでいた、自然が自分のために極めて置いてくれたものを今こそ漸（や）っと見出したと云う確信を、だんだんはっきりと自分の意識に上らせはじめていた。　―――", "春　　　春", "三月になった。或る午後、私がいつものようにぶらっと散歩のついでにちょっと立寄ったとでも云った風に節子の家を訪れると、門をはいったすぐ横の植込みの中に、労働者のかぶるような大きな麦稈帽（むぎわらぼう）をかぶった父が、片手に鋏（はさみ）をもちながら、そこいらの木の手入れをしていた。私はそういう姿を認めると、まるで子供のように木の枝を掻き分けながら、その傍に近づいていって、二言三言挨拶の言葉を交わしたのち、そのまま父のすることを物珍らしそうに見ていた。――そうやって植込みの中にすっぽりと身を入れていると、あちらこちらの小さな枝の上にときどき何かしら白いものが光ったりした。それはみんな莟（つぼみ）らしかった。　―――", "「あれもこの頃はだいぶ元気になって来たようだが」父は突然そんな私の方へ顔をもち上げてその頃私と婚約したばかりの節子のことを言い出した。", "「もう少し好い陽気になったら、転地でもさせて見たらどうだろうね？」", "「それはいいでしょうけれど　―――　」と私は口ごもりながら、さっきから目の前にきらきら光っている一つの莟がなんだか気になってならないと云った風をしていた。", "「何処ぞいいところはないかとこの間うちから物色しとるのだがね――」と父はそんな私には構わずに言いつづけた。「節子はＦのサナトリウムなんぞどうか知らんと言うのじゃが、あなたはあそこの院長さんを知っておいでだそうだね？」", "「ええ」と私はすこし上の空でのように返事をしながら、やっとさっき見つけた白い莟を手もとにたぐりよせた。", "「だが、あそこなんぞは、あれ一人で行って居られるだろうか？」", "「みんな一人で行っているようですよ」", "「だが、あれにはなかなか行って居られまいね？」", "父はなんだか困ったような顔つきをしたまま、しかし私の方を見ずに、自分の目の前にある木の枝の一つへいきなり鋏を入れた。それを見ると、私はとうとう我慢がしきれなくなって、それを私が言い出すのを父が待っているとしか思われない言葉を、ついと口に出した。", "「なんでしたら僕も一緒に行ってもいいんです。いま、しかけている仕事の方も、丁度それまでには片がつきそうですから　―――　」", "私はそう言いながら、やっと手の中に入れたばかりの莟のついた枝を再びそっと手離した。それと同時に父の顔が急に明るくなったのを私は認めた。", "「そうしていただけたら、一番いいのだが、――しかしあなたにはえろう済まんな　―――　」", "「いいえ、僕なんぞにはかえってそう云った山の中の方が仕事ができるかも知れません　―――　」", "それから私達はそのサナトリウムのある山岳地方のことなど話し合っていた。が、いつのまにか私達の会話は、父のいま手入れをしている植木の上に落ちていった。二人のいまお互に感じ合っている一種の同情のようなものが、そんなとりとめのない話をまで活気づけるように見えた。　―――", "「節子さんはお起きになっているのかしら？」しばらくしてから私は何気なさそうに訊（き）いてみた。", "「さあ、起きとるでしょう。　―――　どうぞ、構わんから、其処からあちらへ　―――　」と父は鋏をもった手で、庭木戸の方を示した。私はやっと植込みの中を潜り抜けると、蔦（つた）がからみついて少し開きにくい位になったその木戸をこじあけて、そのまま庭から、この間まではアトリエに使われていた、離れのようになった病室の方へ近づいていった。", "節子は、私の来ていることはもうとうに知っていたらしいが、私がそんな庭からはいって来ようとは思わなかったらしく、寝間着の上に明るい色の羽織をひっかけたまま、長椅子の上に横になりながら、細いリボンのついた、見かけたことのない婦人帽を手でおもちゃにしていた。", "私がフレンチ扉（ドア）ごしにそういう彼女を目に入れながら近づいて行くと、彼女の方でも私を認めたらしかった。彼女は無意識に立ち上ろうとするような身動きをした。が、彼女はそのまま横になり、顔を私の方へ向けたまま、すこし気まり悪そうな微笑で私を見つめた。", "「起きていたの？」私は扉のところで、いくぶん乱暴に靴を脱ぎながら、声をかけた。", "「ちょっと起きて見たんだけれど、すぐ疲れちゃったわ」", "そう言いながら、彼女はいかにも疲れを帯びたような、力なげな手つきで、ただ何んということもなしに手で弄（もてあそ）んでいたらしいその帽子を、すぐ脇にある鏡台の上へ無造作にほうり投げた。が、それはそこまで届かないで床の上に落ちた。私はそれに近寄って、殆ど私の顔が彼女の足のさきにくっつきそうになるように屈（かが）み込（こ）んで、その帽子を拾い上げると、今度は自分の手で、さっき彼女がそうしていたように、それをおもちゃにし出していた。", "それから私はやっと訊（き）いた。「こんな帽子なんぞ取り出して、何をしていたんだい？」", "「そんなもの、いつになったら被（かぶ）れるようになるんだか知れやしないのに、お父様ったら、きのう買っておいでになったのよ。　―――　おかしなお父様でしょう？」", "「これ、お父様のお見立てなの？　本当に好いお父様じゃないか。　―――　どおれ、この帽子、ちょっとかぶって御覧」と私が彼女の頭にそれを冗談半分かぶせるような真似をしかけると、", "「厭（いや）、そんなこと　―――　」", "彼女はそう言って、うるさそうに、それを避けでもするように、半ば身を起した。そうして言（い）い訣（わけ）のように弱々しい微笑をして見せながら、ふいと思い出したように、いくぶん痩（や）せの目立つ手で、すこし縺（もつ）れた髪を直しはじめた。その何気なしにしている、それでいていかにも自然に若い女らしい手つきは、それがまるで私を愛撫でもし出したかのような、呼吸（いき）づまるほどセンシュアルな魅力を私に感じさせた。そうしてそれは、思わずそれから私が目をそらさずにはいられないほどだった　―――", "やがて私はそれまで手で弄（もてあそ）んでいた彼女の帽子を、そっと脇の鏡台の上に載せると、ふいと何か考え出したように黙りこんで、なおもそういう彼女からは目をそらせつづけていた。", "「おおこりになったの？」と彼女は突然私を見上げながら、気づかわしそうに問うた。", "「そうじゃないんだ」と私はやっと彼女の方へ目をやりながら、それから話の続きでもなんでもなしに、出し抜けにこう言い出した。「さっきお父様がそう言っていらしったが、お前、ほんとうにサナトリウムに行く気かい？」", "「ええ、こうしていても、いつ良くなるのだか分らないのですもの。早く良くなれるんなら、何処へでも行っているわ。でも　―――　」", "「どうしたのさ？　なんて言うつもりだったんだい？」", "「なんでもないの」", "「なんでもなくってもいいから言って御覧。　―――　どうしても言わないね、じゃ僕が言ってやろうか？　お前、僕にも一緒に行けというのだろう？」", "「そんなことじゃないわ」と彼女は急に私を遮ろうとした。", "しかし私はそれには構わずに、最初の調子とは異って、だんだん真面目になりだした、いくぶん不安そうな調子で言いつづけた。", "「　―――　いや、お前が来なくともいいと言ったって、そりあ僕は一緒に行くとも。だがね、ちょっとこんな気がして、それが気がかりなのだ。　―――　僕はこうしてお前と一緒にならない前から、何処かの淋しい山の中へ、お前みたいな可哀らしい娘と二人きりの生活をしに行くことを夢みていたことがあったのだ。お前にもずっと前にそんな私の夢を打ち明けやしなかったかしら？　ほら、あの山小屋の話さ、そんな山の中に私達は住めるのかしらと云って、あのときはお前は無邪気そうに笑っていたろう？　　―――　実はね、こんどお前がサナトリウムへ行くと言い出しているのも、そんなことが知（し）らず識（し）らずの裡（うち）にお前の心を動かしているのじゃないかと思ったのだ。　―――　そうじゃないのかい？」", "彼女はつとめて微笑（ほほえ）みながら、黙ってそれを聞いていたが、", "「そんなこともう覚えてなんかいないわ」と彼女はきっぱりと言った。それから寧（むし）ろ私の方をいたわるような目つきでしげしげと見ながら、「あなたはときどき飛んでもないことを考え出すのね　―――　」", "それから数分後、私達は、まるで私達の間には何事もなかったような顔つきをして、フレンチ扉（ドア）の向うに、芝生がもう大ぶ青くなって、あちらにもこちらにも陽炎（かげろう）らしいものの立っているのを、一緒になって珍らしそうに眺め出していた。", "四月になってから、節子の病気はいくらかずつ恢復期（かいふくき）に近づき出しているように見えた。そしてそれがいかにも遅々としていればいるほど、その恢復へのもどかしいような一歩一歩は、かえって何か確実なもののように思われ、私達には云い知れず頼もしくさえあった。", "そんな或る日の午後のこと、私が行くと、丁度父は外出していて、節子は一人で病室にいた。その日は大へん気分もよさそうで、いつも殆ど着たきりの寝間着を、めずらしく青いブラウスに着換えていた。私はそういう姿を見ると、どうしても彼女を庭へ引っぱり出そうとした。すこしばかり風が吹いていたが、それすら気持のいいくらい軟らかだった。彼女はちょっと自信なさそうに笑いながら、それでも私にやっと同意した。そうして私の肩に手をかけて、フレンチ扉（ドア）から、何んだか危かしそうな足つきをしながら、おずおずと芝生の上へ出て行った。生墻（いけがき）に沿うて、いろんな外国種のも混じって、どれがどれだか見分けられないくらいに枝と枝を交わしながら、ごちゃごちゃに茂っている植込みの方へ近づいてゆくと、それらの茂みの上には、あちらにもこちらにも白や黄や淡紫の小さな莟（つぼみ）がもう今にも咲き出しそうになっていた。私はそんな茂みの一つの前に立ち止まると、去年の秋だったか、それがそうだと彼女に教えられたのをひょっくり思い出して、", "「これはライラックだったね？」と彼女の方をふり向きながら、半ば訊くように言った。", "「それがどうもライラックじゃないかも知れないわ」と私の肩に軽く手をかけたまま、彼女はすこし気の毒そうに答えた。", "「ふん　―――　じゃ、いままで嘘を教えていたんだね？」", "「嘘なんか衝（つ）きやしないけれど、そういって人から頂戴したの。　―――　だけど、あんまり好い花じゃないんですもの」", "「なあんだ、もういまにも花が咲きそうになってから、そんなことを白状するなんて！　じゃあ、どうせあいつも　―――　」", "私はその隣りにある茂みの方を指さしながら、「あいつは何んていったっけなあ？」", "「金雀児（えにしだ）？」と彼女はそれを引き取った。私達は今度はそっちの茂みの前に移っていった。「この金雀児は本物よ。ほら、黄いろいのと白いのと、莟が二種類あるでしょう？　こっちの白いの、それあ珍らしいのですって　―――　お父様の御自慢よ　―――　」", "そんな他愛のないことを言い合いながら、その間じゅう節子は私の肩から手をはずさずに、しかし疲れたというよりも、うっとりとしたようになって、私に靠（もた）れかかっていた。それから私達はしばらくそのまま黙り合っていた。そうすることがこういう花咲き匂うような人生をそのまま少しでも引き留めて置くことが出来でもするかのように。ときおり軟らかな風が向うの生墻の間から抑えつけられていた呼吸かなんぞのように押し出されて、私達の前にしている茂みにまで達し、その葉を僅かに持ち上げながら、それから其処にそういう私達だけをそっくり完全に残したまんま通り過ぎていった。", "突然、彼女が私の肩にかけていた自分の手の中にその顔を埋めた。私は彼女の心臓がいつもよりか高く打っているのに気がついた。「疲れたの？」私はやさしく彼女に訊いた。", "「いいえ」と彼女は小声に答えたが、私はますます私の肩に彼女のゆるやかな重みのかかって来るのを感じた。", "「私がこんなに弱くって、あなたに何んだかお気の毒で　―――　」彼女はそう囁（ささや）いたのを、私は聞いたというよりも、むしろそんな気がした位のものだった。", "「お前のそういう脆弱（ひよわ）なのが、そうでないより私にはもっとお前をいとしいものにさせているのだと云うことが、どうして分らないのだろうなあ　―――　」と私はもどかしそうに心のうちで彼女に呼びかけながら、しかし表面はわざと何んにも聞きとれなかったような様子をしながら、そのままじっと身動きもしないでいると、彼女は急に私からそれを反らせるようにして顔をもたげ、だんだん私の肩から手さえも離して行きながら、", "「どうして、私、この頃こんなに気が弱くなったのかしら？　こないだうちは、どんなに病気のひどいときだって何んとも思わなかった癖に　―――　」と、ごく低い声で、独り言でも言うように口ごもった。沈黙がそんな言葉を気づかわしげに引きのばしていた。そのうち彼女が急に顔を上げて、私をじっと見つめたかと思うと、それを再び伏せながら、いくらか上ずったような中音で言った。「私、なんだか急に生きたくなったのね　―――　」", "それから彼女は聞えるか聞えない位の小声で言い足した。「あなたのお蔭で　―――　」", "それは、私達がはじめて出会ったもう二年前にもなる夏の頃、不意に私の口を衝（つ）いて出た、そしてそれから私が何んということもなしに口ずさむことを好んでいた、", "風立ちぬ、いざ生きめやも。", "という詩句が、それきりずっと忘れていたのに、又ひょっくりと私達に蘇（よみがえ）ってきたほどの、――云わば人生に先立った、人生そのものよりかもっと生き生きと、もっと切ないまでに愉（たの）しい日々であった。", "私達はその月末に八ヶ岳｜山麓（さんろく）のサナトリウムに行くための準備をし出していた。私は、一寸した識合（しりあ）いになっている、そのサナトリウムの院長がときどき上京する機会を捉えて、其処へ出かけるまでに一度節子の病状を診て貰うことにした。", "或る日、やっとのことで郊外にある節子の家までその院長に来て貰って、最初の診察を受けた後、「なあに大したことはないでしょう。まあ、一二年山へ来て辛抱なさるんですなあ」と病人達に言い残して忙しそうに帰ってゆく院長を、私は駅まで見送って行った。私は彼から自分にだけでも、もっと正確な彼女の病態を聞かしておいて貰いたかったのだった。", "「しかし、こんなことは病人には言わぬようにしたまえ。父親（ファタア）にはそのうち僕からもよく話そうと思うがね」院長はそんな前置きをしながら、少し気むずかしい顔つきをして節子の容態をかなり細かに私に説明して呉れた。それからそれを黙って聞いていた私の方をじっと見て、「君もひどく顔色が悪いじゃないか。ついでに君の身体も診ておいてやるんだったな」と私を気の毒がるように言った。", "駅から私が帰って、再び病室にはいってゆくと、父はそのまま寝ている病人の傍に居残って、サナトリウムへ出かける日取などの打ち合わせを彼女とし出していた。なんだか浮かない顔をしたまま、私もその相談に加わり出した。「だが　―――　」父はやがて何か用事でも思いついたように、立ち上がりながら、「もうこの位に良くなっているのだから、夏中だけでも行っていたら、よかりそうなものだがね」といかにも不審そうに言って、病室を出ていった。", "二人きりになると、私達はどちらからともなくふっと黙り合った。それはいかにも春らしい夕暮であった。私はさっきからなんだか頭痛がしだしているような気がしていたが、それがだんだん苦しくなってきたので、そっと目立たぬように立ち上がると、硝子（ガラス）扉の方に近づいて、その一方の扉を半ば開け放ちながら、それに靠（もたれ）れかかった。そうしてしばらくそのまま私は、自分が何を考えているのかも分からない位にぼんやりして、一面にうっすらと靄（もや）の立ちこめている向うの植込みのあたりへ「いい匂がするなあ、何んの花のにおいだろう――」と思いながら、空虚な目をやっていた。", "「何をしていらっしゃるの？」", "私の背後で、病人のすこし嗄（しゃが）れた声がした。それが不意に私をそんな一種の麻痺（まひ）したような状態から覚醒（かくせい）させた。私は彼女の方には背中を向けたまま、いかにも何か他のことでも考えていたような、取ってつけたような調子で、", "「お前のことだの、山のことだの、それからそこで僕達の暮らそうとしている生活のことだのを、考えているのさ　―――　」と途切れ途切れに言い出した。が、そんなことを言い続けているうちに、私はなんだか本当にそんな事を今しがたまで考えていたような気がしてきた。そうだ、それから私はこんなことも考えていたようだ。――「向うへいったら、本当にいろいろな事が起るだろうなあ。　―――　しかし人生というものは、お前がいつもそうしているように、何もかもそれに任せ切って置いた方がいいのだ。　―――　そうすればきっと、私達がそれを希（ねが）おうなどとは思いも及ばなかったようなものまで、私達に与えられるかも知れないのだ。　―――　」そんなことまで心の裡（うち）で考えながら、それには少しも自分では気がつかずに、私はかえって何んでもないように見える些細（ささい）な印象の方にすっかり気をとられていたのだ。　―――", "そんな庭面（にわも）はまだほの明るかったが、気がついて見ると、部屋のなかはもうすっかり薄暗くなっていた。", "「明りをつけようか？」私は急に気をとりなおしながら言った。", "「まだつけないでおいて頂戴　―――　」そう答えた彼女の声は前よりも嗄れていた。", "しばらく私達は言葉もなくていた。", "「私、すこし息ぐるしいの、草のにおいが強くて　―――　」", "「じゃ、ここも締めて置こうね」", "私は、殆ど悲しげな調子でそう応じながら、扉の握りに手をかけて、それを引きかけた。", "「あなた　―――　」彼女の声は今度は殆ど中性的なくらいに聞えた。「いま、泣いていらしったんでしょう？」", "私はびっくりした様子で、急に彼女の方をふり向いた。", "「泣いてなんかいるものか。　―――　僕を見て御覧」", "彼女は寝台の中から私の方へその顔を向けようともしなかった。もう薄暗くってそれとは定かに認めがたい位だが、彼女は何かをじっと見つめているらしい。しかし私がそれを気づかわしそうに自分の目で追って見ると、ただ空（くう）を見つめているきりだった。", "「わかっているの、私にも　―――　さっき院長さんに何か言われていらしったのが　―――　」", "私はすぐ何か答えたかったが、何んの言葉も私の口からは出て来なかった。私はただ音を立てないようにそっと扉を締めながら再び、夕暮れかけた庭面を見入り出した。", "やがて私は、私の背後に深い溜息（ためいき）のようなものを聞いた。", "「御免なさい」彼女はとうとう口をきいた。その声はまだ少し顫（ふる）えを帯びていたが、前よりもずっと落着いていた。「こんなこと気になさらないでね　―――　。私達、これから本当に生きられるだけ生きましょうね　―――　」", "私はふりむきながら、彼女がそっと目がしらに指先をあてて、そこにそれをじっと置いているのを認めた。", "四月下旬の或る薄曇った朝、停車場まで父に見送られて、私達はあたかも蜜月の旅へでも出かけるように、父の前はさも愉しそうに、山岳地方へ向う汽車の二等室に乗り込んだ。汽車は徐（しず）かにプラットフォームを離れ出した。その跡に、つとめて何気なさそうにしながら、ただ背中だけ少し前屈（まえかが）みにして、急に年とったような様子をして立っている父だけを一人残して。――", "すっかりプラットフォームを離れると、私達は窓を締めて、急に淋しくなったような顔つきをして、空いている二等室の一隅に腰を下ろした。そうやってお互の心と心を温め合おうとでもするように、膝と膝とをぴったりとくっつけながら　―――", "風立ちぬ", "私達の乗った汽車が、何度となく山を攀（よ）じのぼったり、深い渓谷に沿って走ったり、又それから急に打（う）ち展（ひら）けた葡萄畑（ぶどうばたけ）の多い台地を長いことかかって横切ったりしたのち、漸（や）っと山岳地帯へと果てしのないような、執拗（しつよう）な登攀（とうはん）をつづけ出した頃には、空は一層低くなり、いままではただ一面に鎖（と）ざしているように見えた真っ黒な雲が、いつの間にか離れ離れになって動き出し、それらが私達の目の上にまで圧（お）しかぶさるようであった。空気もなんだか底冷えがしだした。上衣の襟を立てた私は、肩掛にすっかり体を埋めるようにして目をつぶっている節子の、疲れたと云うよりも、すこし興奮しているらしい顔を不安そうに見守っていた。彼女はときどきぼんやりと目をひらいて私の方を見た。はじめのうちは二人はその度毎に目と目で微笑（ほほえ）みあったが、しまいにはただ不安そうに互を見合ったきり、すぐ二人とも目をそらせた。そうして彼女はまた目を閉じた。", "「なんだか冷えてきたね。雪でも降るのかな」", "「こんな四月になっても雪なんか降るの？」", "「うん、この辺は降らないともかぎらないのだ」", "まだ三時頃だというのにもうすっかり薄暗くなった窓の外へ目を注いだ。ところどころに真っ黒な樅（もみ）をまじえながら、葉のない落葉松（からまつ）が無数に並び出しているのに、すでに私達は八ヶ岳の裾を通っていることに気がついたが、まのあたり見える筈の山らしいものは影も形も見えなかった。　―――", "汽車は、いかにも山麓（さんろく）らしい、物置小屋と大してかわらない小さな駅に停車した。駅には、高原療養所の印のついた法被（はっぴ）を着た、年とった、小使が一人、私達を迎えに来ていた。", "駅の前に待たせてあった、古い、小さな自動車のところまで、私は節子を腕で支えるようにして行った。私の腕の中で、彼女がすこしよろめくようになったのを感じたが、私はそれには気づかないようなふりをした。", "「疲れたろうね？」", "「そんなでもないわ」", "私達と一緒に下りた数人の土地の者らしい人々が、そういう私達のまわりで何やら囁（ささや）き合（あ）っていたようだったが、私達が自動車に乗り込んでいるうちに、いつのまにかその人々は他の村人たちに混って見分けにくくなりながら、村のなかに消えていた。", "私達の自動車が、みすぼらしい小家の一列に続いている村を通り抜けた後、それが見えない八ヶ岳の尾根までそのまま果てしなく拡がっているかと思える凸凹の多い傾斜地へさしかかったと思うと、背後に雑木林を背負いながら、赤い屋根をした、いくつもの側翼のある、大きな建物が、行く手に見え出した。「あれだな」と、私は車台の傾きを身体に感じ出しながら、つぶやいた。", "節子はちょっと顔を上げ、いくぶん心配そうな目つきで、それをぼんやりと見ただけだった。", "サナトリウムに着くと、私達は、その一番奥の方の、裏がすぐ雑木林になっている、病棟の二階の第一号室に入れられた。簡単な診察後、節子はすぐベッドに寝ているように命じられた。リノリウムで床を張った病室には、すべて真っ白に塗られたベッドと卓と椅子と、――それからその他には、いましがた小使が届けてくれたばかりの数箇のトランクがあるきりだった。二人きりになると、私はしばらく落着かずに、附添人のために宛てられた狭苦しい側室にはいろうともしないで、そんなむき出しな感じのする室内をぼんやりと見廻したり、又、何度も窓に近づいては、空模様ばかり気にしていた。風が真っ黒な雲を重たそうに引きずっていた。そしてときおり裏の雑木林から鋭い音を※　　　てへん＋宛」、第3水準1-84-80］（も）いだりした。私は一度寒そうな恰好（かっこう）をしてバルコンに出て行った。バルコンは何んの仕切もなしにずっと向うの病室まで続いていた。その上には全く人けが絶えていたので、私は構わずに歩き出しながら、病室を一つ一つ覗いて行って見ると、丁度四番目の病室のなかに、一人の患者の寝ているのが半開きになった窓から見えたので、私はいそいでそのまま引っ返して来た。", "やっとランプが点（つ）いた。それから私達は看護婦の運んで来てくれた食事に向い合った。それは私達が二人きりで最初に共にする食事にしては、すこし佗（わ）びしかった。食事中、外がもう真っ暗なので何も気がつかずに、唯何んだかあたりが急に静かになったと思っていたら、いつのまにか雪になり出したらしかった。", "私は立ち上って、半開きにしてあった窓をもう少し細目にしながら、その硝子（ガラス）に顔をくっつけて、それが私の息で曇りだしたほど、じっと雪のふるのを見つめていた。それからやっと其処を離れながら、節子の方を振り向いて、「ねえ、お前、何んだってこんな　―――　」と言い出しかけた。", "彼女はベッドに寝たまま、私の顔を訴えるように見上げて、それを私に言わせまいとするように、口へ指をあてた。", "八ヶ岳の大きなのびのびとした代赭色（たいしゃいろ）の裾野が漸くその勾配を弛（ゆる）めようとするところに、サナトリウムは、いくつかの側翼を並行に拡げながら、南を向いて立っていた。その裾野の傾斜は更に延びて行って、二三の小さな山村を村全体傾かせながら、最後に無数の黒い松にすっかり包まれながら、見えない谿間（たにま）のなかに尽きていた。", "サナトリウムの南に開いたバルコンからは、それらの傾いた村とその赭（あか）ちゃけた耕作地が一帯に見渡され、更にそれらを取り囲みながら果てしなく並み立っている松林の上に、よく晴れている日だったならば、南から西にかけて、南アルプスとその二三の支脈とが、いつも自分自身で湧き上らせた雲のなかに見え隠れしていた。", "サナトリウムに着いた翌朝、自分の側室で私が目を醒（さ）ますと、小さな窓枠の中に、藍青色（らんせいしょく）に晴れ切った空と、それからいくつもの真っ白い鶏冠のような山巓（さんてん）が、そこにまるで大気からひょっくり生れでもしたような思いがけなさで、殆んど目（ま）ながいに見られた。そして寝たままでは見られないバルコンや屋根の上に積った雪からは、急に春めいた日の光を浴びながら、絶えず水蒸気がたっているらしかった。", "すこし寝過したくらいの私は、いそいで飛び起きて、隣りの病室へはいって行った。節子は、すでに目を醒ましていて、毛布にくるまりながら、ほてったような顔をしていた。", "「お早う」私も同じように、顔がほてり出すのを感じながら、気軽そうに言った。「よく寝られた？」", "「ええ」彼女は私にうなずいて見せた。「ゆうべ睡眠剤（くすり）を飲んだの。なんだか頭がすこし痛いわ」", "私はそんなことになんか構っていられないと云った風に、元気よく窓も、それからバルコンに通じる硝子（ガラス）扉も、すっかり開け放した。まぶしくって、一時は何も見られない位だったが、そのうちそれに目がだんだん馴れてくると、雪に埋れたバルコンからも、屋根からも、野原からも、木からさえも、軽い水蒸気の立っているのが見え出した。", "「それにとても可笑（おか）しな夢を見たの。あのね　―――　」彼女が私の背後で言い出しかけた。", "私はすぐ、彼女が何か打ち明けにくいようなことを無理に言い出そうとしているらしいのを覚（さと）った。そんな場合のいつものように、彼女のいまの声もすこし嗄（しゃが）れていた。", "今度は私が、彼女の方を振り向きながら、それを言わせないように、口へ指をあてる番だった。　―――", "やがて看護婦長がせかせかした親切そうな様子をしてはいって来た。こうして看護婦長は、毎朝、病室から病室へと患者達を一人一人見舞うのである。", "「ゆうべはよくお休みになれましたか？」看護婦長は快活そうな声で尋ねた。", "病人は何も言わないで、素直にうなずいた。", "こういう山のサナトリウムの生活などは、普通の人々がもう行き止まりだと信じているところから始まっているような、特殊な人間性をおのずから帯びてくるものだ。――私が自分の裡（うち）にそういう見知らないような人間性をぼんやりと意識しはじめたのは、入院後間もなく私が院長に診察室に呼ばれて行って、節子のレントゲンで撮られた疾患部の写真を見せられた時からだった。", "院長は私を窓ぎわに連れて行って、私にも見よいように、その写真の原板を日に透かせながら、一々それに説明を加えて行った。右の胸には数本の白々とした肋骨（ろっこつ）がくっきりと認められたが、左の胸にはそれらが殆んど何も見えない位、大きな、まるで暗い不思議な花のような、病竈（びょうそう）ができていた。", "「思ったよりも病竈が拡がっているなあ。　―――　こんなにひどくなってしまって居るとは思わなかったね。　―――　これじゃ、いま、病院中でも二番目ぐらいに重症かも知れんよ　―――　」", "そんな院長の言葉が自分の耳の中でがあがあするような気がしながら、私はなんだか思考力を失ってしまった者みたいに、いましがた見て来たあの暗い不思議な花のような影像（イマアジュ）をそれらの言葉とは少しも関係がないもののように、それだけを鮮かに意識の閾（しきみ）に上らせながら、診察室から帰って来た。自分とすれちがう白衣の看護婦だの、もうあちこちのバルコンで日光浴をしだしている裸体の患者達だの、病棟のざわめきだの、それから小鳥の囀（さえず）りだのが、そういう私の前を何んの連絡もなしに過ぎた。私はとうとう一番はずれの病棟にはいり、私達の病室のある二階へ通じる階段を昇ろうとして機械的に足を弛（ゆる）めた瞬間、その階段の一つ手前にある病室の中から、異様な、ついぞそんなのはまだ聞いたこともないような気味のわるい空咳が続けさまに洩れて来るのを耳にした。「おや、こんなところにも患者がいたのかなあ」と思いながら、私はそのドアについている No.17 という数字を、ただぼんやりと見つめた。", "こうして私達のすこし風変りな愛の生活が始まった。", "節子は入院以来、安静を命じられて、ずっと寝ついたきりだった。そのために、気分の好いときはつとめて起きるようにしていた入院前の彼女に比べると、かえって病人らしく見えたが、別に病気そのものは悪化したとも思えなかった。医者達もまた直ぐ快癒する患者として彼女をいつも取り扱っているように見えた。「こうして病気を生捕りにしてしまうのだ」と院長などは冗談でも言うように言ったりした。", "季節はその間に、いままで少し遅れ気味だったのを取り戻すように、急速に進み出していた。春と夏とが殆んど同時に押し寄せて来たかのようだった。毎朝のように、鶯や閑古鳥の囀りが私達を眼ざませた。そして殆んど一日中、周囲の林の新緑がサナトリウムを四方から襲いかかって、病室の中まですっかり爽（さわ）やかに色づかせていた。それらの日々、朝のうちに山々から湧いて出て行った白い雲までも、夕方には再び元の山々へ立ち戻って来るかと見えた。", "私は、私達が共にした最初の日々、私が節子の枕もとに殆んど附ききりで過したそれらの日々のことを思い浮べようとすると、それらの日々が互に似ているために、その魅力はなくはない単一さのために、殆んどどれが後だか先きだか見分けがつかなくなるような気がする。", "と言うよりも、私達はそれらの似たような日々を繰り返しているうちに、いつか全く時間というものからも抜け出してしまっていたような気さえする位だ。そして、そういう時間から抜け出したような日々にあっては、私達の日常生活のどんな些細（ささい）なものまで、その一つ一つがいままでとは全然異った魅力を持ち出すのだ。私の身近にあるこの微温（なまぬる）い、好い匂いのする存在、その少し早い呼吸、私の手をとっているそのしなやかな手、その微笑、それからまたときどき取り交わす平凡な会話、――そう云ったものを若（も）し取り除いてしまうとしたら、あとには何も残らないような単一な日々だけれども、――我々の人生なんぞというものは要素的には実はこれだけなのだ、そして、こんなささやかなものだけで私達がこれほどまで満足していられるのは、ただ私がそれをこの女と共にしているからなのだ、と云うことを私は確信して居られた。", "それらの日々に於ける唯一の出来事と云えば、彼女がときおり熱を出すこと位だった。それは彼女の体をじりじり衰えさせて行くものにちがいなかった。が、私達はそういう日は、いつもと少しも変らない日課の魅力を、もっと細心に、もっと緩慢に、あたかも禁断の果実の味をこっそり偸（ぬす）みでもするように味わおうと試みたので、私達のいくぶん死の味のする生の幸福はその時は一そう完全に保たれた程だった。", "そんな或る夕暮、私はバルコンから、そして節子はベッドの上から、同じように、向うの山の背に入って間もない夕日を受けて、そのあたりの山だの丘だの松林だの山畑だのが、半ば鮮かな茜色（あかねいろ）を帯びながら、半ばまだ不確かなような鼠色（ねずみいろ）に徐々に侵され出しているのを、うっとりとして眺めていた。ときどき思い出したようにその森の上へ小鳥たちが抛物線（ほうぶつせん）を描いて飛び上った。――私は、このような初夏の夕暮がほんの一瞬時生じさせている一帯の景色は、すべてはいつも見馴れた道具立てながら、恐らく今を措（お）いてはこれほどの溢（あふ）れるような幸福の感じをもって私達自身にすら眺め得られないだろうことを考えていた。そしてずっと後になって、いつかこの美しい夕暮が私の心に蘇（よみがえ）って来るようなことがあったら、私はこれに私達の幸福そのものの完全な絵を見出すだろうと夢みていた。", "「何をそんなに考えているの？」私の背後から節子がとうとう口を切った。", "「私達がずっと後になってね、今の私達の生活を思い出すようなことがあったら、それがどんなに美しいだろうと思っていたんだ」", "「本当にそうかも知れないわね」彼女はそう私に同意するのがさも愉（たの）しいかのように応じた。", "それからまた私達はしばらく無言のまま、再び同じ風景に見入っていた。が、そのうちに私は不意になんだか、こうやってうっとりと見入っているのが自分であるような自分でないような、変に茫漠（ぼうばく）とした、取りとめのない、そしてそれが何んとなく苦しいような感じさえして来た。そのとき私は自分の背後で深い息のようなものを聞いたような気がした。が、それがまた自分のだったような気もされた。私はそれを確かめでもするように、彼女の方を振り向いた。", "「そんなにいまの　―――　」そういう私をじっと見返しながら、彼女はすこし嗄（しゃが）れた声で言いかけた。が、それを言いかけたなり、すこし躊躇（ためら）っていたようだったが、それから急にいままでとは異った打棄（うっちゃ）るような調子で、「そんなにいつまでも生きて居られたらいいわね」と言い足した。", "「又、そんなことを！」", "私はいかにも焦（じ）れったいように小さく叫んだ。", "「御免なさい」彼女はそう短く答えながら私から顔をそむけた。", "いましがたまでの何か自分にも訣（わけ）の分らないような気分が私にはだんだん一種の苛（い）ら立（だ）たしさに変り出したように見えた。私はそれからもう一度山の方へ目をやったが、その時は既にもうその風景の上に一瞬間生じていた異様な美しさは消え失せていた。", "その晩、私が隣りの側室へ寝に行こうとした時、彼女は私を呼び止めた。", "「さっきは御免なさいね」", "「もういいんだよ」", "「私ね、あのとき他のことを言おうとしていたんだけれど　―――　つい、あんなことを言ってしまったの」", "「じゃ、あのとき何を言おうとしたんだい？」", "「　―――　あなたはいつか自然なんぞが本当に美しいと思えるのは死んで行こうとする者の眼にだけだと仰（おっ）しゃったことがあるでしょう。　―――　私、あのときね、それを思い出したの。何んだかあのときの美しさがそんな風に思われて」そう言いながら、彼女は私の顔を何か訴えたいように見つめた。", "その言葉に胸を衝（つ）かれでもしたように、私は思わず目を伏せた。そのとき、突然、私の頭の中を一つの思想がよぎった。そしてさっきから私を苛ら苛らさせていた、何か不確かなような気分が、漸（ようや）く私の裡（うち）ではっきりとしたものになり出した。　―――　「そうだ、おれはどうしてそいつに気がつかなかったのだろう？　あのとき自然なんぞをあんなに美しいと思ったのはおれじゃないのだ。それはおれ達　　　おれ達」に傍点］だったのだ。まあ言って見れば、節子の魂がおれの眼を通して、そしてただおれの流儀で、夢みていただけなのだ。　―――　それだのに、節子が自分の最後の瞬間のことを夢みているとも知らないで、おれはおれで、勝手におれ達の長生きした時のことなんぞ考えていたなんて　―――　」", "いつしかそんな考えをとつおいつし出していた私が、漸（や）っと目を上げるまで、彼女はさっきと同じように私をじっと見つめていた。私はその目を避けるような恰好（かっこう）をしながら、彼女の上に跼（かが）みかけて、その額にそっと接吻した。私は心から羞（はず）かしかった。　―――", "とうとう真夏になった。それは平地でよりも、もっと猛烈な位であった。裏の雑木林では、何かが燃え出しでもしたかのように、蝉がひねもす啼（な）き止（や）まなかった。樹脂のにおいさえ、開け放した窓から漂って来た。夕方になると、戸外で少しでも楽な呼吸をするために、バルコンまでベッドを引き出させる患者達が多かった。それらの患者達を見て、私達ははじめて、この頃｜俄（にわ）かにサナトリウムの患者達の増え出したことを知った。しかし、私達は相かわらず誰にも構わずに二人だけの生活を続けていた。", "この頃、節子は暑さのためにすっかり食慾を失い、夜などもよく寝られないことが多いらしかった。私は、彼女の昼寝を守るために、前よりも一層、廊下の足音や、窓から飛びこんでくる蜂や虻（あぶ）などに気を配り出した。そして暑さのために思わず大きくなる私自身の呼吸にも気をもんだりした。", "そのように病人の枕元で、息をつめながら、彼女の眠っているのを見守っているのは、私にとっても一つの眠りに近いものだった。私は彼女が眠りながら呼吸を速くしたり弛（ゆる）くしたりする変化を苦しいほどはっきりと感じるのだった。私は彼女と心臓の鼓動をさえ共にした。ときどき軽い呼吸困難が彼女を襲うらしかった。そんな時、手をすこし痙攣（けいれん）させながら咽（のど）のところまで持って行ってそれを抑えるような手つきをする、――夢に魘（おそ）われてでもいるのではないかと思って、私が起してやったものかどうかと躊躇っているうち、そんな苦しげな状態はやがて過ぎ、あとに弛緩状態（しかんじょうたい）がやって来る。そうすると、私も思わずほっとしながら、いま彼女の息づいている静かな呼吸に自分までが一種の快感さえ覚える。――そうして彼女が目を醒（さ）ますと、私はそっと彼女の髪に接吻をしてやる。彼女はまだ倦（だ）るそうな目つきで、私を見るのだった。", "「あなた、そこにいたの？」", "「ああ、僕もここで少しうつらうつらしていたんだ」", "そんな晩など、自分もいつまでも寝つかれずにいるようなことがあると、私はそれが癖にでもなったように、自分でも知らずに、手を咽に近づけながらそれを抑えるような手つきを真似たりしている。そしてそれに気がついたあとで、それからやっと私は本当の呼吸困難を感じたりする。が、それは私にはむしろ快いものでさえあった。", "「この頃なんだかお顔色が悪いようよ」或る日、彼女はいつもよりしげしげと見ながら言うのだった。「どうかなすったのじゃない？」「なんでもないよ」そう言われるのは私の気に入った。「僕はいつだってこうじゃないか？」", "「あんまり病人の側にばかり居ないで、少しは散歩くらいなすっていらっしゃらない？」「この暑いのに、散歩なんか出来るもんか。　―――　夜は夜で、真っ暗だしさ。　―――　それに毎日、病院の中をずいぶん往ったり来たりしているんだからなあ」", "私はそんな会話をそれ以上にすすめないために、毎日廊下などで出逢ったりする、他の患者達の話を持ち出すのだった。よくバルコンの縁に一塊りになりながら、空を競馬場に、動いている雲をいろいろそれに似た動物に見立て合ったりしている年少の患者達のことや、いつも附添看護婦の腕にすがって、あてもなしに廊下を往復している、ひどい神経衰弱の、無気味なくらい背の高い患者のことなどを話して聞かせたりした。しかし、私はまだ一度もその顔は見たことがないが、いつもその部屋の前を通る度ごとに、気味のわるい、なんだかぞっとするような咳を耳にする例の第十七号室の患者のことだけは、つとめて避けるようにしていた。恐らくそれがこのサナトリウム中で、一番重症の患者なのだろうと思いながら。　―――", "八月も漸く末近くなったのに、まだずっと寝苦しいような晩が続いていた。そんな或る晩、私達がなかなか寝つかれずにいると、（もうとっくに就寝時間の九時は過ぎていた。　―――　）ずっと向うの下の病棟が何んとなく騒々しくなり出した。それにときどき廊下を小走りにして行くような足音や、抑えつけたような看護婦の小さな叫びや、器具の鋭くぶつかる音がまじった。私はしばらく不安そうに耳を傾けていた。それがやっと鎮まったかと思うと、それとそっくりな沈黙のざわめきが、殆ど同時に、あっちの病棟にもこっちの病棟にも起り出した、そしてしまいには私達のすぐ下の方からも聞えて来た。", "私は、今、サナトリウムの中を嵐のように暴れ廻っているものの何んであるかぐらいは知っていた。私はその間に何度も耳をそば立てては、さっきからあかりは消してあるものの、まだ同じように寝つかれずにいるらしい隣室の病人の様子を窺（うかが）った。病人は寝返りさえ打たずに、じっとしているらしかった。私も息苦しいほどじっとしながら、そんな嵐がひとりでに衰えて来るのを待ち続けていた。", "真夜中になってからやっとそれが衰え出すように見えたので、私は思わずほっとしながら少し微睡（まどろ）みかけたが、突然、隣室で病人がそれまで無理に抑えつけていたような神経的な咳を二つ三つ強くしたので、ふいと目を覚ました。そのまますぐその咳は止まったようだったが、私はどうも気になってならなかったので、そっと隣室にはいって行った。真っ暗な中に、病人は一人で怯（おび）えてでもいたように、大きく目を見ひらきながら、私の方を見ていた。私は何も言わずに、その側に近づいた。", "「まだ大丈夫よ」", "彼女はつとめて微笑をしながら、私に聞えるか聞えない位の低声（こごえ）で言った。私は黙ったまま、ベッドの縁に腰をかけた。", "「そこにいて頂戴」", "病人はいつもに似ず、気弱そうに、私にそう言った。私達はそうしたまままんじりともしないでその夜を明かした。", "そんなことがあってから、二三日すると、急に夏が衰え出した。", "九月になると、すこし荒れ模様の雨が何度となく降ったり止んだりしていたが、そのうちにそれは殆んど小止みなしに降り続き出した。それは木の葉を黄ばませるより先きに、それを腐らせるかと見えた。さしものサナトリウムの部屋部屋も、毎日窓を閉め切って薄暗いほどだった。風がときどき戸をばたつかせた。そして裏の雑木林から、単調な、重くるしい音を引きもぎった。風のない日は、私達は終日、雨が屋根づたいにバルコンの上に落ちるのを聞いていた。そんな雨が漸（や）っと霧に似だした或る早朝、私は窓から、バルコンの面している細長い中庭がいくぶん薄明くなって来たようなのをぼんやりと見おろしていた。その時、中庭の向うの方から、一人の看護婦が、そんな霧のような雨の中をそこここに咲き乱れている野菊やコスモスを手あたり次第に採りながら、こっちへ向って近づいて来るのが見えた。私はそれがあの第十七号室の附添看護婦であることを認めた。「ああ、あのいつも不快な咳ばかり聞いていた患者が死んだのかも知れないなあ」ふとそんなことを思いながら、雨に濡れたまま何んだか興奮したようになってまだ花を採っているその看護婦の姿を見つめているうちに、私は急に心臓がしめつけられるような気がしだした。", "「やっぱり此処で一番重かったのはあいつだったのかな？　が、あいつがとうとう死んでしまったとすると、こんどは？　　―――　ああ、あんなことを院長が言ってくれなければよかったんだに　―――　」", "私はその看護婦が大きな花束を抱えたままバルコンの蔭に隠れてしまってからも、うつけたように窓硝子（まどガラス）に顔をくっつけていた。", "「何をそんなに見ていらっしゃるの？」ベッドから病人が私に問うた。", "「こんな雨の中で、さっきから花を採っている看護婦が居るんだけれど、あれは誰だろうかしら？」", "私はそう独り言のようにつぶやきながら、やっとその窓から離れた。", "しかし、その日はとうとう一日中、私はなんだか病人の顔をまともに見られずに居た。何もかも見抜いていながら、わざと知らぬような様子をして、ときどき私の方をじっと病人が見ているような気さえされて、それが私を一層苦しめた。こんな風にお互に分たれない不安や恐怖を抱きはじめ、二人が二人で少しずつ別々にものを考え出すなんと云うことは、いけないことだと思い返しては、私は早くこんな出来事は忘れてしまおうと努めながら、又いつのまにやらその事ばかりを頭に浮べていた。そしてしまいには、私達がこのサナトリウムに初めて着いた雪のふる晩に病人が見たという夢、はじめはそれを聞くまいとしながら遂に打ち負けて病人からそれを聞き出してしまったあの不吉な夢のことまで、いままでずっと忘れていたのに、ひょっくり思い浮べたりしていた。――その不思議な夢の中で、病人は死骸になって棺の中に臥ていた。人々はその棺を担いながら、何処だか知らない野原を横切ったり、森の中へはいったりした。もう死んでいる彼女はしかし、棺の中から、すっかり冬枯れた野面や、黒い樅（もみ）の木などをありありと見たり、その上をさびしく吹いて過ぎる風の音を耳に聞いたりしていた、　―――　その夢から醒（さ）めてからも、彼女は自分の耳がとても冷たくて、樅のざわめきがまだそれを充たしているのをまざまざと感じていた。　―――", "そんな霧のような雨がなお数日降り続いているうちに、すでにもう他の季節になっていた。サナトリウムの中も、気がついて見ると、あれだけ多数になっていた患者達も一人去り二人去りして、そのあとにはこの冬をこちらで越さなければならないような重い患者達ばかりが取り残され、又、夏の前のような寂しさに変り出していた。第十七号室の患者の死がそれを急に目立たせた。", "九月の末の或る朝、私が廊下の北側の窓から何気なしに裏の雑木林の方へ目をやって見ると、その霧ぶかい林の中にいつになく人が出たり入ったりしているのが異様に感じられた。看護婦達に訊（き）いて見ても何も知らないような様子をしていた。それっきり私もつい忘れていたが、翌日もまた、早朝から二三人の人夫が来て、その丘の縁にある栗の木らしいものを伐（き）り倒しはじめているのが霧の中に見えたり隠れたりしていた。", "その日、私は患者達がまだ誰も知らずにいるらしいその前日の出来事を、ふとしたことから聞き知った。それはなんでも、例の気味のわるい神経衰弱の患者がその林の中で縊死（いし）していたと云う話だった。そう云えば、どうかすると日に何度も見かけた、あの附添看護婦の腕にすがって廊下を往ったり来たりしていた大きな男が、昨日から急に姿を消してしまっていることに気がついた。", "「あの男の番だったのか　―――　」第十七号室の患者が死んでからというものすっかり神経質になっていた私は、それからまだ一週間と立たないうちに引き続いて起ったそんな思いがけない死のために、思わずほっとしたような気持になった。そしてそれは、そんな陰惨な死から当然私が受けたにちがいない気味悪さすら、私にはそのために殆んど感ぜられずにしまったと云っていいほどであった。", "「こないだ死んだ奴の次ぎ位に悪いと言われていたって、何も死ぬと決まっているわけのものじゃないんだからなあ」私はそう気軽そうに自分に向って言って聞かせたりした。", "裏の林の中の栗の木が二三本ばかり伐り取られて、何んだか間の抜けたようになってしまった跡は、今度はその丘の縁を、引きつづき人夫達が切り崩し出し、そこからすこし急な傾斜で下がっている病棟の北側に沿った少しばかりの空地にその土を運んでは、そこいら一帯を緩やかななぞえ　　　なぞえ」に傍点］にしはじめていた。人はそこを花壇に変える仕事に取りかかっているのだ。", "「お父さんからお手紙だよ」", "私は看護婦から渡された一束の手紙の中から、その一つを節子に渡した。彼女はベッドに寝たままそれを受取ると、急に少女らしく目を赫（かがや）かせながら、それを読み出した。", "「あら、お父様がいらっしゃるんですって」", "旅行中の父は、その帰途を利用して近いうちにサナトリウムへ立ち寄るということを書いて寄こしたのだった。", "それは或る十月のよく晴れた、しかし風のすこし強い日だった。近頃、寝たきりだったので食慾が衰え、やや痩（や）せの目立つようになった節子は、その日からつとめて食事をし、ときどきベッドの上に起きて居たり、腰かけたりしだした。彼女はまたときどき思い出し笑いのようなものを顔の上に漂わせた。私はそれに彼女がいつも父の前でのみ浮べる少女らしい微笑の下描きのようなものを認めた。私はそういう彼女のするがままにさせていた。", "それから数日立った或る午後、彼女の父はやって来た。", "彼はいくぶん前よりか顔にも老（おい）を見せていたが、それよりももっと目立つほど背中を屈（かが）めるようにしていた。それが何んとはなしに病院の空気を彼が恐れでもしているような様子に見せた。そうして病室へはいるなり、彼はいつも私の坐りつけている病人の枕元に腰を下ろした。ここ数日、すこし身体を動かし過ぎたせいか、昨日の夕方いくらか熱を出し、医者の云いつけで、彼女はその期待も空しく、朝からずっと安静を命じられていた。", "殆んどもう病人は癒（なお）りかけているものと思い込んでいたらしいのに、まだそうして寝たきりで居るのを見て、父はすこし不安そうな様子だった。そしてその原因を調べでもするかのように、病室の中を仔細（しさい）に見廻したり、看護婦達の一々の動作を見守ったり、それからバルコンにまで出て行って見たりしていたが、それらはいずれも彼を満足させたらしかった。そのうちに病人がだんだん興奮よりも熱のせいで頬を薔薇色（ばらいろ）にさせ出したのを見ると、「しかし顔色はとてもいい」と、娘が何処か良くなっていることを自分自身に納得させたいかのように、そればかり繰り返していた。", "私はそれから用事を口実にして病室を出て行き、彼等を二人きりにさせて置いた。やがてしばらくしてから、再びはいって行って見ると、病人はベッドの上に起き直っていた。そして掛布の上に、父のもってきた菓子函（かしばこ）や他の紙包を一ぱいに拡げていた。それは少女時代彼女の好きだった、そして今でも好きだと父の思っているようなものばかりらしかった。私を見ると、彼女はまるで悪戯（いたずら）を見つけられた少女のように、顔を赧（あか）くしながら、それを片づけ、すぐ横になった。", "私はいくぶん気づまりになりながら、二人からすこし離れて、窓ぎわの椅子に腰かけた。二人は、私のために中断されたらしい話の続きを、さっきよりも低声（こごえ）で、続け出した。それは私の知らない馴染みの人々や事柄に関するものが多かった。そのうちの或る物は、彼女に、私の知り得ないような小さな感動をさえ与えているらしかった。", "私は二人のさも愉（たの）しげな対話を何かそういう絵でも見ているかのように、見較べていた。そしてそんな会話の間に父に示す彼女の表情や抑揚のうちに、何か非常に少女らしい輝きが蘇（よみがえ）るのを私は認めた。そしてそんな彼女の子供らしい幸福の様子が、私に、私の知らない彼女の少女時代のことを夢みさせていた。　―――", "ちょっとの間、私達が二人きりになった時、私は彼女に近づいて、揶揄（からか）うように耳打ちした。", "「お前は今日はなんだか見知らない薔薇色の少女みたいだよ」", "「知らないわ」彼女はまるで小娘のように顔を両手で隠した。", "父は二日滞在して行った。", "出発する前、父は私を案内役にして、サナトリウムのまわりを歩いた。が、それは私と二人きりで話すのが目的だった。空には雲ひとつない位に晴れ切った日だった。いつになくくっきりと赭（あか）ちゃけた山肌を見せている八ヶ岳などを私が指して示しても、父はそれにはちょっと目を上げるきりで、熱心に話をつづけていた。", "「ここはどうもあれの身体には向かないのではないだろうか？　もう半年以上にもなるのだから、もうすこし良くなって居そうなものだが　―――　」", "「さあ、今年の夏は何処も気候が悪かったのではないでしょうか？　それにこういう山の療養所なんぞは冬がいいのだと云いますが　―――　」", "「それは冬まで辛抱して居られればいいのかも知れんが　―――　しかしあれには冬まで我慢できまい　―――　」", "「しかし自分では冬も居る気でいるようですよ」私はこういう山の孤独がどんなに私達の幸福を育（はぐく）んでいて呉れるかと云うことを、どうしたら父に理解させられるだろうかともどかしがりながら、しかしそういう私達のために父の払っている犠牲のことを思えば何んともそれを言い出しかねて、私達のちぐはぐな対話を続けていた。「まあ、折角山へ来たのですから、居られるだけ居て見るようになさいませんか？」", "「　―――　だが、あなたも冬迄一緒に居て下されるのか？」", "「ええ、勿論居ますとも」", "「それはあなたには本当にすまんな。　―――　だが、あなたは、いま仕事はして居られるのか？」", "「いいえ　―――　」", "「しかし、あなたも病人にばかり構って居らずに、仕事も少しはなさらなければいけないね」", "「ええ、これから少し　―――　」と私は口籠（くちごも）るように言った。", "――「そうだ、おれは随分長いことおれの仕事を打棄（うっちゃ）らかしていたなあ。なんとかして今のうちに仕事もし出さなけれあいけない」　―――　そんなことまで考え出しながら、何かしら私は気持が一ぱいになって来た。それから私達はしばらく無言のまま、丘の上に佇（たたず）みながら、いつのまにか西の方から中空にずんずん拡がり出した無数の鱗（うろこ）のような雲をじっと見上げていた。", "やがて私達はもうすっかり木の葉の黄ばんだ雑木林の中を通り抜けて、裏手から病院へ帰って行った。その日も、人夫が二三人で、例の丘を切り崩していた。その傍を通り過ぎながら、私は「何んでもここへ花壇をこしらえるんだそうですよ」といかにも何気なさそうに言ったきりだった。", "夕方停車場まで父を見送りに行って、私が帰って来て見ると、病人はベッドの中で身体を横向きにしながら、激しい咳にむせっていた。こんなに激しい咳はこれまで一度もしたことはないくらいだつた。その発作がすこし鎮まるのを待ちながら、私が、", "「どうしたんだい？」と訊ねると、", "「なんでもないの。　―――　じき止まるわ」病人はそれだけやっと答えた。「その水を頂戴」", "私はフラスコからコップに水をすこし注いで、それを彼女の口に持って行ってやった。彼女はそれを一口飲むと、しばらく平静にしていたが、そんな状態は短い間に過ぎ、又も、さっきよりも激しい位の発作が彼女を襲った。私は殆んどベッドの端までのり出して身もだえしている彼女をどうしようもなく、ただこう訊（き）いたばかりだった。", "「看護婦を呼ぼうか？」", "「　―――　　―――　」", "彼女はその発作が鎮まっても、いつまでも苦しそうに身体をねじらせたまま、両手で顔を蔽（おお）いながら、ただ頷（うなず）いて見せた。", "私は看護婦を呼びに行った。そして私に構わず先きに走っていった看護婦のすこし後から病室へはいって行くと、病人はその看護婦に両手で支えられるようにしながら、いくぶん楽そうな姿勢に返っていた。が、彼女はうつけたようにぼんやりと目を見ひらいているきりだった。咳の発作は一時止まったらしかった。", "看護婦は彼女を支えていた手を少しずつ放しながら、", "「もう止まったわね。　―――　すこうし、そのままじっとしていらっしゃいね」と言って、乱れた毛布などを直したりしはじめた。「いま注射を頼んで来て上げるわ」", "看護婦は部屋を出て行きながら、何処に居ていいか分らなくなってドアのところに棒立ちに立っていた私に、ちょっと耳打ちした。「すこし血痰を出してよ」", "私はやっと彼女の枕元に近づいて行った。", "彼女はぼんやりと目は見ひらいていたが、なんだか眠っているとしか思えなかった。私はその蒼ざめた額にほつれた小さな渦を巻いている髪を掻き上げてやりながら、その冷たく汗ばんだ額を私の手でそっと撫でた。彼女はやっと私の温かい存在をそれに感じでもしたかのように、ちらっと謎のような微笑を脣（くちびる）に漂わせた。", "絶対安静の日々が続いた。", "病室の窓はすっかり黄色い日覆を卸（おろ）され、中は薄暗くされていた。看護婦達も足を爪立てて歩いた。私は殆んど病人の枕元に附きっきりでいた。夜伽（よとぎ）も一人で引き受けていた。ときどき病人は私の方を見て何か言い出しそうにした。私はそれを言わせないように、すぐ指を私の口にあてた。", "そのような沈黙が、私達をそれぞれ各自の考えの裡に引っ込ませていた。が、私達はただ相手が何を考えているのかを、痛いほどはっきりと感じ合っていた。そして私が、今度の出来事を恰（あたか）も自分のために病人が犠牲にしていて呉れたものが、ただ目に見えるものに変っただけかのように思いつめている間、病人はまた病人で、これまで二人してあんなにも細心に細心にと育て上げてきたものを自分の軽はずみから一瞬に打ち壊してしまいでもしたように悔いているらしいのが、はっきりと私に感じられた。", "そしてそういう自分の犠牲を犠牲ともしないで、自分の軽はずみなことばかりを責めているように見える病人のいじらしい気持が、私の心をしめつけていた。そういう犠牲をまで病人に当然の代償のように払わせながら、それがいつ死の床になるかも知れぬようなベッドで、こうして病人と共に愉（たの）しむようにして味わっている生の快楽――それこそ私達を、この上なく幸福にさせてくれるものだと私達が信じているもの、――それは果して私達を本当に満足させ了（おお）せるものだろうか？　私達がいま私達の幸福だと思っているものは、私達がそれを信じているよりは、もっと束の間のもの、もっと気まぐれに近いようなものではないだろうか？　　―――", "夜伽に疲れた私は、病人の微睡（まどろ）んでいる傍で、そんな考えをとつおいつしながら、この頃ともすれば私達の幸福が何物かに脅かされがちなのを、不安そうに感じていた。", "その危機は、しかし、一週間ばかりで立ち退いた。", "或る朝、看護婦がやっと病室から日覆を取り除けて、窓の一部を開け放して行った。窓から射し込んで来る秋らしい日光をまぶしそうにしながら、", "「気持がいいわ」と病人はベッドの中から蘇（よみがえ）ったように言った。", "彼女の枕元で新聞を拡げていた私は、人間に大きな衝動を与える出来事なんぞと云うものは却（かえ）ってそれが過ぎ去った跡は何んだかまるで他所（よそ）の事のように見えるものだなあと思いながら、そういう彼女の方をちらりと見やって、思わず揶揄（やゆ）するような調子で言った。", "「もうお父さんが来たって、あんなに興奮しない方がいいよ」", "彼女は顔を心持ち赧（あか）らめながら、そんな私の揶揄を素直に受け入れた。", "「こんどはお父様がいらっしたって知らん顔をして居てやるわ」", "「それがお前に出来るんならねえ　―――　」", "そんな風に冗談でも言い合うように、私達はお互に相手の気持をいたわり合うようにしながら、一緒になって子供らしく、すべての責任を彼女の父に押しつけ合ったりした。", "そうして私達は少しもわざとらしくなく、この一週間の出来事がほんの何かの間違いに過ぎなかったような、気軽な気分になりながら、いましがたまで私達を肉体的ばかりでなく、精神的にも襲いかかっているように見えた危機を、事もなげに切り抜け出していた。少くとも私達にはそう見えた。　―――", "或る晩、私は彼女の側で本を読んでいるうち、突然、それを閉じて、窓のところに行き、しばらく考え深そうに佇（たたず）んでいた。それから又、彼女の傍に帰った。私は再び本を取り上げて、それを読み出した。", "「どうしたの？」彼女は顔を上げながら私に問うた。", "「何んでもない」私は無造作にそう答えて、数秒時本の方に気をとられているような様子をしていたが、とうとう私は口を切った。", "「こっちへ来てあんまり何もせずにしまったから、僕はこれから仕事でもしようかと考え出しているのさ」", "「そうよ、お仕事をなさらなければいけないわ。お父様もそれを心配なさっていたわ」彼女は真面目な顔つきをして返事をした。「私なんかのことばかり考えていないで　―――　」", "「いや、お前のことをもっともっと考えたいんだ　―――　」私はそのとき咄嗟（とっさ）に頭に浮んで来た或る小説の漠としたイデエをすぐその場で追い廻し出しながら、独り言のように言い続けた。「おれはお前のことを小説に書こうと思うのだよ。それより他のことは今のおれには考えられそうもないのだ。おれ達がこうしてお互に与え合っているこの幸福、――皆がもう行き止まりだと思っているところから始っているようなこの生の愉しさ、――そう云った誰も知らないような、おれ達だけのものを、おれはもっと確実なものに、もうすこし形をなしたものに置き換えたいのだ。分るだろう？」", "「分るわ」彼女は自分自身の考えでも逐（お）うかのように私の考えを逐っていたらしく、それにすぐ応じた。が、それから口をすこし歪めるように笑いながら、", "「私のことならどうでもお好きなようにお書きなさいな」と私を軽く遇（あしら）うように言い足した。", "私はしかし、その言葉を率直に受取った。", "「ああ、それはおれの好きなように書くともさ。　―――　が、今度の奴はお前にもたんと助力して貰わなければならないのだよ」", "「私にも出来ることなの？」", "「ああ、お前にはね、おれの仕事の間、頭から足のさきまで幸福になっていて貰いたいんだ。そうでないと　―――　」", "一人でぼんやりと考え事をしているのよりも、こうやって二人で一緒に考え合っているみたいな方が、余計自分の頭が活溌に働くのを異様に感じながら、私はあとからあとからと湧いてくる思想に押されでもするかのように、病室の中をいつか往ったり来たりし出していた。", "「あんまり病人の側にばかりいるから、元気がなくなるのよ。　―――　すこしは散歩でもしていらっしゃらない？」", "「うん、おれも仕事をするとなりあ」と私は目を赫（かがや）かせながら、元気よく答えた。「うんと散歩もするよ」", "私はその森を出た。大きな沢を隔てながら、向うの森を越して、八ヶ岳の山麓（さんろく）一帯が私の目の前に果てしなく展開していたが、そのずっと前方、殆んどその森とすれすれぐらいのところに、一つの狭い村とその傾いた耕作地とが横たわり、そして、その一部にいくつもの赤い屋根を翼（つば）さのように拡げたサナトリウムの建物が、ごく小さな姿になりながらしかし明瞭（めいりょう）に認められた。", "私は早朝から、何処をどう歩いて居るのかも知らずに、足の向くまま、自分の考えにすっかり身を任せ切ったようになって、森から森へとさ迷いつづけていたのだったが、いま、そんな風に私の目のあたりに、秋の澄んだ空気が思いがけずに近よせているサナトリウムの小さな姿を、不意に視野に入れた刹那（せつな）、私は急に何か自分に憑（つ）いていたものから醒（さ）めたような気持で、その建物の中で多数の病人達に取り囲まれながら、毎日毎日を何気なさそうに過している私達の生活の異様さを、はじめてそれから引き離して考え出した。そうしてさっきから自分の裡（うち）に湧き立っている制作慾にそれからそれへと促されながら、私はそんな私達の奇妙な日ごと日ごとを一つの異常にパセティックな、しかも物静かな物語に置き換え出した。　―――　「節子よ、これまで二人のものがこんな風に愛し合ったことがあろうとは思えない。いままでお前というものは居なかったのだもの。それから私というものも　―――　」", "私の夢想は、私達の上に起ったさまざまな事物の上を、或る時は迅速に過ぎ、或る時はじっと一ところに停滞し、いつまでもいつまでも躊躇（ためら）っているように見えた。私は節子から遠くに離れてはいたが、その間絶えず彼女に話しかけ、そして彼女の答えるのを聞いた。そういう私達についての物語は、生そのもののように、果てしがないように思われた。そうしてその物語はいつのまにかそれ自身の力でもって生きはじめ、私に構わず勝手に展開し出しながら、ともすれば一ところに停滞しがちな私を其処に取り残したまま、その物語自身があたかもそういう結果を欲しでもするかのように、病める女主人公の物悲しい死を作為しだしていた。――身の終りを予覚しながら、その衰えかかっている力を尽して、つとめて快活に、つとめて気高く生きようとしていた娘、――恋人の腕に抱かれながら、ただその残される者の悲しみを悲しみながら、自分はさも幸福そうに死んで行った娘、――そんな娘の影像が空（くう）に描いたようにはっきりと浮んでくる。　―――　「男は自分達の愛を一層純粋なものにしようと試みて、病身の娘を誘うようにして山のサナトリウムにはいって行くが、死が彼等を脅かすようになると、男はこうして彼等が得ようとしている幸福は、果してそれが完全に得られたにしても彼等自身を満足させ得るものかどうかを、次第に疑うようになる。――が、娘はその死苦のうちに最後まで自分を誠実に介抱して呉れたことを男に感謝しながら、さも満足そうに死んで行く。そして男はそういう気高い死者に助けられながら、やっと自分達のささやかな幸福を信ずることが出来るようになる　―――　」", "そんな物語の結末がまるで其処に私を待ち伏せてでも居たかのように見えた。そして突然、そんな死に瀕（ひん）した娘の影像が思いがけない烈しさで私を打った。私はあたかも夢から覚めたかのように何んともかとも言いようのない恐怖と羞恥とに襲われた。そしてそういう夢想を自分から振り払おうとでもするように、私は腰かけていた※　　　木＋無」、第3水準1-86-12］（ぶな）の裸根から荒々しく立ち上った。", "太陽はすでに高く昇っていた。山や森や村や畑、――そうしたすべてのものは秋の穏かな日の中にいかにも安定したように浮んでいた。かなたに小さく見えるサナトリウムの建物の中でも、すべてのものは毎日の習慣を再び取り出しているのに違いなかった。そのうち不意に、それらの見知らぬ人々の間で、いつもの習慣から取残されたまま、一人でしょんぼりと私を待っている節子の寂しそうな姿を頭に浮べると、私は急にそれが気になってたまらないように、急いで山径（やまみち）を下りはじめた。", "私は裏の林を抜けてサナトリウムに帰った。そしてバルコンを迂回（うかい）しながら、一番はずれの病室に近づいて行った。私には少しも気がつかずに、節子は、ベッドの上で、いつもしているように髪の先きを手でいじりながら、いくぶん悲しげな目つきで空（くう）を見つめていた。私は窓硝子（まどガラス）を指で叩こうとしたのをふと思い止まりながら、そういう彼女の姿をじっと見入った。彼女は何かに脅かされているのを漸（や）っと怺（こら）ているとでも云った様子で、それでいてそんな様子をしていることなどは恐らく彼女自身も気がついていないのだろうと思える位、ぼんやりしているらしかった。　―――　私は心臓をしめつけられるような気がしながら、そんな見知らない彼女の姿を見つめていた。　―――　と突然、彼女の顔が明るくなったようだった。彼女は顔をもたげて、微笑さえしだした。彼女は私を認めたのだった。", "私はバルコンからはいりながら、彼女の側に近づいて行った。", "「何を考えていたの？」", "「なんにも　―――　」彼女はなんだか自分のでないような声で返事をした。", "私がそのまま何も言い出さずに、すこし気が鬱（ふさ）いだように黙っていると、彼女は漸っといつもの自分に返ったような、親密な声で、「何処へ行っていらしったの？　随分長かったのね」", "と私に訊（き）いた。", "「向うの方だ」私は無雑作にバルコンの真正面に見える遠い森の方を指した。", "「まあ、あんなところまで行ったの？　　―――　お仕事は出来そう？」", "「うん、まあ　―――　」私はひどく無愛想に答えたきり、しばらくまた元のような無言に返っていたが、それから出し抜けに私は、", "「お前、いまのような生活に満足しているかい？」", "といくらか上ずったような声で訊いた。", "彼女はそんな突拍子もない質問にちょっとたじろいだ様子をしていたが、それから私をじっと見つめ返して、いかにもそれを確信しているように頷（うなず）きながら、", "「どうしてそんなことをお訊きになるの？」", "と不審（いぶか）しそうに問い返した。", "「おれは何んだかいまのような生活がおれの気まぐれなのじゃないかと思ったんだ。そんなものをいかにも大事なもののようにこうやってお前にも　―――　」", "「そんなこと言っちゃ厭（いや）」彼女は急に私を遮った。「そんなことを仰（おっ）しゃるのがあなたの気まぐれなの」", "けれども私はそんな言葉にはまだ満足しないような様子を見せていた。彼女はそういう私の沈んだ様子をしばらくは唯もじもじしながら見守っていたが、とうとう怺え切れなくなったとでも言うように言い出した。", "「私が此処でもって、こんなに満足しているのが、あなたにはおわかりにならないの？　どんなに体の悪いときでも、私は一度だって家へ帰りたいなんぞと思ったことはないわ。若（も）しあなたが私の側に居て下さらなかったら、私は本当にどうなっていたでしょう？　　―――　さっきだって、あなたがお留守の間、最初のうちはそれでもあなたのお帰りが遅ければ遅いほど、お帰りになったときの悦（よろこ）びが余計になるばかりだと思って、痩我慢（やせがまん）していたんだけれど、――あなたがもうお帰りになると私の思い込んでいた時間をずうっと過ぎてもお帰りにならないので、しまいにはとても不安になって来たの。そうしたら、いつもあなたと一緒にいるこの部屋までがなんだか見知らない部屋のような気がしてきて、こわくなって部屋の中から飛び出したくなった位だったわ。　―――　でも、それから漸（や）っとあなたのいつか仰（おっ）しゃったお言葉を考え出したら、すこうし気が落着いて来たの。あなたはいつか私にこう仰しゃったでしょう、――私達のいまの生活、ずっとあとになって思い出したらどんなに美しいだろうって　―――　」", "彼女はだんだん嗄（しゃが）れたような声になりながらそれを言（い）い畢（お）えると、一種の微笑ともつかないようなもので口元を歪めながら、私をじっと見つめた。", "彼女のそんな言葉を聞いているうちに、たまらぬほど胸が一ぱいになり出した私は、しかし、そういう自分の感動した様子を彼女に見られることを恐れでもするように、そっとバルコンに出て行った。そしてその上から、嘗（かつ）て私達の幸福をそこに完全に描き出したかとも思えたあの初夏の夕方のそれに似た――しかしそれとは全然異った秋の午前の光、もっと冷たい、もっと深味のある光を帯びた、あたり一帯の風景を私はしみじみと見入りだしていた。あのときの幸福に似た、しかしもっともっと胸のしめつけられるような見知らない感動で自分が一ぱいになっているのを感じながら　―――", "冬", "一九三五年十月二十日", "午後、いつものように病人を残して、私はサナトリウムを離れると、収穫に忙しい農夫等の立ち働いている田畑の間を抜けながら、雑木林を越えて、その山の窪みにある人けの絶えた狭い村に下りた後、小さな谿流（けいりゅう）にかかった吊橋を渡って、その村の対岸にある栗の木の多い低い山へ攀（よ）じのぼり、その上方の斜面に腰を下ろした。そこで私は何時間も、明るい、静かな気分で、これから手を着けようとしている物語の構想に耽（ふけ）っていた。ときおり私の足もとの方で、思い出したように、子供等が栗の木をゆすぶって一どきに栗の実を落す、その谿（たに）じゅうに響きわたるような大きな音に愕（おどろ）かされながら　―――", "そういう自分のまわりに見聞きされるすべてのものが、私達の生の果実もすでに熟していることを告げ、そしてそれを早く取り入れるようにと自分を促しでもしているかのように感ずるのが、私は好きであった。", "ようやく日が傾いて、早くもその谿の村が向うの雑木山の影の中にすっかりはいってしまうのを認めると、私は徐（しず）かに立ち上って、山を下り、再び吊橋をわたって、あちらこちらに水車がごとごとと音を立てながら絶えず廻っている狭い村の中を何んということはなしに一まわりした後、八ヶ岳の山麓（さんろく）一帯に拡がっている落葉松林（からまつばやし）の縁（へり）を、もうそろそろ病人がもじもじしながら自分の帰りを待っているだろうと考えながら、心もち足を早めてサナトリウムに戻るのだった。", "十月二十三日", "明け方近く、私は自分のすぐ身近でしたような気のする異様な物音に驚いて目を覚ました。そうしてしばらく耳をそば立てていたが、サナトリウム全体は死んだようにひっそりとしていた。それからなんだか目が冴えて、私はもう寝つかれなくなった。", "小さな蛾のこびりついている窓硝子（まどガラス）をとおして、私はぼんやりと暁の星がまだ二つ三つ幽（かす）かに光っているのを見つめていた。が、そのうちに私はそういう朝明けが何んとも云えずに寂しいような気がして来て、そっと起き上ると、何をしようとしているのか自分でも分らないように、まだ暗い隣りの病室へ素足のままではいって行った。そうしてベッドに近づきながら、節子の寝顔を屈（かが）み込（こ）むようにして見た。すると彼女は思いがけず、ぱっちりと目を見ひらいて、そんな私の方を見上げながら、", "「どうなすったの？」と訝（いぶか）しそうに訊（き）いた。", "私は何んでもないと云った目くばせをしながら、そのまま徐かに彼女の上に身を屈めて、いかにも怺（こら）え切（き）れなくなったようにその顔へぴったりと自分の顔を押しつけた。", "「まあ、冷たいこと」彼女は目をつぶりながら、頭をすこし動かした。髪の毛がかすかに匂った。そのまま私達はお互のつく息を感じ合いながら、いつまでもそうしてじっと頬ずりをしていた。", "「あら、又、栗が落ちた　―――　」彼女は目を細目に明けて私を見ながら、そう囁（ささや）いた。", "「ああ、あれは栗だったのかい。　―――　あいつのお蔭でおれはさっき目を覚ましてしまったのだ」", "私は少し上ずったような声でそう言いながら、そっと彼女を手放すと、いつの間にかだんだん明るくなり出した窓の方へ歩み寄って行った。そしてその窓に倚（よ）りかかって、いましがたどちらの目から滲（にじ）み出（で）たのかも分らない熱いものが私の頬を伝うがままにさせながら、向うの山の背にいくつか雲の動かずにいるあたりが赤く濁ったような色あいを帯び出しているのを見入っていた。畑の方からはやっと物音が聞え出した。　―――", "「そんな事をしていらっしゃるとお風を引くわ」ベッドから彼女が小さな声で言った。", "私は何か気軽い調子で返事をしてやりたいと思いながら、彼女の方をふり向いた。が、大きく※　　　目＋爭」、第3水準1-88-85］（みは）って気づかわしそうに私を見つめている彼女の目と見合わせると、そんな言葉は出されなかった。そうして無言のまま窓を離れて、自分の部屋に戻って行った。", "それから数分立つと、病人は明け方にいつもする、抑えかねたような劇（はげ）しい咳を出した。再び寝床に潜りこみながら、私は何んともかとも云われないような不安な気持でそれを聞いていた。", "十月二十七日", "私はきょうもまた山や森で午後を過した。", "一つの主題が、終日、私の考えを離れない。真の婚約の主題――二人の人間がその余りにも短い一生の間をどれだけお互に幸福にさせ合えるか？　抗（あらが）いがたい運命の前にしずかに頭を項低（うなだ）れたまま、互に心と心と、身と身とを温め合いながら、並んで立っている若い男女の姿、――そんな一組としての、寂しそうな、それでいて何処か愉（たの）しくないこともない私達の姿が、はっきりと私の目の前に見えて来る。それを措（お）いて、いまの私に何が描けるだろうか？　　―――", "果てしのないような山麓をすっかり黄ばませながら傾いている落葉松林の縁を、夕方、私がいつものように足早に帰って来ると、丁度サナトリウムの裏になった雑木林のはずれに、斜めになった日を浴びて、髪をまぶしいほど光らせながら立っている一人の背の高い若い女が遠く認められた。私はちょっと立ち止まった。どうもそれは節子らしかった。しかしそんな場所に一人きりのようなのを見て、果して彼女かどうか分らなかったので、私はただ前よりも少し足を早めただけだった。が、だんだん近づいて見ると、それはやはり節子であった。", "「どうしたんだい？」私は彼女の側に駈けつけて、息をはずませながら訊いた。", "「此処であなたをお待ちしていたの」彼女は顔を少し赧（あか）くして笑いながら答えた。", "「そんな乱暴な事をしても好いのかなあ」私は彼女の顔を横から見た。", "「一遍くらいなら構わないわ。　―――　それにきょうはとても気分が好いのですもの」つとめて快活な声を出してそう言いながら、彼女はなおもじっと私の帰って来た山麓（さんろく）の方を見ていた。「あなたのいらっしゃるのが、ずっと遠くから見えていたわ」", "私は何も言わずに、彼女の側に並んで、同じ方角を見つめた。", "彼女が再び快活そうに言った。「此処まで出ると、八ヶ岳がすっかり見えるのね」", "「うん」と私は気のなさそうな返事をしたきりだったが、そのままそうやって彼女と肩を並べてその山を見つめているうちに、ふいと何んだか不思議に混んがらかったような気がして来た。", "「こうやってお前とあの山を見ているのはきょうが始めてだったね。だが、おれにはどうもこれまでに何遍もこうやってあれを見ていた事があるような気がするんだよ」", "「そんな筈はないじゃあないの？」", "「いや、そうだ　―――　おれはいま漸（や）っと気がついた　―――　おれ達はね、ずっと前にこの山を丁度向う側から、こうやって一しょに見ていたことがあるのだ。いや、お前とそれを見ていた夏の時分はいつも雲に妨げられて殆ど何も見えやしなかったのさ。　―――　しかし秋になってから、一人でおれが其処へ行って見たら、ずっと向うの地平線の果てに、この山が今とは反対の側から見えたのだ。あの遠くに見えた、どこの山だかちっとも知らずにいたのが、確かにこれらしい。丁度そんな方角になりそうだ。　―――　お前、あの薄（すすき）がたんと生い茂っていた原を覚えているだろう？」", "「ええ」", "「だが実に妙だなあ。いま、あの山の麓（ふもと）にこうしてこれまで何も気がつかずにお前と暮らしていたなんて　―――　」丁度二年前の、秋の最後の日、一面に生い茂った薄の間からはじめて地平線の上にくっきりと見出したこの山々を遠くから眺めながら、殆ど悲しいくらいの幸福な感じをもって、二人はいつかはきっと一緒になれるだろうと夢見ていた自分自身の姿が、いかにも懐かしく、私の目に鮮かに浮んで来た。", "私達は沈黙に落ちた。その上空を渡り鳥の群れらしいのが音もなくすうっと横切って行く、その並み重った山々を眺めながら、私達はそんな最初の日々のような慕わしい気持で、肩を押しつけ合ったまま、佇（たたず）んでいた。そうして私達の影がだんだん長くなりながら草の上を這うがままにさせていた。", "やがて風が少し出たと見えて、私達の背後の雑木林が急にざわめき立った。私は「もうそろそろ帰ろう」と不意と思い出したように彼女に言った。", "私達は絶えず落葉のしている雑木林の中へはいって行った。私はときどき立ち止まって、彼女を少し先きに歩かせた。二年前の夏、ただ彼女をよく見たいばかりに、わざと私の二三歩先きに彼女を歩かせながら森の中などを散歩した頃のさまざまな小さな思い出が、心臓をしめつけられる位に、私の裡（うち）に一ぱいに溢（あふ）れて来た。", "十一月二日", "夜、一つの明りが私達を近づけ合っている。その明りの下で、ものを言い合わないことにも馴れて、私がせっせと私達の生の幸福を主題にした物語を書き続けていると、その笠の陰になった、薄暗いベッドの中に、節子は其処にいるのだかいないのだか分らないほど、物静かに寝ている。ときどき私がそっちへ顔を上げると、さっきからじっと私を見つめつづけていたかのように私を見つめていることがある。「こうやってあなたのお側に居さえすれば、私はそれで好いの」と私にさも言いたくってたまらないでいるような、愛情を籠（こ）めた目つきである。ああ、それがどんなに今の私に自分達の所有している幸福を信じさせ、そしてこうやってそれにはっきりした形を与えることに努力している私を助けていて呉れることか！", "十一月十日", "冬になる。空は拡がり、山々はいよいよ近くなる。その山々の上方だけ、雪雲らしいのがいつまでも動かずにじっとしているようなことがある。そんな朝には山から雪に追われて来るのか、バルコンの上までがいつもはあんまり見かけたことのない小鳥で一ぱいになる。そんな雪雲の消え去ったあとは、一日ぐらいその山々の上方だけが薄白くなっていることがある。そしてこの頃はそんないくつかの山の頂きにはそういう雪がそのまま目立つほど残っているようになった。", "私は数年前、屡々（しばしば）、こういう冬の淋しい山岳地方で、可愛らしい娘と二人きりで、世間から全く隔って、お互がせつなく思うほどに愛し合いながら暮らすことを好んで夢みていた頃のことを思い出す。私は自分の小さい時から失わずにいる甘美な人生へのかぎりない夢を、そういう人のこわがるような苛酷（かこく）なくらいの自然の中に、それをそっくりそのまま少しも害（そこな）わずに生かして見たかったのだ。そしてそのためにはどうしてもこういう本当の冬、淋しい山岳地方のそれでなければいけなかったのだ　―――", "――夜の明けかかる頃、私はまだその少し病身な娘の眠っている間にそっと起きて、山小屋から雪の中へ元気よく飛び出して行く。あたりの山々は、曙（あけぼの）の光を浴びながら、薔薇色（ばらいろ）に赫（かがや）いている。私は隣りの農家からしぼり立ての山羊の乳を貰って、すっかり凍えそうになりながら戻ってくる。それから自分で煖炉（だんろ）に焚木（たきぎ）をくべる。やがてそれがぱちぱちと活溌な音を立てて燃え出し、その音で漸っとその娘が目を覚ます時分には、もう私はかじかんだ手をして、しかし、さも愉（たの）しそうに、いま自分達がそうやって暮している山の生活をそっくりそのまま書き取っている　―――", "今朝、私はそういう自分の数年前の夢を思い出し、そんな何処にだってありそうもない版画じみた冬景色を目のあたりに浮べながら、その丸木造りの小屋の中のさまざまな家具の位置を換えたり、それに就いて私自身と相談し合ったりしていた。それから遂にそんな背景はばらばらになり、ぼやけて消えて行きながら、ただ私の目の前には、その夢からそれだけが現実にはみ出しでもしたように、ほんの少しばかり雪の積った山々と、裸になった木立と、冷たい空気とだけが残っていた。　―――", "一人で先きに食事をすませてしまってから、窓ぎわに椅子をずらしてそんな思い出に耽（ふけ）っていた私は、そのとき急に、いまやっと食事を了（お）え、そのままベッドの上に起きながら、なんとなく疲れを帯びたようなぼんやりした目つきで山の方を見つめている節子の方をふり向いて、その髪の毛の少しほつれている窶（やつ）れたような顔をいつになく痛々しげに見つめ出した。", "「このおれの夢がこんなところまでお前を連れて来たようなものなのだろうかしら？」と私は何か悔いに近いような気持で一ぱいになりながら、口には出さずに、病人に向って話しかけた。", "「それだというのに、この頃のおれは自分の仕事にばかり心を奪われている。そうしてこんな風にお前の側にいる時だって、おれは現在のお前の事なんぞちっとも考えてやりはしないのだ。それでいて、おれは仕事をしながらお前のことをもっともっと考えているのだと、お前にも、それから自分自身にも言って聞かせてある。そうしておれはいつのまにか好い気になって、お前の事よりも、おれの詰まらない夢なんぞにこんなに時間を潰（つぶ）し出しているのだ　―――　」", "そんな私のもの言いたげな目つきに気がついたのか、病人はベッドの上から、にっこりともしないで、真面目に私の方を見かえしていた。この頃いつのまにか、そんな具合に、前よりかずっと長い間、もっともっとお互を締めつけ合うように目と目を見合わせているのが、私達の習慣になっていた。", "十一月十七日", "私はもう二三日すれば私のノオトを書き了（お）えられるだろう。それは私達自身のこうした生活に就いて書いていれば切りがあるまい。それをともかくも一応書き了えるためには、私は何か結末を与えなければならないのだろうが、今もなおこうして私達の生き続けている生活にはどんな結末だって与えたくはない。いや、与えられはしないだろう。寧（むし）ろ、私達のこうした現在のあるがままの姿でそれを終らせるのが一番好いだろう。", "現在のあるがままの姿？　　―――　私はいま何かの物語で読んだ「幸福の思い出ほど幸福を妨げるものはない」という言葉を思い出している。現在、私達の互に与え合っているものは、嘗（かつ）て私達の互に与え合っていた幸福とはまあ何んと異ったものになって来ているだろう！　それはそう云った幸福に似た、しかしそれとはかなり異った、もっともっと胸がしめつけられるように切ないものだ。こういう本当の姿がまだ私達の生の表面にも完全に現われて来ていないものを、このまま私はすぐ追いつめて行って、果してそれに私達の幸福の物語に相応（ふさわ）しいような結末を見出せるであろうか？　なぜだか分らないけれど、私がまだはっきりさせることの出来ずにいる私達の生の側面には、何んとなく私達のそんな幸福に敵意をもっているようなものが潜んでいるような気もしてならない。　―――", "そんなことを私は何か落着かない気持で考えながら、明りを消して、もう寝入っている病人の側を通り抜けようとして、ふと立ち止まって暗がりの中にそれだけがほの白く浮いている彼女の寝顔をじっと見守った。その少し落ち窪んだ目のまわりがときどきぴくぴくと痙攣（ひっつ）れるようだったが、私にはそれが何物かに脅かされてでもいるように見えてならなかった。私自身の云いようもない不安がそれを唯そんな風に感じさせるに過ぎないであろうか？", "十一月二十日", "私はこれまで書いて来たノオトをすっかり読みかえして見た。私の意図したところは、これならまあどうやら自分を満足させる程度には書けているように思えた。", "が、それとは別に、私はそれを読み続けている自分自身の裡（うち）に、その物語の主題をなしている私達自身の「幸福」をもう完全には味わえそうもなくなっている、本当に思いがけない不安そうな私の姿を見出しはじめていた。そうして私の考えはいつかその物語そのものを離れ出していた。「この物語の中のおれ達はおれ達に許されるだけのささやかな生の愉（たの）しみを味わいながら、それだけで独自（ユニイク）にお互を幸福にさせ合えると信じていられた。少くともそれだけで、おれはおれの心を縛りつけていられるものと思っていた。――が、おれ達はあんまり高く狙い過ぎていたのであろうか？　そうして、おれはおれの生の欲求を少し許（ばか）り見くびり過ぎていたのであろうか？　そのために今、おれの心の縛がこんなにも引きちぎられそうになっているのだろうか？　―――　」", "「可哀そうな節子　―――　」と私は机にほうり出したノオトをそのまま片づけようともしないで、考え続けていた。「こいつはおれ自身が、気づかぬようなふりをしていたそんなおれの生の欲求を沈黙の中に見抜いて、それに同情を寄せているように見えてならない。そしてそれが又こうしておれを苦しめ出しているのだ。　―――　おれはどうしてこんなおれの姿をこいつに隠し了（おお）せることが出来なかったのだろう？　何んておれは弱いのだろうなあ　―――　」", "私は、明りの蔭になったベッドにさっきから目を半ばつぶっている病人に目を移すと、殆ど息づまるような気がした。私は明りの側を離れて、徐（しず）かにバルコンの方へ近づいて行った。小さな月のある晩だった。それは雲のかかった山だの、丘だの、森などの輪廓（りんかく）をかすかにそれと見分けさせているきりだった。そしてその他の部分は殆どすべて鈍い青味を帯びた闇の中に溶け入っていた。しかし私の見ていたものはそれ等のものではなかった。私は、いつかの初夏の夕暮に二人で切ないほどな同情をもって、そのまま私達の幸福を最後まで持って行けそうな気がしながら眺め合っていた、まだその何物も消え失せていない思い出の中の、それ等の山や丘や森などをまざまざと心に蘇（よみがえ）らせていたのだった。そして私達自身までがその一部になり切ってしまっていたようなそういう一瞬時の風景を、こんな具合にこれまでも何遍となく蘇らせたので、それ等のものもいつのまにか私達の存在の一部分になり、そしてもはや季節と共に変化してゆくそれ等のものの、現在の姿が時とすると私達には殆ど見えないものになってしまう位であった。　―――", "「あのような幸福な瞬間をおれ達が持てたということは、それだけでももうおれ達がこうして共に生きるのに値したのであろうか？」と私は自分自身に問いかけていた。", "私の背後にふと軽い足音がした。それは節子にちがいなかった。が、私はふり向こうともせずに、そのままじっとしていた。彼女もまた何も言わずに、私から少し離れたまま立っていた。しかし、私はその息づかいが感ぜられるほど彼女を近ぢかと感じていた。ときおり冷たい風がバルコンの上をなんの音も立てずに掠（かす）め過ぎた。何処か遠くの方で枯木が音を引きむしられていた。", "「何を考えているの？」とうとう彼女が口を切った。", "私はそれにはすぐ返事をしないでいた。それから急に彼女の方へふり向いて、不確かなように笑いながら、", "「お前には分っているだろう？」と問い返した。", "彼女は何か罠（わな）でも恐れるかのように注意深く私を見た。それを見て、私は、", "「おれの仕事のことを考えているのじゃないか」とゆっくり言い出した。「おれにはどうしても好い結末が思い浮ばないのだ。おれはおれ達が無駄に生きていたようにはそれを終らせたくはないのだ。どうだ、一つお前もそれをおれと一しょに考えて呉れないか？」", "彼女は私に微笑（ほほえ）んで見せた。しかし、その微笑みはどこかまだ不安そうであった。", "「だってどんな事をお書きになったんだかも知らないじゃないの」彼女は漸（や）っと小声で言った。", "「そうだっけなあ」と私はもう一度不確かなように笑いながら言った。「それじゃあ、そのうちに一つお前にも読んで聞かせるかな。しかしまだ、最初の方だって人に読んで聞かせるほど纏（まと）まっちゃいないんだからね」", "私達は部屋の中へ戻った。私が再び明りの側に腰を下ろして、其処にほうり出してあるノオトをもう一度手に取り上げて見ていると、彼女はそんな私の背後に立ったまま、私の肩にそっと手をかけながら、それを肩越しに覗き込むようにしていた。私はいきなりふり向いて、", "「お前はもう寝た方がいいぜ」と乾いた声で言った。", "「ええ」彼女は素直に返事をして、私の肩から手を少しためらいながら放すと、ベッドに戻って行った。", "「なんだか寝られそうもないわ」二三分すると彼女がベッドの中で独り言のように言った。", "「じゃ、明りを消してやろうか？　―――　おれはもういいのだ」そう言いながら、私は明りを消して立ち上ると、彼女の枕もとに近づいた。そうしてベッドの縁に腰をかけながら、彼女の手を取った。私達はしばらくそうしたまま、暗（やみ）の中に黙り合っていた。", "さっきより風がだいぶ強くなったと見える。それはあちこちの森から絶えず音を引き※　　　てへん＋宛」、第3水準1-84-80］（も）いでいた。そしてときどきそれをサナトリウムの建物にぶっつけ、どこかの窓をばたばた鳴らしながら、一番最後に私達の部屋の窓を少しきしらせた。それに怯（おび）えでもしているかのように、彼女はいつまでも私の手をはなさないでいた。そうして目をつぶったまま、自分の裡（うち）の何かの作用（はたらき）に一心になろうとしているように見えた。そのうちにその手が少し緩んできた。彼女は寝入ったふりをし出したらしかった。", "「さあ、今度はおれの番か　―――　」そんなことを呟きながら、私も彼女と同じように寝られそうもない自分を寝つかせに、自分の真っ暗な部屋の中へはいって行った。", "十一月二十六日", "この頃、私はよく夜の明けかかる時分に目を覚ます。そんなときは、私は屡々（しばしば）そっと起き上って、病人の寝顔をしげしげと見つめている。ベッドの縁や壜（びん）などはだんだん黄ばみかけて来ているのに、彼女の顔だけがいつまでも蒼白い。「可哀そうな奴だなあ」それが私の口癖にでもなったかのように自分でも知らずにそう言っているようなこともある。", "けさも明け方近くに目を覚ました私は、長い間そんな病人の寝顔を見つめてから、爪先き立って部屋を抜け出し、サナトリウムの裏の、裸過ぎる位に枯れ切った林の中へはいって行った。もうどの木にも死んだ葉が二つ三つ残って、それが風に抗（あらが）っているきりだった。私がその空虚な林を出はずれた頃には、八ヶ岳の山頂を離れたばかりの日が、南から西にかけて立ち並んでいる山々の上に低く垂れたまま動こうともしないでいる雲の塊りを、見るまに赤あかと赫（かがや）かせはじめていた。が、そういう曙（あけぼの）の光も地上にはまだなかなか届きそうになかった。それらの山々の間に挟まれている冬枯れた森や畑や荒地は、今、すべてのものから全く打ち棄てられてでもいるような様子を見せていた。", "私はその枯木林のはずれに、ときどき立ち止まっては寒さに思わず足踏みしながら、そこいらを歩き廻っていた。そうして何を考えていたのだか自分でも思い出せないような考えをとつおいつしていた私は、そのうち不意に頭を上げて、空がいつのまにか赫きを失った暗い雲にすっかり鎖（とざ）されているのを認めた。私はそれに気がつくと、ついさっきまでそれをあんなにも美しく焼いていた曙の光が地上に届くのをそれまで心待ちにしてでもいたかのように、急になんだか詰まらなそうな恰好（かっこう）をして、足早にサナトリウムに引返して行った。", "節子はもう目を覚ましていた。しかし立ち戻った私を認めても、私の方へは物憂げにちらっと目を上げたきりだった。そしてさっき寝ていたときよりも一層蒼いような顔色をしていた。私が枕もとに近づいて、髪をいじりながら額に接吻しようとすると、彼女は弱々しく首を振った。私はなんにも訊（き）かずに、悲しそうに彼女を見ていた。が、彼女はそんな私をと云うよりも、寧（むし）ろ、そんな私の悲しみを見まいとするかのように、ぼんやりした目つきで空（くう）を見入っていた。", "夜", "何も知らずにいたのは私だけだったのだ。午前の診察の済んだ後で、私は看護婦長に廊下へ呼び出された。そして私ははじめて節子がけさ私の知らない間に少量の喀血（かっけつ）をしたことを聞かされた。彼女は私にはそれを黙っていたのだ。喀血は危険と云う程度ではないが、用心のためにしばらく附添看護婦をつけて置くようにと、院長が言い付けて行ったというのだ。――私はそれに同意するほかはなかった。", "私は丁度空いている隣りの病室に、その間だけ引き移っていることにした。私はいま、二人で住んでいた部屋に何処から何処まで似た、それでいて全然見知らないような感じのする部屋の中に、一人ぼっちで、この日記をつけている。こうして私が数時間前から坐っているのに、どうもまだこの部屋は空虚のようだ。此処にはまるで誰もいないかのように、明りさえも冷たく光っている。", "十一月二十八日", "私は殆ど出来上っている仕事のノオトを、机の上に、少しも手をつけようとはせずに、ほうり出したままにして置いてある。それを仕上げるためにも、しばらく別々に暮らした方がいいのだと云うことを病人には云い含めて置いたのだ。", "が、どうしてそれに描いたような私達のあんなに幸福そうだった状態に、今のようなこんな不安な気持のまま、私一人ではいって行くことが出来ようか？", "私は毎日、二三時間｜隔（お）きぐらいに、隣りの病室に行き、病人の枕もとにしばらく坐っている。しかし病人に喋舌（しゃべ）らせることは一番好くないので、殆んどものを言わずにいることが多い。看護婦のいない時にも、二人で黙って手を取り合って、お互になるたけ目も合わせないようにしている。", "が、どうかして私達がふいと目を見合わせるようなことがあると、彼女はまるで私達の最初の日々に見せたような、一寸気まりの悪そうな微笑（ほほえ）み方を私にして見せる。が、すぐ目を反らせて、空（くう）を見ながら、そんな状態に置かれていることに少しも不平を見せずに、落着いて寝ている。彼女は一度私に仕事は捗（はかど）っているのかと訊いた。私は首を振った。そのとき彼女は私を気の毒がるような見方をして見た。が、それきりもう私にそんなことは訊かなくなった。そして一日は、他の日に似て、まるで何事もないかのように物静かに過ぎる。", "そして彼女は私が代って彼女の父に手紙を出すことさえ拒んでいる。", "夜、私は遅くまで何もしないで机に向ったまま、バルコンの上に落ちている明りの影が窓を離れるにつれてだんだん幽（かす）かになりながら、暗（やみ）に四方から包まれているのを、あたかも自分の心の裡さながらのような気がしながら、ぼんやりと見入っている。ひょっとしたら病人もまだ寝つかれずに、私のことを考えているかも知れないと思いながら　―――", "十二月一日", "この頃になって、どうしたのか、私の明りを慕ってくる蛾がまた殖え出したようだ。", "夜、そんな蛾がどこからともなく飛んで来て、閉め切った窓硝子（まどガラス）にはげしくぶつかり、その打撃で自ら傷つきながら、なおも生を求めてやまないように、死に身になって硝子に孔（あな）をあけようと試みている。私がそれをうるさがって、明りを消してベッドにはいってしまっても、まだしばらく物狂わしい羽搏（はばた）きをしているが、次第にそれが衰え、ついに何処かにしがみついたきりになる。そんな翌朝、私はかならずその窓の下に、一枚の朽ち葉みたいになった蛾の死骸を見つける。", "今夜もそんな蛾が一匹、とうとう部屋の中へ飛び込んで来て、私の向っている明りのまわりをさっきから物狂わしくくるくると廻っている。やがてばさりと音を立てて私の紙の上に落ちる。そしていつまでもそのまま動かずにいる。それからまた自分の生きていることを漸（や）っと思い出したように、急に飛び立つ。自分でももう何をしているのだか分らずにいるのだとしか見えない。やがてまた、私の紙の上にばさりと音を立てて落ちる。", "私は異様な怖れからその蛾を逐（お）いのけようともしないで、かえってさも無関心そうに、自分の紙の上でそれが死ぬままにさせて置く。", "十二月五日", "夕方、私達は二人きりでいた。附添看護婦はいましがた食事に行った。冬の日は既に西方の山の背にはいりかけていた。そしてその傾いた日ざしが、だんだん底冷えのしだした部屋の中を急に明るくさせ出した。私は病人の枕もとで、ヒイタアに足を載せながら、手にした本の上に身を屈（かが）めていた。そのとき病人が不意に、", "「あら、お父様」とかすかに叫んだ。", "私は思わずぎくりとしながら彼女の方へ顔を上げた。私は彼女の目がいつになく赫（かがや）いているのを認めた。――しかし私はさりげなさそうに、今の小さな叫びが耳にはいらなかったらしい様子をしながら、", "「いま何か言ったかい？」と訊（き）いて見た。", "彼女はしばらく返事をしないでいた。が、その目は一層赫き出しそうに見えた。", "「あの低い山の左の端に、すこうし日のあたった所があるでしょう？」彼女はやっと思い切ったようにベッドから手でその方をちょっと指して、それから何んだか言いにくそうな言葉を無理にそこから引出しでもするように、その指先きを今度は自分の口へあてがいながら、「あそこにお父様の横顔にそっくりな影が、いま時分になると、いつも出来るのよ。　―――　ほら、丁度いま出来ているのが分らない？」", "その低い山が彼女の言っている山であるらしいのは、その指先きを辿（たど）りながら私にもすぐ分ったが、唯そこいらへんには斜めな日の光がくっきりと浮き立たせている山襞（やまひだ）しか私には認められなかった。", "「もう消えて行くわ　―――　ああ、まだ額のところだけ残っている　―――　」", "そのとき漸（や）っと私はその父の額らしい山襞を認めることが出来た。それは父のがっしりとした額を私にも思い出させた。「こんな影にまで、こいつは心の裡（うち）で父を求めていたのだろうか？　ああ、こいつはまだ全身で父を感じている、父を呼んでいる　―――　」", "が、一瞬間の後には、暗（やみ）がその低い山をすっかり満たしてしまった。そしてすべての影は消えてしまった。", "「お前、家へ帰りたいのだろう？」私はついと心に浮んだ最初の言葉を思わずも口に出した。", "そのあとですぐ私は不安そうに節子の目を求めた。彼女は殆どすげないような目つきで私を見つめ返していたが、急にその目を反らせながら、", "「ええ、なんだか帰りたくなっちゃったわ」と聞えるか聞えない位な、かすれた声で言った。", "私は脣（くちびる）を噛んだまま、目立たないようにベッドの側を離れて、窓ぎわの方へ歩み寄った。", "私の背後で彼女が少し顫声（ふるえごえ）で言った。「御免なさいね。　―――　だけど、いま一寸の間だけだわ。　―――　こんな気持、じきに直るわ　―――　」", "私は窓のところに両手を組んだまま、言葉もなく立っていた。山々の麓（ふもと）にはもう暗（やみ）が塊まっていた。しかし山頂にはまだ幽（かす）かに光が漂っていた。突然｜咽（のど）をしめつけられるような恐怖が私を襲ってきた。私はいきなり病人の方をふり向いた。彼女は両手で顔を押さえていた。急に何もかもが自分達から失われて行ってしまいそうな、不安な気持で一ぱいになりながら、私はベッドに駈けよって、その手を彼女の顔から無理に除けた。彼女は私に抗（あらが）おうとしなかった。", "高いほどな額、もう静かな光さえ見せている目、引きしまった口もと、――何一ついつもと少しも変っていず、いつもよりかもっともっと犯し難いように私には思われた。　―――　そうして私は何んでもないのにそんなに怯（おび）え切っている私自身を反って子供のように感ぜずにはいられなかった。私はそれから急に力が抜けてしまったようになって、がっくりと膝を突いて、ベッドの縁に顔を埋めた。そうしてそのままいつまでもぴったりとそれに顔を押しつけていた。病人の手が私の髪の毛を軽く撫でているのを感じ出しながら　―――", "部屋の中までもう薄暗くなっていた。", "死のかげの谷", "一九三六年十二月一日　Ｋ・・村にて", "殆ど三年半ぶりで見るこの村は、もうすっかり雪に埋まっていた。一週間ばかりも前から雪がふりつづいていて、けさ漸（や）っとそれが歇（や）んだのだそうだ。炊事の世話を頼んだ村の若い娘とその弟が、その男の子のらしい小さな橇（そり）に私の荷物を載せて、これからこの冬を其処で私の過ごそうという山小屋まで、引き上げて行ってくれた。その橇のあとに附いてゆきながら、途中で何度も私は滑りそうになった。それほどもう谷かげの雪はこちこちに凍（し）みついてしまっていた。　―――", "私の借りた小屋は、その村からすこし北へはいった、或小さな谷にあって、そこいらにも古くから外人たちの別荘があちこちに立っている、――なんでもそれらの別荘の一番はずれになっている筈だった。其処に夏を過ごしに来る外人たちがこの谷を称して幸福の谷　　　幸福の谷」に傍点］と云っているとか。こんな人けの絶えた、淋しい谷の、一体どこが幸福の谷　　　幸福の谷」に傍点］なのだろう、と私は今はどれもこれも雪に埋もれたまんま見棄てられているそう云う別荘を一つ一つ見過ごしながら、その谷を二人のあとから遅れがちに登って行くうちに、ふいとそれとは正反対の谷の名前さえ自分の口を衝（つ）いて出そうになった。私はそれを何かためらいでもするようにちょっと引っ込めかけたが、再び気を変えてとうとう口に出した。死のかげの谷　　　死のかげの谷」に傍点］。　―――　そう、よっぽどそう云った方がこの谷には似合いそうだな、少くともこんな冬のさなか、こういうところで寂しい鰥暮（やもめぐ）らしをしようとしているおれにとっては。――と、そんな事を考え考え、漸っと私の借りる一番最後の小屋の前まで辿り着いてみると、申しわけのように小さなヴェランダの附いた、その木皮葺（きはだぶ）きの小屋のまわりには、それを取囲んだ雪の上になんだか得体の知れない足跡が一ぱい残っている。姉娘がその締め切られた小屋の中へ先きにはいって雨戸などを明けている間、私はその小さな弟からこれは兎これは栗鼠（りす）、それからこれは雉子（きじ）と、それらの異様な足跡を一々教えて貰っていた。", "それから私は、半ば雪に埋もれたヴェランダに立って、周囲を眺めまわした。私達がいま上って来た谷陰は、そこから見下ろすと、いかにも恰好（かっこう）のよい小ぢんまりとした谷の一部分になっている。ああ、いましがた例の橇に乗って一人だけ先きに帰っていった、あの小さな弟の姿が、裸の木と木との間から見え隠れしている。その可哀らしい姿がとうとう下方の枯木林の中に消えてしまうまで見送りながら、一わたりその谷間を見畢（みおわ）った時分、どうやら小屋の中も片づいたらしいので、私ははじめてその中にはいって行った。壁まですっかり杉皮が張りつめられてあって、天井も何もない程の、思ったよりも粗末な作りだが、悪い感じではなかった。すぐ二階にも上って見たが、寝台から椅子と何から何まで二人分ある。丁度お前と私とのためのように。――そう云えば、本当にこう云ったような山小屋で、お前と差し向いの寂しさで暮らすことを、昔の私はどんなに夢見ていたことか！　―――", "夕方、食事の支度が出来ると、私はそのまますぐ村の娘を帰らせた。それから私は一人で煖炉（だんろ）の傍に大きな卓子を引き寄せて、その上で書きものから食事一切をすることに極めた。その時ひょいと頭の上に掛かっている暦がいまだに九月のままになっているのに気がついて、それを立ち上がって剥（は）がすと、きょうの日附のところに印をつけて置いてから、さて、私は実に一年ぶりでこの手帳を開いた。", "十二月二日", "どこか北の方の山がしきりに吹雪いているらしい。きのうなどは手に取るように見えていた浅間山も、きょうはすっかり雪雲に掩（おお）われ、その奥でさかんに荒れていると見え、この山麓（さんろく）の村までその巻添えを食らって、ときどき日が明るく射しながら、ちらちらと絶えず雪が舞っている。どうかして不意にそんな雪の端が谷の上にかかりでもすると、その谷を隔てて、ずっと南に連った山々のあたりにはくっきりと青空が見えながら、谷全体が翳（かげ）って、ひとしきり猛烈に吹雪く。と思うと、又ぱあっと日があたっている。　―――", "そんな谷の絶えず変化する光景を窓のところに行ってちょっと眺めやっては、又すぐ煖炉（だんろ）の傍に戻って来たりして、そのせいでか、私はなんとなく落着かない気持で一日じゅうを過ごした。", "昼頃、風呂敷包を背負った村の娘が足袋跣（たびはだ）しで雪の中をやって来てくれた。手から顔まで霜焼けのしているような娘だが、素直そうで、それに無口なのが何よりも私には工合が好い。又きのうのように食事の用意だけさせて置いて、すぐに帰らせた。それから私はもう一日が終ってしまったかのように、煖炉の傍から離れないで、何もせずにぼんやりと、焚木（たきぎ）がひとりでに起る風に煽（あお）られつつぱちぱちと音を立てながら燃えるのを見守っていた。", "そのまま夜になった。一人で冷めたい食事をすませてしまうと、私の気持もいくぶん落着いてきた。雪は大した事にならずに止んだようだが、そのかわり風が出はじめていた。火が少しでも衰えて音をしずめると、その隙々に、谷の外側でそんな風が枯木林から音を引き※　　　てへん＋宛」、第3水準1-84-80］（も）いでいるらしいのが急に近ぢかと聞えて来たりした。", "それから一時間ばかり後、私は馴れない火にすこし逆上（のぼ）せたようになって、外気にあたりに小屋を出た。そうしてしばらく真っ暗な戸外を歩き廻っていたが、やっと顔が冷え冷えとしてきたので、再び小屋にはいろうとしかけながら、その時はじめて中から洩れてくる明りで、いまもなお絶えず細かい雪が舞っているのに気がついた。私は小屋にはいると、すこし濡れた体を乾かしに、再び火の傍に寄って行った。が、そうやって又火にあたっているうちに、いつしか体を乾かしている事も忘れたようにぼんやりとして、自分の裡（うち）に或る追憶を蘇（よみがえ）らせていた。それは去年のいま頃、私達のいた山のサナトリウムのまわりに、丁度今夜のような雪の舞っている夜ふけのことだった。私は何度もそのサナトリウムの入口に立っては、電報で呼び寄せたお前の父の来るのを待ち切れなさそうにしていた。やっと真夜中近くになって父は着いた。しかしお前はそういう父をちらりと見ながら、脣（くちびる）のまわりにふと微笑ともつかないようなものを漂わせたきりだった。父は何も云わずにそんなお前の憔悴（しょうすい）し切った顔をじっと見守っていた。そうしてはときおり私の方へいかにも不安そうな目を向けた。が、私はそれには気がつかないようなふりをして、唯、お前の方ばかりを見るともなしに見やっていた。そのうちに突然お前が何か口ごもったような気がしたので、私がお前の傍に寄ってゆくと、殆ど聞えるか聞えない位の小さな声で、「あなたの髪に雪がついているの　―――　」とお前は私に向って云った。――いま、こうやって一人きりで火の傍にうずくまりながら、ふいと蘇ったそんな思い出に誘われるようにして、私が何んの気なしに自分の手を頭髪に持っていって見ると、それはまだ濡れるともなく濡れていて、冷めたかった。私はそうやって見るまで、それには少しも気がつかずにいた。　―――", "十二月五日", "この数日、云いようもないほどよい天気だ。朝のうちはヴェランダ一ぱいに日が射し込んでいて、風もなく、とても温かだ。けさなどはとうとうそのヴェランダに小さな卓や椅子を持ち出して、まだ一面に雪に埋もれた谷を前にしながら、朝食をはじめた位だ。本当にこうして一人っきりでいるのはなんだか勿体（もったい）ないようだ、と思いながら朝食に向っているうち、ひょいとすぐ目の前の枯れた灌木（かんぼく）の根もとへ目をやると、いつのまにか雉子（きじ）が来ている。それも二羽、雪の中に餌をあさりながら、ごそごそと歩きまわっている　―――", "「おい、来て御覧、雉子が来ているぞ」", "私は恰（あたか）もお前が小屋の中に居でもするかのように想像して、声を低めてそう一人ごちながら、じっと息をつめてその雉子を見守っていた。お前がうっかり足音でも立てはしまいかと、それまで気づかいながら　―――", "その途端、どこかの小屋で、屋根の雪がどおっと谷じゅうに響きわたるような音を立てながら雪崩（なだ）れ落ちた。私は思わずどきりとしながら、まるで自分の足もとからのように二羽の雉子が飛び立ってゆくのを呆気にとられて見ていた。そのとき殆ど同時に、私は自分のすぐ傍に立ったまま、お前がそういう時の癖で、何も言わずに、ただ大きく目を※　　　目＋爭」、第3水準1-88-85］（みは）りながら私をじっと見つめているのを、苦しいほどまざまざと感じた。", "午後、私ははじめて谷の小屋を下りて、雪の中に埋まった村を一周りした。夏から秋にかけてしかこの村を知っていない私には、いま一様に雪をかぶっている森だの、道だの、釘づけになった小屋だのが、どれもこれも見覚えがありそうでいて、どうしてもその以前の姿を思い出されなかった。昔、私が好んで歩きまわった水車の道　　　水車の道」に傍点］に沿って、いつか私の知らない間に、小さなカトリック教会さえ出来ていた。しかもその美しい素木造（しらきづく）りの教会は、その雪をかぶった尖（とが）った屋根の下から、すでにもう黒ずみかけた壁板すらも見せていた。それが一層そのあたり一帯を私に何か見知らないように思わせ出した。それから私はよくお前と連れ立って歩いたことのある森の中へも、まだかなり深い雪を分けながらはいって行って見た。やがて私は、どうやら見覚えのあるような気のする一本の樅（もみ）の木を認め出した。が、漸（や）っとそれに近づいて見たら、その樅の中からギャッと鋭い鳥の啼（な）き声（ごえ）がした。私がその前に立ち止まると、一羽の、ついぞ見かけたこともないような、青味を帯びた鳥がちょっと愕（おどろ）いたように羽摶（はばた）いて飛び立ったが、すぐ他の枝に移ったままかえって私に挑みでもするように、再びギャッ、ギャッと啼き立てた。私はその樅の木からさえ、心ならずも立ち去った。", "十二月七日", "集会堂の傍らの、冬枯れた林の中で、私は突然二声ばかり郭公（かっこう）の啼きつづけたのを聞いたような気がした。その啼き声はひどく遠くでしたようにも、又ひどく近くでしたようにも思われて、それが私をそこいらの枯藪（かれやぶ）の中だの、枯木の上だの、空ざまを見まわせさせたが、それっきりその啼き声は聞えなかった。", "それは矢張りどうも自分の聞き違えだったように私にも思われて来た。が、それよりも先きに、そのあたりの枯藪だの、枯木だの、空だのは、すっかり夏の懐しい姿に立ち返って、私の裡（うち）に鮮かに蘇えり出した。　―――", "けれども、そんな三年前の夏の、この村で私の持っていたすべての物が既に失われて、いまの自分に何一つ残ってはいない事を、私が本当に知ったのもそれと一しょだった。", "十二月十日", "この数日、どういうものか、お前がちっとも生き生きと私に蘇（よみがえ）って来ない。そうしてときどきこうして孤独でいるのが私には殆どたまらないように思われる。朝なんぞ、煖炉（だんろ）に一度組み立てた薪がなかなか燃えつかず、しまいに私は焦（じ）れったくなって、それを荒あらしく引っ掻きまわそうとする。そんなときだけ、ふいと自分の傍らに気づかわしそうにしているお前を感じる。――私はそれから漸（や）っと気を取りなおして、その薪をあらたに組み変える。", "又午後など、すこし村でも歩いて来ようと思って、谷を下りてゆくと、この頃は雪解けがしている故、道がとても悪く、すぐ靴が泥で重くなり、歩きにくくてしようがないので、大抵途中から引っ返して来てしまう。そうしてまだ雪の凍（し）みついている、谷までさしかかると、思わずほっとしながら、しかしこん度はこれから自分の小屋までずっと息の切れるような上り道になる。そこで私はともすれば滅入りそうな自分の心を引き立てようとして、「たとひわれ死のかげの谷を歩むとも禍害（わざはひ）をおそれじ、なんぢ我とともに在（いま）せばなり　―――　」と、そんなうろ覚えに覚えている詩篇の文句なんぞまで思い出して自分自身に云ってきかせるが、そんな文句も私にはただ空虚に感ぜられるばかりだった。", "十二月十二日", "夕方、水車の道　　　水車の道」に傍点］に沿った例の小さな教会の前を私が通りかかると、そこの小使らしい男が雪泥の上に丹念に石炭殻を撒（ま）いていた。私はその男の傍に行って、冬でもずっとこの教会は開いているのですか、と何んという事もなしに訊（き）いて見た。", "「今年はもう二三日うちに締めますそうで――」とその小使はちょっと石炭殻を撒く手を休めながら答えた。「去年はずっと冬じゅう開いて居りましたが、今年は神父様が松本の方へお出（いで）になりますので　―――　」", "「そんな冬でもこの村に信者はあるんですか？」と私は無躾（ぶしつ）けに訊いた。", "「殆ど入らっしゃいませんが。　―――　大抵、神父様お一人で毎日のお弥撒（ミサ）をなさいます」", "私達がそんな立ち話をし出しているところへ、丁度外出先からその独逸人（ドイツじん）だとかいう神父が帰って来た。こん度は私がその日本語をまだ充分理解しない、しかし人なつこそうな神父に掴（つか）まって、何かと訊かれる番になった。そうしてしまいには何か聞き違えでもしたらしく、明日の日曜の弥撒には是非来い、と私はしきりに勧められた。", "十二月十三日、日曜日", "朝の九時頃、私は何を求めるでもなしにその教会へ行った。小さな蝋燭（ろうそく）の火のともった祭壇の前で、もう神父が一人の助祭と共に弥撒をはじめていた。信者でもなんでもない私は、どうして好いか分からず、唯、音を立てないようにして、一番後ろの方にあった藁（わら）で出来た椅子にそのままそっと腰を下ろした。が、やっと内のうす暗さに目が馴れてくると、それまで誰もいないものとばかり思っていた信者席の、一番前列の、柱のかげに一人黒ずくめのなりをした中年の婦人がうずくまっているのが目に入ってきた。そうしてその婦人がさっきからずっと跪（ひざま）ずき続けているらしいのに気がつくと、私は急にその会堂のなかのいかにも寒々としているのを身にしみて感じた。　―――", "それからも小一時間ばかり弥撒は続いていた。その終りかける頃、その婦人がふいと半巾（ハンカチ）を取りだして顔にあてがったのを私は認めた。しかしそれは何んのためだか、私には分からなかった。そのうちに漸っと弥撒が済んだらしく、神父は信者席の方へは振り向かずに、そのまま脇にあった小室の中へ一度引っ込んで行った。その婦人はなおもまだじっと身動きもせずにいた。が、その間に、私だけはそっと教会から抜け出した。", "それはうす曇った日だった。私はそれから雪解けのした村の中を、いつまでも何か充たされないような気持で、あてもなくさ迷っていた。昔、お前とよく絵を描きにいった、真ん中に一本の白樺のくっきりと立った原へも行って見て、まだその根もとだけ雪の残っている白樺の木に懐しそうに手をかけながら、その指先きが凍（こご）えそうになるまで、立っていた。しかし、私にはその頃のお前の姿さえ殆ど蘇って来なかった。　―――　とうとう私は其処も立ち去って、何んともいうにいわれぬ寂しい思いで、枯木の間を抜けながら、一気に谷を昇って、小屋に戻って来た。", "そうしてはあはあと息を切らしながら、思わずヴェランダの床板に腰を下ろしていると、そのとき不意とそんなむしゃくしゃした私に寄り添ってくるお前が感じられた。が、私はそれにも知らん顔をして、ぼんやりと頬杖をついていた。その癖、そういうお前をこれまでになく生き生きと――まるでお前の手が私の肩にさわっていはしまいかと思われる位、生き生きと感じながら　―――", "「もうお食事の支度が出来て居りますが――」", "小屋の中から、もうさっきから私の帰りを待っていたらしい村の娘が、そう私を食事に呼んだ。私はふっと現（うつつ）に返りながら、このままもう少しそっとして置いて呉れたら好かりそうなものを、といつになく浮かない顔つきをして小屋の中にはいって行った。そうして娘には一言も口をきかずに、いつものような一人きりの食事に向った。", "夕方近く、私はなんだかまだ苛（い）ら苛（い）らしたような気分のままその娘を帰してしまったが、それから暫らくするとその事をいくぶん後悔し出しながら、再びなんと云う事もなしにヴェランダに出て行った。そうしてまたさっきのように（しかしこん度はお前なしに　―――　）ぼんやりとまだ大ぶ雪の残っている谷間を見下ろしていると、ゆっくり枯木の間を抜け抜け誰だかその谷じゅうをと見こう見しながら、だんだんこっちの方へ登って来るのが認められた。何処へ来たのだろうと思いながら見続けていると、それは私の小屋を捜しているらしい神父だった。", "十二月十四日", "きのう夕方、神父と約束をしたので、私は教会へ訪ねて行った。あす教会を閉（とざ）して、すぐ松本へ立つとか云う事で、神父は私と話をしながらも、ときどき荷拵えをしている小使のところへ何か云いつけに立って行ったりした。そうしてこの村で一人の信者を得ようとしているのに、いま此処を立ち去るのはいかにも残念だと繰り返し言っていた。私はすぐにきのう教会で見かけた、やはり独逸人らしい中年の婦人を思い浮べた。そうしてその婦人のことを神父に訊こうとしかけながら、その時ひょっくりこれはまた神父が何か思い違えて、私自身のことを言っているのではあるまいかと云う気もされ出した。　―――", "そう妙にちぐはぐになった私達の会話は、それからはますます途絶えがちだった。そうして私達はいつか黙り合ったまま、熱過ぎるくらいの煖炉の傍で、窓硝子（まどガラス）ごしに、小さな雲がちぎれちぎれになって飛ぶように過ぎる、風の強そうなしかし冬らしく明るい空を眺めていた。", "「こんな美しい空は、こういう風のある寒い日でなければ見られませんですね」神父がいかにも何気なさそうに口をきいた。", "「本当に、こういう風のある、寒い日でなければ　―――　」と私は鸚鵡（おうむ）がえしに返事をしながら、神父のいま何気なく言ったその言葉だけは妙に私の心にも触れてくるのを感じていた　―――", "一時間ばかりそうやって神父のところに居てから、私が小屋に帰って見ると、小さな小包が届いていた。ずっと前から註文してあったリルケの「鎮魂歌（レクヰエム）」が二三冊の本と一しょに、いろんな附箋（ふせん）がつけられて、方々へ廻送されながら、やっとの事でいま私の許（もと）に届いたのだった。", "夜、すっかりもう寝るばかりに支度をして置いてから、私は煖炉（だんろ）の傍で、風の音をときどき気にしながら、リルケの「レクヰエム」を読み始めた。", "十二月十七日", "又雪になった。けさから殆ど小止みもなしに降りつづいている。そうして私の見ている間に目の前の谷は再び真っ白になった。こうやっていよいよ冬も深くなるのだ。きょうも一日中、私は煖炉の傍らで暮らしながら、ときどき思い出したように窓ぎわに行って雪の谷をうつけたように見やっては、又すぐに煖炉に戻って来て、リルケの「レクヰエム」に向っていた。未だにお前を静かに死なせておこうとはせずに、お前を求めてやまなかった、自分の女々しい心に何か後悔に似たものをはげしく感じながら　―――", "私は死者達を持つてゐる、そして彼等を立ち去るが儘にさせてあるが、", "彼等が噂とは似つかず、非常に確信的で、", "死んでゐる事にもすぐ慣れ、頗（すこぶ）る快活であるらしいのに", "驚いている位だ。只お前――お前だけは帰つて", "来た。お前は私を掠め、まはりをさ迷ひ、何物かに", "衝（つ）き当る、そしてそれがお前のために音を立てて、", "お前を裏切るのだ。おお、私が手間をかけて学んで得た物を", "私から取除けて呉れるな。正しいのは私で、お前が間違つてゐるのだ、", "もしかお前が誰かの事物に郷愁を催してゐるのだったら。我々はその事物を目の前にしてゐても、", "それは此処に在るのではない。我々がそれを知覚すると同時に", "その事物を我々の存在から反映させてゐるきりなのだ。", "十二月十八日", "漸（ようや）く雪が歇（や）んだので、私はこういう時だとばかり、まだ行ったことのない裏の林を、奥へ奥へとはいって行って見た。ときどき何処かの木からどおっと音を立ててひとりでに崩れる雪の飛沫を浴びながら、私はさも面白そうに林から林へと抜けて行った。勿論、誰もまだ歩いた跡なんぞはなく、唯、ところどころに兎がそこいら中を跳ねまわったらしい跡が一めんに附いているきりだった。又、どうかすると雉子（きじ）の足跡のようなものがすうっと道を横切っていた　―――", "しかし何処まで行っても、その林は尽きず、それにまた雪雲らしいものがその林の上に拡がり出してきたので、私はそれ以上奥へはいることを断念して途中から引っ返して来た。が、どうも道を間違えたらしく、いつのまにか私は自分自身の足跡をも見失っていた。私はなんだか急に心細そうに雪を分けながら、それでも構わずにずんずん自分の小屋のありそうな方へ林を突切って来たが、そのうちにいつからともなく私は自分の背後に確かに自分のではない、もう一つの足音がするような気がし出していた。それはしかし殆どあるかないか位の足音だった　―――", "私はそれを一度も振り向こうとはしないで、ずんずん林を下りて行った。そうして私は何か胸をしめつけられるような気持になりながら、きのう読（よ）み畢（お）えたリルケの「レクヰエム」の最後の数行が自分の口を衝いて出るがままに任せていた。", "帰つて入らつしやるな。さうしてもしお前に我慢できたら、", "死者達の間に死んでお出（いで）。死者にもたんと仕事はある。", "けれども私に助力はしておくれ、お前の気を散らさない程度で、", "屡々遠くのものが私に助力をしてくれるやうに――私の裡で。", "十二月二十四日", "夜、村の娘の家に招（よ）ばれて行って、寂しいクリスマスを送った。こんな冬は人けの絶えた山間の村だけれど、夏なんぞ外人達が沢山はいり込んでくるような土地柄ゆえ、普通の村人の家でもそんな真似事をして楽しむものと見える。", "九時頃、私はその村から雪明りのした谷陰をひとりで帰って来た。そうして最後の枯木林に差しかかりながら、私はふとその道傍に雪をかぶって一塊りに塊っている枯藪（かれやぶ）の上に、何処からともなく、小さな光が幽（かす）かにぽつんと落ちているのに気がついた。こんなところにこんな光が、どうして射しているのだろうと訝（いぶか）りながら、そのどっか別荘の散らばった狭い谷じゅうを見まわして見ると、明りのついているのは、たった一軒、確かに私の小屋らしいのが、ずっとその谷の上方に認められるきりだった。　―――　「おれはまあ、あんな谷の上に一人っきりで住んでいるのだなあ」と私は思いながら、その谷をゆっくりと登り出した。「そうしてこれまでは、おれの小屋の明りがこんな下の方の林の中にまで射し込んでいようなどとはちっとも気がつかずに。御覧　―――　」と私は自分自身に向って言うように、「ほら、あっちにもこっちにも、殆どこの谷じゅうを掩（おお）うように、雪の上に点々と小さな光の散らばっているのは、どれもみんなおれの小屋の明りなのだからな。　―――　」", "漸（や）っとその小屋まで登りつめると、私はそのままヴェランダに立って、一体この小屋の明りは谷のどの位を明るませているのか、もう一度見て見ようとした。が、そうやって見ると、その明りは小屋のまわりにほんの僅かな光を投げているに過ぎなかった。そうしてその僅かな光も小屋を離れるにつれてだんだん幽かになりながら、谷間の雪明りとひとつになっていた。", "「なあんだ、あれほどたんとに見えていた光が、此処で見ると、たったこれっきりなのか」と私はなんだか気の抜けたように一人ごちながら、それでもまだぼんやりとその明りの影を見つめているうちに、ふとこんな考えが浮んで来た。「――だが、この明りの影の工合なんか、まるでおれの人生にそっくりじゃあないか。おれは、おれの人生のまわりの明るさなんぞ、たったこれっ許（ばか）りだと思っているが、本当はこのおれの小屋の明りと同様に、おれの思っているよりかもっともっと沢山あるのだ。そうしてそいつ達がおれの意識なんぞ意識しないで、こうやって何気なくおれを生かして置いてくれているのかも知れないのだ　―――　」", "そんな思いがけない考えが、私をいつまでもその雪明りのしている寒いヴェランダの上に立たせていた。", "十二月三十日", "本当に静かな晩だ。私は今夜もこんなかんがえがひとりでに心に浮んで来るがままにさせていた。", "「おれは人並以上に幸福でもなければ、又不幸でもないようだ。そんな幸福だとか何んだとか云うような事は、嘗（か）つてはあれ程おれ達をやきもきさせていたっけが、もう今じゃあ忘れていようと思えばすっかり忘れていられる位だ。反ってそんなこの頃のおれの方が余っ程幸福の状態に近いのかも知れない。まあ、どっちかと云えば、この頃のおれの心は、それに似てそれよりは少し悲しそうなだけ、――そうかと云ってまんざら愉（たの）しげでないこともない。　―――　こんな風におれがいかにも何気なさそうに生きていられるのも、それはおれがこうやって、なるたけ世間なんぞとは交じわらずに、たった一人で暮らしている所為（せい）かも知れないけれど、そんなことがこの意気地なしのおれに出来ていられるのは、本当にみんなお前のお蔭だ。それだのに、節子、おれはこれまで一度だっても、自分がこうして孤独で生きているのを、お前のためだなんぞとは思った事がない。それはどのみち自分一人のために好き勝手な事をしているのだとしか自分には思えない。或はひょっとしたら、それも矢っ張お前のためにはしているのだが、それがそのままでもって自分一人のためにしているように自分に思われる程、おれはおれには勿体（もったい）ないほどのお前の愛に慣れ切ってしまっているのだろうか？　それ程、お前はおれには何んにも求めずに、おれを愛していて呉れたのだろうか？　　―――　」", "そんな事を考え続けているうちに、私はふと何か思い立ったように立ち上りながら、小屋のそとへ出て行った。そうしていつものようにヴェランダに立つと、丁度この谷と背中合せになっているかと思われるようなあたりでもって、風がしきりにざわめいているのが、非常に遠くからのように聞えて来る。それから私はそのままヴェランダに、恰（あたか）もそんな遠くでしている風の音をわざわざ聞きに出でもしたかのように、それに耳を傾けながら立ち続けていた。私の前方に横わっているこの谷のすべてのものは、最初のうちはただ雪明りにうっすらと明るんだまま一塊りになってしか見えずにいたが、そうやってしばらく私が見るともなく見ているうちに、それがだんだん目に慣れて来たのか、それとも私が知（し）らず識（し）らずに自分の記憶でもってそれを補い出していたのか、いつの間にか一つ一つの線や形を徐（おもむ）ろに浮き上がらせていた。それほど私にはその何もかもが親しくなっている、この人々の謂（い）うところの幸福の谷　　　幸福の谷」に傍点］――そう、なるほどこうやって住み慣れてしまえば、私だってそう人々と一しょになって呼んでも好いような気のする位だが、　―――　此処だけは、谷の向う側はあんなにも風がざわめいているというのに、本当に静かだこと。まあ、ときおり私の小屋のすぐ裏の方で何かが小さな音を軋（き）しらせているようだけれど、あれは恐らくそんな遠くからやっと届いた風のために枯れ切った木の枝と枝とが触れ合っているのだろう。又、どうかするとそんな風の余りらしいものが、私の足もとでも二つ三つの落葉を他の落葉の上にさらさらと弱い音を立てながら移している　―――　。"]}, {"no": 10, "title": "風の又三郎", "author": "宮沢 賢治", "category": "日本文学-児童-童話", "chars": 31107, "volume": "大", "paras": ["どっどど　どどうど　どどうど　どどう", "青いくるみも吹きとばせ", "すっぱいかりんも吹きとばせ", "どっどど　どどうど　どどうど　どどう", "谷川の岸に小さな学校がありました。", "教室はたった一つでしたが生徒は三年生がないだけで、あとは一年から六年までみんなありました。運動場もテニスコートのくらいでしたが、すぐうしろは栗（くり）の木のあるきれいな草の山でしたし、運動場のすみにはごぼごぼつめたい水を噴（ふ）く岩穴もあったのです。", "さわやかな九月一日の朝でした。青ぞらで風がどうと鳴り、日光は運動場いっぱいでした。黒い雪袴（ゆきばかま）をはいた二人の一年生の子がどてをまわって運動場にはいって来て、まだほかにだれも来ていないのを見て、「ほう、おら一等だぞ。一等だぞ。」とかわるがわる叫びながら大よろこびで門をはいって来たのでしたが、ちょっと教室の中を見ますと、二人（ふたり）ともまるでびっくりして棒立ちになり、それから顔を見合わせてぶるぶるふるえましたが、ひとりはとうとう泣き出してしまいました。というわけは、そのしんとした朝の教室のなかにどこから来たのか、まるで顔も知らないおかしな赤い髪の子供がひとり、いちばん前の机にちゃんとすわっていたのです。そしてその机といったらまったくこの泣いた子の自分の机だったのです。", "もひとりの子ももう半分泣きかけていましたが、それでもむりやり目をりんと張って、そっちのほうをにらめていましたら、ちょうどそのとき、川上から、", "「ちょうはあ　かぐり　ちょうはあ　かぐり。」と高く叫ぶ声がして、それからまるで大きなからすのように、嘉助（かすけ）がかばんをかかえてわらって運動場へかけて来ました。と思ったらすぐそのあとから佐太郎（さたろう）だの耕助（こうすけ）だのどやどややってきました。", "「なして泣いでら、うなかもたのが。」嘉助が泣かないこどもの肩をつかまえて言いました。するとその子もわあと泣いてしまいました。おかしいとおもってみんながあたりを見ると、教室の中にあの赤毛のおかしな子がすまして、しゃんとすわっているのが目につきました。", "みんなはしんとなってしまいました。だんだんみんな女の子たちも集まって来ましたが、だれもなんとも言えませんでした。", "赤毛の子どもはいっこうこわがるふうもなくやっぱりちゃんとすわって、じっと黒板を見ています。すると六年生の一郎（いちろう）が来ました。一郎はまるでおとなのようにゆっくり大またにやってきて、みんなを見て、", "「何（なに）した。」とききました。", "みんなははじめてがやがや声をたててその教室の中の変な子を指さしました。一郎はしばらくそっちを見ていましたが、やがて鞄（かばん）をしっかりかかえて、さっさと窓の下へ行きました。", "みんなもすっかり元気になってついて行きました。", "「だれだ、時間にならないに教室へはいってるのは。」一郎は窓へはいのぼって教室の中へ顔をつき出して言いました。", "「お天気のいい時教室さはいってるづど先生にうんとしからえるぞ。」窓の下の耕助が言いました。", "「しからえでもおら知らないよ。」嘉助が言いました。", "「早ぐ出はって来（こ）、出はって来。」一郎が言いました。けれどもそのこどもはきょろきょろ室（へや）の中やみんなのほうを見るばかりで、やっぱりちゃんとひざに手をおいて腰掛けにすわっていました。", "ぜんたいその形からが実におかしいのでした。変てこなねずみいろのだぶだぶの上着を着て、白い半ずぼんをはいて、それに赤い革（かわ）の半靴（はんぐつ）をはいていたのです。", "それに顔といったらまるで熟したりんごのよう、ことに目はまん丸でまっくろなのでした。いっこう言葉が通じないようなので一郎も全く困ってしまいました。", "「あいづは外国人だな。」", "「学校さはいるのだな。」みんなはがやがやがやがや言いました。ところが五年生の嘉助がいきなり、", "「ああ三年生さはいるのだ。」と叫びましたので、", "「ああそうだ。」と小さいこどもらは思いましたが、一郎はだまってくびをまげました。", "変なこどもはやはりきょろきょろこっちを見るだけ、きちんと腰掛けています。", "そのとき風がどうと吹いて来て教室のガラス戸はみんながたがた鳴り、学校のうしろの山の萱（かや）や栗（くり）の木はみんな変に青じろくなってゆれ、教室のなかのこどもはなんだかにやっとわらってすこしうごいたようでした。", "すると嘉助がすぐ叫びました。", "「ああわかった。あいつは風の又三郎（またさぶろ
